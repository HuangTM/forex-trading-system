    "Null-Hypothesis Tester dissent is append-only. Cannot be erased by the others agreeing."
dissent_text: |
  I dissent against treating either claim's headline framing as admissible. CLAIM A understates N
  by logging only "48 + basket-size": if the K members were selected from a variant grid (and
  classic indicators ARE families of variants), the honest denominator is 48 + grid-size, not 48+K,
  and the cost wall makes the expected cost-dominated fraction ~>=70% (the trial-48 pattern). CLAIM B
  is structurally a TRAP as stated: "trained on 5 years" reports the survivor of a 10^3-10^5 search
  as if N=1, on a single price path, against a 7.5-pip cost that already buried a REAL edge. Neither
  is noise-confirmed-dead (a pre-registered single classic member could clear ~1.75), but neither
  survives as currently framed. Required before any spend: pre-registration with honest effective-N
  logged to trials.jsonl, net-of-7.5-pip economics, and the null controls above on purged walk-forward.

  Supporting quantification (from nht-signals-rl-multiplicity.yaml, 2026-06-17T04:30:05Z):
  - DSR bar at N=48: ~1.75 annual SR required for DSR>0.95
  - DSR bar at N=49..56 (48+K=1..8): 1.750 to 1.773 — the basket-size increment is logarithmic
    and COSMETIC (+0.02 SR total). The real penalty is honest N >> 48+K because each classic
    indicator is a parameter family (RSI lookback+thresholds, BB window+k, MACD 3 periods,
    MA-cross 2 windows). If variants were scanned to choose K members, honest N = 48 + grid-size,
    pushing the bar toward ~1.9-2.2 annual.
  - DSR bar at N~5,000 (modest RL search): ~2.20 annual SR
  - DSR bar at N=10^4: ~2.46; at N=10^5: ~2.70
  - Cost wall: trial-48 proved REAL +3.41 pip gross / 55% hit-rate went DSR=0 at net -4.09 pips.
    Cost is ~60-68% of a median bar's 11.1-pip range. Honest prior that ANY classic basket member
    clears the cost wall: LOW. Expected cost-dominated fraction of a <=8 member basket: ~>=70%.
    P(>=1 member clears member-DSR>0.95 net): ~10-20%.
  - RL TRAP: the claim "trained on 5 years / single trial" logs a survivor of 10^3-10^5 policies
    as N=1. Seed selection alone is pure variance-mining on one price path. Absent honest
    effective-N logging to trials.jsonl pre-training, RL stays TRAP regardless of in-sample Sharpe.

  Verdicts:
    classic basket: STRETCH (not dead — a pre-registered single-variant member could in principle
      clear ~1.75 — but cost wall makes survivors scarce; honest prior is FAMILY_KILL)
    RL: TRAP (headline Sharpe uninterpretable until full search grid is pre-registered; effective
      N is 2-4 orders of magnitude above 1)

  Tests required before any spend:
    - matched-random benchmark: random-entry policy at same turnover and same 7.5-pip RT cost
    - label/feature permutation: shuffle indicator->signal mapping and re-fit
    - regime-shuffle: permute vol/trend regime blocks; report per-regime net Sharpe + per-regime DSR
    - block-bootstrap on overlapping 1h returns (block length >= autocorrelation horizon, 24-72 bars)
    - RL reward-shuffle control: retrain with time-shuffled reward
    - RL random-policy-at-same-turnover control: no-skill policy matched on trade frequency
    - RL purged+embargoed walk-forward with retraining at each window

  CALIBRATION NOTE: I am not reflexively negative. The classic-basket bar (~1.75) is reachable in
  principle, so CLAIM A is STRETCH not TRAP. But the firm JUST PROVED this data is cost-bound via
  trial-48, and multiplicity is my domain — the RL framing as a single trial is the highest-impact
  honesty error here and earns the TRAP verdict.
severity:
  level: strong_objection
  rationale: |
    The QR pre-reg's N=54 deflation denominator is the smallest of three plausible denominators
    applied to the broadest selection surface — a structural honesty error that could produce a
    spurious "pass" on the upside branch. This is the exact failure the DSR deflation exists to
    prevent. The RL framing as "1 trial" on a search of 10^3-10^5 policies is the single largest
    honesty failure available in this package. Both require explicit CEO acknowledgment before
    any spend.
