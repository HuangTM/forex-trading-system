addressed_unit: "trading-system-direction-v1:wave5:paper-launch-authorization-signed"
dissenter:
  name: null-hypothesis-tester
  role: null-hypothesis-tester
  authority_basis: "Designated structural skeptic per fintech-org/SKILL.md rule 6"
dissent_text: |
  Five items requiring CEO acknowledgement, preserved verbatim from prior
  Wave-5 NHT artifacts (Round 3 nht-tier-b-reverify-cosign.yaml dissent_text
  field):

  (1) R6-ONLY REJECTIONS ARE WEAK — NOT EQUIVALENT TO R1/R2 REJECTIONS.
  Four Wave-5 R2 entries fired R6-Trades only, with OOS Sharpes 0.387, 0.347,
  0.315, 1.152 — all above the R1 floor. These are sample-size disqualifications,
  not performance disqualifications. Under 3d Bonferroni framework:
  STRONG REJECT (fires R1 or R2): 2 from Wave-5 R2 (ma_crossover_3x_costs, momentum_GBPUSD_only).
  WEAK REJECT (R6-only, above-floor Sharpe): 4 from Wave-5 R2.
  Prior STRONG count: 5 (4 from 3d + tas_ceiling_4h). Cumulative STRONG: 7.
  CONDITION-1 unadjusted: SATISFIED (12 >= 10). STRONG-only: NOT (7 < 10).
  CEO should treat this as "mechanical gate cleared, quality-adjusted evidence modest."

  (2) STOP-TRIGGER FOR vol_target_carry_no_vol_scaling IS VOID — DECISION B.
  n_trades=1 means buy-and-hold for entire OOS-2022 window. This is structural
  degeneracy — not a vol-targeting strategy test. The 1.152 is regime exposure,
  not vol-scaling evidence. R6 fires correctly; stop trigger is not evaluated on
  degenerate samples. PARTIAL CONCUR WITH QD. A properly sampled ablation
  (n_trades >= 30, multi-regime OOS) should be HoQR next-priority research item.
  Carry thesis interpretation UNCHANGED.

  (3) CF-T9 CO-SIGN IS CONDITIONAL.
  Co-signed binding on A+B. Clause C gap accepted as known-incomplete deferral.
  CONDITIONS: (a) Paper-launch must disclose CF-T9 is A+B-only with C pending.
  (b) Clause C must be ratified within 60 trading days of paper launch or
  NHT mandates re-review. (c) Sizing must not use 0.80 regime-active Sharpe
  as base case — use ~0.07 for regime-inactive periods (carried from 3d dissent).

  (4) R6-HEAVY REJECTION PORTFOLIO INFLATES CONDITION-1.
  5 of 12 rejections are R6-only. The information content about the null hypothesis
  is lower than a portfolio of 12 R1/R2 rejections. CONDITION-1 satisfaction
  does not imply strong evidence against the null — it confirms the harness
  functions and that many variants fail minimum data requirements.

  (5) PAPER-LAUNCH AUTHORIZATION IS BOUNDED. (carried verbatim from earlier
  Phase-2 sub-wave 3d dissent text, item 1 momentum sizing constraint).
  Sharpe 0.314 vs threshold 0.30 (margin 0.014). Bonferroni-adjusted family-wise
  alpha = 0.05/6 ≈ 0.008. momentum cleared the universal R1 floor by less than
  1% of the threshold value. With n=520 OOS-2022 daily bars and N=28 org-wide
  trials at write time, this is a spurious survivor in the statistical sense.
  If momentum is ever paper-launched, sizing must reflect that this is a
  statistically-indistinguishable-from-noise survivor, not a validated alpha.
  Position size cap: 0.5x normal allocation maximum. (NOTE: momentum is
  EXCLUDED from the paper-launch authorization in CONSENSUS_2026-05-02
  Section 9 per the net-WEAK reading — this dissent item is preserved as a
  precondition for any future re-consideration.)
severity: strong_objection
does_block: false
