  CEO ratification with 'approve' explicitly accepts:
  - (1)+(4) R6-heavy CONDITION-1 calibration caveat
  - (2) vol_target_carry_no_vol_scaling Decision B
  - (3) CF-T9 3 binding conditions
  - (5) momentum exclusion + future-reconsideration precondition
  Wave-5 closure consensus Section 13 explicitly required CEO acknowledgement
  of all 5; CEO ratified plain 'approve' which surfaces accepted these.
