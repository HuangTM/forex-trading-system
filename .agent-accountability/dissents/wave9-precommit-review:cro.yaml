dissenter:
  name: cro
  role: cro
  authority_basis: |
    Designated risk-budget-allocation owner per fintech-org/SKILL.md.
    CRO owns BC-8 (15% aggregate JPY-correlated cap) per
    .fintech-org/artifacts/2026-05-05T-wave8-high-remediation/
    cro-bc8-veto.yaml. Per Wave-8 CONSENSUS, second-loop authorization
    is gated on either per-strategy 7.5% budget tickets (option-A)
    or cross-process advisory file-lock (option-B). Wave-9 code does
    not implement either control. CRO veto on second-loop authorization
    remains in effect.
dissent_text: |
  I dissent from any interpretation of the Wave-9 commit that lifts the
  BC-8 second-loop authorization veto.

  STRUCTURAL FINDING. The startup-time account_key parity gate at
  scripts/run_paper_trading_carry_fred.py:121-172 and
  scripts/run_paper_trading_vt.py:106-157 is a CORRECT control for the
  "two loops aimed at different accounts" failure mode. It is NOT a
  control for the "two loops aimed at the same account, racing on the
  per-cycle dispatch path" failure mode that BC-8 was specifically
  designed to address.

  The race window is concretely:

    1. carry_fred run_cycle at T0 calls backend.get_positions() ->
       sees aggregate JPY exposure 14% -> compute_exposure ->
       check_dispatch_allowed(jpy_pct=14%, ...) returns OK ->
       proceeds to compute target_units.

    2. vt run_cycle at T0 + 50ms (or any time before carry_fred's
       execute_signal lands and is reflected in get_positions) calls
       backend.get_positions() -> sees the SAME 14% JPY exposure ->
       check_dispatch_allowed returns OK -> proceeds to compute its
       own target_units.

    3. Both loops call backend.execute_signal in rapid succession.
       Both fills land. Aggregate JPY-correlated transient exposure
       reaches the documented 24-30% peak — i.e. ~9-15 percentage
       points OVER the BC-8 cap of 15%.

  This is the residual control gap. The Wave-8 CONSENSUS pre-declared
  it as a blocker for second-loop authorization. The Wave-9 code does
  not implement option-A (per-strategy 7.5% budget tickets) and does
  not implement option-B (cross-process advisory file-lock around
  [get_positions -> compute_exposure -> check_dispatch_allowed ->
  execute_signal]). Therefore the gap persists. Therefore the veto
  on starting both loops concurrently against the same paper account
  PERSISTS.

  RECOMMENDATION NOT TAKEN: implement option-B before the second
  paper loop is started. Option-B is the lower-friction path:
  fcntl.flock(LOCK_EX | LOCK_NB) on a shared lock file
  (e.g. data/dispatch_lock.flock) acquired at the head of run_cycle,
  released after backend.execute_signal returns and reconciliation
  completes. If LOCK_NB fails to acquire, the cycle SKIPs with a new
  sentinel SKIP_DISPATCH_LOCK_BUSY. This is ~30 lines of code, has
  no shared-state dependency, and is testable with two pytest
  subprocesses racing on a temp lock file.

  KILL-SWITCH DESIGN GAPS (secondary structural finding). The current
  kill-switch design at src/forex_system/risk/kill_switch.py:94-403
  fails three of the five kill-switch-design properties for any future
  live-capital path:

    Property 2 (operable by the most junior person on the desk): FAIL.
      Halt is "find the PID, send SIGINT". No big-red-button, no
      shared-file flag, no API endpoint, no documented one-command
      halt flow.

    Property 3 (killed within a known SLA): FAIL.
      No declared SLA, no measured p99 time-to-flatten.

    Property 4 (tested in prod, on a schedule, against live sessions):
      FAIL. No record in .fintech-org/kill-switch-tests.jsonl
      (file does not exist). No --self-test flag. No scheduled test
      on the org calendar.

  These are ACCEPTABLE for paper-only operation (no real capital at
  risk). They are BLOCKERS for any live promotion. I record this here
  so the Wave-9 commit cannot later be cited as evidence that the
  kill-switch was reviewed and approved for general use. It was
  reviewed and approved for SINGLE-LOOP PAPER operation only.

  COST-FEEDBACK ARCHITECTURE position (CONCURRENCE not dissent).
  I CONCUR with the current implementation: risk primitives
  (KillSwitch.check_and_trigger, DrawdownContract.assess) operate on
  raw broker equity, and the cost-adjusted paper_equity_bt_equiv view
  is a log-only research artifact. This is the correct architecture.
  Feeding cost-adjusted equity into risk primitives would create a
  recursive trigger surface where cost-model bugs become risk-halt
  bugs and where the trigger point diverges from broker ground truth.
  NHT NEW-2 disagreement is informational and preserved separately;
  it does not modify this position.

severity:
  level: strong_objection
  rationale: |
    Severity = strong_objection. NOT block-threshold because no
    pre-declared non-negotiable rule (live-capital, Execution-
    Researcher Firewall, security gate) is being violated by the
    Wave-9 commit ITSELF. The Wave-9 commit is correct for what it
    commits. The objection is to any subsequent action that would
    use this commit as the basis for starting a second concurrent
    paper loop without first implementing the residual control.
    This is exactly the case the dissent template documents:
    "I think this is wrong, and I am exercising my structural-
    skeptic authority to make sure the record reflects my dissent
    prominently."
