  role: null-hypothesis-tester
  authority_basis: |
    Designated structural skeptic per fintech-org/SKILL.md rule 6:
    "Null-Hypothesis Tester dissent is append-only. Cannot be erased by
    the others agreeing." Wave-9 dispatch instructs NHT to re-verify
