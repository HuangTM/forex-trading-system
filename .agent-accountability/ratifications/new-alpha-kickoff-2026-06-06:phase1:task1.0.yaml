    PR-F1 (major): The entire recommendation rests on QRB-3 mechanism_quality=4 (not 3).
    The rubric's level-3 anchor names "month-end rebalancers" as a level-3 exemplar. The 4 is
    awarded via the anchor-4 mandate/inelastic-hedging-need clause. A reasonable scorer could
    land at 3, collapsing the recommendation to NO-SPEND. This single-judgment sensitivity is
    disclosed to the CEO and is the primary residual risk of the package. (Source:
    pr-kickoff-review.yaml PR-F1; hoqr-kickoff-final-qgr.yaml pr_f1_response.)
  - >
    QRB-3 pre-registration is subject to four mandatory kill conditions beyond the NHT baseline:
    (1) single pre-registered window + pair-set before any return data examined; (2) v1/v2 as
    pre-competing hypotheses (not sequential fallback); (3) stability-across-halves
    2010-2017 vs 2018-2026 mandatory; (4) ADOPTED post-2015 sub-window kill condition
    (2015-2026 in isolation) per PR inversion-check, ratified by HoQR. Any pre-registration
    omitting conditions (1)–(4) is barred from the ledger.
