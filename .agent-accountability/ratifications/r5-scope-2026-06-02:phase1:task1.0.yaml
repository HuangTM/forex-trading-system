decision:
  outcome: ratified_with_dissent
  rationale: >
    SCOPE/test-design package for R5-on-real-carry ratified. The org specifies Hansen SPA (primary) +
    White Reality Check (cross-check) off joint stationary-block bootstrap draws; benchmark=zero
    (cost-of-carry already in the swap leg); net-of-cost post-entry-delay returns; K>=2000; FWER via
    max-statistic over a single pooled family of 6 carry variants x 6 JPY crosses (~36 cells, effective
    independent ~1-4). The R5 test math ALREADY EXISTS (reality_check.py, 762 LoC); bottleneck is data,
    not implementation: STEP 1 data-integrity audit [HARD BLOCKER] || STEP 2 plumbing -> STEP 3
    crypto-frozen pre-registration + wind-down action map [NEXT deliverable] -> STEP 4 one-shot run.
    R5 is UNDERPOWERED (class-level power ~20-35% at true ~0.30 ann-Sharpe) and is therefore framed as
    an HONEST KILL TEST: underpowered non-rejection -> WIND-DOWN; p<0.05 is necessary-not-sufficient for
    CONTINUE. Mathematician (decision: implement, test-design) and HoQR (decision:
    approve-with-capacity-limit) form the quorum; NHT dissents (material_concern, does_block:false) but
    the scope ADOPTS every NHT condition in full (concordant-with-conditions, not overridden), so the
    outcome is ratified_with_dissent. Detected domains covered by the two senior signers; NO CRO/CTO
    required-role trigger (design-only, no risk/architecture artifact ratified, no capital); no
    forbidden-interim match; cross-session replay check clean. The strategic BUILD-vs-WIND-DOWN fork is
    NOT ratified here — it is surfaced to the CEO as a first-class terminal decision.
