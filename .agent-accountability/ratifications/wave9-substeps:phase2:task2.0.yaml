sub_decisions:
  decision_2_group_b_scope:
    ruling: combined-fix
    detail: |
      Wave-10 fixes F-001 (cost-formula at sizer-output boundary) +
      F-002 (replace TestE2EParity SHARED_SIZE / EURUSD-only theatre with
      a real run_backtest USDJPY E2E parity test) + F-008 (rewrite tests
      at lines 540-562 and 564-611 to assert engine-parity values, not
      F-001-buggy paper-loop output) TOGETHER. No partial commit.
    quality_rationale: |
      Splitting creates a window where test suite and production code
      are inconsistent. F-008 entrenches F-001; any commit before F-001
      lands locks the wrong behavior into the regression suite.
  decision_4_f003_loc_cap:
    ruling: ratify-deviation-with-wave11-refactor-binding
    detail: |
      Net Group A delta of 351 added / 2 removed lines is ratified as
      scope-driven (NHT-mandated closures: atomic lock + reset CLI +
      cost-model block grew the legitimate scope beyond the original
      50-LoC cap declared in Wave-8 PM AC). Wave-11 ticket created (this
      artifact serves as the binding) for shared-module extraction of
      ~110 byte-identical LoC: assert_account_key_parity and
      reset_account_key_lock. Future PM AC must declare a recalibrated
      cap (suggest 200 LoC scope-justified) — the 50-LoC cap is retired.
    quality_rationale: |
      Closure of legitimate NHT findings outranks adherence to a cap
      that was set before scope was understood. Ratification alone
      leaves duplicate code; pairing with binding refactor ticket
      addresses long-term maintainability.
  decision_5_new2_cost_feedback:
    ruling: amend-ladder
    detail: |
      Wave-10 produces a PM spec amendment that:
        (a) preserves the CRO-recommended log-only architecture
            (kill_switch.check_and_trigger and dd_contract.assess
            continue to consume raw broker TotalValue, NOT cost-adjusted
            equity);
        (b) explicitly recalibrates the pre-registered drawdown ladder
            thresholds to match broker-equity semantics, so the ladder
            is honest about what it triggers on (hypothesis-test fidelity
            restored by ladder-recalibration, not by feedback path);
        (c) closes NEW-2 as "accepted architectural decision with ladder
            amendment," with NHT dissent preserved verbatim in CONSENSUS
            and in this artifact's linked_dissents.
    quality_rationale: |
      Pure log-only leaves NHT material_concern open structurally.
      Pure feed-cost creates the recursive trigger surface CRO warned
      about (cost-model bugs would become risk-halt bugs). Amend-ladder
      is the integration that quality-prioritization picks: both
      structural skeptics get partial wins; the firm gets a coherent
      architecture and an honest pre-registration.
  decision_3_groups_cde_commit:
    ruling: authorize-with-pii-sanitization
    detail: |
      Groups C/D/E commit-as-is authorized after operator credential scan
      returned 0 token matches across 45 files. Saxo account-identifier
      PII (AccountId REDACTED_ACCOUNT_ID, AccountKey/ClientKey kZdu...zw==,
      AccountGroupKey dcKj...vUg==) was found in 4 data/saxo_*.{json,log}
      files; these are NOT credentials but tie this repo to a real Saxo
      account. CEO directed sanitization. Orchestrator replaced all
      occurrences with REDACTED_* placeholders; JSON validation post-write
      passed. Files are now safe to commit.
    pii_files_sanitized:
      - path: data/saxo_flatten_2026-04-26.log
        replacements: {REDACTED_ACCOUNT_KEY: 2}
      - path: data/saxo_positions_2026-04-25.json
        replacements: {REDACTED_ACCOUNT_KEY: 1}
      - path: data/saxo_positions_2026-04-26.json
        replacements: {REDACTED_ACCOUNT_KEY: 1}
      - path: data/saxo_positions_raw_2026-04-26.json
        replacements: {REDACTED_ACCOUNT_ID: 2, REDACTED_ACCOUNT_KEY: 2, REDACTED_ACCOUNT_GROUP_KEY: 1}
