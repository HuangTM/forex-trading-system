dissent_text: |
  Kill-switch architecture is INADEQUATE for Path B (multi-strategy parallel)
  operation. Seven gaps identified:
  G1 — No shared atomic halt primitive across N strategy processes
  G2 — Shared Saxo SIM balance fetch is a race condition (double-spend)
  G3 — No dead-man / heartbeat — halted state is not self-affirming
  G4 — Operator-authored state transitions are not authenticated
  G5 — No max-order-rate / max-notional-per-minute pre-trade gate
  G6 — No per-strategy notional/risk budget enforcement (allocator)
  G7 — Stub files used as evidence (the dispatch's own finding)
  Required remediations R1, R2, R5, R6 are pre-conditions for Path B dispatch.
  R3, R4 may be follow-on hardening. Until then, run strategies serially.
severity: strong_objection
does_block: false
block_basis: "Does not block this week's plan (no parallel strategies dispatched). Binding constraint on any future Path B dispatch attempt."
