decision:
  outcome: ratified_with_dissent
  rationale: |
    Quorum satisfied. Detected domains: risk/concentration (CRO), alpha-direction/strategy-kill (HoQR),
    independent-algorithm-review (PR). Required-role: CRO present (risk). Focused readiness reassessment
    after a 10th 1h pair (CADJPY, JPY cross) landed. RATIFIED CONTENT = CADJPY DQ-ADMIT to the data
    universe; NO-SPEND; strategic posture HELD (existing-data exhausted; binding constraint = data
    capability); honest-N=30; no counted trial. All four ICs converged: rho_bar_eff improved ALL-9 0.4090
    -> ALL-10 0.3716 (PR-confirmed genuine on the identical window; CADJPY adds breadth via USDCAD -0.40
    despite JPY-factor +0.77) BUT is IMMATERIAL on three independent grounds — (a) the gate is vacuous over
    an empty edge set (binding 9-pairs ruling), (b) CADJPY's own CD0 is the screen's WORST (best -2.19 vs
    all-9 best -1.56; running tally 84/84 pair x family combos net-negative), (c) a 10th SAME-CLASS pair is
    breadth, not the new data CLASS the binding constraint requires. CRO veto/0.0 ("dilution arithmetic, not
    de-correlation"; N_eff ~2.3 across 10 instruments; negative-edge + concentrated-tail strictly dominated
    by flat). NHT noise-indistinguishable, dissent preserved verbatim (textbook 2026-05-31 more-data=progress
    trap; CONCURS NO-SPEND). PR approve-with-conditions, ZERO blocking; every number reproduced exact; F-001
    forward condition (binding gate decisions must recompute rho on the pre-registered PnL-contribution series,
    not raw returns — raw is the conservative/harder test so the descriptive PASS is robust). No cumulative-
    override breaker. Cross-session found:false. No forbidden-interim domain in the ratified decision.
    NEW MACHINE-CHECKABLE CRITERION RATIFIED (HoQR strategy-kill domain): TREADMILL-STOP — a same-class
    retail-OHLCV pair landing no longer auto-triggers a readiness wave; accept its DQ verdict as inventory
    hygiene (DQ-admit-and-shelve), do NOT spend a CD0/rho_bar research cycle on it; a readiness wave fires
    again ONLY when the data CLASS changes (sub-1h / volume-bearing / event-microstructure). GBPJPY (mid-
    ingest) is the first pair processed under this rule. STRATEGIC NOTE (surfaced, NOT ratified as action):
    the data-capability-acquisition-with-precondition vs wind-down-to-observe-only fork remains OPEN for the
    Board; CADJPY's breadth does not re-rank it.
