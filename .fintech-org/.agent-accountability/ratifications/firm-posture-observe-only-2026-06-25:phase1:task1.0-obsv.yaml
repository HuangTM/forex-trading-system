approver:
  role_or_human: human
  name: "Board / Owner (huangtm@gmail.com)"
  authority_basis: "Board/Owner strategic-posture authority per fintech-org SKILL.md (the human Board sets the north-star posture; the firm surfaces, the Board decides)."

decision:
  outcome: ratified
  rationale: |
    The Board selects WIND-DOWN TO OBSERVE-ONLY (the forward fork the firm surfaced and
    ranked across the 2026-06-24 volume-conditioned and 2026-06-25 CADJPY consensuses).
    Basis on record: ~2 months, 50+ trials, honest-N=30, ZERO confirmable net-of-cost edge
    across FOUR independent idea families (F1-F6 retired-saturated; event-drift regime-
    artifact; carry cost-failed; volume=volatility), each hitting the same four structural
    walls (cost-dominance on turnover, USD-factor concentration, regime-dependence, no true
    volume/order-flow). HoQR ratified the existing-data space EXHAUSTED with the binding
    constraint = DATA CAPABILITY (not idea generation or pair count); CRO and NHT's positions
    are maximally consistent with wind-down (it is the spend-nothing, lowest-risk, reversible
    posture). This selects option (2) over option (1) data-capability-acquisition: the Board
    has no data-requiring falsifiable hypothesis ready that clears HoQR's hard precondition,
    so the honest default applies.

posture_change:
  from: active-existing-data-research
  to: observe-only / maintenance
  definition:
    stops:
      - "New alpha-generation cycles on the existing data class (retail 1h/daily OHLCV+spread, 10 pairs)."
      - "F-family / cost-feasibility / readiness research cycles on the existing data class."
      - "Same-class pair-readiness waves — already covered by the TREADMILL-STOP criterion (DQ-admit-and-shelve)."
    continues:
      - "Governance/audit only: charter-integrity startup check, trials/ratifications/dissents/ceo-digest audit trail."
      - "Preservation of the falsification corpus as the firm's primary asset (the record of where NOT to spend)."
      - "DQ-admit-and-shelve for any further same-class pair that finishes ingest (e.g. GBPJPY) — inventory hygiene, no research cycle."
    reactivation_triggers:
      - "(a) A NEW DATA CLASS arrives: sub-1h resolution, true traded volume / order-flow, L2 depth, or materially longer history."
      - "(b) A structurally-NEW hypothesis is proposed that is NOT a relabel of the four falsified families (F1-F6 / event-drift / carry / volume)."
      - "Either trigger re-opens active research under the standard R1 cost-feasibility-gate-first discipline; until then the firm stays observe-only."
  kill_criterion_note: |
    SKILL.md kill-criterion ('infrastructure not insight') is addressed by 'narrow its mandate':
    the firm produced a LARGE falsified-hypothesis corpus (>20 falsifications) and correctly
    spent nothing; wind-down to observe-only narrows the mandate rather than shutting down,
    preserving the corpus and the reactivation path.

reversibility: "Fully reversible. Either reactivation trigger re-opens active research. No live capital, no charter/role/protocol edit, no vendor onboarding, no data spend — this is a NO-SPEND posture, the safest available."

accountable_party:
