  rationale: |
    Quorum satisfied. Detected domains: alpha-direction/research-prioritization (HoQR), risk/concentration
    (CRO), model-evaluation (ml-researcher), independent-review (PR). Required-role: CRO present (risk).
    Reactivation from observe-only under trigger (b) — explore structurally-new directions. RATIFIED CONTENT =
    a COSTED, GATED, RANKED SHORTLIST (guidance, NOT a spend); NO data spend, no backtest, no counted trial;
    honest-N=30 preserved. 21 directions generated across 3 divergent lenses → screened to a shortlist.
    SHORTLIST: #1 TREND-FOLLOWING ON FUTURES (FX-futures + commodity/cross-asset; OOS-survivor MOP-2012/HOP-2017;
    the ONLY direction that ESCAPES the binding walls — closes W1 cost + W4 real-volume + W2/W3 partially via
    cross-asset breadth → ~2-4yr confirmability; $0 cost-hurdle cheap test; the reframe = point the validated
    harness at a real-volume futures venue). #2 CIP/SWAP-BASIS (OOS-survivor Du-Tepper-Verdelhan; FREE $0 BIS
    test; eyes-open — ~3 stress episodes, weak confirmability = probable wall RELOCATION). #3 CB-TEXT regime
    classifier (the one legitimate ML angle; $0 conditioning overlay on a carry/trend sleeve, NOT standalone;
    mandatory dictionary baseline). CLOSED DOORS: ML-on-price = confirmed overfitting (dead); HFT = not viable
    on retail infra. CRO size-reduced 0.45 (TREND 0.55 / CIP 0.50 / CBTEXT 0.25); KEY: deployability gate
    (125,000 EUR fixed contract notional → D-TREND-FUTURES RESEARCH-ONLY until min-viable-notional reconciled;
    one correlated program not 40 bets); decisive asymmetry = cheap/reversible data vs irreversible honest-N →
    run free probes first, defer data-spend to a separate Board step, gate every honest-N decrement behind a
    pre-registered effective-N test against the FULL 21-wide selection surface. ml-researcher approve (narrow).
    PR approve-with-conditions, ZERO blocking-for-shortlist; F-001 (CIP kill-test needs significance gate at
    honest effective-N) + F-008 (book the 21-surface into effective-N, not +1) binding-for-future-pre-registration.
    NHT survives + dissent preserved verbatim (advance ONE program; low-freq plays relocate not escape; 21-surface
    snoop burden — every cheap test must be single-shot pre-committed). No forbidden-interim in the ratified
    decision (the data acquisition is a DEFERRED separate Board step, NOT ratified here; the requested feasibility
    probes are $0 free-public-data, single-shot, zero honest-N risk). Cross-session found:false. No breaker.
