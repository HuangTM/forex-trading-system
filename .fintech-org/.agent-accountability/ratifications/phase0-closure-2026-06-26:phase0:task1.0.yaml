decision:
  outcome: ratified_with_dissent
  rationale: |
    The DECISION to close Phase 0 with a negative result is RATIFIED by all four roles.
    NHT attempted refutation four ways (fair null gate, continuous sizing, intraday
    gross-edge, ledger audit) and FAILED to break it: the daily carry-momentum config
    has no edge at deployable scale (portfolio Sharpe 0.04 at $1M; continuous vol-target
    replication 0.06/0.32/-0.16, avg ~0), and the intraday CD0 families are cost-destroyed
    (0/54 net-positive). CRO confirms the live/SIM book is FLAT of record (account HALTED)
    and that false-positive risk (deploying a falsified strategy) dominates decisively.
    HoQR confirms consistency with the prior arc (Board OBSERVE-ONLY 2026-06-25;
    trend-futures DO-NOT-RUN 2026-06-26) and sound Phase 1 scope. honest-N stays 30 — no
    trial spent.

    TWO BLOCKING CONDITIONS apply to the DOCUMENT/ENFORCEMENT, not the decision:
    (B1, NHT) the closure's null-gate / walk-forward / arson evidence were degenerate
    artifacts of a $100k-default min-order-size bug in run_phase1_revalidate.py (candidate
    runs at $1M; controls at $100k where ContinuousSizer.min_order_size=1000 zeroes all
    positions). "p=1.000 / worse than random" is FALSE; fair test (randoms at $1M) ranks
    the candidate ~20-28th percentile (p≈0.98), still failing the 95% gate. Corrected in
    PHASE0_CLOSURE_2026-06-26.md + config header; harness bug filed.
    (B2, CRO C1) the DO-NOT-DEPLOY relabel is a comment the loader ignores —
    run_paper_trading.py:51 defaults to the falsified config with no guard. Must enforce
    in code + drop the default. NOT YET IMPLEMENTED (code change; own PR pass).
    NHT dissent preserved verbatim in linked CONSENSUS (append-only, rule 6).
