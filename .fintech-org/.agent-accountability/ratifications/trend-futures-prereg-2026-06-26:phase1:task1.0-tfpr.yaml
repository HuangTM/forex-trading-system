  outcome: ratified_with_dissent
  rationale: |
    Quorum satisfied (2 senior signers: HoQR research-direction approve + PR independent-review
    approve-with-conditions). NO risk-budget/sizing/capital decision is made this cycle — the
    disposition is DO-NOT-RUN (no action, the safest posture), so CRO's required-role trigger is not
    exercised; CRO's carried no-spend/deferred-data position (2026-06-25 exploration consensus) is
    consistent. TERMINAL DISPOSITION of the trend-on-futures arc: FREEZE the v2 pre-registration as a
    model artifact (FROZEN-AWAITING-DATA); its own F7 confirmability power gate FIRES DO-NOT-RUN,
    computed honestly at $0 (per-bet Sharpe 0.20 = published 0.40 x 50% decay; effective bets B~4-10;
    deflated against 37 effective trials) -> years-to-validate ~37-92yr; clearing the <=3yr bar would
    need net annual Sharpe ~2.2 (~4-5x the highest published gross diversified-trend Sharpe). The
    committed CPCV backtest is NOT AUTHORIZED. honest-N stays 30 (never spent — the F7 gate blocked an
    irreversible decrement BEFORE it could be spent, working exactly as designed). The firm RETURNS TO
    OBSERVE-ONLY. THE LOAD-BEARING FINDING: the firm's binding constraint is the STATISTICAL
    CONFIRMABILITY of any MODEST-Sharpe edge at this scale/horizon — ARITHMETIC, not data-class. Trend-
    on-futures escaped W1 (cost) and W4 (real volume) and STILL hit this wall. There is no retail-
    accessible modest-Sharpe systematic edge the firm can confirm at power in a reasonable horizon;
    reactivation requires a fundamentally different edge CLASS (high-Sharpe, or vastly longer history),
    not another data-class swap. Process: QR self-corrected a v1 horizon over-claim (1-2 order-of-
    magnitude math error) flagged by NHT; v2 applies the surgical fixes (honest do-not-run prose, F7
    pinned non-circular, 3 DOFs frozen). NHT dissent preserved verbatim (machinery survives; the v1
    over-claim was the defect; F7 do-not-run). PR conditions (F-001/F-002/F-006) are forward pre-
    conditions for any future committed backtest, none blocking the frozen design. No forbidden-interim
    (no spend, no capital, no charter/vendor, no data purchase). Cross-session found:false.
