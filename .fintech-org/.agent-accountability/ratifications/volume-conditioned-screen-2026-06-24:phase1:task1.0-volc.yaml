decision:
  outcome: ratified_with_dissent
  rationale: |
    Quorum satisfied. Detected domains: risk/concentration (CRO), alpha-direction/strategy-kill (HoQR),
    independent-algorithm-review (PR). Required-role: CRO present (risk). This cycle (Board option c)
    screened the firm's LAST un-screened existing-data class — VOLUME conditioning. RATIFIED CONTENT =
    NO-SPEND / volume family RETIRE / FAMILY-CLOSED / honest-N=30 / no counted trial / OPEN-ITEM-C2COST
    CLOSED. All four ICs converged (cleanest convergence to date): tick-volume is collinear with range
    (raw vol~range 0.69-0.74); both candidates fail pre-registered triggers — V1 cost-axis (3/5 FAIL) AND
    volatility-control (relvol t<2.00 all pairs; USDJPY edge lives in the high-RANGE cell +6.03 vs -0.45),
    V2 cost-FAIL all 3 + construction void + vol-control fail. No directional volume edge orthogonal to
    volatility exists on this data. CRO veto/size 0.0 (conjunctive cost-AND-vol-control gate EMPTY; the
    apparent edge is volatility-harvesting in a volume costume; spending honest-N here is a governance
    blowup). NHT noise-indistinguishable, dissent preserved verbatim (CONCURS the kill; dissents only
    against 'progress' framing AND flags the null does NOT prove the dataset wall nor justify a data buy).
    PR approve-with-conditions, ZERO blocking; reproduced every number EXACT; C2COST fix correct and SCOPED
    to the C2 carry path (never touched this cycle's numbers); two FORWARD conditions (F-002 past-only
    seasonal norm; F-004 V2 session anchor) neither flips the verdict. No cumulative-override breaker (NHT
    concurs; PR no blocking). Cross-session found:false.
    STRATEGIC NOTE (surfaced to Board, NOT ratified as an action): HoQR's meta-call that the existing-data
    space is exhausted and the binding constraint is now DATA CAPABILITY, with ranked options (1) data-
    acquisition-with-precondition, (2) wind-down-to-observe-only, (3) carry-on-longer-history, (4) more-
    generation REJECTED. The data-capability-acquisition option is a Board-deferred OPEN ITEM — it is NOT
    ratified here; any actual vendor/datastore onboarding is a forbidden-interim action requiring separate
    Board sign-off AND HoQR's written-falsifiable-data-requiring-hypothesis precondition (NHT guardrail).
    Quorum ratifies only the NO-SPEND decision and the escalation of the strategic fork to the Board.
