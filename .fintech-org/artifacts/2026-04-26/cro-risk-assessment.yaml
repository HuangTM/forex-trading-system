kill-switch-architecture-verdict:
  adequate_for_path_b: false
  citation_source_tag: "trading-platform-architectures/axes/oms-risk.md"
  current_model_summary: "Single-process, operator-authored audit log. State transitions written by humans at the shell. No out-of-process daemon enforcing halt; no atomic check-and-set between strategy processes."
  gaps:
    - {id: G1, title: "No shared atomic halt primitive across N strategy processes"}
    - {id: G2, title: "Shared Saxo SIM balance fetch is a race condition (double-spend)"}
    - {id: G3, title: "No dead-man / heartbeat — halted state is not self-affirming"}
    - {id: G4, title: "Operator-authored state transitions are not authenticated"}
    - {id: G5, title: "No max-order-rate / max-notional-per-minute pre-trade gate"}
    - {id: G6, title: "No per-strategy notional/risk budget enforcement (allocator)"}
    - {id: G7, title: "Stub files used as evidence (the dispatch's own finding)"}
  required_remediations:
    - {id: R1, addresses: [G1,G3,G4], action: "Out-of-process kill-switch daemon owning single source of truth (file lock + heartbeat); strategies acquire permission-to-trade lease per order"}
    - {id: R2, addresses: [G2,G6], action: "Portfolio risk allocator pre-allocates margin/notional per strategy at startup; strategies reserve via atomic decrement; Saxo balance fetched ONCE by allocator"}
    - {id: R3, addresses: [G5], action: "Pre-trade gate: max-orders-per-minute and max-notional-per-minute, per-strategy AND aggregate; reject (don't queue) on breach"}
    - {id: R4, addresses: [G4], action: "Audit log state transitions require two-key signoff + out-of-band notification + hash chain"}
    - {id: R5, addresses: [G3], action: "Strategy boot must call kill-switch daemon GET_STATE; refuse to start if state != ARMED. No log-file fallback."}
    - {id: R6, addresses: [G7], action: "Pre-commit lint: scan for evidence_paths and reject if target contains PENDING or fetched_at:null"}
  gating_recommendation: "Path B MUST NOT dispatch until at minimum R1, R2, R5, R6 are implemented. Until then, run strategies serially."
