        - P5 implement equivalence-test pre-commit hook (quant-developer ~2 sessions)
        - P6 implement per-strategy KillSwitch (quant-developer ~2 sessions)
      P3 is upstream-dependent on PRE-01.
    eta_dispatch: "week +3..+4 (after P3-P6 all clear AND Bet #2 + Bet #3 reports out)."

  pre3_failure_handling:
