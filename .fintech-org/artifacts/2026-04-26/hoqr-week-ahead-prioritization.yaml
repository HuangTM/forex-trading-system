dispatch-pick:
  pick:
    name: "Bet #2 — 4H TAS-ceiling on USDJPY/EURUSD/GBPUSD"
    rationale: |
      Three independent reasons:
      (1) PATH-DEPENDENT TRUST IN HARNESS — harness was rebuilt this week. Right next move: throw a SECOND, structurally-different strategy at it. Bet #2 (4H, mean-reversion, narrow universe) is maximally orthogonal to Bet #1 (daily, cross-sectional, carry-direction). If it clears, harness is proven on TWO independent strategy families.
      (2) BONFERRONI HEAD-ROOM — Bet #2 adds at most 1-3 family entries; Bet #3 adds 11. Cheaper-Bonferroni first.
      (3) PATH B PREREQUISITE GAP — Path B's P2 currently lists carry_fred (now regime-conditional). A second harness-cleared strategy from a structurally-different family materially strengthens P2.
    dispatch_shape: "3 trial registrations (one per pair), pre-registered as ONE family with universe-level hypothesis, primary metric = equal-weighted portfolio Sharpe across 3 pairs, gate threshold = 0.30, Bonferroni-corrected per-pair = 0.05/14 = 0.0036 (within-family, not new-family)."

  runner_up:
    name: "Bet #3 — vol-target on 11 non-USDJPY pairs with Bonferroni"
    deferral_rationale: |
      (a) Bonferroni deflation: 11 trials → N=25; per-trial α drops to 0.002. Bet #2 first → smaller hit (14→17), Bet #3 next → 17→28.
      (b) carry_fred's regime concentration is informative: CF-T9 says JPY-cross basket carries the lift. Bet #3 EXCLUDES USDJPY and includes 6 non-JPY-cross pairs. If carry edge is JPY-cross-concentrated, Bet #3 has material a-priori probability of failing.
      (c) Operational: harness was last stressed at 1 simultaneous trial. Better 3 (Bet #2) first, then 11.
    eta_dispatch: "week +2 (after Bet #2 reports out, ~5 trading days)."

  third:
    name: "Path B — multi-strategy paper competition"
    deferral_rationale: |
      Design doc §10 recommends not-now and binds firm to "veto rule: if ANY of P1-P6 missing at dispatch time, this design is rejected. No 'we'll fix it in milestone 1' carve-out." Three prereqs missing.
      Concurrent unblocking work in PARALLEL with Bet #2 (zero HoQR-bandwidth cost):
