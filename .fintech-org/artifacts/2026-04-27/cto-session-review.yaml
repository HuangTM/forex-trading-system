          GOVERNANCE ACTION: HoQR review of vol_target_carry.yaml is the outstanding
          blocking item; CTO cannot unilaterally close FM-2. Joint sign-off required."
        blocking: false  # for paper trading with stated restrictions; yes for live-capital

