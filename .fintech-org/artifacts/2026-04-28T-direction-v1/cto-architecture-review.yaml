body: |
  ## A. Architectural goal (12-week)

  The system succeeds architecturally when it can: (1) register a hypothesis pre-backtest,
  (2) run OOS evaluation without lookahead, (3) log the result (pass or reject) to
  trials.jsonl, and (4) paper-trade the passing strategy with KillSwitch and equity-curve
  output - all within <=7 days end-to-end per trial cycle. That is the architectural unit
  of production. At 12 weeks, the system must have completed >=5 full cycles with
  >=3 OOS rejections logged, demonstrating the falsification pipe works, not just the
  approval pipe. Sharpe >=0.5 paper-traded OOS is the alpha gate (not the architecture
  gate). The architecture gate is: is the audit trail complete, tamper-evident, and
  falsification-capable?

  ## B. Per-item verdict

  - vol_target_carry: KEEP - validated, pre-regged, gate-cleared. Anchor strategy.
  - trial factory: KEEP, but verify logging - rip-it-out test: can it produce
    trials.jsonl entry with status: rejected? If not, incomplete. Fix before next trial.
  - FRED-carry Bet #1: ROUTE_TO: head-of-quant-research - regime-concentration is alpha.
  - Bet #2 backtest: BLOCKED - hard gate on R2 pre-reg. No exceptions.
  - Path B paper competition: DEFERRED - A4/H1/R1-signoff/N1-N3 gates not cleared.
    Architectural prerequisite: >=1 complete paper-trading cycle with equity curve.
  - CONSENSUS docs at root: ARCHIVE-TO-docs/decisions/ - root is for entry points.

  ## C. 12-week phased sequencing (architectural ordering only)

  Phase 1 (weeks 1-4): Close the falsification gap. Verify policy-violations logging
  end-to-end. Confirm trial factory can emit status: rejected. Run vol_target_carry in
  paper with full equity-curve write. Achieve >=3 OOS rejections in trials.jsonl. Clear
  remaining governance gates (A4/H1/R1-signoff/N1-N3).

  Phase 2 (weeks 5-8): With falsification pipe proven, allow Bet #1 into paper (post-HoQR
  sign-off) and Bet #2 (post-R2 pre-reg). Run paper competition between >=2 strategies.
  KillSwitch triggers must fire at least once (synthetic or real) to prove halt path.

  Phase 3 (weeks 9-12): Culling cycle. Retire any strategy that has not beaten
  vol_target_carry Sharpe in paper over >=30 days. Path B paper competition enters only
  if >=2 surviving strategies exist. No new strategies without complete prior-cycle
  rejection in trials.jsonl.

  ## D. Maintenance discipline (machine-checkable weekly health)

  - Weekly: wc -l .fintech-org/trials.jsonl - must increase; flat = no research, review
  - Weekly: count status: rejected entries in trials.jsonl - must increase toward >=10 by
    week 12; zero growth = falsification pipe broken, HALT new trials
  - Weekly: paper equity curve file exists and has new bars - stale = paper loop dead, HALT
  - Halt trigger: any KillSwitch fired but not logged in trials.jsonl within 24h - audit
    gap, freeze all paper trading
  - Kill trigger: policy-violations.jsonl has 0 entries after canary test fails - logging
    broken, freeze until fixed

  ## E. Kill criteria for the trading-system project itself

  - kill_date: 2026-07-21
  - kill_metric: "By 2026-07-21, if NOT (paper-traded equity curve exists with >=30 trading
    days of bars AND trials.jsonl contains >=10 entries with status: rejected AND at least
    1 strategy has paper Sharpe >=0.5 OOS) - then recommend project halt and full
    post-mortem"
  - Rationale: Sharpe alone is insufficient. A system that only approves is not a research
    system. >=10 rejections requirement is the architectural proof that the falsification
    pipe runs.

