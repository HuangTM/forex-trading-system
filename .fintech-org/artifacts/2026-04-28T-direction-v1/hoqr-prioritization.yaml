body: |
  ## A. Alpha direction (12-week thesis)

  The load-bearing observations are: vol_target_carry at OOS Sharpe 0.7594 and FRED-carry
  Bet #1 at OOS Sharpe 0.80 concentrated in BoJ-divergence regime. Both are carry-family
  strategies. The edge is not generic trend or mean-reversion - it is interest-rate
  differential persistence amplified by central-bank policy divergence, particularly BoJ
  vs Fed/ECB.

  The structural reason this edge exists: carry in G3 FX is a slow-moving, regime-dependent
  return premium. When a central bank is structurally pinned (BoJ YCC/ZIRP history), the
  interest differential is persistent and not fully arbitraged. Vol-targeting captures
  this without adding noise from momentum.

  The 12-week thesis: carry-regime carry, not cross-momentum. Confirmed alpha is
  regime-conditional carry on USDJPY (BoJ-divergence) and vol-targeting for sizing. Signal
  diversity should come from regime conditioning (FRED macro data), not from adding new
  indicator families.

  Replication-crisis caveat: 22 trials without systematic falsification logging means the
  effective number of independent hypotheses tested is likely higher - DSR penalty applies.
  Any new strategy must pre-register and clear a higher Sharpe bar than naive OOS.

  ## B. Per-strategy verdict + retirement criteria

  - vol_target_carry: PROMOTE-TO-PAPER - retirement: rolling 60-bar OOS Sharpe < 0.30
    OR drawdown > 25%
  - FRED-carry Bet #1: PROMOTE-TO-PAPER conditional on CF-T9 monitor active - retirement:
    CF-T9 trigger OR BoJ-regime inactive > 30 days with Sharpe < 0.40
  - Bet #2 (tas_ceiling_4h): KEEP-GATED on R2 pre-reg; kill if R2 not cleared within
    2 weeks of queue slot opening; if launched, retire at 6-week OOS Sharpe < 0.30
  - ma_crossover: ARCHIVE - no independent alpha thesis vs validated carry strategies
  - bollinger_rsi: ARCHIVE - mean-reversion without regime conditioning; no path to
    OOS Sharpe >=0.5 in current evidence base
  - momentum: ARCHIVE - carry_momentum already tested the combination; standalone
    momentum has no validated Sharpe
  - carry / carry_momentum: ARCHIVE carry (subsumed by carry_fred); carry_momentum
    ARCHIVE pending carry_fred dominance confirmation
  - 8 exploratory scripts (60875e1): BULK-ARCHIVE - backfilled to trials.jsonl for DSR
    accounting; none advanced to pre-reg; treat as hypothesis-generation, not validated

  ## C. 12-week research queue (sequenced; max 4 items)

  1. vol_target_carry paper launch - hypothesis: validated OOS Sharpe 0.7594 replicates
     in retail FX paper-venue spreads (orchestrator-sanitized) | capacity: $250k notional
     ceiling | falsification: paper Sharpe < 0.30 over 6 weeks OR drawdown > 20% | week: 1-2

  2. FRED-carry Bet #1 paper launch - hypothesis: BoJ-divergence regime carry edge
     (OOS 0.80) persists in paper with CF-T9 monitor active | capacity: $200k notional
     (concentrated regime = lower sizing) | falsification: Sharpe < 0.40 at 6-week mark
     OR CF-T9 triggers | week: 1-2 concurrent with item 1

  3. Bet #2 (tas_ceiling_4h) pre-reg clearance + backtest - hypothesis: 4-hour TAS
     ceiling captures intraday momentum without lookahead; must survive deflated Sharpe
     with N=22 penalty | capacity: $100k notional | falsification: pre-reg OOS Sharpe
     < 0.50 (elevated bar due to DSR) | week: 3-6 (gated on R2)

  4. Regime-filter extension for vol_target_carry - hypothesis: conditioning
     vol_target_carry on FRED JPY policy-rate differential improves Sharpe by >=0.10 OOS
     without overfitting | capacity: same as vol_target_carry ($250k ceiling) |
     falsification: DSR-adjusted Sharpe improvement < 0.05 | week: 7-10 (gated on
     item 1 paper data)

  ## D. Alpha-thesis kill criterion

  - kill_date: 2026-06-23
  - kill_metric: if neither vol_target_carry nor FRED-carry Bet #1 achieves paper-trading
    Sharpe >=0.50 over rolling 60 trading days by 2026-06-23, AND Bet #2 has not cleared
    pre-reg with OOS Sharpe >=0.50, then: halt all new pre-registrations, convene pivot
    review, consider universe expansion or strategy-class change outside carry family.

