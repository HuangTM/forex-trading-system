body: |
  ## 1. Base-case (regime-inactive) Sharpe for Bet #1
  I accept 0.07 (confirmed 0.07464 from dominance_benchmarks.json and trials.jsonl
  b7d1a65a). However, I do not use it to set a base-case position size — I use it
  to confirm the strategy has NO edge outside its validated regime. A Sharpe of 0.07
  with n_trades=7 and DSR=0.367 is statistically indistinguishable from zero and
  would fail the harness's own thresholds. There is no base-case sizing. Bet #1
  must NOT trade when regime is inactive.

  ## 2. Conditional size_multiplier
  Regime-inactive: 0.0 (no trades). Regime-active: 0.25, not 0.5. The LTCM analog
  applies — high Sharpe concentrated in a single identifiable regime is not a license
  for full sizing; it is a warning that the edge depends on a single structural factor
  persisting. The 0.25 is the Phase-1 envelope 0.5 multiplied by a 0.5 concentration
  haircut. JPY-correlation cap (15% book notional) remains binding and may further
  constrain effective size below 0.25 when other JPY strategies are active.

  ## 3. CF-T9 operational constraints
  CRITICAL FINDING: CF-T9 does not exist in carry_fred.md (verified: CF-T1–CF-T8
  only) and has no implementation in carry_fred.py (verified: 227 lines, no regime
  filter). Paper launch is BLOCKED until CF-T9 is formally pre-registered (amendment
  with NHT+HoQR co-sign) and implemented. Once deployed: heartbeat ≤ 5-min cadence
  required; ≥ 10 regime readings (both states observed) before first trade; heartbeat
  failure → halt new trades (human review within 30 min for existing positions);
  regime-flag deactivation mid-trade → exit at next daily bar.
