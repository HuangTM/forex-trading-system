dissent-statement: |
  This dissent is append-only per prior caveat. CEO sees it verbatim.

  (1) BONFERRONI REVERSAL — CARRY_MOMENTUM REJECTION:
  Under Bonferroni (alpha=0.0083), the carry_momentum rejection rests on R1
  (Sharpe 0.197 vs threshold 0.50) and R6 (16 trades). The R1 rejection is
  NOT reversed by Bonferroni — the gap between 0.197 and 0.50 is 0.30+
  units, far exceeding any multiple-comparisons correction to a Sharpe
  threshold. Bonferroni does not adjust Sharpe THRESHOLDS — it adjusts
  TYPE-I error rates on significance tests. The R1/R6 gates are deterministic
  criteria, not p-value thresholds. Bonferroni applies only to the DSR
  (probability-based) criterion. All 5 rejections survive Bonferroni on their
  triggering criteria. However, I reduce bonferroni-adjusted count to 4
  because carry_momentum's dsr=0.989 is a near-pass that, under a pure
  DSR-only evaluation, would survive — I flag this as a weak rejection even
  though the mechanical outcome is REJECT. CEO should note the asymmetry:
  carry_momentum's signal quality (dsr) is acceptable; its Sharpe magnitude
  and trade count are not.

  (2) MOMENTUM PASS IS WEAK — BONFERRONI CONCERNS:
  momentum Sharpe 0.3141 clears R1 threshold 0.30 by 0.014 only. With
  n_trades=126 and dsr=1.00, the DSR strength is high — but the raw Sharpe
  margin is fragile. A 4.5% change in the OOS window (add/remove 1 month)
  could flip this to REJECT. I classify this WEAK PASS, not STRONG PASS.
  Wave-4 paper sizing for momentum should be minimal until a second
  independent OOS window confirms.

  (3) CARRY_FRED OOS-2022 = 0.07 REQUIRES CEO ACKNOWLEDGEMENT:
  The dominance benchmark shows fred_carry (with regime flag) achieves only
  0.07464 on the 2022-2023 OOS window, versus 0.80 on post-2024. This
  validates the regime hypothesis (stripping the flag collapsed Sharpe to
  0.0746, matching the unfiltered benchmark). But it also means Bet #1's
  validated 0.80 Sharpe is regime-dependent: in a non-regime period it
  reverts to ~0.07. The CF-T9 kill switch must be active from day 1 of paper
  trading. Position sizing must NOT use the 0.80 figure as the Sharpe
  estimate — it must use a regime-conditional estimate or the conservative
  base of ~0.07 for periods when the regime flag is inactive.

  (4) TIER B GAP = 5: CONDITION-1 NOT MET.
  With only 5 rejections recorded (all from this wave; 0 prior status:rejected
  entries confirmed in trials.jsonl lines 1-22), CONDITION-1 (>=10 rejections)
  has NOT been satisfied. No paper launch authorization is supportable on
  current evidence alone. Wave-4 requires 5 additional rejections minimum.

