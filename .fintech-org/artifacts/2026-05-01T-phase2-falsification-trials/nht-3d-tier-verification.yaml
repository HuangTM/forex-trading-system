body: |
  ## A. Tier A status
  SATISFIED. 5 status:rejected entries logged in trials.jsonl (lines 23-28) on
  2026-05-02T04:50-04:51Z, well within the 2026-05-15 deadline. Count=5 meets
  the >=5 threshold. Bonferroni-adjusted count is 4 (carry_momentum downgraded
  to WEAK REJECT due to dsr=0.989 near-pass, though mechanical verdict remains
  REJECT). decision: tier-a-satisfied.

  ## B. Tier B status
  NOT SATISFIED. Total status:rejected entries = 5. Gap to CONDITION-1 (>=10) = 5.
  Lines 1-22 of trials.jsonl confirmed zero prior status:rejected entries —
  all prior complete trials have status:complete or status:exploratory.
  Paper-launch authorization blocked until 5 additional rejections are recorded.

  ## C. R7 inverted trigger
  Did NOT fire. fred_carry_stripped OOS-2022 Sharpe = 0.07464 (confirmed in
  both trials.jsonl rejection_reason and dominance_benchmarks.json: 0.07463868).
  R7 inverted threshold is >=0.60. Gap = 0.525 below threshold. The regime
  conditioning hypothesis SURVIVED this falsification attempt — stripping the
  regime flag reduced Sharpe from ~0.80 to ~0.07, consistent with prediction.

  ## D. Bonferroni-adjusted per-candidate classification
  Bonferroni alpha per test = 0.05/6 = 0.0083. Applied to DSR (probabilistic
  gate). Deterministic gates (R1, R3, R6) are not p-value tests and are not
  adjusted — they remain hard criteria regardless of family-wise correction.

  ma_crossover: STRONG REJECT
    Sharpe=-0.044 (vs floor 0.30), dsr=0.00, n_trades=9. Triple failure.
    Negative Sharpe and zero DSR are not borderline. Bonferroni does not rescue.

  momentum: WEAK PASS
    Sharpe=0.314 (clears 0.30 by 0.014 only), dsr=1.00, n_trades=126.
    DSR is definitively clean. But raw Sharpe margin is 4.5% above threshold.
    Bonferroni increases skepticism on the Sharpe claim. Not reversed, but not
    robust. Requires second OOS window before sizing up.

  bollinger_rsi: STRONG REJECT
    Sharpe=-0.343 (vs floor 0.30), dsr=0.00, n_trades=9, max_dd=30.8%.
    Four-criterion failure including max_dd > 25%. Deeply negative. Not borderline.

  carry_baseline: STRONG REJECT
    Sharpe=0.284 (vs strategy-specific override 0.50), n_trades=7 (vs floor 30).
    Both R1 and R6 breach. Even at default 0.30 threshold, Sharpe gap = 0.016;
    at the strategy override of 0.50, gap = 0.216. Not borderline on the
    triggered criteria.

  carry_momentum: WEAK REJECT
    Sharpe=0.197 (vs 0.50 override), n_trades=16 (vs 30). DSR=0.989 — PASSES R2.
    The signal quality indicator is healthy; the magnitude and sample size are
    not. Mechanical verdict is REJECT. Under Bonferroni this remains REJECT but
    is classified weak because dsr=0.989 contradicts the noise hypothesis.
    This is the most information-rich rejection: strategy shows signal quality
    but insufficient Sharpe and sample. Note for future: a longer OOS window
    and higher-Sharpe variant could revisit.

  fred_carry_stripped: STRONG REJECT
    Sharpe=0.075 (vs 0.30 floor), dsr=0.367, n_trades=7. Triple failure.
    Stripping regime filter collapses to dominance-benchmark level. Bonferroni
    does not rescue — all three triggers are well below thresholds.

  ## E. carry_fred OOS-2022 finding interpretation
  The OOS-2022 benchmark (0.07464) is evidence FOR the carry thesis under
  regime conditioning, and AGAINST the carry thesis without it.
  The regime flag is the edge. Without it, carry_fred degrades to ~0.07 —
  statistically indistinguishable from zero alpha at daily bar resolution.

  Bet #1 retirement criterion: "regime flag inactive >30 days with Sharpe <0.40."
  If Bet #1 ran on OOS-2022 in production with CF-T9 active: the regime flag
  behavior in 2022-2023 is unknown from these files, but the stripped-regime
  result (0.07) implies that if the regime flag was inactive for the window,
  CF-T9 would have triggered well before 30 days given Sharpe tracking ~0.07.
  The system would likely have exited the trade. Mechanically consistent.

  For paper-launch sizing: DO NOT use the 0.80 Sharpe to set notional exposure.
  The correct conservative sizing uses ~0.07 as the base-case Sharpe (regime
  inactive) with 0.80 as the regime-active upside. Kelly fraction at 0.07 is
  minimal. CF-T9 must be active from trade 1. This dissent requires CEO
  acknowledgement before sizing decisions are made.

  ## F. Recommendation for Wave-4
  CONDITION-1 NOT MET: 5 rejections vs required 10. Gap = 5.
  Paper-launch authorization is BLOCKED on current evidence.

  sub-wave 3c.3 (Bet #2 tas_ceiling_4h): PROCEED. Adding one more trial
  contributes toward Tier B and provides independent falsification evidence.
  No reason to halt hypothesis testing while CONDITION-1 is unsatisfied.

  Carry thesis: INTACT but regime-conditional. Validated at Sharpe=0.80
  (regime-active). Base-case Sharpe ~0.07 (regime-inactive). CF-T9 is not
  optional — it is the thesis.

  New dissent items requiring CEO acknowledgement before any paper-launch:
  1. Momentum WEAK PASS — paper sizing must be minimal until second OOS
     window confirms. Do not treat dsr=1.00 as sufficient on a 0.014 Sharpe
     margin above threshold.
  2. carry_fred OOS-2022 = 0.07 — regime-inactive sizing must reflect this
     floor, not the 0.80 figure. CF-T9 active from day 1.
  3. CONDITION-1 gap = 5 — no paper launch until 5 more rejections logged.
