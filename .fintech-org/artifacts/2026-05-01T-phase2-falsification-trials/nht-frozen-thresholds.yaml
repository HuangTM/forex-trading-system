body: |
  ## Frozen falsification rubric (effective 2026-05-01; org-wide N=22)
  ## Any threshold change after this date requires new pre-registration + new CONSENSUS.

  ### R1 — Naive OOS Sharpe
  threshold: oos_sharpe < 0.30
  rationale: |
    Anchored above zero to exclude strategies that technically beat zero but sit
    within estimation noise on a daily-bar sample. Set below the validated
    baselines (0.76, 0.80) — using the validated bar as universal bar would be
    circular; not every strategy needs to match vol_target_carry to be a valid
    candidate. 0.30 represents real but minimal evidence. If the strategy's own
    pre-registration states a higher kill_switch_threshold, THAT threshold
    supersedes R1 (more conservative wins).
  override_rule: "max(0.30, strategy_pre_reg.kill_switch_threshold)"

  ### R2 — Deflated Sharpe
  threshold: dsr < 0.50
  formula: |
    Bailey & Lopez de Prado (2014): DSR corrects the observed Sharpe for the
    number of trials N at spawn time, return distribution skewness, and excess
    kurtosis. N used MUST be n_trials_at_spawn from the trial record, not a
    fixed value. Deflation factor range for N=22: 0.5–0.7x raw OOS Sharpe.
  route_to: "QD — implement DSR computation; `dsr` field is schema-present but null"
  note: |
    Until QD implements DSR computation, R2 is a BLOCKING GATE that cannot be
    cleared. Strategies may not be promoted to paper trading with dsr=null.

  ### R3 — Max Drawdown
  threshold: max_dd > 0.25
  rationale: |
    Inherited from VTC-T2 (the only existing machine-checkable drawdown
    criterion). 25% is the current firm anchor. CRO may tighten to 20% before
    2026-05-01 freeze; after that date this value is frozen.

  ### R4 — Capacity
  threshold: ROUTE_TO HoQR
  rationale: |
    NHT does not have position-sizing models to estimate notional capacity from
    backtest output alone. HoQR must provide a capacity_estimate field in the
    pre-registration. Heuristic floor suggested: capacity_estimate < $100k USD
    notional is a rejection candidate on cost-efficiency grounds, but this is
    advisory only until HoQR defines the firm minimum. QD should add
    `capacity_estimate` as a nullable field to trial schema.

  ### R5 — Permutation test
  threshold: permutation_pvalue > 0.05
  k_permutations: 200
  status: aspirational
  rationale: |
    K=200 matches VTC-T8 precedent. Permutation test shuffles feature labels
    (not time labels) and recomputes OOS Sharpe. p-value is fraction of
    permuted Sharpes >= observed. Standard alpha 0.05. ASPIRATIONAL: harness
    does not currently emit permutation fields. QD must implement before R5
    becomes a hard gate. Until then, R5 is noted in trial record as "pending."

  ### R6 — Sample size
  threshold: n_trades < 30 OR n_oos_bars < 252
  rationale: |
    n_trades < 30: detecting Sharpe=0.5 vs 0 at 80% power requires ~64
    independent observations; 30 is the floor below which annual Sharpe
    estimates are dominated by endpoint luck. Rejecting at 30 is lenient;
    raising to 50 is defensible if QD confirms typical trade counts.
    n_oos_bars < 252: one year of daily bars is the minimum for an annual
    Sharpe estimate to have any interpretive value. Sub-annual OOS is not OOS.

  ## Special clauses

  GOALPOST-STUFFING PROPHYLACTIC:
  Any Phase 2 evaluation of an archived Phase 0 baseline (ma_crossover,
  bollinger_rsi, momentum, carry_momentum) MUST have a strategy-specific
  pre-registration filed BEFORE the backtest runs. The pre-reg must state
  a positive threshold on a held-out OOS window not used in the original
  archival decision. "Strategy is archived" is not a falsification criterion.
  Evaluations without compliant pre-regs will be recorded as invalid trials.

  SAMPLE-OVERLAP PROTECTION:
  Any new strategy sharing pair and date-range overlap with vol_target_carry
  (USDJPY, OOS post-2024) or FRED-carry Bet #1 (multi-pair, OOS post-2024)
  must be flagged in the trial record with `oos_overlap: true`. Overlapping
  OOS is not independent evidence. Overlapping trials are not falsification
  trials — they are sensitivity analyses and must be labeled as such.
  QD must enforce at trial-spawn time.

