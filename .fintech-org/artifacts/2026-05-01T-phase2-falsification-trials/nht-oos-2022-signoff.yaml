body: |
  ## Decision
  Position B — APPROVE WITH CAVEAT.

  OOS-2022 is structurally independent of FRED-carry Bet #1's post-2024 OOS
  (strictly prior). vol_target_carry has no carved holdout (full-history
  retroactive pre-reg), so NHT's "consumed holdout" protection has no specific
  window to protect against. The candidates are distinct strategies: a different
  strategy evaluated on overlapping data does not inherit vol_target_carry's
  validation, and its parameters cannot have been fitted to OOS-2022 results.
  OOS-2022 is fresh for all 6 candidates. Sign-off granted.

  Caveat: candidate selection may carry indirect exposure to 2022–2023 data
  from vol_target_carry's exploration. Treat 6-candidate OOS-2022 results as
  a joint family: apply multiple-comparisons correction before declaring any
  single candidate falsified or validated.

  ## What would change your mind
  Evidence that any org member ran backtests on 2022–2023 data for any of the
  6 candidates prior to pre-reg filing, OR that candidate selection was filtered
  on observed 2022–2023 outcomes (git log or session log showing such runs).
