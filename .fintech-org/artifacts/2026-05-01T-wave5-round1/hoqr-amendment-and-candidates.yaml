body: |
  ## A. CF-T9 amendment (5a)
  Inserted CF-T9 bullet after CF-T8 in carry_fred.md Falsification Triggers section.
  Clauses A (BoJ rate >= 0.50% for >= 2 consecutive quarter-ends) and B (basket 60d
  Sharpe < 0.20) documented verbatim. Clause C gap explicitly flagged: docstring claims
  three clauses but only A+B exist in code — amendment records this as a known-incomplete
  source defect requiring NHT/CEO ratification of a Clause C before it is binding.
  HoQR signature added to Approval section; NHT co-sign deferred to Round 3.

  ## B. Candidate queue (5b — ranked top-6)

  1. **ma_crossover_3x_costs** — Does MA-crossover (already rejected OOS) remain
     rejected under 3x cost parameters? Hypothesis: Sharpe < 0.30 on OOS-2022.
     kst: 0.30 | oos: 2022-01-01 → 2023-12-31 | overlap: false |
     impl_effort: REUSE-EXISTING-MODULE | expected_falsification_prob: ~95% |
     qd_effort: 1h

  2. **bollinger_rsi_EURUSD_only** — Does bollinger_rsi fail on the single highest-
     liquidity pair when isolated? Hypothesis: Sharpe < 0.30 on OOS-2022 EURUSD.
     kst: 0.30 | oos: 2022-01-01 → 2023-12-31 | overlap: false |
     impl_effort: REUSE-EXISTING-MODULE | expected_falsification_prob: ~90% |
     qd_effort: 1h

  3. **momentum_GBPUSD_only** — momentum already passed on EURUSD; does it hold on
     a single non-EURUSD pair? Hypothesis: Sharpe < 0.30 on OOS-2022 GBPUSD.
     kst: 0.30 | oos: 2022-01-01 → 2023-12-31 | overlap: false |
     impl_effort: REUSE-EXISTING-MODULE | expected_falsification_prob: ~70% |
     qd_effort: 1h

  4. **carry_2x_costs** — Does raw carry baseline survive a 2x cost stress on OOS-2022?
     Already rejected at 1x costs (Sharpe 0.28). Hypothesis: Sharpe < 0.30.
     kst: 0.30 | oos: 2022-01-01 → 2023-12-31 | overlap: false |
     impl_effort: REUSE-EXISTING-MODULE | expected_falsification_prob: ~98% |
     qd_effort: 1h

  5. **carry_momentum_3x_costs** — carry_momentum rejected at 1x (Sharpe 0.197);
     3x cost stress confirms rejection robustly. Hypothesis: Sharpe < 0.30.
     kst: 0.30 | oos: 2022-01-01 → 2023-12-31 | overlap: false |
     impl_effort: REUSE-EXISTING-MODULE | expected_falsification_prob: ~99% |
     qd_effort: 1h

  6. **vol_target_carry_no_vol_scaling** — Ablation: remove the vol-targeting from
     the validated vol_target_carry (use equal position sizing instead). Tests whether
     vol-targeting is load-bearing for the edge or incidental. Hypothesis: Sharpe < 0.30
     on OOS-2022 (different from vol_target_carry's full-history OOS window; no overlap).
     kst: 0.30 | oos: 2022-01-01 → 2023-12-31 | overlap: false |
     impl_effort: EXTEND-EXISTING | expected_falsification_prob: ~65% |
     qd_effort: 3h

  ## C. Honest accounting
  Candidates 1, 2, 4, 5 are box-checking: near-certain rejections that mechanically
  advance Tier B closure. Candidate 3 (momentum GBPUSD) is a borderline genuine test.
  Candidate 6 (vol_target_carry no-vol ablation) is the only scientifically meaningful
  candidate — it could surprise either way. Box-checking candidates are honest about
  their purpose: they document the boundary of what fails, which has integrity value.
  No goalpost-stuffing risk: all declare Sharpe >= 0.30 as the pass threshold on a window
  not used in any prior validation.

