body: |
  ## A. Tier B / CONDITION-1 re-verification

  **CONDITION-1 SATISFIED (unadjusted).**

  Verified from trials.jsonl lines 23-35: 12 entries with status: rejected.
  - Lines 23, 25, 26, 27, 28: 5 Phase-2 subwave rejections (from 3d artifact)
  - Line 29: tas_ceiling_4h rejection (Wave-5 Round-1)
  - Lines 30, 31, 32, 33, 34, 35: 6 Wave-5 Round-2 rejections (confirmed)
  Total: 12 >= 10. Gate is cleared mechanically.

  **Quality-adjusted (STRONG-only Bonferroni) count: 7.**
  STRONG REJECT requires R1 or R2 fire. Of 12 rejections:
  - 7 STRONG (Sharpe or DSR below threshold)
  - 5 WEAK (R6-only, sample-size disqualification with above-floor Sharpe)
  STRONG-only count 7 < 10. Mechanical gate cleared; quality-adjusted gate not.
  CEO should read this as "threshold met, evidence quality modest."

  **R6-only question (Task A critical observation):** The 4 R6-only Wave-5 R2
  rejections DO count toward the mechanical CONDITION-1 gate — R6 is a registered
  rejection criterion in the rubric (r6_n_trades_lt: 30). However, per 3d precedent,
  they are classified WEAK because they do not falsify the null on performance
  grounds — they disqualify on statistical power grounds. The distinction matters:
  R6-only rejections say "we cannot tell" not "the strategy fails." Only R1/R2/R3
  rejections say "the strategy fails." Counting all 12 is mechanically correct;
  treating all 12 as equivalent evidence is not.

  ## B. Bonferroni per-candidate classification (Wave-5 R2 family of 6)

  Family Bonferroni alpha = 0.05 / 6 = 0.0083 per test. Applied to DSR (R2).
  Deterministic gates (R1, R3, R6) not adjusted.

  ma_crossover_3x_costs: STRONG REJECT
    Sharpe=-0.087 (vs floor 0.30), dsr=0, max_dd=27.47%, n_trades=9.
    Four-criterion failure. Negative Sharpe, zero DSR, max_dd breach. Not borderline.
    R2 breach (dsr=0) is extreme — Bonferroni cannot rescue at any reasonable alpha.

  bollinger_rsi_EURUSD_only: WEAK REJECT
    Sharpe=0.387 (ABOVE 0.30 floor), n_trades=3 (fires R6 only).
    No R1 or R2 breach. Cannot falsify on performance. R6 disqualifies on
    sample size. With 3 trades there is no statistical basis for any conclusion.
    Bonferroni is irrelevant — no significance test was run. Sample is degenerate.

  momentum_GBPUSD_only: STRONG REJECT
    Sharpe=0.001 (vs floor 0.30), dsr=0.01913 (vs 0.50). Dual R1+R2 failure.
    Sharpe essentially zero. DSR near zero. Not borderline. Bonferroni does not rescue.

  carry_2x_costs: WEAK REJECT
    Sharpe=0.347 (ABOVE 0.30 floor), n_trades=7 (fires R6 only).
    No R1 breach. Cannot falsify on performance. R6 disqualifies on sample size.
    Notable: 2x costs with n_trades=7 means the cost structure itself may suppress
    trading activity — not a valid ablation of cost sensitivity.

  carry_momentum_3x_costs: WEAK REJECT
    Sharpe=0.315 (ABOVE 0.30 floor by 0.015), n_trades=16 (fires R6 only).
    No R1 breach. R6 disqualification. Marginal Sharpe above floor is uninformative
    with n_trades=16. If n_trades >= 30 this result would be a WEAK PASS near the
    3d momentum WEAK PASS pattern. Sample-size driven.

  vol_target_carry_no_vol_scaling: WEAK REJECT (degenerate; stop trigger void)
    Sharpe=1.152 (fires stop-condition >= 0.50), n_trades=1 (fires R6 only).
    R6 filed correctly. Stop trigger is void because R6 fires first — a degenerate
    single-trade result is not a valid stop-trigger event. See Task C.

  ## C. Stop-trigger adjudication for vol_target_carry_no_vol_scaling

  Decision: **B** — Partial concur with QD. Degenerate for this sample; ablation
  deserves a proper test.

  Reasoning (≤80 words): n_trades=1 means one continuous position with zero exits —
  structural buy-and-hold, not a vol-targeting strategy test. The 1.152 Sharpe cannot
  distinguish vol-targeting from regime exposure. R6 correctly fires. Stop trigger is
  void. However, dismissing the ablation entirely wastes signal: a properly sampled
  test (n_trades >= 30, multi-regime OOS window) would determine whether vol-scaling
  is load-bearing. This should be HoQR's next-priority item, not a closed question.

  ## D. CF-T9 amendment co-sign

  Co-sign: **Y**

  Clause C gap acceptance: **Y** (conditional — see dissent item 3)

  Amendment reviewed: Clauses A and B are operationalised in
  `scripts/monitor_regime_triggers.py` (commit 61ea022) and
  `scripts/auto_retire_on_trigger.py`. The Clause C gap is explicitly documented in
  the amendment text as "KNOWN GAP" with the source of the discrepancy identified
  (monitor docstring references three clauses; only two are implemented). This is
  transparent and accurately filed. Co-sign is granted on that basis.

  Conditions binding on this co-sign:
  1. Paper-launch communications must state CF-T9 is A+B binding, C pending.
  2. Clause C must be ratified within 60 trading days of paper launch or NHT
     requires mandatory re-review of CF-T9 adequacy.
  3. Sizing must not use the 0.80 regime-active Sharpe as the base case — use
     ~0.07 for regime-inactive periods (dissent item 3 from prior 3d artifact,
     carried forward).

  File edit performed: carry_fred.md Approval section updated with NHT co-sign line.

