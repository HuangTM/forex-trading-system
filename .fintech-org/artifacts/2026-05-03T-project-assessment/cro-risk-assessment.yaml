q3-jpy-correlated-trigger: |
  Assumption 1 (_JPY_CORRELATED only contains {USDJPY, GBPUSD}) is non-blocking at USDJPY-only launch because
  any single-pair USDJPY book trivially has 100% JPY-correlated notional, and a 100%-of-USDJPY-cap rule is
  redundant with a single-pair limit. Assumption 1 becomes BLOCKING under any of these triggers:
  (T1) Universe expansion to include any additional cross-JPY pair (EURJPY, AUDJPY, CADJPY, GBPJPY, NZDJPY) —
       these MUST be added to _JPY_CORRELATED before dispatch, otherwise the aggregator will under-count JPY tail
       risk and the 15% cap will be silently bypassed.
  (T2) Addition of any indirectly JPY-correlated pair (e.g., AUDUSD/NZDUSD via risk-off correlation, EURJPY
       proxies, JPY-funded carry baskets) — requires explicit CRO review to extend the table.
  (T3) Activation of a third strategy whose primary pair is non-JPY (EURUSD, GBPUSD-as-non-JPY) — at that point
       the GBPUSD-as-JPY-correlated classification (justified by historical risk-off contagion) becomes load-
       bearing for the cap calculation; CRO must re-validate the empirical correlation in the current regime.
  (T4) Multi-pair carry basket reactivation (the CF-T9 monitor universe of 6 JPY-crosses is observed but not
       traded; if any of those become tradable the table must be updated synchronously).
  Trigger condition for blocking review: ANY change to config.pair_symbols beyond {USDJPY} OR any new
  Strategy whose generate_signals returns non-USDJPY positions.

q4-residual-risk-separate-accounts: |
  If both loops accidentally run in separate Saxo paper accounts, compute_exposure (exposure_aggregator.py:94-140)
  is called on backend.get_positions() of ONE backend per loop — neither loop sees the other's positions. Each
  loop independently allows JPY-correlated_pct up to 15% of ITS book, but since each book is a single USDJPY
  position, jpy_correlated_pct=100% of that account's book. The dispatch gate is then dominated by per-account
  vol-target sizing rather than the cross-strategy 15% envelope.
  Quantification: vol_target_carry uses leverage_cap=2.0 (config/vol_target_carry.yaml inferred from
  run_paper_trading_vt.py:674) targeting target_vol=10% annual. carry_fred uses leverage_cap=1.0 (line 625)
  with bet1 size_multiplier=0.25 → effective ~0.25x leverage when regime active.
  Maximum simultaneous JPY-correlated exposure if both run in separate accounts:
    Account A (vt): up to 200% of equity_A in USDJPY notional (2.0x leverage_cap × 100% signal)
    Account B (cf): up to 25% of equity_B in USDJPY notional (1.0x × 0.25 multiplier)
  Combined absolute notional could reach 225% of single-account-equity-equivalent, vs. CRO 15% intent.
  Residual risk: 15x over-exposure relative to CRO envelope. This is a HIGH-impact silent failure mode —
  the code provides no cross-account aggregation primitive; deployment ops must verify both loops use the
  same account_key. Mitigation candidate: add account_key assertion at run_cycle entry comparing vt vs
  carry_fred backend.account_key (not currently implemented in read scope).

q5-worst-case-30d-drawdown: 18.5
