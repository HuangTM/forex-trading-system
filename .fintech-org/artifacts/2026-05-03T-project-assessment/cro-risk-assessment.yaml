body: |
  Q1 BC-1..BC-8 instantiation verification: all 8 binding constraints are correctly wired into both paper-
  trading loops. BC-1/BC-2 (size multipliers 0.0/0.25) appear at bet1_sizing.py:48-49 as named module
  constants, and are applied at run_paper_trading_carry_fred.py:475-479 in the target_units computation
  (raw_target × size_multiplier × dd_multiplier). BC-3 (CF-T9 freshness ≤300s) is enforced via os.stat
  mtime check at bet1_sizing.py:144-171 with fail-safe-False on missing/stale. BC-4 (cold-start gate ≥10
  readings, both states observed) is gated at bet1_sizing.py:197-222 and the producer at
  monitor_regime_triggers.py:264-275 maintains the persistent state.json with both n_readings and
  seen_regime_active_{true,false} flags. BC-5 (drawdown ladder 10/15/20%) is enforced in drawdown_contract.py
  with explicit threshold validation (line 122) and instantiated with literal 0.10/0.15/0.20 at both loops'
  main(). BC-6 (4 strategies, 6 positions, 36 trials) — the runtime enforces 4 strategies and 6 positions
  via exposure_aggregator.check_dispatch_allowed, but the 36-trials-per-12-weeks constraint is a trial-
  factory budget not visible in the paper-loop scope. BC-7 (300s heartbeat watchdog) is instantiated with
  explicit timeout_seconds=CRO_WATCHDOG_TIMEOUT_SECONDS=300.0 in both loops. BC-8 (15% JPY-correlated cap)
  is enforced via the aggregator with the caveat that {USDJPY, GBPUSD} is the only correlated set; at
  USDJPY-only scope the cap is structurally non-binding (single-pair → 100%-of-1).

  Q2 drawdown-ladder equity reference: PAPER-MTM. The drawdown contract receives current_equity from
  fetch_account_equity (run_paper_trading_vt.py:258-272), which reads broker balance.TotalValue (Saxo
  mark-to-market account equity including unrealized PnL), falling back to CashBalance only if TotalValue
  is missing. This is the correct reference per CRO contract — it captures real-time equity erosion from
  open positions, not just notional exposure. The same pattern holds in carry_fred (lines 353, 379).

  Q3 _JPY_CORRELATED at USDJPY-only scope: non-blocking. Any single-pair USDJPY book has trivially 100%
  JPY-correlated notional, making the 15% cap structurally redundant — the limit is dominated by per-strategy
  vol-target sizing. Becomes BLOCKING under any of: (T1) universe expansion adding cross-JPY pairs (must
  pre-update _JPY_CORRELATED), (T2) addition of indirectly correlated pairs (AUDUSD/NZDUSD risk-off proxies),
  (T3) third strategy with non-JPY primary pair making the GBPUSD-as-JPY-correlated classification load-
  bearing, (T4) reactivation of multi-pair carry basket (the 6 JPY-crosses observed by CF-T9 are not yet
  tradable). Concrete trigger: ANY change to config.pair_symbols beyond {USDJPY} OR any Strategy.generate_signals
  returning a non-USDJPY position. CRO governance gate at universe expansion is required to update the table.

  Q4 separate-account residual risk: HIGH. compute_exposure operates on a single backend.get_positions per
  loop. If vt and carry_fred run in different paper accounts (a config/launch error), neither sees the other's
  USDJPY exposure. Independent JPY-correlated_pct=100% of each book passes the 15% cap because the cap is
  applied per-aggregator-call. Combined notional reaches up to 200% (vt 2x leverage) + 25% (carry_fred 0.25
  multiplier × 1x) = 225% of single-account-equity-equivalent vs. 15% CRO intent — a ~15x over-exposure
  silent failure mode. The code provides no cross-account aggregation primitive in the read scope. Mitigation:
  deploy-time assertion that both backend.account_key match before either loop ticks; consider a shared
  exposure file or process-level lock as defense-in-depth. Not blocking at USDJPY-only single-loop launch
  since only one loop is authorized to start; becomes blocking when carry_fred is added in the regime-active
  state.

  Q5 worst-case 30d paper drawdown: ~18.5% equity. Scenario chain: vol_target_carry sized at full Phase-1
  envelope (~2x leverage_cap on USDJPY targeting 10% vol) holds long-USDJPY when a BoJ surprise rate hike
  (analogous to historical Aug-2024 carry unwind, -7.5% in 3 days unleveraged) compresses USDJPY 6-8% within
  days. Leveraged 2x → 14-16% paper-equity loss over the move. Kill-switch (-2% daily) flattens but only
  after threshold breach, locking in 1-2% gap slip. Carry_fred at 0.25 size_multiplier compounds another 1-2%.
  Drawdown ladder fires at 10% (halt-new dispatch, no relief on existing position), 15% (reduce-sizing 0.5x
  applied to next rebalance, slows but doesn't stop bleed), 20% (full-halt terminal). Best estimate: 18.5%
  intra-30-day peak DD. Sources: data/usdjpy_bh_drawdowns.csv shows historical USDJPY B&H worst short-window
  drawdowns of 5-7% unleveraged in 30-50d windows (2022-11→2023-01: -6.87%, 51d; 2024-07→2024-09: -5.05%, 47d);
  the 2x leverage scaling and BoJ tail-event amplification justify the ~18.5% projection. This is below the
  20% full-halt ceiling but consumes the entire reduce-sizing band; recommend pre-launch operator awareness
  that the first 30d scenario can plausibly reach the DD-2 threshold even with all controls in force.

  Decision: CONDITIONAL-APPROVE. All 8 binding constraints are correctly instantiated with file/line evidence.
  Drawdown ladder is wired to paper-MTM equity. Q3 risk is dormant until universe expansion and is gated by
  governance review. Q4 risk is the single most material residual — the absence of an account_key cross-
  check is a silent-mode multi-account amplifier; conditional-approve requires (a) deploy-checklist gate
  that both loops point to the same account_key before second loop authorization, and (b) operator awareness
  of Q5 worst-case ~18.5% 30d drawdown as a plausible (not extreme) outcome. No veto raised because the
  authorized launch is single-loop USDJPY (vol_target_carry only at first paper bar, per CONSENSUS_2026-04-28
  authorization), which renders Q3 and Q4 non-blocking at scope. The conditions become blocking when (a) the
  second loop (carry_fred regime-conditional) is dispatched or (b) the universe expands beyond USDJPY.

