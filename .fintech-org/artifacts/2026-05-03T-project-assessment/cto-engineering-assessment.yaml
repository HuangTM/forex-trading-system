  case-a-file-missing:
    condition: "data/cf_t9_status.json does not exist on disk"
    consumer-code-path: "bet1_sizing.py:132-139 — path.exists() returns False"
    outcome: |
      regime_active_status() returns False immediately.
      bet1_size_multiplier(False) = 0.0 (BC-1: no-trade).
      Structured log emitted: event=CF_T9_STATUS_CHECK, file_exists=False,
      result=False, block_reason=CF_T9_STATUS_FILE_MISSING.
    fail-safe-enforced: true
    notes: |
      No trade is dispatched. Fail-closed. The NHT Wave-6 dissent confirmed
      data/cf_t9_status.json did not exist as of Wave-6 inspection (verified
      via ls in dissent-statement). This case was a real pre-Wave-7 state.
      Post-Wave-7: the CF-T9_STATE_PATH (data/cf_t9_state.json) separately
      accumulates readings; cf_t9_status.json is written by monitor_regime_triggers.py
      on each invocation (DEFAULT_OUTPUT_PATH = Path("data/cf_t9_status.json")).
      Until the cron runs at least once after first install, the file will be absent
      and Bet #1 will correctly be blocked.

  case-b-file-present-but-json-malformed:
    condition: "data/cf_t9_status.json exists but contains invalid JSON (truncated, corrupt write)"
    consumer-code-path: "bet1_sizing.py:174-182 — json.loads() raises json.JSONDecodeError"
    outcome: |
      The except (json.JSONDecodeError, OSError) block at bet1_sizing.py:176
      catches the error and returns False.
      regime_active_status() returns False.
      bet1_size_multiplier(False) = 0.0 (BC-1: no-trade).
      Structured log: event=CF_T9_STATUS_CHECK, result=False,
      block_reason=CF_T9_STATUS_PARSE_ERROR:<exception-text>.
    fail-safe-enforced: true
    notes: |
      The NHT Wave-7 re-verification confirms this as fail-safe (NHT adversarial
      question E: "payload.get() with safe defaults and bool()/int() coercion —
      not a schema validator. Missing keys default to False/0 (fail-safe)").
      However, NHT also flags: a corrupt file that STILL PARSES as valid JSON
      but contains wrong types would silently use defaults (False/0) rather than
      raising — this is fail-safe but not fail-loud. This is a known Wave-8+
      observability item (CONSENSUS_2026-05-03_wave7_closure.md Section 4,
      Finding 2). The fail-safe outcome is correct; the absence of schema
      validation means no alert would fire for a corrupt-but-parseable file.
      YELLOW FLAG: the system goes silent on type-corrupt payloads.

  case-c-file-present-missing-four-BC4-keys:
    condition: "data/cf_t9_status.json exists, parses as valid JSON, but is missing regime_active, n_readings, seen_regime_active_true, or seen_regime_active_false"
    consumer-code-path: "bet1_sizing.py:184-222 — payload.get() with explicit defaults"
    outcome: |
      bet1_sizing.py:184-187 uses payload.get() with defaults:
        regime_flag = bool(payload.get("regime_active", False))   → False
        n_readings  = int(payload.get("n_readings", 0))           → 0
        seen_true   = bool(payload.get("seen_regime_active_true", False)) → False
        seen_false  = bool(payload.get("seen_regime_active_false", False)) → False
      With n_readings=0: line 197 fires (0 < CF_T9_MIN_REGIME_READINGS=10).
      Returns False. Structured log: block_reason=CF_T9_COLD_START_GATE:n_readings=0<10.
      bet1_size_multiplier(False) = 0.0 (BC-1: no-trade).
    fail-safe-enforced: true
    notes: |
      This case was the pre-Wave-7 production state (NHT Wave-6 dissent: producer
      did not emit the four BC-4 keys; consumer read defaults 0/False/False).
      The consumer defaulted safely to fail-closed. The Wave-7 fix ensures the
      producer now emits all four keys in normal operation. If the producer file
      is from a pre-Wave-7 snapshot or a different process that writes a
      monitor_id-only payload, this case re-occurs with the same safe outcome.
      No capital risk, but BC-4 gate is functionally equivalent to always-blocked.

  case-d-file-stale-beyond-300s:
    condition: "data/cf_t9_status.json exists and parses, but file mtime is >300 seconds old"
    consumer-code-path: "bet1_sizing.py:144-171 — os.stat(path).st_mtime; file_age_seconds > CF_T9_HEARTBEAT_MAX_AGE_SECONDS"
    outcome: |
      bet1_sizing.py:157: if file_age_seconds > CF_T9_HEARTBEAT_MAX_AGE_SECONDS (300.0):
        Returns False.
        Structured log: event=CF_T9_STATUS_CHECK, file_age_seconds=<N>,
        block_reason=CF_T9_HEARTBEAT_STALE:<N>s>300s.
      bet1_size_multiplier(False) = 0.0 (BC-1: no-trade).
    fail-safe-enforced: true
    notes: |
      This implements BC-5 (CF-T9 heartbeat failure → halt new Bet #1 trades).
      Clock discipline is correct: os.stat().st_mtime is a wall-clock comparison
      (file creation time vs. current wall-clock), which is the right semantics
      for "is this external artifact fresh?" — different from the HeartbeatWatchdog
      which uses time.monotonic() for elapsed-time measurement.
      The cto-architecture-review.yaml confirms this clock distinction
      ("wall-clock — intentional; comparing file creation time against wall-clock
      to detect stale external artifacts" — bet1_sizing.py module docstring).
      If the cron runs less frequently than every 5 minutes, this will fire BC-5
      correctly and block Bet #1 trades. Operator must ensure cron cadence
      is <300s to avoid chronic false blocks.

  overall-blast-radius-assessment: |
    All four failure cases correctly enforce fail-safe (no trade dispatched).
    The fail-safe direction is consistent and correctly implemented in all cases.
    The one observability gap (case B with type-corrupt JSON that still parses)
    is non-blocking for safety but reduces incident-response speed.
    The structured logging at each decision boundary (event=CF_T9_STATUS_CHECK
    with block_reason enumeration) passes the log-as-decision-trace rubric:
    outcome is named, inputs are logged, source is named (file_path), and the
    skip-path (no-trade) is logged with the reason.

