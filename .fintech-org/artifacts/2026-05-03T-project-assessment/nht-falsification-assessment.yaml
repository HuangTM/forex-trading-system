q4-tier2-joint-probability: 0.18
# Justification (1 sentence, then math): joint = P(STRONG-only ≥10 by T+80) ×
# P(paper Sharpe ≥0.5 over 75 trading days) × P(paper PnL curve persisted).
# Math:
#   Component A — P(STRONG-only ≥10): need 3 more clean-STRONG. Q3 lists 5
#   plausible candidates, all via re-config (low cost). Hit rate to deliver
#   STRONG-with-no-R6 ≈ 0.6 per candidate (config changes can fail to remove
#   R6 if signal density too low). P(≥3 of 5 succeed | hit rate 0.6, indep):
#   sum_{k=3}^{5} C(5,k) 0.6^k 0.4^(5-k) = 0.346+0.259+0.078 = 0.683.
#   BUT: HoQR dispatch must be funded — if paper-launch wave consumes all
#   research bandwidth, dispatch probability ≈ 0.5. Net P(A) ≈ 0.683 × 0.5
#   = 0.34.
#
#   Component B — P(paper Sharpe ≥0.5 over 75 trading days): blended portfolio
#   of vol_target_carry (validated 0.76) at full sizing + carry_fred Bet #1
#   (regime-conditional 0.0/0.25 of 0.80 = 0.20 active, 0.0 inactive) at
#   regime probability 0.5 → expected blended Sharpe ≈ (0.76 + 0.5*0.20) =
#   0.86 if Bet #1 fully active in regime, but more conservatively the
#   portfolio Sharpe of vol_target_carry IS 0.76 already and Bet #1 adds
#   ~0.02-0.05 conditionally. Use μ = 0.65 (deflated for: regime risk,
#   transaction-cost realization gap, validation-window over-fit, paper-vs-
#   live slippage). SE(SR | N=75) = sqrt((1+0.5*0.65²)/75) = sqrt(1.211/75)
#   = 0.127. P(SR_obs >= 0.5 | μ=0.65, σ=0.127) = Φ((0.65-0.5)/0.127) =
#   Φ(1.18) = 0.881. BUT: Lo's IID-Gaussian assumption violated under
#   regime-switching → empirical SE wider by ~30-50%; corrected σ ≈ 0.17;
#   P(SR_obs >= 0.5) = Φ((0.65-0.5)/0.17) = Φ(0.88) = 0.811. Use 0.78
#   (further deflated for the family-wise selection that picked these
#   strategies). P(B) ≈ 0.78.
#
#   Component C — P(paper PnL curve persisted ≥75 trading days): operations
#   risk only (paper trade goes down, retire-trigger fires correctly, NOT a
#   premature halt). Wave-5 paper-loop wiring + Wave-7 BC-4 fix in place.
#   P(C) ≈ 0.85.
#
#   Joint (independence): 0.34 × 0.78 × 0.85 = 0.225. Round down for joint-
#   correlation (paper PnL collapse and STRONG-rejection burst are
#   negatively correlated — bad paper performance cuts research budget):
#   0.18.
#
#   Sensitivity: at HoQR dispatch P=1.0 (full bandwidth on STRONG generation):
#   P(A) = 0.683 → joint = 0.45. At HoQR dispatch P=0.2 (paper-ops absorbs
#   bandwidth): P(A) = 0.137 → joint = 0.09. Range 0.09–0.45; midpoint 0.18.

