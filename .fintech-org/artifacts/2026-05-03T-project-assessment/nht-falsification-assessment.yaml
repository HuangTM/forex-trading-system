body: |
  Q1 — Falsification scorecard. The trials.jsonl portfolio (35 entries) decomposes
  to 8 spawned + 7 complete + 8 exploratory (R3 backfill from CONSENSUS 2026-04-26)
  + 12 rejected. Of the 12 rejections, 8 fired R1/R2/R3 STRONG criteria and 4 fired
  R6-Trades only. Headline ratio: 67% STRONG. But there is a buried subtlety: 6 of
  the 8 STRONG-criteria rejections ALSO fired R6 simultaneously, meaning n_trades<30
  AND R1/R2 below floor — the strategy's Sharpe estimate at sample sizes that small
  is dominated by the start/end dates, so the R1/R2 "fail" is itself sample-size-
  contaminated. Strict "clean STRONG" (R1/R2/R3 fail with n_trades>=30, R6 NOT
  triggered): only 2 of 12 (tas_ceiling_4h, momentum-fdddc2b0). The portfolio
  genuinely falsifies in only 2 cases out of 12 rejections — the other 10 are
  governance-only or sample-leaked.

  Q2 — Historical dissent honoring. Five preserved NHT dissents reviewed. Direction-
  v1 phase 0 task 1.1 (meta-concern '22 trials, 0 falsifications'): partially
  honored — 12 rejections now logged, but 4 are pure-R6 (sample-size only) which
  matches dissent-text's predicted 'unaccountable process' failure mode. Phase-2
  falsification consensus: partially honored — per-strategy pre-regs ARE in place
  (9 .md files in references/pre-registrations/), R1-R6 thresholds ARE frozen and
  applied mechanically in trial rejection texts, but non-overlapping OOS at trial-
  spawn is enforced for only 1 of 13 post-Phase-2 trials (the one PASS); the 12
  rejections all omit oos_window_start/end fields. Phase-2 3d tier verification:
  fully honored — momentum is EXCLUDED from paper launch (stricter than the 0.5x
  cap), Bet #1 regime-inactive sizing is hard zero (stricter than 0.07), Tier B
  gap is preserved as Wave-5 item 4. Wave-5 paper-launch authorization: partially
  honored — items (1)+(4) R6-heavy caveat is acknowledged but not operationally
  addressed (no new STRONG dispatches scheduled), items (2)+(3)+(5) honored. Wave-6
  preflight closure: fully honored — Wave-7 BC-4 producer fix verified by NHT
  re-verification artifact (state file persists, all 4 keys emitted, sacred test
  added).

  Q3 — Path to STRONG-only CONDITION-1. Need 3 more clean-STRONG rejections to reach
  10/10. The strategy registry has 10 entries; 5 already STRONG-rejected, 1 PASSED,
  1 paper-authorized, 1 R6-only (degenerate). Net: 2 untouched candidates inside
  the registry (carry-baseline variants). The realistic path is RE-CONFIG of
  existing strategies to force n_trades>=30 (bypassing R6 to deliver clean-STRONG
  verdicts). Five plausible candidates: (a) vol_target_carry_no_vol_scaling
  multi-regime ablation, (b) tas_ceiling_4h on 1d/1w bars, (c) bollinger_rsi
  shorter lookback, (d) carry_momentum daily rebalance, (e) ma_crossover 5/20
  shorter periods. Sample size needed per candidate: 30+ trades on 2y OOS — all
  achievable via config change without new code.

  Q4 — Tier-2 joint probability. Decomposed as P(STRONG-only ≥10 by T+80) ×
  P(paper Sharpe ≥0.5 | N=75 trading days) × P(paper PnL curve persisted).
  Component A: 5 candidates × ~0.6 hit-rate-to-deliver-clean-STRONG, ≥3 successes
  needed → 0.683 conditional on dispatch; dispatch probability during paper-launch
  wave ~0.5 → P(A) ≈ 0.34. Component B: blended portfolio expected Sharpe ≈ 0.65
  (deflated for regime risk and selection); SE under Lo (1+0.5·SR²)/N formula
  ≈ 0.127, widened to ~0.17 under non-IID forex-with-regime-switching empirics;
  P(SR_obs ≥ 0.5 | μ=0.65, σ=0.17) = Φ(0.88) ≈ 0.81; deflated for family-wise
  selection → P(B) ≈ 0.78. Component C: 0.85 (operations risk + retire-trigger
  correctness, post-Wave-7). Joint under independence: 0.34 × 0.78 × 0.85 = 0.225;
  round down for negative correlation (bad paper PnL cuts research budget): 0.18.
  Sensitivity range: 0.09–0.45 depending on HoQR dispatch bandwidth.

  Q5 — Meta-concern resolution. The Direction-v1 Section 8 concern was '22 trials
  WITHOUT falsifications is itself a falsification of the claim that this org
  falsifies'. Current state (35 trials / 12 rejections / 8 STRONG-criteria / 2
  clean-STRONG / 4 pure-WEAK-R6) PARTIALLY resolves the concern. The harness now
  logs rejections (process change is real and irreversible), and the rate of
  rejection production during Wave-5 was strong. BUT: the composition reveals a
  new failure mode — sample-size truncation has become the de facto rejection
  reason for one third of the portfolio (4/12 pure-R6 + 6/8 STRONG with co-fired
  R6 = 10/12 rejections sample-size-contaminated). The org now falsifies via 'this
  candidate did not produce enough trades to evaluate' rather than 'this candidate
  produced enough trades and they were noise'. The first form is NOT scientifically
  equivalent to the second. The meta-concern is therefore preserved as a NEW
  finding under a refined formulation: '12 rejections of which only 2 are clean
  performance-falsifications on adequate samples is itself a partial falsification
  of the claim that this org performs adequate-sample performance falsification'.
  This is the core dissent-statement preserved below.

