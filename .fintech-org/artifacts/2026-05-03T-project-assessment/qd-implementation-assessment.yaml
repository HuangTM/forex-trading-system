q2-research-to-prod-gaps:
  - strategy: "vol_target_carry"
    gap: "No cost model applied in paper loop. Backtest engine charges spread + slippage + swap per trade (RealisticCostModel). Paper loop has zero cost accounting — costs are implicit in actual broker fills and swap credits, but are never logged or reconciled against expected costs from the cost model. No slippage distribution is captured."
    file_line: "scripts/run_paper_trading_vt.py — no import of RealisticCostModel anywhere in file"
    severity: "medium — P&L drift vs backtest will appear over time; no realized-vs-expected cost tracking"

  - strategy: "vol_target_carry"
    gap: "entry_delay_bars not applied in paper loop. Backtest shifts signals by 1 bar (engine.py:135, 263). Paper loop calls strategy.generate_signals(ohlcv) and uses signals.iloc[-1] immediately (run_paper_trading_vt.py:482). In live trading the signal IS the current bar's signal, so the next execution IS the delay — but this asymmetry is undocumented and creates a conceptual discrepancy."
    file_line: "scripts/run_paper_trading_vt.py:482 vs src/forex_system/backtest/engine.py:135"
    severity: "low (structural asymmetry, not a real-time bug — execution happens next cycle by design)"

  - strategy: "vol_target_carry"
    gap: "constant_capital_sizing mismatch risk. Backtest engine uses constant_capital_sizing=False by default (equity-compounding mode). If the validated Sharpe 0.7594 was computed with constant_capital_sizing=True (matching the reference script vol_targeting.py), then the paper loop using live equity will drift from the backtest curve over time. This needs a CONSENSUS-level clarification of which mode was used for the validated result."
    file_line: "src/forex_system/backtest/engine.py:295 (sizing_equity selection)"
    severity: "medium — sizing mode mismatch causes compounding divergence over multi-month paper run"

  - strategy: "carry_fred (Bet #1)"
    gap: "CarryFREDStrategy.generate_signals() requires a full 12-pair rate_data DataFrame for cross-sectional z-score ranking (carry_fred.py:151). In the paper loop, CarryFREDStrategy is instantiated with no rate_data argument (run_paper_trading_carry_fred.py:634), triggering lazy-load from disk (carry_fred.py:101). If data/rates/rate_differentials.parquet is not present or stale, the strategy falls through to _load_rate_data() which raises FileNotFoundError or returns stale FRED data. No staleness guard on rate data load."
    file_line: "scripts/run_paper_trading_carry_fred.py:634 vs src/forex_system/strategies/carry_fred.py:101"
    severity: "medium — first-bar failure if rate parquet is missing; silent stale-data risk if parquet is from a prior run"

  - strategy: "carry_fred (Bet #1)"
    gap: "No explicit CF-T9 BC-3/BC-4 startup check in main(). regime_active_status() encodes BC-3/BC-4 gates and returns False if not cleared — so the system will refuse trades on the first cycle. But there is no pre-flight assertion that verifies the CF-T9 status file exists before entering the loop. A missing data/cf_t9_status.json will silently produce perpetual SKIP_REGIME_INACTIVE cycles without alarming the operator at startup."
    file_line: "scripts/run_paper_trading_carry_fred.py:638-644 (main() startup — no CF-T9 pre-check)"
    severity: "low — system is fail-safe (skips trades), but operator may not notice CF-T9 is never running"

