# ---------------------------------------------------------------------------
# Q5: Backtest vs paper divergences
# ---------------------------------------------------------------------------

q5-backtest-vs-paper-divergences:
  - area: "Cost model absent from paper loop"
    description: >
      Backtest engine applies RealisticCostModel (spread + slippage + commission on
      entry/exit, swap/carry per bar in continuous mode). Paper loop uses no cost
      model — costs are absorbed implicitly by Saxo SIM fill prices. This means
      the paper loop's equity curve cannot be compared to the backtest equity curve
      without adjusting for the cost model difference. Over a multi-month run this
      divergence compounds.
    file_line: >
      src/forex_system/backtest/engine.py:191 (entry_cost charged) vs
      scripts/run_paper_trading_vt.py — no cost model reference. Same for
      carry_fred: scripts/run_paper_trading_carry_fred.py — no cost model.
    severity: "high — systematic P&L divergence between backtest and paper"

  - area: "entry_delay_bars semantic difference"
    description: >
      Backtest shifts signals by entry_delay_bars=1 (default) before any sizing
      decision (engine.py:135, 263). Paper loop executes on the current bar's signal
      at the next cycle (natural delay from the loop interval). The economic effect
      is equivalent for daily bars at 1800s interval, but the delay is enforced by
      timing (wall-clock) rather than by code, and is not configured or logged as
      an explicit parameter. Any latency or early execution could cause 0-bar delay.
    file_line: >
      src/forex_system/backtest/engine.py:135 (delayed_signals = signals.shift(1))
      vs scripts/run_paper_trading_vt.py:481 (uses signals.iloc[-1] directly)
    severity: "low — equivalent for daily bars at 1800s interval; risk is if interval is reduced"

  - area: "constant_capital_sizing mode undocumented for validation run"
    description: >
      Backtest engine exposes constant_capital_sizing flag (engine.py:46, 295).
      The validated Sharpe 0.7594 (MEMORY.md) was produced by a script (likely
      vol_targeting.py or vol_target_portfolio.py). The paper loop always uses
      live equity (no constant_capital flag exists in the paper loop). If the
      validation was run with constant_capital_sizing=True, the paper loop will
      diverge over time due to equity compounding changing the leverage exposure.
    file_line: >
      src/forex_system/backtest/engine.py:295 vs
      scripts/run_paper_trading_vt.py:502 (sizer.calculate_size uses live equity)
    severity: "medium — sizing divergence over compounding periods; needs clarification"

  - area: "Swap/carry accrual: daily credit vs lump-sum at close"
    description: >
      Backtest continuous mode credits swap daily per bar (engine.py:316-317).
      Paper loop does not explicitly apply swap credits — swap is credited by the
      Saxo SIM account automatically through the broker's daily financing mechanism.
      This is correct for live operation but means the paper loop P&L is driven by
      Saxo's swap model (which may differ from the RealisticCostModel swap_long_pips_per_day
      constants in config/). No reconciliation between broker swap and modeled swap.
    file_line: >
      src/forex_system/backtest/engine.py:316 (daily_swap_pips accrual) vs
      scripts/run_paper_trading_vt.py — Saxo SIM handles swap implicitly
    severity: "medium — swap model mismatch is a known gap but requires broker data to quantify"

  - area: "Fill model: mid vs actual fill"
    description: >
      Backtest records fill_price=mid (execution.py:117) and slippage_pips=0.0
      (execution.py:119) at order placement, with a comment 'Actual fill price comes
      from order confirmation'. No post-fill reconciliation updates the recorded fill
      price in the ExecutionResult. The backtest cost model charges a fixed spread
      (e.g., 2 pips for USDJPY) and slippage at config values. In live SIM fills,
      actual market impact and spread may differ. The realized-vs-expected fill check
      required by the QD role spec is not implemented.
    file_line: >
      src/forex_system/saxo/execution.py:117-119 (fill_price=mid, slippage_pips=0.0)
    severity: "medium — no post-fill reconciliation; realized slippage untracked"

# ---------------------------------------------------------------------------
# Assessment body
# ---------------------------------------------------------------------------

body: |
  Overall verdict: YELLOW. The test suite is healthy (666/666 passing, sacred test
  test_no_lookahead confirmed PASSED), the no-lookahead invariant is intact, and the
  bet1_size_multiplier is fully wired from regime_active_status() through to
  client.place_order() with the paper flag correctly set (live=False). The core
  production path is structurally sound for first paper bar launch. The YELLOW
  rating reflects four categories of implementation gap that should be triaged before
  the paper loop accumulates significant history.

  First, the most material gap is the absence of a cost model in both paper scripts.
  The backtest engine applies RealisticCostModel (spread, slippage, commission, swap)
  on every trade. The paper scripts have no equivalent — they rely on Saxo SIM to
  absorb costs in fill prices. This is operationally correct for execution, but means
  that the paper equity curve cannot be directly compared to the backtest equity curve
  without a post-hoc cost reconciliation step. Over a 60-trading-day paper run (CF-T9
  Clause C window), this divergence will compound. The backtest Sharpe of 0.76 and
  0.80 were computed with explicit cost deductions that are invisible in the paper log.

  Second, the ruff check is not clean — 59 errors across src/ and scripts/, 19 of
  which are in src/. The errors are not on hot-path execution files
  (engine.py, execution.py, bet1_sizing.py, vol_target_carry.py, carry_fred.py are
  all clean), but they exist in ops/, harness/, and risk/kill_switch.py. The kill_switch.py
  E741 ambiguous variable name is the only error in a file that touches the live
  execution path indirectly. All 46 fixable errors can be resolved with ruff --fix
  in a single Wave-8 dispatch.

  Third, the paper_trading_session.log (EQUITY_LOG_PATH, data/paper_trading_session.log)
  is in a mixed state. It currently has 150 lines (grown from 122 since 2026-04-26),
  contains 3 plain-text header lines from a different script (not parseable as JSONL),
  and shows equity values alternating between 1000000.0 and 100000.0 from multiple
  test sessions. Both paper scripts append to this shared path without truncation.
  The correct pre-launch procedure is to archive the file (mv to a timestamped backup)
  and let the first paper bar create a fresh log, not to truncate in-place. The
  verify-clears-on-startup claim in the Wave-7 closure is not supported by the code —
  open(EQUITY_LOG_PATH, 'a') never truncates.

  Fourth, the carry_fred paper loop has a missing pre-flight guard for CF-T9 status.
  regime_active_status() will return False (fail-safe) if data/cf_t9_status.json is
  missing or stale, which causes perpetual SKIP_REGIME_INACTIVE cycles without alarming
  the operator. The operator could run the carry_fred loop for hours believing it is
  active when CF-T9 was never started. A startup assertion checking CF-T9 file existence
  and age is a small addition (Wave-8, ~5 LoC) that would make this failure mode visible.

  Fifth, the constant_capital_sizing mode mismatch is a documentation gap. The
  backtest engine supports both constant-notional and equity-compounding modes. The
  paper loop always uses live equity. If the validated Sharpe figures were computed
  with constant_capital_sizing=True, the paper loop will exhibit different volatility
  targeting behavior during periods of equity drawdown or growth. This needs
  explicit annotation in the run_backtest call that produced the OOS Sharpe 0.76/0.80.

  The bet1_size_multiplier trace (Q4) is fully verified. The multiplier flows from
  bet1_sizing.py:84 → carry_fred.py:332 → carry_fred.py:479 (target_units computation)
  → execution.py:89 (place_order). No bypass exists. regime_active=False produces
  target_units=0 before the execution branch is reached (early return at line 345-350).
  The paper flag (live=False) routes all orders to SIM_BASE, confirmed at line 627.

assumptions:
  - "Validated Sharpe 0.7594 / 0.80 were produced by scripts in this repository; the exact constant_capital_sizing flag value is not verified in this assessment."
  - "The CF-T9 status file (data/cf_t9_status.json) is managed by scripts/monitor_regime_triggers.py which is not assessed in this report."
  - "All 666 tests pass on Python 3.13.3 / pytest-9.0.2 in the project venv; results may differ in a different environment."
  - "Saxo SIM (paper) fills are assumed to correctly implement spread and swap mechanics per the SIM API documentation; no broker-side validation was performed."
  - "The 150-line paper_trading_session.log state was read directly from disk; file contents are assumed to accurately reflect prior test session activity."

