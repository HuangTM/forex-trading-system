body: |
  CRO independent verification of the eight binding constraints authored in
  CONSENSUS_2026-05-02 Section 6 confirms structural wiring is intact across
  both paper-trading entry points (run_paper_trading_vt.py and
  run_paper_trading_carry_fred.py) and the four supporting risk modules
  (exposure_aggregator, bet1_sizing, drawdown_contract, heartbeat_watchdog).

  Item 4 (BC-8): check_dispatch_allowed exists at exposure_aggregator.py:148,
  enforces JPY-correlated cap via comparison snapshot.jpy_correlated_pct >
  max_correlated_pct with raise AggregationGateBlocked, and is invoked in the
  actual pre-trade dispatch path of BOTH loops with explicit
  max_correlated_pct=CRO_MAX_CORRELATED_PCT (=0.15) sourced from a named
  module constant — not a hardcoded magic number. The module enforces the
  no-silent-default discipline: defaults are documentation-only; production
  callers MUST pass thresholds explicitly. This satisfies the
  log-as-decision-trace and kill-switch-design rubrics for testable enforcement.

  Item 5 (BC-1): re-verified independently. bet1_size_multiplier(False) returns
  the named constant BET1_SIZE_MULTIPLIER_REGIME_INACTIVE = 0.0 and
  bet1_size_multiplier(True) returns BET1_SIZE_MULTIPLIER_REGIME_ACTIVE = 0.25
  (carry_fred BC-1/BC-2). The carry_fred loop calls regime_active_status() at
  run_paper_trading_carry_fred.py:329 BEFORE any other risk gate, returns
  SKIP_REGIME_INACTIVE on inactive regime (defense-in-depth: the early return
  prevents subsequent code from reaching the sizing arithmetic at all), AND
  separately the value reaches the actual sizing call at line 477:
  target_units = int(raw_target_units * size_multiplier * effective_dd_multiplier).
  Gap C closure in commit 6a5f5f9 is structurally confirmed.

  BC-3/BC-4/BC-5/BC-7 all use named constants with verbatim CRO Wave-4
  provenance comments and fail-safe-to-halt semantics on every error path.
  drawdown_contract enforces the 10/15/20 ladder via _SIZING_BY_LEVEL map and
  threshold ordering invariant in __post_init__. heartbeat_watchdog uses
  monotonic clock per the clock-and-ordering skill, instantiates a daemon
  observer thread, and the run_cycle entry point blocks new dispatch if
  _HALT_REQUESTED is set. BC-6 runtime enforcement (max 4 strategies, max 6
  positions) is wired via check_dispatch_allowed; the 36-trials-in-12-weeks
  cadence portion is governance and outside the runtime sizing call path.

  Two structural concerns flagged as ASSUMPTIONS rather than vetoes: (1) the
  _JPY_CORRELATED frozenset only contains {USDJPY, GBPUSD} and would silently
  miss EURJPY/GBPJPY/AUDJPY/NZDJPY if those pairs are ever added to the live
  paper book. For Wave-6 first-bar authorization (USDJPY only on both
  strategies), the cap is correctly enforced; for any subsequent universe
  expansion this becomes a Wave-7 blocker. (2) Aggregation across the two
  paper loops works only if both strategies trade in the same Saxo paper
  account (positions visible to each loop's get_positions() call); separate
  accounts would defeat cross-strategy aggregation. Both items belong in the
  operational pre-flight checklist before first paper bar.

  No information-contamination detected: PM redacted criteria contained only
  structured fields (deliverable-type, hard-constraints, instrument-universe,
  binding-constraints-for-verification list). No proposer rationale, no
  researcher hypothesis text, no PM body prose. The disjoint-evidence
  contract is honored. Per cro.md the artifact_type is veto, but the decision
  is approve: all eight binding constraints are structurally wired into the
  trade-sizing call path with named-constant sourcing, fail-safe-to-halt
  defaults, and structured-log instrumentation. CRO has no architectural
  objection to ratifying Wave-6 pre-flight closure on the BC-wiring axis.

  Blowup-analog: Knight Capital 2012 — disabled-but-still-deployed code path
  reactivated by a config flag flip and pumped 4 million orders before any
  human noticed. The defense here is the EXACT inverse: limits are NEVER
  hard-coded in the gate functions; production callers MUST pass thresholds
  explicitly from named constants tracked in the consensus artifact, and
  every gate emits a structured log line on both ALLOW and BLOCK so the
  decision history is reconstructible from log output alone.

