# Body (5-15 sentence review prose)
# ---------------------------------------------------------------------------
body: |
  This review covers two specific Section-10 preflight items (3 and 6) from
  CONSENSUS_2026-05-02, as assigned to the CTO role per the PM acceptance
  criteria artifact. The review rubrics applied are execution-firewall-review,
  log-as-decision-trace, and disposition-level checks from kill-switch-design
  and clock-and-ordering.

  Item 3 (heartbeat_watchdog 300s timeout in main(), on_timeout callback
  verified): The HeartbeatWatchdog implementation in
  src/forex_system/risk/heartbeat_watchdog.py uses time.monotonic()
  exclusively for all timing operations — construction-time default, tick(),
  start(), seconds_since_last_tick(), and the observer loop. Wall-clock
  time.time() is never referenced. This satisfies the clock-and-ordering
  discipline: the watchdog measures real elapsed wall time independent of NTP
  jumps. The 300.0s timeout is supplied at construction in main() via the
  named constant CRO_WATCHDOG_TIMEOUT_SECONDS, not a silent default, which
  is consistent with the no-silent-defaults convention stated in CLAUDE.md
  and the watchdog's own docstring. The on_timeout callback (_on_watchdog_timeout)
  is wired to call halt_paper_loop(), which sets the module-level
  _HALT_REQUESTED flag. The run_cycle() function checks _HALT_REQUESTED at
  entry — before any dispatch logic — and returns early with action code
  HALT_WATCHDOG. The watchdog observer is a daemon thread: it cannot prevent
  process exit, and it calls the callback at most once per gap window (the
  _timeout_fired flag guards against repeated firing). watchdog.stop() is
  placed in a finally block ensuring cleanup on both normal and keyboard-
  interrupt exit paths. Eight unit tests (tests/risk/test_heartbeat_watchdog.py)
  cover the full behavioral surface including a monotonic-clock isolation test
  that patches time.time to epoch 0 and verifies the watchdog still functions
  correctly. Wiring integration tests in
  tests/scripts/test_run_paper_trading_vt_wiring.py further confirm that
  halt_paper_loop() sets the module flag and that run_cycle() is blocked when
  the flag is set.

  Item 6 (auto_retire_on_trigger.py reads cf_t9_status.json; kill-switch
  wired end-to-end per commit e06bf55): The script was introduced in commit
  e06bf55 and is unmodified in ded1356. It reads data/cf_t9_status.json as
  a pure JSON consumer via Path.read_text() / json.loads() — a read-only
  operation with no write-back to the file. The only downstream write action
  is an append to .fintech-org/trials.jsonl (retirement record). The script
  imports only stdlib modules (argparse, json, os, sys, datetime, pathlib)
  and has no import of forex_system.backtest, forex_system.features, or any
  signal-generating module. The "kill-switch" path here is conceptually a
  trial-retirement kill switch (marks the strategy retired in the trials log),
  not the in-process KillSwitch object that flattens positions. These two
  mechanisms are architecturally separate and non-interfering. The tool is
  idempotent: re-running with the same {strategy, trigger-id} pair does not
  write a duplicate record.

  Lookahead invariant: The no-lookahead invariant is preserved. Neither the
  heartbeat watchdog path nor the auto-retire path is imported by or coupled
  to the backtest engine module. The signal-delay mechanism (entry_delay_bars
  in engine.py) is unaffected by the risk wiring additions in ded1356. The
  sacred test (tests/backtest/test_engine.py::test_no_lookahead) passes: 1
  passed in 0.03s on Python 3.13.3 / pytest-9.0.2.

  One minor observability note (non-blocking): the halt_paper_loop()
  function sets a module-level boolean flag (_HALT_REQUESTED). Module-level
  mutable state in a multi-cycle loop is workable but requires that no
  second thread of execution also calls run_cycle() on the same module
  instance. The current paper loop is single-threaded (while True loop with
  sleep), so this is safe for the paper-trading context. This is noted as a
  future-architecture caution if the loop is ever parallelized.

  Both items are approved. The no-lookahead invariant is preserved.

# ---------------------------------------------------------------------------
# Failure modes considered
# ---------------------------------------------------------------------------
failure-modes-considered:
  - >
    FAILURE MODE 1 — Watchdog daemon thread dies silently: The observer is
    a daemon thread; if it raises an unhandled exception, the paper loop
    continues without the watchdog active. Mitigation: the observer loop
    catches exceptions from the on_timeout callback (heartbeat_watchdog.py
    line 196-199) but the _observer_loop itself is not wrapped in a
    top-level exception handler. If the observer crashes before a timeout
    fires, the dead-man switch is silently dead. This is a known gap at the
    module level; it is not introduced by ded1356 and is outside this
    review's scope (architecture-level observation for future hardening).
    Non-blocking for paper launch at current risk envelope.
  - >
    FAILURE MODE 2 — Module-level _HALT_REQUESTED not reset between
    single-shot runs: In the non-loop branch (else: in main()), the flag
    is not explicitly reset to False before the run. If the module is
    re-imported within the same process (e.g., in testing), a stale True
    value could block a subsequent run. The wiring tests reset this
    explicitly (test file lines 131, 234, etc.), confirming awareness.
    Not a production risk since main() creates a fresh process per invocation.
  - >
    FAILURE MODE 3 — parse_gate_output() raises RuntimeError on missing
    file, not a clean exit code: auto_retire_on_trigger.py line 147 raises
    RuntimeError if the gate output file does not exist; this is caught by
    the except Exception block in main() and returns exit code 2. Exit code
    2 is documented. If running from cron, a missing cf_t9_status.json
    (CF-T9 monitor not yet started) will cause a cron alert rather than a
    silent no-op. This is the correct fail-loud behavior per the
    no-silent-defaults convention.
  - >
    FAILURE MODE 4 — Callback exception suppressed, watchdog appears firing
    but halt not set: If halt_paper_loop() raises an exception inside
    _on_watchdog_timeout, the exception is caught by the watchdog's observer
    loop (heartbeat_watchdog.py line 196-199) and logged, but the
    _HALT_REQUESTED flag will not be set. The test
    TestCallbackExceptionHandled confirms the observer survives the raise,
    but the paper loop will continue operating past a watchdog fire if the
    callback itself fails. Low probability given halt_paper_loop() is a
    simple global-variable write, but noteworthy.
  - >
    FAILURE MODE 5 — Lookahead introduced via indirect engine import: If a
    future commit adds an import of the heartbeat or kill-switch modules
    from within the backtest engine, the no-lookahead invariant could be
    threatened. The current separation is clean (confirmed by grep). The
    sacred test remains the functional gate; any such coupling would require
    breaking the test.

