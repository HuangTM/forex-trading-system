body: |
  Per the role contract, I performed source-reading-only adversarial
  verification on BC-4. The subtask asks whether the gate, as
  IMPLEMENTED, can be silently satisfied by a regime detector that
  returns the same value 10 times in a row.

  Direct answer: the gate's CHECK logic, as written in
  bet1_sizing.py:197-222, correctly rejects monoculture — n_readings ≥
  10 is necessary but not sufficient; both_states (seen_true AND
  seen_false) is the second hurdle, and it is enforced. There is no
  env-var, no config flag, no test-mode shortcut around either check.
  An adversarial regime detector that emits 10 TRUE-only or 10
  FALSE-only readings WOULD be rejected by the consumer's
  state-diversity check.

  However, the gate's PRODUCER side is the failure point. The only
  shipping producer of data/cf_t9_status.json
  (scripts/monitor_regime_triggers.py) writes a JSON schema that does
  not include the four keys the consumer reads. There is no module in
  src/ or scripts/ that increments a regime-reading counter. The
  consumer therefore always defaults to n_readings=0,
  seen_regime_active_true=False, seen_regime_active_false=False, and
  the gate trips at the n_readings check before ever reaching the
  state-diversity check. The system fails safe (returns False, blocks
  trades), but the gate is structurally unsatisfiable through normal
  operation.

  This produces a paradox: the BC-4 spec is enforced in code, but the
  enforcement is vacuous because the inputs the enforcement reasons
  over are never produced. To satisfy the gate, an operator must
  hand-fabricate a JSON stub between cron ticks — which (a) the next
  cron run will overwrite, and (b) is not governed by any audit trail
  proving the fabricated readings reflect real observed regime states.
  The adversarial threat shifts from "gate accepts 10 same-state
  readings" (correctly blocked) to "operator hand-writes any payload
  to satisfy the gate" (ungoverned).

  I additionally verified: (a) data/cf_t9_status.json does NOT exist on
  disk today; (b) the producer opens the output file in 'w' mode (line
  392) which truncates+overwrites; (c) auto_retire_on_trigger.py reads
  the file but writes none of the BC-4 keys; (d) the tests in
  test_run_paper_trading_vt_wiring.py:302-374 hand-stub the four keys
  in tmp_path and assert correct consumer behavior — the tests are
  correct, but they prove only that IF a producer existed, the
  consumer would work. They do not prove a producer exists.

  Decision: dissent at severity material_concern. The gate is
  implemented-but-incomplete (consumer correct; producer schema
  mismatched; counter logic absent). The minimum fix is small (≤30 LoC
  in monitor_regime_triggers.py + a persistence-layer test) and
  belongs to QD, not NHT. Until that fix lands, BC-4 cannot be
  truthfully claimed as satisfied by any programmatic evidence.

