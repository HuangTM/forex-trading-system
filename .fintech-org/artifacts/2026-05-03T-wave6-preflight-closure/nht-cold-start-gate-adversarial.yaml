bypass-vectors-found:
  - vector: "producer/consumer schema mismatch — producer never writes the four keys the consumer reads"
    detail: |
      The consumer regime_active_status() at src/forex_system/risk/bet1_sizing.py:184-188
      reads four keys from data/cf_t9_status.json:
        - regime_active        (boolean)
        - n_readings           (int)
        - seen_regime_active_true   (bool)
        - seen_regime_active_false  (bool)
      The ONLY producer of data/cf_t9_status.json in shipping code is
      scripts/monitor_regime_triggers.py (line 387-393). Its evaluate_cf_t9()
      output (lines 273-303) writes a SCHEMA THAT DOES NOT CONTAIN ANY OF
      THESE FOUR KEYS. The producer writes: monitor_id, evaluated_at,
      triggered, clause_a_boj_rate{...}, clause_b_basket_sharpe{...},
      universe, data_freshness, pre_reg_reference, consensus_track_id.
      Result: every payload.get() in the consumer falls back to its default
      (False / 0 / False / False), so n_readings is always 0, the gate at
      bet1_sizing.py:197 always trips, and regime_active_status() always
      returns False. The system fails SAFE (no trades), but the gate is
      NOT EVALUATING WHAT IT WAS DESIGNED TO EVALUATE.
  - vector: "producer overwrites consumer-shaped stubs each cron tick"
    detail: |
      monitor_regime_triggers.py:392 opens the output path in 'w' mode,
      which truncates+rewrites. If an operator hand-writes a JSON stub
      containing the four BC-4 keys to satisfy the cold-start gate, the
      next cron invocation of monitor_regime_triggers.py will OBLITERATE
      the stub. There is no merge logic.
  - vector: "operator-fabricated stub silently passes the gate without any real readings"
    detail: |
      Conversely: nothing in the consumer cross-checks the four BC-4 keys
      against the monitor's own n_readings of the cf_t9_audit.log
      (data/cf_t9_audit.log). An operator who writes
      {"regime_active": true, "n_readings": 99,
       "seen_regime_active_true": true, "seen_regime_active_false": true}
      between cron ticks bypasses the cold-start counter — there is no
      authoritative "regime reading counter" in production code. The
      counting happens nowhere. There is no module that increments
      n_readings or sets seen_regime_active_true/false based on observed
      regime states. The BC-4 spec wording ("CF-T9 must have observed BOTH
      TRUE and FALSE regime states with ≥10 total readings") has no
      programmatic incrementer.

