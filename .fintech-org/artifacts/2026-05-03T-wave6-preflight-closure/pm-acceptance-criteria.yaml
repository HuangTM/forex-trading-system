      tests and reports verbatim pass/fail counts; no inference from source reading
      alone (per engineer-mindset rule 13: verify means execute).

  - role: ops-engineer
    rationale: >
      Pure operational verification (haiku tier): script existence checks, file-mtime
      inspection, stale log detection, cron not-yet-scheduled confirmation. Items 1,
      6, 8, 9 require ops-level checks that do not require reading implementation
      logic. Explicitly not responsible for starting any process.

  - role: null-hypothesis-tester
    rationale: >
      Adversarial review of item 2 (cold-start gate, BC-4). NHT asks: can the gate
      be satisfied silently with all-TRUE or all-FALSE readings, bypassing the
      "both states observed" requirement? This is the highest-risk item from a
      governance perspective — a gate that looks closed but is not. NHT's
      finding either confirms the gate is robust or escalates a named gap to CEO.

