criteria:
  - item: 1
    text: "CF-T9 monitor (`scripts/monitor_regime_triggers.py`) running on cron; `data/cf_t9_status.json` updated within last 5 minutes (file mtime ≤ 300s per BC-3)"
    verification-evidence-required:
      - "Ops Engineer confirms `scripts/monitor_regime_triggers.py` exists and is executable (file presence + `python -m py_compile` passes)."
      - "Ops Engineer confirms no cron entry yet exists (paper loop not started by orchestrator); item is verified-wired as code; cron scheduling is CEO/human-in-the-loop action."
      - "QD confirms the script writes `data/cf_t9_status.json` with a machine-readable mtime-testable field (grep or unit test showing the write path)."
    terminal-state-owner: "QD (code verification) + Ops Engineer (cron not-yet-scheduled check)"

  - item: 2
    text: "CF-T9 cold-start gate satisfied: ≥10 regime-flag readings logged, both TRUE and FALSE states observed at least once (BC-4)"
    verification-evidence-required:
      - "NHT confirms the cold-start gate logic is implemented in code (not only in documentation) — specifically: (a) the check reads the persisted log, (b) it enforces ≥10 readings, (c) it enforces both-states-observed, and (d) it blocks trade dispatch when not satisfied."
      - "NHT adversarial check: can the gate be satisfied with all-TRUE or all-FALSE readings? If yes, report as a named gap (blocked-named-impediment) with fix proposal."
      - "QD runs the relevant unit test(s) or writes a minimal test covering the boundary conditions (9 readings = blocked, 10 all-same = blocked, 10 mixed = pass)."
    terminal-state-owner: "NHT (adversarial verification) + QD (test execution)"

  - item: 3
    text: "heartbeat_watchdog (300s timeout) starts cleanly in main(); on_timeout callback verified in tests"
    verification-evidence-required:
      - "QD reads `src/forex_system/risk/heartbeat_watchdog.py` and confirms the 300s timeout constant is present and connected to the on_timeout callback."
      - "QD runs `pytest` targeting heartbeat_watchdog tests and reports test count + pass/fail output verbatim."
      - "CTO confirms no architectural change to the heartbeat_watchdog path was introduced in commit ded1356 that breaks the no-lookahead invariant (if heartbeat is coupled to backtest engine signal path, flag immediately)."
    terminal-state-owner: "QD (test run) + CTO (architecture review)"

  - item: 4
    text: "exposure_aggregator.check_dispatch_allowed pre-trade gate active; JPY-correlated cap 15% enforced (BC-8)"
    verification-evidence-required:
      - "CRO reads `src/forex_system/risk/exposure_aggregator.py` and confirms `check_dispatch_allowed` is present and enforces the 15% JPY-correlated cap."
      - "CRO confirms the cap value is not hardcoded as a magic number but sourced from config or a named constant (per CLAUDE.md convention)."
      - "QD confirms `check_dispatch_allowed` is called in the actual trade dispatch path in `scripts/run_paper_trading_vt.py` and/or `scripts/run_paper_trading_carry_fred.py` (grep evidence, not just existence of the function)."
    terminal-state-owner: "CRO (constraint verification) + QD (wiring evidence)"

  - item: 5
    text: "Bet #1 size_multiplier source verified to reach the actual trade-sizing code path (not just available as a helper function)"
    status: "CLOSED — preflight 5.5 (commit 6a5f5f9) closed Gap C. Evidence on file."
    terminal-state: "verified-wired-and-tested"
    verification-evidence-required:
      - "QD confirms Gap C closure from commit 6a5f5f9 by reading `scripts/run_paper_trading_carry_fred.py` and showing the line(s) where size_multiplier from `bet1_sizing.py` is consumed in the sizing call path."
      - "CRO independently confirms the 0.0/0.25 regime-conditional values reach the trade-sizing call (not just imported but unused)."
    terminal-state-owner: "QD (already done per 6a5f5f9) — re-verification pass by CRO"

  - item: 6
    text: "auto_retire_on_trigger.py running on cron; reads `data/cf_t9_status.json`; kill-switch wired end-to-end (per commit e06bf55 close R1 A1_C3)"
    verification-evidence-required:
      - "Ops Engineer confirms `scripts/auto_retire_on_trigger.py` exists and is executable."
      - "Ops Engineer confirms no cron entry yet exists (paper loop not started by orchestrator); item is verified-wired as code."
      - "QD confirms the script reads `data/cf_t9_status.json` and wires to the kill-switch path — shows the read call and the exit/halt action downstream of it."
      - "CTO confirms the kill-switch path in auto_retire_on_trigger is consistent with commit e06bf55 closure of R1 A1_C3 and does not re-introduce the lookahead risk."
    terminal-state-owner: "QD + Ops Engineer (code) + CTO (architecture)"

  - item: 7
    text: "Drawdown contract triggers active: 10% halt-new / 15% reduce / 20% full halt"
    status: "CLOSED — preflight 5.5 (commit 6a5f5f9) closed Gap B. Evidence on file."
    terminal-state: "verified-wired-and-tested"
    verification-evidence-required:
      - "QD confirms Gap B closure from commit 6a5f5f9 by reading `src/forex_system/risk/drawdown_contract.py` and showing the three threshold constants and their downstream actions."
      - "QD reports test count for drawdown_contract tests passing."
    terminal-state-owner: "QD (already done per 6a5f5f9) — confirm test count passes"

  - item: 8
    text: "Equity curve write enabled; `data/paper_trading_session.log` file rolling"
    verification-evidence-required:
      - "QD confirms the equity-curve write call exists in `scripts/run_paper_trading_vt.py` and/or `scripts/run_paper_trading_carry_fred.py` — grep or read evidence showing the write path targeting `data/paper_trading_session.log`."
      - "Ops Engineer checks whether `data/paper_trading_session.log` already exists (may be a stale artifact from prior session) and reports file age and line count. If stale data present, flag for CEO awareness — first paper bar may append to stale log rather than start clean."
      - "QD confirms log rolling is configured (e.g., RotatingFileHandler or equivalent) so the file does not grow unbounded."
    terminal-state-owner: "QD (wiring) + Ops Engineer (file state check)"

  - item: 9
    text: "CF-T9 Clause C 60-trading-day deadline logged; calendar reminder set (NHT binding condition 2, Section 3)"
    terminal-state: "blocked-CEO-action"
    blocked-reason: >
      This is a human-in-the-loop administrative action. The deadline cannot be
      set until the paper loop starts (T=0 is unknown until CEO authorizes and
      manually starts). Engineering can verify the deadline is documented in this
      consensus and in the CF-T9 amendment artifact, but cannot create the
      calendar entry or compute T+60 trading days without a known start date.
    verification-evidence-required:
      - "Ops Engineer confirms the 60-trading-day condition is present verbatim in `docs/decisions/CONSENSUS_2026-05-02_paper_launch_authorization.md` Section 3 (cite line numbers)."
      - "PM documents: CEO must set the calendar reminder on the day of first paper bar. Engineering cannot pre-complete this item."
    terminal-state-owner: "CEO — unblocks on day of first paper bar"

  - item: 10
    text: "Launch communication drafted; includes explicit statement that CF-T9 is A+B binding with Clause C pending (NHT binding condition 1, Section 3)"
    terminal-state: "blocked-CEO-action"
    blocked-reason: >
      Launch communication is a CEO-authored disclosure, not an engineering
      deliverable. PM can provide the required verbatim language but cannot
      author or approve the communication on behalf of the CEO.
    verification-evidence-required:
      - "PM provides the required verbatim disclosure clause for inclusion: 'CF-T9 is binding on Clauses A and B. Clause C is accepted as a known-incomplete deferral and is pending ratification within 60 trading days of paper launch.'"
      - "CEO must draft or approve the launch communication before the paper loop is started. Engineering cannot pre-complete this item."
    terminal-state-owner: "CEO — required before first paper bar"

