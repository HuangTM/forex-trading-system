body: |
  ITEMS 1, 3, 4, 5, 7 — VERIFIED-WIRED-AND-TESTED.

  Item 1 (CF-T9 monitor): scripts/monitor_regime_triggers.py compiles cleanly.
  The write call is at lines 392-393 (open(args.output, "w") + json.dump). The
  output JSON includes "evaluated_at" (line 275) as an ISO-8601 UTC timestamp,
  making the file mtime-testable per BC-3. The "triggered" boolean (line 276)
  is machine-readable. Schema is well-formed. No cron entry is expected at this
  stage (paper loop not started by orchestrator) — code verification passes.

  Item 3 (heartbeat_watchdog): The heartbeat_watchdog.py module does not
  define a named 300-second constant internally (design intent: the caller
  must be explicit). Both paper-trading scripts define
  CRO_WATCHDOG_TIMEOUT_SECONDS = 300.0 (vt:80, carry_fred:97) and pass it
  explicitly at HeartbeatWatchdog construction (vt:741, carry_fred:684). The
  on_timeout field is a required Callable at heartbeat_watchdog.py:67.
  pytest heartbeat: 9 passed in 2.44s.

  Item 4 (exposure_aggregator): check_dispatch_allowed is wired in the actual
  per-cycle dispatch path at vt:441 and carry_fred:415. CRO_MAX_CORRELATED_PCT
  = 0.15 is a named constant at vt:74, not a magic number. The call is inside
  the hot path, not in an unreachable branch.

  Item 5 (bet1_sizing re-verify): size_multiplier is computed from
  bet1_size_multiplier(regime_active) at carry_fred:330 and consumed in the
  sizing calculation at carry_fred:477: target_units = int(raw_target_units *
  size_multiplier * effective_dd_multiplier). The 0.0/0.25 conditional values
  reach the trade-sizing call unconditionally — Gap C confirmed closed.

  Item 7 (drawdown_contract re-verify): The three threshold constants are at
  drawdown_contract.py:99-101 (0.10/0.15/0.20). DrawdownLevel actions at
  lines 44-46; sizing multipliers at line 72. pytest drawdown: 22 passed
  in 0.03s. Gap B confirmed closed.

  Item 6 (auto_retire_on_trigger): Script compiles, reads cf_t9_status.json
  at line 149, and writes a retirement record to trials.jsonl at line 139.
  Per CTO architecture review, this is the "trial-retirement kill switch" —
  architecturally separate from the in-process KillSwitch (position flattening).
  This split is correct and consistent with commit e06bf55. The distinction
  matters: operators running auto_retire_on_trigger stop the STRATEGY (trials
  entry), while the in-process KillSwitch stops the LOOP (positions). Both
  mechanisms are present.

  Item 8 (equity curve write / log rolling) — NEEDS-IMPLEMENTATION.
  Neither run_paper_trading_vt.py nor run_paper_trading_carry_fred.py writes
  to data/paper_trading_session.log from within the Python process. The only
  path is the external shell tee -a (settings.local.json:64 allowlist) — a
  fragile approach that silently fails if the operator forgets the pipe. The
  scripts use plain logging.FileHandler (vt:107, carry_fred:121) writing to
  data/ws01_trace.log and data/ws02_trace.log respectively. There is no
  RotatingFileHandler anywhere in scripts/ or src/.

  FIX PROPOSAL for Item 8 (EXCEPTION: small wiring fix, ≤20 lines, ≤2 files,
  consistent with existing _attach_ws0N_file_handler pattern):

  In both scripts, replace logging.FileHandler with RotatingFileHandler and
  add a parallel equity-curve write. Specifically:

    File 1: scripts/run_paper_trading_vt.py
    - Line 107: replace
        handler = logging.FileHandler(path)
      with:
        from logging.handlers import RotatingFileHandler
        handler = RotatingFileHandler(path, maxBytes=10*1024*1024, backupCount=5)
    - Add a new constant (alongside WS01_TRACE_PATH):
        EQUITY_LOG_PATH = "data/paper_trading_session.log"
    - In _emit_ws01() or the main loop, after computing equity each cycle,
      append one JSON line to EQUITY_LOG_PATH via a RotatingFileHandler or
      direct append using the existing structured-log pattern.

    File 2: scripts/run_paper_trading_carry_fred.py
    - Same substitution at line 121.
    - Same EQUITY_LOG_PATH constant pointing to data/paper_trading_session.log.

  This ≤20-line fix closes item 8. It does NOT change any research decision,
  does NOT introduce new abstractions, and is consistent with the established
  _attach_ws0N pattern. Flagged per Wave-6 instructions.

  FULL TEST SUITE: pytest --no-header -q: 665 passed in 16.90s.
  This exceeds the CONSENSUS_2026-05-02 baseline of 594 by +71 tests.
  Sacred test test_no_lookahead: 1 passed in 0.02s.

  DECISION: needs-revision — items 1/3/4/5/7 verified, item 6 verified with
  architectural note, item 8 needs the ≤20-line wiring fix described above.

