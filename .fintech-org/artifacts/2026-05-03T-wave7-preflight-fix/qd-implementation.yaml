body: |
  Task A closes item 2 (CF-T9 cold-start gate BC-4 producer/consumer mismatch). The
  fix is entirely within evaluate_cf_t9() in scripts/monitor_regime_triggers.py and
  takes 21 production lines. A new constant CF_T9_STATE_PATH = Path('data/cf_t9_state.json')
  is added alongside the existing output path constants. The evaluate_cf_t9() signature
  gains an optional state_path parameter defaulting to CF_T9_STATE_PATH for testability
  (existing callers are unaffected). On each invocation the function reads the state file
  (or initializes a fresh default dict if absent or corrupt), increments n_readings,
  sets seen_regime_active_true sticky when clause_a_pass AND clause_b_pass, sets
  seen_regime_active_false sticky otherwise, and writes the state back. All four BC-4
  keys (regime_active, n_readings, seen_regime_active_true, seen_regime_active_false)
  are emitted into the return dict immediately after the existing triggered field.
  No bypass path exists: there is no env-var, config flag, or test-mode hook that
  allows skipping the read-modify-write block.

  Task B closes item 8 (RotatingFileHandler + equity-write). In both paper trading
  scripts, logging.FileHandler is replaced with RotatingFileHandler(path,
  maxBytes=10*1024*1024, backupCount=5) and the RotatingFileHandler import is added.
  EQUITY_LOG_PATH = 'data/paper_trading_session.log' constant is added alongside the
  existing WS0N_TRACE_PATH constant in each file. After the _emit_ws01/_emit_ws02
  main-path call in run_cycle() (the point where equity is a confirmed float), a
  plain open(EQUITY_LOG_PATH, 'a') appends one JSON line per cycle. The vt script
  writes {ts, strategy, equity}; the carry_fred script includes regime_active in
  addition since it is available at that call site.

  Verification: pytest tests/scripts/test_cf_t9_monitor.py -v produced 14 passed
  (14/14, exit 0). pytest --no-header -q produced 666 passed in 16.71s (no regressions
  vs the pre-change baseline of 665 tests — net +1 from the new BC-4 sacred test; the
  full suite now includes the new test). The no-lookahead sacred test
  tests/backtest/test_engine.py::test_no_lookahead passed. Two-invocation Python
  harness confirmed n_readings goes 1->2 and seen_regime_active_false is sticky.
  The data/cf_t9_state.json file was created in the working directory by test runs.

  One finding worth flagging: the existing TestEvaluateCFT9 tests do not pass
  state_path and therefore write to the real data/cf_t9_state.json during pytest runs.
  This is a pre-existing isolation gap not introduced by this change. The new
  TestBC4PersistentCounter test correctly uses tmp_path. This gap is documented
  as an assumption but is not a blocker for NHT re-verification — NHT is verifying
  the production code structure, not test isolation.

  Total production LoC added: 36 across 3 files (21+7+8), within the ≤50 budget.
  Test file adds 37 LoC separately. No new abstractions introduced. No research
  decisions baked in. No paper loop started. No capital at risk.

