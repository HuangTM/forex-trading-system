race_window_assessment: |
  Saxo /port/v1/netpositions is queried with ClientKey scope (saxo/client.py:334-338).
  For retail accounts ClientKey == AccountKey (codebase comment, client.py:218), so
  both loops, when correctly pointed at the same account, do see each other's settled
  net positions. compute_exposure() and check_dispatch_allowed() are pure snapshot
  functions and aggregate over whatever positions list is passed — so the WIRED scope
  is portfolio-wide-on-the-account.

  HOWEVER: each loop reads positions at run_cycle start (vt.py:474, carry_fred.py:454),
  performs check_dispatch_allowed, then dispatches an order via SaxoExecutionBackend.
  There is NO cross-process critical section spanning [read → check → dispatch]. The
  Saxo order-to-/netpositions visibility latency (sub-second to several seconds in
  practice) creates a race window in which loop A's just-dispatched order is in flight
  while loop B reads stale netpositions, sees aggregate at 14%, and dispatches its own
  +5% — yielding transient aggregate ~24% before either loop's next cycle reconverges.

  In steady state (both loops re-reading each cycle) the system tends back toward
  ≤15%, but BC-8's quantitative clause is strict ("at any bar before any new trial
  dispatches", CONSENSUS_2026-04-28.md:51). Transient overshoot during the race
  window is a BC-8 breach. The account-key parity gate addresses the multi-account
  15× framing; it does NOT add any cross-process serialization on the dispatch path.

recommended_residual_control: |
  Cross-process exposure-budget primitive. Two viable shapes:
  (a) Pre-dispatch advisory file-lock (fcntl LOCK_EX, atomic O_CREAT|O_EXCL) around
      [backend.get_positions → compute_exposure → check_dispatch_allowed → execute_signal].
      Holds for the duration of one dispatch only; serializes two loops on one account.
  (b) Per-strategy budget tickets summing to BC-8 cap: each loop allocated a static
      half (7.5%); each loop self-enforces its own budget; portfolio aggregate ≤15%
      by construction. Simpler, more conservative, no cross-process synchronization.
      Recommended for Wave-9 if cross-process locking is not implemented immediately.
  Until either is in place: BC-8 closure should NOT be claimed on the basis of
  Wave-8 account-key parity alone, and second-loop authorization (carry_fred regime-
  conditional) should remain BLOCKED.

