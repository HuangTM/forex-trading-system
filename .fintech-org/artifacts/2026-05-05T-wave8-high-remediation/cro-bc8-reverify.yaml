    Exact Saxo SIM order-dispatch to /netpositions visibility latency is
    not measured. If latency is verified < 100 ms in SIM AND each loop's
    cycle period is ≥ several minutes, race-window severity is reduced
    (from "easy to hit" to "narrow but nonzero"). Severity remains
    material_concern under BC-8's strict at-any-bar clause regardless,
    but the operational frequency would be lower.
  - >
    Whether Saxo retail accounts can run with two simultaneously-active
    OAuth tokens on the same ClientKey at all. If Saxo enforces
    one-token-per-account (single-session), the multi-strategy-on-one-
    account scenario is structurally impossible and BC-8 closure status
    would change to closed-by-parity-gate-alone. CRO has not verified
    this; recommend QD operational test before lifting the veto.
  - >
    Whether either paper-loop script could be amended to share a single
    SaxoExecutionBackend instance via in-process orchestration (one
    parent process, two strategy threads), which would collapse the
    cross-process race into in-process check-and-dispatch under a
    threading.Lock. Architectural alternative not evaluated here;
    routed to QD/CTO if the residual-control path moves to design.
