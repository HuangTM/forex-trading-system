blowup-analog: |
  Knight Capital, August 2012. The defective router and the SMARS execution
  pathway each independently honored their local guards, but the firm had no
  cross-system aggregate-rate kill switch. Independently-correct local controls
  failed to enforce a portfolio-level invariant under concurrent dispatch. The
  Wave-8 multi-strategy-on-one-account scenario is structurally analogous: two
  loops each independently enforcing a per-process 15% gate is not equivalent
  to one portfolio-wide 15% gate when there is no cross-process serialization
  on the dispatch path.

