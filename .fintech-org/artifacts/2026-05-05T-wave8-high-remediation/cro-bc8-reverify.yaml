body: |
  CLAIM UNDER TEST: "Wave-8 account-key parity gate (HIGH-2) closes BC-8
  ~15× over-exposure concern."

  RE-VERIFICATION RESULT: claim FAILS in the multi-strategy-on-one-account
  scenario. The parity gate addresses the multi-account 15× scenario (where
  the firm-level book is split across two unaggregated Saxo accounts) but
  does not address the multi-strategy-on-one-account 2× transient scenario
  (where two loops on one account race on dispatch).

  STRUCTURAL ANALYSIS:

  Q1 — get_positions scope: account-level. /port/v1/netpositions with
  ClientKey returns all positions on the account. Each loop, when pointed
  at the same account, sees the other's settled positions.

  Q2 — exposure_aggregator scope: portfolio-wide as wired. compute_exposure
  is a pure aggregator over the passed list; the paper-loop scripts pass the
  full account-level position list. So in steady state with no race, the
  15% cap is enforced portfolio-wide.

  Q3 — Saxo /netpositions docs: do not explicitly disambiguate cross-token
  isolation, but state position visibility is governed by token-account
  access. Codebase comment + standard retail semantics support
  account-level scope.

  Q4 — BC-8 contract framing: the BC-8 clause requires "at any bar before
  any new trial dispatches" — strict, not amortized. Transient overshoot
  during a dispatch race window is a contract violation.

  THE RACE: The wired control sequence is read → check → dispatch with no
  cross-process lock. A loop A dispatch in flight is invisible to loop B
  on its read. Loop B can pass check_dispatch_allowed on stale aggregate
  and dispatch its own size, transiently breaching BC-8. The parity gate
  does nothing to address this — it only ensures both loops are pointed
  at the same account.

  KNIGHT-CAPITAL ANALOG: independently-correct local guards do not
  enforce portfolio-level invariants under concurrent dispatch.

  REQUIRED RESIDUAL CONTROL: a cross-process serialization primitive
  on the dispatch critical section, or static per-strategy budget
  tickets summing to BC-8 cap. Until either is in place, second-loop
  authorization should remain BLOCKED and BC-8 closure should not
  be claimed on Wave-8 alone.

