# Wave-8 specific decision content
account_key_gate_design:
  recommended_option: B
  recommended_option_description: |
    Option B (process-pair lock via launcher script) with one mandatory addition: it
    must call SaxoClient.get_account_info() FOR EACH child loop (separately, with each
    loop's resolved SAXO_TOKEN) and assert AccountKey equality BEFORE either child
    process is allowed to dispatch its first cycle. The launcher writes a single
    parity record to data/paper_account_key_lock.json containing
    {launch_ts, account_key, vt_pid, cf_pid, token_fingerprint_vt, token_fingerprint_cf}
    (token fingerprint = SHA-256 of the raw token, truncated to 12 chars — never the
    raw token; per log-as-decision-trace item 7 no-secret-leak).

    Each child loop, at startup (BEFORE the first run_cycle invocation, BEFORE any
    fetch_account_equity call, BEFORE the watchdog.start()), reads the lock file,
    asserts that its own backend.account_key equals the locked value, and if not,
    halts with a structured log entry event="startup.parity.failed" and exit code
    non-zero. If the lock file is absent or older than its stale TTL (default 6h),
    the child halts and instructs the operator to re-run the launcher.

    Why B over A: option A (pure shared state file with stale-detection) creates a
    TOCTOU window — loop-1 writes the file, loop-2 reads but each loop's account_key
    is computed from its own client.get_account_info() which can disagree even when
    the file passes its read. Option B forces both loops' AccountKey resolutions to
    be MEASURED ONCE, by the launcher, against the actual Saxo /port/v1/accounts/me
    response under each token, and locked before either loop runs. The lock file is
    a record of what was verified, not the verification itself.

    Why not C: an environment-variable-only check (e.g., assert SAXO_TOKEN identical
    across env) is insufficient — the same token CAN resolve to different account
    keys depending on the OAuth scope it was issued under, and conversely two different
    tokens issued for the same Saxo client account WILL resolve to the same AccountKey.
    The authoritative identity is the API response, not the env var.
  testability_in_production: |
    Knight-class testability rubric (per kill-switch-design SKILL.md properties 1-5):

    Property 1 (out-of-band): the parity check runs at process startup BEFORE the
    paper loop authenticates to Saxo for ordering. It does not depend on either
    target loop being healthy. PASSES.

    Property 2 (operable by junior on desk): the test is `python scripts/launch_parity_test.py
    --simulate-mismatch` which spawns a synthetic mismatch (e.g., uses a fake AccountKey
    in the second child's environment) and asserts the second child halts at startup
    with the expected log event. One command, one assertion. PASSES.

    Property 3 (SLA): startup-gate halt SLA is "before first dispatch cycle" — i.e.,
    < interval (default 1800s). In practice the gate fires within seconds of process
    start (one HTTP call to Saxo /port/v1/accounts/me + one file read). Measure on
    every test run; record p99 in data/parity_gate_test_results.jsonl. PASSES with
    measured number.

    Property 4 (testable in prod without causing the outage it prevents): YES — the
    test injects a deliberate mismatch via a launcher --simulate-mismatch flag that
    forces one child's resolved AccountKey to differ from the lock file. The actual
    paper trading does not start; the gate fires; the test asserts the halt. The
    outage prevented (over-exposure via dual accounts) is NOT staged in the test —
    only the detection mechanism is. The Knight lesson is satisfied: the same code
    path the gate uses in real failure IS the code path under test. There is no
    "developer-only test endpoint."

    Property 5 (observable & attributable): the gate emits one structured log entry
    per outcome (pass / fail) per log-as-decision-trace items 1, 2, 5, 6:
      event="startup.parity.checked" (pass path), or
      event="startup.parity.failed" (fail path),
      with fields: account_key (truncated to first 6 + last 4 chars), expected_account_key
      (same redaction), token_fingerprint, lock_file_age_seconds, pid, role, decision_ts,
      receive_ts, exit_action.
    Reconstructible from logs alone; no debugger required.

    Verdict: design satisfies all five kill-switch properties. Approval pending QD's
    implementation passing the testability rubric on the actual code, not just the
    spec.
  failure_modes_considered:
    - "Same SAXO_TOKEN, two child processes: account_key resolves identically; gate passes; intended behavior."
    - "Different SAXO_TOKEN, same Saxo client account: account_key still resolves identically (per saxo/client.py:262-268 — AccountKey is per-Saxo-account, not per-token); gate passes; intended behavior."
    - "Different SAXO_TOKEN, different Saxo client accounts (the over-exposure failure mode): account_key resolves to two different values; gate fires on the second child; second child halts; intended behavior."
    - "Lock file present but stale (older than TTL): each child halts and surfaces a clear operator instruction to re-run launcher; intended behavior. Stale TTL chosen 6h to be longer than longest expected paper trading session segment but short enough that yesterday's lock cannot satisfy today's parity check."
    - "Lock file absent: each child halts. Loop scripts CANNOT be invoked directly without the launcher having run first. Per PM acceptance no_paper_loop_start_by_orchestrator constraint, this is reinforcement, not a regression."
    - "Lock file present but tampered (account_key value forged): the child still computes its own account_key from the live Saxo API; if it disagrees with the locked value, the child halts. The lock file is reference, not source-of-truth. Property 1 (out-of-band) preserved — the live API call cannot be subverted by file modification."
    - "Race between two child processes BOTH writing the lock file: not possible by design — only the launcher writes; child loops only read."
    - "Saxo API transient failure during launcher's parity verification: launcher itself halts (does not start either child). Same fail-closed semantics."
    - "Operator manually starts run_paper_trading_*.py outside the launcher: child reads missing/stale lock file and halts. The startup gate is the protection, NOT a launcher-only convention."
    - "DST / timezone in the stale-TTL check: the lock file timestamp is ISO-8601 UTC; stale comparison uses time.time() against the parsed UTC ts. Per clock-and-ordering item 3 (timezone explicit) and item 9 (DST), no wall-clock arithmetic ambiguity."
  bypass_paths_audited:
    - "Env var override (e.g., FOREX_SKIP_PARITY_GATE=1): EXPLICITLY FORBIDDEN. No environment-variable bypass is permitted in the gate code path. If QD adds one for testing, the test suite must verify the env var has NO effect in non-test branches. Per kill-switch-design property 1 — bypassability is exactly the Knight class."
    - "Lazy evaluation of backend.account_key: AUDITED. Per src/forex_system/saxo/execution.py:35-38, account_key is a @property that lazy-evaluates on first access. The gate must FORCE evaluation at startup (call backend.account_key explicitly before the gate runs) to ensure the property has been resolved, not just checked. Otherwise the test passes against an unresolved None vs lock value."
    - "Test-mode shortcut: if a future PR adds a `--paper-skip-parity` CLI flag for dev convenience, this is a Knight-class regression. The pre-trade gate must NOT be CLI-bypassable. CI must include a test asserting that no such flag exists in either run_paper_trading_*.py."
    - "Child loop spawned with --no-loop single-shot mode: STILL must pass the gate. Single-shot mode does not exempt the parity check; one-shot orders are over-exposure orders too."
    - "Operator running scripts in tmux/screen with a manually-set SAXO_TOKEN that bypasses the launcher: the child still calls saxo/client.py:get_account_key() and compares to the lock file; lock file absent → halt. No scenario where the gate is silently skipped."
    - "Sentinel value collision: if a test fixture writes a placeholder account_key like 'TEST-KEY' into the lock file, AND a child resolves the SAXO_TOKEN to the same string, the gate would pass spuriously. Mitigation: the launcher writes a sha256-hashed sentinel alongside the raw account_key, and the child verifies BOTH match. Defense-in-depth against fixture pollution into prod."
    - "Heartbeat-watchdog overlap: the parity gate runs BEFORE watchdog.start() per the recommended startup ordering. A watchdog timeout cannot mask a parity failure because the watchdog is not yet armed. PASSES."
    - "Drawdown contract instantiation: dd_contract is created in main() AFTER the parity gate would fire. If parity fails, dd_contract is never instantiated — process exits cleanly. No state leak."

cost_model_wiring_risk_assessment:
  drawdown_contract_interaction: |
    SUBSTANTIVE INTERACTION RISK identified. Per src/forex_system/risk/drawdown_contract.py:132-146
    and scripts/run_paper_trading_vt.py:394-428, dd_contract.assess(equity) consumes equity from
    fetch_account_equity() which returns Saxo's TotalValue (saxo/client.py:214-222). Saxo's
    TotalValue ALREADY reflects fills net of spread + commission + accrued swap as posted by the
    SIM venue. If Wave-8 wires explicit cost-deduction into the equity-write path AND that
    deducted-equity value is passed to dd_contract.assess(), the contract will DOUBLE-COUNT
    costs and fire the BC-7 ladder (10% / 15% / 20%) at LOWER true drawdowns than intended.

    Concrete numerical risk: with USDJPY round-trip cost ~3 bps per trade and rebalance threshold
    ~20%, a paper session that triggers one rebalance per week over 20 weeks accumulates ~60 bps
    of synthetic double-counted cost. Material over the contract's 10% halt-new threshold
    margin if the paper loop's true drawdown is hovering near 9%.

    Mandatory architectural rule for Wave-8 cost-model wiring: explicit cost-deduction is for
    research/reporting (the equity-curve write to data/paper_trading_session.log:566-568) ONLY.
    The equity value passed to dd_contract.assess(), kill_switch.check_and_trigger(), and
    kill_switch.record_equity_fetch_*() MUST remain the raw Saxo TotalValue. No cost subtraction
    on the risk-contract path.

    The reverse failure (under-firing) is also possible if the explicit cost deduction is
    SMALLER than Saxo's actual fill-cost embedding (e.g., model-spread < realized-spread). In
    that case the explicit-cost equity-curve OVERSTATES P&L vs Saxo's number and the
    research-reported drawdown LOOKS smaller than the contract-tracked drawdown. Operationally
    this means the equity-curve report (research view) and the BC-7 ladder fires (risk view)
    will disagree — operator must be trained to read BC-7 fires from the dd_contract log line
    (event="drawdown_contract_*"), not from the equity-curve plot.

    Recommended pattern: emit BOTH values to the equity log:
      {ts, strategy, raw_equity_saxo, explicit_costs_deducted, derived_equity_research}
    The dd_contract sees raw_equity_saxo only. The research dashboard plots derived_equity_research.
    No silent rewriting of one to the other. Per log-as-decision-trace item 3 (source named) and
    item 8 (structured fields).
  bc8_aggregation_unaffected: true
  recommended_test_addition: |
    Add tests/scripts/test_wave8_cost_model_dd_invariance.py with two test cases:

    Test 1 (no double-count): instantiate DrawdownContract with a synthetic equity sequence
    that crosses the 10% threshold at index N. Wire the cost-deduction primitive to subtract
    a fixed cost (e.g., 0.5 bps per cycle) into the equity-curve write. Assert dd_contract.assess()
    fires HALT_NEW_DISPATCH at the SAME index N as a baseline run with no cost deduction. If
    the assertion fails, cost deduction is leaking into the dd path.

    Test 2 (BC-8 unaffected): compute_exposure() consumes Position.size and Position.entry_price
    (src/forex_system/risk/exposure_aggregator.py:117). Both fields come from
    backend.get_positions(), which reads Saxo's NetPositions endpoint — neither is touched by
    paper-loop equity-write logic. Test asserts that a non-trivial cost-deduction in the equity
    path leaves an identical ExposureSnapshot vs the no-cost-deduction control. This protects
    BC-8 (15% JPY cap) from accidental coupling via shared globals or instrumentation.

    Both tests must run within the existing 666-test budget (PM hard constraint
    total_test_count_must_not_decrease=666 — the addition replaces existing dd-contract tests
    1:1 OR genuinely adds 2; PM must reconcile in acceptance-criteria delta. Flagged for
    PM consensus.)

