body: |
  Risk-architecture summary across two HIGH-priority concerns.

  CONCERN 1 (cost-model wiring): the substantive risk is double-counting. The drawdown
  contract (BC-7) consumes equity from Saxo's TotalValue, which already embeds SIM-posted
  costs. If Wave-8's explicit cost-deduction primitive feeds its output into the
  dd_contract.assess() input — even by accident through a shared variable — the BC-7 ladder
  will fire at lower true drawdowns than the contract calibration intended. Mitigation is
  architectural separation: explicit cost deduction is research-side instrumentation written
  to the equity log, never the value passed to risk-contract primitives. BC-8 aggregation
  is unaffected because it consumes Position objects from backend.get_positions(), which is
  not in the equity-write path. One mandatory test addition (cost-DD invariance) anchors
  the rule structurally.

  CONCERN 2 (account_key parity): the failure mode is Knight-class — protective control
  exists (BC-8 15% JPY cap) but does not function under the dual-account configuration. The
  exposure aggregator queries one account's positions; the other account's USDJPY position
  is invisible. Recommended option B: launcher-mediated parity verification with a written
  lock file that each child loop reads at startup AND independently verifies its own
  resolved account_key against. This is testable in production via a --simulate-mismatch
  injection that exercises the same code path the real failure would, satisfying all five
  kill-switch properties. Bypass paths enumerated and audited; the most important guarantee
  is that no env var or CLI flag can disable the gate. size_multiplier=0.0 means: if the
  parity check fails, the second loop does not start (full halt of the second strategy
  pending operator action), per the failure-closed default.

  Decision: SIZE-REDUCED with size_multiplier=0.0 conditional on the parity gate. The
  reduction applies only when parity fails; under nominal (single-account) operation,
  full per-strategy sizing is restored. This is the kill-switch-design pattern of
  fail-closed default with a fast-path normal operation.

  Out-of-scope reaffirmed: no _JPY_CORRELATED expansion, no risk-contract modification,
  no new strategies. Wave-8 is a 50-LoC remediation in 4-file budget; CRO assessment is
  scoped to that envelope.

