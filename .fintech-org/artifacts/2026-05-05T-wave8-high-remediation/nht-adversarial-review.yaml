body: |
  NHT prior: every claim is wrong until evidence shifts the prior.

  Claim 1 (cost-model parity) shifts prior partially. The wiring DOES invoke
  RealisticCostModel and DOES write a cost-adjusted value to the equity log.
  But:

  (i) Swap accrual is missing entirely. The PM acceptance criterion HIGH-1c
  enumerates "spread, slippage, commission, AND swap". The submitted code
  invokes only entry_cost and exit_cost; holding_cost is never called.
  For Bet #1 (long USDJPY carry) swap IS the strategy thesis — omitting it
  from the "backtest-equivalent" equity log means the paper-vs-backtest
  comparison curve is structurally non-equivalent on the dimension the
  thesis was supposed to validate. RULE_VIOLATION.

  (ii) The cost is logged but not fed back into operational equity used for
  drawdown-contract assessment, kill-switch, or sizing. The "divergence is
  closed" claim holds only for the log; the control loop continues to use
  raw broker equity. MATERIAL_CONCERN. The HIGH-1c test is a syntactic
  mirror (paper formula vs engine formula) that cannot distinguish a
  correctly-wired implementation from a superficially-wired one.

  Claim 2 (account-key parity gate) shifts prior partially. The gate IS
  invoked before order dispatch (vt.py:735, carry_fred.py:684). It IS
  unit-tested for the obvious mismatch case. But:

  (iii) TOCTOU race on Path.exists() + Path.write_text() — not atomic.
  Two loops launched simultaneously can both pass. The codebase already
  has the atomic write-then-rename pattern (heartbeat) but the lock
  function does not use it. MATERIAL_CONCERN.

  (iv) Stale-lock recovery is documented as "delete the file" — turning
  the gate into operator-advisory under stress. The Knight Capital
  lesson is that gates routinely bypassed by operators do not provide
  the assurance their authors believe. MATERIAL_CONCERN.

  (v) Account-key parity does not close BC-8 ~15x over-exposure in the
  multi-strategy-on-one-account case. The gate addresses the multi-
  account case (15x). It does not address two loops on one account
  each independently enforcing 15% caps that can sum to 30%.
  MATERIAL_CONCERN; CRO must re-verify BC-8 closure.

  Decision: dissent. Severity: material_concern (rolling up the most
  severe of the items above; rule_violation on swap omission is also
  present). Per protocols/full-auto.md the orchestrator should treat
  this as does_block until items (i)-(iv) are remediated; (v) can be
  deferred to Wave-9 with explicit CEO acknowledgment.

