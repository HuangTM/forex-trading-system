claim-tested: |
  Claim 1 (HIGH-1 cost-model parity claim): "After Wave-8, the paper-loop equity
  curve will be backtest-equivalent — i.e., for any given trade tuple (price,
  direction, notional), the cost deducted from paper-loop equity equals the cost
  deducted by the backtest engine."

  Claim 2 (HIGH-2 account-key parity gate claim): "After Wave-8, if both paper-loop
  processes (run_paper_trading_vt.py and run_paper_trading_carry_fred.py) launch
  against different Saxo SIM accounts, the second-launching loop halts before any
  order-dispatch path is reachable."

tests-requested:
  - id: NHT-T1
    description: >
      ROUTE_TO quant-developer: add a parametrized test asserting paper-loop
      equity-write fields equal engine-equivalent values for a held position over
      N days, including swap accrual. Expected for USDJPY long 10,000 over 60 days
      with swap_long_pips_per_day=+0.8: total swap credit = 0.8 * 0.01 * 10_000 * 60
      = $4,800. The current paper-loop wiring records only entry/exit cost on
      action cycles and writes zero on HOLD cycles — swap is silently dropped.
  - id: NHT-T2
    description: >
      ROUTE_TO quant-developer: add a partial-rebalance parity test.
      The backtest engine charges cost on |delta| (engine.py:331-332), not on
      target_units. The paper loop currently charges entry_cost(pair, target_units)
      and computes _cost_usd using full target_units (vt.py:614, 617;
      carry_fred.py:575, 578) — overstating cost on a rebalance-up where
      delta < target_units.
  - id: NHT-T3
    description: >
      ROUTE_TO quant-developer: add a TOCTOU race test on
      assert_account_key_parity. Two threads both observing not p.exists() and
      writing distinct keys must result in deterministic detection on the
      losing-thread side. Current implementation uses Path.exists() + write_text()
      with no file lock, so the loser's distinct key is silently overwritten and
      no SystemExit fires.
  - id: NHT-T4
    description: >
      ROUTE_TO quant-developer: add a stale-lock detection test.
      Lock file with timestamp older than (e.g.) 24h should be treated as stale
      and require explicit operator action — currently no freshness check exists,
      so a 6-month-old lock from a defunct prior session blocks legitimate
      restart with a different account.

