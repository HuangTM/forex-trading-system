      QD reports "150x cost overstatement for USDJPY paper costs vs engine costs"
      and explicitly defers correction to Wave-9.
    severity: material_concern
    evidence:
      - "qd-implementation.yaml:64-67 (items_deferred_to_wave9, USDJPY unit-convention gap)"
      - "qd-implementation.yaml:225-235 (deviations-from-spec, EURUSD substitution)"
    impact: >
      The end-to-end parity test (Fix 3) runs on EURUSD only.  Bet #1 strategy is
      USDJPY-only (regime-conditional carry).  The parity claim therefore is NOT
      directly verified for Bet #1's actual production pair.  The submitted swap
      accrual test on USDJPY exercises the swap formula but not the cost+swap
      composite parity. PM HIGH-1 acceptance criterion requires "cost deducted
      from paper equity is bt-equivalent for any trade tuple" — a 150× cost
      overstatement on USDJPY is NOT bt-equivalent. The ~$4,800 60-day swap
      credit is correct; the per-trade entry/exit cost on USDJPY is wrong by
      a factor of ~150 relative to the engine.
    recommended_remediation: >
      ROUTE_TO: quant-developer + pm. Either (a) fix USDJPY unit conversion in
      paper loop (mirror _to_engine_units = usd_nominal / price for JPY pairs)
      and re-run TestE2EParity on USDJPY; or (b) amend HIGH-1 acceptance to
      explicitly carve out USDJPY from the parity claim until Wave-9 unit
      convention fix lands. (b) is honest but means Bet #1 paper-launch cannot
      claim cost-parity with backtest.

