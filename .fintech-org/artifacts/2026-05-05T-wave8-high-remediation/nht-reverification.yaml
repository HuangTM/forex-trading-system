body: |
  Re-verification followed the structural pattern of attempt 1: read the
  artifact, then read the actual code, then compare. Each finding was
  re-tested against the code on disk, not against QD's prose summary.

  Findings 1, 2, 3, 4 close cleanly. The wiring matches engine.py:316-317
  and engine.py:331-332 exactly; the new tests assert observable values
  (swap_usd numeric, cost_usd != full_target_cost, paper_equity ==
  engine_equity), not just field presence. The TOCTOU race test exercises
  threading.Barrier-synchronized starts and asserts the exactly-one-exit
  outcome that the O_CREAT|O_EXCL atomicity guarantees.

  Finding 5 reduces to concern: the documented advisory ("delete the
  file") is replaced with a double-flag CLI gate. The OS-level rm-bypass
  remains but is not what NHT's finding addressed; the addressed harm
  was operator-priming-via-documentation, which is fixed.

  Finding-K does NOT close. CRO returns a structural veto and recommends
  Wave-9 residual control. CRO's analysis is sound: the paper-loop
  control sequence read → check → dispatch lacks cross-process
  serialization on the dispatch path, so two loops can each pass their
  local 15% gate while collectively breaching BC-8's at-any-bar clause.
  Knight Capital analog is apt.

  Two NEW findings surface during re-verification:

  NEW-1: USDJPY unit-convention divergence. QD's own deferral list
  documents a 150× cost overstatement for USDJPY between paper loop and
  engine. The end-to-end parity test runs on EURUSD because of this gap.
  Bet #1 strategy is USDJPY-only. The parity claim therefore is NOT
  verified for the actual production trade. This is material to Bet #1
  paper-launch authorization.

  NEW-2: The cost-feedback gap (attempt-1 finding 1A) is enumerated in
  QD's deferred items but not closed. The cost-adjusted equity is logged;
  the operational equity used by dd_contract, kill_switch, and sizer is
  not. The "backtest-equivalent" claim is log-only.

  Decision: dissent-reduced (4 findings closed, 1 reduced) but NOT lifted
  (1 finding still blocking + 2 new blocking findings). Overall
  severity: material_concern → does_block: true. Wave-8 cannot
  auto-ratify; CEO escalation required.

