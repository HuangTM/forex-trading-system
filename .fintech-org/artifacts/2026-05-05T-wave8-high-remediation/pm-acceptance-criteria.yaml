body: >
  Wave-8 is a targeted engineering remediation dispatch. Two HIGH-severity items
  surfaced in ASSESSMENT_2026-05-03 must be closed before the first paper bar can
  be authorized by the CEO:

  HIGH-1 (QD lead): Wire RealisticCostModel into the equity-write path of both
  paper-trading scripts so that paper P&L is backtest-equivalent. The current paper
  loop absorbs costs implicitly via Saxo SIM fill prices without explicit logging,
  causing the paper equity curve to diverge from the backtest curve over the 60-bar
  CF-T9 Clause C window. The fix is ~30 LoC across run_paper_trading_vt.py and
  run_paper_trading_carry_fred.py; it does not touch src/.

  HIGH-2 (QD + CRO joint design): Add a startup account_key parity assertion that
  halts the second paper-loop process if both loops detect different Saxo paper
  accounts. Without this, combined USDJPY notional could silently reach ~225% of
  single-account-equity vs. the 15% CRO BC-8 intent — a ~15x over-exposure. The
  concrete mechanism (state file, env var, IPC) is a Wave-2 CRO + QD design
  decision; the acceptance criterion specifies only the behavioral gate.

  Fan-out sequence: Wave-1 (PM, this artifact) → Wave-2 parallel (QD implementation,
  CRO risk re-verification, NHT adversarial review) → Wave-3 (Principal Reviewer
  alone) → Wave-4 (PM CONSENSUS). CRO receives redacted input only (hard-constraints
  + out-of-scope; no task-statement or body prose). NHT and QD receive full input.

  Wave-8 does NOT start the paper loop, does NOT run backtests, does NOT register
  new trials, and does NOT modify any ratified consensus document or NHT dissent
  artifact.

