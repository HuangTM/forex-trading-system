    description: >
      RealisticCostModel (or the equivalent cost-deduction primitive from
      src/forex_system/costs/model.py) is imported and invoked in the equity-write
      path of scripts/run_paper_trading_vt.py so that spread, slippage, commission,
      and swap costs are deducted from paper equity on each trading cycle, making
      the paper equity curve backtest-equivalent.
    verification: >
      Code review: grep or Read confirms import + invocation in run_paper_trading_vt.py
      equity-write path (same path as the RotatingFileHandler equity-write wired in
      Wave-7 Task B, scripts/run_paper_trading_vt.py:566-568 area).

  - id: HIGH-1b
    description: >
      RealisticCostModel (or equivalent) is imported and invoked in the equity-write
      path of scripts/run_paper_trading_carry_fred.py under the same equivalence
      requirement as HIGH-1a.
    verification: >
      Code review: grep or Read confirms import + invocation in
      run_paper_trading_carry_fred.py equity-write path (scripts/run_paper_trading_carry_fred.py:529-532 area,
      the path wired in Wave-7 Task B).

  - id: HIGH-1c
    description: >
      A unit test (or tests) verifies that a known-input cost deduction produces an
      identical numeric result whether computed via the paper-loop call path or via
      the backtest engine call path. Test must assert on a concrete USDJPY trade
      tuple (price, direction, notional) against an expected cost_pips or cost_usd
      value, not merely that "no exception was raised."
    verification: >
      pytest run confirms test passes; test code reviewed for specificity (concrete
      numeric assertion, not just smoke-run).

  - id: HIGH-2a
    description: >
      A startup account_key parity assertion exists that, when both paper-loop
      processes (run_paper_trading_vt.py and run_paper_trading_carry_fred.py) are
      launched, halts the process if a divergent Saxo paper account key is detected.
      The concrete mechanism (shared state file, cross-process check, environment
      variable comparison, or other) is to be designed by CRO + QD in Wave-2; this
      criterion specifies the required behavioral outcome, not the implementation.
    verification: >
      Code review: startup assertion exists and raises or sys.exits with a clear
      error message if account_key mismatch is detected; assertion fires before any
      order dispatch path is reachable.

  - id: HIGH-2b
    description: >
      A unit test simulates divergent account_keys (two processes / two invocations
      with distinct account_key values) and asserts the parity assertion fires
      (raises the expected exception or exits with non-zero code). The test must NOT
      require a live Saxo connection.
    verification: >
      pytest run confirms test passes with a mock/stub backend; test code reviewed
      to confirm it tests divergence, not just same-key parity.

  - id: QUALITY-1
    description: >
      All 666 tests pass after Wave-8 changes. No new test marked xfail or skip
      without written justification in this artifact (a comment in the test file is
      not sufficient; the justification must appear in the QD artifact).
    verification: >
      pytest --no-header -q: exit 0; count reported >= 666; sacred test
      tests/backtest/test_engine.py::test_no_lookahead explicitly confirmed PASSED.

  - id: QUALITY-2
