body: |
  Wave-8 ran two QD implementation attempts and two NHT adversarial review
  attempts against PM acceptance criteria for HIGH-1 (RealisticCostModel
  wiring) and HIGH-2 (account_key parity assertion). QD attempt 2 closed
  four of five NHT attempt-1 material concerns (swap accrual, |delta|
  rebalance cost, end-to-end parity test, atomic O_EXCL lock) and reduced
  the fifth (stale-lock) to a non-blocking concern. 686 tests pass; sacred
  test passes; ruff baseline preserved at 19 errors; forbidden-phrases scan
  clean. Three items remain blocking as of NHT attempt-2 reverification:
  finding-K (BC-8 multi-strategy aggregation — CRO VETO, cross-process race
  window permits transient ~24-30% JPY-correlated exposure), NEW-1 (USDJPY
  unit-convention 150x cost overstatement — parity test deferred to EURUSD),
  and NEW-2 (cost-feedback into operational equity — log-only, dd_contract
  and kill_switch still consume raw broker equity). Principal Reviewer
  independently confirmed finding-K equivalent (F-001/F-002) and added F-003
  (LoC budget 330 vs 50-line hard constraint, 6.6x). CRO and NHT disagree
  on cost-feedback architecture: CRO recommends log-only as correct to avoid
  double-counting; NHT calls log-only a material_concern. That disagreement
  requires a PM spec amendment or CEO ruling and cannot be resolved by
  engineering dispatch alone. Auto-ratification is blocked by both NHT
  does_block: true and PR blocking-findings count: 3. Recommended path:
  CEO accepts documented gaps, authorizes vt-only single-loop paper trading,
  dispatches Wave-9 for BC-8 residual control (7.5% per-strategy budget
  tickets) and USDJPY unit-convention fix.
