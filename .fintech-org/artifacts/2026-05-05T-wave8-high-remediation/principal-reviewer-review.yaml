      pip might differ, or a non-JPY pair with non-0.0001 pip) is added, both
      sites silently mis-cost. The engine and paper loop use parallel
      hardcoded defaults rather than a single shared lookup; per Section A2
      this is a "silent default" pattern even though it is currently
      consistent. The Section C parameter-sourcing question — "where does
      0.01 come from?" — answers "string-match heuristic", which is on the
      "unacceptable answers" list per the rubric. Same pattern at carry_fred.py:634.
    recommended-action-class: tighten-invariant
    quote: "_pip_v = 0.01 if \"JPY\" in pair.upper() else 0.0001"

  - id: F-006
    severity: material
    rubric: execution-firewall-review
    rubric_clause: "Section A2: paper_equity_bt_equiv conceptual semantics undefined — additive, not reconciliation"
    file: scripts/run_paper_trading_vt.py
    lines: "710"
    description: >
      paper_equity_bt_equiv = equity - _cost_usd + _swap_usd. `equity` is the
      Saxo broker TotalValue (fetch_account_equity, line 466). Saxo paper
      account fills already incorporate broker-side spread/slippage on the
      execution side (the executed fill price already reflects cost). Adding
      a separately-computed _cost_usd model deduction yields a quantity that
      is neither (a) what Saxo would show, nor (b) what the engine would show
      for the same trade sequence — it double-counts costs (Saxo fill is
      cost-inclusive on its own, engine cost-inclusive on its own; this sums
      them). HIGH-1a says "deducted from paper equity on each trading cycle,
      making the paper equity curve backtest-equivalent" — but
      backtest-equivalent requires the cost to be computed against the same
      input the backtest sees (mid-price fills, cost-deducted), not subtracted
      from a Saxo-paper-equity curve that already absorbed cost via fill
      price. The semantic choice is a research-class judgment (which
      cost-application semantics to use) appearing in implementation code
      without a spec citation.
    recommended-action-class: escalate-to-owning-role
    owning-role: head-of-quant-research
    quote: "\"paper_equity_bt_equiv\": round(equity - _cost_usd + _swap_usd, 4)"

