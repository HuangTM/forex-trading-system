findings:
  - id: F-001
    severity: blocking
    rubric: execution-firewall-review
    rubric_clause: "Section A: hardcoded threshold/transformation in implementation not present in spec; engine-vs-paper-loop unit semantics diverge"
    file: scripts/run_paper_trading_vt.py
    lines: "684-689"
    description: >
      The paper-loop entry/exit cost formula computes
      cost_usd = cost_pips * pip_v * target_units where target_units is the
      USD-nominal value returned by VolTargetSizer.calculate_size (per
      src/forex_system/sizing/vol_target.py:78 and the docstring at lines 8-13:
      "1 unit = 1 USD of base-currency exposure"). For USDJPY the engine does
      NOT use this product directly; instead, src/forex_system/backtest/engine.py:299
      converts USD-nominal to engine-units via _to_engine_units which divides by
      price for JPY pairs (line 571-572), then computes cost on the converted
      quantity (engine.py:331-332, 491-492). For USDJPY at price 150 with a
      $100,000 USD-nominal position, the engine deducts cost_pips * 0.01 *
      (100_000/150) ≈ $5.00 from equity, while the paper loop deducts
      cost_pips * 0.01 * 100_000 = $750. This is a ~150x divergence at
      USDJPY entry — the opposite of "backtest-equivalent paper equity"
      stated in HIGH-1a/HIGH-1b. The same defect applies to swap accrual at
      lines 697-702 (swap_usd uses cur_units in USD-nominal, while
      engine.py:316-317 uses engine-units). The carry_fred file mirrors this at
      lines 643-648 and 654-656.
    recommended-action-class: clarify-spec
    quote: "_cost_usd = _cost_pips * _pip_v * _trade_units"

  - id: F-002
    severity: blocking
    rubric: review-plan
    rubric_clause: "Testing dimension: integration test bypasses the very semantics under test (HIGH-1c spec)"
    file: tests/scripts/test_wave8_high_remediation.py
    lines: "57-118"
    description: >
      HIGH-1c spec text requires "identical numeric result whether computed via
      the paper-loop call path or via the backtest engine call path" on a
      "concrete USDJPY trade tuple". The test
      test_paper_loop_entry_cost_equals_engine_entry_cost asserts both formulas
      return $75.00 — but the test fabricates a shared SIZE = 10_000.0 input
      that bypasses the engine's _to_engine_units conversion (engine.py:544-573).
      The actual engine pipeline is sizer.calculate_size() → _to_engine_units()
      → cost_dollars; the test calls cost_pips * pip_value * SIZE on both sides
      without ever exercising _to_engine_units, so it cannot detect the unit
      mismatch in F-001. The TestE2EParity class explicitly switches to EURUSD
      (lines 334-407 docstring: "Uses EURUSD (not USDJPY) to avoid the engine's
      JPY unit-convention conversion"), leaving the actual instrument-universe
      (per spec.instrument-universe: [USDJPY]) without an end-to-end parity
      test. The test passes against a formula identity, not the spec contract.
    recommended-action-class: add-test
    quote: "# Uses EURUSD (not USDJPY) to avoid the engine's JPY unit-convention conversion"

