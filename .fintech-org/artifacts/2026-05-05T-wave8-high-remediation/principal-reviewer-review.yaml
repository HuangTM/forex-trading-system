      No .fintech-org/kill-switch-tests.jsonl entry exists for this gate.
    recommended-action-class: add-edge-case-handling
    quote: "Must be called before any order-dispatch path is reachable."

  - id: F-008
    severity: note
    rubric: log-as-decision-trace
    rubric_clause: "Item 6: skipped path logged; the no-action HOLD path emits cost_pips=0 / swap=0 entry"
    file: scripts/run_paper_trading_vt.py
    lines: "686-711"
    description: >
      Positive: the HOLD-FLAT branch at line 686-688 sets _cost_pips = 0.0,
      _trade_units = 0.0 and STILL writes the equity-log entry (line 704-711).
      This is correct per item-6 of log-as-decision-trace (skipped paths
      logged). However, the "skipped" branches that early-return earlier in
      run_cycle (KILL_HALTED at line 464, SKIP_EQUITY_FETCH_FAIL at line 481,
      SKIP_DD_FULL_HALT at line 513, SKIP_DD_HALT_NEW at line 527,
      SKIP_AGGREGATION_GATE at line 566) emit ws01 BUT do NOT write to
      EQUITY_LOG_PATH. So an operator querying the equity log for a single
      cycle's full state will see a gap on every skip-branch cycle, and
      cannot tell from the equity log alone whether a missing entry means
      "cycle ran but skipped" vs "process was down". Cross-correlation with
      ws01 trace is required.
    recommended-action-class: add-log
    quote: "if _HALT_REQUESTED:"

  - id: F-009
    severity: note
    rubric: review-plan
    rubric_clause: "Risk dimension: account_key parity check uses property-access that may emit a network call"
    file: scripts/run_paper_trading_vt.py
    lines: "841-842"
    description: >
      assert_account_key_parity(backend.account_key) at line 842 evaluates
      backend.account_key, which (per src/forex_system/saxo/execution.py:34-38)
