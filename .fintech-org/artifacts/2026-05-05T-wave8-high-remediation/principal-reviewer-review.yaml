  - id: F-005
    severity: material
    rubric: execution-firewall-review
    rubric_clause: "Section A2: silent default; pip_value 0.0001/0.01 derived from string match, not from PairInfo"
    file: scripts/run_paper_trading_vt.py
    lines: "674"
    description: >
      Line 674 computes _pip_v = 0.01 if "JPY" in pair.upper() else 0.0001 by
      string-substring match. The canonical pip-value source is
      src/forex_system/core/types.py PairInfo.pip_value (USDJPY: 0.01 per
      constants.py confirmed via grep). The engine uses
      _get_pip_value(pair) (engine.py:537-539) which performs the SAME string
