    this may accumulate slightly differently from the engine's per-bar accrual.
  - >
    _last_cycle_ts is reset to None at module level. First cycle of a new process has
    _last_cycle_ts=None → swap_usd=0 for that cycle (no prior timestamp). Subsequent
    cycles accrue normally.
  - >
    The is_rebalance flag is set by the existing logic in run_cycle before the equity-write
    block. The equity-write block reads is_rebalance correctly. Both vt.py and carry_fred.py
    set is_rebalance=True only when the fractional delta exceeds rebalance_threshold.

