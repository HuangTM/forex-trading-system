nht_findings_addressed:
  - finding: "NHT Claim 1, Question B (rule_violation) — swap omission"
    fix: "Fix 1"
    description: >
      Added per-cycle swap accrual in both paper loop equity-write paths. Module-level
      _last_cycle_ts tracks wall-clock timestamp between cycles. On each equity-write:
      if a position is held and a prior cycle has occurred, compute days_elapsed and
      _swap_usd = -holding_cost(pair, LONG, 1) * pip_v * held_units * days_elapsed.
      Mirrors engine.py:316-317. Both vt.py and carry_fred.py patched identically.
      paper_equity_bt_equiv = equity - cost_usd + swap_usd (swap is additive for USDJPY long).
    verified_by: "TestSwapAndDeltaFixes::test_swap_usd_nonzero_after_one_day_hold"

  - finding: "NHT Claim 1, Question D (material_concern) — |delta| cost overstatement"
    fix: "Fix 2"
    description: >
      Added is_rebalance branch in both equity-write paths. For rebalance-up cycles,
      cost is now charged on abs(target_units - cur_units) (the delta only), not on
      full target_units. Mirrors engine.py:331-332. Both vt.py and carry_fred.py patched.
    verified_by: "TestSwapAndDeltaFixes::test_rebalance_cost_charged_on_delta_not_full_target"

  - finding: "NHT Claim 1, Question D (material_concern) — syntactic-mirror test"
    fix: "Fix 3"
    description: >
      Added TestE2EParity class with genuine end-to-end test: runs backtest engine
      in continuous mode for EURUSD 5-bar series, runs paper-loop run_cycle once
      from flat, reads equity log, compares paper_equity_bt_equiv to
      engine.equity_curve.iloc[1] (entry bar). Test fails if cost deduction removed.
      Also added TestSwapAndDeltaFixes and TestAtomicLockAndReset classes.
    verified_by: "TestE2EParity::test_entry_cost_parity_engine_vs_paper_loop"

  - finding: "NHT Claim 2, Question G (material_concern) — TOCTOU race in lock acquire"
    fix: "Fix 4"
    description: >
      Replaced Path.exists() + write_text() with os.O_CREAT|os.O_EXCL|os.O_WRONLY
      atomic open in assert_account_key_parity() in both scripts. Race-loser gets
      FileExistsError, reads existing lock, and sys.exit(1) if keys diverge.
      Mirrors heartbeat atomic-write pattern already in this codebase.
    verified_by: "TestAtomicLockAndReset::test_toctou_concurrent_different_keys_one_exits"

  - finding: "NHT Claim 2, Question H (material_concern) — stale-lock advisory bypass"
    fix: "Fix 5"
    description: >
      Removed 'delete the file to reset' operator advisory. Added reset_account_key_lock()
      function and --reset-account-key-lock NEW_KEY + --confirm-account-reset CLI flags
      in both scripts. Reset requires both flags (double confirmation). Reset uses
      tempfile.mkstemp + os.replace for atomic write. Exits 0 after reset so no
      trading loop starts. Error message now instructs 'use --reset-account-key-lock'
      not 'delete file'.
    verified_by: "TestAtomicLockAndReset::test_reset_without_confirm_flag_exits_nonzero"

