body: |
  # Wave-8 Attempt 2 — NHT Adversarial Review Remediation

  ## Summary of Changes (Attempt 2 on top of Attempt 1)

  Attempt 2 addresses 5 NHT adversarial findings from the wave8-adversarial-review:
  Fix 1 (swap accrual), Fix 2 (|delta| rebalance cost), Fix 3 (end-to-end parity test),
  Fix 4 (atomic lock), Fix 5 (reset CLI guard).

  ## Fix 1: Swap Accrual (NHT Claim 1, Question B — rule_violation)

  Both paper loop scripts now accrue daily swap income/cost per cycle held:

    _swap_pips_per_day = -_COST_MODEL.holding_cost(pair, Direction.LONG, 1)
    _swap_usd = _swap_pips_per_day * _pip_v * _held_units * _days_elapsed

  For USDJPY long (swap_long_pips_per_day = +0.8):
    holding_cost = -(+0.8) * 1 = -0.8 (negative = credit)
    _swap_pips_per_day = -(-0.8) = +0.8 (positive credit)
    swap_usd = +0.8 * 0.01 * held_units * days_elapsed

  paper_equity_bt_equiv = equity - cost_usd + swap_usd (swap is additive for carry long).

  ## Fix 2: |delta| Rebalance Cost (NHT Claim 1, Question D)

  Added is_rebalance branch in both equity-write paths. Rebalance-up cycles:

    _rebal_delta = abs(target_units - cur_units)
    _cost_pips = _COST_MODEL.entry_cost(pair, _rebal_delta)
    _trade_units = _rebal_delta   ← cost charged on delta only, not target_units

  Mirrors engine.py:331-332 exactly.

  ## Fix 3: End-to-End Parity Test (NHT Claim 1, Question D)

  TestE2EParity::test_entry_cost_parity_engine_vs_paper_loop:
    1. Runs engine in continuous mode (EURUSD, 5 bars, constant price=1.10,
       entry_delay=1, leverage_cap=1.0, initial_capital=100_000).
    2. Reads engine.equity_curve.iloc[1] (entry bar) = 99_992.5
       (initial 100_000 - entry cost 7.5 = 99_992.5).
    3. Runs vt.py run_cycle once from flat position with matching mocked broker.
    4. Reads paper_equity_bt_equiv from equity log.
    5. Asserts equality within 1e-4 tolerance.
    Test FAILS if cost deduction removed (would be 100_000, not 99_992.5).

  Uses EURUSD (not USDJPY) to avoid JPY unit-convention divergence (documented
  as Wave-9 item: paper loop uses USD-nominal, engine uses usd_nominal/price).

  ## Fix 4: Atomic Lock (NHT Claim 2, Question G)

  Replaced Path.exists() + write_text() with:
    fd = os.open(path, os.O_CREAT | os.O_EXCL | os.O_WRONLY)
    os.write(fd, payload.encode())
    os.close(fd)

  Race-loser gets FileExistsError → reads existing lock → compares keys.
  If divergent: sys.exit(1). If matching: silently returns (same key wins
  regardless of which thread created the file).

  ## Fix 5: Reset CLI Guard (NHT Claim 2, Question H)

  Error message changed from "Delete {lock_path}" to:
    "use --reset-account-key-lock NEW_KEY --confirm-account-reset"

  New reset_account_key_lock() function uses tempfile + os.replace for atomic write.
  CLI requires BOTH --reset-account-key-lock NEW_KEY AND --confirm-account-reset.
  Missing --confirm-account-reset → sys.exit(1) with clear error.
  Successful reset → sys.exit(0), no trading loop started.

  ## Test Suite

  686 tests passing (686/686). 20 tests in test_wave8_high_remediation.py.
  Sacred test (test_no_lookahead) PASS.
  ruff check: All checks passed on all 3 modified files.
  Forbidden-phrases scan: 0 matches.

