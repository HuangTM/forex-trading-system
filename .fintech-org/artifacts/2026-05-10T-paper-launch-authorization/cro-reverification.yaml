knowledge_gaps:
  - id: KG-1
    text: |
      Cross-JPY pairs (EUR/JPY, GBP/JPY, AUD/JPY, NZD/JPY) appear in the PM
      instrument-universe but are NOT in _JPY_CORRELATED. If either paper loop
      ever generates a signal on a cross-JPY pair, the aggregator will treat
      that position's notional as NON-JPY-correlated — under-counting JPY tail
      risk. For Phase 1 (vol_target_carry primary = USDJPY, carry_fred = USDJPY)
      this is not an active gap, but if the strategy scope expands to any cross-JPY
      pair without amending the frozenset, the 15% cap becomes silently wrong.
      RECOMMENDED CEO ACTION: confirm that for paper Phase 1 the only traded pair
      is USDJPY (no cross-JPY signals fire), OR amend the frozenset before
      enabling cross-JPY trading. NOT BLOCKING for current scope.
  - id: KG-2
    text: |
      No verification was performed of WHETHER cross-host or symlink-based
      deployment topologies could defeat the fcntl advisory lock. fcntl.flock
      provides mutual exclusion only between processes on the same kernel
      sharing the same file. If deployment evolves to two-host topology (e.g.,
      paper loops running in containers with separate filesystems), the lock
      becomes vacuous. The current topology (single workstation) is assumed
      and binding; any deployment change is a CRO re-review trigger.
  - id: KG-3
    text: |
      Kill-switch live-promotion gaps (Properties 1/2/3/4) are not assessed
      for closure-pathway here. CONSENSUS_2026-05-06 line 32 records them as
      live-promotion blockers; this CRO artifact CONFIRMS that scoping but
      does NOT propose a remediation plan. That belongs in a separate
      pre-live-promotion review.

