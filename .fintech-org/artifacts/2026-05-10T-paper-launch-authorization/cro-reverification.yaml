body: |
  ## Section A — BC-8 second-loop authorization conditions

  Independently re-verified all four conditions against the current working-tree
  state (post-Wave-10 commit 747a6ad). All four PASS.

  ### A.1 fcntl.flock placement — PASS

  Both scripts acquire fcntl.LOCK_EX|LOCK_NB BEFORE get_positions, before
  check_dispatch_allowed, and before all four execute_signal call sites:

  | Step | vt.py line | carry_fred.py line |
  | --- | --- | --- |
  | fd open | 550 | 531 |
  | flock LOCK_EX\|LOCK_NB | 553 | 534 |
  | outer try: (protected section starts) | 581 | 563 |
  | backend.get_positions() | 588 | 565 |
  | check_dispatch_allowed(...) | 592 | 569 |
  | backend.execute_signal(...) (one of 4 sites) | 802 | 757 |
  | finally: LOCK_UN | 856-858 | 805-807 |

  The lock IS the per-cycle gate around the [get_positions ->
  check_dispatch_allowed -> execute_signal -> reconcile] critical section,
  matching the BC-8 option-B specification verbatim.

  ### A.2 Lock-release on exception path — PASS

  Both scripts use the same try/finally shape:
    - fd opened BEFORE flock attempt (lines 550 / 531)
    - _dl_acquired = False sentinel (lines 551 / 532)
    - inside try, _dl_acquired := True ONLY after flock succeeds
    - BlockingIOError branch closes fd inline and early-returns (no leak)
    - outer try wraps the protected section
    - finally releases ONLY if _dl_acquired, then unconditionally closes fd

  No code path acquires the lock without entering the finally that releases it.
  No code path leaks an fd. Pre-lock early-returns (equity-fetch fail, kill-switch
  trigger, drawdown halts at vt 489/498/521/535) occur BEFORE fd-open, so they
  cannot leak.

  ### A.3 Account-key parity gate — PASS (byte-identical modulo discriminator)

  /usr/bin/diff between assert_account_key_parity bodies (vt:114-165 vs
  carry_fred:131-182) yields exactly ONE differing line: the loop-name
  discriminator inside the error-message f-string ("vt loop" vs "carry_fred loop").
  This is intentional discriminator, not drift. Both functions share:
    - same lock_path constant: data/paper_account_key_lock.json (vt:69, cf:88)
    - same atomic primitive: os.open(O_CREAT|O_EXCL|O_WRONLY)
    - same comparison: _json.loads(p.read_text()).get("account_key", "")
    - same fatal exit: sys.exit(1) on mismatch
  Both scripts invoke the function BEFORE any dispatch path (vt:923, cf:862).
  No drift since Wave-10 commit 747a6ad.

  ### A.4 Concurrent test exists — PASS

  tests/scripts/test_wave10_dispatch_lock.py present, 11 test functions across
  two classes:
    - TestDispatchLockConcurrentProcesses (4 tests): subprocess.Popen workers
      that race for the actual flock primitive, asserting exactly one ACQUIRES
      and one reports SKIP_DISPATCH_LOCK_BUSY (lines 85-230).
    - TestDispatchLockMechanism (7 tests): in-process unit tests of fcntl
      semantics + sentinel-constant existence in both paper scripts (lines
      238-332).
  Worker script (lines 38-67) directly invokes fcntl.flock(fd, LOCK_EX|LOCK_NB)
  and fcntl.flock(fd, LOCK_UN) — the SAME mechanism the paper loops use. Per
  task instruction: presence verified by reading; tests were NOT executed.

  ### A — Verdict: BC-8 LIFTABLE CONFIRMED

  All four conditions PASS. The BC-8 second-loop authorization is LIFTABLE
  conditional on the seven binding_constraints enumerated above. I emphasize:
  this is INPUT to the CEO's decision, not a pre-decided lift. The CEO must
  record the authorization decision in CONSENSUS per SD-2 of the redacted AC.
  If the CEO authorizes, my binding_constraints attach to that authorization
  and bind further changes to require fresh CRO review.

  ## Section B — CRO pre-flight items (SD-4 sources)

  ### B.1 _JPY_CORRELATED frozenset — CONFIRMED

  src/forex_system/risk/exposure_aggregator.py:46:
    _JPY_CORRELATED: frozenset[str] = frozenset({"USDJPY", "GBPUSD"})

  Exact match to CONSENSUS_2026-05-03 Section 6 Assumption 1.

  FLAG (not regression, but architectural note): the PM's instrument-universe
  (redacted-AC lines 6-15) includes cross-JPY pairs (EUR/JPY, GBP/JPY, AUD/JPY,
  NZD/JPY). These are NOT in the frozenset. The module docstring narrows
  "universe EURUSD/USDJPY/GBPUSD" — internally consistent, but a mismatch
  against the broader PM universe. For Phase 1 (USDJPY-only signals) this is
  inert; before enabling cross-JPY trading, the frozenset MUST be amended.
  See KG-1.

  ### B.2 Cross-strategy aggregation single-account requirement — CONFIRMED

  exposure_aggregator.compute_exposure() takes positions: list[Position] with
  no account discriminator. The aggregator is account-agnostic by design;
  correctness depends on positions originating from a single account. The
  single-account contract is enforced upstream by assert_account_key_parity()
  invoked at vt:923 / carry_fred:862 BEFORE any dispatch path. Composition is
  correct.

  ### B — Verdict: BOTH CRO PRE-FLIGHT ASSUMPTIONS HOLD

  CONSENSUS_2026-05-03 Section 6 Assumption 1 and Assumption 2 are accurate
  against the current codebase. CEO may acknowledge both per SD-4 done_when.

  ## Section C — Kill-switch live-promotion blocker scope

  Applied the kill-switch-design rubric (5 properties) to
  src/forex_system/risk/kill_switch.py scoped to PAPER operation.

  ### Property-by-property paper-scope assessment

  - Property 1 (out-of-band): live-FAIL, paper-ACCEPTABLE. In-process; a Python
    crash disables it. No production-account capital at risk in paper.
  - Property 2 (one-button operator action): live-FAIL, paper-N/A. Trigger
    paths (daily-loss, fetch-failure, reconciliation) auto-fire without
    operator intervention; paper operation does not depend on Property 2.
  - Property 3 (declared SLA): live-FAIL, paper-N/A. No declared time-to-stop,
    but cycle cadence IS the effective paper SLA.
  - Property 4 (scheduled prod test against live sessions): live-FAIL,
    paper-PARTIAL. 43 unit tests cover the mechanism; no scheduled live-session
    test.
  - Property 5 (observable / attributable): PASS. JSON-lines audit log meets
    log-as-decision-trace items 1-5.

  ### Paper-loop trigger wiring

  Both paper loops correctly wire all three auto-trigger paths:
    - is_triggered check at cycle start (vt:468, cf:433)
    - record_equity_fetch_failure (vt:476-490, cf:467-481)
    - check_and_trigger(equity) daily-loss (vt:492, cf:483)
    - kill_switch.trigger(TriggerReason.RECONCILIATION, ...) (vt:787, cf:745/792)

  ### C — Verdict: SCOPE CORRECTLY BOUNDED

  Properties 2/3/4 do NOT bleed into paper-loop operation. The paper-launch
  authorization is correctly framed as separate from kill-switch live-promotion
  blockers. CONSENSUS_2026-05-06 line 32 and Wave-9 CRO dissent scoping holds.
  Live-promotion remains gated on a fresh CRO review covering Properties
  1/2/3/4.

  ## Overall decision: approve (size_multiplier 1.0)

  All three re-verification targets pass against the current working tree.
  No regression vs Wave-10 commit 747a6ad detected. BC-8 LIFTABLE is confirmed
  CONDITIONAL on the seven enumerated binding_constraints; the CEO's decision
  remains unconditional within those constraints. size_multiplier = 1.0 — no
  risk-impacting issues uncovered that would warrant reduction. No new dissent
  artifact emitted: this is a routine re-verification with PASS outcomes, not
  a structural risk-architecture objection. Existing Wave-9 CRO dissent on
  kill-switch Properties 2/3/4 (live-promotion blocker) persists append-only
  per dissent-preservation discipline — this artifact does NOT overturn or
  smooth over that dissent; it confirms its scope.

  ## Blowup-analog

  blowup-analog: |
    "none — but adjacent." The BC-8 concern this artifact closes is a
    composite of two historical patterns: (a) MF Global's cross-account
    co-mingling (mitigated here by the account-key parity gate enforcing
    single-account discipline) and (b) Knight Capital's in-flight runaway
    (mitigated by drawdown-contract ladder + per-cycle dispatch-lock + the
    Property 5 auditable kill-switch). The Knight analogy is partial because
    we're paper-only, but the architectural shape — pre-trade gate + at-trade
    kill + observable audit — is the right shape for live-promotion later.

