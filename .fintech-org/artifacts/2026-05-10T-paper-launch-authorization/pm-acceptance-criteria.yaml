    source_reference: "CONSENSUS_2026-05-03_preflight_closure.md:154-164"

  - id: "SD-4"
    label: "CRO pre-flight assumptions acknowledged"
    description: >
      CEO acknowledges both CRO forward-looking assumptions: (1) _JPY_CORRELATED
