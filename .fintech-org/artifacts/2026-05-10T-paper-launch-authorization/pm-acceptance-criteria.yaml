  paper_only: true
  no_live_capital: true
  no_paper_loop_start_by_orchestrator: true
  # Sub-decision 1 — BC-4 cold-start dissent acknowledgment
  bc_4_dissent_acknowledged_verbatim: required
  # CEO must acknowledge the NHT material_concern dissent-statement verbatim
  # from CONSENSUS_2026-05-03_preflight_closure.md Section 3 (cold-start gate
