body: |
  ## Why exactly 6 sub-decisions

  SD-1 through SD-6 are the complete CEO-action set because they map
  one-to-one to the action classes enumerated in CONSENSUS_2026-05-03
  Section 8 (classes a–e) as extended by Wave-10 CONSENSUS line 57:

    a. BC-4 cold-start dissent acknowledgment (SD-1)
    b. BC-8 second-loop authorization decision (SD-2)
    c. Stale-log file disposition (SD-3)
    d. CRO pre-flight assumption acknowledgment (SD-4)
    e. Item-9 calendar reminder commitment (SD-5)
    f. Item-10 launch communication with verbatim CF-T9 clause (SD-6)

  No other open governance items from CONSENSUS_2026-05-02 or
  CONSENSUS_2026-05-03 were flagged as unresolved CEO actions.
  Wave-10 CONSENSUS confirms F-001/F-002/F-008/NEW-2 are engineering-
  closed and require no CEO decision; they are out-of-scope here.

  ## Gating relationship between SD-1..SD-6 and first paper bar

  All 6 sub-decisions must be recorded before first paper bar (T=0).
  SD-5 additionally requires a concrete action AT T=0 (set the calendar
  reminder for trading-day 60). SD-6 requires the verbatim CF-T9 launch
  communication to exist as a durable artifact before any paper trade is
  placed. SD-2 (BC-8 decision) gates whether one or two paper loops run;
  ops-engineer cannot configure the dispatch until that decision is made.
  SD-1, SD-3, SD-4 are acknowledgment/awareness records — no downstream
  code change — but are required for CONSENSUS completeness.

  ## Why each role is staffed for which sub-decisions

  NHT (wave 2): owns SD-1 (BC-4 verbatim dissent integrity) and SD-6
  (CF-T9 clause verbatim check). NHT's structural-skeptic authority is
  specifically needed to confirm dissent text is not paraphrased.

  CRO (wave 2): owns SD-2 (BC-8 authorization framing) and SD-4 (pre-
  flight assumption accuracy). CRO re-verification.yaml is the primary
  evidence source for SD-2; CRO produced the SD-4 assumptions in
  CONSENSUS_2026-05-03 Section 6.

  Ops-engineer (wave 2): owns SD-3 (verifies current on-disk stale-log
  state) and SD-5 (confirms calendar mechanism options are viable).
  Ops-engineer is the only role with direct filesystem access to confirm
  log mtime and RotatingFileHandler startup behavior.

  Principal Reviewer (wave 3): reviews SD-1..SD-6 collectively to confirm
  no CEO decisions have been pre-made by roles, and that out-of-scope
  items (Wave-11, historic-commit cleanup, Saxo token revocation, etc.)
  do not bleed into the CONSENSUS body.

  ## Relationship to CONSENSUS_2026-05-02 and CONSENSUS_2026-05-03

  Both prior documents remain ratified and UNMODIFIED. This dispatch
  produces a new CONSENSUS that resolves the 6 governance items those
  documents left as CEO-action deferred items. Nothing in this wave
  reopens, revises, or supersedes the prior ratified content. The new
  CONSENSUS is additive: it records CEO decisions on the deferred items
  and formally authorizes first paper bar once all 6 are closed.

