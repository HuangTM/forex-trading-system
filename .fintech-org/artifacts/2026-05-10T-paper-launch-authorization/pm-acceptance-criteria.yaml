    done_when: >
      CONSENSUS records the commitment in a dedicated item-9 section. If CEO has
      already set a provisional reminder based on a target launch date, the
      reminder mechanism (calendar system, task system, or cron entry) is named.
    source_reference: "CONSENSUS_2026-05-03_preflight_closure.md:288; CONSENSUS_2026-05-02_paper_launch_authorization.md:191"

  - id: "SD-6"
    label: "Launch communication authored and contains verbatim CF-T9 clause"
    description: >
      CEO authors or approves the launch communication. Communication contains
      the verbatim NHT-required disclosure clause exactly as stated in
      item_10_required_verbatim_disclosure above. Communication is written before
      first paper bar.
    done_when: >
      CONSENSUS contains or links to the launch communication text; a reviewer
      (NHT or ops-engineer) confirms the verbatim disclosure clause is present
      character-for-character. The communication need not be public; it must
      exist as a durable artifact (file, email, or equivalent) before T=0.
    source_reference: "CONSENSUS_2026-05-02_paper_launch_authorization.md:48-50; CONSENSUS_2026-05-03_preflight_closure.md:289"

  # Meta-criteria: CONSENSUS document completeness
  - id: "MC-1"
    label: "CONSENSUS-SUMMARY.md companion authored per v0.4.11 rule"
    description: >
