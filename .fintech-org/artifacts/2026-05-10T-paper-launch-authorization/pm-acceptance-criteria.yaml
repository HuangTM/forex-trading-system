  # side; this acknowledgment is the CEO governance closure.

  # Sub-decision 2 — BC-8 second-loop authorization
  bc_8_authorization_decision_recorded: required
  bc_8_authorization_decision_must_be_one_of:
    - "authorized"
    - "declined"
  # Wave-10 CRO re-verification confirms BC-8 veto is LIFTABLE (option-B
