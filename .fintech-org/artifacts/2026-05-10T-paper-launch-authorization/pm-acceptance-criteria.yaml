    source_reference: "CONSENSUS_2026-05-03_preflight_closure.md:174-179"

  - id: "SD-5"
    label: "Item 9 calendar reminder commitment recorded"
    description: >
      CEO commits to setting the 60-trading-day calendar reminder on the day of
      first paper bar (T=0). The CONSENSUS records this commitment as binding.
      Actual reminder is set at runtime (T=0 date not yet known at CONSENSUS
