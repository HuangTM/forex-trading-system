findings:
  - id: F-001
    severity: major
    location: .fintech-org/artifacts/2026-05-10T-paper-launch-authorization/pr-redacted/pm-acceptance-criteria-redacted.yaml:43-46 and .agent-accountability/ratifications/wave10-fix-and-amend:phase1:task1.0.yaml:33-37
    category: spec-drift
    observation: 'SD-2 frames the BC-8 second-loop authorization decision as a fresh decision the 2026-05-10 CONSENSUS must record. The Wave-10 ratification at 2026-05-06T14:00:00Z (artifact wave10-fix-and-amend:phase1:task1.0.yaml lines 34-37) already records the CEO-authority decision verbatim: "BC-8 second-loop authorization veto LIFTED. CEO authorizes concurrent vt + carry_fred operation against the same paper account." The Wave-10 CONSENSUS (CONSENSUS_2026-05-06_wave10_fix_and_amend.md lines 37, 88) also explicitly framed this as a CEO decision under Wave-10, ratified four days before the 2026-05-10 acceptance-criteria was authored.
      \nThe acceptance criteria appears to treat this as undecided ("CONSENSUS records one of the two permitted values"), which structurally creates one of two failure modes: (a) the 2026-05-10 CONSENSUS re-records "authorized" — duplicating a prior ratification and creating two ratification entries for the same decision with potentially different conditions attached, OR (b) the 2026-05-10 CONSENSUS records "declined" — silently reversing the 2026-05-06 CEO ratification without explicit "I am reversing my prior ratification" CEO action.
      \nFor decision-trace integrity, a future reader auditing "when did the CEO authorize concurrent vt + carry_fred?" must be able to identify the single operative ratification. Two parallel ratifications without an explicit subordination relationship break that property.'
    inference: 'The SD-2 phrasing does not distinguish between (i) a paper-launch-specific re-confirmation that the 2026-05-06 ratification carries through to paper-launch, and (ii) a fresh CEO decision that overrides 2026-05-06. PM must clarify which intent is operative. If (i), the done_when text should reference the prior ratification artifact path and frame SD-2 as "CEO confirms the 2026-05-06 BC-8 lift remains operative for paper-launch under the seven CRO BC-8-LIFT-COND-1..7 constraints." If (ii), the done_when text must include the operative reversal language and an explicit CEO acknowledgment that this overrides the 2026-05-06 ratification.'
    evidence:
      - '.fintech-org/artifacts/2026-05-10T-paper-launch-authorization/pr-redacted/pm-acceptance-criteria-redacted.yaml:43-46'
      - '.agent-accountability/ratifications/wave10-fix-and-amend:phase1:task1.0.yaml:33-37'
      - 'docs/decisions/CONSENSUS_2026-05-06_wave10_fix_and_amend.md:37, 88'
    recommended-action-class: clarify-spec
    owning-role: pm

  - id: F-002
    severity: major
    location: .fintech-org/artifacts/2026-05-10T-paper-launch-authorization/pr-redacted/pm-acceptance-criteria-redacted.yaml:43-46 and .fintech-org/artifacts/2026-05-10T-paper-launch-authorization/pr-redacted/cro-reverification-redacted.yaml:21-75
    category: spec-drift
    observation: 'CRO re-verification emitted seven binding constraints BC-8-LIFT-COND-1 through BC-8-LIFT-COND-7. The PM SD-2 done_when text enumerates three conditions ("single shared account, dispatch lock active, aggregate JPY-correlated cap ≤15%") inline as the items the CEO acknowledges in the "authorized" branch. The remaining four CRO binding constraints (BC-8-LIFT-COND-1, -2, -3, -5, -6 — by elimination since -4 maps to dispatch-lock and -7 is paper-only-no-live-promotion) are not referenced.'
    inference: 'When CEO ratifies SD-2 as "authorized," the binding-constraint coverage that travels with the ratification is incomplete relative to CRO emission. Either CRO emitted four constraints PM does not consider operative (in which case the firewall is open and CRO authority is being curated by PM, which is a firewall violation), or PM intended to incorporate all seven constraints by reference rather than enumeration (acceptable, but the done_when must say so explicitly). The acceptance-criteria currently does neither.'
    evidence:
      - '.fintech-org/artifacts/2026-05-10T-paper-launch-authorization/pr-redacted/pm-acceptance-criteria-redacted.yaml:43-46'
      - '.fintech-org/artifacts/2026-05-10T-paper-launch-authorization/pr-redacted/cro-reverification-redacted.yaml:21-75'
    recommended-action-class: clarify-spec
    owning-role: pm

  - id: F-003
    severity: minor
    location: .fintech-org/artifacts/2026-05-10T-paper-launch-authorization/pr-redacted/pm-acceptance-criteria-redacted.yaml:64-68
    category: observability-gap
    observation: 'SD-6 done_when says: "a reviewer (NHT or ops-engineer) confirms the verbatim disclosure clause is present character-for-character." Three sub-gaps: (a) the reviewer identity is disjunctive ("NHT or ops-engineer") with no tie-break rule for who actually performs the check; (b) the timing is "before T=0" but how-much-before is unspecified (an hour, a day, the prior wave?); (c) the artifact path where the confirmation lands is not named — when an auditor later asks "show me the char-for-char verification result for SD-6," there is no spec-anchored place to look.'
    inference: 'A reviewer-discretion check with no named output artifact is not machine-checkable and fails the log-as-decision-trace item-1 (outcome named) and item-2 (inputs that drove the outcome) when one tries to reconstruct the SD-6 outcome from logs/governance-artifacts alone. The check itself may happen and pass; the trace will not show it happened.'
    evidence:
      - '.fintech-org/artifacts/2026-05-10T-paper-launch-authorization/pr-redacted/pm-acceptance-criteria-redacted.yaml:64-68'
    recommended-action-class: clarify-spec
    owning-role: pm

  - id: F-004
    severity: minor
    location: .fintech-org/artifacts/2026-05-10T-paper-launch-authorization/pr-redacted/pm-acceptance-criteria-redacted.yaml:58-62
    category: observability-gap
    observation: 'SD-5 done_when is conditional: "If CEO has already set a provisional reminder based on a target launch date, the reminder mechanism (calendar system, task system, or cron entry) is named." Per CONSENSUS_2026-05-03_preflight_closure.md line 288 ("Cannot be set until paper loop start date (T=0) is known. CEO must set the calendar reminder on the day of first paper bar"), the expected state at CONSENSUS-sign time is that T=0 is unknown, the reminder is NOT yet set, and the SD-5 done_when collapses to "CONSENSUS records the commitment in a dedicated item-9 section" — i.e., a commitment to do a thing, not the thing.'
    inference: 'SD-5 as currently written is satisfiable by writing a paragraph stating "CEO will set a calendar reminder on T=0." The action that actually matters (the reminder existing, in a system that will fire 60 trading days later) is not check-gateable from CONSENSUS content. This is acceptable IF the orchestrator has a separate gate at T=0 enforcing the reminder existence before the first paper bar; if it does not, SD-5 functionally green-lights paper launch with the reminder unset.'
    evidence:
      - '.fintech-org/artifacts/2026-05-10T-paper-launch-authorization/pr-redacted/pm-acceptance-criteria-redacted.yaml:58-62'
      - 'docs/decisions/CONSENSUS_2026-05-03_preflight_closure.md:288'
    recommended-action-class: tighten-invariant
    owning-role: pm

  - id: F-005
    severity: minor
    location: .fintech-org/artifacts/2026-05-10T-paper-launch-authorization/pr-redacted/pm-acceptance-criteria-redacted.yaml:33-35
    category: spec-drift
    observation: 'The PM-pinned "required verbatim disclosure" string ("CF-T9 is binding on Clauses A and B. Clause C is accepted as a known-incomplete deferral and is pending ratification within 60 trading days of paper launch.") does not appear in the source NHT dissent at .fintech-org/artifacts/2026-05-02T-wave5-round3/nht-tier-b-reverify-cosign.yaml lines 63-70. The source NHT dissent reads: "Any paper-launch disclosure (CEO or HoQR) must state that CF-T9 is binding on A+B with Clause C pending ratification." The longer form first appears in CONSENSUS_2026-05-03_wave7_closure.md line 233 and CONSENSUS_2026-05-03_preflight_closure.md line 289 — both as derived pm-acceptance-criteria references, not as the source dissent text.'
    inference: '"Verbatim" is being used here to mean "verbatim relative to the 2026-05-03 PM authoring," not "verbatim relative to the source NHT dissent." This is a definitional question, not a defect per se — but the SD-6 acceptance criterion calling the string "verbatim CF-T9 clause" creates the impression of source-accuracy that the lineage does not support. A reader auditing whether the launch communication faithfully reproduces what NHT asked for will find that the pinned string is a longer reformulation. This may be entirely intentional (the 2026-05-03 elaboration was authored to be more precise than the source) but the lineage discrepancy should be acknowledged in the SD-6 body so the audit trail is honest about which "verbatim" applies.'
    evidence:
      - '.fintech-org/artifacts/2026-05-10T-paper-launch-authorization/pr-redacted/pm-acceptance-criteria-redacted.yaml:33-35'
      - '.fintech-org/artifacts/2026-05-02T-wave5-round3/nht-tier-b-reverify-cosign.yaml:63-70'
      - 'docs/decisions/CONSENSUS_2026-05-03_wave7_closure.md:231-235'
      - 'docs/decisions/CONSENSUS_2026-05-03_preflight_closure.md:289'
    recommended-action-class: clarify-spec
    owning-role: pm

  - id: F-006
    severity: observation
    location: .fintech-org/artifacts/2026-05-10T-paper-launch-authorization/pr-redacted/pm-acceptance-criteria-redacted.yaml:38-42
    category: maintainability
    observation: 'SD-1 (BC-4 dissent acknowledged verbatim) requires that CONSENSUS body contain CEO-authored acknowledgment citing the verbatim dissent source. The done_when is acceptable as written, but it does not specify where the verbatim dissent is reproduced (in the CONSENSUS body itself, or by reference to a prior document containing it). Both options are valid; only the choice needs to be pinned. Given that NHT artifacts cited in evidence include nht-cold-start-gate-adversarial.yaml as the source, an explicit "verbatim dissent reproduced in Section X of this CONSENSUS, byte-identical to source artifact lines Y-Z" pattern would close the trace.'
    inference: 'Without a specified location for the verbatim reproduction, two CONSENSUSes could both "satisfy SD-1" while one reproduces the dissent and the other only references its file path. For an append-only audit trail under git, the file-path-only variant works (the dissent travels via git history); for human-readable CONSENSUS auditing, in-body reproduction is friendlier. Pick one and pin it.'
    evidence:
      - '.fintech-org/artifacts/2026-05-10T-paper-launch-authorization/pr-redacted/pm-acceptance-criteria-redacted.yaml:38-42'
    recommended-action-class: clarify-spec
    owning-role: pm

  - id: F-007
    severity: observation
    location: .fintech-org/artifacts/2026-05-10T-paper-launch-authorization/pr-redacted/pm-acceptance-criteria-redacted.yaml:53-57
    category: maintainability
    observation: 'SD-4 (CRO pre-flight assumptions acknowledged) done_when permits acknowledgment "by their description or by reference to CONSENSUS_2026-05-03 Section 6." The "by description" branch is unbounded — a CEO who writes "I acknowledge the two CRO pre-flight items" satisfies the done_when literally but produces nothing reconstruction-grade. The "by reference" branch is stronger because Section 6 of CONSENSUS_2026-05-03 contains the two specific assumptions (_JPY_CORRELATED frozenset only contains {USDJPY, GBPUSD}; cross-strategy aggregation requires both paper loops in same Saxo paper account, per line 284 of that doc).'
    inference: 'The acceptance-criteria offers two satisfaction modes with very different trace accuracy. Recommend tightening to the "by reference to specific section + verbatim re-quote of the two assumption descriptions" mode, since the descriptions are short (one sentence each) and including them in-body keeps SD-4 reconstruction-grade without bloating CONSENSUS.'
    evidence:
      - '.fintech-org/artifacts/2026-05-10T-paper-launch-authorization/pr-redacted/pm-acceptance-criteria-redacted.yaml:53-57'
      - 'docs/decisions/CONSENSUS_2026-05-03_preflight_closure.md:282-284'
    recommended-action-class: clarify-spec
    owning-role: pm

  - id: F-008
    severity: observation
    location: .fintech-org/artifacts/2026-05-10T-paper-launch-authorization/pr-redacted/pm-acceptance-criteria-redacted.yaml:1-96 (whole-artifact)
    category: maintainability
    observation: 'The artifact has no explicit "decision authority" matrix per sub-decision. SD-2 lift is CEO-with-CRO-input. SD-1, SD-4 are CEO-acknowledgment. SD-3 is CEO-choice-with-Ops-followup. SD-5 is CEO-commitment. SD-6 is CEO-authored-with-reviewer-confirm. Each varies in who owns the decision and who verifies it. The acceptance-criteria as a whole does not surface this allocation; a reader has to infer it from done_when prose.'
    inference: 'A small "decision authority" table mapping {SD-id → decision-owner, verifier} would tighten the firewall hygiene (the absence of which is the structural-skeptic concern downstream). Not blocking, but a maintainability improvement.'
    evidence:
      - '.fintech-org/artifacts/2026-05-10T-paper-launch-authorization/pr-redacted/pm-acceptance-criteria-redacted.yaml'
    recommended-action-class: clarify-spec
    owning-role: pm

