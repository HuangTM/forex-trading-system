  - "kill-switch infrastructure (TriggerReason enum, kill_switch.trigger call) is already wired in the paper scripts; if INFRASTRUCTURE TriggerReason does not exist, QD MUST add it and report back. The kill-switch design itself was reviewed in Wave-7 cold-start gate and is operational."
  - "mid<=0 is a data-quality / feed-corruption event, NOT a market condition. Probability is near-zero in normal operation. No legitimate FX quote can produce mid<=0; the only path is bid=0 AND ask=0 (Saxo Quote dict missing fields) AND ohlcv close=0 (corrupted bar). This is consistent with the probability-statistics rubric base-rate framing: the event is structurally pathological."
  - "Sizer's current_price<=0 guard (sizing/vol_target.py:72) is preserved and is the first line of defense — order size is already 0 on mid<=0. Decision A closes the SECONDARY defect (cost accounting)."
