body: |
  ==============================================================
  DECISION A — F-100 JPY mid<=0 action (W11-2)
  ==============================================================

  Base rates and risk surface
  ---------------------------
  mid<=0 cannot arise from any legitimate FX market state. Paths to mid<=0:
    (i)  Saxo Quote dict missing Bid/Ask keys (defaults to 0) AND ohlcv close also <= 0 → mid == 0 (data-quality)
    (ii) Numerical fault in upstream arithmetic → mid < 0 (corruption; structurally impossible from real prices)

  Per probability-statistics base-rate reasoning: this event probability in steady state
  is near-zero; if it fires, the data pipeline is broken. There is no normal-regime
  scenario in which the strategy must trade through mid<=0.

  Risk consequences if left as silent USD-nominal fallback (status quo on mid<=0 path):
    - Sizer (sizing/vol_target.py:72) ALREADY returns 0 units on current_price<=0, so
      no NEW order fires. The aggregation gate is NOT directly violated.
    - BUT for held positions (is_close=True, target_units==0 + cur_pos): _trade_units_nom
      = cur_units in USD-nominal, and _engine_units = _trade_units_nom (silent fallback,
      NOT divided by mid since mid>0 is false). For USDJPY this mismarks cost by ~150x
      (pip_v=0.01 sized for engine-units, applied to USD-nominal magnitude).
    - The mismarked _cost_usd / _swap_usd is written to EQUITY_LOG_PATH and feeds
      paper_equity_bt_equiv. The drawdown ladder reads equity state. A 150x cost
      mismark could falsely trip drawdown thresholds 10/15/20.
    - This is a SECONDARY consequence of the F-001 fix being scoped to mid>0. The fix
      landed Wave-10 closed the cost-mispricing class for normal data; Wave-11 closes
      the degenerate-data path.

  CRO ruling: option 2 (halt-cycle)
  ---------------------------------
  Action: when mid <= 0 on a JPY pair (and conservatively on ANY pair — see "scope"
  below), the cycle MUST halt at the JPY-mid guard point. The halt path:
    - Logs a structured decision-boundary event (per log-as-decision-trace rubric)
    - Does NOT execute any signal for this bar
    - Returns through the inner try-block at line 581 (vt) / 563 (carry_fred), which
      lets the finally block at line 856 (vt) / 805 (carry_fred) release the
      dispatch-lock and close the fd. Lock invariant preserved.
    - Does NOT trip the kill-switch on a single-cycle event (false-positive cost is
      low on transient feed gaps; rate-escalation deferred to a follow-up gap)

  Why NOT skip-position (option 1): does not address the held-position swap-accrual
  case where cost is mismarked while sizer returns 0. Halt-cycle aborts BEFORE any
  cost/swap accounting fires.

  Why NOT kill-switch (option 3) on first-fire: false-positive cost is paper-run loss
  on a transient feed gap. CRO reserves kill-switch trigger for repeated firing OR
  Decision B (filesystem-level infrastructure failure). A rate-escalator is appropriate
  but is deferred to a follow-up gap.

  Why NOT raise-exception (option 4): violates the lock-acquired-then-released
  invariant unless the operator-visible exception still hits the finally. raise inside
  the inner try DOES hit the finally (Python semantics), so this is technically safe,
  BUT it produces an uncaught exception in the loop runner that interacts with the
  main-loop retry/heartbeat logic in ways not in scope to verify this wave. Halt-cycle
  via structured return is the safer composability choice.

  mid==0 vs mid<0 treatment
  -------------------------
  Treat IDENTICALLY at the code-path level (one guard, one log statement). Distinguish
  POST-HOC via the mid value field in the log entry. Splitting into two paths adds
  complexity without benefit — both are pathological, both halt the cycle, only the
  forensic story differs.

  Scope (JPY-only vs all-pairs)
  -----------------------------
  The redacted AC HC-W11-2 specifies the guard for the JPY mid<=0 path. CRO's
  binding ruling: apply the guard symmetrically for ALL pairs at the unit-conversion
  boundary. Reason: the silent fallback bug is gated on '"JPY" in pair.upper() and
  mid > 0' — non-JPY pairs use identity (_trade_units_nom directly), so for non-JPY
  pairs the bug doesn't apply. BUT mid<=0 on a non-JPY pair still means corrupted
  data and the cycle should not proceed. The guard should be expression-positioned
  BEFORE the JPY conversion, applying to all pairs uniformly.

  Required structured log event (binding, per log-as-decision-trace items 1-10)
  -----------------------------------------------------------------------------
  event_name: "data.invalid.mid_non_positive"  (item 9 — dotted enumerable)
  level: WARNING  (item 8 distinct from DEBUG)
  fields (item 2 — every input that drove the outcome):
    - event: "SKIP_INVALID_MID"  (item 1 — outcome named via enumerable)
    - cycle_id: <correlation id, item 5>
    - pair: <pair string>
    - mid: <float; the actual value, can be 0.0 or negative>
    - bid: <raw bid from broker>
    - ask: <raw ask from broker>
    - ohlcv_close: <fallback value if bid/ask unavailable>
    - mid_source: "broker_quote" or "ohlcv_close_fallback"  (item 3 — source named)
    - action: "halt_cycle"  (item 1)
    - decision_ts: <datetime.now(timezone.utc).isoformat()>  (item 4 — wall clock named)
    - cro_decision_artifact: ".fintech-org/artifacts/2026-05-11T-wave11/cro-risk-review.yaml"
    - guard_version: "wave11-f100"

  Per clock-and-ordering item 1: the timestamp source is named wall-clock (UTC ISO).
  This is acceptable for a logging decision-trace; no clock-arithmetic across sources.

  Per log-as-decision-trace item 6: the SKIPPED path is the one being logged. The
  taken path (mid>0 normal) is already covered by the existing cost_compute.decision
  log at line 755 (vt) / 712 (carry_fred); no new log needed for the normal branch.

  Per item 7 (no sensitive data leaks): no API keys, no PII; pair/mid/bid/ask are
  market-data only. Clean.

  Symmetric file requirement
  --------------------------
  Same guard, same log fields, same halt return at:
    scripts/run_paper_trading_vt.py — between line 641 (mid computed) and line 651
      (sizer.calculate_size called). Recommended insertion: immediately after line 641.
    scripts/run_paper_trading_carry_fred.py — between line 622 and line 626.
      Recommended insertion: immediately after line 622.

  Asymmetric implementation is a REJECT condition (per HC-W11-2 fail-condition).

  Composes with drawdown ladder + dispatch lock
  ---------------------------------------------
  - Drawdown ladder: closing this defect REMOVES a false-positive trip source. Net
    risk decrease.
  - Dispatch lock (BC-8): the guard fires AFTER the dispatch-lock is acquired (the
    lock acquisition is at line 552-565, the mid is computed at line 641). The halt
    return passes through the inner-try's finally (line 856) which releases the lock.
    Lock invariant preserved.

  ==============================================================
  DECISION B — F-101 OSError catch impact on dispatch-lock invariant (W11-3)
  ==============================================================

  Structural verification of the dispatch-lock invariant
  ------------------------------------------------------
  Read run_paper_trading_vt.py lines 548-578:
    548: _dl_path = Path(DISPATCH_LOCK_PATH)
    549: _dl_path.parent.mkdir(...)
    550: _dl_fd = os.open(str(_dl_path), os.O_CREAT | os.O_WRONLY, 0o644)   ← fd acquired
    551: _dl_acquired = False
    552: try:                                                                ← outer try
    553:     fcntl.flock(_dl_fd, fcntl.LOCK_EX | fcntl.LOCK_NB)               ← lock attempt
    554:     _dl_acquired = True
    555-564:   logger.info("dispatch_lock.acquired", ...)
    565: except BlockingIOError:                                              ← contention
    566:     os.close(_dl_fd)                                                  ← fd released inline
    567-577:   logger.warning("dispatch_lock.busy", ...) + return SKIP_*

    581: try:                                                                 ← inner try (lock held)
    ...
    856: finally:                                                             ← releases lock + fd
    857:     if _dl_acquired:
    858:         fcntl.flock(_dl_fd, fcntl.LOCK_UN)
    ...
    869:     os.close(_dl_fd)

  Carry_fred symmetric: line 531 fd open; 533 outer try; 546 except BlockingIOError
  + close at 547 + return at 560; 563 inner try; 805 finally releases lock + closes fd.

  Lock invariant verification: lock-acquired-then-released-on-all-paths
  --------------------------------------------------------------------
  Paths through this region:
    1. flock succeeds → _dl_acquired=True → enter inner try → exit via any path →
       finally at 856 releases lock (LOCK_UN) and closes fd. INVARIANT HOLDS.
    2. flock raises BlockingIOError → _dl_acquired stays False → except at 565 closes
       fd inline → return. Lock was never acquired; no release needed. INVARIANT HOLDS.
    3. flock raises some other OSError (current behavior) → uncaught → propagates up.
       _dl_fd is leaked (no inline close). INVARIANT VIOLATED (fd leak), though
       lock was never acquired so no unreleased lock.
    4. flock raises some other OSError (with naive 'except OSError' addition that
       folds it into the SKIP_DISPATCH_LOCK_BUSY path) → fd closed inline, return.
       INVARIANT HOLDS structurally BUT semantics are wrong — emits busy sentinel
       on a filesystem failure (mislabeled, Knight-class hidden).

  Does adding OSError to the catch preserve or violate the invariant?
  -------------------------------------------------------------------
  STRUCTURALLY preserves it (the inline os.close is symmetric to BlockingIOError
  path). SEMANTICALLY introduces a hole: filesystem failures are silently downgraded
  to lock-contention, which the operator then sees as "another cycle will retry."
  For EIO/ENOSPC/EBADF, "retry next cycle" is wrong — the infrastructure is broken.

  This is the Knight Capital pattern: an infrastructure anomaly handled with a
  too-friendly recovery path that masks the underlying break. Knight's failure
  was code-deployment state mismatch; the class is "graceful handling of an
  infrastructure event hides the operator-attention signal."

  CRO binding ruling: distinct paths (option C — explicit lock-release-and-distinct-handler)
  ------------------------------------------------------------------------------------------
  The catch MUST be split into two clauses:

    try:
        fcntl.flock(_dl_fd, fcntl.LOCK_EX | fcntl.LOCK_NB)
        _dl_acquired = True
        # ... existing acquired-log
    except BlockingIOError:
        os.close(_dl_fd)
        # ... existing SKIP_DISPATCH_LOCK_BUSY emit
        return {"_action": SKIP_DISPATCH_LOCK_BUSY}
    except OSError as exc:
        os.close(_dl_fd)
        logger.error(
            "dispatch_lock.fs_error",
            extra={
                "event": "SKIP_DISPATCH_LOCK_FS_ERROR",
                "errno": exc.errno,
                "strerror": exc.strerror,
                "cycle_id": cycle_id,
                "pair": pair,
                "lock_path": DISPATCH_LOCK_PATH,
                "decision_ts": datetime.now(timezone.utc).isoformat(),
                "cro_decision_artifact": ".fintech-org/artifacts/2026-05-11T-wave11/cro-risk-review.yaml",
            },
        )
        _emit_ws01(cycle_id, pair, "SKIP_DISPATCH_LOCK_FS_ERROR")  # ws02 in carry_fred
        # Knight-class: filesystem failure during lock acquisition is NOT a
        # normal retry condition. Trigger kill-switch.
        try:
            kill_switch.trigger(TriggerReason.INFRASTRUCTURE,
                                f"dispatch_lock OSError errno={exc.errno}", equity)
        except Exception:
            # Kill-switch trigger must not itself fail the dispatch — if the
            # trigger fails, the OSError still escalates via the return path.
            pass
        return {"_action": "SKIP_DISPATCH_LOCK_FS_ERROR"}

  Ordering note: BlockingIOError MUST appear before OSError in the except chain
  (Python catches the first matching clause). BlockingIOError IS-A OSError; if
  OSError appeared first, BlockingIOError would never be reached. This is the
  specific Python-language sequencing the QD must respect.

  Why kill-switch trigger and not halt-cycle (Decision A's choice)?
  ----------------------------------------------------------------
  Decision A's mid<=0 is data-quality (transient, recoverable next cycle).
  Decision B's OSError is infrastructure-failure (persistent, NOT recoverable by
  retrying; lock-file on a broken filesystem won't heal). Knight-class reasoning
  applies: the second-Knight pattern is "graceful retry hides the operator-attention
  signal." Halt the system, page the operator.

  If TriggerReason.INFRASTRUCTURE does not exist as an enum value, QD MUST add it
  with no other behavior change and report back via knowledge-gap. The kill-switch
  itself was validated in Wave-7 cold-start gate.

  Lock-acquired-then-released invariant for new OSError path
  ----------------------------------------------------------
  Path 4 (revised): flock raises OSError (non-BlockingIOError) → _dl_acquired=False
  → except OSError catches → fd closed inline → kill-switch triggered → return.
  Lock was never acquired (acquire raised), so no release needed. INVARIANT HOLDS.

  Symmetric file requirement
  --------------------------
  Apply identical split-clause pattern at:
    scripts/run_paper_trading_vt.py — line 565 (the except BlockingIOError clause)
    scripts/run_paper_trading_carry_fred.py — line 546 (its symmetric except clause)

  Differences between the two scripts:
    - vt uses _emit_ws01; carry_fred uses _emit_ws02. Each script's existing
      sentinel-emit helper is preserved.
    - Otherwise the OSError handler structure is identical.

  Test coverage requirement (binding)
  -----------------------------------
  Per HC-W11-3 done_when (d): at least one test in tests/scripts/ MUST simulate
  the OSError path (e.g., monkeypatch fcntl.flock to raise OSError(errno=5,
  "Input/output error")) and assert:
    - SKIP_DISPATCH_LOCK_FS_ERROR event emitted
    - kill_switch.trigger called with TriggerReason.INFRASTRUCTURE
    - fd is closed (no leak; verifiable via fd-count delta or by reopening the
      lock-file in the same test)
    - return action is "SKIP_DISPATCH_LOCK_FS_ERROR"

  No regression of existing BlockingIOError-path tests is permitted.

  ==============================================================
  Summary of CRO binding clauses (recap for QD)
  ==============================================================
  1. Decision A: halt-cycle on mid<=0 with structured log per log-as-decision-trace
     items 1-10. Insertion point: immediately after mid is computed (line 641 vt /
     622 carry_fred), BEFORE sizer.calculate_size. Symmetric in both files.
     Lock-release-via-finally invariant preserved by returning through the inner try.

  2. Decision B: split except clauses. BlockingIOError preserved verbatim (existing
     SKIP_DISPATCH_LOCK_BUSY semantics). New 'except OSError as exc' that closes fd,
     emits SKIP_DISPATCH_LOCK_FS_ERROR with errno+strerror, triggers kill-switch
     with TriggerReason.INFRASTRUCTURE. Order: BlockingIOError BEFORE OSError.
     Symmetric in both files.

  3. Both decisions MUST be symmetric across the two paper scripts. Asymmetry is
     a reject condition.

  4. Both decisions MUST emit structured log entries that include the artifact_id
     of this CRO decision (path:
     .fintech-org/artifacts/2026-05-11T-wave11/cro-risk-review.yaml).

  5. size_multiplier remains 1.0. These are defect-fixes on degenerate-data and
     infrastructure-failure paths; they do not change strategy alpha or sizing
     under normal operation.

