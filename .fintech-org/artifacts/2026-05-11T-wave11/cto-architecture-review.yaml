findings:
  - id: F-W11-1-A
    severity: non-blocking
    label: suggestion
    dimension: Design
    description: |
      Recommend the extracted module include an explicit __all__ tuple listing
      the two public symbols (assert_account_key_parity, reset_account_key_lock)
      plus the ACCOUNT_KEY_LOCK_PATH constant. Makes the API surface explicit
      and prevents future grep-and-replace drift. Not blocking — QD discretion.
    location: "proposed src/forex_system/risk/account_key_parity.py"
    fix: |
      Add __all__ = ('assert_account_key_parity', 'reset_account_key_lock',
      'ACCOUNT_KEY_LOCK_PATH') at the top of the new module.

  - id: F-W11-1-B
    severity: non-blocking
    label: suggestion
    dimension: Clarity
    description: |
      The loop_name discriminator should be a keyword-only argument, not
      positional. Both functions currently take account_key as positional;
      adding loop_name as positional would risk argument-order errors at
      the two call sites (vt:923 and carry_fred:862). Keyword-only forces
      explicit naming at the call site: assert_account_key_parity(
      backend.account_key, loop_name='vt loop'). This is consistent with
      Python typing-best-practice for short discriminator strings.
    location: "proposed API signature"
    fix: |
      Define the signature as:
      assert_account_key_parity(account_key: str, *, loop_name: str,
                                lock_path: str = ACCOUNT_KEY_LOCK_PATH) -> None
      The keyword-only marker (*) makes loop_name a named argument at every
      call site. reset_account_key_lock does NOT take loop_name (its error
      messages do not include it per vt:168-203 / carry_fred:185-220), so its
      signature stays:
      reset_account_key_lock(new_key: str, *, lock_path: str = ACCOUNT_KEY_LOCK_PATH) -> None

  - id: F-W11-1-C
    severity: non-blocking
    label: suggestion
    dimension: Design
    description: |
      Do NOT introduce a typed LoopName enum for this. The discriminator is
      operator-readable text inside an error message and a structured-log
      'event' field; it is not a typed key used as a dict lookup, switch,
      or registry index anywhere else. A LoopName enum would be over-
      engineering for a 2-valued string used for a single error-message
      f-string substitution. If a third paper loop is added in the future,
      a value-set assertion in the function body (e.g., assert
      loop_name in {'vt loop', 'carry_fred loop'}) is the right escalation
      step — not now.
    location: "proposed API signature"
    fix: |
      Keep loop_name as plain str. No enum.

  - id: F-W11-1-D
    severity: non-blocking
    label: issue
    dimension: Risk
    description: |
      Preserve the discriminator string VALUES verbatim ('vt loop' and
      'carry_fred loop' — note the lowercase, the trailing 'loop' word,
      and the space). These strings appear in the error message that
      operators will see on parity violation; changing them would alter
      log-search patterns and any operator runbook that greps for the
      exact text. HC-W11-1 calls this out ('the strings themselves are
      NOT changed, only their origin').
    location: "vt.py:153 and carry_fred.py:170"
    fix: |
      QD MUST pass loop_name='vt loop' from vt.py call site and
      loop_name='carry_fred loop' from carry_fred.py call site. The
      strings are operator contracts; do not normalize, capitalize, or
      shorten them. This is also a Principal Reviewer verification target.

  - id: F-W11-1-E
    severity: non-blocking
    label: suggestion
    dimension: Completeness
    description: |
      The extracted module should ALSO own the ACCOUNT_KEY_LOCK_PATH
      constant (currently duplicated at vt.py:69 and carry_fred.py:88
      with identical value 'data/paper_account_key_lock.json'). Leaving
      the constant duplicated after extracting the functions would re-
      introduce the exact class of drift that motivated the extraction —
      one script could change the path without the other noticing.
      Eliminate the class, not just the instance (engineer-mindset rule 9).
    location: "vt.py:69, carry_fred.py:88"
    fix: |
      Move ACCOUNT_KEY_LOCK_PATH into the new module as the single source
      of truth. Both scripts import it: from forex_system.risk.account_key_parity
      import (assert_account_key_parity, reset_account_key_lock,
      ACCOUNT_KEY_LOCK_PATH). Remove the local constant definitions from
      both scripts.

  - id: F-W11-1-F
    severity: non-blocking
    label: praise
    dimension: Design
    description: |
      The existing implementation correctly uses os.open(O_CREAT|O_EXCL|
      O_WRONLY) — an atomic file-creation primitive — instead of the
      Path.exists()+write_text() pattern that has a TOCTOU race. This
      design choice (already in place; not part of the extraction) is
      correct and should be preserved verbatim during the extraction.
      Highlighting because the extraction must NOT regress this property.
    location: "vt.py:142, carry_fred.py:159"

