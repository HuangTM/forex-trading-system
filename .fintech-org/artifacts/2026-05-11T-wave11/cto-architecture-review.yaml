proposed_module_path: "src/forex_system/risk/account_key_parity.py"
# RATIONALE:
#   - risk/ layer hosts pre-dispatch risk gates: drawdown_contract,
#     exposure_aggregator, heartbeat_watchdog, kill_switch, bet1_sizing.
#     The account-key parity gate is a startup-time pre-dispatch risk
#     gate that PREVENTS two paper loops from dispatching to divergent
#     Saxo accounts. CRO BC-8-LIFT-COND-3 explicitly classifies this as
#     a risk constraint. It fits the risk/ family precisely.
#   - core/ is reserved for domain types (frozen dataclasses), abstract
#     interfaces (Strategy, DataSource, CostModel, PositionSizer), YAML
#     config loading, constants, errors. The parity gate is neither a
#     domain type nor an interface; it is an active runtime gate with
#     side effects (file I/O, sys.exit). core/ is the wrong layer.
#   - data/ is for OHLCV validation, Parquet I/O, resampling/gap-filling.
#     The parity gate has nothing to do with market data. data/ is wrong.
#   - scripts/common/ would be a new layer outside src/forex_system/.
#     This adds a third top-level location that operator/CI scripts must
#     know about, fragments the src/ vs scripts/ boundary that the
#     project has carefully maintained, and contradicts the W11-1
#     done_when predicate (a) which says 'A new shared module file exists
#     under src/forex_system/'. REJECTED.
#   - Naming: account_key_parity matches the function naming convention
#     (snake_case, descriptive, no abbreviation). Matches sibling modules
#     in risk/ (exposure_aggregator, kill_switch — noun-phrase, not
#     verb-phrase). Also matches the file naming convention.

proposed_api_signatures:
  - signature: "assert_account_key_parity(account_key: str, *, loop_name: str, lock_path: str = ACCOUNT_KEY_LOCK_PATH) -> None"
    rationale: |
      account_key first (positional) because it is the primary input
      every caller must supply. loop_name keyword-only (after the *)
      to force explicit naming at the call site — prevents
      argument-order errors when a third loop is eventually added.
      lock_path keyword-only with sensible default for test override
      (existing tests in tests/scripts/ may want to inject a tmp_path).
      Return type None — function raises SystemExit(1) on mismatch via
      sys.exit, otherwise returns normally; the contract is enforce-or-
      die.
  - signature: "reset_account_key_lock(new_key: str, *, lock_path: str = ACCOUNT_KEY_LOCK_PATH) -> None"
    rationale: |
      No loop_name parameter — the existing reset_account_key_lock
      bodies (vt:168-203 vs carry_fred:185-220) do not embed a loop-
      name discriminator in their output; the reset is a global state
      change, not a per-loop assertion. Keep the API minimal.
  - signature: "ACCOUNT_KEY_LOCK_PATH: Final[str] = 'data/paper_account_key_lock.json'"
    rationale: |
      The shared constant lives in the new module. Both scripts import
      it; neither defines a local copy. typing.Final marker prevents
      accidental reassignment in tests or downstream callers.

