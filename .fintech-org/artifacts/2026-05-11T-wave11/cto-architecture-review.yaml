  assert_account_key_parity, reset_account_key_lock, and
  ACCOUNT_KEY_LOCK_PATH inline. No shared import.

  After the refactor: a new module
  src/forex_system/risk/account_key_parity.py owns the two functions
  and the constant. Both scripts add a single import line of the form:
  from forex_system.risk.account_key_parity import (
      ACCOUNT_KEY_LOCK_PATH, assert_account_key_parity,
      reset_account_key_lock,
  )
  alongside their existing forex_system.risk imports
