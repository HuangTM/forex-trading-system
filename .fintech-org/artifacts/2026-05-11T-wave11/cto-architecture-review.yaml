  ## Confidence and residual risk

  Confidence: high. The duplication is independently verified by CRO,
  the target layer follows established precedent, the API surface is
  small and the parameterization is mechanical. Rollback cost is trivial
  (single git revert). The principal residual risk is QD introducing a
  silent semantic change during the extraction; HC-W11-1's behavioral-
  equivalence requirement + Principal Reviewer verification in wave-3
  + the existing test suite (test_no_lookahead and tests/scripts/
  test_wave10_dispatch_lock.py + the new tests/risk/test_account_key_parity.py)
  collectively cover this.

  ## Failure modes considered (min 3 per cto.md handoff schema)

  1. Silent discriminator-string drift during extraction — mitigated
     by F-W11-1-D and test 4.
  2. ACCOUNT_KEY_LOCK_PATH left duplicated — mitigated by F-W11-1-E.
  3. Circular import via accidental forex_system.* dependency in the
     new module — mitigated by stdlib-only contract and import_diagram
     verification.
  4. Future addition of a third paper loop with a third discriminator
     — handled by keyword-only loop_name argument (F-W11-1-B) +
     escalation path noted in F-W11-1-C (add value-set assertion when
     count > 2).
  5. Test placement inconsistency (tests/scripts/ vs tests/risk/) —
     mitigated by test_target_recommendation above and the existing
     1:1 mapping convention.

