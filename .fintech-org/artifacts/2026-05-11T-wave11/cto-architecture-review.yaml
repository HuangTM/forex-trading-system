body: |
  ## Verdict: APPROVE — proceed to QD implementation

  W11-1 (shared-module extraction of assert_account_key_parity and
  reset_account_key_lock) is APPROVED as a CTO architecture decision under
  --no-ceo distributed-ratification. This artifact ALSO carries the CTO
  quality-gate-review quorum signature required by protocols/
  distributed-ratification.md because "architecture-decisions" appears in
  the CTO's domains_owned and W11-1 is an architecture-touching item.

  ## Why this duplication is real and should be eliminated

  CRO Wave-2 Section A.3 confirmed that /usr/bin/diff between vt.py:114-165
  and carry_fred.py:131-182 yields EXACTLY ONE differing line — the loop-
  name discriminator inside an f-string. This is not parallel-evolution
  drift; it is copy-paste-with-rename. The duplication has no deployment
  justification: both scripts run on the same host, write to the same lock
  file path ('data/paper_account_key_lock.json'), use the identical atomic
  primitive (os.O_CREAT|O_EXCL|O_WRONLY), and produce structurally identical
  logger.critical output. Three similar lines is acceptable; 52 lines
  duplicated with a one-string difference is a maintenance liability.

  Future class-of-bug this extraction prevents: a future engineer fixes a
  bug in the parity gate in vt.py (e.g., adds a permission-check on the
  lock-file parent directory) and forgets to mirror the change in
  carry_fred.py. The gate's invariant — both loops see the same account-
  key contract — is then silently broken. Eliminating the duplication
  removes this drift surface.

  ## Why src/forex_system/risk/account_key_parity.py is the right home

  The risk/ layer is the established home for pre-dispatch risk gates:
    - drawdown_contract.py  — pre-cycle drawdown ladder check
    - exposure_aggregator.py — pre-trade JPY-correlated exposure cap
    - heartbeat_watchdog.py  — staleness gate
    - kill_switch.py         — at-trade halt-everything
    - bet1_sizing.py         — pre-trade size multiplier

  The account-key parity gate is a startup-time pre-dispatch risk gate:
  it asserts that this paper loop and any sibling paper loop target the
  same Saxo paper account, and sys.exit(1)s if not. CRO BC-8-LIFT-COND-3
  explicitly classifies it as a risk constraint. It joins this family.

  Alternative considered: scripts/common/account_key_parity.py. Rejected
  because (a) it creates a new top-level location operator scripts must
  know about, (b) it fragments the src/-vs-scripts/ boundary the project
  has otherwise kept clean, (c) PM W11-1 done_when (a) requires the module
  to live under src/forex_system/, and (d) tests/risk/ already exists as
  the test sibling; tests/scripts/common/ would be a parallel-new test
  location.

  Alternative considered: src/forex_system/core/account_key_parity.py.
  Rejected because core/ is reserved for domain types, abstract interfaces,
  config loading, constants, and errors per CLAUDE.md. The parity gate is
  none of those — it is an active runtime gate with side effects (file
  I/O, sys.exit). Putting it in core/ would dilute the layer's stated
  purpose.

  CLAUDE.md's Module-layers table does not list risk/ (the doc predates
  the layer); the precedent set by 5 existing risk/ modules dominates.
  This is one of the residual items CLAUDE.md should eventually be
  updated to reflect — flagging as a non-blocking documentation gap
  outside W11-1 scope.

  ## API signatures — keyword-only loop_name, no enum

  Recommended signatures (verbatim prose; no code block per firewall):
    assert_account_key_parity(account_key: str, *, loop_name: str,
                               lock_path: str = ACCOUNT_KEY_LOCK_PATH) -> None
    reset_account_key_lock(new_key: str, *,
                           lock_path: str = ACCOUNT_KEY_LOCK_PATH) -> None

  Three design choices:

  1. account_key is positional first; both callers pass backend.account_key
     here today (vt:923, cf:862) and the positional convention is established.

  2. loop_name is KEYWORD-ONLY (after the * in the signature). At the
     call site vt.py:923 becomes:
       assert_account_key_parity(backend.account_key, loop_name='vt loop')
     and cf:862 becomes:
       assert_account_key_parity(backend.account_key, loop_name='carry_fred loop')
     This forces explicit naming, preventing argument-order errors if a
     third loop is added (a future engineer who calls the function with
     two positional strings would silently swap account_key and
     loop_name; the keyword-only marker makes that mistake a TypeError
     at parse time).

  3. NO LoopName enum. The discriminator is operator-readable text
     inside an error-message f-string and a structured-log 'event'
     field. It is not used as a dict key, switch-case label, or registry
     index. A LoopName enum would be overengineering. If a third loop
     is ever added, escalate to a runtime assert (e.g., assert loop_name
     in known set inside the function body) — but not now.

  The discriminator string VALUES ('vt loop', 'carry_fred loop') are
  preserved verbatim per HC-W11-1. Operator runbook expectations are
  not changed.

  ## Constant co-location: move ACCOUNT_KEY_LOCK_PATH

  The constant ACCOUNT_KEY_LOCK_PATH = 'data/paper_account_key_lock.json'
  is currently duplicated at vt.py:69 and carry_fred.py:88. Leaving the
  constant duplicated after extracting the functions would re-introduce
  the same drift class (engineer-mindset rule 9: fix the class, not the
  instance). The new module owns the constant; both scripts import it.

  ## Test target: tests/risk/test_account_key_parity.py

  Follows the 1:1 mapping convention established by the 5 existing
  risk/ modules and their tests/risk/ siblings. tests/scripts/ remains
  the home for test_run_paper_trading_*_wiring.py-style tests that
  assert the scripts WIRE the parity gate correctly (they call it at
  startup, before any dispatch path). That wiring concern is distinct
  from testing the gate's behavior in isolation.

  Minimum behavioral test surface (informs QD; PR/NHT verify in wave-3):
    1. First-caller atomic create writes the payload.
    2. Second-caller with same key passes silently.
    3. Second-caller with different key raises SystemExit AND emits
       the structured log with both keys + the loop_name discriminator.
    4. Both discriminator strings render correctly in the error message
       (the operator-contract preservation check).
    5. reset_account_key_lock atomically replaces an existing lock
       file and creates one when absent.
    6. Concurrent O_EXCL race: only one of two simultaneous opens can
       win (mirror the pattern from
       tests/scripts/test_wave10_dispatch_lock.py).

  ## Inversion check: imagine this shipped and caused a P0

  Scenario 1: extraction silently changes the discriminator string from
  'vt loop' to 'vt' (trailing word dropped during refactor). Operator
  log-grep pattern stops matching the parity-violation alert. Mitigated
  by F-W11-1-D (preserve verbatim) + test 4 (assert exact strings).

  Scenario 2: ACCOUNT_KEY_LOCK_PATH gets a relative-path-vs-absolute-path
  mismatch between the new module and a leftover script constant. Two
  loops use different lock files; parity gate is vacuous. Mitigated by
  F-W11-1-E (move the constant; remove local copies).

  Scenario 3: extracted module accidentally imports from
  forex_system.strategies or forex_system.backtest, creating a circular
  import that breaks at process start. Mitigated by stdlib-only import
  contract (verified in import_diagram above; PR confirms).

  Scenario 4: QD adds a try/except in the extracted body that swallows
  FileExistsError beyond the existing scope, silently breaking the
  re-read-and-compare path. Mitigated by behavioral test 3 (parity
  mismatch -> SystemExit). NOT a Wave-11 in-scope risk if QD preserves
  byte-equivalence as HC-W11-1 demands.

  None of these are gate-blockers; all are mitigable within the W11-1
  done_when predicates.

