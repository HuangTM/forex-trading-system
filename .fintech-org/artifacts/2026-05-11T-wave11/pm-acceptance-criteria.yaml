body: |
  ## Scope rationale: why exactly 5 items

  Items 1-5 are the complete deferred-binding ticket set from Wave-10 CONSENSUS
  line 28+ and CONSENSUS_2026-05-06_wave10_fix_and_amend.md. They are included
  because they were explicitly carried forward as binding Wave-11 obligations.

  ### Item 1 — Shared-module extraction (architecture)
  The CTO Wave-2 (2026-05-10 session) confirmed that assert_account_key_parity
  and reset_account_key_lock are byte-identical across both paper scripts
  except for the loop-name discriminator string. This is a CTO-domain
  architecture decision (owning role per Wave-10 CONSENSUS). QD implements
  under CTO direction. PM does NOT prescribe the target module path — that is
  a CTO technical decision. PM encodes the structural requirement: duplication
  eliminated, parameterization proven, both scripts pass existing regression
  gates after the extraction.

  ### Item 2 — F-100: JPY mid-price silent fallback guard (risk)
  The silent fallback to USD-nominal when mid <= 0 for JPY pairs was surfaced
  as a non-blocking finding during Wave-10 Principal Reviewer review. CRO owns
  risk-domain impact assessment. QD adds the explicit guard. PM does NOT
  adjudicate what the guard should do on failure (halt, skip, raise); that is
  a CRO technical decision. PM encodes: the fallback must NOT be silent; it
  must emit a structured log per log-as-decision-trace rubric; the decision
  boundary must be observable from the log alone.

  ### Item 3 — F-101: OSError coverage on outer dispatch-lock try (risk + code)
  BlockingIOError is a subclass of OSError but does not catch broader OS-level
  failures (e.g., stale NFS handle, read-only filesystem, dead-man scenarios).
  The asymmetry is confirmed at vt.py:565 and carry_fred.py:546. The fix must
  be symmetric: both scripts, same clause. CRO owns the dispatch-lock invariant
  impact; QD implements. PM encodes: the change is symmetric and does not alter
  the existing BlockingIOError sentinel behavior.

  ### Item 4 — F-102: Real-cycle subprocess test coverage (testing)
  test_wave10_dispatch_lock.py uses _WORKER_SCRIPT (an inline helper, not the
  actual run_cycle path) for concurrent process testing. This means the
  concurrent test exercises fcntl.flock OS semantics but not the full
  run_cycle code path. QD adds a test that exercises the actual run_cycle
  entry point. NHT adversarially re-verifies the coverage claim. PM does NOT
  prescribe the test architecture; QD decides whether subprocess or a test-
  harness shim is appropriate, subject to NHT's adequacy assessment.

  ### Item 5 — F-103: PM clarification of HC-6 / Section-2 doc contradiction
  The contradiction: HC-6 in wave10-fix-and-amend/pm-acceptance-criteria.yaml
  treats the drawdown_ladder_amendment doc as HC-6-PASS once 5 structural
  elements are present (with code-comments citing the spec). But Section-2
  line 46 of that same doc says "The CRO's determination must be appended to
  this document before Wave-10 commit." Wave-10 closed with the HC-6
  criterion satisfied (5 elements present, code-comments updated, CRO
  reverification yaml signed off) — but the doc itself retains the
  "must be appended" clause as unresolved text. PM will author a clarification
  addendum in wave-2 (PM is the owning role; this is a PM-domain doc-level
  fix). The clarification records: (a) the authoritative completion semantics
  for HC-6 (structural-only per the AC pass-condition, not doc-appendage),
  (b) that CRO's recalibration determination was captured via
  cro-reverification.yaml (wave10 artifact), not by doc-appendage, (c) the
  "before Wave-10 commit" clause in Section-2 is superseded by Wave-10
  CONSENSUS closure as of commit 747a6ad. No code change is required.

  ## Scope decision on knowledge gaps (KG-1, KG-2) and PR items (F-003..F-005)

  KG-1 (_JPY_CORRELATED frozenset gap) and KG-2 (fcntl.flock single-host
  caveat) are excluded from Wave-11 scope. KG-1 would expand the authorized
  trade instrument universe (adding cross-JPY pairs to the exposure cap),
  which requires a CEO-authorized trade-scope amendment separate from this
  engineering wave. Including it here would violate the Wave-10 out-of-scope
  line "any change to authorized instrument scope." KG-2 is documentation-
  only; the single-host architecture is the current deployment target and
  cross-host is explicitly out of scope.

  PR items F-003, F-004, F-005 (SD-6 reviewer disjunction, SD-5 commitment-
  only gate, SD-6 wording lineage) are documented as resolved in
  CONSENSUS_2026-05-10 and are not reopened here.

  Both KG-1 and KG-2 are recorded in this artifact's knowledge-gaps routing
  field for the skill-gap.md loop per pm.md v0.4.10 aggregation discipline.
  They are NOT in Wave-11 criteria; they are routed as documentation gaps.

knowledge_gaps:
  - topic: "KG-1: _JPY_CORRELATED frozenset scope — only USDJPY+GBPUSD; cross-JPY pairs bypass 15% cap if added; Phase-1 USDJPY-only means NOT blocking now; expanding frozenset requires trade-scope CEO amendment"
    originating_role: cro
    research_attempted: false
    suggested_resolution: "If CEO ever authorizes cross-JPY paper pairs, open a dedicated frozenset-amendment dispatch with CRO + CEO sign-off before code change."
    routed_to_protocol: "skill-gap.md"
  - topic: "KG-2: fcntl.flock is single-host-only; cross-host deployment would require a distributed advisory lock (e.g., Redis-based or NFS-safe lock); current architecture is single-host paper loop only"
    originating_role: cro
    research_attempted: false
    suggested_resolution: "Document in operational runbook as a deployment constraint; no code change until cross-host deployment is planned."
    routed_to_protocol: "skill-gap.md"

