# ── Hard constraints (per-item; machine-checkable) ────────────────────────────
hard-constraints:

  - id: HC-W11-1
    scope-item: "Item 1 — shared-module extraction"
    constraint: >
      paper_only: true; no_live_capital: true; no_paper_loop_start_by_orchestrator: true.
      shared_module_byte_identical_assertion_proven: required. The shared module
      must be extracted without altering the behavioral contract of either paper script.
      The loop-name discriminator string ('vt loop' vs 'carry_fred loop') must be
      preserved as a parameterized argument — the strings themselves are NOT changed,
      only their origin (inline vs argument). Both paper scripts must pass their
      existing regression gates (test_no_lookahead, ruff check src/, pytest count
      >= current baseline) after extraction.

  - id: HC-W11-2
    scope-item: "Item 2 — F-100 JPY mid-price guard"
    constraint: >
      f100_jpy_mid_guard_explicit: required. The silent fallback to USD-nominal
      when mid <= 0 must be replaced by an EXPLICIT guard that (a) logs a
      structured decision-boundary event (not a bare print or silent pass),
      (b) names the triggering condition (mid <= 0 for JPY pair), (c) names
      the action taken (whether skip, halt, or fallback — CRO decides which).
      The guard must appear symmetrically in BOTH vol_target_carry.py and
      carry_fred.py. Fail-condition: guard is silent (no structured log on mid
      <= 0 path) or guard is present in only one of the two files.

  - id: HC-W11-3
    scope-item: "Item 3 — F-101 OSError coverage"
    constraint: >
      f101_oserror_catch_added_symmetrically: required. The except clause at
      run_paper_trading_vt.py:565 and run_paper_trading_carry_fred.py:546 must
      catch OSError (which subsumes BlockingIOError) or catch both explicitly.
      The SKIP_DISPATCH_LOCK_BUSY sentinel behavior on BlockingIOError must NOT
      be changed. The symmetric change in carry_fred at its corresponding line
      must be identical in structure. Fail-condition: change applied to only one
      script, or BlockingIOError sentinel behavior altered, or OSError catch
      swallows exceptions that should propagate (CRO determines the boundary).

  - id: HC-W11-4
    scope-item: "Item 4 — F-102 real-cycle subprocess test"
    constraint: >
      f102_real_cycle_subprocess_test_present: required. At least one test in
      tests/scripts/test_wave10_dispatch_lock.py must invoke the actual run_cycle
      entry point (not _WORKER_SCRIPT or an equivalent inline helper) via
      subprocess. The test must still assert the three required conditions from
      Wave-10 HC-5: (a) exactly one lock acquired, (b) SKIP_DISPATCH_LOCK_BUSY
      emitted by the contending process, (c) aggregate JPY-correlated exposure
      peak <= 15%. The existing _WORKER_SCRIPT tests may remain; this criterion
      requires an ADDITIONAL test using the real code path. Fail-condition: no
      test exercises the actual run_cycle path via subprocess, or the three
      Wave-10 HC-5 assertions are absent from the new test.

  - id: HC-W11-5
    scope-item: "Item 5 — F-103 doc clarification"
    constraint: >
      f103_doc_contradiction_clarified: required. A clarification addendum must
      be appended to docs/specs/drawdown_ladder_amendment_2026-05-06.md (or
      authored as a sibling file, PM decides format in wave-2). The addendum
      must: (a) cite both the HC-6 pass-condition and Section-2 line 46 as the
      contradicting sources, (b) state which governs (the HC-6 AC pass-condition
      is the authoritative completion test for HC-6), (c) record that CRO's
      recalibration determination is captured in
      .fintech-org/artifacts/wave10-fix-and-amend/cro-reverification.yaml
      (not by doc-appendage), (d) state that the 'before Wave-10 commit' clause
      in Section-2 is superseded by Wave-10 CONSENSUS closure (commit 747a6ad).
      No code change. No change to ladder threshold values. Fail-condition:
      addendum absent, or either contradicting source not cited, or the
      authoritative completion source not identified.

# ── Criteria (one per Wave-11 item; machine-checkable done_when predicates) ───
criteria:

  - id: W11-1
    label: "Shared-module extraction complete"
    hard-constraint-ref: HC-W11-1
    description: >
      assert_account_key_parity and reset_account_key_lock extracted from both
      paper scripts into a shared module. CTO determines target module path.
      Loop-name discriminator parameterized via argument, not hardcoded in each
      copy. Both scripts import from the shared module.
    done_when: >
      (a) A new shared module file exists under src/forex_system/ (exact path is
      a CTO decision) containing assert_account_key_parity and reset_account_key_lock.
      (b) Both scripts import these functions from the shared module (no local
      definition of either function remains in either script). (c) The loop-name
      discriminator string is passed as an argument, not hardcoded. (d) pytest
      (all) passes at a count >= the pre-Wave-11 baseline. (e) ruff check src/
      reports no new violations above the pre-Wave-11 baseline. (f) tests/backtest/
      test_engine.py::test_no_lookahead PASS.
    routing: >
      CTO: decide target module path and architecture.
      QD: implement the extraction under CTO direction.
      Principal Reviewer: verify behavioral equivalence and import correctness.
    verdict-if-fail: do-not-commit

  - id: W11-2
    label: "F-100 JPY mid-price explicit guard present in both files"
    hard-constraint-ref: HC-W11-2
    description: >
      Silent fallback to USD-nominal when mid <= 0 replaced by explicit guard
      with structured log event in both vol_target_carry.py and carry_fred.py.
      CRO decides the action (skip, halt, or explicit-fallback with warning).
    done_when: >
      (a) Both src/forex_system/strategies/vol_target_carry.py and
      src/forex_system/strategies/carry_fred.py contain an explicit conditional
      guard on the mid <= 0 path for JPY pairs. (b) The guard emits a structured
      log entry (not a silent pass, not a bare print) naming the triggering
      condition and the action taken. (c) The guard is covered by at least one
      unit test asserting the structured log event fires on mid <= 0 input for
      a JPY pair. (d) No silent fallback path remains (NHT to adversarially verify
      the code path cannot produce USD-nominal usage when mid <= 0 without logging).
    routing: >
      CRO: determine the action on mid <= 0 (skip cycle, raise, or explicit fallback
      with warning log); this is a risk-domain decision.
      QD: implement the guard per CRO direction.
      NHT: adversarially verify no silent fallback path remains.
    verdict-if-fail: do-not-commit

  - id: W11-3
    label: "F-101 OSError catch added symmetrically"
    hard-constraint-ref: HC-W11-3
    description: >
      Outer except clause at vt.py:565 and carry_fred.py:546 covers OSError
      in addition to (or instead of) BlockingIOError. SKIP_DISPATCH_LOCK_BUSY
      sentinel behavior on BlockingIOError preserved.
    done_when: >
      (a) run_paper_trading_vt.py line ~565 except clause catches OSError (or
      equivalent superset that includes both BlockingIOError and broader OS
      filesystem errors). (b) The identical change is present in
      run_paper_trading_carry_fred.py at its corresponding line (~546).
      (c) The SKIP_DISPATCH_LOCK_BUSY sentinel event is still emitted on
      BlockingIOError (the existing behavior is preserved, not removed).
      (d) At least one test in tests/scripts/ covers the broader OSError path
      (e.g., simulating a read-only lock-file scenario), or the existing
      concurrent tests implicitly cover it (QD and CRO jointly determine
      whether new test coverage is required). (e) ruff check src/ no new
      violations. (f) pytest (all) no regressions.
    routing: >
      QD: implement symmetric change.
      CRO: determine dispatch-lock invariant impact; verify the OSError
      catch does not introduce a new silent-failure mode at the lock boundary.
    verdict-if-fail: do-not-commit

  - id: W11-4
    label: "F-102 real-cycle subprocess test present"
    hard-constraint-ref: HC-W11-4
    description: >
      tests/scripts/test_wave10_dispatch_lock.py gains at least one test that
      invokes the actual run_cycle entry point (not the inline _WORKER_SCRIPT)
      via subprocess and asserts all three Wave-10 HC-5 conditions.
    done_when: >
      (a) A test function exists in test_wave10_dispatch_lock.py whose subprocess
      invocation target is the real run_cycle function (not _WORKER_SCRIPT or an
      equivalent inline helper script). (b) The test asserts: exactly one process
      acquires the lock, the contending process emits SKIP_DISPATCH_LOCK_BUSY, and
      aggregate JPY-correlated exposure peak <= 15% during the test. (c) The test
      PASSES in the project's pytest run. (d) The existing _WORKER_SCRIPT tests
      continue to pass (they are not removed). (e) NHT confirms the new test
      exercises a materially different code path from _WORKER_SCRIPT tests.
    routing: >
      QD: design and implement the real-cycle subprocess test.
      NHT: adversarially assess whether the new test exercises a meaningfully
      different code path from the existing _WORKER_SCRIPT-based tests; dissent
      if NHT judges the coverage claim is not materially strengthened.
    verdict-if-fail: do-not-commit

  - id: W11-5
    label: "F-103 drawdown ladder amendment doc contradiction clarified"
    hard-constraint-ref: HC-W11-5
    description: >
      PM authors a clarification addendum resolving the contradiction between
      HC-6 pass-condition (structural-5-elements = done) and Section-2 line 46
      ('CRO determination must be appended before Wave-10 commit'). PM owns
      this in wave-2 as the document author; no technical adjudication required.
    done_when: >
      (a) A clarification addendum exists (appended to
      docs/specs/drawdown_ladder_amendment_2026-05-06.md or as a sibling file
      at docs/specs/drawdown_ladder_amendment_2026-05-06_clarification.md; PM
      decides in wave-2). (b) Addendum cites both contradicting sources by their
      exact location (HC-6 pass-condition in wave10 AC yaml lines 295-305; Section-2
      line 46 of the amendment doc). (c) Addendum states which source governs
      (HC-6 AC pass-condition is authoritative for Wave-10 HC-6 closure).
      (d) Addendum records that CRO's recalibration determination is captured
      in .fintech-org/artifacts/wave10-fix-and-amend/cro-reverification.yaml.
      (e) Addendum states that the 'before Wave-10 commit' clause is superseded
      by Wave-10 CONSENSUS closure (commit 747a6ad). (f) No code change and no
      change to ladder threshold values. (g) Principal Reviewer confirms the
      clarification resolves the contradiction without introducing new ambiguity.
    routing: >
      PM: owns wave-2 authoring of this clarification (PM-domain doc fix).
      Principal Reviewer: confirm the clarification is unambiguous and does
      not contradict any other ratified artifact.
    verdict-if-fail: revise-before-consensus
    # Softer verdict than do-not-commit: doc-only; does not block code commit
    # but must be resolved before CONSENSUS is signed.

# ── Global success gate ────────────────────────────────────────────────────────
wave11-success-gate: >
  ALL of the following must be satisfied before Wave-11 CONSENSUS is eligible
