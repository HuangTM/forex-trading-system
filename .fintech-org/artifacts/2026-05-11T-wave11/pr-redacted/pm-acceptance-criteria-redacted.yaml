    from the shared module (no local definition of either function remains in either script). (c) The loop-name discriminator string is passed as an argument, not hardcoded. (d) pytest (all) passes at a
    count >= the pre-Wave-11 baseline. (e) ruff check src/ reports no new violations above the pre-Wave-11 baseline. (f) tests/backtest/ test_engine.py::test_no_lookahead PASS.

    '
- id: W11-2
  label: F-100 JPY mid-price explicit guard present in both files
  done_when: '(a) Both src/forex_system/strategies/vol_target_carry.py and src/forex_system/strategies/carry_fred.py contain an explicit conditional guard on the mid <= 0 path for JPY pairs. (b) The guard
    emits a structured log entry (not a silent pass, not a bare print) naming the triggering condition and the action taken. (c) The guard is covered by at least one unit test asserting the structured log
    event fires on mid <= 0 input for a JPY pair. (d) No silent fallback path remains (NHT to adversarially verify the code path cannot produce USD-nominal usage when mid <= 0 without logging).

    '
- id: W11-3
  label: F-101 OSError catch added symmetrically
  done_when: '(a) run_paper_trading_vt.py line ~565 except clause catches OSError (or equivalent superset that includes both BlockingIOError and broader OS filesystem errors). (b) The identical change is
