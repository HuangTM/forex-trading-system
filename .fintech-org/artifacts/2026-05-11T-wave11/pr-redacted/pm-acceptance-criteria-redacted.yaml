hard-constraints:
- id: HC-W11-1
  scope-item: "Item 1 \u2014 shared-module extraction"
  constraint: "paper_only: true; no_live_capital: true; no_paper_loop_start_by_orchestrator: true. shared_module_byte_identical_assertion_proven: required. The shared module must be extracted without altering\
    \ the behavioral contract of either paper script. The loop-name discriminator string ('vt loop' vs 'carry_fred loop') must be preserved as a parameterized argument \u2014 the strings themselves are\
    \ NOT changed, only their origin (inline vs argument). Both paper scripts must pass their existing regression gates (test_no_lookahead, ruff check src/, pytest count >= current baseline) after extraction.\n"
- id: HC-W11-2
  scope-item: "Item 2 \u2014 F-100 JPY mid-price guard"
  constraint: "f100_jpy_mid_guard_explicit: required. The silent fallback to USD-nominal when mid <= 0 must be replaced by an EXPLICIT guard that (a) logs a structured decision-boundary event (not a bare\
    \ print or silent pass), (b) names the triggering condition (mid <= 0 for JPY pair), (c) names the action taken (whether skip, halt, or fallback \u2014 CRO decides which). The guard must appear symmetrically\
    \ in BOTH vol_target_carry.py and carry_fred.py. Fail-condition: guard is silent (no structured log on mid <= 0 path) or guard is present in only one of the two files.\n"
- id: HC-W11-3
  scope-item: "Item 3 \u2014 F-101 OSError coverage"
  constraint: 'f101_oserror_catch_added_symmetrically: required. The except clause at run_paper_trading_vt.py:565 and run_paper_trading_carry_fred.py:546 must catch OSError (which subsumes BlockingIOError)
    or catch both explicitly. The SKIP_DISPATCH_LOCK_BUSY sentinel behavior on BlockingIOError must NOT be changed. The symmetric change in carry_fred at its corresponding line must be identical in structure.
    Fail-condition: change applied to only one script, or BlockingIOError sentinel behavior altered, or OSError catch swallows exceptions that should propagate (CRO determines the boundary).

    '
- id: HC-W11-4
  scope-item: "Item 4 \u2014 F-102 real-cycle subprocess test"
  constraint: 'f102_real_cycle_subprocess_test_present: required. At least one test in tests/scripts/test_wave10_dispatch_lock.py must invoke the actual run_cycle entry point (not _WORKER_SCRIPT or an equivalent
    inline helper) via subprocess. The test must still assert the three required conditions from Wave-10 HC-5: (a) exactly one lock acquired, (b) SKIP_DISPATCH_LOCK_BUSY emitted by the contending process,
    (c) aggregate JPY-correlated exposure peak <= 15%. The existing _WORKER_SCRIPT tests may remain; this criterion requires an ADDITIONAL test using the real code path. Fail-condition: no test exercises
    the actual run_cycle path via subprocess, or the three Wave-10 HC-5 assertions are absent from the new test.

    '
- id: HC-W11-5
  scope-item: "Item 5 \u2014 F-103 doc clarification"
  constraint: 'f103_doc_contradiction_clarified: required. A clarification addendum must be appended to docs/specs/drawdown_ladder_amendment_2026-05-06.md (or authored as a sibling file, PM decides format
    in wave-2). The addendum must: (a) cite both the HC-6 pass-condition and Section-2 line 46 as the contradicting sources, (b) state which governs (the HC-6 AC pass-condition is the authoritative completion
    test for HC-6), (c) record that CRO''s recalibration determination is captured in .fintech-org/artifacts/wave10-fix-and-amend/cro-reverification.yaml (not by doc-appendage), (d) state that the ''before
    Wave-10 commit'' clause in Section-2 is superseded by Wave-10 CONSENSUS closure (commit 747a6ad). No code change. No change to ladder threshold values. Fail-condition: addendum absent, or either contradicting
    source not cited, or the authoritative completion source not identified.

    '
