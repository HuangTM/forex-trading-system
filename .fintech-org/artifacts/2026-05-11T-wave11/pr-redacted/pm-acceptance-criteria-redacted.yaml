    removed). (d) At least one test in tests/scripts/ covers the broader OSError path (e.g., simulating a read-only lock-file scenario), or the existing concurrent tests implicitly cover it (QD and CRO
    jointly determine whether new test coverage is required). (e) ruff check src/ no new violations. (f) pytest (all) no regressions.

    '
- id: W11-4
  label: F-102 real-cycle subprocess test present
  done_when: '(a) A test function exists in test_wave10_dispatch_lock.py whose subprocess invocation target is the real run_cycle function (not _WORKER_SCRIPT or an equivalent inline helper script). (b)
    The test asserts: exactly one process acquires the lock, the contending process emits SKIP_DISPATCH_LOCK_BUSY, and aggregate JPY-correlated exposure peak <= 15% during the test. (c) The test PASSES
    in the project''s pytest run. (d) The existing _WORKER_SCRIPT tests continue to pass (they are not removed). (e) NHT confirms the new test exercises a materially different code path from _WORKER_SCRIPT
