    '
- id: W11-5
  label: F-103 drawdown ladder amendment doc contradiction clarified
  done_when: '(a) A clarification addendum exists (appended to docs/specs/drawdown_ladder_amendment_2026-05-06.md or as a sibling file at docs/specs/drawdown_ladder_amendment_2026-05-06_clarification.md;
