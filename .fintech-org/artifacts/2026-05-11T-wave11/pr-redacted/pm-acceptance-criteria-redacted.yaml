    states which source governs (HC-6 AC pass-condition is authoritative for Wave-10 HC-6 closure). (d) Addendum records that CRO''s recalibration determination is captured in .fintech-org/artifacts/wave10-fix-and-amend/cro-reverification.yaml.
    (e) Addendum states that the ''before Wave-10 commit'' clause is superseded by Wave-10 CONSENSUS closure (commit 747a6ad). (f) No code change and no change to ladder threshold values. (g) Principal
    Reviewer confirms the clarification resolves the contradiction without introducing new ambiguity.

