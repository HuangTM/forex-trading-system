blowup-analog: "Knight Capital Americas LLC (SEC Release 34-70694, File 3-15570, Oct 16 2013) — closest fit for the structural risk profile of expanding from 2 to 4 strategies sharing one OAuth + one account-key + one rate-limit bucket + one process-local dispatch lock. Knight lost >$460M in ~45 minutes because (a) a deploy touched one of N parallel order-routing components without uniform verification, and (b) the kill switch was not reachable independently of the runaway component. Both failure modes apply directly to the proposed expansion: (a) deploying a 3rd or 4th strategy without updating exposure_aggregator's per-strategy allocation logic creates an N-way silent-divergence surface analogous to Knight's stale-server problem; (b) kill_switch.py currently lives in-process per strategy — if a 4th strategy (ML) goes runaway it can still issue orders within the 1-order/sec Saxo session limit while its own audit log diverges, exactly the property Knight identified. LTCM (correlation-risk-under-stress) and Archegos (single-counterparty / single-OAuth-bucket concentration) are secondary analogs but Knight is the dominant fit because the failure mode is structural-plumbing, not portfolio-correlation."

