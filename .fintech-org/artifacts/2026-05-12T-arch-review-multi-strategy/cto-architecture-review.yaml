      - "scripts/run_paper_trading_carry_fred.py:141-215 — duplicate block"
      - "scripts/run_paper_trading.py:57-120 — third duplicate"
      - "scripts/run_paper_trading_vt.py:94-108 — CRO constants to centralise"
      - "scripts/run_paper_trading_carry_fred.py:105-119 — CRO constants duplicate"
    description: >
      Three paper scripts share ~500 LoC of identical logic (trace handler, helpers, dispatch-lock,
      risk instantiation, main args). Extract to a BaseRunner class or parameterized entry-point.
      Per-strategy residual (~150 LoC) covers: strategy class, WS label, pair config, strategy-
