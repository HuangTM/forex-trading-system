  - id: REM-3
    priority: 3
    title: "Define ModelServingInterface ABC in core/interfaces.py"
    file_lines:
      - "src/forex_system/core/interfaces.py:114-135 — insert after ExecutionBackend ABC"
    description: >
      Strategy #4 (ML) requires a model lifecycle contract. Minimal ABC: load(artifact_path: str),
      predict(features: pd.DataFrame) -> pd.Series, model_version() -> str, drift_score() -> float.
      Strategy #4 should COMPOSE this interface, not replace Strategy. Without this, an ML
