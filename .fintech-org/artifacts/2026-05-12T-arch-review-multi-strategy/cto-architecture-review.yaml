      simultaneous flock contention at every bar close. Stagger intervals by 30s per strategy
      (VT: 1800s, CF: 1830s, S3: 1860s, S4: 1890s) to distribute lock acquisition across
      the bar-close window. Best absorbed into BaseRunner config after REM-2.
    depends_on: ["REM-2"]
