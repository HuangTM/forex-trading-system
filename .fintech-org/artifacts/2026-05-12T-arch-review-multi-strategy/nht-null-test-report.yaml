gaps-found:

  - gap_id: NHT-ARCH-1
    probe_class: 1_robust_unfalsifiable
    description: >-
      "Robust" is unfalsifiable as worded in the PM scope. To make the
      claim testable, the PM acceptance-criteria would need to specify
      operational failure modes (e.g., "robust = the system continues to
      satisfy BC-8-LIFT-COND-1..7 under N additional strategies sharing
      the single Saxo paper account, single account-key, single oauth
      token, single data dir, single host"). The redacted criteria yaml
      lines 30-44 enumerate shared-resources and state-snapshot-refs but
      do NOT bind a falsification predicate for "robust at N=4". The
      claim therefore cannot be rejected by any current test suite —
      which is the textbook signature of a non-claim.
    evidence_file_line:
      - ".fintech-org/artifacts/2026-05-12T-arch-review-multi-strategy/pm-acceptance-criteria-redacted-for-cro-nht.yaml:30-44"
      - ".fintech-org/artifacts/2026-05-12T-arch-review-multi-strategy/pm-acceptance-criteria-redacted-for-cro-nht.yaml:55-65"
    severity: concern
    suggested_fix: >-
      Before approving the Strangler-Fig path, PM must define the
      falsification predicate for "robust at N strategies": specifically,
      the max-concurrent-strategies cap; per-strategy resource-isolation
      invariant; the shared-resource contention failure modes (oauth
      token rate-limit, account-key parity gate, file-lock starvation,
      drawdown-ladder aggregation semantics across strategies). Until
      that predicate is defined and a test asserts it, "robust" is
      rhetoric, not engineering.

  - gap_id: NHT-ARCH-2
    probe_class: 2_liskov_violation
    description: >-
      The Strategy ABC at src/forex_system/core/interfaces.py:35 declares
      __init__(self, params: dict[str, Any]) — a single argument. Six of
      ten registered strategies (vol_target_carry, carry_fred, carry,
      carry_momentum, fred_carry_stripped, vol_target_carry_no_vol_scaling)
      override __init__ with a second positional argument
      (rate_data: pd.DataFrame | None = None). The registry factory
      create_strategy(name, params) at registry.py:31-37 passes ONLY
      params, never rate_data. This is a Liskov substitution violation in
      practice: the supposedly-substitutable Strategy subtype REQUIRES an
      additional construction-time dependency that the abstract contract
      does not declare. Smoking gun: scripts/run_falsification_trial.py
      maintains a hardcoded allowlist _SELF_LOADING_RATE_STRATEGIES at
      line 439-442 and uses inspect.signature(strategy_cls.__init__) at
      line 448-449 to choose between create_strategy() and direct
      instantiation with rate_data injection. The mere existence of this
      reflection-based dispatch is structural proof the ABC contract is
      leaky. Adding 1 ML strategy + 1 intraday-classical strategy will
      add NEW construction-time dependencies (model artifact path, model
      version, feature pipeline, tick-data source, lookback buffer) which
      the existing ABC will leak again — unless the ABC is fixed first.
    evidence_file_line:
      - "src/forex_system/core/interfaces.py:35"
      - "src/forex_system/strategies/registry.py:17-37"
      - "src/forex_system/strategies/vol_target_carry.py:44"
      - "src/forex_system/strategies/carry_fred.py:79-88"
      - "src/forex_system/strategies/carry.py:32"
      - "src/forex_system/strategies/carry_momentum.py:41"
      - "src/forex_system/strategies/fred_carry_stripped.py:92"
      - "src/forex_system/strategies/vol_target_carry_no_vol_scaling.py:57"
      - "scripts/run_falsification_trial.py:439-474"
    severity: blocking
    suggested_fix: >-
      The "no rework of existing foundations" claim cannot be sustained.
      The ABC must be reworked BEFORE adding strategies #3 and #4, not
      after, because the new strategies will compound the design debt
      (every caller will need another allowlist). Either (a) widen ABC
      contract to require_data: dict[str, Any] passed at init, (b) move
      data-dependency to a separate Resolver/Loader abstraction that
      executes BEFORE Strategy construction, or (c) require all
      strategies to self-load via params['data_path'] (deprecate the
      rate_data positional arg). Choice belongs to CTO; the constraint
      is: the leaky pattern MUST NOT cross to N=4. This is rework of
      foundations, which directly contradicts the atomic claim.

  - gap_id: NHT-ARCH-3
    probe_class: 3_scalability_script_duplication
    description: >-
      The two paper-loop scripts are 1005 LoC and 938 LoC respectively
      (total 1943 LoC). Empirical diff: 557 lines change between them
      (312 deletions of vt-specific text, 245 additions of carry_fred-
      specific text). That is, approximately 1386 LoC are identical or
      near-identical structure (cycle loop, fcntl lock, drawdown ladder,
      kill switch wiring, account-key parity gate, heartbeat watchdog,
      Saxo client, equity-write, swap accrual, WS-trace handler). The
      registry pattern proves the strategy CLASSES are reusable. It does
      NOT prove the paper-loop SCRIPTS scale. With the proposed N=4 and
      no template extraction, the expected script-LoC envelope is
      ~4 x 1000 = 4000 LoC of duplicated risk-management code, with
      drift between copies being the dominant operational risk. Knight
      Capital pattern: stale code path in one copy lags the canonical
      copy. CTO has not stated how N=4 scripts will be kept in lockstep
      with BC-8-LIFT-COND-1..7 (drawdown ladder thresholds, JPY-
      correlated cap, kill-switch trigger paths, account-key parity).
      "Strangler-Fig step 1 = template paper scripts (1-2d)" per the
      redacted refactor_path_proposed (line 83) compresses what is
      actually a redesign of the risk-envelope-as-shared-library — that
      is not 1-2d work; that is the precondition.
    evidence_file_line:
      - "scripts/run_paper_trading_vt.py:1-1005"
      - "scripts/run_paper_trading_carry_fred.py:1-938"
      - "diff(scripts/run_paper_trading_vt.py, scripts/run_paper_trading_carry_fred.py) -> 557 changed lines via /usr/bin/diff awk-counted"
      - ".fintech-org/artifacts/2026-05-12T-arch-review-multi-strategy/pm-acceptance-criteria-redacted-for-cro-nht.yaml:83"
    severity: blocking
    suggested_fix: >-
      Reject the "1-2d template" estimate. Before adding strategies #3
      and #4, the shared risk envelope (drawdown contract, kill switch,
      account-key parity, heartbeat watchdog, fcntl dispatch lock,
      JPY-correlated cap, drawdown ladder) MUST be extracted into a
      single shared paper-loop runner class. Strategy-specific code
      becomes a passed-in callable. Acceptance: BC-8-LIFT-COND-1..7 are
      each implemented EXACTLY ONCE in the codebase, with N strategies
      composing in. Estimate: 1-2 weeks not 1-2 days, with a regression
      pass on the current two paper loops that includes the sacred test
      and a new "paper-loop parity test" (vt path before and after
      extraction yields bit-identical equity / decision trace on a
      replay fixture).

  - gap_id: NHT-ARCH-4
    probe_class: 4_ml_infrastructure_absence
    description: >-
      Verified by grep: src/forex_system/ml/ does not exist. No file
      under src/forex_system/ matches any of (model_card, drift_monitor,
      calibration_tracker, safetensors, .onnx, model_version,
      model_registry, model_serving, inference_server). No imports of
      sklearn / torch / tensorflow / xgboost / lightgbm anywhere under
      src/. Therefore, NONE of the standard ML-serving infrastructure
      exists: model artifact loading, model versioning, feature-pipeline
      contract enforcement, training-vs-serving feature parity, drift
      monitoring, calibration tracking, model rollback, model A/B,
      shadow-mode evaluation, or feature staleness detection. The atomic
      claim asserts the baseline "absorbs" an ML strategy via
      Strangler-Fig "without rework of existing foundations." That is
      false on the literal text: a new src/forex_system/ml/ subsystem
      with all of the above is, by definition, NEW foundations, not
      existing foundations being absorbed. Compounding: an ML strategy
      introduces training-vs-serving leakage as a failure mode that no
      current test in tests/ covers (zero matches for "drift" or
      "calibration" in tests/).
    evidence_file_line:
      - "ls src/forex_system/ -> no ml/ subdirectory"
      - "ls src/forex_system/ -> no portfolio/ subdirectory"
      - "grep -r -i -E '(model_card|drift_monitor|calibration_tracker|safetensors|\\.onnx|model_version|model_registry|model_serving|inference_server)' src/ -> 0 matches"
      - "grep -r 'import (sklearn|torch|tensorflow|xgboost|lightgbm)' src/ -> 0 matches"
      - ".fintech-org/artifacts/2026-05-12T-arch-review-multi-strategy/pm-acceptance-criteria-redacted-for-cro-nht.yaml:44"
    severity: blocking
    suggested_fix: >-
      The atomic claim must be REWRITTEN to acknowledge that ML strategy
      absorption requires NEW foundations, not adaptation of existing
      ones. The honest version is: "Existing Phase-0 baseline absorbs
      one additional intraday-classical strategy via Strangler-Fig
      (subject to NHT-ARCH-2 and NHT-ARCH-3 rework); the ML strategy
      requires a separate src/forex_system/ml/ greenfield subsystem
      with its own design review, including at minimum: model artifact
      contract, versioning policy, training-vs-serving parity test,
      feature-pipeline reproducibility, drift monitor, calibration
      tracker, rollback path, and ML-specific kill-switch trigger." The
      2-3w estimate in refactor_path_proposed compresses what is a
      multi-month research-engineering project for any ML system that
      touches live capital paths. Forward-looking-only constraint
      respected; this is NOT a recommendation to deploy.

  - gap_id: NHT-ARCH-5
    probe_class: 5_sacred_test_layer
    description: >-
      Re-read tests/backtest/test_engine.py::test_no_lookahead (lines
      55-90). The test operates at the ENGINE layer, not the strategy
      layer — it constructs an artificial signal series with explicit
      lookahead (future_return.shift(-1) > 0) and verifies that
      run_backtest(..., entry_delay_bars=1) does not produce a
      suspiciously high Sharpe. PARTIAL SURVIVAL: this is good. It
      means new strategies do NOT add new no-lookahead test obligations
      at the ENGINE level (the engine is verified independent of any
      Strategy subclass). HOWEVER: the test does NOT verify that any
      concrete Strategy's generate_signals() is itself lookahead-free.
      It only verifies the engine's shift discipline. A strategy that
      internally peeks at data["close"].shift(-1) would generate a
      lookahead signal, the engine would shift by 1, and the result
      would still be ~+1 bar of lookahead leakage. The ABC docstring
      at interfaces.py:46 says "Must NOT use future data (no
      lookahead)" but this is a comment-level constraint with NO
      machine-enforceable assertion. Adding strategies #3 (intraday-
      classical) and especially #4 (ML — where future-leakage modes
      include time-based features, target-encoding leakage, group-
      ordering leakage, and training-window-vs-serving-window
      mismatches) makes the comment-only contract significantly more
      dangerous.
    evidence_file_line:
      - "tests/backtest/test_engine.py:55-90"
      - "src/forex_system/core/interfaces.py:38-49"
    severity: concern
    suggested_fix: >-
      Add a parameterized per-strategy no-lookahead probe: for each
      registered Strategy, construct a signal using a controlled-noise
      OHLCV fixture, generate signals, then re-generate signals on the
      same fixture with the last K bars replaced by NaN/different
      values; assert the first N-K signal values are unchanged. This
      detects internal use of .shift(-k) inside generate_signals.
      Mandatory before adding any ML strategy (the failure mode is
      especially silent in ML — feature pipelines routinely leak).

  - gap_id: NHT-ARCH-6
    probe_class: 6_strangler_fig_incrementality
    description: >-
      The Strangler-Fig path "template paper scripts (1-2d), add
      portfolio allocator subsystem (1w), add ML platform subsystem
      (2-3w)" assumes each step preserves passing tests. Verification of
      this assumption is impossible from the current test suite,
      because: (a) there is no "end-to-end paper loop replay test" — the
      paper scripts at scripts/run_paper_trading_*.py are 1000-LoC
      operational programs with NO integration test that runs them
      against a fixture and asserts behavior; (b) BC-8-LIFT-COND-1..7
      are enforced by INLINE code in the paper scripts, not by a shared
      library that has its own test suite. Concrete consequence: a
      refactor of the two paper scripts into one templated runner can
      pass all current backtest/sizing/strategy unit tests AND silently
      break BC-8-LIFT-COND-2 (lock released on all exit paths) or
      BC-8-LIFT-COND-3 (account-key parity gate at startup), because no
      test today exercises the paper-loop exit paths under exception or
      the parity gate under account-key mismatch. The Strangler-Fig
      step "1-2d" relies on a test safety net that does not exist for
      the operational layer.
    evidence_file_line:
      - "tests/integration/ -> contains test_live_loop_sizing_parity.py only"
      - "scripts/run_paper_trading_vt.py:1-1005 — operational program, not under test"
      - "scripts/run_paper_trading_carry_fred.py:1-938 — operational program, not under test"
      - ".fintech-org/artifacts/2026-05-12T-arch-review-multi-strategy/pm-acceptance-criteria-redacted-for-cro-nht.yaml:55-65 — BC-8-LIFT-COND-1..7 stated"
    severity: blocking
    suggested_fix: >-
      Before any paper-loop templating refactor: add a paper-loop
      regression fixture (recorded Saxo response + recorded equity
      sequence) and an integration test that drives the paper loop
      against the fixture end-to-end and asserts each of BC-8-LIFT-
      COND-1..7. Without this test, "the existing paper system actually
      keeps passing all current tests" is vacuously true (the tests do
      not cover the paper system) and Strangler-Fig steps cannot be
      verified incremental. This is rework of existing foundations.

  - gap_id: NHT-ARCH-7
    probe_class: 7_reviewer_independence
    description: >-
      Per the prompt's structural-incentive observation: of the staffed
      roles (pm, cto, cro, null-hypothesis-tester, principal-reviewer),
      only null-hypothesis-tester has near-zero stake in the system
      continuing as-is. pm authored the acceptance-criteria; cto owns
      the architecture; cro has co-signed BC-8-LIFT-COND-1..7 and the
      paper-launch authorization. principal-reviewer is independent by
      role definition but is reviewing artifacts produced by the
      stakeholders above. There is therefore a real risk that
      sufficient-engineering and good-enough framings drift into the
      consensus artifact. This is not an accusation of bad faith — it
      is a structural observation about review composition.
    evidence_file_line:
      - ".fintech-org/artifacts/2026-05-12T-arch-review-multi-strategy/pm-acceptance-criteria-redacted-for-cro-nht.yaml:75-81"
    severity: concern
    suggested_fix: >-
      This NHT report MUST be preserved verbatim in CONSENSUS, not
      paraphrased. The append-only rule for dissent (fintech-org rule 6)
      applies. If the consensus narrative summarizes findings, the
      summary must be marked as "consensus characterization of NHT
      findings" and the verbatim findings list must remain attached.

  - gap_id: NHT-ARCH-8
    probe_class: 8_asymmetric_cost_of_wrong
    description: >-
      Asymmetric-cost analysis (forward-looking, no live capital implied):
      (a) Senior roles say "go" and they are wrong — system is NOT
      robust enough. Failure mode: drift between paper-loop copies
      causes one strategy to violate BC-8-LIFT-COND-N in a manner
      undetected by current tests; aggregate JPY-correlated cap silently
      exceeded across N=4 strategies; ML strategy's training-serving
      drift causes signal collapse before the operator notices. Cost:
      operational embarrassment is bounded (paper-only per PM
      hard-constraints line 27), but the GOVERNANCE precedent — that
      "good enough" beat "rebuilt foundations" — propagates into the
      next phase, where the same foundations may touch live capital.
      Phase-1 / Phase-2 readiness inherits Phase-0 debt.
      (b) Senior roles say "no-go" and they are wrong — Strangler-Fig
      WAS actually sound. Failure mode: 1-2 weeks of extra refactor
      work that produces a cleaner shared runner; operator-experience
      improves; no strategy-research time lost because no-go applies to
      ARCHITECTURE, not strategy research. Cost: pure delay,
      reversible, no asymmetric downside.
      Asymmetry: false-negative (rejecting the Strangler-Fig claim when
      foundations are actually fine) costs ~1-2 weeks of refactor.
      False-positive (accepting "no rework needed" when foundations
      have NHT-ARCH-2..6) costs governance precedent + accumulated
      design debt + degraded test safety net at N=4. Standard NHT
      asymmetry doctrine: err toward false-negative.
    evidence_file_line:
      - ".fintech-org/artifacts/2026-05-12T-arch-review-multi-strategy/pm-acceptance-criteria-redacted-for-cro-nht.yaml:16-28"
      - "(this report) NHT-ARCH-2, NHT-ARCH-3, NHT-ARCH-4, NHT-ARCH-5, NHT-ARCH-6"
    severity: concern
    suggested_fix: >-
      Decision under asymmetric loss: REJECT the atomic claim as
      worded. Accept a NARROWED claim only: "The existing baseline can
      absorb one additional intraday-classical strategy via Strangler-
      Fig conditional on remediation of NHT-ARCH-2, NHT-ARCH-3,
      NHT-ARCH-5, NHT-ARCH-6 first." The ML strategy is a separate
      decision deferred until src/forex_system/ml/ greenfield design
      review per NHT-ARCH-4.

  - gap_id: NHT-ARCH-9
    probe_class: 9_selection_bias_in_question_framing
    description: >-
      The CEO is asking "is the system good enough?" The PM acceptance-
      criteria document is structured to elicit go / no-go on the
      Strangler-Fig PATH (line 22 hard-constraint:
      strangler_fig_path_assessed_explicitly: true). This is a path-
      evaluation question. A different and arguably more useful
      question — "is the system designed for what the firm wants over
      the next 12 months?" — is not on the agenda. The redacted
      acceptance-criteria does include hard-constraint line 23
      "alternative_rewrite_path_assessed_explicitly: true", which is
      good (the rewrite path IS on the agenda). However, the framing
      heavily anchors on "Strangler-Fig vs. rewrite" as a binary, when
      the actual landscape includes (a) Strangler-Fig with prerequisite
      foundation work (NHT-ARCH-2/3/5/6); (b) hybrid path — extract
      shared risk envelope (1-2 weeks) then Strangler-Fig from there;
      (c) intraday-classical only, defer ML; (d) freeze N=2 paper for
      30-60 days, gather operational data, then re-decide. Surfacing
      this is in the NHT role per probe instruction 9.
    evidence_file_line:
      - ".fintech-org/artifacts/2026-05-12T-arch-review-multi-strategy/pm-acceptance-criteria-redacted-for-cro-nht.yaml:16-28"
      - ".fintech-org/artifacts/2026-05-12T-arch-review-multi-strategy/pm-acceptance-criteria-redacted-for-cro-nht.yaml:83-85"
    severity: note
    suggested_fix: >-
      CEO/PM should explicitly choose between framings. The Strangler-
      Fig-vs-rewrite binary is presented as exhaustive; it is not. Add
      a third explicit option to the consensus: "hybrid — shared-risk-
      envelope extraction first, then Strangler-Fig." Likely the
      correct path conditional on NHT findings.

