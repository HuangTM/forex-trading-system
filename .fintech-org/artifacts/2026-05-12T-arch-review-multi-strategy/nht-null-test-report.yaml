  conclusion: >-
    Costs are asymmetric. False-positive cost has a long tail
    (governance + design debt + degraded test safety net); false-
    negative cost is bounded (~1-2 weeks of delay). Standard NHT
    asymmetry doctrine: prefer false-negative. Recommend dissent.

