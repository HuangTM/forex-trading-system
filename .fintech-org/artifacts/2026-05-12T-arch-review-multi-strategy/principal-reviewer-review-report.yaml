liskov_violation_independent_verdict:
  verdict: confirmed-violated-in-production
  abstract_init:
    file: "src/forex_system/core/interfaces.py"
    line: 35
    signature: "def __init__(self, params: dict[str, Any]):"
    verbatim_snippet: "    def __init__(self, params: dict[str, Any]):\n        self.params = params"
  registry_factory:
    file: "src/forex_system/strategies/registry.py"
    line: 31-37
    verbatim_snippet: |
      def create_strategy(name: str, params: dict) -> Strategy:
          \"\"\"Instantiate a strategy by name with given parameters.\"\"\"
          cls = STRATEGY_REGISTRY.get(name)
          if cls is None:
              available = \", \".join(STRATEGY_REGISTRY.keys())
              raise ValueError(f\"Unknown strategy: {name}. Available: {available}\")
          return cls(params)
    contract: "Passes ONLY params; never passes rate_data"
  concrete_init_audit:
    # First 30 lines of each of the 10 strategies — __init__ signatures only.
    no_override_inherits_abc:  # 4 of 10 — Liskov-conforming
      - file: "src/forex_system/strategies/bollinger_rsi.py"
        line: 13
        evidence: "class BollingerRSIStrategy(Strategy): — no __init__ override; inherits ABC's single-arg __init__"
      - file: "src/forex_system/strategies/ma_crossover.py"
        line: 12
        evidence: "class MACrossoverStrategy(Strategy): — no __init__ override"
      - file: "src/forex_system/strategies/momentum.py"
        line: 12
        evidence: "class MomentumStrategy(Strategy): — no __init__ override"
      - file: "src/forex_system/strategies/tas_ceiling_4h.py"
        line: 231
        evidence: "class TasCeiling4hStrategy(Strategy): — verified via grep 'def __init__': no override match in file; inherits ABC default"
    override_with_extra_positional:  # 6 of 10 — Liskov-violating in practice
      - file: "src/forex_system/strategies/carry.py"
        line: 32
        verbatim_snippet: "    def __init__(self, params: dict[str, Any], rate_data: pd.DataFrame | None = None):"
      - file: "src/forex_system/strategies/carry_fred.py"
        line: 79
        verbatim_snippet: "    def __init__(self, params: dict[str, Any], rate_data: pd.DataFrame | None = None):"
      - file: "src/forex_system/strategies/carry_momentum.py"
        line: 41
        verbatim_snippet: "    def __init__(self, params: dict[str, Any], rate_data: pd.DataFrame | None = None):"
      - file: "src/forex_system/strategies/fred_carry_stripped.py"
        line: 92
        verbatim_snippet: "    def __init__(self, params: dict[str, Any], rate_data: pd.DataFrame | None = None):"
      - file: "src/forex_system/strategies/vol_target_carry.py"
        line: 44
        verbatim_snippet: "    def __init__(self, params: dict[str, Any], rate_data: pd.DataFrame | None = None):"
      - file: "src/forex_system/strategies/vol_target_carry_no_vol_scaling.py"
        line: 57
        verbatim_snippet: "    def __init__(self, params: dict[str, Any], rate_data: pd.DataFrame | None = None):"
  reflection_bypass:
    file: "scripts/run_falsification_trial.py"
    line: 439-474
    verbatim_snippet: |
      _SELF_LOADING_RATE_STRATEGIES = {
          \"fred_carry_stripped\", \"carry_fred\", \"vol_target_carry\",
          \"vol_target_carry_no_vol_scaling\",
      }
      from forex_system.strategies.registry import STRATEGY_REGISTRY
      strategy_cls = STRATEGY_REGISTRY.get(strategy_name)
      ...
      sig = inspect.signature(strategy_cls.__init__)
      if \"rate_data\" in sig.parameters and strategy_name not in _SELF_LOADING_RATE_STRATEGIES:
          ...
          strategy = strategy_cls(base_params, rate_data=_rate_df)
          ...
      else:
          strategy = create_strategy(strategy_name, base_params)
    interpretation: >-
      Production caller code performs runtime signature introspection
      on the ABC override AND maintains a hardcoded name-based allowlist.
      Two-tier branching is forced because the ABC's declared contract is
      insufficient: it does not express the "needs rate_data" requirement
      that 6 of 10 strategies actually have. This is structural proof
      that the abstract contract leaks at the boundary.
  technical_severity: >-
    The bypass works for the current 10 strategies because the override
    arg is optional (default None) and the registry calls the override
    successfully via cls(params). The risk is asymmetric and forward-
    looking: (a) any new strategy whose construction-time dependency is
    NOT optional breaks the registry path silently; (b) any new caller
    that uses create_strategy() — not the falsification trial's manual
    bypass — for a rate_data-needing strategy silently gets a strategy
    instance with self._rate_data=None, which may produce a static-
    fallback signal stream rather than a dynamic one. The
    inspect.signature reflection at line 448 only protects callers that
    KNOW to use it; the typed-registry contract does not enforce it.
  is_liskov_safe_for_existing_2_strategies_paper_loop:
    answer: "narrowly yes, accidentally"
    rationale: >-
      The two paper-loop scripts (vt + carry_fred) each instantiate
      their strategy directly (not via create_strategy), so they bypass
      the lossy factory path. The Liskov violation manifests in: backtest
      drivers using create_strategy() for rate-data-needing strategies
      (would receive static-fallback), the falsification trial (mitigated
      by explicit reflection), and ANY future addition of a strategy
      whose construction needs are non-optional.
  agreement_with_disputed_claim_positions:
    cto_position: 'CTO claimed "Strategy ABC is a genuine Liskov-safe extension point" — REJECTED. The ABC itself is single-arg; reading the ABC in isolation supports this. Reading the ABC + every override + every caller reveals the contract is leaky.'
    nht_position: 'NHT claimed "ABC is leaky in production with 6 of 10 strategies overriding __init__ with extra positional arg, compensated by hardcoded allowlist + inspect.signature reflection" — UPHELD. Numbers (6 of 10) verified exactly; mechanism (allowlist + inspect.signature) verified verbatim; file:line citations match.'
  severity_assessment_independent: "blocking-for-N>=3-strategy-expansion ; non-blocking-for-current-N=2-T=0"

