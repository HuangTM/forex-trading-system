findings:
  - finding_id: "PR-F-001"
    claim: >-
      Strategy ABC at interfaces.py:35 declares __init__(self, params) but
      6 of 10 concrete strategies override with an additional positional
      rate_data arg. The registry factory at registry.py:31-37 passes only
      params, never rate_data. Production caller scripts/run_falsification_trial.py
      at lines 439-474 maintains hardcoded _SELF_LOADING_RATE_STRATEGIES
      allowlist + inspect.signature reflection on cls.__init__ to choose
      between the registry path and a direct-instantiation path with
      rate_data injected. The ABC contract is leaky in production; reflection
      + allowlist compensate for it at one call site, but other callers
      using create_strategy() for a rate-data-needing strategy silently
      receive a strategy with self._rate_data=None (static fallback). Adding
      strategies with non-optional construction dependencies (e.g., ML
      model_artifact_path, intraday tick-data source) will compound the
      leak unless the ABC widens or a Resolver/Loader abstraction is
      inserted before Strategy construction. Forward-looking blocking for
      N≥3 expansion; non-blocking for current N=2 paper loop (both existing
      scripts bypass the lossy factory path by instantiating directly).
    evidence_file_line: |
      src/forex_system/core/interfaces.py:35 (def __init__(self, params: dict[str, Any]):)
      src/forex_system/strategies/registry.py:31-37 (create_strategy passes only params)
      src/forex_system/strategies/carry.py:32 (params, rate_data=None)
      src/forex_system/strategies/carry_fred.py:79 (params, rate_data=None)
      src/forex_system/strategies/carry_momentum.py:41 (params, rate_data=None)
      src/forex_system/strategies/fred_carry_stripped.py:92 (params, rate_data=None)
      src/forex_system/strategies/vol_target_carry.py:44 (params, rate_data=None)
      src/forex_system/strategies/vol_target_carry_no_vol_scaling.py:57 (params, rate_data=None)
      scripts/run_falsification_trial.py:439-474 (allowlist + inspect.signature dispatch)
    severity: blocking
    recommended-action-class: clarify-spec
    owning-role: cto
    routing-rationale: >-
      The ABC contract is a CTO-owned design artifact. The closed-enum
      action class clarify-spec means the abstract contract must specify
      what construction-time data dependencies are permitted and how they
      are carried; the principal-reviewer is forbidden from proposing the
      specific spec or implementation per role contract.

  - finding_id: "PR-F-002"
    claim: >-
      Two paper-trading scripts (run_paper_trading_vt.py 1005 LoC,
      run_paper_trading_carry_fred.py 938 LoC) are empirically 71.3%
      duplicated (557 changed lines via /usr/bin/diff; 1386 estimated
      shared). BC-8-LIFT-COND-1..7 risk-envelope code is inline-replicated
      rather than shared-library-extracted. With 4 strategies as separate
      scripts the maintenance surface compounds; a CRO-constant amendment
      (drawdown ladder, JPY cap, kill-switch threshold) applied to N-1 of
