  - finding_id: "PR-F-005"
    claim: >-
      The wave-2 artifacts on disk (CTO, CRO, NHT) contain decision /
      body / confidence / dissent-statement / recommended_* /
      decision_conditions stance fields. The principal-reviewer prompt
      instructed that "the orchestrator should have stripped those" but
      the actual on-disk artifacts retain them. This reviewer applied
      read-discipline to skip stance prose, but file-level redaction
      would be a stronger structural guarantee. This finding routes to
      the orchestrator (process improvement), not to any of the wave-2
      authoring roles.
    evidence_file_line: |
      .fintech-org/artifacts/2026-05-12T-arch-review-multi-strategy/cto-architecture-review.yaml (contains decision, body, confidence, decision_conditions fields)
      .fintech-org/artifacts/2026-05-12T-arch-review-multi-strategy/cro-risk-assessment.yaml (contains decision, body, confidence fields)
