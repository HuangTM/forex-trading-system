    severity: concern
    recommended-action-class: clarify-spec
    owning-role: orchestrator
    routing-rationale: >-
      Independence-preservation is a protocol-level invariant. The
      orchestrator's spawn-agent process should produce a redacted view
      for principal-reviewer wave-3, not require the reviewer to
      self-discipline against contamination. The clarify-spec class
      means: the protocol should specify whether the redaction occurs at
      orchestrator-side (preferred) or at reviewer-side (current de facto).

  - finding_id: "PR-F-006"
    claim: >-
      Sacred test tests/backtest/test_engine.py::test_no_lookahead
      operates at the engine layer; it does NOT verify that any concrete
      Strategy's generate_signals() is itself lookahead-free. The ABC
      docstring at interfaces.py:46 "Must NOT use future data (no
      lookahead)" is a comment-level constraint with no machine-
      enforceable assertion. Adding ML strategies (where feature-pipeline
      leakage is a common silent failure) without a per-strategy
      no-lookahead probe leaves the invariant unverified for new
      strategy classes. NHT raised this at wave-2 (NHT-ARCH-5);
      independently verified here.
    evidence_file_line: |
      tests/backtest/test_engine.py (sacred test verifies engine.run_backtest's shift discipline)
      src/forex_system/core/interfaces.py:38-49 (ABC docstring asserts no-lookahead as comment-level contract; no programmatic check)
    severity: concern
    recommended-action-class: add-test
    owning-role: quant-developer
    routing-rationale: >-
      A parameterized per-strategy no-lookahead probe is a test artifact
      and routes to the role that implements tests. Principal reviewer
