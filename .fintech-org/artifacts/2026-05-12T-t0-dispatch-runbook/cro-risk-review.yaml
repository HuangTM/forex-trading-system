findings:
  - check_id: 1
    check_name: "Dispatch lock (COND-1, COND-2) — try/finally semantics under signals"
    status: gap
    observation: "Code has correct try/finally around fcntl.flock at vt.py:464-820 and carry_fred.py:445-770. Lock released on normal exit and uncaught exception (Python's finally semantics). Under SIGINT and SIGTERM, Python translates these into KeyboardInterrupt and signal handler defaults (SIGTERM default = terminate without finally unless handler installed). Neither script installs a SIGTERM handler. On `tmux kill-session` (default sends SIGHUP/SIGTERM to child), the finally block may NOT run. On SIGKILL, finally definitely does NOT run. The runbook does not address this. fcntl POSIX advisory locks auto-release on process death (kernel reclaims file descriptors), so lock state is recovered automatically — BUT the os.close + flock(LOCK_UN) audit log is lost. There is no documented manual flock cleanup procedure or lock-file age check."
    runbook_section_or_file_line: "runbook Step 2.4, no SIGTERM/SIGKILL section; vt.py:807-820 finally block; no signal handler"
    severity: concern
    remediation: "Add to runbook: 'tmux kill-session sends SIGHUP/SIGTERM. Python's finally MAY run on SIGTERM but does not on SIGKILL. fcntl locks auto-release on process death (kernel-level), so the lock state recovers, but the audit log entry is lost. If you need to verify lock-released audit log entries, use tmux send-keys C-c (SIGINT) for graceful shutdown, then tmux kill-session.'"

  - check_id: 2
    check_name: "Account-key parity gate (COND-3) — positive confirmation"
    status: fail
    observation: "account_key_parity.py:63 returns silently with NO LOG on success (the O_EXCL succeeds, code writes payload, returns). The runbook Step 3.4 verification grep 'account_key' will return EMPTY on success. This is the kill-switch-design rubric anti-pattern: a gate that only logs on failure cannot give positive confirmation of success. The runbook explicitly accepts 'No lines OR lines showing successful parity lock acquisition' — i.e. accepts empty as proof of pass. Empty also means 'gate code path never reached', which is a different failure."
    runbook_section_or_file_line: "runbook line 530-535 Step 3.4; src/forex_system/risk/account_key_parity.py:63"
    severity: blocking
    remediation: "Either (a) modify account_key_parity.py to emit a positive INFO log on successful gate acquisition (preferred — small, surgical, makes the gate testable in prod), OR (b) the runbook must verify parity by checking that data/paper_account_key_lock.json exists AND contains the expected account_key AND was written within the last 60s of script start. Option (a) is the right fix; this is one log statement."

