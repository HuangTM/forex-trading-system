recommended_runbook_amendments:
  - id: AMENDMENT-1
    priority: blocking
    text: |
      Step 2.4.1 and 2.4.2 commands MUST include --loop and --token flags. Current text:
        tmux new-session -d -s paper-vt 'cd ... && python3 scripts/run_paper_trading_vt.py'
      Correct text:
        tmux new-session -d -s paper-vt 'cd ... && SAXO_TOKEN=$SAXO_TOKEN python3 scripts/run_paper_trading_vt.py --loop --interval 1800'
      Similarly for paper-carry. Without --loop the script runs ONE cycle then exits; the tmux session 'lives' for a few seconds and then is dead. The runbook then declares 'session alive' based on a tmux ls executed within those seconds — a Phase-3 false-positive.
    rationale-pointer: "vt.py:828 --loop is opt-in; vt.py:983 single-shot branch exits after one cycle; PM hard-constraint persistent_runner_uses_fcntl_flock_LOCK_EX_NB_unchanged: true implies persistent operation"

  - id: AMENDMENT-2
    priority: blocking
    text: |
      Add Step 1.6 Kill-switch audit-log pre-flight check:
        for f in data/kill_switch_audit.log data/kill_switch_audit_cf.log; do
          if [ -f "$f" ]; then
            LAST=$(tail -1 "$f")
            if echo "$LAST" | grep -q '"new_state":.*HALTED'; then
              echo "FATAL: $f last entry is HALTED. Operator must investigate."
              exit 1
            fi
          fi
        done
      Without this check, a stale HALTED audit entry causes KillSwitch.__post_init__ to RuntimeError on script startup — tmux session dies in milliseconds, evading naive Phase-3 'is the session alive' checks.
    rationale-pointer: "src/forex_system/risk/kill_switch.py:181-188 _check_audit_log_on_startup raises RuntimeError"

  - id: AMENDMENT-3
    priority: blocking
    text: |
      Step 3.4 (account-key parity verification) MUST be a POSITIVE check, not an absence check. Current text greps for 'account_key' in paper_trading_session.log and accepts empty as pass. Correct verification:
        test -f data/paper_account_key_lock.json && \
          python3 -c "import json; print('account_key=' + json.load(open('data/paper_account_key_lock.json'))['account_key'])"
      The file must exist and contain the same account_key both loops are using. ALTERNATIVELY (preferred): patch src/forex_system/risk/account_key_parity.py to emit a logger.info('account_key_parity_lock_acquired', extra={...}) on the success-create path (line 63 before return) AND on the success-match path (after line 67 if the keys match). This is one log statement and makes the gate observable per the kill-switch-design rubric Property 5.
    rationale-pointer: "account_key_parity.py:63 returns silently with no log; kill-switch-design Property 5 requires positive observable confirmation"

  - id: AMENDMENT-4
    priority: concern
    text: |
      Step 3.2 (log is growing) and Step 3.5 (drawdown ladder snapshot) target the WRONG log file. data/paper_trading_session.log is the equity-write trade-event audit, written only on trade execution. Per-cycle liveness must be checked in data/ws01_trace.log (vt loop) and data/ws02_trace.log (carry_fred loop). Replace verification commands:
        tail -1 data/ws01_trace.log  # vt liveness
        tail -1 data/ws02_trace.log  # carry liveness
      Both should have a recent timestamp within the last cycle_interval (1800s) of execution.
    rationale-pointer: "vt.py:119-142 ws01 handler writes to data/ws01_trace.log; vt.py:722 EQUITY_LOG only on trade event"

  - id: AMENDMENT-5
    priority: concern
    text: |
      Add hostname assertion at top of runbook (after the cd):
        echo "host=$(hostname) cwd=$(pwd) utc=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
        # Operator: confirm this matches your prior runs of this runbook.
      The cross-host caveat (PM hard-constraint #9) is invisible from the runbook today. The fcntl.flock semantics work only within the same kernel; running the two scripts on different hosts silently bypasses BC-8-LIFT-COND-1.
    rationale-pointer: "PM acceptance hard-constraint #9; fcntl POSIX advisory locks are per-kernel"

  - id: AMENDMENT-6
    priority: concern
    text: |
      Step 2.1.1 backup filename should use UTC, not local time, for consistency with the paper log:
        cp data/paper_trading_session.log "data/paper_trading_session.log.pre-launch-$(date -u +%Y%m%dT%H%M%SZ).bak"
      Note the trailing Z makes the timestamp self-describing.
    rationale-pointer: "clock-and-ordering rubric item 3 (timezone explicit); script uses datetime.now(timezone.utc).isoformat()"

  - id: AMENDMENT-7
    priority: concern
    text: |
      Add to runbook a NAMED-ROLE confirmation block at end of each phase:
        Phase X confirmed by: huangtm@gmail.com at <UTC ISO 8601 timestamp>
        (append to docs/launch/sd6-launch-comm-verbatim-check.yaml)
      This converts silent CEO execution into a verbal-confirmation-equivalent that satisfies the Gawande/WHO checklist structure in a single-operator setup.
    rationale-pointer: "deploy-checklist-trading SKILL: 'Verbalize or it did not happen.'"

  - id: AMENDMENT-8
    priority: note
    text: |
      Document the SIGKILL caveat:
        On SIGKILL (kill -9 PID or 'tmux kill-session' on some configurations), Python's
        finally block does NOT run. The fcntl advisory lock auto-releases via kernel
        FD reclamation, BUT the DISPATCH_LOCK_RELEASED audit log entry is lost. If
        graceful shutdown is needed: tmux send-keys -t paper-vt C-c (SIGINT), wait
        for 'Stopped by operator.' in the log, then tmux kill-session -t paper-vt.
    rationale-pointer: "vt.py:807-820 finally runs on SIGINT (KeyboardInterrupt) but not on SIGKILL"

body: |
  Decision: approve-with-binding-conditions. The runbook structure (three-phase
  Sign In / Time Out / Sign Out) is correct and the underlying scripts preserve
  all seven BC-8-LIFT-COND-1..7 constraints by code. Two blocking findings and
  five concern-level findings prevent unconditional approval:

  Blocking (must fix before CEO executes):
  (i) Step 2.4 invokes scripts WITHOUT --loop and WITHOUT --token; the tmux
      session 'lives' only for the single-cycle execution then exits — runbook
      declares 'session alive' based on Phase-3 polling that runs within those
      seconds, producing a Phase-3 false-positive. Persistent runner is
      defeated.
  (ii) Account-key parity gate (COND-3) returns silently on success with NO LOG.
       Runbook Step 3.4 verifies by ABSENCE — accepts empty grep as pass.
       Cannot positively confirm the gate fired. Kill-switch-design rubric
       Property 5 violation. Fix: one logger.info statement in
       account_key_parity.py OR a positive lock-file check in the runbook.
  (iii) Kill-switch audit logs are not pre-checked for stale HALTED state.
        KillSwitch.__post_init__ raises RuntimeError if last audit event was
        HALTED — script dies on startup, tmux session dies in ms, runbook may
        not detect it. Pre-flight check missing.

  Concerns (audit-trail and verification quality):
  - Step 3.2 / 3.5 target wrong log file (paper_trading_session.log is
    trade-event-only; per-cycle liveness lives in data/ws0[12]_trace.log)
  - Cross-host caveat not enforced (no hostname assertion)
  - Backup filename uses local time (rest of system UTC)
  - Verbal-confirmation per phase not required (CEO single-operator collapse)
  - SIGKILL caveat undocumented (lock auto-releases, but audit log lost)

  None of the 10 risk-architecture checks fully passes without amendment. All
  seven BC-8-LIFT-COND constraints are preserved at the code level; runbook
  EXECUTION may fail to verify two of them positively (COND-3 and COND-6) and
  may misverify two more (COND-5 in Phase 3, COND-1 if --loop omitted).
  The blowup-analog is Knight: present-but-bypassed safety. Eight amendments
  are listed; three are blocking, five are concern-level. If amendments 1, 2,
  3 are applied, decision shifts to approve. Without them, CEO should not
  execute Phase 2.

