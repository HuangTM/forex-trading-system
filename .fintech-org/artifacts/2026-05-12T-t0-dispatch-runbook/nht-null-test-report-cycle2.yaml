    severity: "non-blocking"
    description: "Steps 2.4.1 and 2.4.2 use 'tmux new-session -d -s <name>' without 'has-session' guard; second execution at same T=0 would exit non-zero and the executor may misread as launch failure."
    affected_steps: "2.4.1, 2.4.2"
    recommendation: "TODO(v3): prefix each tmux invocation with 'tmux has-session -t <name> 2>/dev/null || ' to make idempotent; low urgency given single-T=0 usage pattern."

