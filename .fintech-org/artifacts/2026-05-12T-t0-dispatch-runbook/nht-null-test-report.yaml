# ============================================================================
# BODY — terse summary
# ============================================================================
body: |
  DECISION: dissent (claim fails the null test).

  The runbook FAILS the atomic claim. Seven independent BLOCKING gaps were
  found, plus eleven concerns and two notes. The three most material
  findings, ranked by how likely each is to silently destroy the launch:

  TOP-1 (G-1 — script never starts):
    The tmux invocations in Steps 2.4.1/2.4.2 omit --token, --auto, and
    --loop. Both scripts hard-exit at line ~856 with "Error: --token or
    SAXO_TOKEN required" because SAXO_TOKEN is NOT set in the CEO's
    environment (verified). The tmux session dies within seconds (verified
    empirically). Even with token, without --loop the script runs ONE
    cycle and exits — no persistence. The runbook's downstream verification
    (Step 3.4 account-key parity "empty grep is acceptable") then FALSELY
    confirms success on a never-started script. Most-likely real-world
    failure mode at T=0.

  TOP-2 (G-3 — date math wrong):
    Pre-warning reminder fires 2026-07-26, a SUNDAY (verified). The
    independently-computed "9 trading days remaining" date is 2026-07-22
    (Wed). The runbook conflates "T0+75 calendar days" with "9 trading
    days before 60-trading-day deadline" — these are NOT the same. CEO
    will receive an unactionable Sunday-morning notification 4 days late.
    By the time anyone responds Monday 2026-07-27, only ~6 trading days
    remain, not the promised 9. This is a CF-T9 Clause C governance
    failure cued by a calendar-arithmetic bug.

  TOP-3 (G-5 + G-13 + G-14 — silence is not success):
    Three Phase-3 verifications (account-key parity gate, dispatch lock
    held, log growing) accept silence/0-byte/empty-grep as confirmation.
    Inspected account_key_parity.py confirms the gate emits NOTHING on
    the success path. The dispatch_lock.flock file already exists at 0
    bytes from a May 6 session; its presence does not prove a live lock.
    Log-growth check over 10 seconds is meaningless given the 1800s
    cycle interval. Compounded with G-1, the most likely real outcome
    (scripts never started) is observationally identical to the runbook's
    definition of success.

  These three TOP findings are entangled: G-1 ensures scripts don't
  start; G-5/13/14 ensure the runbook reports success anyway. A naive
  CEO walks away believing paper trading is live when in fact NOTHING is
  running. There is no observability gap because there is no
  observability — every Phase-3 check is silent-OK.

  Additional structural concerns: 9 of 25 steps are NOT idempotent (G-2
  audit), so a re-run after partial failure compounds the state. The
  hash-check claim (G-9) is technically correct ex-ante but the runbook
  does not re-verify post-signing, so a smart-quote or em-dash mishap
  during nano editing breaks SHA-256 without detection.

  Recommended disposition: REJECT — runbook must be amended to address
  AT LEAST G-1, G-2, G-3, G-5, G-13, G-14, G-9 before T=0. The remaining
  concerns/notes should be tracked but are not individually blocking.

  This dissent is APPEND-ONLY in CONSENSUS and must not be paraphrased.

