supervisor_mechanism_recommended: "tmux"

supervisor_alternatives_documented:
  - name: "launchd (macOS system service)"
    rationale: "Survives reboot; requires system-level plist; more complex setup but persistent"
    caveat: "Must be manually configured to preserve fcntl.flock(LOCK_EX|LOCK_NB) semantics; CRO review required"

  - name: "crontab (@reboot entry)"
    rationale: "Lightweight; survives reboot if cron entry is set correctly; shell-friendly"
    caveat: "Less visibility into process state; requires osascript for notifications"

  - name: "tmux (recommended default)"
    rationale: "Simplest for macOS single-user; no system config needed; persistent in user session; easy to inspect and kill"
    caveat: "Does not survive reboot; requires manual restart after machine reboot (acceptable for Phase 1 paper-only)"

