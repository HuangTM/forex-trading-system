  Authored a single ordered T=0 dispatch runbook covering SD-3 (log truncate),
  SD-6 (CEO sign), SD-5 (calendar reminder set), and persistent paper-loop
  runner startup. The runbook is executable end-to-end by the CEO in one
  terminal session using exact commands for each step. All precondition checks
  are explicit (git HEAD verification, working tree clean, script imports,
  flock cleanup). All state-changing steps have expected output, verification
  predicates, and rollback procedures. Supervisor mechanism selected is tmux
  (simplest for macOS single-user, no system-service config; reboot requires
  manual restart, acceptable for paper Phase 1). Three alternative mechanisms
  (tmux / launchd / cron) documented for SD-5 calendar reminder; crontab
  + Calendar.app are recommended for durability. All seven BC-8-LIFT-COND
  constraints preserved by the runbook (dispatch lock path, lock release on
  exit, account-key parity gate, JPY cap enforcement, drawdown ladder, kill-
  switch paths, paper-only). The runbook references only existing scripts
  and config; no code changes required.

