  - "Both paper scripts use fcntl.flock(LOCK_EX|LOCK_NB) dispatch lock unchanged from Wave-10"
  - "Both scripts run on the same host with same data/ directory (COND cross-host constraint)"
  - "No supervisor (launchd / tmux / cron) is currently in place for either paper script"
  - "log state has grown from 269 lines (2026-05-11 ops-engineer read) to 317 lines (2026-05-12 current) — ad-hoc invocations since Wave-10"

