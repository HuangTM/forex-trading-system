          shrink by ~70% after extraction.
      - path: scripts/run_paper_trading_carry_fred.py
        lines_cited: "938 LoC total; 557 changed lines (71.3% duplicated)"
        change: >
          Same extraction as run_paper_trading_vt.py; retain only
          carry_fred-specific logic. Script should shrink by ~70% after
          extraction.
      - path: "src/forex_system/paper/base_runner.py (new; CTO to confirm canonical path)"
        lines_cited: "new file"
        change: >
          Implement PaperRunnerBase class (or equivalent) containing all
          BC-8-LIFT-COND-1..7 risk-envelope logic as shared, tested,
          single-source-of-truth methods. CTO must approve class name and module
