    oversight_domains: [REM-5, REM-7]
    bc9_coverage_check: [BC-9-N4-COND-1, BC-9-N4-COND-2, BC-9-N4-COND-3]

  - role: quant-developer
    rationale: >
      Sole implementer — the ONLY role permitted to write Python touching the
      trading path. Implements REM-1, REM-2, REM-4, REM-5, REM-6, REM-7 in
      the ordering specified. Does NOT start paper loop. Does NOT push. Does NOT
      proceed on REM-5 until CRO allocation-rule sub-artifact is present.
    implements: [REM-1, REM-2, REM-4, REM-5, REM-6, REM-7]

  - role: null-hypothesis-tester
    rationale: >
      Structural skeptic for the wave. Asks whether each REM fix actually
      closes the failure mode cited (Liskov, duplication, Knight-Capital-class
      drift, LTCM-class aggregate-DD blind spot) versus cosmetic patches.
      Specifically: does removing the _SELF_LOADING_RATE_STRATEGIES allowlist
      actually fix the contract, or does it just move the reflection bypass?
      Does BaseRunner extraction actually create single-source-of-truth, or
      does duplication re-emerge across new script variants? Dissent is
      append-only; NHT cannot be overridden by other roles.
    structural_focus:
      - "REM-1: does the ABC fix seal the contract or relocate the leak?"
      - "REM-2: does BaseRunner extraction hold under N=3 script addition or
        does the pattern repeat?"
      - "REM-7: does the aggregate contract fire BEFORE per-strategy contracts
        mask the signal in the LTCM scenario?"

  - role: principal-reviewer
    rationale: >
      Wave-3 code/test/observability review on QD artifacts. Receives REDACTED
      wave-2 artifacts (decision/body/assumptions/confidence stripped per
      pm.md independence rule; AGG-14 / PR-F-005 is this task's guard).
      Blocking findings must be resolved before merge or explicitly deferred
      to queue with CEO acknowledgment.
    wave: 3
    receives_redacted: true

wraps_invocation_of: []

anti-patterns-flagged:
