criteria:

  - id: REM-1
    title: "Strategy ABC Liskov violation fix — type-system"
    sources: ["AGG-4", "NHT-ARCH-2", "PR-F-001", "CTO-Major-1",
              "CRO-BC-9-N4-COND-1"]
    closes: ["NHT-ARCH-2", "PR-F-001", "AGG-1", "AGG-4", "BC-9-N4-COND-1 (partial)"]
    files_to_modify:
      - path: src/forex_system/core/interfaces.py
        lines_cited: "35 (Strategy ABC __init__ signature)"
        change: >
          Extend Strategy ABC __init__ to accept an optional keyword argument
          (e.g., rate_data=None or a typed factory-parameter dataclass) so all
          construction paths are expressible through the single ABC contract
          without a second-positional-argument override. CTO must approve the
          exact signature at wave-2.
      - path: src/forex_system/strategies/registry.py
        lines_cited: "31 (create_strategy factory)"
        change: >
          Update factory to pass the new optional parameter through the
          construction path; eliminate the inspect.signature dual-path pattern
      - path: scripts/run_falsification_trial.py
        lines_cited: "439-474 (_SELF_LOADING_RATE_STRATEGIES allowlist +
          inspect.signature bypass)"
        change: >
          Remove _SELF_LOADING_RATE_STRATEGIES allowlist and the reflection-based
          dual-path construction; replace with the unified ABC contract
      - path: src/forex_system/core/types.py
        lines_cited: "67-76 (Position fields)"
        change: >
          Add strategy_id field to Position (and Trade if absent); this is the
          prerequisite for REM-5 per-strategy allocation keying; CTO confirms
          exact field type (str | UUID | enum)
      - path: "src/forex_system/strategies/<all 6 violating overrides>"
        lines_cited: "6 of 10 strategy __init__ overrides (exact files to be
          enumerated by QD via grep on task start)"
        change: >
          Update to use the corrected ABC signature; remove second-positional-arg
          pattern from all 6 overrides
    tests_required:
      - id: REM-1-T1
        description: >
          Params-only construction path: construct every registered strategy
          via create_strategy(name, params) WITHOUT a rate_data argument; assert
          all 10 strategies instantiate without TypeError. This test MUST fail
          today (before the fix) for the 6 violating strategies.
        failure_before_fix: true
      - id: REM-1-T2
        description: >
          Params+rate_data construction path: construct every strategy that
          requires rate_data via the unified ABC contract (using the new optional
          keyword); assert identical behavior to the pre-fix reflection path.
          This test validates the fix is not a regression on carry/vol strategies.
        failure_before_fix: false
      - id: REM-1-T3
        description: >
          Reflection-bypass deleted: assert that _SELF_LOADING_RATE_STRATEGIES
          and inspect.signature are absent from run_falsification_trial.py
          after the fix (grep-based assertion in the test suite or a lint rule).
        failure_before_fix: false
    observability_boundaries:
      - >
        At strategy construction time, log a structured line with strategy_name,
        strategy_id, construction_path (params_only | params_and_rate_data) so
        post-hoc reconstruction can confirm which path fired. Level: INFO.
    oversight_required: CTO
    effort_days: 1
    ordering: "MUST complete before REM-5 (strategy_id required by allocation rule)"

  - id: REM-2
    title: "BaseRunner extraction from paper scripts — architecture extraction"
    sources: ["AGG-2", "NHT-ARCH-3", "PR-F-002", "CTO-Major-2"]
    closes: ["NHT-ARCH-3", "PR-F-002", "CTO-Major-2", "AGG-2"]
    files_to_modify:
      - path: scripts/run_paper_trading_vt.py
        lines_cited: "1005 LoC total; 557 changed lines (71.3% duplicated)"
