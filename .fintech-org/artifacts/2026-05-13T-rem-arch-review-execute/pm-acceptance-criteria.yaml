    effort_days: 1
    ordering: "Blocked on REM-1 (strategy_id) and CRO rule sub-artifact"

  - id: REM-6
    title: "Saxo 429 / rate-limit hardening in SaxoClient"
    sources: ["AGG-6", "CRO-Q3", "CRO-BC-9-N4-COND-2"]
    closes: ["CRO-Q3", "AGG-6", "BC-9-N4-COND-2"]
    files_to_modify:
      - path: src/forex_system/saxo/client.py
        lines_cited: "67-74, 94-110, 155, 211, 220, 230, 394"
        change: >
          (a) Replace bare raise_for_status() at lines 155, 211, 220, 230 with
          a retry wrapper that inspects response.status_code == 429, reads
          Retry-After header (or defaults to exponential backoff if absent), and
          retries up to a configurable max (default 3). (b) Add startup jitter
          (random delay 0–30s) to SaxoClient.__init__ so N=4 strategies do not
          all open sessions simultaneously. (c) Implement a shared rate-limit
          token bucket (thread-safe or process-safe, CTO decides) seeded at
          120 req/min; all request methods deduct from the bucket before
          issuing. (d) Update lines 67-74 and 94-110 to hook into the bucket.
    tests_required:
      - id: REM-6-T1
        description: >
          Mocked-server integration test: configure a mock Saxo server that
          returns HTTP 429 with a Retry-After: 2 header on the first request
          and HTTP 200 on the second; assert SaxoClient retries exactly once,
          respects the header delay (within ±100ms tolerance), and the caller
          receives the 200 response without raising. Test MUST fail today
          (raise_for_status propagates 429 as unhandled HTTPError).
        failure_before_fix: true
      - id: REM-6-T2
        description: >
          Token-bucket rate test: simulate 4 concurrent strategy threads each
          issuing 60 requests; assert total elapsed time ≥ 60 seconds (120
          req/min shared bucket enforced) and assert no 429 is raised against
          the mock server configured to rate-limit at 120/min.
        failure_before_fix: false
      - id: REM-6-T3
        description: >
          Startup jitter regression: instantiate SaxoClient 10 times in rapid
          succession; assert that the distribution of startup delays has a
          non-zero standard deviation (i.e., jitter is actually random, not
          constant). Deterministic assertion: max(delays) - min(delays) > 1s.
        failure_before_fix: false
    observability_boundaries:
      - >
        Every 429 response must log request_url + retry_after_header_value +
        retry_attempt_number + strategy_id at WARN level so rate-limit
        frequency can be tracked in production.
      - >
        Token-bucket state (current_tokens, refill_rate, last_refill_time)
        must be logged at DEBUG level at each request deduction for post-hoc
        replay.
    oversight_required: CTO (informed); CRO (verifies BC-9-N4-COND-2 closure)
    effort_days_range: [1, 2]
    ordering: "Can run in parallel with REM-5; no ordering dependency"

  - id: REM-7
    title: "Drawdown ladder dual-instance: per-strategy + aggregate"
    sources: ["AGG-7", "CRO-Q4", "CRO-BC-9-N4-COND-3"]
    closes: ["CRO-Q4", "AGG-7", "BC-9-N4-COND-3"]
    files_to_modify:
      - path: src/forex_system/risk/drawdown_contract.py
        lines_cited: "42-46 (_peak_equity per-instance), 116-127, 129-216"
        change: >
          (a) Introduce AggregateDrawdownContract (or equivalent, CTO names it)
          as a second DrawdownContract instance keyed to the combined book equity
          across all strategies. (b) Both paper scripts (post-REM-2 BaseRunner)
          must instantiate BOTH a per-strategy DrawdownContract and the aggregate
          AggregateDrawdownContract. (c) Aggregate instance thresholds: CRO
          specifies in wave-2 sub-artifact (expected: lower than per-strategy
          thresholds to catch correlated shocks). (d) Aggregate instance triggers
          regardless of per-strategy path — i.e., 4 strategies each at 8%
          individual DD but aggregate at 18% MUST fire the aggregate kill-switch
          even if no per-strategy threshold is breached.
    tests_required:
      - id: REM-7-T1
        description: >
          LTCM-class scenario test: simulate 4 strategies each at 8% per-strategy
          drawdown (below any per-strategy threshold, e.g., 10%); aggregate
          book equity at 18% (above aggregate threshold, e.g., 15%). Assert
          aggregate DrawdownContract fires kill-switch. Assert per-strategy
          DrawdownContracts do NOT fire. This scenario MUST produce the wrong
          behavior today (no aggregate instance exists; aggregate DD bypasses
          the ladder).
        failure_before_fix: true
      - id: REM-7-T2
        description: >
          Per-strategy isolation test: simulate strategy-A at 12% DD (above
          per-strategy threshold); other strategies flat. Assert strategy-A's
          DrawdownContract fires and halts strategy-A. Assert AggregateDrawdown-
          Contract does NOT fire (aggregate book <15%). Verifies the two layers
          are independent.
        failure_before_fix: false
      - id: REM-7-T3
        description: >
          Dual-trigger test: simulate strategy-A at 12% DD AND aggregate at 18%
          DD simultaneously. Assert BOTH per-strategy and aggregate contracts
          fire. Assert kill-switch log contains two trigger events with distinct
          contract_type labels (per_strategy vs aggregate).
        failure_before_fix: false
    observability_boundaries:
      - >
        Each DrawdownContract trigger must emit a structured kill-switch-reason
        log line with: contract_type (per_strategy | aggregate), strategy_id
        (null for aggregate), current_drawdown_pct, threshold_pct, peak_equity,
        current_equity, timestamp. Level: CRITICAL.
      - >
        Aggregate contract equity update must log at DEBUG: aggregate_equity,
        aggregate_peak, current_aggregate_drawdown_pct, contributing_strategies
        (list) so post-hoc reconstruction can verify the aggregate tracker was
        receiving correct inputs.
    oversight_required: CRO
    effort_days: 1
    ordering: "Can run in parallel with REM-5 and REM-6; BaseRunner (REM-2) is
      the natural home for aggregate contract instantiation, so REM-7 code review
      should coordinate with REM-2 merge timing"

