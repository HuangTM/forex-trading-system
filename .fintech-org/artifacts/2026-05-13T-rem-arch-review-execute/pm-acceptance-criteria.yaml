  - id: REM-4
    title: "Config dispatch-stagger to avoid 4-strategy bar-close burst collision"
    sources: ["AGG-12", "CTO-Minor-1"]
    closes: ["CTO-Minor-1", "AGG-12"]
    files_to_modify:
      - path: config/default.yaml
        lines_cited: "dispatch_interval_seconds (or equivalent key; QD confirms
          current key name)"
        change: >
          Add per-strategy dispatch offsets (stagger_offset_seconds: [0, 30, 60,
          90] or equivalent) so strategies do not all poll at bar-close in the
          same second. CTO confirms the offset values and config key structure.
    tests_required:
      - id: REM-4-T1
        description: >
          Unit test: given 4 strategy dispatch times computed from the staggered
          config, assert that no two strategies share the same dispatch second
          within a single 1800-second interval. Must also assert that the
          stagger offsets do not shift any strategy's dispatch past the bar-close
          window (configurable tolerance, e.g., ±5 minutes of close).
        failure_before_fix: false
    observability_boundaries:
      - >
        At dispatch time, log strategy_id + scheduled_dispatch_time +
        actual_dispatch_time + offset_applied so cycle-skip investigations can
        confirm stagger is respected. Level: DEBUG.
    oversight_required: none (trivial; CTO is informed, not approving)
    effort_days: 0.5
    ordering: "Can start after REM-2 commits (config lives alongside paper scripts)"

  - id: REM-5
    title: "Per-strategy allocation rule in exposure_aggregator"
    sources: ["AGG-5", "CRO-Q1", "CRO-BC-9-N4-COND-1"]
    closes: ["CRO-Q1", "AGG-5", "BC-9-N4-COND-1 (with REM-1)"]
    dependency: "REM-1 MUST complete first — strategy_id field on Position must
      exist before exposure_aggregator can key per-strategy caps"
    files_to_modify:
      - path: src/forex_system/risk/exposure_aggregator.py
        lines_cited: "46, 121-130, 148-216"
        change: >
          Replace last-write-wins under lock with a per-strategy fairness rule
          authored by CRO (see KG-QD-3). The CRO sub-artifact must be present
          at wave-2 before QD touches this file. The rule MUST be keyed on
          strategy_id (added in REM-1) not on pair (current proxy).
    tests_required:
      - id: REM-5-T1
        description: >
          Property test (no-starvation): simulate 4 strategies each submitting
          exposure requests in round-robin order; assert that no single strategy
          receives zero allocation across N consecutive rounds where N is
          configurable (default N=4). Test MUST fail today (last-write-wins
          allows a first-mover to consume the entire budget).
        failure_before_fix: true
      - id: REM-5-T2
        description: >
          JPY-budget fairness test: 4 strategies each requesting 15% of JPY
          budget; assert the allocated shares sum to ≤15% total and each
          strategy receives a non-zero share (exact distribution determined by
          CRO rule sub-artifact).
        failure_before_fix: true
      - id: REM-5-T3
        description: >
          Regression: existing 2-strategy vol_target_carry + carry_fred behavior
          is preserved (aggregate exposure cap not breached) after the fairness
