failure-modes-considered:
  - id: FM-1
    description: "QD ships REM-1 fix using keyword-arg pattern but a future strategy is added that requires a NON-OPTIONAL construction-time dependency (e.g., an ML model artifact path). The keyword-only arg (rate_data=None) does not prevent this: a strategy that raises on rate_data=None has re-introduced the violation. Mitigation: the ABC docstring must explicitly state the contract that Optional means 'truly optional, not required' and QD must add a test that constructs every registered strategy with rate_data=None and asserts no exception."
  - id: FM-2
    description: "BaseRunner extraction passes all tests including tests/integration/test_paper_runner_bc8_conds.py but introduces an init-order bug: AggregateDrawdownContract is instantiated before the per-strategy contracts register equity callbacks, so the aggregate contract receives no equity updates for the first bar. Mitigation: the test fixture must exercise the full startup sequence including callback registration order; QD must assert aggregate_contract receives at least one equity update call per bar cycle in the fixture."
  - id: FM-3
    description: "Aggregate drawdown contract receives stale equity due to thread interleaving. Risk: if a future version of PaperRunnerBase becomes multithreaded, the synchronous callback registration pattern (D-7.1) is not thread-safe. Mitigation: document the synchronous-only assumption in PaperRunnerBase; add a threading assertion (assert threading.current_thread() is threading.main_thread()) at the callback registration site. If the system later becomes multithreaded, the aggregate contract will need a lock."
  - id: FM-4
    description: "The dispatch stagger config key (paper.dispatch_stagger_offsets_seconds) is read as a list and indexed by strategy position. If the number of active strategies exceeds the list length, IndexError silently truncates stagger to 0 for the last strategy. Mitigation: QD must add a startup validation that asserts len(dispatch_stagger_offsets_seconds) >= len(active_strategies) and emits a CRITICAL log + halts if violated."
  - id: FM-5
    description: "Per-process token bucket (D-6.1) with 30 req/min budget is insufficient if a single bar-close cycle for one strategy requires more than 30 API calls. The steady-state request rate is an unverified assumption. Mitigation: KG-D6-1 above; QD must measure actual request count before setting the bucket size."

