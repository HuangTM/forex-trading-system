body: |
  D-1.1 STRATEGY ABC SIGNATURE (REM-1 Liskov fix): CHOICE IS (a) — keyword-arg pattern:
  __init__(self, params: dict, *, rate_data: Optional[pd.DataFrame] = None). This widens
  the existing ABC contract minimally: the keyword-only sentinel (*) ensures no positional
  caller accidentally passes rate_data where only params is expected, preserving the
  existing 4 conformant strategies that inherit the ABC default. The 6 violating overrides
  already use rate_data: pd.DataFrame | None = None — they can be updated to call
  super().__init__(params, rate_data=rate_data) without structural surgery. Option (b)
  (StrategyConstructionContext dataclass) is better long-term but adds a new public type
  requiring documentation, is harder to rollback (a dataclass is a structural change to the
  public API), and is overkill for the immediate Liskov violation. Option (c) (factory-method)
  requires every caller to migrate from cls(params) to cls.from_params(params) — two call
  patterns in flight is a regression risk. Review-plan rollback assessment: option (a) is
  additive (keyword-only arg with default=None is backward-compatible with all existing
  callers that call cls(params)); reversible by removing the keyword arg if it proves wrong.

  D-1.2 POSITION.STRATEGY_ID FIELD TYPE: CHOICE IS str. Rationale: Trade.strategy at
  core/types.py:49 is already str; Position.strategy_id must be the same type to allow
  cross-type comparisons in exposure_aggregator without a cast layer. UUID adds no semantic
  value here (strategies are identified by registry name strings in all current paths).
  Enum[StrategyName] would require updating the enum at every new strategy registration —
  a maintenance trap. str is consistent, minimal, and matches the existing Trade type.

  D-1.3 DISPOSITION OF _SELF_LOADING_RATE_STRATEGIES ALLOWLIST: DELETE ENTIRELY. The
  inspect.signature reflection and allowlist at run_falsification_trial.py:439-474 exist
  solely to compensate for the leaky ABC contract. Once D-1.1 widens the ABC with
  rate_data as a keyword-only arg, the factory create_strategy(name, params) can optionally
  pass rate_data=rate_data through, and all call-sites can use the uniform path. The
  allowlist is an execution-firewall violation: it is a hardcoded mapping that the
  Researcher must update every time a new data-dependent strategy is added — a silent-
  drift risk of exactly the class the firewall rubric prohibits. "Deprecate with warning"
  is the wrong disposition because any retained reflection code is dead code that future
  engineers will not understand. Delete entirely; if a future strategy genuinely needs a
  third construction-time dependency, the correct path is to extend the ABC contract, not
  to grow the allowlist.

  D-2.1 CANONICAL MODULE PATH FOR BASERUNNER: src/forex_system/paper/base_runner.py.
  The paper/ subdirectory does not yet exist; QD creates it with __init__.py. This path
  is preferred over src/forex_system/runners/base.py (runners/ is too generic; suggests
  it could host non-paper runners) and src/forex_system/orchestration/runner.py
  (orchestration/ implies multi-process coordination which is a future concern). The paper/
  module is unambiguous: it hosts code specific to the paper-trading execution path.

  D-2.2 CLASS NAME: PaperRunnerBase. Rationale: PaperRunnerBase communicates (a) it is
  paper-specific, (b) it is a base class for concrete per-strategy runners. BasePaperRunner
  inverts the noun-adjective order and reads awkwardly in inheritance declarations.
  PaperLoopRunner implies a running instance rather than a base class. PaperRunnerBase
  follows the same pattern as abstract base naming conventions in the existing codebase
  (DrawdownContract is a contract-class noun; KillSwitch is a mechanism noun; PaperRunnerBase
  is a base-class noun).

  D-2.3 EFFORT ADJUDICATION (REM-2): Range is 5-10 days with explicit assumptions. The
  CTO's 3-day estimate covered the extraction itself (refactoring 557 shared lines into
  PaperRunnerBase with a concrete subclass inheriting it). The NHT's 1-2 week estimate
  covers the extraction PLUS the regression fixture (D-2.4 requirement, not accounted for
  in the CTO estimate) PLUS the 7 BC-8-LIFT-COND integration tests PLUS the confirmation
  that the concrete subclasses produce bit-identical equity and decision trace on replay.
  These are compatible: 3d extraction + 2d fixture/integration tests + 1d replay parity
  verification = 6d lower bound. Add buffer for the BC-8-LIFT-COND-1..7 failure-injection
  paths (REM-2-T2) = 8-10d upper bound. PM deadline of 2026-05-20 (7 calendar days from
  today 2026-05-13) is tight; QD should flag to PM immediately if extraction reveals
  unexpected coupling in the paper scripts that pushes toward 10d.

  D-2.4 BC-8-LIFT-COND INTEGRATION TEST FIXTURE: MUST EXIST before extraction merges.
  This is a hard gate, not a recommendation. The NHT-1 gap from the review session is
  that no end-to-end paper-loop test exercises BC-8-LIFT-COND-1..7. QD will create the
  test file at: tests/integration/test_paper_runner_bc8_conds.py. This path is consistent
  with the existing integration test at tests/integration/test_live_loop_sizing_parity.py
  (confirmed in NHT report). The fixture must mock the Saxo client and assert all 7
  BC-8-LIFT-COND properties hold in one bar cycle.

  D-4.1 CONFIG STAGGER KEY AND VALUES: The key name is paper.dispatch_stagger_offsets_seconds
  nested under a new paper: section in config/default.yaml. The stagger offsets are
  [0, 30, 60, 90] for strategies [vol_target_carry, carry_fred, strategy_3, strategy_4]
  respectively. The base interval (1800s) is the existing --interval default. Each strategy
  computes its effective dispatch time as bar_close_time + base_interval +
  stagger_offset_seconds[strategy_index]. Offsets of 30s each are sufficient to distribute
  lock acquisition across the bar-close window without meaningfully shifting the trade
  signal timing (30s is negligible at 4H or daily frequency). The config YAML snippet is:

    paper:
      dispatch_stagger_offsets_seconds: [0, 30, 60, 90]

  This is a policy review of a ≤10-line config change within the CTO narrow carve-out.
  No code is specified; BaseRunner (post-REM-2) reads this config key and applies the
  offset by strategy position in the active strategy list.

  D-6.1 THREAD-SAFE VS PROCESS-SAFE TOKEN BUCKET: CHOICE IS (a) — per-process token
  bucket via threading.Lock. Rationale: each paper script runs as its own OS process
  (confirmed: paper scripts are invoked as separate CLI processes). Within each script,
  strategy execution is sequential (no threading observed in paper scripts). Therefore
  the rate-limit concern is cross-PROCESS (4 processes each making requests), not
  intra-process threading. A threading.Lock bucket (option a) handles only intra-process
  thread contention, which does not exist. However, option (b) (fcntl-locked file or
  multiprocessing.Manager) is architecturally heavier and introduces process-coordination
  complexity that contradicts the simplicity principle. The correct decision is option (a)
  for NOW because: (i) the existing dispatch stagger (D-4.1) already distributes bar-close
  bursts across 0/30/60/90s offsets — this eliminates the synchronous 4x burst scenario;
  (ii) with staggered offsets, no single bar-close tick generates 4x simultaneous requests;
  (iii) a per-process token bucket seeded at 30 req/min (120 total / 4 processes) is
  sufficient given the stagger. Option (b) should be reconsidered if a future N=8+ strategy
  expansion makes per-process budgets too small. Trading-platform-architectures pattern:
  mid-frequency systems (daily/4H) typically implement per-process rate limiting with
  cross-process coordination only when processes share a single upstream API session.

  D-6.2 DEFAULT BACKOFF PARAMETERS: max_retries=3, base_delay_seconds=2.0,
  jitter_factor=0.5 (jitter is uniform random in [0, base_delay * jitter_factor]).
  When Retry-After header is present, use its value directly (do not apply additional
  jitter on top of the header value). When absent: retry delays are [2.0 ± 0.5s, 4.0 ±
  1.0s, 8.0 ± 2.0s] (exponential base 2 with jitter). These values are reasonable for a
  REST API at mid-frequency and align with Saxo's published rate-limit documentation
  pattern (120 req/min = ~500ms per-request floor; 2s base delay is 4x the floor,
  giving headroom for burst absorb).

  D-7.1 AGGREGATE CONTRACT INSTANTIATION POINT: CONFIRMED — PaperRunnerBase (post-REM-2)
  is the correct home for aggregate contract instantiation. Rationale: the aggregate
  contract must receive equity updates from ALL strategies, which is only possible at the
  level that has visibility across all strategy executions. PaperRunnerBase is that level.
  Equity updates flow to the aggregate contract via a callback registration pattern: each
  per-strategy contract calls aggregate_contract.update_equity(new_equity) after each bar
  cycle completes. The aggregate contract maintains its own _peak_equity independently.
  This is simpler than a shared event stream and avoids introducing an async/pub-sub
  dependency that the current system does not have. Counter-candidate (shared event stream)
  is over-engineered for a synchronous sequential paper loop.

  D-7.2 NAMING: AggregateDrawdownContract. Rationale: "Aggregate" is the correct modifier
  (it operates on the aggregate book equity across all strategies). "Book" implies a
  P&L ledger rather than a drawdown control mechanism. "Portfolio" implies portfolio-level
  walk-forward evaluation semantics (a future capability per the out-of-scope list). The
  naming follows DrawdownContract (existing class); AggregateDrawdownContract is the
  minimal distinguishing prefix.

