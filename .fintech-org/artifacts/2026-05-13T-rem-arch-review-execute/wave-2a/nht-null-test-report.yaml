    invariant: "P(aggregate halt fires | aggregate trough breaches threshold) ≥ 0.99 across permuted trajectories."
    failure_injection: "If aggregate contract uses a windowed average instead of running peak, certain permutations will mask the trough — test MUST fail in those configurations."
    assertion: "fire_rate >= 0.99 across 1000 shuffle permutations"
