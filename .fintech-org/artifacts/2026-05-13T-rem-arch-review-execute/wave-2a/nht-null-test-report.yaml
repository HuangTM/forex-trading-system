body: |
  CLAIM N-1 (REM-1 / Liskov fix).
  Null H0: replacing the allowlist+reflection block with a unified ABC signature is a
  syntactic refactor that does NOT, by itself, prevent re-emergence of strategy-specific
  branching elsewhere in the construction path. The failure mode is "construction-time
  per-strategy specialness leaks into a generic dispatcher". The relocation surfaces
  are: (a) factory_kwargs sentinels — create_strategy grows a `loader_mode="self"|"injected"`
  enum and the dispatcher branches on it; (b) a NEW reflection site appears around
  required_indicators() or required_external_data() when strategy #3 (e.g., ML model
  artifact loader) needs an artifact path; (c) the optional kw-arg becomes a
  "magic None means self-load" sentinel that QD branches on inside generate_signals.
  Tests requested cover (a)–(c). I cannot prove the fix CLOSES vs. RELOCATES from the
  spec alone; this is structural skepticism, not a math claim — flagged as `concern`.

  CLAIM N-2 (REM-2 / BaseRunner extraction).
  Null H0: extracting a BaseRunner produces a single source of truth IFF (i) it is the
  ONLY construction path used by both scripts at HEAD, and (ii) the next strategy added
  consumes it without overrides that re-introduce divergence. Pattern (ii) is the LTCM
  of architecture: parallel "_v2" scripts feature-flag around BaseRunner and silently
  re-fork. Relocation surfaces: (a) third script (e.g., run_paper_trading_intraday.py)
  copy-pastes BaseRunner subclass with overridden _check_drawdown that bypasses
  dd_contract.update; (b) BaseRunner methods are monkey-patched per-script for "just
  this case" (e.g., kill-switch suppression in a smoke test that leaks to prod);
  (c) feature flags (env vars) cause BaseRunner to short-circuit BC-8-LIFT-COND-1..7
  on a per-script basis. The N=3 invariant in the claim is the right test, but it must
  be enforced by an architectural check, not by reviewer vigilance — flagged as
  `material_concern` because the duplication pattern is exactly what permitted the
  F-001 USDJPY 150× cost bug to live in two places.

  CLAIM N-3 (REM-7 / aggregate drawdown contract).
  Null H0: adding an aggregate DrawdownContract reduces correlated-DD masking IFF
  (i) it is evaluated BEFORE per-strategy contracts in the dispatch path, (ii) it
  uses a book-equity series that correctly nets cash (no double-counting), and
  (iii) its threshold is calibrated such that 4×8% individual DD with correlation→1
  trips it. The LTCM scenario MUST be tested with a shuffle-control: shuffle the
  per-strategy DD onset timing, hold per-strategy peak DD constant, hold aggregate
  trough constant — the aggregate contract must STILL fire because the trigger is the
  threshold breach, not the trajectory. If the test passes only for one specific
  trajectory, the contract is trajectory-fragile. Flagged as `material_concern` —
  the aggregate contract is the LAST line of defense against a Knight-class
  correlation event and must be tested adversarially, not happy-path.
