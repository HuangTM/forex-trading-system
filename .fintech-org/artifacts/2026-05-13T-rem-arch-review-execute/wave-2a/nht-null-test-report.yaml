      wiring of vt.py, carry_fred.py, and the synthetic stub. All three MUST route
      through identical BaseRunner method calls (no per-script overrides of
      _check_drawdown / _check_regime / _aggregation_gate / _journal_flush).
    invariant: "The set of distinct AST nodes implementing BC-8-LIFT-COND-1..7 across the three scripts has cardinality 1 (only the BaseRunner)."
    failure_injection: |
      In the synthetic stub, override _check_drawdown to bypass dd_contract.update.
      Test MUST fail with explicit message naming the override site.
    assertion: "len(distinct_kill_switch_implementations(scripts)) == 1"
    routed-to: quant-developer

  - claim_id: N-2
    name: test_no_feature_flag_kill_switch_bypass
    description: |
      Grep test: no env-var-conditioned suppression of dd_contract / regime gate /
      aggregation gate anywhere in scripts/ or src/forex_system/risk/.
      Patterns banned: `os.environ.get(*KILL*`, `if FLAG_*: skip_dd`, etc.
    invariant: "Kill switches cannot be disabled by env vars or feature flags. Period."
    failure_injection: "Inject `if os.environ.get('SKIP_DD'): return SKIP_DD_HALT_NEW` into BaseRunner; test MUST fail."
    assertion: "assert grep_count('os.environ.*SKIP|FLAG.*skip_dd|disable.*dd', 'scripts/', 'src/forex_system/risk/') == 0"
    routed-to: quant-developer

  - claim_id: N-3
    name: test_ltcm_aggregate_dd_fires_before_per_strategy
    description: |
      Synthetic 4-strategy book. Each strategy hits 8% per-strategy DD (below
      individual halt threshold 10%). Correlation→1 makes aggregate book DD = 18%,
      above aggregate halt threshold (e.g., 15%). Assert that the aggregate
      DrawdownContract.update() fires BEFORE any per-strategy contract halts dispatch.
    invariant: "aggregate_dd_event_timestamp < min(per_strategy_dd_event_timestamp) when aggregate threshold is breached and per-strategy thresholds are not."
    failure_injection: |
      Sequence A: aggregate contract evaluated AFTER per-strategy (current architecture
      under naive REM-7) — aggregate halt fires too late or not at all because all
      per-strategy contracts are still under 10%. Test MUST fail in this configuration.
      Sequence B: aggregate evaluated FIRST — test passes.
    assertion: "agg_halt_at <= per_strategy_halts_at AND no_per_strategy_halt_in_scenario"
    routed-to: quant-developer

  - claim_id: N-3
    name: test_ltcm_aggregate_dd_shuffle_control
    description: |
      Same 4-strategy book as above, but Monte Carlo over 1000 permutations of the
      per-strategy DD onset TIMING (holding per-strategy peak DD = 8% and aggregate
