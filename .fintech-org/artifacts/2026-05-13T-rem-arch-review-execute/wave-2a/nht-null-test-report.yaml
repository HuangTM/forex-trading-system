  - claim_id: N-1
    name: test_no_strategy_construction_branching
    description: |
      Static-analysis test (AST grep) over scripts/ + src/forex_system/ that asserts
      ZERO occurrences of `inspect.signature(`, ZERO string-set-membership tests against
      strategy_name (i.e., no `if strategy_name in {...}:` patterns near construction),
      and ZERO sentinel-default kwargs (`rate_data=None` followed by an `if rate_data is None:`
      branch) in any strategy-construction call site.
    invariant: "No reflection or per-strategy branching at construction time anywhere outside the strategy class itself."
    failure_injection: |
      Add a parametrized fixture that introduces a synthetic 3rd strategy class needing a
      DIFFERENT external artifact (model_path: Path) and confirms the existing
      construction path either accepts it via the unified ABC or fails CLEARLY (no
      reflection fallback). Budget: ~80 LoC (AST walker + 1 fixture strategy).
    assertion: |
      assert ast_grep_count("inspect.signature", "scripts/", "src/") == 0
      assert ast_grep_count("if .* in _SELF_LOADING.*:", "scripts/", "src/") == 0
      assert synthetic_strategy_3_constructs_via_unified_path() is True
    routed-to: quant-developer

  - claim_id: N-1
    name: test_strategy_abc_contract_covers_external_data
    description: |
      Contract test: every concrete Strategy subclass in STRATEGY_REGISTRY can be
      instantiated by `create_strategy(name, base_params)` WITHOUT the caller passing
      strategy-specific kwargs. External-data loading is the strategy's responsibility,
      asserted by mocking the loader and confirming __init__ does not raise.
    invariant: "Strategy.__init__ signature is uniform across all registered strategies — no special-case kwargs at the factory boundary."
    failure_injection: "Register a strategy that requires a custom kwarg; test must FAIL (signaling Liskov violation)."
    assertion: "for name in STRATEGY_REGISTRY: assert create_strategy(name, {'pair': 'EURUSD'}) is not None"
    routed-to: quant-developer

  - claim_id: N-2
    name: test_paper_runner_single_source_of_truth_n3
    description: |
      Add a third paper-runner script (synthetic stub: scripts/run_paper_trading_synthetic_n3.py)
