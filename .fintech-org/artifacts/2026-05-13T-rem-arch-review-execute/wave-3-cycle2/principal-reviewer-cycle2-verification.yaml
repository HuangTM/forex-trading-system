new-related-gap-observation: |
  No new BLOCKING gaps observed. One non-blocking observation:
  F-007's HTTP-date branch at saxo/client.py:251 uses
  `(retry_dt - retry_dt.utcnow()).total_seconds()` which is a tz-mixed
  self-subtraction that will raise TypeError (retry_dt is tz-aware from
  parsedate_to_datetime, while .utcnow() returns naive). The bug is
  benign in cycle-2 because the except branch applies jittered backoff,
  preserving the storm-prevention property the finding required. Flagging
  for future tightening (use datetime.now(timezone.utc) instead of
  retry_dt.utcnow()).

