findings:
  - id: F-001
    severity: blocking
    location: src/forex_system/risk/drawdown_contract.py:277-509 + scripts/run_paper_trading_vt.py + scripts/run_paper_trading_carry_fred.py
    category: spec-drift
    observation: "AggregateDrawdownContract class is defined and exported, but grep across src/ and scripts/ produces zero instantiations. Both paper scripts import per-strategy DrawdownContract (3 references each) but neither imports nor instantiates AggregateDrawdownContract. PaperRunnerBase docstring at base_runner.py:25-29 explicitly says: 'In the interim (before REM-2 full BaseRunner extraction), both paper scripts instantiate this directly and call update_equity() from each strategy's per-bar cycle.' That instantiation does not exist."
    inference: "If paper trading starts with the current code, the LTCM-class defense (the entire point of REM-7) does not run. 4 strategies could each be at 8% per-strategy DD (below 10% halt), aggregate book at 18% DD, and no kill switch fires. The class exists in code but is inert in the execution path."
    evidence: "src/forex_system/risk/drawdown_contract.py:277 (class AggregateDrawdownContract); src/forex_system/paper/base_runner.py:26-29 + base_runner.py:129 (TODO referencing instantiation as future work); scripts/run_paper_trading_vt.py grep AggregateDrawdownContract = 0; scripts/run_paper_trading_carry_fred.py grep AggregateDrawdownContract = 0"
    recommended-action-class: escalate-to-owning-role
    owning-role: quant-developer
  - id: F-002
    severity: blocking
    location: tests/risk/test_rem7_aggregate_drawdown.py:168-244
    category: test-coverage-gap
    observation: "TestN3ShuffleControl.test_aggregate_fires_in_99pct_of_shuffled_trajectories iterates 1000 trajectories, but the inner loop at line 217-222 has 'if all_at_dd: agg_equity = _equity_at_dd(peak_aggregate, 0.18)'. The shuffle is over which BAR all-strategies-at-DD is reached; whenever it is reached, the test injects a 18%-DD aggregate value by construction. Lockout threshold is 15%, so any positive injection fires."
    inference: "The test does not differentiate a genuinely threshold-shaped contract from a trajectory-fragile one. A pathological implementation that, for example, smoothed aggregate_equity through a 5-bar moving average, would still pass this test because the scenario explicitly feeds it the trough value as a single bar. The N-3 relocation pattern the NHT named (trajectory-fragile windowed average) is unprotected by this test."
    evidence: "tests/risk/test_rem7_aggregate_drawdown.py:217-222 (the all_at_dd branch unconditionally writes 0.18 DD); spec input N-3 atomic_claim referenced trajectory-fragile windowed average as a relocation risk"
    recommended-action-class: add-test
    owning-role: quant-developer
  - id: F-003
    severity: major
    location: src/forex_system/risk/exposure_aggregator.py:191-270
    category: invariant-violation
    observation: "check_per_strategy_allocation enforces only the per-strategy cap (max_correlated_pct / max_active_strategies). The aggregate cap (sum of all strategies' jpy_notional <= max_correlated_pct * book_equity) is checked by check_dispatch_allowed (separate function operating on a snapshot). The two are not joined; spec INV-R5-1 names a conjunct: 'sum(strategy_allocations) <= 0.15 * book_equity AND per-strategy <= 0.0375 * book_equity'."
    inference: "If a caller calls check_per_strategy_allocation but skips check_dispatch_allowed, allocations within per-strategy caps could still aggregate above 15% (e.g., 5 strategies each at 3% = 15.0%, but if max_active_strategies=4 the count alone breaches separately; the more subtle case is 4 strategies at 3.7% each = 14.8% aggregate — passes both checks individually). The aggregate-conjunct of INV-R5-1 is not enforced inside the per-strategy allocation gate. Test test_inv_r5_1_sum_cap_invariant only asserts the invariant on a hand-constructed positions list, not as a function call enforcement."
    evidence: "src/forex_system/risk/exposure_aggregator.py:228-262 (cap computation only against per_strategy_cap_notional); tests/risk/test_rem5_per_strategy_allocation.py:174-195 (invariant asserted post-hoc on existing positions, not as a call enforcement)"
    recommended-action-class: tighten-invariant
    owning-role: quant-developer
  - id: F-004
    severity: major
    location: src/forex_system/risk/drawdown_contract.py:363-381
    category: invariant-violation
    observation: "AggregateDrawdownContract.update_equity accepts an aggregate_equity scalar with no timestamp argument, no receive-time, and no contract-level check that the value is from a single broker-receive-time snapshot. The clock-and-ordering invariant the spec names ('single broker-receive-time snapshot fanned out synchronously') relies entirely on caller discipline."
    inference: "When a future caller (post-REM-2 full extraction) wires this up, two failure modes are unguarded: (a) caller fetches aggregate_equity once per bar and calls update_equity(); a different code path also calls update_equity with a stale or differently-timestamped value, the contract sees an inconsistent series; (b) caller computes aggregate_equity by summing per-strategy equities sampled at slightly different broker timestamps, the LTCM defense fires on artifacts of timing, not real DD."
    evidence: "src/forex_system/risk/drawdown_contract.py:363 (signature accepts only aggregate_equity and contributing_strategies); class docstring 292-299 (caller-responsibility prose; not enforced by signature or assertion)"
    recommended-action-class: tighten-invariant
    owning-role: quant-developer
  - id: F-005
    severity: major
    location: config/default.yaml:80-94 + (no consumer)
    category: spec-drift
    observation: "config/default.yaml adds the paper.dispatch_stagger_offsets_seconds key (D-4.1) with explicit comment 'Startup validation: len(dispatch_stagger_offsets_seconds) >= len(active_strategies) is enforced at BaseRunner startup — CRITICAL log + halt if violated (D-4.1 FM-4)'. Grep across src/ and scripts/ for 'dispatch_stagger' or 'stagger_offsets' returns zero matches. PaperRunnerBase __init__ does not consume this config."
    inference: "The validation the comment promises does not exist in code. If a future paper script reads this config and applies offsets without the length check, an out-of-range index could crash silently or apply offset 0 to a strategy that requires staggering, recreating the storm pattern this config was meant to prevent. The observability boundary (CRITICAL log on violation) is also absent."
    evidence: "config/default.yaml:92-94 (key + comment); grep -r 'dispatch_stagger' src/ scripts/ returns no results"
    recommended-action-class: add-edge-case-handling
    owning-role: quant-developer
  - id: F-006
    severity: major
    location: tests/integration/test_paper_runner_bc8_conds.py:170-175
    category: test-coverage-gap
    observation: "test_n2_paper_runner_single_source_of_truth_n3 is decorated @pytest.mark.skip(reason='follow-up: full REM-2 extraction dispatch — N=3 stub required'). The N-2 NHT-named relocation invariant (BaseRunner extraction must hold under N=3 script addition) is the core defense against the relocation patterns named in N-2 spec inputs (per-script monkey-patch, _v2 fork). The other N-2 test (test_n2_no_feature_flag_kill_switch_bypass) only catches one relocation pattern (env-var suppression)."
    inference: "Without the N=3 stub test, the architectural invariant N-2 specifies (set of distinct AST nodes implementing BC-8-LIFT-COND-1..7 across all paper scripts must have cardinality 1) is unenforced at this dispatch. A future engineer adding a third paper script and copy-pasting the kill-switch hook would not be caught by automated tests."
    evidence: "tests/integration/test_paper_runner_bc8_conds.py:170-175 (@pytest.mark.skip); src/forex_system/paper/base_runner.py:30-37 (the cardinality-1 invariant is documented but the test that would enforce it is skipped)"
    recommended-action-class: add-test
    owning-role: quant-developer
  - id: F-007
    severity: minor
    location: src/forex_system/saxo/client.py:241-251
    category: edge-case
    observation: "The 429 handler parses Retry-After via float(retry_after_str). Per RFC 7231 §7.1.3 the header may also be an HTTP-date (e.g. 'Wed, 21 Oct 2015 07:28:00 GMT'). On HTTP-date, float() raises ValueError and the code falls back to plain exponential backoff WITHOUT jitter (line 246: delay = self._base_delay * 2^(attempt-1)). The NO-Retry-After branch at line 248-251 adds jitter; the malformed-Retry-After branch does not."
    inference: "If Saxo ever returns Retry-After as an HTTP-date (less common but RFC-compliant) and 4 processes hit the rate limit simultaneously, all 4 will compute the same fallback delay and re-storm the API together. REM-6 test_429_with_retry_after_header_respects_delay does not exercise the HTTP-date case."
    evidence: "src/forex_system/saxo/client.py:241-251 (the two branches differ in jitter handling); tests/saxo/test_rem6_429_hardening.py:50-110 (only tests numeric Retry-After values)"
    recommended-action-class: add-edge-case-handling
    owning-role: quant-developer
  - id: F-008
    severity: minor
    location: tests/risk/test_rem5_per_strategy_allocation.py:249-289
    category: test-coverage-gap
    observation: "TestInvR5_3TieBreakDeterminism.test_tie_break_deterministic_across_100_invocations runs check_per_strategy_allocation 100 times with identical inputs (no other strategies present, no concurrency) and asserts the outcome is the same. The companion test test_strategy_id_lexicographic_order_is_consistent asserts Python's built-in sorted() is consistent — not the production code path."
    inference: "INV-R5-3 ('tie-break is deterministic given identical inputs') is the structural invariant against the relocation pattern 'tie-break tied to lock-acquisition order'. Neither test exercises a tie condition (e.g., two strategies submitting at the same monotonic instant). A bug where the tie was resolved by lock-acquisition order in a contended path would not be caught."
    evidence: "tests/risk/test_rem5_per_strategy_allocation.py:252-279 (single-strategy invocation, no contention); tests/risk/test_rem5_per_strategy_allocation.py:281-289 (asserts Python builtin)"
    recommended-action-class: add-test
    owning-role: quant-developer
  - id: F-009
    severity: minor
    location: tests/saxo/test_rem6_429_hardening.py:170-193
    category: test-coverage-gap
    observation: "test_token_bucket_thread_safe runs 5 threads × 10 deductions = 50 against a bucket with rate_per_min=10000 (capacity 10000). 50 deductions never approach capacity; no contention occurs."
    inference: "The atomicity claim ('threading.Lock held across the bucket-deduction read-and-decrement') is asserted by line count, not by behavior. A bug where the lock was released between the _refill() and self._tokens -= tokens lines would not be caught by this test because there's no contention to expose the race. A test like 50 threads × 100 deductions against rate_per_min=10 would expose it."
    evidence: "tests/saxo/test_rem6_429_hardening.py:172 (rate_per_min=10000); src/forex_system/saxo/client.py:120-128 (the under-lock critical section)"
    recommended-action-class: add-test
    owning-role: quant-developer
  - id: F-010
    severity: minor
    location: tests/risk/test_rem7_aggregate_drawdown.py:351-411
    category: test-coverage-gap
    observation: "TestInvR7_1CrossActionComposition imports _SIZING_BY_LEVEL and _AGGREGATE_SIZING_BY_LEVEL, then computes the composition rules in the test body and asserts they match the parametrized expected values. There is no compose() function in drawdown_contract.py — the spec composition rule (effective_sizing = min(per_strategy, aggregate); effective_dispatch_allowed = AND; effective_force_flat = OR) lives only in test code and in code-comment prose. There is no production code that performs the composition that this test could exercise."
    inference: "If a future paper-loop caller implements composition incorrectly (e.g., uses max instead of min, or OR for dispatch_allowed instead of AND), this test cannot catch it because no production composition function is being tested. The test is asserting the composition formula matches itself, tautologically."
    evidence: "tests/risk/test_rem7_aggregate_drawdown.py:386-410 (composition computed in test body, then compared to parametrized expected); grep across src/ for 'effective_sizing\\|min(.*sizing.*sizing\\|min(per_strategy_assess' returns no production callsite"
    recommended-action-class: add-test
    owning-role: quant-developer

