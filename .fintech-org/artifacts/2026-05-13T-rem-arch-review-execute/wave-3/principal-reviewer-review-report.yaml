body: |
  Review covers 17 source files + 6 test files, ~900 net LoC added, against
  spec values D-1.1..D-7.2 / R-5.1..R-7.1 / N-1..N-3. Decision: REJECT — two
  blocking findings on REM-7 (LTCM defense unwired in production) and REM-7
  shuffle test (false-confidence, does not test what it claims).

  1. spec-to-implementation trace — REM-1 and REM-6 fully match D-1.1/D-1.2/
     D-1.3/D-6.1/D-6.2. REM-5 implements per-strategy gate but the aggregate-sum
     conjunct of INV-R5-1 is not enforced inside check_per_strategy_allocation
     (relies on caller to also call check_dispatch_allowed). REM-7 contract
     class matches R-7.1 surface (thresholds, INV-R7-3 startup assertion, two
     new TriggerReason values, lockout path). REM-2 phase-A matches D-2.1/D-2.2
     but D-4.1 dispatch_stagger config is added with NO consuming code (see F-005).

  2. execution-firewall-review — implementation does not introduce new silent
     defaults. Pre-existing fillna(0.0) in vol_target_carry.py:69 is unchanged
     by this dispatch (F-005-pre-existing). Interface signatures are typed and
     the rate_data path is keyword-only per D-1.1.

  3. log-as-decision-trace — strong on REM-5, REM-6, REM-7. Each gate decision
     and each level transition emits structured fields. Two gaps: the bucket-
     deduct log is at DEBUG (REM-6), and PaperRunnerBase phase-A startup line
     does not emit the consumed dispatch_stagger_offsets_seconds value — the
     decision "we picked offset X" is not in the log.

  4. edge-case enumeration — REM-6 lacks an HTTP-date Retry-After case (RFC
     7231 form). REM-7 lacks a peak-equity initial-zero edge case test. REM-5
     lacks a tie-condition test (two strategies submitting the same instant
     with same id-prefix); the "tie-break determinism" test runs identical
     inputs 100x and asserts they're the same — it does not exercise a tie.

  5. invariant-search — INV-R7-3 IS asserted at AggregateDrawdownContract
     __post_init__. INV-R5-1's per-strategy conjunct is enforced; the aggregate
     sum conjunct is not enforced in the same call site. INV-R5-3 deterministic
     tie-break is asserted via Python sort on a static list, not by exercising
     the production code path.

  6. test-inversion — N-3 SHUFFLE-CONTROL test (the NHT-mandated trajectory-
     fragility defense) injects _equity_at_dd(peak, 0.18) by construction
     whenever all strategies reach DD; the test always passes by tautology.
     A genuinely trajectory-fragile contract (e.g. one using a windowed
     moving average of recent DD) would still pass this test because the
     scenario explicitly hands it 18% in one bar. The test does not falsify
     trajectory dependence — the relocation pattern N-3 names is unprotected.
     N-2 test_n2_paper_runner_single_source_of_truth_n3 is @pytest.mark.skip;
     the SSO-T-under-N=3 invariant is unenforced.

  7. failure-mode reasoning — token bucket and 429 retry handle Saxo gateway
     timeout via DEFAULT_HTTP_TIMEOUT (10s,30s); however, 4 simultaneous
     processes receiving the same Retry-After value will all wake at the
     same instant (no inter-process jitter on the Retry-After path; jitter
     is only applied in the NO-Retry-After branch). REM-7 has no failure
     mode for "broker equity-fetch returns stale value mid-flight" — the
     contract trusts whatever update_equity is fed.

  8. clock-and-ordering (REM-7) — AggregateDrawdownContract.update_equity
     accepts an aggregate_equity scalar with no timestamp argument and no
     receive-time field. The spec invariant ("single broker-receive-time
     snapshot fanned out synchronously") relies entirely on caller discipline.
     There is no production caller, so the discipline is moot at present —
     but when wired, no contract-level mechanism prevents the LTCM-class
     race the spec is meant to defend against.

  9. kill-switch-design — DRAWDOWN_AGGREGATE_HALT and DRAWDOWN_AGGREGATE_LOCKOUT
     are added to TriggerReason. Aggregate contract triggers them via
     kill_switch.trigger() if a kill_switch is supplied (not required by
     constructor). The COND-1 hook in PaperRunnerBase phase-A scaffold is
     present and tested for triggered/not-triggered states.

  Coverage-statement: I reviewed 17 of 17 source files in scope and 6 of 6
  test files in scope; I read selected portions of context-only files
  (run_paper_trading_vt.py, run_paper_trading_carry_fred.py, test_engine.py,
  config/default.yaml). No artifacts skipped.

