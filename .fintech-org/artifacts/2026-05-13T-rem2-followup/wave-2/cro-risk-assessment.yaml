  heartbeat_watchdog_interval: "CONSENSUS_2026-04-28 CRO-BC-2 ≤5min; wired as CRO_WATCHDOG_TIMEOUT_SECONDS=300.0 (scripts/run_paper_trading_vt.py:103); preserved by extraction"
