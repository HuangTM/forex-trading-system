body: |
  CONTAMINATION-CHECK: clean. The redacted PM artifact contains structured criteria, hard-constraints, out-of-scope, evidence pointers, and assumptions only. No proposer narrative, no "why this is a good idea" prose, no rationale for the 71% duplication number. The orchestrator redaction (task-statement + body + roles-staffed[].rationale dropped) is honored. CRO disjoint-evidence contract held.

  This is a CODE REFACTOR review — no instrument, no position, no sizing. size_multiplier=1.0 is a placeholder; the binding-constraint set is the lift-and-place of existing risk plumbing from per-script main bodies into PaperRunnerBase methods. The risk frame is "do the existing constraints survive the move" not "are the new constraints adequate."

  CARDINALITY-1 INVARIANT (CRITICAL — verdict_detail field 1).
  Verified in code (drawdown_contract.py + both paper scripts): AggregateDrawdownContract is currently instantiated ONCE per script main() (carry_fred.py:897, vt.py — symmetric). After COND-2 extraction the instantiation moves to PaperRunnerBase.__init__. Cardinality remains 1 PER LOOP RUN, which is the LTCM dual-layer requirement (per-strategy DrawdownContract + ONE aggregate). It is critical that the extraction does NOT create a second AggregateDrawdownContract per loop (e.g., via mixin double-init). The N-2 cardinality-1 test (test_n2_paper_runner_single_source_of_truth_n3) currently xfails on the inline-is_triggered gap; PM AC requires xfail-to-pass conversion OR additional explicit cardinality-1 assertion. CRO requires the explicit assertion approach (more durable than xfail-conversion which can silently regress). approve-with-condition: explicit cardinality-1 test must assert `len(weakref-set-of-AggregateDrawdownContract-instances) == 1` per loop, and the test must fail loudly if a second instance is constructed during PaperRunnerBase.__init__.

  StaleEquitySnapshotError preservation (drawdown_contract.py:58) and F-004 monotonic-timestamp guard (drawdown_contract.py:358-359, 445-449) are class-level invariants of AggregateDrawdownContract — they cannot be lost in the move because the class itself is unchanged. Confirmed.

  KILL-SWITCH REACHABILITY (verdict_detail field 2).
  COND-1 (kill_switch hook) is already in PaperRunnerBase (line 115-130). The remaining COND-2..7 do not touch kill-switch reachability — they extend pre-trade plumbing. Out-of-band kill-switch trigger remains via direct KillSwitch.trigger() invocation on the instance (which is exposed via the kill_switch property at line 226-229). BC-9-N4-COND-5 (kill-switch Property-4 LIVE-PAPER exercise) is explicitly out-of-scope per PM AC and per CONSENSUS_2026-05-13. This dispatch does NOT obstruct that operator-executed test. Approve.

  SEC RULE 15c3-5 / ACCOUNT_KEY_PARITY GATE (verdict_detail field 3).
  Rule 15c3-5(c)(1) requires automated, pre-trade financial risk controls that prevent erroneous orders and credit/capital breaches. assert_account_key_parity is the project-equivalent pre-trade segregation gate (ensures the loop is dispatching against the intended Saxo account, not a misconfigured one). Currently called at script main() BEFORE any cycle (vt.py:919, carry_fred.py:864). Moving to PaperRunnerBase.__init__ preserves fail-closed semantics IFF __init__ is called before any order-dispatching method — this is the standard subclass contract but it MUST be enforced by test (the placeholder test_bc8_cond3_account_key_parity_enforced is the right vehicle). The gate function itself is unchanged; only the call site moves. Approve, with the condition that the test asserts: a subclass that bypasses super().__init__() must fail loudly (not silently dispatch with no parity check). NB: this is firm-risk discipline alignment, not regulatory filing — we are not a US broker-dealer.

  HEARTBEAT WATCHDOG (verdict_detail field 4).
  CRO-BC-2 from CONSENSUS_2026-04-28 sets ≤5min timeout. Already wired as CRO_WATCHDOG_TIMEOUT_SECONDS=300.0 (vt.py:103). Moving HeartbeatWatchdog registration from per-script to PaperRunnerBase.__init__ preserves the 5min ceiling. Approve.

  FCNTL DISPATCH LOCK (verdict_detail field 5).
  PM AC says "acquired before each dispatch cycle" — confirms cycle-scope, NOT init-scope. Current code (carry_fred.py:495 + vt.py:511) acquires LOCK_EX|LOCK_NB at run_cycle entry, releases in finally at end of cycle. This is the correct scope: holding the lock across __init__ lifetime would prevent stagger-based cross-loop dispatch (would break F-005 D-4.1 stagger discipline that this project explicitly relies on). The extraction must be a context-managed method (e.g., `with self._acquire_dispatch_lock(): ...`) not a constructor-acquire. Approve, condition: lock SCOPE is per-cycle. Reject any implementation that holds the lock across multiple cycles or across __init__ lifetime.

  JPY-CORRELATED CAP (verdict_detail field 6).
  exposure_aggregator.py confirms 0.15 aggregate cap, 0.0375 per-strategy cap (REM-5 R-5.1 equal-weight rule). Cap fires at-or-below CRO-BC-1. Both raise on breach. Approve. (NOTE: the current per-strategy notional cap is implicitly correct only at N_STRATEGIES_MAX=4; if N grows past 4, the per_strategy_cap formula 0.15/N must be re-derived — out-of-scope for this dispatch but flagged as a downstream concern when N=3 or N=4 paper scripts come online.)

  SWAP ACCRUAL (verdict_detail field 7).
  swap_usd computed from _COST_MODEL.holding_cost() and held in cost_compute log entry. Pure portfolio-state arithmetic; no broker order generated. Paper-only by construction. Approve.

  F-007 CLEANUP (verdict_detail field 8).
  saxo/client.py:251 confirmed. The expression `retry_dt - retry_dt.utcnow()` is a TypeError on every HTTP-date Retry-After header (parsedate_to_datetime returns tz-aware; .utcnow() returns naive; subtraction raises). The bare except at line 252 catches it and applies exponential backoff with jitter — observable behavior is correct backoff, but the path is reached via exception not via parsing success. Fix `datetime.now(timezone.utc)` resolves the latent TypeError. Clock-and-ordering: receive-time stamp parity is preserved (no clock source change; just the comparison ref-point is now wall-clock UTC, which is what the original intent was). HTTP 429 retry-after parsing is preserved. No live-capital impact (paper-only at this dispatch; F-007 is also benign in any future live setup because backoff is applied either way). Approve.

  MODE COMPOSITION (--full-auto --no-ceo) (verdict_detail field 9).
  CONFIRMED: this dispatch is COND extraction + F-007 cleanup. NO change to kill-switch design (only placement of COND-1 hook is unchanged; no new switches, no new properties, no SLA changes). NO vendor onboarding. NO charter touch. NO capital movement (paper-only). NO new risk-contract clauses. The CRO quality-gate-review signature here applies only to the LIFT-AND-PLACE of existing constraints, not to the design of any constraint. This is in-bounds for full-auto signature. Approve.

  BLOWUP ANALOG: LTCM 1998 — the dual-layer drawdown defense (per-strategy DrawdownContract + AggregateDrawdownContract with cardinality-1) is the LTCM-class lesson: a single strategy's drawdown is necessary but not sufficient; you must also have a portfolio-aggregate cap that fires before any single strategy's lockout. Cardinality-1 of the aggregate is the entire point (two aggregates = no aggregate; the higher one always loses). REM-7 is named explicitly for this. Secondary analog: Knight Capital — kill-switch Property 1 (out-of-band) is preserved by COND-1 already being in BaseRunner; but Property 4 (tested in prod against live session) remains UNFULFILLED and is explicitly deferred to operator (BC-9-N4-COND-5 / REM-8). This dispatch does NOT close that gap; that gap is acknowledged and out-of-scope.

  OVERALL DECISION: approve with explicit conditions:
  1. Cardinality-1 explicit assertion test must be added (not just xfail-to-pass conversion).
  2. fcntl lock must remain cycle-scope (NOT init-scope); reject any implementation that holds across cycles.
  3. account_key_parity test must assert a subclass that skips super().__init__() fails loudly.
  4. JPY per-strategy cap formula assumes N=4; flag as downstream concern when N grows.
  5. F-007 fix is bundled and benign; approve.
  6. Kill-switch Property-4 (live-paper exercise) remains operator-action and is NOT closed by this dispatch (acknowledged out-of-scope per PM AC).

