body: |
  ## Composition vs. Inheritance (D-2.2 ratification for full extraction)

  D-2.2 confirmed inheritance (PaperRunnerBase as superclass) for Phase-A. This review
  ratifies that pattern for full COND-2..7 extraction.

  The primary concern with inheritance in a risk-envelope context is shared mutable state
  that could allow one strategy's guard state to corrupt another's. That concern is
  NEUTRALIZED here because:
  (a) Each paper script spawns its own process (fcntl dispatch lock, COND-5, is
      process-scoped). There is no in-process multi-runner concurrency.
  (b) PaperRunnerBase instance state (strategy_id, _kill_switch) is set per-instance,
      not at class level.
  (c) AggregateDrawdownContract, once moved to __init__, is instantiated per-runner-instance
      — not as a class variable.

  The latency-tier note is required by trading-platform-architectures/axes/research-to-prod.md
  when citing cross-firm precedent: this is a LOW-FREQUENCY paper loop (bar-close cadence,
  not hot-path). Inheritance overhead is negligible. Any reference to "composition scales
  better" from high-frequency systems literature does NOT apply here.

  The rejected alternative is pure composition (PaperRunnerBase as a helper object
  passed into scripts). The steelmanned case for composition is: scripts can selectively
  call guards and avoid Python MRO confusion. Rejected because: (a) Phase-A already
  established the inheritance contract and tests depend on it; (b) the N-2 cardinality-1
  test depends on isinstance/AST checks that assume the BaseRunner IS the runner;
  (c) composition would require scripts to own the guard orchestration, recreating the
  duplication attractor the extraction exists to eliminate.

  Anti-patterns explicitly rejected for COND-2..7 methods:
  - Shared mutable class-level state (class-level dict/list for guard tracking) — forbidden;
    each instance carries its own state
  - Hook-based override pattern (subclasses override guard methods) — forbidden per
    no_monkey_patching_of_base_runner_methods hard-constraint; COND methods must be final
  - Guard methods that implicitly depend on call order without documentation — COND-2..7
    must have documented call-order requirements in docstrings where order matters

  ## _PHASE_A_ACTIVE_GUARDS Successor (D-naming decision)

  Rename to: _ACTIVE_GUARDS

  Rationale: the Phase-A qualifier is a temporal artifact, not a semantic one. The
  constant's purpose is "the set of guard IDs active in this runner" — that meaning is
  constant across Phase-A and full-extraction. _PHASE_A_ACTIVE_GUARDS embedded a
  state-machine stage into an architectural constant, which is a documentation debt that
  decays immediately on merge of this wave.

  Post-extraction value: ["BC-8-LIFT-COND-1", "BC-8-LIFT-COND-2", "BC-8-LIFT-COND-3",
  "BC-8-LIFT-COND-4", "BC-8-LIFT-COND-5", "BC-8-LIFT-COND-6", "BC-8-LIFT-COND-7"]

  The active_guards property at base_runner.py:232-234 must also be updated to reference
  _ACTIVE_GUARDS (not _PHASE_A_ACTIVE_GUARDS).

  ## Duplication Measurement Methodology

  The canonical pre-extraction baseline was computed as:
    312 vt-unique + 245 carry_fred-unique = 557 unique LoC out of 1943 total = 71.3%
  (Source: CONSENSUS_2026-05-12_arch_review_multi_strategy.md:57, reproduced exactly)

  Post-extraction measurement command (to be run by QD and recorded in the implementation report):

    diff <(grep -v '^\s*#' scripts/run_paper_trading_vt.py | grep -v '^\s*$') \
         <(grep -v '^\s*#' scripts/run_paper_trading_carry_fred.py | grep -v '^\s*$') \
    | grep -c '^[<>]'

  This counts lines unique to either script (ignoring comment-only lines and blank lines),
  matching the spirit of the original 557-line measurement. The result divided by the
  sum of the two scripts' non-comment non-blank line counts gives the post-extraction
  uniqueness fraction. Record as: post_extraction_unique_lines / post_extraction_total_lines.

  Supplementary (optional, higher signal): cloc --diff for code-only diff excluding blanks
  and comments:
    cloc --diff scripts/run_paper_trading_vt.py scripts/run_paper_trading_carry_fred.py

  PM criterion: "reduction must be demonstrable via diff/wc." The diff|grep -c command
  above directly satisfies this. QD must record the command output verbatim in the
  implementation report. No specific target percentage is mandated, but the number must
  be lower than 557 unique lines (the pre-extraction baseline).

  ## Blast Radius

  Modules outside src/forex_system/paper/ and the 2 scripts that could be affected:

  1. src/forex_system/risk/drawdown_contract.py — COND-2 moves AggregateDrawdownContract
     instantiation from scripts to PaperRunnerBase.__init__. The class itself is not
     changed; the wiring point changes. Impact: update_equity call sites are already
     in the scripts' run_cycle; those call sites also move or delegate to base_runner.
     Blast radius: medium. The snapshot_timestamp monotonicity invariant (F-004/
     StaleEquitySnapshotError at drawdown_contract.py:447-462) must be preserved exactly
     — the timestamp source (broker receive-time) must not change to wall-clock-now.

  2. src/forex_system/risk/account_key_parity.py — COND-3 calls assert_account_key_parity.
     The function itself is not changed; the call site moves from script startup to
     PaperRunnerBase.__init__. Blast radius: low. No interface change.

  3. src/forex_system/risk/heartbeat_watchdog.py — COND-4 moves HeartbeatWatchdog
     registration to PaperRunnerBase.__init__. The watchdog's on_timeout callback
     references the halt mechanism — this callback must still reference the correct
     halt flag for the specific strategy. Blast radius: medium-high. The callback
     must be passed as a parameter to __init__, not hardcoded, to avoid coupling
     base_runner.py to script-specific halt logic.

  4. src/forex_system/risk/exposure_aggregator.py — COND-6 (JPY cap) calls into
     exposure_aggregator. The aggregator itself is not changed; the call site moves.
     Blast radius: low. Per-strategy cap logic (REM-5/R-5.1) is already in the aggregator.

  5. src/forex_system/saxo/client.py — COND-5 (fcntl lock) and COND-3 (account_key parity)
     both use the client/backend. Moving these to base_runner means base_runner grows a
     saxo dependency. Blast radius: low structurally but import-cycle risk must be verified
     (base_runner.py currently has no saxo import; QD must confirm no circular import
     is introduced when base_runner imports from saxo/).

  6. tests/integration/test_paper_runner_bc8_conds.py — all 6 @pytest.mark.skip tests
     must be un-skipped and implemented. The N-2 xfail must be resolved. These are
     additions, not changes to existing passing tests.

  7. tests/backtest/test_engine.py::test_no_lookahead — NOT affected. This wave does
     not touch backtest/ or features/. Sacred test is a regression guard only.

  Cross-module surface summary: risk/* (5 modules touched as call-site recipients),
  saxo/* (2 modules potentially imported by base_runner), tests/integration (6 tests
  un-skipped). No core/, data/, strategies/, analysis/ modules are affected.

  ## Logging Schema (cond_guard_observability hard-constraint)

  Each COND-N guard method must emit exactly ONE structured log entry per invocation,
  per the log-as-decision-trace rubric (items 1, 2, 5, 6, 8, 9 are the minimum required
  at this latency tier; items 3, 4, 7, 10 apply as noted).

  Required field schema for all COND guard log entries:

    event: "bc8_cond_check"                    # item 9: dotted enumerable event name
    strategy_id: <str>                         # item 5: correlation field; propagated from self.strategy_id
    condition_id: "BC-8-LIFT-COND-N"           # item 2: the specific condition being checked
    outcome: "OK" | "HALTED" | "WARN" | "REDUCED"  # item 1: enumerable outcome, not prose
    # condition-specific context fields (item 2: all inputs that drove the outcome):
    # COND-2: equity=<float>, drawdown_pct=<float>, contract_action=<str>
    # COND-3: live_account_key_hash=<str>, expected_account_key_hash=<str>  # NOT raw keys (item 7)
    # COND-4: watchdog_timeout_seconds=<float>, watchdog_registered=<bool>
    # COND-5: lock_path=<str>, lock_acquired=<bool>
    # COND-6: jpy_correlated_pct=<float>, jpy_cap_pct=<float>, capped=<bool>
    # COND-7: swap_accrual_amount=<float>, swap_accrual_called=<bool>

  The SKIPPED path must also be logged (log-as-decision-trace item 6): if a guard is
  bypassed due to a pre-condition not being met (e.g., no open positions for swap
  accrual), the log must emit outcome="SKIP" with the reason field populated.

  Structural requirement: log entries must use structured key-value pairs (logfmt or
  kwargs), NOT f-string prose. The COND-1 pattern at base_runner.py:125-129 currently
  uses %-style string formatting which is NOT fully structured (values are baked into
  the message string). QD must upgrade COND-1 and all COND-2..7 entries to emit via
  logger.info() with keyword-only structured fields, or use a structured logging
  adapter. This is a COND-A3 condition.

  Startup log field schema (existing base_runner.py:104-109 pattern must be upgraded):
    event: "paper_runner_startup"
    strategy_id: <str>
    active_bc8_lift_cond_guards: <list[str]>   # must list all 7 after full extraction
    # Remove: phase=A note='COND-2..7 pending...' (COND-A2)

  ## Deploy-Checklist Applicability

  deploy-checklist-trading DOES NOT gate this dispatch. Explicit rationale:

  This is a paper-only refactor. PM acceptance-criteria hard-constraint paper_only=true
  and no_live_capital=true confirm no live execution path is affected. The sterile-deploy-window
  concept transfers: do NOT bundle any changes to backtest/, features/, strategies/, or
  data/ modules in this wave. Only src/forex_system/paper/base_runner.py, the 2 scripts,
  src/forex_system/saxo/client.py (F-007 only), and the integration test file are
  authorized targets.

  F-007 is explicitly authorized bundling per prior CONSENSUS_2026-05-13
  (PR cycle-2 observation, F-007 residual non-blocking). No other opportunistic refactors
  are permitted in this wave.

  The sterile-window violation that would trigger CTO veto: any diff touching
  tests/backtest/test_engine.py, src/forex_system/backtest/, or any strategy signal
  calculation path.

  ## Tech-Debt Surface Check

  This extraction REDUCES tech debt on the following structural surfaces:

  1. PR description (forthcoming QD wave-2): must cite the 6 conditions closed
     (BC-8-LIFT-COND-2..7) and reference this CTO approval artifact as the
     architecture rationale. A PR description without these citations is a
     hidden-technical-debt-in-shippable-artifact veto trigger.

  2. Architecture artifact (this document): the CTO architectural decisions are
     now recorded at wave-2/cto-architecture-review.yaml. The prior tech-debt
     was the absence of a wave-2 CTO artifact for the follow-up extraction.

  3. Firewall self-review: QD must include execution-firewall-review self-attestation
     in the implementation report (PM hard-constraint firewall_execution_researcher).
     Sections A and C are most relevant (no new numeric thresholds should appear in
     base_runner.py; all COND parameters must be passed from calling scripts, not
     hardcoded in the base).

  Tech-debt added by this wave: the fcntl import in base_runner.py (COND-5) introduces
  a platform assumption (POSIX-only) into a module that currently has no OS-specific
  imports. This is a known tradeoff. QD must document it in the PR description. The
  alternative (keeping fcntl in scripts only) was evaluated and rejected: it defeats
  the cardinality-1 invariant for COND-5.

  ROUTE_TO: principal-reviewer for code-level inspection of the COND-4 HeartbeatWatchdog
  callback wiring. The concern is that the watchdog's on_timeout halt callback, if
  hardcoded inside PaperRunnerBase.__init__, couples the base class to script-specific
  halt state. QD must pass the callback as a parameter; PR must verify this pattern
  is not violated.

  ## F-007 Review

  (a) Structural soundness: the proposed fix `datetime.now(timezone.utc)` is structurally
  correct. The bug at client.py:251 is `retry_dt.utcnow()` — calling the instance method
  utcnow() on a tz-aware datetime returns a NEW tz-naive datetime, making the subtraction
  `retry_dt - retry_dt.utcnow()` a tz-aware minus tz-naive operation, which raises TypeError
  deterministically in CPython 3.11+ (confirmed: CONSENSUS_2026-05-13 PR cycle-2 residual
  observation). The fix `datetime.now(timezone.utc)` produces a tz-aware UTC datetime,
  making the subtraction type-safe.

  (b) Observable behavior: the fix does NOT change observable behavior in the common case.
  In the current code, the TypeError at line 251 is caught by the `except Exception` at
  line 252, which falls through to jittered backoff. After the fix, a valid past HTTP-date
  Retry-After header will produce delay ≈ 0 (max(0.0, negative) → 0.0), which is the
  semantically correct behavior (the server's suggested delay has already passed). This
  is a behavioral improvement, not a behavioral change in the safety-critical sense:
  the storm-prevention property (jitter on the fallback path) is preserved and the
  happy path now works correctly.

  (c) Test coverage: tests/saxo/test_rem6_429_hardening.py already contains
  test_429_with_http_date_retry_after_respects_delay (verified at line 111-146) which
  exercises the HTTP-date branch. The test uses a past date ("Wed, 01 Jan 2020 00:00:00 GMT")
  which produces delay ≈ 0 — this test will PASS both before and after the fix (the
  except-fallthrough also produces a small delay in the before-state, just via jitter
  rather than the arithmetic path). No new test is required; the existing test provides
  adequate regression coverage for the fix.

  F-007 verdict: APPROVE. No conditions.

failure-modes-considered:
  - name: COND-4 heartbeat callback coupling
    description: |
      HeartbeatWatchdog on_timeout callback in the vt script references a script-specific
      halt flag (_HALT_REQUESTED or equivalent). If PaperRunnerBase hardcodes a generic
      halt mechanism instead of accepting the callback as a parameter, the watchdog fires
      the wrong halt path (or no-ops) when extracted. This is a silent safety regression:
      tests would pass (watchdog registration asserted), but the watchdog's triggered
      behavior would be untested.
    mitigation: |
      QD must accept the halt callback as a constructor parameter and pass it through.
      COND-A3 log schema must include watchdog_registered=True to give observability.
      PR must be reviewed by principal-reviewer (ROUTE_TO above).

  - name: AggregateDrawdownContract double-instantiation during migration
    description: |
      If the scripts are partially refactored (inheritance added but COND-2 wiring not
      yet removed from script startup), AggregateDrawdownContract will be instantiated
      twice: once in PaperRunnerBase.__init__ and once in the script's main() block.
      This violates cardinality-1 and will triple-count drawdown (3× if both scripts
      have the old instantiation plus the base instantiation). The PM test
      test_bc8_cond2_drawdown_contract_active may pass (base has one instance) while
      the scripts still have their own instance — cardinality-2 bug undetected.
    mitigation: |
      QD must remove the AggregateDrawdownContract instantiation from both scripts
      atomically with the COND-2 extraction (not in a separate commit). The cardinality-1
      xfail test (test_n2_paper_runner_single_source_of_truth_n3) must be resolved
      as part of this wave, not deferred. COND-A4 enforces this.

  - name: snapshot_timestamp monotonicity broken by wiring move
    description: |
      Both scripts currently call update_equity() with a broker-receive-time timestamp
      (F-004 closure). If PaperRunnerBase.__init__ wires update_equity without the
      snapshot_timestamp parameter (defaulting to wall-clock-now per drawdown_contract.py:426-430),
      the monotonicity guarantee silently degrades. The StaleEquitySnapshotError will
      not fire (wall-clock-now is always monotonic) but the CRO R-7.1 equity-snapshot
      protocol (broker receive-time canonical) is violated.
    mitigation: |
      COND-A5 requires explicit snapshot_timestamp passing. QD must verify the
      broker-receive-time timestamp is propagated through the PaperRunnerBase API
      to update_equity. This is a CRO-domain concern; CRO wave-3 artifact must
      confirm this invariant is preserved.

  - name: circular import from base_runner importing saxo/
    description: |
      After COND-5 extraction, base_runner.py may need to import from saxo.client
      (for account_key) or risk/ modules that themselves import from other paths.
      Python circular imports in this codebase have been a source of prior failures.
    mitigation: |
      QD must verify import graph before merging. Acceptable resolution: pass saxo
      objects (SaxoClient, SaxoExecutionBackend) as constructor parameters, not
      as module-level imports in base_runner. This avoids the circular import entirely.

