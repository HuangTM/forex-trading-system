verdict-detail:
  composition_vs_inheritance: |
    INHERITANCE RATIFIED for full extraction. Reasoning: (1) per-process architecture
    means no shared mutable state across strategy instances; (2) Phase-A already established
    the pattern and tests depend on it; (3) composition would recreate the duplication
    attractor by requiring scripts to own guard orchestration. Steelmanned composition
    case evaluated and rejected. Anti-patterns forbidden: shared class-level state,
    overrideable guard methods (monkey-patch vector), implicit call-order coupling.
    Latency-tier note: low-frequency paper loop; inheritance overhead is immaterial.

  active_guards_constant_name: |
    RENAME to _ACTIVE_GUARDS. Remove _PHASE_A_ prefix — it is a temporal artifact not
    a semantic one. Post-extraction value must be all 7 COND IDs. The active_guards
    property (base_runner.py:232-234) must also reference _ACTIVE_GUARDS. Both are
    covered by COND-A1.

  duplication_measurement_methodology: |
    SPECIFIED. Primary command:
      diff <(grep -v '^\s*#' scripts/run_paper_trading_vt.py | grep -v '^\s*$') \
           <(grep -v '^\s*#' scripts/run_paper_trading_carry_fred.py | grep -v '^\s*$') \
      | grep -c '^[<>]'
    Record as: <result> unique lines / <sum of non-comment non-blank lines in both scripts>.
    Baseline to beat: 557 unique lines out of 1943 total (71.3%) per CONSENSUS_2026-05-12.
    Supplementary: cloc --diff for code-only diff.
    QD must record command + verbatim output in the implementation report before wave-3.

  blast_radius: |
    Affected modules outside paper/ and 2 scripts:
    1. src/forex_system/risk/drawdown_contract.py — COND-2 wiring move; snapshot_timestamp
       propagation must be preserved (medium risk; COND-A5)
    2. src/forex_system/risk/account_key_parity.py — COND-3 call site move (low risk)
    3. src/forex_system/risk/heartbeat_watchdog.py — COND-4 registration move; callback
       coupling risk (medium-high; ROUTE_TO principal-reviewer)
    4. src/forex_system/risk/exposure_aggregator.py — COND-6 call site move (low risk)
    5. src/forex_system/saxo/ — potential import by base_runner (circular import risk;
       resolve by passing saxo objects as constructor parameters)
    6. tests/integration/test_paper_runner_bc8_conds.py — 6 tests un-skipped, xfail resolved
    Sacred test (tests/backtest/test_engine.py::test_no_lookahead): NOT affected.

  logging_schema: |
    Required field schema for every COND-N guard log (structured key-value, not f-string):
      event: "bc8_cond_check"
      strategy_id: <str>                            # correlation field
      condition_id: "BC-8-LIFT-COND-N"              # enumerable, exact string
      outcome: "OK" | "HALTED" | "WARN" | "REDUCED" | "SKIP"  # enumerable
    Condition-specific context (all inputs that drove the outcome):
      COND-2: equity=<float>, drawdown_pct=<float>, contract_action=<str>
      COND-3: live_account_key_hash=<str>, expected_account_key_hash=<str>  # hash only, not raw
      COND-4: watchdog_timeout_seconds=<float>, watchdog_registered=<bool>
      COND-5: lock_path=<str>, lock_acquired=<bool>
      COND-6: jpy_correlated_pct=<float>, jpy_cap_pct=<float>, capped=<bool>
      COND-7: swap_accrual_amount=<float>, swap_accrual_called=<bool>
    Startup log (PaperRunnerBase.__init__):
      event: "paper_runner_startup"
      strategy_id: <str>
