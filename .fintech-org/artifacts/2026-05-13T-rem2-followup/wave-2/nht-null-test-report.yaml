body: |
  CLAIM 1 — Cardinality-1 invariant on AggregateDrawdownContract.
  Null hypothesis (H0_1): the post-extraction codebase contains zero or more
  than one AggregateDrawdownContract() call sites outside
  PaperRunnerBase.__init__. Reject H0_1 only with a static AST scan over
  scripts/ and src/forex_system/paper/ asserting the count == 0.
  Current state: H0_1 cannot be rejected because (a) no extraction has
  shipped (HEAD = 32cf771), (b) two call sites currently exist
  (carry_fred:897, vt:952), and (c) no AST scan test exists.
  A runtime "len(active_contracts) == 1" snapshot test is INSUFFICIENT —
  each paper script runs in its own process; runtime cardinality is always
  the number of contracts the running script instantiated, regardless of
  how many other scripts contain copy-pasted instantiations. The invariant
  must be enforced statically across the repo, not at runtime per-process.

  CLAIM 2 — 71% duplication reduction is measurably achieved.
  Null hypothesis (H0_2): the post-extraction duplication metric is
  indistinguishable from what would be obtained by deleting the same number
  of random lines from each script (matched-random control). Reject H0_2
  only when (a) the methodology is committed as a reproducible script,
  (b) the methodology applied to commit 32cf771 reproduces ~71% within
  ±3pp, and (c) the post-extraction value beats the matched-random control
  by > 5 percentage points.
  Current state: H0_2 cannot be tested because no methodology has been
  picked, no measurement script exists, and the post-extraction number
  does not yet exist. A naive `wc -l` comparison would conflate raw LoC
  reduction with semantic duplication reduction; moving identical 50-line
  blocks to base_runner.py reduces script LoC by 50 each but the semantic
  duplication content is the SAME — it has merely been factored. The
  measurement must distinguish "code now lives in shared module" from
  "duplication actually eliminated" (e.g., via cloc --diff identical-line
  count or AST-normalized LCS).

  CLAIM 3 — Attractor surface for copy-paste F-001 re-introduction is
  mechanically closed.
  Null hypothesis (H0_3): a hostile/careless developer adding
  scripts/run_paper_trading_strategy3.py with a copy-pasted
  AggregateDrawdownContract instantiation produces NO test failure.
  Reject H0_3 only with a hostile-injection test that demonstrates the
  cardinality-1 AST guard fails on the transient injection and passes
  after removal.
  Current state: H0_3 cannot be rejected. There is no mechanical guard.
  The closest existing test is the N-2 env-var-bypass grep
  (test_n2_no_feature_flag_kill_switch_bypass), which only catches
  `os.environ.*SKIP` patterns — not contract instantiation cardinality.
  The dispatch's claim of "attractor surface closed" is currently social
  closure ("don't do that"), not mechanical closure. Social closure is
  not closure.

  Disposition summary:
  - All three claims: under-tested.
  - Overall artifact decision: dissent.
  - Severity: concern (does_block: false). The four requested tests are
    well-scoped and can be added by QD within the wave. If wave-2 ships
    without them, severity escalates to material_concern in any next pass.

