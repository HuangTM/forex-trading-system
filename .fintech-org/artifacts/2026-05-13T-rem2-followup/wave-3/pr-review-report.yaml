body: |
  REM-2 extraction is structurally sound. All 7 COND guards are implemented in
  PaperRunnerBase with correct logic. The F-007 fix (client.py:252) is correct:
  datetime.now(timezone.utc) replaces the naive-vs-aware subtraction bug; the
  except fallthrough at line 253 is preserved. The dispatch lock (COND-5) fd
  management is correct: BlockingIOError and OSError handlers close the fd and
  set _dl_fd=-1 before yielding, so the finally block skips double-close.

  Two major findings require conditions before merge:

  F-001 (security/major): COND-3 startup log emits account_key in plaintext at
  base_runner.py:158. This contradicts the Wave-10 PII sanitization that scrubbed
  account_key from 4 files. Remediation: truncate or hash (e.g. f"...{account_key[-4:]}").

  F-002 (test-coverage/major): The AST cardinality guard enforces only an upper bound.
  Zero AggregateDrawdownContract in a paper script's main() passes silently. A minimum
  lower-bound assertion per paper script is missing. Alias-import bypass is a secondary
  gap (no current instances).

  F-003 (observability/minor): All COND-1..7 logs use %-style positional strings, not
  structured key-value. CTO COND-A3 from wave-2 required upgrading to structured;
  this wave propagated the non-compliant pattern to 6 new CONDs. The logs ARE
  grep-able via string match, so this is decision-reconstructable but not queryable.

  F-004 (observability/minor): The script-level dispatch_lock.fs_error log on the FS_ERROR
  path is sparse (no errno/strerror/lock_path) relative to the base_runner log.

  F-005 (observation): The _runner_is_shim COND-6 path has no bc8_cond_check logging.
  Backward-compat trade-off acknowledged; pre-REM-2 callers silently degrade on COND-6.

  The sacred test passes. 848/849 suite. The pre-existing governance JSONL canary
  failure is not introduced by this wave.

