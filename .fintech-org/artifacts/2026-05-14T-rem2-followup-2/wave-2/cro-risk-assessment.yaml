body: |
  REM2-followup-2 is a refactor + test-tightening + observability-migration dispatch.
  No live capital, no kill-switch design CHANGE, no charter touch, no vendor onboarding.
  All four CRO concern lanes (AST guard lower-bound, alias detection, shim consolidation
  risk surface, structured-logging migration) are scoped correctly by PM and address
  real gaps verified in source.

  Approve quality-gate review with the following verdict-detail comments
  (constraints, not vetoes — items QD must satisfy in wave-3):

  1. AST guard lower-bound (PM criterion #4): SOUND. Cardinality-1 means EXACTLY ONE
     per loop run. Today the guard only catches >1; a script with zero instantiations
     silently passes — that is a no-LTCM-defense state and is risk-material on par
     with the >1 (triple-counting) case. Subclass-__init__ OR main() lower-bound
     is the correct semantics because the existing _is_inside_paperrunnerbase_init
     already walks subclass __init__ as legitimate.

  2. Alias detection (PM criterion #5): the proposed ast.ImportFrom walk closes
     the obvious alias gap. CALL OUT one residual edge: pure `import
     forex_system.risk.drawdown_contract` followed by attribute-style
     `forex_system.risk.drawdown_contract.AggregateDrawdownContract()` — the
     existing code path at test line 876 (`func.attr == "AggregateDrawdownContract"`)
     ALREADY catches this; QD does not need to add new logic for the attribute case,
     but the wave-3 self-test fixture should include it as a positive-coverage
     example to prove the guard fires on attribute-style instantiation. Also: alias
     `import forex_system.risk.drawdown_contract as drisk; drisk.AggregateDrawdownContract()`
     is also caught by the existing attr== check. The remaining gap closed by
     PM criterion #5 is specifically the `import-as` rebinding to a NEW name.

  3. Shim consolidation risk surface: no risk surface change.
     - assert_account_key_parity: shim wrapper at vt.py:91 and carry_fred.py:111
       already delegates to forex_system.risk.account_key_parity._impl. Moving
       both shim wrappers to script_compat_shims.py preserves the delegation
       chain. SEC 15c3-5 gate STILL fires at PaperRunnerBase.__init__ (line 153-167),
       not via the shim. The shim is only the pre-REM-2 test-surface back-compat
       wrapper. CONFIRM in wave-3: shared module re-exports must NOT introduce a
       second call path that bypasses PaperRunnerBase.__init__.
     - check_dispatch_allowed: today both scripts re-export the symbol at module
       level for tests that patch vt_mod.check_dispatch_allowed and
       cf_mod.check_dispatch_allowed independently. Consolidation must preserve
       BOTH names being patchable — re-export from the shared module into each
       script namespace (e.g. `from forex_system.paper.script_compat_shims
       import check_dispatch_allowed`). Same correlation-aggregator threshold
       (0.15/N=4) applies because both call sites pass through PaperRunnerBase
       __init__ for runtime path and module-level name only for shim/test surface.
     - fcntl dispatch lock: only the import re-export moves; the actual
       _acquire_dispatch_lock is in PaperRunnerBase.__init__ for path storage
       (line 184) and contextmanager-acquired per-cycle in run_cycle (line 556 vt,
       539 carry_fred). Cycle-scope-not-init-scope IS preserved.

  4. Structured-logging migration (F-003): bc8_cond_check prefix preserved as a
     literal string token in the rendered log message is the correct discipline.
     Incident response grep depends on it (e.g. "give me all COND-6 BLOCKED in
     last hour for vol_target_carry"). Concrete pattern QD must adopt:
       logger.info("bc8_cond_check ...", extra={"strategy_id": ..., "condition_id": ...})
     Where the message string ITSELF starts with the prefix; extra= dict adds
     structured keys for downstream JSON parsers but does NOT replace the prefix.
     This satisfies log-as-decision-trace items 1-5 (who/what/why/outcome/time)
     while preserving operator grep pattern.

  5. F-001 PII redaction (base_runner.py:154-167): redaction logic is in-line
     before the log call (string-built variable account_key_redacted), independent
     of log format. Migrating to extra= dict can either (a) keep the redacted
     string in the message AND in the extra dict (preferred), or (b) only in
     extra dict (acceptable if formatter renders it). QD MUST attest in wave-3
     report that account_key never appears in full in any new structured field
     and the last-4 redaction pattern is preserved.

  6. Mode composition: this dispatch is shim CONSOLIDATION + TEST tightening +
     LOGGING migration. NONE of the forbidden-interim categories
     (kill-switch design CHANGE, vendor onboarding, charter touch, capital
     movement, live capital) match. Authentic --full-auto --no-ceo dispatch.

  Quality-gate review APPROVED. Quorum signature affirmative.

