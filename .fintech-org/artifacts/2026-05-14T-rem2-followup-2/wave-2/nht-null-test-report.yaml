body: |
  CLAIM 1 — Duplication metric drops from 72.7% to <=60% after shim
  consolidation.
  Null hypothesis (H0_1): post-consolidation duplication is statistically
  indistinguishable from what would be obtained by deleting the same total
  LoC at random from each script. Reject H0_1 only when (a) the methodology
  is committed as tools/measure_paper_script_duplication.sh, (b) the
  methodology applied to commit 5522d7b reproduces 72.7% within +/- 3pp,
  (c) the post-consolidation value is <= 60%, AND (d) the post-consolidation
  value beats the matched-random control by > 5 percentage points.
  Current state: H0_1 cannot be tested. No measurement script exists
  (verified: no measure_paper_script_duplication.sh in tools/). No
  post-consolidation state exists (verified: no script_compat_shims.py,
  no QD implementation report). Disposition: UNDER-TESTED.

  Methodology risk: a naive wc -l comparison after shim extraction will
  trivially show LoC reduction in scripts AND no offsetting duplication
  in script_compat_shims.py (because shared code lives in one place).
  This conflates "code factored into shared module" with "semantic
  duplication eliminated." The matched-random control is the discriminator:
  if random LoC deletion from the baseline produces a similar duplication
  drop, the consolidation provided no genuine deduplication value, only
  cosmetic LoC reshuffling.

  CLAIM 2 — Structured logging migration preserves bc8_cond_check
  grep-ability.
  Null hypothesis (H0_2): removing "bc8_cond_check" from the rendered
  message string and keeping it only as a structured field in extra=
  dict has no observable test failure. Reject H0_2 only when an
  anti-canary monkey-patch fixture (which deletes the prefix from
  ONE log call) causes the prefix-preservation test to deterministically
  fail. Current state: H0_2 partially testable today — the existing
  one-sided canary at line 254-276 passes against current %-style
  state, but post-F-003 migration state and the anti-canary fixture
  do not exist. Disposition: UNDER-TESTED.

  Permutation discipline: per the skill probability-statistics
  permutation-test guidance, the order of extra= dict keys must not
  affect grep behavior. A test that shuffles key order and asserts
  identical grep output discriminates between (i) a correct
  string-template-with-extra-dict implementation and (ii) a
  json-only implementation that happened to render keys in a fixed
  order during the test run.

  CLAIM 3 — F-002 AST guard catches all claimed failure modes.
  Null hypothesis (H0_3): the tightened guard self-test passes
  tautologically (the test asserts what the implementation does,
  not what is correct). Reject H0_3 only when each transient
  bad-input fixture (zero-instance, aliased-import, attribute-style)
  causes the guard to fail deterministically AND the legitimate
  subclass-__init__ pattern passes. Current state: H0_3 cannot be
  tested. The existing guard at lines 841-959 has confirmed lower-bound
  and alias-detection gaps (read-verified: line 874 matches only
  func.id == "AggregateDrawdownContract", line 876 matches only
  func.attr == "AggregateDrawdownContract", line 936-945 main_call_count
  produces no violation entry when count == 0). Self-test fixtures
  for the new guard semantics do not exist. Disposition: UNDER-TESTED.

  Adversarial false-negative documentation requirement: the guard
  cannot detect getattr-based dynamic instantiation
  (getattr(module, "AggregateDrawdownContract")()), eval-based
  string instantiation, or importlib.import_module-based dynamic
  resolution. These are accepted out-of-scope; QD must document
  them in the guard docstring so future contributors do not assume
  exhaustiveness.

  Disposition summary:
  - All three claims: under-tested.
  - Overall artifact decision: dissent.
  - Severity: concern (does_block: false). The tests requested are
    well-scoped and can be added by QD within wave-3 implementation.
    If wave-3 ships without the matched-random control (Claim 1),
    anti-canary fixture (Claim 2), or self-test fixtures with
    documented false-negatives (Claim 3), severity escalates to
    material_concern in the next NHT pass.

