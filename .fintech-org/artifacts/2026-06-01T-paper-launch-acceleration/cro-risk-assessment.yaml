body: |
  This is a read-only, zero-capital observe loop on a single instrument (EUR/USD) against a
  simulated account. From a pure market-risk standpoint there is no exposure: VaR=ES=0, no
  leverage, no drawdown that controls real money. Therefore the SIZING decision is unambiguous:
  size_multiplier = 0.0. Any value > 0 would convert a "canary" into an unvalidated-alpha
  deployment, which the firm's own ratified audit findings forbid (no validated OOS alpha exists;
  the kill-criterion already tripped on infra, not insight). I additionally require that
  observe-only be enforced by an architectural routing-disabled flag, not by the multiplier alone —
  a single numeric guard is the Knight-class footgun (one config flip from zero to live).

  The firm risk-contract clauses (0.25/1.0/2.5%, EUR+GBP correlated unit, 3:1, 4% daily, 15% DD,
  50/75% graduated de-risk) are SATISFIED-BY-CONSTRUCTION at zero exposure. They remain the declared
  envelope and become load-bearing the instant any sizing>0 is proposed — which is out of scope for
  this wave.

  PRECONDITION TRIAGE (the requested critical judgment):
  - The two operationally/epistemically dangerous preconditions are BLOCKING even at zero capital,
    because the risk they carry is NOT capital risk:
      P1 secrets-purge — a leaked broker credential is an unbounded, irreversible loss regardless of
        whether any capital is at risk. Nearly leaked on 2026-06-01. Hard gate before any push.
      P4 mock-sentinel-fix — float==100000.0 collides with the SIM seed, so the canary cannot
        distinguish its real cycles from mock cycles. Every downstream claim ("ran 30 clean cycles",
        "tolerances calibrated") becomes unfalsifiable. This is a decision-trace / data-integrity
        failure that corrupts the canary's entire reason for existing. Hard gate.
  - The two preconditions that are ADVISORY for STARTING the loop (but BLOCKING for graduation):
      P2 saxo-marking — at sizing=0 the marking convention only changes a cosmetic ledger figure that
        controls zero capital; mis-marking cannot produce a loss with no position. Must close before
        sizing>0 or before reconciliation-tolerance sign-off.
      P3 30-50-cycle-calibration — this is the canary's OUTPUT, not a precondition to running it.
        Gating the loop on data the loop must generate is circular. It is the gate on
        reconciliation_enforce:true and on any "paper-launch" claim, not on the observe loop itself.

  KILL-SWITCH PROD DRILL: NOT required to START this zero-capital observe loop (there is no runaway
  loss path when no orders route and sizing=0). It IS a hard REQUIRED precondition before this canary
  may graduate to ANY sizing>0 / order-routing path: kill-switch properties 3 (known SLA) and 4
  (tested in prod-equivalent conditions) are unmet, which is exactly the Knight-class gap. Recommend
  scheduling the timed prod-equivalent drill now and recording it to .fintech-org/kill-switch-tests.jsonl
  so it is not the blocker at the sizing>0 gate.

  ES/CVaR GAP: acknowledged (VaR-only system). NOT a go/no-go blocker for a zero-capital observe loop —
  there is no tail to measure when exposure is zero. It IS a blocking gap before any capitalized sizing,
  per the quantitative-risk-management standard (headline metric must be ES@97.5%, not VaR). Logged as
  BC-ES, out of scope for this wave per stated constraints, but must not be silently carried into a
  sizing decision later.

  ADDITIONAL PLUMBING NOTES (not gates, but risk-relevant for the canary's validity):
  - cost-recon is alarm-only (reconciliation_enforce:false): acceptable for observe-only since there is
    nothing to flatten; a breach simply alarms. Must flip to enforce (with calibrated tolerances from P3)
    before any sizing>0.
  - swap accrual previously 0.0/cycle (_last_cycle_ts resets per process): at zero position swap is
    correctly zero, so this does not corrupt the observe ledger — but it MUST be fixed before sizing>0,
    or carry cost will be systematically under-counted. Flag, not gate, for this wave.
  - drawdown peak-persistence fix (2026-06-01) must remain in effect; it is what lets the breaker logic
    be exercised correctly across restarts during the long observe loop.

  DECISION: size-reduced to 0.0 (the only risk-correct value for an observe-only canary), conditional on
  P1 and P4 closing before the loop produces any claimed-real cycles, and conditional on routing being
  architecturally disabled independent of the multiplier.
