critical-path-bottleneck: >
  STEP 3 (operator token provisioning) is the true wall-clock bottleneck.
  It is a human/administrative action with a 0-to-24h window that is entirely
  outside firm control. STEP 1 (secrets-purge) and STEP 2 (mock-sentinel-fix)
  are parallelizable and can complete in 2-3h of engineering time while the
  operator arranges the token. STEP 5 (first real bar) cannot start until BOTH
  the token and the P4 fix are in hand. The earliest possible first-real-bar
  time = max(token_arrival, P1_close, P4_close). The 24h SIM token TTL means
  the operator must also time token issuance to the intended run window — tokens
  issued and then left unused for hours are wasted.

# ─────────────────────────────────────────────────────────────────────────────
# SAXO MARKING PROTOCOL
# ─────────────────────────────────────────────────────────────────────────────
saxo-marking-protocol: |
  WHAT THE PROBE MUST SHOW
  ────────────────────────
  For an open long EUR/USD position (opened via --open-and-flatten EURUSD):
    1. PRIMARY (unit-free, definitive): CurrentPriceType == "Bid"
       Any value other than "Bid" for a long is an unexpected finding that
       invalidates the documentary conclusion and requires investigation.
    2. SECONDARY (arithmetic, USD-quoted only): broker's ProfitLossOnTrade
       must be arithmetically closer to (amount * (bid - open_price)) than
       to (amount * (mid - open_price)), where mid = (bid+ask)/2.
       Acceptable deviation: ≤ 1 pip (0.0001 USD/EUR) × |amount|, to allow
       for SIM pricing engine rounding and the CalculationReliability edge case.
    3. CalculationReliability field: should be "Reliable". If "Delayed" or
       absent, note it — delayed prices can introduce apparent mid-marking
       artifacts on illiquid SIM pairs; for EUR/USD this should not occur but
       must be recorded.

  WHAT "CONFIRMED" MEANS
  ──────────────────────
  Confirmed = BOTH conditions met:
    (a) CurrentPriceType == "Bid" (primary, always checked), AND
    (b) ProfitLossOnTrade arithmetically closer to bid-marked value than to
        mid-marked value (secondary, checked for USD-quoted pairs).
  If only (a) passes and (b) fails: record as "partial — investigate arithmetic
  discrepancy (possible commission or SIM adjustment)". Do NOT treat as a refutation
  of the documentary finding unless the arithmetic delta exceeds 3 pips.

  EXPECTED OPEN-POSITION RESIDUAL
  ─────────────────────────────────
  From docs/research/saxo_totalvalue_marking_2026-06-01.md (corrected 2026-06-01):
    While a long of u nominal units is OPEN:
      Broker marks at bid:  unrealized_broker = u*(mid_now - mid_0) - 2*u*hs
      Model marks at mid:   unrealized_model  = u*(mid_now - mid_0) - u*(hs+sl)
      Residual while open:  R = broker - model = u*(sl - hs)

    For EUR/USD config (hs=0.25pip, sl=0.5pip, c=0.5pip):
      R_open ≈ +u * 0.25 pip  (model sits BELOW broker; model over-charges vs
      broker's spread-only marking because slippage > half-spread)

    On CLOSE (per trade, cumulative):
      R_close = u * (2*sl + c) = u * 1.5 pip  (not zero — this is the signal
      cost-reconciliation exists to measure: modeled_cost vs actual_cost divergence)

  The residual DOES NOT converge to zero on close — it converges to u*(2sl+c)
  which equals the modeled cost excess over what the broker actually charged.
  This is interpretable only if the model's sl+c assumptions match Saxo SIM reality.

  FLAT-TO-FLAT RECONCILIATION RECOMMENDATION
  ────────────────────────────────────────────
  Primary method (all cycles, including open): track
    R_adj = R(t) - u(t)*(sl - hs)
  i.e. remove the known open-position spread basis each cycle using the live
  half-spread from the same quote fetch. R_adj should hover near zero + model
  error; a TREND in R_adj across cycles is genuine divergence.

  Flat-to-flat as corroborating check: on zero-exposure (flat) cycles the open
  basis vanishes and the realized residual ≈ u*(2sl+c) per completed trade is the
  pure cost-model error. This is the cleanest, lowest-noise signal to cross-check
  the per-cycle R_adj tracking. Use both — flat-to-flat corroborates, per-cycle
  R_adj gives coverage across the full holding period. The observe-only canary
  generates no fills and therefore produces NO flat-to-flat signal; this
  calibration requires the full paper loop (or probe_saxo_marking.py).

# ─────────────────────────────────────────────────────────────────────────────
# FILL MODEL FOR OBSERVE LOOP
# ─────────────────────────────────────────────────────────────────────────────
fill-model-for-observe-loop: |
  OBSERVE-ONLY CANARY: no fills are actually placed. The modeled-equity ledger
  (ModeledEquityLedger in cost_reconciliation.py) computes a purely notional
  running P&L with held_units_nom=0 (size_multiplier=0.0 per CRO). There is
  therefore no real fill to model. However, for calibration to be MEANINGFUL
  once the loop graduates to a non-zero sizing path, the fill model embedded in
  the cost model must follow these conventions:

  BID/ASK, NOT MID (non-negotiable for any future sizing)
  ─────────────────────────────────────────────────────────
  Entry fills: use Ask (buying EUR buys at ask, not mid).
  Exit fills:  use Bid for longs, Ask for shorts (close at the far side).
  Mid is used ONLY for unrealised P&L marking within a cycle (model convention),
  with the documented open-position basis R_open = u*(sl-hs) expected and tracked.
  The broker's TotalValue uses close-out (bid/ask) marking — the reconciliation
  residual is the mechanism that surfaces the spread basis, not the fill model.

  ORDER TYPES — OBSERVE-ONLY CANARY CONTEXT
  ───────────────────────────────────────────
  The momentum strategy is a trend-following daily signal (long or flat from
  the research spec). Fills at execution are assumed to be immediate-or-cancel
  market orders at the opening ask of the following day's session (or first tick
  after signal bar closes, consistent with the backtest's entry_delay_bars=1
  convention). Stop-limit and limit-on-retest fills are NOT appropriate for a
  trend-following momentum signal that intends immediate entry once the bar
  confirms — using them would introduce positive selection bias into the fill
  model (only the most favourable entries fill) that does NOT correspond to how
  the backtest is priced.

  No GTC, no limit-on-retest, no stop-entry for the momentum strategy. Any
  future intraday ORB strategy (P3) that uses breakout entries should be re-
  evaluated separately under the execution-firewall-review skill before its fill
  model is locked — breakout entries DO benefit from buy-stop (enter above the
  ORB high) to avoid premature fills, but this is out of scope for this wave.

  EUR/USD SPREAD REGIME (from market knowledge, not web lookup)
  ──────────────────────────────────────────────────────────────
  EUR/USD is the most-traded pair globally. Saxo Bank SIM spreads track realistic
  institutional spreads with a modest SIM markup. Expected regimes:

    London–NY overlap (13:00–16:00 UTC): 0.3–0.7 pip. This is peak liquidity;
    spreads compress to near institutional. Best time to execute daily-bar
    signals that require a morning open fill.

    London session (07:00–13:00 UTC): 0.5–1.0 pip. Good liquidity.
    Post-London, pre-NY (10:00–13:00 UTC): brief widening possible.

    NY session (13:00–22:00 UTC): 0.5–1.0 pip.

    Asia / Tokyo (00:00–07:00 UTC): 0.8–1.5 pip. Lowest EUR/USD liquidity.

    Rollover / Sunday open (21:30–22:30 UTC): 2–5 pip possible. This is the
    worst time to execute; spread can spike 5–10× vs normal. Daily-bar signals
    that fire at the Sunday open should use Monday's 07:00 UTC open instead.

    Scheduled news events (NFP, ECB, Fed): 3–10+ pip instantaneous widening
    during the 1-min announcement window, reverting within 2–5 min. Any backtest
    that does not model news-time spread widening understates cost by 2–5× on
    those bars.

  For the observe-only canary: the fill model in the cost model (hs=0.25pip for
  EUR/USD, i.e. full spread=0.5pip) is at the low end of the London–NY regime.
  This is acceptable as a conservative lower-bound for calibration — the probe's
  flat-to-flat residual will reveal whether Saxo SIM charges more.

expected-slippage-distribution: >
  Observe-only (zero capital, zero fills): no empirical slippage distribution
  exists yet. Qualitative estimate for EUR/USD daily-bar market orders:
  For 1k–10k unit fills in SIM, slippage should be negligible to zero (SIM
  does not model queue depth). For production market orders at 100k+ units
  (1 standard lot), intraday slippage in the London–NY overlap is typically
  0.1–0.5 pip; outside overlap or during news, 0.5–2.0 pip. The current
  config models slippage_pips=0.5 — consistent with a conservative daytime
  execution assumption. This will be empirically constrained by P3 calibration
  (30–50 observe cycles). Until then, treat 0.5pip as an untested assumption.

capacity-bound: >
  Observe-only; no capital, no fills. Capacity constraints are irrelevant for
  this wave. For reference: EUR/USD daily volume is ~$1T; a 100k-unit (1 lot)
  position is ~$100k notional and has zero observable market impact. Even at
  10-lot scale ($1M), EUR/USD is effectively capacity-unconstrained for a
  paper-loop canary. Capacity becomes a concern only for very large institutional
  sizing or pairs with <$1B daily volume.

