fastest-time-to-first-bar: >
  Absolute minimum (everything in parallel, operator moves immediately):
    P1 + P4 engineering work: ~2h (parallel)
    Token provisioning: ~0-2h if operator has Saxo developer portal access and
    acts immediately
    STEP 4 (commit+push): 15min after P1+P4 close
    STEP 5 (first run): 5min to launch; then must wait for a new CLOSED bar.
      Daily timeframe: up to 24h for the next closed bar (if run mid-bar).
      4h timeframe: up to 4h for the next closed bar.
      1h timeframe: up to 1h for the next closed bar.

  Fastest realistic estimate: 3-5h from NOW if:
    (a) operator provisions token immediately (fastest path: log into Saxo
        developer portal, create a SIM application, generate access token —
        ~30min for first-time setup, ~5min for repeat issuance)
    (b) P4 mock-sentinel-fix is implemented and pushed within 2h
    (c) canary is started on --timeframe 1h rather than daily
    (d) the 1h bar closes within 60min of launch

  Realistic estimate accounting for operator availability:
    If token is provisioned same-day: 4-8h.
    If token requires next business day: 18-32h.

  OPERATOR-TOKEN CAVEAT: This estimate is entirely dominated by the
  human-in-the-loop token step. The Saxo developer portal requires login,
  application selection or creation, and token issuance — a process that requires
  the operator's attention and portal access. This cannot be automated or
  parallelised by engineering. Every other step can be completed in advance.
  The 24h TTL also means the operator cannot issue the token speculatively and
  come back later — it must be issued within 2h of the intended run window.

