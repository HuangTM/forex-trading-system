body: |
  EXECUTION PLAN — SEQUENCED CRITICAL PATH

  The task is to produce the fastest LEGITIMATE path to a first real paper bar
  while respecting the CRO's risk taxonomy (P1+P4 blocking; P2+P3 advisory) and
  NHT's dissent (canary = plumbing smoke-test, not alpha validation).

  CRITICAL PATH ANALYSIS
  ──────────────────────
  Four preconditions were given. The CRO correctly identified P1 and P4 as
  blocking and P2/P3 as advisory. My sequencing is:

  P1 and P4 are fully parallelisable with each other AND with token provisioning
  (STEP 3). All three can start simultaneously. P4 is on the quant-developer's
  critical path because it requires a code change + test run; this takes ~2h.
  P1 is on the operator's critical path for the git-ref cleanup; it can be done
  in parallel and takes ~30min.

  STEP 3 (token) is the wall-clock bottleneck because it requires a human
  interacting with an external portal (Saxo developer portal). The portal is
  outside firm control. If the operator has portal access and acts immediately,
  this is 15-30min. If they need to locate credentials or wait for next business
  day, this is 18-32h.

  The FIRST REAL PAPER BAR cannot start until all three (P1, P4, token) are
  ready. There is no engineering path to bypass the token dependency.

  P3 is circular as a gate: it is the OUTPUT of the observe loop, not an input.
  Gating the loop on its own calibration data would make the loop impossible to
  start. The CRO correctly classified this as advisory (for the loop start) and
  blocking (for reconciliation_enforce:true and any "paper-launch" claim).

  P2 is advisory at zero capital. It can be run concurrently with or immediately
  after the first real bar (the token required for P2 is the same one used to
  start the loop). It should not be serialised before STEP 5.

  FILL MODEL RATIONALE
  ────────────────────
  Even at zero capital, the fill model conventions matter for calibration
  validity. The observe loop does not model fills (held_units_nom=0), but the
  underlying cost model's assumptions (hs, sl, c) will be calibrated against the
  residual once real fills happen in a future non-zero-sizing wave. The
  conventions I specify (bid/ask not mid; market orders at next-bar open; no
  limit-on-retest for a trend-following daily signal) must be consistent with
  how the backtest priced its fills, or the reconciliation residual will carry
  a permanent backtest-vs-live methodology basis that is not a cost error.

  The current config (hs=0.25pip, sl=0.5pip) is at the conservative end of the
  London-NY spread regime for EUR/USD. The flat-to-flat probe will reveal whether
  the Saxo SIM spread is wider — if it is, tol_abs will need to be raised and
  the config's hs recalibrated upward.

  SAXO MARKING
  ────────────
  The documentary conclusion (CurrentPriceType=Bid for long) is HIGH confidence.
  The empirical probe is gold-standard and should be run once after the first
  bar, not as a precondition to it. The residual algebra in
  docs/research/saxo_totalvalue_marking_2026-06-01.md is the corrected version
  (adversarial-reviewed 2026-06-01): R_open = +u*(sl-hs) = +u*0.25pip for
  EUR/USD, converging to u*(2sl+c) = u*1.5pip per trade at close. This means
  the cost-reconciliation alarm will see a POSITIVE residual (broker above
  model) while open, which is the EXPECTED direction — not a false alarm if
  correctly computed as R_adj.

  NHT DISSENT — ACKNOWLEDGED
  ────────────────────────────
  The NHT's dissent is structurally correct and is preserved here. The observe
  canary is a plumbing smoke-test. It does not validate the momentum signal,
  does not advance N off 35, and does not satisfy the kill-criterion's insight
  conjunct. This plan explicitly treats it as such. The "first real paper bar"
  milestone is a plumbing milestone, not an alpha milestone. Any subsequent
  communication that presents it as evidence of edge would be a policy violation.

  ROUTING DECISION
  ─────────────────
  Decision: route-with-reduced-size (size_multiplier=0.0, observe-only).
  This is the only risk-correct routing for an unvalidated observe canary.
  The routing-disabled architectural guard (ReadOnlySaxoClient wrapping the
  SaxoClient) is confirmed in the code. The observe loop CANNOT route orders
  even if size_multiplier were changed — the structural guard will raise
  AttributeError on any mutating call.

  ROUTE_TO: quant-developer — P4 mock-sentinel-fix implementation.
    Specific task: patch is_mock_cycle to accept an explicit is_sim flag
    (sourced from canary env or SaxoClient.is_live) as PRIMARY discriminator;
    retain float==100000.0 as defence-in-depth secondary; add run_mode or
    account_id to the JSONL record schema so every real-fill cycle is
    unambiguously tagged.

