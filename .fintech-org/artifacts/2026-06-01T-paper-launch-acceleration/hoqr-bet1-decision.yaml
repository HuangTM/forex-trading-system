body: |
  ## 1. Does momentum-T3 fire? Verdict.

  YES — momentum-T3 (DSR < 0.50) FIRES. The corrected deflated Sharpe is 0.12963
  under bar-count T=519, and identically 0.12963 under T_eff=519 (the binding T_eff
  ruling coincides with bar-count here because lag-1 autocorrelation is 0.0253 < 0.05,
  so no shrinkage applies). 0.12963 is far below the 0.50 gate. This DSR is computed
  at honest-N=10 — the MOST generous admissible N; at N=24 (n_trials_at_spawn) or N=35
  (org count) it would only be lower. The gate fails under the most charitable
  assumption available.

  Verdict: **RETIRE — Bet#1 is FALSIFIED.** The pre-registration's rule is explicit:
  "FALSIFIED if ANY of the following triggers fire." Exactly one firing (T3) is
  dispositive. The fact that T1 (raw Sharpe), T2 (drawdown), and T4 (sample size) all
  pass does not rescue it.

  ## 2. Raw-Sharpe-clears-floor vs deflated-Sharpe-fails: what it means.

  The trial clears T1 (raw OOS Sharpe 0.31406 > 0.30 floor) but fails T3 (DSR 0.12963
  < 0.50). This is the textbook signature of a NON-discovery dressed up as one. Raw
  Sharpe says "this looks slightly positive in-sample-of-the-OOS-window." Deflated
  Sharpe asks the only question that matters: "given how many hypotheses the firm has
  tested, what is the probability this 0.31 Sharpe is real rather than the best-looking
  draw from noise?" The answer — DSR 0.13 — is "almost certainly noise." A raw Sharpe
  of 0.31 on a 519-bar window with honest-N=10 prior tests is exactly what you expect
  to see by luck. The 0.30 floor is a necessary-but-not-sufficient screen; the 0.50
  DSR gate is the binding test of whether an edge survives multiple-testing deflation.
  It does not.

  Plainly: this is NOT validated alpha. The original "passed" verdict was an artifact
  of the F-001 degenerate-units DSR bug (old DSR 0.99999986, which saturated near 1.0
  because annualized Sharpe was not converted to per-observation scale before computing
  the z-statistic). Once that bug is fixed, the trial fails.

  Does the firm now have ANY validated OOS survivor? **NO.** 87fa1d23 was the firm's
  only oos=true trial (verified: grep returns exactly one of 35). With it retired, the
  validated-OOS-survivor count is ZERO. This is consistent with — and now confirms — the
  ratified 2026-05-31 honest-system-review finding of zero validated OOS alpha. The
  earlier "VALIDATED/PASSES" memories for vol_target_carry and Bet#1 are both retracted:
  vol_target_carry by the 05-31/06-01 audit, and Bet#1 by this decision.

  ## 3. Consequence for the 2026-07-01 auto-retire trigger and the mandate.

  The 2026-07-01 trigger is RESOLVED EARLY. Its WIND-DOWN condition (a) was: Bet#1
  "regenerated-and-FAILS the corrected DSR/effective-N gate." That has now happened —
  faithfully regenerated (zero-delta reproduction) and failed the corrected gate. The
  CONTINUE trigger required Bet#1 to PASS the corrected DSR/effective-N gate; it does
  not. So condition (a) of the structural-wind-down test is met today rather than at
  the deadline. The trigger no longer needs to wait for 2026-07-01 to fire on the Bet#1
  leg.

  Important scope note: this resolves ONLY the Bet#1 leg. The full structural-wind-down
  recommendation is conjunctive — it also requires (b) R5 permutation/Reality-Check on
  real carry returning p>=0.05 AND (c) the falsification log still <20 entries with 0
  STRONG OOS rejections. Those two legs are NOT yet adjudicated. So: Bet#1 is dead, the
  firm has zero validated OOS survivors, but the formal active-research-mandate wind-down
  is NOT yet triggered in full — it awaits the R5 real-carry result and the falsification-
  machinery threshold. The honest framing: the cheapest, fastest leg of the kill-test has
  now returned a clean NO. Research capacity should redirect to the R5 real-carry leg
  (the next dominant question), not to resurrecting momentum.

  Kill-criterion status: the kill-criterion remains TRIPPED (no paper P&L curve, <20
  falsification entries, 0 STRONG OOS rejections). This decision does not un-trip it;
  it removes the last candidate that might have.

  ## 4. Falsification-archive entry and residual caveats.

  The archive entry is recorded in `falsification-archive-entry` above. It states the
  hypothesis as falsified, pins the exact numbers, identifies the F-001 bug as the cause
  of the prior false PASS, and sets the bar for any future resurrection (NEW pre-reg +
  NEW OOS window + a deflation-surviving prior argument — never a bare raw-Sharpe pass).

  Residual caveats, stated honestly:
  - SYNTHETIC DATA: the entire test ran on Phase-0 synthetic data. This retirement is
    valid on the firm's current harness, but no verdict here — including "carry
    dominates, momentum does not" — is real-data-confirmed. A real-data re-test could
    differ; the burden to mount one is on a new pre-registration.
  - RAW-SHARPE NUANCE: the trial DID clear the 0.30 floor. Anyone re-reading the registry
    must not mistake the T1 pass for evidence of edge. The archive entry foregrounds this
    so the trial is not silently resurrected on "but its Sharpe was positive."
  - The trial is RETAINED IN THE REGISTRY as a falsified entry (status flips passed →
    falsified); it is not deleted. Org trial count stays 35; no new trial registered.
