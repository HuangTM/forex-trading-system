body: |
  Direct answers.

  (1) IS THE CANARY THE RIGHT NEXT USE OF RESEARCH CAPACITY? No — not of RESEARCH
  capacity. The observe-only canary has zero expected-alpha-per-unit-research-cost
  by construction: no edge claim, no sizing, no P&L optimization. It is a plumbing
  test and belongs to OPERATIONS/EXECUTION, funded from operational capacity. Scarce
  research capacity should go, in order: (1) regenerate Bet#1 87fa1d23 equity and
  re-adjudicate under the FIXED DSR gate — it is the ONLY oos=true trial in the
  whole 35-trial registry and its parquet is genuinely missing (verified: zero files
  match), so it auto-retires 2026-07-01 and is the single cheapest YES/NO on whether
  ANY validated edge exists; (2) run R5 permutation/Reality-Check on REAL carry data
  to bound false-discovery across the carry program at the class level; (3) fix the
  carry USDJPY data-quality outlier bug, which is upstream of both. New-alpha
  production ranks LAST — adding trials before re-adjudicating the existing 35 just
  manufactures more multiple-comparisons debt of exactly the kind the audit retracted.
  Approve the canary, but with a CAPACITY LIMIT: it must not preempt researcher
  attention on items 1–3.

  (2) HONEST MINIMUM BEFORE A CANARY P&L CURVE IS INTERPRETABLE AS EVIDENCE OF
  ANYTHING: The canary tests PLUMBING, not edge, so its P&L curve is evidence ONLY
  of execution fidelity — never of alpha. For it to be interpretable even as plumbing
  evidence, ALL of: (a) PRECONDITION-1 secrets purge done (else nothing pushes/runs);
  (b) PRECONDITION-2 Saxo TotalValue marking convention empirically confirmed via the
  probe with a real SIM token, CRO sign-off on the reconciliation baseline — without
  this, every reconciliation number is uninterpretable; (c) PRECONDITION-3
  mock-sentinel (float==100000.0) disambiguation resolved so real 1,000,000-notional
  fills are distinguishable from test mocks WITHOUT manual filtering; (d) PRECONDITION-4
  >=30 real-fill pure-observe cycles completed and reconciliation tolerances replaced
  from placeholders (500.0 / 0.005) with empirically measured values, CRO-approved.
  And one item the PM list under-weights: the FALSIFICATION MACHINERY must be shown to
  WORK — >=20 log entries with >=1 STRONG OOS rejection — before any pass/fail it
  emits is trustworthy. Absent these, a green curve means "the pipe is connected,"
  nothing more. It is NOT evidence the strategy works, NOT evidence the firm has alpha,
  NOT a basis to size capital.

  (3) CONTINUATION/RETIREMENT STANCE GIVEN TRIPPED KILL-CRITERION: Do not relitigate
  the trip — decide forward. The honest stance is a TIME-BOXED last look, not open-ended
  continuation. Machine-checkable: by 2026-07-01, if Bet#1 fails to regenerate OR fails
  the corrected DSR/effective-N gate, AND R5 on real carry returns p>=0.05, AND the
  falsification log is still <20 entries with 0 STRONG rejections, then zero validated
  alpha is STRUCTURAL — recommend formal wind-down of the active-research mandate to a
  monitoring footing. Conversely, a single clean pass (Bet#1 survives corrected gate,
  or R5 p<0.05 on a pre-registered hypothesis) flips to CONTINUE and justifies
  unfreezing N for confirmatory-only trials. The canary may run purely to set
  tolerances, gated so trial_count stays ==35 and it computes no edge metric.

  (4) IS "SPEED UP TO PAPER TRADING" THE RIGHT FRAMING? No — it optimizes the wrong
  thing. From a research-capacity standpoint the bottleneck is NOT time-to-first-paper-bar;
  it is the absence of any validated edge to put behind the bar. Speeding to paper
  trading with no validated alpha accelerates spending operational and execution effort
  on a curve that, by the firm's own ratified audit, can prove nothing about alpha. The
  correct objective function is expected-validated-alpha, not latency-to-first-fill. The
  legitimate reading of "speed it up" is: close the 4 preconditions on the shortest
  critical path so the OBSERVE-ONLY canary can de-risk the live loop CHEAPLY — while
  research capacity races, in parallel, to answer the only question that matters
  (does any edge survive a correct gate?) via Bet#1 regeneration and R5. Paper speed is
  an operations KPI; alpha validation is the research KPI. Conflating them is how a firm
  ships infrastructure and calls it insight — which is precisely the failure the
  kill-criterion already flagged.

