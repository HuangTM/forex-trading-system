matched-benchmark-sharpe: "No, 0.314 raw is NOT distinguishable from a matched-random/noise benchmark once multiplicity-deflated. The DSR IS the matched-benchmark test: it answers 'what is the probability the true Sharpe exceeds 0 given that this was the best/a selected result out of N independent trials, adjusted for the non-normal return distribution (skew=0.356, excess kurtosis=1.002).' DSR=0.1296 means there is only ~13% posterior confidence the underlying edge is positive — equivalently ~87% of the apparent 0.314 is consistent with selection luck + finite-sample noise on a heavy-tailed series. A raw Sharpe of 0.314 over T=519 observations carries a standard error on Sharpe of roughly sqrt((1 + 0.5*SR^2)/T) ~ sqrt(1.05/519) ~ 0.045 on a PER-OBSERVATION basis; but the deflation benchmark (expected max Sharpe of N=10 noise trials) sits ABOVE the realized 0.314/sqrt(T) signal, which is exactly why DSR collapses below 0.5. The result is inside the noise band of a matched random benchmark."
dsr-assessment: "DSR=0.12963 at honest-N=10 is the MOST GENEROUS deflation available (fewer trials => smaller expected-max-Sharpe benchmark => less haircut). It still fails T3's 0.50 threshold by ~3.9x. Robustness to N: the verified block states N=24 (the pre-reg's actual n_trials_at_spawn, which T3 binds to) produces an EVEN LOWER DSR. So the gate fires under BOTH the generous N=10 and the pre-reg-correct N=24. The verdict is fully robust to the N choice — there is no value of N in [10, 24] that rescues the claim, because the most generous endpoint already fails by a wide margin. NOTE the governance wrinkle: T3 as written binds to N=n_trials_at_spawn=24, but DSR was reported at N=10. This does not change the outcome (N=10 is strictly more lenient and still fails), so the discrepancy is immaterial to the verdict — but it should be logged: the gate was evaluated against an easier N than the pre-reg specified, and still failed."
raw-vs-deflated: "The 0.314 -> 0.130 collapse is the whole story. Raw Sharpe 0.314 clears the T1 floor (0.30) by a trivial 0.014 margin — a margin smaller than one standard error of the Sharpe estimate (~0.045). That alone makes T1 a coin-flip pass, not a signal. The Deflated Sharpe then accounts for the two things the raw Sharpe ignores: (1) MULTIPLICITY — this trial was selected from a family of N trials, so the relevant null is the expected MAXIMUM Sharpe under noise, not zero; (2) HIGHER MOMENTS — positive skew (0.356) and fat tails (excess kurtosis 1.002) inflate the apparent Sharpe relative to a Gaussian, and the DSR penalizes this. Deflation maps the 0.314 to a confidence-that-edge-is-real of only 12.96%. A 'validated OOS survivor' should clear DSR>=0.50 (better-than-even odds the edge is real); this clears 0.13. The barely-passing T1 and the decisively-failing T3 are not in tension — they are the SAME observation viewed before vs after correcting for selection and non-normality. The pre-registration deliberately included T3 precisely to catch a marginal-T1 result like this one."
dissent-statement: |
  NHT DISSENT — Bet#1 (trial 87fa1d23) is NOT a validated OOS survivor; the claim is
  noise-indistinguishable and the trial is FALSIFIED by its own pre-registered gates.

  Pre-registered gate T3 (Deflated Sharpe < 0.50 => FALSIFY) FIRES: DSR = 0.12963,
  failing the 0.50 threshold by a factor of ~3.9x. This holds at the most-generous
  honest-N=10 AND at the pre-reg-binding n_trials_at_spawn=24 (which yields an even
  lower DSR). The T3 gate firing is decisive and triggers the pre-registered FALSIFY
  verdict regardless of the other three gates.

  The raw OOS Sharpe of 0.31406 clears the T1 floor of 0.30 by only 0.014 — a margin
  smaller than one standard error of the Sharpe estimate (~0.045 per-obs on T=519).
  Once multiplicity (selection from N trials => compare against expected-max under
  noise) and higher-moment deflation (skew 0.356, excess kurtosis 1.002) are applied,
  that apparent edge collapses to a 12.96% confidence that the true Sharpe exceeds
  zero. ~87% of the realized 0.314 is consistent with selection luck plus finite-sample
  noise on a heavy-tailed return series.

  The prior recorded DSR of 0.99999986 that earlier supported a PASS was a degenerate
  units bug (annualized-Sharpe numerator over a per-observation standard error). That
  bug is fixed; the corrected DSR fails the gate. Any earlier "Bet#1 PASSES" or
  "VALIDATED" memory rests on the broken metric and is HEREBY SUPERSEDED.

  A pre-registered falsification trial that trips its own kill-criterion is a SUCCESSFUL
  experiment with a NEGATIVE result, not a survivor. The correct action is to mark
  momentum/Bet#1 REJECTED on this universe and to deploy NO CAPITAL — paper or live —
  on the basis of this trial. Treating a falsified trial as validated alpha would be
  exactly the multiplicity-driven false-positive the pre-registration was built to
  prevent.

  Governance note (non-blocking): T3 as written binds to N=n_trials_at_spawn=24, but
  the reported DSR used N=10. The outcome is unchanged because N=10 is strictly more
  lenient and still fails — but the gate should be re-evaluated and logged at the
  pre-reg-specified N=24 for audit fidelity.
