body: |
  STRUCTURAL NULL POSTURE: I assume Bet#1 is noise and attempt to reject that
  assumption. The pre-registered gates are the agreed rejection rules; I apply them
  mechanically and then interpret what survives.

  GATE-BY-GATE (pre-reg uses "FALSIFIED if ANY trigger fires"):
    T1 (OOS Sharpe<0.30): Sharpe=0.31406 > 0.30 -> does-not-fire. Margin = +0.014,
        which is < one Sharpe standard error (~0.045). A coin-flip pass.
    T2 (maxDD>25%): 0.15425 < 0.25 -> does-not-fire.
    T3 (DSR<0.50): DSR=0.12963 < 0.50 -> FIRES. Fails by ~3.9x.
    T4 (n_trades<30 OR n_oos_bars<252): 126>=30 and 519>=252 -> does-not-fire.
  One gate (T3) fires. Under the pre-reg's "ANY" logic, the trial is FALSIFIED.

  WHY T1-PASS AND T3-FAIL ARE CONSISTENT (not a contradiction):
  T1 and T3 measure the SAME data through different lenses. T1 asks "is the point
  estimate above an arbitrary floor?" — and 0.314 barely is. T3 asks "after accounting
  for (a) the fact this trial was selected from a family of N trials, and (b) the
  non-normal shape of the returns, what is the probability the true Sharpe is positive?"
  The answer is 12.96%. The deflation does two things to the raw 0.314:
    (a) MULTIPLICITY: the null is no longer "Sharpe=0" but "Sharpe = expected MAXIMUM
        of N noise trials." With N>=10 candidate hypotheses, the best-of-N noise
        Sharpe benchmark sits near/above 0.314/sqrt(T) effective signal, so the
        z-score against the correct null is small.
    (b) HIGHER MOMENTS: positive skew (0.356) + fat tails (excess kurtosis 1.002)
        inflate raw Sharpe vs Gaussian; the corrected DSR formula penalizes both.
  Result: the apparent edge dissolves into the noise band of a matched-random
  benchmark. The pre-registration ANTICIPATED this exact failure mode — T3 exists
  specifically to catch a marginal-T1 pass driven by selection + shape.

  ROBUSTNESS TO N: DSR was computed at honest-N=10, the MOST GENEROUS choice (fewer
  trials -> smaller expected-max benchmark -> less haircut). It still fails 0.50 by
  ~3.9x. The pre-reg's T3 actually binds to n_trials_at_spawn=24, under which DSR is
  even LOWER (more deflation). Therefore the verdict is robust across the entire
  plausible N range [10, 24]: the lenient endpoint already fails decisively, and the
  binding endpoint fails harder. No N choice rescues the claim. (Governance flag: gate
  evaluated at N=10 vs pre-reg-specified N=24; immaterial to outcome, but should be
  logged.)

  AUTOCORRELATION CHECK: rho=0.0253 < 0.05 => T_eff = T = 519, no shrinkage. This is
  conservative toward the claim: real autocorrelation would shrink T_eff and lower DSR
  further. So the 0.12963 figure is, if anything, an upper bound on the DSR.

  THE OLD 0.99999986: a degenerate units bug (annualized numerator / per-obs SE).
  Any prior "PASSES/VALIDATED" record for Bet#1 that cited a near-1.0 DSR is built on
  that bug and is superseded by this adjudication.

  VERDICT: noise-indistinguishable. The pre-registered T3 kill-criterion fires; the
  trial is FALSIFIED by its own locked rules. A falsified pre-registered trial is a
  successful experiment with a negative result — it is NOT a validated OOS survivor,
  and it warrants NO capital deployment (paper or live). Calling it "validated alpha"
  would institutionalize the precise multiplicity false-positive the pre-registration
  was constructed to block.
