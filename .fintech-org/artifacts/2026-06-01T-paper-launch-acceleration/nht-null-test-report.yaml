body: |
  DECOMPOSITION. The claim is a conjunction of two falsifiable sub-claims; I tested each by trying to
  prove it false against the org evidence base (structural-skeptic mandate).

  SUB-CLAIM (a) — canary is correct next action. The canary's own spec defeats it: no orders, zero
  capital, modeled ledger, no edge metric. It cannot move N off 35 and cannot add a falsification-log
  entry. The firm's pre-declared kill-criterion is a two-part AND that is currently fully tripped:
  (1) no paper P&L curve, (2) falsification log under 20 entries with 0 STRONG-OOS rejections. The
  canary satisfies NEITHER conjunct. Worse, it IS an infrastructure artifact, so shipping it now is a
  direct instance of the behavior the criterion penalizes ("producing infrastructure not insight").
  What the canary CAN count as: a plumbing smoke-test of live ingestion + modeled marking. What it
  CANNOT count as: evidence of edge, an OOS test, a falsification entry, progress on N, or progress
  toward validated alpha.

  SUB-CLAIM (b) — delay = slowness, not absence of edge. Inverted test: what evidence would exist if a
  deployable edge were present and only execution were lagging? At minimum, one verifiable OOS trial
  clearing a correct-units gate. The data shows the opposite: exactly one OOS trial, its DSR a confirmed
  units artifact, its equity series MISSING (new_dsr null, blocked-no-equity-series). An unverifiable
  single candidate is the fingerprint of absent confirmed edge. Sub-claim (b) is contradicted.

  MINIMUM FALSIFICATION-LOG STATE before canary evidence is interpretable as progress toward validated
  alpha: >=20 falsification-log entries AND >=1 STRONG out-of-sample rejection (clearing the insight
  conjunct), plus restoration of at least the momentum-EURUSD equity series and a corrected,
  deflated, tail-aware DSR at/above gate. Current state: <=12 entries, 0 STRONG-OOS, candidate DSR
  uncomputable. The precondition is not met.

  MATERIAL FINDING surfaced early (face-problems-early): the recompute file contradicts the packet's
  "~0.02-0.27 sub-gate" framing — the recomputable survivors are carry trials at 0.85/0.94 (non-Gaussian),
  not momentum, and the momentum candidate is null. This does not rescue the claim (momentum edge still
  unverifiable) but the firm should correct the framing before any consensus relies on it.

  VERDICT: dissent. Both sub-claims fail. The correct next action is to restore the momentum-EURUSD
  equity series, recompute its DSR under correct units, and grow the falsification log toward 20 with a
  real STRONG-OOS rejection — NOT to start a no-edge canary that deepens the tripped kill-criterion.

