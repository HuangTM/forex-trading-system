body: |
  DELIVERABLE TYPE JUSTIFICATION: spec-completion.
  The firm has a partially specified path to paper trading (the observe-only canary) with 4 preconditions
  enumerated but no sequenced critical path, no named owners, and no role-level sign-offs. This wave
  completes that specification so it can be handed to operators and agents as an executable plan.
  A "risk-assessment" would be too narrow (the CRO deliverable is one input, not the whole); an "audit"
  would re-examine the past (already done 2026-05-31); "architecture-review" and "postmortem" do not fit.

  HONEST REFRAME OF THE CEO'S REQUEST:
  The CEO's framing — "we haven't started paper trading, speed it up" — contains a false premise:
  the firm does not have a validated strategy waiting to be deployed. The firm's own ratified audit
  (2026-05-31, CEO-accepted) found zero validated OOS alpha and a tripped kill-criterion (infrastructure,
  not insight). The bottleneck is not PM coordination speed; it is the absence of validated alpha plus
  four unresolved operational preconditions that gate even the minimal observe-only canary.
  "Speed it up" legitimately means: (1) close the 4 preconditions on the shortest possible critical path,
  (2) get the right role-deliverables in parallel, and (3) emit the first real paper bar from an
  OBSERVE-ONLY canary — not from a strategy with an edge claim.

  WHAT "FASTEST HONEST PATH" MEANS:
  The fastest honest path to a paper-traded P&L curve is: complete the 4 preconditions (secrets purge →
  Saxo marking confirmation → mock-sentinel fix → >=30-cycle calibration), run the observe-only canary,
  and THEN — after the canary's reconciliation tolerances are empirically set — evaluate whether the
  resulting P&L curve is interpretable enough to re-open the alpha-validation track. Nothing before
  that first step (secrets purge) can begin paper fills; nothing before the calibration step (>=30 cycles)
  produces an interpretable P&L curve. These steps cannot be compressed or parallelized past their
  dependency constraints.

  WHAT IS EXPLICITLY NOT COMPRESSIBLE:
  The alpha-validation gate cannot be skipped or shortcut. Deploying momentum-EURUSD as if it were a
  validated edge (rather than a read-only canary) would violate the firm's own ratified audit findings
  and constitute deploying unvalidated alpha — forbidden by hard-constraint. The NHT role exists
  precisely to preserve this constraint against schedule pressure.

