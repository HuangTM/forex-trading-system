body: |
  ## Regeneration

  Trial 87fa1d23 (momentum/EURUSD,USDJPY,GBPUSD, OOS 2022-01-01..2023-12-31) was
  reproduced FAITHFULLY. The missing equity file was caused by the original
  run_falsification_trial.py at git commit 717b0d9 not writing equity parquets — that
  feature was added later in run_trial.py but was never backfilled to the falsification
  entry-point.

  Critical discovery: the trial ran on ALL THREE Phase-2 pairs (not EURUSD-only).
  The "EURUSD," in the registry entry is an artifact of the markdown **Pair:** line
  regex stopping at the first whitespace token. The sidecar declares pair=all, which
  resolves to (EURUSD, USDJPY, GBPUSD). Aggregate metrics (mean Sharpe across pairs,
  sum n_trades, worst max_dd) reproduce exactly:
    - Sharpe: 0.31406425289253254 (delta=0 vs recorded)
    - n_trades: 126 = 43+30+53 (exact)
    - max_dd: 0.15425023750104697 (delta=0 vs recorded)

  The equity file was constructed as an equal-weight portfolio (mean of the 3 per-pair
  equity curves, each starting at 100,000). Schema: {timestamp, equity, signal}
  with 520 rows (2022-01-03..2023-12-29).

  ## DSR Results

  Bar-count DSR:
    T=519 (returns from 520-bar equity), skew=0.3565, excess_kurt=1.0023
    n_honest=10, Sharpe=0.3141
    DSR = 0.1296 (BELOW 0.50 threshold)

  T_eff DSR:
    rho_lag1=0.0253, |rho|<0.05 → T_eff=T=519 (no autocorrelation shrinkage)
    DSR = 0.1296 (identical to bar-count; BELOW 0.50 threshold)

  The old degenerate DSR (0.9999998614) was a units bug in compute_dsr() where the
  annualized Sharpe was not converted to per-observation scale before computing z.
  The corrected DSR (0.1296) reflects the true modest edge of this strategy at n_honest=10.

  ## Registry Integrity

  No new trial entry was written. The equity file was constructed from a direct Python
  computation replicating the _run_single_pair pipeline, not via the trial harness.
  trials.jsonl remains at exactly 35 lines.

  ## Follow-up Required (NOT productionized here)

  Productionizing the T_eff branch into dsr_recompute.py requires Principal-Reviewer
  sign-off (Principal-Reviewer change). Flagged for next HoQR/NHT wave.

