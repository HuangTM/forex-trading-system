  - "Capacity priority 1: STEP 1 contamination audit (grep processed_synthetic_phase0 across scripts/results) — cheap, and it retroactively validates or voids every prior carry claim regardless of R5."
  - "Capacity priority 2: monthly-frequency re-statement of carry returns (align test to the true monthly signal cadence) before any permutation, so R5 is not run at a fake daily resolution."
  - "Do NOT open new trials (N frozen at 35) and do NOT design new carry variants — the question is whether the EXISTING family is real, not whether a 7th variant can be conjured."

