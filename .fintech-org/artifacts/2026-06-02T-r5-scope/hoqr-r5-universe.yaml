confidence: medium
body: |
  CARRY UNIVERSE. The class-level test must control over all 6 carry files x 6 JPY crosses. I include
  every variant: dropping a sibling from a family-wise test is exactly the silent-exclusion failure
  FWER control exists to prevent. But the honest framing is that these 6 are re-parameterizations and
  ablations of ONE carry idea (signal ~ rate differential), not 6 independent bets: fred_carry_stripped
  is carry_fred minus filters; vol_target_carry_no_vol_scaling is vol_target_carry minus scaling;
  carry_momentum is carry plus an overlay. They share the rate feed and overlap in price returns, so
  they are strongly positively correlated. The multiplicity UNIT is 6, but the EFFECTIVE number of
  independent tests is ~1-2. This is the precise reason a joint WRC/SPA over the max statistic is the
  right instrument: it accounts for the correlation a Bonferroni-over-6 would mishandle.

  PROVENANCE — RESOLVED. data/processed/ is real (range-verified by reading the files, not the names).
  rate_differentials is real but monthly. The synthetic_phase0 set is corrupt in 3 pairs (USDJPY,
  GBPJPY, CADJPY) — broader than the 'USDJPY bug' label. Disposition: QUARANTINE synthetic_phase0,
  purge only after the contamination audit. The canonical R5 dataset is processed/ + rate_differentials.
  TWO checks remain genuinely open and I flag them rather than paper over: (1) a fetch manifest to
  PROVE processed/ origin (data/raw is empty), and (2) a grep-based contamination audit to enumerate
  which prior carry results touched the corrupt synthetic pairs. Until (2) is closed, no historical
  carry Sharpe is a trustworthy CONTINUE input.

  SEQUENCING + BOTTLENECK. The surprise on inspection: the R5 test math already exists in
  reality_check.py. The blocking work is not 'implement permutation' but 'surface clean per-variant
  per-pair full-history return arrays from the harness' (STEP 2), respecting the monthly carry cadence.
  STEP 1 (provenance) and STEP 2 (plumbing) parallelize; STEP 3 (pre-reg, the NEXT deliverable) is
  blocked on both; STEP 4 (run) is blocked on a frozen pre-reg. STEP 2 is the long pole.

  GO/NO-GO. p<0.05 at the CLASS level, on a pre-registered frozen hypothesis, against confirmed-real
  data, is necessary-but-not-sufficient for CONTINUE. A single surviving cell does not rescue the
  program — that is the artifact R5 is built to catch. p>=0.05 -> WIND-DOWN combined with Bet#1.

  PRIOR. Low. Most-overfit idea, monthly signal, ~36 OOS months -> marginal power and a real
  theatrical-test risk. But the residual build cost is small (math done) and a wind-down this expensive
  must rest on a frozen class-level test, not a hunch. Build the remaining plumbing, run it once, and
  pre-commit that an underpowered null reads as WIND-DOWN — not as a license to keep spending.

