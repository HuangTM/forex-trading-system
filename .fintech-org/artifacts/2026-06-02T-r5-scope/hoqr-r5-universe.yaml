carry-universe:
  variants-included:
    - carry.py                            # static differential -> signal (single-pair)
    - carry_fred.py                       # cross-sectional rank on FRED rate diffs (canonical carry)
    - fred_carry_stripped.py              # carry_fred minus filters (ablation of same idea)
    - vol_target_carry.py                 # carry_fred return stream, vol-scaled
    - vol_target_carry_no_vol_scaling.py  # vol_target_carry with scaling removed (ablation)
    - carry_momentum.py                   # carry + momentum overlay (composite of carry idea)
  pairs-included: [USDJPY, EURJPY, GBPJPY, AUDJPY, CADJPY, NZDJPY]
  multiplicity-count: 6
  exclusions-with-reason:
    - "NO variant excluded — class-level FWER control is invalid if any sibling is silently dropped. All 6 files enter the family."
    - "USDJPY pair is INCLUDED for R5 because the canonical input (data/processed/USDJPY_daily.parquet) is real (75.8-161.7). It is excluded ONLY if R5 were ever pointed at processed_synthetic_phase0/ — which is prohibited (see provenance)."
    - "Non-JPY pairs in rate_differentials.parquet (EURUSD, GBPUSD, AUDUSD, NZDUSD, USDCAD, EURGBP) are OUT of scope: the carry program is defined over the 6 JPY crosses per CLAUDE.md and the PM instrument-universe. Including them would inflate the family with pairs the program never claimed."
  multiplicity-note: >
    These are NOT 6 independent hypotheses. They are 6 re-parameterizations / ablations of ONE
    carry idea (signal proportional to rate differential), sharing the same rate_differentials
    feed and overlapping price returns. They are HIGHLY correlated. The correct multiplicity unit
    for the family is 6 strategy variants, but the EFFECTIVE number of independent tests is far
    lower (likely 1-2). This is exactly why a CLASS-level joint test (WRC/SPA over the max statistic
    across all 6) is the right instrument and a naive Bonferroni over 6 would be both wrong and
    anti-conservative in the wrong direction. The family is "best-of-6-correlated", not "6-of-6-independent".

data-provenance:
  is_processed_real: >
    yes — verified by reading the parquets, not by filename. data/processed/ holds realistic ranges
    over 2010-2026 (n~4240/pair): USDJPY 75.82-161.71, EURUSD 0.959-1.483, EURJPY 94.29-186.24,
    GBPJPY 116.97-215.60, AUDJPY 62.40-113.69, CADJPY 72.65-118.74, NZDJPY 56.63-98.82. These match
    real FX history. storage.load_ohlcv reads from data_dir/'processed'/ (storage.py path line),
    so the harness consumes the REAL set by default.
  canonical_dataset_for_r5: "data/processed/ (price) + data/rates/rate_differentials.parquet (carry signal)"
  rate_signal_provenance: >
    REAL but MONTHLY. rate_differentials.parquet is 2001-2026 (n=6540 daily, forward-filled) with
    sensible policy-rate diffs (USDJPY_diff mean 1.54%, NZDJPY_diff mean 3.51%, EURGBP_diff -0.33%).
    Sourced from data/rates/raw/{USD,EUR,GBP,JPY}.csv which are MONTHLY central-bank policy rates
    (e.g. JPY pinned 0.5% in 2000). Implication for R5: the carry SIGNAL changes only monthly; daily
    carry "alpha" is mostly the price-return leg, and effective independent observations are closer
    to monthly count (~300) than daily (~4200). This must be reflected in block length and power.
  synthetic_phase0_disposition: >
    quarantine (not purge, this wave). Move data/processed_synthetic_phase0/ out of the loader's
    reach (or rely on it never being on the storage.py path) and tag it read-only/DO-NOT-USE. Do not
    delete yet: it has historical value as the artifact that contaminated phase-0 work and may be
    needed to forensically reconstruct which past "results" used it. Purge only after the contamination
    audit (below) is closed.
  corrupted_usdjpy_implication: >
    The corruption is BROADER than reported: in processed_synthetic_phase0/ THREE pairs are corrupt,
    not one — USDJPY (close 5.03-7.75), GBPJPY (1.54-2.28), CADJPY (max 203.64). EURUSD/EURJPY/AUDJPY/
    NZDJPY there are identical to the real set. So 'the USDJPY synthetic bug' undersells it: half the
    JPY-cross universe was corrupt in the synthetic set. Contamination of prior carry results is
    PLAUSIBLE-BUT-UNCONFIRMED: the live loader (storage.py) reads from processed/ (real), so harness-run
    results are most likely clean — BUT any phase-0 script that hardcoded processed_synthetic_phase0/
    would have produced garbage USDJPY/GBPJPY/CADJPY carry returns. Until the contamination audit
    (grep for the synthetic path) is run, NO prior carry Sharpe should be trusted as a CONTINUE input.
    This is a flagged unresolved check, not a closed finding.
  unresolved_provenance_checks:
    - "Run a data-source manifest / fetch-script check: confirm processed/ was generated from a real vendor/FRED fetch, not a synthetic generator. data/raw is EMPTY, so the fetch script + its provenance log must be located to prove processed/ origin definitively."
    - "Contamination audit: grep all of scripts/, src/, and committed result parquets for 'processed_synthetic_phase0' or hardcoded synthetic paths. Enumerate exactly which historical carry 'results' (data/results/) were computed on the corrupted USDJPY/GBPJPY/CADJPY. Until done, prior carry Sharpes are provisional."
    - "Verify rate_differentials forward-fill alignment vs price index (monthly->daily) introduces no lookahead at month boundaries."

