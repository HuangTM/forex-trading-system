  range-verified; its only open item is the manifest + contamination grep.

go-no-go: >
  p<0.05 means: across the family of 6 correlated carry variants on the 6 JPY crosses, the BEST
  observed OOS Sharpe is distinguishable from the WRC/SPA null distribution (no predictive content,
  autocorrelation/window/best-of-N preserved). This is NECESSARY-BUT-NOT-SUFFICIENT for CONTINUE: it
  only counts if the hypothesis was PRE-REGISTERED and frozen before the run; post-hoc variant/pair
  selection invalidates the p-value at any magnitude. p>=0.05 means the carry program is
  indistinguishable from chance at the class level -> WIND-DOWN, combined with Bet#1 re-adjudication;
  if both fail, zero validated alpha is structural. THE PRE-REG HYPOTHESIS SHOULD ASSERT a single
  joint claim: 'max OOS annualized Sharpe over {6 variants x 6 pairs}, computed on data/processed/ +
  real rate_differentials, exceeds the WRC/SPA null at alpha=0.05.' A single isolated p<0.05 CELL does
  NOT rescue the program — that is precisely the multiple-comparisons artifact R5 exists to catch. I
  require the CLASS-level joint statistic to clear, not any individual variant/pair. If only a subset
  survives, that is AMBIGUOUS and triggers a NEW pre-reg for confirmatory-only testing of the
  survivor(s) — never a CONTINUE on the original family.

honest-prior: >
  Low expectation that R5 clears at the class level. Carry on the 6 JPY crosses 2010-2026 is the
  most-studied, most-overfit idea in the firm; the rate signal is only MONTHLY so daily 'alpha' is
  dominated by the price-return leg and effective-N is ~monthly (~180 OOS months at most, fewer per
  the 36-month holdout -> ~36 monthly obs). With a true Sharpe near the academic ~0.3-0.5 carry
  number and ~36 effective OOS observations, power to reject at the class level is marginal — this
  risks being a THEATRICAL test (NHT's concern is real: it may fail to reject even genuine signal).
  Despite the low prior, the build IS worth it BEFORE wind-down for two reasons: (1) the marginal cost
  is small — the test math already exists; only STEP 1 provenance + STEP 2 plumbing remain — so the
  ratio of decision-value to cost is high; (2) wind-down is a terminal, expensive firm decision and
  must rest on a frozen, pre-registered class-level test on confirmed-real data, not on a prior. Run
  R5 as the formal CONTINUE/WIND-DOWN pivot, but pre-commit (NHT) that an underpowered result reads
  as WIND-DOWN, not as 'inconclusive, keep spending.'

