  low-priority-oracle-parity (non-blocking, immaterial to L):
    - "reality_check.py:203 — c = 1.959963984540054 (qnorm 0.975) instead of 2.0."
    - "reality_check.py:236 — M_max = ceil(sqrt(T)) + K_N; M = min(2*m_hat, M_max)."
    - "tests/harness/test_reality_check.py — re-derive pins from corrected estimator; reserve 'R reference' label for oracle-cross-checked values; pin WN/T500 ~ 2.40."
  do-not-touch (verified correct):
    - "flat-top _flat_top window; D_SB = 2*sum()^2 factor-2; K_N = max(5, ceil(log10(T))); b_max = ceil(min(3*sqrt(T), T/3))."

r5-kill-test-impact: >
  NONE. The R5 carry kill-test can proceed with the current code OR the fixed code; the verdict is
  identical because carry returns are near-white and the block length is decision-inert in that regime
  (0/10 verdict flips even at the L=1 extreme). The m_hat fix is for estimator correctness and future
  robustness, not to unblock R5.

