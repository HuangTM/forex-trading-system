# DECISION
# =====================================================================
decision-rationale: >
  REQUIRES-CHANGE, but the required change is a ONE-TOKEN correctness fix, not a kill-test blocker.
  TASK 1: The contradiction is settled — the canonical R m_hat rule is max(1, run_start - 1). PR#1 had
  the "-1", PR#2 had the "floor at 1"; the truth AND-s them. The current code (max(1, run_start)) is
  off-by-one HIGH whenever the insignificant run starts after lag 1 (moderate/high AR), and happens to
  agree on near-white (where the floor binds). The QD fix is run_start -> run_start - 1 inside the
  existing floor (one token). Three further alignments (c=qnorm(0.975), M_max=ceil(sqrt(T))+K_N, and
  re-pinned tests) are cosmetic oracle-parity items, low priority, immaterial to L. The flat-top window,
  D_SB factor-2, K_N, and b_max are CORRECT and must not be touched.
  TASK 2: The block-length precision is IMMATERIAL to the R5 verdict at the operating point. Measured,
  not asserted: across 10 near-white seeds, L=1 vs L=3 flips 0/10 verdicts (max |dp|=0.0195); the
  production-vs-R-exact 7.7% L difference moves p by <0.0015, below the MC SE. The orchestrator's
  judgment that "precision is immaterial / stop tuning c" is CORRECT and now quantified.
  NET: implement the one-token m_hat fix for formula correctness (it protects the estimator on any
  FUTURE autocorrelated series and removes the off-by-one the PR chain flagged), but do NOT gate the
  R5 carry kill-test on it — the kill-test verdict is robust to the entire disputed block-length band.

