authority: >
  This artifact settles the Politis-White block-length formula contradiction between PR review #1
  (pr-step2a-review.yaml, "m_hat = run_start - 1") and PR re-review #2 (pr-step2a-rereview.yaml,
  "run_start - 1 is wrong -> m_hat=0 -> L=1 collapse"). Formula adjudication and the
  precision-materiality judgment belong to the Mathematician (formal-method owner), not the
  orchestrator. Both are resolved here from source-of-truth: PW2004, PPW2009, and the canonical
  R blocklength::pwsd source (Alec-Stashevsky), with a faithful Python port reproducing the R
  oracle, and a live materiality sweep against the production r5a/r5c.

# =====================================================================
# SOURCE OF TRUTH — canonical R blocklength::pwsd, fetched verbatim
# =====================================================================
canonical-source:
  url: https://raw.githubusercontent.com/Alec-Stashevsky/blocklength/master/R/pwsd.R
  verbatim-extracts:
    rho_critical: 'rho_k_critical <- c * sqrt(log10(n) / n)'
    c_default: 'if (is.null(c)) c <- stats::qnorm(0.975)   # = 1.959963984540054'
    K_N: 'if (is.null(K_N)) K_N <- max(5, ceiling(log10(n)))'
    M_max: 'if (is.null(M_max)) M_max <- ceiling(sqrt(n)) + K_N'
    b_max: 'if (is.null(b_max)) b_max <- ceiling(min(3 * sqrt(n), n / 3))'
    rle_input: 'run_lengths <- rle(abs(rho_k) < rho_k_critical)   # logical INSIGNIFICANT vector, lags 1..M_max'
    m_hat_rule: |
      if (any(run_lengths$values & run_lengths$lengths >= K_N)) {
        run_pos <- min(which(run_lengths$values & run_lengths$lengths >= K_N))
        if (run_pos == 1) {
          m_hat <- 1
        } else {
          m_hat <- sum(run_lengths$lengths[seq_len(length.out = run_pos - 1)])
        }
      }
    M_band: 'M <- ifelse(2 * m_hat > M_max, M_max, 2 * m_hat)'
    lambda: 'lambda <- function(t) (abs(t)>=0)*(abs(t)<0.5) + 2*(1-abs(t))*(abs(t)>=0.5)*(abs(t)<=1)'
    G_hat: 'G_hat <- sum(lambda(k_seq / M) * abs(k_seq) * R.k)'
    D_SB: 'D_SB_hat <- 2 * sum(lambda(k_seq / M) * R.k)^2'
    b_star: 'b_SB_star[i] <- ((2 * G_hat^2) / D_SB_hat)^(1/3) * n^(1/3)'

# =====================================================================
# TASK 1 — AUTHORITATIVE ALGORITHM (resolves the contradiction)
# =====================================================================
authoritative-algorithm:
  summary: >
    The R `implied_hypothesis` m_hat rule is RUN-LENGTH-ENCODING based. It is neither "run_start"
    (PR#1 / current code) nor a naive "run_start - 1" that floors to 0 (the interim PR#2 described).
    It is: m_hat = (total number of lags BEFORE the first qualifying K_N-insignificant run),
    with the SPECIAL CASE that when that run is the very first rle segment (i.e. the correlogram
    is insignificant from lag 1 onward, the near-white case), m_hat is set to 1, NOT 0.
    Equivalently: m_hat = max(1, run_start - 1), where run_start is the 1-indexed lag at which the
    first qualifying insignificant run begins. The "-1" and the "floor at 1" are BOTH required and
    are not in tension — they are the two arms of the R if/else.

  m_hat_rule:
    statement: "m_hat = max(1, run_start - 1), run_start = first lag of the first K_N-long insignificant run."
    derivation: >
      rle(abs(rho_k) < crit) segments lags 1..M_max into runs. run_pos = index of the first run that
      is BOTH insignificant (values==TRUE) AND has length >= K_N. If run_pos==1 the insignificant run
      starts at lag 1, so there are zero preceding lags; R returns m_hat=1 (the floor). If run_pos>1,
      m_hat = sum of the lengths of all runs preceding run_pos = number of lags before the run = (lag
      where the run starts) - 1 = run_start - 1. So m_hat = run_start - 1 with a hard floor at 1.
    PW2004-correspondence: >
      PW2004 (and PPW2009 footnote c) define m_hat as the smallest lag m such that the correlogram is
      "negligible" (below threshold) for K_N consecutive lags THEREAFTER, i.e. m_hat is the lag
      immediately BEFORE the insignificant run begins. That is exactly run_start - 1. The floor-at-1
      is the small-sample guard the R implementation adds so m_hat is never 0 (m_hat=0 -> M=0 ->
      empty spectral sum -> degenerate). Both PR#1's "run_start - 1" intuition and PR#2's
      "floor-at-1" intuition are individually correct fragments of the SAME rule; the contradiction
      arose from treating them as mutually exclusive. They are AND-ed: max(1, run_start - 1).
    contradiction-resolution: >
      PR#1 ("m_hat should be run_start - 1") is CORRECT in the generic case but INCOMPLETE: it omits
      the floor, which on near-white series (run_start=1) yields m_hat=0 and the L=1 collapse PR#2
      observed. PR#2 ("run_start - 1 is wrong -> collapse") correctly identified the collapse but
      mis-stated the fix as "m_hat = run_start floored at 1" (i.e. dropping the -1 entirely). The TRUE
      R rule keeps BOTH: subtract 1 AND floor at 1. The orchestrator's current code
      (m_hat = max(1, run_start)) implements PR#2's mis-statement, which is off-by-one HIGH whenever
      run_start > 1.

  threshold_constant_c:
    R-default: "c = qnorm(0.975) = 1.959963984540054"
    PW2004-text: "PW2004 suggests c=2 as a round-number approximation; the R package defaults to qnorm(0.975)=1.96."
    verdict: >
      The canonical R oracle uses c=1.96, NOT 2.0. c=2.0 is a defensible PW2004-text approximation but
      is a documented divergence from the named R reference the tests claim to validate against.
      MATERIALITY: negligible. The threshold only gates WHICH lags count as insignificant; for the
      autocovariance-dominated estimator the effect on L is sub-1%. Empirically (faithful port), WN/T500
      gives L=2.4016 under BOTH c=1.96 and c=2.0 (identical to 4 dp). The orchestrator was right that
      tuning c is non-productive — but for the wrong reason: c is immaterial because the m_hat rule, not
      c, drives the near-white behavior. RECOMMENDATION: set c=qnorm(0.975)=1.959963984540054 for exact
      oracle parity (one-line change, removes a spurious "we diverge from R" flag), but this is
      cosmetic, not correctness-blocking.

  band_M:
    R-rule: "M = min(2*m_hat, M_max), M_max = ceil(sqrt(n)) + K_N"
    current-code: "M = min(2*m_hat, T-1)   [reality_check.py:236]"
    verdict: >
      The current cap (T-1) is far looser than R's (ceil(sqrt(T))+K_N). It RARELY binds for the
      corrected m_hat in the near-white/moderate-AR range, so impact is small, but it IS a divergence
      from the oracle and can matter for very persistent series. Low-priority alignment.

  b_max:
    R-rule: "b_max = ceil(min(3*sqrt(n), n/3))"
    current-code: "b_max = ceil(min(3*sqrt(T), T/3))   [reality_check.py:275]"
    verdict: CORRECT — exact match to R. No change.

  flat_top_window_and_estimator:
    current-code: "_flat_top + M=2*m_hat band + G_hat + D_SB = 2*(...)^2   [reality_check.py:238-265]"
    verdict: CORRECT — matches R lambda(), G_hat, and D_SB_hat = 2*sum()^2 verbatim. PW-1 genuinely
      closed (independently confirmed: once m_hat agrees, AR(0.5)/T500 production L=6.976 vs oracle
      7.165 — the residual is the m_hat off-by-one, not the spectral machinery). No change to the window.

  K_N:
    current-code: "K_N = max(5, ceil(log10(T)))   [reality_check.py:206]"
    verdict: CORRECT — exact match to R. PW-2 genuinely closed. No change.

