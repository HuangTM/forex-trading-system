body: |
  DERIVATION AND REASONING (steps, no handwaving).

  STEP 0 — What question is R5 actually asking now?
  The 2026-06-01 consensus elevated R5 from a single-strategy falsification ("does this signal's
  label ordering matter?") to a CLASS-level data-snooping control ("is the BEST result across the
  entire carry program distinguishable from what you'd get by searching ~36 correlated cells?").
  This reframing alone disqualifies the original feature-label-shuffle as the PRIMARY method: a
  per-strategy permutation null, repeated 36 times and min'd, IS the data-snooping it was meant to
  bound. The class question is exactly the White (2000) / Hansen (2005) problem statement: given L
  strategies and a benchmark, is sup_k E[f_k] > 0 after correcting for the search over L?

  STEP 1 — Why SPA over White RC (the core method choice).
  White RC builds its null at the "least favourable configuration" (all E[f_k]=0). When the universe
  contains many cells with E[f_k] << 0 (verified: most carry cells are near-zero/negative; the USDJPY
  sign-carry I computed is ann-Sharpe -0.158), RC still puts them in the max-statistic null with mean
  zero, which inflates the null distribution of max_k T_k and crushes power. Hansen's SPA fixes this two
  ways: (a) STUDENTIZATION — divide each mean by its bootstrap std omega_hat_k, so cells are on a common
  scale and a high-variance loser cannot dominate; (b) RECENTERING — cells whose sample mean is below a
  threshold (~ -sqrt(2 omega_hat_k^2 log log n / n)) are recentered to their LFC value and effectively
  removed from the null, so the null reflects only plausibly-good cells. Same FWER guarantee, strictly
  more power in our regime. Because both are functions of the identical stationary-bootstrap draws, we
  emit BOTH p-values for one cost: SPA primary, RC as a conservative bound. If RC and SPA disagree
  (SPA rejects, RC does not), that is the expected, documented behaviour, not a contradiction — report
  both and let the pre-registered decision rule (SPA primary) govern.

  STEP 2 — The benchmark choice (zero) is load-bearing.
  f_k = strategy_return - benchmark. If benchmark = buy-and-hold or a random-matched no-skill series,
  the test asks "does carry beat that alternative?" — a relative-skill question. R5's job is existential
  ("does carry have edge AT ALL, net of its costs?"), so benchmark = zero (flat). Critically, the swap /
  cost-of-carry leg is ALREADY inside the strategy return via RealisticCostModel, so f already nets out
  the cost of holding the carry position; an external cost-of-carry benchmark would double-subtract it.
  Net-of-cost, post-entry-delay returns are mandatory — a gross or un-shifted series inflates every T_k.

  STEP 3 — Resampling unit: JOINT vector, not per-cell.
  The 6 variants are near-collinear (carry vs carry_fred vs vol_target_carry are scalings/conditionings
  of the same rate-differential signal). If we resampled each cell independently we would (i) destroy the
  cross-cell dependence and (ii) make the family correction act as if there were 36 independent tests,
  when the effective number is far smaller. Resampling the SAME blocks across all cells in lockstep
  preserves the true cross-correlation, so the max-statistic null automatically reflects the real
  (small) effective dimensionality. This is also why no separate Bonferroni layer is needed.

  STEP 4 — Block length: the counter-intuitive empirical result.
  Naive intuition: "carry holds positions for months, so returns are highly autocorrelated, so use a
  large block." I tested this. Positions ARE persistent (~0.2 sign-flips/year). But the STRATEGY RETURN
  f_t = position_{t-1} * price_return_t is near-WHITE: ACF lag-1 = -0.003, |ACF| < 0.017 out to lag 60.
  Reason: a (near-)constant position multiplied by near-white daily price increments yields near-white
  products. The autocorrelation a temporal block bootstrap must preserve is therefore SMALL, and
  Politis-White will return a short mean block L (likely 1-20 days). The dependence that actually matters
  is cross-sectional (Step 3), not temporal. So: use the data-driven Politis-White L (max across cells),
  guard L>=1, and do NOT inflate it from the false "long-holding" intuition. (This must be re-run on the
  frozen pre-reg cells; my sign-carry proxy is illustrative, the real variants may differ modestly.)

  STEP 5 — K and p-value resolution vs power (do not conflate).
  Two different sqrt(.) errors are in play. (a) Monte-Carlo p-value SE = sqrt(p(1-p)/K) — controlled by
  K. At p=0.05, K=200 -> SE 0.0154 (decision flips on bootstrap noise); K=2000 -> SE 0.0049 (safe). So
  K=2000. (b) Statistical power — controlled by n, true Sharpe, family size — NOT by K. Raising K cannot
  rescue an underpowered test. This separation is the key thing NHT must internalize: K=2000 makes the
  p-value crisp; it does nothing for the ~20-35% class-level power against a true 0.30 ann-Sharpe.

  STEP 6 — FWER vs FDR.
  CONTINUE/WIND-DOWN is one binary firm decision; the relevant risk is P(any false CONTINUE) = FWER, and
  SPA's max-stat controls it in strong form. FDR answers a different (portfolio-sizing) question and is
  inappropriate for an existence pivot. Pooled single family of |U| cells = one p-value, one decision —
  recommended. Per-pair families would need a second Bonferroni-over-6 correction; avoid by pooling.

  STEP 7 — Honest scope of what R5 controls (snooping) and whether it can even reject (power).
  R5 controls the search over the |U| cells in THIS run only; it cannot undo the org-wide prior looks at
  these same six variants (sunk snooping). And at ~0.30 true Sharpe over 16y of daily data under a
  36-cell FWER correction, power is ~20-35% — so a non-rejection is weak evidence, not proof, of no
  alpha. Both facts go to NHT/HoQR verbatim. R5 p<0.05 on a frozen pre-reg is NECESSARY-not-sufficient
  for CONTINUE (consistent with CRIT-19); R5 p>=0.05 is "no distinguishable class-level alpha at the
  achievable power", with the power number stated.

  DECISION: implement SPA (primary) + White RC (cross-check) on the joint, net-of-cost, benchmark=zero,
  post-entry-delay per-cell return matrix; stationary bootstrap with Politis-White data-driven mean block
  length (joint, max across cells, guard L>=1); K=2000; FWER via max-statistic; single pooled family of
  ~36 cells. Math/methodology only — harness emit + resampler are QD's. ROUTE_TO: quant-developer for
  the permutation-emit + bootstrap implementation.
knowledge_gaps:
  - "Exact per-variant return construction (sizing, vol-targeting, FRED conditioning) differs across the 6 files; my ACF/Sharpe numbers use a sign-of-rate-diff proxy. The Politis-White L and per-cell variance MUST be recomputed on the actual frozen variant returns in pre-reg — direction of conclusion (short L, joint resampling, K=2000) is robust to this, magnitudes may shift."
  - "Whether the firm's OOS window is genuinely held-out from all six variants' development is unverified here (HoQR/NHT to confirm) — if not, R5 is in-sample contaminated and the p-value is not face-valid."
  - "Provenance of data/processed/ vs processed_synthetic_phase0/ and of rate_differentials.parquet is a HoQR/QD blocking prerequisite (CRIT-1..3), assumed-real here based on range checks only."
