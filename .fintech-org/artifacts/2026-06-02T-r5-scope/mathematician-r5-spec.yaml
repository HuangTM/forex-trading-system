method-choice: >
  hansen-spa (with White's Reality Check as the conservative cross-check, both computed on the
  SAME stationary-bootstrap draws). SPA is the correct class-level test because the question is
  FWER over the WHOLE carry universe (~36 cells) against a benchmark, and the universe is dominated
  by poor/irrelevant cells (most variant-pair combinations are near-zero or negative Sharpe — verified:
  a sign-of-rate-differential USDJPY carry has annualized Sharpe -0.158). White RC's least-favourable-
  configuration null loses power catastrophically exactly when many bad models are present; SPA's
  studentization + recentering removes them from the null distribution, preserving power without
  sacrificing FWER control. We report BOTH p-values: SPA as the primary decision statistic, RC as a
  conservative sanity bound. A feature-label permutation is REJECTED for the class question because it
  tests a single-strategy null, not the multiplicity-corrected universe null.
method-steelman: >
  BLOCK-PERMUTATION (feature-label shuffle, NHT's original R5): STEELMAN — it directly destroys the
  signal-to-return alignment while preserving the marginal return distribution, giving an exact
  finite-sample null for ONE strategy with no asymptotic approximation, and it is assumption-light
  (only exchangeability of the shuffled labels under H0). It is the right tool to ask "does THIS
  variant's signal carry information?" REJECTED for R5 because the 2026-06-01 consensus elevated R5
  to a CLASS-level question: shuffling labels strategy-by-strategy and taking the best p-value across
  36 cells does NOT control FWER — it is precisely the data-snooping it was meant to prevent. It also
  breaks the cross-cell dependence that makes the family correction non-trivial (the 6 variants are
  near-collinear; an independent-cell Bonferroni would be wildly conservative).
  WHITE'S REALITY CHECK (2000): STEELMAN — it is the canonical, peer-reviewed answer to exactly this
  problem (is the BEST of L strategies better than a benchmark, after accounting for the search over
  L?), it controls FWER by construction via the max-statistic null, and the stationary bootstrap
  (Politis-Romano 1994) handles the autocorrelation and cross-strategy dependence jointly without
  needing to model it. Its conservatism is a FEATURE for a WIND-DOWN decision — a false CONTINUE is
  the expensive error. REJECTED-AS-PRIMARY (kept as cross-check) only because SPA dominates it: SPA
  gives identical FWER guarantee but strictly more power when irrelevant models are present, which is
  our regime. Using RC alone risks a theatrical, underpowered test (see power-note).
  HANSEN SPA (2005): SELECTED. Studentizes each cell's mean by its bootstrap std and recenters poor
  cells out of the null (the SPA_c "consistent" recentering threshold), so the null distribution is
  not dragged toward the least-favourable configuration. Same stationary-bootstrap resampling as RC,
  so the two are computed from one set of draws at no extra cost.
null-hypothesis: >
  H0 (class-level, pre-registerable): max over all cells k in the carry universe U of the EXPECTED
  benchmark-relative performance is <= 0. Formally, let d_k = E[f_k] where f_k is the per-bar
  benchmark-relative performance series of cell k (defined in test-statistic). H0: max_{k in U} d_k <= 0
  — i.e., NO carry variant-pair cell has positive expected performance relative to the benchmark; the
  entire carry program's best apparent edge is consistent with sampling noise plus the search over
  |U|=~36 cells. H1: max_{k in U} d_k > 0 — at least one pre-registered cell has genuine positive
  expected benchmark-relative performance that survives the multiple-comparison correction. The
  universe U, the benchmark, the OOS window, and the per-cell return construction MUST be frozen in
  the pre-registration before any bootstrap draw; H0 is rejected iff the SPA p-value < alpha = 0.05.
test-statistic: >
  Per cell k, define the OOS performance series f_{k,t} = (strategy log-return of cell k at bar t)
  MINUS (benchmark log-return at bar t), where the strategy return already embeds the no-lookahead
  entry_delay_bars=1 shift and the RealisticCostModel costs (spread/slippage/commission/swap) — the
  benchmark-relative AND net-of-cost series, not gross. BENCHMARK = zero (flat / no-position): the
  decision is "does carry beat holding no position, net of its own trading and carry costs?" This is
  the correct economic null for a CONTINUE/WIND-DOWN pivot — a buy-and-hold or random-matched benchmark
  would test relative skill, not existence of alpha. (Rationale for zero: cost-of-carry is already
  inside f via the swap leg of the cost model, so subtracting an external carry benchmark would
  double-count.) Cell statistic: standardized mean T_k = sqrt(n) * mean_t(f_{k,t}) / omega_hat_k, where
  omega_hat_k is the stationary-bootstrap (HAC-consistent) std of sqrt(n)*mean(f_k). Family statistic:
  T_SPA = max_k T_k. Sharpe is the reporting metric (annualized OOS Sharpe per cell, daily returns
  *sqrt(252)) but the TEST operates on the studentized mean of f, which is monotone-equivalent to a
  benchmark-relative Sharpe and is what SPA/RC theory is stated over. Daily (not monthly) returns: 4245
  daily bars vs ~190 monthly gives far more resolution and the autocorrelation is handled by the block
  bootstrap, so there is no reason to throw away resolution by aggregating to monthly.
resampling-design:
  unit: >
    The JOINT per-bar performance VECTOR f_t = (f_{1,t}, ..., f_{|U|,t}) across all ~36 cells,
    resampled as a single multivariate time series. Resampling the joint vector (not each cell
    independently) is REQUIRED — it preserves the cross-strategy correlation (the 6 carry variants are
    near-collinear; carry vs carry_fred vs vol_target_carry differ mostly by scaling/conditioning), and
    that dependence is exactly what shrinks the effective number of independent tests and makes the
    family correction tractable. Each bootstrap replicate b resamples the SAME blocks of bars across all
    cells simultaneously, recomputes each T_k^{(b)} on the recentered (mean-subtracted, per SPA/RC)
    series, and records max_k T_k^{(b)}. The p-value = fraction of replicates with max_k T_k^{(b)} >=
    observed T_SPA.
  block-length-rule: >
    Stationary bootstrap (Politis-Romano 1994): block lengths are i.i.d. Geometric(1/L) with MEAN block
    length L, giving a stationary, circular resample robust to the choice of start point. L chosen by the
    Politis-White (2004) automatic optimal-block-length rule applied to the JOINT series (take the max L
    across the |U| cells so every cell's dependence is covered), NOT a hand-picked constant. EMPIRICAL
    GROUNDING (verified this session, must be re-confirmed in pre-reg on the frozen cells): although carry
    POSITIONS are extremely persistent (~0.2 sign-flips/year for sign-of-rate-diff USDJPY), the carry
    STRATEGY-RETURN series f is near-white (ACF lag-1 = -0.003, |ACF| < 0.017 out to lag 60) because
    persistent positions multiply near-white daily price returns. Consequence: the autocorrelation block
    bootstrap must capture is MODEST; Politis-White will likely return L in roughly the 1–20 day range.
    DO NOT default to a large block from the (false) intuition "positions are held for months therefore
    returns are highly autocorrelated" — that intuition is empirically wrong here and an oversized L
    needlessly inflates bootstrap variance. The dominant dependence to preserve is CROSS-SECTIONAL
    (between cells), handled by joint resampling, not temporal. Lower-bound guard: L >= 1; if Politis-White
    returns L<1 round to 1 (degenerates to i.i.d. case, acceptable given near-white f).
  K: >
    revised UP to K=2000 (from the aspirational K=200). Reason: at the alpha=0.05 decision boundary the
    Monte-Carlo standard error of a bootstrap p-value is sqrt(p(1-p)/K). At p=0.05, K=200 gives SE ≈
    0.0154 — a 1-sigma band of [0.035, 0.065] straddling the threshold, so the CONTINUE/WIND-DOWN decision
    could flip on bootstrap noise alone. K=2000 gives SE ≈ 0.0049 (band [0.040,0.060]); K=2000 is the
    standard floor in the Hsu-Kuan/Hansen empirical literature. This does NOT reduce below the K=200 floor
    (it raises it), so no NHT sign-off-to-reduce is triggered. Cost is linear and trivial for a one-shot
    test (no new trial, no capital). If runtime on the full joint |U|x4245 matrix is a concern, K=1000 is
    an acceptable fallback (SE≈0.0069) but K=2000 is preferred.
multiplicity-control: >
  FWER (family-wise error rate), strong control, via the max-statistic null of SPA/RC across all ~36
  cells. This is the right error concept: CONTINUE/WIND-DOWN is a single BINARY firm-level decision, so
  the cost object is "P(any false CONTINUE)", which is exactly FWER. The max-over-cells construction
  enforces it automatically — no separate Bonferroni/Holm layer is needed (and Bonferroni would be far
  too conservative given the near-collinearity of the 6 variants; the joint bootstrap captures the true,
  much-smaller effective number of independent tests). FDR (Benjamini-Hochberg) is the WRONG control
  here: FDR answers "of the cells I flag, what fraction are false?", which is a portfolio-construction
  question ("how many variants survive"), not the existence question R5 asks. POOLED vs PER-PAIR
  PRE-REGISTRATION changes the count and MUST be fixed in the pre-reg: the pooled design (single family
  of all 36 cells, one SPA p-value) is recommended for the firm-level pivot. If instead one pre-registers
  per-pair families (6 families of ~6 variants each), that is 6 separate FWER tests and a SECOND-level
  correction (Bonferroni-over-6, alpha/6 = 0.0083) is required or the family count is gamed. Recommend
  the single pooled family of |U| cells = one number, one decision.
assumptions:
  - >
    STATIONARITY of f_t over the OOS window (SPA/RC + stationary bootstrap require weak/strict
    stationarity of the benchmark-relative series). VIOLATION: structural breaks / regime shifts in the
    carry premium (e.g. BoJ regime 2010-2026, COVID, 2022 JPY collapse) make f non-stationary; the
    bootstrap then under-states variance and inflates false-CONTINUE rate. Partial mitigation: the
    block bootstrap tolerates weak dependence but NOT trending means. Pre-reg should note the window
    spans multiple JPY regimes.
  - >
    WEAK DEPENDENCE (alpha-mixing) of f_t — stationary bootstrap is consistent only for mixing series.
    VIOLATION: long-memory in volatility could leave residual dependence the chosen L does not capture.
    Empirically low risk here (f near-white, ACF<0.017) but conditional-heteroskedasticity remains.
  - >
    The studentization std omega_hat_k is consistently estimable (SPA). VIOLATION: cells with
    near-zero variance (a variant that almost never trades a pair) give an unstable T_k; such degenerate
    cells must be screened out in pre-reg or they destabilize the max.
  - >
    Cross-sectional dependence is FULLY carried by joint (same-block) resampling. VIOLATION: if any cell
    uses a different bar index / calendar than the others, the blocks misalign and cross-correlation is
    corrupted — all cells MUST be on a common, gap-aligned daily index (data-provenance prerequisite).
  - >
    NO-LOOKAHEAD already enforced in f (entry_delay_bars=1) and costs already embedded. VIOLATION:
    testing gross or un-shifted returns would inflate every T_k and the whole test. This must be asserted
    by QD at emit time (sacred test_no_lookahead must hold for every cell's series).
  - >
    EXCHANGEABILITY (only if the feature-label permutation cross-check is also run): shuffled labels are
    exchangeable under the single-strategy null. NOT assumed by the primary SPA path.
  - >
    The universe U is EXHAUSTIVE and FROZEN (all 6 variants x in-scope JPY pairs). VIOLATION: silently
    dropping a tested-but-bad variant from U after seeing results re-introduces selection bias and voids
    the FWER guarantee — the universe must be the FULL set the firm ever looked at, including losers.
data-snooping-caveat: >
  R5 controls ONLY the multiplicity SPENT WITHIN the pre-registered universe U evaluated in this single
  run. It does NOT retroactively control the org-wide trial history (N=35 trials, plus the many informal
  looks at carry across waves since 2026-04). Those prior looks are sunk snooping the bootstrap cannot
  undo — SPA corrects for searching over the |U| cells IN THIS TEST, not for the analyst having
  previously inspected, tuned, and selected these same six variants. Two honest consequences the pre-reg
  must state: (1) The strategies and their parameters were chosen with knowledge of past performance, so
  even a SPA p<0.05 is a LOWER bound on the true data-snooping-adjusted evidence — interpret a pass as
  "necessary, not sufficient" (consistent with CRIT-19). (2) The only way R5 becomes a clean prospective
  test is if U, the OOS window, and all parameters are frozen in pre-reg BEFORE the run and the OOS
  window contains data never used to develop these variants. If the OOS window overlaps the development
  window, R5 is in-sample-contaminated and its p-value is not trustworthy at face value. RECOMMEND: NHT
  and HoQR confirm the OOS window is genuinely held-out from all six variants' development.
power-note-for-nht: >
  Order-of-magnitude: BORDERLINE-FEASIBLE, leaning underpowered for the smallest true effects. A single
  cell's Sharpe estimate over n=4245 daily bars has SE(Sharpe_ann) ~ sqrt((1+0.5*S^2)/n)*sqrt(252) ~
  sqrt(252/4245) ~ 0.244 (annualized) for S~0.3, so a true ann-Sharpe of 0.30 is only ~1.2 SE from zero
  on a SINGLE test — already marginal at alpha=0.05 (single-test power ~30-40%). Under FWER control over
  ~36 correlated cells the effective threshold rises (the max-stat null shifts right), cutting power
  further: rough order-of-magnitude class-level power to detect a SINGLE true 0.30-Sharpe cell is ~20-35%.
  K=2000 is NOT the binding constraint — it controls p-value resolution, not statistical power; power is
  governed by n, the true Sharpe, and the family size. So: if real carry alpha is ~0.30 ann-Sharpe, R5
  is more likely than not to FAIL TO REJECT even when alpha is real (a Type-II / WIND-DOWN-on-real-signal
  risk). NHT should flag: a non-rejection is therefore WEAK evidence for wind-down, NOT proof of no alpha.
  Power improves materially only if (a) the true effect is larger (~0.5+ ann-Sharpe -> power ~50-70%), or
  (b) effects are concentrated and correlated so the max-stat is consistently driven by the same cell.
  This is a real, structural limitation of ~16 years of daily data — not fixable by K. Recommend NHT
  pre-commit that "R5 p>=0.05" is read as "no DISTINGUISHABLE class-level alpha at the achievable power",
  with the power number stated, rather than "carry alpha is zero".
harness-prereq: >
  BLOCKING IMPLEMENTATION GAP (out of scope for this spec): the backtest harness does NOT emit the
  per-bar benchmark-relative, net-of-cost performance series f_{k,t} aligned on a common daily index for
  each cell — per CONSENSUS_2026-05-01 R5 is aspirational precisely because "the harness does NOT emit
  permutation fields". The QD must implement: (1) emit per-cell f_{k,t} (post-entry-delay, post-cost,
  benchmark=zero) as a |U| x n_bars matrix on a gap-aligned common index; (2) the stationary-bootstrap
  resampler (geometric block lengths, mean L from Politis-White, JOINT same-block draw across cells);
  (3) compute T_k, T_SPA=max_k T_k, and BOTH SPA (recentered/studentized) and White-RC p-values over
  K=2000 draws; (4) assert no-lookahead per cell at emit time. ROUTE_TO: quant-developer for
  implementation. This spec is math/methodology only — NO code produced here.
