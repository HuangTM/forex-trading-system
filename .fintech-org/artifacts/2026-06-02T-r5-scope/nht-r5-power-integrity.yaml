body: |
  I verified the load-bearing data facts myself rather than trusting the brief: the corrupted
  USDJPY (close 5.03-7.75) and the real USDJPY (75.82-161.71) both exist as parallel files.
  This makes data integrity a precondition, not a footnote — a "confirmatory" R5 run on the
  wrong path would confirm an artifact.

  The core statistical finding: at SR~0.30 annualized over 16 years, the t-statistic of a
  SINGLE pre-specified cell is ~1.2, already sub-threshold. FWER control across ~36 cells
  pushes the bar to z~3.0. The program-level max-statistic aggregates, but JPY-cross carry
  cells share one factor, so effective independent bets ~ 2-4, not 36 — you neither pay the
  full 36-wide penalty nor get 36 independent chances to win. Net: the design is expected to
  fail to reject even if a small real edge exists. A non-rejection is therefore uninformative
  about absence of edge — the most dangerous failure mode is reading p>=0.05 as "no edge,
  wind down for the right reason" OR as a clean bill of health; it is neither.

  K=200 is independently disqualifying for an FWER-corrected 0.05 decision: the p-value is
  quantized at ~0.005 with MC-SE ~0.015 at the boundary, and the corrected critical quantile
  (effective alpha ~0.0014) is in a tail K=200 simply cannot resolve. K>=2000, ideally
  5000-10000, with the Monte-Carlo SE of every p reported.

  The snooping verdict is the deepest problem: a prospective Reality-Check controls only the
  pre-registered grid evaluated once; it cannot retroactively charge for the large prior trial
  history that selected these exact strategies. The only honest clean p comes from
  post-pre-registration forward/hold-out data or an explicit deflated-Sharpe haircut.

  Conclusion: a properly designed R5 is worth building ONLY as an honest kill test, gated on
  data integrity, with a matched-CARRY block-bootstrap null, crypto pre-registration including
  the wind-down action map, Romano-Wolf StepM, adequate K, and hold-out/forward evaluation.
  Its most probable honest outcome is a non-rejection — which the firm should treat as a
  signal to weigh wind-down, not as a defect of the test.
