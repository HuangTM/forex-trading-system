power-assessment: >-
  PER-CELL POWER IS ADEQUATE; K=200 RESOLUTION IS NOT, AND THE MULTIPLICITY MATH IS THE
  BINDING CONSTRAINT. (1) Per-cell detectability: a daily Sharpe of 0.30 over ~4000 bars
  (~16y) has a standard error on the annualized Sharpe of roughly sqrt((1+0.5*SR^2)/T_years)
  ~ sqrt(1.045/16) ~ 0.26 in annualized units. A single-cell t-stat for SR=0.30 over 16y is
  ~0.30/0.255 ~ 1.18 — that is BELOW the ~1.65 one-sided / 1.96 two-sided single-test
  threshold. So even ONE pre-specified cell at the assumed alternative is marginal-to-
  underpowered before any multiplicity correction. (Note: if "0.30 Sharpe" means PER-BAR
  daily Sharpe rather than annualized, the cell is wildly significant and the whole framing
  is wrong — this ambiguity MUST be resolved before sizing the test; I assume annualized,
  the only economically plausible reading for a carry cell.) (2) Multiplicity: controlling
  FWER across ~36 cells via a max-statistic Reality-Check / StepM null pushes the effective
  rejection threshold from ~1.96 toward ~2.7-3.0 (Bonferroni-equivalent alpha ~0.05/36 ~
  0.0014, z~3.0). Against a true per-cell t of ~1.18, the per-cell power under FWER control
  collapses to single digits. The PROGRAM-level question "is there ANY real carry edge" has
  more power than any single cell because the max-stat aggregates, but it still needs at
  least a handful of genuinely independent cells each near t~1.2 to push the max above ~3.0
  with appreciable probability — JPY-cross carry cells are HIGHLY cross-correlated (all long
  the same rate-differential factor), so the effective number of independent bets is closer
  to 2-4 than 36, which REDUCES the multiplicity penalty but ALSO means you do not get 36
  independent shots at significance — you get ~3. (3) For ~80% power at the program level you
  would need EITHER a true per-cell annualized Sharpe nearer ~0.5-0.6 over the same 16y, OR a
  materially longer / higher-frequency sample, OR genuinely independent cells. At SR=0.30 the
  honest expected outcome is a NON-rejection that is UNINFORMATIVE about absence of edge. (4)
  K=200: a bootstrap/permutation p-value is quantized in steps of 1/(K+1)~0.005 and its Monte
  Carlo standard error near the 0.05 boundary is sqrt(0.05*0.95/200)~0.0154 — i.e. +/-0.015
  on a 0.05 decision, a coin-flip's worth of noise straddling the threshold. For a
  multiplicity-corrected tail (effective alpha ~0.0014) K=200 cannot even RESOLVE the
  quantile: you need on the order of K>=2000 (ideally 5000-10000) so the corrected critical
  quantile is estimated with <~10% relative MC error. K=200 is a theatrical number for an
  FWER-controlled 0.05 decision.
theatricality-risks:
  - "Over-easy null: permuting/sign-flipping RETURNS so the benchmark is iid-zero-mean noise, when the real null must preserve FX autocorrelation, vol clustering, and the carry FACTOR -> guard: null is 'this specific timing/weighting adds nothing OVER a naive always-on carry-factor exposure', built via stationary BLOCK bootstrap (block ~ 20-60 bars) or circular block permutation, NOT iid shuffle."
  - "Permuting the wrong object so autocorrelation leaks (shuffling signals while holding the price path lets serial structure inflate the matched benchmark's tails inconsistently) -> guard: permute the OBJECT WHOSE EXCHANGEABILITY IS THE NULL — block-resample the strategy's own return stream, or randomize entry timing within blocks; pre-register exactly which array is resampled and the block length, and prove stationarity of blocks."
  - "Benchmark too weak (matched-random benchmark is random trades with no carry tilt, so any carry-flavored strategy beats it trivially) -> guard: benchmark MUST carry the same gross factor exposure (same average signed carry tilt / same turnover / same vol target). The test is incremental skill over naive carry, not 'beats random'."
  - "Post-hoc spec dressed as pre-registered: the 6 variants x 6 pairs were chosen AFTER seeing which looked good -> guard: cryptographic pre-registration (hash committed before any R5 run) of the FULL cell grid, the statistic, K, block length, alpha, and the multiplicity method; any cell not in the pre-reg is reported as exploratory and excluded from the FWER claim."
  - "Multiplicity uncontrolled / cherry-picking the winning cell: reporting the best of 36 at uncorrected 0.05 (expected ~1.8 false winners by chance) -> guard: Romano-Wolf StepM or White's Reality-Check max-statistic over the JOINT null across ALL cells; report the corrected p of the MAX, not per-cell p's; never headline the single best cell."
  - "In-sample contamination / look-ahead: signals or cost params fit on the same bars scored; entry executed on the bar the signal is observed -> guard: confirm the no-lookahead shift (entry_delay_bars) is active inside the R5 path, costs are out-of-sample-frozen, and any parameter selection is nested inside the resampling (resample THEN re-select), else the bootstrap understates variance."
  - "Wrong-data contamination: R5 silently run on processed_synthetic_phase0/ (corrupted USDJPY 5.03-7.75) -> guard: assert price-range sanity bounds at harness entry (USDJPY in [50,200]) and log the resolved data path + a content hash into the permutation output; fail closed if bounds violated."
  - "K too small to resolve the corrected quantile (p quantized at 1/(K+1), MC SE ~0.015 at the 0.05 line, far larger in the 0.0014 tail) -> guard: K>=2000 (target 5000-10000); report the Monte Carlo SE of every reported p so the reader sees whether the decision is inside the noise band."
  - "Decision-threshold gaming: alpha 0.05 chosen, but the ECONOMIC decision (CONTINUE vs WIND-DOWN) should weigh the prior odds the program is dead -> guard: pre-register the action mapping (what p triggers wind-down) and acknowledge a single non-significant program-level test cannot itself license CONTINUE."
data-snooping-verdict: >-
  R5 CONTROLS ONLY THE LOOKS IT IS PRE-REGISTERED OVER — IT CANNOT RETROACTIVELY CONTROL THE
  SPENT SELECTION. The firm has already mined these carry strategies across a LARGE prior
  trial history; those degrees of freedom were consumed before R5 exists. A prospective
  Reality-Check/StepM bounds the FWER over the cells in ITS pre-registered grid evaluated on
  the data ONCE; it does NOT, and cannot, deflate the multiplicity from every prior look,
  refit, pair-swap, and parameter nudge that shaped why these particular 6x6 cells are the
  ones being tested. Honest claim R5 CAN support: "Among this pre-registered grid, the
  joint/max evidence against the matched-carry null is [p], MC-SE [.]." Honest claim R5
  CANNOT support: "carry has a real edge" or "the program's historical Sharpe is genuine" —
  because the historical numbers were selected, and R5 on the SAME 2010-2026 data inherits
  that selection. The only way to make R5's p-value clean is to evaluate the pre-registered
  specs on data NOT used in the prior mining (true hold-out / post-pre-reg forward bars), or
  to apply a deflated-Sharpe / haircut that explicitly charges for the estimated number of
  prior trials. Without one of those, R5 is a re-test on snooped data and its p is
  optimistically biased by an unknown but large factor.
