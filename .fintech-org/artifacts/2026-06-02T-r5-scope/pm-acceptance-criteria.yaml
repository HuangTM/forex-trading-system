body: |
  This acceptance criteria frames the WAVE-1 (PM-only) scoping deliverable for R5 on real carry
  data. The task is design and framing only. No permutations are run. No harness code is written.
  No pre-registration is filed. Those are named downstream deliverables.

  WHY THIS SCOPE, WHY NOW:

  R5 is pivotal. The 2026-06-01 consensus determined that the firm has zero validated OOS
  survivors: Bet#1 was retired as falsified (corrected DSR 0.1296, per memory). The kill-criterion
  is tripped on both conjuncts. The CONTINUE/WIND-DOWN framework (CONSENSUS_2026-06-01,
  HoQR retirement criteria) is explicit: the firm CONTINUEs research ONLY IF (a) Bet#1 regenerated
  equity survives corrected DSR/effective-N gate, OR (b) R5 on real carry data returns p<0.05 on
  a pre-registered hypothesis. Without one of these, zero validated alpha is structural, not pending,
  and the recommendation is formal wind-down. R5 is therefore the pivotal test — the class-level
  answer to whether the carry program's apparent alpha is real or an artifact of running six
  correlated variants on overlapping data and counting the best result.

  THE DATA-PROVENANCE SURPRISE:

  The orchestrator confirmed a fact that materially changes the R5 scoping question: real FX price
  data EXISTS at data/processed/ (EURUSD 0.96–1.48; USDJPY 76–162 over 2010–2026 — consistent with
  real market ranges). The "everything is synthetic" prior, which has been implicit in how R5 was
  described as "never run on real data," is partly WRONG. The actual state is: two parallel processed
  data directories exist — data/processed/ (apparently real; range-verified by orchestrator) and
  data/processed_synthetic_phase0/ (confirmed to contain a corrupted USDJPY with close 5.03–7.75 —
  absurd). The roles in WAVE-2 must resolve this definitively (CRIT-1 through CRIT-3). R5 running
  on data/processed/ is legitimate IF provenance is confirmed. Running on processed_synthetic_phase0/
  is prohibited; the USDJPY file there is corrupted.

  The rate differential data (data/rates/rate_differentials.parquet, 2001–2026) adds a second
  provenance question: this is the carry SIGNAL source, not price. Its provenance (FRED vs synthetic)
  must be confirmed separately (CRIT-3). Carry strategies consuming a synthetic rate differential
  would produce a synthetic Sharpe regardless of price data quality.

  THE R5 DESIGN DECISION SPACE:

  Three methods require a scoped decision (CRIT-7): block permutation (NHT's original R5 spec
  — shuffles feature labels, tests whether signal ordering matters), White's Reality Check (WRC —
  stationary block bootstrap of returns; controls FWER across multiple models; the "White-Reality-Check"
  named in CONSENSUS_2026-06-01), and Hansen's SPA (improves WRC by removing underperforming models
  from the benchmark; more power). The carry context (6 correlated variants, overlapping pairs,
  daily autocorrelated returns) creates genuine tradeoffs that the Mathematician must resolve.
  The NHT role must evaluate whether the chosen method can actually reject H0 given available
  sample sizes — a theatrical test is worse than no test (CRIT-18).

  SEQUENCING:

  Four steps in order: (1) data-provenance confirmation + USDJPY purge decision (BLOCKING,
  parallelizable with Step 2), (2) QD permutation-emit harness implementation (BLOCKING —
  the harness currently does not emit permutation fields per CONSENSUS_2026-05-01:R5-aspirational),
  (3) pre-registration filed and frozen (NEXT deliverable from this scope wave), (4) R5 executed.
  Steps 1 and 2 are parallelizable. Steps 3 and 4 are strictly sequential after 1+2.

  WHAT A COMPLETE SCOPE LOOKS LIKE:

  The output of WAVE-2 role work is a scope package that answers every CRIT above — specifically:
  which data, which variants, which pairs, which test method, which statistic, which block length,
  which K, which null hypothesis, and what CONTINUE/WIND-DOWN means operationally. That scope
  package feeds directly into the pre-registration (NEXT deliverable) and into QD's permutation-emit
  implementation. No role in WAVE-2 may substitute one of those downstream deliverables for the
  scope document itself.

  PM DOES NOT DECIDE:

  PM coordinates and defines what a complete scope looks like. PM does not choose between WRC and SPA,
  does not select block length, does not adjudicate data provenance, and does not determine whether
  K=200 provides adequate power. Those are Mathematician and NHT decisions. PM's job is to make
  sure the scope package, when produced, answers every criterion above — no gap, no orphan item.

