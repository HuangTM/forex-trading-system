criteria:
  # DATA PROVENANCE (blocking prerequisite for all downstream scope decisions)
  - "CRIT-1: Hard answer to 'Is data/processed/ real market data?' — not a belief, a provenance check with evidence:
      price-range verification (EURUSD 0.96–1.48, USDJPY 76–162 over 2010–2026 are consistent with real markets;
      processed_synthetic_phase0/USDJPY close 5.03–7.75 is confirmed corrupted/synthetic).
      Verifying tool: read a sample of each parquet and confirm range; do NOT rely on file name alone."
  - "CRIT-2: Clear disposition on data/processed_synthetic_phase0/: purge-or-quarantine decision made and rationale recorded.
      R5 must run exclusively on data/processed/ (real) OR on a data set whose provenance is affirmatively confirmed.
      Corrupted USDJPY from the synthetic set must be excluded from any R5 input."
  - "CRIT-3: Rate differentials provenance confirmed: data/rates/rate_differentials.parquet (2001–2026) is verified
      as a real feed (FRED or equivalent), not synthetic. Carry strategies consume this directly."

  # CARRY-PROGRAM UNIVERSE (class-level test must be exhaustive and explicit)
  - "CRIT-4: Explicit enumeration of every carry variant INCLUDED in the class-level R5 test.
      Minimum list (verified from src/forex_system/strategies/): carry.py, carry_fred.py, carry_momentum.py,
      vol_target_carry.py, vol_target_carry_no_vol_scaling.py, fred_carry_stripped.py (6 files confirmed present).
      Any variant not included must have a written exclusion rationale (e.g., already-retired, OOS window incompatible)."
  - "CRIT-5: For each variant in the universe, the pairs tested under R5 are listed: the 6 JPY-cross pairs
      (AUDJPY, CADJPY, EURJPY, GBPJPY, NZDJPY, USDJPY) constitute the primary universe.
      Any pair-level exclusion (e.g., for USDJPY if data remains contaminated after CRIT-2 purge) is documented."
  - "CRIT-6: The USDJPY data-quality outlier bug (processed_synthetic_phase0/USDJPY absurd close range 5.03–7.75)
      is explicitly listed as a prerequisite gate: R5 MUST NOT run against USDJPY inputs until the bug is
      resolved and provenance confirmed. If USDJPY real-data is confirmed in data/processed/, that confirmation
      is the gate. The scope document names the responsible role (QD/data) and expected resolution path."

  # R5 TEST-DESIGN DECISION SPACE (Mathematician role)
  - "CRIT-7: Decision made between Block Permutation Test, White's Reality Check (WRC), and Hansen's Superior
      Predictive Ability (SPA) — or a justified hybrid. Each alternative is steelmanned (strongest case FOR it)
      before selection. The selection records: (a) what property of the carry data makes one method superior
      (autocorrelation structure, sample size, benchmark selection), (b) whether WRC or SPA is preferred for
      FWER vs FDR control at the CLASS level."
  - "CRIT-8: Test statistic specified: which Sharpe (OOS, annualized, which return series — daily, monthly?)
      is the observed statistic; whether a t-stat or Sharpe is preferable given fat-tailed forex returns."
  - "CRIT-9: Permutation/resampling unit specified: what IS being shuffled or resampled?
      Three candidates with tradeoffs named: (a) feature-label shuffle (NHT R5 original spec — shuffles
      carry signal labels; tests whether ordering matters), (b) stationary block bootstrap of returns
      (preserves autocorrelation structure; White's original method), (c) walk-forward block bootstrap.
      Selection rationale must cite autocorrelation structure of carry returns."
  - "CRIT-10: Block length specification: how is block length for the stationary block bootstrap chosen?
      Either (a) fixed (cite precedent and rule of thumb for daily forex) or (b) data-driven (e.g.,
      Politis-Romano automatic bandwidth selection). The choice must be explicitly justified against
      the autocorrelation horizon of carry returns."
  - "CRIT-11: K (permutation count) confirmed or revised from the R5 original K=200.
      If K=200, rationale: minimum K for p<0.05 at 5% resolution is K=20; K=200 gives 0.5% resolution;
      adequate for 0.05 alpha. If a different K is chosen, runtime estimate provided."
  - "CRIT-12: Null hypothesis stated precisely: e.g., 'No carry variant in the defined universe produces
      an OOS Sharpe distinguishable from the distribution of OOS Sharpes obtained under the null of
      no predictive content (i.e., permuted/resampled returns).' The null must be pre-registerable —
      specific enough that a reader can determine whether it was rejected without judgment calls."
  - "CRIT-13: Family-wise error rate (FWER) vs False Discovery Rate (FDR) control decision:
      WRC/SPA control FWER; Benjamini-Hochberg controls FDR. The choice is made explicit with
      rationale tied to the firm's decision context (CONTINUE/WIND-DOWN is a binary firm-level
      decision, which favors FWER; FDR may be appropriate if the question is 'how many variants
      survive'). Both positions steelmanned."

  # PREREQUISITES AND SEQUENCING (HoQR role)
  - "CRIT-14: Prerequisites enumerated with owning role and blocking/advisory classification:
      (a) [BLOCKING] Data provenance confirmed and corrupted USDJPY purged/quarantined (QD/data — required
          before any R5 input can be trusted).
      (b) [BLOCKING] QD implements permutation-emit in the harness: the harness 'does NOT emit permutation
          fields' per CONSENSUS_2026-05-01_phase2_falsification.md:R5-status-aspirational; R5 cannot run
          without this implementation.
      (c) [BLOCKING] R5 pre-registration drafted, filed, and frozen before R5 runs — scope produces the
          pre-reg TEMPLATE (as the named NEXT deliverable); pre-reg is not part of this scope wave.
      (d) [ADVISORY] USDJPY data-quality outlier bug fixed upstream (QD/data — advisory if USDJPY is
          excluded from R5; blocking if USDJPY is included).
      (e) [ADVISORY] Bet#1 (87fa1d23) equity parquet regeneration + DSR re-adjudication (parallel track;
          does not block R5 scoping but may affect the go/no-go interpretation if Bet#1 is included
          in the carry program universe)."
  - "CRIT-15: Sequencing diagram (or ordered list) naming the four-step critical path:
      STEP-1: data-provenance-confirmation + USDJPY purge/quarantine decision
      STEP-2: QD permutation-emit harness implementation
      STEP-3: pre-registration draft produced (NEXT deliverable after this scope)
      STEP-4: R5 executed against confirmed-real carry data
      Steps 1 and 2 are parallelizable. Step 3 is blocked on Steps 1+2 design decisions.
      Step 4 is blocked on Step 3 (pre-reg must be filed and frozen before any run)."
  - "CRIT-16: The scope document names the NEXT deliverable explicitly: a pre-registration document
      specifying the exact null hypothesis, test statistic, carry variant universe, pair universe,
      OOS window, block-length choice, K, alpha level, and go/no-go decision threshold.
      The pre-reg must be filed and frozen before a single permutation is run."

  # GO/NO-GO INTERPRETATION (HoQR, NHT roles)
  - "CRIT-17: The CONTINUE/WIND-DOWN decision framework is stated verbatim and tied to R5 output:
      CONTINUE (R5-path): R5 p < 0.05 on the pre-registered hypothesis surfaces at least one
        carry variant as distinguishable from chance; firm has a defensible class-level candidate;
        unfreeze N for confirmatory (not exploratory) trials only.
      WIND-DOWN (R5-path): R5 p >= 0.05 across all carry variants in the universe; carry
        program is indistinguishable from chance at the class level; combine with Bet#1
        re-adjudication result; if both fail, zero validated alpha is structural.
      AMBIGUOUS: R5 p < 0.05 for a subset of variants — the scope document pre-commits to
        how partial results are handled (e.g., proceed with surviving variants only; new
        pre-reg required for any follow-on)."
  - "CRIT-18: NHT power analysis framing: the scope specifies whether K=200 and the
      available OOS bar count (n_oos_bars for each carry variant) are sufficient to
      reject H0 at 80% power if a true Sharpe of 0.30 (R1 threshold) exists.
      If power is judged inadequate, the scope says so explicitly — a theatrical test
      that cannot reject even real signal must be flagged, not silently run."
  - "CRIT-19: The scope explicitly states that R5 at p<0.05 is a NECESSARY but not sufficient
      condition for CONTINUE. The full CONTINUE trigger (per CONSENSUS_2026-06-01) requires
      R5 p<0.05 on a PRE-REGISTERED hypothesis — post-hoc hypothesis selection invalidates
      the p-value regardless of its magnitude."

  # OUTPUT FORMAT AND COMPLETENESS
  - "CRIT-20: The scope package is a SINGLE named document (or a small set of named YAML/MD files)
      with clear section headers matching the five areas above: data-provenance, carry-universe,
      test-design, prerequisites-and-sequencing, go/no-go-interpretation.
      It must be self-contained: a reader who has not attended this session can understand
      what R5 is, why it is being run, what the inputs are, and what CONTINUE/WIND-DOWN means."
  - "CRIT-21: All role-produced artifacts (Mathematician test-design spec, HoQR universe/provenance/
      sequencing, NHT power/non-theatrical design skepticism) are referenced or included.
      No role's output is silently excluded from the scope package."

