  description: >
    Uncommitted working-tree diff adding a load-time per-pair close-price sanity
    gate (_assert_price_range) + _PAIR_CLOSE_BOUNDS / _PAIR_TIMEFRAME_SKIP tables
    in storage.py, a call in load_parquet() after pd.read_parquet, decision-trace
