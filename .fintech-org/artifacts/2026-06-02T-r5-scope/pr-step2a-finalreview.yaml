# PER-PRIOR-FINDING CLOSURE VERDICTS
# =====================================================================
findings:
  - id: PW-1
    title: "flat-top window / M=2*m_hat / D_SB factor-2"
    closure: CLOSED
    evidence: >
      reality_check.py:253-280 — _flat_top is exactly lambda(u)=1 for |u|<0.5, 2(1-|u|) for 0.5<=|u|<=1,
      0 else (matches R lambda verbatim). M = min(2*m_hat, M_max, max_lag) (line 251). D_SB = 2*sum^2
      (line 280, factor-2 present). Independent oracle reproduces all pins using this exact spectral
      machinery. PW-1 remains intact post-QD-fix.
    severity: none

  - id: PW-2
    title: "K_N = max(5, ceil(log10 T))"
    closure: CLOSED
    evidence: "reality_check.py:216 — K_N = max(5, math.ceil(math.log10(T))). Exact match to R extract. Independently used in oracle (K_N=5 for T=500), pins match."
    severity: none

  - id: PW-3
    title: "b_max = ceil(min(3*sqrt T, T/3)) cap"
    closure: CLOSED
    evidence: "reality_check.py:290 — b_max = math.ceil(min(3.0*math.sqrt(T), T/3.0)). Exact match. Independently b_max(500)=68 (test asserts 68). Cap enforced at line 291."
    severity: none

  - id: PW-4
    title: "m_hat rule now max(1, run_start - 1)"
    closure: CLOSED
    evidence: >
      reality_check.py:240 — `m_hat = max(1, run_start - 1) if run_start is not None else 1`. Both arms
      of the canonical R if/else are present: run_start==1 -> max(1,0)=1 (floor); run_start>1 ->
      run_start-1 (lag before the run). Independent oracle confirms behavior: WN->1, AR0.5->2, AR0.9->10,
      AR0.97->28(M_max-bound). The negative control proves the impl is NOT the old max(1, run_start)
      (which would give 3/11). Off-by-one HIGH defect from the prior chain is CLOSED.
    severity: none

  - id: NEW-1
    title: "test pins must be GENUINE R cross-validation, not impl self-snapshots"
    closure: CLOSED
    pins-match-my-independent-oracle: true
    explicit-statement: >
      YES — all four re-pinned values (WN 2.392177, AR0.5 7.164245, AR0.9 19.962904, AR0.97 34.106116)
      match a from-scratch R-faithful Python port (built from the canonical R extracts, NOT from the
      impl) to reldiff <= 1.4e-07. The negative control (old buggy m_hat rule) DIVERGES from every pin,
      proving the pins encode the corrected canonical algorithm rather than a snapshot of either the old
      or current impl's accidental output. The pins are therefore genuine independent-oracle
      cross-validation. The docstrings honestly disclose that the absolute R-actual values (2.40/7.16/
      19.94) differ at ~0.1-0.4% due to numpy-vs-R RNG, and pin against the numpy-RNG algorithm value
      with the R-actual as the cross-check — an acceptable and transparent practice.
    severity: none

