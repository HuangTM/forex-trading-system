# =====================================================================
# CONTAMINATION CHECK
# =====================================================================
contamination-check:
  stance-conveyed: false
  reasoning: >
    The review prompt conveyed (a) the prior PR findings PW-1..PW-4 + NEW-1, and (b) the AUTHORITATIVE
    ALGORITHM SPEC (the Mathematician adjudication). It did NOT convey any approval/rejection stance on
    the CURRENT code. The qd-step2a-pw-finalfix.yaml artifact carries `decision: approve-with-conditions`,
    but that is the Quant Developer's OWN handoff self-assessment of their implementation (a standard
    `decision` field in QD handoff artifacts), not a reviewer's code-approval stance injected into this
    review. The prior PR reviews carry `reject` — those are the FINDINGS I was told to verify closed, not
    a stance on the current code. No contamination-veto condition met. Verdict reached independently
    against code + a from-scratch R-faithful port + runtime execution.
  veto-emitted: false

# =====================================================================
# INDEPENDENT VERIFICATION (the crux — RAN, not read)
# =====================================================================
independent-verification:
  arch-importability:
    claim: "arch.bootstrap.optimal_block_length is NOT importable"
    result: CONFIRMED — `import arch` raises ModuleNotFoundError on /opt/homebrew/bin/python3.
    method: direct import attempt.
  independent-oracle:
    description: >
      Built a from-scratch Python port (/tmp/pw_independent_oracle.py) transliterated DIRECTLY from the
      verbatim R `blocklength::pwsd` extracts in the adjudication (rle-based, vectorized, scipy
      qnorm(0.975)) — deliberately NOT copied from reality_check.py — and ran it on the EXACT test
      series generators (_make_wn / _make_ar1 replicated). This is a genuine independent oracle, not the
      impl's own output.
    pinned-cross-validation:  # impl pin vs MY independent oracle, same numpy RNG
      - "WN    T=500 s=42:  oracle L=2.392177  | pin 2.392177  | reldiff 1.4e-07  | m_hat=1 M=2"
      - "AR0.5 T=500 s=42:  oracle L=7.164245  | pin 7.164245  | reldiff 5.5e-08  | m_hat=2 M=4"
      - "AR0.9 T=500 s=42:  oracle L=19.962904 | pin 19.962904 | reldiff 1.9e-09  | m_hat=10 M=20"
      - "AR0.97 T=500 s=123: oracle L=34.106116 | pin 34.106116 | reldiff 6.5e-09 | m_hat=28 M=28=M_max (cap binds)"
    negative-control:
      description: >
        Re-ran the oracle with the OLD buggy rule m_hat=max(1, run_start) (no -1). If the pins were impl
        self-snapshots of the old code they would match this; if they reflect the corrected canonical
        rule they must DIVERGE from it.
      result:
        - "AR0.5 old-rule L=6.956 (m_hat=3) vs pin 7.164245 -> DIVERGES (pin is NOT an old-rule snapshot)"
        - "AR0.9 old-rule L=20.104 (m_hat=11) vs pin 19.962904 -> DIVERGES"
      interpretation: >
        The pins reflect the CORRECTED max(1, run_start-1) rule (AR0.5 m_hat=2, AR0.9 m_hat=10), not the
        superseded max(1, run_start) (m_hat=3, m_hat=11). NEW-1 satisfied: pins are genuine
        independent-oracle cross-validation, not impl self-snapshots. (Old-rule AR0.5 L=6.956 also
        matches the adjudication's pre-fix production note ~6.976.)
    rng-caveat-stated: >
      My oracle uses the same numpy RNG as the impl, so the ~1e-7 match validates the ALGORITHM under
      numpy RNG. The R-ACTUAL oracle values (2.4016 / 7.1646 / ~19.94) differ from the pins at ~0.1-0.4%,
      which is numpy-vs-R RNG noise on the same seed — NOT an algorithm divergence (the m_hat rule, M_max
      cap, flat-top window, and D_SB factor-2 all agree structurally). The test docstrings disclose this
      tolerance honestly.
  near-white-regime:
    claim: "near-white (R5 operating point) no longer collapses to L=1 and tracks the reference"
    result: >
      Ran impl AND my independent oracle on near-white MA(1) theta=-0.003 T=4000 across 7 seeds. Impl L
      matches oracle L to ALL printed digits on every seed, including the seeds where L=1.0 (s7 ACF+0.003,
      s1000 ACF+0.005, s1002 ACF-0.006) and where L>1 (s42 L=2.452, s1001 L=1.693, s1005 L=2.815,
      s1008 L=3.072). CRITICAL DISTINCTION: the L=1.0 cases here are CANONICALLY CORRECT — m_hat=1, M=2
      (NOT m_hat=0/M=0), and L=1 arises only when the autocovariance numerator is genuinely negligible
      for that draw (the degenerate guard at g_hat<1e-28). This is the TRUE PW output, not the superseded
      PR#2 "collapse" (which was m_hat=0 -> M=0 by construction for ALL near-white series). The impl
      tracks the independent oracle perfectly, confirming it is NOT the collapsing interim.
    plain-wn-T4000: "impl L=2.5903 (matches adjudication's reported 2.5903) — healthy, no collapse."
  m_max-cap:
    claim: "AR(0.97) T=500: M_max=ceil(sqrt(500))+K_N binds -> L≈34.1"
    result: >
      Independently computed M_max(T=500) = ceil(sqrt(500)) + K_N = 23 + 5 = 28 (matches the test's
      assertion). My independent oracle on AR(0.97)/s123 gives m_hat=28, M=28 (==M_max, cap binds before
      2*m_hat would), L=34.106116 (reldiff 6.5e-09 vs pin). b_max=68 does NOT bind (L<b_max), exactly as
      the test docstring states. CONFIRMED independently.
  test-suite:
    command: "pytest tests/harness/test_reality_check.py tests/backtest/test_engine.py::test_no_lookahead -q"
    result: "39 passed in 1.32s — includes the sacred test_no_lookahead (PASS) and all 4 re-pinned exact-value tests."
  guards-fail-closed:
    result: "NaN->ValueError, inf->ValueError, empty->ValueError, scalar(0-D)->ValueError, constant->1.0. All fail-closed."
  determinism: "politis_white_block_length(wn) bit-identical on repeat (2.3921766551071535 == itself)."
  ruff: "ruff check src/forex_system/harness/reality_check.py -> All checks passed."
  white-rc-half:
    result: >
      White RC p-value path present and intact (recenter-by-sample-mean, non-studentized max, no omega;
      reality_check.py:874-945). Its tests (TestWhiteRCPvalue, TestR5CombinedResultFields) are among the
      39 passing. White-RC is in-scope only as "confirm unchanged behavior" — confirmed via passing tests.

