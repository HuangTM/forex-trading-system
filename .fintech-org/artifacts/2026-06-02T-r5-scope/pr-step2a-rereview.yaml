# =====================================================================
firewall-review:
  verdict: not-the-binding-lens
  note: >
    This PR is a math-correctness remediation of a researcher-spec'd estimator, not a
    spec-to-execution translation of a TradeIntent. Sections A-E of execution-firewall-review
    do not surface findings here (no hardcoded thresholds beyond the spec, no silent data
    cleaning beyond fail-closed guards, no regime branching, no signal transforms). The
    binding lens is statistical correctness vs the canonical reference, which is adjudicated
    above. No firewall finding.

coverage-statement: >
  Read both block-length functions in full and their call sites (r5a block_length=None path,
  r5c auto path). Read the full test file's block-length sections (TestPolitisWhiteUnivariate,
  TestPolitisWhiteMultivariate, TestPolitisWhiteExactValues) and the White-RC section.
  Fetched and quoted the R blocklength::pwsd source (pwsd.R + implied_hypothesis verbatim).
  Built a faithful R-port oracle and ran it against the impl on WN, AR(0.5/0.9/0.97), and a
  near-white T=4000 sweep (phi in {0.0, 0.03, 0.05, -0.003}, 5 seeds each). Confirmed arch
  not importable. Ran pytest (harness + no-lookahead, 192 pass) and ruff (clean). Did NOT
  re-audit the SPA/HAC internals beyond the White-RC recentering line (out of scope; unchanged).

contamination-check:
  status: clean
  detail: >
    The directory contains a prior first-review artifact (pr-step2a-review.yaml) and the
    QD remediation artifacts. I did NOT open pr-step2a-review.yaml to avoid ingesting any
    prior approve/reject STANCE (per the contamination contract). I verified solely against
    the code, the fetched R canonical source, and reviewer-run runtime checks. No approval
    stance was conveyed to me; no contamination-veto required.

self-verification:
  - "Re-verified PW-4 blocking claim by quoting R's implied_hypothesis verbatim AND by direct m_hat instrumentation of the impl (WN impl m_hat=0 vs R m_hat=1). Confirmed."
  - "Ruled out the alternative hypothesis that the L=1 collapse is the c=2.0 threshold: re-ran R's m_hat rule with c=2.0 and still got m_hat=1 -> L=2.39. The m_hat rule is the cause."
  - "Confirmed the divergence is at R5's operating point (near-white, ACF lag-1=-0.003 per spec), not a corner case — making it blocking, not a nit."
  - "Confirmed PW-1/PW-2/PW-3 are genuinely closed (AR0.5 exact match, cap binds at 68) so the verdict is targeted at PW-4 + the WN pin, not a blanket rejection."

decision-rationale: >
  PW-1, PW-2, PW-3 are CLOSED. But PW-4 is NOT closed: the m_hat fix over-corrected
  ('run_start - 1' -> m_hat=0 where the canonical R rule gives m_hat=1), causing a
  SYSTEMATIC collapse to L=1.0 across the near-white regime that is R5's actual operating
  point. L=1 is the i.i.d. bootstrap, which removes the autocorrelation-falsification power
  R5a exists to provide and biases the test anti-conservative. Additionally NEW-1: one
  'R reference' test pin (AR0.9=19.7032) is a mislabelled snapshot of the impl's own
  off-by-one output, not the true R oracle (19.9629), so the pins are partly self-validating
  rather than cross-validated. Per the re-review approval gate (approve ONLY if PW-1..PW-4
  CLOSED and near-white matches the canonical reference), this fails. Decision: reject.

routed-to: quant-developer
conditions-for-approval:
  - "Fix PW-4: implement R's implied_hypothesis semantics (m_hat = sum of preceding-run lengths; m_hat=1 when the qualifying run is first; floor at 1, never 0). Verify impl m_hat matches R m_hat on WN(=1), AR0.5(=2), AR0.9(=10)."
  - "After the fix, WN/T500/s42 must yield L≈2.39 (R oracle) and the near-white T=4000 sweep must track the reference (L≈1.7–3.2), not collapse to 1.0."
  - "Re-derive AR(0.9) pin; the test must equal the TRUE R oracle (19.9629) or be explicitly labelled an impl snapshot, not 'R reference'. Cross-validate every 'R reference' pin against the actual oracle."
  - "Optional (non-blocking): align c to qnorm(0.975) and M_max to ceil(sqrt(T))+K_N for exact-oracle parity (NEW-2, NEW-3)."

time-spent-reasoning: "~38 minutes (code read, R source fetch x2, oracle port + 3 runtime sweeps, root-cause isolation, pytest/ruff, report)."
