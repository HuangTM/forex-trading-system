# =====================================================================
# CENTRAL VERDICT ON THE WHITE / NEAR-WHITE REGIME QUESTION
# =====================================================================
near-white-regime-verdict:
  question: "Is L=1.0 on white / near-white correct per the canonical algorithm, or a divergence?"
  answer: "DIVERGENCE — BLOCKING. L=1.0 on near-white is NOT canonical behaviour."
  operating-point: "R5 carry strategy-returns are NEAR-WHITE (Mathematician spec: ACF lag-1 = -0.003). This is exactly where R5 lives."
  evidence:
    method: "Built a faithful Python port of R blocklength::pwsd (implied_hypothesis rle rule, M=min(2*m_hat, M_max), flat-top lambda, D_SB = 2*(sum)^2, b_max). Port reproduces the R oracle EXACTLY: WN/T500/s42 L=2.3922, AR0.5 L=7.1642 (both match the test's cited R values at float precision)."
    impl-vs-reference-near-white-T4000:
      - "phi=0.00 s2: REF L=1.70  impl L=1.00  DIVERGE"
      - "phi=0.00 s3: REF L=1.84  impl L=1.00  DIVERGE"
      - "phi=0.00 s42: REF L=2.59  impl L=1.00  DIVERGE"
      - "phi=0.03 s1: REF L=2.15  impl L=1.00  DIVERGE"
      - "phi=0.03 s3: REF L=3.21  impl L=1.00  DIVERGE"
      - "phi=0.03 s7: REF L=2.63  impl L=1.00  DIVERGE"
      - "phi=0.05 s1: REF L=3.05  impl L=1.00  DIVERGE"
      - "phi=0.05 s2: REF L=2.49  impl L=1.00  DIVERGE"
      - "phi=-0.003 s2: REF L=1.90 impl L=1.00 DIVERGE"
      - "phi=-0.003 s42: REF L=2.45 impl L=1.00 DIVERGE"
      - "(cases where impl m_hat happened to be >=1, e.g. phi=0.03/s42 and phi=0.05/s42, DO match — confirming the collapse is m_hat-driven, not random)"
    conclusion: >
      The implementation SYSTEMATICALLY collapses to L=1.0 in the near-white regime
      where the canonical reference gives L≈1.7–3.2. This is not a finite-sample ±1
      difference on pure WN (which would be acceptable); it is a structural off-by-one
      that fires at R5's stated operating point. Block length L=1 = i.i.d. bootstrap,
      which DESTROYS the autocorrelation-falsification power R5a is supposed to provide.
      An L too short understates dependence and makes the bootstrap p-value
      anti-conservative (too easy to reject H0 / pass). Wrong direction for a falsifier.

# =====================================================================
# PER-PRIOR-FINDING CLOSURE VERDICTS
# =====================================================================
prior-findings:
  - id: PW-1
    title: "flat-top window lambda(k/M), band M=2*m_hat, factor-2 in D_SB"
    verdict: CLOSED
    evidence:
      - "reality_check.py:233-240 _flat_top(u) = 1 for |u|<0.5; 2*(1-|u|) for 0.5<=|u|<=1; 0 else — matches R lambda() verbatim."
      - "reality_check.py:231 M = min(2*m_hat, max_lag) — factor-2 present."
      - "reality_check.py:260 d_hat = 2.0 * sum_for_d**2 — factor-2 present, matches R D_SB_hat = 2*(...)^2."
      - "Independent check: AR(0.5)/T500/s42 impl L=7.1642 == R-ref 7.1642 at float precision — the G_hat/D_SB machinery is correct once m_hat agrees."
    note: "The window/band/factor-2 mechanics are genuinely fixed. The residual error is upstream (m_hat), not here."

  - id: PW-2
    title: "K_N = max(5, ceil(log10 T))"
    verdict: CLOSED
    evidence:
      - "reality_check.py:206 K_N = max(5, math.ceil(math.log10(T))) — matches R K_N <- max(5, ceiling(log10(n))). No sqrt, ceil not floor."

  - id: PW-3
    title: "b_max = ceil(min(3*sqrt(T), T/3)); L_final = min(max(L_opt,1), b_max); must bind on near-unit-root"
    verdict: CLOSED
    evidence:
      - "reality_check.py:270-271 b_max = ceil(min(3*sqrt(T), T/3)); L_clamped = min(max(L_opt,1.0), b_max)."
      - "Runtime: AR(0.97)/T500/s123 -> impl L=68.0 == b_max=68 (cap binds). test_bmax_cap_binds_near_unit_root pins this."

  - id: PW-4
    title: "m_hat off-by-one (run-start - 1)"
    verdict: NOT-CLOSED
    severity: blocking
    evidence:
      - "reality_check.py:208-227 sets m_hat = run_start - 1 universally when a K_N-run is found."
      - "R blocklength::pwsd implied_hypothesis (fetched source): when the FIRST qualifying insignificant run is at POSITION 1 (run starts at lag 1), m_hat <- 1 (NOT 0). Only when the run is NOT first does it use sum-of-preceding-run-lengths. R also floors m_hat at 1 in all branches."
      - "The remediation over-corrected: 'run_start - 1' produces m_hat=0 for the position-1 case, where R produces m_hat=1. m_hat=0 -> M=0 -> empty G_hat sum -> degenerate guard -> L=1.0."
      - "Direct m_hat comparison: WN/s42 impl m_hat=0 vs R m_hat=1; near phi=0.03/s1/T4000 impl m_hat=0 vs R m_hat=1; AR0.9/s42 impl m_hat=9 vs R m_hat=10 (off-by-one throughout, but harmless when m_hat is large)."
      - "Controlled test: re-running the R implied_hypothesis rule with the IMPL's own c=2.0 threshold STILL yields m_hat=1 -> L=2.39 for WN. So the L=1 collapse is the m_hat rule, NOT the threshold constant."
    required-fix: "Replace 'run_start - 1' with R's implied_hypothesis semantics: m_hat = max(1, <sum of run-lengths preceding the first qualifying run>); when the qualifying run is first, m_hat = 1. Floor m_hat at 1, never 0."

# =====================================================================
# NEW FINDINGS
# =====================================================================
new-findings:
  - id: NEW-1
    severity: blocking
    label: issue
    dimension: correctness / testing
    title: "AR(0.9) test pin labelled 'R reference 19.7032' is actually a snapshot of the impl's own off-by-one output, not the R oracle"
    location: tests/harness/test_reality_check.py:431,456,461
    evidence:
      - "Test docstring: 'AR0.9 T=500 seed=42: R reference L=19.7032'. The TRUE R-faithful oracle value is 19.9629 (m_hat=10)."
      - "The impl outputs exactly 19.7032 (m_hat=9, off-by-one). So the value pinned and labelled as the R oracle equals the implementation's OWN buggy output."
      - "This is a self-consistent snapshot of a still-wrong formula masquerading as cross-validation — exactly the failure mode the re-review contract asked to rule out. (AR0.5=7.1642 IS a genuine match; WN and AR0.9 are not.)"
    fix: "Re-derive the AR(0.9) pin from the corrected m_hat formula and label snapshot pins as 'impl regression snapshot', reserving 'R reference' for values actually equal to the R oracle."

  - id: NEW-2
    severity: non-blocking
    label: issue
    dimension: correctness
    title: "Threshold constant c=2.0 vs R's qnorm(0.975)=1.959964"
    location: reality_check.py:203
    evidence:
      - "Impl threshold = 2.0*sqrt(log10(T)/T). R uses c=qnorm(0.975)~=1.96. PW2004 text uses c=2 as a round approximation, so 2.0 is defensible, but it is a small, documented divergence from the named R oracle the tests claim to validate against."
    note: "NOT the cause of the L=1 collapse (controlled test above). Flag for consistency only; acceptable if the spec pins c=2."

  - id: NEW-3
    severity: non-blocking
    label: suggestion
    dimension: correctness
    title: "Band cap uses M=min(2*m_hat, T-1) instead of R's M=min(2*m_hat, ceil(sqrt(T))+K_N)"
    location: reality_check.py:231
    evidence:
      - "R caps M at M_max = ceil(sqrt(n))+K_N. Impl caps at T-1 (much larger). For the corrected-m_hat AR/near-white range this rarely binds, so impact is small, but it is a divergence from the oracle and can matter for very persistent series after PW-4 is fixed."
    fix: "Consider M_max = ceil(sqrt(T)) + K_N to match the reference exactly."

