# ---------------------------------------------------------------------------
# NEW findings (this re-review)
# ---------------------------------------------------------------------------
new-findings:
  - id: N1
    label: issue
    severity: non-blocking
    rubric: execution-firewall-review (Section C — parameter sourcing)
    location: src/forex_system/harness/carry_universe_matrix.py:419-421, 432-434
    description: >
      _build_sizer uses the `or` idiom for override resolution:
      `variant_params.get("risk_per_trade") or exec_cfg.risk_per_trade`. A caller-supplied
      override that is falsy (0.0) is silently discarded in favor of the config default.
      For R5 default operation this NEVER fires (no overrides are passed; the full-universe
      build uses _VARIANT_EXEC values directly) and 0.0 is not a meaningful sizing value, so
      it is not blocking. But it is a latent firewall-drift vector: a future caller passing a
      legitimate falsy override would silently get a different parameter than requested, with
      no log of the substitution.
    suggested-fix: >
      Use explicit None-check: `v = variant_params.get("risk_per_trade"); risk = exec_cfg.risk_per_trade if v is None else v`.
      Optionally emit a decision-trace log when an override replaces the config default (source=override vs source=config).
    blocks-approval: false

  - id: N2
    label: observation
    severity: non-blocking
    rubric: probability-statistics (routed to NHT, not a plumbing defect)
    location: runtime (carry_momentum return magnitude)
    description: >
      carry_momentum's per-bar return std is ~5e-6, four orders of magnitude smaller than the
      other variants (~5e-3), because risk_per_trade=0.007 + continuous sizing. This is the
      CORRECT, config-faithful behavior (precisely what C-1 demands) and NOT a plumbing defect.
      However, it means carry_momentum contributes near-zero magnitude to the SPA max-statistic;
      the variant is effectively a near-null column in the FWER family. This is a statistical-power
      / scaling-normalization question for STEP-3 pre-registration and the NHT — flagging for
      visibility, explicitly NOT a defect in this artifact and NOT grounds to withhold approval.
    blocks-approval: false

