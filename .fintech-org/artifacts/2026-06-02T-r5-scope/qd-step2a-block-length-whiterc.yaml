# ---------------------------------------------------------------------------
# GAP 1 — Politis-White (2004) automatic block-length selection
# ---------------------------------------------------------------------------

gap1:
  title: "Politis-White (2004) + PPW (2009) automatic STATIONARY bootstrap block-length selection"
  references:
    - "Politis, D.N. & White, H. (2004). 'Automatic Block-Length Selection for the Dependent Bootstrap.' Econometric Reviews, 23(1), 53-70."
    - "Patton, A., Politis, D.N. & White, H. (2009). 'Correction to Automatic Block-Length Selection for the Dependent Bootstrap.' Econometric Reviews, 28(4), 372-375."
  formula_implemented: |
    # Standard algorithm (stationary bootstrap variant):
    #
    # Step 1: de-mean x.
    # Step 2: estimate autocovariances R(k) = (1/T) * sum x_dm[t] * x_dm[t+k].
    # Step 3: find m_hat via PPW (2009) consecutive-lags criterion:
    #   threshold = 2 * sqrt(log10(T) / T)
    #   K_N = max(5, int(sqrt(log10(T))))   [consecutive lags required below threshold]
    #   m_hat = smallest lag where K_N consecutive |rho(k)| < threshold
    # Step 4: compute stationary-bootstrap constants (PW 2004, eqs. 9-10):
    #   g_hat = sum_{k=-m_hat}^{m_hat} |k| * R(k)   [absolute-lag-weighted autocovs]
    #   d_hat = ( sum_{k=-m_hat}^{m_hat} R(k) )^2    [squared sum of autocovs]
    # Step 5: L_opt = (2 * g_hat^2 / d_hat)^(1/3) * T^(1/3)   [PW 2004 eq. 14, PPW 2009]
    # Step 6: L_final = max(L_opt, 1.0)   [guard L >= 1 per spec]
  new_functions:
    - "politis_white_block_length(x: np.ndarray) -> float"
    - "politis_white_block_length_multivariate(X: np.ndarray) -> float"
  wiring:
    - "r5a_circular_block_bootstrap: added block_length: int | None = None parameter; None triggers Politis-White auto-selection; int preserves backward compat"
    - "r5c_hansen_spa: changed block_length default from int=10 to None (auto); passing block_length=10 explicitly restores old behavior"
    - "run_r5: both r5a and r5c called with block_length=None (auto) by default"
  guards:
    - "NaN or Inf in input: raise ValueError (fail-closed)"
    - "len(x) < 2: raise ValueError"
    - "Constant series (near-zero variance): return 1.0"
    - "d_hat == 0 or g_hat == 0: return 1.0"
    - "L_opt < 1: return 1.0 (i.i.d. case)"
  verified_numbers:
    white_noise_T500_seed42: "L = 3.014 (small, near-iid — correctly captures near-white ACF)"
    ar1_phi09_T500_seed42:   "L = 23.44 (larger — captures strong AR(1) autocorrelation)"
    multivariate_max:        "L = max(3.014, 23.44) = 23.44 (max across columns)"

# ---------------------------------------------------------------------------
# GAP 2 — White's Reality Check p-value alongside Hansen SPA
# ---------------------------------------------------------------------------

gap2:
  title: "White (2000) Reality Check p-value computed from the SAME stationary-bootstrap draws as Hansen SPA"
  references:
    - "White, H. (2000). 'A Reality Check for Data Snooping.' Econometrica, 68(5), 1097-1126."
    - "Hansen, P.R. (2005). 'A Test for Superior Predictive Ability.' J. Business & Economic Statistics, 23(4), 365-380."
  design:
    primary_statistic: "Hansen SPA consistent (pvalue_consistent) — studentised + recentered"
    conservative_crosscheck: "White RC (white_rc_pvalue) — NOT studentised, no recentering"
    same_draws: "Both p-values computed from a single set of bootstrap draws (one RNG pass)"
    expected_ordering: "white_rc_pvalue >= pvalue_consistent (RC is more conservative; this is correct, not contradictory)"
    rc_statistic: |
      T_RC_obs = max_k [ sqrt(T) * mean(d_k) ]   (no omega division — White 2000 eq. 3.1)
      T_RC^{(b)} = max_k [ sqrt(T) * mean(boot_k - mean(d_k)) ]   (stationary bootstrap RC, eq. 3.7)
      white_rc_pvalue = (1 + #{T_RC^{(b)} >= T_RC_obs}) / (B + 1)
  dataclass_changes:
    R5cResult:
      added_fields:
        - "white_rc_pvalue: float"
        - "t_rc_obs: float"
        - "block_length_used: int"
        - "block_length_auto: bool"
      backward_compat: "pvalue_consistent / pvalue_lower / pvalue_upper / t_spa_obs / B / seed / lib_versions unchanged"
    R5aResult:
      added_fields:
        - "block_length_auto: bool"
      backward_compat: "all existing fields unchanged; block_length_used was already present"
    R5CombinedResult:
      added_fields:
        - "r5c_white_rc_pvalue: float"
        - "block_length_auto: bool"
      to_metrics_dict: "now also returns r5c_white_rc_pvalue (existing keys unchanged)"
  verified_numbers:
    scenario: "1 strong cell (mean=+0.002, sd=0.01) + 3 poor cells (mean≈0, sd=0.01), T=300, B=1000"
    pvalue_consistent: "0.0010"
    white_rc_pvalue:   "0.0020"
    rc_geq_spa:        "True (RC >= SPA as expected)"
    block_length: "5 (fixed, caller-supplied)"

