firewall_self_review:
  rubric_applied: execution-firewall-review
  decision: approve

  section_A_findings: []
  # A1 thresholds: no strategy thresholds added; only statistical algorithm parameters
  #   (log10, sqrt, K_N) which are part of the published PW/PPW formula, not research decisions.
  # A2 silent data cleaning: NaN/Inf guards RAISE ValueError (fail-closed), do not silently fill.
  # A3 lookback/window: m_hat is computed from data via the PPW criterion (formula-derived, not tuned).
  # A4 regime branching: none.
  # A5 signal transformations: none — this is statistical machinery (block-length estimator),
  #   not a signal transform. The Politis-White formula is specified in the Mathematician spec.

  section_B_findings:
    - "Spec (mathematician-r5-spec.yaml) specifies the Politis-White rule by name and the max-across-columns multivariate extension. Both are implemented as specified."
    - "Spec specifies White RC 'off the same draws as SPA' — implemented in a single bootstrap loop."
    - "block_length=None default for run_r5 is spec-mandated ('Politis-White data-driven rule, NOT a hand-picked constant')."
    - "B: no B value was changed by this increment (default remains _B=10000)."

  section_C_parameter_sourcing:
    - "2.0 * sqrt(log10(T) / T): PPW 2009 eq. 4 — paper-cited, not tuned."
    - "K_N = max(5, int(sqrt(log10(T)))): PPW 2009 — paper-cited."
    - "(2 * g^2 / d)^(1/3) * T^(1/3): PW 2004 eq. 14 — paper-cited."
    - "1e-12 / 1e-14 / 1e-28 numerical guards: standard IEEE near-zero protection, not domain tuning."
    - "No magic numbers introduced without paper citation."

  section_D_observability:
    - "politis_white.block_length event: logs T, m_hat, threshold, K_N, g_hat, d_hat, L_opt, L_final."
    - "politis_white.constant_series event: logs T, R0, L_returned."
    - "politis_white.multivariate event: logs T, k, per-column Ls, L_max."
    - "r5a.block_length event: logs block_length_used, block_length_auto, T_oos."
    - "r5c.block_length event: logs block_length_used, block_length_auto, T, k."
    - "r5c.result: logs both spa_consistent and white_rc_pvalue alongside t_spa_obs, t_rc_obs."
    - "run_r5.combined: logs all key values including r5a and r5c block lengths and their auto flags."
    - "All logs use %-formatting (not f-strings) per log-as-decision-trace rubric."
    - "All decision boundaries log their inputs and outcomes."

  section_E_tests:
    - "36 new tests covering both gaps: univariate/multivariate PW guards, WN vs AR(1) ordering, RC>=SPA ordering, auto block-length wiring, R5CombinedResult new fields, regression pins."
    - "All existing 160 reality/r5/harness tests still pass."
    - "Sacred test test_no_lookahead: PASSED."

  bash_blocked: false
  deviations:
    - |
      DEVIATION: politis_white_block_length internally de-means x before computing autocovariances.
      REASON: PW (2004) is stated for zero-mean processes; de-meaning is standard preprocessing
      and does not constitute a research decision. The spec says "mean block length L by Politis-White
      (2004) auto-rule" without specifying pre-processing; de-meaning is mathematically required.
      JUDGMENT: implementation judgment, not research judgment. No firewall violation.
    - |
      DEVIATION: White RC uses sample-mean recentering in the bootstrap (boot - mean(d_k))
      rather than zero recentering.
      REASON: White (2000) eq. (3.7) specifies the stationary bootstrap variant uses
      f*_{l,t} - mu_hat_l where mu_hat_l = (1/n) sum f_{l,t} (sample mean).  This is the
      correct RC formula; "no recentering" would refer to not recentering to mu_bar (the SPA
      threshold) vs recentering to the sample mean (which RC still does).
      JUDGMENT: faithful implementation of White (2000). Not a research decision.
    - |
      DEVIATION: R5CombinedResult.block_length now reports the ACTUAL Politis-White-selected L
      (from r5a) rather than the old heuristic ceil(T^(1/3)).
      REASON: spec mandates data-driven L; reporting the actual value used is correct.
      r5c may select a different L (its own Politis-White on the multivariate pair_returns);
      R5CombinedResult.block_length reflects r5a's L (unchanged from the original field semantics).
      JUDGMENT: spec-aligned. No firewall violation.
