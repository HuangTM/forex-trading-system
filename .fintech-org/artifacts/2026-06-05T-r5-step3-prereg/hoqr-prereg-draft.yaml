body: |
  Authored the HoQR-owned sections of the R5 pre-registration plus the full document
  skeleton with all mathematician sections clearly marked as merge placeholders
  ([SECTION OWNED BY MATHEMATICIAN — merged at assembly]); no statistical content drafted
  in those sections.

  Section 1 (Preamble & scope): R5 framed as the TERMINAL honest KILL TEST for a firm with
  ZERO validated OOS alpha and a tripped kill-criterion; explicitly NOT a validation/rescue
  vehicle; the freeze is binding — any post-freeze change other than the pre-freeze N1 fix
  voids the pre-reg, and STEP 4 is one-shot.

  Section 2 (Universe): explicit 6x6 grid (36 cells) enumerated as a table; NO-SILENT-EXCLUSION
  stated as a named constraint (every cell appears or drops with a structured logged reason;
  silent drop voids FWER; code errors fail closed); honest statement that the six variants are
  re-parameterizations/ablations of ONE rate-differential idea with effective independent tests
  ~1-2.

  Section 3 (Window & snooping — HoQR proposal, mathematician co-signs): snooping is sunk and
  uncontrollable on the firm's longest-studied strategies. PROPOSAL = PRIMARY deflated-Sharpe-style
  haircut charged against the significance bar (rationale: rate signal is forward-filled MONTHLY,
  so effective-N is ~monthly and a meaningful clean daily forward hold-out does not exist), with a
  genuine post-development hold-out as documented FALLBACK if one is later shown to exist. The
  haircut formula/inputs are explicitly deferred to the mathematician; HoQR owns only the decision
  that snooping MUST be charged and that bare p<0.05 is necessary-but-not-sufficient. Window stated
  as a RULE over the inner-join common joint index (post-entry-delay, net-of-cost); exact dates/T
  left as a marked [EXACT DATES FROM QD BUILD REPORT] slot. "All data, no haircut" explicitly rejected.

  Section 4 (Decision Rules): SPA p<0.05 (post-deflation, White-RC concordant) -> CONTINUE, which is
  necessary-but-not-sufficient and only ever authorizes a NAMED confirmatory-only new pre-reg (no
  free exploration). p>=0.05 -> WIND-DOWN. AMBIGUOUS (boundary straddle / isolated subset /
  normalization distortion) -> confirmatory pre-reg gate only, never CONTINUE on the original family.

  Section 5 (Wind-Down Action Map): all five outcomes per PRE-REG-winddown-map, each with a named
  firm action — (1) REJECT -> confirmatory pre-reg only; (2) powered non-rejection -> WIND-DOWN;
  (3) underpowered non-rejection -> WIND-DOWN (BINDING, not "inconclusive, keep spending");
  (4) ANOMALOUS -> AMBIGUOUS confirmatory gate; (5) technical failure -> HALT/root-cause/re-freeze,
  no counter increment. Section 5.1 defines "wind-down to monitoring" concretely: no new research
  spend, archive registry as RETIRED/FALSIFIED, observe-only, redirect capacity, CEO ratification.

  Section 6 (Retirement criteria): six machine-checkable triggers tied to the decision rules,
  including the VOID-on-freeze-mismatch and VOID-on-silent-drop guards; no machine-checkable path
  from this test to "keep spending on the carry family."
