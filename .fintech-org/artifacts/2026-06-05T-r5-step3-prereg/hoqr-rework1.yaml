  basis: >-
    N=3 is the midpoint of the combined credible range (HoQR 1-2 / NHT 2-4 -> union 1-4).
    SR0 is strictly INCREASING in N, so the union FLOOR (N=2) is the LEAST-deflating
    admissible choice and biases a pre-committed KILL test toward false CONTINUE. I move
    off the floor toward the conservative pole but stop at the midpoint rather than the
    skeptic's top (4): the mechanistic decomposition finds only TWO distinct information
    sources (pure rate-differential carry; carry+momentum hybrid), and N=3 charges a
    half-look for the residual independence the 2-source view understates (FRED regime
    gate and vol-targeting condition on information the bare differential does not use).
    N=4 would charge as if all five carry keys carried near-independent information, which
    the shared rate_differentials.parquet feed contradicts. The Mathematician freezes SR0
    for N in {2,3,4} in parallel; the elected value is the N=3 scalar.

