honest_n:
  value: 2
  derivation: >
    Apply the firm dedup rule (src/forex_system/harness/honest_n.py:40-58,63-81): key by pre_reg_path
    else strategy name with cost/pair/vol-scaling/ablation suffixes stripped. The 8 carry-family
    pre-regs collapse to 5 distinct keys {carry, carry_fred, fred_carry, vol_target_carry,
    carry_momentum} once carry_2x_costs->carry, carry_momentum_3x_costs->carry_momentum,
    vol_target_carry_no_vol_scaling->vol_target_carry. Then collapse the shared-signal dimension:
    all 5 keys are re-parameterizations/ablations of ONE rate-differential idea on the SAME
    rate_differentials.parquet feed (CONSENSUS_2026-06-02_r5_scope.md:21,45 effective independent
    dim ~1-2 HoQR / 2-4 NHT). Two genuinely distinct information sources remain: (1) pure
    rate-differential carry {carry, carry_fred, fred_carry, vol_target_carry} = ONE look; (2)
    carry+momentum hybrid {carry_momentum}, which injects a price-trend SMA-crossover signal not in
    the carry look = SECOND look. N=2 sits at the top of HoQR's 1-2 and the bottom of NHT's 2-4.
  excluded_as_dependent:
    - "carry_2x_costs: cost ablation of carry (same signal, multiplied cost) — not an independent look (honest_n.py:44-46 _\\d+x_costs strip)"
    - "carry_momentum_3x_costs: cost ablation of carry_momentum — not independent (same strip rule)"
    - "vol_target_carry_no_vol_scaling: vol-scaling ablation of vol_target_carry (honest_n.py:42-43 _no_vol_scaling strip) — collapsed into vol_target_carry"
    - "carry / fred_carry_stripped / vol_target_carry: sizing/ranking/conditioning wrappers on the SAME rate-differential feed as carry_fred — collapsed into the single pure-carry look 1"
  why_not_1: "Two distinct information sources exist (rate-differential vs. carry+momentum price-trend overlay); N=1 would treat the momentum overlay as free and under-deflate (snooping uncontrolled)."
  why_not_36: "The 36 cells are NOT 36 hypotheses; ratified effective independent dim ~1-4 and the joint same-block bootstrap is used precisely because cells are dependent. N=36 would double-count multiplicity the SPA max-statistic already controls jointly."
  why_not_37: "Org-wide trials.jsonl count (37) includes non-carry strategies and every cost-ablation/re-run; it overstates independent carry looks and would over-deflate (understating real edge). honest_n.py exists to reject this raw count."
  sharpe_table:
    - {look: "rate-differential carry (rep: carry_fred Bet#1 OOS)", sharpe: 0.80, source: "references/pre-registrations/carry_fred.md:16 + fred_carry_stripped.md:18,66"}
    - {look: "carry+momentum hybrid (rep: carry_momentum OOS-2022)", sharpe: 0.197, source: ".fintech-org/trials.jsonl:21 (trial 6a56df9c, oos_sharpe=0.197)"}
  supporting_member_sharpes_not_inputs:
    - {member: "carry baseline OOS-2022", sharpe: 0.2841, source: ".fintech-org/trials.jsonl:20"}
    - {member: "fred_carry_stripped OOS-2022", sharpe: 0.07464, source: ".fintech-org/trials.jsonl:22"}
    - {member: "vol_target_carry full-history", sharpe: 0.7594, source: ".fintech-org/trials.jsonl:14 (trial d572999d)"}
  var_sr: 0.0909
  var_sr_arithmetic: >
    SR_1=0.80, SR_2=0.197. Mean = (0.80+0.197)/2 = 0.997/2 = 0.4985. Squared deviations:
    (0.80-0.4985)^2 = (0.3015)^2 = 0.09090225; (0.197-0.4985)^2 = (-0.3015)^2 = 0.09090225;
    sum = 0.1818045. Var[SR_n] (population, /N) = 0.1818045/2 = 0.09090225 ~ 0.0909;
    sqrt = 0.3015. Sample (/(N-1)) alternative = 0.1818045 (sqrt 0.4264), recorded as the
    conservative election for the Mathematician. FROZEN primary: Var[SR_n]=0.0909, sqrt=0.3015.
  dsr_threshold_inputs:
    N: 2
    var_sr_population: 0.0909
    var_sr_sample_alt: 0.1818
    sqrt_var_sr: 0.3015
    euler_gamma: 0.5772156649
    e: 2.718281828
    z_inv_arg_term1: "Z^-1(1 - 1/N) = Z^-1(0.5) = 0  (zeroes the (1-gamma) leg at N=2)"
    z_inv_arg_term2: "Z^-1(1 - 1/(N*e)) = Z^-1(0.81607)  (Mathematician evaluates; SR0 = 0.3015*0.5772*Z^-1(0.81607))"
    route_to_quant_developer: "verify Var[SR_n] arithmetic and the normal quantile Z^-1(0.81607); inputs frozen by HoQR, QD does not re-derive N"

