body: |
  Method A verdict: UNAVAILABLE. The per-variant table is the §7.1 attestation in the negative.
  Decisive: carry_fred's OOS window is reserved through 2026-04-25 and vol_target_carry was
  validated on full history 2010-2026 — both development/validation windows end AT OR AFTER the R5
  common joint index terminus (2026-04-06), so there is no post-development tail inside the index for
  those two variants; the other four inherit those selections or rely on the monthly forward-filled
  rate signal whose tail carries ~27 fresh monthly observations — too thin and not never-used. No
  variant-clean window of meaningful length exists. Method B (DSR deflation haircut) is OPERATIVE.

  Honest-N = 2. Dedup rule (honest_n.py) collapses the 8 carry pre-regs to 5 keys; collapsing the
  shared rate-differential feed leaves TWO independent information sources: (1) pure
  rate-differential carry (carry / carry_fred / fred_carry / vol_target_carry — one signal with
  sizing/ranking/conditioning wrappers), (2) carry+momentum hybrid (adds a price-trend SMA overlay).
  N=2 is the point inside both the HoQR (1-2) and NHT (2-4) scope ranges. Not 1 (momentum overlay is
  a real second source), not 36 (cells are dependent; SPA max-stat controls that jointly), not 37
  (org-wide count includes non-carry + every ablation/re-run).

  Sharpe table: look 1 (carry_fred) SR=0.80; look 2 (carry_momentum) SR=0.197.
  Var[SR_n]: mean 0.4985; each squared deviation 0.09090225; sum 0.1818045; population variance
  0.1818045/2 = 0.0909 (sqrt 0.3015). FROZEN: N=2, Var[SR_n]=0.0909. DSR inputs handed to the
  Mathematician (SR0 = sqrt(Var)*[(1-gamma)*Z^-1(0.5) + gamma*Z^-1(0.81607)]; the Z^-1(0.5)=0 term
  zeroes the first leg at N=2, leaving SR0 = 0.3015*0.5772*Z^-1(0.81607) for the Mathematician to
  finalize). §3.3 window finalized: full common index 2010-03-15..2026-04-06, T=4186, 0 dropped,
  all 36 present; no hold-out split.

