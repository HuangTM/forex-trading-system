alternative_methods:
  rejected_third_sharpe_fabrication: >
    One could invent a third look-Sharpe (e.g. the carry baseline SR=0.2841 or the vol_target_carry
    full-history SR=0.7594) to compute sqrt(Var) over 3 points rather than 2, arguing that N=3
    implies 3 observations. This is rejected: the three candidate values are not independently
    drawn look-representatives — they share the same rate-differential feed, and using them would
    conflate the bracket-axis N=3 election (which charges multiplicity) with the dispersion-axis
    observation count (which requires genuinely independent draws). The two-point sample estimator
    over the two distinct information sources is the only defensible choice; the limitation is
    the price of honesty.
  population_estimator_alternative: >
    The population (÷N_obs) estimator over the two observed Sharpes gives sqrt(Var)=0.3015,
    producing SR0(N=3)=0.129558 — the less-conservative alternative. Rejected in favor of the
    sample estimator on the basis of unbiasedness and the N=2 maximal-bias argument (§7.3.2).

