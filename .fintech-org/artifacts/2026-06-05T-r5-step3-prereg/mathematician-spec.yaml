proof-sketch-or-reference:
  - "Studentized SPA statistic T_SPA = max_l sqrt(n)*d_bar_l/omega_hat_l: Hansen (2005) 'A Test for Superior Predictive Ability', JBES 23(4), 365-380, sec 2-3."
  - "Scale-invariance of T_k: omega_hat_k is a HAC standard error = sqrt(s2/n) where s2 is a quadratic-then-square-root functional of the de-meaned column; rescaling column by c>0 -> mean*c, s2*c^2, omega*c, so T_k = sqrt(n)*(c*mean)/(c*omega) = unchanged. Exact for positive scalar rescaling."
  - "Bartlett-kernel HAC PSD long-run variance: Newey-White (1987); weights w_lag = 1 - lag/(h+1) guarantee s2 >= 0 up to finite-sample correction."
  - "Stationary bootstrap (geometric block length, circular wrap): Politis-Romano (1994)."
  - "Automatic block length L_opt = (2*G_hat^2/D_SB)^(1/3)*T^(1/3): Politis-White (2004) Econometric Reviews 23(1) 53-70; Patton-Politis-White (2009) correction 28(4) 372-375; adjudicated vs R blocklength::pwsd to <0.5% (WN 2.392, AR(0.5) 7.164, AR(0.9) 19.963)."
  - "Max-across-columns block aggregation = conservative coverage: max_j L_j >= each cell's optimal block, so no cell is under-blocked (mathematician R5 spec, block-length rule)."
  - "MC-SE of a bootstrap p-value = sqrt(p(1-p)/K): the bootstrap p is a sample proportion of B indicator draws -> binomial SE; at p=0.05, K=200->0.0154, K=2000->0.0049, K=5000->0.0031, K=10000->0.0022."
  - "White (2000) Reality Check, recenter by sample mean (eq. 3.7 stationary-bootstrap variant), non-studentized: Econometrica 68(5) 1097-1126."
  - "Deflated Sharpe Ratio expected-max-Sharpe SR0 = sqrt(Var[SR_n])*[(1-gamma)*Zinv(1-1/N) + gamma*Zinv(1-1/(N*e))], gamma = Euler-Mascheroni: Bailey & Lopez de Prado (2014) 'The Deflated Sharpe Ratio', SSRN 2460551."

