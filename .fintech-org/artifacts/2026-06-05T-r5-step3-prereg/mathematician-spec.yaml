body: |
  N2 DECISION (the normalization call I own): studentize uniformly. The per-cell statistic is
  T_k = sqrt(n)*mean_hat(f_k)/omega_hat_k, family statistic max_k T_k. Raw-mean SPA is rejected.
  Rationale: T_k is scale-invariant (rescaling a column by c>0 leaves T_k unchanged because
  omega_hat_k is homogeneous degree 1), so the carry_momentum ~1000x smaller std does NOT make it a
  near-null column after studentization — it competes on its t-ratio like every other cell. This is
  also the canonical Hansen (2005) SPA specification. Confirmed implemented at reality_check.py:871.

  omega_hat ESTIMATOR: Newey-West HAC standard error of the cell mean, Bartlett (triangular) kernel,
  bandwidth h = L-1 (block length minus one), with negative-variance clamp max(s2,1e-12) and an
  absolute zero-variance floor omega<1e-12 -> 1e-12 applied to observed AND bootstrap SEs
  (reality_check.py:850-868). Hansen consistent recentering mu_bar = max(0, mean). White RC reported
  off the SAME draws as a conservative cross-check (non-studentized, sample-mean recentered).

  BLOCK LENGTH: Politis-White (2004)+PPW (2009) auto rule via politis_white_block_length_multivariate,
  aggregated as MAX across the 36 columns, guard L>=1 (reality_check.py:341-342,829-835). Max-across-cols
  is the conservative coverage choice. L is second-order here (0/10 verdict flips over L in {1,2,3,5})
  because cross-sectional dependence dominates; still computed from data, not hardcoded.

  K = 5000 (frozen), MC-SE = sqrt(p(1-p)/K) = 0.0031 at p=0.05. K=200 prohibited (MC-SE 0.0154 straddles
  the boundary). master_seed = 576746, PCG64, logged. alpha=0.05, FWER via max-stat over one pooled
  36-cell family (one binary CONTINUE/WIND-DOWN decision -> P(any false CONTINUE) = FWER; FDR is wrong).

  SNOOPING METHOD: two admissible methods, co-signed with HoQR. Method A = genuine post-development
  hold-out (requires per-variant last-development-date + never-used attestation from HoQR). Method B =
  Deflated-Sharpe haircut (Bailey-Lopez de Prado 2014): SR0 = sqrt(Var[SR_n])*[(1-gamma)*Zinv(1-1/N) +
  gamma*Zinv(1-1/(N*e))]. FROZEN RULE: N = honest-N registry of EFFECTIVELY INDEPENDENT carry looks
  (single-digit, given effective dim ~1-4), NOT the org-wide trials.jsonl count (37, which over-deflates)
  and NOT N=1 (under-deflates). I co-sign HoQR's window iff it provides either the §7.1 attestation OR
  the §7.2 honest-N + Var[SR_n] + DSR threshold. "Used all data, no haircut" is NOT signable.

  POWER: ~20-35% at true ~0.30 ANNUALIZED Sharpe over ~4186 daily bars under FWER over correlated cells
  (single-cell t ~ 1.22 < 1.96 even before multiplicity). BINDING: underpowered non-rejection is
  UNINFORMATIVE as evidence of no-edge but the firm action is WIND-DOWN regardless — no third
  "inconclusive" outcome. Confirm exact n against the realized matrix at run time.

  CAVEAT (one): the HAC-SE floor 1e-12 is ABSOLUTE, not relative. Scale-invariance holds in exact
  arithmetic, but if a carry_momentum omega_hat_k actually approaches 1e-12 the floor would clip it and
  break scale-invariance for that cell. Expected not to trigger (carry_momentum returns are tiny but
  non-degenerate), but it MUST be confirmed numerically before freeze — routed to quant-developer. If
  triggered, the fix (relative floor) is a PRE-freeze code change, not post-freeze. This is why the
  decision is sound-WITH-CAVEATS rather than unconditionally sound.

