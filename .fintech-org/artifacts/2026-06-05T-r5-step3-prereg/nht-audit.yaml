body: |
  AUDIT SUMMARY — DECISION: SURVIVES (severity: concern; does NOT block the freeze).

  I audited the assembled R5 pre-reg across all six mandated stress axes, reading the artifact, the
  Mathematician/HoQR sub-artifacts, the implementation (dsr.py, honest_n.py, reality_check.py refs,
  carry_universe_matrix.py refs), and the raw registry, and I reproduced the load-bearing arithmetic
  with scipy.

  STRESS 1 (can any outcome -> "keep spending"?): NO, with one caveat. The four terminal branches are
  CONTINUE (-> confirmatory pre-reg only, no spend/no family re-open), AMBIGUOUS (-> confirmatory pre-reg
  only), WIND-DOWN (-> monitoring), TECHNICAL FAILURE (-> re-run same trial). None maps to free
  exploration of the 36-cell family. The one residual is the confirmatory-branch counter discipline
  (finding A-4) — a back-door forking-paths risk, contained by the requirement that the confirmatory test
  get its own freeze+audit. Recorded as a concern, not material.

  STRESS 2 (N=2 vs my 2-4; bias direction): N=2 is defensible as a value but is the FLOOR of the combined
  range, and the N-error bias direction is ANTI-conservative: SR0 strictly increases in N (verified
  N=2->0.2216, N=4->0.4486), so under-counting N LOWERS the haircut and biases toward FALSE CONTINUE. The
  pre-reg mis-frames N=2 as conservative; its conservatism argument is valid only on the Var/spread axis.
  This is finding A-2 (material), contained by the three AND-gates and the no-capital ratchet.

  STRESS 3 (SR_1=0.80 provenance / monotonicity): SR_1=0.80 is registry-UNVERIFIED (carry_fred has no
  trials.jsonl row) and the "Bet#1=carry_fred" label is FALSE (Bet#1=momentum, retired). The pre-reg
  discloses this and argues SR_1 inflation is conservative via Var monotonicity — which I CONFIRMED: higher
  SR_1 -> higher SR0 -> harder CONTINUE -> can only false-WIND-DOWN. The monotonicity defense holds on the
  SR_1 axis. There is NO path where the SR_1 weakness alone produces a false CONTINUE. (The false-CONTINUE
  risk lives on the N axis, finding A-2, not the SR_1 axis.)

  STRESS 4 (AMBIGUOUS backdoor): the AMBIGUOUS branch maps strictly to a confirmatory-only pre-reg gate,
  never to CONTINUE on the family, with no re-parameterization and no capital. The gap is the unstated
  counter/honest-N discipline for the spun-off confirmatory test (finding A-4, concern).

  STRESS 5 (unfrozen DOF): essentially none material. Seed, K, block-length rule, matrix-build invocation,
  "White-RC concordant" (p_RC<0.05), Var ddof (sample), skew/kurtosis cell (k*, Fisher) are all pinned. The
  only survivor is the scipy skew/kurtosis bias flag — immaterial at T=4186 (finding A-5, note).

  STRESS 6 (my prior dissent conditions): ALL met in substance. Joint same-block bootstrap (zero benchmark,
  sound anti-double-count rationale); crypto pre-reg + wind-down map; K=5000>=2000 with MC-SE; hold-out
  adjudicated then deflation haircut. Romano-Wolf StepM was replaced by SPA max-statistic single-family
  FWER — an acceptable substitute already adopted in the ratified scope.

  NET: The pre-reg is an honest, binding, statistically sound one-shot kill test. The atomic claim holds.
  The DSR gate is hard (best-cell annualized SR ~0.625 to clear) and the math reproduces exactly. The
  expected outcome remains WIND-DOWN. The four reservations are recorded append-only; two (A-2 N-axis
  caveat, A-4 confirmatory-counter discipline) are worth a one-sentence fix each before freeze but do not
  render the spec unfreezable. I sign SURVIVES at severity=concern.

