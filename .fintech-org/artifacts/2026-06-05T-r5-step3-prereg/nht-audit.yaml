dsr-assessment: |
  The frozen DSR gate (§7.3) is statistically sound in its formula and arithmetic, and CONSERVATIVE on
  the Var/spread axis, but ANTI-conservative on the N axis. Verified findings:

  - SR0 FORMULA: canonical BLdP (2014). SR0 = sqrt(Var[SR_n])*[(1-gamma)Z^-1(1-1/N)+gamma*Z^-1(1-1/(Ne))].
    The second quantile uses Ne in the denominator — confirmed canonical against Wikipedia/BLdP. The
    pre-reg's Z^-1(0.81607)=0.900452 and bracket 0.519756 are correct.
  - ARITHMETIC: REPRODUCED EXACTLY. sample(ddof=1) SR0_ann=0.221616; population(ddof=0)=0.156706. Both
    match the frozen scalars to 6 sig figs (scipy norm.ppf).
  - Var ELECTION: SAMPLE (÷(N-1))=0.1818 elected over population 0.0909. This is the MORE conservative
    (higher SR0, harder CONTINUE) choice and the unbiased estimator — correct election. Signed.
  - SR_1=0.80 PROVENANCE: registry-UNVERIFIED. carry_fred has NO trials.jsonl row at all (grep
    confirmed NOT FOUND). The 0.80 is pre-reg-documented only (carry_fred.md:16 states the >=0.30
    hypothesis; the "0.80 realized" appears as a reference inside fred_carry_stripped.md:18,66). The
    "Bet#1 = carry_fred" label is FALSE per the registry: trial 87fa1d23 (Bet#1) is strategy=momentum
    (trials.jsonl:24,36), RETIRED 2026-06-02 with corrected DSR=0.1296. The pre-reg discloses this
    provenance weakness (§7.3.1) and neutralizes it via the Var/spread monotonicity argument, which I
    independently CONFIRMED holds: over-stated SR_1 -> larger spread -> higher SR0 -> harder CONTINUE ->
    can only cause false WIND-DOWN, never false CONTINUE. The monotonicity defense is valid.
  - N=2 PIN — THE ONE DIRECTIONAL DEFECT: SR0 is strictly INCREASING in N (verified: N=2->0.2216,
    N=4->0.4486 at the elected sqrt(Var)). Therefore pinning N at the BOTTOM of the credible range
    (HoQR 1-2 / NHT 2-4) is the ANTI-conservative choice on the multiplicity axis. If the true effective
    N is 4 (top of my prior range), the frozen SR0=0.2216 is ~half the conservative 0.4486 — the gate is
    too EASY, biasing toward a FALSE CONTINUE. The pre-reg's conservatism argument covers only the
    Var/spread leg, NOT the N leg; this asymmetry is unstated. MITIGATED (not eliminated) by: (a) DSR is
    one of three AND-gates (p_SPA<0.05 AND DSR>=0.95 AND p_RC<0.05); (b) a false CONTINUE buys only a
    confirmatory pre-reg, never capital or family re-open. Net: a recordable concern, NOT a freeze
    blocker, because the worst case is one extra pre-registered confirmatory trial, not spend.
  - GATE STRENGTH: requires best-cell annualized SR ~0.625 to clear DSR>=0.95 (verified across skew
    {-0.5,0,+0.5}, exk {0,1,3}). That is a high, honest bar against the firm's realized carry Sharpes
    (0.07-0.80 in-sample, snooped).

audit-findings:
  - id: A-1
    severity: minor
    finding: >
      §3.4 Step 1 claims to "apply the firm's de-duplication rule (honest_n.py:40-81)" yielding "8 carry
      pre-regs -> 5 dedup keys." This is NOT what the code does. Running honest_n.compute_honest_n on the
      real trials.jsonl returns N_honest=10 org-wide with carry-family keys {carry, carry_momentum,
      fred_carry, vol_target_carry, vol_target_carry.md}. The code keys by pre_reg_path FIRST when
      present (so vol_target_carry.md and momentum.md are NOT suffix-stripped), and carry_fred never
      appears (no registry row). HoQR's "8->5" table is a HAND recomputation narrated as code output. The
      further collapse 5->2 "information sources" is a pure judgement call the code never performs.
    exploit-path: >
      Not directly exploitable (N=2 is defended on its merits and sits in both ranges). The risk is
      epistemic: dressing a judgement call in a code citation ("honest_n.py:40-81") lends false
      mechanical authority to a number that is actually adjudicated. A future reader could mistake N=2
      for a reproducible registry computation when it is not.
  - id: A-2
    severity: material
    finding: >
      N=2 is pinned at the BOTTOM of the combined credible range (HoQR 1-2 / NHT 2-4). Because SR0 is
      strictly increasing in N (verified N=2->0.2216 vs N=4->0.4486), the smallest admissible N produces
      the LOWEST haircut — the anti-conservative choice on the multiplicity axis. The pre-reg's
      "conservative-if-wrong" defense (§7.3.1/§7.3.2) addresses only the Var/spread axis (SR_1 inflation),
      which is genuinely conservative, but is SILENT on the N axis, where the chosen value biases toward
      false CONTINUE.
    exploit-path: >
      An N under-count lets a lucky best-of-36 cell clear DSR when a conservative N=4 would have failed
      it. CONTAINED: false CONTINUE -> confirmatory-only pre-reg (no capital, no family re-open, three
      AND-gates). Cannot leak into "keep spending on the family." Records as material because it is a real
      directional bias the pre-reg mis-describes as conservative, but it does not warrant blocking the
      freeze given the containment.
  - id: A-3
    severity: minor
    finding: >
      trials.jsonl LINE-NUMBER citations are systematically wrong by ~6 (e.g. carry_momentum cited at
      ":21" is actually line 27; carry baseline ":20" is line 26; fred_carry_stripped ":22" is line 28;
      vol_target_carry_no_vol_scaling ":25" is line 35). The line cited for each (20-25) actually holds an
      unrelated exploratory backfill row with sharpe=null. HOWEVER, every cited trial_id (6a56df9c,
      5d18776d, b7d1a65a, 9017fadb) resolves correctly via grep and the SR values (0.197, 0.2841, 0.07464)
      match the rejection_reason fields exactly. So the substantive data is verifiable; only the line
      pointers drifted.
    exploit-path: >
      None substantive — IDs resolve. Pure citation-hygiene defect. Flag because a frozen kill-test should
      cite by resolvable trial_id (which it also does), and the wrong line numbers would mislead a manual
      auditor checking by line.
  - id: A-4
    severity: concern
    finding: >
      The CONTINUE (outcome 1) and AMBIGUOUS (outcome 4) branches both permit carrying the surviving /
      anomalous structure into "a fresh, separately-pre-registered confirmatory test with its own freeze,
      treated as a brand-new hypothesis." The pre-reg correctly forbids free exploration, re-parameterization,
      new variant/pair search, and capital on this branch. BUT it is SILENT on the trial-counter / honest-N
      discipline for that confirmatory test. Outcome 5 (technical failure) explicitly pins "counter NOT
      incremented"; outcomes 1/4 say nothing. A confirmatory test on a cell SELECTED after seeing R5's 36-cell
      results is itself a spent look; if it neither increments the org-wide counter nor inherits the R5
      selection burden in its own N, it re-opens the garden of forking paths through the back door.
    exploit-path: >
      Snoop 36 cells -> pick the winner -> test it "fresh" with N that ignores the 36-cell selection ->
      manufacture a clean p on a post-hoc-selected cell. PARTIALLY CONTAINED: the confirmatory test gets its
      own pre-reg + freeze + audit (so it can be caught THEN) and no capital flows from R5 itself. Records as
      a concern (not material) because the next gate exists; but the pre-reg should pin, now, that any
      R5-spawned confirmatory test (i) increments the org-wide counter and (ii) sets its honest-N to absorb
      the R5 36-cell selection. Recommend adding one sentence to outcomes 1 and 4.
  - id: A-5
    severity: note
    finding: >
      Residual unfrozen DOF is minor: §7.3.4 pins skew/kurtosis to cell k* in Fisher (excess) convention via
      dsr.py, but does NOT pin the sample-estimator bias flag (scipy bias=True/False) for skew/kurtosis. At
      T=4186 the finite-sample correction is O(1/T) and immaterial to the DSR. "White-RC concordant" IS pinned
      numerically (p_RC<0.05, lines 322/810); seed (576746), K=5000, block-length rule, matrix-build invocation,
      and Var ddof (sample) are all frozen. So this is the only surviving DOF and it is negligible.
    exploit-path: "None material — sub-0.1% perturbation to var_term on T=4186."
  - id: A-6
    severity: note
    finding: >
      benchmark=ZERO (not a matched-carry benchmark as my prior dissent phrased it). The pre-reg justifies
      zero as the non-double-counting benchmark: the cost-of-carry is already realized inside the net swap leg
      of the equity curve (§1 PART II). This is a sound substitution for "matched-carry" — subtracting an
      external carry benchmark would deduct the carry return twice. My dissent condition is satisfied in
      substance.

dissent-statement: |
  NHT POSITION ON THE R5 PRE-REGISTRATION (append-only; preserve verbatim in CONSENSUS):

  The pre-reg SURVIVES my audit and is freezable as-is. It honors every condition of my 2026-06-02
  dissent: joint same-block stationary bootstrap against a zero benchmark (with a sound anti-double-count
  rationale for zero over matched-carry); a crypto-frozen full-grid pre-reg with an exhaustive wind-down
  action map; K=5000 >> the 2000 floor with reported MC-SE=0.0031; and a snooping charge that is real,
  not theater — Method A (clean hold-out) was honestly adjudicated UNAVAILABLE per-variant (two variants'
  development windows end AFTER the R5 index terminus), and Method B (BLdP deflation haircut) is operative
  with arithmetic I reproduced exactly (SR0=0.221616). The decision tree contains NO branch that maps to
  "inconclusive, keep spending": a non-rejection at ANY power -> WIND-DOWN (binding, outcomes 2 & 3);
  CONTINUE and AMBIGUOUS buy only a fresh confirmatory pre-reg, never capital or family re-open. The
  underpowered-non-rejection caveat (power ~20-35%) is correctly bound to WIND-DOWN rather than a third door.

  I record FOUR reservations, none of which block the freeze:

  (1) MATERIAL — N=2 is pinned at the FLOOR of the credible range and SR0 is strictly increasing in N
  (N=2->0.2216, N=4->0.4486). On the multiplicity axis this is the ANTI-conservative choice, biasing toward
  false CONTINUE — the OPPOSITE of the conservatism the pre-reg claims. The pre-reg's monotonicity defense
  is valid ONLY on the Var/spread (SR_1) axis, which I confirmed; it is silent on the N axis. This is
  contained because a false CONTINUE buys only a confirmatory pre-reg behind three AND-gates, never spend.
  But the pre-reg should not describe N=2 as conservative; it is the least-deflating admissible N.

  (2) MINOR — "honest_n.py:40-81" is cited as the mechanism for N, but the code on the real registry returns
  N_honest=10, not the "8->5->2" the pre-reg narrates. N=2 is a sound JUDGEMENT but it is dressed as a code
  computation it is not. carry_fred (the SR_1=0.80 representative) has NO registry row, and the "Bet#1 =
  carry_fred" label contradicts the registry (Bet#1 = trial 87fa1d23 = momentum, retired). The 0.80 is
  registry-unverified; the pre-reg discloses this and the Var-monotonicity neutralizes its direction.

  (3) CONCERN — the confirmatory-test branch (outcomes 1 & 4) does not pin the trial-counter / honest-N
  discipline for the spun-off test. A post-hoc-selected winning cell tested "fresh" without absorbing the
  36-cell selection burden re-opens the garden of forking paths. Contained by the requirement that the
  confirmatory test get its own freeze + audit, but should be pinned now.

  (4) MINOR — trials.jsonl line-number citations are off by ~6; trial_ids resolve correctly so the data is
  verifiable, but a frozen kill-test should not carry stale line pointers.

  CALIBRATION: I rejected my own instinct to escalate. The expected outcome remains WIND-DOWN, the gate is
  honestly hard (best-cell annualized SR ~0.625 needed to clear DSR), and every residual loophole terminates
  at a fresh pre-reg behind a fresh audit — never at uncontrolled spend. Over-rejecting this would itself be
  a calibration failure. I sign the audit as SURVIVES with the four reservations recorded, and I recommend
  HoQR/Mathematician adopt the two one-sentence fixes (N-axis conservatism caveat; confirmatory-branch
  counter discipline) at or before freeze if they wish to close (1) and (3) cleanly — but their absence does
  not make the spec unfreezable.

