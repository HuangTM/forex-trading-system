body: |
  DELTA-AUDIT SUMMARY — DECISION: SURVIVES (severity: note; does NOT block the freeze).

  I re-audited the REVISED R5 pre-reg against my four prior reservations and stress-tested the new
  surfaces (N=3 midpoint election, the N_obs=2 dispersion / N=3 bracket convention, the runner-based gate
  with its freeze-receipt interlock, and the no-keep-spending guarantee). I re-reproduced the load-bearing
  arithmetic with scipy and read the new code (r5_decision.py, run_r5_step4.py, cut_freeze_receipt.py, the
  hac_se_nw extraction in reality_check.py).

  PRIOR RESERVATIONS: all FOUR RESOLVED.
  - A-2 (material) RESOLVED: N re-elected 2->3 to the union midpoint for the exact bias-direction reason I
    raised; N-axis anti-conservatism disclosed with verified scalars and explicitly NOT defended; residual
    bias halved. The single most important fix.
  - A-4 (concern) RESOLVED: confirmatory-test counter discipline binding in outcomes 1 & 4, §4, and §6
    (NEW trial_id + R5 36-cell selection absorption; omitting either VOIDS). Back-door forking-paths closed.
  - A-1 (minor) RESOLVED: code-mechanical facts (N_honest=10) cleanly separated from HoQR adjudication;
    carry_fred-key fiction retracted.
  - A-3 (minor) RESOLVED: trial_id-primary citations; SR_1=0.80 flagged registry-prose.
  - A-5/A-6 (note) RESOLVED: scipy bias flag pinned; benchmark=ZERO stands.

  NEW SURFACES: four findings, none blocking.
  - D-1 (note): N=3 midpoint still anti-conservative if true N=4, but HALF the prior floor-error, disclosed,
    contained behind three AND-gates + A-4 discipline (no capital).
  - D-2 (clarification): one STALE sign-off sentence (:327-329) says variance "computed over the three
    look-Sharpes," contradicting the frozen two-observation dispersion convention (:290-301,315). The frozen
    SCALAR is unaffected — I reproduced 0.426385 from exactly the two observed Sharpes {0.80,0.197}. Pure
    documentation coherence; recommend deleting the clause. Non-blocking.
  - D-3 (note): the N_obs=2 dispersion / N=3 bracket factoring is the correct BLP factoring (dispersion ×
    expected-max-of-N), a coherent frozen plug-in with no exploit — dispersion is data-pinned, the only free
    axis (N) is bounded [2,4] with a frozen consequence table.
  - D-4 (note): the runner-based gate adds NO new material DOF. The freeze-receipt sha256 + git-commit
    interlock, the exhaustive five-object code pin, and the write-once receipt convert "new code" into
    "hash-pinned code"; k* uses the studentized T_k argmax (not plain Sharpe), internally consistent with
    §7.3.4. compute_dsr correctly demoted to conventions reference (no integer n_trials reproduces 0.022906).

  NO-KEEP-SPENDING GUARANTEE: intact and strengthened. The §7.3.6 functional is now ordered RULES 0-4 with
  the straddle test BEFORE CONTINUE/WIND-DOWN and a mutual-exclusivity/exhaustiveness proof; the prior
  CONTINUE/AMBIGUOUS overlap (p=0.048, DSR=0.96, p_RC=0.01) now resolves unambiguously to AMBIGUOUS-straddle.
  No terminal branch maps to "inconclusive, keep spending"; CONTINUE and both AMBIGUOUS branches buy only a
  fresh confirmatory pre-reg (now with binding counter discipline), never capital or family re-open.

  NET: the revised pre-reg is an honest, binding, statistically sound one-shot kill test. The atomic claim
  holds. Every prior reservation is materially fixed; the residual N-axis bias is halved, disclosed, and
  contained; the gate is HARDER than before (best-cell annualized SR ~0.767 to clear DSR, vs ~0.625 prior);
  and the arithmetic reproduces exactly. The expected outcome remains WIND-DOWN. I sign SURVIVES at
  severity=note, with one non-blocking documentation fix recommended (D-2: delete the stale §3.4 sign-off
  clause about "three look-Sharpes").

