body: |
  This acceptance-criteria artifact defines what "done" means for STEP 3 of the R5
  kill-test pipeline: a crypto-frozen pre-registration document covering the complete
  statistical specification and a wind-down action map that pre-commits firm actions
  for every possible test outcome — before a single bootstrap draw runs.

  The criteria are derived exclusively from the ratified scope consensus
  (CONSENSUS_2026-06-02_r5_scope.md) and from direct inspection of the committed
  code (carry_universe_matrix.py lines 419-421 and 432-434 for N1; the
  carry_momentum scale finding for N2). No domain or statistical judgment is
  made by the PM.

  Two pre-conditions must clear before the pre-reg is frozen:
    (1) N1 hardening: the _build_sizer `or`-idiom must be replaced with None-checks
        by the quant-developer and reviewed by the principal-reviewer.
    (2) N2 decision: the mathematician must explicitly state the per-cell
        normalization approach (studentized vs raw) in the pre-reg so the
        carry_momentum scale disparity is handled by design, not by accident.

  The wind-down action map is the binding deliverable that makes R5 a true kill test
  rather than an exploratory exercise: underpowered non-rejection is pre-committed as
  WIND-DOWN. This is the firm's stated intent per the CEO's BUILD decision and the
  NHT's preserved dissent. Any pre-reg that leaves a non-rejection open to
  "inconclusive, keep spending" interpretation fails criterion PRE-REG-winddown-map
  and must be revised before signing.

  All five `or` occurrences in _build_sizer are load-bearing claims verified by
  direct file read; the trial counter claim (36 lines) is verified by wc -l.

