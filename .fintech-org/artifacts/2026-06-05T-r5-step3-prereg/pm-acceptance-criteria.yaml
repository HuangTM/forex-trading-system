criteria:
  # --- N1: code hardening (pre-condition for freeze) ---
  - id: N1-sizer-hardening
    description: >
      _build_sizer in carry_universe_matrix.py (lines 419-421, 432-434) uses the
      `or`-idiom which silently discards a valid falsy override of 0.0 and falls
      back to the config default. A one-line None-check fix is required
      (e.g., `x if (x := variant_params.get('k')) is not None else exec_cfg.k`)
      for leverage_cap, max_order_units, min_order_size, risk_per_trade,
      stop_loss_atr_multiple — all five `or` occurrences — before the code
      state is pinned for freeze.
    owner: quant-developer
    done_when: >
      git diff shows each `or` replaced with an explicit None-check; existing tests
      pass; principal-reviewer signs off on the diff.

  # --- N2: normalization addressed in pre-reg ---
  - id: N2-studentization-addressed
    description: >
      The carry_momentum variant's return std is ~1000x smaller than the other five
      variants (correct consequence of risk_per_trade=0.007 in
      carry_momentum_portfolio.yaml). This scale disparity makes carry_momentum a
      near-null SPA column if raw returns are used. The pre-registration MUST
      explicitly state whether (a) studentized T_k = sqrt(n)*mean(f_k)/omega_hat_k
      is applied uniformly (which normalizes scale and is the standard SPA
      specification), or (b) raw-return SPA is used and the near-null column
      distortion is accepted and documented. The mathematician must sign this choice.
    owner: mathematician + head-of-quant-research
    done_when: >
      The pre-reg document contains an explicit numbered section on per-cell
      normalization with the chosen method stated and rationale given; mathematician
      artifact references this section.

  # --- Null hypothesis ---
  - id: PRE-REG-null
    description: >
      Frozen null H0 stated verbatim: max over cells k of expected net-of-cost,
      post-entry-delay, benchmark-relative (benchmark = ZERO) per-bar performance
      d_k <= 0. Must appear word-for-word in the pre-reg document.
    owner: mathematician + head-of-quant-research
    done_when: >
      Pre-reg document contains a "Null Hypothesis" section with the exact
      mathematical statement; any deviation from this formulation is a blocker.

  # --- Test statistic and method ---
  - id: PRE-REG-statistic
    description: >
      Exact statistic and method frozen: Hansen SPA (primary) p-value AND White
      Reality Check p-value (conservative cross-check) emitted from the SAME
      stationary-bootstrap draws. Statistic = studentized mean
      T_k = sqrt(n)*mean(f_k)/omega_hat_k; family statistic = max_k T_k.
      Joint same-block resampling across all ~36 cells (preserves cross-sectional
      dependence). Both p-values reported.
    owner: mathematician
    done_when: >
      Pre-reg document has a "Test Statistic and Method" section that names
      the function signatures from reality_check.py (r5c_hansen_spa, White-RC path)
      and confirms joint same-block draw.

  # --- Frozen 36-cell universe with no-silent-exclusion rule ---
  - id: PRE-REG-universe
    description: >
      The pre-registration must enumerate all 36 cells explicitly:
      6 variants (carry, carry_fred, fred_carry_stripped, vol_target_carry,
      vol_target_carry_no_vol_scaling, carry_momentum) x 6 JPY crosses
      (USDJPY, EURJPY, GBPJPY, AUDJPY, CADJPY, NZDJPY). A no-silent-exclusion
      rule must be stated: any cell dropped from the universe must be reported with
      structured reason in the pre-reg or results; a silent drop voids the FWER
      guarantee.
    owner: head-of-quant-research
    done_when: >
      Pre-reg document contains a complete 6x6 grid enumeration and the
      no-silent-exclusion rule stated as a named constraint.

  # --- OOS window and snooping treatment ---
  - id: PRE-REG-oos-window
    description: >
      The exact evaluation window (start date, end date, bar count) must be frozen
      with an honest treatment of data snooping: these are the firm's
      longest-studied strategies; the pre-reg must either (a) designate a genuine
      post-development hold-out period, or (b) apply a deflated-Sharpe-style haircut
      (DSR) and state the haircut formula and inputs. The HoQR and mathematician must
      both sign off on which path is taken.
    owner: head-of-quant-research + mathematician
    done_when: >
      Pre-reg document has an "OOS Window and Snooping Treatment" section that names
      the window dates, approach (hold-out or deflated-Sharpe), and the rationale.
      "We used all available data" with no haircut is not acceptable.

  # --- Block length ---
  - id: PRE-REG-block-length
    description: >
      Block length = Politis-White (2004) automatic data-driven rule, applied
      per-variant (not a single shared value), with guard L >= 1. The committed
      implementation in reality_check.py must be confirmed as the frozen algorithm.
      Pre-reg must state that L is computed from the actual series (not assumed
      from the near-white ACF proxy finding, which may not hold for
      vol-targeted/FRED-conditioned variants).
    owner: mathematician + quant-developer
    done_when: >
      Pre-reg document cites the Politis-White rule by name, references the
      reality_check.py function, and states per-variant application with
      max-across-cells aggregation for the joint draw.

  # --- K and MC-SE ---
  - id: PRE-REG-K-MCSE
    description: >
      K >= 2000 bootstrap draws required; target K=5000-10000 preferred. The
      pre-reg must state the exact K value and report the MC-SE formula:
      sqrt(p*(1-p)/K) at p=0.05 (= 0.0049 at K=2000). K=200 is prohibited
      (MC-SE ~0.0154 straddles the 0.05 boundary).
    owner: mathematician
    done_when: >
      Pre-reg document has a "Bootstrap Parameters" section with K stated,
      MC-SE formula stated, and K=200 explicitly ruled out with rationale.

  # --- Alpha and FWER ---
  - id: PRE-REG-alpha-FWER
    description: >
      Alpha = 0.05 stated. FWER (not FDR) via max-statistic over the single pooled
      family of ~36 cells. Rationale for FWER over FDR must be stated: the firm
      decision is one binary CONTINUE/WIND-DOWN = P(any false CONTINUE) = FWER.
    owner: mathematician
    done_when: >
      Pre-reg document has an "Error Control" section with alpha, FWER vs FDR
      choice, and rationale.

  # --- Go/no-go decision threshold ---
  - id: PRE-REG-decision-threshold
    description: >
      The exact go/no-go threshold must be stated: SPA p < 0.05 -> CONTINUE path;
      SPA p >= 0.05 -> WIND-DOWN path. CONTINUE is necessary-but-not-sufficient
      (a single isolated cell p<0.05 does not rescue the program; post-hoc selection
      invalidates the p). AMBIGUOUS path (subset survives) maps to new pre-reg for
      confirmatory testing only, never to CONTINUE on the original family.
    owner: head-of-quant-research
    done_when: >
      Pre-reg document has a "Decision Rules" section with the exact threshold and
      each branch (CONTINUE / WIND-DOWN / AMBIGUOUS) defined before any run.

  # --- Wind-down action map ---
  - id: PRE-REG-winddown-map
    description: >
      A complete pre-committed wind-down action map covering every possible outcome
      must appear in the pre-reg BEFORE the test runs. Required outcomes and their
      firm actions:
        (1) REJECT (p < 0.05, class level): named next-step actions (confirmatory
            pre-reg, not free exploration).
        (2) FAIL TO REJECT, powered scenario (p >= 0.05, power adequate):
            WIND-DOWN — zero validated alpha structural.
        (3) FAIL TO REJECT, underpowered scenario (p >= 0.05, power ~20-35%):
            WIND-DOWN — not "inconclusive, keep spending." This is binding.
        (4) ANOMALOUS result (e.g., partial subsets, carry_momentum distortion
            after normalization decision): AMBIGUOUS path with named confirmatory
            pre-reg gate; does NOT license CONTINUE.
        (5) Technical failure (code error, data integrity fault detected at run time):
            HALT, root-cause, re-freeze before re-run; does NOT increment trial counter.
    owner: head-of-quant-research
    done_when: >
      Pre-reg document has a "Wind-Down Action Map" section with all five outcomes
      enumerated and firm actions named. "Inconclusive, keep spending" is not a
      valid action for any outcome.

  # --- Power statement ---
  - id: PRE-REG-power
    description: >
      The pre-reg must state the estimated class-level power (~20-35% at the stated
      ~0.30 annualized Sharpe under FWER over correlated cells) and pre-commit that
      this low power makes a non-rejection UNINFORMATIVE as evidence of no-edge, but
      does not change the firm action: WIND-DOWN. Power does not license a third
      "inconclusive" outcome.
    owner: mathematician + null-hypothesis-tester
    done_when: >
      Pre-reg document has a "Power and Limitations" section with the power estimate,
      source of the estimate, and the binding statement that underpowered
      non-rejection -> WIND-DOWN.

  # --- Freeze mechanics ---
  - id: FREEZE-mechanics
    description: >
      After consensus ratification of the pre-reg package, the document must be
      frozen by: (a) SHA-256 hash of the pre-reg file, (b) git commit hash of the
      code state (carry_universe_matrix.py + reality_check.py post-N1 fix),
      both recorded in a freeze-receipt artifact before any STEP 4 run.
      The quant-developer is responsible for producing and committing the
      freeze-receipt. Any post-freeze code change (other than the permitted N1 fix,
      which must occur BEFORE freeze) voids the pre-reg.
    owner: quant-developer + principal-reviewer
    done_when: >
      A freeze-receipt YAML is committed to
      .fintech-org/artifacts/2026-06-05T-r5-step3-prereg/ containing both hashes
      before the first STEP 4 bootstrap draw.

  # --- NHT adversarial audit ---
  - id: NHT-audit
    description: >
      NHT must produce an adversarial audit of the assembled pre-reg package
      (null, statistic, normalization, universe, OOS window, K, power, wind-down
      map). NHT dissent is append-only: any objection is recorded verbatim and
      does not block unless NHT raises it to block-threshold severity.
    owner: null-hypothesis-tester
    done_when: >
      NHT audit artifact present at
      .fintech-org/artifacts/2026-06-05T-r5-step3-prereg/nht-audit.yaml with
      decision field populated (approve | dissent | block) and verbatim text.

  # --- Principal-reviewer sign-off on N1 diff ---
  - id: PR-review-N1
    description: >
      The principal-reviewer must independently review the N1 one-line hardening
      diff in carry_universe_matrix.py before it is merged and before freeze.
      Review covers: correctness of the None-check, no unintended behavior change,
      and that all five `or`-idiom occurrences are addressed.
    owner: principal-reviewer
    done_when: >
      Principal-reviewer artifact present at
      .fintech-org/artifacts/2026-06-05T-r5-step3-prereg/pr-n1-review.yaml
      with decision: approve or decision: needs-work.

  # --- Consensus ratification ---
  - id: CONSENSUS-signed
    description: >
      A consensus document covering the complete pre-reg package must be signed by
      head-of-quant-research, mathematician, quant-developer (code-pin confirmation),
      and NHT (audit result). PM collects signatures and authors the consensus file.
      CEO ratification is required before STEP 4 is authorized (wind-down is
      irreversible firm policy; not in the autonomous quorum's authority).
    owner: pm
    done_when: >
      CONSENSUS_2026-06-05_r5_step3_prereg.md committed to docs/decisions/ with
      all role signatures and CEO ratification noted.

