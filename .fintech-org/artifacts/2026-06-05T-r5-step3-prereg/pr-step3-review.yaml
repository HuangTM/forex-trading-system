body: |
  DECISION: REJECT. Three blocking findings, two of which make the pre-registration UNFREEZABLE as
  written, and one of which makes the freeze itself unverifiable.

  The arithmetic and the statistical machinery are, to their credit, almost entirely correct. I
  re-derived SR0 (0.221616 sample / 0.156704 population), Z^-1(0.81606)=0.900452, the per-obs
  conversion 0.013961, the block length ceil(21.330121)=22, and the omega-floor safety ratio (6.47e4)
  — all check out exactly against source. The studentized SPA statistic (:871), Hansen thresholded
  recentering (:895), joint same-block bootstrap (:882-890), HAC Newey-West with Bartlett kernel
  (:850-864), the +1/+1 p-value (:941-945), the seed discipline (:824-825), and the (excess_kurtosis+2)/4
  kurtosis convention (dsr.py:184) all say what the spec claims they say. The N1 diff is a correct,
  behavior-preserving defensive fix with adequate tests. The no-silent-exclusion machinery (_drop_cell
  structured reason/exc_type/category, fail-closed on code errors) is real and well-instrumented.

  But the load-bearing DSR gate cannot run. F-001: §7.3.3 pins a frozen SR0 = 0.221616 and asserts it is
  "passed as the benchmark" to compute_dsr with "no code change." compute_dsr has no benchmark parameter;
  it computes expected_max_sr(n_trials, n_observations) internally at dsr.py:198, and that function uses
  the null-theoretical dispersion 1/sqrt(T-1), structurally incapable of reproducing the spec's
  empirical-dispersion SR0 for ANY n_trials (verified: expected_max_sr(2,4186)=0.008034 vs target
  0.013961; closest reachable is n=3->0.013183). So STEP 4 either edits dsr.py (forbidden post-freeze) or
  hits §7.3.3's own TECHNICAL-FAILURE clause — the pre-reg routes its own primary deflation gate to a
  forced HALT. This is the single most important finding: a kill test whose deflation gate cannot execute
  is not a freezable kill test.

  F-002: the integrated decision functional (§7.3.6) is not mutually exclusive. CONTINUE has no MC-SE
  straddle exclusion while AMBIGUOUS claims the whole straddle band, so a boundary-significant result
  that also clears DSR and White-RC (e.g. p_SPA=0.048, DSR=0.96, p_RC=0.01) lands in BOTH branches with
  no precedence rule. Given the document's explicit anti-CONTINUE-on-boundary posture this is almost
  certainly meant to resolve to AMBIGUOUS, but as frozen it is genuinely ambiguous — and post-freeze that
  cannot be patched without voiding the pre-reg.

  F-003: the FREEZE BLOCK still holds three [FROM FREEZE-RECEIPT] placeholders, and the doc hashes "this
  file" while embedding a slot for its own hash. Without specifying which file state is hashed (and
  excluding/externalizing the receipt block), the line-321 retirement check sha256(this_file) is
  self-defeating and the freeze is not verifiable post-hoc.

  These are exactly the failure class a pre-registration exists to prevent: a frozen spec that, once
  frozen, cannot be executed, cannot be unambiguously decided at the boundary, and cannot be cryptographically
  pinned. All three are fixable BEFORE freeze (F-001 and F-002 by the Mathematician; F-003 by the QD code-pin
  owner), and none requires re-opening the research judgments. The minors (F-004 undocumented second
  compute_dsr 0.0 path; F-005 floor line-citation drift) and observations (F-006 N1 end-to-end test gap;
  F-007 SR_1=0.80 provenance contingent on the F-001 gate) should be folded into the same revision pass.

  Recommend: return to Mathematician for F-001/F-002/F-004/F-005, to QD for F-003/F-006, surface F-007 to
  HoQR, then re-review the revised PART II and FREEZE BLOCK before any freeze-receipt is cut. No STEP-4
  draw may proceed; no p-value computed in this review.
