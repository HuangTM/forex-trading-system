  Acquisition run 2026-06-06 (initial) + gap-closure follow-up 2026-06-06 + retry run 2026-06-06.
  Web budget run 1: 8 WebFetch + 2 WebSearch (2022-2026 verified).
  Run 2: 2 WebSearch + 10 WebFetch (no new years closed — prior 2019-2021 URLs 404'd).
  Run 3 (this run): 2 WebSearch + 12 WebFetch budget.
  NEWLY VERIFIED in run 3: 2019, 2020, 2021 (all 8 FADs each) from official BoC annual
  schedule press releases. Key slug patterns that worked:
    2019 schedule: bankofcanada.ca/2018/07/bank-canada-publishes-2019-schedule-fad-announcements-release-mpr-bos-slos/
    2020 schedule: bankofcanada.ca/2019/07/bank-canada-publishes-2020-schedule-policy-interest-rate-announcements/
    2021 schedule: bankofcanada.ca/2020/07/2021-schedule-policy-interest-rate-announcements/
  STILL UNVERIFIED: 2010-2018.
  Attempted strategies for 2010-2018 in run 3:
    (a) Valet API groups/series list — no FAD-keyed series found; ATABLE_POLICY_INSTRUMENT
        contains only V39079 (daily business-day rate, 252 obs/yr) and V122514 (monthly) —
        neither series has FAD-date-keyed observations, cannot infer hold dates from change-only data.
    (b) Slug variants for 2017/2018 schedules (published ~July 2016 / July 2017):
        multiple patterns tried — all 404.
    (c) BoC press-release archive date filter — always returns most-recent page, does not paginate.
    (d) archive.ph — blocked by WebFetch.
    (e) wowa.ca / nesto.ca aggregators — only show 2025-2026 forward-looking dates, no 2010-2021.
    (f) BoC MPR PDF (2017-07-12) — binary/unreadable via WebFetch.
  A further follow-up should try: direct slug variants for years 2010-2018 (published ~July of
  prior year), e.g. bankofcanada.ca/2016/07/<slug>/ for 2017, bankofcanada.ca/2009/07/<slug>/
  for 2010, etc. — the exact slug fragment is unknown and varied across years. Alternatively,
  a human browser session could navigate the BoC press-release archive with JavaScript-rendered
  date filtering, or use the Wayback CDX API to discover archived schedule URLs.
  Data terminus for this project is 2026-04-06; the next scheduled FAD
  (2026-04-29) is intentionally excluded from the dates list.
