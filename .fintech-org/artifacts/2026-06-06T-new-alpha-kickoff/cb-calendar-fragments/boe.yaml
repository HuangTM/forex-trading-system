  BoE MPC cadence history:
  - 2010-2016: Monthly, ~12/yr. Announcement Thursday at 12:00 noon.
    Meeting typically Wed-Thu; announcement on the Thursday.
    Exceptions: UK election years (2010, 2015) — May meeting rescheduled to following Monday.
  - Aug 2015: "Super Thursday" reform — IR, minutes, decision published
    simultaneously. Still monthly cadence.
  - 2017 onward: 8/yr on ~6-week cycle (Bank of England and Financial
    Services Act 2016). First 8/yr calendar year = 2017. VERIFIED.

  Election reschedulings (announcement on Monday, not Thursday):
  - 2010-05-10 (Monday): Normal date 2010-05-06 was UK General Election day.
    Meeting ran 10-11 May; announcement on 10 May (Monday).
  - 2015-05-11 (Monday): Normal date 2015-05-07 was UK General Election day.
    Wikipedia: "The May 2015 meeting was similarly delayed."
    Meeting ran 11-12 May; announcement on 11 May (Monday).

  2020 COVID emergency actions (excluded from dates list):
  - 2020-03-11 (Wednesday): Unscheduled emergency cut (0.75% -> 0.25%). Calendar-verified.
  - 2020-03-19 (Thursday): Unscheduled emergency cut (0.25% -> 0.10%). Calendar-verified.
  Scheduled March meeting held 2020-03-26 (Thursday; included in dates list).

