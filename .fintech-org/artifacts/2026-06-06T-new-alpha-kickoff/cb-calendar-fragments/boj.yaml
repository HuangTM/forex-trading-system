source_tier: primary
decision_day_convention: >
  Final day of each MPM (Monetary Policy Meeting). BoJ releases its policy
  statement on the last day of each two-day (occasionally one-day) meeting.
  All dates below are the final/decision day.
cadence_expectation: >
  ~14 meetings/year through 2015; 8 meetings/year from January 2016 onward
  following the October 2015 schedule reform announced at the Oct-30 2015 MPM.
cadence_flags:
  - "2010: 16 meetings (unusually high; BoJ held special/additional sessions)"
  - "2016: 8 meetings (first year of reduced cadence; confirmed)"
  - "2020: 9 meetings (extra May meeting added for COVID response)"
  - "2025: 8 meetings (confirmed)"
  - "2026: 8 meetings scheduled; scope ends 2026-04-06 so only 2 captured (Jan-23, Mar-19)"
unverified_years: []
emergency_dates_excluded: []
notes: >
  All dates sourced from boj.or.jp official MPM schedule/minutes index pages.
  The Oct-2015 MPM reform reduced meetings from ~14 to 8 per year starting 2016.
  2020-03-16 is a scheduled MPM (not emergency) — BoJ held it on schedule;
  the COVID-era extra meeting was May-22-2020.
  Scope cutoff is 2026-04-06; the April-27-28 2026 MPM is after scope and excluded.

