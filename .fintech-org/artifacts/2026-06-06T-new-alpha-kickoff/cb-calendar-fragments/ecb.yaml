# SOURCE TIER EXPLANATION:
# The ECB key interest rates page (stats/policy_and_exchange_rates/key_ecb_interest_rates)
# is official-primary. It was successfully fetched and returned a complete table of
# rate-change effective dates. Decision dates for meetings where rates changed are
# verified-official by converting effective date → decision date (effective = decision + 6 days;
# ECB meets on Thursday, rates take effect the following Wednesday).
#
# Meetings where NO rate change occurred cannot be verified from the rates table.
# Those dates remain provenance: training-memory-unverified.
#
# All other ECB URL fetches returned only landing-page text — no structured date tables.
# archive.org fetches failed (tool blocked).

verification_method: |
  Primary: ECB key interest rates official table (fetched 2026-06-06).
  Rates table lists effective dates (Wednesday after each decision Thursday).
  Decision date = effective date - 6 days (consistent across all verified years).
  Cross-check: Wikipedia ECB article confirmed Jul 21 2022 (TPI announcement date).
  Secondary: No alternative primary source reached for non-rate-change meetings.

