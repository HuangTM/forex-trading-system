    All 30 rate-change decision dates in the fragment match official effective dates exactly when +6 applied.
    NO corrections required.
  - archive.org: blocked by tool (cannot fetch web.archive.org).
  - ECB year-listing pages (/press/govcdec/mopo/YYYY/html/): all 404.
  - ECB monetary policy accounts listing: returned landing page only, no date tables.
  - ECB forward calendar (/press/calendars/mgcgc/html/): returned 2026–2028 future dates only.
  - Wikipedia ECB article: no systematic meeting schedule table; confirmed Jul 21 2022 TPI announcement.

  ECB cadence history:
  - 2010–2014: ~monthly, typically first Thursday. August omitted each year → 11/yr.
  - 2014-07-03: ECB announced switch to 6-week (8/yr) cycle effective Jan 2015.
  - 2015–present: 8 per year.

  2020-03-12 note: This was both a scheduled meeting AND the date of a major
  decision (TLTRO/rate measures). The 2020-03-18 emergency PEPP announcement
  was an unscheduled teleconference and is excluded. The scheduled 2020-01-23
  meeting had no rate change but is included as a policy decision date.

  2022 note: ECB changed its January meeting slot — 2022-01-01 was not held;
  instead the first meeting was 2022-02-03. Effectively 8 meetings but shifted.

