  - "2017: First meeting of year on Feb-1 (vs January in most years) — 8 meetings total, cadence unchanged."
  - "2020: 7 scheduled meetings (vs 8 expected) — the March 2020 scheduled meeting was subsumed/replaced by emergency actions on 2020-03-03 and 2020-03-15; the formal March scheduled meeting was cancelled and rolled into emergency actions. Source: fomchistorical2020.htm explicitly shows only 7 scheduled-meeting statements."
