source_tier: primary
decision_day_convention: >
  Day of the RBA Board (or Monetary Policy Board from March 2025) meeting at which
  the cash rate decision is announced. Decisions released ~2:30pm AEST.
  Minutes published two weeks after each meeting.
cadence_expectation: >
  11 meetings/year (monthly except January) through 2023;
  8 meetings/year from February 2024 onward following the Board restructure.
cadence_flags:
  - "2020: 12 meetings (extra off-cycle emergency meeting 2020-03-18 EXCLUDED; scheduled count = 11)"
  - "2020-03-18: Emergency COVID cut held between scheduled meetings — excluded per anti-fab rules"
  - "2024: first year of 8/year cadence (confirmed)"
  - "2025: RBA Board renamed Monetary Policy Board from 2025-03-01; cadence unchanged at 8/year"
  - "2026: scope ends 2026-04-06; May-5 meeting excluded (after cutoff)"
unverified_years: []
emergency_dates_excluded:
  - "2020-03-18"  # Emergency inter-meeting rate cut (COVID-19); appeared in minutes index but is off-cycle
notes: >
  All dates sourced year-by-year from rba.gov.au Board Minutes index pages.
  2020 minutes page listed 12 entries including the 2020-03-18 emergency meeting;
  that date is excluded and flagged. Scheduled 2020 count = 11.
  Scope cutoff is 2026-04-06; 2026-05-05 meeting excluded.
  The RBA Board was renamed the Monetary Policy Board effective 2025-03-01.

