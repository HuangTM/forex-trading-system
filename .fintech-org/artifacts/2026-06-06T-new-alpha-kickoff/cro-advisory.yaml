assumptions:
  - "I interpret 'risk to the FIRM' as multiplicity/denominator risk + process/bandwidth risk + sunk-effort + concentration — NOT P&L or missed-edge, per the explicit risk-lens-only instruction."
  - "Decay-clock risk is treated as the WEAKEST firm-risk axis here because it bears on expected edge (P&L), which is outside my adjudication mandate; I note it but do not let it drive the ranking."
  - "size-reduced at the deliverable level = approve the wave's non-trial-consuming acquisition (B) while holding the trial-budget multiplier at 0.0; this is consistent with the task's stated size_multiplier semantics."
  - "The frozen confirmatory test's DSR input-N being frozen means A/B/C this wave cannot harm THAT test's own significance directly; the harm channel is the org-wide counter used by FUTURE tests, which I weight accordingly."
