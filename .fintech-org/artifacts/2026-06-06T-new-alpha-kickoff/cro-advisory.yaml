confidence: high

body: >
  Risk-lens ranking, firm-not-P&L: C < B < A (C lowest risk). The dominant
  firm-level risk is MULTIPLICITY — 0 validated OOS in 40 trials, honest-N=11,
  and an org-wide counter that monotonically inflates the Deflated-Sharpe
  denominator for every unsettled and future result. The scarcest, most
  IRREVERSIBLE resource in play is the counter increment; the cheapest,
  fully-reversible action available is Option B's near-zero-cost public-data
  acquisition. First-principles: never spend the irreversible resource before
  the reversible information-gathering that would inform whether to spend it at
  all. Option A does exactly the wrong thing — it commits the single authorized,
  irreversible increment on a thin-N (~190 events), claim-untested,
  already-decaying (~35%), single-mechanism (deepening the 6-of-9 mean-reversion
  concentration) candidate, ahead of any acquisition. Option A's pre-registration
  discipline is genuinely strong risk hygiene, but hygiene on a trial does not
  reverse the denominator cost of registering it. I therefore set the
  trial-budget multiplier to 0.0 (spend NO trial this wave) while APPROVING
  Option B's acquisition step to proceed in parallel — it consumes no trial,
  cannot breach the 1-trial cap, and gathers decision-relevant data — strictly
  fenced by the 2028 confirmatory-test bandwidth priority (BC-4). If a trial is
  ever spent, it must be the better-powered candidate that has cleared
  pre-registration AND the concentration gate, sequenced after acquisition, and
  one of {T1,T2} only. Binding constraints BC-1..BC-6 attach to whatever
  proceeds. Blowup-analog: research-multiplicity / p-hacking-by-trial-
  accumulation (Harvey-Liu-Zhu cross-section multiplicity), NOT a leveraged
  market blowup — no capital is at risk by construction.

