# ---------------------------------------------------------------------------
# size_multiplier semantics (per task): applied to the TRIAL BUDGET.
#   1.0 = the one authorized trial may be spent THIS wave.
#   0.0 = veto spending any trial this wave.
# I set 0.0: spend NO trial this wave. This is "size-reduced" at the
# deliverable level (I do not veto the wave outright — Option B's
# non-trial-consuming acquisition is approved to proceed), but the
# trial-budget multiplier itself is held at zero.
# ---------------------------------------------------------------------------

option_risk_ranking:
  - option: C
    rank: 1
    risk_to_firm: lowest
    basis: >
      Register nothing. Counter stays at 40; the Deflated-Sharpe denominator
      for the frozen confirmatory test's FUTURE org-wide-counter dependency
      and for every existing archived result is not inflated. With 0 validated
      OOS strategies in 40 trials and honest-N=11, the binding firm-level risk
      is MULTIPLICITY, not missed P&L (the firm is backtest-only, no capital).
      Every new registration is a strictly monotone increase in the
      multiple-comparisons burden carried by results that have not yet cleared.
      The only cost of C is passive decay-clock exposure on two anomaly
      classes — but decay is a P&L/edge concern, explicitly outside the risk
      lens, and Option C leaves ALL optionality intact (both candidates remain
      registrable later at a moment of the firm's choosing). Lowest denominator
      risk, lowest process risk, zero sunk-effort risk, zero concentration add.

  - option: B
    rank: 2
    risk_to_firm: low-moderate
    basis: >
      Acquire the public central-bank-decision-date dataset FIRST; defer any
      T2 registration. Acquisition burns NO trial and does NOT move the counter
      (counter stays 40 until/unless T2 registers), so it adds ZERO multiplicity
      risk this wave. Its only firm-risk is SUNK-EFFORT: ~constructible at
      near-zero cost from official public sources, so the sunk-effort exposure
      is small and bounded. Process risk: it consumes single-track research
      bandwidth, which competes with the standing 2028 confirmatory-test runner
      + supplementary-receipt build — this is the real constraint to fence (see
      binding_constraints). B is ranked BELOW C only because it spends bandwidth
      and effort; it is ranked ABOVE A because it defers the irreversible
      counter increment and gathers decision-relevant data before committing a
      denominator-consuming registration. B preserves the option to NOT register
      T2 if screening fails — optionality retained.

  - option: A
    rank: 3
    risk_to_firm: highest
    basis: >
      Register T1 now → counter 40→41 IRREVERSIBLY, inflating the
      Deflated-Sharpe denominator for all existing/future results including the
      frozen confirmatory test's future-counter dependency. This is committing
      the single authorized trial of the wave BEFORE the cheaper, no-trial
      data-acquisition (B) has been done — i.e., spending the scarcest,
      most-irreversible resource first. ~190 effective monthly events is a thin
      event count for an edge claimed only in tens-of-bps against ~1.5 pip
      round-trip cost (claim UNTESTED). The anomaly class is PUBLISHED with a
      documented ~35% post-publication decay, so the expected surviving edge is
      already mechanically discounted. The pre-registration discipline (single
      window+pair-set, split-halves 2010-17/18-26, post-2015 kill sub-window,
      liquidity-gate overlay) is GOOD risk hygiene and materially de-risks A
      relative to an un-pre-registered trial — but it cannot undo the
      irreversible counter increment, the thin-N, or the concentration concern.
      Highest denominator risk + highest sunk-irreversibility + feeds the
      mean-reversion concentration flag (prior screen: 6 of 9 survivors are
      mean-reversion-flavored; committing another single-mechanism trial deepens
      single-mechanism concentration across the future trial book).

binding_constraints:
  - id: BC-1-hard-cap
    text: >
      max_new_trials_authorized_this_wave = 1 is a HARD CONSTRAINT, not a target.
      At most ONE registration may increment the org-wide counter this wave.
      Under my recommendation the count actually spent is ZERO (size_multiplier
      0.0); the cap is the ceiling, not the floor.
  - id: BC-2-sequencing
    text: >
      Sequence acquisition BEFORE registration. Option B's dataset acquisition
      must complete and T2 must clear pre-registration screening BEFORE any
      counter-incrementing registration is considered. Do not spend the
      irreversible counter increment ahead of the reversible, near-zero-cost
      data gather.
  - id: BC-3-no-double-spend
    text: >
      A and B-as-registration (T2) are MUTUALLY EXCLUSIVE this wave. The cap is
      1 and I am holding it at 0; registering T1 (A) AND T2 (B) in the same wave
      is forbidden regardless. Only ONE of {T1, T2} may ever consume the single
      authorized increment, and not this wave under this advisory.
  - id: BC-4-2028-firewall
    text: >
      The standing 2028-10-06 frozen confirmatory test (runner + supplementary
      receipt build) has PRIORITY claim on single-track bandwidth. No new-alpha
      activity (including Option B acquisition) may displace, delay, or consume
      bandwidth needed to have that runner + receipt BUILT before 2028-10-06.
      If acquisition work threatens that deadline, acquisition yields.
  - id: BC-5-concentration-gate
    text: >
      Before ANY future registration consuming the increment, require an
      explicit mechanism-class diversification check against the standing flag
      that 6 of 9 surviving candidates are mean-reversion-flavored. A new
      mean-reversion-flavored trial must clear a concentration justification;
      mechanism diversity is a registration precondition, not an afterthought.
  - id: BC-6-pre-reg-immutability
    text: >
      If/when a trial is eventually registered, the pre-declared window,
      pair-set, split-halves boundaries, post-2015 kill condition, and
      liquidity-gate overlay are FROZEN at registration. No post-hoc relaxation
      of the kill condition or window after seeing results (standard
      pre-registration integrity).

regime_flags:
  - flag: published-anomaly-decay
    note: >
      Option A anomaly class is PUBLISHED with documented ~35% post-publication
      decay. Expected surviving edge is mechanically reduced; structured fact.
  - flag: post-2015-structural-break
    note: >
      Option B anomaly class is PUBLISHED with a documented structural break —
      the pre-announcement component "essentially disappeared after 2015". A
      pooled ~900-event T2 spanning 2010-2026 mixes pre- and post-break regimes;
      any future T2 screening MUST segment at the 2015 break, not pool blindly.
  - flag: thin-event-count
    note: >
      Option A ~190 effective monthly events is a thin sample for a tens-of-bps
      edge vs ~1.5 pip cost; low power, wide CI on any estimated edge.
  - flag: mean-reversion-concentration
    note: >
      Prior screen: 6 of 9 surviving candidates are mean-reversion-flavored —
      single-mechanism concentration risk across the future trial book.
  - flag: untested-edge-claim
    note: >
      Option A gross per-event edge ("tens of bps") is explicitly CLAIM-UNTESTED
      in the structured facts; treat as unvalidated until screened.
  - flag: zero-validated-oos
    note: >
      0 validated OOS strategies in 40 trials, honest-N=11. Base-rate of success
      observed so far is zero; multiplicity burden is the dominant firm risk.

parallel_acquisition_ruling:
  may_proceed: yes
  basis: >
    Option B's ACQUISITION step (constructing the central-bank-decision-date
    dataset from official public sources) burns NO trial and leaves the
    org-wide counter UNCHANGED (it moves only if/when T2 registers). Therefore
    it does NOT consume the single authorized trial increment and CANNOT violate
    the max-1-trial cap, even if it runs alongside other prep work. It may
    proceed in parallel — SUBJECT TO BC-4: it must not displace bandwidth
    required to build the 2028 confirmatory-test runner + supplementary receipt
    before 2028-10-06. Acquisition is approved; T2 REGISTRATION is NOT approved
    this wave (that would consume the increment and is gated behind BC-2/BC-5).

blowup-analog: >
  "p-hacking-by-trial-accumulation / multiple-comparisons mining" — the
  Harvey-Liu-Zhu (2016) "...and the Cross-Section of Expected Returns" pattern,
  where an org accumulates registered trials against a fixed/known data history
  and the multiple-testing denominator silently erodes the significance of every
  result. The firm-level analog of LTCM-style over-confidence is NOT present
  here (no leverage, no capital), so the precise analog is the QUANT-RESEARCH
  multiplicity trap, not a market blowup. Option A is the move that most
  resembles it (spend the irreversible increment first); C and B-acquisition
  avoid it.

