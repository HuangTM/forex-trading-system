# ─────────────────────────────────────────────────────────────────────────────
# FAILURE MODES CONSIDERED
# ─────────────────────────────────────────────────────────────────────────────
failure_modes_considered:
  - id: FM-1
    label: Frozen-receipt contamination via constant reuse
    description: >
      A QRB-3 runner that accidentally imports SR0_PP from r5_decision.py (0.022906)
      or the confirmatory threshold (0.034921) would apply the wrong pre-registered
      threshold to QRB-3's result. This is a silent correctness failure — the result
      YAML would report a decision, but against the wrong benchmark. The cut_freeze_receipt.py
      sr0_note guard catches this at receipt-cut time only if the runner reads from
      the receipt; a runner that hard-codes the wrong constant bypasses the guard.
    mitigation: >
      Condition C2 above. The quant-developer MUST source all QRB-3 thresholds from
      QRB-3's own pre-registration document; the runner must validate against the
      QRB-3 receipt, not the R5 or confirmatory receipts.
    severity: blocking if triggered

  - id: FM-2
    label: Pre-registration data snooping (receipt cut after return examination)
    description: >
      If the QRB-3 pre-reg .md is drafted, then return data is informally inspected
      to "check if the signal looks reasonable," and THEN the receipt is cut, the
      pre-registration integrity is void even though the protocol appears to have been
      followed. This is the highest-risk failure mode for a small firm running sequential
      trials — the temptation to "just look" before committing is high.
    mitigation: >
      Condition C1 above. The orchestrator must enforce the order: pre-reg draft →
      consensus ratification → CEO sign-off → receipt cut → commit → THEN any data
      access. The fact that QRB-3 uses EXISTING data (no new acquisition) makes the
      temptation higher, not lower — the data is already on disk.
    severity: blocking if triggered (voids pre-registration)

  - id: FM-3
    label: Calendar file look-ahead via date-matching error
    description: >
      If cb_decision_dates.parquet contains decision dates but the date-matching
      logic aligns the signal with the SAME bar as the decision (bar T) rather than
      the bar AFTER (bar T+1 per entry_delay_bars=1), any pre-decision drift captured
      would be contaminated by the announcement return itself. This is a
      look-ahead bug at the join level, not in the strategy compute logic.
    mitigation: >
      Condition C5 above. The OHLCV alignment check must include a specific test
      that the signal at bar T (decision date) uses only information available at
      bar T-1 close. This parallels the existing test_no_lookahead sacred test in
      the backtest engine.
    severity: blocking if triggered (invalidates QRB-6 backtest)

  - id: FM-4
    label: DSR denominator pressure from premature Option B trial registration
    description: >
      If QRB-6 is acquired AND then immediately pre-registered in the same wave as
      QRB-3, the trial counter increases by 2 in one wave. HoQR already established
      max_trials_this_wave = 1 with explicit DSR-denominator rationale (honest-N=11,
      0 validated OOS alpha). Registering QRB-6 this wave would tighten the bar on
      QRB-3's ongoing test and on all previously registered trials.
    mitigation: >
      The parallelism ruling is explicit: Option B acquisition does NOT constitute a
      trial registration. QRB-6 advances to first candidate in the NEXT wave. The
      acquisition work in Option B is a data-file PR, not a trial registration event.
      The quant-developer must not cut a QRB-6 freeze-receipt until a future wave's
      consensus ratifies it.
    severity: high if triggered

  - id: FM-5
    label: Calendar provenance gaps discovered at pre-registration time
    description: >
      If the CB calendar is acquired without a per-row provenance log and the future
      wave's NHT auditor asks "how do we know date X is correct for bank Y?", the
      firm cannot answer. A calendar with gaps in provenance cannot be used as a
      pre-registered data source without re-acquisition (which resets the SHA-256
      and requires re-consensus).
    mitigation: >
      Condition C4 above (provenance log built during acquisition, not retroactively).
      The SHA-256 of the final parquet is pinned at construction time and recorded in
      the provenance log; any subsequent correction to the file changes the SHA-256
      and requires a new PR + new provenance entry.
    severity: moderate (delays QRB-6 pre-registration by one wave)

