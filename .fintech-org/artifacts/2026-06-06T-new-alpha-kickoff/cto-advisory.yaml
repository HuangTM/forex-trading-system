# ─────────────────────────────────────────────────────────────────────────────
# OPTION B: QRB-6 CB calendar acquisition
# ─────────────────────────────────────────────────────────────────────────────
option_b_assessment:

  vendor_ruling: |
    NOT A NEW VENDOR. PR-REVIEW PATH — not red-team + CEO required.

    Basis: The firm's vendor/datastore red-team scope (as applied to prior waves)
    distinguishes between (a) a new ongoing external data relationship introducing
    custody, credential, SLA, cost, or API-surface risk, and (b) a one-time
    hand-construction of a reference file from official public primary sources.
    Central-bank scheduled decision calendars fall unambiguously in category (b):

      - Sources are official government/quasi-government websites
        (federalreserve.gov, ecb.europa.eu, boj.or.jp, bankofengland.co.uk,
        rba.gov.au, bankofcanada.ca, snb.ch, rbnz.govt.nz) plus corroborating
        secondary sources (ForexFactory economic calendar).
      - No API credentials, no subscription, no recurring ingestion pipeline,
        no vendor contract. This is a single file construction event.
      - The output is a static reference CSV/Parquet (scheduled decision dates
        2010–2026, ~900 rows across 8 banks) — structurally identical to a
        hand-curated lookup table, not a live feed.
      - The acquisition effort (curation + UTC normalization + scheduled/emergency
        flagging) is analogous to adding a new pair's historical data from a
        public source — a PR-review action in this firm's prior practice.

    Ruling: calendar file construction routes to quant-developer as a PR.
    CEO authorization of the acquisition intent is still required by the wave
    rules (the CONSENSUS-SUMMARY explicitly gates on it), but the technical
    implementation does not require red-team security review or vendor vetting.
    CEO authorization = "go build this file"; it is not a vendor onboarding action.

  effort: |
    LOW. Routed to quant-developer. Rough scope:

      Curation (~1–2 days):
        - Collect scheduled decision dates for Fed, ECB, BoJ, BoE, RBA, BoC,
          SNB, RBNZ for 2010–2026 from official websites.
        - Cross-validate against ForexFactory economic calendar (secondary source).
        - Flag scheduled vs emergency/inter-meeting decisions.
        - Normalize all dates/times to UTC (key DST discipline: use the announced
          UTC time, not local bank time — same clock discipline as the 4h spread
          profile in the existing codebase).

      File construction (~0.5 days):
        - Output: data/calendars/cb_decision_dates.parquet (see format below).
        - Provenance log alongside file (see provenance_requirements).
        - Unit test: verify no look-ahead against OHLCV date index alignment.

      PR review (~0.5 days): standard code review, no special process.

    Total elapsed: 2–3 working days for a focused quant-developer. No data
    purchase, no API setup, no infrastructure change.

  provenance_requirements: |
    PRE-REGISTRATION INTEGRITY REQUIREMENT. Because QRB-6 will eventually be
    a pre-registered trial, the calendar file is load-bearing evidence. The firm
    must be able to prove the dates are correct at the point of pre-registration
    freeze, not just at construction. Required artifacts:

      1. data/calendars/cb_decision_dates_provenance.yaml — machine-readable log:
           per-row source URL, access date, and verification method (primary site
           vs secondary corroboration). Every date must have a primary-source entry.

      2. Cross-validation report: for each bank, diff between primary-source dates
         and ForexFactory dates; any discrepancy flagged and resolved with
         documentary evidence. The provenance log records the resolution.

      3. SHA-256 of the final cb_decision_dates.parquet recorded in the provenance
         log at construction time. When the QRB-6 pre-registration is frozen, the
         freeze-receipt will pin this SHA-256 alongside the pre-reg SHA-256 and
         code commit — establishing an unbroken chain from raw dates to registered
         test.

      4. OHLCV alignment check: a script verifying no cb_decision_dates entry falls
         on a non-trading day in the OHLCV index (i.e. no look-ahead violation from
         date-matching). This must be documented and archived alongside the file.

      The ~65% post-announcement reversal figure cited in the QRB-6 proposal is
      explicitly UNVERIFIED (NHT binding condition 2 adopted). The provenance log
      must NOT record this as a verified datum; the pre-registration must not use
      it as a point target.

  format_recommendation: |
    Consistent with data/ conventions (Parquet, UTC DatetimeIndex):

      Path: data/calendars/cb_decision_dates.parquet
      Schema:
        decision_date: date (UTC, no intraday time — the decision window is computed
                       from daily OHLCV bars, not intraday ticks)
        bank: str  (e.g. "FED", "ECB", "BOJ", "BOE", "RBA", "BOC", "SNB", "RBNZ")
        scheduled: bool  (True = pre-scheduled; False = emergency/inter-meeting)
        pair_scope: str  (pipe-separated affected pairs, e.g. "EURUSD|GBPUSD")
        source_url: str  (primary source URL; denormalized for auditability)

      Companion provenance log: data/calendars/cb_decision_dates_provenance.yaml
      (not a Parquet — human-readable audit trail).

      Rationale for Parquet: consistent with all other data/* files; supports
      pandas read_parquet with the existing data pipeline; SHA-256 is stable
      (binary content is deterministic given the same schema and row order;
      document the sort order: bank ASC, decision_date ASC).

# ─────────────────────────────────────────────────────────────────────────────
# PARALLELISM RULING
# ─────────────────────────────────────────────────────────────────────────────
parallelism_ruling: |
  PARALLEL — NO TECHNICAL CONFLICT. Options A and B can proceed simultaneously.

  Shared blast radius: NONE. The QRB-3 pre-registration track touches
  src/forex_system/strategies/, scripts/cut_freeze_receipt.py, and
  references/pre-registrations/. The QRB-6 calendar acquisition touches only
  data/calendars/ (a new directory with no existing content). There is no file
  overlap. The trial counter (.fintech-org/trials.jsonl) is incremented only
  when a freeze-receipt is cut for QRB-3, not during Option B acquisition work —
  so Option B creates no DSR-denominator pressure until QRB-6 is eventually
  pre-registered in a future wave.

  One caveat: if the QRB-3 pre-registration draft (Strategy class + pre-reg .md)
  is under active review at the same time the quant-developer is building the
  calendar file, there is no code conflict — different files, different developers.
  The only coordination point is the wave rule: the current wave's max_trials = 1
  (QRB-3 only). Option B's calendar acquisition does NOT constitute a trial
  registration and does NOT count against this wave's trial budget. QRB-6
  advances to first candidate in the NEXT wave, separately ratified.

