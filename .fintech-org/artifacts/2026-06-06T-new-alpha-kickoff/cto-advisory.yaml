# OPTION A: QRB-3 pre-registration track — architecture/effort/blast-radius
# ─────────────────────────────────────────────────────────────────────────────
option_a_assessment:

  effort: |
    INCREMENTAL — LOW. The only net-new code surface is a turn-of-month signal
    harness: a new Strategy subclass (e.g. TurnOfMonthStrategy) implementing the
    Strategy ABC (src/forex_system/core/interfaces.py), registered in
    scripts/strategies/registry.py. The signal computation is a pure function on
    the OHLCV DatetimeIndex already available in data/processed/*_daily.parquet —
    no new data ingestion. Rough estimate: 80–150 LOC for the strategy class +
    a pre-registration .md + a sidecar .triggers.yaml (both templated from the
    r5/confirmatory track). The freeze machinery (cut_freeze_receipt.py) requires
    one new entry in the _TARGETS dict (~15 LOC) with a new target name (e.g.
    "qrb3"). The run harness (run_backtest.py, run_falsification_trial.py) is
    reused without modification — the strategy factory pattern absorbs new
    strategies without touching the engine.

    The conditioning equity proxy for v2 (cross-pair FX-bloc return) is derivable
    from existing parquet closes — no new acquisition. The QRB-2 spread-gate
    overlay (pre-registered as a modifier, not a separate trial) reuses
    data/spreads/*_daily_spreads.parquet already validated.

  reuse: |
    HIGH reuse of the complete R5/confirmatory pre-registration and run machinery:

      - scripts/cut_freeze_receipt.py: add one _TARGETS entry, no other change.
      - scripts/run_r5_step4.py pattern: a QRB-3-specific runner follows the same
        gate structure (--i-am-runner + --freeze-receipt required; SHA-256 receipt
        validation; one-shot write-once result YAML).
      - src/forex_system/harness/preregistration.py: no change — the PreRegistrationSpec
        dataclass and .triggers.yaml sidecar pattern are reused verbatim.
      - src/forex_system/harness/reality_check.py (Politis-White + White RC):
        reused. QRB-3 will need a block-bootstrap on the ~190 month-turn return
        series; the existing r5c_hansen_spa / politis_white_block_length_multivariate
        functions are already generic.
      - src/forex_system/backtest/ (vectorized engine + metrics): zero change.
        The engine already handles arbitrary Strategy.generate_signals() outputs.
      - The .triggers.yaml sidecar pattern established for all 17 existing
        pre-registrations is reused for QRB-3.

    Net-new: one Strategy subclass, one pre-reg .md, one .triggers.yaml, one
    _TARGETS entry in cut_freeze_receipt.py, one runner script (~200–300 LOC total).

  blast_radius_to_frozen_artifacts: |
    ZERO — by construction. The frozen artifacts are pinned by content SHA-256 and
    git commit reference. Two existing frozen receipts are:

      references/pre-registrations/r5_carry_universe_kill_test.FREEZE-RECEIPT.yaml
        prereg_sha256: c7780f3d...  code_commit: 350cbd4b...
      references/pre-registrations/r5_confirmatory_vol_target_carry_usdjpy.FREEZE-RECEIPT.yaml
        prereg_sha256: c40c6ad7...  code_commit: f0d10546...

    Guarantee mechanism: cut_freeze_receipt.py has a write-once guard (sys.exit(1)
