# CONFIDENCE AND BODY
# ─────────────────────────────────────────────────────────────────────────────
confidence: high

body: |
  ## CTO Architecture Summary

  ### Option A (QRB-3): APPROVE WITH CONDITIONS

  The pre-registration track for QRB-3 is architecturally sound and low-risk.
  The entire machinery — freeze-receipt protocol, bootstrap harness, backtest engine,
  Strategy ABC, pre-reg + sidecar pattern — already exists from two completed tracks
  this week (R5 kill-test, R5-confirmatory). Option A is almost entirely a matter of
  writing one Strategy subclass (~100 LOC) and wiring it into existing infrastructure.

  The only blast-radius concern — protecting the two frozen receipts (R5 at commit
  350cbd4b; confirmatory at commit f0d10546) — is handled by the write-once guard
  already present in cut_freeze_receipt.py. The CTO's additional condition (C2)
  closes the only gap the existing guard does not cover: the wrong-constant
  contamination risk from a developer who reaches across trial boundaries for
  "convenience." This is a known failure mode in multi-trial harnesses; it is
  enumerated and mitigated, not assumed away.

  Rollback is trivially clean: all Option A changes are additive new files.

  ### Option B (QRB-6 Calendar Acquisition): APPROVE FOR ACQUISITION

  Vendor ruling is clear and non-controversial: official central-bank websites
  are public primary sources. Constructing a reference file from them is a
  data-file PR, not a vendor onboarding. The CEO authorization required by wave
  rules is an intent gate, not a security gate.

  The acquisition effort is genuinely low (2–3 days quant-developer time).
  The provenance requirements are non-negotiable for pre-registration integrity —
  they are specified precisely because the failure mode (retroactive provenance
  reconstruction) is a real temptation and a real integrity gap.

  ### Parallelism: YES, with no shared blast radius

  A and B touch different files, different developers, no shared resources.
  Option B does not increment the trial counter and creates no DSR-denominator
  pressure. They can proceed simultaneously the moment the CEO authorizes both.

  ### What the CTO did not do

  Signal design, statistical assessment, cost modeling, and the actual calendar
  construction work are explicitly not CTO scope. The routing is clear:
  quant-developer for both build tasks, under conditions C1–C5.

