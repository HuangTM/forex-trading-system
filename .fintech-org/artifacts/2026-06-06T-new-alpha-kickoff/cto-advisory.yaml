  rollback: |
    CLEAN. Option A introduces only additive changes:
      - New strategy class: delete the file, remove registry entry.
      - New pre-reg .md + .triggers.yaml: delete files (pre-reg is only binding
        if the freeze-receipt is also cut — no receipt = no commitment).
