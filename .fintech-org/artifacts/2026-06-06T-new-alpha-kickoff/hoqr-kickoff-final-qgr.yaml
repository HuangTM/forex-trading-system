body: >
  Quality gate review of the full new-alpha kickoff package (proposals → screen → rubric →
  ranking → independent review). The package is internally consistent and process-clean
  across all load-bearing checks: six ranked-candidate weighted totals are arithmetically
  exact, the first-candidate bar was applied from the frozen rubric without post-hoc
  modification, NHT conditions are adopted verbatim, all three portfolio preconditions are
  honored, and the wave produced no performance computation and no trial-counter increment.
  The recommendation (QRB-3, one trial, max-trials=1) is substantive, not manufactured;
  the no-spend alternative was explicitly evaluated and documented.

  Both mechanical corrections are ratified: the arithmetic errors on three overlay/roadmap
  rows derive from my own scores and frozen weights, the hand-verification confirms the
  orchestrator totals (QRB-4=3.62, QRB-6=4.38), and neither correction touches eligibility
  or the first-candidate decision.

  On PR-F1 (the one judgment I must own): the mechanism_quality=4 for QRB-3 rests on
  the mandate-as-constraint distinction — passive index-fund mandates force month-end
  FX hedging regardless of price, satisfying anchor-4's "inelastic hedging need" clause
  in a way that behavioral or discretionary rebalancers do not. The 4 is consistent with
  how all other mechanism scores were applied (QRA-1/2/5 all received 3 for lack of a
  structural constraint). However, I acknowledge on the record that the rubric's own
  level-3 exemplar names "month-end rebalancers," that a reasonable scorer could read
  the mechanism as landing at 3 rather than 4, and that such a reading would collapse
  the recommendation to NO-SPEND. This single-judgment sensitivity is disclosed to the
  CEO. I adopt PR's recommendation to add a mandatory post-2015 sub-window kill condition
  to QRB-3's pre-registration (2015-2026 in isolation, in addition to the 2010-2017 vs
  2018-2026 half-split), consistent with the cross-cutting post-2015 stability requirement
  the NHT applied to QRB-4 and QRB-6. This is the sharpest available procedural hedge
  against the mechanism-boundary risk.

  Decision: APPROVE. The package advances to CONSENSUS sign-off with the arithmetic
  corrections in place, the ordering correction ratified, and the post-2015 isolation
  test added as a mandatory QRB-3 pre-registration kill condition.

