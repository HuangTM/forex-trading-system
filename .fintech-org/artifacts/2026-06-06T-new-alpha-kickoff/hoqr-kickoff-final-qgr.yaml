pr_f1_response:
  mechanism_4_basis: >
    The 3→4 boundary for QRB-3's mechanism_quality turns on one distinction: whether
    "month-end rebalancers" are a named counterparty with weak persistence (anchor 3's
    own exemplar) or a named counterparty with a CONSTRAINT that forces continued
    price-insensitive losses (anchor 4's "mandate, regulatory cadence, inelastic hedging
    need"). I scored 4 because the mechanism is specifically passive index-tracking funds
    operating under benchmark mandates — not generic hedgers or calendar traders who
    could opt out. The mandate is the constraint: a fund tracking the MSCI or Barclays
    index cannot defer its month-end FX hedge regardless of prevailing FX price; it is
    structurally inelastic. Anchor 3's level-3 exemplar names "month-end rebalancers"
    in the generic sense (i.e., any flow that tends to occur at month-end, including
    behavioral or discretionary rebalancers); anchor 4's "inelastic hedging need" is
    what the passive-index-fund mandate satisfies. The distinction is genuine and
    consistently applied — QRA-1/2/5's behavioral counterparties (retail momentum-
    chasers, end-of-day mark-to-market flows, Asian risk-flow) each received 3 precisely
    because they lack the structural constraint that prevents P&L optimization. The
    basis is the mandate = constraint framing, not a generous read of the mechanism's
    persistence.
  no_spend_flip_acknowledged: true
  no_spend_flip_statement: >
    Explicitly acknowledged: if a reasonable scorer places QRB-3's mechanism at 3 (reading
    "month-end rebalancers" as falling within the rubric's own level-3 exemplar, with the
    mandate distinction insufficient to cross to level 4), the first-candidate bar is not
    cleared, the ranked candidates section has no bar-clearer, and the correct recommendation
    is NO-SPEND THIS WAVE per the rubric's explicit provision. This single-judgment
    sensitivity — the recommendation is one 3-vs-4 call away from a materially different
    terminal outcome — is disclosed to the CEO and PM. It is concentrated model risk, not
    an arithmetic or process error, and the package does not conceal it; but the PR is
    correct that it was not surfaced as prominently as it should be for a load-bearing
    boundary call of this consequence.
  decay_test_adopted: adopted
  decay_test_basis: >
    PR's inversion check recommends QRB-3's pre-registration borrow QRB-6's post-2015
    isolation test (2015-2026 in isolation, not just two disjoint halves of 2010-2026),
    because the McLean-Pontiff/Melvin-Prins publication break is in 2015 and a midpoint
    half-split (2010-2017 vs 2018-2026) does not cleanly test whether the effect was
    already decaying pre-2017. This recommendation is adopted. Basis: (1) my own NHT
    adopted the sharper post-2015 isolation test as a binding condition for QRB-6 for
    exactly this structural-break reason; the cross-cutting post-2015 stability theme
    appeared in 3 of the batch's NHT conditions; (2) QRB-3's stability-across-halves
    condition (2010-2017 vs 2018-2026) is necessary but not sufficient — it does not
    test the 2015 endpoint cleanly; a proposal published in 2015 whose effect persists
    only 2010-2015 would pass the half-split sign-check if the 2015-2017 subperiod is
    included in the first half; (3) the incremental cost is trivial (same backtest, same
    pre-registered window, subset the date range); (4) the downside of not adopting it
    is registering a trial that passes the half-split test but fails a sharper post-2015
    check that was foreseeable at pre-registration — a wasted trial. MANDATORY ADDITION
    to QRB-3's pre-registration obligations: an explicit post-2015 sub-window stability
    test (2015-2026 alone) as a KILL condition, in addition to the existing 2010-2017
    vs 2018-2026 half-split. Both must pass; either failing kills the trial.

