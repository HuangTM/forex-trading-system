  - >
    The BOE date-quality risk (7-day shift errors in 2010–2018, 2020–2024) cannot be
    resolved without direct access to the official BoE MPC minutes PDFs (which
    returned 403 during acquisition). The pre-registration must pre-commit to a
    BOE-exclusion sensitivity analysis.
  - >
