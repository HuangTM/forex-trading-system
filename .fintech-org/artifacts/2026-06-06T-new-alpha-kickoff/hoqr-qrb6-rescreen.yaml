body: |
  ## Summary of the Re-Score

  The CB decision-date calendar acquisition changes exactly two dimensions for QRB-6:
  data_readiness (2 → 4 in both scenarios) and statistical_tractability (5 → 4 in
  Scenario A, unchanged 5 in Scenario B). All other dimensions are unchanged. The
  weighted totals are:

    Scenario A (verified-official only, 528 events): 4.36
    Scenario B (verified + aggregator, 799 events): 4.48

  QRB-3 (unchanged): 4.02

  QRB-6 clears the first-candidate bar under both scenarios. QRB-3 also clears.
  QRB-6 is the recommendation.

  ## Why data_readiness lands at 4, not 5

  Anchor 5 requires "available now AND already clean/validated in the pipeline,
  zero ingestion risk." The parquet exists and is verified. However: (a) it has not
  been run through the existing backtest pipeline (zero ingestion risk cannot yet be
  claimed without a test run); (b) the BOE date-quality residual caveat prevents a
  clean Anchor 5 claim. Score 4 is the honest assessment.

  ## Why statistical_tractability drops to 4 in Scenario A

  Anchor 5 requires "cross-section provides independent replicas." In Scenario A,
  BOC is absent 2010–2018, creating an asymmetric bank pool across the 2015 structural
  break: 3 banks pre-2015 vs 4 banks post-2015. This confounds the structural break
  test — the addition of BOC post-2015 is not the same as a structural decay of the
  pre-FOMC drift. Anchor 4 (good effective N, adequate for honest OOS DSR test) still
  applies cleanly; Anchor 5 does not. Score 4 is the honest call.

  ## The structural break risk is the same for QRB-6 and QRB-3

  Both proposals face a circa-2015 structural break as their central kill risk:
  QRB-6 (pre-FOMC drift "disappeared after 2015" per NHT carried-forward finding);
  QRB-3 (McLean-Pontiff decay from 2015-published Melvin & Prins effect). The rubric
  does not penalize QRB-6 for this more than QRB-3; the post-2015 stability test is
  a mandatory NHT binding condition for QRB-6, and the stability-across-halves test
  is a mandatory NHT binding condition for QRB-3. The kill machinery is equivalent.
  QRB-6 answers the question with more events and more banks.

  ## The single-trial constraint is unchanged

  Max 1 trial this wave. QRB-6 is the recommended trial. QRB-3 is the queued
  runner-up for wave N+2. No other proposal advances.

