    Lucca-Moench paper measured it) has not been empirically verified at this firm.
    This is the central unknown — the mandatory post-2015 sub-window test in the
    pre-registration will answer it.
  - >
    The ~65% post-announcement reversal figure is unverified (NHT: WebFetch 403 to
    NY Fed and ResearchGate). Must not be used as a pre-registered target.

