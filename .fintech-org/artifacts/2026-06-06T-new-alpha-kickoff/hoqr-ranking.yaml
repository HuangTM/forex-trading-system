recommendation:
  first_candidate: QRB-3
  verdict: APPROVE_FOR_PRE_REGISTRATION
  basis: 'QRB-3 (Turn-of-month rebalancing flow) is the ONLY surviving proposal that clears ALL requirements of
    the first-candidate bar: mechanism=4 (passive index-tracking fund mandate forces price-insensitive FX hedging
    at month-end; named, constrained, documented counterparty); novelty=4 (no archived family conditions on day-of-month;
    NHT PASS); cost=4 (one trade per month, 2-3 pip round-trip vs documented tens-of-pip month-end moves; best cost
    profile in the batch per NHT; low swap drag); stat=4 (~190 independent month-turns; strongest effective-N in
    batch per NHT; adequately powered for White block-bootstrap); falsifiability=4 (single pre-registered window,
    single pair-set, v1/v2 pre-competing contrast, mandatory stability-across-halves); data=5 (available-now from
    OHLCV timestamps; zero acquisition risk); all dims ≥3. It is the only proposal where the mechanism anchor is
    a genuine structural mandate (not a behavioral story), cost is demonstrably adequate even under partial McLean-
    Pontiff decay, and statistical power is the highest available without acquisition. The McLean-Pontiff decay
    risk is real (effect published 2015, partially pre-traded by FX desks) but is a risk to be tested, not a disqualifier
    — the post-publication stability test is pre-registered as a mandatory kill condition.

    '
  nht_conditions_adopted:
  - '[QRB-3 NHT Binding Condition 1] Must pre-register EXACTLY ONE window definition (e.g., last 2 + first 1 trading
    days) and EXACTLY ONE primary pair-set BEFORE any return data is examined. Testing multiple window lengths or
    pair subsets and selecting ex-post consumes the ~190-event budget faster than the bootstrap can correct for.

    '
  - '[QRB-3 NHT Binding Condition 2] The v1 (fixed long-USD bias) and v2 (equity-proxy conditioned) must be declared
    as PRE-COMPETING hypotheses with their difference tested as a pre-registered contrast — not as a sequential
    search where v2 is tried if v1 fails.

    '
  - '[QRB-3 NHT Binding Condition 3] The stability-across-halves test (sign consistency 2010-2017 vs 2018-2026)
    is MANDATORY given the McLean-Pontiff decay concern; if the effect flips sign in the second half, it is dead
    regardless of pooled result.

    '
  - '[QRB-3 QRB-2 Overlay Adoption] QRB-2 spread-blowout gate is adopted as a pre-registered modifier: suppress
    month-turn trades when spread_z exceeds a pre-registered threshold (derived from the trailing spread distribution,
    IS-only). This is NOT a separate trial; it is a conditional modifier within the QRB-3 pre-registration.

    '
  mean_reversion_concentration_acknowledgment: 'NHT PORTFOLIO-LEVEL CONCERN ADOPTED: 6 of 9 surviving proposals
    are mean-reversion- flavored. The firm''s archived Bollinger-RSI family shows 0 for 3 on mean-reversion- adjacent
    trials. QRB-3 (the recommended candidate) is NOT mean-reversion — it is a directional calendar-flow signal.
    This is a material advantage: QRB-3 is drawn from the minority of surviving proposals that are NOT in the concentration
    risk class.

    '
  max_trials_this_wave: 1
  max_trials_rationale: 'DSR-DENOMINATOR DISCIPLINE. Current honest-N = 11 trials, 0 validated OOS alpha, trial
    counter at 40 (wc -l of .fintech-org/trials.jsonl). The DSR denominator grows with every registered trial; minimum
    required Sharpe thresholds tighten for ALL trials including previously registered ones. Registering 2+ trials
    simultaneously from this wave would: (a) raise the denominator by 2+, tightening the bar on the ongoing R5 test
    (which is already underpowered per the honest review); (b) consume 2+ weeks of calendar against a firm with
    0 validated OOS alpha; (c) create joint multiple-testing pressure even if trials are run sequentially. The correct
    posture is sequential: register QRB-3 as trial N+1; if it FAILS, retire it and use the result to update priors
    before committing trial N+2. If QRB-3 passes, the firm''s first validated OOS alpha changes the base rate and
    justifies broader spending. Running 9 pre-registrations in parallel would be the single fastest way to inflate
    honest-N to an uninformative level while producing no validated alpha. MAX = 1 this wave.

    '
  no_spend_was_considered: 'The no-spend option was actively evaluated. QRB-3 is the only proposal clearing the
    bar; if it had not cleared, the recommendation would have been NO SPEND THIS WAVE (preserving bandwidth against
    a firm with 0 validated OOS alpha, consistent with the rubric''s explicit provision that "a non-spend is a valid,
    bandwidth-preserving outcome and is preferable to forcing a weak trial"). The bar was NOT lowered to force a
    winner. QRB-3 genuinely clears the bar; the recommendation is substantive, not manufactured.

    '
