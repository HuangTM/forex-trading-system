body: '## Summary


  Nine proposals scored (2 NHT kills excluded). One proposal (QRB-3) clears the

  frozen first-candidate bar. Five others do not clear (QRA-2, QRA-5, QRA-1,

  QRB-1, QRA-4). Two are classified as overlays (QRB-2, QRB-4-GATE) by NHT

  precondition. One is roadmap/acquisition (QRB-6).


  ## Why QRB-3 is the first candidate


  The mechanism is the correct type: passive index-fund mandate forces month-end

  FX hedging regardless of price. This is the "non-information-based, price-insensitive

  flow that must trade" — the textbook mechanism anchor at level 4 in the rubric.

  The cost profile is the strongest in the batch: one trade per month, 2-3 pip

  cost, documented tens-of-pip month-end moves. The statistical power is the

  strongest available without acquisition: ~190 independent month-turns from a

  single pre-registered hypothesis. All five mandatory dimensions (mechanism ≥4,

  novelty ≥4, cost ≥4, stat ≥4, falsifiability ≥4) clear; no dimension is below 3.


  ## Why no other proposal clears the bar


  QRA-2, QRA-5, QRA-1: mechanism scored at 3 (behavioral, no structural mandate

  for the counterparty) — fails the mechanism ≥4 requirement. QRA-5 and QRA-1

  also have cost=2 (below the ≥4 hard requirement). QRB-1, QRA-4: mechanism=2 and

  stat=2 — multiple first-candidate bar failures; also have dimensions below 3.


  ## Portfolio-level mean-reversion concentration


  NHT identified 6 of 9 survivors as mean-reversion-flavored. QRB-3 is directional

  (calendar-flow); this is a structural advantage. The recommended candidate is

  drawn from the non-concentrated minority.


  ## DSR denominator: max 1 trial this wave


  With honest-N=11 and 0 validated OOS alpha, every registered trial raises the

  denominator and tightens all existing thresholds. Sequential testing (QRB-3 first,

  re-evaluate after result) is the only bandwidth-preserving posture. Running 2+

  pre-registrations in parallel would be the fastest path to an uninformative archive.


  ## Roadmap note on QRB-6


  QRB-6 scores 4.07 (highest in the portfolio) and would be the clear first candidate

  if the CB calendar were acquired. The acquisition effort is trivial (public, free

  data, days of curation). The CEO authorization required by wave rules is the only

  barrier. Recommended for CEO consideration immediately; once authorized, QRB-6

  advances to first candidate in the next wave — subject to the mandatory post-2015

  structural decay test (NHT binding condition 1, adopted verbatim).

  '
knowledge_gaps:
- 'Whether the month-end rebalancing effect has survived post-2015 (McLean-Pontiff decay from the 2015-published
  Melvin & Prins paper) is the central unknown — the mandatory stability-across-halves test (2010-2017 vs 2018-2026)
  in the pre-registration will answer this; it cannot be resolved at screening stage.

  '
- 'Exact post-2015 effective-N for QRB-1''s independent policy-step count has not been verified from the rate_differentials
  data (NHT''s "50-90" estimate is first-principles from central-bank meeting frequency). QRB-1''s pre-registration
  condition requires this count to be verified before proceeding.

  '
- 'QRB-6''s ~65% post-announcement FX reversal figure is unverified (WebFetch 403 failures per NHT); this must not
  be used as a pre-registration target.

  '
