# 3. THE FIRST-CANDIDATE BAR  (explicit minimum profile to be RECOMMENDED)
# ════════════════════════════════════════════════════════════════════════════
first_candidate_bar:
  statement: >
    To be the ONE recommended first candidate for full pre-registration, a
    proposal must clear ALL of the following — not "score well on average."
  requirements:
    - "No dimension scores below 3 (no soft spots a trial would expose)."
    - "mechanism_quality >= 4 (a named, constrained, price-insensitive counterparty — not a pattern)."
    - "novelty_vs_archive >= 4 (distinct mechanism; NHT dedup-clean; not carry/momentum/MA/BB/TAS/ORB in disguise)."
    - "cost_survival_plausibility >= 4 (edge >= ~5x the ~1.5pip round-trip floor AND low turnover; survives swap accumulation)."
    - "statistical_tractability >= 4 (effective N — via cross-section pooling or dense bars — can power an honest OOS DSR test; rare-event ideas excluded)."
    - "falsifiability_sharpness >= 3 (a pre-committed, single-backtest kill criterion)."
    - "data_readiness == 4 or 5 (available NOW in the verified inventory; acquisition_required proposals are INELIGIBLE this wave — CEO-only)."
    - "NHT verdict == survive (archive-dedup clean, base-rate not unfavorable-fatal, testable)."
  rationale: >
    The bar is deliberately high because the cost of a wrong first spend is a
    burned trial + weeks of calendar against a firm with zero validated OOS alpha
    and honest-N ≈ 11. If NO proposal clears this bar, the defensible recommendation
    is to recommend the closest-clearing proposal explicitly flagged as
    below-bar, OR to recommend NO spend this wave — a non-spend is a valid,
    bandwidth-preserving outcome and is preferable to forcing a weak trial.

