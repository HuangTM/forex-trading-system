body: |
  ## Why mechanism + two gates carry the weight

  The firm's edge so far is its KILL machinery, not its alpha. The rubric is built
  to be the same kind of machine applied at hypothesis-selection time: it is
  engineered to KILL cheaply and let exactly one defensible candidate survive,
  rather than to flatter a portfolio of plausible ideas.

  Three lessons from 40 trials with zero validated OOS alpha are encoded as
  structure, not preference:

  1. PATTERNS ARE FREE; MECHANISMS ARE SCARCE. Every falsified family was, in
     hindsight, a pattern with a story bolted on. mechanism_quality (0.28, the
     top weight) and its anchors force the question "who is the price-insensitive
     loser and why can't they stop" — the one question a pattern cannot answer.

  2. PLAUSIBLE-BUT-FATAL IDEAS MUST DIE BEFORE RANKING. A weighted sum lets a
     5-mechanism average over a 1-cost or 1-power flaw. The three hard gates
     (novelty, cost-survival, statistical-tractability) encode that those are
     NECESSARY conditions, not tradeable virtues. This is the same logic as the
     DSR gate: a beautiful Sharpe under insufficient effective-N is not evidence.

  3. A BURNED TRIAL IS EXPENSIVE. The first_candidate_bar is intentionally hard
     (no dim < 3, three dims ≥ 4, data available-now mandatory). Recommending NO
     spend is an explicitly valid outcome — preserving bandwidth beats forcing a
     weak first pre-registration.

  ## Relationship to NHT

  The novelty_vs_archive hard gate MIRRORS the NHT archive-dedup veto; it does not
  replace it. NHT runs first (wave 3) and is authoritative on dedup, base-rate,
  and testability. This rubric's gates are the HoQR's independent confirmation
  applied during ranking — a proposal NHT auto-kills cannot score above 0 here,
  and a proposal NHT flags unfavorable on base-rate will struggle to clear the
  high first-candidate bar even if not formally killed.

  ## Calibration note on the direction view

  The direction view is independent of the rubric and was written to NOT
  pre-judge specific proposals — it states WHERE alpha could structurally live
  and which traps to expect, so that when the ranking pass runs, a proposal that
  lands in trap (a)/(b)/(c) is recognizable as such. It deliberately keeps modest
  priors: even the strongest call (structural rebalancing flows) is flagged as
  well-known and likely-decaying, consistent with honest-N ≈ 11.

