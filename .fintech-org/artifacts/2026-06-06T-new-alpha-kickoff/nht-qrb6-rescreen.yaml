    blocking: true
    blocking_scope: >
      Blocks pre-registration sign-off, NOT calendar admissibility ruling. Calendar
      data is admissible; pre-reg language must be fixed before NHT signs the
      pre-registration itself.

  - condition_id: C3
    prior_text: >
      Multi-bank pooling must treat banks as INDEPENDENT BLOCKS, not observations;
