    status: satisfiable-with-the-data
    detail: >
      The calendar dataset has a 'bank' column with clean bank-level labels. Block
      construction by bank is trivially implementable in the block-bootstrap. The
      per-bank breakdown in effective_n above provides the secondary metric inputs.
      The dominant banks (FED, BOJ, RBA) have sufficient post-2015 events for
      per-bank secondary analysis. BOC (58 events, all post-2019) is thin for
      per-bank power but acceptable as a secondary metric. CONDITION IS SATISFIABLE.
    blocking: false

  - condition_id: C4_new
    prior_text: >
      NEW condition (added in this rescreen): Calendar data admissibility spot-check
      must be completed before the pre-registration is frozen.
    status: still-blocking-until-spot-check-done
    detail: >
      BOE (158 dates) requires spot-check of 5+ years against BoE MPC minutes PDFs
