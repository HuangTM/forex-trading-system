dissent_statement: >
  QRB-6 RESCREEN — NHT RULING — 2026-06-06.

  CALENDAR ADMISSIBILITY: The verified-official tier (FED, BOJ, RBA, BOC-post-2019;
  528 events, 506 deduped market-days) is CLEAN and unconditionally admissible for a
  frozen pre-registration. The aggregator-only tier (BOE, ECB-partial, RBNZ; 271 events)
  is conditionally admissible pending a spot-check protocol on BOE and ECB non-rate-change
  years. The training-memory-unverified tier (43 ECB events) is inadmissible regardless.

  EFFECTIVE-N: The prior screen's ~1,024 estimate was an approximation. Verified numbers
  are 506 deduped market-days (Scenario A) and 716 (Scenario B). Both are adequate for
  the pooled block-bootstrap test. Post-2015 sub-window (the structural-break test that
  MATTERS for deployment relevance): 345 (A) / 491 (B) deduped market-days — adequate.
  The prior screen's "best testability in the portfolio" verdict stands: QRB-6 has more
  event-days than any other proposal by a factor of 2–5x.

  STRUCTURAL CONCERN — THE SHIFT THIS RESCREEN INTRODUCES: The prior screen classified
  QRB-6 as "acquisition_required, ineligible for first-candidate slot." That barrier is
  now CLEARED by the calendar delivery. However, two conditions still block the pre-reg:
  (C2) the 65% reversal figure must be purged from the pre-reg language, and (C4) the
  BOE/ECB spot-check must precede the Scenario B frozen event set. The Scenario A
  pre-registration can proceed NOW without waiting for C4; Scenario B extension requires
  C4 completion.

  THE CLEAN PATH: Pre-register QRB-6 on Scenario A (verified-official only, 506 event-
  days, 345 post-2015). Write the Scenario B extension as a pre-committed automatic
  activation once the spot-check is done. This is methodologically tighter than waiting
  for B before pre-registering, and it prevents the spot-check itself from becoming
  a result-peeking opportunity.

  ON THE PRIOR BASE-RATE CONCERN (post-2015 drift disappearance): this concern is
  UNCHANGED. The calendar data makes the test feasible; it does not resolve whether
  the pre-decision drift survived post-2015. The structural break test is mandatory.
  If the effect is pre-2015 only (345 post-2015 event-days will reveal this), QRB-6
  is dead alpha in the current regime and retires. NHT accepts the test as fair;
  NHT does not forecast the outcome.

  DECISION: survives — candidate status (no longer roadmap-only). Blocking conditions
  are pre-registration drafting conditions, not data conditions. The calendar itself
  is admissible and the effective-N is adequate.

severity: >
  concern — two blocking conditions on pre-reg language and BOE/ECB spot-check, but
