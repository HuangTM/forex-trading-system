      executes at the 17:00 bar OPEN (entry_delay=1 in 4h terms), which lands in the
      verified liquidity hole. If net-of-cost Sharpe survives that penalty in walk-forward
      OOS, the mechanism clears. ADDITIONAL CONDITION: a pre-registered news-event
      exclusion calendar (FOMC, NFP, and any event with UTC announcement time 12:30–14:30)
