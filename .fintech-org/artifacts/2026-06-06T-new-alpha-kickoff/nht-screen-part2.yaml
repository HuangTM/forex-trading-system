      constitutes implicit snooping because the highest-range 13:00 bars will concentrate
      on news days and the signal will be partially selected by outcome.
    dedup: >
      PASS — distinct from archived families. tas_ceiling_4h is a multi-bar trend-residual
      mean-reversion using OLS z-scores across 120 bars; QRA-5 is a single-bar within-session
      range-position (CLV) predicting the next 4h bar. Same universe (EURUSD/GBPUSD/USDJPY
      4h) and same general family (mean-reversion), but the information source (CLV of a
      named session bar) and holding period (single 4h bar) are structurally distinct.
