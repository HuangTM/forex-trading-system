  - id: QRB-1
    name: "Rate-differential SHOCK reaction (the surprise event, not the level)"
    verdict: conditional-survive
    condition: >
      MUST pre-register a pooled independent-events count post-2010 that demonstrates
      N_independent >= 60 policy steps (adjusting for cross-pair correlation: a Fed
      rate change affects all 6 USD pairs simultaneously and counts as ONE independent
      policy event, not six). If N_independent < 60, the pre-registration must declare
      UNDERPOWERED and the proposal retires without a backtest. ADDITIONALLY: must
      pre-register a SINGLE post-event window length (e.g., 5 days) before any return
      series is examined. Scanning over window lengths N=1..10 and choosing ex-post is
      a hidden degree of freedom that inflates the test beyond the ~197-event budget.
    dedup: >
      PASS — genuinely distinct from archived carry families. Carry (carry_baseline,
      carry_fred) conditions on the rate-differential LEVEL held continuously; QRB-1
      conditions on CHANGES (Δ≠0), a sparse event series the carry family never touches.
      PM brief explicitly permits rate-differential CHANGES as genuinely new.
      The alpha directional claim is adjacent (both predict appreciation of the
      higher-rate currency), but the mechanism (short-term post-event repositioning
      drift vs. persistent funding differential) and trigger (event day vs. every day)
      are structurally different. Also distinct from carry_momentum (which uses
      cross-sectional PRICE momentum as the carry-direction filter, not rate changes).
      Adjudication: the alpha lives in the event timing and post-change drift, not the
      level — accepted as novel transform.
    base_rate_note: >
      Post-announcement FX drift is a real phenomenon (related to FOMC pre-drift
      literature), but QRB-1 is NOT the announcement-day drift — it is the drift
      observable from MONTHLY-STALE data, which fires up to 30 days after the actual
      policy meeting. Any fast drift from the announcement itself is already gone from
      prices. What QRB-1 captures (if anything) is very slow residual repositioning
      after the market has already processed the policy change. Published prior is
      weak-to-nonexistent for a month-delayed post-change drift specifically.
      The "why not arbed" rationale (slow drift, data-lag moat) is plausible but thin:
      the fast institutional repositioning happens at the actual announcement; the
      lagged-data version is a rump claim.
    testability_note: >
      BORDERLINE. Verified: 197 total nonzero Δ days for EURUSD_diff over 6540 rows
      (2001–2026). Post-2010 usable events are a subset. Pooled across 12 pairs,
      raw event count is large, but cross-pair correlation is severe: a Fed hike
      lands as one independent policy step across 6 USD pairs simultaneously.
      Honest effective-N = number of distinct independent central-bank policy steps
      post-2010, not raw pair×event count. Estimate: Fed (~10 steps 2015–19 + ~11
      steps 2022–23), ECB, BOJ, BOE, etc. → roughly 50–90 independent policy steps
      post-2010 across all 8 banks. This is near the QRB's own 120-event UNDERPOWERED
      threshold when the independence correction is applied. Power is the primary risk.
      The White block-bootstrap on this event series (already in the falsification
      sketch) is the right test but requires adequate N — if the bootstrap's effective
      block count is < 40, p-values are unreliable.
    cost_note: >
      Marginal but plausible IF drift exists. A 5-day drift on majors of 50–70 pips
      would clear a ~2–5 pip round-trip. The concern: QRB-1's "50–70 pips over 5 days"
      number is borrowed from a general macro context, not from the data-lagged monthly-stale
      signal specifically. Post-lagged drift (if any) is likely a fraction of the
      full announcement move, which markets processed weeks earlier. Cost survival
      is contingent on the drift being real and not just the announcement-day gap
      that already closed.

  - id: QRB-2
    name: "Spread-blowout liquidity-regime gate (spread as a risk-off state variable)"
    verdict: conditional-survive
    condition: >
      Advances as OVERLAY/GATE ONLY — not as a standalone alpha claim. The conditional
      survival applies specifically to the gate application: must be pre-registered as a
      modifier attached to another approved signal (e.g., any of QRA-5, QRB-1, QRB-3
      that survive screening), not as an independent strategy entry in the backtest
      trial ledger. The standalone fade variant (trade when spread is widest, fade the
      preceding move) is DEAD on cost grounds: acting into the widest-spread bars pays
      the elevated round-trip cost precisely when gross edge is most uncertain. If QRB-2
      is submitted as a standalone strategy, kill it. As an overlay, the verdict is survive.
    dedup: >
      PASS — clean novel information source. No archived strategy (carry, momentum,
      MA-crossover, Bollinger-RSI, ORB/tas_ceiling_4h) uses spread_pips as a signal
      or state variable; all treat it as a cost-only input. Using spread as a REGIME
      CONDITIONING variable is structurally new. No dedup conflict.
    base_rate_note: >
      As a gate: high prior probability of improving cost-adjusted returns — removing
      trades in the highest-spread (most costly, most-chaotic) environments is
      mechanically beneficial. No published prior needed; the intuition is sound and
      testable. As a standalone fade: very low prior probability. The behavioral claim
      that stress-spread episodes produce tradeable reversion is plausible in theory
      but faces the exact cost barrier that makes the trades unattractive in practice.
      The reason the reversion might be "un-arbed" (spread deters participants) is
      the same reason trading it is expensive. Gate variant: strong prior. Standalone:
      graveyard-rate prior.
    testability_note: >
      Adequate for gate application. EURUSD daily spread data spans 2010–2026, 4237 rows,
      with 15.9% of days exceeding 2× median spread (~674 days). 4h data adds finer
      resolution. Gate test is a straightforward before/after comparison on any base signal
      with or without the gate applied — well-powered given the full daily sample. Standalone
      fade: high-spread EXTREME events (say, top 2% of spread_z) are ~85 days total over
      16 years, which is borderline for a robust test (effective-N < 100 for extreme events).
      Gate is testable; standalone is not well-powered at the extremes.
    cost_note: >
      Gate variant: mechanically cost-positive. Removing the highest-spread trades reduces
      realized round-trip cost; the gate can only improve net returns, not harm them (assuming
      the suppressed trades had negative or zero net edge). This is the clean, defensible
      economic case. Standalone fade: must overcome elevated spread at entry (2–10× median,
      so 4–44 pips on EURUSD) with a next-bar reversion. Even a 20-pip next-bar reversal
      needs a 10-pip net to clear entry spread alone, before exit cost. Extremely marginal;
      honest failure mode is that the elevated spread makes all such trades negative EV
      regardless of the directional signal. Cost analysis correctly identifies gate as the
      viable variant.

