body: 'Eleven proposals screened; 9 conditional-survive, 2 kill, 0 unconditional-survive. Zero unconditional survives
  is correct given the firm''s 0/11 validated OOS alpha record — the screen is calibrated at the appropriate stringency.
  The two kills (QRA-3: momentum-adjacent base signal + worst cost profile + 3-pair limitation + QR self-assessed
  low confidence; QRB-5: worst reference class in empirical finance + 60-hypothesis FWER correction destroys power
  + sub-pip effect against 1.5–3 pip round-trip) are unambiguous and the QRs effectively called them. Among the
  9 conditional-survives, three cross-cutting structural issues dominate: (1) cost must be modelled at the ACTUAL
  execution bar (QRA-5, QRA-1, QRB-4 all have mismatches between the QR''s cost assumption and the real entry bar);
  (2) post-2015 stability is load-bearing for QRB-3 and QRB-6, which were partially or fully documented before the
  firm''s OOS window; (3) the mean-reversion concentration (6 of 9 surviving proposals) creates portfolio-level
  failure risk that no per-proposal condition can mitigate — if this dataset does not support mean-reversion, the
  wave fails wholesale. The wave may proceed to ranking; QRB-2 and QRB-4-GATE advance as overlays only; QRB-6 advances
  as roadmap/acquisition-required only; DSR denominator must be updated by HoQR before trial slots are assigned.

  '
