part_observations:
  part1: 'Portfolio-level observations on the 4 proposals:

    1. KILL RATIO: 1 kill (QRA-3), 3 conditional-survives (QRA-1, QRA-2, QRA-4). The kill-ratio of 25% is lower
    than the historical graveyard base rate (~91% in honest-N terms), but these are proposals not yet backtested
    -- the conditional requirements impose pre-backtest gates that may kill 1-2 more at pre-reg stage.

    2. COMMON STRUCTURAL WEAKNESS: All 4 proposals share the low-effective-N problem inherent to a 12-pair daily
    OHLCV dataset with volume=0. The ~4185 daily bars are further reduced by walk-forward windows; OOS folds are
    thin. None of the surviving proposals can produce high-confidence statistical verdicts from this dataset alone;
    they can only produce "signal present/absent given cost floor" verdicts. The firm should set expectations accordingly.

    3. COST IS THE SILENT KILLER: QRA-3 is the explicit cost-kill; QRA-4 is marginal; QRA-1 is acknowledged-marginal.
    Only QRA-2 has comfortable cost headroom on the major-class leg. The firm''s ~1.5 pip round-trip floor means
    any daily-rebalance strategy with sub-3-pip directional edge is dead before testing. The cost screen eliminated
    QRA-3 as the dominant failure mode.

    4. MOMENTUM-ADJACENCY WATCH: QRA-3''s momentum-adjacent base signal is one kill factor. QRA-2''s JPY-continuation
    leg is momentum-adjacent but survives because the ASYMMETRY is the claimed mechanism and the falsification correctly
    kills if the asymmetry is absent. This distinction (adjacent mechanism where the NEW part carries the alpha)
    is the correct NHT judgment; the dedup screen is not binary adjacent/distant but conditional on where the alpha
    claim lives.

    5. PORTFOLIO ORTHOGONALITY: QRA-1 (relative value, net-zero directional) is the most orthogonal to the other
    surviving proposals. QRA-2 (directional, intraday) and QRA-4 (cross-sectional reversion, multi-day) have some
    correlation through shared JPY exposure. If all three proceed to pre-registration, the Bonferroni denominator
    grows by 3 (or more if each is multi-pair) and the DSR thresholds tighten -- the testing-cost of running all
    three must be accounted for in the pre-reg denominator update.

    6. BEST CANDIDATE: QRA-1 has the strongest a-priori NHT endorsement for orthogonality and sharpest falsification
    sketch (ADF pre-check gates before any backtest; OU half-life vs cost provides a clean quantitative kill). QRA-2
    is the most tractable to test and has the best cost headroom. QRA-4 is the most fragile (thin effective-N, multi-leg
    cost) but the mechanism is genuine. NHT orders priority: QRA-1 > QRA-2 > QRA-4 for pre-registration sequencing
    (QRA-3 retired).

    '
  part2: 'All four proposals survive to conditional-survive; none are auto-killed. The dedup archive is clean enough
    to permit passage on mechanism grounds — the QRs have done good novelty work. The dominant kill risks are: (QRA-5)
    the 17:00 UTC entry spread penalty making cost survival harder than the QR modeled; (QRB-1) power/independence
    — the ~197 raw events may collapse to < 60 independent policy steps post-2010 after cross-pair correlation adjustment,
    tripping the UNDERPOWERED clause; (QRB-2) scope creep — must be held to gate-overlay status, not allowed to
    masquerade as standalone alpha; (QRB-3) McLean-Pontiff decay from a published-11-years-ago effect that FX desks
    already watch. The best-powered and cleanest-cost proposal is QRB-3 (turn-of-month); the riskiest on effective-N
    is QRB-1; the most testable mechanism in novel territory is QRA-5 if the entry-spread condition is met. QRB-2
    advances only as an overlay tool. Recommendation to HoQR: prioritize QRB-3 (best power + cost + documented mechanism),
    then QRA-5 (novel, well-powered, but must resolve 17:00 spread), then QRB-1 (weak power; count independent events
    first before committing backtest resources), with QRB-2 attached as an overlay to whichever primary signal advances.

    '
  part3: 'Three proposals; three distinct outcomes driven by three different failure modes.


    QRB-4 (rollover-hole gate/fade): Mechanism is genuinely distinct from the archived session-boundary

    family. The GATE component is sound by construction and should proceed immediately. The FADE is

    mechanistically novel and adequately powered but faces a hard cost bar (entering one bar late after

    the reversion has partially run). Conditional-survive: GATE unconditionally, FADE conditional on

    pre-registered ATR threshold and net-of-cost clearance.


    QRB-5 (weekday seasonality): Three independent kill triggers — (1) worst reference class in

    empirical finance, (2) 60-hypothesis FWER correction kills statistical power for effects of the

    documented magnitude, (3) QR''s own honest acknowledgment that weekday effects are sub-pip and

    likely fail cost. The liquidity conditioner does not rescue any of these. Kill is unambiguous and

    the QR essentially called it themselves.


    QRB-6 (CB decision calendar): Strongest mechanism prior in the portfolio and best testability

    (900+ events). Acquisition barrier is trivially low. Passes dedup cleanly. Two adverse carried-

    forward findings condition the verdict: (a) pre-FOMC drift disappeared post-2015 — the post-2015

    sub-window test is mandatory, not advisory; (b) the ~65% reversal figure is from an unverified

    source (WebSearch summary; WebFetch 403 failures) and must not be pre-registered as a point target.

    Conditional-survive for roadmap; upgrade to candidate when CEO authorizes calendar acquisition AND

    the structural-decay test is explicitly required in the pre-registration.


    Calibration note: two conditional-survives and one kill. The kill is a true kill (three convergent

    failure modes, QR self-assessed as low-conviction). The conditional-survives are not soft passes —

    both carry binding conditions that could result in kills at pre-registration stage.

    '
