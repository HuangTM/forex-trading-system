    kills this before cost does. No cost-kill here; the falsification Sharpe threshold is the operative gate.

    '
- id: QRA-3
  verdict: kill
  condition: n/a
  dedup: 'ADJACENT-BUT-DISTINCT -- but the adjacency is too close relative to the cost burden and prior. The base
    signal is 1-day close-to-close return continuation (1-day momentum), gated by TS_t. Momentum (Bet#1) on 14-day
    ROC already failed in this firm''s trials. The new element is TS_t (4h-to-daily vol ratio) as a regime classifier
    that flips the momentum sign. This is not a re-skin (the gate is new), but the alpha-source reduces entirely
    to: "does the 4h-to-daily GK/Parkinson vol ratio correctly classify trend vs chop regimes well enough to net-positive
    after daily-rebalance cost?" The momentum-adjacency is not the kill by itself; the combination of (momentum-adjacent
    base signal) + (worst cost profile) + (only 3 pairs) + (QR''s own low-confidence rating) is the kill package.
    The claimed novelty (TS_t) cannot be evaluated independently from the momentum base signal it gates -- any OOS
    success is ambiguous between the gate and the base signal. That ambiguity is a fundamental weakness.

    '
  base_rate_note: 'Same graveyard (0/11). Vol-regime filters for conditional trend strategies have a weak real-world
    track record in daily-bar FX; this class of strategies is well-explored in the quant literature with disappointing
    out-of-sample results. QR''s own "confidence: low" is appropriately calibrated. No uplift.

    '
  testability_note: 'Only 3 pairs (EURUSD, GBPUSD, USDJPY) have 4h data. Daily rebalance at 150-250 trades/yr/pair
    provides adequate total-N for Sharpe estimation, but the TS_t regime classifier itself has low classification
    power (base rates of "truly chop" vs "truly trend" days are unknown, and the classifier''s accuracy needs to
    be estimated from the same data used to build the strategy). The 3-pair limitation means all walk-forward OOS
    inference rests on a portfolio of 3 correlated major pairs -- effectively 2 independent signals (EURUSD and
    GBPUSD share GBP/EUR dynamics; USDJPY is semi-independent). Thin but not the kill.

    '
  cost_note: 'KILL contributor. Daily rebalance on 3 pairs. ~2.0-2.5 pip round-trip cost per pair per day. The per-day
    directional edge from the TS_t gate would need to exceed ~2 pips consistently to survive. Average major-pair
    daily move is 50-80 pips, but directional accuracy improvement from TS_t is unknown and has no demonstrated
    prior. Even a 52% vs 50% directional accuracy improvement yields only 50-80 pips * 0.02 = 1-1.6 pips expected
    gross per day -- below cost. The gate would need to identify 55-60% accuracy-improvement days to clear cost,
    which is a strong and unvalidated claim for a novel signal with no prior evidence. This is the cost-kill that
    tips the verdict to KILL.

    '
- id: QRA-4
  verdict: conditional-survive
  condition: '(a) Dollar-neutral basket construction must be done on the ~8-currency space (after decomposing pairs
    into constituent currencies), NOT on the raw 12-pair space. The 12-pair panel contains redundant legs (CADJPY,
    EURJPY, AUDJPY, GBPJPY, NZDJPY all share a JPY leg; a JPY dispersion spike must not be counted as 5 independent
    pair-dispersion events). Failure to decompose = the basket is inadvertently a leveraged JPY bet disguised as
    diversification; this is a structural flaw that must be closed before pre-registration. (b) Walk-forward OOS
    Sharpe >= 0.30 net of full multi-leg cost (~8-12 legs per event, all with realistic spread + slippage). (c)
    Sign-check: if the demeaned top-N-day movers CONTINUE rather than revert on OOS walk-forward, the sign is wrong
    and the proposal is IMMEDIATELY KILLED with no appeal (it would be momentum-disguised, which is an archived
    family). (d) The dispersion gate threshold must be calibrated on IS data only; no OOS exposure during gate selection.

    '
  dedup: 'PASS. Cross-sectional reversion (short top same-day movers, long bottom) is the OPPOSITE sign to momentum
    (which is long top trailing-return movers). The dispersion-gate conditioning (flat when D_t is low, active only
    on spikes) is a new regime variable not present in any archived family. Carry ranks by rate-differential; momentum
    ranks by trailing own-return; both are continuation signals. QRA-4 is a reversion signal gated by a cross-sectional
    moment. The mechanism is genuinely orthogonal to the archive. The sign-check condition (c) serves as a dedup
    safety valve: if OOS behavior is continuation, it auto-kills as momentum-disguised.

    '
  base_rate_note: 'Same graveyard (0/11). Cross-sectional reversion in FX is less studied than in equities (where
    stat-arb has a documented positive track record). The ~8-currency effective panel (after USD-normalization)
    is a thin cross-section for reversion strategies; equity stat-arb typically requires 50-500+ stocks for robust
    inference. The FX panel is too small for confidence but not too small to test. The dispersion-spike gate adds
    structure but also a free parameter (gate quantile). Prior: low, with a genuine mechanism argument (idiosyncratic
    overshoot + partial retrace) that is coherent but untested on this data.

    '
  testability_note: 'FLAGGED AS THE PRIMARY RISK. The 12-pair panel decomposes to ~8 currencies; shared-leg correlation
    (5 JPY-crosses + USD dominance) means each high-dispersion day is NOT 12 independent observations -- it is 2-3
    effective factor bets. Gating to ~30-60 dispersion-spike events/yr gives ~60-180 events over a 3-year OOS window,
    but at 2-3 effective factors per event, the independent information is closer to 20-60 OOS data points. This
    is statistically thin. The falsification sketch has adequate power to detect large effects (Sharpe > 0.30 net
    of cost) but low power to rule out a false positive at smaller effect sizes. NHT accepts this on the grounds
    that: (1) the sign-check condition provides a high-power binary kill, (2) the cost threshold provides a natural
    kill for weak signals, and (3) the effective-N limitation is an honest epistemic constraint disclosed here,
    not hidden. The QR must disclose this effective-N limitation in the pre-registration.

    '
  cost_note: '8-12 legs per rebalancing event. Costs per leg: 2-5 pips spread + slippage. Total basket round-trip
    cost per event: est. 25-60 pips (summed across legs). Expected convergence per leg on a high-dispersion day:
    unknown but the dispersion spike (larger-than-average idiosyncratic moves) is the cost-headroom lever. Genuinely
    marginal -- the QR''s "dominant risk" characterization is accurate. The cost-consumption threshold in the falsification
    sketch (70% rule) is the operative gate. Gating to high-dispersion events (larger expected convergence) is the
    ONLY mechanism for cost survival; without it, this dies to spread on normal-vol days. Condition (a) on proper
    currency-space construction also affects cost: an improperly constructed basket may inadvertently double-count
    JPY legs, inflating both apparent diversification and actual cost.

    '
- id: QRA-5
  name: Intraday range-position reversion within the London-NY 4h session block
  verdict: conditional-survive
  condition: 'Entry cost in the falsification run MUST use the verified 17:00 UTC 4h spread (~4.15 pips mean for
    EURUSD, higher for USDJPY — per QRB-2 evidence), NOT the 13:00 overlap bar spread (~2.0 pips). The signal fires
    at 13:00 close and executes at the 17:00 bar OPEN (entry_delay=1 in 4h terms), which lands in the verified liquidity
    hole. If net-of-cost Sharpe survives that penalty in walk-forward OOS, the mechanism clears. ADDITIONAL CONDITION:
    a pre-registered news-event exclusion calendar (FOMC, NFP, and any event with UTC announcement time 12:30–14:30)
    must be committed before any backtest run; failure to pre-register the exclusion constitutes implicit snooping
    because the highest-range 13:00 bars will concentrate on news days and the signal will be partially selected
    by outcome.

    '
  dedup: 'PASS — distinct from archived families. tas_ceiling_4h is a multi-bar trend-residual mean-reversion using
    OLS z-scores across 120 bars; QRA-5 is a single-bar within-session range-position (CLV) predicting the next
    4h bar. Same universe (EURUSD/GBPUSD/USDJPY 4h) and same general family (mean-reversion), but the information
    source (CLV of a named session bar) and holding period (single 4h bar) are structurally distinct. The explicit
    auto-kill if CLV≥0.85 predicts continuation (rather than reversion) is the correct safety rail — if it fires
    like an ORB the strategy self-kills. The QR''s claim of "opposite logic to ORB" is honest and testable; accepted.

    '
  base_rate_note: 'No published prior for overlap-bar CLV reversion specifically — this is an unpublished session-microstructure
    claim. Generic novel session-structure prior applies (~graveyard rate zone). No McLean-Pontiff decay risk (unpublished),
    but also no mechanism validation from the literature. The behavioral story (retail chases the overlap extreme;
    light NY-afternoon book fades it) is plausible but unverified. News-day contamination is the dominant regime
    risk: FOMC/NFP hit exactly the 13:00 bar and would create the highest-CLV, highest-range observations that also
    have the worst fade outcomes — a selection-bias trap.

    '
  testability_note: 'STRONG effective-N. ~252 trading days/yr × 3 pairs × 16 years × ~30% gate hit rate (CLV extreme
    + range filter) ≈ 3,600 total signal observations. At the daily-independence level, ~750+ event-pairs per year
    across 3 pairs (before gating) → well above the 100-event floor even after filtering. Walk-forward 2010–2026
    on 4h bars (25,457 bars per pair) is computationally trivial. Not an effective-N concern.

    '
  cost_note: 'CENTRAL RISK IS THE ENTRY SPREAD. The entry bar (17:00 UTC) carries verified mean spread of 4.15 pips
    (EURUSD 4h, QRB-2 evidence) — more than 2x the 13:00 bar spread. The QR''s cost narrative was written assuming
    the 13:00 spread (~1–2 pips); the actual entry fires into the liquidity hole. For USDJPY the 17:00 spread is
    wider still. Gross edge (CLV-gated overlap reversion) must clear ~5–7 pip round-trip total. Gating to large-range
    overlap bars creates cost headroom, but the 17:00 entry penalty is materially larger than the QR assumed. This
    is the dominant kill risk — not the signal quality, but the execution cost at the mandated entry bar.

    '
- id: QRB-1
  name: Rate-differential SHOCK reaction (the surprise event, not the level)
  verdict: conditional-survive
  condition: 'MUST pre-register a pooled independent-events count post-2010 that demonstrates N_independent >= 60
    policy steps (adjusting for cross-pair correlation: a Fed rate change affects all 6 USD pairs simultaneously
    and counts as ONE independent policy event, not six). If N_independent < 60, the pre-registration must declare
    UNDERPOWERED and the proposal retires without a backtest. ADDITIONALLY: must pre-register a SINGLE post-event
    window length (e.g., 5 days) before any return series is examined. Scanning over window lengths N=1..10 and
    choosing ex-post is a hidden degree of freedom that inflates the test beyond the ~197-event budget.

    '
  dedup: 'PASS — genuinely distinct from archived carry families. Carry (carry_baseline, carry_fred) conditions
    on the rate-differential LEVEL held continuously; QRB-1 conditions on CHANGES (Δ≠0), a sparse event series the
    carry family never touches. PM brief explicitly permits rate-differential CHANGES as genuinely new. The alpha
    directional claim is adjacent (both predict appreciation of the higher-rate currency), but the mechanism (short-term
    post-event repositioning drift vs. persistent funding differential) and trigger (event day vs. every day) are
    structurally different. Also distinct from carry_momentum (which uses cross-sectional PRICE momentum as the
    carry-direction filter, not rate changes). Adjudication: the alpha lives in the event timing and post-change
    drift, not the level — accepted as novel transform.

    '
  base_rate_note: 'Post-announcement FX drift is a real phenomenon (related to FOMC pre-drift literature), but QRB-1
    is NOT the announcement-day drift — it is the drift observable from MONTHLY-STALE data, which fires up to 30
    days after the actual policy meeting. Any fast drift from the announcement itself is already gone from prices.
    What QRB-1 captures (if anything) is very slow residual repositioning after the market has already processed
    the policy change. Published prior is weak-to-nonexistent for a month-delayed post-change drift specifically.
    The "why not arbed" rationale (slow drift, data-lag moat) is plausible but thin: the fast institutional repositioning
    happens at the actual announcement; the lagged-data version is a rump claim.

    '
  testability_note: 'BORDERLINE. Verified: 197 total nonzero Δ days for EURUSD_diff over 6540 rows (2001–2026).
    Post-2010 usable events are a subset. Pooled across 12 pairs, raw event count is large, but cross-pair correlation
    is severe: a Fed hike lands as one independent policy step across 6 USD pairs simultaneously. Honest effective-N
    = number of distinct independent central-bank policy steps post-2010, not raw pair×event count. Estimate: Fed
    (~10 steps 2015–19 + ~11 steps 2022–23), ECB, BOJ, BOE, etc. → roughly 50–90 independent policy steps post-2010
    across all 8 banks. This is near the QRB''s own 120-event UNDERPOWERED threshold when the independence correction
    is applied. Power is the primary risk. The White block-bootstrap on this event series (already in the falsification
    sketch) is the right test but requires adequate N — if the bootstrap''s effective block count is < 40, p-values
    are unreliable.

    '
  cost_note: 'Marginal but plausible IF drift exists. A 5-day drift on majors of 50–70 pips would clear a ~2–5 pip
    round-trip. The concern: QRB-1''s "50–70 pips over 5 days" number is borrowed from a general macro context,
    not from the data-lagged monthly-stale signal specifically. Post-lagged drift (if any) is likely a fraction
    of the full announcement move, which markets processed weeks earlier. Cost survival is contingent on the drift
    being real and not just the announcement-day gap that already closed.

    '
- id: QRB-2
  name: Spread-blowout liquidity-regime gate (spread as a risk-off state variable)
  verdict: conditional-survive
  condition: 'Advances as OVERLAY/GATE ONLY — not as a standalone alpha claim. The conditional survival applies
    specifically to the gate application: must be pre-registered as a modifier attached to another approved signal
    (e.g., any of QRA-5, QRB-1, QRB-3 that survive screening), not as an independent strategy entry in the backtest
    trial ledger. The standalone fade variant (trade when spread is widest, fade the preceding move) is DEAD on
    cost grounds: acting into the widest-spread bars pays the elevated round-trip cost precisely when gross edge
    is most uncertain. If QRB-2 is submitted as a standalone strategy, kill it. As an overlay, the verdict is survive.

    '
  dedup: 'PASS — clean novel information source. No archived strategy (carry, momentum, MA-crossover, Bollinger-RSI,
    ORB/tas_ceiling_4h) uses spread_pips as a signal or state variable; all treat it as a cost-only input. Using
    spread as a REGIME CONDITIONING variable is structurally new. No dedup conflict.

    '
  base_rate_note: 'As a gate: high prior probability of improving cost-adjusted returns — removing trades in the
    highest-spread (most costly, most-chaotic) environments is mechanically beneficial. No published prior needed;
    the intuition is sound and testable. As a standalone fade: very low prior probability. The behavioral claim
    that stress-spread episodes produce tradeable reversion is plausible in theory but faces the exact cost barrier
    that makes the trades unattractive in practice. The reason the reversion might be "un-arbed" (spread deters
    participants) is the same reason trading it is expensive. Gate variant: strong prior. Standalone: graveyard-rate
    prior.

    '
  testability_note: 'Adequate for gate application. EURUSD daily spread data spans 2010–2026, 4237 rows, with 15.9%
    of days exceeding 2× median spread (~674 days). 4h data adds finer resolution. Gate test is a straightforward
    before/after comparison on any base signal with or without the gate applied — well-powered given the full daily
    sample. Standalone fade: high-spread EXTREME events (say, top 2% of spread_z) are ~85 days total over 16 years,
    which is borderline for a robust test (effective-N < 100 for extreme events). Gate is testable; standalone is
    not well-powered at the extremes.

    '
  cost_note: 'Gate variant: mechanically cost-positive. Removing the highest-spread trades reduces realized round-trip
    cost; the gate can only improve net returns, not harm them (assuming the suppressed trades had negative or zero
    net edge). This is the clean, defensible economic case. Standalone fade: must overcome elevated spread at entry
    (2–10× median, so 4–44 pips on EURUSD) with a next-bar reversion. Even a 20-pip next-bar reversal needs a 10-pip
    net to clear entry spread alone, before exit cost. Extremely marginal; honest failure mode is that the elevated
    spread makes all such trades negative EV regardless of the directional signal. Cost analysis correctly identifies
    gate as the viable variant.

    '
- id: QRB-3
  name: Turn-of-month rebalancing flow (calendar-mechanical, equity-conditioned)
  verdict: conditional-survive
  condition: 'Must pre-register EXACTLY ONE window definition (e.g., last 2 + first 1 trading days) and EXACTLY
    ONE primary pair-set before any return data is examined. Testing multiple window lengths or pair subsets and
    selecting ex-post consumes the ~190-event budget faster than the bootstrap can correct for. The v1 (fixed long-USD
    bias) and v2 (equity-proxy conditioned) must be declared as PRE-COMPETING hypotheses with their difference tested
    as a pre-registered contrast — not as a sequential search where v2 is tried if v1 fails. The stability-across-halves
    test (sign consistency 2010–2017 vs 2018–2026) is MANDATORY given the McLean-Pontiff decay concern; if the effect
    flips sign in the second half, it is dead regardless of pooled result.

    '
  dedup: 'PASS — clean new conditioning axis. No archived strategy conditions on day-of-month or the turn-of-month
    calendar window. Pure calendar-mechanical flow effect is structurally distinct from all archived families (carry
    conditions on rate levels, momentum on price returns, MA/BB on price bands, ORB on session structure). The mechanism
    (mechanical index-rebalancing creating non-information-based FX pressure) is documented and distinguishable.
    Passes dedup easily.

    '
  base_rate_note: 'Carried-forward NHT finding applies here: McLean-Pontiff ~35% post-publication anomaly decay.
    QRB-3 explicitly cites Melvin & Prins (2015) as the published prior — confirming the effect was documented 11
    years ago. The WMR 4pm London fix rebalancing effect is specifically watched and partially traded by FX desks
    globally. The "non-information-based flow must trade" argument is the textbook justification for persistence,
    but the degree to which sophisticated counterparties have already compressed the edge is uncertain. The strongest
    case for survival: truly mechanical hedging flow IS price-insensitive and cannot be fully arbitraged; the weakest
    case: FX desks front-run the fix window aggressively and the retail-accessible daily-close signal captures only
    the residual. Honest assessment: a REAL documented prior with real decay risk. This is better than no prior
    (validates the mechanism) but demands the post-publication stability test.

    '
  testability_note: 'STRONGEST effective-N in this batch. ~190 independent month-turns 2010–2026 with a single pre-registered
    window definition. If testing ONE hypothesis on ONE pair-set, 190 observations is adequately powered (White
    reality-check block-bootstrap will have reasonable block counts). Multiple-testing budget: testing v1 vs v2
    as a pre-registered contrast costs 1 degree of freedom, acceptable. Testing across all 12 pairs without correction
    would be fatal (multiple testing × 12 pairs × potentially multiple windows = > 50 effective tests on the same
    190-event budget). One pre-registered hypothesis, one pair-set: cleanly testable. The QRB falsification sketch
    correctly mandates this.

    '
  cost_note: 'BEST cost profile in this batch. One trade per month per pair, ~2–3 pip round-trip on EURUSD/USDJPY,
    against documented month-end moves of tens of pips (if the effect is alive). Low turnover = minimal cost drag.
    The honest risk is effect-size shrinkage post-publication (McLean-Pontiff decay) rather than cost. Even at 50%
    decay from the documented effect, the residual should exceed a 3-pip round-trip on a 3-day window move. Cost
    honesty is sound; the QR''s risk framing is correct.

    '
