dissent-statement: 'NHT PORTFOLIO-LEVEL DISSENT — 2026-06-06 wave, 11 proposals screened.

  OUTCOME SUMMARY: 9 conditional-survives, 2 kills (QRA-3, QRB-5). Zero unconditional survives. Zero unconditional
  survives is the correct posture given the firm''s honest-N = 11 trials, 0 validated OOS alpha. A wave that produced
  even one unconditional survive would demand scrutiny of the screen''s rigour; none here indicates the screen is
  functioning as intended.

  LOAD-BEARING CONDITIONS COMMON ACROSS MULTIPLE PROPOSALS: (1) Pre-registered windows before any return data is
  examined — binding across QRA-1 (ADF pre-check before backtest), QRB-1 (single post-event window), QRB-3 (single
  turn-of-month window + pair-set), QRB-4 (k×ATR threshold ex-ante), QRB-6 (post-2015 sub-window break test). Failure
  to pre-register any of these consumes hidden degrees of freedom and automatically inflates the DSR denominator;
  any trial that skips a required pre-registration is barred from the ledger. (2) Post-2015 stability check — explicitly
  load-bearing for QRB-3 (McLean-Pontiff decay from 2015-published effect), QRB-6 (pre-FOMC drift disappeared post-2015
  per carried-forward NHT finding). The firm''s OOS-relevant deployment window is 2015–2026; a strategy that is
  alive only pre-2015 is dead alpha regardless of pooled statistics. (3) Cost at the execution bar — binding for
  QRA-5 (entry fires into the 17:00 UTC liquidity hole, verified 4.15 pip EURUSD mean spread, not the 13:00 overlap
  bar spread QR modeled), QRB-4 FADE (enters one bar late after partial reversion; 4–6 pip round-trip at normal-liquidity
  bar), QRA-1 (7-pip 3-leg round-trip marginal vs residual''s sigma). Proposals that modeled cost at a different
  bar than the execution bar introduce a systematic optimistic bias; the condition forces cost at the ACTUAL entry
  bar.

  STRUCTURAL PORTFOLIO OBSERVATIONS: (a) MEAN-REVERSION CONCENTRATION: 6 of 9 surviving proposals are mean-reversion-flavored
  (QRA-1 triangular residual reversion, QRA-4 cross-sectional reversion, QRA-5 overlap-bar CLV reversion, QRB-4
  rollover overshoot fade, QRB-6 post-announcement reversal, QRA-2''s USD-major fade leg). If mean-reversion is
  structurally broken in this dataset — as the archived Bollinger-RSI family suggests (0 for 3 on mean-reversion-adjacent
  trials) — then the wave''s portfolio-level failure rate will exceed what proposal-level screening can detect.
  This is a systemic concentration risk. (b) QRB-2 / QRB-4 GATE OVERLAP: Both QRB-2 (spread-blowout gate) and QRB-4
  (rollover hole gate) are cost-overlay gates, not standalone alphas. They must be attached to approved primary
  signals; they do not independently contribute to the DSR numerator. If submitted as standalone trials they are
  re-killed on arrival. The orchestration layer must enforce this: QRB-2 and QRB-4-GATE advance only as attributes
  of whichever primary signal they modify. (c) DSR DENOMINATOR PRESSURE: If all 9 conditional-survives proceed to
  pre-registration, the firm''s running trial count increases materially (honest-N currently 11). The DSR denominator
  grows; minimum required Sharpe thresholds tighten for all trials including previously registered ones. The HoQR
  must update the DSR denominator before any of these trials run. (d) EFFECTIVE-N IS THE BINDING EPISTEMIC CONSTRAINT
  ACROSS THE WAVE: Not proposal-level; the entire 12-pair daily-close OHLCV panel with ~4185 bars (volume=0) constrains
  every proposal. The cross-pair correlation structure means shared-leg proposals (JPY-cross concentration in QRA-4,
  USD-major correlation in QRA-2, QRB-3) have effective-N substantially below the raw event count. No proposal in
  this wave will produce a high-confidence verdict; the realistic outcome is "signal present/absent given cost floor"
  — a weak but honest epistemic claim.

  MAY THE WAVE PROCEED TO RANKING? YES — with mandatory preconditions. The wave may proceed to the ranking phase
  (HoQR prioritisation + PM acceptance-criteria application) under the following non-negotiable constraints: (1)
  QRB-2 and QRB-4-GATE are classified as overlays in the ranking artifact, not ranked as candidate slots; (2) QRB-6
  enters the ranking as roadmap-only (acquisition_required flag) and may not occupy a first-candidate slot until
  CEO authorizes calendar acquisition; (3) the HoQR ranking artifact must incorporate a DSR denominator update before
  assigning trial slots. Subject to these three constraints, the 9 conditional-survives are adequately screened
  for mechanism novelty, cost honesty, and testability; the ranking phase may proceed.

  '
severity: 'concern — ranking may proceed; no mandatory block. The wave has no material_concern+ trigger: no unconditional
  kill of the entire wave, no structural contamination, no disqualifying DSR-denominator violation at screen stage.
  The elevated mean-reversion concentration is a portfolio-level concern (not a per-proposal defect) that the HoQR
  must acknowledge in the ranking artifact but does not block the wave. The two kills (QRA-3, QRB-5) are unambiguous
  and do not require appeal. The 9 conditional-survives carry binding kill conditions that will eliminate further
  proposals at pre-registration stage; the screen has done its work correctly.

  '
