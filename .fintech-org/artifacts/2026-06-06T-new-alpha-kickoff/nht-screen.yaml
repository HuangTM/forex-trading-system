- id: QRA-1
  verdict: conditional-survive
  condition: '(a) ADF unit-root test on r_t = ln(EURGBP) - [ln(EURUSD) - ln(GBPUSD)] must firmly reject at p < 0.05
    BEFORE any backtest runs — a non-stationary residual means the mean-reversion premise is false; AUTO-KILL if
    ADF fails. (b) Walk-forward OOS Sharpe >= 0.30 net of full 3-leg round-trip cost (~7 pips total: EURGBP + EURUSD
    + GBPUSD spreads). (c) OU half-life of r_t must be shorter than the mean holding period such that <= 70% of
    gross edge is consumed by cost; kill if cost-consumption ratio > 70%. (d) Signal must fire >= 15 times/yr on
    OOS walk-forward folds; if < 10/yr the OOS folds are statistically degenerate and the strategy is archived as
    too-rare.

    '
  dedup: 'PASS. The mechanism is a 3-pair cross-quote consistency residual (a no-arb identity that should hold to
    within cost). No archived family touches a triangular multi-pair identity residual: carry uses rate-diffs, momentum/MA
    use single-series close-to-close, Bollinger+RSI uses single-pair band/oscillator, ORB/tas_ceiling_4h uses single-pair
    session or regression-envelope mean reversion. Net-zero directional exposure is structural, not cosmetic — this
    is a relative-value construct orthogonal to all archived directional families.

    '
  base_rate_note: 'Reference class: OHLC-geometry constructs on this dataset; firm honest-N = 11 trials, 0 validated
    OOS alpha. Prior probability of success: low (~5-15%). Mechanism (data-stamp stale-quote noise in three concurrent
    daily closes) is coherent and potentially real, but no prior evidence exists. The QR''s own "marginal" cost-survival
    characterization is appropriate. No special prior uplift is warranted beyond mechanism coherence.

    '
  testability_note: 'Single derived time series (r_t has one degree of freedom). With 20-60 trades/yr, walk-forward
    OOS windows will have ~3-10 trades per fold — thin but not dead for estimating directional accuracy. The ADF
    pre-check (condition a) is the correct first gate: a non-stationary r_t means effective N = 0 for mean-reversion
    testing. If r_t IS stationary, ~320-960 total trades in-sample provides adequate power for IS fit; OOS power
    remains thin per fold. The half-life (condition c) is the second binding check — if the residual reverts in
    1 bar, signals are effectively noise; if > 20 bars, cost compounds past the edge.

    '
  cost_note: '3-leg round-trip: EURUSD daily spread ~2.0 pips + GBPUSD ~2.5 pips + EURGBP ~2.5 pips = ~7 pips total.
    Multi-day hold (est. 5-20 day average) means cost is a one-time 7-pip charge against the residual''s typical
    reversal magnitude. For the strategy to survive, the average reversal at z > 2 must exceed 7 pips in EURGBP-equivalent
    terms. Plausible if sigma(r_t) in EURGBP pips is >= 5 pips, but genuinely marginal. The falsification cost-consumption
    threshold (70% rule) directly tests this; no cost-kill at screening stage, but it is the central risk.

    '
- id: QRA-2
  verdict: conditional-survive
  condition: 'The asymmetry claim (JPY-crosses continue the gap, USD-majors fade it) is the ONLY falsifiable core.
    Both class-conditional legs must yield net-of-cost positive OOS expectancy. If only one class works OOS, the
    surviving leg must be registered as a NEW single-class proposal with Bonferroni penalty; the combined hypothesis
    is then partially falsified and cannot claim the gap-asymmetry mechanism as validated. Combined walk-forward
    OOS Sharpe >= 0.30. Gap gate must be calibrated on IS data only (no OOS snooping on gate threshold selection).

    '
  dedup: 'PASS. The information source is g_t = ln(open_t) - ln(close_{t-1}), a daily discontinuity feature absent
    from all archived families (which operate on close-to-close series only). The JPY-continuation leg is momentum-adjacent
    (same-sign gap -> same-sign intraday return), but the alpha claim lives in the ASYMMETRY between pair-classes,
    not in the continuation alone. Without the asymmetric conditioning on pair-class, the base rule has no claimed
    edge (it would be mixed and net-null by the QR''s hypothesis). The new information source is the gap-discontinuity
    feature crossed with pair-class identity -- neither element alone is novel enough to survive dedup; together
    they constitute a new mechanism. The JPY-continuation leg alone would be a momentum re-skin (AUTO-KILL in isolation)
    -- this is a genuine adjacent-but-distinct judgment call; NHT accepts it ONLY because the falsification sketch
    correctly binds both legs simultaneously and KILLS if the asymmetry is absent.

    '
  base_rate_note: 'Reference class: OHLC-geometry constructs; honest-N = 11, 0 validated OOS alpha. Prior: low.
    The economic story (Asian-risk repricing vs thin-book stamping noise) is coherent and pair-class-specific; FX
    gaps are smaller than equity gaps due to near-24h trading, but the 00:00 UTC stamp creates genuine discontinuities
    (weekend opens, Asian-session repricing). No special prior uplift beyond mechanism coherence.

    '
  testability_note: '12 pairs split into 6 JPY-cross + 6 USD-major classes. After gap gating: est. 30-80 signals/yr/pair
    = 180-480/yr per class. Walk-forward OOS: several hundred events per class over 3+ year OOS windows. The 6 JPY-crosses
    share a JPY leg (effective dimension ~2-3 within class); same for USD-majors (shared USD leg). The class-level
    test has adequate power; the per-pair within-class test does not. The asymmetry test (class A vs class B coefficient
    sign) is the appropriate primary test and has adequate OOS power given the trade count.

    '
  cost_note: 'Open-to-close 1-day hold. EURUSD/GBPUSD: ~2.0-2.5 pip cost vs. 20-50 pip typical open-to-close range
    on gated large-gap days. Adequate headroom for majors. JPY-crosses: ~3-5 pip cost vs. 30-80 pip range. Marginal
