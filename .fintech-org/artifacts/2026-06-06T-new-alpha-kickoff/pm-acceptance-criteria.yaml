  - "Momentum re-skins — Bet#1 retired, corrected DSR 0.13, archived"
  - "MA-crossover, Bollinger-RSI, TAS-ceiling-4h re-skins — all archived"
  - "ORB (Opening Range Breakout) variants — archived family, blocked"
  - "ML-model strategies (any hypothesis requiring a trained ML model) — route to ml-researcher in a dedicated future track if proposed; out of scope here"
