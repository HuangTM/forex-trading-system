body: |
  ## Purpose and scope rationale

  This wave is the firm's first systematic NEW-alpha hypothesis generation since
  the 2026-05-31 Honest Review reset. The reset established: zero validated OOS
  alpha; the carry family is calendar-locked (confirmatory freeze, trial f2fb41fd)
  until 2028-10-06 and permanently closed to re-parameterization; and the org has
  accumulated 40 trials with the following archived families: carry (all variants),
  momentum/Bet#1 (corrected DSR 0.13), ma_crossover, bollinger_rsi, tas_ceiling_4h.

  Given this context, the firm's current alpha gap is structural: no direction has
  been validated and the easy parameterization space of known-literature strategies
  has been exhausted. A genuinely new kickoff wave requires:
    (a) Mechanism novelty — information sources or structural hypotheses not present
        in any archived family.
    (b) Honest Bayesian posture — the base-rate of finding tradeable forex alpha is
        low; proposals must acknowledge this explicitly in the cost-survival note.
    (c) No premature trial expenditure — this wave produces paper artifacts only;
        the trial counter burns only when a candidate enters a full pre-registration
        + backtest in a follow-on track.

  ## Role sequencing

  Wave 1 (PM): this artifact.
  Wave 2 (QR-A + QR-B, parallel): slice-A and slice-B generation, independent.
  Wave 3 (NHT): adversarial screen of all proposals from both slices.
  Wave 4 (HoQR): applies rubric, produces direction view, generates final ranking
    incorporating NHT verdicts.
  Wave 5 (Principal Reviewer): review wave on the ranked portfolio and NHT screen.
  Wave 6 (PM): assembles CONSENSUS-shortlist after PR approval.

  The sequencing ensures NHT sees all proposals before HoQR finalizes ranking
  (preventing HoQR from ranking a proposal that NHT would auto-kill). QR-A and
  QR-B run in parallel on disjoint slices to maximize coverage without duplication.

  ## Terminal deliverable

  A ranked shortlist of 3–5 surviving proposals + ONE recommended first candidate
  for full pre-registration in a dedicated follow-on track. The recommended candidate
  must have: data available now (no acquisition required), a specific falsification
  sketch checkable with the existing backtest infrastructure, an honest cost-survival
  note, and NHT verdict = survive.

  ## What this wave does NOT do

  It does not produce: backtests, code, pre-registrations, trial counter increments,
  or any output touching live or paper capital. The org trial counter remains at 40
  at wave close, and this is verified in the CONSENSUS-shortlist terminal artifact.

