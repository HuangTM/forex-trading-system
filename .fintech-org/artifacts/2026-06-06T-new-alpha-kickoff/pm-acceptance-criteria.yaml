# ── Hard constraints (machine-checkable strings) ──────────────────────────────
hard-constraints:
  - "no_backtest_in_wave: true — this wave produces paper proposals only; no return-performance data is touched, no backtests are executed"
  - "no_trial_increment: true — the org trial counter (currently 40 in .fintech-org/trials.jsonl) must NOT increment in this wave; a trial burns only when a chosen candidate receives a full pre-registration + backtest in a follow-on track"
  - "no_live_capital: true — backtest-only firm; no paper trading, no live orders at any stage"
  - "no_archived_family_reskins: true — hypotheses that are re-parameterizations of archived families (carry, momentum/Bet#1, ma_crossover, bollinger_rsi, tas_ceiling_4h) are auto-killed; NHT holds the archive-dedup veto"
  - "falsification_sketch_required_per_proposal: true — every proposal must include a clearly stated falsification sketch (what specific result kills this hypothesis and is checkable in backtest)"
  - "data_availability_stated_per_proposal: true — every proposal must declare whether required data is available now (in the verified data inventory) or requires acquisition; acquisition decisions are CEO-only and out of scope for this wave"
  - "cost_survival_sanity_required: true — every proposal must include an honest qualitative note on whether the alpha mechanism plausibly generates signal large enough to survive the realistic per-pair cost model (spread + slippage + commission + swap)"
  - "min_proposals_per_researcher: 4 — each QR slice (A and B) must produce at least 4 proposals"
  - "max_proposals_per_researcher: 7 — each QR slice (A and B) must produce at most 7 proposals"
  - "no_ml_model_strategies: true — hypotheses requiring ML model training are out of scope; route to ml-researcher in a future dedicated track"
  - "no_code_in_wave: true — no implementation code, no scripts, no backtests; proposals are mechanism + falsification sketch + data req + capacity sanity only"
  - "no_data_purchases_in_wave: true — data acquisition requires a separate CEO decision; proposals may flag a data-acquisition requirement but cannot presuppose it"

# ── Criteria (one per role deliverable; done_when predicates are machine-checkable) ─
criteria:

  - id: GEN-slice-A
    description: >
      Quant Researcher A generates 4–7 genuinely new alpha hypotheses drawn from
      SLICE A: price, volatility, and cross-sectional structure sourced exclusively
      from the available OHLCV data. Coverage must span at least two of the following
      sub-domains: (i) 4h microstructure-adjacent patterns (EURUSD, GBPUSD, USDJPY),
      (ii) cross-pair relative value (spreads between pairs, ratio series, PCA-based
      structure), (iii) intraday-to-daily vol surface proxies derivable from OHLCV
      (e.g., high-low range ratios, Parkinson estimator, overnight gaps). No archived
      family re-skins. Each proposal must include: mechanism statement (why it works),
      falsification sketch (what kills it), data availability assertion (all three
      4h series confirmed present in data/processed/), and a cost-survival sanity note.
    owner: quant-researcher-A
    done_when: >
      An artifact at .fintech-org/artifacts/2026-06-06T-new-alpha-kickoff/qr-a-proposals.yaml
      exists with 4–7 proposal entries, each containing non-empty fields for:
      hypothesis_name, mechanism, falsification_sketch, data_available (boolean + source),
      cost_survival_sanity, and archived_family_overlap: none.
      Proposals with archived_family_overlap not equal to "none" are counted as
      auto-killed and do NOT count toward the 4–7 minimum.

  - id: GEN-slice-B
    description: >
      Quant Researcher B generates 4–7 genuinely new alpha hypotheses drawn from
      SLICE B: event/calendar/macro-conditioning and alternative signal sources.
      Coverage must span at least two of the following sub-domains:
      (i) rate differentials used as conditioning variable (NOT as the carry signal itself,
          which is archived — e.g., rate-differential regime conditioning for a different
          structural hypothesis),
      (ii) calendar/session effects (Tokyo, London, New York session open/close,
           weekday effects, month-turn effects) derivable from available OHLCV timestamps,
      (iii) spread data from data/spreads/ as a signal (e.g., spread widening as a
           volatility/liquidity proxy for conditioning),
      (iv) trade execution data from data/trades/executions.parquet as a signal,
      (v) data-acquisition-worthy ideas (clearly flagged as requiring external data;
          CEO decision required before any trial can proceed).
      Each proposal must include: mechanism statement, falsification sketch, data
      availability assertion, and cost-survival sanity note.
    owner: quant-researcher-B
    done_when: >
      An artifact at .fintech-org/artifacts/2026-06-06T-new-alpha-kickoff/qr-b-proposals.yaml
      exists with 4–7 proposal entries, each containing non-empty fields for:
      hypothesis_name, mechanism, falsification_sketch, data_available (boolean + source
      path or acquisition_required: true), cost_survival_sanity, and
      archived_family_overlap: none.
      Proposals requiring data acquisition are counted toward the minimum but must be
      flagged acquisition_required: true and are NOT eligible for the recommended-first-
      candidate slot unless the CEO separately authorizes the data purchase.

  - id: HOQR-rubric-and-ranking
    description: >
      Head of Quant Research (HoQR) produces: (a) a ranking rubric applied uniformly
      to all proposals from both slices, and (b) the final ranked portfolio.
      The rubric must score each proposal on at minimum: mechanism novelty (not a
      re-parameterization), theoretical prior (why this pair/timeframe should have this
      edge), falsifiability quality (is the kill criterion specific and checkable),
      cost-survival plausibility (can the mechanism plausibly clear the cost model),
      and data-availability tier (available now vs acquisition-required).
      The HoQR provides a direction view: which sub-domain has the strongest a-priori
      case given the firm's data inventory and the archived-family exclusion set.
      HoQR does NOT run any backtests; ranking is based on mechanism quality only.
    owner: head-of-quant-research
    done_when: >
      An artifact at .fintech-org/artifacts/2026-06-06T-new-alpha-kickoff/hoqr-ranking.yaml
      exists containing: rubric (named criteria with weights or ordinal priority),
      direction_view (narrative ≤ 200 words), ranked_proposals (ordered list of all
      surviving proposals with rubric scores), and explicit_kill_list (NHT-screened-out
      proposals with reasons, populated after NHT-screen criterion is satisfied).
      The ranked list must identify exactly ONE recommended first candidate for
      pre-registration in the follow-on track.

  - id: NHT-screen
    description: >
      Null-Hypothesis Tester conducts adversarial screening of ALL proposals from both
      slices before the HoQR produces its final ranking. Three mandatory screens:
      (1) Archive-dedup veto: any proposal that is a re-skin of carry, momentum,
          ma_crossover, bollinger_rsi, or tas_ceiling_4h families is auto-killed;
          NHT states the specific mechanism overlap.
      (2) Base-rate prior: NHT applies a base-rate adjustment — given honest-N ≈ 11
          validated hypotheses in forex (across the known quant literature) and the
          firm's trial counter at 40 with zero validated OOS alpha, NHT notes for each
          proposal whether the base-rate prior is favorable, neutral, or unfavorable
          (with brief rationale), and flags any proposal where the mechanism is
          well-known and likely already discovered.
      (3) Untestability screen: any proposal that cannot be falsified with the
          available data (or the proposed acquirable data) within a single well-powered
          backtest is flagged untestable and removed from the survivor pool.
      NHT dissent is append-only per firm rule 6: objections are recorded verbatim
      and cannot be paraphrased or overridden by subsequent consensus.
    owner: null-hypothesis-tester
    done_when: >
      An artifact at .fintech-org/artifacts/2026-06-06T-new-alpha-kickoff/nht-screen.yaml
      exists with: for each proposal — nht_verdict (survive | auto-kill | flagged),
      archive_dedup_result (clean | killed: <reason>), base_rate_prior
      (favorable | neutral | unfavorable | unknown: <rationale>), and
      testability_verdict (testable | untestable: <reason>).
      Any auto-kill includes the specific mechanism overlap with the archived family.
      NHT dissent on any survivor is recorded verbatim in a nht_dissents list.

  - id: PR-review
    description: >
      Principal Reviewer conducts an independent wave review of the ranked portfolio
      and the NHT screen after both are assembled. The PR checks:
      (a) That the NHT archive-dedup veto was applied to ALL proposals (not just
          a subset), with no proposals slipping through that share mechanism with
          archived families.
      (b) That the HoQR ranking rubric was applied consistently — each proposal
          in the ranked list has rubric scores, and the recommended first candidate
          is the top-ranked survivor by the stated rubric.
      (c) That every surviving proposal has all three required elements:
          falsification sketch, data availability statement, and cost-survival note.
      (d) That no backtest results, no return-performance data, and no trial counter
          increments appear anywhere in the wave artifacts.
      The PR may flag proposals for re-review but does NOT run backtests or
      alter the NHT dissent record.
    owner: principal-reviewer
    done_when: >
      An artifact at .fintech-org/artifacts/2026-06-06T-new-alpha-kickoff/pr-review.yaml
      exists with: decision (approve | needs-work | reject), findings list (each with
      id, severity: blocking | non-blocking, and description), and a confirmation that
      all four checks (a)–(d) above were performed. A needs-work or reject verdict
      requires the identified roles to revise before CONSENSUS-shortlist is signed.

  - id: CONSENSUS-shortlist
    description: >
      Terminal deliverable. PM assembles the ranked shortlist into a CONSENSUS document
      after: GEN-slice-A, GEN-slice-B, NHT-screen, HOQR-rubric-and-ranking, and
      PR-review are all complete and the PR-review decision is "approve."
      The CONSENSUS document must contain:
      (a) A ranked shortlist of 3–5 surviving proposals (in ranked order), each with a
          one-paragraph mechanism summary, NHT verdict, rubric score, and data tier.
      (b) ONE explicitly recommended first candidate for pre-registration in the
          follow-on track, with a rationale statement (≤ 100 words).
      (c) An explicit kill-list of all screened-out proposals with the reason for
          each kill (archived-family overlap, untestable, failed cost-survival,
          acquisition-required-and-CEO-not-yet-consulted, or HoQR bottom-ranked).
      (d) A statement that the org trial counter was NOT incremented in this wave
          and the verified count (40) at wave close.
      (e) All role signatures: quant-researcher-A, quant-researcher-B, HoQR, NHT,
          principal-reviewer, PM.
    owner: pm
    done_when: >
      A CONSENSUS_2026-06-06_new_alpha_kickoff.md file is committed to docs/decisions/
      containing all five elements (a)–(e). The shortlist has 3–5 entries. Exactly one
      recommended first candidate is named. The kill-list is non-empty (given the NHT
      screen, some proposals will be killed). All six role signatures are present.
      PM must confirm PR-review decision was "approve" before signing the consensus.

