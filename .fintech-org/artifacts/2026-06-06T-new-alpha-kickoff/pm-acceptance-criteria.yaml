# ── Roles staffed ────────────────────────────────────────────────────────────
roles-staffed:
  - role: pm
    rationale: >
      Produces this acceptance-criteria artifact (wave 1); collects role artifacts
      and assembles the terminal CONSENSUS-shortlist document (wave-5). Makes no
      domain or statistical adjudications. Routes knowledge gaps per pm.md discipline.

  - role: head-of-quant-research
    rationale: >
      Owns the ranking rubric and direction view — the only role with authority to
      produce the final ranked order of proposals and name the recommended first
      candidate. Also holds the archive-dedup coordination responsibility (working
      alongside NHT). Must ensure the direction view is calibrated to the firm's
      honest-N ≈ 11 and zero validated OOS alpha posture.

  - role: quant-researcher-A
    rationale: >
      Slice A generation — price, volatility, cross-sectional OHLCV structure,
      4h microstructure-adjacent, cross-pair relative value. Disjoint from slice B
      to maximize coverage; the two researchers MUST NOT duplicate sub-domains.
      Produces qr-a-proposals.yaml.

  - role: quant-researcher-B
    rationale: >
      Slice B generation — event/calendar/macro-conditioning, alternative uses of
      existing feeds (rate differentials as conditioner not signal, spread data,
      trade execution data, session effects), plus data-acquisition-worthy ideas
      (flagged acquisition_required: true). Produces qr-b-proposals.yaml.

  - role: null-hypothesis-tester
    rationale: >
      Adversarial screening of ALL proposals before ranking is finalized. Three
      mandatory screens: archive-dedup veto (structural blocker), base-rate prior
      adjustment (given honest-N ≈ 11 and trial counter at 40), and untestability
      check. NHT dissent is append-only per firm rule 6. Produces nht-screen.yaml.

  - role: principal-reviewer
    rationale: >
      Independent review wave after all role artifacts are assembled. Checks rubric
      consistency, NHT coverage completeness, proposal element completeness, and
      no-backtest compliance. Produces pr-review.yaml; PR approval is a gate on
      the terminal CONSENSUS-shortlist.

