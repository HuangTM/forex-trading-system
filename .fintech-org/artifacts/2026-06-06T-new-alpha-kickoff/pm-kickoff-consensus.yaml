body: |
  ## PM Synthesis — New-Alpha Kickoff Wave 2026-06-06

  The wave was conducted with full process integrity across all phases: proposals (QR-A/QR-B),
  independent NHT screen (with a documented 6-stall infra outage recovered via micro-decomposition),
  HoQR scoring against a frozen rubric, independent Principal Reviewer check, HoQR QGR closure, and
  PM consensus authorship.

  The output is a clean, auditable research-direction decision: one recommended first candidate
  (QRB-3), two kills (QRA-3, QRB-5), two overlays (QRB-2, QRB-4-GATE), one roadmap item (QRB-6),
  and six ranked candidates that do not clear the first-candidate bar. The NHT dissent is preserved
  verbatim and does not block. The single load-bearing uncertainty (PR-F1 mechanism-quality flip
  sensitivity) is disclosed to the CEO with full context.

  The wave produced no trial spend, no performance computation, and no trial counter increment.
  It delivers exactly what the PM acceptance criteria required: a ranked shortlist with a single
  first-candidate recommendation (or explicit no-spend), supported by a frozen rubric applied
  consistently, with NHT conditions and portfolio preconditions honored throughout.

  The CEO's decision is the only remaining gate before the wave closes.

