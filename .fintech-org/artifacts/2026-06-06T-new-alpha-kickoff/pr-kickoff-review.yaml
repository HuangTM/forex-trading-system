body: |
  ## Decision: APPROVE-WITH-CONDITIONS

  The wave package is sound and the recommendation (QRB-3 turn-of-month as the
  single first candidate, max-trials=1) is defensible and rubric-faithful on
  every load-bearing axis I was asked to check. No blocking defect was found.
  Two conditions attach (below), and one major risk should be surfaced to the
  CEO before any pre-registration spend.

  ## What passed cleanly (the load-bearing checks)

  1. RUBRIC FIDELITY — the core check. All six RANKED-CANDIDATE weighted totals
     are arithmetically exact against the frozen weights, and the first-candidate
     bar was applied as written. QRB-3 genuinely clears every bar requirement
     (mechanism≥4, novelty≥4, cost≥4, stat≥4, falsifiability≥3, data==5, all
     dims≥3, NHT survive); the five non-clearing candidates each fail on the
     specific dimensions the artifact names. Weights/anchors/bar-thresholds in
     the ranking are byte-identical to the frozen rubric — no post-hoc tuning.
     The rubric was plausibly frozen before proposals (the direction-view
     pre-named QRB-3's class).

  2. NHT-CONDITION ADOPTION — QRB-3's three binding conditions are adopted
     verbatim, and all three portfolio preconditions are honored (QRB-2 &
     QRB-4-GATE as overlays not candidates; QRB-6 roadmap-only; DSR denominator
     handled via max-trials=1).

  3. WAVE-COMPLIANCE — no performance computation on real data anywhere; trial
     counter independently re-verified at 40 (unincremented); trial_id markers
     correct.

  4. KILL INTEGRITY — QRA-3 (cost-kill, quantified) and QRB-5 (three convergent
     triggers) have internally consistent, evidence-cited rationales, faithfully
     echoed and correctly excluded from scoring.

  5. CONTRACT COMPLETENESS — all five PR-checkable done_when predicates satisfied.

  ## Conditions for approval (both minor, neither blocks the recommendation)

  C1 (PR-F2): Correct the three overlay/roadmap weighted_totals to match their
     own dimension scores (QRB-2→3.89, QRB-4→3.62, QRB-6→4.38). None touch the
     first-candidate decision, but the ranking artifact must be internally
     consistent before it is signed into CONSENSUS. Note QRB-6 corrected to 4.38
     only strengthens its already-stated "highest in portfolio" roadmap status.

  C2 (PR-F3): Either rank QRA-2/QRA-5 by weighted_total as the rubric's
     aggregation rule requires (which would put QRA-5 above QRA-2), or relabel
     the current order as an explicit rubric-sanctioned HoQR judgment call
     (tie_break step 5) rather than implying the tie-break ladder applies to
     non-tied scores. Cosmetic to the recommendation; both fail the bar.

  ## The one thing the CEO should hear (PR-F1, major)

  The entire recommendation balances on a single 3-vs-4 judgment: QRB-3's
  mechanism_quality. It is the ONLY survivor clearing the bar, and it clears
  ONLY because mechanism is scored 4. The frozen rubric's level-3 anchor
  literally names "month-end rebalancers" as a level-3 example; the score
  reaches 4 by invoking anchor-4's "mandate constraint" clause. The 4 is
  defensible and consistently applied — but a reasonable scorer could place this
  exact mechanism at 3, which would flip the wave to its explicitly-valid
  NO-SPEND outcome. This is concentrated model risk, not an error: the firm
  should go into QRB-3's pre-registration knowing the recommendation rests on
  one boundary call, and that the rubric's own pre-registered fallback
  (no-spend) was a live alternative.

  ## Inversion check (pre-mortem)

  If this package shipped and caused a wasted-trial P0: the most likely root
  cause is NOT an arithmetic or process error (those are clean for the
  candidate) — it is QRB-3's mechanism being a genuine level-3 (a known,
  partially-pre-traded calendar effect that has decayed below cost post-2015),
  scored generously to 4. The package's own mandatory stability-across-halves
  condition (2010-2017 vs 2018-2026) is the correct and adopted guardrail against
  exactly this failure; the residual risk is that the half-split is coarser than
  the McLean-Pontiff/Melvin-Prins 2015-publication break the NHT itself flags
  for QRB-6 (a sharper post-2015 sub-window test). Recommend QRB-3's
  pre-registration borrow QRB-6's post-2015 isolation test, not just a midpoint
  half-split.

  ## Net

  Approve-with-conditions. The build org did NOT miss anything that breaks the
  recommendation. What it under-surfaced is (a) three internal-arithmetic slips
  on non-candidate rows, (b) an off-rule runner-up reorder, and (c) the
  single-point-of-failure nature of the one score the whole wave turns on. Fix
  C1/C2 before CONSENSUS sign-off; carry PR-F1 into QRB-3's pre-registration as
  an explicit known-risk.

