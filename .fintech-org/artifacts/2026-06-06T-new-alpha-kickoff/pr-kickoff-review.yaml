      The 4 is defensible (a passive index-tracking mandate IS the "inelastic
      hedging need / structurally price-insensitive flow" anchor 4 names), and
      it is internally consistent with how the scorer treated the behavioral-
      counterparty proposals (QRA-1/2/5 all got 3). But because the rubric's own
      level-3 exemplar IS "month-end rebalancers," a reasonable scorer could land
      this on 3 — which would collapse the recommendation to NO-SPEND. The
      recommendation is therefore a single-judgment-call away from a different
      terminal outcome. This is not an error; it is concentrated model risk that
      the package does not flag as such.
    evidence: >
