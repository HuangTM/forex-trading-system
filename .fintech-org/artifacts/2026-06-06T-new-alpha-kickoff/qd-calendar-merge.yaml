deviations-from-instructions:
  - >
    RBNZ 2025 partial-year: fma.govt.nz is described in the fragment as
    "near-primary" (NZ government regulator citing RBNZ directly). The
    instructions specify 4 allowed verification grades; "near-primary" is not
    one of them. Mapped to "aggregator-only" (next-closest tier) rather than
    inventing a fifth grade. This is conservative and transparent.
  - >
    ECB "anchor-verified" grade: The instructions listed "anchor-verified" as
    one of the 4 allowed grades. The fragment used "aggregator-only-partial"
    for partially-verified ECB years. Mapped to "aggregator-only" as the
    appropriate four-valued-schema grade for years where only some dates are
    anchor-confirmed. The "anchor-verified" grade is technically available but
    would misrepresent years where the majority of dates are still
    training-memory-unverified. Per-year grade assigned conservatively.

