body: |
  Canonical central-bank decision-date dataset built from all seven verified
  fragment files. Construction:
  1. All 7 fragments read and all dates, grades, emergency exclusions extracted.
  2. Grade mapping: fragment per-year verification status → 4-valued schema
     (verified-official | anchor-verified | aggregator-only |
     training-memory-unverified).
  3. Emergency dates excluded per each fragment's emergency_dates_excluded list.
  4. Window filter: 2010-01-01 through 2026-04-06 applied.
  5. BoC 2010-2018 and RBNZ 2010-2023: anti-fabrication rule enforced — zero
     rows for these bank/year combinations.
  6. BoE corrections applied: 2026-02-06→2026-02-05, 2026-03-20→2026-03-19.
  7. Sorted by (date, bank). No duplicates. All 842 rows scheduled=True.
  8. Parquet written to data/rates/cb_decision_dates.parquet.
  9. 40-test suite written and verified. Sacred no-lookahead: PASS. Ruff: clean.

