      is large enough that z>2 moves are multi-pip. This is the central risk; the
      falsification sketch's cost-consumption threshold directly tests it.
    regime_dependence: >
      Fails when the three venues' closing liquidity is uniform (low residual noise),
      i.e., calm low-vol regimes. Also fails during EUR or GBP regime breaks (Brexit
