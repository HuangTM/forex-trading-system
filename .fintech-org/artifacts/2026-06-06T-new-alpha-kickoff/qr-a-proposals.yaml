      the daily envelope (steep slope) the market is in a choppy/reverting state, and
      when flat the market is in a clean directional state — so the slope conditions
      whether a simple trend-follow or fade should be applied to the NEXT day.
    information_source: >
      A vol-term-structure feature: TS_t = (sum of 4h Garman-Klass variances over day t)
      / (daily-bar Parkinson variance for day t), for the 3 pairs with 4h data
      (EURUSD, GBPUSD, USDJPY). This is a 4h-vs-daily vol-surface PROXY — a brand-new
