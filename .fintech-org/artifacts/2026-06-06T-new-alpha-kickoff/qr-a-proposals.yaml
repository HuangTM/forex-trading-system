body: |
  Slice-A portfolio (price/vol/cross-sectional structure on available OHLCV).
  Key data fact driving the set: VOLUME IS ZERO everywhere — every proposal is
  built from OHLC geometry, cross-pair structure, or session-block timing only.
  Sub-domain coverage: cross-pair relative value (QRA-1), gap/discontinuity (QRA-2),
  intraday-to-daily vol surface proxy (QRA-3), cross-sectional panel dispersion (QRA-4),
  4h session microstructure (QRA-5) — all three required sub-domains covered.

  Two-line summaries:
  - QRA-1 Triangular no-arb residual reversion: fade the EURGBP-vs-(EURUSD/GBPUSD)
    daily-close consistency residual; alpha = stale-stamp residual mean-reversion,
    net-zero directional exposure. Risk: 3-leg cost. confidence med.
  - QRA-2 Overnight-gap asymmetry: JPY-crosses CONTINUE the daily open-gap, USD-majors
    FADE it; alpha = the directional asymmetry conditioned on pair-class. Intraday
    open-to-close hold, gated to large gaps for cost headroom. confidence med.
  - QRA-3 Vol term-structure gate: ratio of intraday 4h GK-vol to daily Parkinson range
    classifies chop-vs-trend regime and flips a 1-day continuation/fade. Worst cost
    profile (daily rebalance, 3 majors); gate must reduce turnover. confidence low.
  - QRA-4 Cross-sectional dispersion regime: on panel-dispersion spikes, run a
    dollar-neutral cross-sectional reversion basket (short top movers / long bottom);
    flat when dispersion compressed. Risk: multi-leg cost + reversion-vs-momentum sign.
    confidence med.
  - QRA-5 Overlap-bar CLV reversion: fade the 13:00 UTC London-NY overlap 4h bar when it
    closes at a range extreme, into the 17:00 NY-afternoon bar. Explicitly the OPPOSITE
    of ORB (reversion not breakout); auto-kills if it behaves like continuation.
    Intraday, news-day exclusion required. confidence med.

  RECOMMENDATION (my view, HoQR adjudicates): QRA-1 is the strongest a-priori candidate
  — it is the most genuinely orthogonal (net-zero directional, a no-arb identity residual
  with no archived-family overlap), data is available now, and the falsification sketch
  is sharp (OU half-life vs holding cost, ADF stationarity). Its only real risk is the
  3-leg cost floor, which the sketch tests directly. QRA-3 is the weakest (daily-rebalance
