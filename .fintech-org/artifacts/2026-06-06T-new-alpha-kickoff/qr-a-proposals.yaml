proposals:

  - id: QRA-1
    name: "Triangular no-arbitrage residual mean-reversion (EUR/GBP/USD ring)"
    hypothesis: >
      The implied EURGBP cross computed from EURUSD/GBPUSD diverges transiently from
      the directly-quoted EURGBP close because the three pairs are quoted/closed by
      different liquidity pools at the 00:00 UTC daily stamp; the residual mean-reverts
      as the cross re-coheres, giving a relative-value signal independent of any
      directional view on the three currencies.
    information_source: >
      The DAILY-CLOSE consistency residual r = ln(EURGBP_close) - [ln(EURUSD_close) -
      ln(GBPUSD_close)] across three SIMULTANEOUS daily bars. This is a cross-pair
      structural constraint (a near-identity that should hold to within cost), NOT a
      price-trend or rate-differential feature. No archived family uses a triangular/
      no-arb residual — carry uses rate diffs, momentum/MA/BB use single-series price.
      The alpha claim lives entirely in the residual, a new information source.
    structure: >
      Form r_t daily from the three closes. Standardize r_t by its trailing N-day
      rolling stdev (expanding-mean to avoid lookahead). Signal: when z(r_t) > +k,
      the implied-vs-direct cross is rich -> short the spread (short EURGBP synthetic
      rich leg / long cheap leg via the EURGBP direct vs EURUSD-GBPUSD basket);
      when z(r_t) < -k, reverse. Flat in the |z|<k band. Position is a 3-leg
      relative-value basket with net-zero directional currency exposure by construction.
    why_not_arbed: >
      True intraday triangular arb (sub-second) is fully harvested by HFT and is NOT
      the claim here. The claim is a DAILY-CLOSE stamping artifact: the three pairs'
      00:00 UTC closes are recorded from venues that thin out at that hour, so the
      recorded residual carries stale-quote noise that a daily trader (not an HFT) can
      fade. The other side is end-of-day mark-to-market flow and retail that quote each
      pair independently. Persistence: the inefficiency is in the DATA STAMP, not the
      live market — it survives precisely because nobody trades the daily-close residual.
    falsification_sketch: >
      Backtest the 3-leg basket 2010-2026, walk-forward (engine default windows),
      entry_delay 1 bar. KILL if net-of-cost Sharpe < 0.3 OOS, OR if the residual's
      half-life of mean-reversion (Ornstein-Uhlenbeck fit on r_t) exceeds the holding
      window such that >70% of gross edge is consumed by the 3-leg round-trip cost
      (3x spread+slippage+commission). Also KILL if z-entry signals are <10/yr (too rare
      to be a strategy) or if the residual is non-stationary (ADF fails to reject unit
      root) — a non-mean-reverting residual has no edge.
    data_availability: "available-now: data/processed/{EURUSD,GBPUSD,EURGBP}_daily.parquet close column. All three confirmed present, 4237 aligned daily rows 2010-2026."
    cost_survival: >
      Holding period: days (until z reverts inside band), est. 20-60 trades/yr.
      HONEST: this is a 3-LEG basket, so round-trip cost ~3x a single pair. EURGBP+EURUSD+
      GBPUSD daily spreads sum to ~5-6 pips round-trip plus slippage. The residual must
