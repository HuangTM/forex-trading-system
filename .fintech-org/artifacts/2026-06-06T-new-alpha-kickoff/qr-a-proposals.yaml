  - id: QRA-4
    name: "Cross-sectional return dispersion as a panel-wide mean-reversion regime switch"
    hypothesis: >
      When the 12-pair daily panel's cross-sectional return DISPERSION (the spread of
      one-day returns across pairs) spikes, currencies have repriced idiosyncratically
      and tend to partially RE-CONVERGE the next day (cross-sectional mean reversion);
      when dispersion is compressed, co-movement dominates and the same signal has no
      edge — so dispersion is a regime switch for a cross-sectional reversion book.
    information_source: >
      Cross-sectional dispersion D_t = stdev across the 12 pairs of their day-t returns
      (USD-normalized to a common numeraire to avoid double-counting USD), and each
      pair's cross-sectional rank/demeaned return. This is PANEL dispersion structure —
      a 12-pair cross-section, not a per-pair time-series. No archived family uses the
      cross-sectional moment of the panel; carry ranks by rate-diff, momentum ranks by
      own trailing return. Dispersion-as-regime is a new conditioning variable.
    structure: >
      Daily: convert the 12 pairs to a common base (e.g., all vs USD where derivable;
      JPY-crosses decomposed) to get comparable currency returns, compute cross-sectional
      mean and D_t. Demean each currency's return cross-sectionally -> r_i_demeaned.
      Signal: when D_t > high-quantile (dispersion spike), take a cross-sectional
      reversion position: short the top-decile demeaned movers, long the bottom-decile,
      dollar-neutral across the basket; expect partial convergence next day. When D_t is
      below the gate, stay FLAT (no reversion edge). Hold 1-3 days to convergence.
    why_not_arbed: >
      Cross-sectional reversion is harvested in EQUITY stat-arb at scale, but the FX
      12-pair cross-section is small (effectively ~8 currencies) and the dispersion-gated
      version is not a standard FX product — most FX RV desks run cointegration PAIRS, not
      a dispersion-gated panel reversion. The other side is the idiosyncratic repricing
      flow (a single-currency news shock) that over-shoots and partially retraces.
      Persists because FX panel breadth is too small for big stat-arb shops to bother and
      retail trades single pairs.
    falsification_sketch: >
      Backtest the dollar-neutral basket 2010-2026 walk-forward, entry_delay 1. KILL if
      the dispersion gate does not improve on an always-on reversion basket OOS (gate is
      spurious), OR if net-of-cost Sharpe < 0.3 OOS, OR if the converging leg's holding
      period exceeds the half-life such that cost (multi-leg basket, ~8-12 legs) eats
      >70% of gross. CRITICAL kill: if the "reversion" is actually slow MOMENTUM
      (top movers keep moving), the sign is wrong and edge is negative -> KILL immediately.
    data_availability: >
      available-now: all 12 daily parquet, close column, aligned 00:00 UTC 4237 rows.
      Currency decomposition (pair returns -> per-currency factor) is a pure linear
      transform of the available closes; no external data. JPY-cross + USD-major coverage
      gives ~8 distinct currencies (USD,EUR,GBP,JPY,AUD,NZD,CAD + crosses).
    cost_survival: >
      Holding period: 1-3 days. Trades/yr depends on dispersion-spike frequency (~gate to
      ~30-60 rebalances/yr). HONEST: this is a MULTI-LEG basket (8-12 legs), so cost is the
      dominant risk — every leg pays spread+slippage. Dollar-neutral helps net exposure but
      not cost. Survives only if the convergence move per leg clears its own round-trip
      cost; gating to large-dispersion days (bigger expected convergence) is the only
      cost-headroom lever. Honestly marginal; falsification cost-threshold tests it.
    regime_dependence: >
      Fails in trending USD regimes where dispersion reflects a real persistent factor
      (e.g., broad USD strength) that does NOT revert — the reversion sign inverts and the
      book bleeds. Fails when a single currency dominates dispersion (then it is a
      single-name bet, not diversified). Best in choppy, no-clear-factor environments.
    novelty_check: >
      vs carry: ranks/positions by cross-sectional return moment, not rate diff —
      orthogonal. vs momentum/Bet#1: this is cross-sectional REVERSION (opposite sign to
      momentum) AND gated by panel dispersion, not own trailing return. vs MA/BB: no
      single-series MA/band. vs ORB: no opening range, daily panel cross-section.
    confidence: medium

  - id: QRA-5
    name: "Intraday range-position reversion within the London-NY 4h session block"
    hypothesis: >
      Within the high-liquidity London-NY overlap 4h bar (13:00 UTC), price that closes
      near the EXTREME of that bar's high-low range (close-location-value at the tails)
      tends to mean-revert into the subsequent 17:00 (NY-afternoon) bar, because the
      overlap-bar extreme is driven by transient order-flow imbalance that the thinner
      NY-afternoon book retraces — a within-day session-structure reversion, not a
      breakout.
    information_source: >
      The close-location-value CLV = (close - low)/(high - low) of the SPECIFIC 13:00 UTC
      4h session bar (London-NY overlap), used to predict the SIGN of the next (17:00)
      4h bar return. This is intraday SESSION-STRUCTURE in the 4h bars that is explicitly
      NOT opening-range-breakout (it is an end-of-overlap reversion off the range extreme,
      opposite logic to ORB). New information source: a named-session CLV feature.
    structure: >
      For {EURUSD,GBPUSD,USDJPY} 4h series, isolate the 13:00 UTC bar each day. Compute
      CLV_overlap. Signal at the 13:00 close, executed at the 17:00 bar open
      (entry_delay 1 in 4h terms): if CLV >= 0.85 (closed near high) -> SHORT into the
      17:00 bar (fade the up-extreme); if CLV <= 0.15 -> LONG; flat otherwise. Exit at
      the 17:00 bar close (single 4h hold). Gate by requiring the 13:00 bar's range to
      exceed its trailing median (only fade meaningful extremes).
    why_not_arbed: >
      The overlap-bar extreme reversion is a microstructure-adjacent effect: the 13:00
      overlap concentrates flow, and the close-at-extreme reflects last-minute imbalance
      that the lighter NY-afternoon book cannot sustain. The other side is the
      liquidity-providing flow that fades the late-overlap push. Persists because it is a
      small, session-specific, single-bar effect — too small for institutions, and retail
      tends to CHASE the overlap extreme (momentum), taking the losing side, which is the
      behavioral source of the edge.
    falsification_sketch: >
      Backtest the single-bar fade on 3 pairs 2010-2026 walk-forward (4h bars), entry at
      17:00 open after 13:00 close — explicitly NO LOOKAHEAD (must pass the sacred
      test discipline). KILL if net-of-cost Sharpe < 0.3 OOS, OR if the CLV>=0.85 subset
      shows CONTINUATION (next-bar same-sign) rather than reversion (then it is a
      breakout, already archived as ORB-family in spirit — and a re-skin -> auto-kill),
      OR if the gated signal fires <20 times/yr/pair. Window discipline: walk-forward,
      no peeking at the 17:00 bar when forming the 13:00 CLV.
    data_availability: >
      available-now: data/processed/{EURUSD,GBPUSD,USDJPY}_4h.parquet, OHLC of the 13:00
      and 17:00 UTC bars. Confirmed: 13:00 bar present on ~all weekdays (4237-day span);
      17:00 bar present (it is the NY-afternoon grid slot). CLV needs high!=low (degenerate
      flat bars excluded).
    cost_survival: >
      Holding period: one 4h bar (~4 hours). Trades/yr ~150-250/pair before gating, ~60-120
      after the range gate. HONEST: this trades INTRADAY and frequently — the per-trade
      move must clear ~1-2 pip spread + slippage on each of entry and exit. A single 4h
      reversion on EURUSD is typically tens of pips of range, of which the fade captures a
      fraction; gating to large-range overlap bars is what creates the gross-vs-cost margin.
      This is the second-highest cost risk after QRA-3; honestly it may not clear cost on
      USDJPY (wider relative). Falsification Sharpe-after-cost is the gate.
    regime_dependence: >
      Fails on high-impact-news overlap days (FOMC, NFP at 12:30/14:00 UTC) where the
      overlap extreme is the START of a trend, not noise — the fade gets run over. Needs a
      news-day exclusion or it bleeds on exactly the biggest-range days. Best on normal
      liquidity days with no scheduled US data.
    novelty_check: >
      vs ORB/tas_ceiling_4h: OPPOSITE structure — ORB buys the breakout of a session
      range; this FADES the close-at-extreme of the overlap bar (reversion). The
      falsification sketch auto-kills it if it behaves like continuation, guaranteeing it
      is not a disguised ORB. vs carry: no rate diff. vs momentum/Bet#1: single-bar
      reversion, not trailing-return trend. vs Bollinger-RSI: no band/RSI; CLV is a
      within-bar range-position statistic, structurally different from a 20-period band.
    confidence: medium

