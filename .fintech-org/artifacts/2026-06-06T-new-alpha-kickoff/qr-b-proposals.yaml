body: |
  ## Slice-B generation summary

  Six proposals, spanning the required sub-domains:
    - Rate-differential CHANGES as a conditioner/event (QRB-1 slow data-lagged drift; QRB-6
      scheduled-announcement timing) — NOT the dead carry level.
    - Calendar/session effects (QRB-3 turn-of-month flow; QRB-4 intraday rollover hole;
      QRB-5 weekday seasonality).
    - Spread feed as a signal/state variable (QRB-2 liquidity-regime gate; QRB-4 hole def).

  ## Honest data-inventory conclusions that shaped the portfolio

  Two of the brief's candidate feeds were verified UNUSABLE as signal sources and are
  inventory-only:
    - data/trades/executions.parquet: 34 rows, one week (2026-04), all carry-family, slippage
      all zero, 4 failed broker-API calls. A paper-execution audit log, not alternative data.
    - data/predictions/2026-04.parquet: 106 rows, 7 dates, all carry-family — the firm's own
      archived carry signal, not an external feed.
  The genuinely informative non-OHLCV feeds are the SPREAD files (real intraday liquidity-hole
  structure at hour 17–18 UTC; 13–17% of days >2× median spread) and the rate-differential
  CHANGE series (197 discrete steps). The portfolio is built around those two plus pure
  calendar-time structure.

  ## Recommended-first-candidate posture (for HoQR)

  Among AVAILABLE-NOW proposals, QRB-3 (turn-of-month flow) has the cleanest cost-survival case
  and best power (~190 month-turns), and QRB-2 (spread GATE) is a low-risk net-cost improver.
  QRB-6 is the highest-prior mechanism but is acquisition_required (calendar dates) and thus
  INELIGIBLE for the first-candidate slot unless the CEO authorizes the (low-effort, free)
  calendar acquisition. Final ranking is HoQR's call.

