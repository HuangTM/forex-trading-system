confidence: high

body: >
  I retract the F_{D-1} hard ruling. The QR is right on economic grounds: the signed
  product y_e = sign(ret_D) · r_post is the correct alignment for the registered
  hypothesis ("post-decision reaction continuation"). My original ruling inadvertently
  forced the test to use the pre-announcement drift direction — the component explicitly
  declared dead post-2015 in §2.3 — as the alignment signal. Holding F_{D-1} would
  have embedded a ghost signal into the pre-reg.

  The HAC/bootstrap machinery is unaffected: PW adapts to the y_e series,
  recentering d_e = y_e - mean(y) correctly imposes H0 on the bootstrap, and the
  +1/+1 p-value convention is unchanged. All frozen constants (N_sel, SR0_pp, DSR gate,
  kill_switch thresholds, seed, K) are invariant to the filtration change.

  One amendment required: §4.4 (the sign-mapping compatibility contract from my
  math-rework1 patches) must be REWRITTEN to reflect bar-D filtration and invert
  the "disallowed vs. rejected" framing. The degenerate-case convention updates from
  ret_{D-1}=0 to ret_D=0, with FLAT/exclusion rather than +1/inclusion.
  §1.1 PART II must update "pre-decision drift direction" to "post-announcement
  reaction direction (sign of bar D return)."

  If the QR confirms the intellectual-honesty paragraph (documenting F_{D-1} as the
  considered-and-rejected alternative with economic reason), I recommend bypassing
  Round 2 and proceeding to consensus ratification. The pre-reg is unambiguous under
  the converged position. No capital is authorized at any stage.

