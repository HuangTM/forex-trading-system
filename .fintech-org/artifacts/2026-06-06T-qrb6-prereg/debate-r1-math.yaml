# ─────────────────────────────────────────────────────────────────────────────
# DEBATE ROUND 1 — Mathematician position on sign_align_e filtration
# Conflict: my rework1 ruling (F_{D-1}) vs QR rework1 ruling (bar-D signed product)
# ─────────────────────────────────────────────────────────────────────────────

position: converge-to-D-as-signed-product

position_summary: >
  I retract the hard F_{D-1} ruling from math-rework1.yaml and converge to the QR's
  bar-D signed-product construction, with one formal amendment to the null statement
  and one power-law caveat that must be frozen in the pre-reg. The economic and
  statistical arguments both favor bar D once worked through carefully. My F_{D-1}
  ruling was over-restrictive and — more critically — it tested the wrong economic
  object: the pre-announcement drift, which the pre-reg explicitly declares DEAD
  post-2015 (§2.3). Holding F_{D-1} as the sign would embed a dead signal as the
  alignment input, which is both economically incoherent and statistically
  misaligned with the registered H1 (§2.1: "post-decision reaction/reversal").

# ─────────────────────────────────────────────────────────────────────────────
# DERIVATION: why I change position
# ─────────────────────────────────────────────────────────────────────────────

derivation_honest_review:

  step1_economic_coherence: >
    §2.1 registers H1 as "post-decision reaction/reversal structure." §2.3 explicitly
    states the pre-announcement drift "essentially disappeared after 2015" and that the
    pre-window K_pre=1 bar is retained "only as a sign-alignment / positioning input,
    not as the source of claimed edge." If sign_align_e = sign(ret_{D-1}), I am using
    the DEAD pre-drift direction as the alignment signal. Under F_{D-1}, the registered
    hypothesis becomes "the direction of the pre-event trend (documented dead post-2015)
    predicts post-decision returns." This is not what the pre-reg claims to test.
    The QR's construction — sign_align_e = sign(ret_D), the initial post-announcement
    reaction — is the economically correct alignment for a continuation hypothesis.
    My ruling inadvertently tested a ghost.

  step2_no_lookahead_resolved: >
    The QR's no-look-ahead proof in patch A4/§5.0 is correct. sign(ret_D) =
    sign(close(D) - close(D-1)) is known at the close of bar D. Entry executes at D+1
    under entry_delay_bars=1. The post-window return runs from D+1 forward. No bar
    is simultaneously a sign-input and a realized-return bar without the mandatory
    delay. The bar-D return is the SIGNAL, consumed at formation; the P&L accumulates
    from D+1. This is textbook signal/execution separation and the engine's
    test_no_lookahead invariant enforces it. My concern about look-ahead was moot:
    this was always about hypothesis identity, not mechanical lookahead. I was right
    that it changes the hypothesis; I was wrong that the hypothesis change is
    statistically impermissible.

  step3_signed_product_statistic_validity: >
    y_e = sign(ret_D,e) · r_post,e is a well-defined per-event scalar. Its
    unconditional mean E[y_e] is a legitimate estimand. H0: E[y_e] <= 0 is a valid
    one-sided null on this signed product. The studentized mean t = sqrt(n)*mean(y)/omega_hat
    is the correct statistic. The bootstrap recentering d_e = y_e - mean(y) correctly
    zeros the sample mean under H0, and the bank-blocked stationary bootstrap produces
    a valid null distribution for this statistic regardless of whether y_e = sign(ret_D)*r_post
    or y_e = sign(ret_{D-1})*r_post. The PW block-length algorithm adapts to the
    observed autocorrelation structure of whichever y_e series is presented. No
    component of the §1.3-§1.4 machinery is broken by the filtration change; the
    mechanics are series-agnostic.

  step4_what_genuinely_changes: >
    The hypothesis changes — this was my original objection and it remains correct as
    an observation. The object under test differs:
    - F_{D-1} version: E[sign(ret_{D-1}) · r_post] > 0 — "pre-event direction predicts
      post-event return." Independence of sign(ret_{D-1}) and r_post under H0 is
      plausible (pre-event direction uncorrelated with future return in efficient market).
      The null E[r_e] = 0 is clean; mean(r) ~ 0 under H0.
    - Bar-D version: E[sign(ret_D) · r_post] > 0 — "announcement reaction direction
      predicts next-K_post-bar return." Under H0 of "no exploitable continuation,"
      sign(ret_D) and r_post share the post-announcement price process. Mean-reversion
      (partial reaction unwind) makes E[y_e] < 0 under H0. Momentum makes E[y_e] > 0.
      In either case the signed product's expected value under H0 is not generically zero.
    THE CORRECT CONSEQUENCE: this is not a defect — it is the precise economic claim
    being registered. The firm is betting the reaction continues (E[y_e] > 0 under H1).
    The bootstrap null is imposed by recentering, so the test is formally valid. But
    the null E[y_e] <= 0 must be understood as the unconditional null on the signed
    product, not as "r_post is zero on average." Both are valid statements.

  step5_residual_power_caveat: >
    One mathematical subtlety survives convergence and MUST be frozen: the signed-product
    test is a test of continuation, not of unconditional post-event edge. If the true data
    generating process involves mean-reversion of the bar-D reaction (the market overshoots
    and reverses), then E[y_e] < 0 under both H0 and H1 of "no continuation," but the
    test correctly kills (p > 0.0478) because reversal IS a case where the signed product
    strategy loses money. Conversely, if the market drifts in the same direction as bar D
    for mechanical/flow reasons unrelated to exploitable alpha (e.g. end-of-day flows that
    persist), E[y_e] > 0 and the test passes, but the edge may not be persistent OOS. This
    is the fundamental limitation of the construction — it cannot distinguish tradeable
    momentum from mechanical autocorrelation. This is already disclosed by the 13-18% power
    figures and the post-2015 KILL requirement. I accept this and note it is a caveat on
    the ENTIRE pre-reg, not a disqualifying defect.

  step6_degenerate_case_amendment: >
    My degenerate-case convention in math-rework1.yaml specified: ret_{D-1} = 0 ->
    sign_align_e = +1. Under the bar-D construction, the degenerate case is:
    ret_D = 0, i.e., close(D) = close(D-1). QR's §5.0 (patch A4) states: "FLAT
    (excluded from realized return; event-day still counts as block-day)." This
    exclusion convention (sign_align_e = 0 -> position FLAT -> excluded) is DIFFERENT
    from my F_{D-1} ruling's +1 convention. I accept the QR's exclusion convention for
    the bar-D case because: (a) a zero reaction on decision day is ambiguous as to
    direction — there is no initial reaction to continue, making +1 economically
    arbitrary; (b) the frequency of exact-zero ret_D is near-negligible in liquid
    FX daily data; (c) the QR explicitly notes "event-day still counts as block-day"
    so the block structure is preserved. The runner must implement: if ret_D == 0
    (floating-point equality) -> position = 0 (FLAT), event included in block count,
    excluded from return average. A unit test on a synthetic zero-ret_D event is
    REQUIRED pre-freeze (this was already required in §4.4.3 under my F_{D-1} ruling;
    the requirement carries forward under bar-D, with the triggering condition updated
    from ret_{D-1}=0 to ret_D=0).

# ─────────────────────────────────────────────────────────────────────────────
# FORMAL STATISTIC STATEMENT UNDER CONVERGED POSITION
# ─────────────────────────────────────────────────────────────────────────────

statistic_statement: >
  Tested quantity: the signed-product event return
    y_e = sign(close(D,e) - close(D-1,e)) · [net-of-cost cumulative return from
          close(D,e) to close(D+K_post,e), K_post=2, on the bank-event's responsive
          pairs equal-weight averaged]
  where sign(·) = +1 if argument > 0, 0 (position FLAT, return excluded) if argument = 0,
  -1 if argument < 0.

  Null: H0: E[y_e] <= 0 (the signed-product strategy earns no positive net edge on average
        over deduped bank-events; this is an UNCONDITIONAL null on the per-event scalar y_e,
        not a conditional null conditional on the direction of bar D).

  Alternative: H1: E[y_e] > 0 (the post-announcement reaction continues through the
        K_post=2 window on average, net of costs).

  Statistic: t_obs = sqrt(n) · mean(y) / omega_hat, where omega_hat = hac_se_nw(y, bandwidth=max(L-1,1))
        [reality_check.py:58-88], L = Politis-White auto block-length on the event-index-ordered
        y series [reality_check.py:152-343].

  p-value: bank-blocked stationary bootstrap, K=10000, recentering d_e = y_e - mean(y),
        p = (1 + #{t*_b >= t_obs}) / (K+1). Decision functional: RULE 0-4 per PART II §4.2.

  Key amendment vs math-rework1: the sign input is sign(ret_D) not sign(ret_{D-1}).
  The null statement changes from H0: E[sign(ret_{D-1}) · r_post] <= 0 to
  H0: E[sign(ret_D) · r_post] <= 0. The HAC/bootstrap machinery is unchanged —
  PW and the bootstrap operate on the realized y_e series regardless of which
  sign definition is used.

# ─────────────────────────────────────────────────────────────────────────────
# HAC / RECENTERING TREATMENT UNDER CONVERGED POSITION
# ─────────────────────────────────────────────────────────────────────────────

derivation_note:
  hac_treatment: >
    Under bar-D sign, the event-index-ordered y_e series = sign(ret_D) · r_post will
    generally exhibit different autocorrelation structure than sign(ret_{D-1}) · r_post,
    because ret_D itself carries autocorrelation (short-term FX momentum / mean-reversion).
    The PW algorithm selects L empirically from the observed y_e series. This is CORRECT
    and requires no adjustment: PW adapts to whatever autocorrelation the realized series
    exhibits, producing a consistent HAC SE. No bias is introduced by the filtration shift
    — the HAC estimator is not filtration-sensitive, only series-sensitive.

  bootstrap_recentering: >
    The de-meaned recentering d_e = y_e - mean(y) correctly imposes H0: E[y_e] = 0
    on the bootstrap distribution, regardless of whether y_e = sign(ret_D)·r_post or
    sign(ret_{D-1})·r_post. The recentering argument I made in math-rework1 that
    "conditioning on a function of the return series changes the bias properties of
    the HAC SE and the bootstrap recentering" was over-stated: the recentering is valid
    for any stationary series y_e with finite mean. What DOES change is what E[y_e]
    means under the null model — but the bootstrap doesn't care about the null model,
    only about the observed series. The +1/+1 p-value convention [reality_check.py:557,962]
    is unchanged.

  what_does_NOT_change: >
    The following are filtration-invariant and carry forward from math-rework1 unchanged:
    N_sel=3, SR0_pp_sel=0.026861, DSR_gate=0.95, kill_switch_threshold 1.5883/1.4029,
    master_seed=387992, K=10000, straddle [0.0478, 0.0522], all power figures,
    the boundary fix (PR-04: PASS strict < 0.0478, KILL strict > 0.0522),
    the Scenario-B auto-activation rule, and the VOID conditions §1.4(1)-(5).

# ─────────────────────────────────────────────────────────────────────────────
# REQUIRED PRE-REG AMENDMENTS ARISING FROM CONVERGENCE
# ─────────────────────────────────────────────────────────────────────────────

required_amendments:
  amend_1_null_statement: >
    The null statement in PART II §1.2 ("H0: E[r_e] <= 0") and the contract block
    in §4.4.4 must explicitly state the signed-product form of the estimand. The
    current §1.2 text already reads "H0: E[r_e] <= 0" with r_e defined in §1.1 as
    the signed-product. This is correct; no text change needed, but the §4.4 filtration
    contract must be REWRITTEN to reflect bar-D filtration:
    - §4.4.1: replace "F_{D-1}" with "F_D" throughout; replace "bar D's own return is
      NOT used" with "bar D's own return IS the sign input; bar D+1 forward is the P&L
      window; the mandatory entry_delay_bars=1 provides the signal/execution separation."
    - §4.4.2: reframe as "the F_{D-1} alternative was CONSIDERED and REJECTED as testing
      the pre-event drift component (documented dead post-2015) rather than the post-
      announcement reaction (the registered H1 component)."
    - §4.4.3: degenerate case updated to ret_D = 0 (not ret_{D-1} = 0); convention is
      FLAT (excluded from return, included in block count) per QR §5.0. Runner unit test
      requirement carries forward with updated trigger condition.

  amend_2_filtration_contract_yaml: >
    The §4.4.4 machine-readable YAML contract block must be updated:
      filtration: F_D  # sign_align_e uses information through close of bar D
      bar_D_excluded_from_sign: false  # bar D's own return IS sign_align_e's input
      bar_D_is_signal_not_PnL: true  # bar D return consumed as signal; P&L from D+1
      hypothesis_type: conditional_on_bar_D_direction_unconditional_product_null
      H0: "E[sign(ret_D) · r_post] <= 0 (unconditional expectation of signed product)"
      H1: "E[sign(ret_D) · r_post] > 0 (post-announcement reaction continues)"
      degenerate_case_ret_D_eq_zero: position_FLAT_return_excluded_block_included
      runner_unit_test_required: true  # synthetic zero-ret_D event required pre-freeze

  amend_3_§44_section_title: >
    §4.4 title should update from "Sign-Mapping Compatibility Contract (NHT-F5 companion)"
    to "Signal/Execution Separation Contract (NHT-F5 companion)" to avoid implying the
    issue was about compatibility of an external sign-source, when the resolved question
    is about the signal/P&L boundary within the bar-D return itself.

# ─────────────────────────────────────────────────────────────────────────────
# WHAT WOULD REVERT ME TO F_{D-1}
# ─────────────────────────────────────────────────────────────────────────────

