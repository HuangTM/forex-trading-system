feasibility_note_on_option_d: >
  Option D (unconditional |move| / vol/straddle-like absolute-return): rejected. The firm's
  backtester uses long/short daily-bar positions with directional sign. An unsigned absolute-
  return hypothesis is not directly testable with the existing engine semantics (the engine
  needs a position direction; "long vol" is not implementable as a daily-bar directional
  trade). The bar-D conditional approach retains full compatibility with the existing engine.
