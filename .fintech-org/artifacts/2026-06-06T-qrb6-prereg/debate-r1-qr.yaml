position: propose-conditional-D-explicit

hypothesis_statement: >
  Around scheduled central-bank rate decisions, the sign-aligned post-decision continuation
  return — where sign is determined by the direction of bar D's own reaction (sign_align_e
  = sign(close(D) - close(D-1))), and direction is held for K_post=2 bars starting at D+1
  — earns a net-of-cost edge statistically distinguishable from zero on the pooled
  banks-as-blocks event set, and that edge persists in the post-2015 sub-window.

economic_basis: >
  The Mathematician is correct that the sign rule I pinned (sign(close(D)-close(D-1))) is a
  function of F_D, not F_{D-1}, and that conditioning on bar D's sign changes the null
  from unconditional to conditional. I concede the statistical mechanics entirely.

  However, the economic question is which hypothesis the firm SHOULD freeze, not merely
  which filtration is mathematically compatible with the current frozen statistic.

  The D-1 sign (Mathematician's F_{D-1} ruling) is a proxy for pre-decision drift direction.
  This is the component §2.3 explicitly declares DEAD post-2015. If the pre-drift signal is
  noise post-2015, using D-1's return sign as a predictor of post-event returns is unlikely
  to deliver the alive edge the hypothesis is designed to test. Adopting F_{D-1} filtration
  does preserve the unconditional statistic machinery — but at the cost of signing trades on
  a dead signal.

  The bar-D sign (the initial decision-day reaction) is economically the ALIVE component:
  it captures the market's first pricing of the new policy stance. The hypothesis that this
  reaction continues (momentum) is the post-decision story in §2.2 — the risk-premium
  re-pricing and unwind of over-positioned participants. Conditioning on the direction of
  the announcement reaction is structurally different from conditioning on the pre-announcement
  drift. The former is a function of the event itself (alive post-2015); the latter is the
  documented dead component.

  The pre-reg is NOT frozen. Re-opening to explicitly declare the conditional-continuation
  hypothesis costs zero and produces a test that (a) tests the actually-alive edge and (b)
  is honest about what it conditions on. That is the correct path.

concession_conditions: >
  I converge to the Mathematician's F_{D-1} ruling (Option A — D-1 sign) ONLY if the
  Mathematician can demonstrate one or more of the following:

  1. That bar D-1's return sign provides meaningful predictive signal for post-event
     K_post=2 returns at a level that is NOT explained purely by the dead pre-announcement
     drift (i.e. that D-1 sign is a distinct, alive signal object from the multi-bar
     pre-announcement drift pattern); OR

  2. That the conditional H0 (conditioning on bar D's sign) cannot be correctly
     re-centered and studentized in a block-bootstrap framework without a full pre-reg
     re-derivation that would take longer than simply re-opening the pre-reg; OR

  3. That in the post-2015 sub-window, the dead pre-drift precludes D-1 sign from being
     an asymmetric conditioning variable (i.e. post-2015 D-1 signs are near-symmetric
     Bernoulli(0.5) and thus carry zero conditioning value regardless) — which would make
     the unconditional test vacuously equal to the conditional test and eliminate the
     hypothesis distinction.

  I do NOT converge simply because the unconditional statistic is already derived and
  re-derivation is additional work. The cost of a correct pre-reg re-open is near-zero
  at this stage; the cost of testing the wrong hypothesis is the entire trial budget.

