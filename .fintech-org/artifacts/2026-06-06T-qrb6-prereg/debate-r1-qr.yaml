statistical_concession: >
  The Mathematician's statistical ruling (§4.4 of math-rework1-patches.md) is correct and
  I accept it fully: using sign(ret_D) as sign_align_e makes the tested quantity
  E[r_e | sign(ret_D)] not E[r_e], and the HAC SE bias properties and bootstrap recentering
  require re-examination under the conditional null. The unconditional statistic in PART II
  §§1-3 is NOT compatible with the bar-D sign rule without derivation work. My debate
  position is NOT that the Mathematician is wrong on the statistics — it is that the firm
  should freeze the conditional hypothesis explicitly rather than adopt the unconditional
  hypothesis with a dead signal. The re-derivation is the Mathematician's domain and I
  defer entirely to them on how to structure the conditional statistic; my role is to
  specify which economic hypothesis the firm intends to test.

proposed_resolution: >
  OPTION C — declare the conditional-continuation hypothesis explicitly before the freeze:

  1. Hypothesis restated (one sentence, conditional): "The post-decision sign-conditioned
     continuation return — LONG when bar D's net return is positive, SHORT when negative
     (sign_align_e = sign(close(D)-close(D-1))) — earns a net-of-cost edge statistically
     distinguishable from zero, conditional on the direction of the announcement reaction,
     and persists in the post-2015 sub-window."

  2. QR revises §2.1, §4.2, §5.0 of the pre-reg to state the conditional H0/H1 explicitly.

  3. Mathematician re-derives or confirms whether the studentized block-bootstrap statistic
     in PART II §§1-3 is still valid under the conditional null — and if not, provides the
     corrected statistic before the freeze-receipt is cut. The block-bootstrap resampling
     machinery is likely still valid (it resamples r_e scalars, not the conditioning
     variable directly); the open question is recentering correctness.

  4. NHT audits the revised hypothesis statement before freeze.

  If the Mathematician determines that the conditional statistic requires a full re-derivation
  longer than the project timeline permits, THEN and only then does the firm face a genuine
  trade-off between (a) testing a live hypothesis with additional derivation work vs.
  (b) testing a dead-signal-based unconditional hypothesis with the already-derived statistic.
  That choice belongs to the CEO if the Mathematician and QR cannot converge by Round 3.

confidence: high
confidence_note: >
  HIGH that the economic distinction matters (D-1 sign = dead component proxy; bar-D sign =
  alive component). HIGH that the Mathematician's statistical ruling is correct and I accept
