    condition: >
      QRB-2 (spread_z >= 3.0 → suppress-entry) attaches to QRB-6 as a pre-registered modifier;
      spread_z_threshold = 3.0 frozen.
    verdict: honored
    evidence: >
      §5.5 freezes spread_z definition, trailing window N=60, threshold=3.0, suppress-entry
      semantics (position=0; event-day still counts as block-day). Sidecar qrb2_overlay_threshold
      symbol: value=3.0, is_kill_trigger with suppress-entry condition. QD runner:
      TestSpreadSuppression 4/4 pass. Frozen constant not imported from any prior trial
      (derived from the QRB-2 design, not R5/confirmatory).
    evidence_file: >
      references/pre-registrations/qrb6_cb_event_study.md:207-213;
      .fintech-org/artifacts/2026-06-06T-qrb6-prereg/pr-review-cycle2.yaml:57 (three-way threshold consistency verified)

  qrb3_runner_up:
    condition: >
      QRB-3 is queued as runner-up and advances to the subsequent wave on a QRB-6 post-2015 KILL.
      Specifically: hoqr-qrb6-rescreen.yaml states "If QRB-6 fails its mandatory post-2015
      structural break test, QRB-3 advances immediately to pre-registration without re-scoring."
    verdict: honored
    evidence: >
      §5.4 line 205: "QRB-3 (queued runner-up) advances to a subsequent wave only on a post-2015 KILL."
      §1.2 line 24: "QRB-3 is the queued runner-up; it does NOT register here and advances only if
      QRB-6 fails its mandatory post-2015 kill (§5.2)." hoqr-qrb6-rescreen.yaml runner_up_disposition:
