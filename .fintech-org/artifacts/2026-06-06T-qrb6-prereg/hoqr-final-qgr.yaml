body: |
  ## HoQR Final Quality-Gate Review — QRB-6 Pre-Registration (trial fa0f982a)

  ### Decision: APPROVE

  The QRB-6 CB-decision event-study pre-registration is the strategy I picked through the
  ratified two-finalist process (hoqr-qrb6-rescreen.yaml: QRB-6 at A=4.36/B=4.48 vs QRB-3
  at 4.02). The pre-registration as assembled in v2 (ASSEMBLED v3 doc header, post-NF-01 rework)
  correctly specifies that strategy, frozen honestly, with all blocking findings from the two
  PR cycles and two NHT audit cycles closed.

  The hypothesis identity is intact. The tested object — y_e = sign(close(D)−close(D−1)) ×
  R_post,e, the post-announcement initial-reaction continuation over K_post=2 bars — is
  exactly the alive component, not the documented-dead pre-FOMC drift. The sign-rule debate
  (F_{D-1} considered and rejected on economic grounds, documented in §4.4.2) converged
  correctly to the bar-D construction; the NHT adjudicated the sign-rule multiplicity as
  covered by N_sel=3.

  The statistical contract is internally consistent across doc, sidecar, and receipt:
  p_reject threshold 0.0478 (strict) / KILL threshold 0.0522 (strict) / straddle [0.0478,0.0522]
  → AMBIGUOUS; kill_switch_threshold 1.5883 (Scenario A, T=506); master_seed 387992; K=10000;
  N_sel=3; SR0_pp_sel=0.026861. Power is honestly disclosed at ~13–18%, with the KILL as the
  explicitly acknowledged most-likely terminal state.

  The mandatory post-2015 structural-break kill is correctly placed as RULE 1, evaluated before
  the aggregate gate, with overrides_aggregate_pass: true in the sidecar. The QRB-2 spread_z
  overlay (threshold=3.0, suppress-entry) is frozen. QRB-3 advances only on a post-2015 KILL.

  Two pre-flight items must be resolved before the freeze-receipt SHA is cut: (1) §3.5 doc
  prose should be reconciled to the correct artifact path and should add "verdict == 'certified'"
  to the activation condition (advisory; sidecar is the authoritative gate and already correct);
  (2) the runner's master_seed+1 convention for the post-2015 sub-window bootstrap should be
  acknowledged. Neither blocks this approval. No capital is authorized by this review or by a
  QRB-6 PASS.

knowledge_gaps:
  - >
    The freeze-receipt has not yet been cut (no FREEZE-RECEIPT.yaml exists for qrb6 in
    references/pre-registrations/ at the time of this review). This review approves the
    pre-reg spec; the freeze-receipt cut is the next mandatory step (CEO sign-off → receipt cut).
  - >
    The post-2015 survival of the post-announcement reaction component in FX (as distinct from
    the pre-FOMC equity drift documented by Lucca-Moench 2015) has not been empirically verified
    at this firm. The test will answer it; the honest base-rate expectation is KILL.

