findings:

  - id: QGR-F1
    severity: observation
    domain: hypothesis-identity
    finding: >
      The pre-registration's §5.0 / §1.2 frozen tested object — y_e = sign(close(D)−close(D−1)) ×
      R_post,e — is the strategy I picked through the two-finalist process. The sign rule
      converged to bar-D (not F_{D-1}) via formal debate (debate-r1-math.yaml; debate-r1-qr.yaml).
      The debate was theory-driven: F_{D-1} was correctly rejected because it would embed the
      documented-dead pre-drift component (§2.3) as the alignment signal while claiming to test the
      alive post-announcement component. Bar-D continuation is the honest framing. The §4.4.2
      considered-and-rejected documentation is present and auditable. No concern; confirming the
      strategy identity is intact as picked.

  - id: QGR-F2
    severity: observation
    domain: review-trail-integrity
    finding: >
      The review trail is complete and coherent. PR cycle-1 closed two blocking findings (PR-01:
      live [MATH] placeholders in §5; PR-02: unbound sidecar symbols + missing triggers) plus PR-03
      major (wrong master_seed comment 16256920→256920, corrected to 16387992→387992). NHT cycle-1
      audit found F1–F6; NHT cycle-2 delta audit verified all closed. The NF-01 finding from PR
      cycle-2 (§5 prose mirror said "p > 0.0478 → KILL" while §4.2 authoritative functional
      correctly uses "> 0.0522" with straddle [0.0478,0.0522] → AMBIGUOUS) was the one genuine
      assembly-state defect in the settled v2 doc. Verified closed: §5.1/§5.2/§5.4 now use
      "> 0.0522" for KILL and explicitly route the straddle band to RULE 4 AMBIGUOUS
      (pre-reg §5.1 lines 188, 200–201; §5.4 lines 200–203 verified directly).

  - id: QGR-F3
    severity: advisory
    domain: f3-residuals
    finding: >
      Two documentation residuals from NHT F3 persist in §3.5 of the doc: (a) the frozen
      activation rule names a non-existent artifact path (qd-boe-ecb-spotcheck.yaml; the real
      file is qd-spotcheck-sidecar.yaml in .fintech-org/artifacts/2026-06-06T-qrb6-prereg/); and
      (b) the §3.5 prose does not contain "verdict == 'certified'" — it gates on completion-and-commit
      without naming the verdict value. Both residuals are documentation quality defects: the
      MACHINE-EXECUTABLE sidecar correctly enforces certified-only activation
      (triggers.yaml line 366: condition_expression "scenario_b_certification == 'certified'";
      dormancy_rule explicitly names "partial → DORMANT, NHT C4 binding condition"). The exploitable
      forking path (auto-activate on partial) is closed in the sidecar. The doc-side residuals
      should be reconciled before the freeze-receipt SHA is cut (freeze pre-flight item, not a
      blocking defect at this review stage). Runner implementation will use the sidecar as the
      machine-executable gate.

  - id: QGR-F4
    severity: observation
    domain: runner
    finding: >
      The QD runner (qd-runner.yaml) reports 60 tests passing, dry-run verified, cross-trial
      constant guard (FM-1) present, receipt interlock verified (exit 1 without receipt). One
      noted deviation: post-2015 bootstrap uses master_seed+1 rather than master_seed (to avoid
      correlated bootstrap samples across the two p-values). This is conservative and standard
      practice; the pre-reg specifies master_seed for the bootstrap but does not separately pin
      a post-2015 seed. Advisory: if the freeze-receipt is cut before pinning a separate post-2015
      seed, the runner's master_seed+1 convention becomes de facto frozen. The runner commit must
      exist and be pinned in the freeze-receipt before the receipt is cut (NHT F6 ordering clause,
      verified present in §7 of the doc). As of this review, scripts/run_qrb6.py EXISTS (qd-runner
      reports it as committed; tests/harness/test_qrb6_decision.py 60/60 passing), satisfying the
      mandatory pre-freeze step.

  - id: QGR-F5
    severity: advisory
    domain: reversal-sub-claim-encoding
    finding: >
      NF-04 (PR cycle-2) and its cycle-2 delta-audit counterpart note that the reversal
      distinguishability sub-claim sits under secondary_metrics_required (is_kill_trigger: false)
      in the sidecar, while §5.4 prose says "KILL the reversal sub-claim." The accepted reading —
      confirmed by both PR and NHT — is that "KILL the reversal sub-claim" refers to a sub-claim
      verdict, not a primary gate override. The runner spec must implement the sub-claim verdict
      logic explicitly and emit the required fields (reversal_fraction, reversal_p_vs_zero,
      reversal_p_vs_one). Not a freeze blocker but must be addressed in the runner implementation.

