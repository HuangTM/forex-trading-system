body: "SECTION 1: BIAS MECHANICS (Q1)\n\nWhen fraction w of a sample is replaced by exact zeros, the contaminated\ndistribution\
  \ has:\n  E[Z] = (1-w)*m_clean\n  Var[Z] = (1-w)*[s_clean² + w*m_clean²]\n\nThe studentized t-ratio is:\n  t_corrupt / t_clean\
  \ = sqrt[(1-w) / (1 + w*kappa²)]\n  where kappa = m_clean / s_clean (per-observation Sharpe)\n\nThis ratio is strictly less\
  \ than 1 for all w > 0, regardless of the sign\nof m_clean or kappa. Zero-contamination ALWAYS shrinks |t| toward zero.\n\
  The shrinkage is largest for small kappa (small-signal regime), which is\nexactly the regime relevant here.\n\nAt w=0.50\
  \ (post-2015 zero fraction, verified), n=345, and plausible\nann-SR in [0.3, 0.9] for CB event returns:\n  - Per-event SR\
  \ kappa ∈ [0.043, 0.129]\n  - Theoretical ratio ≈ 0.704–0.707 (nearly kappa-independent at small kappa)\n  - Empirical ratio\
  \ (synthetic simulation): 0.700–0.814\n  - Median Δp (corrupt minus clean): +0.038 to +0.077\n\nConclusion Q1: Adding ~50%\
  \ zeros makes a KILL MORE LIKELY. The signal\nis attenuated, p_post is inflated, and RULE-1 fires on a weaker signal.\n\
  This is a STRUCTURALLY UNFAVORABLE corruption — it favors rejection of\nthe strategy by the screening gate, not promotion\
  \ of it.\n\n─────────────────────────────────────────────────────────────────────────\nSECTION 2: KILL-MONOTONE (Q2)\n\n\
  Naive signal-only analysis suggests: p_clean < p_corrupt, so if the\ncorrupted test KILLs (p_corrupt > alpha_kill), the\
  \ clean test MIGHT OR\nMIGHT NOT KILL depending on whether p_clean still exceeds alpha_kill.\n\nFrom the recorded statistics:\n\
  \  t_corrupt ≈ 0.787 (from p_post=0.2158)\n  t_clean   ≈ 0.787 / 0.706 ≈ 1.114 (using ratio at kappa≈0.086)\n  p_clean \
  \  ≈ 0.133\n\nAt alpha_kill=0.05: p_clean=0.133 > 0.05 → KILL survives.\nAt alpha_kill=0.15: p_clean=0.133 < 0.15 → KILL\
  \ does NOT survive.\nThe result depends on the exact threshold.\n\nBut there is a second, deeper distortion: the block bootstrap\
  \ null\ndistribution is itself computed from the corrupted data. RBA and BOC\nblocks have zero variance — every bootstrap\
  \ resample of these blocks\ncontributes exactly 0 to the bootstrap test statistic. This creates\ntwo competing forces:\n\
  \n  Force A (mean shrinkage): t_obs shrinks → p_obs inflates → toward KILL\n  Force B (null narrowing): bootstrap null has\
  \ reduced variance due to\n    degenerate blocks → t_obs appears MORE extreme relative to null\n    → p deflates → away\
  \ from KILL\n\nThese forces oppose each other. The net direction depends on the relative\nmagnitude, which in turn depends\
  \ on the bootstrap implementation (does it\ndrop degenerate blocks? does it resample them?). Without simulating the\nspecific\
  \ block-bootstrap, the sign of the net bias on p_post cannot be\nestablished.\n\nRULING: NOT-PROVABLE.\nThe recorded KILL\
  \ at p_post=0.2158 is not interpretable as a clean-data\ninference. It is neither provably conservative nor provably anti-conservative.\n\
  The result must be treated as VOID until a clean re-run is completed.\n\n─────────────────────────────────────────────────────────────────────────\n\
  SECTION 3: RE-RUN INFORMATIVENESS + COST LEVER (Q3)\n\nQ3a — Pre-revealed informativeness:\nThe corrupted one-shot reveals\
  \ almost no information about the clean\nre-run's RULE-1 verdict. Only ECB events (approximately, if ECB's pairs\nare exactly\
  \ the 3 cost-covered pairs) are unchanged. FED events (50%\nof per-event return missing), BOJ events (83% missing), and\
  \ all RBA/BOC\nevents (100% new) will move. RBA+BOC contribute ~50% of the post-2015\nzero mass — the most critical region\
  \ for the KILL verdict — and are\nentirely new in a clean run. The re-run is not pre-determined.\n\nQ3b — Cost-lever sensitivity:\n\
  Sensitivity: |∂t/∂c_k| = sqrt(n) / (s * K_k) * (N_{k,events}/N_total)\nAt n=345, s=1%, K_k=6: maximum |Δt| per pair ≈ 0.31\
  \ t-units.\nThe recorded gap between t_obs_post=0.787 and t_kill=1.626 is 0.839\nt-units. The cost lever cannot bridge this\
  \ gap under any plausible\nper-pair spread choice. Cost discretion is NOT a material gaming\nsurface for the post-2015 RULE-1\
  \ verdict.\n\nNote: when the clean re-run is performed, introducing real costs for\nthe currently-zero-imputed pairs (RBA,\
  \ BOC) will FURTHER REDUCE y_e\nfor those events (costs are negative), pushing the mean down, making\np_post higher, reinforcing\
  \ the KILL direction. The corrected run is\nexpected to KILL at least as readily as the corrupted one on this channel.\n\
  \nQ3c — Mechanical cost rule:\nThe frozen rule is specified under 'mechanical_cost_rule' above. Core\nmechanics: each pair's\
  \ cost is set to the historical median spread from\nits daily spreads parquet, rounded to 2 decimal places, written to a\n\
  timestamped manifest before the re-run fires. No post-freeze overrides\nare permitted. USDCAD requires a unit audit step\
  \ before freezing\n(median 45.00 appears to be in fractional-pip units; correct value\nis likely 4.50 pips after dividing\
  \ by 10).\n"
