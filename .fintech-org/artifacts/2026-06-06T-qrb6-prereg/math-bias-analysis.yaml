proof_sketch_or_reference: "ZERO-CONTAMINATION MIXTURE MODEL\n─────────────────────────────────\nLet Y_i be i.i.d. from a\
  \ clean distribution with mean m and variance s².\nCorrupt fraction w by replacing with exactly 0. Let C_i ~ Bernoulli(1-w)\n\
  and Z_i = C_i * Y_i (the contaminated observation).\n\nMoments of contaminated distribution:\n  E[Z]     = (1-w) * m\n \
  \ Var[Z]   = (1-w) * [s² + w * m²]\n\nProof of variance formula:\n  E[Z²]   = E[C_i² * Y_i²] = (1-w) * E[Y²] = (1-w) * (m²\
  \ + s²)\n  Var[Z]  = E[Z²] - (E[Z])²\n           = (1-w)(m² + s²) - (1-w)²m²\n           = (1-w)s² + (1-w)[1-(1-w)]m²\n\
  \           = (1-w)s² + w(1-w)m²\n           = (1-w)[s² + w*m²]  ✓\n\nStudentized t-ratio:\n  t_corrupt / t_clean\n    =\
  \ [sqrt(n) * (1-w)*m / sqrt((1-w)(s²+w*m²))]\n      / [sqrt(n) * m / s]\n    = s * sqrt(1-w) / sqrt(s² + w*m²)\n    = sqrt[(1-w)\
  \ * s²  / (s² + w*m²)]\n    = sqrt[(1-w) / (1 + w*kappa²)]\n  where kappa = m/s (per-observation Sharpe ratio)\n\nProperties:\n\
  \  1. ratio < 1 for all w > 0  (zeros always shrink |t|)\n  2. ratio → sqrt(1-w) as kappa → 0  (small-SR regime)\n  3. ratio\
  \ → sqrt(1-w)/sqrt(w)*1/kappa → 0 as kappa → ∞ (irrelevant)\n  4. At w=0.50, kappa=0.086 (Ann SR=0.6 / sqrt(49) events/yr):\n\
  \     ratio = sqrt(0.50 / (1 + 0.50 * 0.086²)) ≈ 0.706\n\nNUMERICAL VERIFICATION (synthetic, n_sim=5000, seed=42):\n  Ann\
  \ SR 0.3: theory ratio=0.707, empirical=0.814, Δp=+0.072\n  Ann SR 0.6: theory ratio=0.706, empirical=0.700, Δp=+0.077\n\
  \  Ann SR 0.9: theory ratio=0.704, empirical=0.703, Δp=+0.038\nAll show p_corrupt > p_clean (positive Δp), confirming KILL-more-likely\n\
  direction on the signal channel.\n\nBOOTSTRAP CONTAMINATION (Force B):\nThe block bootstrap null is computed by resampling\
  \ the SAME corrupted\ndata. RBA and BOC blocks have zero variance (all y_e=0 for those banks).\nUnder resampling:\n  - Each\
  \ bootstrap draw of an RBA/BOC block contributes 0 to T*_bootstrap\n  - The bootstrap null distribution has reduced variance\
  \ vs the true clean null\n  - A narrower bootstrap null makes the observed T_obs appear MORE extreme\n    relative to the\
  \ null → p* deflates → away from KILL\nThe two forces cancel to an unknown degree. Resolution requires either:\n(a) checking\
  \ whether the bootstrap implementation excludes degenerate blocks,\n(b) running a Monte Carlo simulation of the full bootstrap\
  \ under both\n    corrupted and clean conditions.\n\nCOST SENSITIVITY:\n∂m_pooled / ∂c_k = -(N_{k,events} / N_total) / K_k\n\
  For a pair k appearing in N_{k,events} events with K_k pairs per event:\n|∂t / ∂c_k| = sqrt(n) / (s * K_k) * (N_{k,events}\
  \ / N_total)\nMaximum over plausible cost range Δc ∈ [0, 10 pips × 0.0001]:\n|Δt_max| ≈ sqrt(345) * 10 * 0.0001 / (0.010\
  \ * 6) ≈ 0.31\nRequired gap: 0.839 t-units. Not bridgeable. ✓\n"
failure_regimes:
- If alpha_kill is set much higher (e.g., 0.25), p_clean~0.133 would NOT KILL → the corrupted KILL would be a false positive
  not survived in clean data. This is the primary failure mode.
- If the bootstrap implementation excludes degenerate (zero-variance) RBA/BOC blocks from resampling, Force B is absent, and
  the KILL is provably more-likely on the clean data — i.e., the corruption was conservative.
- If s_post is substantially lower than 1% (e.g., 0.3%), the required Δm to move t by 0.839 units drops to ~1.4 bps, and the
  cost lever could become material. This is the boundary case; at s_post=0.5% the max cost Δt~0.62 still falls short.
- 'USDCAD unit error: if 45 pips is used as-is (not divided by 10), USDCAD per-event cost is ~10x inflated, which materially
  suppresses net returns for BOC events in the clean re-run.'
