kill_monotone_ruling: 'NOT-PROVABLE. Two competing distortions from the degenerate RBA/BOC blocks — mean shrinkage (inflates
  p, toward KILL) and bootstrap null narrowing (deflates p, away from KILL) — have opposing signs. The net direction on p_post
  cannot be established analytically without simulating the actual block-bootstrap with degenerate blocks. The recorded KILL
  at p_post=0.2158 is UNINTERPRETABLE as a clean-data inference.

  '
corruption_makes_kill: 'MORE-LIKELY on the mean-shrinkage channel alone. The mixture formula gives t_corrupt/t_clean = sqrt[(1-w)/(1+w*kappa^2)]
  < 1 for all w>0, so |t_corrupt| < |t_clean| and p_corrupt > p_clean. Since RULE-1 KILLs when p_post is LARGE, zero-contamination
  pushes unconditionally toward KILL on the signal side. However, the bootstrap null is also contaminated, creating the opposing
  Force B described under kill_monotone_ruling — so the full test-level answer is NOT-PROVABLE (see above); the signal-only
  direction is MORE-LIKELY.

  '
