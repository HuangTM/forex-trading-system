# ─────────────────────────────────────────────────────────────────────────────
# ASSUMPTIONS
# ─────────────────────────────────────────────────────────────────────────────

assumptions:
  - >
    The QR's §5.0 (qr-rework1-patches.md PATCH A4) correctly pins the engine-semantics window
    (entry D+1, K_post=2) and the sign rule (sign(close(D)-close(D-1))). §4.4 and §1.2 adopt
    and echo that convention identically.
  - >
    The HAC SE (Newey-West, Bartlett kernel, reality_check.py:58-88) is a consistent estimator
    of the long-run variance of the y_e series regardless of which filtration is used to form
    sign_align_e. PW selects L empirically from the observed y_e autocorrelation structure;
    no manual adjustment is needed when the filtration changes from F_{D-1} to F_D.
  - >
    The bootstrap recentering d_e = y_e - mean(y) correctly imposes H0: E[y_e] = 0 on the
    null distribution for any stationary series y_e with finite mean. The bar-D signed-product
    series y_e = sign(ret_D)*r_post is stationary under standard FX return assumptions.
  - >
    The unconditional null H0: E[y_e] <= 0 is valid for the signed product. Under the bar-D
    construction, sign(ret_D) and r_post share the post-announcement price process; however,
    this is the INTENDED economic object (the firm is betting on continuation, not on an
    unconditional post-event return). The bootstrap imposes the unconditional null by
    recentering, not by assuming independence of sign(ret_D) and r_post.
  - >
    The frequency of exact-zero daily ret_D in liquid FX OHLCV data is near-negligible;
    the FLAT/exclusion convention for the degenerate case has no material effect on the statistic.
  - >
    Bar D is the first bar whose close reflects the central-bank decision (§4.1 convention,
    verified from the daily bar timestamp structure). This convention is conservative and applies
    uniformly across all banks regardless of intraday announcement timing.

assumptions_identified:
  - >
    The entire signed-product construction rests on the no-peek guarantee: no OHLCV return
    series has been examined before the freeze-receipt is cut (AC-4 / §1.4(1)). If any return
    data was accessed before freeze, the one-shot run is VOID; this assumption cannot be
    verified by the mathematician alone and depends on the governance chain.
  - >
    sign(ret_D) uses the SAME pair's close prices as the P&L measurement. For the equal-weight
    bank-event, the QR's §5.0 specifies the sign is taken on "the mapped leg" and applied as
    a single sign_align_e scalar to all responsive pairs. This equal-weighting convention is
    frozen in §3.2 and assumed correctly implemented by the runner.
  - >
    The bar-D signed-product y_e = sign(ret_D)*r_post will generally exhibit different
    autocorrelation structure than sign(ret_{D-1})*r_post because ret_D carries short-term
    FX momentum/mean-reversion autocorrelation. PW adapts correctly; the block-length L may
    differ from what it would have been under F_{D-1}, but the algorithm is data-adaptive
    and no calibration is needed.

# ─────────────────────────────────────────────────────────────────────────────
# FAILURE REGIMES
# ─────────────────────────────────────────────────────────────────────────────

failure_regimes:
  - >
    Market mean-reversion of the bar-D reaction: if the true DGP involves partial unwind of
    the bar-D move (market overshoots and reverses), E[y_e] < 0 under both H0 and the
    continuation H1. The test correctly kills (p > 0.0522) because reversal IS the case where
    the signed-product strategy loses money. This is a feature, not a bug: the test
    distinguishes continuation from reversal correctly.
  - >
    Mechanical autocorrelation vs exploitable alpha: if the market drifts in the same direction
    as bar D for mechanical/flow reasons unrelated to exploitable alpha, E[y_e] > 0 and the
    test passes — but the edge may not persist OOS. This is the fundamental limitation of the
    signed-product construction, already disclosed in the 13-18% power figures and the
    post-2015 KILL requirement. The design cannot distinguish tradeable continuation from
    mechanical autocorrelation within a single pre-registered test; the post-2015 sub-window
    kill provides the structural-break guard.
  - >
    Large L from heavy event-to-event autocorrelation reduces effective n and widens HAC SE,
    further lowering power below the 13-18% iid bound. Applies identically under bar-D
    filtration as under F_{D-1}; the PW adapts to the observed y_e autocorrelation.
  - >
    If runner applies F_{D-1} filtration instead of bar-D (implementation error): the hypothesis
    under test silently changes to the dead pre-drift component. Runner unit tests MUST verify
    the correct close(D) - close(D-1) computation on a synthetic event before freeze.
    The §4.4.4 contract is the runner's authoritative implementation spec.
  - >
    Straddle boundary: p in [0.0478, 0.0522] -> RULE 4 (AMBIGUOUS, no PASS). This applies
    identically regardless of filtration choice; inherited from PR-04 (STANDS).

# ─────────────────────────────────────────────────────────────────────────────
# ALTERNATIVE METHODS (F_{D-1} — considered and rejected)
# ─────────────────────────────────────────────────────────────────────────────

alternative_methods:
  F_D1_rejected:
    description: >
      F_{D-1} filtration: sign_align_e = sign(ret_{D-1}) = sign(close(D-1) - close(D-2)).
      Uses the direction of the bar immediately before the decision-reflecting bar.
    considered_in: "math-rework1.yaml (mathematician's initial ruling, now retracted)"
    rejection_reason_primary: economic_incoherence
    rejection_reason_detail: >
      §2.3 explicitly states the pre-announcement drift component is "documented essentially
      DEAD post-2015." F_{D-1} filtration makes sign_align_e the direction of the pre-event
      move — exactly the dead component. The registered H1 (§2.1) is "post-decision
      reaction/reversal structure," not "pre-event trend continuation." Adopting F_{D-1}
      would test whether the dead signal predicts post-announcement returns — an internally
      inconsistent and economically incoherent hypothesis given §2.3's explicit framing.
    rejection_reason_secondary: >
      The statistical mechanics are NOT the rejection reason. The HAC/bootstrap is equally
      valid under F_{D-1} (PW adapts; recentering is correct for any stationary y_e). The
      conditional vs unconditional null distinction is relevant but not decisive: F_{D-1} yields
      a cleaner independence structure (sign(ret_{D-1}) is more plausibly independent of
      post-announcement returns under H0), but this statistical cleanliness is irrelevant when
      the sign is drawn from a dead signal.
    concession_conditions_for_reverting: >
      Would revert ONLY if: (1) evidence that §2.1's hypothesis was always intended as
      pre-event trend continuation (contradicting §2.3's "dead" declaration, which would be a
      fatal internal inconsistency), OR (2) a mathematical proof that bootstrap recentering
      fails to impose H0 for the signed product y_e = sign(ret_D)*r_post, OR (3) evidence
      that the runner cannot implement bar-D sign without examining return data (which would
      trigger VOID §1.4(1)). None of these conditions exist.
    status: REJECTED_FINAL

# ─────────────────────────────────────────────────────────────────────────────
# PROOF SKETCH / FORMAL JUSTIFICATION
# ─────────────────────────────────────────────────────────────────────────────

proof_sketch_or_reference:
  no_lookahead_proof: >
    sign_align_e = sign(close(D) - close(D-1)) is a deterministic function of two daily
    closes, both known at the close of bar D. Under entry_delay_bars=1, the trade entry
    executes at bar D+1. The post-window return runs from D+1 forward. No bar is
    simultaneously a sign-input bar and a realized-return bar. Formally: the signal sigma_e
    is F_D-measurable (sigma(close(D), close(D-1)) ⊂ F_D); the P&L r_post,e is
    F_{D+2}-measurable and its support does not include bar D. The mandatory delay
    (entry_delay_bars=1) creates the required measurability separation. The sacred test
    test_no_lookahead in tests/backtest/test_engine.py enforces this mechanically.
  unconditional_null_validity: >
    H0: E[y_e] <= 0 is a well-formed unconditional moment condition on the scalar y_e.
    Bootstrap recentering d_e = y_e - mean(y) subtracts the sample mean, imposing
    E[d_e] = 0 under H0 on each bootstrap resample. The studentized mean t* = sqrt(n)*
    mean(d*)/omega_hat(d*) then has a null distribution centered at 0 by construction.
    This recentering argument holds for any stationary series y_e with finite mean and
    does not require independence between sign(ret_D) and r_post,e. The one-sided test
    (count of t*_b >= t_obs) is a valid test of H0: E[y_e] <= 0 under the bank-blocked
    stationary bootstrap.
  hac_se_validity: >
    The Newey-West HAC SE omega_hat = hac_se_nw(y, bandwidth=max(L-1,1)) is a consistent
    estimator of the asymptotic variance of sqrt(n)*mean(y) for any covariance-stationary
    series y with finite fourth moments. The PW algorithm selects L empirically from the
    observed autocorrelation function of y_e; it is series-agnostic (it does not know or
    care which filtration was used to form sign_align_e). No calibration or correction is
    needed when the filtration changes from F_{D-1} to F_D.
  power_unchanged: >
    Power calculations (13-18% across four n's, §5) are derived from SR_pp*sqrt(n) at the
    planning effect size SR_plan = SR0_ann_sel = 0.4264. These depend only on n, alpha, and
    the planning Sharpe — none of which change with the filtration choice. Power figures
    carry forward identically from math-spec.yaml.

