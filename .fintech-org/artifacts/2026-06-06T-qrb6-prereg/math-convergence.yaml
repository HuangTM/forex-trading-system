# ─────────────────────────────────────────────────────────────────────────────
# CONVERGED DESIGN (binding, frozen)
# ─────────────────────────────────────────────────────────────────────────────

converged_design:
  object: >
    y_e = sign(close(D,e) - close(D-1,e)) * R_post,e
    where R_post,e = bank-event equal-weight net-of-cost cumulative return close(D)→close(D+2)
    on the responsive pairs (§3.2 mapping).
  null: >
    H0: E[y_e] <= 0
    Unconditional expectation of the signed-product scalar. NOT a conditional null conditioned
    on the direction of bar D. The bootstrap recentering d_e = y_e - mean(y) imposes this
    unconditional null correctly on the null distribution.
  window_engine_semantics: >
    Signal computed at bar D (F_D-measurable; sign_align_e = sign(close(D)-close(D-1))).
    Entry at bar D+1 (entry_delay_bars=1; engine-enforced, test_no_lookahead invariant).
    Position held during bars D+1 and D+2 (K_post=2).
    Exit at close of D+2.
    P&L = net-of-cost cumulative return close(D) to close(D+2).
    Bar-D return is the SIGNAL, consumed at formation; it is NOT part of the realized P&L.
    This single phrasing supersedes any alternative window description (e.g., "[D+1 close...
    D+K_post close]") that appears in earlier draft artifacts; §4.4 and §1.2 echo it identically.
  degenerate: >
    ret_D = close(D) - close(D-1) = 0 (floating-point equality) -> sign_align_e = 0,
    position FLAT, event EXCLUDED from the realized return average.
    Event-day INCLUDED in block count (counts as a calendar block-day for bootstrap).
    Runner implementation: numpy.sign(ret_D); zero->0.0->FLAT with explicit branch.
    Unit test on synthetic zero-ret_D event REQUIRED pre-freeze.

