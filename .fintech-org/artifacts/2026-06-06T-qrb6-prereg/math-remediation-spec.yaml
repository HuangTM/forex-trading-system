assumptions:
  - OBF information fraction t1=0.50 for the void run (conservative vs. actual 3/12 pairs = 0.25; t1=0.50 penalizes MORE, which is the safe direction for a KILL gate)
  - MC_SE=0.0022 is unchanged between the void run and the re-run (same K=10000 bootstrap draws; no change to bootstrap machinery)
  - The 9 new pairs use swap_long = swap_short = -1.5 pips/day (worst-of-existing-3 conservative constant; no measured swap data for these pairs in the repository)
  - USDCAD spread unit correction (÷10) is based on market-norm sanity check; if the ingestion pipeline is later confirmed to use standard pip units, the raw value of 45.0 should be revisited and may indicate a data-quality issue rather than a unit issue
  - The firm's carry confirmatory 2-look design used OBF-consistent spending (firm precedent basis for METHOD B adoption)

assumptions_identified:
  - If MC_SE changes (different K or bootstrap implementation change), p_reject_new must be recomputed as alpha_look2 - new_MC_SE
  - If the swap for a new pair is actually less adverse than -1.5 pips/day, the freeze remains valid (conservative direction); if MORE adverse, the frozen value understates costs and the re-run result would be even more tilted toward KILL
  - The t1=0.50 choice is the key judgment. If the void run is argued to have zero informational value (t1→0), then essentially zero alpha is spent at look 1 and the re-run gate collapses to the original 0.0478. We conservatively adopt t1=0.50 (spends the maximum defensible amount at look 1 under the OBF framework for t1 ≤ 0.50).
  - EURGBP appears in the verified 12-pair inventory (qr-prereg-draft.yaml line 50) but is NOT assigned to any specific CB bank in the pair_bank_map. Its inclusion in the universe must be confirmed by the QD runner before freeze. If EURGBP is not a mapped bank pair, the 12-pair table reduces to 11 and EURGBP costs are irrelevant. This is flagged as a knowledge gap; the cost freeze is prepared for all 12 as a superset.

failure_regimes:
  - If t1 is set aggressively high (e.g., t1=0.75), p_reject_new drops to 0.019, which is extremely conservative and may be unmeetable even with genuine signal. The t1=0.50 symmetric assumption is the correct OBF default for a 2-look design where the first look is clearly information-impoverished.
  - If the USDCAD unit correction is wrong (i.e., 45.0 IS in pip units), USDCAD cost would be ~10x market rate, suppressing BOC event returns significantly. This would further increase p_post (toward KILL) — the direction is safe for the gate, but the Sharpe measurement would be distorted.
  - If the swap default of -1.5 pips/day is materially more adverse than actual market swaps for all 9 new pairs, the frozen spec systematically overstates costs for the re-run — biasing toward KILL, which is the safe direction.
  - EURGBP has no assigned CB bank in the pair_bank_map. If the runner attempts to load EURGBP costs but the strategy event loop never queries EURGBP, the cost entry is unused but harmless. If the runner incorrectly assigns EURGBP to ECB events (plausible since EUR and GBP are both ECB-adjacent), it would need a verified pair_bank_map entry — this is a QD responsibility, not a cost-rule issue.

proof_sketch_or_reference: |
  OBF SPENDING FUNCTION DERIVATION (1-SIDED)
  ──────────────────────────────────────────
  For a 1-sided test at level alpha with 2 looks at information fractions t1 < t2=1:

  OBF boundary at look k is: b_k = z_{alpha} / sqrt(t_k)
  OBF cumulative spending:   alpha_spend(t_k) = 1 - Phi(b_k) = 1 - Phi(z_alpha / sqrt(t_k))

  Proof that this controls the family-wise type-I error rate at alpha (sequential argument):
    P(reject at look 1 OR look 2 | H0)
    = P(Z_1 > b_1 | H0) + P(Z_1 ≤ b_1, Z_2 > b_2 | H0)
    = alpha_spend(t1) + [alpha - alpha_spend(t1)]
    = alpha   ✓

  where the second equality follows from the OBF design property that alpha_spend(t1) +
  incremental_alpha(t2) = alpha by construction.

  For t1=0.50, z_alpha=1.644854:
    b_1 = 1.644854 / sqrt(0.50) = 1.644854 / 0.707107 = 2.326174
    alpha_spend(t1) = 1 - Phi(2.326174) = 1 - 0.989995 = 0.010005
    alpha_look2 = 0.050000 - 0.010005 = 0.039995
    p_reject_new = 0.039995 - 0.0022 (MC_SE) = 0.037795 ≈ 0.0378

  Note: this is the 1-sided form consistent with the QRB-6 primary kill gate
  (H0: E[r] ≤ 0; KILL fires when p_post > alpha). The gate is a MAXIMUM p-value
  gate, not a minimum, because the bootstrap p-value for H0: mean ≤ 0 is
  P(T* > T_obs | H0) — large p means the observed statistic is unexceptional
  under H0, i.e., no evidence of positive edge.

