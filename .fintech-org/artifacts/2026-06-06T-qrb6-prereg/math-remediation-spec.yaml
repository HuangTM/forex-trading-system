cost_rule:
  spread_source: 'data/spreads/{PAIR}_daily_spreads.parquet — daily files ONLY (NOT *_4h_spreads files). Column: spread_pips over the full file (no date filtering).'

  spread_formula: 'frozen_spread_pips[P] = round(median(df["spread_pips"]), 2). Computed once before re-run; written to a timestamped cost-freeze manifest (config/cost_freeze_{ISO8601}.yaml) with fields: pair, frozen_median_pips, parquet_row_count, computed_at. No override permitted after manifest is written.'

  slippage_rule: >
    UNIFORM CONSTANT: slippage = 0.50 pips for ALL 12 pairs.
    Justification: (a) Both EURUSD and USDJPY in config/default.yaml use 0.5 pips; GBPUSD uses 0.6 pips — the 2/3 majority value is 0.5.
    (b) A derive-from-spread rule (e.g. 0.5×spread) would make slippage PAIR-SPECIFIC and create 9 new discretionary parameters for the new pairs. The uniform constant eliminates all per-pair discretion.
    (c) 0.5 pips is conservative for majors (ECN fills are sub-0.5), appropriate for crosses, and directionally safe for the KILL test (higher costs depress returns, harder to PASS, not easier).
    ADOPTED: 0.50 pips for all 12 pairs.

  commission_rule: >
    UNIFORM CONSTANT: commission = 0.50 pips for ALL 12 pairs.
    Justification: all three existing pairs in config/default.yaml use 0.5 pips commission — unanimous existing precedent; no deviation required.
    ADOPTED: 0.50 pips for all 12 pairs.

  swap_rule: >
    EVENT HOLD PERIOD: K_post=2 bars, entry at D+1, exit at close D+3 → 2 trading days held.
    EXISTING 3 PAIRS: retain per-pair values from config/default.yaml exactly:
      EURUSD: swap_long=-1.2 pips/day, swap_short=+0.3 pips/day
      USDJPY: swap_long=+0.8 pips/day, swap_short=-1.5 pips/day
      GBPUSD: swap_long=-0.9 pips/day, swap_short=+0.1 pips/day
    9 NEW PAIRS (AUDJPY, AUDUSD, CADJPY, EURGBP, EURJPY, GBPJPY, NZDJPY, NZDUSD, USDCAD):
      MECHANICAL DEFAULT: swap_long = -1.5 pips/day, swap_short = -1.5 pips/day.
      Derivation: worst-of-existing-3 floor applied symmetrically to both directions.
      -1.5 pips/day is the most adverse swap observed in any existing pair (USDJPY short).
      Applying it to BOTH directions of ALL new pairs is strictly conservative — it cannot
      manufacture a false PASS (higher costs depress net returns, increases p_post, moves
      toward KILL). If the actual swap is less adverse for a new pair, the clean re-run
      produces a BETTER result than the frozen default — the freeze is directionally safe.
    Disclosure: per-pair swap data for the 9 new pairs is not in the repository.
    The -1.5 pips/day constant is a disclosed conservative assumption, not a measured value.
    Total worst-case swap per event per pair (2-day hold, both directions adverse):
      2 × 1.5 = 3.0 pips. All-in cost per event per pair:
      corrected_spread + 0.50 (slip) + 0.50 (comm) + 3.0 (swap 2d) = spread + 4.0 pips.

  usdcad_unit_audit: >
    RAW MEDIAN: 45.0000 (from data/spreads/USDCAD_daily_spreads.parquet, n_rows=4237).
    MARKET NORM CHECK: USDCAD market rate ~1.35-1.40; 1 pip = 0.0001.
    45 pips at 0.0001 = 0.0045 price — implausibly wide (~45x ECN spread); typical retail
    USDCAD spread is 1.5-5 pips. The ingestion pipeline for USDCAD stores spread in
    fractional-pip units (points = 0.00001 = 1/10 pip), yielding values ~10x the pip scale.
    CORRECTION: 45.00 / 10 = 4.50 pips. This is consistent with wide-retail USDCAD
    spreads (1-2 pips ECN → 4-5 pips retail is plausible).
    SANITY CROSS-CHECK: all other 11 pairs pass the unit sanity check (JPY crosses O(2-7)
    pips, USD majors O(1.6-5) pips — all in the expected range; no other unit flags).
    FROZEN CORRECTED VALUE: USDCAD spread = 4.50 pips.

