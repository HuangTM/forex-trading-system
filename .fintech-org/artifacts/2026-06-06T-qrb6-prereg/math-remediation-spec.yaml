body: |
  SECTION 1: MECHANICAL COST RULE

  The 12 pairs are the full verified inventory from qr-prereg-draft.yaml line 50:
  {AUDJPY, AUDUSD, CADJPY, EURGBP, EURJPY, EURUSD, GBPJPY, GBPUSD, NZDJPY, NZDUSD, USDCAD, USDJPY}.
  These match exactly the 12 daily spread parquet files in data/spreads/.

  SPREAD: frozen_spread_pips[P] = round(median(df["spread_pips"]), 2) computed over the full
  file. This is a deterministic, zero-discretion operation. The formula is identical to the
  one sketched in math-bias-analysis.yaml (mechanical_cost_rule section).

  SLIPPAGE + COMMISSION: uniform 0.50 pips each for all 12 pairs. The uniform constant
  removes all per-pair discretion. It matches the majority existing-pair value and is
  directionally conservative (higher costs → lower net returns → higher p_post → toward KILL).
  The alternative (slippage = 0.5 × spread) would create pair-specific slippage ranging from
  0.82 to 3.50 pips for the wider crosses — plausible but creates 9 new derived parameters
  and a formula choice that is itself a degree of freedom. The uniform constant is cleaner.

  USDCAD UNIT AUDIT: Raw median = 45.00. Market sanity: USDCAD price ~1.37, pip = 0.0001.
  A 45-pip spread at 0.0001 = 0.0045 in price — ~45x the ECN rate and implausibly wide.
  The likely storage format is fractional pips (points = 0.1 pip), so 45.0 points = 4.5 pips.
  4.5 pips is a plausible wide-retail spread for USDCAD. All other 11 pairs pass unit sanity.
  Frozen corrected value: 4.50 pips.

  SWAP: Existing 3 pairs retain their config/default.yaml values exactly. The 9 new pairs
  have no repository swap data; the mechanical default is -1.5 pips/day for both long and
  short, derived as the worst-of-existing-3 floor. This is the largest adverse swap cost
  among the existing 3 and applies to ALL new pairs symmetrically. The conservative direction
  is safe: if actual swaps are less adverse, the re-run performs better than the frozen
  default, which is acceptable. If more adverse, the frozen default understates costs — but
  for a 1-day event study (2-bar hold), the total swap component (2 × 1.5 = 3.0 pips) is
  small relative to the signal magnitude and is itself a directional guard toward KILL.

  SECTION 2: EXTRA-LOOK PENALTY

  The void run fa0f982a accessed post-2015 CB event data and produced a test statistic
  (p_post=0.2158). Even though the run was voided due to cost-config failure, the data was
  not unobserved — it was processed and a result was formed. A second look at the same data
  requires alpha-spending.

  OBF is preferred over Bonferroni because (a) it is more powerful for a design where the
  first look has low information content, and (b) it is consistent with firm precedent
  (carry confirmatory 2-look design). The key judgment is t1 = 0.50 (information fraction
  for the void run). The actual information fraction could be argued as low as 0.25 (only
  3/12 pairs had non-zero costs), but t1=0.50 is the conservative symmetric choice — it
  spends MORE alpha at look 1, leaving LESS for the re-run, which makes the re-run gate
  stricter. This is the safe direction.

