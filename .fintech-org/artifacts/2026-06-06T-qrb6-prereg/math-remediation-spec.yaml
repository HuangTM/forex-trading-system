# ═══════════════════════════════════════════════════════════════════════════════
# DELIVERABLE 2 — EXTRA-LOOK PENALTY (EXACT, FREEZABLE)
# ═══════════════════════════════════════════════════════════════════════════════
extra_look_penalty:
  context: >
    The void trial fa0f982a constitutes a FIRST LOOK at the post-2015 CB event data, even
    though it was voided due to cost-config failure. The data was accessed and a test statistic
    computed (p_agg=0.0791, p_post=0.2158, dsr=0.768). The remediated re-run is a SECOND LOOK
    at substantially the same hypothesis and dataset. Conservative treatment requires accounting
    for this extra look via alpha-spending, in the same way the firm treated the carry
    confirmatory 2-look design.

  method: >
    O'Brien-Fleming-style Lan-DeMets alpha spending (OBF), 1-sided, consistent with firm
    precedent (carry confirmatory 2-look design). Two methods considered; OBF adopted.

    METHOD A (Bonferroni): alpha_per_look = 0.05/2 = 0.025; p_reject = 0.025 - 0.0022 = 0.0228.
    This is the most conservative option and the correct WORST-CASE bound. It is conservative
    because Bonferroni treats the two looks as independent — but the void run used heavily
    corrupted data (9/12 pairs zero-imputed), so it contributed very little information on
    the hypothesis of interest. Bonferroni over-penalizes.

    METHOD B (OBF, ADOPTED): The OBF spending function allocates little alpha to an early,
    information-poor look and most alpha to the final look. The information fraction t1 for
    the void run is set at 0.50 (symmetric) — a CONSERVATIVE choice (t1=1/3 would be more
    accurate since only 3/12 pairs had cost data, but t1=0.50 spends more alpha at look 1,
    leaving less for the re-run, which is the conservative direction).

    OBF 1-SIDED SPENDING FUNCTION:
      alpha_spend(t) = 1 - Phi(z_{alpha} / sqrt(t))
      where z_{alpha} = Phi^{-1}(1 - 0.05) = 1.644854 (1-sided, alpha=0.05)

    At t1 = 0.50:
      alpha_spend_look1 = 1 - Phi(1.644854 / sqrt(0.50))
                        = 1 - Phi(1.644854 / 0.707107)
                        = 1 - Phi(2.326174)
                        = 1 - 0.989995
                        = 0.010005

    alpha_remaining_look2 = 0.050000 - 0.010005 = 0.039995

  p_reject_new: 0.0378
  p_reject_new_derivation: >
    p_reject = alpha_remaining_look2 - MC_SE = 0.039995 - 0.0022 = 0.037795 ≈ 0.0378 (4 d.p.)
    The MC_SE deduction is identical to the original design (MC_SE=0.0022 at K=10000 bootstrap
    draws) and must be applied to the tightened alpha in the same way. The re-run will use
    the same K=10000 bootstrap, so MC_SE is unchanged.

  p_straddle_hi_new: 0.0400
  p_straddle_hi_new_derivation: >
    p_straddle_hi = alpha_remaining_look2 (before MC_SE) = 0.039995 ≈ 0.0400.
    The straddle band is [p_reject_new, p_straddle_hi_new] = [0.0378, 0.0400].
    Any observed p_post in this band is a straddle (ambiguous due to MC variance in K=10000).

  nht_float_reconciliation: >
    NHT floated ~0.0390. Reconciliation: NHT's value corresponds to applying alpha_look2 =
    0.0400 directly as p_reject WITHOUT subtracting MC_SE (0.0390 ≈ 0.0400 - 0.0010, a
    half-MC_SE partial deduction). The correct value per the original gate design is to
    subtract the FULL MC_SE from the tightened alpha, yielding 0.0378. NHT's 0.0390 falls
    inside the straddle band [0.0378, 0.0400]. The stricter 0.0378 is adopted here.

  derivation_arithmetic: |
    Step 1: z_alpha = Phi^{-1}(1 - 0.05) = 1.644854
    Step 2: t1 = 0.50 (void run information fraction; conservative vs. actual 3/12 = 0.25)
    Step 3: alpha_spend_look1 = 1 - Phi(1.644854 / sqrt(0.50))
                              = 1 - Phi(2.326174)
                              = 1 - 0.989995
                              = 0.010005
    Step 4: alpha_look2       = 0.050000 - 0.010005 = 0.039995
    Step 5: p_reject_new      = 0.039995 - 0.0022   = 0.037795  → rounded 0.0378
    Step 6: p_straddle_hi_new = 0.039995             → rounded 0.0400

    Sensitivity (all round to same conclusion — tighter than 0.0478, looser than Bonferroni):
      t1=0.25: p_reject=0.0473 (barely tighter; void run had near-zero information)
      t1=0.33: p_reject=0.0456
      t1=0.50: p_reject=0.0378  ← ADOPTED (conservative symmetric assumption)
      t1=0.75: p_reject=0.0190 (overly penalizing; wrong direction)

    Bonferroni (lower bound): p_reject=0.0228 — valid but over-conservative.
    OBF at t1=0.50 (0.0378) is the adopted value: more powerful than Bonferroni,
    consistent with firm precedent, conservative in t1 choice.

  dsr_gate_change:
    verdict: unchanged
    basis: >
      The DSR gate (DSR >= 0.95, SR0_pp=0.026861, N_sel=3) addresses SELECTION multiplicity:
      the charge for having selected the QRB-6 hypothesis from a pool of proposals.
      The extra LOOK addresses a separate axis: temporal multiplicity from accessing the same
      data twice. These are orthogonal multiplicity dimensions. The p-gate tightening (OBF
      alpha-spending) is the COMPLETE adjustment for the extra look. The DSR gate is NOT
      tightened further because:
      (a) N_sel already charges the selection step — its derivation was independent of how
          many times the test is administered.
      (b) Double-applying the selection charge to absorb the re-look would be double-counting:
          the OBF adjustment already prices the extra look; adding it to N_sel would count the
          same look penalty in two places.
      (c) The correct decomposition is: DSR/N_sel handles selection-space multiplicity;
          OBF handles temporal/sequential multiplicity. They multiply on orthogonal axes.
      VERDICT: DSR gate UNCHANGED (DSR >= 0.95, SR0_pp=0.026861).

  n_sel_change:
    verdict: unchanged
    basis: >
      N_sel=3 (Mathematician's 2026-06-07 bias-analysis, accepted by NHT) represents:
        - 1 real one-shot look at the QRB-6 event-study idea family
        - ~2 effective soft-prior framings of correlated event-study designs
      The void run DOES NOT increment N_sel because:
      (a) N_sel charges realized-statistic selection (argmax over observed Sharpes). The void
          run produced a VOID statistic (p_post based on corrupted data) — there was no valid
          realized Sharpe harvested for selection across proposals.
      (b) The void run was a TECHNICAL FAILURE, not a deliberate interim analysis. It did not
          constitute an informed look at the strategy's true performance.
      (c) The extra look is already priced by the p-gate tightening (OBF). Adding it to N_sel
          would be double-counting on the same axis.
      VERDICT: N_sel UNCHANGED = 3. No DSR recalculation required.

      Anti-double-counting guarantee: the p-gate tightening (OBF: 0.0478 → 0.0378)
      and N_sel=3 (unchanged) address different multiplicity axes. Both apply simultaneously;
      neither subsumes the other.

