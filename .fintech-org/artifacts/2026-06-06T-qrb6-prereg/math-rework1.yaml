boundary_convention:
  description: >
    The straddle band [0.0478, 0.0522] is CLOSED. Both endpoints and all interior values route
    to RULE 4 (AMBIGUOUS). PASS requires p strictly < 0.0478 (strict less-than on both gates).
    KILL requires p strictly > 0.0522 (strict greater-than). These inequalities appear once per
    rule body in §4.2 and are echoed identically in the §4.3 table and the exhaustiveness gloss.
    No other representation of the boundary exists in the document.
  exact_inequalities:
    PASS_condition: "p_post2015 < 0.0478 AND p_agg < 0.0478 (both strict)"
    KILL_post2015: "p_post2015 > 0.0522 (strict)"
    KILL_aggregate: "p_agg > 0.0522 (strict)"
    STRADDLE_band: "[0.0478, 0.0522] CLOSED — routes to RULE 4 (AMBIGUOUS)"
    boundary_at_0.0478: "routes to RULE 4, not PASS, not KILL"
    boundary_at_0.0522: "routes to RULE 4, not PASS, not KILL"
  pr04_prior_defect: >
    RULE 1/2 used '>= 0.0478' in formula context and '> 0.0478' in gloss context; RULE 3
    used '<= 0.0478'; at exactly p=0.0478 RULE 3 fired (PASS) while straddle semantics said
    AMBIGUOUS — mutually contradictory. Fixed by raising KILL threshold to strict > 0.0522
    and tightening PASS to strict < 0.0478, so boundary falls to RULE 4 unconditionally.

sign_mapping_contract:
  filtration: "F_{D-1} — sign_align_e is formed from information available through and including the close of bar D-1 only"
  hypothesis_statement_requirement: >
    The pre-reg freezes the UNCONDITIONAL post-event hypothesis: H0: E[r_e] <= 0, where
    sign_align_e in F_{D-1}. If the QR's sign-mapping rule uses bar D's own return sign,
    the hypothesis becomes a CONDITIONAL continuation (E[r_e | sign(ret_D)] <= 0), which
    materially changes the statistic's sampling distribution, the HAC SE bias properties,
    and the bootstrap recentering validity. A bar-D-using rule requires the pre-registration
    to be re-opened before the freeze-receipt is cut (VOID §1.4(2) of the pre-reg).
  bar_D_excluded_from_sign_align: true
  entry_delay_bars: 1
  K_post: 2
  post_window_return_covers: "close of bar D to close of bar D+2 (two holding bars: D+1 and D+2)"
  degenerate_case:
    trigger: "ret_{D-1} = 0 (floating-point equality)"
    convention: "sign_align_e = +1 (long bias; event INCLUDED, not excluded)"
    implementation: "numpy.sign(ret_{D-1}) with zero→+1 mapping via explicit branch or clip"
    runner_unit_test_required: true
    rationale: >
      Exact-zero daily returns are near-negligible in liquid FX at daily precision;
      convention has no material effect on the statistic. +1 chosen over 0 (exclude, adds
      sample-size noise) and over -1 (short bias, contradicts the positive directional hypothesis).

assumptions:
