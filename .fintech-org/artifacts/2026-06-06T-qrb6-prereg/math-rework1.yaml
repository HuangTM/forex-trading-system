body: >
  Two rework items addressed.

  PR-04 (boundary precision): The pre-patch §4.2 contains a genuine internal contradiction.
  At p=0.0478 exactly, RULE 1 (firing on p > 0.0478) does not fire, and RULE 3 (requiring
  p <= 0.0478) does fire — so the boundary buys PASS. But the straddle-band semantics in
  RULE 4 and §3.3 explicitly state that p=0.0478 is MC-indistinguishable from alpha=0.05
  and must NOT buy PASS. The fix raises the KILL threshold to strict > 0.0522 and tightens
  the PASS threshold to strict < 0.0478. Every p in [0.0478, 0.0522] — including exact
  boundaries — then falls through RULES 1–3 and lands in RULE 4 (AMBIGUOUS/catch-all).
  The five-rule structure is mutually exclusive and exhaustive. The inequality appears once
  per rule body and is echoed identically in the exhaustiveness gloss and the §4.3 table.
  No special-case language is needed: the straddle is mechanically unreachable by RULES 1–3.

  NHT-F5 companion — sign-mapping compatibility contract (new §4.4): the QR's sign-mapping
  rule must use only information in F_{D-1} (through close of bar D-1). This is already
  implied by §1.1's "a-priori directional hypothesis (pre-decision drift direction; NO
  data-driven sign fit)" but is not stated as an explicit contractual constraint visible to
  the runner implementer. The new §4.4 makes it explicit: (a) filtration = F_{D-1}; bar D's
  own return is excluded from sign_align_e; (b) if bar D's return sign were used, the
  hypothesis changes to a conditional continuation — the unconditional H0 in §1.2 becomes
  incorrect, the HAC SE and bootstrap recentering properties change, and the pre-reg must be
  re-opened; (c) degenerate case (ret_{D-1}=0) → sign_align_e = +1; event included; runner
  must implement and unit-test the zero-return branch before freeze-receipt. The section is
  provided as both prose and a machine-readable YAML contract block for the runner implementer.
  Decision: sound. Both patches are required before consensus ratification and freeze-receipt.

