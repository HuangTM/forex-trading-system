proof_sketch_or_reference: >
  PR-04 (boundary fix): The straddle band [0.0478, 0.0522] is the set of p-values
  within one MC-SE of alpha=0.05 at K=10000. At K=10000, MC-SE = sqrt(p(1-p)/K) ≈
  sqrt(0.05*0.95/10000) = 0.002179, rounded to 0.0022. Band = [0.05-0.0022, 0.05+0.0022]
  = [0.0478, 0.0522]. With KILL firing on strict p > 0.0522 and PASS requiring strict
  p < 0.0478, every p in [0.0478, 0.0522] fails both conditions and falls to RULE 4
  (catch-all). The five-way partition {technical-fail} ∪ {p_post > 0.0522} ∪
  {p_post ≤ 0.0522 AND p_agg > 0.0522} ∪ {p_post < 0.0478 AND p_agg < 0.0478 AND DSR≥0.95}
  ∪ {else} covers the real line [0,1]² × DSR-space exhaustively and the sets are disjoint
  by ordered evaluation (each rule's antecedent conditions out all prior rules).

  NHT-F5 (filtration contract): the sign_align_e = f(F_{D-1}) assumption is load-bearing
  for the unconditional H0 in §1.2. The proof is by construction: if sign_align_e in F_{D-1}
  then r_e = sign_align_e * g(F_{D+2} \ F_D) where g is the K_post-window cumulative return.
  Under H0: E[r_e] = E[sign_align_e] * E[g] when sign_align_e and g are independent
  (pre-event sign independent of post-event return under the null of no edge). If instead
  sign_align_e = sign(ret_D) in F_D, then r_e = sign(ret_D) * g where ret_D and g share
  the post-decision information; the expectation E[r_e | F_D] differs from E[r_e] and the
  studentized mean's null distribution shifts — the bootstrap recentering d_e = r_e - mean(r)
  is no longer correctly zeroing the conditional mean.

