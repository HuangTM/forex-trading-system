  - "The event-window return r_e = sign_align_e * cumulative_net_return(D+1..D+2) is the outcome variable; sign_align_e is a fixed multiplier at the time of measurement"
  - "The no-lookahead invariant (entry_delay_bars=1) ensures bar D's OHLC is observable at entry bar D+1; the filtration constraint is a hypothesis-coherence requirement, not a data-availability constraint"
  - "At K=10000, MC-SE at p=0.05 is sqrt(0.05*0.95/10000) = 0.002179; the straddle half-width rounds to 0.0022; straddle band = [0.0478, 0.0522] is correct and unchanged by the boundary fix"
  - "The straddle band boundaries 0.0478 = 0.05 - 0.0022 and 0.0522 = 0.05 + 0.0022 are computed at K=10000 and are n-invariant (MC-SE depends only on K and p, not on the event count)"
  - "The ordered rule evaluation (RULE 0 → 1 → 2 → 3 → 4) guarantees mutual exclusivity and exhaustiveness; each case satisfies exactly one rule at any realized p-pair"

