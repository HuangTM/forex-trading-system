frozen_values:
  null_hypothesis: "H0: E[r_e] <= 0 (studentized mean event-window net return, deduped bank-event unit)"
  alpha_one_sided_total: 0.05
  statistic: "t = sqrt(n) * mean(r) / omega_hat; omega_hat = hac_se_nw(r, bandwidth=max(L-1,1)) [reality_check.py:58-88]"
  block_length_rule: "Politis-White (2004)+PPW(2009) per bank-group; L_group=max(1,ceil(L_pw)); L_pool=max_g L_group"
  bootstrap_scheme: "banks-as-independent-blocks: within-bank stationary circular block bootstrap, concatenated across G bank-groups; blocks never cross a bank boundary (circular wrap within-bank only)"
  K_replications: 10000
  mc_se_at_p05: 0.002179   # sqrt(0.05*0.95/10000); straddle band rounded to 0.0022
  straddle_band: 0.0022
  master_seed: 387992      # int('fa0f98',16)=16387992; 16387992 mod 1_000_000 = 387992
  rng: "numpy.PCG64"
  scipy_required: true

  N_sel: 3                 # paper-selection charge (NOT data-selection); re-derived, not imported
  dispersion_plugin_ann: 0.50   # planning Sharpe dispersion; re-derived for paper-selection (NOT R5's 0.426385)
  bracket_N3: 0.852804     # property of N only; equals R5 bracket(N=3) as a consistency check
  SR0_ann_sel: 0.426402
  SR0_pp_sel: 0.026861
  DSR_gate: 0.95

  scenario_a:
    n_aggregate: 506
    n_post2015: 345
    kill_switch_threshold_ann: 1.5883   # T=506 aggregate anchor (DECLARED verbatim value)
    power_aggregate: 0.149
    power_post2015: 0.126
  scenario_b:
    n_aggregate: 716
    n_post2015: 491
    kill_switch_threshold_ann: 1.4029   # T=716 aggregate anchor (auto-activation, pre-frozen)
    power_aggregate: 0.177
    power_post2015: 0.147

  kill_switch_threshold_verbatim: 1.5883   # Scenario A primary; 1.4029 on Scenario-B auto-activation

  two_gate_rule_oneliner: >
    Ordered/exhaustive: RULE0 technical-fail -> RULE1 KILL if p_post2015 > 0.0478 (overrides aggregate)
    -> RULE2 KILL if p_agg > 0.0478 -> RULE3 PASS iff both p<=0.0478 AND DSR>=0.95 (=> ann Sharpe>=1.5883)
    -> RULE4 else (AMBIGUOUS/gate-fail, no PASS). Both-must-pass: post-2015 fail KILLS even on aggregate pass.

