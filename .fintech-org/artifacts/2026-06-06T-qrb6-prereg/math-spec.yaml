proof-sketch-or-reference:
  seed_arithmetic: >
    master_seed = int(first 6 hex of stem 'fa0f982a', base 16) mod 1e6.
    'fa0f98': f=15,a=10,0=0,f=15,9=9,8=8.
    15*16^5 + 10*16^4 + 0*16^3 + 15*16^2 + 9*16^1 + 8*16^0
    = 15*1048576 + 10*65536 + 0 + 15*256 + 9*16 + 8
    = 15728640 + 655360 + 0 + 3840 + 144 + 8
    = 16387992.
    16387992 mod 1000000 = 387992. => master_seed = 387992.
    (Mirrors the confirmatory's frozen hex-mod RULE after its hand-hex-drift catch; stem 'fa0f982a' has no leading decimal run so the hex-mod rule governs.)
  SR0_derivation: >
    BLdP (2014) SR0_ann = sqrt(Var[SR_n]) * [(1-g)*Zinv(1-1/N) + g*Zinv(1-1/(N*e))], g=Euler-Mascheroni.
    N_sel=3: Zinv(2/3)=0.430727, Zinv(0.877374)=1.161957, bracket=0.852804 (= R5 bracket(N=3), an N-only property).
    disp=0.50 => SR0_ann=0.426402, SR0_pp=0.426402/sqrt(252)=0.026861.
  kill_switch_derivation: >
    DSR=0.95 => z_dsr=Zinv(0.95)=1.644854. var_term=1 reference.
    SR_pp = SR0_pp + z_dsr/sqrt(T-1).
    T=506: SR_pp=0.026861+1.644854/22.472205=0.100056; SR_ann=0.100056*15.874508=1.588337 => 1.5883.
    T=716: SR_pp=0.026861+1.644854/26.74883=0.088354; SR_ann=1.402907 => 1.4029.
  power_derivation: >
    lambda = SR_pp*sqrt(n); power = Phi(lambda - 1.644854).
    n=506: lambda=0.604219, power=0.149. n=345: 0.498918, 0.126. n=716: 0.718746, 0.177. n=491: 0.595196, 0.147.
