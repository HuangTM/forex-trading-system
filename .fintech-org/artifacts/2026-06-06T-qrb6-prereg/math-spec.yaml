assumptions:
  - "The QR pins the event-window length convention (pre/post bars) in parallel (AC-1c/d); my statistic is parameterized by it but value-frozen once the bar-counts are fixed. The frozen numbers (SR0, kill_switch, power) do NOT depend on the window length — only on n, alpha, N_sel, dispersion, T."
  - "The deduped bank-event-day is the unit of observation (NHT banks-as-blocks). Each deduped event-day carries a single bank label per the QR dedup rule; same-day co-decisions are already deduped in the NHT 506/716 counts."
  - "var_term=1 is the frozen reference for the declared kill_switch_threshold; the runner recomputes var_term with the event-set's own skew/kurtosis at evaluation. Because SR_pp is small (~0.10), var_term~1 and the two-pass correction is < 0.001 (confirmatory precedent)."
  - "Planning power at SR_plan = SR0_ann_sel (selection-deflated benchmark), not a snooped Sharpe (none exists; nothing backtested)."
  - "iid-event power is an UPPER bound; high event-to-event autocorrelation (large PW L) reduces effective n and realized power."
  - "Scenario-A is the frozen primary; Scenario-B parameters are pre-frozen for C4-gated auto-activation with NO live recompute (only the n-pair and pre-frozen kill_switch swap)."

assumptions-identified:
  - "The 11 generated proposals were NEVER backtested — no return data harvested in selection (verified: AC-4 no_return_data_examination_before_freeze; nht-qrb6-rescreen counts came from a calendar groupby, not performance). This is the FOUNDATION of the N_sel=3 election and the single most load-bearing assumption: if any QRB strategy's returns HAD been examined pre-freeze, N_sel must rise."
  - "The 2-finalist (QRB-6 vs QRB-3) comparison used calendar event-count/testability, NOT either strategy's returns. If the finalist decision peeked at returns, the selection becomes a data-selection and N_sel is understated."
  - "The CB-decision event-study idea-family is ONE correlated family (its effective independent dimension collapses to a low single digit), not 11 independent bets — this justifies charging far below honest-N=11."
  - "Bank labels in the parquet are clean and the dedup rule assigns exactly one bank per deduped event-day (NHT-confirmed bank column; assumed not re-verified here)."
  - "Politis-White on calendar-sparse event-day series is applied on the event-INDEX ordering (events sorted by date), not calendar-day lags — the conventional event-study HAC treatment."

failure-regimes:
  - "If event returns are heavily autocorrelated event-to-event (regime persistence in CB-decision drift), PW returns a large L per bank-group -> few effective blocks per bank, especially BOC (58 events post-2019) and RBNZ (11) -> wide HAC SE -> realized power below the ~13-18% iid figure. Per-bank secondary tests on BOC/RBNZ are underpowered by construction (NHT-acknowledged)."
  - "var_term <= 0 (extreme negative skew x large SR) -> DSR=0 (gate FAIL, not technical failure; dsr.py:187-195). Carried verbatim."
  - "If a same-day multi-bank co-decision dedup assigns an event to the wrong bank-group, the block structure is mildly mis-specified; impact is second-order (22/506 in Scenario A) and does not bias the pooled mean."
  - "Straddle: p in [0.0478, 0.0522] -> RULE 4 (no PASS, no clean KILL). At K=10000 this band is narrow (MC-SE 0.0022)."
  - "A pre-2015-only effect (drift disappeared post-2015) -> RULE 1 KILL regardless of aggregate strength. This is the designed-for failure regime (NHT structural-break)."

