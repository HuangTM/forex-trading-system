body: >
  AC-2 frozen statistics for QRB-6, authored before any return-data examination. The load-bearing
  freeze is the selection charge: QRB-6 is a PAPER-selected survivor (11 proposals -> 9 -> rubric -> 2
  finalists), fundamentally unlike R5's best-of-36-BACKTESTS. No realized Sharpe was harvested in
  selection, so the DSR multiplicity charge is small: I elect N_sel=3 (the one real one-shot look plus
  ~2 effective soft-prior framings of one correlated event-study family), explicitly rejecting N=1
  (anti-conservative), N=11 (conflates hypothesis-space with realized-statistic multiplicity), N=41
  (org counter, wrong denominator), and N=6 (R5-confirmatory copy, imports a non-existent data-selection
  burden). Dispersion: no per-proposal Sharpes exist, so R5's observed-look 0.426385 is inadmissible
  (cross-trial import + fabricated provenance); I re-derive a planning dispersion 0.50 from the published
  event-study magnitude band. These give SR0_ann_sel=0.426402, SR0_pp_sel=0.026861. Bootstrap is
  banks-as-independent-blocks (within-bank stationary circular blocks concatenated across bank-groups),
  K=10000, master_seed=387992 (int('fa0f98',16) mod 1e6, digit-by-digit shown), numpy.PCG64, scipy
  required. The decision rule is a 7.3.6-style ordered/exhaustive two-gate functional with the post-2015
  structural-break KILL evaluated FIRST (overrides aggregate pass) and PASS requiring both p's clean
  (<=0.0478) AND DSR>=0.95. Scenario-B parameters are pre-frozen for C4-gated auto-activation with no
  live recompute. Power is honestly LOW (~13-18%) at the selection-deflated planning Sharpe across all
  four n's. kill_switch_threshold=1.5883 (Scenario A aggregate, T=506; 1.4029 Scenario B, T=716) — derived
  fresh, far above SR0 because T is short. decision: sound-with-caveats — the single material caveat is
  that the entire N_sel=3 election rests on the verified fact that NO QRB returns were examined in
  selection; if that is ever falsified, the charge must rise. Numerics routed to QD for scipy confirmation.

