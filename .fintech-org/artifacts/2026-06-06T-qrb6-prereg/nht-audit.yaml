dissent-statement: >
  QRB-6 PRE-REGISTRATION — NHT PRE-FREEZE AUDIT — 2026-06-06.

  VERDICT: DO NOT FREEZE AS-IS. Three blocking internal contradictions corrupt the
  one-shot-testability the atomic claim asserts. The underlying METHODOLOGY is sound — the
  banks-as-blocks bootstrap, the post-2015 structural-break KILL, the DSR-charged paper-selection
  multiplicity (N_sel=3, disp 0.50, SR0_pp 0.026861, kill 1.5883), and the honestly-disclosed
  ~13-18% power are all admissible and, where they err, err toward OVER-deflation (harder PASS),
  which is the correct direction for an adversarial kill test. My objection is NOT to the strategy
  or the constants; it is that the ASSEMBLED document and its machine sidecar disagree with each
  other and with my binding C4 on three load-bearing points, and the falsification section is not
  actually frozen (five live [MATH] tokens).

  BLOCKER 1 (F1 — the primary threshold): §5.1 says the selection multiplicity is "absorbed into the
  primary alpha" (=> p-threshold ~0.0025, per the sidecar's own hint) and leaves it as the unfilled
  token "[MATH primary alpha]"; §4.2, the sidecar gate, and math-spec all instead use p<=0.0478
  (alpha 0.05, multiplicity charged via DSR only). The single most important kill threshold is
  specified two incompatible ways and left un-substituted — the exact garden-of-forking-paths DOF a
  pre-registration exists to close. Reconcile to one statement (alpha 0.05, gate p<=0.0478,
  multiplicity in DSR) and substitute the literal 0.0478 for every [MATH primary alpha] before freeze.

  BLOCKER 2 (F2 — the quantity under test): the machine sidecar the RUNNER executes defines the
  primary metric as the PRE-WINDOW / pre-decision-drift return, the component §2.3 explicitly declares
  DEAD post-2015. The binding prose tests the POST-decision reaction/reversal (the component expected
  alive). The two faces of the frozen artifact test two different hypotheses; a sidecar-driven run
  would KILL on the dead component for the wrong reason. The sidecar primary metric and
  hypothesis_summary must be rewritten to the post-decision (K_post=2) quantity to match §2.3/§4.

  BLOCKER 3 (F3 — C4 NOT honored): C4 maps the "partial" spot-check verdict (BoE 7-day-shift risk
  unresolved) to Scenario B DORMANT. The sidecar maps "partial" to ACTIVATE
  (spotcheck_result IN ['partial','certified']) and PROVENANCE line 706 calls "partial" "sufficient
  for activation" — a direct contradiction of my binding condition, with a NO-human-re-decision
  auto-activation path that would silently extend the event set onto unverified BoE dates whose
  date-shift contamination is, by the spot-check's own words, unquantifiable. Additionally the §3.5
  frozen rule gates on a spot-check artifact at a path (qd-boe-ecb-spotcheck.yaml) that does not
  exist (the real one is in PROVENANCE.md) and never gates on the verdict value at all. Bind
  activation to verdict=='certified', keep B DORMANT on "partial", fix the artifact path, and add the
  verdict gate to the binding prose.

  CALIBRATION: I am NOT crying contamination-veto and I am NOT dissenting against the alpha hypothesis
  or the math. Two of the three blockers (F1, F2) are reconciliation defects of an ASSEMBLY (prose vs
  sidecar drift introduced when QR PART I and MATH PART II were merged) — fixable in an editing pass,
  not a redesign. The third (F3) is a genuine honoring failure of my own prior condition that must be
  corrected or B must not freeze in any activatable state. Once F1-F3 are reconciled and F4-F6
  (path, sign-rule, runner-pin) are closed, I expect the structure to freeze cleanly and the
  honest base-rate expectation (most-likely terminal state: KILL) to hold. The post-2015 kill,
  the two-gate functional, and the no-keep-spending property (F7/F8) are already correct.

