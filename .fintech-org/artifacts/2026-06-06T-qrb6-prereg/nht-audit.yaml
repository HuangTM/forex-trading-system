  n_sel_3:
    ruling: ACCEPT (calibrated)
    reasoning: >
      The Mathematician's first-principles distinction is CORRECT and is the crux: the DSR
      selection charge deflates a Sharpe that was SELECTED FOR BEING LARGE. R5's N charged a
      best-of-36-BACKTESTS argmax (each cell consumed a real look at realized return data).
      QRB-6's 11 proposals were NEVER backtested — no Sharpe was harvested at the 11->9->2
      stages, so there is no max-over-realized-statistics to deflate at those stages. Charging
      N=11 or N=41 would conflate hypothesis-space size with realized-statistic multiplicity
      (the inverse error). N=1 is anti-conservative. N_sel=3 = 1 real one-shot look + ~2
      effective soft-prior framings of ONE correlated event-study idea-family. I accept this.
    bias_direction: >
      Any residual ERROR in N_sel=3 biases toward OVER-deflation (too-high kill_switch),
      i.e. it makes a PASS HARDER, not easier. For a KILL test whose honest base-rate
      expectation is failure, erring toward over-deflation is the SAFE-IF-WRONG direction.
      N_sel=3 cannot manufacture a false PASS; it can only make a true edge harder to certify.
      This is the correct direction for an adversarial gate. NOT a finding.
  paper_selection_no_backtest_claim:
    verified_basis: >
      The "no QRB returns were ever examined" claim — the FOUNDATION of N_sel=3 — is
      supported by: (a) AC-4 no_return_data_examination_before_freeze (acceptance criteria);
      (b) nht-qrb6-rescreen.yaml counts came from a calendar groupby ("counting rows in a
      calendar file is data inventory, not market-data computation", rescreen
      contamination_check), NOT a performance computation; (c) the firm's standing
      receipt-before-return-data boundary. The 2-finalist (QRB-6 vs QRB-3) choice used
      event-COUNT/testability (NHT counts), not either strategy's returns. I find the
      no-backtest basis adequately evidenced for THIS pre-run audit.
    residual: >
      The claim is verified by ABSENCE-of-evidence-of-peek + role attestations, not by a
      positive cryptographic proof. The freeze-receipt + the RULE-0 cross-trial-constant /
      early-peek VOID conditions are the enforcement. If any QRB return was examined pre-freeze
      (undetected), N_sel=3 understates and the whole charge collapses — Math flags this as
      its single material caveat and I concur. Carried as a disclosed assumption, not a blocker.
