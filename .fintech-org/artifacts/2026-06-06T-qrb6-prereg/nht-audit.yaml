audit-findings:

  - id: F1-alpha-double-specified
    severity: blocking
    finding: >
      The PRIMARY kill threshold — the single most load-bearing DOF — is specified TWO
      incompatible ways and left as an UNFILLED TOKEN in the falsification section. §5.1/§5.4
      (the frozen falsification criteria) state the primary KILL fires at
      "p >= [MATH primary alpha]" described as "the registered POST-MULTIPLICITY-CHARGE alpha —
      the 11-proposal portfolio charge AND the 2-finalist charge are ABSORBED INTO THIS ALPHA"
      (sidecar hints "e.g. 0.0025"). That is an alpha-LEVEL deflation (0.05 -> ~0.0025). But
      §4.2 (the actual two-gate functional), the sidecar aggregate_gate.threshold, AND
      math-spec all use p <= 0.0478 = 0.05 - MC-SE, i.e. alpha 0.05 with the multiplicity
      charged ENTIRELY via the DSR gate (N_sel=3), NOT via the p-threshold. The two
      descriptions cannot both be true: either the selection charge lives in the alpha (making
      the p-threshold ~0.0025) OR in the DSR (leaving p at 0.0478). The doc literally still
      contains five unsubstituted "[MATH]" / "[MATH primary alpha]" placeholders in §5.1, §5.2,
      §5.3, §5.4, §5.6 — the falsification section is NOT frozen.
    exploit-path: >
      A runner implementing §5.1 verbatim searches for a registered alpha ~=0.0025; a runner
      implementing §4.2 uses 0.0478. The 18x gap between the two thresholds is the difference
      between KILL and PASS on a borderline p. Worse: leaving [MATH] as a live token means the
      "frozen" value is chosen AFTER assembly — the exact garden-of-forking-paths DOF a pre-reg
      exists to close. A boundary result could be steered to either branch by reading §5.1 vs §4.2.
      MUST be reconciled to ONE statement (the correct one is: alpha 0.05, gate p<=0.0478,
      multiplicity charged via DSR only; then strike the "absorbed into this alpha" language from
      §5.1 and substitute 0.0478 for every [MATH primary alpha]) before freeze.

  - id: F2-sidecar-tests-the-dead-component
    severity: blocking
    finding: >
      The machine-checkable sidecar — which the RUNNER executes — defines the PRIMARY METRIC as
      the PRE-WINDOW return: "mean cumulative return over the PRE-WINDOW across deduped
      event-days" (line 42), aggregate_gate.description "mean cumulative PRE-WINDOW return"
      (58-59), raw_text "strategy does not demonstrate PRE-DECISION DRIFT" (68), post_2015 raw_text
      "PRE-decision drift absent" (92). But the binding prose §2.3 explicitly frames H1 on the
      POST-decision reaction/reversal because "the PRE-announcement drift component is documented
      essentially DEAD post-2015" (line 77-79), and §4.2 makes the POST-window (K_post=2) the
      claimed-edge window. The sidecar tests the component the author concedes is DEAD; the doc
      tests the component expected ALIVE. hypothesis_summary (sidecar line 39-45) also still says
      "pre-decision drift + post-announcement asymmetry," contradicting §2.3's deliberate
      re-framing onto post-decision only.
    exploit-path: >
      The freeze-receipt SHA covers BOTH files but they disagree on WHAT IS BEING TESTED — the
      primary quantity r_e. A runner driven by the sidecar computes the pre-window-drift statistic;
      the post-2015 KILL then fires near-certainly because the pre-drift IS documented dead post-2015
      — a KILL for the WRONG reason (testing the dead component), which would then be (wrongly)
      narratable as "we fairly tested the live hypothesis and it failed." Conversely a doc-driven
      runner tests post-decision reaction. Two faces of the same frozen artifact test two different
      hypotheses. The sidecar primary metric and hypothesis_summary MUST be rewritten to the
      post-decision (K_post=2) reaction/reversal quantity to match §2.3/§4 before freeze.

  - id: F3-scenarioB-partial-activates-contradicting-C4
    severity: blocking
    finding: >
      C4 (my binding condition, per orchestrator framing) maps the spot-check verdict
      scenario_b_certification:"partial" (BoE capped at calendar-arithmetic; 7-day-shift risk
      UNRESOLVED — a 7-day shift stays a Thursday and is undetectable) to Scenario B remaining
      DORMANT. The artifact set maps "partial" to ACTIVATE: (a) sidecar condition_expression
      "spotcheck_result IN ['partial','certified']" (line 140) => partial activates; (b) PROVENANCE
      line 706 "The spot-check result of 'partial' is SUFFICIENT for Scenario B pre-committed
      activation." This DIRECTLY contradicts C4. Compounding defects: (c) the doc §3.5 FROZEN
      activation rule gates on "the spot-check ... completed and committed as an artifact at
      .fintech-org/artifacts/2026-06-06T-qrb6-prereg/qd-boe-ecb-spotcheck.yaml" — but the
      spot-check actually lives in references/cb_decision_dates_PROVENANCE.md; the named artifact
      does NOT exist at that path, so the literal frozen rule is unsatisfiable-as-written; and
      (d) §3.5 gates on mere COMPLETION+COMMIT, never on the VERDICT value, so as written ANY
      committed artifact (even "failed") would auto-extend B — the verdict gate is missing from the
      binding prose entirely; (e) the sidecar itself is internally inconsistent —
      scenario_b_status_at_freeze:"PENDING-PARTIAL-SPOTCHECK" (line 144) vs the
      partial-activates condition_expression (140).
    exploit-path: >
      As frozen, Scenario B (716 events, +BOE/ECB/RBNZ) auto-extends on a "partial" verdict whose
      residual 7-day-shift error is, by the spot-check's own admission, unquantifiable without BoE
      official source — silently contaminating the BoE event windows (a shifted decision date puts
      the pre/post window on the wrong days, invisible in output). This is precisely the
      contamination C4 exists to prevent, and the activation path requires NO human re-decision, so
      it slips through automatically. Either (i) bind activation to verdict=='certified' (partial =>
      DORMANT, honoring C4), AND (ii) fix the §3.5 artifact path to the real PROVENANCE location AND
      add the verdict gate to the binding prose, AND (iii) make the sidecar status consistent
      (DORMANT/PENDING, not partial-activates). C4 is NOT honored as-is.

  - id: F4-sidecar-path-mismatch
    severity: material
    finding: >
      §7 (line 533) names the sidecar "references/pre-registrations/qrb6_triggers.yaml"; the actual
      committed sidecar is "references/pre-registrations/qrb6_cb_event_study.triggers.yaml". The
      freeze-receipt's prereg_sha256 covers a doc that points at a NON-EXISTENT sidecar path.
    exploit-path: >
      Post-freeze, an automated check that loads the sidecar by the §7-named path fails to find it,
      or (worse) a stale/blank file could be created at the wrong path and loaded instead. The
      doc<->sidecar binding is the machine-check anchor; a wrong path breaks the interlock the
      pre-reg relies on. One-line fix; must precede freeze (a frozen SHA cannot be patched later
      without re-freezing).

  - id: F5-K_pre-K_post-vs-sign-align-underspecified
    severity: material
    finding: >
      The sign-alignment rule — how the K_pre=1 pre-window move maps to the post-window position
      sign — is explicitly DEFERRED: "pinned with the statistic in PART II" (§4.2 line 160) and in
      PART II §1.1 sign_align_e is "the a-priori directional hypothesis ... NO data-driven sign fit"
      but the actual MAPPING FUNCTION (e.g. sign = sign(D-1 return)? sign(prior-trend)? a fixed
      long?) is never written as a frozen formula in either the QR or MATH section. "sign-aligned"
      is asserted; the function producing the sign is not pinned.
    exploit-path: >
      An unfrozen sign rule is a live DOF: at run time the implementer picks the sign convention
      that (consciously or not) favors a rejection. With NO data-driven fit asserted but no formula
      given, the runner must invent it — exactly the forking path a pre-reg closes. Must pin the
      exact sign(.) function (inputs: which bar(s), threshold for flat, tie-handling) before freeze.
      (This is the genre's second classic silent killer after the bar-assignment hole, which §4.1
      DOES close correctly — see notes.)

  - id: F6-runner-not-pinned-receipt-interlock
    severity: material
    finding: >
      §1.4(5)/§7 require receipt.code_commit == pinned commit for the QRB-6 execution path, but NO
      runner script exists yet and no commit hash is pinned in the doc or math-spec (the runner is
      "deferred like the confirmatory precedent"). The freeze-receipt is specified to record "the
      pinned code-commit hash for the QRB-6 execution path" — a hash that does not yet exist.
    exploit-path: >
      A pre-reg whose code is written AFTER the freeze can have the spec's ambiguities (F1, F2, F5)
      resolved IN the code, defeating the freeze. The receipt-before-return-data boundary only binds
      if the code commit is pinned IN the receipt at freeze and the runner cannot then be edited. The
      interlock is DESCRIBED but not yet INSTANTIABLE (no commit to pin). Acceptable to defer ONLY
      if the freeze-receipt cut is itself blocked until the runner commit exists and is pinned — that
      ordering must be explicit. As written the ordering is implied, not enforced.

  - id: F7-power-honesty-carried-correctly
    severity: note
    finding: >
      Power ~13-18% is disclosed in §5 AND carried into the decision map: §5/§6 and math-spec state
      a non-rejection (KILL) at the terminal n is "uninformative as evidence of no edge but does NOT
      license continued spend." RULE 4 catch-all routes a non-PASS to "default to wind-down under
      full-auto." There is NO rescue door: RULE 4's only non-wind-down branch is "a fresh
      single-structure confirmatory pre-reg IF HoQR elects" — which (RULE-4 prose + §5.6) carries a
      NEW trial_id + NEW HoQR+Math+NHT ratification + the selection absorbed, i.e. the forking-paths
      counter-discipline IS attached. The KILL-as-expected-outcome framing is honest and no branch
      silently permits keep-spending. This is a POSITIVE finding (no blocker).

  - id: F8-two-gate-functional-sound
    severity: note
    finding: >
      The §4.2 ordered/exhaustive two-gate functional is CORRECT: RULE 0 (technical) -> RULE 1
      (post-2015 KILL, evaluated FIRST, overrides aggregate) -> RULE 2 (aggregate KILL) -> RULE 3
      (PASS iff both p<=0.0478 AND DSR>=0.95) -> RULE 4 (else). Ordered/disjoint/exhaustive verified:
      first-match-stops => disjoint; RULE 4 is the unconditional else => exhaustive. The straddle band
      [0.0478,0.0522] is handled on BOTH gates and routes to RULE 4 (never PASS, never clean-KILL) —
      correct. The post-2015 KILL genuinely binds and short-circuits before the aggregate (both-must-
      pass with post-2015 priority). No outcome can be spun into keep-spending. The FUNCTIONAL is
      sound; its only defect is that the threshold it consumes is double-specified (F1) and the
      quantity it tests is double-specified (F2).

