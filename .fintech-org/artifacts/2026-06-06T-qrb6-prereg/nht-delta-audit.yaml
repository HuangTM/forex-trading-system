body: >
  Cycle-2 delta audit of the settled v2 QRB-6 pre-registration (doc + rebuilt sidecar), focused on
  verifying cycle-1 F1-F6 remediations and adjudicating the sign-rule multiplicity question. The
  three cycle-1 blockers (F1 alpha double-spec, F2 sidecar tests dead component, F3 C4 violation)
  are FIXED. F4 (path) is FIXED. F5 (sign-rule unpinned) is FIXED and the sign-rule choice formally
  adjudicated — bar-D signed product y_e = sign(close(D)-close(D-1)) × R_post,e is the frozen
  object; the Mathematician converged in debate and signed off on the HAC/bootstrap validity.

  Two F3 residuals persist in the DOC'S §3.5 prose: the frozen activation rule names a non-existent
  artifact path (qd-boe-ecb-spotcheck.yaml; only qd-spotcheck-sidecar.yaml exists), and the prose
  never states "with verdict == 'certified'." The SIDECAR correctly enforces certified-only via
  condition_expression, so these are documentation-quality defects, not exploitable forking paths.
  They should be reconciled before the freeze-receipt cut.

  F6 is fixed in spec: §7 now explicitly orders the freeze-receipt cut AFTER the runner commit.
  The runner does not yet exist, correctly so at this pre-consensus stage.

  NEW SURFACE ADJUDICATED: The sign-rule selection (D-sign chosen post-hoc after Math retracted
  F_{D-1} in debate) does NOT require a separate multiplicity acknowledgment beyond N_sel=3.
  The sign function is parameter-free; the choice was theory-driven (bar-D tests the alive component;
  D-1 tests the dead pre-drift), not return-data-driven; no Sharpe was examined for any candidate
  sign rule; the selection fits within N_sel=3's ~2-soft-prior-framings allowance. The §4.4.2
  considered-and-rejected documentation is the honest disclosure record.

  UPDATED VERDICT: SURVIVES. The pre-registration is a coherent, one-shot-testable, internally
  consistent specification ready for CONSENSUS ratification, subject to the three pre-flight items
  (runner commit, §3.5 doc reconciliation, no return data before freeze).

