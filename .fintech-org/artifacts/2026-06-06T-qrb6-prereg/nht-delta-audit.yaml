# =============================================================================
# SIGN-RULE MULTIPLICITY RULING (Adjudication Task 2)
# =============================================================================

sign_rule_multiplicity_ruling:
  ruling: covered-by-N_sel-3
  basis: >
    The question: does the post-hoc selection of sign_align_e = sign(close(D)-close(D-1))
    from the candidate set {D-sign, D-1-sign, rate-change-sign} introduce a multiplicity
    DOF that the existing N_sel=3 paper-selection charge does NOT cover?

    FINDING: the sign-rule selection is COVERED by N_sel=3. My reasoning, adversarially applied:

    1. The sign function is PARAMETER-FREE. It is not a fitted parameter — it is a deterministic
       binary function of observable closes. No return data was examined to make this choice.
       The DSR N_sel charge deflates a Sharpe that was selected-for-being-large; no Sharpe was
       observed at the sign-rule selection stage (the choice was made pre-freeze under the same
       "no return data before freeze" contract that governs the paper selection).

    2. The selection of the sign rule is part of the HYPOTHESIS DESIGN space, not the
       performance optimization space. The DSR N_sel charge specifically charges Sharpe-selection
       multiplicity — the number of effectively independent Sharpe looks from which a maximum
       was taken. A sign-rule choice that was never tested against return data (no Sharpe computed
       for any candidate sign rule) does NOT consume a realized-Sharpe look. N_sel's logic is
       first-principles: charge the degrees of freedom that inflated the observed Sharpe by
       selection. A sign-rule choice that has no observed Sharpe to inflate contributes zero
       DSR multiplicity by the same logic used to reject N_sel=11 (the 11 paper proposals were
       never backtested and therefore contribute zero to Sharpe-multiplicity).

    3. The sign-rule family has three candidates: {D-sign, D-1-sign, rate-change-sign}. §5.0
       documents the REJECTION rationale for each non-chosen candidate: (a) rate-change-sign
       rejected because it is "derivable for only some banks and is dominated by HOLDS post-2015";
       (b) D-1-sign (F_{D-1}) was the Mathematician's initial ruling and was RETRACTED after
       formal debate (debate-r1-math.yaml), documented in §4.4.2 as the considered-and-rejected
       alternative with economic rationale ("tests the dead pre-drift component, §2.3"). The
       rejection reasons are DATA-FREE (rate-change: data-availability argument; D-1: economic
       coherence argument about which component is alive vs. dead post-2015). Neither rejection
       consumed a Sharpe look on return data.

    4. The N_sel=3 charge's ~2 effective-independent-soft-prior-framings component (§2.2 defense)
       is the correct bucket for the sign-rule selection. The firm's hypothesis-design process
       considered multiple framings of the post-announcement edge idea (the sign-rule family is
       a within-hypothesis design choice, not between-hypothesis selection). The ~2 soft-prior
       framings in N_sel=3 are meant to absorb exactly this kind of design-space exploration that
       did not consume return data. The sign-rule selection fits squarely inside that allowance.

    5. ADVERSARIAL STEELMAN: one could argue the sign choice is outcome-motivated — the firm chose
       bar-D sign because it aligns with the economically-alive post-2015 component, and "alignment
       with the alive component" is a weak form of data peeking (the fact that the pre-drift is dead
       is known from prior literature, and choosing the sign rule to avoid testing a dead component
       is informed selection). My ruling is that this is NOT reportable multiplicity for DSR purposes:
       the information used ("pre-drift is dead post-2015") is the PUBLIC PRIOR KNOWLEDGE that
       motivates the entire hypothesis design (§2.3, cited in the pre-reg), not an examination of
       return data. DSR multiplicity charges data-driven selection; theory-driven selection based on
       published structural findings does not inflate a realized Sharpe. This is the same logic by
       which the firm charges N_sel=3 rather than N_sel=41 (the org-wide trial count includes many
       theory-motivated hypothesis choices none of which contribute Sharpe-selection multiplicity
       unless backtested).

    RULING: The sign-rule selection is covered by N_sel=3. No additional acknowledgment or separate
    multiplicity charge is required. The §5.0 documentation of the rejection rationale for the
    non-chosen candidates is the honest disclosure record. N_sel=3 does not undercount as a result
    of the sign-rule selection.

    RESIDUAL FLAG (not a blocker, but transparency): The fact that D-1 was the Mathematician's
    initial ruling in math-rework1.yaml and was then RETRACTED via formal debate (after which
    bar-D was adopted) could be characterized as "one round-trip where a different sign rule was
    briefly the frozen candidate." I examined whether this round-trip consumed return data: it
    did not (the debate was conducted on economic and statistical first-principles grounds, with
    no return series examined). The retraction is documented in §4.4.2 with its economic basis.
    The round-trip adds no DSR burden but adds one disclosure-quality note: future readers of
    §4.4.2 can verify the rejection was theory-driven, not data-driven.

