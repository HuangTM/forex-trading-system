# 2. EXTRA-LOOK PENALTY  →  math-remediation-spec.yaml §extra_look_penalty + 2 orchestrator flags
# ═══════════════════════════════════════════════════════════════════════════════
extra_look_penalty_ruling:

  # ── FLAG A (arithmetic) ────────────────────────────────────────────────────
  flag_a_kill_threshold: 0.0422
  flag_a_ruling: ORCHESTRATOR-UPHELD — Math's 0.0400 is WRONG; correct KILL threshold = 0.0422
  flag_a_basis: >
    The ORIGINAL frozen band is documented as SYMMETRIC ±MC_SE around the center: 0.0478 = 0.05 −
    0.0022 and 0.0522 = 0.05 + 0.0022 (verified verbatim at math-rework1.yaml:60). The convention
    is band = [center − MC_SE, center + MC_SE], with PASS strict < lower and KILL strict > upper.
    The new center is alpha_look2 = 0.039995 ≈ 0.0400. Applying the SAME convention:
      lower (p_reject)  = 0.039995 − 0.0022 = 0.037795 ≈ 0.0378   ✓ (matches Math)
      upper (KILL)      = 0.039995 + 0.0022 = 0.042195 ≈ 0.0422   ✗ (Math wrote 0.0400)
    Math set the UPPER bound equal to the center (0.0400) instead of center + MC_SE. That collapses
    the straddle band to one-sided [0.0378, 0.0400] and is a half-width slip — it would mis-route a
    p_post in (0.0400, 0.0422] to KILL when the original convention routes it to RULE-4 AMBIGUOUS.
    NHT independently recomputed 0.042195 in python3 this session. The orchestrator's FLAG A is
    correct and is UPHELD. FROZEN straddle band = [0.0378, 0.0422]; KILL fires strict p > 0.0422.

  # ── FLAG B (method) ────────────────────────────────────────────────────────
  flag_b_method: full-look
  flag_b_ruling: >
    FREEZE the FULL-LOOK treatment at t1=0.50 with the simple OBF incremental nominal
    alpha_look2 = 0.05 − spend1 = 0.039995. Both sub-questions resolved CONSERVATIVELY:
  flag_b_basis: >
    (i) SHOULD THE VOID RUN COUNT AS A FULL LOOK?  Two readings:
        (a) conservative/full-look — the data WAS accessed and a statistic WAS formed (p_post=0.2158),
            so spend alpha as if it were a genuine interim look (what Math did);
        (b) partial/leak-is-weak — Math's own bias analysis shows the leak is weakly informative
            (230 of the events were fully UNREVEALED; every computed event changes in a clean re-run
            because 9/12 pairs were zero-imputed and the CLEAN statistic was NEVER observed), so a
            full-look penalty over-charges.
        STEELMAN OF (b): the void statistic is genuinely near-uninformative — t1 could be argued as
        low as 0.25 (3/12 pairs had real cost data), which at OBF gives p_reject 0.0473 ≈ the original
        0.0478, i.e. almost no penalty. So (b) is not a strawman.
        RULING: freeze (a) FULL-LOOK at t1=0.50 anyway. Rationale — this is a KILL gate and the firm
        has ALREADY SEEN the void direction (p_post unfavourable). When the analyst has seen the data,
        the burden of proof must run AGAINST leniency; the tightest defensible gate is the honest one.
        t1=0.50 is the most alpha the OBF framework will defensibly spend at look-1 for a first-of-two
        look (t1>0.50 would over-penalize the wrong way). This is the conservative, non-gameable freeze.
    (ii) SIMPLE SUBTRACTION vs EXACT LAN-DEMETS TERMINAL NOMINAL?  The carry confirmatory precedent
        (math-conf-final-qgr.yaml:34, verified) used 2-sided sfLDOF with spend1=0.005575 and a
        TERMINAL NOMINAL p ≤ 0.048246 — the exact boundary-crossing nominal, which is LOOSER than a
        naive 0.05−spend1 because it credits the positive correlation between the two overlapping-data
        statistics. Therefore the simple incremental subtraction (0.039995) is CONSERVATIVE (tighter)
        relative to the exact Lan-DeMets terminal nominal for the QRB-6 information timing. Adopting
        the tighter value for a KILL gate is the safe error direction. ACCEPTED. (Note: the carry
        number used a DIFFERENT, 2-sided spending function and different info timing, so it is a
        precedent for the METHOD FAMILY, not a number to transplant. The 1-sided spend1=0.010005 is
        the correct QRB-6 value, independently reproduced by NHT.)
  frozen_p_reject: 0.0378
  frozen_kill_threshold: 0.0422
  frozen_straddle_band: '[0.0378, 0.0422]  (PASS strict p < 0.0378; KILL strict p > 0.0422; [0.0378,0.0422] → RULE-4 AMBIGUOUS)'
  arithmetic_independently_verified: >
    NHT python3 this session (scipy.stats.norm): z_alpha(1-sided,0.05)=1.644854; b1=z/√0.5=2.326174;
    spend1=1−Φ(2.326174)=0.010005; alpha_look2=0.039995; MC_SE=√(0.05·0.95/10000)=0.002179≈0.0022;
    p_reject=0.037795≈0.0378; KILL=0.042195≈0.0422. Sensitivity table (t1=0.25→0.0473, 0.33→0.0456,
    0.50→0.0378, 0.75→0.0190) reproduced exactly. Math's lower bound 0.0378 is RIGHT; only the upper
    bound was slipped.
  n_sel_unchanged: yes
  dsr_unchanged: yes
  orthogonality_ruling: >
    AGREE with Math: N_sel=3 (selection-space multiplicity, argmax-over-proposals charge) and the OBF
    look-penalty (temporal/sequential multiplicity, same-data-accessed-twice charge) are orthogonal
    axes. They multiply; neither subsumes the other. The void run does NOT increment N_sel: it
    harvested no VALID realized Sharpe for cross-proposal selection (the statistic was on corrupted
    data) and was a technical failure, not a deliberate interim selection. Charging it to BOTH N_sel
    and the p-gate would be double-counting the SAME look. DSR gate stays 0.95 / SR0_pp 0.026861.
    CONFIRMED: no double-count; the OBF p-gate tightening (0.0478→0.0378 reject / 0.0522→0.0422 kill)
    is the complete and only adjustment for the extra look.

