body: |
  RATIFICATION GATE — QRB-6 remediation package, trial fa0f982a. Per my own
  nht-run-integrity-adjudication.yaml, the clean re-run is authorized ONLY after a mechanical
  cost rule and an extra-look penalty are ratified and frozen. This is that gate.

  DELIVERABLE 1 — COST RULE: MECHANICAL, NOT GAMEABLE. SURVIVES.
  I independently re-computed 9 of the 12 spread medians from the daily parquet files (cost
  inventory only, no return data). All 9 match the spec table to 2 d.p. with the stated row counts.
  The rule is a deterministic function of on-disk data plus two disclosed constants (0.50 slip,
  0.50 comm) and two disclosed adjustments (USDCAD ÷10, -1.5 swap), every one of which is pinned
  toward KILL. There is no post-exposure knob that can LOWER any pair's cost — the only direction
  that could fake a PASS. The -1.5 swap is "worst-of-existing applied both ways," the opposite of
  cherry-picking. I sanity-checked Math's bias claim: the cost lever moves the statistic ~0.31
  t-units against a 0.839 t-unit gap to the kill boundary (~37%), so even an adversary who has seen
  p_post=0.2158 cannot push the verdict across threshold by choosing costs. Non-gameable confirmed.

  DELIVERABLE 2 — EXTRA-LOOK PENALTY: two orchestrator flags, ruled definitively.
  FLAG A (arithmetic): UPHELD. The original frozen band is SYMMETRIC ±MC_SE around its center
  (0.0478 = 0.05−0.0022, 0.0522 = 0.05+0.0022; math-rework1.yaml:60). By that same convention the
  new band is [0.039995−0.0022, 0.039995+0.0022] = [0.0378, 0.0422]. Math wrote the upper bound as
  0.0400 (the center itself) — a half-width slip. The correct FROZEN KILL threshold is 0.0422, not
  0.0400. I reproduced 0.042195 in python3. Math's LOWER bound 0.0378 is correct.
  FLAG B (method): freeze FULL-LOOK at t1=0.50 with the simple OBF incremental nominal. (i) The void
  run is treated as a full look even though the leak is only weakly informative — because this is a
  KILL gate and the firm has seen the data, leniency must be resisted; t1=0.50 is the most alpha
  defensibly spent at look-1. (ii) Simple subtraction (0.039995) is CONSERVATIVE relative to the
  exact Lan-DeMets terminal nominal: the carry confirmatory precedent shows the terminal nominal
  (p≤0.048246 there) is LOOSER than naive subtraction because it credits the two looks' positive
  correlation. Over-tightening is the safe direction for a kill gate. FROZEN: p_reject 0.0378,
  KILL 0.0422, band [0.0378, 0.0422]. N_sel stays 3, DSR stays 0.95/SR0_pp 0.026861 — selection and
  temporal multiplicity are orthogonal; the void run earns no N_sel increment (no valid realized
  Sharpe harvested). No double-count. AGREE.

  DELIVERABLE 3 — GAP-CLOSURE FIXES: all three confirmed in source, silent cost-gap impossible.
  exclude-not-impute (run_qrb6.py:836-844/:631-641): zero-imputation line gone, empty events
  `continue`. manifest interlock (:153,:186-231,:474-485): absent/incomplete/zero-spread manifest →
  RULE_0. coverage gate (cut_freeze_receipt.py:203,:250-276,:375-377): receipt refuses to cut unless
  all 11 registered pairs are present and positive. 11-pair Scenario-A universe correct; EURGBP
  rightly excluded as Scenario-B-only. Five enforcement layers; no HIDDEN cost-corruption path remains.

  VERDICT: SURVIVES = ratified-for-rerun, with the binding freeze correction that KILL = 0.0422.

