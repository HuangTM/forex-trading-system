body: >
  Post-run integrity adjudication for trial fa0f982a (QRB-6 CB-decision event study,
  Scenario A, one-shot confirmatory). The run recorded RULE_1_KILL_POST2015 in
  STEP-RESULT.yaml (p_post=0.2158, p_agg=0.0791, dsr=0.768). Two independent
  pre-registration deviations were verified:

  DEVIATION 1: Cost-config coverage. config/default.yaml covers 3 of 12 registered pairs.
  RBA (AUDUSD/AUDJPY) and BOC (USDCAD/CADJPY) — 4 of 12 pairs, mapped to 2 of 4 banks —
  have zero cost entries. Their bank-event statistics were computed on gross returns (zero
  cost deducted), not net-of-cost returns as specified in §4.4.3. This is confirmed by
  STEP-RESULT per_bank_sharpe: BOC=0.0, RBA=0.0 (structural artifact, not a signal finding).

  DEVIATION 2: Zero-imputation instead of exclusion. The §4.4.3/§5.5 exclusion protocol
  was not honored. RBA and BOC bank-events (totaling ~50.7% of the post-2015 pool and
  ~44.5% of the full pool) were zero-imputed into the pooled statistic, contaminating the
  bootstrap null distribution and the realized test statistic with fabricated zeros.

  Both deviations independently trigger §1.4 VOID. The RULE_1_KILL_POST2015 outcome does
  not stand. The bias from zeros is in the direction that makes the KILL "too easy" — the
  contamination actively favors the kill outcome, meaning the kill is uninterpretable even
  as a conservative finding.

  DISPOSITION: VOID-then-remediated-rerun, ranked first over VOID-no-outcome (second) and
  KILL-stands (rejected). QRB-3 does NOT auto-advance. The remediated re-run requires a
  mechanical cost rule frozen and ratified by Math+NHT before execution, disclosure of
  first-run numbers (permanently on disk), and a formally-derived extra-look penalty on
  the kill threshold.

  ORCHESTRATOR RE-EXECUTION: Immaterial (bit-identical output, frozen seed). Disclosure in
  run log required; CTO to investigate --ceo-ack gate bypass during diagnostics.

  STRUCTURAL FIX: A committed pytest test asserting every registered pair resolves to a
  non-zero cost entry must gate the freeze-receipt script for all future trials. CTO owns.
  The cost-config gap survived 7 review checkpoints; manual review is insufficient for this
  class of invariant. Machine gate required before next freeze.

