structural_check_demanded:

  failure_description: >
    The 12-pair map was frozen in the pre-registration (qr-prereg-draft.yaml lines 47-57,
    the pair_bank_map) over a cost config (config/default.yaml) that covered only 3 of those
    12 pairs. This gap was not detected by: the QR authoring the pre-reg, the Math reviewing
    the statistic design, the NHT in two audit cycles (nht-audit.yaml cycle-1, nht-delta-
    audit.yaml cycle-2), the PR review in two waves (pr-review.yaml, pr-review-cycle2.yaml),
    the orchestrator during diagnostics, or the QD implementing the runner (qd-runner.yaml
    noted the live cost path was a TODO). The gap survived every human and automated review
    until the run itself.

  mechanical_pre_freeze_gate_required: >
    GATE REQUIREMENT: Before the freeze-receipt SHA is cut for ANY pre-registration that
    names a set of trading pairs, an automated assertion must verify that:
    (a) Every pair in the registered pair-bank map resolves to a non-zero, non-null cost
        entry in the active cost config (config/default.yaml or the specified config for
        that trial), AND
    (b) A data file exists for every pair at the expected path (data/processed/{PAIR}_daily.parquet
        and data/spreads/{PAIR}_daily_spreads.parquet), AND
    (c) The assertion is implemented as a committed pytest test (not an ad-hoc check) that
        runs as part of the standard test suite before the freeze-receipt script is invoked.

  mechanical_form: >
    Concretely: a test in tests/harness/test_qrb6_freeze_preflight.py (or a universally-
    applied test in tests/harness/test_freeze_preflight.py for all future trials) that:

      def test_all_registered_pairs_have_cost_config():
          from forex_system.costs.model import RealisticCostModel
          registered_pairs = [all 12 pairs from the frozen pair_bank_map]
          model = RealisticCostModel.from_config(config_path)
          for pair in registered_pairs:
              cost = model.get_cost(pair, direction=Direction.LONG, bars=1)
              assert cost > 0, f"Pair {pair} has zero/null cost — cost config gap"

    This test must be committed and GREEN before cut_freeze_receipt.py is permitted to
    run for the given trial. The cut_freeze_receipt.py script must be modified to assert
    the preflight test passes (by calling pytest programmatically or checking its last
    run timestamp against the freeze timestamp) before writing the receipt. A receipt
    written without a passing preflight is rejected by the runner's interlock.

  owner: CTO
  owner_basis: >
    The pre-reg pair map and cost config are both committed code artifacts. Asserting their
    consistency is a code-level invariant, not a research judgment. CTO owns the harness
    infrastructure and the cut_freeze_receipt.py gating logic. CTO is the correct owner
    for a mechanical gate that runs on every freeze, independent of which researcher
    authored the pre-reg. The NHT's F6 closure already established the pattern: structural
    invariants (runner-commit ordering) are expressed as committed tests and doc-level
    enforcements owned by the engineering chain, not the research chain. This gate follows
    the same pattern.

  severity_of_historical_failure: >
    The cost-config gap survived N=7 distinct review checkpoints (QR authoring, Math review,
    NHT cycle-1, NHT cycle-2, PR wave-1, PR wave-2, orchestrator diagnostics) without
    detection. This is a systemic audit failure, not a single-reviewer oversight. The fix
    is systemic: a machine-checkable gate that cannot be bypassed by any reviewer's
    attention failure. Manual review is not sufficient for this class of invariant.

