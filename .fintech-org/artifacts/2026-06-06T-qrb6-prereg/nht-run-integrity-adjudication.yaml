# SECTION B: TRIAL DISPOSITION — RANKING AND PICK
# ═══════════════════════════════════════════════════════════════════════════════

trial_disposition_ranking:

  rank_1:
    option: "(ii) VOID-then-remediated-rerun"
    description: >
      Fix cost config via a MECHANICAL rule frozen before re-run (Math specifies it),
      append a remediation amendment disclosing the contaminated first look,
      re-run ONCE under the amended spec.
    basis: >
      This is the correct disposition. The trial consumed a real run with real data — that
      cannot be undone. But the failure is mechanical (missing cost entries for 9 of 12
      pairs), not conceptual (the hypothesis and statistic are correctly designed). The
      contamination is fully disclosed (this adjudication + the STEP-RESULT on disk). The
      corrupted p-values (p_agg=0.0791, p_post=0.2158) are permanently on record and cannot
      be cherry-picked or suppressed. The cost-config gap is a MECHANICAL deficit with a
      deterministic fix: extend config/default.yaml to cover all 12 pairs with costs derived
      by a pre-registered rule (e.g. median-spread from the spreads parquet, or a per-pair
      floor + buffer — Math must specify the exact rule BEFORE the re-run is authorized).
      A remediated re-run under the corrected event set produces an interpretable result.
      The extra inflation/penalty demanded for the second look is addressed below in Section C.

  rank_2:
    option: "(i) VOID-no-outcome"
    description: >
      Trial fa0f982a burned, NO valid KILL recorded, QRB-3 does NOT auto-advance.
    basis: >
      Legitimate but unnecessarily wasteful if the failure is remediable. The event set
      and statistic design are sound; only the cost-config coverage is wrong. A full VOID
      with no re-run would forfeit the calendar acquisition, the verified 506/345 counts, the
      frozen pre-reg (which survives the §1.4 void — the pre-reg is not voided, only the
      RUN output), and the runner infrastructure. Option (ii) is strictly more informative.
      Option (i) would be the correct disposition if the contamination were non-mechanical
      (e.g., if return data had been examined pre-freeze, corrupting the no-peek boundary) —
      that would be a fatal integrity failure with no path to re-run. This is not that case.

  rank_3:
    option: "(iii) KILL-stands"
    description: "Only if Math proves kill-monotone (zeros in zero-imputed banks push p monotonically toward kill)."
    basis: >
      REJECTED. Math's analysis (math-bias-analysis.yaml) is PENDING. Even if Math were to
      prove kill-monotone — that is, zeros from RBA/BOC zero-imputation could only INCREASE
      p_post (making the kill fire more easily than on the true signal) — this does NOT make
      the kill conservative-safe. A kill-monotone proof would show the corrupted run is an
      UPPER BOUND on the true p_post, meaning the true p_post (on correctly excluded events)
      could only be LOWER (closer to rejection). But a lower p_post on a smaller, cleaner
      event set might PASS the RULE 1 gate — which is the opposite of the kill outcome. Kill-
      monotone under zero-imputation does not imply kill-monotone under exclusion: the two
      procedures change n (the exclusion shrinks the post-2015 pool), which changes the
      bootstrap null distribution non-monotonically. There is no clean path to kill-stands
      without running the corrected event set. The KILL does not stand.

  pick: "(ii) VOID-then-remediated-rerun"
  pick_basis: >
    The contamination is mechanical and fully disclosed; the pre-reg design is sound; the
    infrastructure (runner, receipt interlock, tests) is in place. A remediated re-run with
    a frozen cost rule, disclosed first-look numbers, and the extra inflation penalty
    demanded below is the scientifically honest and operationally efficient path.
    QRB-3 does NOT auto-advance (§5.4 graduation map requires a VALID post-2015 KILL from
    a clean run of QRB-6; the corrupted KILL is not valid).

