# ═══════════════════════════════════════════════════════════════════════════════
# SECTION A: DOES RULE_1_KILL_POST2015 STAND AS THE CONFIRMATORY OUTCOME?
# ═══════════════════════════════════════════════════════════════════════════════

kill_stands: no

kill_stands_basis: >
  RULE_1_KILL_POST2015 (p_post=0.2158, decision field in STEP-RESULT.yaml) does NOT
  stand as the confirmatory outcome. Binding reason: §1.4 of the pre-registration VOIDS
  confirmatory status on parameter drift and event-set deviation. Both are present, verified:

  (1) EVENT-SET DEVIATION. The frozen event set (§3.1, §4.4.3) specifies that each
  bank-event observation equals the equal-weight average of sign-aligned net-of-COST
  returns across that bank's responsive pairs. "Net-of-cost" is load-bearing: it means
  the cost model must resolve all mapped pairs. The cost config (config/default.yaml)
  covers exactly 3 of 12 mapped pairs (EURUSD, USDJPY, GBPUSD). The remaining 9 pairs
  (USDCAD, AUDUSD, NZDUSD, EURJPY, GBPJPY, AUDJPY, CADJPY, NZDJPY, EURGBP) carry zero
  cost entries. For RBA (AUDUSD, AUDJPY) and BOC (USDCAD, CADJPY), EVERY mapped pair is
  uncovered — the bank-event statistic collapses to a quantity that is NOT the frozen
  quantity (net-of-cost return); it is the raw return minus zero, i.e. it is gross return,
  which violates the pre-registered cost-net definition. This is confirmed by the
  STEP-RESULT: per_bank_sharpe BOC=0.0, RBA=0.0 — not a zero true Sharpe finding, but a
  structural artifact of uncovered cost entries producing RBA/BOC bank-events that are
  computed on a different quantity than specified.

  (2) PARAMETER DEVIATION — ZERO-IMPUTATION INSTEAD OF EXCLUSION. §5.5 and §4.4.3 jointly
  require that events where the cost model does not resolve a pair be EXCLUDED (suppressed),
  not zero-imputed. The runner instead zero-imputed the RBA and BOC bank-events into the
  pooled statistic (contributing y_e=0 from those banks) rather than excluding those bank-
  event rows. This is a direct deviation from the registered exclusion protocol. The fractions:
  ~44.5% of the full-window pooled statistic is fabricated zeros (RBA+BOC events contributing
  to the n=506 pool with zero bank-event statistics); ~50.7% of the post-2015 pool is
  fabricated zeros (RBA+BOC contribute 117+58=175 of 345 deduped post-2015 event-days per
  the pre-registered event counts at qr-prereg-draft.yaml lines 51-54).

  (3) §1.4 VOID TRIGGER. Either condition independently triggers the §1.4 VOID: "parameter
  drift" covers the cost-net-vs-gross deviation; "event-set deviation" covers the zero-
  imputation instead of exclusion. Both apply here. The §1.4 VOID is not a discretionary
  judgment — it is a bright-line rule in the frozen specification that the runner did not
  satisfy. No outcome produced on an event set that deviates from the registered event set
  can carry confirmatory status.

  NOTE ON BIAS DIRECTION (conditional on Math's pending analysis, math-bias-analysis.yaml):
  The verified facts state the likely bias direction is: zeros inflate the variance of the
  pooled y_e, deflate the signal-to-noise, and push p_post TOWARD the KILL region (higher p
  = weaker rejection = easier KILL). This means the corrupted KILL at p_post=0.2158 is
  "too easy" — it could fire even if FED and BOJ have real edge, because RBA/BOC
  zero-contamination dilutes the pooled statistic. This is NOT a conservative-safe direction
  for a kill test; a conservative kill test would use a HARDER threshold (lower p needed to
  kill), not an easier one achieved through data corruption. The KILL is therefore
  uninterpretable regardless of bias direction, because the event-set deviation makes the
  realized p-value structurally incomparable to the pre-registered null distribution. My
  ruling rests on the §1.4 spec-violation grounds alone; the bias direction compounds the
  interpretive failure but does not change the ruling.

