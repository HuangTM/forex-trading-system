# SECTION C: CONTAMINATION OF A RE-RUN
# ═══════════════════════════════════════════════════════════════════════════════

contamination_accounting:

  what_was_seen: >
    The following were seen (all in STEP-RESULT.yaml, now permanently on disk):
    - p_agg = 0.0791 (pooled full-window, would marginally fail the primary gate alone)
    - p_post = 0.2158 (post-2015, fired RULE_1_KILL under corrupted event set)
    - dsr = 0.768 (fails DSR gate; DSR_cleared=false)
    - sr_ann_pooled = 0.9348 (annualized pooled Sharpe, full window)
    - per_bank_sharpe: BOC=0.0 (corrupted), BOJ=1.718 (partially valid — mapped pairs include USDJPY which is covered, but also EURJPY/GBPJPY/AUDJPY/CADJPY/NZDJPY which are uncovered; BOJ Sharpe is also partially contaminated), FED=0.423 (partially valid — EURUSD/GBPUSD/USDJPY covered; USDCAD/AUDUSD/NZDUSD uncovered), RBA=0.0 (corrupted)
    - reversal_fraction = 0.239
    - n_suppressed = 332 of 506 (from spread_z overlay, a separate issue from the cost-config gap)
    These numbers cannot be unseen. They are disclosed by this adjudication and the STEP-RESULT artifact.

  how_gameable_is_post_exposure_cost_choice: >
    The cost-config gap is a BINARY gap (pair either covered or not), not a continuous
    parameter. But the VALUES chosen for uncovered-pair costs could still be gamed:
    a researcher who has seen p_agg=0.0791 and p_post=0.2158 could (consciously or not)
    set the newly-added per-pair costs to values that push the pooled statistic toward a
    desired outcome. The gameable surface is:
    (a) the cost LEVEL for each uncovered pair — higher costs reduce gross returns, pushing
        p toward 1 (PASS harder, KILL easier); lower costs approach zero-cost (the
        contaminated case), leaving p unchanged;
    (b) the functional form (fixed pip, proportional, spread-derived) — each maps to
        different cost levels across pairs with different average spreads;
    (c) SELECTION of which uncovered pairs to cover vs. keep at zero — but all 12 pairs
        must be covered, so this is not a DOF if the mechanical rule requires 100% coverage.
    Gameability is MATERIAL given the known p values. A person who knows p_post=0.2158
    can select costs that nudge p in the desired direction. This is the canonical contamination
    problem of a re-run after a first-look.

  binding_procedure_for_honest_rerun: >
    MANDATORY preconditions before a remediated re-run is authorized:

    1. MECHANICAL COST RULE FROZEN AND RATIFIED BEFORE RE-RUN.
       The rule for assigning costs to all 12 pairs must be:
       (a) Derivable mechanically from data that was available BEFORE the run — i.e., the
           spreads parquet (data/spreads/{PAIR}_daily_spreads.parquet) is the correct
           source; do NOT allow per-pair manual entry.
       (b) The exact formula must be: cost_pips = f(spread_parquet) where f is a fixed
           function (e.g., median daily spread + 0.3 pip slippage + 0.5 pip commission, or
           some formula Math specifies). The formula must be the SAME for all pairs (no
           pair-specific tuning). A natural mechanical rule: for each pair, compute the
           median spread_pips from the spreads parquet over the full backtest window, add
           a fixed slippage constant and commission constant equal to the values already
           used for the 3 covered pairs in config/default.yaml (slippage_pips=0.5,
           commission_pips=0.5), and cap at a reasonable max (e.g., 5 pips) to prevent
           outlier spreads from driving the result.
       (c) Math must author and ratify the exact rule in a signed artifact BEFORE the
           re-run is triggered. NHT must review and countersign. The rule must be committed
           to git with a timestamp PRECEDING the re-run timestamp.
       (d) NO human judgment may be applied to the per-pair cost values after this rule
           is fixed. The runner must derive costs from the spreads parquet + the formula
           algorithmically, without manual override.

    2. FIRST-RUN NUMBERS PERMANENTLY DISCLOSED.
       The STEP-RESULT.yaml (p_agg=0.0791, p_post=0.2158, per-bank Sharpes, dsr=0.768)
       and this adjudication must remain on disk, unmodified, as permanent record. The
       remediated re-run result is APPENDED, not substituted. Anyone reading the audit
       trail sees both runs and the reason for the re-run.

    3. EXTRA DEFLATION / INFLATION PENALTY FOR THE SECOND LOOK.
       The two corrupted p-values (p_agg, p_post) were seen before the re-run. Even
       though they are structurally invalid, they carry information about the direction
       of the signal. The remediated run will produce p-values on a different (corrected)
       event set, which partially limits the damage — but the first-look information is
       still a prior that could influence the probability of cherry-picking the mechanical
       cost rule.
       REQUIRED PENALTY: the remediated run's KILL thresholds are TIGHTENED:
       - The primary p-gate tightens from 0.0478 to 0.0390 (approximately 0.0478 * 0.82,
         a 18% tightening, reflecting the information leakage from one contaminated look).
         The exact tightening factor MUST be derived by Math from a Bonferroni-style two-
         look adjustment or a pre-specified alpha-spending rule (e.g., O'Brien-Fleming
         two-stage with contaminated first look), committed in the cost-rule ratification
         artifact. This is a suggested floor; Math may require a stricter adjustment.
       - Alternatively (and preferably): NHT and Math jointly adopt the approach that
         the remediated run MUST clear BOTH the p-gate AND a per-bank Sharpe floor (floor
         to be specified by Math) for EVERY bank, not just the pooled statistic. This makes
         it structurally harder for a gaming of the RBA/BOC cost level to swing the result.
       - The DSR gate (dsr >= 0.95 at sr0_pp_sel=0.026861) is UNCHANGED (it already
         failed at 0.768; tightening it further would make the gate degenerate).

    4. EXCLUSION, NOT IMPUTATION, IS THE CORRECTED BEHAVIOR.
       After the cost rule is applied, any pair STILL not resolving (e.g., due to missing
       spread data for a specific date) must be EXCLUDED from that event's bank-event
       average, not zero-imputed. The runner must implement the §4.4.3 exclusion protocol
       exactly. If a bank's ALL mapped pairs are excluded for a given event, that bank-event
       is excluded from the pool. NHT will verify exclusion vs. imputation via the
       n_suppressed and n_degenerate fields in the STEP-RESULT.

