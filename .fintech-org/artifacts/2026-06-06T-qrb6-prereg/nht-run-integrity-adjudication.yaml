policy_violations_detected:
  - id: PV-1
    label: COST-CONFIG EVENT-SET CORRUPTION
    description: >
      The runner computed bank-event statistics on gross returns (not net-of-cost) for 9
      of 12 registered pairs (USDCAD, AUDUSD, NZDUSD, EURJPY, GBPJPY, AUDJPY, CADJPY,
      NZDJPY, EURGBP). For RBA and BOC banks, EVERY mapped pair was uncovered, producing
      zero bank-event statistics zero-imputed into the pooled statistic. This deviates from
      §4.4.3 (exclusion of uncovered events, not imputation) and §5.5 (net-of-cost cost
      model required). Triggers §1.4 VOID on both parameter-drift and event-set-deviation
      grounds. Approximately 50.7% of the post-2015 pool (the window that fired the KILL)
      consisted of fabricated zeros.
    severity: critical
    evidence: "config/default.yaml:11-33 (3 pairs); qr-prereg-draft.yaml:47-57 (12 pairs); STEP-RESULT.yaml: per_bank_sharpe BOC=0.0, RBA=0.0"

  - id: PV-2
    label: ORCHESTRATOR RE-EXECUTION OUTSIDE CEO-ACK GATE
    description: >
      The orchestrator triggered the live runner (scripts/run_qrb6.py) during diagnostics
      without a separate CEO authorization. The runner requires --ceo-ack for live execution.
      The re-execution was bit-identical (frozen seed, same code) and produced no new
      information, ruling it immaterial on data-integrity grounds. But the --ceo-ack gate
      was bypassed by the orchestrator without an explicit documented authorization for the
      second trigger. This is a process violation of the execution-control protocol, even if
      immaterial in this instance.
    severity: advisory
    consequence: >
      Disclosure in run log. CTO investigation of whether --ceo-ack was re-granted during
      diagnostics and whether that grant is logged. No re-tightening of kill threshold on
      account of this event alone (immateriality finding holds if output confirmed bit-identical).
    evidence: "Orchestrator self-report (dispatch verified facts); STEP-RESULT.yaml: single run_utc timestamp (2026-06-07T07:59:40Z)"

