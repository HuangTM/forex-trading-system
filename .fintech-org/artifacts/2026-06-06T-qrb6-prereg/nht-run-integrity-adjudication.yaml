assumptions:
  - "The per_bank_sharpe=0.0 for BOC and RBA in the STEP-RESULT is a structural artifact of the cost-config gap (all their mapped pairs uncovered), not a genuine zero-signal finding. This is the natural interpretation: the runner's cost path for uncovered pairs returns zero-cost, causing the bank-event statistic to equal the raw return average; but per qd-runner.yaml line 92, 'uses raw price differences without applying the per-pair cost model' — meaning net-of-cost return equals gross return for uncovered pairs. If gross returns for RBA/BOC averaged exactly zero, the Sharpe would also be zero by coincidence — but BOJ (1.718) and FED (0.423) being non-zero confirms the runner is computing non-trivial values for covered pairs; the zero for RBA/BOC is therefore the structural-gap artifact, not a coincidental true-zero result."
  - "The 50.7% zero-fraction figure is computed from the pre-registered event counts (RBA=117, BOC=58, total post-2015 deduped=345). The deduplication (22 same-day multi-bank overlaps in Scenario A per qr-prereg-draft.yaml) reduces the raw count; the 50.7% is the correct fraction for the deduped pool. The dispatch-stated 50.1% is consistent within rounding."
  - "Math's bias-direction analysis (math-bias-analysis.yaml) is PENDING. My ruling on the §1.4 VOID does not depend on bias direction — the VOID is triggered by the spec-deviation alone. The bias-direction analysis would determine whether the contaminated KILL is an upper or lower bound on the true p_post, which is relevant to the remediation-track Section C penalty computation but not to the KILL-stands ruling."
  - "The orchestrator's self-report of bit-identical output from the re-execution is accepted at face value. If this report is incorrect (non-deterministic path, different seed path, or different code version), the immateriality ruling does not hold and this must be escalated."

