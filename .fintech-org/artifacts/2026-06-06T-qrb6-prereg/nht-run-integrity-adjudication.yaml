orchestrator_violation_ruling:

  description_of_event: >
    The orchestrator self-reported: it accidentally re-executed the live runner once during
    diagnostics. The runner ran with the frozen seed (master_seed=387992) and the identical
    code, producing a bit-identical output. No new numerical information was generated beyond
    what the first run produced.

  materiality: >
    IMMATERIAL as to information content. A bit-identical re-execution under a frozen seed
    with identical code produces exactly the same p-values, DSR, and per-bank Sharpes as the
    first run. No additional information about the signal was introduced; no cherry-picking
    opportunity arose. The re-execution did not expand the set of seen values in any way.

  required_consequence: >
    DISCLOSURE ONLY. The re-execution must be logged in spawns.jsonl or the trials.jsonl
    amendment (whichever the firm uses for run-event logging) with:
    (a) timestamp of the re-execution,
    (b) the determination that the output was bit-identical to the first run,
    (c) the self-report context (diagnostic, not intentional),
    (d) a statement that no new values were produced and no information advantage accrued.
    No additional penalty, no tightening of the kill threshold on account of this event
    alone. The materiality finding (deterministic, identical) is the bounding argument:
    a re-run that cannot produce a new value cannot corrupt the pre-registration protocol.
    If subsequent investigation reveals the output was NOT bit-identical (e.g., due to
    a non-deterministic code path), this ruling upgrades to a contaminating second look
    and the full Section C contamination procedure applies.

  process_consequence: >
    The orchestrator's ability to trigger the live runner outside the CEO-ack gate must be
    reviewed. The runner's --ceo-ack requirement exists precisely to prevent accidental
    execution. If the orchestrator bypassed or was granted the --ceo-ack flag during
    diagnostics, the gate is not functioning as designed. CTO must verify whether the
    re-execution used --ceo-ack and, if so, who authorized it and whether that authorization
    is logged. This is a process integrity question, not a data-integrity question.

