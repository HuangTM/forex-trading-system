# DISSENT STATEMENT — VERBATIM PERMANENT RECORD
# ═══════════════════════════════════════════════════════════════════════════════

dissent-statement: >
  QRB-6 RUN INTEGRITY ADJUDICATION — NHT POST-RUN RULING — 2026-06-07.

  TRIAL fa0f982a. RECEIPT SHA 08d03614. RUN DECISION: RULE_1_KILL_POST2015
  (p_post=0.2158, p_agg=0.0791, dsr=0.768).

  RULING: THE KILL DOES NOT STAND. THE RECORDED OUTCOME IS NOT VALID.
  DISPOSITION: VOID-then-remediated-rerun (option ii). QRB-3 does NOT auto-advance.

  THE KILL DOES NOT STAND because the run was executed on an event set that deviates from
  the frozen specification on two independent grounds, each of which independently triggers
  the §1.4 VOID:

  DEVIATION 1 — COST-CONFIG COVERAGE. The frozen pre-registration (§4.4.3, §5.5) requires
  net-of-cost returns on all registered pairs. config/default.yaml covers 3 of 12 registered
  pairs (EURUSD, USDJPY, GBPUSD). The remaining 9 pairs (USDCAD, AUDUSD, NZDUSD, EURJPY,
  GBPJPY, AUDJPY, CADJPY, NZDJPY, EURGBP) resolve to zero cost entries. For RBA
  (AUDUSD, AUDJPY) and BOC (USDCAD, CADJPY), EVERY mapped pair is uncovered — these
  bank-events were computed on gross returns, not net-of-cost returns as registered. The
  STEP-RESULT confirms: per_bank_sharpe BOC=0.0, RBA=0.0 — structural artifacts of the
  coverage gap, not findings about the signal.

  DEVIATION 2 — ZERO-IMPUTATION INSTEAD OF EXCLUSION. §4.4.3/§5.5 require exclusion of
  events where the cost model does not resolve. The runner zero-imputed RBA and BOC bank-
  event statistics into the pooled statistic instead of excluding those bank-event rows.
  The consequence: approximately 44.5% of the full-window pooled y_e vector (n~225 of 506
  event-days) and approximately 50.7% of the post-2015 pool (175 of 345 deduped days from
  RBA+BOC, per the pre-registered event counts) consist of fabricated zeros — bank-event
  statistics computed on the wrong quantity or imputed where exclusion was required.

  THE BIAS IS NOT CONSERVATIVE-SAFE. The zeros from uncovered pairs inflate the variance
  of the pooled statistic, dilute the signal from FED and BOJ (which have partial cost
  coverage), and push p_post toward the KILL region — making the kill "too easy," not
  conservative. A kill that fires because of structural contamination, not because the
  hypothesis fails, is uninterpretable. The p_post=0.2158 cannot be read as evidence
  for or against the hypothesis; it is evidence of the coverage gap.

  WHAT THE FIRST RUN DOES TELL US (disclosing for the record, not as confirmatory evidence):
  The partially-valid FED and BOJ observations (on their covered pairs only — EURUSD, USDJPY,
  GBPUSD for FED; USDJPY for BOJ among covered pairs) produced a pooled Sharpe of 0.935 and
  per_bank_sharpe BOJ=1.718, FED=0.423. These numbers were produced on an INCOMPLETE and
  PARTIALLY CONTAMINATED event set and carry NO confirmatory weight. They are disclosed
  here as a first-look record to be disclosed to the remediated-run reviewer. They cannot
  be cited as supporting or opposing the hypothesis.

  MANDATORY PRECONDITIONS FOR A REMEDIATED RE-RUN:
  (1) Math must author and commit a mechanical cost rule (derived from spreads parquet,
      no manual per-pair tuning, same formula for all 12 pairs) BEFORE the re-run is
      authorized. NHT countersigns.
  (2) The extra inflation penalty for the second look must be formalized by Math (Bonferroni
      two-look adjustment or O'Brien-Fleming alpha-spending; floor tightening of primary
      p-gate from 0.0478 toward ~0.0390 or stricter per Math's derivation).
  (3) The corrected runner must implement §4.4.3 EXCLUSION (not zero-imputation) for any
      pair or bank-event with missing cost entries.
  (4) First-run numbers (p_agg=0.0791, p_post=0.2158, per-bank Sharpes, dsr=0.768,
      STEP-RESULT.yaml) remain on disk, unmodified, as permanent record.
  (5) The structural gate (pair-cost-coverage assertion test, CTO-owned, committed before
      freeze-receipt cut) must be implemented BEFORE the next freeze-receipt is cut.

  THE ORCHESTRATOR RE-EXECUTION (bit-identical, frozen seed, same code): IMMATERIAL.
  Disclosure required in the run log; no additional penalty; no tightening of kill threshold
  on this event alone. The --ceo-ack bypass during diagnostics is a process integrity concern
  for CTO to investigate.

  STRUCTURAL FAILURE OF REVIEW. The cost-config gap survived 7 review checkpoints (QR, Math,
  NHT cycle-1, NHT cycle-2, PR wave-1, PR wave-2, orchestrator diagnostics) without detection.
  This is a systemic failure. A machine-checkable gate — every registered pair must resolve
  to a non-zero cost entry, asserted by a committed pytest test that gates the freeze-receipt
  script — is the correct structural fix. CTO owns it. Manual review cannot reliably catch
  this class of schema-vs-config consistency failure.

  I am NOT dissenting against the hypothesis, the statistic design, the pre-reg methodology,
  or the infrastructure. All of those are sound. I am ruling that this specific run, on this
  specific contaminated event set, produced an uninterpretable result that cannot carry
  confirmatory status. The path forward (VOID-then-remediated-rerun) preserves the trial
  investment while maintaining the integrity of the one-shot protocol.

