body: |
  ## PM Acceptance Criteria — QRB-6 Pre-Registration Track

  This is the PM's Wave 1 (structured acceptance-criteria) artifact for the
  qrb6-prereg-2026-06-06 track. It is written before any return-data examination and
  before any sub-role is dispatched.

  ### Context

  QRB-6 is a central-bank scheduled-decision event study: a pre-decision drift +
  post-announcement reversal strategy on the firm's FX pairs, triggered by the acquired
  CB decision calendar (data/rates/cb_decision_dates.parquet, 842 rows, committed 62421b6).
  It was selected through a ratified two-finalist process (QRB-6 vs QRB-3) per
  hoqr-qrb6-rescreen.yaml. The firm's single authorized trial (BC-1) is spent here.

  ### Critical path

  AC-1 (QR pre-reg draft) and AC-2 (MATH frozen stats) are the primary blockers; both
  must complete before AC-5 (NHT audit) can begin. AC-3 (QD work) can proceed in parallel
  with AC-1/AC-2 for the spot-check and sidecar sub-tasks, but the receipt target (AC-3c)
  and runner stub (AC-3d) depend on AC-2 (for the kill_switch_threshold constant).

  ### Process integrity

  The freeze-receipt (AC-8) is the sole cryptographic boundary between the authoring/review
  wave and the one-shot run. Nothing that touches OHLCV return data may execute before that
  boundary. The runner stub (AC-3d) exists to establish the correct gate structure and verify
  no forbidden imports — it is not a license to run.

  ### Scenario B

  The BoE/ECB spot-check (AC-3a) determines whether Scenario B activates at freeze time
  or remains PENDING. If the spot-check is not completed before consensus (AC-7), the
  frozen pre-registration declares Scenario B PENDING C4 completion. The one-shot run
  (post-freeze, CEO-gated) then uses Scenario A unless C4 is cleared first.

  ### Scheduling constraint

  BC-4: the 2028 confirmatory runner bandwidth priority is non-negotiable. This track
  must not displace it.

