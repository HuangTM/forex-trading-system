  The quorum (HoQR + PR) ratifies the pre-registration package as freeze-ready. Math's
  derivation-review (sound) and NHT (survives, advisory) are supporting non-quorum signals.
  The NHT cycle-1 material_concern dissent is preserved verbatim as append-only history in
  the dissent artifact. The CEO's authorization of the freeze-receipt cut is the next required
