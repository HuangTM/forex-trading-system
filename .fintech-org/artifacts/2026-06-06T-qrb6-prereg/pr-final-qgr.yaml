runner_spot_check:

  boundary_convention:
    verdict: pass
    evidence: >
      evaluate_decision() at qrb6_decision.py lines 637-705 implements the §4.2 ordered
      functional exactly:
        RULE 0  (line 683): technical_failure check fires unconditionally.
        RULE 1  (line 688): "if p_post2015 > p_kill_threshold" — strict > (parameterised
                 from receipt; comment "Fires iff p_post2015 > 0.0522 (strict; above straddle band)").
        RULE 2  (line 693): "if p_agg > p_kill_threshold" — strict > (same).
        RULE 3  (line 699): "if p_post2015 < p_reject_threshold and p_agg < p_reject_threshold
                 and dsr >= dsr_threshold" — strict < for both p's, >= for DSR.
        RULE 4  (line 705): unconditional return RULE_4_AMBIGUOUS (catch-all).
      Docstring (lines 652-656) explicitly states: "PASS requires STRICT p < p_reject_threshold
      (= 0.0478) for BOTH p's. KILL requires STRICT p > p_kill_threshold (= 0.0522) for the
      triggering p. p in [p_reject_threshold, p_kill_threshold] → RULE 4 AMBIGUOUS (closed band).
      Exact boundary values 0.0478 and 0.0522 → RULE 4 (not PASS, not KILL)."
      Truth-table tests verify all four boundary cases explicitly:
        test_rule4_fires_when_p_in_straddle_band_lower: p=0.0478 → RULE_4 (closed lower boundary)
        test_rule4_fires_when_p_agg_in_straddle_band_lower: p_agg=0.0478 → RULE_4
        test_rule4_fires_when_p_in_straddle_band_upper: p=0.0522 → RULE_4 (not KILL; strict >)
        test_rule4_fires_when_p_agg_at_upper_boundary: p_agg=0.0522 → RULE_4
      Post-2015 priority verified:
        test_post2015_kill_priority_over_rule2: p_post2015=0.60, p_agg=0.80 → RULE_1 (not RULE_2)
      DSR boundary:
        test_dsr_exactly_095_with_clean_p_is_pass: dsr=0.95 exactly → RULE_3 (>= semantics correct)
        test_dsr_just_below_095_with_clean_p_is_rule4: dsr=0.9499 → RULE_4

  cross_trial_constants:
    verdict: pass
    evidence: >
      grep for '0.022906' and '0.034921' in qrb6_decision.py returns exactly two matches:
      module docstring lines 13-14 — these are FORBIDDEN-list guard warnings in string
      literals, NOT numeric assignments. No float assignment uses either value anywhere
      in the file.
      grep in scripts/run_qrb6.py returns zero matches for either constant.
      The _EXPECTED_SR0_PP_SEL guard constant is 0.026861 (QRB-6-ONLY, labelled),
      clearly distinct from both forbidden values.
      Tests TestNoCrossTrialConstants verify this at the code-line level:
        test_decision_module_no_r5_literal: strips comments/docstrings, greps for
          regex '[=\(,\s]0\.022906(?=[\s\),;])' in code — asserts no matches.
        test_decision_module_no_confirmatory_literal: same pattern for 0.034921.
        test_runner_no_r5_literal / test_runner_no_confirmatory_literal: same for runner.
      Docstring-only appearances are acceptable per the FORBIDDEN-list guard convention.

  refusal_tested:
    verdict: pass
    evidence: >
      TestReceiptInterlock class (test_qrb6_decision.py lines 413-485) tests three paths:
      (a) test_no_receipt_live_run_exits_nonzero: invokes run_qrb6.py --ceo-ack with no
          receipt present; asserts returncode != 0. Tests the subprocess refusal path.
      (b) test_no_receipt_live_run_prints_refusal: same invocation; asserts 'REFUSED' or
          'freeze-receipt' appears in combined stdout+stderr. The _REFUSAL_MESSAGE constant
          in run_qrb6.py (lines 95-116) contains both strings.
      (c) test_check_receipt_constants_exits_on_mismatch: passes a bad_receipt with
          sr0_pp=0.022906 (the forbidden R5 literal); asserts SystemExit with code != 0.
          Directly tests the check_receipt_constants() RULE 0 path.
      (d) test_check_receipt_constants_passes_on_correct_values: verifies the interlock
          does NOT exit on a correctly-valued receipt (no false positive).
      Both the subprocess-level refusal (missing receipt, no --ceo-ack) and the
      constant-mismatch refusal (wrong sr0_pp) are explicitly tested.

