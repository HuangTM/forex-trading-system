closure_verification:
  nf_01:
    verdict: verified
    prior_finding: >
      §5.1 (line 188), §5.2 (line 192), §5.4 (lines 200-201) carried "p > 0.0478 → KILL"
      prose, contradicting §4.2's post-PR-04 boundary convention of strict > 0.0522 for KILL.
    exact_inequality_read:
      line_188: >
        "The structure FAILS (KILL) iff the pooled bank-blocked stationary-block-bootstrap
        p-value … is **strictly `> 0.0522`** — above the MC-indistinguishability straddle
        band (PART II §4.2 RULE 2)."
      line_192: >
        "If the post-2015 sub-window does NOT cleanly reject — i.e. **`p_post2015 > 0.0522`**
        (strictly above the straddle band's upper edge) — the structure is **KILLED**"
      line_200: >
        "`p_post2015 > 0.0522` (strictly, above the straddle band) → **KILL**,
        overrides_aggregate_pass: true"
      line_201: >
        "`p_agg > 0.0522` (strictly, above the straddle band) → **KILL** (no aggregate edge)"
    old_prose_absent: >
      grep for '> 0.0478.*KILL|KILL.*> 0.0478|0.0478.*→ KILL' on
      qrb6_cb_event_study.md returns zero matches in §5.1/§5.2/§5.4. The
      old contradictory framing is completely absent.
    straddle_caveat_consistent: >
      All three sections now pair the KILL boundary with an explicit straddle-band note:
      "p in [0.0478, 0.0522] → AMBIGUOUS (RULE 4, never KILL, never PASS)."
      The previously self-contradictory §5.1 sentence structure is resolved.
    tool_result: >
      grep -n '0\.0522' qrb6_cb_event_study.md confirms lines 188, 192, 200, 201 all
      use > 0.0522 as the KILL threshold. grep '> 0.0478.*KILL|KILL.*0.0478' returns zero
      matches. NF-01 blocking condition is fully satisfied.

