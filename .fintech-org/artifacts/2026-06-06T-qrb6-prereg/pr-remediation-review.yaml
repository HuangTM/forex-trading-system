# FINDINGS
# ═══════════════════════════════════════════════════════════════════════════════

findings:
  - id: F-1
    severity: blocking
    location: >
      config/cost_freeze_qrb6.yaml (manifest format: dict keyed by pair name);
      scripts/cut_freeze_receipt.py lines 248-252 (_assert_qrb6_cost_coverage);
      scripts/run_qrb6.py line 209 (_load_cost_manifest)
    observation: >
      MANIFEST FORMAT MISMATCH — the cost manifest uses YAML dict format (pairs: {AUDJPY: {...}, ...})
      but both the coverage gate (_assert_qrb6_cost_coverage in cut_freeze_receipt.py) and the
      live runner (_load_cost_manifest in run_qrb6.py) expect LIST format (pairs: [{symbol: AUDJPY, ...}]).
      Iterating the dict yields string keys; entry["symbol"] then raises TypeError: string indices
      must be integers, not 'str'. Independent python3 simulation confirms the crash.
      Consequence 1: the coverage gate crashes before checking any pair — the receipt CANNOT be cut.
      Consequence 2: the live runner crashes before loading any cost — the run CANNOT proceed.
      The test suite passes because test_qrb6_cost_coverage.py stubs use list format
      (_make_stub_manifest produces list), which matches loader expectations. The real manifest
      is structurally incompatible with the loaders as written.
    evidence:
      - "python3 simulation: TypeError: string indices must be integers, not 'str' on dict-format manifest"
      - "config/cost_freeze_qrb6.yaml: pairs is a YAML mapping (dict), not a list"
      - "cut_freeze_receipt.py line 251: 'sym = str(entry[\"symbol\"]).upper()'"
      - "run_qrb6.py line 209: 'sym = str(entry[\"symbol\"]).upper()'"
      - "test stubs use list: pair_entries.append({'symbol': sym, ...}) → gate passes on stubs only"
    owning_role: QD

  - id: F-2
    severity: major
    location: >
      tests/harness/test_qrb6_cost_coverage.py lines 393-394, 454-455, 498-499, 581-582;
      tests/harness/test_qrb6_decision.py line 677
    observation: >
      RESIDUAL OLD THRESHOLDS IN ACTIVE TEST STUBS — five stub receipts in test_qrb6_cost_coverage.py
      use p_straddle_hi=0.0522 and p_reject_threshold=0.0478 (the void-run values) as operative
      values in _run_pipeline() calls. These stubs exercise pipeline behaviour (exclusion logic,
      cost-gap counting) and the dry-run does execute the decision functional path using these
      thresholds. While the production path is protected by check_receipt_constants() (which would
      RULE-0 on old values at live run time), having old thresholds as live operative values in test
      stubs creates an audit inconsistency: a reviewer inspecting test stubs to understand the
      frozen gate will see incorrect values. Additionally, the exclusion-suppression test stub at
      line 449-464 uses spread_z_threshold=0.0 as an extreme case, combined with old thresholds —
      the intent is clear but the combination obscures the correct frozen values.
      This is not a production threat (production is gated by check_receipt_constants) but
      is a hygiene defect that should be corrected before the freeze-receipt is cut.
    evidence:
      - "test_qrb6_cost_coverage.py line 393: 'p_straddle_hi': 0.0522"
      - "test_qrb6_cost_coverage.py line 394: 'p_reject_threshold': 0.0478"
      - "Same pattern at lines 454-455, 498-499, 581-582"
    owning_role: QD

  - id: F-3
    severity: minor
    location: >
      config/cost_freeze_qrb6.yaml manifest_meta block (lines 50-53);
      manifest header comment (line 40)
    observation: >
      MANIFEST AUTHORSHIP STATUS INCONSISTENT — the manifest_meta block still shows:
        authored_by: PLACEHOLDER_AWAITING_MATHEMATICIAN
        mechanical_rule_ref: PLACEHOLDER_AWAITING_RATIFICATION
        nht_countersign: PLACEHOLDER_AWAITING_NHT
        committed_before_rerun: false
      and the header comment says "STATUS: PLACEHOLDER — VALUES NOT YET AUTHORED BY MATHEMATICIAN."
      However, the values section IS filled with mechanical-rule values (NHT independently verified
      9/9 medians in nht-remediation-ratification.yaml). The manifest_meta block was not updated
      to reflect the completed authorship. This is a documentation hygiene issue: the cost values
      are correct, but the metadata falsely implies they are placeholders. A reader could
      reasonably conclude the manifest has not been author-completed.
    evidence:
      - "config/cost_freeze_qrb6.yaml line 51: authored_by: PLACEHOLDER_AWAITING_MATHEMATICIAN"
      - "nht-remediation-ratification.yaml: '9/9 independently re-computed medians match the spec table to 2 d.p.'"
    owning_role: Math/QD (manifest authorship update)

  - id: F-4
    severity: minor
    location: >
      scripts/cut_freeze_receipt.py line 239 error message;
      scripts/cut_freeze_receipt.py header comment line 188
    observation: >
      '12 PAIRS' vs '11 PAIRS' COSMETIC INCONSISTENCY — the coverage gate error messages
      reference "all 12 registered pairs" (line 239: "config/cost_freeze_qrb6.yaml with positive
      costs for all 12 registered pairs") and the header comment (line 188: "QRB-6 cost-config gap
      (3-of-12 pairs)"), while _QRB6_REGISTERED_PAIRS has exactly 11 pairs and the Scenario A
      pre-reg counts 11 unique pairs. EURGBP is included in the manifest as a Scenario B superset
      but is not in any Scenario A bank pair map and is not in _QRB6_REGISTERED_PAIRS.
      The coverage gate correctly enforces 11 (the frozenset), but the error message misleads.
      Not a functional defect — the gate counts correctly — but confusing for audit.
    evidence:
      - "cut_freeze_receipt.py line 239: 'all 12 registered pairs'"
      - "_QRB6_REGISTERED_PAIRS: frozenset of 11 pairs (verified from source)"
    owning_role: QD

  - id: F-5
    severity: observation
    location: tests/harness/test_qrb6_decision.py TestReceiptInterlock.test_check_receipt_constants_exits_on_mismatch
    observation: >
      TEST CHECKS SR0 MISMATCH BUT NOT P-THRESHOLD MISMATCH — the receipt interlock test at
      lines 448-467 passes a receipt with sr0_pp=0.022906 (forbidden R5 literal) to verify
      check_receipt_constants() exits. It does NOT include p_reject_threshold or p_straddle_hi
      fields in the bad_receipt, which means the test passes even without the p-threshold
      interlock lines (154-155) being present. A complementary test with correct SR0 but
      wrong p-thresholds (e.g. p_reject_threshold=0.0478) would provide independent verification
      that the p-threshold interlock is exercised. This is a test coverage gap, not a production risk.
    owning_role: QD

