interlock_completeness:
  p_thresholds_checked:
    result: true
    evidence: >
      check_receipt_constants() in qrb6_decision.py lines 154-155 calls
      _check("p_reject_threshold", _EXPECTED_P_REJECT, tol=1e-9) and
      _check("p_straddle_hi", _EXPECTED_P_STRADDLE_HI, tol=1e-9).
      A receipt with drifted thresholds (e.g. 0.0478/0.0522) will cause
      SystemExit(1) — RULE_0 TECHNICAL_FAILURE. Test TestReceiptInterlock
      test_check_receipt_constants_exits_on_mismatch verifies this behaviour
      with bad_receipt containing 0.022906 (SR0 mismatch).
    note: >
      The test at line 449-467 checks an SR0 mismatch (0.022906) but does NOT
      separately test a p_threshold mismatch (e.g. receipt with 0.0478).
      The source-level wiring (lines 154-155) is correct, but a dedicated test
      for p_threshold-only mismatch would add confidence. Minor finding.

  no_silent_fallback:
    result: true
    evidence: >
      review_target: scripts/run_qrb6.py
      The runner loads thresholds from receipt via explicit receipt["p_straddle_hi"]
      and receipt["p_reject_threshold"] key lookups (hard KeyError on missing keys —
      NHT ratification confirmed: 'receipt.get("p_straddle_hi",0.0522) REMOVED').
      No receipt.get() fallback pattern present for threshold fields.
      Any old-value receipt (0.0478/0.0522) will first fail check_receipt_constants()
      and SystemExit before any threshold is read for evaluation.

  manifest_rule0:
    absent_manifest: >
      _load_cost_manifest() calls sys.exit(1) when manifest file is absent.
      Evidence: run_qrb6.py _load_cost_manifest(), confirmed by NHT ratification
      evidence block line "manifest RULE_0 interlock: scripts/run_qrb6.py:153,186-189"
    zero_spread: >
      _load_cost_manifest() emits warning on zero-spread pairs; live-mode positivity gate
      at lines 474-492 calls sys.exit(1) on zero-spread pairs.
      The test_qrb6_cost_coverage.py test_zero_spread_pair_causes_warning_logged confirms
      the gate does NOT exit at load time (only warns) — the live positivity gate handles it.
    missing_pair: >
      _load_cost_manifest() calls sys.exit(1) when registered pairs are absent from manifest.
      This WOULD work correctly IF the manifest were in list format — but see Format Mismatch
      finding in cost_manifest_check above: in the current dict-format manifest, the function
      crashes before reaching the missing-pair check.
    combined_assessment: >
      The interlock logic is correctly coded for the INTENDED list-format manifest,
      but the actual manifest is in dict format, so none of these interlocks can
      execute as written. All are dependent on resolving the format mismatch first.

