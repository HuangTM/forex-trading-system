# E. OBF PENALTY ARITHMETIC
# ═══════════════════════════════════════════════════════════════════════════════

obf_arithmetic:
  independently_reproduced_this_session: true
  method: python3 scipy.stats.norm

  inputs:
    alpha_total: 0.05
    t1: 0.50
    K: 10000

  computation:
    z_alpha: 1.644854  # norm.ppf(0.95)
    b1: 2.326174       # z_alpha / sqrt(0.5)
    spend1: 0.010005   # 1 - norm.cdf(b1)
    alpha_look2: 0.039995  # 0.05 - spend1
    MC_SE: 0.002179    # sqrt(0.05 * 0.95 / 10000)

  results:
    p_reject: 0.037816  # alpha_look2 - MC_SE
    p_kill: 0.042175    # alpha_look2 + MC_SE
    rounded_p_reject: 0.0378
    rounded_p_kill: 0.0422

  matches_frozen_values:
    p_reject: true   # |0.037816 - 0.0378| = 0.000016 < rounding precision
    p_kill: true     # |0.042175 - 0.0422| = 0.000025 < rounding precision

  frozen_p_reject: 0.0378
  frozen_p_kill: 0.0422

  nht_flag_a_upheld:
    math_submitted: 0.0400  # Math wrote center value (0.039995) instead of center + MC_SE
    correct_value: 0.0422
    nht_ruling: "ORCHESTRATOR-UPHELD — Math's 0.0400 is WRONG; correct KILL threshold = 0.0422"
    final_frozen: 0.0422  # confirmed in all five locations

