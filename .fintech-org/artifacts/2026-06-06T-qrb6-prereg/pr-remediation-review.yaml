body: |
  PRINCIPAL REVIEWER REPORT — QRB-6 REMEDIATION (trial fa0f982a re-run prep)

  DECISION: APPROVE-WITH-CONDITIONS

  The remediation package is structurally sound in design — the OBF arithmetic is
  correct and independently verified (p_reject=0.0378, p_kill=0.0422 confirmed),
  the five-way threshold consistency holds across the pre-reg doc / triggers sidecar /
  cut_freeze_receipt / qrb6_decision guards / tests, the amendment box accurately
  discloses the void, and the interlock architecture (check_receipt_constants wired to
  p-thresholds, no silent fallback, coverage-gate-before-receipt) is correctly designed.

  BLOCKING DEFECT (F-1, must resolve before any receipt can be cut or live run attempted):
  The cost manifest config/cost_freeze_qrb6.yaml uses YAML dict format (pairs keyed by
  symbol name) while both _assert_qrb6_cost_coverage() in cut_freeze_receipt.py and
  _load_cost_manifest() in run_qrb6.py expect LIST format (pairs as a list of dicts with
  a 'symbol' key). The mismatch produces a TypeError crash at entry["symbol"] when iterating
  a dict yields string keys. This was masked because the test suite's _make_stub_manifest()
  generates list-format stubs, so all 25 coverage tests pass — but against the real manifest
  they would crash. The coverage gate therefore cannot verify the manifest and the live runner
  cannot load costs. Fix: either reformat the manifest to list format, or update both loaders
  to handle dict format. This must be resolved before the freeze-receipt cut.

  MAJOR (F-2, pre-receipt hygiene): Five dry-run test stubs in test_qrb6_cost_coverage.py
  carry the void-run thresholds 0.0522/0.0478 as operative values. Production is protected
  by check_receipt_constants() at live run time, but the stubs should be updated to 0.0422/
  0.0378 before the receipt is cut for completeness and audit hygiene.

  Everything else (OBF arithmetic, amendment fidelity, 11-pair manifest values, USDCAD unit
  fix, exclude-not-impute architecture, interlock wiring, cross-trial contamination) passes
  independent review. No capital is authorized. No return data was accessed in this review.

