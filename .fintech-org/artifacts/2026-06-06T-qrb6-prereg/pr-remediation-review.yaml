  usdcad_correct:
    raw_parquet_median: 45.00
    corrected_manifest_value: 4.50
    unit_note_in_manifest: "unit-corrected: raw 45.0 (fractional-pip) /10 = 4.5"
    correct: true
    note: "NHT acknowledged this ÷10 is inferred from market-norm sanity, not verified against ingestion pipeline code. Error direction is KILL-safe: if raw 45 were correct pips, costs would be 10× larger and gate harder to PASS. Non-blocking."

  all_11_scenario_a_pairs_present:
    pairs_in_manifest: [EURUSD, GBPUSD, USDJPY, USDCAD, AUDUSD, NZDUSD, EURJPY, GBPJPY, AUDJPY, CADJPY, NZDJPY]
    count: 11
    plus_scenario_b_superset: EURGBP
    all_positive_spreads: true
    correct: true

  coverage_gate_blocks:
    gate_in_cut_freeze_receipt: >
      _assert_qrb6_cost_coverage() is called at scripts/cut_freeze_receipt.py line 382
      inside the qrb6 target path, before prereg_sha256 is computed.
    gate_logic_in_cut_freeze_receipt:
      reads_format: LIST with 'symbol' key per entry (entry["symbol"])
      actual_manifest_format: DICT keyed by pair name (no 'symbol' field per entry)
      verdict: FORMAT MISMATCH — BLOCKING DEFECT
      detail: >
        The manifest config/cost_freeze_qrb6.yaml stores pairs as a YAML mapping
        (dict keyed by uppercase pair symbol, e.g. AUDJPY: {spread_pips: 6.4, ...}).
        The _assert_qrb6_cost_coverage() function in cut_freeze_receipt.py reads
        raw_pairs = manifest.get("pairs", []) and then iterates `for entry in raw_pairs:`
        expecting a list of dicts with a 'symbol' key (entry["symbol"]).
        When the manifest uses dict format, iterating raw_pairs yields string keys
        (e.g., 'AUDJPY') — then entry["symbol"] raises TypeError (string indices must
        be integers, not 'str'). Independent verification: python3 simulation confirms
        TypeError: string indices must be integers, not 'str'.
        Similarly, run_qrb6.py _load_cost_manifest() has the same entry["symbol"] call
        at line 209 — the runner will also fail with TypeError when it tries to load
        the actual manifest in live mode.
        The test stubs in test_qrb6_cost_coverage.py use list format (pair_entries with
        'symbol' key) so all coverage gate tests PASS against the stub — but the REAL
        manifest in dict format will CRASH both the coverage gate and the live runner.
        This is a blocking defect: the receipt CANNOT be cut (gate crashes before
        coverage is verified) and the live runner CANNOT load costs in this state.
      severity: blocking
      owning_role: QD

    gate_in_run_qrb6: >
      _load_cost_manifest() at scripts/run_qrb6.py line 209 also uses entry["symbol"],
      same format mismatch. Will raise TypeError on the real manifest.

