      draft artifacts; the engine executes the entry_delay_bars=1 shift mechanically, and the
      return is close(D)→close(D+2) as a result."
      The supersession is explicit and cross-references the exact phrasing used in §5.0. The
      §5.0 text is not wrong — "[D+1 close … D+K_post close]" at K_post=2 is equivalent to
      "close(D+1) to close(D+2)" and is consistent with §4.4.1's authoritative engine semantics.
      The phrasing is a notation variant, not a contradiction, and §4.4.1 explicitly covers it.
    inference: "No action required. The supersession note in §4.4.1 is adequate and explicit."
    recommended-action-class: none
    owning-role: quant-researcher (information only)
    blocks-freeze: false

  - id: NF-03
    severity: observation
    location: "qrb6_cb_event_study.md §5.0/§5.1/§1.2/§1.3: signed-product object"
    category: new-hypothesis-identity check (verified clean)
    observation: >
      NEW §5.0 and PART II §1.2 insertions: every occurrence of the tested object now uses
