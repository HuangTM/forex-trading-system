new_findings:

  - id: NF-01
    severity: major
    location: "qrb6_cb_event_study.md §5.1 (line 188), §5.2 (line 192), §5.4 (lines 200-201)"
    category: doc-internal-inconsistency / §5-vs-§4.2-threshold-mismatch
    observation: >
      §5.1, §5.2, and §5.4 use "p > 0.0478" as the KILL threshold. However, §4.2 (after
      PR-04 was applied) establishes KILL fires iff p > 0.0522 (strict, above the straddle
      band), with the closed band [0.0478, 0.0522] routing to RULE 4 AMBIGUOUS. The §5 sections
      were not updated to match §4.2's post-PR-04 boundary convention. Specifically:
        - §5.1 (line 188): "FAILS (KILL) if the … p-value … is > 0.0478" — then immediately
          acknowledges "A p in the straddle band [0.0478, 0.0522] is neither a clean reject nor
          a clean KILL (→ RULE 4, §5.7)." These two statements are contradictory within §5.1
          itself: the first asserts p > 0.0478 = KILL; the second asserts p in [0.0478, 0.0522]
          is NOT a KILL. The correct reading is the second (the straddle routes to AMBIGUOUS),
          but the first sentence will be read as the KILL boundary by a runner.
        - §5.2 (line 192): "p_post2015 > 0.0478 … → KILLED" — same mismatch; should be
          "p_post2015 > 0.0522" with the [0.0478,0.0522] band → RULE 4 AMBIGUOUS.
        - §5.4 (lines 200-201): bullet list states "p_post2015 > 0.0478 → KILL" and
          "p_agg > 0.0478 → KILL" — should be > 0.0522 for clean KILL vs > 0.0478 for
          the straddle/AMBIGUOUS branch.
      §4.2 is stated as the authoritative functional (§5 preamble: "§4.2 is the authoritative
      decision functional and these §5 criteria are its prose mirror"). But any runner reading
      §5 in isolation will implement > 0.0478 as KILL, discarding the RULE 4 straddle. A
      p in [0.0478, 0.0522] under the §5 reading would KILL; under the authoritative §4.2
      reading it is AMBIGUOUS/gate-fail. These lead to different firm actions (RETIRED vs
      wind-down/confirmatory-option). The defect is in the unpatched QR PART I §5 mirror;
      §4.2 (PART II) is correct.
    inference: >
      At run time, if the runner reads §5 as the implementation spec, a straddle-band result
      produces the wrong outcome (KILL rather than AMBIGUOUS). This is a prose mismatch, not
      a sidecar defect (the sidecar correctly uses > p_straddle_hi = 0.0522 for KILL triggers).
      The §5 prose mirror must be updated to match §4.2 boundary convention throughout.
    recommended-action-class: >
      Update §5.1/§5.2/§5.4 to replace "p > 0.0478 → KILL" with "p > 0.0522 → KILL; p in
      [0.0478, 0.0522] → RULE 4 AMBIGUOUS (not KILL)." The straddle caveat at the end of §5.1
      is correct and should be promoted into the first sentence's threshold statement.
    owning-role: quant-researcher (QR PART I mirror of MATH §4.2 boundary)
    blocks-freeze: true

