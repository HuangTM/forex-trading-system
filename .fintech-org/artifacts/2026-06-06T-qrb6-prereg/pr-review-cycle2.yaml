        - §5.0 (new): "y_e = sign(close(D,e) − close(D−1,e)) · R_post,e" (line 276-278); confirmed.
        - §5.1 (new): "H0: E[net post-decision event-window return] ≤ 0" — this uses the
          pre-signed prose form; §5.0 preamble establishes this is y_e. Acceptable.
        - §1.2 (patched): explicit signed-product y_e = sign(close(D,e) − close(D−1,e)) · R_post,e;
