body: |
  ## Principal Reviewer verdict: APPROVE-WITH-CONDITIONS (cycle 2)

  ### Cycle-1 closure status: PR-01 CLOSED, PR-02 CLOSED, PR-03 CLOSED, PR-04 CLOSED, PR-05 CLOSED.

  All five cycle-1 blocking/major/minor conditions are addressed. The assembly-state
  inconsistencies that drove the cycle-1 APPROVE-WITH-CONDITIONS verdict have been resolved:
  §5 carries no live [MATH] placeholders, the sidecar is fully bound with zero unbound symbols,
  the hex-seed comment is corrected, §4.2 uses consistent strict boundary convention, and the
  phantom CLAUDE.md citation is struck from both locations.

  ### New blocking finding from patched regions: NF-01

  The §5 QR PART I prose mirror was NOT updated to match §4.2's post-PR-04 boundary convention.
  §5.1, §5.2, and §5.4 still state "p > 0.0478 → KILL" while §4.2 RULE 1/2 now correctly
  state "p > 0.0522 → KILL" (with the closed straddle [0.0478, 0.0522] routing to RULE 4
  AMBIGUOUS, not KILL). This is internally contradictory within §5.1 itself (the first sentence
  says > 0.0478 is KILL; the next sentence acknowledges [0.0478, 0.0522] is NOT a KILL). A
  runner implementing from §5 will produce the wrong outcome for straddle-band results.

  The sidecar is NOT affected (T1/T2 correctly use > p_straddle_hi = 0.0522). The defect is
  confined to the §5 prose mirror.

  Fix required: update §5.1/§5.2/§5.4 to replace "p > 0.0478 → KILL" with "p > 0.0522 → KILL;
  p in [0.0478, 0.0522] → RULE 4 AMBIGUOUS (not KILL)" — matching the now-authoritative §4.2
  text. The straddle caveat already present in §5.1 is correct and should be promoted.

  ### Non-blocking observations:

  - NF-02: §5.0's "[D+1 close … D+K_post close]" phrasing is explicitly superseded by §4.4.1.
    Adequate — no action needed.
  - NF-03: All §5/§4.4/§1.2 occurrences of the tested object now use the signed-product form
    y_e = sign(close(D)−close(D−1)) · R_post,e. No unsigned "mean event return" residual claim.
    Clean.
  - NF-04: Reversal distinguishability is under secondary_metrics_required (not a kill trigger)
    while §5.4 calls it a sub-claim KILL. Acceptable at pre-reg stage; runner spec must implement
    the sub-claim verdict logic explicitly.

  ### Condition for freeze (blocking):

  1. (NF-01) Update §5.1, §5.2, and §5.4 KILL threshold statements from "p > 0.0478 → KILL"
     to "p > 0.0522 → KILL; p in [0.0478, 0.0522] → RULE 4 AMBIGUOUS." One targeted patch,
     owning role: quant-researcher, to bring §5 into alignment with §4.2.

  No capital is authorized by this review or by a QRB-6 PASS.

