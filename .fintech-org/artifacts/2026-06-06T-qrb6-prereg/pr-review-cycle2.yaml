        - §1.1 (patched): "post-announcement reaction direction — specifically sign(close(D)−close(D−1))."
        - §4.4 (new): machine-readable YAML contract with filtration=F_D, bar_D_is_signal_not_PnL=true,
          H0: "E[y_e] <= 0 where y_e = sign(close(D)-close(D-1)) * R_post,e."
        - §5.7 DSR gate (new): mentions "both p-gates cleanly rejecting" — no unsigned mean return claim.
      Grep for "mean event return" in doc returns §1.3 heading "studentized mean event-window return
