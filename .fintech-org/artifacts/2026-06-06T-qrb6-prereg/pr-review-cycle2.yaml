      but does NOT encode a KILL trigger that fires on failure. A runner implementing strictly from
      the sidecar will REPORT the reversal fields but may not KILL on reversal-sub-claim failure.
      The doc §5.4 and §7 claim more than the sidecar delivers. PR-02 cycle-1 closure accepts
      this redesignation as "secondary/diagnostic" — confirmed acceptable under §5.4's framing
      ("KILL the reversal sub-claim" refers to a sub-claim verdict, not a primary gate; it is not
