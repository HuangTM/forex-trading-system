    evidence: "doc lines 424 (RULE1 '>= 0.05-MC-SE i.e. > 0.0478'), 428 (RULE3 'p <= 0.0478'); triggers operator '>='"
    recommended-action-class: tighten-boundary-prose-to-match-ordered-semantics
