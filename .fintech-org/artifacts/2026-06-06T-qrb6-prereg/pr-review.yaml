body: |
  ## Principal Reviewer verdict: APPROVE-WITH-CONDITIONS

  The QRB-6 pre-registration is a well-constructed, honest, underpowered one-shot kill test. The
  statistical contract is sound and every load-bearing constant re-derives EXACTLY (seed 387992,
  SR0 0.426402/0.026861, bracket(3) 0.852804, kill 1.5883/1.4029, MC-SE band [0.0478,0.0522], power
  13-18%). The event-set integrity is clean: the 506/345 and 716/491 counts reproduce from the parquet,
  BOC is correctly all-post-2019 with its confound disclosed, the 43 TMU rows are excluded, and the
  phantom-pair fix is complete in both the doc and the QR draft. Cross-trial contamination is absent —
  the R5/confirmatory literals appear only as guard text, the receipts are byte-unchanged, and
  bracket(3)=0.852804 is an N-only coincidence, not an import. Scenario B is correctly dormant on a
  partial spot-check with no manual activation path. The no-lookahead bar-D=00:00-UTC / entry_delay=1
  logic is internally consistent with no off-by-one.

  The design is APPROVABLE. It is NOT yet FREEZE-READY. Two BLOCKING conditions stem from the same
  root cause: the artifact was assembled with the SKELETON sidecar and QR-PART-I §5 partially
  numeric-filled, leaving the document and sidecar in a hybrid state that contradicts the frozen
  PART II decision rule.

  ### Conditions for freeze (both BLOCKING, both close at AC-7 assembly):
  1. (PR-01) Substitute the seven live `[MATH]` placeholders in doc §5 and reconcile §5's
     "registered post-multiplicity alpha on p" language to the frozen PART II §4.2 model
     (fixed p<=0.0478 band + DSR>=0.95 absorbs the N_sel=3 charge). A freeze hashes a
     self-contradictory contract otherwise.
  2. (PR-02) Complete the sidecar: bind aggregate_gate_alpha/post2015_alpha (or rewrite the
     condition_expressions to the literal 0.0478), remove the "[FROZEN-AT-ASSEMBLY] (e.g. 0.0025)"
     notes, and ADD the reversal-distinguishability KILL and per-bank-floor entries that doc §7
     CLAIMS already exist in the sidecar but do not.

  ### Should-fix before freeze:
  3. (PR-03, major) Fix the wrong master_seed comment in cut_freeze_receipt.py:90
     ("16256920 -> 256920" must be "16387992 -> 387992"). The VALUE is correct; the comment
     re-introduces the exact hex-drift pattern the confirmatory track already burned a cycle on.
  4. (PR-04, minor) Tighten §4.2's "mutually-exclusive/disjoint" prose: the boundary p=0.0478 is
     non-disjoint between RULE 2 (>=) and RULE 3 (<=); ordered short-circuit resolves it safely to
     KILL, but the "disjoint by construction" claim is false at the boundary and the >=/> gloss
     mismatch should be made consistent.
  5. (PR-05, minor) Drop the qr-draft's "supersedes the CLAUDE.md 21:00-UTC note" — no such note
     exists; the 00:00-UTC fact is correct on its own.

  None of these is a design flaw. The hypothesis framing (post-decision reaction/reversal, pre-drift
  conceded dead), the banks-as-blocks unit, the mandatory post-2015 kill evaluated FIRST, the
  paper-selection N_sel=3 derivation (correctly NOT R5's data-selection N=6), and the freeze interlock
  are all correct and well-argued. Fix the assembly-state inconsistencies (PR-01/02) and correct the
  stale seed comment (PR-03), and this is freeze-ready. No capital is authorized by this review or by a
  QRB-6 PASS.

