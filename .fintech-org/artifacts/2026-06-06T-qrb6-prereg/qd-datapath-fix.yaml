assumptions:
  - >
    Cost basis denominator is c_d (close at bar D, the pre-entry bar). Entry
    actually executes at D+1 (§4.3), so c_dp1 would be more precise, but c_dp1
    is not available in the per-pair close series without an extra index step.
    The fractional approximation error is O(daily_return) ≈ 0.1% — negligible
    relative to the cost itself.  This is consistent with how the research spec
    frames the "close(D)→close(D+2)" window.
  - >
    The cost model is instantiated once per bank-event block (inside the live
    branch), not globally.  RealisticCostModel reads DEFAULT_PAIRS from constants;
    it is stateless and re-instantiation is cheap.
  - >
    sign_align used for direction (LONG if > 0, SHORT otherwise) is already
    resolved on the reference pair before the per-pair loop executes, so the
    direction is consistent across all pairs in the bank-event.

