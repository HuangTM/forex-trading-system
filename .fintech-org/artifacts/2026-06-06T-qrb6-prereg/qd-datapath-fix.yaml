body: >
  Four defects in the per-pair return assembly loop of the live data path in
  scripts/run_qrb6.py have been fixed.  All fixes are in the ~100-line block at
  (approximately) lines 515-629 after the patch.

  FIX-1 (tz_lookup): The old per-pair loop called cs.index.get_loc(pd.Timestamp(event_date))
  directly.  The calendar parquet dates are tz-naive; the price indexes are tz-aware UTC.
  get_loc raises KeyError on a tz mismatch, which the bare except swallowed silently —
  meaning 100% of events were dropped in the live path.  The fix mirrors the already-correct
  reference-pair lookup above it (lines 473-493): tz_localize to the index tz, then
  searchsorted for the first bar >= D (roll-forward convention, §3.4 frozen).

  FIX-2 (fractional_return): pair_returns.append(c_dp2 - c_d) is a price difference
  in raw quote units, not a fractional return.  The frozen spec §1.2 requires
  "cumulative net-of-cost return close(D)→close(D+2)" which is the ratio
  (c_dp2/c_d) - 1.  At EURUSD price ~1.20 the error is ~120x (0.006 vs 0.00005
  fractional).

  FIX-3 (cost_model): The comment said "placeholder: no cost model for dry-run" but
  this was the live path.  The firm's RealisticCostModel is instantiated and applied:
  round_trip_cost + 1-day holding_cost converted to fractional return via pip_value/c_d.
  This exactly replicates the engine's entry_cost (engine.py lines 190-191) + exit/swap
  (_close_position lines 482-491) expressed as return fraction at c_d.

  FIX-4 (silent_except): The bare "except Exception: continue" swallowed every
  per-pair data error including TypeError from the tz-mismatch in FIX-1.  Replaced
  with a narrow exception tuple (KeyError, IndexError, ValueError, TypeError,
  ZeroDivisionError) plus _log("qrb6_runner.pair_event_skip", ...) before the continue.
  Unexpected exception types now propagate to the outer event-level handler.

  FIX-5 (spread_tz): entry_ts comes from cs.index (tz-aware after FIX-1).  If the
  spread parquet index is tz-naive, sp_series.index.get_loc(entry_ts) would raise
  TypeError.  Added tz-alignment bridge: tz_localize(None) or tz_localize(sp_series.index.tz)
  as needed before the get_loc call.

