cost_convention_replicated: >
  ONE round trip per responsive pair per event (enter D+1, exit D+2; §4.3 engine
  semantics).  Cost deducted from gross fractional return as:
    cost_frac = (round_trip_cost_pips + holding_cost_pips_1day) * pip_value / c_d
  Where:
    round_trip_cost_pips = RealisticCostModel.round_trip_cost(pair, 1.0)
      = entry_cost + exit_cost
      = (spread/2 + slippage) + (spread/2 + slippage + commission)
    holding_cost_pips_1day = RealisticCostModel.holding_cost(pair, direction, 1.0)
      = -swap_long_pips_per_day   [LONG] or -swap_short_pips_per_day [SHORT]
    pip_value = engine._get_pip_value(pair)  [0.0001 non-JPY, 0.01 JPY]
    c_d = close price at bar D (cost basis denominator for fractional conversion)
  Source: engine._run_discrete lines 190-191 (entry_cost deduction) and
  _close_position lines 482-491 (exit + swap deduction via pip_value * size).
  EURUSD LONG 1-day example: 3.2 pips * 0.0001 / 1.20 = 0.000267 fractional cost.

defects_fixed:
  tz_lookup:
    status: FIXED
    description: >
      Per-pair loop used cs.index.get_loc(pd.Timestamp(event_date)) — tz-naive
      timestamp on a tz-aware UTC index → KeyError swallowed silently.
    fix: >
      Replaced with searchsorted + tz_localize (mirrors reference-pair lookup at
      lines 473-493), including roll-forward when exact bar is absent (§3.4 frozen
      convention).
  fractional_return:
    status: FIXED
    description: >
      pair_returns.append(c_dp2 - c_d) computed a price difference, not a
      fractional return.  Spec §1.2 requires "cumulative net-of-cost return
      close(D)→close(D+2)" which is a ratio.
    fix: >
      Changed to (c_dp2 / c_d) - 1.0.  Hand-verified: c_d=1.20, c_dp2=1.206
      → 0.005 (correct) vs 0.006 (old bug).
  cost_model:
    status: FIXED
    description: >
      Comment said "placeholder: no cost model for dry-run" on the live path.
      Frozen spec §1.2, §3.2, §5.1 require NET-OF-COST everywhere.
    fix: >
      Instantiates RealisticCostModel() per event-bank block (not once globally,
      to avoid state pollution across loops).  Computes cost_frac from
      round_trip_cost + holding_cost(1 day) converted to fractional via pip_value/c_d.
  silent_except:
    status: FIXED
    description: >
      Bare "except Exception: continue" swallowed all per-pair data errors silently.
      Silent drops are how event studies lie.
    fix: >
      Narrowed to "except (KeyError, IndexError, ValueError, TypeError,
      ZeroDivisionError) as exc:" with _log("qrb6_runner.pair_event_skip", ...)
      before the continue.  Unexpected exception types will now propagate and be
      caught by the outer event-level handler.
  spread_tz:
    status: FIXED
    description: >
      entry_ts (from cs.index, tz-aware after FIX-1) used in
      sp_series.index.get_loc(entry_ts) — if spread parquet index is tz-naive,
      this would raise a TypeError.
    fix: >
      Added tz-alignment bridge: if sp_series.index.tz is None and entry_ts is
      tz-aware, sp_entry_ts = entry_ts.tz_localize(None); reverse case handled
      symmetrically.  Aligned ts used for the get_loc lookup.

