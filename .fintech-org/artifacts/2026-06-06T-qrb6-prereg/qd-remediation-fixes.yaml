body: >
  Three independent fixes implemented and verified for the QRB-6 runner (trial fa0f982a)
  following the VOID adjudication (nht-run-integrity-adjudication.yaml).

  FIX 1 — EXCLUDE NOT IMPUTE: The zero-imputation bug (mean_return=0.0 when pair_returns
  is empty) has been eliminated. Empty pair_returns triggers 'continue', excluding the event
  from y_e. Two distinct log events distinguish the cause: event_excluded_all_pairs_suppressed
  (legitimate spread_z overlay, no counter) vs event_excluded_data_or_cost_gap (structural
  gap, increments n_event_cost_or_data_gap counter surfaced in result YAML).

  FIX 2 — MANIFEST LOADER: Per-pair costs now load from config/cost_freeze_qrb6.yaml
  (the frozen manifest the Mathematician will author). _load_cost_manifest() provides
  coverage and positivity checks at load time; the live positivity gate blocks runs with
  placeholder (zero) values. The manifest SHA and path are recorded in every result YAML
  for audit traceability.

  FIX 3 — COVERAGE GATE: _assert_qrb6_cost_coverage() in cut_freeze_receipt.py blocks
  receipt cutting if any of the 11 registered Scenario A pairs is absent from or has
  zero-spread in the cost manifest. 25 committed tests cover all enforcement layers.
  The gate follows the NHT-demanded structural pattern and includes a generalisation comment
  for future event-study pre-regs.

