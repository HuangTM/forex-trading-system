fixes:

  exclude_not_impute:
    verdict: IMPLEMENTED
    spec_ref: "§4.4.3 / §5.5 / NHT adjudication Section C clause 4"
    description: >
      In the live-mode per-event loop of scripts/run_qrb6.py: when pair_returns is
      empty for an event (all pairs suppressed or cost/data gap), the event is now
      EXCLUDED via 'continue' — NEVER assigned mean_return=0.0.
    implementation_details:
      - "Removed the zero-imputation line (mean_return = mean(pair_returns) if pair_returns else 0.0) that caused ~50.7% fabricated zeros in the void run"
      - "Added two distinct exclusion paths with different log events: event_excluded_all_pairs_suppressed (all pairs suppressed by spread_z; §5.5 legitimate; event-day still counts as block-day; no counter) and event_excluded_data_or_cost_gap (cost/data missing; increments n_event_cost_or_data_gap counter; loud WARNING emitted)"
      - "n_event_cost_or_data_gap counter surfaces in the result YAML so any future gap is visible and auditable — NEVER silent"
      - "Dry-run branch also fixed: uses continue (not zero-impute) when pair_returns empty"
    tests_covering:
      - TestExclusionNotImputation.test_event_with_all_pairs_suppressed_is_absent_from_y_e
      - TestExclusionNotImputation.test_zero_imputation_not_present_in_runner_source
      - TestExclusionNotImputation.test_event_excluded_log_events_present_in_source
      - TestCostGapCounter.test_cost_gap_counter_in_dry_run_result
      - TestCostGapCounter.test_cost_gap_counter_in_result_yaml_source

  manifest_loader:
    verdict: IMPLEMENTED
    spec_ref: "NHT adjudication Section C clause 1 / Section E"
    description: >
      Per-pair costs now load from config/cost_freeze_qrb6.yaml (frozen manifest),
      NOT from RealisticCostModel() which reads DEFAULT_PAIRS (3 pairs only).
    implementation_details:
      - Added _COST_MANIFEST_PATH = Path("config/cost_freeze_qrb6.yaml") constant.
      - Added _QRB6_REGISTERED_PAIRS frozenset (11 unique Scenario A pairs).
      - "Added _load_cost_manifest(manifest_path) function that: (a) Exits RULE_0 if manifest absent. (b) Exits RULE_0 if any registered pair is missing from manifest. (c) Emits WARNING log event if any pair has spread_pips == 0.0. (d) Returns (pair_dict, sha256) tuple for audit traceability."
      - "Live-mode gate: if spread_pips <= 0 for any registered pair → RULE_0 (prevents running with placeholder values before Mathematician fills the manifest)."
      - RealisticCostModel() now called as RealisticCostModel(pair_configs=_pair_infos)
        everywhere in the live path (no bare RealisticCostModel() calls remain).
      - manifest_path and manifest_sha256 recorded in result YAML for audit.
      - Manifest is a PLACEHOLDER file with 3 filled pairs and 8 zeros — Mathematician
        must fill with mechanical cost rule before live run is authorized.
      - config/cost_freeze_qrb6.yaml created as the manifest template.
    registered_pairs_count: 11
    registered_pairs_note: >
      EURGBP is Scenario B only (BOE/ECB); not in any Scenario A bank.
      The registered Scenario A universe is 11 unique pairs.
    tests_covering:
      - TestManifestLoadingInterlocks.test_absent_manifest_triggers_rule_0
      - TestManifestLoadingInterlocks.test_manifest_sha256_logged_at_load
      - TestManifestLoadingInterlocks.test_manifest_sha_in_dry_run_result
      - TestManifestLoaderWiring.test_runner_references_cost_manifest_path_constant
      - TestManifestLoaderWiring.test_runner_does_not_call_realistic_cost_model_without_pair_configs
      - TestManifestLoaderWiring.test_runner_references_load_cost_manifest_function
      - TestManifestLoaderWiring.test_registered_pairs_constant_matches_bank_pair_map

  coverage_gate:
    verdict: IMPLEMENTED
    spec_ref: "NHT adjudication Section E / CTO-owned structural gate"
    description: >
      A committed pytest test (tests/harness/test_qrb6_cost_coverage.py) asserts that
      every registered Scenario A pair resolves to a present, positive, finite cost entry
      in the cost manifest. cut_freeze_receipt.py is gated: _assert_qrb6_cost_coverage()
      runs before the qrb6 receipt is written; exits non-zero if any pair is missing or
      has zero spread_pips.
    implementation_details:
      - _assert_qrb6_cost_coverage() function added to cut_freeze_receipt.py.
      - Called in main() for args.target == "qrb6" before prereg_sha256 is computed.
      - "Checks: (a) manifest exists; (b) all 11 registered pairs present; (c) spread_pips > 0 for all registered pairs (zero = placeholder not filled by Mathematician)."
      - Generalization comment in both cut_freeze_receipt.py and the test module explains
        how to apply this gate to future event-study pre-regs.
    tests_covering:
      - TestCoverageGate.test_complete_stub_passes_coverage_gate
