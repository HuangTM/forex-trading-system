# ─────────────────────────────────────────────────────────────────────────────
# HOW SILENT COST-GAP IS NOW IMPOSSIBLE
# ─────────────────────────────────────────────────────────────────────────────

cost_gap_now_impossible:
  enforcement_layers:
    1_manifest_loader_coverage_check: >
      _load_cost_manifest() verifies every registered pair is present and emits a
      loud WARNING if any pair has spread_pips == 0. Missing pair → RULE_0 exit.
    2_live_mode_positivity_gate: >
      Before any event processing, the pipeline checks that every registered pair has
      spread_pips > 0.  Zero spread (placeholder) → RULE_0 exit.  The Mathematician
      CANNOT run a live test on an unfilled manifest.
    3_per_event_cost_gap_log: >
      If a pair somehow still misses costs at event time (defensive belt-and-suspenders),
      the pair is logged as 'cost_config_gap' with a LOUD WARNING and the event-level
      n_event_cost_or_data_gap counter is incremented.
    4_counter_in_result_yaml: >
      n_event_cost_or_data_gap is always written to the result YAML.  Any non-zero value
      is visible to any reviewer of the result — it cannot be hidden.
    5_freeze_receipt_gate: >
      cut_freeze_receipt.py calls _assert_qrb6_cost_coverage() before writing the receipt.
      A receipt CANNOT be cut on a manifest with missing or zero-spread pairs.  No receipt
      → no live run (interlock chain: manifest gate → receipt gate → CEO-ack gate → run).
    6_committed_tests: >
      25 tests in test_qrb6_cost_coverage.py cover all enforcement layers.  They are part
      of the standard test suite and run in CI before any freeze.

