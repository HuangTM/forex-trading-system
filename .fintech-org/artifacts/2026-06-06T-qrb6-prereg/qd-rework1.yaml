body: |
  ## QD Rework 1 — Sidecar Rebuild (PR-02 + NHT-F2 + NHT-F3)

  All three blocking findings from the independent PR review (PR-02) and NHT audit (F2, F3)
  are remediated in this rebuild. The sidecar was rewritten from scratch, not patched.

  ### What changed (structural; no frozen values altered)

  **PR-02: Unbound symbols + stale [FROZEN-AT-ASSEMBLY] notes**
  The condition_expressions previously referenced `aggregate_gate_alpha` and `post2015_alpha`
  — symbols that were never defined anywhere. The rebuild introduces a top-level `symbols:`
  block defining every symbol used in any condition_expression with its source-of-value.
  Both unbound symbols are replaced by `p_reject_threshold` (value 0.0478, source cited).
  All [FROZEN-AT-ASSEMBLY] placeholder language is gone.

  **NHT-F2: Sidecar was testing the dead pre-drift component**
  The previous sidecar's hypothesis_summary, aggregate_gate.description, and raw_text all
  framed the primary quantity as "pre-window / pre-decision drift return" — the component
  §2.3 explicitly declares dead post-2015. The rebuild rewrites hypothesis_summary to the
  POST-decision (K_post=2) reaction/reversal quantity throughout, adds a `non_triggers_note`
  explicitly banning pre-drift triggers, and every trigger references the post-decision
  statistic only.

  **NHT-F3: scenario_b_activation fired on 'partial', violating C4**
  The previous condition_expression was "spotcheck_result IN ['partial', 'certified']" —
  directly contradicting NHT C4 which maps partial → DORMANT. The rebuild's condition is
  exactly `scenario_b_certification == 'certified'`. The dormancy_rule field states
  explicitly that 'partial', 'failed', and absent → DORMANT. The spotcheck artifact path
  is now the real path (PROVENANCE.md + qd-spotcheck-sidecar.yaml), not a phantom YAML.
  scenario_b_status_at_freeze: DORMANT-PENDING-CERTIFIED-SPOTCHECK.

  **PR-03: Wrong comment in cut_freeze_receipt.py**
  Line 90 comment corrected from "16256920 → 256920" to "16387992 → 387992". Value unchanged.

  ### What was not encoded as kill triggers (and why)
  PR-02 cited §7 doc claims for reversal-distinguishability and per-bank-sharpe kill triggers.
  §5.4 frames these as "flagged, advisory unless MATH binds it" — the Mathematician's
  math-spec.yaml binds no numeric floor on either. They are correctly in secondary_metrics_required
  (reporting obligations), not triggers. The doc §7 language was loose; the design intent is advisory.

  ### Test result
  352 passed, 14 skipped, 0 failed. Ruff clean. YAML parses. Zero unbound symbols.
  Sacred test included and passing.

