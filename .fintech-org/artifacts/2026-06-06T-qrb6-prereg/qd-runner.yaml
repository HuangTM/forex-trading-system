deviations-from-instructions:
- deviation: 'Instructions specified evaluate_decision() with hardcoded defaults for threshold parameters. Instead, all thresholds
    are PARAMETERS (no defaults) to enforce that callers always source them from the receipt.

    '
  rationale: 'Hardcoded defaults would allow silent unfrozen runs if the receipt is absent. The "no hardcoded defaults" design
    is strictly more conservative and aligns with the ordering clause — the runner passes receipt values explicitly.

    '
- deviation: 'run_bank_blocked_bootstrap() uses master_seed + 1 for the post-2015 sub-window bootstrap (vs. master_seed for
    the full window) to avoid seed correlation between the two p-values.

    '
  rationale: 'The pre-reg specifies master_seed = 387992 for the bootstrap but does not specify separate seeds for full vs.
    post-2015. Using distinct seeds (master_seed, master_seed+1) is standard practice to avoid correlated bootstrap samples;
    it is conservative and does not change the interpretation.

    '
