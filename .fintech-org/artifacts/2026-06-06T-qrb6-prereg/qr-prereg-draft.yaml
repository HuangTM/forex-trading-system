body: |
  ## QR PART I — QRB-6 pre-registration DRAFT (AC-1)

  This is the Quant Researcher's AC-1 deliverable: the QRB-6 pre-registration DRAFT at
  references/pre-registrations/qrb6_cb_event_study.md, with MATH-owned PART II left as
  placeholders for assembly. It is authored before any FX return series is examined.

  ### What is frozen here (QR-owned)
  - Preamble & confirmatory-grade contract: trial fa0f982a echoed; full lineage
    (kickoff -> HoQR two-finalist pick -> CRO BC-1 sequencing -> calendar acquisition ->
    NHT re-screen 506/345); five VOID conditions (early peek, parameter drift, Scenario-B
    manual activation, cross-trial constant import, wrong-trial-id/freeze-mismatch).
  - Hypothesis (1 sentence) framed on the post-decision reaction/reversal component (the
    part expected ALIVE), with the honest statement that the pre-announcement drift is
    documented dead post-2015 and the post-2015 sub-window is a hard KILL.
  - Event set & universe at CONF-grade exactness: Scenario A verified-official only
    (506/345); the exact pair x bank map; same-day multi-bank = one market day; the
    2015-01-01 (inclusive) structural-break boundary; the BOC 2010-2018 gap confound
    disclosed; Scenario B as a pre-committed automatic extension (no peek, no new trial).
  - Trading-window convention: 00:00-UTC daily-bar fact verified from the index; the
    honest statement that bar D is the first decision-reflecting bar for every bank;
    K_pre=1 / K_post=2 frozen with no scanning; entry_delay_bars=1 no-lookahead compliance.
  - Falsification criteria (machine-checkable): primary block-bootstrap p (threshold = MATH);
    mandatory post-2015 KILL overriding aggregate pass; reversal distinguishable from BOTH
    0% and 100% with NO 65% point target; retirement triggers; the QRB-2 spread_z overlay
    (definition source data/spreads/, frozen threshold 3.0, suppress-entry semantics) as a
    pre-registered modifier.
  - kill_switch_threshold: verbatim field with [VALUE FROM MATHEMATICIAN].
  - Freeze mechanics: external write-once receipt (cut_freeze_receipt.py --target qrb6),
    receipt-before-any-return-data-examination boundary, the .triggers.yaml sidecar reference.

  ### Two paths at freeze
  - Scenario A (primary, default-frozen): 506/345 deduped event-days, verified-official only.
  - Scenario B (pre-committed automatic extension): activates iff the BoE/ECB C4 spot-check
    artifact is committed; otherwise PENDING and no Scenario-B return data is touched.

  ### Open items for MATH (PART II)
  Statistic/null formalization; the 11-portfolio + 2-finalist multiplicity charge and the
  registered post-charge alpha; banks-as-blocks block-bootstrap (block construction,
  Politis-White block length, B, master_seed); power at 506/345; and the fresh
  kill_switch_threshold derivation (no cross-trial import). These fill every [MATH] /
  [VALUE FROM MATHEMATICIAN] placeholder.

