hypothesis: >
  Around scheduled central-bank rate decisions, the affected currency's pairs exhibit
  a sign-aligned post-decision reaction/reversal structure that earns a net-of-cost edge
  statistically distinguishable from zero on the pooled banks-as-blocks event set — and
  that edge persists in the post-2015 sub-window, not only in the pre-2015 regime.

alpha_source: >
  Scheduled rate decisions are pre-announced uncertainty-resolution events. Risk-averse
  participants and hedgers pay to de-risk into the binary and buy back after (a documented
  risk-compensation premium — pre-FOMC drift, Lucca-Moench 2015); the announcement drives
  a reaction (repricing) and partial reversal as the premium is paid out and over-positioned
  participants unwind. Counterparties on the other side: hedgers de-risking into the event,
  and participants who AVOID the announcement window because realized vol/spreads spike (so
  any structure is under-arbitraged exactly when it is hardest and most expensive to act on).
  Persistence is structural, not informational: the calendar is a permanent anchor (~8
  decisions/yr/bank) and a risk-compensation interpretation does not self-arbitrage away.
  HONEST DECAY: the PRE-announcement drift component is documented essentially DEAD post-2015
  (the 2015 structural-break endpoint); H1 is therefore framed on the post-decision
  reaction/reversal component, and the post-2015 sub-window is a mandatory KILL test.

universe:
  primary_scenario: "Scenario A — verified-official tier ONLY (FED all years, BOJ all years, RBA all years, BOC 2019+)"
  effective_n: 506            # deduped event-days, full window (nht_accepted_effective_n)
  effective_n_post2015: 345   # deduped event-days post-2015 (nht_accepted_effective_n_post2015)
  unit_of_observation: bank-event (deduped market-day) — NOT pair x event
  post_2015_cutoff: "2015-01-01 (inclusive)"   # documented structural-break endpoint, NOT sample midpoint
  same_day_multi_bank: "counted as ONE market day for dedup (22 overlaps in A); each bank's currency reaction still measured on its own mapped pairs"
  pair_bank_map:
    # CORRECTION (orchestrator-detected): pair map corrected to verified data inventory.
    # Phantom pairs removed: GBPAUD, EURAUD, AUDNZD (RBA), EURCAD, GBPCAD (BOC).
    # Verified inventory: {AUDJPY, AUDUSD, CADJPY, EURGBP, EURJPY, EURUSD, GBPJPY, GBPUSD, NZDJPY, NZDUSD, USDCAD, USDJPY}.
    FED:  { currency: USD, pairs: [EURUSD, GBPUSD, USDJPY, USDCAD, AUDUSD, NZDUSD], pair_count: 6, post2015_events: 89 }
    BOJ:  { currency: JPY, pairs: [USDJPY, EURJPY, GBPJPY, AUDJPY, CADJPY, NZDJPY], pair_count: 6, post2015_events: 97 }
    RBA:  { currency: AUD, pairs: [AUDUSD, AUDJPY], pair_count: 2, post2015_events: 117 }
    BOC:  { currency: CAD, pairs: [USDCAD, CADJPY], pair_count: 2, post2015_events: 58 }
    pair_count_note: "Pair counts are uneven across banks: FED 6, BOJ 6, RBA 2, BOC 2. Per-event weighting rule (PINNED): for each bank-event, the bank-event observation = equal-weight average of sign-aligned net-of-cost returns across that event's responsive pairs. No bank-level weight correction for count asymmetry — the unit of observation is the bank-event, not the pair. Frozen; not tunable post-hoc (VOID §1.4(2))."
  inadmissible_excluded: "43 ECB rows graded training-memory-unverified (years 2010/2017/2018/2020/2021); runner filters df[df['verification'] != 'training-memory-unverified']"
  boc_gap_confound: "BOC has ZERO events pre-2019; all 58 BOC events are post-2015. Pre-2015 sub-window has no BOC. Disclosed as a structural-break-test confound; FED/BOJ/RBA carry the pre/post contrast."

windows:
  timestamp_convention: >
    Daily bars timestamped 00:00:00 UTC (verified from processed parquet index; tz-aware UTC).
    Announcements are intraday at bank-local times but all fall within UTC calendar day D, so
    bar D (00:00-UTC-stamped OHLC for UTC day D) is the FIRST daily bar whose close reflects the
    decision for EVERY bank. Treating bar D uniformly as the first decision-reflecting bar is the
    conservative no-leak choice (daily data cannot resolve intraday timing).
  pre_window: "K_pre = 1 bar (bar D-1) — sign-alignment / positioning input ONLY, not the claimed-edge source"
  post_window: "K_post = 2 bars after the decision is realized — the claimed-edge window (sign-aligned cumulative net return from close of D to close of D+K_post). sign_align_e = sign(close(D)-close(D-1)); position = LONG sign_align_e = CONTINUATION of the initial reaction. The pre-window K_pre=1 is the sign INPUT only, never a tested return; no pre-drift criterion exists."
  no_scan: "ONE frozen K_pre, ONE frozen K_post; no scanning over N"
  entry_exit: >
    entry_delay_bars = 1 (no-lookahead sacred invariant): sign formed through close of bar D
    (decision-reflecting bar), entry executes at D+1, post-window held K_post=2 bars, exit at
    frozen post-window end (no discretionary/trailing exit). The post-decision window begins at
    the CLOSE of bar D; no bar before D may carry decision information.
  weekends_holidays: "decision dates are official weekday announcement dates; if a window endpoint has no trading bar, use next available daily bar (no synthetic bar)."
  scenario_b:
    status: "pre-committed AUTOMATIC extension of THIS trial — NOT a new trial, NOT a separate test"
    activation_rule: >
      Activates iff the BoE/ECB spot-check artifact (qd-boe-ecb-spotcheck.yaml; NHT C4) is
      completed and committed. No human re-decision, no peek. If not completed before freeze,
      pre-reg declares Scenario B PENDING C4; no Scenario-B return data accessed until C4 committed.
    extends_to: "BOE(158)->GBP pairs, ECB-aggregator(102)->EUR pairs, RBNZ(11)->NZD pairs; 716 deduped (491 post-2015)"

metric: "r_e = sign_align_e * (net-of-cost cumulative K_post=2 POST-decision return from close of D to close of D+K_post, on the bank-event's responsive pairs, equal-weight averaged). sign_align_e = sign(close(D) - close(D-1)) on the mapped leg — realized-initial-reaction CONTINUATION (no survey/expectations feed exists; rate-change sign rejected, holds dominate post-2015). No look-ahead: sign known at close(D); entry at D+1 (entry_delay_bars=1); bar-D return is signal not P&L. Studentization/bootstrap frozen in PART II §1.3-1.4, §3; MATH compatibility sign-off PENDING (parallel)."

falsification_criteria:
  - id: PRIMARY
    form: "pooled banks-as-blocks stationary-block-bootstrap p-value for H0:E[net POST-decision K_post=2 return]<=0 > 0.0478 (fixed gate alpha 0.05 - MC-SE 0.0022, K=10000) -> KILL. Multiplicity (N_sel=3) charged via DSR gate ONLY, NOT on this p-threshold (PART II 4.2)."
