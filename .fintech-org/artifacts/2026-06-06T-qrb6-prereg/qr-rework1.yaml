sign_mapping_pinned:
  rule: >
    sign_align_e = sign( close(D) - close(D-1) ) measured on the bank-event's mapped
    leg (the per-bank reference pair, §3.2 ordering; the same scalar is applied to every
    responsive pair so the bank-event stays one sign-aligned unit). The traded position
    over the post-window [D+1 close .. D+K_post close] is LONG sign_align_e — i.e. the
    strategy bets the initial reaction realized within bar D CONTINUES through the
    K_post=2 window. close(D)=close(D-1) (measure-zero tie) -> sign_align_e=0 -> FLAT
    (excluded from realized return, event-day still counts as a block-day).
  basis: >
    One mechanical, no-runtime-judgment rule computable from data the firm HAS. The firm
    has NO survey/consensus/expectations feed, so a 'surprise vs consensus' /
    'decision vs expectation' sign is NOT computable and is rejected. Rate-change sign is
    derivable for only some banks and is dominated by HOLDS post-2015, so it is rejected
    as the primary mechanism. The calendar carries only {bank, currency, date}. The
    realized-initial-reaction (the bar-D return, close(D) vs close(D-1)) IS computable for
    every bank-event from the price data, and continuing it is the registered alpha:
    post-announcement reaction continuation, NOT pre-event reversal, NOT mean-reversion.
  lookahead_analysis: >
    sign_align_e uses close(D) and close(D-1), both known at the close of bar D. Entry
    executes at D+1 under entry_delay_bars=1 (the sacred test_no_lookahead invariant). The
    realized post-window return runs from D+1 forward and does NOT include the D-1->D bar
    used to form the sign. The bar-D return (the initial reaction) is the SIGNAL, consumed
    at signal-formation time; it is NOT part of realized P&L. No bar is both a sign-input
    and a realized-return bar without the mandatory entry_delay_bars shift => zero
    look-ahead into the D+1 entry. The genre's silent leak (treating bar D as PRE-decision
    so the announcement reaction sneaks into the realized window) is closed by §4.1's
    'bar D is the first decision-reflecting bar' convention combined with this rule. This
    is NOT a data-driven fit (no parameter estimated from returns; deterministic function
    of two adjacent closes) but it IS a function of price, so it is flagged for the
    Mathematician's parallel compatibility sign-off (PART II §1.3-1.4 studentization
    unaffected; one-sided H1:E[r_e]>0 correct under continuation). MATH sign-off: PENDING.

