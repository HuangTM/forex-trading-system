body: |
  ## QR REWORK-1 — closing the QR-owned QRB-6 pre-registration findings

  Independent review (PR-01, NHT-F1/F2/F4/F5/F6) found MY sections in a self-contradictory
  hybrid: §5 carried seven live [MATH]/[MATH primary alpha] tokens AND described an
  'absorbed-into-the-primary-alpha (~0.0025)' charge that PART II §4.2 had already superseded
  (the charge lives in the DSR gate; the p-gates use the fixed 0.0478 band). I produced 15
  exact-anchor patches (11 to the freeze-object doc, 4 to the draft yaml) at
  qr-rework1-patches.md. No return data was examined.

  ### What each patch closes
  - PR-01 / NHT-F1 (blocking — alpha double-specified + live tokens): patches A1,A2,A3,A5,A6,A8
    rewrite §5's criteria to STATE the PART II values directly — p_agg <= 0.0478 and
    p_post2015 <= 0.0478 (fixed gate, KILL if > 0.0478, post-2015 evaluated FIRST with
    overrides_aggregate_pass), DSR >= 0.95 at SR0_pp_sel=0.026861, kill_switch 1.5883 — and a
    NEW §5.7 (A7) states the DSR gate as the SOLE locus of the N_sel=3 selection charge,
    striking the absorbed-into-alpha mechanism. Every §5 [MATH] token is gone; §4.2 is
    cross-referenced as authoritative. B2 mirrors this in the draft yaml.
  - NHT-F2 (blocking — hypothesis identity): NEW §5.0 (A4) + A3 + B3/B4 make every criterion
    UNAMBIGUOUSLY test the POST-decision K_post=2 reaction quantity, and state explicitly that
    NO pre-drift criterion exists anywhere; the pre-window K_pre=1 is the sign INPUT only. The
    sidecar is noted as being rebuilt in parallel to match.
  - NHT-F5 (material — sign rule unpinned): §5.0 (A4) + B3/B4 FREEZE the sign rule:
    sign_align_e = sign(close(D)-close(D-1)), position = LONG sign_align_e (continuation), with
    the full no-look-ahead proof (sign known at close(D), entry at D+1, bar-D return is signal
    not P&L) and the explicit statement that the strategy then claims continuation of the
    initial reaction. Survey/expectation and rate-change-sign rules are rejected with reasons
    (no feed exists; holds dominate). Flagged for MATH compatibility sign-off (parallel).
  - NHT-F4 (material — sidecar path): A10 fixes qrb6_triggers.yaml -> qrb6_cb_event_study.triggers.yaml
    and tightens the §7 completeness claim.
  - PR-05 (minor — phantom citation): A9 (doc §4.1) + B1 (draft ~127) replace the
    non-existent 'CLAUDE.md 21:00-UTC note' with the verified 00:00-UTC convention and its
    actual evidence (the EURUSD_daily index check).
  - NHT-F6 (material — runner not pinned): A11 adds the permitted-pre-freeze-changes clause:
    the QRB-6 one-shot runner is the ONE named permitted pre-freeze code object, pinned by the
    freeze commit + a hash-matching receipt interlock (refuses without prereg_sha256 +
    code_commit match); freeze-cut explicitly ordered after the runner commit; no other
    post-freeze code change permitted.

  ### Out of QR scope (flagged, not patched here)
  - NHT-F1's sidecar-side live notes ('[FROZEN-AT-ASSEMBLY] e.g. 0.0025'), NHT-F2's sidecar
    primary-metric rewrite, and NHT-F3 (Scenario-B 'partial' -> activate vs C4 DORMANT) are
    QD/orchestrator-owned sidecar+provenance fixes. My doc-side §5.0/§7 patches assert the
    target so the rebuilt sidecar converges; the sidecar edits themselves are not mine to make.
  - PR-03 (master_seed comment arithmetic) and PR-04 (boundary >=/> prose) are QD- and
    Math-owned respectively.

  ### Decision
  APPROVE my reworked QR sections for re-review/consensus. The §5 hybrid is resolved: zero live
  tokens, one charge mechanism (DSR-only), one tested quantity (post-decision K_post=2), one
  pinned sign rule with a no-look-ahead proof. Remaining open items are QD/Math/orchestrator
  -owned and flagged. No capital is authorized.

