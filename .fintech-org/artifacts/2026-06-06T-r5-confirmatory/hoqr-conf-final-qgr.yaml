  FINAL HoQR quality-gate signature on the settled r5-confirmatory pre-registration. I authored PART I
  and the rework-1 fixes and have re-verified the four load-bearing items against the committed file.
  F-001 is in force: §2.2 pins min_carry=-inf AS-EXECUTED with the full provenance table, and §1.3
  condition 1 voids any variant_params override that would "restore" the config's -0.10 — the structure
  is tested exactly as the R5 family selected it. F-004 (no-peek provenance-bound adjudication, price/rate
  only, never strategy P&L) and F-005 (write-once quorum-gated runner-receipt cut before the first look)
  are intact as written. The decision map is fully binding: terminal look forces KILL, PASS routes to a
  separately-ratified observe-only paper canary with NO CAPITAL, interim futility is a non-binding advisory,
  and there is no keep-spending branch; kill_switch_threshold: 1.2906 is present and stricter-than-R5.
  Trial f2fb41fd lineage and the N_conf=6 R5-selection-absorption are intact; the R5 docs are untouched.
  The independent PR (approve, 8/8 closed) and NHT (survives) reviews are on record and concur; the one
  NHT material finding is a downstream-runner obligation, not a spec defect. I APPROVE and sign.

