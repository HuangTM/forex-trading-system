body: >
  Six ANCHOR/REPLACEMENT patches against the ASSEMBLED v1 confirmatory pre-reg, all anchors
  verified present verbatim via grep. F-001 (BLOCKING) is the load-bearing fix: the original
  §2.2 claimed config and _VARIANT_EXEC were 'consistent; both pinned' for vol_target_carry:USDJPY,
  but source verification proves the R5 k* survivor executed min_carry=-inf (strategy default,
  no carry filter), NOT the config's -0.10 — because min_carry is not a _VariantExecConfig field
  and run_r5_step4.py passed no variant_params. PATCH 1 re-pins min_carry=-inf AS EXECUTED and
  replaces the pin table with a row-by-row provenance table classifying each parameter as
  config-via-_VARIANT_EXEC, strategy-default, passed-explicit, or builder-default; it discloses
  that target_vol/vol_window/signal-leverage_cap were ALSO mis-attributed to config (they are
  strategy-defaults that merely coincide with config), and that only min_carry is materially
  discrepant. PATCH 2 rewrites VOID condition 1 to bind the AS-EXECUTED pin and to forbid any
  variant_params override (including one 'restoring' min_carry=-0.10, which would impose a carry
  filter the survivor never ran). PATCH 5/6 add the F-004 no-peek provenance-bound adjudication
  (two-source price verification -> logged bound-only amendment that does not void the look, OR
  TECHNICAL FAILURE) at the look gate and the interim integrity check. PATCH 3/4 add the F-005
  supplementary write-once RUNNER-RECEIPT mechanism (quorum-gated HoQR+Math, NHT-may-dissent,
  cut before the first look date) and forward-point the original freeze-receipt and FREEZE BLOCK
  to it. Decision: approve the rework patches; the confirmatory contract is now honest about what
  the survivor executed.

