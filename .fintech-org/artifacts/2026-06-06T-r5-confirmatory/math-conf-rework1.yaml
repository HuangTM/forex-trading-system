    CONSIDERED AND REJECTED — elect the incremental-spend rule at look 2 (reject iff p ≤ 0.044425):
    This would require re-deriving z₂ as Φ⁻¹(1−0.044425) = 1.701 (the nominal conditional
    boundary), which is the boundary one would use if treating looks as independent sequential
    tests conditioned on not stopping early. Under this rule the joint P(Z1≥z1 OR Z2≥z2|H0)
    ≈ 0.0477, not 0.050 — the design under-spends its declared alpha budget. This is conservative
    in the sense of fewer false positives, but it violates the stated design criterion
    (P(Z1≥z1 OR Z2≥z2|H0)=0.05 exactly) and would require abandoning the z₂=1.662107 election
