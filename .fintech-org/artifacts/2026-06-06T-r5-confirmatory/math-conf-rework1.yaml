    committed to the bivariate joint criterion as the derivation basis. Abandoning it here to
    rescue the incremental-spend framing would be internally inconsistent. Therefore NOT elected.

proof-sketch-or-reference: |
  The Φ(−z_j) arithmetic — two lines:

    Look 1:  Φ(−2.537988)
           = scipy.stats.norm.cdf(−2.537988)
           = 0.005575
           = spend₁  [equal by OBF construction at look 1]

    Look 2:  Φ(−1.662107)
           = scipy.stats.norm.cdf(−1.662107)
           = 0.048246
           ≠ 0.044425 (incremental spend₂)

  The incremental spend₂ = 0.044425 corresponds to the nominal conditional boundary:
    Φ⁻¹(1 − 0.044425) = scipy.stats.norm.ppf(0.955575) = 1.701  (NOT z₂ = 1.662107)

  The bivariate joint design criterion P(Z1≥z1 OR Z2≥z2|H0) = 0.05 is satisfied by
  z₂ = 1.662107 (verified: scipy bivariate CDF gives P(Z1<z1,Z2<z2)=0.950000 exactly).
  The operative threshold at look 2 is therefore the p-value corresponding to z₂ = 1.662107,
  which is Φ(−1.662107) = 0.048246, not 0.044425.

