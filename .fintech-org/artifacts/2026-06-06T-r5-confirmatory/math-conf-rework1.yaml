     which is too conservative; the design would under-spend its declared alpha and the actual
     joint type-I rate would be <0.05. A borderline p in (0.044425, 0.048246) would be incorrectly
     classified as fail rather than pass."
  - "scipy unavailable at evaluation: TECHNICAL_FAILURE (existing A-5 pin); Φ(−z_j) must be
     computed via scipy.stats.norm.cdf, never approximated."
  - "z₂ computed from spending function only (conditional boundary approach) rather than bivariate
     joint solve: gives 1.701 not 1.662107, over-spending at look 1 and under-spending overall."

alternative-methods:
