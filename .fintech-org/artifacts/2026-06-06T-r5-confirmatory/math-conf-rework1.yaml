     conservative than the joint-exact z₂ = 1.662107 and is not alpha-exact for this design."

assumptions-identified:
  - "F-002: The 'incremental spend = operative threshold' framing is correct at look 1 (numerical
     coincidence) but INCORRECT at look 2. The two quantities — alpha-budget and p-scale threshold
     — are different objects that happen to be equal only at the first look of an OBF design."
  - "F-008: 'Bit-for-bit' mirroring of R5 SPA studentization overstates the correspondence.
     The confirmatory uses the same statistic family and HAC conventions but univariate
     block-length selection, not the multivariate version R5 used across 36 columns."
  - "The z-boundaries (z₁, z₂) are the PRIMARY frozen operative reference; the p-scale
     thresholds Φ(−z_j) are derived equivalents. Stating the p-scale form as primary with
     z-scale as 'equivalent reference' (as the pre-reg previously had it) is acceptable as long
     as the p-scale values are exact — but the pre-reg had the wrong p-scale value at look 2."

failure-regimes:
