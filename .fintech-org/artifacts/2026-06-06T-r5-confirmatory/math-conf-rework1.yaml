body: |
  Two findings routed for resolution: F-002 (major, operative look-rule stated inconsistently)
  and F-008 (observation, wording).

  F-002 RESOLUTION — Operative rule elected: bootstrap p_j ≤ Φ(−z_j).

  The pre-registration as assembled contained an inconsistency introduced when the z-boundaries
  were corrected (via mathematician-z2-election.yaml) but the corresponding p-scale thresholds in
  the boundary table and prose were not updated consistently. Specifically:
  - The boundary table's look-2 `reject H0 if` column still read `bootstrap p ≤ 0.044425`
    (the incremental spend), while the z-boundary had been corrected to z₂ = 1.662107.
  - The operative-rule prose stated "reject at look j iff p ≤ incremental spend", which is
    correct at look 1 (Φ(−z₁) = spend₁ = 0.005575, numerically equal) but incorrect at look 2
    (Φ(−z₂) = 0.048246 ≠ spend₂ = 0.044425).

  The clean resolution, consistent with the z₂ = 1.662107 election already ratified:
  the operative threshold at look j is Φ(−z_j). At look 1 this equals the incremental spend
  (a numerical coincidence of the OBF form at t=0.5); at look 2 it is Φ(−1.662107) = 0.048246.
  The incremental-spend framing is DELETED as the operative rule at look 2 and replaced by the
  Φ(−z_j) statement. The incremental-spend column in the boundary table is retained as the
  alpha-BUDGET figure (it is still correct as a budget), distinguished from the operative threshold.

  The alternative — electing the incremental-spend rule and re-deriving z₂ from it — is
  considered and explicitly rejected: it would require abandoning z₂ = 1.662107 in favor of
  z₂ = 1.701 (the nominal conditional boundary), which achieves joint type-I rate ≈ 0.0477 and
  violates the stated bivariate joint criterion already ratified.

  F-008 RESOLUTION — One-sentence wording fix in §1.3.

  The phrase "mirrors the R5 SPA studentization bit-for-bit" overstates the correspondence.
  The T_k statistic form, HAC kernel (Bartlett/NW), and recentering convention are identical;
  however R5 applied Politis–White block-length selection across its 36-column matrix (multivariate
  context) whereas the confirmatory applies the same function to a single hold-out series
  (univariate context). The corrected wording states the true relationship honestly.

  All patches are produced as exact ANCHOR/REPLACEMENT in math-conf-rework1-patches.md (3 patches).
  No numerical constants change; only two p-scale threshold values (look-2 boundary table entry and
  the operative-rule prose) and one wording sentence are corrected. The FROZEN z-boundaries
  (z₁ = 2.537988, z₂ = 1.662107) are unchanged.

