     rho=sqrt(0.5), z1=2.537988 — verified by QD via scipy triple-verify (bivariate CDF,
     dblquad, 5M-sample MC). This is the frozen elected value."
  - "The operative look-j threshold is Φ(−z_j) = one-sided p-value corresponding to z_j
