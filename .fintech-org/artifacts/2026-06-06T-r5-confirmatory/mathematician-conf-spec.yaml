  - "Daily-bar power calc uses the annualized-Sharpe horizon law lambda = SR_true * sqrt(Y); treats bars as the effective sample. Monthly-stale signal autocorrelation makes this an UPPER bound on realized power."
  - "BLdP SR0 dispersion plug-in sqrt(Var[SR_n]) = 0.426385 (the R5-frozen sample-of-2 estimator over {0.80, 0.197}) is carried unchanged; N_conf enters ONLY the expected-max bracket axis (R5 two-axis convention)."
