proof-sketch-or-reference:
  - "BLdP SR0: SR0_ann = sqrt(Var[SR_n]) * [(1-g)Z^-1(1-1/N) + g Z^-1(1-1/(N e))]; N_conf=6 => bracket=0.4227843*0.967422 + 0.5772157*1.542968 = 0.409013+0.890636 = 1.299649; SR0_ann=0.426385*1.299649=0.554150; SR0_pp=0.554150/sqrt(252)=0.034908. (Bailey & Lopez de Prado 2014; dsr.py docstring.)"
  - "Lan-DeMets sfLDOF (OBF-type), one-sided alpha=0.05, t=(0.5,1.0): alpha*(t)=2(1-Phi(1.959964/sqrt(t))); alpha*(0.5)=0.005578, alpha*(1.0)=0.05 => incremental 0.00558 / 0.04442; nominal one-sided boundaries z1=Phi^-1(0.99442)=2.539, z2 approx 1.687 (sequential-adjusted). (Lan & DeMets 1983; gsDesign sfLDOF.)"
  - "Power at terminal (Y=5, SR_plan=0.554): lambda=0.554*sqrt(5)=1.238826; power=Phi(lambda - z2)=Phi(1.238826-1.687)=Phi(-0.448)=0.327. Cross-check anchors: Y50=(z_a/SR)^2, Y80=((z_a+0.8416)/SR)^2; at SR=0.554, Y50=8.82yr, Y80=20.1yr — confirms 5yr is underpowered (~33%)."
  - "kill_switch_threshold: solve (SR_pp - 0.034908) sqrt(T-1)/sqrt(var_term)=1.644854 at T=1260; two-pass (var_term: skew 0.196, xkurt 8.28) => SR_pp=0.081289 => SR_ann=0.081289*sqrt(252)=1.2906 => 1.291."

