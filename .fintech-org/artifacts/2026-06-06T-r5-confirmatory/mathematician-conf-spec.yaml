  - "252 trading days/year for annualization and for converting +2.5yr/+5yr to bar counts (n approx 630 / 1260)."

assumptions-identified:
  - "Selection charge is paid through the DSR benchmark N (multiplicity on the SR0 bar), not through inflating the bootstrap p — the bootstrap p is the clean-data evidence; DSR is the additional selection hurdle."
  - "N_conf=6 elected at the conservative ceiling of the admissible [2,6] band because BLdP SR0 increases in N and this is a KILL test (over-deflation is safe-if-wrong)."
  - "OBF (sfLDOF) over Pocock: spend near-zero alpha early to preserve terminal-look power."
  - "Futility frozen as NON-binding advisory to avoid asymmetric-spend error inflation (NHT-anticipating)."
  - "kill_switch_threshold is technically a function of the (unknown) hold-out higher moments; frozen as a scalar by plugging the only pre-registered moment anchors (R5 skew 0.196, xkurt 8.28); runner recomputes var_term on hold-out moments at evaluation."

failure-regimes:
  - "n at interim < 504 bars (data-pipeline shortfall): interim SKIPPED, alpha rolled to terminal via Lan-DeMets; below 756 at terminal => TECHNICAL_FAILURE, re-freeze."
  - "var_term <= 0 in DSR (extreme negative skew x large SR): DSR=0 (gate FAIL, not technical failure) — degenerate pin carried from dsr.py."
  - "Constant / near-iid hold-out series: Politis-White returns L=1, bandwidth max(L-1,1)=1; HAC SE reduces toward the iid SE; guarded, not degenerate."
  - "High signal autocorrelation (monthly-stale): large L => few effective blocks => wider HAC SE => realized power BELOW the ~33% iid-daily upper bound; disclosed."
  - "Negative hold-out Sharpe at any look: DSR=0 (sr_ann<=0 pin) => automatic gate FAIL => KILL branch."
  - "Bootstrap MC-SE at K=10000: approx sqrt(0.05*0.95/10001) approx 0.0022 around a p near 0.05 — non-trivial near the boundary; the DSR gate (not the boundary p alone) is the binding hurdle, mitigating boundary MC noise."

alternative-methods:
  - "REJECTED — no-charge plain single-series t/bootstrap (data is unsnooped): rejected because the HYPOTHESIS is selected (best-of-36 on correlated cells); family-wise type-I exceeds 0.05; clean data removes point-estimate overfit but not selection multiplicity. R5 SS4/SS5 makes absorbing the charge BINDING (VOID otherwise)."
  - "REJECTED — asymptotic-normal p-value: anti-conservative at n in hundreds with xkurt 8.28 and serial dependence; stationary block bootstrap elected for tail/autocorrelation fidelity and R5 consistency."
  - "REJECTED — Pocock alpha-spending: spends too much alpha early, erodes terminal-look power; OBF elected."
  - "REJECTED — binding futility boundary: asymmetric-spend error-inflation risk; frozen as non-binding advisory instead."
  - "REJECTED — N_conf=37 or N=36 (raw cell count): double-counts the shared rate-differential idea (R5 SS7.2 warning); the cells are NOT independent (effective dim 1-4). N_conf=6 charges effective selection dim + prior honest-N minus the one-look overlap."
