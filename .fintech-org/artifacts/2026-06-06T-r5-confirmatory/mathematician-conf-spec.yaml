body: |
  Mathematician freeze of the four owned sections of the R5 confirmatory pre-registration
  (CONF-statistic, CONF-interim, kill_switch_threshold, co-sign CONF-holdout) plus run mechanics.
  Full prose in conf-sections-mathematician.md (same directory).

  HEADLINE FREEZES:
    - Statistic: single-series studentized mean t = sqrt(n)*mean(r)/omega_hat, HAC SE (Newey-West,
      Politis-White auto L, L>=1 guard) on the hold-out only. p via stationary circular block
      bootstrap (NOT asymptotic normal), K=10000, de-mean H0, p=(1+#{t* >= t_obs})/(K+1).
      H0: E[r] <= 0, one-sided alpha=0.05.
    - Selection absorption: paid through a BLdP DSR gate (DSR>=0.95) on the hold-out Sharpe with
      N_conf = 6 (elected at the conservative ceiling of the [2,6] admissible band: R5 effective
      selection dim up to 4 + prior honest-N 3 - one-look overlap). Dispersion 0.426385 carried
      from R5 unchanged; N enters only the expected-max bracket. => SR0_ann_conf=0.554150,
      SR0_pp_conf=0.034908.
    - Planning SR (shrinkage freeze): SR_plan = SR0_ann_conf = 0.554 (NOT the snooped 0.767).
    - Looks: 2 looks, OBF (Lan-DeMets sfLDOF) one-sided, t=(0.5,1.0); hold-out starts 2026-04-07;
      look1 2028-10-06 (+2.5yr, n approx 630), look2 2031-04-06 (+5yr, n approx 1260, TERMINAL).
      Boundaries z1=2.539 (spend approx 0.0056), z2 approx 1.687 (spend approx 0.0444). Non-binding
      futility advisory (negative interim Sharpe => MAY early-KILL).
    - Terminal-look power approx 0.33 at SR_plan=0.554 (UPPER bound; disclosed underpowered; non-
      rejection => KILL, uninformative-as-evidence-of-no-edge but does not license spend).
    - kill_switch_threshold = 1.291 (ann hold-out Sharpe to clear DSR>=0.95 at SR0_pp_conf=0.034908,
      N_conf=6, T=1260; two-pass solve at anchor moments). Stricter than R5's 0.767 (higher N AND
      smaller T). NOT copied from R5.

  decision = sound-with-caveats. Caveats: (1) terminal-look power is low (~33%) and the realized
  power may be lower under signal autocorrelation — the design is a near-certain wind-down, which
  is the honest expected outcome of a confirmatory kill test on zero validated alpha; (2) the exact
  one-sided sfLDOF final boundary and the two quantiles/DSR-solve are routed to QD for scipy/gsDesign
  confirmation (hand-work shown to 3-6 dp; expected divergence < 0.5%); (3) N_conf=6 is an election
  within an admissible band, defended on the kill-test conservative direction, not a unique derivation
  — NHT should adjudicate whether the absorption is correctly NOT double-counted.

