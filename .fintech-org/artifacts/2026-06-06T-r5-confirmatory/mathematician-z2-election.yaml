     information fraction matches t1=0.5 before applying the frozen z2."

alternative-methods:
  - "REJECTED — Option B, z2=1.687 (hand value):
     Achieves joint α≈0.0477, under-spending the declared 0.05 budget by ~2.3pp. QD analysis shows
     it is not the conditional (nominal) Lan-DeMets terminal boundary (1.701), not the marginal OBF
     boundary (1.644), and not reconstructible from any documented parameterization. A pre-registered
     boundary must be derivable or must carry a named derivation; 'conservative' requires a stated
     basis, not an opaque table-lookup. Additionally, the power loss (0.327 vs 0.340) has no offsetting
     benefit: the design passes the kill-test gate at BOTH z2 values — Option B does not make a false
     pass less likely because the DSR gate (not z2 alone) is the binding hurdle. The under-spend is
     pure precision defect."

proof-sketch-or-reference:
  - "Group-sequential bivariate boundary: for a two-look design with independent increments (canonical
     Brownian information model), the joint type-I criterion P(Z1≥z1 OR Z2≥z2|H0)=α is equivalent to
     P(Z1<z1 AND Z2<z2|H0)=1−α, which is the bivariate normal CDF evaluated at (z1,z2) with
     corr=sqrt(t1/t2)=sqrt(0.5) under H0 (mean=(0,0)). z2 is the unique root of
     Φ₂(z1,z2;ρ)=0.95 where z1=2.537988 and ρ=0.707107. scipy.optimize.brentq on this objective
     with xtol=1e-12 gives z2=1.662107."
  - "Lan & DeMets (1983), Biometrika 70(3):659-663 — spending function framework; z2 is determined
     by the bivariate CDF, not by the spending function alone. The sfLDOF spending function sets
     spend₁=0.005575 and spend₂=0.044425 (incremental); the nominal conditional boundary
     Φ⁻¹(1−spend₂)=1.701 is a DIFFERENT object (conditional on not crossing z1) and is NOT the
     bivariate-joint z2."
  - "Bailey & Lopez de Prado (2014) SR0/DSR formulae — all bracket and DSR constants derivable from
     scipy.stats.norm.ppf and scipy.optimize.brentq; no table lookup; pinned in dsr.py:179-207."
  - "Triple verification independence: (1) scipy.stats.multivariate_normal.cdf(Genz), (2)
     scipy.integrate.dblquad (independent quadrature, result 0.95000004), (3) 5M-sample MC
     (result 0.050055, within 0.6σ of target 0.05 at σ_MC≈0.00010). All three confirm z2=1.662107."

