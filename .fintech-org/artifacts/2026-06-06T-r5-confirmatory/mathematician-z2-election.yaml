z2_elected: 1.662107

election_basis: >
  Option A (z2 = 1.662107) is elected on four interlocking grounds.
  First, the stated criterion is P(Z1 ≥ z1 OR Z2 ≥ z2 | H0) = 0.05 exactly — a bivariate
  joint condition with corr = sqrt(0.5); Option A is the unique root of that equation
  (triple-verified: scipy bivariate CDF, independent dblquad quadrature, and 5 M-sample MC).
  Option B (1.687) achieves only joint α ≈ 0.0477, under-spending the declared budget by
  ~2.3 percentage points while having no derivable provenance — it is neither the conditional
  (nominal Lan-DeMets) boundary (1.701) nor the marginal boundary (1.644), and QD's analysis
  cannot reconstruct it from any defensible parameterization.
  Second, a frozen pre-registration must be internally consistent: an undecorated constant
  that cannot be derived from the frozen criterion is inadmissible in a document the firm may
  be held against; "conservatism" requires a stated derivation, not an opaque table-lookup,
  and Option B was never declared conservative — it was presented as the exact boundary.
  Third, the design is already underpowered (~34%); gratuitous alpha-budget waste (Option B
  recovers none of that lost power, it simply mis-spends) is not a safety feature here, it
  is a precision defect — lower alpha-spend tightens the critical region for no declared
  benefit and makes an already near-certain wind-down outcome marginally more certain through
  arithmetic accident rather than principled conservatism.
  Fourth, the R5 precedent this firm followed throughout was to freeze scipy-exact constants
  and correct hand-drift via the QD routing mechanism — Option A is that exact correction,
  consistent with the R5 machinery and signed consensus.
  Option B is explicitly rejected and documented in alternative-methods.

