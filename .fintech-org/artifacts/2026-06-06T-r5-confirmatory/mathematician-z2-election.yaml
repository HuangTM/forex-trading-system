assumptions:
  - "Information fraction t₁ = 2.5/5.0 = 0.5 exactly; rho = sqrt(t₁/t₂) = sqrt(0.5) = 0.707107 exactly."
  - "Spending function is Lan-DeMets sfLDOF one-sided α=0.05; spend₁ = 2·(1−Φ(1.959964/√0.5)) = 0.005575."
  - "The bivariate joint criterion P(Z1≥z1 OR Z2≥z2|H0) = 0.05 uses the standard non-central bivariate
     normal CDF via scipy.stats.multivariate_normal with corr matrix [[1,rho],[rho,1]], rho=sqrt(0.5),
     zero mean under H0. This is the canonical group-sequential closed-testing formulation."
  - "scipy.stats.multivariate_normal.cdf uses the Genz algorithm — no table-lookup approximation."
  - "var_term = 1 at reference for kill_switch_threshold read-out (first pass only); brentq converges to
     exact fixed point var_term=1.001053, self-consistent. Two-pass solve in the spec converges to same."
  - "Dispersion sqrt(Var[SR_n]) = 0.426385 carried FROZEN from R5; N_conf enters only the bracket axis.
     Any error in this dispersion estimate propagates directly to SR0 constants."
  - "252 trading days/year for all annualization; T_holdout = 1260 for terminal look at +5yr."

