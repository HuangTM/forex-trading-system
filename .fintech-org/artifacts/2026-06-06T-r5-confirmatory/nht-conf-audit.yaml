dsr-assessment: >
  THE N_conf=6 / SR0 / threshold audit — the load-bearing freeze and the axis flagged for my adjudication.

  POLARITY (verified, and it is the OPPOSITE of the R5 problem I caught). BLdP SR0 is strictly INCREASING
  in N (R5 N=3 -> SR0_ann=0.363623; conf N=6 -> SR0_ann=0.554361). In R5 I flagged N=2-at-the-FLOOR as
  ANTI-conservative (a lower N gives a lower bar, biasing toward false CONTINUE). Here the Mathematician
  elected N_conf at the CEILING (6) of the admissible band [2,6]. Ceiling = highest SR0 = STRICTEST,
  most-skeptical gate = the safe-if-wrong direction for a KILL test. The polarity flip is correct and the
  point chosen is honest: an N_conf error in the only direction the firm could plausibly be accused of
  (charging too little) is structurally ruled out by sitting at the ceiling. I cannot construct an
  exploit where a HIGHER N_conf produces a false PASS — higher N only makes PASS harder.

  NO-DOUBLE-COUNT (sound, with one residual). The construction N_conf = R5-effective-selection-dim-upper
  (NHT's own 4) + prior-carry-honest-N (3) - 1 overlap = 6 is principled: it charges BOTH the
  best-of-36-correlated-cells selection event AND the prior carry-family multiplicity, while removing the
  one-look double-count of the shared rate-differential idea (the exact double-count R5 7.2 warned against).
  The "-1 overlap" is a judgement, not a derivation, but it is disclosed as such and it errs toward MORE
  charge (6 > both 4 and 3 individually), so any residual error is conservative. I accept it. The
  dispersion sqrt(Var[SR_n])=0.426385 is carried FROZEN from R5 (sample-/-1 over the two observed
  look-Sharpes {0.80, 0.197}); N_conf enters ONLY the expected-max bracket axis, never the dispersion —
  this is the same two-axis discipline I verified in R5, applied correctly. The dispersion's own
  2-observation fragility is inherited from R5 unchanged (assumption, not a new defect here).

  CLEAN HOLD-OUT vs SELECTION CHARGE — no double-charge, no under-charge (correct adjudication). The
  Mathematician's resolution is right and is the crux: the clean post-2026-04-06 hold-out removes the
  IN-SAMPLE OVERFIT of the point estimate, but it does NOT remove the MULTIPLICITY of the selection EVENT
  (had a different cell won the R5 argmax, a different hypothesis would be frozen now). So the selection
  charge lands in the DSR SR0 benchmark (N_conf=6), and the bootstrap-t p is the clean-data evidence —
  TWO DISTINCT hurdles, both required for PASS (decision-map outcome 1 AND-gates them). This is not
  double-charging: the bootstrap p is NOT itself deflated by N (it is a single-series honest p on unseen
  data), and the DSR gate is NOT applied to in-sample data. The selection is charged exactly once, in the
  right place. The rejected "no charge, data is unsnooped" alternative is correctly steelmanned and
  correctly refused: the family-wise error rate of declaring a winner from the best-of-36 survivor exceeds
  0.05 even on fresh data, because the candidate was pre-filtered for apparent strength.

  KILL-SWITCH THRESHOLD (1.2906, correct and correctly STRICTER than R5). Two compounding levers, both in
  the skeptical direction: (i) N_conf=6 raises SR0 vs R5 N=3; (ii) T_holdout~1260 << R5 T=4186, so the
  sqrt(T-1) lever is weaker and a higher Sharpe is needed for the same DSR. brentq-exact 1.290641,
  DSR-at-kill=0.950000. The threshold demands a ~1.29 realized ann Sharpe on 5yr of clean data to PASS —
  far above the snooped in-sample 0.767. This is honest and hard, exactly as a confirmatory kill test
  should be. The threshold is NOT copied from R5 (it is derived).

audit-findings:
  - id: F-1
    severity: material
    finding: >
      RUNNER DOES NOT EXIST AND THE EXISTING DSR CODE HARDCODES THE WRONG SR0. r5_decision.compute_dsr_gate
      pins SR0_PP = 0.022906 as a FROZEN LITERAL (r5_decision.py:188-189) — that is the R5 N=3 value, NOT
      the confirmatory SR0_pp_conf=0.034921 (N_conf=6). The confirmatory test CANNOT reuse
      compute_dsr_gate as-is without computing the wrong (too-lenient) DSR. Separately, the canonical
      dsr.py:171-177 carries a scipy-ImportError math.erf APPROXIMATION FALLBACK, which the pre-reg's
      "scipy REQUIRED, no approximation" pin (PART II 1.4 / 5) forbids; the no-fallback enforcement lives
      only in r5_decision.py:22-30, not in dsr.py. A confirmatory runner that imports compute_dsr from
      dsr.py rather than the r5_decision path would silently violate the scipy pin.
    exploit-path: >
      At look time (2028/2031) a runner is built that (a) reuses compute_dsr_gate's hardcoded 0.022906,
      under-deflating and making a false PASS easier; or (b) imports raw dsr.py and silently falls back to
      the erf approximation if scipy is missing, certifying on a forbidden approximation. NON-BLOCKING
      because: the pre-reg FREEZES the correct value (SR0_pp_conf=0.034921) in the document text and the
      kill_switch_threshold (1.2906) verbatim; VOID-on-freeze-mismatch + VOID-on-parameter-drift +
      refuse-without-receipt + behavior-equivalence pin (Section 2.3) all attach at the freeze-receipt; and
      the runner must be separately code-pinned and behavior-verified at look time under a fresh receipt.
      The hole is a FUTURE implementation risk, not a defect in the frozen spec. REQUIRED FIX (recommended,
      not blocking the freeze): the freeze-receipt MUST pin SR0_pp_conf=0.034921 as the literal the runner
      injects (NOT compute_dsr_gate's 0.022906), and MUST state the runner uses the r5_decision scipy-hard
      path (no dsr.py erf fallback). The math contract already implies this; pin it explicitly NOW so the
      look-time QD cannot reach for the R5 literal.
  - id: F-2
    severity: minor
    finding: >
      z2 CONVENTION IS A DEFENSIBLE ELECTION, NOT THE ONLY ADMISSIBLE ONE. z2=1.662107 solves the
      bivariate-joint-OR criterion P(Z1>=z1 OR Z2>=z2)=0.05 exactly (triple-verified). But the canonical
      gsDesign sfLDOF *incremental-spend* convention yields a DIFFERENT terminal nominal boundary
      (conditional boundary 1.701 per QD). Both control type-I at 0.05; the joint-OR election (z2=1.662 <
      1.701) is slightly LESS conservative and gives marginally higher power (0.340 vs ~0.33). The
      Mathematician chose the joint-OR because it is the unique derivable root of the stated criterion and
      rejected the opaque hand value 1.687 (which under-spent to alpha~0.0477 with no provenance).
    exploit-path: >
      None material. The joint-OR is the MORE alpha-spending (less conservative) of the two admissible
      conventions, so it is the anti-conservative-leaning choice on the multiplicity axis — but the gap is
      ~0.04 in z and the design is dominated by the DSR gate (1.2906), not the bootstrap-p boundary. A PASS
      requires BOTH; the DSR gate is the binding hurdle, so the z2 convention choice cannot manufacture a
      false PASS. Note only.
  - id: F-3
    severity: note
    finding: >
      FUTILITY IS ADVISORY, NOT BINDING — and that is the correct choice, closing my own prior class of
      objection. Section 3.4 freezes a NON-binding futility advisory (interim negative point-Sharpe MAY
      early-KILL, firm retains discretion). An advisory futility leaks NO optionality in the dangerous
      direction: it cannot CONTINUE a test that should stop, it can only stop one early; it recovers no
      alpha; and the terminal look remains the sole BINDING decision. The asymmetry (advisory-down,
      binding-terminal) is exactly what avoids the error-inflation a non-symmetric binding futility would
      cause. Correct.
    exploit-path: >
      None. The only discretion an advisory futility grants is "stop early when already negative," which
      strictly cannot produce a false PASS.
  - id: F-4
    severity: note
    finding: >
      LOOK GOVERNANCE / NO-PEEK IS MECHANICALLY CREDIBLE. The interim monitoring state (Section 5) runs
      ONLY the data/storage.py provenance check (_assert_price_range, USDJPY bounds [20.0,245.0],
