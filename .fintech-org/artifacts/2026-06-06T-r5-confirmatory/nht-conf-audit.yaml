body: |
  AUDIT SCOPE. I audited the 477-line assembled confirmatory pre-reg against the six stress axes in my
  mandate, the frozen R5 map (§5 outcome 4 / §7.3.6 RULE 4), the R5 result, the QD scipy constants
  confirmation, the Mathematician's z2 election, and the implementation pins (dsr.py, r5_decision.py).
  I read the full artifact, reasoned the N_conf polarity by hand from the frozen scalars, and confirmed
  the Lan-DeMets construction against an external source. READ-only; one numerical confirmation already
  existed (QD triple-verify) so I requested no new tests.

  VERDICT: SURVIVES, severity=concern. The spec is freezable as-is. It is an honest, binding,
  confirmatory-ONLY test that satisfies every clause of the frozen R5 confirmatory gate.

  THE SIX AXES.
  (1) Selection-absorption (flagged for my adjudication): SOUND. Polarity is the OPPOSITE of R5's N=2-floor
  problem — SR0 increases in N, so the ceiling N_conf=6 is the strictest/most-skeptical gate, the
  safe-if-wrong direction for a kill test. The no-double-count construction (4+3-1) is a disclosed
  judgement erring toward MORE charge. No exploit exists where higher N_conf yields a false PASS.
  (2) Clean hold-out + selection charge: NEITHER double-charges NOR under-charges. Clean data removes
  in-sample overfit; the DSR SR0 (N_conf=6) charges the selection-event multiplicity exactly once; the
  bootstrap-t p is the clean-data evidence. Two AND-gated hurdles. The Mathematician's resolution is right.
  (3) Look governance / no-peek: MECHANICALLY CREDIBLE. The interim state runs only the raw-price
  provenance check, never the return series or any statistic; enforced by refuse-without-receipt +
  VOID-on-early-peek. The advisory futility leaks no dangerous optionality (can only stop early, never
  CONTINUE; recovers no alpha).
  (4) Terminal-look bindingness: BINDING. No "extend / one more look / re-parameterize" path exists.
  Outcome 2 KILL is forced at look 2 at any power; outcome 4 CONTINUE is unavailable at the final look.
  The pass destination (observe-only paper canary, fresh ratification, NO capital, new trial_id) is NOT
  a disguised CONTINUE — the 36-cell family is not re-opened and no capital is authorized.
  (5) Power honesty: COHERENT. Planning at the deflated SR_plan=0.554 (not the snooped 0.767) is correct;
  ~0.34 power is disclosed as LOW and as an upper bound; bound to KILL-with-caveat, not a third door;
  expected terminal state is wind-down. Carried honestly.
  (6) Unfrozen-DOF sweep: CLEAN at the spec level except the runner (F-1). Seed rule, K=10000,
  estimator conventions, var_term self-consistent fixed point — all pinned. The runner is the one true
  unfrozen DOF; the receipt + behavior-equivalence pin converts it to hash-pinned code at look time.

  THE ONE MATERIAL FINDING (F-1) and why it does not block. The look-time runner does not exist yet, and
  the existing DSR code is a trap: r5_decision.compute_dsr_gate hardcodes the R5 N=3 SR0_PP=0.022906 as a
  literal (NOT the confirmatory 0.034921), and dsr.py carries a forbidden scipy-erf fallback. A careless
  look-time runner could under-deflate or silently approximate. This is contained: the document freezes
  the correct SR0_pp_conf and kill_switch verbatim, and VOID-on-mismatch + refuse-without-receipt +
  behavior-equivalence all attach at the receipt. I recommend (do not require, do not block) that the
  freeze-receipt explicitly pin SR0_pp_conf=0.034921 as the runner's injected literal and the
  r5_decision scipy-hard path, so the 2028 QD cannot reach for the R5 0.022906.

  CALIBRATION. I rejected escalation. severity=material_concern applies only if the doc must NOT freeze
