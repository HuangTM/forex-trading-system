confidence: high

body: |
  This acceptance-criteria document governs Wave 1 of track r5-confirmatory-2026-06-06.

  The R5 one-shot kill test ran 2026-06-06 and produced AMBIGUOUS_GATE_FAIL: p_SPA=0.0162
  (class-level rejection), DSR=0.9503 (passed by +0.0003), White-RC p_RC=0.0588 (discordant).
  Per the frozen R5 decision functional (SS7.3.6 RULE 4), this maps to SS5 outcome 4:
  confirmatory-only pre-reg gate. It does NOT authorize CONTINUE on the family or any capital.

  The single surviving structure is k* = vol_target_carry:USDJPY (argmax of the 36-cell SPA
  family max-statistic, annualized Sharpe 0.767). This is the ONLY structure the confirmatory
  pre-reg may test. No pair search, no variant substitution, no re-parameterization.

  The critical constraint is selection-absorption: selecting k* after seeing R5's 36-cell
  results is a spent look. The confirmatory pre-reg's honest-N and SR0 deflation inputs MUST
  carry this forward — a confirmatory test that does not charge the R5 36-cell argmax selection
  in its own multiplicity is a garden-of-forking-paths violation and its p is not face-valid.

  The carry family enters monitoring/observe-only in the interim. No new research spend on
  carry is authorized while the confirmatory pre-reg is being authored or during the hold-out
  period. Active research capacity is redirected to genuinely new alpha hypotheses (separate
  tracks, each requiring fresh pre-registration).

  Wave 1 deliverable: a complete, frozen, CEO-ratified confirmatory pre-reg. Wave 2 (if any)
  would be the evaluation run at the frozen future date(s), out of scope for this track.

