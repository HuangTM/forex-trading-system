  - "Live or paper trading actions; any capital deployment"
  - "Re-opening the 36-cell R5 family for further research"
  - "Re-running the R5 SPA/White-RC test on any window"

roles-staffed:
  - head-of-quant-research (opus): Authors the confirmatory pre-reg — exact structure under test, hold-out rule, evaluation date(s), monitoring-state spec, and outcome-action map including kill branch. Co-signs holdout and decision-map sections.
  - mathematician (opus): Freezes the single-series test statistic, selection-absorption mechanism (honest-N + SR0 derivation absorbing R5 36-cell selection), interim look design (alpha-spending function + power curve), kill_switch_threshold derivation, and the DSR formula inputs. Co-signs holdout and power sections.
  - null-hypothesis-tester (opus): Adversarial audit — verifies selection-absorption is correct, holdout is unsnooped, alpha-spending is valid, no hidden escape paths in decision map. Dissent is append-only.
  - principal-reviewer (opus): Full review of the complete confirmatory pre-reg using review-plan rubric; blocks on any unresolved finding before CONSENSUS.
  - quant-developer (sonnet): CONDITIONAL — engaged only if the confirmatory evaluation design requires new runner code not covered by the existing harness. Flag explicitly when spawning if needed.
  - pm (this role): Writes acceptance criteria (this document), orchestrates wave sequence, produces CONSENSUS artifact, coordinates CEO ratification before freeze-receipt is cut.

