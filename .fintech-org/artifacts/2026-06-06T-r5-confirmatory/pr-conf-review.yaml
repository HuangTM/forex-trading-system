  - id: F-002
    severity: major
    location: "PART II Section 3.3 (alpha-spending boundaries; 'bootstrap p is the operative test; z-boundaries are the equivalent reference')"
    category: statistical-method-consistency
    observation: >
      The look-level decision rule is stated two ways that are NOT generally equivalent: (a) the OPERATIVE
      rule rejects at look j iff the look-j stationary-bootstrap p <= the INCREMENTAL spend (spend1=0.005575,
      spend2=0.044425); (b) the z-boundary z2=1.662107 was solved from the JOINT bivariate OR-criterion
      P(Z1>=z1 OR Z2>=z2|H0)=0.05 with correlated increments rho=sqrt(0.5). Comparing each look's marginal
      bootstrap-p to its incremental spend is an independent-increment / per-look construction; it reproduces
      the joint boundary z2 only if the two look statistics are jointly normal with exactly that rho. The
      look-2 bootstrap-t is computed on the full +5yr series (which CONTAINS the look-1 +2.5yr series), so the
      two are strongly positively correlated by construction — precisely the joint structure z2 assumes, but
      the bootstrap-p-vs-incremental-spend rule does not encode that correlation.
    inference: >
      In a region where look-1 was a near-miss, rule (a) and rule (b) can disagree on the look-2 reject/accept
      decision. The doc asserts equivalence ("the z-boundaries are the equivalent reference") without proving
      the bootstrap-p scale realizes the rho=sqrt(0.5) joint design. Since the bootstrap is declared the
      operative test, the frozen z-boundaries may be decorative rather than equivalent, and the actual
      family-wise alpha control of the operative rule is unverified. For a confirmatory kill test whose whole
      value is a clean family-wise alpha, this gap must be closed before freeze.
    evidence:
      - "Section 3.3: 'reject at look j iff the look-j bootstrap p <= the incremental spend'"
      - "Section 3.3 / mathematician-z2-election.yaml proof-sketch: z2 is the unique root of Phi2(z1,z2;rho=sqrt(0.5))=0.95 — a JOINT criterion"
      - "Section 1.4: look-j bootstrap t* recomputed per resample; no joint look-1/look-2 resampling stated"
    recommended-action-class: derivation-or-proof-required
    owning-role: mathematician
