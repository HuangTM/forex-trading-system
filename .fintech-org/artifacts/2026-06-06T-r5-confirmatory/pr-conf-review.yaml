body: |
  VERDICT: approve-with-conditions. The statistical core is sound and independently reproduces to the digit:
  every frozen constant (bracket, SR0, z1, the contested z2=1.662107 joint-alpha boundary, kill_switch
  threshold, power) recomputes exactly under scipy, the bootstrap/HAC/seed/p-value machinery faithfully
  mirrors the pinned reality_check.py r5a/r5c paths, the selection-absorption mechanism satisfies the R5
  BINDING forking-paths rule, the decision map is complete and terminal with machine-checkable VOID
  conditions, the kill_switch_threshold field parses for the pre-commit hook, and the calendar arithmetic is
  consistent. The honest disclosure of ~34% terminal power and most-likely wind-down is exactly the posture a
  confirmatory kill test should take. The no-capital constraint is respected throughout.

  Three conditions block freeze:

  (1) F-001 (blocking) — the central spec-vs-source drift. Section 2.2 pins min_carry=-0.10 from the config and
  claims the structure is tested AS-IS, but the k* cell that WON the R5 argmax ran with min_carry=-inf,
  because the R5 STEP-4 runner passed no variant_params and min_carry is not a _VARIANT_EXEC field — the
  strategy default (-inf) governed. target_vol and vol_window coincide with defaults and are safe; min_carry
  does not. A confirmatory runner that reads -0.10 from the config tests a (marginally) different structure
  than the survivor, and VOID condition 1 cannot catch it because the runner is faithfully executing the
  mis-stated pin. Fix the pin to record the EFFECTIVE config the k* cell actually ran (min_carry=-inf, or
  prove byte-identical series on a shared sub-window per Section 2.3(b)).

  (2) F-002 (major) — the operative look rule (bootstrap-p <= incremental-spend, per look) is asserted
  'equivalent' to the joint bivariate z-boundary z2=1.662107, but the two coincide only if the bootstrap look
  statistics realize the rho=sqrt(0.5) joint design; the look-2 series contains the look-1 series, so the
  correlation exists but the bootstrap-p-vs-incremental-spend construction does not encode it. The
  family-wise alpha control of the OPERATIVE rule is therefore unproven. Close with a short derivation or
  re-state z2 as the operative boundary.

  (3) F-003 (major) — cut_freeze_receipt.py is hardcoded to R5 (paths, seed, N, SR0, B) and cannot produce the
  confirmatory receipt; the look-runner does not exist yet. The freeze step is not executable as written. A
  new/parameterized receipt-cutting mechanism (with master_seed=924289, N_conf=6, look schedule fields) is a
  precondition for freeze.

  Major F-004 (forward provenance upper-bound 245 can HALT a legitimate future bar) and minor F-005/F-006
  (post-freeze receipt-write tension; DSR N=6 plumbing) should be addressed before freeze but do not, alone,
  block. F-007 (N_conf=6 election) and F-008 ('bit-for-bit' overstatement) are acceptable as-is / cosmetic.

  This is a high-quality, internally-honest pre-registration with one real structure-drift, one unproven
  equivalence claim, and one non-executable freeze tool. None require rethinking the design; all are
  correctable. Route F-001/F-004/F-005 to HoQR, F-002/F-007/F-008 to the Mathematician, F-003/F-006 to QD.
  Re-review the corrected Section 2.2 pin and the F-002 derivation before consensus + freeze.

