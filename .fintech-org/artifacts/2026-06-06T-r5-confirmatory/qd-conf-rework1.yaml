r5_freeze_reasoning: |
  The R5 pre-registration's §1.3 "pinned-objects" clause binds the RECEIPT to the frozen
  commit 350cbd4 — specifically, it ensures the R5 STEP-4 bootstrap ran against the code
  committed at 350cbd4, and the receipt records that commit hash. The clause does NOT bind
  the script source file cut_freeze_receipt.py to that commit. The script is a generator
  tool, not a frozen artifact. The R5 receipt (already written at frozen_at_utc
  2026-06-06T04:00:08.854752+00:00 with code_commit=350cbd4b592485f3bd935ec414ee007e63879de5)
  is immutable and self-contained on disk. Evolving cut_freeze_receipt.py to accept new
  --target options DOES NOT void the already-cut R5 receipt because:
    (a) The R5 receipt's integrity guarantee rests on the SHA-256 of the R5 pre-reg file
        matching receipt.prereg_sha256 and receipt.code_commit == 350cbd4; neither changes
        when the script source evolves.
    (b) The write-once refusal is per-target: --target r5 --cut still REFUSES (verified),
        so no accidental R5 re-freeze is possible.
    (c) The R5 STEP-4 run has already executed; the §1.3 enforcement is historical, not
        ongoing. A new target in the script does not retroactively change what was run.
  For consensus: the R5 receipt is FROZEN; the script evolution for new targets is SAFE.

