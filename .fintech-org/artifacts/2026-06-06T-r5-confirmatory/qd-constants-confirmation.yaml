body: |
  QD scipy confirmation of the four quantities routed from the Mathematician.

  STEP 1 (SR0 bracket): All values confirmed within 0.06% of hand arithmetic.
  The only sub-0.5% discrepancy is in z_arg2 (Z⁻¹(1−1/(6e))): scipy gives 1.543843 vs
  hand 1.542968 (Δ=+0.000875, 0.057%). This flows to bracket_6 (+0.000492), sr0_ann
  (+0.000211), and sr0_pp (+0.000013) — all within 0.04%. Rounding in hand arithmetic
  at the arg2 computation step. Scipy values are exact.

  STEP 2 (OBF boundaries): z1=2.537988 confirmed (hand 2.539, Δ=−0.001012, 0.040%).
  Spending function α*(t=0.5)=0.005575 confirmed (hand 0.005578, 0.061%). z2=1.662107
  by bivariate joint solve — diverges from hand value 1.687 by 1.48% (FLAGGED). The
  bivariate solve is triple-verified (scipy CDF, dblquad, 5M MC). The Mathematician's
  1.687 is conservative relative to the stated criterion P(Z1≥z1 OR Z2≥z2)=0.05;
  it achieves only α≈0.0477 joint type-I. z2=1.662107 achieves exactly 0.0500.

  STEP 3 (kill_switch_threshold): 1.2906 (4dp), 1.290641 (6dp). Hand value 1.291 confirmed
  to within 0.028%. The two-pass solve in the spec converges to the same fixed point as
  the brentq bisect (the bisect achieves 12-figure convergence vs ~6 for two-pass).
  DSR at threshold = 0.950000 exactly — solve is exact.

  STEP 4 (power): Single-look power 0.336 (hand: 0.327) — the 2.9% divergence flows
  entirely from z2 being 1.662 vs 1.687. Two-look joint power 0.340. Both confirm the
  design is severely underpowered (~33-34%) at SR_plan=0.554. The "approximately 33%"
  disclosure is directionally robust. If the Mathematician's z2=1.687 is retained
  (conservative direction), power would be lower (~0.327), making the kill outcome
  even more likely — safe-if-wrong for a kill test.

  STEP 5 (sanity): Φ⁻¹(0.95)=1.644854 confirmed exactly.

  RECOMMENDATION: Freeze the scipy-exact values for all quantities except z2, which
  requires Mathematician adjudication on the boundary convention. Using z2=1.662107
  (exact joint criterion) maximises type-I control fidelity; using z2=1.687 (conservative)
  is safe-if-wrong for a kill test but does not satisfy the stated P(Z1≥z1 OR Z2≥z2)=0.05
  criterion exactly.

