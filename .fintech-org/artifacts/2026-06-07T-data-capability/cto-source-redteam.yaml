    verdict: Some FX data back to 2002; depth not uniformly guaranteed
    evidence: 'Saxo developer docs explicitly state ''some Forex data dating back as long as 2002.'' This implies depth varies
      by pair — it is NOT a guarantee that all 12 pairs have 2002-depth. Assume EURUSD/GBPUSD/USDJPY reach 2002-2005; crosses
      may be shorter. Must be verified per pair via API query.

      '
    verified_via: https://www.developer.saxo/openapi/learn/chart
  critical_constraint:
    max_count_per_request: 1200
    evidence: 'Search result confirms: ''The /chart/v1/charts/ endpoint is limited to 1200 datapoints per request (if available).''

      '
    bulk_backfill_feasibility: 'FEASIBLE but requires pagination. At 1h frequency for 15+ years: ~15yr × 252 trading days
      × ~17h FX active hours = ~64,260 hourly bars → ~54 paginated requests per pair. At 15m: ~216 requests per pair. For
      12 pairs: ~648 (1h) to ~2,592 (15m) API requests total. At reasonable rate limits this is a few hours of sequential
      polling. The 24h token expiry (verified: Saxo tokens are 24h TTL) means bulk backfill must complete within one token
      lifecycle OR implement token refresh — this is the primary operational friction.

      '
    verified_via:
    - https://www.developer.saxo/openapi/referencedocs/chart/v3/charts/get__chart (search result)
    - 'memory: Saxo OAuth tokens are 24h TTL — confirmed in firm memory'
  volume_availability: Bid and Ask OHLC are both provided. No exchange volume — tick count proxy only.
  cost: No additional cost — firm has existing Saxo Bank account. API access included.
  license: 'First-party data from the firm''s own broker account. Suitable for internal backtest and research use. NOT suitable
    for redistribution. This is the cleanest license posture for proprietary strategy development.

    '
  ingest_effort:
    schema: OHLC + bid/ask variants, UTC timestamps (Saxo uses UTC)
    tz: UTC — lower tz risk than HistData (no DST conversion needed)
    effort: 'MODERATE. Requires: OAuth token management (24h refresh), UIC lookup per pair, paginated request loop, OHLC extraction
      from JSON response, write to parquet. ~300-500 LOC. The existing Saxo API infrastructure (references/saxo-bank-api-research.md)
      is a head start. Key friction: token management for a multi-hour bulk pull.

      '
    precedent: Saxo API is already known to the firm (account + research notes exist).
  redteam_risks:
  - risk: 24h token expiry creates bulk-backfill operational hazard
    detail: 'A bulk historical pull for all 12 pairs × 15+ years at 15m resolution may take multiple hours. If the token expires
      mid-pull, the job fails and must be restarted. The fix is a token-refresh loop (Saxo supports refresh tokens) but this
      adds implementation complexity. This is LOW SEVERITY if refresh tokens are implemented, HIGH SEVERITY if they are not.
      verified_via: "firm memory: ''Saxo tokens are 24h TTL''"

      '
    severity: MEDIUM (addressable)
  - risk: History depth varies by pair — not a uniform guarantee
    detail: '''Some FX data back to 2002'' does not mean all 12 pairs. JPY crosses added to Saxo''s platform later may have
      shorter history. Verify per pair before planning a backtest window.

      '
    severity: MEDIUM
  - risk: Saxo's feed = Saxo execution data — good for strategy validation, not universal
    detail: 'Saxo bars reflect Saxo''s own liquidity pool. For strategies the firm plans to run on Saxo (the likely execution
      venue), this is a FEATURE not a bug — backtest data matches live execution venue. If the firm ever moves to another
      broker, data provenance would need to be revisited.

      '
    severity: LOW (actually a feature for this firm)
  - risk: API terms of service for derived backtest outputs
    detail: 'Using Saxo API data to generate internal backtest results for a trading strategy is standard account use. However
      if outputs are published externally, check Saxo''s API ToS for data redistribution clauses.

      '
    severity: LOW
