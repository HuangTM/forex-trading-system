requirement:
  target_frequency: 1h and/or 15m OHLCV bars for all 12 pairs
  pairs:
  - AUDJPY
  - AUDUSD
  - CADJPY
  - EURGBP
  - EURJPY
  - EURUSD
  - GBPJPY
  - GBPUSD
  - NZDJPY
  - NZDUSD
  - USDCAD
  - USDJPY
  current_state: 'Daily bars for all 12 pairs (~2010-01 to 2026-04). 4h bars for only 3 pairs (EURUSD, GBPUSD, USDJPY). Zero
    volume data (FX has no central exchange volume — see note). Confirmable-strategy validation requires ~3-5 years OOS at
    daily frequency.

    '
  why: 'Adding 1h bars multiplies available bars ~24x vs daily; 15m adds ~96x. This brings per-strategy validation timelines
    under ~2 years for sufficiently frequent signals, breaking the current confirmability wall.

    '
  volume_note: 'Real FX spot has NO central exchange volume. Any "volume" column from a broker or data vendor is that venue''s
    tick-count or notional traded — a proxy, not exchange volume. This is true across ALL sources evaluated. Flag this honestly
    in any intraday strategy that incorporates volume.

    '
  honest_caveat_intraday_is_new_design_space: 'CRITICAL — READ BEFORE ANY INTRADAY WORK BEGINS.

    Acquiring intraday data does NOT validate the firm''s existing daily-bar hypotheses. An intraday signal is a DIFFERENT
    strategy with its own per-event Sharpe, its own design phase, its own NHT pre-registration, and its own OOS test. This
    acquisition unlocks a NEW design space that must be generated and screened from scratch, starting at QRB-0.

    It does not compress the validation timeline for daily strategies. It does not constitute confirmation of any current
    hypothesis. The QRB-6 CB-calendar event study is a daily-bar strategy. Intraday data acquisition is orthogonal to it —
    a parallel research track, not a shortcut through the current pipeline.

    Any internal communication, plan, or strategy doc that implies otherwise must be corrected before work proceeds.

    '
source_options:
- name: Dukascopy Bank — Historical Data Export (free)
  tier: free
  pairs_covered:
    verdict: LIKELY FULL 12 — verified partial, hedged on crosses
    evidence: 'Dukascopy documentation states 1600+ instruments including all major forex pairs (EURUSD, GBPUSD, USDJPY, USDCHF,
      AUDUSD, USDCAD, NZDUSD) plus crosses and minors. The dukascopy-node tool confirms "Forex major currencies" category.
      Majors (EURUSD, GBPUSD, USDJPY, AUDUSD, USDCAD) are confirmed; JPY crosses (AUDJPY, CADJPY, GBPJPY, EURJPY, NZDJPY)
      and EURGBP/NZDUSD likely included but not individually verified per pair via web fetch (Dukascopy tool requires browser
      interaction to enumerate pair-level dates). Hedge: verify CADJPY, NZDJPY by programmatically querying the download endpoint
      before relying on them.

      '
    verified_via:
    - https://www.dukascopy.com/swiss/english/marketwatch/historical/
    - https://www.dukascopy-node.app/
    - https://github.com/Leo4815162342/dukascopy-node
  frequencies_available:
  - tick
  - 1m
  - 1h
  - daily
  - monthly
  frequency_note: 'Tick, 1-minute, hourly, daily, monthly confirmed via dukascopy-node docs. 15m is NOT explicitly listed
    as a native download frequency — would need to be resampled from 1m ticks or 1m bars. The dukascopy-node CLI supports
    custom aggregation but this should be verified before relying on it. verified_via: "https://www.dukascopy-node.app/ —
    ''Tick, minutely, hourly, daily, monthly''"

    '
  history_depth:
    verdict: ~2003-2007 for most pairs; some instruments to 1990
    evidence: 'dukascopy-node docs: ''Historical data from 1990-2000 to the present day.'' Blue Capital Trading confirms:
      ''extends to 2003-2007 for most pairs.'' Specific per-pair start dates require querying the API tool directly (Tickstory
      page returned 403 Forbidden). Assume ~2004 for JPY crosses as a conservative hedge; verify before committing to a required
      history window.

      '
    verified_via:
    - https://www.dukascopy-node.app/
    - https://www.bluecapitaltrading.com/products/free-historical-data/
  volume_availability: Tick count proxy only — not exchange volume. See requirement.volume_note.
  cost: Free. No registration required for the HTTP data export endpoint.
  license: 'Data is described as free for research/download use. No explicit commercial license restriction found in web research.
    Hedge: the firm should review Dukascopy''s Terms of Service before publishing any strategy that relies on this data, particularly
    if the firm moves to a regulated structure.

    '
  ingest_effort:
    schema: 'CSV: timestamp, open, high, low, close, volume (tick count)'
    tz: UTC (verified by dukascopy-node community documentation — but TZ MUST be tested)
    effort: 'MODERATE. The dukascopy-node CLI can download directly to CSV/JSON. A Python wrapper (duka, or dukascopy-node
      via subprocess) can automate pair/date-range loops. The firm''s existing parquet pipeline (data/processed/{PAIR}_{freq}.parquet)
      needs a new loader tier for 1h/15m. This is ~200-400 LOC of new ingestion code + provenance metadata + QC tests — comparable
      scope to the QRB-6 CB-calendar data tier. 15m will require resample from 1m: add ~50 LOC.

      '
    precedent: QRB-6 CB-calendar tier is the architectural precedent.
  redteam_risks:
  - risk: 'TZ/timestamp correctness — #1 ingest risk'
    detail: 'The QRB-6 confirmatory trial was voided by a timezone bug. Dukascopy timestamps must be verified UTC-correct
      before any bars are stored. The dukascopy-node tool claims UTC output but this MUST be spot-checked against a known
      market event (e.g., NFP release time on a Friday bar) before bulk ingest. A wrong tz assumption silently misaligns signals.

      '
    severity: BLOCKING_GATE
  - risk: Cross-pair coverage gaps for obscure JPY crosses
    detail: 'CADJPY, NZDJPY coverage start dates are unverified. If Dukascopy starts these pairs later than 2010 the firm''s
      daily baseline comparison window is broken. Verify start dates programmatically on Day 1 of any ingest sprint.

      '
    severity: HIGH
  - risk: 15m not a native frequency
    detail: 'No documented 15m bar download. Resampling from 1m adds complexity and an OHLC resampling correctness requirement
      (open=first, high=max, low=min, close=last, aggregating tick-count volume). The no-lookahead invariant must be re-validated
      after any resample.

      '
    severity: MEDIUM
  - risk: Broker-venue data, not ECN composite
    detail: 'Dukascopy data reflects their own platform''s bid/ask feed. Spreads and liquidity may differ from live Saxo execution.
      For backtest cost modeling, the firm should cross-check spreads against Saxo''s actual pair spread parameters already
      in config/default.yaml.

      '
    severity: LOW
- name: HistData.com — 1-Minute Bar Data (free)
  tier: free
  pairs_covered:
    verdict: 66 forex pairs — likely covers all 12 target pairs but not individually confirmed
    evidence: 'HistData.com states 66 forex pairs including major pairs and crosses. The FAQ shows EURUSD and AUDCAD examples;
      other search results confirm EUR/USD, GBP/USD, USD/JPY, USD/CAD, AUD/USD, EUR/JPY, EUR/GBP are listed. NZDJPY and NZDUSD
      are the least certain — ''NZD crosses'' are implied by 66-pair coverage but not individually named in web results. Hedge:
      check the download page pair list before relying on NZD pairs.

      '
    verified_via:
    - https://www.histdata.com/f-a-q/data-files-detailed-specification/
    - https://newyorkcityservers.com/blog/top-12-sources-to-download-forex-historical-data-free-paid
  frequencies_available:
  - 1m
  - tick
  frequency_note: 'M1 (1-minute bar) and Tick data are the native formats. No native 1h or 15m — both would require resampling
    from 1m, same resample note as Dukascopy. verified_via: "https://www.histdata.com/f-a-q/data-files-detailed-specification/"

    '
  history_depth:
    verdict: ~2000 for major pairs; examples show data from Feb 2012 in docs
    evidence: 'HistData.com FAQ examples reference files from 2012 but state data organized by forex-pair/year/month with
      long history. GitHub mirror (philipperemy/FX-1-Minute-Data) confirms long history for EURUSD and major pairs. Exact
      per-pair start years not individually confirmed in web fetch — hedge to 2004-2008 for crosses.

      '
    verified_via: https://www.histdata.com/f-a-q/data-files-detailed-specification/
  volume_availability: 'YES — volume column present in all formats (confirmed in FAQ). However this is trade count/tick-count
    at the HistData venue, not central exchange volume. Same caveat as all FX sources.

    '
  cost: Free. ZIP archives downloadable without registration.
  license: 'UNVERIFIED. The FAQ states ''use the data at your own will and risk'' with no explicit warranty or certification.
    No commercial license or research use restriction found in web research, but the Terms of Service page was not fetched.
    The firm MUST review HistData''s ToS before any publication or commercial use. This is a risk gate. verified_via: "https://www.histdata.com/f-a-q/data-files-detailed-specification/"

    '
  ingest_effort:
    schema: 'Generic ASCII: DateTime;Open;High;Low;Close;Volume All dates in Eastern Standard Time WITHOUT daylight saving
      adjustments. THIS IS A CRITICAL TZ HAZARD — see redteam_risks.

      '
    tz: EST fixed (no DST) — NOT UTC. REQUIRES conversion.
    effort: 'MODERATE-HIGH. The EST-no-DST timestamp format is a non-standard offset that requires careful conversion: EST
      = UTC-5 always. No DST adjustment means US summer hours will be UTC-4 in reality but stored as UTC-5 in the file — this
      creates a systematic 1-hour misalignment during DST months if naively converted. The firm''s pipeline uses UTC throughout;
      a bespoke parser with this edge case handled correctly is mandatory. Budget ~100-200 LOC extra beyond Dukascopy for
      correct tz handling.

      '
    precedent: More effort than Dukascopy due to non-standard tz format.
  redteam_risks:
  - risk: 'EST-no-DST timestamp — #1 risk, confirmed BLOCKING'
    detail: 'Confirmed by HistData FAQ: ''Eastern Standard Time (EST) time-zone WITHOUT Day Light Savings adjustments.'' This
      means during US DST (March-November), a naive UTC conversion (UTC = EST + 5h) will be wrong by 1 hour. Any FX signal
      that relies on intraday timing (e.g., London open, NY close, CB announcement) will be silently misaligned for ~8 months
      of the year. This is a worse tz risk than a simple offset error — it is time-varying and likely to pass unit tests that
      only check non-DST months. This risk is HIGH SEVERITY and must be a red gate before any intraday strategy uses HistData
      bars.

      '
    severity: BLOCKING_GATE
  - risk: License ambiguity
    detail: 'No explicit research-use license grant found. ToS review is required before storing or publishing derived work.

      '
    severity: MEDIUM
  - risk: No native 1h/15m — resample required
    detail: 'Same resample correctness burden as Dukascopy.

      '
    severity: MEDIUM
  - risk: Single-venue bid/ask midpoint
    detail: 'Source and venue not disclosed on the public site. Data quality is generally considered good by the community
      but provenance is less transparent than Dukascopy (which identifies the source as their own bank feed).

      '
    severity: LOW
- name: TrueFX — Tick Data (free, registration required)
  tier: free
  pairs_covered:
    verdict: 16+ major pairs — likely covers most of the 12 but NZD/CAD crosses uncertain
    evidence: 'TrueFX states ''16+ major currency pairs with tick-by-tick market data.'' The firm''s 12 pairs include some
      crosses (AUDJPY, CADJPY, GBPJPY, EURJPY, NZDJPY) that may not be in TrueFX''s 16-pair list which focuses on majors and
      common crosses. EURUSD, GBPUSD, USDJPY, AUDUSD, USDCAD, NZDUSD, EURGBP, EURJPY likely covered; AUDJPY, CADJPY, GBPJPY,
      NZDJPY are uncertain. Full pair list requires registering and accessing the download portal.

      '
    verified_via:
    - https://www.truefx.com/
    - https://newyorkcityservers.com/blog/top-12-sources-to-download-forex-historical-data-free-paid
  frequencies_available:
  - tick
  frequency_note: 'Tick-by-tick only with millisecond timestamps. No pre-aggregated bars. 1m/1h/15m bars must be built from
    tick data — higher processing burden but richest raw source for spread analysis. verified_via: "https://www.truefx.com/truefx-historical-downloads/"

    '
  history_depth:
    verdict: Since May 2009
    evidence: 'Multiple sources confirm data available ''since May 2009.'' This covers the firm''s current 2010-2026 window
      with 1 year of additional pre-history. verified_via: "https://newyorkcityservers.com/blog/top-12-sources-to-download-forex-historical-data-free-paid"

      '
  volume_availability: 'No volume column — tick data contains only timestamp, bid, ask. Tick count per bar can be computed
    during aggregation as a proxy.

    '
  cost: Free. Registration required (free account).
  license: 'Data described as ''indicative, not executable.'' Sourced from Integral OCX (institutional ECN). Explicitly listed
    as suitable for ''historic back-testing'' in TrueFX FAQ. This is the clearest research-use license endorsement of all
    free sources evaluated. verified_via: "https://www.truefx.com/truefx-market-data-faq/"

    '
  ingest_effort:
    schema: 'CSV: CurrencyPair,Timestamp,Bid,Ask (no header, no OHLC)'
    tz: UTC (millisecond timestamps) — community-confirmed, must be spot-checked
    effort: 'HIGH. Tick data requires aggregation to OHLC bars before the firm''s pipeline can consume it. A correct tick-to-bar
      aggregator must handle: bid/ask → midpoint or bid-only selection, OHLC bar construction, timestamp binning at bar boundaries
      (no lookahead in aggregation), and gap handling for weekends/holidays. This is the largest ingest effort of the free
      options — likely 400-600 LOC including tests. Upside: tick data can produce any bar frequency, and spread data is available
      for cost-model calibration.

      '
    precedent: No direct precedent in firm's codebase — new aggregation tier required.
  redteam_risks:
  - risk: Pair coverage gap for JPY crosses
    detail: 'TrueFX focuses on 16 ''major'' pairs. CADJPY, NZDJPY, AUDJPY, GBPJPY may not be included. If even 2-3 of the
      12 target pairs are missing, TrueFX cannot be the sole source — it would need to be combined with Dukascopy.

      '
    severity: HIGH
  - risk: Registration required — account dependency
    detail: 'Download access requires a TrueFX account. If TrueFX changes its free tier policy or the service is discontinued,
      historical data access is cut off with no automated fallback.

      '
    severity: MEDIUM
  - risk: Tick aggregation complexity — correctness risk
    detail: 'Building OHLC bars from ticks introduces multiple correctness hazards: bar boundary alignment (which tick goes
      in which bar), bid/ask choice (use mid, bid, or ask for OHLC?), volume proxy definition. Each choice must be documented
      as a strategy design decision, not an implementation default. Any inconsistency between backtest and forward period
      will invalidate OOS comparisons.

      '
    severity: MEDIUM
  - risk: History starts 2009 — short for pre-2009 analysis
    detail: 'If a strategy requires pre-2009 data (e.g., GFC period), TrueFX is insufficient. Dukascopy reaches 2003-2007
      and is the better choice for longer history windows.

      '
    severity: LOW
