  detail: 'Before any intraday bar is written to parquet, a spot-check test must confirm a known market event (e.g., 2020-01-10
    NFP at 13:30 UTC) maps to the correct bar. This is a HARD BLOCK — no strategy work begins until this test is green.

    '
- condition: 12-pair coverage completeness verified
  detail: 'All 12 target pairs must be enumerated from the chosen source with their actual start dates recorded in provenance
    metadata. Any gap must be documented and a fallback source identified before strategy design begins.

