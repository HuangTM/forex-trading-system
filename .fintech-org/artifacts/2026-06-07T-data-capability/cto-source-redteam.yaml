architectural_assessment:
  current_pipeline_state: 'data/processed/{PAIR}_{daily,4h}.parquet — daily for all 12 pairs, 4h for EURUSD/GBPUSD/USDJPY
    only. Validated by 6 OHLCV quality checks in data/ module. The no-lookahead guarantee (entry_delay_bars=1) is validated
    by a sacred test in tests/backtest/test_engine.py.

    '
  ingest_lift_to_add_1h_15m_tier:
    estimate: MODERATE — 2-4 week engineering sprint for a single source
    steps:
      1: 'New data loader: src/forex_system/data/loaders/dukascopy.py (or saxo.py) — fetches, validates schema, writes to
        data/raw/{PAIR}/{PAIR}_{1h,15m}.csv

        '
      2: 'New parquet writer tier: data/processed/{PAIR}_1h.parquet and data/processed/{PAIR}_15m.parquet — following existing
        Parquet I/O patterns in data/ module

        '
      3: 'OHLCV validation extension: existing 6 quality checks must run on intraday bars; bar-boundary alignment check is
        a NEW check required (intraday bars can have gaps at weekends/sessions that are normal, unlike daily which has clean
        calendar gaps)

        '
      4: 'TZ correctness test: a hard-coded spot-check test that asserts a known market event (e.g., 2020-03-05 NFP release
        at 13:30 UTC) appears in the correct bar. THIS IS THE #1 INGEST GATE — the QRB-6 tz void makes this non-negotiable.

        '
      5: '15m resample (if source is 1m): add resample.py utility with verified OHLC aggregation logic — open=first, high=max,
        low=min, close=last, volume=sum

        '
      6: 'features/registry.py: no changes needed — indicator naming {type}_{params} is frequency-agnostic. Strategy classes
        receive the bar DataFrame; intraday bars are a config-level parameter selection.

        '
      7: 'New tests: test_intraday_no_lookahead (equivalent of sacred test at 1h/15m), test_tz_correct (spot-check), test_15m_resample_ohlc_correctness,
        test_pair_coverage_completeness (all 12 pairs present for full date range)

        '
  precedent_for_new_data_tier: 'QRB-6 CB-calendar tier (842 dates, per-date verification grades, anti-fabrication hold) is
    the firm''s reference for adding a new data source with full provenance and quality gates. The intraday tier should follow
    the same pattern: provenance metadata file per source, verification grade per pair, anti-fabrication spot-check before
    any strategy uses the data.

    '
  no_lookahead_preservation: 'The no-lookahead guarantee (test_no_lookahead) operates at the strategy signal layer — signals
    at bar N execute at bar N+1 via entry_delay_bars. This guarantee is frequency-agnostic if the bar DataFrame index is correct.
    However: at 1h/15m resolution, ''bar N'' is an intraday bar. The firm must explicitly document that entry_delay_bars=1
    means ''next bar'' — i.e., a 1h signal fires at the OPEN of the next 1h bar, not the next calendar day. This semantic
    must be tested explicitly.

    '
  top_1_ingest_risk: 'TIMEZONE CORRECTNESS. The QRB-6 confirmatory trial was voided due to a timezone alignment bug. For intraday
    data, tz errors that are 1 hour off silently misalign signals at every session boundary. The HistData EST-no-DST format
    is the worst case (time-varying offset); Dukascopy and Saxo are UTC-native (better). Regardless of source, the tz spot-check
    test (Step 4 above) is a HARD GATE before any strategy uses intraday bars. This is not optional.

    '
recommendation:
  ranked:
    1:
      source: Dukascopy (free, open HTTP endpoint)
      basis: 'Deepest free history (~2003-2007), all target frequencies including 1h as a native download (no resample needed
        for 1h strategies), 1600+ instruments making all 12 pairs likely covered, UTC timestamps (lower tz risk than HistData),
        well-supported by multiple open-source Python tools (dukascopy-node, duka). The firm gets ~20 years of 1h bars for
        confirmed pairs — far more than needed for the 2yr-to-validate target. Best combination of depth, coverage, and ingest
        effort for backtest.

        '
      caveat: Verify CADJPY, NZDJPY pair availability and start dates on Day 1. TZ spot-check mandatory.
    2:
      source: Saxo Bank OpenAPI (first-party, firm account)
      basis: 'First-party data from the firm''s own execution venue — the gold standard for strategy validation because backtest
        data matches live execution. 15m and 1h both natively available. Authenticated access already established. Best choice
        for FORWARD DATA / paper trading canary (real-time bars) and for cross-validation of Dukascopy backtest results on
        the overlapping period. Limited to 1200 bars/request requiring pagination but feasible (~648-2592 requests for full
        12-pair backfill). 24h token TTL is the only friction — addressable with refresh token logic.

        '
      caveat: 'Secondary to Dukascopy for historical depth due to 1200-bar pagination overhead and token management. PRIMARY
        recommendation for forward/live data and cross-validation. Do NOT use as sole backtest source until per-pair history
        depth is verified (some pairs may not reach 2010).

        '
    3:
      source: TrueFX (free, tick data, registration required)
      basis: 'Clearest research-use license endorsement of the free sources. Institutional ECN source (Integral OCX). Millisecond
        tick timestamps allow custom bar construction at any frequency. History since 2009. Best source for spread-modeling
        calibration (bid/ask ticks). Recommend as a SUPPLEMENTARY source for spread data and for verifying Dukascopy OHLC
        quality against an independent tick source.

        '
      caveat: 'JPY cross coverage uncertain — verify before relying on it for AUDJPY/CADJPY/GBPJPY/NZDJPY. Do not use as primary
        source unless Dukascopy fails pair-coverage verification.

        '
    4:
      source: HistData.com (free, 1m bars)
      basis: 'Widely used, 66 pairs, long history. However, the EST-no-DST timestamp format is a CONFIRMED BLOCKING risk that
        adds ingest complexity and the highest tz error probability of all evaluated sources. Recommend only as a FALLBACK
        if Dukascopy has pair-coverage gaps. The tz parser must be independently tested before any bar is stored.

        '
      caveat: EST-no-DST is a blocking ingest risk. ToS verification also pending.
    5:
      source: Polygon.io (paid)
      basis: 'Clean API, good SLA, all 12 pairs confirmed. But cost is unjustified when Dukascopy and Saxo cover the same
        use case for free. Consider only if free sources prove unreliable after quality checks, or if the firm needs guaranteed
        SLA for production data feeds.

        '
      caveat: Pricing not fully verified — check massive.com/pricing before budgeting.
    6:
      source: Databento (paid)
      basis: 'DOES NOT RECOMMEND for current use case. Databento''s strength is exchange-traded FX futures, not spot FX. This
        firm currently operates on spot FX (Saxo account, existing backtest). Instrument mismatch makes Databento a poor fit
        at $199+/month.

        '
      caveat: Reconsider only if firm explicitly pivots to FX futures strategy research.
  top_pick: Dukascopy (historical backtest) + Saxo API (forward/cross-validation)
  top_pick_basis: 'Dukascopy provides the deepest free tick/1m/1h data for backtest. Saxo API provides first-party live data
    from the firm''s own execution venue for forward testing and cross-validation. Together they form a complete data stack:
    historical confirmation + live canary feed. Both are zero marginal cost given existing firm infrastructure.

    '
failure_modes_considered:
  1:
    scenario: Timezone misalignment silently corrupts all intraday bars
    likelihood: HIGH (given QRB-6 void precedent)
    consequence: 'Every intraday strategy backtested on corrupted bars produces false signal alignments. NHT results are invalid.
      Months of research effort is wasted. This is the exact failure mode that voided the QRB-6 confirmatory trial.

      '
    mitigation: 'Hard gate: TZ spot-check test (known market event at known UTC time maps to correct bar) must PASS before
      any bar is stored in parquet. Recommended event: 2020-01-10 US NFP release at 13:30:00 UTC — should appear in the 13:00-14:00
      UTC hourly bar.

      '
    addressed_in_plan: true
  2:
    scenario: Dukascopy missing 2-3 JPY cross pairs — design assumes full 12-pair coverage
    likelihood: MEDIUM
    consequence: 'Any intraday strategy designed around all 12 pairs silently trains/tests on an incomplete universe. Portfolio-level
      metrics are wrong. A strategy that appears diversified is actually concentrated.

      '
    mitigation: 'Day-1 pair enumeration check: programmatically query the Dukascopy download endpoint for all 12 pairs and
      record earliest available date. If a pair is missing or starts later than 2012, fallback to TrueFX for that pair. Document
      any pair gaps in provenance metadata.

      '
    addressed_in_plan: YES (as caveat in recommendation)
  3:
    scenario: No-lookahead invariant broken for intraday bars due to semantic ambiguity
    likelihood: MEDIUM
    consequence: 'Backtest shows spuriously high Sharpe on intraday strategies. OOS test fails to replicate. Sacred test test_no_lookahead
      passes (it tests daily bars) while intraday lookahead is undetected. The firm pre-registers an NHT trial on a contaminated
      hypothesis.

      '
    mitigation: 'New test: test_intraday_no_lookahead — same oracle pattern as the sacred test but at 1h and 15m resolution.
      Explicitly document that entry_delay_bars=1 means ''next BAR (not next day)'' in the strategy config for intraday frequencies.

      '
    addressed_in_plan: true
  4:
    scenario: Saxo token expires mid-bulk-backfill — incomplete parquet files
    likelihood: LOW-MEDIUM (24h token, multi-hour pull)
    consequence: 'Partial bar history is silently treated as complete. Strategies trained on the incomplete period produce
      biased results. The missing bars may be exactly the high-volatility or event-rich periods that matter most.

      '
    mitigation: 'Implement idempotent paginated downloader with checkpointing: record last successfully downloaded date per
      pair per frequency. On restart, resume from checkpoint. Validate parquet completeness (bar count vs expected calendar
      count) as a post-ingest check.

      '
    addressed_in_plan: YES (in ingest_effort notes)
  5:
    scenario: CEO approves intraday acquisition and team pivots to intraday — existing daily pipeline deferred, QRB-6 confirmatory
      stalls
    likelihood: MEDIUM (shiny-object risk)
    consequence: 'The firm''s current R5/QRB-6 confirmatory research track (with binding NHT conditions and a pre-registered
      trial) is deprioritized. Intraday is a NEW design space requiring QRB-0 restart. Six months later the firm has no confirmed
      alpha and the QRB-6 window has passed.

      '
    mitigation: 'The honest caveat in requirement.honest_caveat_intraday_is_new_design_space is the primary defense. CEO should
      treat intraday data acquisition as a parallel track with its own resource allocation — not a replacement for the current
      pipeline. CTO recommends no more than 20% capacity on intraday data infrastructure while QRB-6 confirmatory is active.

      '
    addressed_in_plan: YES (prominent honest caveat)
conditions:
