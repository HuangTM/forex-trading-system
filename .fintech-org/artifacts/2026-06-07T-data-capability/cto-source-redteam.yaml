- condition: License review complete
  detail: 'For HistData: ToS must be reviewed. For Dukascopy: Terms confirm research use. For Saxo: internal use confirmed
    by account ToS. No strategy results derived from unclear-license data are published or shared externally.

    '
- condition: No-lookahead test extended to intraday resolution
  detail: 'test_intraday_no_lookahead at 1h and 15m must be written and passing before any intraday strategy enters NHT pre-registration.

    '
- condition: QRB-6 confirmatory is not deprioritized
  detail: 'Intraday data acquisition is a parallel track. The CRO/CTO must confirm that QRB-6 confirmatory NHT conditions
    remain binding and on schedule before any intraday sprint begins. Resource allocation must be explicit.

    '
