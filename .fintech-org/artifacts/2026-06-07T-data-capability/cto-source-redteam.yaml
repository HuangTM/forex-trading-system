body: 'This artifact scopes the data-capability acquisition needed to break the firm''s confirmability wall. Six sources were
  evaluated and red-teamed via live web verification. The top recommendation is Dukascopy (free, deep history, 1h native)
  for historical backtest combined with Saxo API (first-party, 15m/1h, forward-safe) for cross-validation and forward data.
  HistData is a viable fallback but its EST-no-DST timestamp format is a confirmed BLOCKING risk requiring dedicated parser
  work. TrueFX is the best supplementary source for spread data and license clarity. Polygon and Databento are not cost-justified
  for this firm''s current spot-FX mandate.

  The #1 ingest risk across all sources is timezone correctness. A hard gate (TZ spot-check test) must pass before any intraday
  bar enters the parquet pipeline. This is non-negotiable given the QRB-6 tz-void precedent.

  The honest caveat is repeated here: intraday data acquisition does NOT validate any existing daily strategy. It opens a
  new design space requiring full QRB-0 restart. CEO must explicitly authorize the intraday track as parallel to — not replacing
  — the current QRB-6 confirmatory pipeline.

  '
