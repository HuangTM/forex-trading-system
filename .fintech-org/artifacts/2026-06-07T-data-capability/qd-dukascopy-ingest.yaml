    in PROVENANCE.md.

deviations_from_instructions:
  - item: Raw TLS socket instead of requests library
    reason: >
      requests.get() times out against datafeed.dukascopy.com in this environment.
      Raw ssl+socket achieves identical semantics (HTTP/1.1 GET over TLS) and the
      proof pull completed successfully.  The script comment documents this and
      suggests requests.get(url).content as a substitute in normal environments.
  - item: OHLC computed from mid-price (not bid or ask separately)
    reason: >
      Dukascopy provides both bid and ask per tick.  Mid-price (bid+ask)/2 is the
      conventional choice for backtest OHLC — consistent with how existing daily
      data is sourced.  This is documented in the module docstring and PROVENANCE.md.

