  estimated_total_1h_bars: '~1.19 million (12 pairs × ~6,100 active hours/year × 16.3 years)'
  estimated_parquet_size: '200–500 MB (all 12 pairs, columnar compressed)'
  estimated_download_time_sequential: '~2.5 days (12 pairs × 16.3 years × ~0.87s/fetch × 6,100 active + 2,660 empty hours)'
