  status: PASSED
  how_verified: |
    TWO independent verification methods, both confirmed before writing this artifact:
    1. STRUCTURAL (weekend gap):
       Fetched EURUSD for hour 22 on Friday 2024-01-05 → HTTP 200 body=0 bytes (empty).
       Hour 21 on same Friday → 12,190 bytes, 2,848 ticks.
       Confirms the URL hour index is UTC — market closure at 21:00-22:00 UTC is correct.
    2. EVENT-ANCHORED (NFP release):
       Fetched EURUSD 2024-01-05 13h bar (13:00-14:00 UTC).
       US NFP releases at 13:30:00 UTC.  Total ticks: 16,196.
       Ticks AFTER 30-minute mark (i.e. after 13:30 UTC): 12,690 — heavy burst.
       Confirms bar boundaries are anchored to UTC hours, not any DST-shifted timezone.
    3. OUTPUT ASSERTION:
       df.index.tz == UTC: PASSED
       No Saturday bars in 530-bar output: PASSED (n_saturday_bars=0)
       This is the mandatory TZ gate given QRB-6 void precedent.

