#       now wants me to grant a HIGHER SR than the parent survived must clear a higher bar:
#       the mechanism must be a genuine signal-SHARPENING, not a relabel. Where the SR lift
#       rests on an unfalsifiable "cleaner signal" hand-wave, I grant only a fraction of the
#       claimed lift.
# CALIBRATION (unchanged from kickoff-2): I do NOT compound both haircuts punitively into a
# blanket-FAIL — that is mis-calibrated alarmism. I apply the most-defensible lever per
# variant and price the other honestly. The result is the SAME shape as kickoff-2: the
