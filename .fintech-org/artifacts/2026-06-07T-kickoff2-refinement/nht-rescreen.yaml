body: |
  ## Bottom line — up front

  ZERO of the four refined STRETCH survivors reaches the <=2yr first-candidate floor on my
  conservative inputs. any_eligible: NO. My recompute is MORE conservative than the proposer's on
  every variant and PUSHES each one higher than self-reported:
    - QRB2-1-R  proposer 3.41 -> NHT 4.12yr  (BACKFIRE, deepened)
    - QRB2-4-R  proposer 2.43 -> NHT 3.31yr  (the SR hand-wave discounted)
    - QRB2-2-R  proposer 2.50 -> NHT 3.22yr  (autocorrelation + deeper false-poke SR)
    - QRA2-5-R  proposer 3.61 -> NHT 4.82yr  (specificity dilution, near the FAIL line)

  ## The refinements are HONEST — that is not in dispute

  Re-screened against HC-1/HC-2/HC-3 verbatim, NO guardrail was tripped. No epy was re-inflated for
  the same signal; no SR rose while epy was held; every variant carries a real physical_change. The
  proposer self-declared two of the four UN-LIFTABLE-HONESTLY rather than force a pass. This is the
  OPPOSITE of the QRA2-4 gaming template (52 Mondays x 12 correlated pairs declared as 624
  independent draws) that the kickoff-2 screen killed. I caught NO gaming attempt of the hard-
  guardrail kind. Honest, though, is not the same as sufficient.

  ## Where the proposer's "closest" numbers come from — and why I discount them

  The two landings the proposer frames as a-hair-from-the-floor (QRB2-4-R 2.43, QRB2-2-R 2.50) both
  lean on a refined per_event_SR I decline to grant in full. QRB2-4-R wants 0.33 (a +22% jump over
  the parent's 0.27) for a "cleaner multi-factor residual" — but removing more common factors can
  DILUTE the sign signal as easily as sharpen it; the SR gain is asserted, not demonstrated. I grant
  0.29. QRB2-2-R wants epy=330 / SR=0.26 for a 20d channel — but 20d breaches autocorrelate within
  trending runs (effective-N < raw count) and the shallower channel's false-poke rate is worse than
  0.26 concedes; I take epy=300 / SR=0.24. These are the SAME two skeptical levers, at the SAME
  calibration, that I applied in kickoff-2 (HC-4). The refined SR is simply the prime gaming surface
  — the cheapest input to inflate — so it gets the hardest challenge.

  ## QRB2-1-R is a clean arithmetic BACKFIRE

  The HoQR hint ("tighten to raise SR, accept the epy cut") cannot work here, and the proposer models
  this honestly: the parent took NO duty-cycle debit (the carry tier is a per-pair label, not a
  suppressing gate), so there is no epy slack to spend. Raising SR forces an epy cut that years
  scale 1/epy punish harder than the 1/SR^2 SR gain rewards. At the proposer's own SR=0.33 it is
  already 3.41yr (WORSE than the 3.05 parent); at my SR=0.30 it is 4.12yr. The only lift lever (more
  epy via 4h) is structurally blocked — carry-rank needs the 12-pair cross-section and only 3 pairs
  have 4h bars. This is arithmetic, not judgment.

  ## Verdict for HoQR

  NO-NEW-CANDIDATE on my recomputed inputs (HC-5). The four refinements are honest and two are
  materially the right priorities for a genuinely-new next-generation wave (QRB2-2-R on the strongest
  mechanism, QRB2-4-R as the runner-up), but NEITHER is first-candidate-eligible: my conservative
  years (3.22, 3.31) sit in the middle of the STRETCH band, not a hair from the 2.0yr floor. Do not
  manufacture a first candidate by accepting the proposer's optimistic refined SR at face value
  (A5/HC-5). The disciplined terminal outcome is NO-NEW-CANDIDATE — and that is a successful wave.

