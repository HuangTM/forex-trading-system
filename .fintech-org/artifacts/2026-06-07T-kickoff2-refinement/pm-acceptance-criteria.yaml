# ════════════════════════════════════════════════════════════════════════════
# BODY
# ════════════════════════════════════════════════════════════════════════════
body: |
  ## What this wave must guard against

  Kickoff-2 ended NO-SPEND for an honest reason: every queued survivor sits at
  confirmability anchor 2 (3.05-3.87yr on NHT-verified inputs) and the first-candidate
  bar requires anchor 4 (<=2yr). The obvious gaming move is to re-declare larger epy
  or higher per-event SR to close that gap arithmetically — without a design change
  that genuinely produces those numbers. This is precisely the QRA2-4 kill: 624 pooled
  signals from 52 Mondays x 12 correlated pairs, the filter "roughly halving it" already
  conceded in the proposal, yet epy stayed at the pre-filter rate. HC-1 and HC-2 exist
  to make that move impossible.

  The second gaming move is subtler: a stricter entry filter that raises SR while the
  proposer forgets (or declines) to reduce epy proportionally. A tighter filter fires
  less often — that is the tradeoff, not an optional note. HC-2 makes the tradeoff
  mandatory: if SR rose because the signal is sharper, epy must fall, and both changes
  must appear in the submission.

  HC-3 is the "is this real?" check: a mechanism change that produces a genuinely
  different proposal is a legitimate refinement; a threshold adjustment chosen
  specifically to clear the gate is not. The physical_change and edge_survives_rationale
  fields operationalise this.

  HC-4 and HC-5 close the loop: NHT re-screens with identical skepticism (the baseline
  is the original nht-screen files), and HoQR may not recommend a first candidate whose
  NHT-verified years exceed 2yr by accepting inflated inputs at face value. No-new-candidate
  remains a fully valid outcome — the wave is a success whether it produces a candidate or
  honestly confirms none can be refinement-reached.

  ## The priority ordering reflects honest lift probability

  QRB2-1 (3.05yr, no duty-cycle debit) is listed first because the gap to 2yr is smallest
  and the only honest lever (tighten to extreme tiers, raise SR if the mechanism concentrates)
  is concrete. QRB2-4 (3.32yr) is second because its lever (sharper factor model) is
  speculative but clearly scoped. QRB2-2 (3.44yr) has the highest total score and the most
  attractive mechanism, but its frequency lever (lower channel-N to generate more real breach
  events) must not become a door to declaring position-held days as events — that was the
  original NHT challenge, and HC-1 keeps it closed. QRA2-5 (3.87yr) is lowest priority;
  the antagonistic lever problem (looser size filter dilutes specificity) makes honest
  refinement to <=2yr unlikely without a different design altogether.

  ## What honest success looks like

  A FIRST-CANDIDATE emerges from this wave ONLY if: NHT's recomputed years_to_validate
  is <= 2.0yr; the mechanism_change field describes a real structural shift; the (epy, SR)
  pair is internally consistent with the tradeoff honoured; and PR confirms no gaming. If
  that bar is met, the wave delivers a proposal-stage first candidate — pre-registration
  and any backtest are the NEXT track. If it is not met, the wave delivers an honest
  NO-NEW-CANDIDATE verdict, the queue is preserved, and the next generation wave begins
  with a clean slate.

