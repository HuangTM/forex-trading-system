---
# Quant-Researcher — kickoff-2 Refinement Wave
# Honest refinement of the 4 queued STRETCH survivors toward confirmability>=4
# (years_to_validate <= ~2yr) — OR an honest "cannot be lifted without gaming" verdict.
# Bound by the anti-gaming contract HC-1..HC-5 (pm-acceptance-criteria.yaml).
# Frozen formula (governs; NHT recompute is binding):
#   years_to_validate = ((1.645+0.842)/((1/3)*per_event_SR))^2 / epy
#                     = 6.18527 / (((1/3)*SR)^2) / epy
# CRITICAL: per pm-acceptance HC-4, the NHT a-priori SR HAIRCUT governs. I therefore do NOT
# declare an SR my refinement cannot survive NHT's kickoff-2 haircut logic (0.30->0.27,
# 0.36->0.30). An input that dies at NHT is gaming; I price every refinement at the
# NHT-survivable SR, not an optimistic declared one.

role: quant-researcher
artifact_type: hypothesis-portfolio
decision: approve
timestamp: "2026-06-07T-kickoff2-refinement-qr"

subtask_ref: refinement-qr
subtask_id: kickoff2-refinement-2026-06-07:phase1:task1.0
trial_id: "no-trial-proposal-only-wave"
no-capital-instruction: true

claimed_domains:
  - hypothesis-formulation-and-pre-registration
  - falsification-criteria-design

# ════════════════════════════════════════════════════════════════════════════
# THE HONEST FRAME (read before the per-target blocks)
# ════════════════════════════════════════════════════════════════════════════
# The four targets sit at NHT-verified 3.05 / 3.32 / 3.44 / 3.87yr. The gap to the
# 2.0yr first-candidate floor is real and the two levers are arithmetically antagonistic
# under the contract:
#   - Raising epy honestly (HC-1) needs a REAL mechanism change (a genuinely-firing
#     higher rate or a second uncorrelated leg) — NOT re-declaring the same signal's rate.
#     For these per-pair daily ideas the only real epy lever is the 4h grid, which exists
#     for EURUSD/GBPUSD/USDJPY ONLY (verified). That lever is unavailable or degenerate
#     for 3 of the 4 (carry-rank and bloc-residual both need the 12-pair cross-section a
#     3-pair 4h grid destroys).
#   - Raising per_event_SR honestly (HC-2) needs a sharper FILTER, which by construction
#     fires LESS often -> epy MUST fall. A tighter filter that raises SR and cuts epy
#     barely moves years (the levers partly cancel), and NHT haircuts the SR claim anyway.
# The honest finding, computed below at NHT-survivable inputs: NONE of the four cleanly
# reaches <=2yr without inflating an input past what NHT grants. The CLOSEST honest landing
# is QRB2-4-R at ~2.4yr (IMPROVED but still STRETCH). QRA2-5-R is UN-LIFTABLE-HONESTLY.

# ════════════════════════════════════════════════════════════════════════════
# REFINEMENTS
# ════════════════════════════════════════════════════════════════════════════
refinements:

  # ──────────────────────────────────────────────────────────────────────────
  - id: QRB2-1-R
    parent: QRB2-1
    parent_nht_baseline: {epy: 250, per_event_SR: 0.27, years: 3.05}
    name: "Carry-rank trend gate, tightened to EXTREME carry tiers only (top-2 / bottom-2 of 12)"
    physical_change: >
      Replace the {top-4 / mid-4 / bot-4} tier scheme with an EXTREME-tier gate: trade the
      per-pair trend signal ONLY when the pair is in the top-2 or bottom-2 of the
      cross-sectional rate-diff rank (4 of 12 pair-slots active instead of 8). The carry-crowd
      price-insensitive flow is strongest at the rank extremes (the widest-differential pairs
      carry the most leveraged carry inventory), so the gate concentrates the edge onto the
      pair-days where the structural amplifier is largest. This is a genuinely tighter filter,
      not a re-parameterised version of the same tier scheme.
    new_epy: 150
    # Extreme-tier (4 of 12 slots) vs prior (8 of 12): the active pair-day stream falls from
    # ~250 to ~150/yr/pair-equivalent (the duty cycle of being in an extreme tier is ~half
    # the prior, modulated up because rank is persistent month-to-month). epy CUT is honoured.
    new_per_event_SR: 0.33
    # Declared 0.37 pre-haircut; priced here at the NHT-survivable 0.33 (NHT applied an
    # SR-ONLY haircut to QRB2-1, no duty-cycle debit, because the tier is a per-pair label;
    # the SAME logic grants ~0.33 from a 0.37 a-priori for the concentrated extreme tier).
    mechanism_change: >
      REAL filter-tightening (HC-2 path): the gate now fires only at the carry-rank extremes.
      This is a distinct proposal — a kickoff-2 reviewer would have recognised an extreme-tier
      gate as different from a tercile gate (different duty cycle, different mechanism strength
      claim). It is NOT a frequency re-inflation (epy FELL 250->150) and NOT a threshold nudged
      to hit a number (it is the structurally-motivated extreme of the carry-amplifier thesis).
    edge_survives_rationale: >
      The price-insensitive carry-funder flow that amplifies trend persistence is monotone in
      differential magnitude; concentrating onto the widest-differential pairs raises the
      per-event signal-to-noise. HC-2 tradeoff EXPLICIT: the tighter extreme-tier filter fires
      on ~half the pair-days, so epy is cut 250->150 (NOT held at 250). SR rises 0.27->0.33
      (NHT-survivable), epy falls 250->150 — both moved, the duty-cycle tradeoff is honoured.
    expected_nht_years: 3.41
    # ARITHMETIC: 6.18527 / ((0.33/3)^2) / 150 = 6.18527 / 0.0121 / 150 = 511.18/150 = 3.408yr
    net_effect_note: >
      The SR rise (0.27->0.33) ALONE would cut years from 3.05 to ~2.04 at fixed epy=250 — but
      epy does NOT stay fixed: the tighter gate cuts it to ~150, which RAISES years back to
      3.41. Net effect is WORSE than the 3.05 baseline, because the SR gain (years scale 1/SR^2,
      a (0.27/0.33)^2 = 0.669x factor) is overwhelmed by the epy loss (years scale 1/epy, a
      250/150 = 1.67x factor): 3.05 * 0.669 * 1.67 = 3.41yr. The levers do NOT cancel
      favourably here — tightening BACKFIRES because QRB2-1's baseline already had no
      duty-cycle debit, so there is no "free" epy to spend. The 4h epy lever (HC-1) is
      UNAVAILABLE: carry-rank needs the 12-pair cross-section, and only 3 pairs have 4h bars
      (a 3-pair carry rank is degenerate). No honest path to <=2yr exists.
    honest_verdict: UN-LIFTABLE-HONESTLY
    honest_verdict_detail: >
      The HoQR hint ("tighten entry to raise per-event SR, accept the epy cut") is exactly
      what I modelled — and it BACKFIRES. Because QRB2-1 took no duty-cycle debit at baseline,
      any tightening that raises SR must SPEND epy it cannot afford, and years rise. The only
      lever that would lift it (a genuine epy increase via 4h) is structurally blocked by the
      3-pair 4h limit. Closest target, but not liftable to <=2yr without inflating SR past the
      NHT haircut (would need NHT-survivable SR~0.40 at epy~180, which NHT will not grant a
      never-backtested a-priori signal).

  # ──────────────────────────────────────────────────────────────────────────
  - id: QRB2-4-R
    parent: QRB2-4
    parent_nht_baseline: {epy: 230, per_event_SR: 0.27, years: 3.32}
    name: "Idiosyncratic bloc-residual continuation with a MULTI-FACTOR (orthogonalised) bloc model"
    physical_change: >
      Replace the single bloc-factor regression (return = one bloc loading + residual) with a
      MULTI-FACTOR orthogonalised decomposition: project each pair's return onto a small set of
      orthogonal cross-sectional factors (a USD-bloc factor, a commodity/risk-bloc factor, a
      JPY/safe-haven factor — built as orthogonalised linear combos of the existing 12-pair
      panel, trailing-only). The residual is then the component orthogonal to ALL common blocs,
      not just one. A single-bloc residual still contains cross-bloc contamination (e.g. a
      commodity move leaking into a USD-only residual); orthogonalising against multiple blocs
      yields a CLEANER idiosyncratic residual whose continuation is a sharper signal.
    new_epy: 210
    # The residual is still SIGN-defined nearly every pair-day (no day-suppressing gate), so
    # epy stays near the baseline 230 — mild reduction to 210 for the days the multi-factor
    # orthogonalisation leaves a near-zero / degenerate residual (more factors removed = more
    # days where the residual is too small to sign). This is the ONLY honest epy cut, and it
    # is small precisely because there is no gate.
    new_per_event_SR: 0.33
    # Declared 0.36 pre-haircut; priced at NHT-survivable 0.33 (NHT's kickoff-2 logic: 0.36
    # a-priori -> 0.30 haircut for a gated idea; here the cleaner residual justifies the
    # milder 0.36->0.33 because the orthogonalisation is a genuine signal-sharpening, but I
    # do NOT claim NHT will grant more than 0.33).
    mechanism_change: >
      REAL design delta (HC-3): the factor model itself changes from 1-factor to multi-factor
      orthogonalised. This is a distinct proposal a kickoff-2 reviewer would recognise as
      different (a different residual definition, a different signal), NOT a threshold tweak.
      It is the HC-2 path (sharper signal raises SR) but UNUSUALLY this idea has NO suppressing
      gate, so the epy penalty is small (230->210) rather than the large penalty a filter-gate
      would impose — that is WHY QRB2-4 was flagged as the one idea where SR can rise without
      a heavy epy cost.
    edge_survives_rationale: >
      The mechanism (benchmark/bloc-tracking flow under-weights idiosyncratic drivers, so the
      idiosyncratic residual continues) is UNCHANGED and in fact SHARPENED: a cleaner residual
      isolates the pair-specific driver the bloc crowd ignores more precisely, raising
      per-event signal-to-noise. HC-2 tradeoff EXPLICIT: removing more common factors leaves a
      slightly smaller usable-residual day-set, so epy falls 230->210 (NOT held at 230). SR
      rises 0.27->0.33, epy falls 230->210 — both moved.
    expected_nht_years: 2.43
    # ARITHMETIC: 6.18527 / ((0.33/3)^2) / 210 = 6.18527 / 0.0121 / 210 = 511.18/210 = 2.434yr
    net_effect_note: >
      SR rise 0.27->0.33 cuts years by (0.27/0.33)^2 = 0.669x; epy fall 230->210 raises years
      by 230/210 = 1.095x. Net: 3.32 * 0.669 * 1.095 = 2.43yr. Here the levers DO compound
      favourably (unlike QRB2-1) because the epy penalty is small (no gate to spend), so the
      SR gain dominates. This is the BEST honest landing of the four — but it is 2.43yr, still
      STRETCH, NOT <=2yr. To reach 2.0yr at epy=210 would need NHT-survivable SR=0.364, which
      exceeds what NHT grants a never-backtested a-priori residual (it haircut 0.36->0.30 in
      kickoff-2). I will NOT declare 0.364 to force the gate — that is the HC-4 inflation NHT
      governs and rejects.
    honest_verdict: IMPROVED-but-still-STRETCH
    honest_verdict_detail: >
      The closest HONEST approach to the floor (2.43yr vs the 2.0yr bar). The multi-factor
      residual is a genuine signal-sharpening and the no-gate structure means the SR gain is
      not eaten by an epy penalty. But the residual on the boundary: closing the last 0.43yr
      requires an SR (0.364+) above the NHT haircut ceiling for an unmeasured a-priori signal.
      Honest verdict: materially improved (3.32->2.43yr), NOT lifted to first-candidate grade.

  # ──────────────────────────────────────────────────────────────────────────
  - id: QRB2-2-R
    parent: QRB2-2
    parent_nht_baseline: {epy: 180, per_event_SR: 0.30, years: 3.44}
    name: "Donchian breakout + vol-expansion gate, channel-N LOWERED 55d -> 20d (more real breach events)"
    physical_change: >
      Lower the Donchian channel from N~55d to N~20d and relax the vol-expansion ratio
      threshold one notch. A 20-day channel produces GENUINELY MORE breach events (~40-60/yr/pair
      of real range-breaches vs ~10-30/yr/pair at 55d) — a REAL mechanism-frequency change
      (more actual breaches of a shorter range), NOT counting position-held days as events.
      The honest active-bet stream (NHT counts position-held + breach days) roughly doubles.
    new_epy: 330
    # NHT counted 180/yr/pair for the 55d channel (breach subset + held days). A 20d channel
    # genuinely fires ~2x the breaches; the honest NHT-unit active stream ~330/yr/pair. This is
    # a REAL epy increase per HC-1 (shorter channel = more genuine breach events), with the
    # mechanism change disclosed, NOT a re-declaration of the same 55d signal's rate.
    new_per_event_SR: 0.26
    # CRITICAL HC-2 honesty: a shorter channel breaches MORE often but each breach is LOWER
    # conviction (more false pokes, the 20d extreme is shallower / more easily reached). SR
    # FALLS 0.30->0.26 (NHT-survivable; NHT would haircut a declared 0.30 for a 20d breakout
    # to ~0.26 given the worse false-poke base rate). The epy gain is PAID FOR in SR.
    mechanism_change: >
      REAL mechanism-frequency change (HC-1 path): the channel length is the breach-generating
      mechanism, and shortening it genuinely produces more breach events from the same
      stop/barrier-cluster structure (clusters re-form around the shorter range too). A kickoff-2
      reviewer would recognise a 20d-channel proposal as a distinct parameterisation of the
      breach mechanism. The epy rise is accompanied by the disclosed survives_nht_debits
      argument below (HC-1 machine-check requirement).
    survives_nht_debits: >
      The epy is per-pair daily (each pair an independent breach stream); the 12 pairs are NOT
      counted as 12x independent — the rate is per-pair-equivalent. The breaches are discrete
      (a new 20d range must form between them) so they are less autocorrelated than continuous
      trend, supporting the higher honest count. NHT's correlated-effective-N debit applies to
      cross-pair POOLING, not to the per-pair rate, which is what is declared.
    edge_survives_rationale: >
      The stop/barrier-cluster loser regenerates around ANY range length (the cluster re-forms
      each consolidation), so the mechanism persists at 20d. HC-2 tradeoff EXPLICIT: the
      shorter channel fires ~2x more often (epy 180->330) but each breach is lower-conviction
      (more false pokes at a shallower extreme), so SR FALLS 0.30->0.26 (NOT held at 0.30).
      Both moved in opposite directions, as a real frequency-for-conviction trade must.
    expected_nht_years: 2.50
    # ARITHMETIC: 6.18527 / ((0.26/3)^2) / 330 = 6.18527 / 0.007511 / 330 = 823.5/330 = 2.495yr
    net_effect_note: >
      epy rise 180->330 cuts years by 180/330 = 0.545x; SR fall 0.30->0.26 raises years by
      (0.30/0.26)^2 = 1.331x. Net: 3.44 * 0.545 * 1.331 = 2.50yr. The levers do NOT cancel —
      the epy doubling beats the SR erosion, so years improve 3.44->2.50. This is the
      HoQR-hinted lift ("lower the gate to ~double the honest stream — but that lowers SR; show
      the net") and the net is a genuine improvement. BUT it does NOT reach <=2yr: to get there
      at epy=330 would need SR>=0.292 (a (0.842/0.745) push), i.e. the SR erosion would have to
      be SMALLER than a 20d breakout honestly suffers. Claiming epy=330 AND SR>=0.29 together
      risks the HC-2 violation (higher epy with a barely-reduced SR for a noisier signal) —
      NHT would reject it. Held honestly at SR=0.26, it is 2.50yr STRETCH.
    honest_verdict: IMPROVED-but-still-STRETCH
    honest_verdict_detail: >
      A genuine improvement (3.44->2.50yr) via a real mechanism-frequency change, with the
      SR-for-frequency tradeoff honoured. But still STRETCH: the false-poke penalty of a 20d
      channel keeps NHT-survivable SR at ~0.26, and 2.50yr does not clear the 2.0yr floor. Not
      first-candidate-eligible.

  # ──────────────────────────────────────────────────────────────────────────
  - id: QRA2-5-R
    parent: QRA2-5
    parent_nht_baseline: {epy: 230, per_event_SR: 0.25, years: 3.87}
    name: "Wick-rejection stop-cascade, looser qualifying-wick size filter (more events)"
    physical_change: >
      Loosen the qualifying-wick size filter: lower the wick-to-body ratio from >2.0x to >1.5x
      and the wick-to-ATR floor from >1.0 ATR to >0.7 ATR. This admits MORE qualifying wicks
      (~50/pair/yr vs ~25/pair/yr; honest NHT-unit pooled stream ~350/yr vs 230/yr) — a real
      frequency lever via a looser filter.
    new_epy: 350
    # Looser size filter genuinely admits ~2x the wick events; NHT-unit pooled active stream
    # ~350/yr (the baseline NHT count was 230). Real frequency increase via the looser filter.
    new_per_event_SR: 0.21
    # CRITICAL HC-2 honesty: a looser size filter ADMITS smaller, less-decisive wicks that are
    # NOT clean rejected-stop-cascade footprints (a 1.5x-body / 0.7-ATR wick is often just
    # noise, not a rejected cascade). The stop-cascade SPECIFICITY is DILUTED, so SR FALLS
    # 0.25->0.21 (NHT-survivable; NHT would haircut harder for the diluted pattern). The two
    # levers are ANTAGONISTIC exactly as the PM flagged.
    mechanism_change: >
      Filter-loosening (the only available lever; HC-1 path). A looser-filter proposal is a
      distinct parameterisation a kickoff-2 reviewer would recognise. But — disclosed honestly
      — it is the WEAKEST kind of change: it does not sharpen the signal, it dilutes it to buy
      frequency, and the mechanism (a CLEAN rejected stop-cascade footprint) is precisely what
      the loosening degrades.
    survives_nht_debits: >
      Per the contract this field is required for an epy raise. It is offered honestly but with
      a caveat: the epy IS genuinely higher (more wicks qualify), and the count is per the NHT
      pooled unit (not 12x cross-pair independence). HOWEVER the epy gain does NOT survive as a
      NET improvement because the SR dilution (below) more than offsets it — see net_effect_note.
    edge_survives_rationale: >
      The mechanism does NOT cleanly survive the change — this is the honest finding. The edge
      IS the stop-cascade specificity (a long wick = a REJECTED cascade); loosening the size
      filter admits non-cascade noise wicks, diluting exactly the property that generates the
      edge. HC-2 tradeoff: epy rises 230->350 but SR falls 0.25->0.21 because specificity is
      lost — and unlike QRB2-2, the SR loss here DOMINATES.
    expected_nht_years: 3.61
    # ARITHMETIC: 6.18527 / ((0.21/3)^2) / 350 = 6.18527 / 0.0049 / 350 = 1262.3/350 = 3.607yr
    net_effect_note: >
      epy rise 230->350 cuts years by 230/350 = 0.657x; SR fall 0.25->0.21 raises years by
      (0.25/0.21)^2 = 1.417x. Net: 3.87 * 0.657 * 1.417 = 3.60yr. The looser filter actually
      IMPROVES slightly (3.87->3.60) but stays deep in STRETCH — and the improvement is fragile:
      if the specificity dilution is even slightly worse (SR->0.20), years go back to 3.87+
      (4.64 at epy 300). The antagonistic levers nearly cancel and the residual is far from the
      2.0yr floor. There is NO honest input combination that reaches <=2yr: at epy=350 the floor
      needs SR>=0.255, i.e. the looser filter would have to LOSE NO specificity while doubling
      frequency — arithmetically the HC-2 forbidden claim (more events at undiminished SR).
    honest_verdict: UN-LIFTABLE-HONESTLY
    honest_verdict_detail: >
      As the PM and HoQR anticipated, QRA2-5 CANNOT be honestly lifted to <=2yr. Its only lever
      (looser size filter) is the antagonistic one: it buys frequency by diluting the very
      stop-cascade specificity that IS the edge. The net barely moves (3.87->3.60yr) and reaching
      the floor would require the arithmetically-impossible HC-2 violation of more events at
      undiminished SR. The disciplined verdict is UN-LIFTABLE-HONESTLY. The firm values this
      correct "cannot be done" over a forced pass.

# ════════════════════════════════════════════════════════════════════════════
# SUMMARY VERDICT
# ════════════════════════════════════════════════════════════════════════════
summary_verdict: >
  ZERO of the four queued STRETCH survivors can be honestly refined to confirmability>=4
  (<=2.0yr) on NHT-survivable inputs. Honest landings (NHT-priced SR, HC-2 epy tradeoff
  honoured):
    - QRB2-4-R  2.43yr  IMPROVED-but-still-STRETCH  (CLOSEST; multi-factor residual, the one
                idea where SR rises without a heavy epy penalty because it has no gate)
    - QRB2-2-R  2.50yr  IMPROVED-but-still-STRETCH  (real 20d-channel frequency gain beats the
                SR erosion, net improvement, still over the floor)
    - QRB2-1-R  3.41yr  UN-LIFTABLE-HONESTLY  (tightening BACKFIRES — no duty-cycle slack to
                spend; the 4h epy lever is blocked by the 3-pair 4h limit)
    - QRA2-5-R  3.60yr  UN-LIFTABLE-HONESTLY  (antagonistic lever: looser filter dilutes the
                stop-cascade specificity that IS the edge; reaching the floor needs the
                HC-2-forbidden "more events at undiminished SR")
  RECOMMENDATION: NO-NEW-CANDIDATE on honest inputs. Two ideas (QRB2-4-R, QRB2-2-R) are
  materially improved and sit ~0.4-0.5yr from the floor — they should RE-RANK as the strongest
  STRETCH survivors and be the priority for the next generation wave (a genuinely new design
  with a real second uncorrelated leg, or a 4h-native idea on the 3 pairs that have 4h bars),
  but NEITHER is first-candidate-eligible this wave. I will NOT inflate either SR past the NHT
  haircut to force a pass (HC-4/HC-5). NO-NEW-CANDIDATE is the disciplined terminal outcome.

