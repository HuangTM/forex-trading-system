  - path: ".fintech-org/artifacts/2026-06-07T-new-alpha-kickoff-2/qr-b-proposals.yaml:47-53"
    note: "STRUCTURAL FACT: 12 daily OHLCV pairs map to ~8 distinct currencies (thin cross-section); rate_differentials.parquet (6540,12) grounds carry-rank; volume==0 everywhere (OHLC geometry only)."
  - path: ".fintech-org/artifacts/2026-06-07T-new-alpha-kickoff-2/hoqr-rubric.yaml:35-54"
    note: "Frozen confirmability formula years=6.18527/haircut^2/epy and the <=2yr first-candidate floor — applied verbatim to every expected_nht_years above (arithmetic shown inline)."

# ════════════════════════════════════════════════════════════════════════════
assumptions:
  - "per_event_SR values are A-PRIORI and priced at the NHT-SURVIVABLE level (the haircut NHT applied in kickoff-2: ~0.30->0.27, ~0.36->0.30/0.33). I do NOT declare an SR my refinement cannot survive NHT recompute — an inflated SR dies at HC-4. NO return/Sharpe/performance was computed; structural facts only."
  - "events_per_year is the NHT active-bet unit (per-pair-equivalent, NOT 12x cross-pair independence). An epy raise is honest ONLY via a real mechanism-frequency change (QRB2-2-R shorter channel; QRA2-5-R looser filter) with the disclosed survives_nht_debits argument — NOT a re-declaration of the same signal's rate (HC-1)."
  - "The HC-2 duty-cycle tradeoff is honoured in every refinement: where SR rises via a tighter filter, epy is cut; where epy rises via a looser filter / shorter channel, SR is cut. No refinement claims higher SR AND higher-or-equal epy for the same signal (the arithmetically-impossible HC-2 violation)."
  - "The 4h grid (the only real per-pair epy lever for daily ideas, HC-1) is structurally unavailable to QRB2-1/QRB2-4 (12-pair cross-sections; only 3 pairs have 4h bars) and was not invoked. No second genuinely-uncorrelated leg was available for any target without becoming a new proposal."
  - "All signals computed strictly trailing (entry_delay_bars=1; no-lookahead sacred-test discipline) in every falsification sketch — unchanged from the parents."

confidence: high

body: |
  ## The honest result, up front

  None of the four queued STRETCH survivors reaches the 2.0yr first-candidate floor on
  NHT-survivable inputs. This is not a failure of effort — it is the arithmetic of the
  anti-gaming contract working exactly as designed. The two levers (epy via HC-1, SR via
  HC-2) are antagonistic, and the NHT SR haircut (HC-4) caps the SR I can honestly claim.

  ## Why each lands where it does

  QRB2-1-R (tighten to extreme carry tiers) BACKFIRES to 3.41yr. The HoQR hint was to raise
  SR and accept the epy cut — but QRB2-1's NHT baseline took NO duty-cycle debit (the tier is
  a per-pair label, not a suppressing gate), so there is no epy slack to spend. Tightening
  raises SR by a 0.669x factor but cuts epy by a 1.67x factor; the epy loss dominates and
  years RISE. The only lift lever (more epy via 4h) is blocked: carry-rank needs the 12-pair
  cross-section, and only EURUSD/GBPUSD/USDJPY have 4h bars (verified). UN-LIFTABLE-HONESTLY.

  QRB2-4-R (multi-factor orthogonalised residual) is the CLOSEST honest approach at 2.43yr.
  This is the one idea where SR can rise without a heavy epy penalty, because it has no
  day-suppressing gate — the residual is sign-defined nearly every pair-day. A genuinely
  cleaner residual (orthogonalised against multiple blocs, not one) sharpens the signal; the
  small epy cut (230->210, for the days the orthogonalisation leaves a degenerate residual) is
  the honest HC-2 price. Net 3.32->2.43yr. But closing the last 0.43yr needs NHT-survivable
  SR>=0.364, above what NHT grants an unmeasured a-priori residual. IMPROVED-but-still-STRETCH.

  QRB2-2-R (lower channel-N 55d->20d) improves to 2.50yr via a REAL frequency gain. A shorter
  channel genuinely breaches more often (a real mechanism change, HC-1, not counting held days)
  — epy 180->330. But each shallower-channel breach is lower conviction (more false pokes), so
  SR honestly falls 0.30->0.26 (HC-2). The frequency gain beats the SR erosion (net improvement),
  but 2.50yr is still STRETCH; reaching the floor would require the HC-2-forbidden "more events
  at undiminished SR." IMPROVED-but-still-STRETCH.

  QRA2-5-R (looser wick filter) is UN-LIFTABLE-HONESTLY, exactly as the PM anticipated. Its only
  lever is the antagonistic one: a looser size filter admits more wicks (epy up) but dilutes the
  rejected-stop-cascade specificity that IS the edge (SR down 0.25->0.21). The levers nearly
  cancel (3.87->3.60yr) and the residual is far from the floor. Reaching <=2yr would require the
  arithmetically-impossible claim of doubling frequency at undiminished specificity.

  ## What I did NOT do

  I did not declare any SR above the NHT haircut to force a pass (that is the HC-4/HC-5
  inflation NHT governs and rejects). I did not re-declare a higher epy for the same signal
  (HC-1). I did not raise SR while holding epy for any tightened filter (HC-2). Where the
  honest answer is "cannot be lifted," I said so (QRB2-1-R, QRA2-5-R) rather than manufacture
  a pass. The two improved ideas (QRB2-4-R 2.43yr, QRB2-2-R 2.50yr) are real progress and the
  right priorities for the next generation wave, but NEITHER is first-candidate-eligible this
  wave. Terminal recommendation: NO-NEW-CANDIDATE.

