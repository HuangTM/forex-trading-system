  - path: ".fintech-org/artifacts/2026-06-07T-new-alpha-kickoff-2/nht-screen-b.yaml:40-50"
    note: "QRB2-1 NHT baseline: epy=250, SR=0.27, 3.05yr (SR-only haircut, NO duty-cycle debit — the reason tightening backfires: no epy slack)."
  - path: ".fintech-org/artifacts/2026-06-07T-new-alpha-kickoff-2/nht-screen-b.yaml:163-172"
