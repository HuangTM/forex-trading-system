meta_finding_vs_kickoff1: 'THE CONFIRMABILITY RUBRIC CORRECTLY PREVENTED A REPEAT OF THE QRB-6 TRAP. HISTORY CORRECTION (PR-1):
  in kickoff-1 the FIRST candidate was QRB-3 (turn-of-month flow, 4.02); QRB-6 (CB-decision event study) was the highest RAW
  score (4.38) but was data_readiness-INELIGIBLE / roadmap-only at that ranking and required a CB-calendar acquisition first.
  QRB-6 became the pursued pick ONLY LATER, after the calendar was acquired and it was RE-SCREENED (beating QRB-3 4.36/4.48
  vs 4.02) under separate CEO authorization — and ONLY THEN did its run (a void + remediation + a valid AMBIGUOUS) lead to
  the wind-down, when its ~12-256-forward-year confirmation horizon was finally priced. The lesson, made structural here,
  is the 4th hard gate scoring confirmability UP FRONT off years_to_validate. COUNTERFACTUAL (the load-bearing, PR-verified
  claim): WITHOUT the confirmability gate, the best kickoff-2 idea on the other seven dimensions is QRB2-2 (4.09; strong mechanism,
  novel, sharply falsifiable, cost-survivable, stat-tractable, DATA-READY now — unlike QRB-6). On the OLD confirmability-free
  kickoff-1 bar QRB2-2 clears every first-candidate clause and would have been pursued as the trial — its honest forward horizon
  is 3.44yr (NHT), beyond the <=2yr standard: a QRB-6-shape trap nobody would have priced. THREE further proposals (QRB2-3
  5.09yr, QRB2-7 6.87yr, QRA2-4 5.73yr) are full >5yr QRB-6-class traps the gate killed at generation; a fourth (QRB2-6) is
  both a carry re-skin and an 8-12yr trap. WITH the gate the wave terminates at NO-SPEND — trial preserved, no void-and-wind-down
  cycle. The gate converted a confident-looking shortlist into an honest non-spend; its cost is one wave with no new trial,
  the cost it avoided is another QRB-6.'
