body: '## The wave terminates at NO-SPEND — and that is the rubric working, not failing


  I applied the frozen rubric mechanically and unbent. Five proposals are zeroed by the hard

  gates: two by HG-1 dedup (QRA2-6 re-skins archived QRB-4; QRB2-6 is canonical carry) and three

  by HG-4 confirmability (QRA2-4 5.73yr, QRB2-3 5.09yr, QRB2-7 6.87yr; QRB2-6 is also >5yr). The

  nine survivors all clear the four hard gates and score weighted totals of 3.04-4.09. QRB2-2

  leads at 4.09 on the strength of the wave''s best mechanism, a clean novelty, a sharp

  placebo-equipped falsification, anchor-5 cost survival, and full data readiness.


  But not one survivor clears the first-candidate bar, and the single failing clause is the same

  for all nine: confirmability. Under attestation A4 the confirmability score is taken off NHT''s

  recomputed years_to_validate, and NHT — independently, on both slices — debited the two levers

  the gate exists to catch: correlated-pair effective-N (slice A) and gate duty-cycle (slice B),

  plus a modest a-priori SR haircut. Every survivor lands in the (3, 5] STRETCH band (anchor 2).

  The bar requires anchor 4 (<=2yr). Nothing reaches it.


  Per attestation A5, the disciplined response is NOT to lift the best STRETCH idea into the

  first-candidate slot. NO-SPEND is the calibrated terminal outcome the rubric was explicitly

  built to produce when generation cannot supply a fast-confirmable edge. max_trials_this_wave = 0.


  ## What to queue, what is dead


  Four survivors are worth queuing for a future refinement wave, in priority order: QRB2-2 (the

  only one with an HONEST frequency lever — lower channel-N raises real breach count toward a

  <=2yr horizon), QRB2-1 (closest to the bar at 3.05yr, no duty-cycle debit), QRB2-4 (residual,

  needs a sharper factor model), and QRA2-5 (best slice-A survivor, larger gap). The rest are

  dead: the five gate/dedup kills, plus QRA2-2 and QRA2-7 which survive on total but are

  cost-binding AND knife-edge-STRETCH — two converging failure modes not worth bandwidth.


  ## Meta: the gate paid for itself in its first live wave


  In kickoff-1 the firm scored QRB-6 at 4.38, spent a trial, and discovered post-hoc that it

  needed 256 forward years. Here, the best idea (QRB2-2) would have cleared the OLD bar and been

  pursued — same in-sample-attractive, forward-unconfirmable shape — and THREE further proposals

  are outright >5yr traps the gate killed at generation. Without the gate, the firm almost

  certainly re-runs the QRB-6 void-and-wind-down. With it, the wave costs one trial-free wave and

  avoids exactly that. The confirmability gate is load-bearing, and it just did its job.

  '
