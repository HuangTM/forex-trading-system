body: |
  ## Why confirmability earns first-class status (and a 4th gate)

  The firm's prior screening machinery was already good at killing patterns
  (novelty gate), cost-blind ideas (cost gate), and underpowered in-sample tests
  (stat-tractability gate). QRB-6 slipped through ALL of them: it had a real
  mechanism, was novel, was sharply falsifiable, was statistically tractable
  IN-SAMPLE (a clean pooled t-stat existed, p=0.0027), and the edge was real. It
  died only when someone finally asked the question this rubric now forces up front:
  "how many forward years to CONFIRM it?" The answer was 256. By then the firm had
  already paid a void, a remediation, and a full wind-down consensus.

  Confirmability is therefore NOT a refinement of statistical_tractability — it is
  an orthogonal axis. Stat-tractability is about the IN-SAMPLE statistic (can we
  form a clean, well-powered test at all on the data we have). Confirmability is
  about the OUT-OF-SAMPLE horizon (given the event run-rate and the haircut effect
  size, how long until a forward test reaches 80% power). A high-frequency daily
  signal with a thin per-event edge can be both highly tractable in-sample AND
  highly confirmable; QRB-6 was tractable in-sample but unconfirmable forward. The
  two dimensions' descriptions both carry explicit non-double-counting language so
  scorers keep them separate.

  ## The anchor scale is the formula

  Because years_to_validate is a single monotonic number, the confirmability anchors
  map DIRECTLY onto it (5: <=1yr, 4: <=2yr, 3: <=3yr, 2: 3-5yr STRETCH, 1: >5yr
  GATE_FAIL) rather than onto prose judgment. This makes the dimension
  machine-checkable and ungameable in the same way the cost floor is: the proposer
  declares events_per_year and per_event_SR_estimate_IS, NHT recomputes, and the
  anchor falls out of arithmetic. The >5yr -> TOTAL=0 gate is the hard floor; the
  0.12 weight then discriminates among confirmable proposals (a 1-yr idea outscores
  a 3-yr idea by 0.24 on the total, enough to reorder near-ties).

  ## What this rubric does NOT do

  It does not weaken any existing gate, does not change the mechanism-first rank
  order (mechanism stays the single top weight at 0.25), does not see any proposal,
  and does not authorize any spend, backtest, code, or capital action. It is a paper
  scoring instrument frozen ahead of generation. NO-SPEND remains a valid terminal
  outcome of the wave it governs.

