    base_rate_verdict: >
      MIXED prior. Liquidity-sweep fades of stop-clusters are a real, documented intraday
      microstructure effect (not a sub-pip seasonal, not pure TA-with-no-counterparty), so
      better than the worst reference class. BUT intraday breakout-fade on OHLC-only data
