      qr_years_to_validate: 1.988
      qr_input_challenged: "BOTH levers: epy=700 is turnover-inflated (1-bar holds on 3 corr 4h pairs — not 700 independent draws), and SR=0.20 net of 1.5pip is itself fragile (QR self-flags cost_survival=2)."
