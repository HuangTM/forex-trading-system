  - id: QRA2-7
    name: daily-range-expansion-persistence-volatility-clustering
    dedup_verdict: >
      CLEAN on mechanism. Direction-agnostic vol-clustering breakout is distinct from
      momentum/Bet#1 (past-return sign), bollinger_rsi (band reversion), and is the
