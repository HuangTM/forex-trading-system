portfolio_observations:
  - >
    MECHANISM-CLASS CONCENTRATION: six of seven are the SAME family — "fade/trade an
    outsized or extreme OHLC bar attributed to a thin-liquidity / stop-cascade
    dislocation" (QRA2-1 compression-breakout fade, QRA2-3 outsized-bar fade, QRA2-5 wick
    rejection, QRA2-6 air-pocket fade, plus QRA2-2 CLV and QRA2-7 vol-breakout as
    near-relatives). Only the conditioning trigger varies. If the underlying "OHLC extreme
    reverts net of 1.5pip" premise is false on this zero-volume data, the WHOLE slice falls
    together — these are NOT 7 independent shots on goal. The portfolio's effective
    diversification is ~2-3 distinct bets, not 7.
  - >
    CONFIRMABILITY OPTIMISM IS SYSTEMIC, NOT INCIDENTAL. Five proposals self-claim
    <=2yr (first-candidate-grade). Under honest correlated-pair effective-N AND a realistic
    IS-Sharpe haircut, ZERO clear <=2yr — five land in the 3-5yr STRETCH band, one FAILS
    (QRA2-4), one is dedup-killed (QRA2-6). The gate-passes lean on two recurring levers:
    (a) counting correlated pairs as independent (the QR disclosed this risk itself), and
    (b) a-priori SR guesses with only a 1/3 haircut. The rubric's first_candidate_bar
    (confirmability>=4 / <=2yr) is, on my numbers, met by NONE — consistent with NO-SPEND
    being a defensible terminal outcome.
  - >
    TURNOVER/COST is the real binding gate for QRA2-2 and QRA2-7 (both self-scored
    cost_survival=2), and confirmability and cost are CORRELATED failure modes here: the
    high-frequency proposals that pass confirmability easiest (epy large) are exactly the
    ones most likely to die on cost. The gate the QR optimised (confirmability) and the
    gate that actually kills (cost) point opposite directions.

