# ════════════════════════════════════════════════════════════════════════════
# CONFIRMABILITY METHOD (the new load-bearing axis)
# ════════════════════════════════════════════════════════════════════════════
# Frozen formula reproduced to zero delta against the QR self-scores:
#   years_to_validate = 6.18527 / (haircut^2) / events_per_year ; haircut = (1/3)*SR_IS
# QR arithmetic VERIFIED exact for all 7 (QRA2-1 1.661, -2 1.988, -3 1.852, -4 2.753,
#   -5 2.062, -6 1.859, -7 2.130).
# The gate is gamed in TWO directions and I challenge BOTH:
#   (a) events_per_year INFLATION — pooled cross-pair counts treat highly-correlated FX
#       pairs (USD-bloc / JPY-bloc; the 3 4h pairs all share the USD leg) as INDEPENDENT
#       draws. Effective independent currencies ~6-7 of 12; effective 4h replicas ~1-2 of 3.
#       The QR DISCLOSED this risk itself (qr assumptions: "if NHT treats them as
#       correlated the years_to_validate rises"). Years scale 1/epy, so a 0.5 effective-N
#       haircut DOUBLES years.
#   (b) per_event_SR_IS OPTIMISM — IS Sharpe on a sub-pip microstructure fade net of a
#       ~1.5pip round-trip shrinks materially OOS (selection + the haircut is only 1/3,
#       generous for a never-backtested a-priori guess). Years scale 1/SR^2, so a 30% SR
#       cut multiplies years x2.04.
# CALIBRATION NOTE: applying BOTH haircuts compounds (years can x4) and would blanket-FAIL
#   all seven — that is mis-calibrated alarmism. A graded skeptic applies the ONE
#   most-defensible lever per proposal and flags the other. Result: ONE clean
#   confirmability-KILL (QRA2-4, fails from EITHER lever independently), the other six
#   degrade to the 3-5yr STRETCH band — i.e. NONE is the clean <=2yr first-candidate-grade
#   the QR claims for five of them once IS-optimism is acknowledged.

confirmability_sensitivity_anchors:
  - "SR x0.70 -> years x2.04 ; SR x0.60 -> years x2.78 ; epy x0.50 -> years x2.00 (single-lever)."
  - "QRA2-4 break-even: at QR's own SR=0.18, epy below ~350 crosses 5yr; the disclosed corr haircut alone (624->~300) yields 5.73yr FAIL. At SR=0.15, epy below ~500 fails. Robust kill from either direction."

