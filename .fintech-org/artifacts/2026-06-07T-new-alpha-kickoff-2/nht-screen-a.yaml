confidence_calibration: >
  HIGH confidence on the two structural verdicts (QRA2-4 confirmability-KILL — robust from
  either lever; QRA2-6 dedup-KILL — same window/mechanism/sign as archived QRB-4, well
  evidenced by the slice-B spread data). MEDIUM on the five STRETCH downgrades: the direction
  (QR self-scores are optimistic) is well-supported by the QR's own disclosed correlated-N
  caveat, but the exact haircut magnitudes are judgment, not measurement — a less aggressive
  IS-Sharpe deflation could leave QRA2-1/-3/-5/-6 nearer the 2-3yr band. I am deliberately NOT
  blanket-killing on compounded haircuts (that would be mis-calibrated alarmism). The
  load-bearing, defensible claim is: NONE is clean <=2yr first-candidate-grade, one FAILS, one
  is a re-skin — not that all seven are unconfirmable.

body: |
  ## Bottom line
  One CONFIRMABILITY-KILL (QRA2-4, >5yr robust to direction), one ARCHIVE-DEDUP KILL
  (QRA2-6, re-skin of archived QRB-4 rollover-hole fade). The remaining five clear the
  >5yr hard gate but ALL degrade to the 3-5yr STRETCH band under honest correlated-pair
  effective-N and realistic IS-Sharpe — so NONE meets the rubric's first-candidate
  confirmability>=4 (<=2yr) bar. NO-SPEND is defensible; if one must advance, QRA2-3
  (vol-regime-conditioned reversion) is the least-bad: soundest counterparty, cleanest
  dedup, lowest per-pair turnover, STRETCH not FAIL.

  ## Why QRA2-4 is the gate's intended catch
  Its 2.75yr self-pass exists ONLY by declaring 624 independent Monday signals from 52
  Mondays x 12 highly-correlated pairs at the FULL pre-filter rate — while the same file's
  cost_profile concedes the quiet-Friday filter "roughly halves it." Honour either the
  correlation (epy->~300 at the QR's own SR=0.18 -> 5.73yr) or a thinner SR, and it crosses
  5yr. This is precisely the events_per_year inflation HG-4 was written for (QRB-6 lesson).

  ## Why QRA2-6 is a re-skin
  The slice-B work already VERIFIED the 16-18 UTC liquidity hole (spread mean ~4.15) and
  archived QRB-4 to FADE thin-book overshoots in exactly that window on exactly those 3
  pairs. QRA2-6 fades the same window, same sign, same pairs — swapping a spread-state
  trigger for a same-stamp vol z. New indicator name, same flow. Merge into QRB-4; do not
  spawn a duplicate.

  ## The portfolio-level risk the per-proposal verdicts miss
  Six of seven are the same "OHLC extreme reverts net of cost on zero-volume data" bet under
  different conditioning. They are not 7 independent shots — effective diversification ~2-3.
  And the gate the QR optimised (confirmability, favouring high-frequency ideas) points
  opposite to the gate that actually kills (cost, which the high-frequency ideas fail). A
  first candidate chosen on confirmability alone would likely die on cost.

