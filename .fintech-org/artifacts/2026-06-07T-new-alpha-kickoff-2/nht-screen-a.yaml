    base_rate_verdict: >
      UNFAVORABLE on EDGE, not mechanism. Range/vol CLUSTERING (ARCH) is one of the most
      robust, most-published regularities in finance — the QR admits "novelty-to-the-world
      is low." The statistic certainly exists; the TRADEABLE net-of-cost edge via a
      double-sided straddle is the unproven and dubious part. The option-seller "slow to
      re-price" counterparty is the weakest mechanism story in the set (vol is the most
      actively-traded surface there is). Skeptical prior on tradeability.
    testability_verdict: >
      ADEQUATE. Pre-committed expansion threshold + symmetric +/-0.3 ATR breakout, pooled
      net expectancy, contraction-bar placebo. BUT the straddle has multiple tunable knobs
      (1.5x median TR gate, 0.3 ATR breakout offset, hold-to-close) — the highest
