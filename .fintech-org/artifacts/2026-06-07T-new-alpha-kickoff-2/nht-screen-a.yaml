    base_rate_verdict: >
      UNFAVORABLE. Weekend-gap mean-reversion is a well-trodden, decay-prone retail-TA
      space; thinnest per-event edge in the set (SR 0.18); the weekday/calendar axis is
      the same axis on which QRB-5 was KILLED. Worst base-rate prior of the seven.
    testability_verdict: >
      ADEQUATE. Pre-committed quiet-Friday + large-gap thresholds, pooled forward-1d, kill
      <=0 net, noisy-Friday placebo. BUT it stacks TWO conditioning filters (quiet Friday
      AND large gap), each a tunable DOF — high forking-path surface for a thin effect.
    confirmability_recompute:
      qr_years_to_validate: 2.753
      qr_input_challenged: >
        events_per_year=624 is INFLATED — the headline gaming finding. There are only ~52
