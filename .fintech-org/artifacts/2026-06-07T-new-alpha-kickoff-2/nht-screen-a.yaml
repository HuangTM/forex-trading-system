assumptions:
  - "FX pair-return correlation: 12 daily majors collapse to ~6-7 effectively-independent currency factors (USD bloc, JPY bloc); 3 4h pairs (EUR/GBP/USD-leg) to ~1-2. Effective-N haircuts of 0.45-0.55 (daily) / 0.55 (4h) follow — STRUCTURAL, not estimated from returns."
  - "IS-to-OOS Sharpe shrinkage for never-backtested a-priori sub-pip microstructure fades net of a 1.5pip floor justifies an additional ~0.6-0.7x on the QR's SR_IS where SR is the gamed lever; 0.55x where cost is double-sided (QRA2-2/-7)."
  - "Applying BOTH haircuts simultaneously compounds quadratically and would blanket-FAIL all seven; calibration requires the single most-defensible lever per proposal — hence one clean kill, not seven."
  - "QRB-4 is ARCHIVED (catalogued, available-now), so QRA2-6 duplicating it is an HG-1 re-skin even though QRB-4 was never killed; spawning a duplicate slice-A trial is the waste HG-1 prevents."
  - "The frozen formula and its constants (1.645, 0.842, 1/3 haircut) are taken as given; I challenge only the two INPUTS, per A4."

