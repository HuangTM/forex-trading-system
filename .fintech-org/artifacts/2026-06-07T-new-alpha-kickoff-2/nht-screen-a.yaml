      negative control. Forking-path risk: the 0.6 / 1.4 / 20-bar constants are tunable —
      pin them at pre-reg or this invites threshold-fishing. falsifiability anchor ~4-5.
    confirmability_recompute:
      qr_years_to_validate: 1.661
      qr_input_challenged: "per_event_SR_IS=0.42 is the HIGHEST in the set for a never-tested compression-fade; optimistic. epy=190 plausible (not inflated)."
      nht_events_per_year: 190
      nht_per_event_SR: 0.30
      nht_years_to_validate: 3.26
      nht_gate_verdict: STRETCH (3-5yr) — GATE_PASS but NOT <=2yr first-candidate-grade
    overall: conditional-survive
    conditions_if_any: >
      Survives the >5yr hard gate. NOT first-candidate-eligible: at a realistic IS Sharpe
      (~0.30) it is a 3-5yr STRETCH, failing the rubric's confirmability>=4 (<=2yr) bar.
