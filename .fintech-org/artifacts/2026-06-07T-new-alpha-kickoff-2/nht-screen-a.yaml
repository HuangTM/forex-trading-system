dissent-statement: >
  STRUCTURAL DISSENT, recorded verbatim. The slice-A confirmability self-scores systematically
  overstate validatability via two mechanisms the rubric's HG-4 exists to catch: (1) pooled
  events_per_year treats highly-correlated FX pairs as independent draws (most egregiously
  QRA2-4, where 52 Mondays x 12 correlated pairs are declared as 624 independent signals at
  the FULL pre-filter rate despite a quiet-Friday filter the QR says "roughly halves it"); and
  (2) per_event_SR_IS are a-priori guesses deflated only by 1/3, generous for never-backtested
  sub-pip microstructure fades net of a 1.5pip floor. On my independent recompute NOT ONE of
  the seven is the clean <=2yr first-candidate-grade the QR claims for five of them; five are
  3-5yr STRETCH, one (QRA2-4) is a >5yr CONFIRMABILITY-KILL, and one (QRA2-6) is an
  archive-dedup re-skin of QRB-4. Combined with the six-of-seven concentration in a single
  "OHLC-extreme-reverts" mechanism class, the honest posture is: NO first-candidate clears the
  bar on confirmability; NO-SPEND is defensible and at most ONE STRETCH proposal (QRA2-3, the
  best-conditioned with the soundest counterparty) should advance, with thresholds pinned at
  pre-registration and the 3-5yr forward wait disclosed.

severity: high
contamination-check: >
  No return data, no backtest, no performance series touched. Inputs to my recompute are the
  QR-declared (events_per_year, per_event_SR_IS) only; my haircuts are STRUCTURAL priors
  (cross-pair correlation, IS-selection deflation), NOT estimated from any realized return.
  No look-ahead, no peeking. Arithmetic via python3 on the frozen formula only.

