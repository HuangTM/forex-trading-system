dissent-statement: 'I DISSENT from the proposer''s self-scored confirmability table in qr-b-proposals.yaml. The claim that
  QRB2-2 "clears the <=2yr first-candidate floor (1.95yr)" and that six of seven ideas are GATE_PASS/STRETCH is an artifact
  of declaring un-gated daily event frequencies for day-suppressing regime gates. On independent recompute debiting each gate''s
  own disclosed duty cycle (per rubric anti-gaming attestation A4, which gives NHT recompute authority), NO Slice-B proposal
  clears confirmability>=4, QRB2-3 and QRB2-7 cross from PASS/STRETCH into GATE_FAIL, and the only undebited ideas (QRB2-1
  carry-tier label, QRB2-4 residual) still land at 3.0-3.3yr STRETCH. The firm should NOT treat any Slice-B idea as first-candidate-eligible.

  '
