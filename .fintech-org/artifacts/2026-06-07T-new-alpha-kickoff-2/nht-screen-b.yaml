  by anyone applying attestation A4), LOWER on the exact recomputed years (my duty-cycle debits and SR haircuts are judgment
  calls within defensible bands — a different calibrated reviewer might land QRB2-3 at 4.5yr STRETCH rather than 5.09 GATE_FAIL,
  or QRB2-7 at 5.5 vs 6.87). The CALIBRATED conclusion is robust to that band: QRB2-3/7 are AT-OR-OVER the 5yr line and NONE
  clears <=2yr first-candidate. I am MOST confident on QRB2-6 (double-killed, self-flagged, matches the rubric anchor exactly)
  and on the systemic conclusion that no Slice-B idea is first-candidate-eligible. I am LEAST confident on whether QRB2-3
  vs QRB2-7 is the marginally-worse fail — both are killed, the ordering is immaterial.

  '
body: '## What the proposer did well, and the one thing they did not


  Genuinely good: every proposal carries a placebo/negative-control, a pre-committed kill

  margin, and a disguised-momentum auto-KILL trapdoor (the gate must beat the un-gated base

  or it collapses to archived momentum/HG-1). QRB2-6 is honestly self-flagged as the carry/

  confirmability trap exemplar. The calendar (cb_decision_dates.parquet) was deliberately

  NOT used, avoiding the dead QRB-6 class. Dedup against carry-LEVEL is clean for QRB2-1/4

  (sign(trend) and sign(residual), not sign(rate-diff)).


  The ONE structural failure: confirmability was "engineered in" by declaring events_per_year

  at the un-gated daily cadence for day-SUPPRESSING gates. The whole point of a regime gate is

  that it sits FLAT most of the time and trades only the high-conviction subset — which is also

  exactly what THINS the confirmable event stream and lengthens years_to_validate. You cannot

  bank the edge-concentration benefit of the gate while declaring the un-gated frequency for

  confirmability. That is the QRB2-7 STRETCH issue the proposer half-disclosed, generalized

  across QRB2-1/2/3/5/7.


  ## The recompute and its consequence


  Holding the rubric''s unit (active bet per pair-day) and debiting ONLY (a) each gate''s own

  disclosed duty cycle and (b) the a-priori SR optimism, the confirmability distribution shifts

  a full band: four STRETCH (3.0-3.9yr), three GATE_FAIL (>5yr). NONE clears the <=2yr

  first-candidate floor. Two ideas (QRB2-3, QRB2-7) flip from self-scored PASS/STRETCH into

  HARD-GATE FAIL. The headline self-claim — QRB2-2 at 1.95yr clearing the first-candidate floor

  — is rejected; it is 3.44yr STRETCH.


  ## Bottom line for HoQR


  Survivors (CONDITIONAL, all STRETCH, NONE first-candidate-eligible): QRB2-1 (most novel

  carry-conditioning, 3.05yr), QRB2-2 (strongest mechanism, 3.44yr), QRB2-4 (residual

  continuation, 3.32yr), QRB2-5 (low-novelty ER gate, 3.87yr). KILLS: QRB2-3 (HG-4, 5.09yr +

  stacked-DOF), QRB2-6 (HG-1 carry re-skin AND HG-4, double-killed, confirmed self-flag),

  QRB2-7 (HG-4, 6.87yr, dominated by QRB2-2). If Slice-A likewise yields no <=2yr idea,

  NO-SPEND is the calibrated terminal outcome — consistent with the rubric and the firm''s

  honest-N~11, zero-validated-OOS-alpha posture. Do not manufacture a first candidate from a

  STRETCH idea to avoid a no-spend verdict (attestation A5).

  '
