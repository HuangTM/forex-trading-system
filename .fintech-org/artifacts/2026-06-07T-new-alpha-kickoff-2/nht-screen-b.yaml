- id: QRB2-1
  decision: CONDITIONAL-SURVIVE
  dedup_verdict: 'CLEARS the carry re-skin veto — but ON A CONDITION. The proposer is correct that no rate-diff LEVEL is held;
    the differential is used only to RANK pairs into a carry TIER that GATES a per-pair PRICE-TREND signal. "How is this NOT
    just carry": canonical carry is LONG the high-yielder for the coupon, sign = sign(rate-diff), held continuously, INSENSITIVE
    to price trend. Here the position is sign(price-trend), held only while the pair sits in an extreme carry tier, and FLIPS
    with the trend even on a high-carry pair. So a high-carry pair in a DOWNtrend is SHORTED here — the opposite of carry.
    That is a genuine distinction. RESIDUAL RISK (the condition): the falsification must prove the EXTREME-tier vs MIDDLE-tier
    trend-expectancy spread is real (the proposer''s own auto-KILL). If the gate adds nothing, this collapses to archived
    momentum/Bet#1 (HG-1 re-skin). The built-in carry-shuffle placebo is the right control. Not a re-skin AS SPECIFIED; dedup
    survival is conditional on the tier-contrast surviving.

    '
  base_rate_verdict: UNFAVORABLE-NOT-FATAL
  base_rate_note: 'Reference class = "trend-following with a conditioning gate." FX trend-following has a well-documented
    post-2009 decay; the firm''s own Bet#1 momentum is archived (presumably retired). The carry-momentum INTERACTION is a
    real published phenomenon (carry crashes are momentum-correlated), so the prior is not hostile, but the gate is a tunable
    DOF (which tiers, tier count, rank-formation window) — skeptical prior on the gate as the proposer''s degrees of freedom.

    '
  testability_verdict: TESTABLE
  testability_note: 'Pre-registerable: tier definition (top-4/mid-4/bot-4), pre-committed margin, carry-shuffle placebo present,
    Sharpe<0.3 floor. Forking-paths risk: tier-count and rank-window are tunable; pre-register ONE tier scheme and ONE window,
