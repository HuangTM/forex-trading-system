assumptions:
- events_per_year is the ACTIVE confirmable directional-bet run-rate. For a regime GATE, the active rate is the gate's DUTY
  CYCLE (fraction of days the gate is ON), not the un-gated daily rate. This is the core NHT recompute principle and the basis
  for every duty-cycle debit. I keep the rubric's UNIT (bet per pair-day, NOT de-overlapped independent legs) so debits are
  duty-cycle + SR only, not a unit change.
- per_event_SR_estimate_IS values are a-priori unmeasured guesses; a modest haircut (typically 0.30->0.27 or 0.36->0.30) to
  a defensible lower bound is warranted, NOT a punitive one. No return data was measured.
- The (1.645+0.842)^2 = 6.1852 constant and (1/3) selection-bias haircut are taken verbatim from the frozen rubric; not re-derived.
- The archived-family set (carry calendar-locked, momentum/Bet#1, ma_crossover, bollinger_rsi, tas_ceiling_4h, ORB, QRA-1..QRB-6)
  is complete per the HoQR assumption; NHT holds the dedup veto and exercised it on QRB2-6.
- Slice-A disjointness was spot-checked against QRA2-1 only (the adjacent compression-breakout); full slice-A NHT screen is
  a separate artifact.
