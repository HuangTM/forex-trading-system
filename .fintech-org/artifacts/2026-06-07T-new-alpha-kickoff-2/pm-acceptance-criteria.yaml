body: |
  ## Purpose and structural change vs the prior kickoff

  This wave is the firm's second systematic NEW-alpha hypothesis-generation cycle,
  run under a new CONFIRMABILITY discipline learned from the QRB-6 wind-down. The
  structural change is a single, load-bearing addition: CONFIRMABILITY is now a
  first-class scored dimension with a hard gate in the ranking rubric, and its
  parameters (events_per_year × per_event_Sharpe → years_to_validate) must be
  stated in every proposal.

  QRB-6 was the lesson: a real, statistically significant in-sample edge (p=0.0027,
  pooled SR=1.352) at ~30 events/yr with per-event SR ~0.085 cannot be confirmed
  out-of-sample in fewer than 12–256 years. It passed every prior generation-phase
  screen and still cost a full exploratory trial (fa0f982a), a confirmatory design
  (53981a4a, withdrawn-pre-freeze), a void + remediated rerun, and a wind-down
  consensus. Confirmability failure is now a STRUCTURAL KILL — a proposal that
  cannot be validated in ≲ 5 years of forward data will never contribute to the
  firm's validated-alpha count regardless of in-sample beauty.

  The CONFIRMABILITY hard gate would have killed QRB-6 at generation time. That is
  the purpose of this wave's structural change.

  ## Confirmability threshold rationale

  The PM-specified gate is:
    - ≲ 3 yr: GATE_PASS (preferred; realistic forward-test horizon for the firm)
    - 3–5 yr: STRETCH (allowed; HoQR must disclose and justify; NHT must flag)
    - > 5 yr: GATE_FAIL (killed; not confirmable on any tradeable horizon)

  The 3-yr threshold corresponds (per the formula at one-sided 5% significance,
  80% power, 1/3 haircut) to roughly: a daily-frequency signal at ~0.10 per-event
  SR with 250 events/yr, or a weekly signal at ~0.20 per-event SR with 52 events/yr.
  These are non-trivial but achievable profiles. The gate is calibrated to exclude
  the QRB-6 class (low-frequency event studies with modest per-event effect sizes)
  while permitting structural flow hypotheses with plausibly higher event density.

  ## What this wave does NOT do

  It does not produce: backtests, code, pre-registrations, trial counter increments,
  or any output touching live or paper capital. The org trial counter remains at 42
  at wave close. The actual pre-registration and backtest of any recommended candidate
  is a FUTURE dedicated track.

