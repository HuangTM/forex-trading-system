# ══════════════════════════════════════════════════════════════════════════════
# CONFIRMABILITY FORMULA (machine-encodable)
# Derived from power analysis in CONSENSUS_2026-06-07_qrb6_winddown.md.
# Carried forward as a BINDING formula for HoQR to anchor the rubric gate.
# ══════════════════════════════════════════════════════════════════════════════
confirmability_formula:
  definition: >
    years_to_validate ≈ ((z_0.95 + z_0.80) / per_event_Sharpe)^2 / events_per_year
    where z_0.95 = 1.645 (one-sided 5% significance), z_0.80 = 0.842 (80% power),
    per_event_Sharpe = haircut × annualised_IS_Sharpe / sqrt(events_per_year),
    haircut = 1/3 (standard deflation for selection bias).
  formula_compact: "years = ((1.645 + 0.842) / per_event_SR)^2 / events_per_year"
  worked_examples:
    - label: "QRB-6 profile (GATE FAIL — wound down)"
      events_per_year: 30
      per_event_SR_haircut: 0.028
      years_to_validate_80pct_power: "~256 yr (infeasible)"
      verdict: GATE_FAIL
    - label: "Daily-freq modest (SR 0.10, 250 events/yr)"
      events_per_year: 250
      per_event_SR_haircut: 0.100
      years_to_validate_80pct_power: "~2.5 yr"
      verdict: GATE_PASS
    - label: "Daily-freq decent (SR 0.15, 250 events/yr)"
      events_per_year: 250
      per_event_SR_haircut: 0.150
      years_to_validate_80pct_power: "~1.1 yr"
      verdict: GATE_PASS
    - label: "Weekly event moderate (SR 0.12, 52 events/yr)"
      events_per_year: 52
      per_event_SR_haircut: 0.120
      years_to_validate_80pct_power: "~5.8 yr"
      verdict: GATE_MARGINAL
  hard_gate_threshold:
    primary: "years_to_validate <= 3 yr at 80% power (preferred)"
    stretch: "years_to_validate <= 5 yr at 80% power (stretch — must be disclosed and justified by HoQR)"
    fail: "years_to_validate > 5 yr → CONFIRMABILITY HARD GATE FAIL; score zeroed regardless of other dimensions"
  note: >
    Every proposal MUST state its estimated events_per_year and plausible
    per_event_Sharpe (IS estimate haircut-adjusted). The years_to_validate figure
    computed from these is carried as a field in each proposal artifact and in the
    shortlist. If a proposal cannot supply these estimates (mechanism is too vague to
    bound event frequency or effect size), it fails confirmability by default.

# ══════════════════════════════════════════════════════════════════════════════
# HARD CONSTRAINTS (machine-checkable)
# ══════════════════════════════════════════════════════════════════════════════
hard-constraints:
  - id: HC-1
    name: no_backtest
    statement: >
      no_backtest_in_wave: true — this wave produces paper proposals only; no
      return-performance data is touched, no backtests are executed, no Sharpe
      estimates from actual runs. Structural facts (event counts, verified spreads,
      bar availability) are permitted. Performance claims are not.

  - id: HC-2
    name: no_trial_increment
    statement: >
      no_trial_increment: true — the org trial counter (currently 42 spawned per
      mandate) MUST NOT increment in this wave. A trial burns only when a chosen
      candidate receives a full pre-registration + backtest in a dedicated follow-on
      track. All artifacts carry trial_id: "no-trial-proposal-only-wave".

  - id: HC-3
    name: no_live_capital
    statement: >
      no_live_capital: true — backtest-only firm; no paper trading, no live orders,
      no capital-at-risk actions at any stage of this wave.

  - id: HC-4
    name: confirmability_first_class
    statement: >
      confirmability_first_class: true — CONFIRMABILITY is a scored dimension with
      its own weight in the rubric (not a tie-breaker, not a footnote). Each surviving
      proposal MUST carry: estimated events_per_year, estimated per_event_Sharpe
      (IS, haircut-adjusted), and computed years_to_validate. These fields are
      required in both the QR proposal artifacts and the shortlist.

  - id: HC-5
    name: confirmability_hard_gate
    statement: >
      confirmability_hard_gate: true — any proposal with years_to_validate > 5 yr
      at 80% power is HARD-GATE FAILED on confirmability: total score set to 0
      (killed), regardless of all other dimension scores. The preferred threshold is
      3 yr; the stretch allowance (3–5 yr) requires HoQR disclosure and explicit
      justification. This gate would have killed QRB-6 at generation time.

  - id: HC-6
    name: rubric_frozen_before_proposals
    statement: >
      rubric_frozen_before_proposals: true — HoQR MUST publish and freeze the updated
      rubric (including the new CONFIRMABILITY dimension, its weight, its anchors, and
      the hard gate with the years_to_validate formula) BEFORE any QR proposal is
      submitted. No rubric retroactive tuning. Any proposal submitted before the rubric
      is frozen is out of sequence and must be held until the freeze artifact exists.

  - id: HC-7
    name: genuinely_new_no_reskins
    statement: >
      genuinely_new_no_reskins: true — no re-parameterizations or re-skins of prior
      11 hypotheses (QRA-1 through QRB-6) or of archived families (carry, momentum/
      Bet#1, ma_crossover, bollinger_rsi, tas_ceiling_4h, ORB). QRB-3 is QUEUED/
      INDEPENDENT — not to be re-proposed, not to be duplicated in this wave. NHT
      holds the dedup veto.

  - id: HC-8
    name: no_qrb3_duplication
    statement: >
      no_qrb3_duplication: true — QRB-3 (Turn-of-month rebalancing flow) remains
      queued/independent under its own separate governance. It MUST NOT be re-proposed,
      re-skinned, or substituted in this wave. Its queued status is unchanged.

  - id: HC-9
    name: shortlist_carries_confirmability_scores
    statement: >
      shortlist_carries_confirmability_scores: true — every entry in the terminal
      shortlist (3–5 survivors) MUST explicitly carry: (a) its confirmability rubric
      score from the frozen rubric, (b) its estimated years_to_validate value, and
      (c) its confirmability hard-gate verdict (PASS / STRETCH-DISCLOSED / FAIL).
      A shortlist entry missing any of these three fields is non-compliant.

  - id: HC-10
    name: no_spend_valid
    statement: >
      no_spend_valid: true — if NO proposal clears the first-candidate bar (including
      the confirmability gate), the defensible terminal outcome is NO-SPEND. This is
      a valid, documented outcome. The wave must not force a recommendation to avoid
      a no-spend verdict.

  - id: HC-11
    name: cb_event_studies_blocked
    statement: >
      cb_event_studies_blocked: true — CB-decision event studies are now known-
      unconfirmable (QRB-6 lesson, 30 events/yr → 12–256 yr validation). Proposals
      in this family are auto-killed on confirmability grounds without further scoring.
      cb_decision_dates.parquet exists but is not an eligible data source for a
      primary alpha signal in this wave.

  - id: HC-12
    name: proposal_confirmability_fields_required
    statement: >
      proposal_confirmability_fields_required: true — every proposal from both QR
      slices MUST include: events_per_year (estimated), per_event_SR_estimate
      (IS haircut-adjusted), years_to_validate (computed from formula), and a
      confirmability_gate_verdict (PASS / STRETCH / FAIL — self-assessed before NHT
      review). Proposals missing these fields are returned to the QR for revision
      before NHT screening proceeds.

# ══════════════════════════════════════════════════════════════════════════════
# CRITERIA (acceptance gates — one per role deliverable)
# ══════════════════════════════════════════════════════════════════════════════
criteria:

  - id: RUBRIC-FREEZE
    description: >
      HoQR authors and freezes the updated scoring rubric BEFORE any QR proposal
      is submitted. The rubric must:
      (a) Carry CONFIRMABILITY as a first-class scored dimension — not an overlay,
          not a tie-breaker, but a named dimension with an explicit weight and anchors.
      (b) Reweight from the prior kickoff's dimensions (mechanism 0.28 / novelty 0.20 /
          falsifiability 0.16 / cost 0.16 / stat-tractability 0.12 / data 0.05 /
          capacity 0.03) to create room for CONFIRMABILITY. Weights must still sum to
          1.00. The PM does not prescribe the exact reweight — HoQR authors it.
      (c) Include a fourth hard gate: confirmability == GATE_FAIL → TOTAL = 0. Prior
          three hard gates (novelty==1, cost_survival==1, stat_tractability==1) are
          carried forward unchanged.
      (d) Embed the years_to_validate formula as the ANCHOR for the confirmability
          hard gate. The gate threshold (≲3 yr preferred, ≲5 yr stretch) is
          PM-specified; HoQR specifies the per-score-level anchors within that frame.
      (e) Carry a SINGLE-USE freeze declaration: governs only this 2026-06-07 kickoff-2
          wave; a future wave re-freezes its own rubric before seeing proposals.
      (f) Be authored before any QR generation artifact is dispatched (enforced by
          wave sequencing: HoQR rubric is wave 2; QR generation is wave 3).
    owner: head-of-quant-research
    done_when: >
      An artifact at .fintech-org/artifacts/2026-06-07T-new-alpha-kickoff-2/
      hoqr-rubric.yaml exists with: a confirmability dimension (named, weighted,
      anchored), the years_to_validate formula embedded, the four hard gates stated
      (novelty / cost_survival / stat_tractability / confirmability), weights summing
      to 1.00, and a single-use freeze declaration. Timestamp on the rubric artifact
      MUST precede timestamps on qr-a-proposals.yaml and qr-b-proposals.yaml.

  - id: GEN-A
    description: >
      Quant Researcher A generates 4–7 genuinely new alpha hypotheses from SLICE A:
      price, volatility, and cross-sectional structure sourced from available OHLCV.
      Slice A coverage must span at least two of: (i) 4h microstructure-adjacent
      patterns (EURUSD, GBPUSD, USDJPY), (ii) cross-pair relative value (spreads
      between pairs, ratio series, cointegration residuals among the 12 daily pairs),
      (iii) intraday-to-daily vol surface proxies (Parkinson, Garman-Klass, overnight
      gap vs intraday range). No archived family re-skins. No QRB-3 duplication.
      MANDATORY per-proposal confirmability fields: events_per_year (estimated),
      per_event_SR_estimate (IS haircut-adjusted), years_to_validate (computed from
      PM formula), confirmability_gate_verdict (self-assessed: PASS/STRETCH/FAIL).
    owner: quant-researcher-A
    done_when: >
      An artifact at .fintech-org/artifacts/2026-06-07T-new-alpha-kickoff-2/
      qr-a-proposals.yaml exists with 4–7 proposal entries, each containing non-empty
      fields for: hypothesis_name, mechanism, falsification_sketch, data_available
      (boolean + source), cost_survival_sanity, archived_family_overlap (must be
      "none"), events_per_year, per_event_SR_estimate, years_to_validate,
      confirmability_gate_verdict. Proposals with archived_family_overlap != "none"
      do NOT count toward the 4–7 minimum.

  - id: GEN-B
    description: >
      Quant Researcher B generates 4–7 genuinely new alpha hypotheses from SLICE B:
      event/calendar/macro-conditioning and alternative signal sources. Slice B
      coverage must span at least two of: (i) rate differentials as a CONDITIONING
      variable (NOT as the trade direction itself — carry is archived), (ii) calendar/
      session effects EXCLUDING month-turn rebalancing flow (QRB-3, queued — do not
      duplicate), (iii) spread data from data/spreads/ as a signal or conditioner,
      (iv) trade execution data from data/trades/executions.parquet as a signal,
      (v) data-acquisition-worthy ideas (clearly flagged acquisition_required: true).
      CB-decision event studies are BLOCKED per HC-11. MANDATORY per-proposal
      confirmability fields same as GEN-A. Data-acquisition proposals may survive
      GEN-B but are INELIGIBLE for the recommended-first-candidate slot.
    owner: quant-researcher-B
    done_when: >
      An artifact at .fintech-org/artifacts/2026-06-07T-new-alpha-kickoff-2/
      qr-b-proposals.yaml exists with 4–7 proposal entries, each containing non-empty
      fields for: hypothesis_name, mechanism, falsification_sketch, data_available
      (boolean + source or acquisition_required: true), cost_survival_sanity,
      archived_family_overlap (must be "none"), events_per_year, per_event_SR_estimate,
      years_to_validate, confirmability_gate_verdict. CB-decision proposals are
      disqualified and do NOT count toward the 4–7 minimum. Proposals requiring
      data acquisition are counted toward the minimum but must be flagged
      acquisition_required: true.

  - id: NHT-SCREEN
    description: >
      Null-Hypothesis Tester conducts adversarial screening of ALL proposals from
      both slices BEFORE HoQR produces the final ranking. This wave adds a fourth
      mandatory screen axis — CONFIRMABILITY — alongside the three from the prior
      kickoff. The four screens are:
      (1) Archive-dedup veto: re-skins of carry, momentum/Bet#1, ma_crossover,
          bollinger_rsi, tas_ceiling_4h, ORB, or any prior QRA-1 through QRB-6
          mechanism (including QRB-3 which is queued/independent) are auto-killed.
          NHT states the specific mechanism overlap.
      (2) Base-rate prior: NHT applies a base-rate adjustment at honest-N ≈ 11,
          trial counter 42, zero validated OOS alpha. Assigns favorable/neutral/
          unfavorable for each proposal with brief rationale.
      (3) Untestability screen: proposals that cannot be falsified with available
          data within a single well-powered backtest are flagged untestable and
          removed.
      (4) CONFIRMABILITY KILL AXIS: NHT independently evaluates each proposal's
          confirmability_gate_verdict (self-assessed by QR) and may override it.
          NHT must verify the events_per_year × per_event_SR_estimate → years_to_
          validate computation. Any proposal with years_to_validate > 5 yr is
          NHT-KILLED on confirmability, regardless of other dimensions. Proposals in
          the 3–5 yr stretch zone must be explicitly flagged STRETCH with NHT comment.
      NHT dissent is append-only per firm rule 6.
    owner: null-hypothesis-tester
    done_when: >
      An artifact at .fintech-org/artifacts/2026-06-07T-new-alpha-kickoff-2/
      nht-screen.yaml exists with: for each proposal — nht_verdict (survive |
      auto-kill | flagged), archive_dedup_result, base_rate_prior, testability_verdict,
      AND confirmability_verdict (GATE_PASS | STRETCH_DISCLOSED | GATE_FAIL with
      NHT's independently computed years_to_validate). Any confirmability override
      of the QR self-assessment is documented with the formula values used. NHT
      dissent on any survivor is recorded verbatim in nht_dissents list.

  - id: HOQR-RANK
    description: >
      Head of Quant Research applies the FROZEN rubric (from RUBRIC-FREEZE) to all
      NHT-surviving proposals and produces the final ranked portfolio. The ranking
      must:
      (a) Apply the frozen rubric mechanically — no retroactive weight adjustment.
      (b) Show per-dimension scores for all survivors, including the confirmability
          dimension score and hard-gate verdict.
      (c) Show the confirmability score, estimated years_to_validate, and gate
          verdict (PASS / STRETCH-DISCLOSED / FAIL) for every entry.
      (d) Apply all four hard gates: any proposal failing novelty, cost_survival,
          stat_tractability, OR confirmability has total score set to 0 (killed).
      (e) Name exactly ONE recommended first candidate, or declare NO-SPEND if no
          proposal clears the first-candidate bar (including the confirmability gate).
      (f) Produce a direction view (≤ 200 words) written before seeing proposals,
          updated from the prior kickoff's view to reflect the confirmability lesson.
      HoQR does NOT run any backtests; ranking is mechanism-quality and confirmability
      only.
    owner: head-of-quant-research
    done_when: >
      An artifact at .fintech-org/artifacts/2026-06-07T-new-alpha-kickoff-2/
      hoqr-ranking.yaml exists containing: rubric reference (to hoqr-rubric.yaml),
      direction_view (≤ 200 words), ranked_proposals (ordered list of all NHT-
      surviving proposals with per-dimension rubric scores including confirmability),
      explicit_kill_list (proposals killed at any stage with reason), and exactly ONE
      recommended first candidate or an explicit NO-SPEND declaration. Every ranked
      entry carries: confirmability_score, years_to_validate, confirmability_gate.

  - id: PR-REVIEW
    description: >
      Principal Reviewer conducts an independent review of the ranked portfolio and
      NHT screen after both are assembled. This wave's PR review adds a fifth check
      — the confirmability check — to the four checks from the prior kickoff:
      (a) NHT archive-dedup veto was applied to ALL proposals.
      (b) HoQR frozen rubric was applied consistently; recommended first candidate
          is the top-ranked survivor by that rubric.
      (c) Every surviving proposal has all required elements: falsification sketch,
          data availability, cost-survival note, AND confirmability fields
          (events_per_year, per_event_SR_estimate, years_to_validate, gate_verdict).
      (d) No backtest results, no return-performance data, no trial counter increments
          appear anywhere in the wave artifacts.
      (e) CONFIRMABILITY CHECK: PR independently spot-checks at least the top 3
          ranked survivors' years_to_validate computations. Any discrepancy from the
          formula is surfaced as a finding. PR confirms no proposal with years_to_
          validate > 5 yr appears in the shortlist.
      PR may flag proposals for re-review but does NOT run backtests or alter NHT
      dissent record.
    owner: principal-reviewer
    done_when: >
      An artifact at .fintech-org/artifacts/2026-06-07T-new-alpha-kickoff-2/
      pr-review.yaml exists with: decision (approve | needs-work | reject), findings
      list (each with id, severity: blocking | non-blocking, description), confirmation
      that all five checks (a)–(e) above were performed, and a specific note on the
      confirmability spot-check results. A needs-work or reject verdict requires
      identified roles to revise before CONSENSUS-shortlist is signed.

  - id: CONSENSUS-shortlist
    description: >
      Terminal deliverable. PM assembles the ranked shortlist into a CONSENSUS document
      after GEN-A, GEN-B, RUBRIC-FREEZE, NHT-SCREEN, HOQR-RANK, and PR-REVIEW are all
      complete and PR-REVIEW decision is "approve." The CONSENSUS document must contain:
      (a) A ranked shortlist of 3–5 surviving proposals (in ranked order), each with:
          mechanism summary (≤ 1 paragraph), NHT verdict, rubric score (total and
          per-dimension including confirmability), data tier, estimated years_to_validate,
          and confirmability gate verdict (PASS / STRETCH-DISCLOSED / FAIL).
      (b) ONE explicitly recommended first candidate for pre-registration in a follow-on
          track, with rationale (≤ 100 words) that EXPLICITLY addresses confirmability
          (why this candidate can validate within ≲ 3 yr or ≲ 5 yr). OR an explicit
          NO-SPEND declaration with the reason.
      (c) An explicit kill-list of all screened-out proposals with kill reasons including
          any confirmability-gate kills (with the years_to_validate value that triggered
          the kill).
      (d) A statement that the org trial counter was NOT incremented in this wave and
          the verified count (42) at wave close.
      (e) All role signatures: quant-researcher-A, quant-researcher-B, HoQR, NHT,
          principal-reviewer, PM.
    owner: pm
    done_when: >
      A CONSENSUS_2026-06-07_new_alpha_kickoff_2.md file is committed to docs/decisions/
      containing all five elements (a)–(e). The shortlist has 3–5 entries OR is declared
      NO-SPEND. Every shortlist entry carries confirmability_score + years_to_validate +
      gate_verdict. Exactly one recommended first candidate is named OR NO-SPEND is
      declared. The kill-list is non-empty and includes confirmability-gate kills (if
      any). All role signatures are present. PM confirms PR-review decision was "approve"
      before signing.

