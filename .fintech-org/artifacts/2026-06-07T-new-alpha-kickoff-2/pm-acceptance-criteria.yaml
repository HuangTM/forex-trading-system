wave_sequencing:
  wave_1: "PM — this acceptance-criteria artifact"
  wave_2: "HoQR — rubric FREEZE (RUBRIC-FREEZE criterion). Must complete before wave 3."
  wave_3: "QR-A + QR-B in parallel — proposal generation (GEN-A, GEN-B). After rubric frozen."
  wave_4: "NHT — adversarial screen with confirmability kill axis (NHT-SCREEN). After both QR slices complete."
  wave_5: "HoQR — apply frozen rubric, produce final ranking (HOQR-RANK). After NHT-SCREEN complete."
  wave_6: "Principal Reviewer — independent review (PR-REVIEW). After HOQR-RANK complete."
  wave_7: "PM — assemble CONSENSUS-shortlist. After PR-REVIEW decision = approve."

