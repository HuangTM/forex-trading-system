# ══════════════════════════════════════════════════════════════════════════════
roles-staffed:
  - role: pm
    model: sonnet
    rationale: >
      Produces this acceptance-criteria artifact (wave 1) and assembles the terminal
      CONSENSUS-shortlist (wave 7). Makes no domain or statistical adjudications.
      The confirmability formula and hard-gate threshold (≲ 3 yr preferred, ≲ 5 yr
      stretch) are PM-specified here; HoQR authors the per-level anchors within
      that frame in wave 2.

  - role: head-of-quant-research
    model: opus
    rationale: >
      Owns two artifacts: (1) rubric FREEZE in wave 2 — sole authority to author the
      updated rubric with the new CONFIRMABILITY dimension; (2) final ranking in wave 5
      — sole authority to name the recommended first candidate or declare NO-SPEND.
      Must carry QRB-6 lesson explicitly into the direction view: structural flows
      with high events-per-year and plausible per-event Sharpe are now the prior;
      low-frequency event studies are flagged as structural confirmability risk.

  - role: quant-researcher-A
    model: opus
    rationale: >
      Slice A generation — price, volatility, cross-sectional OHLCV structure. Must
      provide mandatory confirmability fields per HC-12. Disjoint from slice B to
      maximize coverage. Produces qr-a-proposals.yaml.

  - role: quant-researcher-B
    model: opus
    rationale: >
      Slice B generation — event/calendar/macro-conditioning, alternative signal
      sources. Must provide mandatory confirmability fields per HC-12. CB-decision
      studies are blocked. Produces qr-b-proposals.yaml.

  - role: null-hypothesis-tester
    model: opus
    rationale: >
      Adversarial screening with confirmability as an explicit fourth kill axis.
      NHT independently verifies years_to_validate computations and may override
      QR self-assessments. Append-only dissent per firm rule 6. Produces
      nht-screen.yaml.

  - role: principal-reviewer
    model: opus
    rationale: >
      Independent review wave — spot-checks at least top 3 survivors' confirmability
      computations; confirms no years_to_validate > 5 yr in the shortlist. Produces
      pr-review.yaml. PR approval is a gate on the terminal CONSENSUS-shortlist.

