body: |
  ## PM synthesis — the wave in one paragraph

  Kickoff-2 ran a complete 14-proposal cycle under the first CONFIRMABILITY-gated rubric,
  frozen before any proposal existed. NHT independently recomputed all years_to_validate and
  found systemic optimism across both slices: Slice-A pooled proposals over-counted correlated
  pairs as independent events; Slice-B regime-gating strategies declared un-gated daily
  frequencies for day-suppressing gates. Under honest inputs, zero of 14 proposals reaches the
  ≤2 yr first-candidate floor. Five are killed outright (3 by HG-4 confirmability, 1 by HG-1
  dedup, 1 double-killed). Nine survivors land in the 3–5 yr STRETCH band. The ranked shortlist
  is led by QRB2-2 (4.09, Donchian + vol-expansion gate), which fails the bar on ONE clause:
  confirmability alone. The wave terminates at NO-SPEND. This is the rubric working as designed.

  ## The synthesis judgment I am adding as PM

  The NO-SPEND is honest on three independent lines of evidence that converge: (1) HoQR applies
  the frozen rubric mechanically and finds no first-candidate; (2) both NHT screens independently
  reach the same conclusion (no ≤2 yr idea) via different recompute methods; (3) the PR reproduces
  every number exactly and confirms NO-SPEND is neither over-conservative nor weak-idea protection.
  Synthesizing across three concordant expert verdicts, I do not see a basis to question the
  terminal outcome. The one genuine PM contribution is confirming that the meta-finding's corrected
  history (PR-1 closed) does not weaken the core argument: the gate's value is demonstrated by the
  QRB2-2 counterfactual (data-ready, would have cleared the old bar, 3.44 yr forward-unconfirmable),
  independently of whether QRB-6 itself was or was not the kickoff-1 pick.

  ## Recommended resolution path

  A targeted refinement wave on QRB2-2 (honest frequency-lift: lower channel-N to raise real
  breach count toward ≤2 yr) is the highest-ROI next action. QRB2-1 (3.05 yr, closest to bar,
  no duty-cycle debit) is the runner-up. A CEO go/no-go on the refinement wave is the open item.

