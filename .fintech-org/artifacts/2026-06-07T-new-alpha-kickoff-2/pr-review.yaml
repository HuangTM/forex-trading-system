body: |
  ## Verdict: APPROVE-WITH-CONDITIONS

  The NO-SPEND recommendation is honest and the rubric was applied as frozen. I reproduced
  every weighted total (9/9 exact to 2dp) and every years_to_validate (14/14 to the stated
  rounding) independently. Confirmability governance is correct: scores come from NHT's
  recomputed years (A4), not the QR self-assessments — and the chain actively REJECTED the
  QR's optimistic self-scores (QRB2-2's self-claimed 1.95yr first-candidate floor became NHT's
  3.44yr STRETCH) rather than accepting them to force a spend. That is the system working.

  ## NO-SPEND is honest, not over-conservative and not weak-idea protection

  I checked the most important question independently: does ANY survivor clear the
  first-candidate bar, and does the best survivor (QRB2-2) fail ONLY on confirmability? Yes to
  the second, no to the first. QRB2-2 clears mechanism 4, novelty 4, cost 5, stat 4,
  falsifiability 5, data 5, no-dim-below-3, and NHT-survive — every clause except
  confirmability (anchor 2, 3.44yr vs the <=2yr floor). No other survivor is closer. A5 was
  applied as a discipline (the genuine first-candidate-shaped idea is QUEUED with an honest
  frequency-lift path), not as an excuse to avoid a verdict. NO-SPEND is the calibrated,
  defensible outcome.

  ## The one finding worth surfacing (MAJOR, narrative not numbers)

  The meta-finding's self-justification overstates the kickoff-1 record (PR-1): it says the
  firm "scored QRB-6 at 4.38, PURSUED IT, burned a trial." In fact QRB-3 was the kickoff-1
  first candidate; QRB-6 was the highest scorer but acquisition-required and therefore
  INELIGIBLE for first-candidate, ranked roadmap-only — and its trial burned LATER via a
  separate CEO authorization, not as a kickoff-1 output. The CORE counterfactual that carries
  the meta-finding's weight is nonetheless SOUND: QRB2-2 — data-ready, unlike QRB-6 — WOULD
  have cleared the old (confirmability-free) bar and been selected, exhibiting the same
  in-sample-attractive / forward-unconfirmable shape. The argument never needed QRB-6 to have
  been the kickoff-1 pick; it should lead with QRB2-2 and correct the QRB-6 history. This is a
  documentation-accuracy fix, not a soundness defect — hence approve-WITH-CONDITIONS, not
  reject.

  ## Conditions for clean approval (all documentation; no re-rank)

  1. (PR-1, major) Correct the meta-finding narrative: QRB-6 was NOT the kickoff-1
     first-candidate (QRB-3 was) and was data-ineligible/roadmap-only; its trial burned later
     via separate CEO authorization. Lead the counterfactual with QRB2-2 (PR-2).
  2. (PR-3, observation) Retain NHT's MEDIUM-confidence disclosure that the QRB2-3/QRB2-7
     kill-vs-STRETCH line is a judgment boundary; the NO-SPEND conclusion is robust regardless.
  3. (PR-4, optional) Carry NHT-A's mechanism-class concentration finding (effective
     diversification ~2-3, not 9) into the queue rationale — it reinforces NO-SPEND.

  None of these alters the ranking, the kills, or the NO-SPEND recommendation. The numbers are
  correct; the wave is compliant; the gate is load-bearing. The single fix is to make the
  victory-lap narrative as accurate as the arithmetic.

