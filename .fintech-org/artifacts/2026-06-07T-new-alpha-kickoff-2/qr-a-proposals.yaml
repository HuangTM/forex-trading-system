body: |
  ## Slice-A discipline and the confirmability filter applied at generation

  All seven proposals are intraday / intrabar / microstructure / mean-reversion /
  volatility-STATE mechanisms on the daily and 4h bars — disjoint from slice B's
  cross-sectional / carry / trend / regime-conditioning territory. Where an idea
  could straddle (QRA2-4's weekday anchor, QRA2-7's vol-state) I have stated the
  slice_note explicitly and shown why the EDGE (microstructure reversion; vol
  persistence traded direction-agnostically) sits in A, not B.

  The new confirmability gate did real work at generation time — exactly the QRB-6
  lesson. My first draft of QRA2-4 was a per-pair WEEKLY signal (events_per_year=50,
  per_event_SR_IS=0.45): years_to_validate = 6.1852/(0.15^2)/50 = 5.50 yr -> GATE_FAIL.
  Rather than ship a rare-event edge that the firm could not confirm, I either (a) lift
  the run-rate by pooling the SAME mechanism across all 12 pairs (624 events/yr ->
  2.75 yr GATE_PASS, what QRA2-4 now is) or (b) drop it. I chose (a) because the
  weekend-liquidity-vacuum mechanism is genuinely pair-independent, so cross-pair
  pooling is legitimate, not a power-inflation trick. That is the disciplined move the
  rubric is designed to force.

  ## Why these mechanisms, not patterns

  Every proposal names a price-INSENSITIVE counterparty and the constraint that keeps
  them losing: breakout-stop chasers (QRA2-1), inventory-imbalanced makers (QRA2-2),
  vol-targeting rebalancers + stop cascades (QRA2-3), mandate-driven weekend hedgers
  (QRA2-4), pre-placed stopped-out flow (QRA2-5), thin-book afternoon makers (QRA2-6),
  short-vol option sellers slow to re-price (QRA2-7). None is "X follows Y."

  ## Built-in placebos for cheap spurious-pass detection

  Every falsification criterion carries a SAME-backtest negative control (the effect
  must VANISH in the off-mechanism condition: expanded ranges, noisy Fridays, deep-book
  bars, small wicks, high-vol terciles, contraction bars). A spurious pass that also
  lights up the placebo is caught for free — targeting the falsifiability anchor-5.

  ## Honest weak spots (surfaced early, not buried)

  - Cost-survival is the BINDING risk on QRA2-2 (high turnover, thin per-event edge,
    self-scored 2) and QRA2-7 (double-sided straddle entry, self-scored 2). Either could
    trip HG-2 (cost==1 -> TOTAL=0) under realistic friction. I include them because their
    CONFIRMABILITY is strong and the mechanisms are genuinely novel; the cost gate, not
    confirmability, is what would kill them — and that is the honest place for them to die.
  - The 4h proposals (QRA2-1/2/6) live on only 3 pairs, capping capacity-robustness at ~3
    (thin cross-section, fewer independent replicas) — a real, disclosed limit, not hidden.
  - QRA2-3 and QRA2-7 are deliberate SIGN-OPPOSITES on outsized-bar behavior (fade in
    low-vol vs buy-vol-continuation): if BOTH pass, that is informative about regime
    structure; if both fail, the outsized-bar family is dead. They are not redundant.

  ## No first-candidate recommendation made here

  This is a GENERATION artifact. HoQR scores against the frozen rubric; NHT recomputes
  confirmability and holds the dedup veto. NO-SPEND remains valid. No backtest, no
  returns, no code, no capital action was taken — structural data facts only.

  ## Self-assessed confirmability ledger (advisory; NHT governs)

  | id     | events/yr | SR_IS | haircut | years_to_validate | verdict   |
  |--------|-----------|-------|---------|-------------------|-----------|
  | QRA2-1 | 190       | 0.42  | 0.1400  | 1.661             | GATE_PASS |
  | QRA2-2 | 700       | 0.20  | 0.0667  | 1.988             | GATE_PASS |
  | QRA2-3 | 260       | 0.34  | 0.1133  | 1.852             | GATE_PASS |
  | QRA2-4 | 624       | 0.18  | 0.0600  | 2.753             | GATE_PASS |
  | QRA2-5 | 300       | 0.30  | 0.1000  | 2.062             | GATE_PASS |
  | QRA2-6 | 520       | 0.24  | 0.0800  | 1.859             | GATE_PASS |
  | QRA2-7 | 240       | 0.33  | 0.1100  | 2.130             | GATE_PASS |

  All seven clear the >5yr hard gate. Five clear the <=2yr first-candidate confirmability
  floor (QRA2-1/2/3/5/6); QRA2-7 at 2.13yr is a borderline miss of the <=2yr floor (still
  <3yr PASS); QRA2-4 at 2.75yr is a clean <=3yr PASS but not first-candidate-grade. None
  is in the 3-5yr STRETCH band and none GATE_FAILs.

