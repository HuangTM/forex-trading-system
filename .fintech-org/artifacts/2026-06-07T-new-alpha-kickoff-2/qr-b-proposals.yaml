body: |
  ## Slice-B Wave-2 generation summary (CONFIRMABILITY-gated)

  Seven proposals across the four mandated Slice-B sub-domains, every one screened
  against the new 4th hard gate (confirmability) at GENERATION TIME — the QRB-6 lesson
  made structural.

  Sub-domain coverage:
    - Novel carry-CONDITIONING (NOT the dead carry level): QRB2-1 (carry-rank momentum
      confirmation gate — carry rank GATES a per-pair trend), QRB2-6 (carry-rank dispersion
      basket — DISCLOSED GATE_FAIL exemplar).
    - Trend / breakout STRUCTURE: QRB2-2 (Donchian + vol-expansion gate), QRB2-7
      (post-squeeze breakout — STRETCH).
    - Regime-conditioning GATES on a base signal: QRB2-3 (correlation-decoupling gate on
      trend), QRB2-5 (vol-persistence / efficiency-ratio gate on trend).
    - Cross-sectional / relative-value: QRB2-4 (idiosyncratic bloc-residual continuation,
      executed PER-PAIR to keep confirmability), QRB2-6 (portfolio basket — the trap).

  ## How confirmability was engineered IN, not bolted on

  The binding constraint this wave is years_to_validate, and the dominant lever is
  events_per_year. A PORTFOLIO/cross-sectional rebalance is LOW-frequency (QRB2-6:
  weekly=52 events/yr -> 8.26yr -> GATE_FAIL, matching the rubric's own anchor). A
  PER-PAIR daily signal is HIGH-frequency (hundreds of events/yr per pair). So six of
  seven proposals are PER-PAIR by deliberate design, landing in the 1.95-3.58yr range:
    - QRB2-2  1.95yr  GATE_PASS (clears the <=2yr first-candidate floor)
    - QRB2-5  2.15yr  GATE_PASS
    - QRB2-1  2.47yr  GATE_PASS
    - QRB2-4  2.47yr  GATE_PASS
    - QRB2-3  2.84yr  GATE_PASS
    - QRB2-7  3.58yr  STRETCH   (squeeze gate thins the active stream below daily cadence)
    - QRB2-6  8.26yr  GATE_FAIL (the disclosed QRB-6-in-new-guise portfolio trap)

  ## Recommended-first-candidate posture (HoQR adjudicates)

  QRB2-2 (Donchian breakout + vol-expansion gate) is my strongest a-priori candidate: a
  named, regenerating, price-insensitive loser (stop/barrier clusters), a sharp
  placebo-equipped falsification, inherently LOW turnover with edge >> the ~1.5-pip floor,
  data_readiness 5 (pure OHLC, processed parquet), and — critically — confirmability 4
  (1.95yr) clearing the new first-candidate floor. QRB2-1 (carry-rank trend gate) is the
  most novel carry-conditioning and the runner-up. I FLAG three Slice-A straddles inline
  (QRB2-3 vs QRA-4, QRB2-4 vs QRA-1/QRA-4, QRB2-5 vs QRA-3) and one likely NHT novelty
  risk (QRB2-6 basket = canonical carry). NO-SPEND remains a valid terminal outcome.

  ## Honesty attestations

  No backtest, no return data, no Sharpe/drawdown was computed. per_event_SR_estimate_IS
  are a-priori guesses for the confirmability arithmetic only; NHT recomputes and governs.
  QRB2-6 is included intentionally as the confirmability-trap exemplar (GATE_FAIL),
  proving the gate was applied at generation rather than hidden. cb_decision_dates.parquet
  exists but was deliberately not used (forbidden calendar event study).
