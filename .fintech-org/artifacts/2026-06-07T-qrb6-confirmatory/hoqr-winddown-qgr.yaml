winddown_ruling:
  ratify: true
  basis: 'The exploratory AMBIGUOUS verdict (fa0f982a: p_post2015=0.0027, p_agg=0.0231 both clean-reject, sr_ann_pooled=1.352,
    DSR=0.9070 < 0.95 under the N_sel=3 selection charge) is a real in-sample edge that fails ONLY the conservative deflation
    bar. The confirmatory (53981a4a) was designed to clear that bar at N_sel=1 (SR0->0, the selection penalty legitimately
    vanishes since no NEW selection occurs forward) -- but the Mathematician''s orchestrator-verified power analysis is dispositive
    and I independently reproduced every number: at the bootstrap-valid 2030-04-07 look (n~120) power = 0.091; n*(80%) = 7669
    events (~256yr under the 1/3 haircut) or 852 events (~28yr at full effect); even a 50% coin-flip rejection needs 373 events
    (~12.4yr full / ~112yr haircut) against a forward run-rate of ~30 verified-official event-days/yr. A test whose terminal
    power is ~9% is not a confirmatory; it is a 9%-chance lottery ticket on a binary that takes 4 years to resolve and CANNOT
    distinguish a real modest edge from zero. Properly annualized the edge is ~0.16-0.47 Sharpe at ~30 events/yr -- real but
    un-accruable on any tradeable horizon. Wind-down is the correct terminal disposition: archive as a documented near-miss,
    NOT a validated strategy and NOT a clean falsification.'
alternatives_rejected:
  freeze_low_power: 'REJECT. Freezing the ~9%-power 2030 look with a NON-PUNITIVE decision map (non-reject pre-defined as
    "inconclusive, not kill") manufactures an UNFALSIFIABLE test: with 91% probability of non-rejection EVEN IF THE EDGE IS
    REAL, a non-reject carries almost no information, and pre-committing that it cannot kill removes the only branch that
    would make the freeze worth cutting. You would spend a freeze-receipt, a 4-year calendar lock, and finite research-governance
    capacity to purchase a near-certain "inconclusive." The orchestrator''s concern is CORRECT (see unfalsifiability_concern_verdict).
    Note the QR draft''s OWN terminal decision map (qr-prereg-draft.yaml:39-48) makes non-reject a KILL -- which at 9% power
    is the opposite failure: a structurally-guaranteed false KILL of a possibly-real edge. EITHER mapping is illegitimate
    at this power; the defect is the power, not the map. The fix is to not run, not to re-map.'
  long_horizon: REJECT as primary. The Math horizon curve (math-spec.yaml:152) shows power rising only 0.091 -> 0.103 -> ~0.12
    from +4yr to +6yr to +10yr; the kill_switch bar falls (2.39 -> 1.95 -> 1.51) but the firm would defer a binary a DECADE
    for a sub-3% power gain. n*(80%) at the haircut effect is ~256yr -- no single-bank horizon reaches adequate power within
    any institutionally meaningful window. Deferring a decision ten years is functionally identical to wind-down except it
    ties up a frozen trial and pretends a verdict is coming. Honest wind-down dominates a decade-long pseudo-confirmatory.
    (Disclosed to CEO as an elective if a lower kill bar is ever preferred, but I do not recommend it.)
  expand_universe: REJECT as a confirmatory; ENDORSE only as a SEPARATE future hypothesis. Adding BoE/ECB/RBNZ would accrue
    events faster (~70-80/yr), but it is a DIFFERENT structure on DIFFERENT banks requiring aggregator-grade forward calendar+OHLCV
    the firm does not have verified-official. It cannot confirm fa0f982a -- changing the event universe changes the estimand,
    breaks the structural identity the confirmatory rests on (qr-prereg-draft.yaml:33 structural-deviation VOID), and re-introduces
    a fresh selection/multiplicity charge. It is a NEW exploratory bet, not a re-test of this one. The CB-decision continuation
    FAMILY may merit a future wave with a multi-bank universe scoped from the start (and aggregator data sourced first) --
    that belongs in new-alpha generation under the confirmability lesson below, not as a rescue of QRB-6.
unfalsifiability_concern_verdict:
  orchestrator_correct: true
  detail: 'A pre-committed decision map in which non-rejection is defined as "inconclusive, never kill" makes the test unfalsifiable:
    at ~9% power the test will non-reject ~91% of the time when the alternative is TRUE, so a non-reject is near-uninformative,
    and removing the kill branch means NO finite outcome can retire the hypothesis -- the strategy becomes immortal-by-construction.
    The proper response is not to choose between a false-KILL map and an immortal map; it is to recognize that NO map salvages
    a 9%-power binary. Wind down.'
trial_retirement_ruling:
  honest: true
  counter_treatment: 'Retire 53981a4a as ''withdrawn-pre-freeze (infeasible power)''. It must NOT count toward the org-wide
    DSR deflation denominator. This is HONEST, not counter-gaming. The deflation charge (BLdP) penalizes selection over REALIZED
    candidate results -- E[max of N tested Sharpes]. 53981a4a was never frozen, examined zero return bars (qr-prereg-draft.yaml:32
    early-peek VOID held; no FREEZE-RECEIPT was cut), and produced no Sharpe that could have entered any argmax. A test that
    produced no result cannot have been selected-on, so it adds nothing to the max-of-N benchmark; charging it would PENALIZE
    future real tests for a test that never ran -- the inverse of honest accounting. Contrast the bet1 precedent (87fa1d23):
    that trial was RUN, regenerated, and FALSIFIED (trials.jsonl; commit 2dfd122) -- it counts, because it produced a realized
    verdict. The discriminating rule is "was a result realized," and it cleanly separates the two cases. The exploratory fa0f982a
    (which DID realize a result and already bore its own N_sel=3 charge) remains in the denominator unchanged. Trial counter
    stays at 42 spawned; 53981a4a logged withdrawn, not completed.'
qrb3_disposition: UNCHANGED -- stays queued/independent. QRB-3 advanced ONLY conditional on a post-2015 sub-window KILL of
  QRB-6, which never occurred (the exploratory was AMBIGUOUS, the confirmatory had no post-2015 KILL branch by construction
  -- qr-prereg-draft.yaml:49-56). Wind-down of QRB-6 is neither a KILL nor a graduation and triggers NO auto-advance. QRB-3
  remains a queued runner-up requiring its own fresh pre-registration and trial_id under separate governance if/when the firm
  elects to pursue it. No changed disposition.
confirmability_lesson:
  adopt: true
  form: 'Bank as an institutional rule and add to the HoQR rubric and the next new-alpha wave: hypothesis generation must
    score CONFIRMABILITY up front -- (events/yr x per-event Sharpe) must be high enough to reach >=80% power (or at minimum
    >50% rejection power) within <=3yr of forward data BEFORE a structure enters the exploratory queue. Rare-event studies
    of modest edges (low events/yr x low per-event effect) are STRUCTURALLY unconfirmable on a tradeable horizon regardless
    of in-sample significance, because in-sample power was bought with a many-year accumulation (here 500 events / 16yr) that
    cannot be reconstituted forward. A pre-screen: estimate forward run-rate and haircut effect, compute n*(power) and years;
    if years > 3 at 50% power, the hypothesis is research-interesting but NOT validatable -- route to a higher-frequency variant
    or drop. This would have flagged QRB-6 at generation.'
