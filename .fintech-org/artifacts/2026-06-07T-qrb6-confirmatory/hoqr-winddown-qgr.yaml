confidence: high
body: 'RATIFY wind-down (decision A), retire-pre-freeze without counter charge (B), and adopt the

  confirmability lesson (C). The exploratory found a REAL modest low-frequency edge that fails

  only the appropriately-conservative N_sel=3 deflation bar; the confirmatory was correctly

  designed to neutralize that bar at N_sel=1, but its terminal power at the bootstrap-valid 2030

  look is ~9% -- I reproduced every Math number independently and they hold. A ~9%-power binary

  is not confirmable: every decision map at that power is illegitimate (non-reject=KILL false-kills

  a real edge; non-reject=inconclusive makes the test immortal -- the orchestrator''s unfalsifiability

  concern is correct). I steelmanned three rescues: a non-punitive low-power freeze (rejected --

  unfalsifiable), a longer horizon (rejected -- sub-3% power gain for a decade''s deferral; 80% power

  is ~256yr away), and a multi-bank universe expansion (rejected as a confirmatory -- it is a DIFFERENT

  estimand and a NEW selection charge, though it merits a separate future wave). The "do not count

  53981a4a" accounting is honest: it produced no realized result, so it cannot have been selected-on

  and adds nothing to the max-of-N deflation benchmark; charging it would penalize future real tests.

  This contrasts cleanly with bet1, which was run and falsified and DOES count. QRB-3 stays queued and

  independent -- its advance condition (post-2015 KILL of QRB-6) never fired. Archive QRB-6 as a

  documented near-miss. No capital on any branch.

  '
