body: |
  Full derivations in math-sections.md (PART II echoing the QR structure by reference).
  Headline frozen set for trial 53981a4a:
    N_sel=1 -> SR0_pp_conf=0.0, SR0_ann_conf=0.0 (BLdP expected-max bracket collapses at
      N=1; the 0.4264-ann selection penalty that sank the exploratory's DSR is removed).
    Look design: SINGLE TERMINAL LOOK, full alpha=0.05 once (NOT 2-look OBF -- the ~30
      events/yr rate makes an interim under-powered and below the bootstrap floor).
    Bootstrap-validity floor: n >= 90 deduped event-days (4 bank-blocks, PW L~1-3).
    Planning Sharpe: 1/3 * 1.3521 = 0.4507 ann (per-event g_pp=0.028392); 80% power
      unreachable (n*~7670, ~256yr) under the inherited per-event convention -- disclosed.
    Lock horizon: +4yr -> terminal n~120 events -> LOOK DATE 2030-04-07.
    kill_switch_threshold = 2.3936 (min ann Sharpe to clear DSR>=0.95 at SR0_pp=0, T=120,
      var_term=1; LOWER than the exploratory's 1.5883 WOULD be at equal T -- at T=506 the
      N=1 value is 1.1619 vs 1.5883, the 0.4264 difference being exactly the removed SR0;
      it is HIGHER than 1.5883 here ONLY because T=120 << 506 shortens the sqrt(T-1) lever).
    master_seed = 478426 (int('53981a',16)=5478426 mod 1e6).
    Constants: K=10000, alpha=0.05, MC-SE 0.002179 at p=0.05, banks-as-blocks stationary
      bootstrap, PW auto block length, +1/+1 convention.
  decision: sound. NHT to review the single-look election and the disclosed underpower.

