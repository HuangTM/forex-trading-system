body: |
  RULING: the QRB-6 wind-down SURVIVES the honesty test. It is the honest call on all five axes.

  (1) Killing a real signal? No. p_post2015=0.0027 is an IN-SAMPLE rejection on the already-
  deflation-charged exploratory; fa0f982a is AMBIGUOUS, not a PASS. The only way to upgrade it
  is forward confirmation, and forward confirmation is mechanically out of reach: per-event
  Sharpe ~0.085 (un-haircut) / 0.028 (haircut), pooled non-centrality grows as sqrt(n), so 80%
  power needs 852-7670 events (28-256 yr) and even a 50% coin-flip reject needs 373 events
  (12 yr). I reproduced all of these from NormalDist primitives. No honest higher-power path
  exists on this statistic/data: the longest disclosed horizon (+10yr/n=300) still yields ~12%
  power, and the only richer-statistic idea is a NEW bet (QRB-7), not a confirmation of this one.

  (2) Honest or convenient? Honest. The barrier is mechanically verified, and -- the decisive
  test -- it does NOT collapse under a more generous assumption. I deliberately ran the
  un-haircut, in-sample-biased 1.352 Sharpe to try to manufacture a feasible path; it still
  fails. A convenient abandonment would have a power story that breaks when you steelman pursuit.
  This one strengthens.

  (3) Unfalsifiability. The orchestrator is PARTLY right -- correct about the option it rejected
  (the non-punitive decision map, which truly has no kill branch and can only PASS or SHRUG), but
  imprecise if generalized: the QR-authored draft DOES make non-rejection a KILL, so it is
  technically falsifiable. The precise objection is DIAGNOSTIC INERTNESS: at <=9% power the KILL
  outcome is "uninformative as evidence of no edge" and the rare reject is a low-prior surprise --
  the test cannot teach the firm anything either way. "Inconclusive at low power" IS a legitimate
  third outcome a sequential trial can carry (cf. the carry confirmatory frozen at ~34%), but only
  when a horizon exists at which power becomes adequate. Here none does. Same wind-down, sounder
  reasoning.

  (4) Counter integrity. Honest. 53981a4a is unfrozen (no receipt), un-run, no data examined ->
  withdrawn-pre-freeze, not counted in the deflation denominator -- the exact bet1 rule ("no new
  trial registered, honest-N unchanged"). Counting an un-run trial would be the gaming move.
  Caveat: unlike bet1 (which fired an actual gate), 53981a4a fired nothing, so it must be logged
  as "withdrawn, never tested," NOT cited as a "falsified survivor."

  (5) Self-scrutiny. I ratified this pre-reg and adjudicated its voided run, so I re-derived every
  number independently and ran the assumptions most likely to let me dissent. The wind-down held.
  This is not a rubber stamp: the inversion test (what would make pursuit honest?) returns nothing
  achievable.

  ONE FLAG for the firm (not a dissent): bank the lesson precisely -- the failure is CONFIRMABILITY
  (a real-but-tiny per-event effect on a sparse series cannot be forward-validated at power), NOT
  "no edge." Do not let the wind-down narrative drift into "QRB-6 was falsified"; it was withdrawn
  as unconfirmable. And keep the door open for a DIFFERENT statistic on CB-decision data as a fresh
  bet (QRB-7), which would carry its own N_sel charge -- that is the only honest higher-power avenue,
  and it is a new question, not a rescue of 53981a4a.

