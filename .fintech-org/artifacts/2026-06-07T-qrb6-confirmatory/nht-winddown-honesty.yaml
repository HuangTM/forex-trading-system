summary: >-
  The QRB-6 wind-down is the HONEST call, not a convenient abandonment. I independently
  reproduced every power number: at the firm's frozen planning Sharpe the confirmatory
  reaches ~9% power at the +4yr terminal look and never exceeds ~12% even at a +10yr
  horizon; 80% power needs 256 years, and even under the most generous (un-haircut,
  in-sample-biased 1.352) Sharpe convention 80% power still needs 28 years and a coin-flip
  50% reject needs 12 years. No higher-power confirmation path exists on this statistic or
  feasible horizon. The proposed retirement of the un-frozen trial 53981a4a is counter-honest
  (no receipt cut, no run, no return data examined -- exact parallel to the bet1 "no new
  trial registered, honest-N unchanged" precedent). The orchestrator's unfalsifiability
  argument is CORRECT but applies only to the rejected "non-punitive decision map" variant;
  the QR-authored confirmatory draft itself carries a real KILL-on-non-reject branch and is
  technically falsifiable -- the honest objection is not "unfalsifiable" but "diagnostically
  inert": at <=9% power a non-rejection is uninformative as evidence of no edge, so the test
  cannot distinguish a real modest edge from noise either way.

