killing_real_signal_ruling:
  verdict: >-
    NOT killing a confirmable signal. The in-sample p_post2015=0.0027 is a strong rejection,
    but it is IN-SAMPLE on the snooped 2010->2026-04-06 set and already deflation-charged
    (DSR 0.907 < 0.95 at N_sel=3). The question is not "is there in-sample alpha" (there is a
    suggestive in-sample pattern) but "can it be CONFIRMED forward on a feasible horizon" --
    and the answer is mechanically no. Pooled event-study non-centrality grows only as sqrt(n);
    the per-event effect is genuinely tiny (~0.085 Sharpe even un-haircut). The wind-down does
    not throw away a confirmable edge because there is no horizon on which forward confirmation
    is achievable at meaningful power.
  honest_higher_power_path_exists: no
  higher_power_paths_examined:
