    - "Firm's own (larger) data: the holdout is constrained to verified-official {FED,BOJ,RBA,BOC}
       ~30 events/yr by the anti-fabrication rule. There is no larger honest event source to draw
       on without fabricating CB dates -- the sparsity is a property of the world, not a lazy
