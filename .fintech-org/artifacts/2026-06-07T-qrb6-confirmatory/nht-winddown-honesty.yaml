       Disclosed in math-sections 3.5 and reproduced. Deferring a binary a decade for sub-2%
       power gain is not a real path -- it is the same inert test, later."
    - "Un-haircut planning Sharpe (use 1.352 directly): even this best case needs 28yr for 80%
       and 12yr for a 50% coin-flip. The haircut is conservative but the conclusion is robust to
