winddown_honest_or_convenient:
  verdict: >-
    HONEST. The infeasible-power barrier is mechanically verified (I re-derived it from first
    principles, not from the spec's numbers), not a rationalization. The tell of a convenient
    abandonment would be a power claim that collapses under a more generous assumption -- here
    the opposite holds: even stripping the 1/3 haircut and stretching to +10yr, confirmation
    stays out of reach. The firm is NOT burying a would-be first validated strategy: fa0f982a
    is AMBIGUOUS (DSR 0.907 < 0.95), already not a PASS under its own pre-registered gate, and
    the only forward test that could upgrade it is diagnostically inert. There is no result
    being quietly suppressed.

unfalsifiability_ruling:
  orchestrator_correct: partly
  basis: >-
    The orchestrator's argument is CORRECT as applied to the specific option it rejected --
    "freeze a low-power look with a NON-PUNITIVE decision map" where the ~80-90%-probable
    non-rejection is pre-defined as 'inconclusive, not a kill'. A test whose only likely
    outcome is pre-labelled non-falsifying has no effective falsification branch: it can
    PASS or SHRUG, never KILL, so it cannot be wrong and earns nothing. That is a correct
    application of falsification discipline. HOWEVER the orchestrator over-reaches if the
    claim is read as "any low-power confirmatory is unfalsifiable." The QR-authored draft
    (qr-prereg-draft.yaml decision_map item 2) DOES make non-rejection a KILL/archive-FALSIFIED
    -- it is technically falsifiable. The precise, defensible objection is not unfalsifiability
    but DIAGNOSTIC INERTNESS: at <=9% power, BOTH a non-reject (which then fires KILL) and a
    rare reject are near-uninformative about the underlying edge -- a KILL at 9% power "is
    uninformative as evidence of no edge" (math-sections 3.4, verbatim), and a reject would be
    a low-prior surprise. A legitimately-designed sequential trial CAN carry a third
    "inconclusive" outcome (the carry confirmatory f2fb41fd was frozen at ~34% power with an
    interim-futility branch), so "inconclusive at low power" is a legitimate state -- but it is
    only worth FREEZING when there is a realistic horizon at which power becomes adequate. Here
    there is none. So the correct frame: not "unfalsifiable" (imprecise) but "a falsifiable test
    with no informative outcome on any feasible horizon" -- which justifies wind-down on the
    same ground.

counter_integrity:
  honest: yes
  basis: >-
    53981a4a has NO freeze-receipt (verified: only r5's FREEZE-RECEIPT.yaml exists in
    references/pre-registrations/; the qrb6_confirmatory .md is authored but unfrozen). No
    look ran, no post-2026-04-06 return data was ever examined (the data does not yet exist).
    Retiring it as withdrawn-pre-freeze and NOT counting it in the deflation denominator is the
    HONEST accounting, and it matches the bet1 precedent exactly: there, equity was regenerated
    but "No new trial registered (honest-N still 10)" because no NEW selection/test was run.
    The inverse error -- counting an un-run, un-frozen trial in the multiplicity denominator --
    would itself be counter-gaming (inflating the apparent breadth of testing). One asymmetry vs
    bet1 worth flagging: bet1 RETIRED on an actual fired falsification gate (DSR 0.13 << 0.50 on
    regenerated equity); 53981a4a retires with NO test having fired at all. That is fine for the
    denominator (nothing to deflate) but the firm must NOT later cite 53981a4a as a "falsified"
    survivor -- it is "withdrawn pre-freeze, never tested," a weaker claim than bet1's
    "tested and falsified."

self_scrutiny_note: >-
  I ratified the QRB-6 pre-reg and adjudicated its voided contaminated run, so I have a stake in
  a tidy ending and applied extra scrutiny accordingly. I did NOT take the math-spec's numbers on
  trust -- I re-derived per-event Sharpe, n*, and the full power curve from NormalDist primitives,
  and I deliberately ran the MOST GENEROUS (un-haircut, in-sample-biased 1.352) convention to try
  to MANUFACTURE a feasible path, because that is the assumption that would let me dissent and
  demand the work. It still fails (28yr for 80%, 12yr for a coin-flip). I also checked the longest
  disclosed horizon (n=300/+10yr): ~12% power. The barrier survived every attempt to break it. The
  one place I cannot fully clear the firm is the "different statistic" path (knowledge_gaps) -- but
  that is a NEW bet, not a confirmation of this one, so it does not change the 53981a4a verdict.
  Conclusion is NOT a rubber-stamp: it is wind-down BECAUSE the inversion test (what would make
  pursuit honest?) returns nothing achievable.

