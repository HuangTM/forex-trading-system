     look — this is a named pre-look obligation. If the acquisition fails for any bank,
     that bank's post-freeze events cannot be included without a governance exception."
  - "Post-2026-04-06 OHLCV for the 11 Scenario-A pairs will be available via the existing
     pipeline at look time. If gaps occur, the exclude-not-impute rule applies; the
     n_event_cost_or_data_gap MUST be 0 gate is the enforcement mechanism."
  - "The ~30 verified-official event-days/yr run rate ({FED,BOJ,RBA,BOC} ~8/yr each) is
     directionally correct for power planning; the Mathematician refines based on the
     actual forward run rate at freeze."
  - "The N_sel=1 election is legitimate because the structure is pre-committed before
     the look — the DSR selection-deflation charge attaches to the selection event, which
     was fa0f982a's 11-proposal → 2-finalist → QRB-6 selection. That charge is already
     spent (fa0f982a burned the trial); the confirmatory pre-commits the structure and
     runs it on data neither the firm nor the model has seen, removing the new-selection
     charge for this look. NHT must explicitly adjudicate this claim."
  - "The cost manifest config/cost_freeze_qrb6.yaml covers the 11 Scenario-A pairs with
     non-zero costs. Any post-freeze universe change (new pair added to a bank's coverage)
     requires a governance exception — it cannot be silently absorbed."
  - "CEO ratification is required before the freeze-receipt is committed; this track does
     not have authority to cut the freeze-receipt autonomously."

confidence: high

body: |
  This acceptance-criteria document governs Wave 1 of track qrb6-confirmatory-2026-06-07.

  The QRB-6 exploratory (trial fa0f982a) ran 2026-06-07 and returned RULE_4_AMBIGUOUS:
  p_post2015=0.0027 (clean reject), p_agg=0.0231 (clean reject), pooled ann Sharpe=1.352,
  BUT DSR=0.907 < 0.95 — the selection-deflation charge (N_sel=3: best of 11-proposal
  portfolio + 2-finalist comparison) eats the edge and the DSR gate does not clear.

  The CEO has elected confirmatory under pre-reg §4.2 RULE 4. This burns a NEW trial
  (org counter 41 → 42). The logic: by pre-committing the structure NOW — before any
  forward data exists — the confirmatory removes the selection charge from this new look.
  N_sel=1 at the look. The Mathematician derives the resulting (substantially lower) SR0,
  and the fresh kill_switch_threshold will be materially lower than fa0f982a's 1.5883.

  The forward event set (post-2026-04-06) is unsnoopable because it does not yet exist.
  Both the forward CB calendar and the forward OHLCV must be acquired before the look —
  this is a named pre-look obligation explicitly out of this wave. At ~30 events/yr, the
  lock horizon is likely multi-year (the Mathematician derives the exact look date from
  the power curve at the planning Sharpe). The carry confirmatory (2028-10-06 / 2031-04-06)
  is the structural reference for lock horizon shape.

  The cost manifest (config/cost_freeze_qrb6.yaml) is reused immutably — no re-derivation.
  The cost-coverage gate (n_event_cost_or_data_gap MUST be 0) applies to the forward event
  set; any gap in cost coverage for a forward event is a loud EXCLUDE, never a silent zero.

  Wave 1 deliverable: a complete, frozen, CEO-ratified confirmatory pre-reg. The forward
  acquisition and the one-shot look are post-freeze STEPs gated by the calendar lock + CEO ack.

knowledge_gaps:
  - "The N_sel=1 SR0_pp value — the Mathematician must derive this fresh; PM cannot pre-compute
     it. The direction is clear (lower than fa0f982a's N_sel=3 SR0_pp_sel=0.026861), but the
     exact value requires the BLdP formula at N_sel=1 with the QRB-6 dispersion."
  - "The planning Sharpe (haircut from the exploratory's 1.352) — the Mathematician decides
     the decay function. The in-sample 1.352 is selection-biased upward; the honest planning
     value is lower. Carry-confirmatory used SR_plan = SR0_ann_conf as the conservative anchor."
  - "Single-look vs 2-look OBF decision — flagged to the Mathematician as the most important
     design decision (see final message). This determines whether the look design mirrors
     carry-confirmatory or departs from it."
  - "The exact lock horizon (look date(s)) — derived by the Mathematician from the power
     curve at the planning Sharpe and the ~30 events/yr run rate."
  - "Fresh kill_switch_threshold — derived by the Mathematician at N_sel=1 SR0_pp and
     T_holdout at the terminal look."
  - "Whether the existing QRB-6 runner requires substantive new code or only date-window
     parameter addition — QD assessment at the start of the wave."

