body: >
  The QRB-6 wind-down is ratified. The synthesis is clean: both ratifiers independently reproduced
  every power number to zero delta, applied the most generous feasible assumptions to try to
  manufacture a confirmable path, and both concluded none exists. HoQR steelmanned three
  alternatives (low-power freeze, long horizon, universe expansion) and rejected all on distinct
  grounds: unfalsifiable/inert decision map; decade's deferral for sub-3% power gain; different
  estimand requiring new selection charge. NHT applied the inversion test (what would make pursuit
  honest?) and found nothing achievable. Two refinements from NHT are adopted without dissent:
  (1) "diagnostic inertness" is the sounder and more defensible characterization than
  "unfalsifiability" — the QR-authored draft does carry a KILL branch and is technically
  falsifiable; the objection is that at ≤9% power neither outcome is informative; (2) 53981a4a
  must be logged "withdrawn, never tested" and must NOT be cited as "falsified" — a test that
  produced no result cannot be a falsification. These refinements strengthen the basis; they do
  not constitute a dissent. QRB-3 stays queued/independent; its advance condition never fired.
  The confirmability lesson is adopted: future hypotheses must score (events/yr × per-event
  Sharpe) before entering the exploratory queue, with a ≤3-year path to ≥80% power as the bar.
  No capital on any branch. No dissent artifact.

