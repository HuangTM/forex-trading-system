body: |
  Implemented the additive date-window mechanism so the EXACT QRB-6 exploratory
  pipeline runs on a forward event window read from the confirmatory receipt, without
  altering exploratory behavior. The window filter is a pure function
  (apply_date_window) plus a relaxable count guard (enforce_exploratory_count); both
  default to the exploratory behavior. _run_pipeline threads an optional date_window;
  None reproduces the exploratory run byte-for-byte. main() gained --confirmatory which
  uses the confirmatory receipt/paths/constants only.

  The qrb6_confirmatory freeze target was registered with n_sel=1, the frozen
  window_start (2026-04-07), the reused exploratory cost-manifest sha, distinct sr0_note,
  and [ASSEMBLY] placeholders for the Math-derived constants. The cost-coverage gate now
  gates the confirmatory cut too. All gap-proofing (exclude-not-impute, manifest
  interlock, coverage gate, n_event_cost_or_data_gap==0 invariant, p-threshold
  receipt-constant checks) is inherited; an empty-forward-window RULE-0 and a
  DO-NOT-RUN-YET forward-acquisition stub were added so a forward window with no
  events HALTs loudly instead of silently passing.

  Verified: 25 new tests green, 482 harness tests green (exploratory unaffected),
  sacred test green, ruff clean, all four receipt-target dry-runs correct and writing
  nothing. No git commit performed; no live run or look executed.

