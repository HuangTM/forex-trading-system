body: |
  This is the QR-owned draft of the QRB-6 CONFIRMATORY pre-registration (trial 53981a4a),
  the single-structure forward re-test the CEO elected after the exploratory (fa0f982a)
  returned RULE_4_AMBIGUOUS: both p-gates cleanly rejected (p_post2015=0.0027, p_agg=0.0231,
  pooled ann Sharpe 1.352) but DSR=0.907 < 0.95 under the N_sel=3 selection-deflation charge.

  The confirmatory re-tests the SAME structure (pinned IDENTICAL to fa0f982a, receipt sha
  7438b0a...) on UNSNOOPABLE future CB-decision data (strictly after 2026-04-06) with N_sel=1
  (no selection charge). A rejection here is NOT a selection artifact because there is no
  selection event between this freeze and this look.

  Authored (QR-owned, in references/pre-registrations/qrb6_confirmatory_cb_event_study.md):
  - Section 1: preamble + confirmatory-grade contract; trial echo (53981a4a); lineage
    (fa0f982a AMBIGUOUS -> CEO RULE-4 confirmatory elect); the confirmatory logic
    (pre-committed single structure on not-yet-existing data); VOID conditions (return-data
    peek before freeze, structural deviation from fa0f982a, snooped/exploratory-window event
    in the set, manual look before the locked date, cross-trial constant import, wrong-id/
    freeze-mismatch).
  - Section 2: the structure pinned IDENTICAL to fa0f982a (quoted, not redesigned) -- signed
    product, K_pre=1/K_post=2 windows, pair-bank map, cost manifest sha 6ec6937e, spread_z=3.0,
    exclude-not-impute; the ONLY three differences stated explicitly: (a) forward/unsnoopable
    event set, (b) N_sel=1, (c) confirmatory decision gate (Math-owned).
  - Section 3: the holdout event set (events strictly after 2026-04-06, zero overlap;
    verified-official grade only; the forward-acquisition obligation as a named pre-look step
    out of this wave; same dedup/roll-forward as fa0f982a 3.4/4.1; Math co-sign placeholder
    for minimum event-day count).
  - Section 4: decision map (PASS requires BOTH p-reject AND DSR>=0.95 at N_sel=1 -- the gate
    fa0f982a's 0.907 could clear; KILL at terminal if no reject; QRB-3 does NOT auto-advance
    on a confirmatory outcome -- different rule than fa0f982a's post-2015-KILL graduation
    branch; PASS authorizes only a fresh observe-only paper canary, NO capital; terminal
    AMBIGUOUS -> wind-down; the post-2015 sub-window is MOOT because the forward window IS
    entirely post-2015).
  - Section 5: kill_switch_threshold verbatim field with [VALUE FROM MATHEMATICIAN].
  - Section 7: freeze mechanics (cut_freeze_receipt.py --target qrb6_confirmatory;
    receipt-before-any-return-data; calendar-lock until the Math-derived look date; the
    one-shot look as a separate post-freeze CEO-acked STEP).
  - Section 6: interim observe-only monitoring state.

  Mathematician PART II placeholders (merged at assembly): SR0/N_sel=1 derivation; single-look
  vs 2-look OBF look design; power curve -> look-date / lock horizon; fresh kill_switch_threshold
  (strictly different from 1.5883 and 1.2906); seed (hex-mod-1e6 from 53981a4a) / K=10000.

  No capital is authorized on any branch. The forward acquisition and the one-shot look are
  post-freeze STEPs gated by the calendar-lock + CEO ack.

