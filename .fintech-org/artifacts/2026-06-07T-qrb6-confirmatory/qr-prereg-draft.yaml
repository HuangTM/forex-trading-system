decision_map_summary: >-
  (1) p-reject AND DSR>=0.95 at N_sel=1 -> GRADUATE to fresh observe-only paper canary
  (new trial_id, own ratification, NO CAPITAL); (2) fail to reject at terminal look ->
  KILL the structure (archive FALSIFIED); (3) optional interim futility (if Math freezes
  one) -> early KILL; (4) CONTINUE to next look (2-look design only; unavailable at terminal);
  (5) TECHNICAL FAILURE (code/data/freeze/provenance fault) -> HALT, root-cause, re-freeze,
  re-run, trial counter NOT incremented. Terminal AMBIGUOUS (p-reject but DSR<0.95 at the
  terminal look) -> wind-down (no confirmatory-of-a-confirmatory). PASS requires BOTH p-gate
  rejection AND the N_sel=1 DSR gate. No keep-spending escape; terminal look is binding.

qrb3_advance_rule: >-
