  confirmatory has no post-2015 sub-window KILL branch (the forward window is entirely
  post-2015 by construction), so that advancing condition does not exist here. A
  confirmatory KILL, early futility KILL, or terminal AMBIGUOUS does NOT advance QRB-3;
  QRB-3 would require its own fresh pre-registration and trial_id under separate governance.

