# =========================================================================
# ROUTED TO
# =========================================================================
routed_to: quant-developer
conditions:
  - "QD must apply negation (-cost_model.rollover_cost_for_bar) not raw return; see sign_convention_correction"
  - "QD must add all 7 test_obligations before PR is mergeable"
  - "QD must NOT touch _run_discrete or the else-branch of the new rollover gate"
  - "QD must NOT wire rollover accrual into _close_position (include_swap=False already guards this)"
  - "The import of RolloverAwareRealisticCostModel into engine.py must be guarded as TYPE_CHECKING if desired, but must be a real runtime import for isinstance to function"
