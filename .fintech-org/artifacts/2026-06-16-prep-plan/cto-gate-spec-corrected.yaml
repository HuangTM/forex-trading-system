# =============================================================================
# SECTION 7 — GATE BEHAVIOR AND SEMANTICS
# =============================================================================
gate_behavior:
  on_fail: EXCLUDE         # NEVER impute — direct remediation of QRB-6 zero-imputation void
  on_warn: LOG_AND_PASS    # only SPREAD_COL_MISSING_WARNING in structural check is treated as warning-then-EXCLUDE (step 2 overrides this for spread-absent parquets)
  per_pair_semantics: >
    The gate is PER-PAIR. An ADMIT verdict on EURUSD is independent of USDJPY's verdict.
    Approved pairs proceed to research without waiting for excluded/pending pairs.
    This prevents a single bad pair from blocking the entire intraday research pipeline.
  approved_status_output: "data/processed/{PAIR}_1h_gate_result.json"
  aggregate_output: ".fintech-org/artifacts/1h-gate-results.yaml"
  gate_run_trigger: "after backfill completes for a pair; before any pre-registration references that pair"
  gate_run_owner: "cto (automated via pytest -k TestIntegrationGateDecision; output reviewed by CTO before publishing)"
  re_run_policy: >
    Gate results are versioned by timestamp. If a pair is re-pulled (e.g. after fixing an
    ingest bug), the gate MUST be re-run and the new result replaces the old one in
    aggregate_output. Any pre-registration that referenced the prior ADMIT result must be
    re-validated if the new result is EXCLUDE or MANUAL_REVIEW.

# =============================================================================
# SECTION 8 — WHAT THIS SPEC DOES NOT COVER (UNCHANGED FROM cto-infra-prep.yaml)
# =============================================================================
out_of_scope_of_this_correction:
  - "CTO-D1 test classes (TestPerPairBarCountGate, TestGapFractionGate, etc.) — unchanged, but QD must update fixture parametrize values to use min_bars_2yr=10,000 from this spec, not 17,520"
  - "CTO-D3 feature stubs (session.py, intraday_atr.py, time_encoding.py) — unchanged"
  - "CRO Deliverable A cost model extension spec — unchanged; CTO endorses CRO's EXCLUDE-NOT-IMPUTE binding constraint and measured_spread_fraction >= 0.90 gate verbatim"
  - "F-004 (NHT-D2 blind-structural-report vs HoQR freeze-now) — owned by HoQR; not a CTO deliverable to fix"
  - "F-006, F-007 (DSR-N disambiguation; >2yr pre-reg slot blocked) — owned by ML Researcher and HoQR respectively"
  - "F-008 (PM EV-mechanism line) — owned by PM"

# =============================================================================
# SECTION 9 — FAILURE MODES CONSIDERED
# =============================================================================
failure_modes_considered:
  - id: FM-1
    mode: "Gate threshold corrections are themselves wrong (min_bars=10,000 is still too high or too low)"
    mitigation: >
      10,000 is derived from first principles (80% of 24×5×52×2=12,480). It is conservative
      enough that any clean pull exceeds it and any failed pull falls below it. Revision policy
      mandates measurement against first landed data; threshold can be tightened (no sign-off)
      or loosened (PR + CTO co-sign). The correction's direction is definitively right: 10,000 < 12,480 < 17,520.

  - id: FM-2
    mode: "AND-gate (gate_1 AND gate_2) is too strict — a pair with great data coverage but thin spread columns is excluded"
    mitigation: >
      Gate_2 (measured_spread_fraction >= 0.90) is CRO's binding constraint for any trial
      claiming MEASURED-spread cost realism. If a pair has great bar coverage but < 90% measured
      spread, it is genuinely not admissible for cost-realistic backtesting — this is not over-
      strictness, it is the design. A pair with DERIVED-spread only may be admitted for a
      spread-agnostic strategy with an explicit CRO co-sign exception (not this gate's domain).

  - id: FM-3
    mode: "Spread band floors and ceilings are wrong pre-data; good pairs are excluded on spread alone"
    mitigation: >
      Band check is on the PAIR-LEVEL median (not per-bar). For any healthy pair the pair-level
      median will be well within the bands. The floor (0.1 pip) only rejects pairs with
      pathologically near-zero spread, which is corrupt data. The ceiling rejects pairs whose
      median spread is 3–6× the expected tier. Revision policy: tighten on first data-land.

  - id: FM-4
    mode: "SC-4 (cross-pair scaling) produces false positives for legitimately thin pairs"
    mitigation: >
      SC-4 is MANUAL_REVIEW only — it never auto-excludes. A human CTO decision is required
      to admit or exclude a pair flagged by SC-4. This is the correct posture: the check exists
      to surface mis-scaling, not to over-veto legitimate thin pairs.

  - id: FM-5
    mode: "QD reads the wrong threshold column (e.g., uses min_bars_2yr for a 5yr analysis)"
    mitigation: >
      The gate callable takes trade_window as a parameter; it selects min_bars_2yr vs
      min_bars_5yr based on the window length. QD must parameterize this explicitly. CTO-D1
      test class TestPerPairBarCountGate must test BOTH 2yr and 5yr window cases.

  - id: FM-6
    mode: "never_lands_terminal state is never declared — pipeline hangs"
    mitigation: >
      The gate callable is run after EACH pair's backfill completes. Aggregate gate results
      are published after all 12 pairs complete OR after a timeout (backfill manifest declares
      expected completion date; CTO sets a 30-day timeout from that date as the never-lands trigger).

# =============================================================================
# SECTION 10 — EXECUTION-RESEARCHER FIREWALL CHECK
# =============================================================================
firewall_review:
  source: "execution-firewall-review rubric (CTO required_skills)"
  check:
    - item: "This spec: research or execution artifact?"
      verdict: "RESEARCH-INFRA. This is a pure data-quality gate specification. No order logic, no broker API, no live signal, no position sizing. PASS."
    - item: "Does any gate check import from execution paths?"
      verdict: "NOT REQUIRED. Gate callable operates on parquet files only. PASS."
    - item: "Does EXCLUDE-not-impute create an execution risk?"
      verdict: "NEGATIVE. EXCLUDE means a pair does not enter the research universe. It does not touch any live path. PASS."
  firewall_veto_status: NO_VETO

