          spread_median_pips_min: 0.2
          spread_p90_pips_max: 15.0
          session_coverage:
            sydney_min_pct: 0.85
            tokyo_min_pct: 0.85
            london_min_pct: 0.75
        EURCHF:
          min_bars_2yr: 17520
          min_bars_5yr: 43800
          max_gap_pct: 0.010
          spread_median_pips_max: 6.0  # CHF cross; can widen on SNB events
          spread_median_pips_min: 0.1
          spread_p90_pips_max: 20.0    # p90 ceiling deliberately wide; SNB spikes
          session_coverage:
            london_min_pct: 0.88
            new_york_min_pct: 0.80
            tokyo_min_pct: null

    gate_behavior:
      on_fail: EXCLUDE                  # never impute — lesson from QRB-6 cost void
      on_warn: LOG_AND_PASS             # spread_missing warning: backward-compat, logs only
      approved_status_output: "data/processed/{PAIR}_1h_gate_result.json"
      gate_run_trigger: "after backfill completes, before any pre-registration is finalized"
      gate_run_owner: "cto (automated via pytest -k TestIntegrationGateDecision)"

    knowledge_gap_flagged: >
      KNOWLEDGE_GAP: Spread thresholds above are ESTIMATES derived from known
      Dukascopy historical spread characteristics and the existing
      _SPREAD_MEDIAN_MAX_PIPS=50.0 ceiling. They have NOT been validated against
      actual 1h data (which has not landed). When data lands: (1) run the gate,
      (2) inspect the spread_median_pips distribution per pair, (3) tighten
      ceilings if pairs cluster well below the threshold. REVISION POLICY: any
      threshold change requires a PR with CTO sign-off. Looser thresholds are a
      veto trigger (increase in tech debt / research-quality debt).

      RESEARCH_REQUEST: If CRO has per-pair realistic bid-ask spread estimates
      (from the 1h cost model spec, CRO-D1), CTO requests those estimates be
      used to replace/confirm the spread_median_pips_max values above before the
      gate is run. CRO and CTO thresholds must be consistent.

  # ── DELIVERABLE 3: Intraday Feature Scaffold (AC-02c) ────────────────────
  - id: CTO-D3
    label: "Intraday feature scaffold — stub modules in src/forex_system/features/"
    files:
      - "src/forex_system/features/session.py"
      - "src/forex_system/features/intraday_atr.py"
      - "src/forex_system/features/time_encoding.py"
    priority: 2
    why_raises_ev: >
      When a Quant Researcher pre-registers a hypothesis (e.g. "London-open
      momentum breakout"), they will reference specific feature functions by
      name in the pre-registration YAML. If those functions do not exist at
      pre-registration time, the PR cannot verify the interface is correct. If
      they are added later, the pre-registration may need revision (which is a
      no-peeking risk if data has landed by then). Freezing the interfaces now
      eliminates this category of pre-registration revision.
    author_role: quant-developer
    cto_reviews: true
    implementation_status: STUB_ONLY   # no implementation — data not yet available

    module_specs:

      session_py:
        path: "src/forex_system/features/session.py"
        description: >
          Session-aware feature computation for 1h OHLCV data.
          Builds on backtest/session_filter.py's UTC-hour window contract.
          Pure functions only — no I/O, no side effects.
        required_stubs:
          - signature: >
              def session_open_bar(
                  index: pd.DatetimeIndex,
                  session: Literal["tokyo", "london", "new_york", "sydney"],
              ) -> pd.Series:
            returns: "boolean Series, True at the first bar of each session day"
            docstring: >
              Returns a boolean mask that is True only at the first trading bar
              of the named session on each day. Uses UTC boundaries from
              SESSION_UTC_HOURS constant. Pure function, no state.
            constant_required: >
              SESSION_UTC_HOURS: dict[str, tuple[int, int]] = {
                  "sydney":   (22, 6),   # wraps midnight; needs careful mod-24 handling
                  "tokyo":    (0, 8),
                  "london":   (7, 16),
                  "new_york": (13, 21),
              }
            clock_discipline: >
              CLOCK-DISCIPLINE NOTE (clock-and-ordering):
              This function reads bar timestamps. Bar timestamp = bar open time
              (left-closed). The function MUST NOT use the next bar's timestamp
              to determine session membership. Output aligns with the input index.
              NO LOOKAHEAD.

          - signature: >
              def session_bar_number(
                  index: pd.DatetimeIndex,
                  session: Literal["tokyo", "london", "new_york", "sydney"],
              ) -> pd.Series:
            returns: "integer Series, bar number within current session (0-indexed), NaN outside session"
            docstring: >
              Returns the ordinal position of each bar within its session
              (0 = first bar, 1 = second bar, etc.). Bars outside the session
              return NaN. Resets to 0 at each session open.
            clock_discipline: >
              CLOCK-DISCIPLINE: count based on bar_open timestamp only.
              No reference to bar N+1. Consistent with entry_delay_bars contract.

          - signature: >
              def is_in_session(
                  index: pd.DatetimeIndex,
                  session: Literal["tokyo", "london", "new_york", "sydney"],
              ) -> pd.Series:
            returns: "boolean Series, True when bar is within session UTC window"
            docstring: >
              Simple membership test — equivalent to apply_session_filter but
              returned as a feature column rather than a signal mask. Avoids
              duplication with session_filter.py by delegating to the same
              SESSION_UTC_HOURS constant.

      intraday_atr_py:
        path: "src/forex_system/features/intraday_atr.py"
        description: >
          ATR normalization functions designed for 1h data. The existing
          indicators.atr() computes raw ATR; this module provides ratio-based
          and session-normalized variants used in intraday strategy sizing.
          Pure functions — no I/O.
        required_stubs:
          - signature: >
              def atr_ratio(
                  high: pd.Series,
                  low: pd.Series,
                  close: pd.Series,
                  atr_period: int = 14,
                  normalize_period: int = 126,
              ) -> pd.Series:
            returns: "pd.Series — daily ATR as fraction of rolling 126-bar median ATR"
            docstring: >
              Normalizes ATR by its own rolling median to produce a dimensionless
              volatility ratio. Ratio > 1 = elevated volatility regime.
              Delegates raw ATR to features.indicators.atr().

          - signature: >
              def session_realized_vol(
                  close: pd.Series,
                  session: Literal["tokyo", "london", "new_york", "sydney"],
                  lookback_sessions: int = 20,
              ) -> pd.Series:
            returns: "pd.Series — rolling realized vol computed over the named session bars only"
            docstring: >
              Computes realized volatility (std of log-returns) restricted to
              bars within the named session over the trailing lookback_sessions
              sessions. Useful for session-specific breakout thresholds.
              Delegates session membership to session.is_in_session().
            clock_discipline: >
              CLOCK-DISCIPLINE: uses only past and current bars. Rolling window
              applied with min_periods=lookback_sessions//2. NO LOOKAHEAD.

      time_encoding_py:
        path: "src/forex_system/features/time_encoding.py"
        description: >
          Cyclical and categorical time-of-day encodings for 1h bars.
          Required for any ML-based hypothesis that uses time-of-day as a
          feature. Pure functions — no I/O.
        required_stubs:
          - signature: >
              def hour_of_day_sin_cos(
                  index: pd.DatetimeIndex,
              ) -> pd.DataFrame:
            returns: "DataFrame with columns ['hour_sin', 'hour_cos'] — cyclical encoding of UTC hour"
            docstring: >
              Encodes the UTC hour of each bar as sin/cos pair (period=24h).
              hour_sin = sin(2π × hour / 24), hour_cos = cos(2π × hour / 24).
              Cyclical encoding avoids the discontinuity at midnight.

          - signature: >
              def day_of_week_sin_cos(
                  index: pd.DatetimeIndex,
              ) -> pd.DataFrame:
            returns: "DataFrame with columns ['dow_sin', 'dow_cos'] — cyclical encoding of weekday (0=Mon)"
            docstring: >
              Encodes the day of the week (0=Monday, 4=Friday) as sin/cos pair
              (period=5 trading days). Captures intraweek seasonality.

          - signature: >
              def time_since_session_open(
                  index: pd.DatetimeIndex,
                  session: Literal["tokyo", "london", "new_york", "sydney"],
              ) -> pd.Series:
            returns: "pd.Series — float hours since session open (NaN outside session)"
            docstring: >
              Returns the number of hours elapsed since the most recent open of
              the named session, for each bar inside the session. Returns NaN
              for bars outside the session. Useful as a features for strategies
              that trade at specific intraday offsets.
            clock_discipline: >
              CLOCK-DISCIPLINE: uses bar open timestamp only. No forward reference.

    scaffold_policy:
      implementation: RAISE_NOT_IMPLEMENTED
      body_template: |
        raise NotImplementedError(
            "{function_name} is a pre-registered interface stub. "
            "Implementation requires clean 1h data to validate. "
            "Do not implement before data-quality gate passes."
        )
      rationale: >
        Stub bodies that raise NotImplementedError instead of returning None
        prevent silent failures if a strategy accidentally calls an unimplemented
        feature. The gate message names the enforcement condition explicitly.

    test_requirement:
      file: "tests/features/test_intraday_stubs.py"
      description: >
        A minimal test file that imports all three stub modules and asserts
        that calling each stub raises NotImplementedError. This confirms the
        import path is correct, the function signature is importable, and the
        "not implemented yet" contract is enforced before data lands.
      note: >
        This is the only test file for these stubs. Real implementation tests
        are BLOCKED until data-quality gate passes (CTO-D1 integration gate
        returns approved=True for target pairs).

