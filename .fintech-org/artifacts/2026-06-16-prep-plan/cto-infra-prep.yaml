# ─────────────────────────────────────────────────────────────────────────────
# SITUATIONAL ASSESSMENT (pre-deliverable synthesis)
# ─────────────────────────────────────────────────────────────────────────────
situation: >
  The validate_1h_schema() function in scripts/ingest_dukascopy_1h.py is
  already strong. The existing test file covers most schema checks. However
  THREE concrete gaps remain and are the CTO's real work:

  GAP-1 (harness): validate_1h_schema() is unit-tested per check, but there
  is NO integration-level test that asserts a whole pair's parquet will fail
  the gate and print a specific error. No per-pair bar-count coverage test.
  No session-boundary completeness test (London bars per week, Tokyo bars per
  week). These are tests/ deliverables.

  GAP-2 (gate spec): There is NO committed config/ or data/ YAML that encodes
  per-pair minimum bar counts, max gap fraction, and spread bounds as
  machine-checkable thresholds. The 50.0 pip ceiling is hardcoded in the
  script. This creates a risk: if the ceiling needs to be pair-specific (USDJPY
  at 4-pip typical vs. EURGBP at 2-pip typical) the gate is too loose for
  tight pairs and could wave through suspect data. A committed YAML is the fix.

  GAP-3 (feature scaffold): features/ has zero intraday-specific modules.
  When the Quant Researcher pre-registers "London-open breakout" or "time-of-day
  mean reversion," there is no agreed interface for time-of-day encoding or
  session-open detection. Stubs with type signatures now prevent interface churn
  when data lands.

  PRIOR COST-VOID LESSON: the QRB-6 trial was voided because cost data for
  3/12 pairs was missing and silently imputed. The data-quality gate must follow
  the same posture: EXCLUDE, never impute. Any pair whose parquet fails the gate
  must be EXCLUDED from research, not filled.

no-capital-instruction: true
claimed_domains:
  - architecture-decisions
  - logging-and-observability-standards
  - firewall-enforcement-between-research-and-execution
  - cross-system-blast-radius

# ─────────────────────────────────────────────────────────────────────────────
# DELIVERABLES — all three ACs (a, b, c)
# ─────────────────────────────────────────────────────────────────────────────
deliverables:

  # ── DELIVERABLE 1: 1h Ingest Validation Harness (AC-02a) ─────────────────
  - id: CTO-D1
    label: "1h ingest validation harness — pytest extension"
    file: "tests/data/test_1h_data_quality_gate.py"
    priority: 1
    why_raises_ev: >
      The QRB-6 void cost one full trial cycle (weeks of work) because corrupt
      data went undetected until after results were computed. A failing gate
      that fires BEFORE a backtest slot is granted prevents this class of
      catastrophic re-run. Every hour of prep invested here multiplies: it
      protects every future intraday trial.
    exclude_not_impute_enforced: true
    author_role: quant-developer
    cto_reviews: true

    test_classes:
      - class: TestPerPairBarCountGate
        description: >
          For each of 12 pairs, assert that a synthetic parquet with fewer than
          min_bars_expected bars triggers a gate failure. Assert that one with
          enough bars passes. Parametrize over all 12 pairs using the per-pair
          thresholds from CTO-D2 YAML.
        key_assertions:
          - "gate fails when bar_count < threshold_for_pair"
          - "gate passes when bar_count >= threshold_for_pair"
          - "failure message includes pair name and actual vs expected bar count"

      - class: TestGapFractionGate
        description: >
          Synthetic parquet with a controlled number of missing 1h slots (e.g.
          10 consecutive hours missing = 10/8760 annual gap fraction ≈ 0.11%).
          Assert gate fails when gap fraction exceeds per-pair max_gap_pct from
          CTO-D2. Assert gate passes when gap fraction is within threshold.
        key_assertions:
          - "gap_pct computed correctly against expected bar count, not actual bar count"
          - "gate fails loudly: ValueError or returned issues list is non-empty"
          - "no silent imputation occurs (missing bars must not be filled)"

      - class: TestSessionBoundaryCompleteness
        description: >
          Given a synthetic 2-week UTC-indexed 1h parquet, assert that the
          function counts London-session bars (07:00-16:00 UTC), NY-session bars
          (13:00-21:00 UTC), and Tokyo-session bars (00:00-08:00 UTC). Assert
          that a parquet missing all Tokyo bars for 5 days fails if Tokyo coverage
          is required for the pair. (USDJPY: Tokyo coverage matters;
          EURUSD: London/NY are primary).
        key_assertions:
          - "london_bar_count / expected_london_bars > coverage_min for EURUSD"
          - "tokyo_bar_count / expected_tokyo_bars > coverage_min for USDJPY"
          - "no crash on pairs where session is not tracked (returns warning, not error)"

      - class: TestSpreadColumnGate
        description: >
          Extend the existing TestValidateSpreadBackwardCompat. Add:
          (1) per-pair spread_median_pips above pair-specific max triggers fail
          (USDJPY max is different from EURGBP max — parametrize from CTO-D2);
          (2) parquet with spread columns present but all-zero spread triggers fail
          (silent tick decode failure pattern);
          (3) parquet where spread_p90_pips < spread_median_pips triggers fail
          (percentile inversion = corruption).
        key_assertions:
          - "pair-specific ceiling from CTO-D2 YAML is used, not hardcoded 50.0"
          - "all-zero spread_median_pips is flagged"
          - "p90 < median is flagged as corruption"

      - class: TestIntegrationGateDecision
        description: >
          Integration test: load a synthetic parquet, run the full gate, assert
          the return is a typed decision dict {pair, approved, issues, bar_count,
          gap_pct, spread_ok}. Assert approved=False causes EXCLUDE (not
          impute). Assert approved=True pairs are admitted to research queue.
        key_assertions:
          - "gate returns approved=True only when ALL sub-checks pass"
          - "approved=False must be accompanied by at least one issue string"
          - "no parquet modification occurs regardless of outcome (read-only gate)"

    firewall_note: >
      These tests operate on synthetic fixtures only. NO real 1h parquet is
      loaded. The harness is safe to run before any data lands. Running it
      before data lands is, in fact, the whole point.

  # ── DELIVERABLE 2: Per-Pair Data-Quality Gate Spec (AC-02b) ──────────────
  - id: CTO-D2
    label: "Per-pair data-quality gate YAML"
    file: "config/data_quality_gates_1h.yaml"
    priority: 1
    why_raises_ev: >
      Hardcoded thresholds in scripts/ingest_dukascopy_1h.py (_SPREAD_MEDIAN_MAX_PIPS=50.0)
      are one-size-fits-all and too loose for tight pairs (EURUSD typical spread
      ~0.8 pip; 50 pip ceiling allows obvious corruption through). A committed
      YAML provides: per-pair tuning, machine-checkable parametrize fixtures in
      CTO-D1, and a canonical source-of-truth for CRO's cost model thresholds.
      The YAML is also the formal record of what "approved for research" means.
    author_role: cto  # This is structural/config — CTO authors it, QD implements
    exclude_not_impute_enforced: true

    schema:
      version: "1.0"
      generated_by: "cto-infra-prep 2026-06-17"
      pairs:
        EURUSD:
          min_bars_2yr: 17520          # 2yr × 365.25d × 24h × ~67% trading coverage
          min_bars_5yr: 43800          # 5yr × same
          max_gap_pct: 0.005           # >0.5% missing bars → EXCLUDE (pair may be thin)
          spread_median_pips_max: 3.0  # EURUSD typical ~0.8 pip; 3.0 = suspicious
          spread_median_pips_min: 0.1  # below 0.1 pip = likely all-crossed-tick corruption
          spread_p90_pips_max: 8.0     # p90 > 8 = structural data problem
          session_coverage:
            london_min_pct: 0.90       # 07:00-16:00 UTC; expect 9 bars × ~252 trading days
            new_york_min_pct: 0.85     # 13:00-21:00 UTC; some overlap with London
            tokyo_min_pct: null        # EURUSD: Tokyo not primary; no min enforced
        GBPUSD:
          min_bars_2yr: 17520
          min_bars_5yr: 43800
          max_gap_pct: 0.005
          spread_median_pips_max: 4.0  # GBP slightly wider than EUR
          spread_median_pips_min: 0.1
          spread_p90_pips_max: 12.0
          session_coverage:
            london_min_pct: 0.90
            new_york_min_pct: 0.85
            tokyo_min_pct: null
        USDJPY:
          min_bars_2yr: 17520
          min_bars_5yr: 43800
          max_gap_pct: 0.005
          spread_median_pips_max: 4.0  # JPY pip is 0.01; 4 pip ≈ 0.04 JPY (acceptable)
          spread_median_pips_min: 0.1
          spread_p90_pips_max: 12.0
          session_coverage:
            tokyo_min_pct: 0.90        # JPY: Tokyo primary
            london_min_pct: 0.85
            new_york_min_pct: 0.80
        USDCHF:
          min_bars_2yr: 17520
          min_bars_5yr: 43800
          max_gap_pct: 0.008           # CHF slightly less liquid off-hours
          spread_median_pips_max: 4.0
          spread_median_pips_min: 0.1
          spread_p90_pips_max: 12.0
          session_coverage:
            london_min_pct: 0.90
            new_york_min_pct: 0.80
            tokyo_min_pct: null
        USDCAD:
          min_bars_2yr: 17520
          min_bars_5yr: 43800
          max_gap_pct: 0.008
          spread_median_pips_max: 4.0
          spread_median_pips_min: 0.1
          spread_p90_pips_max: 12.0
          session_coverage:
            london_min_pct: 0.85
            new_york_min_pct: 0.90     # CAD: NY primary
            tokyo_min_pct: null
        AUDUSD:
          min_bars_2yr: 17520
          min_bars_5yr: 43800
          max_gap_pct: 0.008
          spread_median_pips_max: 4.0
          spread_median_pips_min: 0.1
          spread_p90_pips_max: 12.0
          session_coverage:
            sydney_min_pct: 0.85       # AUD: Sydney primary (22:00-06:00 UTC)
            london_min_pct: 0.80
            new_york_min_pct: 0.75
        NZDUSD:
          min_bars_2yr: 17520
          min_bars_5yr: 43800
          max_gap_pct: 0.010           # NZD thinner; allow slightly more gaps
          spread_median_pips_max: 5.0
          spread_median_pips_min: 0.1
          spread_p90_pips_max: 15.0
          session_coverage:
            sydney_min_pct: 0.80
            london_min_pct: 0.75
            new_york_min_pct: 0.70
        EURGBP:
          min_bars_2yr: 17520
          min_bars_5yr: 43800
          max_gap_pct: 0.005
          spread_median_pips_max: 3.0  # Tight cross; 3 pip ceiling
          spread_median_pips_min: 0.1
          spread_p90_pips_max: 8.0
          session_coverage:
            london_min_pct: 0.90
            new_york_min_pct: 0.80
            tokyo_min_pct: null
        EURJPY:
          min_bars_2yr: 17520
          min_bars_5yr: 43800
          max_gap_pct: 0.005
          spread_median_pips_max: 5.0  # JPY cross; wider
          spread_median_pips_min: 0.1
          spread_p90_pips_max: 15.0
          session_coverage:
            tokyo_min_pct: 0.88
            london_min_pct: 0.85
            new_york_min_pct: 0.80
        GBPJPY:
          min_bars_2yr: 17520
          min_bars_5yr: 43800
          max_gap_pct: 0.008
          spread_median_pips_max: 6.0  # GBP/JPY cross notoriously wider
          spread_median_pips_min: 0.2
          spread_p90_pips_max: 20.0
          session_coverage:
            london_min_pct: 0.88
            tokyo_min_pct: 0.85
            new_york_min_pct: 0.75
        AUDJPY:
          min_bars_2yr: 17520
