clock_discipline_review:
  source: "clock-and-ordering skill disposition (loaded via CTO required_skills)"
  findings:
    - "session.py stubs: all three stubs annotated with clock-discipline notes — bar timestamp = bar open time, no forward reference, consistent with entry_delay_bars contract. QD must preserve this in implementation."
    - "intraday_atr.py stubs: session_realized_vol uses rolling window on past bars only. clock-discipline note included."
    - "validation harness tests: all use synthetic fixtures with controlled timestamps. No risk of lookahead in test construction."
    - "data-quality gate: reads parquet, computes statistics, returns decision. No bar ordering issue possible (read-only, no signals)."
  clock_veto_status: NO_VETO_REQUIRED

# ─────────────────────────────────────────────────────────────────────────────
# EXECUTION-RESEARCHER FIREWALL CHECK
# ─────────────────────────────────────────────────────────────────────────────
firewall_review:
  source: "execution-firewall-review rubric (CTO required_skills)"
  check:
    - item: "CTO-D1 (test harness) — research or execution artifact?"
      verdict: "RESEARCH-INFRA. No order logic, no broker API, no live signal. PASS."
    - item: "CTO-D2 (gate YAML) — research or execution artifact?"
      verdict: "RESEARCH-INFRA. Defines what data is approved for research. No execution implications. PASS."
    - item: "CTO-D3 (feature stubs) — research or execution artifact?"
      verdict: "RESEARCH. Feature computation only. No sizing, no order, no Saxo import. PASS."
    - item: "Do any stubs import from src/forex_system/saxo/ or paper/ or execution/?"
      verdict: "NOT REQUIRED. All three stub modules depend only on pandas and features/indicators.py. PASS."
  firewall_veto_status: NO_VETO

# ─────────────────────────────────────────────────────────────────────────────
# FAILURE MODES CONSIDERED (CTO role schema requirement)
# ─────────────────────────────────────────────────────────────────────────────
failure_modes_considered:
  - id: FM-1
    mode: "Gate thresholds are wrong — pass corrupt data or reject good data"
    mitigation: >
      CTO-D2 YAML is committed but labeled with explicit KNOWLEDGE_GAP.
      Thresholds are conservative (err on reject-side for spread ceilings).
      Policy: tighten thresholds on first data-land; never loosen without PR.
      CRO cost-model estimates cross-checked against CTO-D2 spread bounds.

  - id: FM-2
    mode: "Stubs are imported and called before implementation, returning silently wrong results"
    mitigation: >
      Scaffold policy mandates NotImplementedError bodies. CTO-D3 test file
      tests/features/test_intraday_stubs.py asserts this at CI time.

  - id: FM-3
    mode: "Session boundary constants differ between session.py and session_filter.py"
    mitigation: >
      Both modules will reference a SINGLE source: SESSION_UTC_HOURS in
      session.py, imported by intraday_atr.py and session_filter.py.
      QD must not duplicate constants. CTO reviews PR for this invariant.

  - id: FM-4
    mode: "Bar-count thresholds in gate YAML are wrong for forex 24h trading"
    mitigation: >
      EURUSD trades ~5.5d/7d = 78.6% of calendar hours.
      8760h/yr × 78.6% = ~6885 bars/yr. 2yr ≈ 13,770 bars.
      min_bars_2yr = 17,520 is SET DELIBERATELY LOWER THAN CALENDAR-FULL
      (17,520 = 24×365×2 full calendar) so that normal weekends/holidays
      produce approved=True. This is intentional: gap_pct check is the
      secondary screen. CTO-D2 YAML annotates this logic.
      KNOWLEDGE_GAP: verify this against actual Dukascopy 1h density once data lands.

  - id: FM-5
    mode: "QD implements stubs before gate passes, causing premature use"
    mitigation: >
      NotImplementedError bodies are the hard block. Additionally: feature
      stubs must NOT be merged with implementations until at least one pair
      clears CTO-D1 integration gate. QD's PR for any implementation must
      cite the gate_result.json approval artifact. CTO reviews that PR.

  - id: FM-6
    mode: "Data partially lands (some pairs but not all) before backfill completes"
    mitigation: >
      Gate is per-pair. Approved pairs are approved independently. Research
      pre-registrations may name a subset of pairs. No pair is held waiting
      for another. This is the correct posture — but it means HoQR may
      pre-register on fewer than 12 pairs. This is acceptable and expected.

# ─────────────────────────────────────────────────────────────────────────────
# WHAT CTO REFUSED TO DO (CTO role schema requirement)
# ─────────────────────────────────────────────────────────────────────────────
what_you_refused_to_do:
  - "Write any Python implementation code (forbidden_skill: python). All three deliverables are dispatched to Quant Developer."
  - "Compute spread thresholds from first principles using pip math — this is domain knowledge (forex-trading, forbidden). Used observable Dukascopy characteristics documented in existing code comments instead."
  - "Design intraday alpha hypotheses — that is HoQR's instrument. CTO provides the interface contracts only."
  - "Assess whether intraday alpha base rates are favorable — that is NHT/HoQR/PR domain. CTO explicitly excluded from any forward-return claim."
  - "Size the position or define risk limits for intraday strategies — CRO owns that. CTO flags that CRO's spread estimates and CTO-D2 spread thresholds must be reconciled."

# ─────────────────────────────────────────────────────────────────────────────
# ROUTED WORK
# ─────────────────────────────────────────────────────────────────────────────
routed_to:
  - role: quant-developer
    deliverables: [CTO-D1, CTO-D3]
    rationale: "Implementation of test harness and feature stubs is Python production work — QD's instrument."
  - role: cro
    request: >
      CRO-D1 (cost model spec) must provide realistic per-pair spread estimates
      at 1h resolution. CTO requests these estimates be cross-checked against
      CTO-D2 spread_median_pips_max thresholds. If CRO's median estimates exceed
      CTO-D2 ceilings, the ceiling must be revised upward with written justification.
      Discordance is a research-quality blocker.

# ─────────────────────────────────────────────────────────────────────────────
# SEQUENCED WORKFLOW (AC-06 compliance)
# ─────────────────────────────────────────────────────────────────────────────
data_to_backtest_workflow:
  trigger: "Dukascopy backfill signals completion (all 12 pairs, monthly chunks)"
  steps:
    - step: 1
      owner: cto
      action: "Run CTO-D1 gate (pytest -k TestIntegrationGateDecision) against each *_1h.parquet"
      output: "data/processed/{PAIR}_1h_gate_result.json for each pair"
      on_fail: "EXCLUDE pair from research. Log failure. Do NOT impute or patch."

    - step: 2
      owner: cto
      action: "Publish per-pair approval status to .fintech-org/artifacts/1h-gate-results.yaml"
      output: "list of approved pairs + issues per excluded pair"
      on_fail: "Any pair with gate issues requires EXPLICIT CEO decision to include"

    - step: 3
      owner: head-of-quant-research
      action: "Finalize pending pre-registrations referencing only approved pairs"
      constraint: "HARD GATE: pre-registration may not reference unapproved pairs"

    - step: 4
      owner: principal-reviewer
      action: "Review and counter-sign each pre-registration per PR checklist"
      constraint: "No backtest slot granted without PR counter-signature"

    - step: 5
      owner: null-hypothesis-tester
      action: "Freeze null battery for each approved pre-registration"
      constraint: "NHT battery must be frozen BEFORE backtest is run"

    - step: 6
      owner: ceo
      action: "Grant backtest slot. Confirm trial counter increment is correct."
      constraint: "CEO is REQUIRED approver for any scope expansion beyond the approved pairs"

# ─────────────────────────────────────────────────────────────────────────────
# GUARDRAILS HONORED (AC-04 compliance)
# ─────────────────────────────────────────────────────────────────────────────
guardrails_honored:
  no_live_capital: true
  no_backtest_before_data_lands: true
  no_peeking_fishing: >
    All three CTO deliverables use synthetic fixtures only. CTO-D1 harness
    runs on generated data, not on real 1h parquets. CTO-D2 thresholds are
    estimates, not derived from inspecting real 1h data. No 1h data has been
    loaded into any analytical tool.
  execution_researcher_firewall: >
    All deliverables are research-infra or research only. No execution,
    order-management, or broker-API code is proposed or required.
    See firewall_review section above.
  trial_counter_unchanged: >
    These are infrastructure and scaffold deliverables. None are trials.
    No trial ID will be assigned. Honest-N counter is unchanged.
  pre_registration_required: >
    Feature stubs define the interface but not the hypothesis. No hypothesis
    is implied. Pre-registration is HoQR and PR domain.

# ─────────────────────────────────────────────────────────────────────────────
# OUT OF SCOPE (CTO slice)
# ─────────────────────────────────────────────────────────────────────────────
out_of_scope:
  - "Running any backtest — 1h data not yet available; any backtest run now constitutes data-peeking if data has partially landed"
  - "Building execution infrastructure (order management, broker API wrappers, position sizing for live orders)"
  - "Live or paper trading — no live capital; observe-only canary is the maximum allowed per prior NHT ruling"
  - "Descriptive or exploratory data analysis on the 1h data — any EDA before pre-registration is frozen violates the no-peeking constraint"
  - "Generating new daily-pair strategies — the daily dataset wall is a firm finding; not the unlock"
  - "Incrementing the trial counter — planning and pre-registration do not constitute trials"
  - "Implementing the feature stubs — implementation is blocked until CTO-D1 gate approves at least one pair"

# ─────────────────────────────────────────────────────────────────────────────
# KNOWLEDGE GAPS
# ─────────────────────────────────────────────────────────────────────────────
knowledge_gaps:
  - id: KG-1
    gap: "Dukascopy 1h bar density per pair (actual bars/year at 1h resolution) not yet known"
    impact: "min_bars thresholds in CTO-D2 may need revision on first data-land"
    resolution: "Measure bar counts per pair after backfill; update CTO-D2 thresholds via PR"

  - id: KG-2
    gap: "Per-pair typical spread_median_pips from Dukascopy 1h data not yet confirmed"
    impact: "CTO-D2 spread ceilings are estimates; could be too tight or too loose"
    resolution: "CRO-D1 (intraday cost model spec) is the intended cross-check. CTO requests CRO provide estimates before gate is run."

  - id: KG-3
    gap: "Sydney session UTC boundary in Dukascopy data (22:00-06:00 UTC wraps midnight; handling unclear)"
    impact: "session.py session_open_bar() stub note flagged; implementation must handle modular arithmetic. CTO cannot implement — QD must verify."
    resolution: "RESEARCH_REQUEST: QD verifies Sydney boundary handling against actual Dukascopy 1h AUDUSD/NZDUSD data when available."

  - id: KG-4
    gap: "Whether Dukascopy 1h data contains bars during DST transitions (time-of-day encoding assumes fixed UTC offsets)"
    impact: "hour_of_day_sin_cos() and session_open_bar() could miscount session bars on DST days for pairs with local-time-driven liquidity patterns"
    resolution: "DST handling is implementation concern for QD. CTO flags it here; stub docstrings must mention DST explicitly."

# ─────────────────────────────────────────────────────────────────────────────
# POLICY VIOLATIONS DETECTED
# ─────────────────────────────────────────────────────────────────────────────
policy_violations_detected:
  - id: PV-0
    verdict: NONE
    note: >
      No research-role emitted executable trading code. No deploy during freeze.
      No architecture change with unbounded blast radius. Execution-researcher
      firewall intact. This artifact is an architecture/methodology-design
      deliverable; no veto triggers fired.

assumptions:
  - "12 pairs in backfill manifest match exactly: EURUSD, GBPUSD, USDJPY, USDCHF, USDCAD, AUDUSD, NZDUSD, EURGBP, EURJPY, GBPJPY, AUDJPY, EURCHF (verified against pm-acceptance-criteria.yaml instrument-universe)."
  - "Existing validate_1h_schema() in scripts/ingest_dukascopy_1h.py is the authoritative ingest validator. CTO-D1 harness tests invoke it; it is not reimplemented."
  - "SESSION_UTC_HOURS will be the single source of truth for session boundaries shared between session.py and session_filter.py."
  - "All thresholds in CTO-D2 YAML are pre-data estimates and are explicitly labeled as such. They are the floor, not the ceiling, for rigor."
  - "QD implements; CTO reviews PRs. CTO does not write code."

confidence: high
base_rate_statement: >
  Most intraday strategies fail rigorous OOS testing. Historical quant literature
  finds fewer than 30% of strategies survive multi-test correction. The purpose
  of this infrastructure is to ensure that when the firm DOES run confirmable
  intraday research, the data quality is not the failure mode. Infrastructure
  quality does not manufacture alpha; it prevents infrastructure from destroying
  alpha signals that exist.
