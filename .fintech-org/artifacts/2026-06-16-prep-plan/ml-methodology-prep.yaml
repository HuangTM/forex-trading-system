# ============================================================================
# AC-04 — guardrails
# ============================================================================
guardrails:
  pre_registration_required_before_backtest: true   # refuse to eval a backtest without a PreRegistration artifact
  no_data_access_in_this_artifact: true
  no_backtest_in_this_artifact: true
  trial_counter_not_incremented: true               # per protocols/spawn-agent.md step 3 (methodology-design)
  no_capital: true
  firewall: >
    ML-Researcher emits this methodology declaratively. Implementation of CPCV/DSR/
    leakage-assertion code is ROUTE_TO: quant-developer. No executable code blocks here.

ROUTE_TO:
  - quant-developer: "implement D1 (CPCV harness), D2 (ACF measurement), D3 (DSR module), D6 (leakage assertions)"
  - quant-researcher: "author D7 pre-registration template with frozen DoF"

knowledge_gaps:
  - "Empirical 1h residual-return autocorrelation decay length is NOT yet measured; embargo=480 is a conservative default and the 24-bar floor a backstop. The ACF measurement (D2) MUST run before any DSR/power claim — until then, all effective-N and embargo numbers are provisional."
  - "Skewness gamma3 / kurtosis gamma4 of 1h strategy returns are unknown pre-data; DSR cannot be numerically computed until a strategy + the backfilled 1h series exist. This artifact specifies the ACCOUNTING PLAN, not a computed DSR."
  - "Whether the recovered bid/ask spread column is clean/continuous across all 12 pairs and all sessions is unverified here (data still backfilling); spread-as-cost admissibility is conditional on a data-quality gate the firm runs post-backfill."
