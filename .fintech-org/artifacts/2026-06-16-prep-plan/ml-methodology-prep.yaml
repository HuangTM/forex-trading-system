    owner: quant-developer
    blocking: true
  - id: D4
    item: Pre-declared 6-regime bucket definitions incl. session axis (Asia/London/NY/overlap)
    owner: ml-researcher
    blocking: true
  - id: D5
    item: ALLOW/DENY feature list enforced at build time (DENY all volume/order-flow features)
    owner: ml-researcher
