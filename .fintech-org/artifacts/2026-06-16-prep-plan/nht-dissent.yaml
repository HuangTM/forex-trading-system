research-requests:
  - id: RR-1
    route_to: quant-developer
    request: >
      Run an end-to-end correctness check on the recovered per-bar bid/ask spread
      column (commit 96f6f84) for at least one landed pair: reconstruct the spread
      independently from tick data (or a second source) and report the distribution
      of (recovered_spread - independent_spread). Pass = negligible/explainable
      residual. This gates whether ANY net-of-TCA claim on 1h data is trustworthy.
      I cannot run this myself (python forbidden); I interpret the output.
  - id: RR-2
    route_to: cto
    request: >
      Publish a per-pair LAND/PARTIAL/MISSING status for the 1h backfill as part of
      the data-quality gate, and add an explicit workflow branch for the
      partially/never-lands case (D5). Do not let 'clean data lands' remain a bare
      assumption.

dissent-summary-for-consensus: >
  APPROVE-WITH-DISSENT. The prep plan's SHAPE is correct and a defensible use of the
  wait. But: (1) the CEO premise is a category error — learning is not the binding
  constraint, data-truth and a confirmable edge are; (2) the plan must defend against
  becoming infrastructure theater (D1) by making every artifact name the decision it
  gates; (3) fishing is the worse error so pre-registration-now stands, with a
  blind-structural-report escape hatch against anchoring (D2); (4) honest base rate of
  finding validated net-of-TCA alpha this cycle is ~15% (10-20%), NOT a promise (D4);
  (5) intraday likely MOVES the confirmability wall, does not break it (D3); (6) the
  data may be DOA — throttling, zero volume, unverified spread — and the plan must
  carry an explicit failure branch (D5); (7) effective-N must be autocorrelation-
  corrected or the gate breaks again in a new costume (D6). All six dissent items
  D1-D6 are append-only and must appear verbatim in CONSENSUS.

