contamination-check: >
  clean — the prompt described the firm's HISTORY (dataset wall, broken-DSR reset,
  honest-N=48 all-falsified) and the CEO's framing, but contained NO proposer
  narrative arguing why an intraday edge is expected to be true, and no other role's
  approval stance presented as authority. I was asked to attack the premise and the
  plan's failure modes, which is my mandate. Proceeding.

# ─────────────────────────────────────────────────────────────────
# STEELMAN FIRST (mandatory before dissent)
# ─────────────────────────────────────────────────────────────────
steelman-of-the-prep-plan: >
  The PM plan is the RIGHT SHAPE and I want that on the record. It refuses the CEO's
  literal framing ("learn ... to earn money"), substitutes durable deliverables for
  study goals (AC-01), forbids EDA-before-prereg (AC-04), keeps the trial counter
  frozen, defines success as research-READINESS not profit (AC-03), and sequences a
  data-lands -> gate -> prereg -> review -> backtest-slot workflow (AC-06). Critically,
  it front-loads exactly the artifacts whose ABSENCE caused prior pain: a data-quality
  gate (the QRB-6 run was VOIDED by a silent cost-config corruption that a pre-freeze
  coverage gate would have caught), and a null-battery pre-spec (the broken-DSR reset
  of 2026-05-31 was a gate-math failure caught too late). Building these BEFORE the
  data lands genuinely raises expected value: it converts a future scramble into a
  cold-start-ready posture and removes a degree of freedom for post-hoc fudging.
  If we must wait, this is a defensible use of the wait. I approve the plan's SHAPE.

# ─────────────────────────────────────────────────────────────────
# VERDICT ON THE PREMISE
# ─────────────────────────────────────────────────────────────────
verdict-on-premise:
  summary: "REJECT the CEO's framing as a category error. The PM already partially corrected it; I am making the correction sharper and structural."
  category-error-named: >
    The CEO's question — "can CTO/CRO/ML learn their domain to create a system that
    earns money" — bundles THREE distinct claims and treats the first as the binding
    constraint. (1) Is LEARNING the bottleneck? No. The role-agents already load
    expert domain skills; the firm has run 48 honest trials with full statistical
    rigor. We have never lost a dollar to ignorance — we have lost zero dollars, full
    stop, because we found NO validated alpha to deploy. (2) Is DATA the bottleneck?
    It WAS — the dataset-wall finding is that 12 daily pairs with zero volume capped
    events/yr x per-event-Sharpe so every idea floored at 3-5yr to confirm. (3) Is
    "earn money" a deliverable? No — it is an outcome of a stochastic process with a
    low base rate, not a task you can assign. The category error is treating an
    OUTCOME (profit) and an ABUNDANT INPUT (domain knowledge) as if they were the
    SCARCE INPUT (a confirmable edge in the data). "Learn harder" is the wrong verb.
    The honest verb is "test, and mostly fail, faster — with the gate intact."
  binding-constraint-actual: >
    The binding constraint was data availability and is now SHIFTING to two unknowns:
    (a) whether the 1h data lands clean at all (Dukascopy throttling, zero volume,
    unverified spread column), and (b) whether 1h granularity actually clears the
    confirmability wall or merely RELOCATES it. Neither is solved by anyone learning
    anything. Learning is not on the critical path.

# ─────────────────────────────────────────────────────────────────
# ENUMERATED DISSENT ITEMS  (PRESERVED VERBATIM IN CONSENSUS)
# ─────────────────────────────────────────────────────────────────
dissent-items:
  - id: NHT-D1
    title: "Infrastructure-theater risk is the firm's own kill-criterion, re-armed."
    verbatim: >
      D1. The firm's documented kill-criterion is "producing infrastructure, not
      insight" (honest-review 2026-05-31). A prep plan that produces SEVEN role
      artifacts (validation harness, cost spec, risk pre-spec, hypothesis shortlist,
      rubric, ML methodology, null battery, honest-N protocol, PR checklist) while the
      ONE thing that determines value — clean data and a confirmable edge — remains
      unresolved is EXACTLY the shape of activity the kill-criterion warns against.
      Building gates and scaffolds FEELS productive and is locally rational, but none
      of it raises the probability that a real edge EXISTS in the incoming data; at
      best it lowers the probability we MISS or MIS-MEASURE one. I do not block the
      plan, but I require that every artifact carry an explicit "expected-value
      mechanism" line stating HOW it changes a decision — any artifact that cannot
      name the decision it gates is theater and must be cut, not filed.
  - id: NHT-D2
    title: "Pre-registering NOW (before data) risks anchoring on the wrong bets — but seeing-data-first is worse."
    verbatim: >
      D2. There is a real tension the plan under-states. Pre-registering >=5 intraday
      hypotheses BEFORE the data lands anchors the firm on bets chosen from PRIOR
      (daily) intuition and from the same minds that produced 48 failures — we may
      freeze the wrong structures and then feel committed to them. The OPPOSITE error
      is fishing: inspecting the 1h data first and reverse-engineering hypotheses to
      fit what we see, which inflates effective-N invisibly and is precisely the
      data-snooping the confirmability gate exists to prevent. MY RULING: seeing-data-
      first (fishing) is the WORSE error and must remain forbidden, because its damage
      is undetectable after the fact — a fished hypothesis looks identical to an
      honest one in the prereg file, and DSR deflation cannot price degrees of freedom
      it never saw. Anchoring's damage is bounded and visible: a wrong pre-registered
      bet simply FAILS its KILL gate (as trial 48 did, cleanly, in one day) and costs
      one trial-counter increment. The asymmetry is decisive. REQUIRED MITIGATION:
      pre-registrations may be authored now but the shortlist must be EXPANDABLE after
      a BLIND data-quality report (bar counts, gap fractions, spread sanity — NO
      return/signal statistics) so that anchoring does not preclude a structurally
      better hypothesis the clean-data STRUCTURE (not its predictive content) reveals.
      That blind report is the only data contact permitted before freeze.
  - id: NHT-D3
    title: "Honest base rate: intraday data likely MOVES the wall, not breaks it."
    verbatim: >
      D3. The optimistic thesis is that 1h granularity multiplies events/yr ~24x and
      thereby drops years_to_validate below the 2yr gate. I dissent from treating this
      as established. Three structural reasons the wall likely RELOCATES rather than
      falls: (i) 1h bars are heavily AUTOCORRELATED and session-clustered, so the
      EFFECTIVE-N gain is far below the nominal 24x — overlapping/dependent
      observations do not buy independent evidence (this is my D6 honest-N concern).
      (ii) Intraday edges are SMALLER per-event and live closer to the spread; the
      TCA hurdle that already killed trial 48 (gross fade +3.41 pips POSITIVE but
      cost-dominated at a 7.5-pip conservative cost) is HARDER intraday, not easier,
      because realized edge per bar shrinks faster than cost does. (iii) More bars
      also multiply the MULTIPLE-COMPARISONS surface (N x 24 look opportunities),
      raising the DSR deflation denominator. Net: events/yr UP, per-event-Sharpe
      DOWN, effective-N-per-nominal-N DOWN, deflation-penalty UP. These partially
      cancel. My honest base rate (below) reflects that they likely cancel to "the
      wall moved from ~3-5yr to ~1.5-3yr for a FEW hypotheses" — a real but modest
      unlock, not a regime change. The plan must not be sold internally as "the
      ceiling is removed."
  - id: NHT-D4
    title: "Honest base-rate estimate for validated, paper-tradeable, net-of-TCA alpha."
    verbatim: >
      D4. Conditioned on (a) clean 1h data actually landing for a usable majority of
      pairs, and (b) the prep gates intact, my honest estimate that THIS firm finds at
      least one VALIDATED (DSR>=0.95 under org-wide N, survives my null battery,
      replicates OOS on a held-out period, net-of-TCA POSITIVE) intraday strategy
      within the next research cycle is: 10-20%, point estimate ~15%. Basis: prior
      48 trials -> 0 validated (an empirical 0/48 ceiling on this firm's hit rate),
      partially offset by the genuine new information that intraday data adds and the
      fact that 0/48 was largely DATA-WALL-bound rather than idea-bound. The published
      quant literature finding that <30% of backtested strategies survive rigorous
      multiple-testing correction is an UPPER bound for us because our gate is
      stricter than most and our universe is small. I will NOT round this up. If a
      role's plan implies a materially higher number, that is an unbacked claim and I
      dissent against it. Success is NOT promised; it is a coin-flip's fraction.
  - id: NHT-D5
    title: "The 1h data may be DOA — and the plan treats clean landing as an assumption, not a risk."
    verbatim: >
      D5. The PM acceptance-criteria ASSUME "clean 1h data lands" (assumptions[0],
      AC-06 step 1). I dissent against that assumption being load-bearing without a
      published failure branch. Three concrete DOA vectors, all evidenced in firm
      history: (i) THROTTLING — a prior Dukascopy run over 4 days retrieved only ~1.6%
      (2 of 12 pairs) because the environment's IP was throttled; the backfill was
      explicitly moved to the user's machine for this reason. There is a real
      probability the data NEVER lands cleanly for all 12 pairs, in which case the
      entire prep plan gates on a dataset that does not arrive — and several artifacts
      (12-pair cost spec, 12-pair honest-N) are speculative. (ii) ZERO VOLUME —
      Dukascopy 1h carries no true volume; any "volume proxy from spread" (CTO feature
      scaffold) is an UNVALIDATED construct and must not be smuggled into a hypothesis
      as if it were real volume. (iii) SPREAD-COLUMN TRUST — the spread recovery
      (commit 96f6f84, current branch ingest-spread-column) is RECENT and its
      correctness is unverified end-to-end; a wrong spread column silently corrupts
      every TCA estimate, which is the exact failure that VOIDED the first QRB-6 run.
      REQUIRED: the CTO data-quality gate must include an explicit per-pair
      LAND/PARTIAL/MISSING status and a spread-column CORRECTNESS check (not just
      presence/plausibility), and the workflow (AC-06) must have an explicit branch
      for "data partially/never lands" that does NOT proceed to backtest on
      incomplete pairs.
  - id: NHT-D6
    title: "Honest-N at 1h is the make-or-break input and is easy to inflate."
    verbatim: >
      D6. My honest-N protocol deliverable is not a formality — it is the single
      number that decides whether ANY 1h hypothesis clears the 2yr gate. The danger:
      naive counting will use nominal bar counts (24x daily) and make every hypothesis
      LOOK confirmable, re-creating the broken-gate failure mode in a new costume.
      Effective-N must be deflated for: intraday autocorrelation (block bootstrap /
      non-overlapping windows), session clustering (an edge that only fires at one
      session has far fewer independent events than bars-per-year suggests), and
      overlap in any multi-bar holding period. I dissent in advance against any
      confirmability calculation that uses nominal N. The years_to_validate formula
      (N_required / events_per_year) is only honest if events_per_year is the
      EFFECTIVE, autocorrelation-corrected, non-overlapping count — per pair, per
      session, per hypothesis.

# ─────────────────────────────────────────────────────────────────
# BASE RATE (structured)
# ─────────────────────────────────────────────────────────────────
honest-base-rate:
  empirical-prior: "0 validated alpha / 48 honest trials (trials.jsonl, honest-N=48 as of 2026-06-17)."
  point-estimate-this-cycle: 0.15
  range: "0.10 - 0.20"
  conditioning: "Conditional on clean 1h data landing for a usable majority of pairs AND prep gates intact."
  literature-upper-bound: "<30% of backtested strategies survive rigorous multiple-testing correction; an UPPER bound given our stricter gate and small universe."
  one-line: "A coin-flip's fraction, not a promise. Intraday likely moves the wall to ~1.5-3yr for a few hypotheses, not below it for many."

# ─────────────────────────────────────────────────────────────────
# WHAT WOULD MOST CHANGE MY SKEPTICISM
# ─────────────────────────────────────────────────────────────────
single-thing-that-would-most-change-my-skepticism: >
  An END-TO-END verified spread column on real landed 1h data for at least one pair,
  cross-checked against an independent reference (e.g., a second data source or a
  reconstructed bid/ask from tick data), confirming that net-of-TCA edge is being
  measured against a TRUE spread and not a fabricated/mis-scaled one. If the spread
  is trustworthy AND the effective-N (autocorrelation-corrected, non-overlapping)
  for a representative hypothesis genuinely yields years_to_validate <= 2yr, then the
  intraday unlock is real and my base rate moves up. Both conditions are about DATA
  TRUTH, not about anyone learning a domain — which is the whole point of my premise
  dissent.

# ─────────────────────────────────────────────────────────────────
# MY OWN DELIVERABLES (the two AC-02 NHT artifacts) — committed, not theater
# ─────────────────────────────────────────────────────────────────
nht-deliverables-acknowledged:
