body: |
  The CEO's question asks whether roles can "learn their domain to create a trading
  system which can earn money" while the backfill runs. As PM I am re-framing this
  before dispatch: domain expertise is not the bottleneck, and earning money is not
  a promise the firm can or should make at this stage.

  The real lever is PREPARATION: each role producing durable, repo-checkable artifacts
  that ensure the moment clean 1h data lands, the firm can immediately begin
  CONFIRMABLE intraday research — without redoing infrastructure work, without
  scrambling to write validation harnesses, and without violating the no-peeking
  and pre-registration guardrails that are load-bearing for the firm's rigor posture.

  The six acceptance criteria above force the downstream plan to:
  1. Name deliverables, not study goals (AC-01)
  2. Assign concrete per-role prep tied directly to 1h-data expected value (AC-02)
  3. Be honest about the quant research base rate (AC-03)
  4. Enforce all existing guardrails from prior cycles (AC-04)
  5. Enumerate what is explicitly out of scope (AC-05)
  6. Define the sequenced workflow from data-landing to backtest-slot (AC-06)

  PM makes no technical decisions about which hypotheses to pursue, what the cost
  model should contain, or how ML validation should be structured. Those are
  dispatched to CTO, CRO, HoQR, ML, NHT, and PR respectively.

