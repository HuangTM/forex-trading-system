overall_verdict: approve-with-conditions
summary: >
  The data-quality gate is solid, spec-faithful, and the EXCLUDE-not-impute guarantee is intact and
  well-tested — it correctly closes the QRB-6 zero-imputation void in code. The rollover swap model
  is clock-disciplined in its tz handling and no-lookahead bar attribution, BUT contains one MATERIAL
  correctness bug (F-001): it bills phantom Saturday/Sunday rollover boundaries during a
  weekend-spanning hold, over-charging swap by ~2 extra days per weekend — a direct drift from CM-2's
  weekend convention and a clock-and-ordering item-9 failure. The test suite (F-002) is structured so
  this bug cannot fail a test. Both are down-graded from blocking to must-fix-before-integration only
  because the model is not yet wired into the engine (F-005, confirmed honest) and there is no live
  capital. Two minor findings (F-003 string-coupled non-fail-closed schema partition needing CTO
  ratification; F-004 brittle sys.path import) round out the conditions. Approve to land the work as
  a tracked prerequisite, with C-1/C-2 as hard preconditions on the engine-integration follow-on.
