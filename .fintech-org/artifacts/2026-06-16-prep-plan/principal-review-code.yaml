clock_and_ordering_summary:
  rubric_decision_basis: >
    Item 9 (weekend / session-boundary handling) FAILS via F-001 — phantom Sat/Sun rollover
    boundaries. Items 1 (clock source named), 3 (tz explicit), 7 (backtest/live clock —
    no now() in the gate or cost path; rollover is data-timestamp driven), and the no-lookahead
    item (5) PASS. Per the clock-and-ordering decision matrix, an item-9 finding is "reject"-class
    in a wired execution path; because the model is NOT wired (F-005) and there is no live capital,
    I down-grade to approve-with-conditions with F-001/F-002 as must-fix-before-integration.
  concrete_edge_case_checked:
    case: "Long EURUSD held Friday 2023-01-06 10:00 UTC -> Monday 2023-01-09 10:00 UTC (full weekend)."
    correct_answer: >
      The market is closed Fri 22:00 -> Sun 22:00. A normal weekend-spanning hold should incur the
      weekend financing ONCE — and under the CM-2/standard convention that weekend charge is
      pre-paid by the preceding Wednesday's 3x. At most ONE rollover (the Sunday reopen / Friday
      roll) should be billed for the weekend, NOT three.
    code_answer: "count_rollover_crossings returned (3, 0) — Fri 22:00 + Sat 22:00 + Sun 22:00 all billed as single charges."
    verdict: "INCORRECT — over-charges the weekend by ~2 extra swap-days. Confirmed by direct execution."
  lookahead_found: false
  lookahead_note: >
    rollover_cost_for_bar fires on the 21:00 bar (which CLOSES at 22:00), not the 20:00 bar — the
    cost attaches to the bar whose own period contains the crossing, with no read of a future bar.
    test_no_lookahead_cost_at_bar_close_time covers this and passes. Sacred engine test untouched.

execution_firewall_summary:
  section_A_research_in_impl: "PASS — no hardcoded thresholds (all from config/spec), no fillna/clip/winsorize, no lookback windows, no regime branching, no signal transforms in the gate or cost model."
  section_B_spec_completeness: "PASS — both source specs are complete; thresholds, bands, exclusion semantics, never-lands branch all present."
  section_C_parameter_sourcing: "PASS — every numeric literal traces to CTO Section 1/2/3/6 or CRO CM-2. The one implementer judgment (structural vs data-quality issue split) is documented as a deviation (F-003)."
  section_D_observability: "PASS (adequate) — every gate decision boundary and rollover crossing emits a structured log per observability_hooks; verdict/issue/flag counts logged. Minor: the ImportError-degrade (F-004) logs a WARNING but does not fail closed."
  section_E_integration_tests: "PASS-with-gap — ADMIT, 7x EXCLUDE, ConfigurationError, SC-1..SC-5, trade-window, gap all tested; the weekend-hold cost case is the missing integration test (F-002)."
  drift_verdict: "No SILENT drift in the gate. The cost model has a MATERIAL semantic drift from CM-2 (F-001) that the tests fail to surface (F-002). The two documented deviations are benign-to-minor (F-003 minor, bar_coverage numerator benign)."

exclude_not_impute_confirmation:
  verdict: "CONFIRMED — no zero-imputation path exists."
  evidence: >
    Read every branch of coverage_gate and _apply_sc_bar_checks. Failing bars are removed from a
    boolean measured_mask (dropped from the measured count); they are never assigned a synthetic
    spread/cost. No fillna(), no .clip(), no neighbour-fill, no default-cost substitution anywhere
    in quality_gate_1h.py. On any gate failure the verdict is EXCLUDE and the pair is dropped, never
    patched. The SC-1/SC-5 pair-level exclusion was specifically refactored (post-critic) to keep
    measured_spread_fraction an HONEST per-bar diagnostic rather than zeroing it — and verified by
    test_sc1_pair_level_exclusion_keeps_honest_fraction (fraction > 0.5 at 10% failure). This is the
    direct, intact remediation of the QRB-6 zero-imputation void.

documented_deviation_judgments:
  - deviation: "bar_coverage_pct numerator uses in-session bars only (not raw len(df))."
    judgment: "BENIGN. Keeps the ratio in [0,1] and is faithful to the spec's stated intent (a coverage fraction). Does not weaken any gate. No action."
  - deviation: "validate_1h_schema data-quality warnings deferred to per-bar SC handling instead of full-dataset EXCLUDE."
    judgment: "MINOR / needs CTO ratification — see F-003. Defensible intent-faithful re-read, but the string-coupled, not-fail-closed partition is a fragile boundary on the EXCLUDE path."

