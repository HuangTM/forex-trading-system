# =============================================================================
# FINDINGS
# =============================================================================
findings:

  - id: F-001
    severity: major
    location: "src/forex_system/costs/model.py:40-84 (count_rollover_crossings); 247-287 (rollover_cost_for_bar)"
    category: correctness
    title: "Phantom weekend rollover boundaries: swap over-charged on a weekend-spanning hold"
    observation: >
      count_rollover_crossings walks every calendar day's 22:00 UTC boundary between entry and
      exit and charges a single (or Wed-triple) swap at each. For a Friday 10:00 -> Monday 10:00
      hold it returns n_single=3 (Fri 22:00, Sat 22:00, Sun 22:00). I executed this:
      count_rollover_crossings(ts('2023-01-06 10:00'), ts('2023-01-09 10:00')) -> (3, 0).
      rollover_cost_for_bar shares the defect: it charges a Saturday-21:00 bar and a Sunday-21:00
      bar (executed: both return 1.0 pip).
    inference: >
      The FX market is CLOSED Fri 22:00 UTC through Sun 22:00 UTC — Saturday 22:00 and Sunday
      22:00 are NOT real rollover/financing events. Standard FX swap convention (which CM-2
      encodes via the Wednesday 3x rule) pre-pays the weekend's two non-trading settlement days
      on WEDNESDAY; it does not bill an additional single charge on Saturday and Sunday. As
      written, every weekend-spanning hold is over-charged by ~2 extra days of swap. This
      DIRECTLY contradicts CRO CM-2 (the swap must reflect real rollover crossings, with the
      weekend captured by the Wed triple) and is exactly the clock-and-ordering rubric item-9
      failure class (weekend wrap-around / session-boundary handling).
      NOTE (scope-limiting, why MAJOR not BLOCKING): the per-bar path (rollover_cost_for_bar),
      which is the engine-facing accrual API, is in practice driven by REAL bars from the gated
      parquet — and the gate excludes all Sat/Sun bars. So when fed only real bars, the per-bar
      path will not see Sat/Sun 21:00 bars and the over-charge does not materialize. The discrete
      holding_cost(entry_ts, exit_ts) path has NO such protection and over-charges directly. Since
      neither path is wired into the engine yet (KG-QD-3) and there is no live capital, this is not
      deployment-blocking today — but it is a latent wrong-number that WILL mis-cost the first 1h
      backtest that uses the discrete path or feeds synthetic continuous bars, and it must be fixed
      before this model is wired in.
    evidence: >
      Executed: count_rollover_crossings(Fri10:00, Mon10:00) = (3,0).
      Executed: rollover_cost_for_bar(Sat 21:00)=1.0, (Sun 21:00)=1.0.
      Spec: cro-risk-gates.yaml CM-2 lines 84-88 ("tripled on Wednesday for the T+2 weekend
      roll"); session_filters lines 263-268 mark Fri>=21:00..Sun<22:00 as market-closed.
      The gate module itself (quality_gate_1h.py:55-62) defines this exact weekend-closed window,
      so the two modules DISAGREE about when the market is open.
    recommended-action-class: add-edge-case-handling
    owning-role: quant-developer
    must_fix: true

  - id: F-002
    severity: major
    location: "tests/costs/test_rollover_swap.py:105-138, 201-209"
    category: test-coverage-gap
    title: "No test exercises a full-weekend-spanning hold; existing tests encode the F-001 bug as expected behavior"
    observation: >
      The longest holds tested are Mon 10:00 -> Sat 10:00 (test_five_days_four_single_one_triple,
      test_five_day_hold_mon_to_sat). These assert n_single counts that INCLUDE the Friday 22:00
      crossing into the closed weekend and stop before Sat/Sun 22:00. No test holds a position
      from Friday across the weekend into Monday — the exact case that surfaces the phantom Sat/Sun
      boundaries. The test suite is therefore structured so the F-001 over-charge can never fail a
      test.
    inference: >
      Test inversion: if the implementation silently bills Saturday and Sunday rollovers (it does),
      NO existing test would catch it. A reviewer trusting "65/65 green" would miss a real
      cost-correctness bug. This is the canonical "tests describe the input but not the load-bearing
      invariant (no phantom weekend financing)" anti-pattern.
    evidence: >
      grep of the test file for weekend/Fri/Sat/Sun holds returns only the two Mon->Sat cases at
      lines 131-136 and 201-209. Independent execution of the Fri->Mon case (F-001) is what
      surfaced the defect; no test covers it.
    recommended-action-class: add-test
    owning-role: quant-developer
    must_fix: true

  - id: F-003
    severity: minor
    location: "src/forex_system/data/quality_gate_1h.py:353-401 (step 2 structural-vs-data-quality split); qd-implementation.yaml deviations_from_spec[2]"
    category: spec-drift
    title: "QD-documented deviation: validate_1h_schema data-quality warnings down-graded from EXCLUDE to per-bar handling"
    observation: >
      CTO spec Section 5 step 2 says: invoke validate_1h_schema; if issues are non-empty and any
      issue is NOT SPREAD_COL_MISSING_WARNING, return EXCLUDE. The implementation instead
      partitions schema issues into a hand-maintained _STRUCTURAL_ISSUE_PREFIXES allowlist
      (early-exit EXCLUDE) and a _DATA_QUALITY_WARNINGS list (deferred to SC-2/SC-5 per-bar
      exclusion). QD documents this as deviation #2.
    inference: >
      The deviation is defensible and arguably MORE faithful to the spec's INTENT (a single
      zero-volume bar should not EXCLUDE a 12,000-bar pair; it should be a per-bar exclusion feeding
      measured_spread_fraction). It does NOT weaken the EXCLUDE-not-impute guarantee — a down-graded
      bar is still dropped from the measured count, never imputed. HOWEVER: the partition is driven
      by literal substring matching on validate_1h_schema's message strings. If validate_1h_schema
      ever changes a message string (e.g. renames "bars with volume <= 0"), a genuine structural
      failure could silently fall through to the data-quality bucket and be down-graded from
      EXCLUDE to a soft per-bar handling. This is a fragile, string-coupled gate boundary on the
      load-bearing EXCLUDE path. The CTO authored the step-2 clause; whether this re-interpretation
      is acceptable is the CTO's call to ratify, not the implementer's to assume.
    evidence: >
      quality_gate_1h.py:332-351 defines both string-prefix lists; line 377 does
      `i.startswith(w) or w in i for w in _DATA_QUALITY_WARNINGS`. No test asserts that an UNKNOWN
      schema-issue string defaults to the STRUCTURAL (EXCLUDE) bucket — i.e. fail-closed on an
      unrecognized message.
    recommended-action-class: clarify-spec
    owning-role: cto   # ratify the re-interpretation; QD to add a fail-closed default + test if approved
    must_fix: false

  - id: F-004
    severity: minor
    location: "src/forex_system/data/quality_gate_1h.py:353-365 (sys.path mutation + scripts import)"
    category: maintainability
    title: "Gate imports validate_1h_schema from scripts/ via runtime sys.path insertion with silent ImportError degrade"
    observation: >
      Step 2 inserts the scripts/ dir into sys.path at runtime and imports validate_1h_schema from
      ingest_dukascopy_1h. On ImportError it sets schema_issues=[] and logs a WARNING, then
      continues — the structural schema check is silently skipped.
    inference: >
      A production data-quality gate depending on a script module via sys.path mutation is brittle
      (import order, cwd, packaging). More importantly, the ImportError branch degrades the gate to
      "no structural check" while still emitting ADMIT/EXCLUDE verdicts — a structurally corrupt
      parquet (bad index, OHLC violation, stale run) could be ADMITted if the import silently fails
      in some deployment context. The failure mode is named (logged) but the consequence (gate runs
      WITHOUT its structural layer yet still issues verdicts) is not fail-closed. Per the spec,
      structural corruption must EXCLUDE; a gate that cannot run its structural check should arguably
      refuse to ADMIT rather than proceed.
    evidence: >
      quality_gate_1h.py:360-364: `except ImportError: schema_issues = []` then proceeds to steps 3-8.
      No test covers the ImportError degrade path or asserts fail-closed behavior under it.
    recommended-action-class: add-edge-case-handling
    owning-role: quant-developer
    must_fix: false

  - id: F-005
    severity: observation
    location: "src/forex_system/costs/model.py (whole module) + engine.py:369,560"
    category: other
    title: "KG-QD-3 confirmed honest: rollover model not wired into engine — tracked follow-on, not a silent gap"
    observation: >
      I grepped the engine and src tree: RolloverAwareRealisticCostModel is never imported or
      constructed by the backtest engine. engine.py calls cost_model.holding_cost(pair, direction,
      days) positionally (lines 369, 560) with no entry_ts/exit_ts, so any RolloverAware instance
      passed in would take the pro-rata fallback. The sacred no-lookahead test is untouched.
    inference: >
      This matches the QD's KG-QD-3 disclosure exactly. The CM-2 rollover semantics are therefore
      BUILT but NOT YET ACTIVE in any backtest. This is correctly out-of-scope for this artifact and
      is honestly tracked. CONDITION: the engine-integration follow-on MUST resolve F-001 before
      wiring, and CRO's binding constraint "swap charged only across 22:00 UTC rollover (3x Wed)"
      is not yet enforced in any runnable 1h path until that integration lands. No silent gap;
      flagged so the orchestrator tracks it as a blocking precondition on the NEXT task, not this one.
    evidence: "grep: no RolloverAware/count_rollover/rollover_cost_for_bar references outside costs/model.py; engine.py:369,560 positional holding_cost calls."
    recommended-action-class: escalate-to-owning-role
    owning-role: quant-developer
    must_fix: false

  - id: F-006
    severity: observation
    location: "src/forex_system/costs/model.py:87-98 (_to_utc_dt); 247-264 (rollover_cost_for_bar tz handling)"
    category: correctness
    title: "Clock-naming and tz-handling are disciplined; tz-naive timestamps assumed-UTC (documented)"
    observation: >
      All rollover timestamps are normalized to tz-aware UTC. tz-naive inputs are assumed UTC
      (documented in the count_rollover_crossings docstring). timedelta(days=1) is used to advance
      the 22:00 boundary with an explicit comment that FX swap is UTC-only and DST-independent.
    inference: >
      This is correct for a UTC-only FX dataset (the CRO spec states the dataset is verified-UTC
      with no venue-local time). clock-and-ordering items 1, 3, 9 (DST) pass for the UTC-only
      assumption. Residual: the assume-UTC-on-naive behavior is a silent coercion — acceptable here
      because the dataset is verified-UTC and the engine path is tz-aware, but it would mask a bug
      if a naive LOCAL-time timestamp were ever passed. Not a finding given the verified-UTC dataset;
      noted for the integration follow-on.
    evidence: "model.py:54-57 docstring; :82 timedelta(days=1) DST comment; :87-98 _to_utc_dt coercion."
    recommended-action-class: other
    owning-role: quant-developer
    must_fix: false

