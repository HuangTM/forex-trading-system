findings:

  - id: F-001
    severity: major
    category: invariant-violation
    location: "src/forex_system/backtest/engine.py — end-of-run cleanup `if cur_units > 0:` (line 544); mark-to-market `if cur_units > 0:` (line 536); new per-bar SHORT accrual `elif cur_units < 0:`"
    observation: >
      The new per-bar accrual block treats cur_units < 0 (short) as a supported, accruing
      state. But THREE other sites in the same function remain long-only: (1) the
      mark-to-market at line 536 (`if cur_units > 0: ... else: equity_curve = equity`) does
      NOT mark a short position to market — unrealized P&L on a short would never appear in
      the equity curve; (2) the end-of-run close at line 544 (`if cur_units > 0:`) closes
      only longs — a short held to the last bar is silently abandoned (no Trade emitted, no
      realized P&L booked, include_swap path never reached); (3) the long-only clamp at
      line 331 (`clamped_signal = max(raw_signal, 0.0)`) means cur_units < 0 is UNREACHABLE
      today, so the short accrual branch is dead code.
    inference: >
      (a) WHILE the long-only clamp stands, the short accrual `elif` is provably dead and
      harmless — no short is ever opened, so no equity is ever accrued or abandoned. Shipping
      a dead-but-correct branch is acceptable IN ISOLATION. (b) However, it is a LATENT TRAP:
      the short accrual branch creates the appearance that shorts are handled end-to-end,
      while mark-to-market and end-of-run close are NOT short-aware. The moment the clamp is
      relaxed to enable shorts, a short held to run-end loses its entire mark-to-market and
      realized P&L silently — equity would be overstated/understated with no error. The
      accrual branch and the close/MTM branches are STRUCTURALLY INCONSISTENT. QD correctly
      surfaced this (qd-engine-wiring.yaml remaining_concerns #3, engineer-mindset rule 4)
      and DEFERRED it with a KNOWN GAP comment rather than burying it — the deferral is
      correct (touching close/clamp logic is outside the frozen KG-QD-3 spec and would risk
      the equivalence gate).
    evidence: "engine.py:331 (clamp), :536 (MTM long-only), :544 (close long-only); new elif short accrual block; qd-engine-wiring.yaml lines 176-192."
    recommended_action_class: escalate-to-owning-role   # track as a hard precondition, do NOT fix in KG-QD-3
    owning_role: cto
    disposition: >
      ACCEPTABLE for KG-QD-3 as shipped (dead code, correctly deferred, gap is tracked not
      buried). Becomes BLOCKING the instant any short-capable strategy is enabled. Must be
      registered as a named precondition on short-intraday work, not left only as a code
