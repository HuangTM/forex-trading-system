# =========================================================================
# SIGN-CONVENTION CHECK (independent trace, not relying on QD's claim)
# =========================================================================
sign_convention_check:
  result: CORRECT
  trace_long_negative_carry:
    - "PairInfo EURUSD swap_long_pips_per_day = -1.2 (negative carry: holding LONG costs 1.2 pips/day)."
    - "model.py:326 rollover_cost_for_bar returns `-daily_swap * multiplier` = -(-1.2)*1 = +1.2 (positive = cost-to-trader convention)."
    - "engine negates: per_bar_swap_pips = -(+1.2) = -1.2."
    - "engine: equity += (-1.2) * pip_value(>0) * cur_units(>0) → equity DECREASES. CORRECT — a negative-carry LONG on a rollover bar loses money."
  trace_short_branch:
    - "abs(cur_units) is used, so the magnitude is always positive; sign comes solely from per_bar_swap_pips."
    - "For a SHORT, daily_swap = swap_short_pips_per_day. EURUSD swap_short = +0.3 (positive carry for SHORT)."
    - "model returns -daily_swap*mult = -(+0.3) = -0.3 (negative = income/credit convention). engine negates → per_bar_swap_pips = +0.3 → equity += (+0.3)*pip*abs(units) → equity INCREASES. CORRECT — positive-carry SHORT earns carry."
  double_negation_risk: "NONE. The negation is applied exactly once in the engine; the model encodes the cost-sign once. Mirrors the existing daily holding_cost negation (line 369) precisely."

