clock_and_ordering:
  no_lookahead:
    verdict: PRESERVED
    evidence: >
      delayed_signals = signals.shift(entry_delay_bars).fillna(0.0) computed once before
      the loop (unchanged). The clamp/abs/sign-multiply at 351-364 operate on the already-
      delayed raw_signal=delayed_signals.iloc[i]; they add NO new .shift/.rolling/.now()
      and touch no future bar. clock-and-ordering item 5 (lookahead) and item 7 (backtest
      clock equivalence) unaffected. The sacred test_no_lookahead remains green
      (orchestrator: 12 PASS). PASS.
    clock-sources-named: 1   # exchange/event-time bar_ts in rollover_cost_for_bar (hour==21 UTC)
    lookahead-found: false
  no_double_count_swap:
    verdict: PRESERVED for shorts
    evidence: >
      Continuous mode accrues short swap per-bar (429-432) and ALL continuous closes pass
      include_swap=False: C1 (475), C4 leg1 (615), Site-H (684). _close_position only adds
      holding_cost when include_swap=True (729), so the daily-accrued short swap is never
      re-charged as a lump at exit. C3-reduce computes PnL inline with no swap term.
      No double-count. PASS.

