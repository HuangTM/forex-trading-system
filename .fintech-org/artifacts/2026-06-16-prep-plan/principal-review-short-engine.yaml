# 2. REBALANCE DECISION-TREE FAITHFULNESS
# ----------------------------------------------------------------------------
decision_tree_faithfulness:
  verdict: FAITHFUL
  branch_key: >
    engine.py:459-460 computes cur_sign/tgt_sign and branches on (cur_sign, tgt_sign)
    ONLY: C1 tgt_sign==0 (462), C2 cur_sign==0 (489), C3 tgt_sign==cur_sign (521),
    C4 else (599). There is NO `if delta>0` and NO `target_units<=0.0` test anywhere in
    the replaced block. The forbidden `delta` variable is gone (grep-confirmed by reading
    459-654). Matches Section-3 spec exactly.
  increase_a_short:
    verdict: CORRECT — does NOT route to exit (verified by reading, not test name)
    trace: >
      cur=-500, target=-1000 ⇒ cur_sign=-1, tgt_sign=-1 ⇒ C3 (521). m_cur=500,
      m_tgt=1000, m_tgt>m_cur ⇒ C3-increase (526): delta_mag=500, entry_cost on 500,
      magnitude weighted-avg entry_price, Trade(direction=SHORT since cur_sign<0),
      cur_units=target_units=-1000. The position becomes MORE negative; NO _close_position
      call, NO full-exit. The old `target_units<=0.0` flatten trap is structurally
      impossible here. PASS.
  same_sign_reduce:
    verdict: CORRECT — C3-reduce (561) trims on the same side, cur_units=target_units
      stays negative; emits a SHORT trade; entry_price UNCHANGED (correct, remainder
      still open).
  weighted_avg_guard_bug:
    verdict: FIXED — C3-increase uses magnitude form (533); the old `total_new>0` guard
      that would skip a short's entry_price update is absent. Critic finding #2 closed.

# ----------------------------------------------------------------------------
# 3. FLIP (C4) — concrete trace
# ----------------------------------------------------------------------------
flip_trace:
  scenario: >
    EURUSD, flat price P. Earlier: long entered at P_long, cur_units=+200000,
    entry_price=P_long. New bar target_units=-200000. cur_sign=+1, tgt_sign=-1,
    tgt_sign!=cur_sign ⇒ C4 (599).
  leg1_close: >
    _close_position(position=float(+1)=+1.0, size=abs(+200000)=200000,
    entry_price=P_long, exit=P, include_swap=False). _close_position (725) derives
    direction=LONG (position>0), price_diff_pips=(P-P_long)/pip*(+1) — correct LONG PnL
    sign. equity += close_trade.pnl_dollars. A LONG Trade with correct PnL is booked.
  leg2_reset: >
    entry_price=P; entry_time=ts (622-623), BEFORE the open leg. The stale P_long is
    discarded. Critic finding #4 closed.
  leg3_open: >
    entry_cost charged on abs(-200000)=200000; a fresh SHORT Trade (tgt_sign<0) is
    emitted with entry_price=P (the FLIP-bar price, NOT P_long), size=200000;
    cur_units=-200000. BOTH exit cost (long close) and entry cost (short open) are
    charged — not netted (flip_cost_rationale satisfied; firewall Section A honest TC).
  pnl_and_entry_price_correct: YES
  result: >
    Booked LONG-close PnL has the correct long sign; the new SHORT leg's entry_price is
    the flip-bar price; two trades emitted; both costs charged. C4 is correct.
  flip_log: >
    engine.py:646 emits continuous.flip with from_units/to_units/close_pnl — decision
    boundary replayable from logs alone (log-as-decision-trace satisfied). NOTE: the
    from_units expression `close_trade.size * cur_sign * -1` is a COSMETIC log value only
    (does not affect equity/trades); for a long->short flip it prints -|N| which mislabels
    the pre-flip side as negative when it was +|N|. Minor observability nit (F-003).

# ----------------------------------------------------------------------------
# 4. SHORT PnL / COST / SWAP / MTM SIGN CORRECTNESS (traced, not taken on trust)
# ----------------------------------------------------------------------------
sign_correctness:
  mark_to_market: >
    engine.py:659-661: cur_units<0, price<entry ⇒ (price-entry)<0, *cur_units(<0) ⇒
    POSITIVE unrealized (gain when price falls). price>entry ⇒ negative (loss when price
    rises). Sign-correct. PASS.
  entry_exit_cost_abs: >
    All cost sites charge on magnitudes: C2 abs(target_units) (491-492,503,507), C3-incr
    delta_mag (529-530,546), C3-reduce reduce_mag (564,569,584), C4 open abs(target_units)
    (626-627,636,640), _close_position size>=0 (728,736). No negative-size cost. PASS.
  short_swap_branch_reachable_and_signed: >
    engine.py:429-432 is now REACHABLE (cur_units<0 occurs under allow_shorts).
    Sign chain: rollover_cost_for_bar(SHORT) returns -swap_short*mult (model.py:313,326);
    engine negates ⇒ per_bar_swap_pips = +swap_short*mult; equity += that * pip *
    abs(cur_units). With swap_short=+0.3, mult=1, units=200000 ⇒ +6.00 USD credit. This
    EXACTLY matches test_short_swap_accrual_through_engine's quantified assertion. The
    branch mirrors the long branch's negate-then-apply pattern (424). PASS.
  close_position_short: >
    _close_position (725,732): position=-1.0 ⇒ direction=SHORT, price_diff_pips=
    (exit-entry)/pip*(-1) ⇒ profit when exit<entry. Callers pass position=float(cur_sign)
    / end_position=-1.0 and size=abs(cur_units). Short close booked with correct sign. PASS.
  jpy_sign_preservation: >
    _to_engine_units (818-819) for JPY returns usd_nominal/price; a negative usd_nominal
    yields negative units (sign-preserving). Reasoned correct, but see test gap F-002
    (no JPY-pair short test exercises this path).

