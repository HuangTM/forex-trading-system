# 6. FINDINGS
# ----------------------------------------------------------------------------
findings:
  - id: F-001
    severity: minor
    location: tests/backtest/test_short_engine.py (whole file) — missing pure-short C1 case
    category: test-coverage-gap
    observation: >
      No test enters a SHORT, then drives target to FLAT via signal=0, and asserts the C1
      branch books a SHORT close with the correct short PnL sign while cur_units returns to
      0. test_short_exit_cost_is_positive_and_correct gets a closing SHORT trade via the
      signal -1→0 path, but asserts only cost_dollars sign/magnitude, not the C1 PnL sign
      on a non-flat price. Site-H end-of-run close is tested for PnL sign, but the mid-run
      C1 to-flat short-close PnL-sign path is not pinned.
    inference: >
      A future sign regression specifically in the C1 short-close PnL (e.g. dropping
      cur_sign) on a non-flat price could pass the current suite, since the only PnL-sign
      assertions on a short close run through Site-H, not C1.
    evidence: engine.py:462-487 (C1) vs tests covering exit only via cost asserts at flat price.
    recommended-action-class: add-test
    owning-role: quant-developer

  - id: F-002
    severity: minor
    location: tests/backtest/test_short_engine.py — all fixtures are EURUSD (USD-quoted)
    category: test-coverage-gap
    observation: >
      Every short test uses EURUSD, where _to_engine_units is identity. The JPY branch
      (engine.py:818-819) that divides usd_nominal by price — and must PRESERVE the negative
      sign for a short — has zero short-path coverage.
    inference: >
      A JPY short whose sign was inverted or dropped in _to_engine_units would not be caught.
      The spec asserts this path is sign-safe (Site-S(d)) but no test exercises it.
    evidence: engine.py:376, 818-819; spec Site-S clause (d) "VERIFIED sign-safe by reading".
    recommended-action-class: add-test
    owning-role: quant-developer

  - id: F-003
    severity: nit
    location: src/forex_system/backtest/engine.py:650 (continuous.flip log from_units)
    category: observability-gap
    observation: >
      The flip log's from_units = close_trade.size * cur_sign * -1 prints the negated
      pre-flip side. For long(+N)->short, cur_sign=+1 so it logs -N, mislabeling a +N long
      as -N. Cosmetic only; equity/trades are unaffected.
    inference: >
      A flip-debugging operator reading logs alone would see the wrong sign for the
      pre-flip position. Per log-as-decision-trace the boundary should reconstruct truthfully.
    evidence: engine.py:646-653.
    recommended-action-class: add-log
    owning-role: quant-developer

  - id: F-004
    severity: observation
    location: src/forex_system/backtest/engine.py:301-308 (defensive WARNING rail)
    category: correctness
    observation: >
      The rail warns when rebalance_threshold >= 1.0. The flip gate is
      frac_delta = (m_cur + m_tgt)/m_cur > threshold. For an equal-magnitude flip
      frac_delta=2.0, so threshold up to <2.0 still fires the flip; only a strongly
      asymmetric flip (m_tgt << m_cur) approaches frac_delta just above 1.0 and could be
      suppressed by a >=1.0 threshold. The warning is correctly conservative (warns at the
      earliest point a flip could ever be suppressed) and does not alter behavior. This is
      an observation, not a defect — the spec mandates exactly this WARNING (not a block),
      and the warning text correctly says a flip "may" be suppressed.
    inference: none — behaves as specified; H1/default threshold 0.20 is safe.
    evidence: engine.py:301-308; spec rebalance_threshold_interaction; test at 805-835.
    recommended-action-class: other
    owning-role: none

  - id: F-005
    severity: observation
    location: spec Site-C / engine.py:438-443 (NotImplementedError fail-loud)
    category: correctness
    observation: >
      A daily/pro-rata cost model + allow_shorts + a held short raises NotImplementedError
      rather than silently accruing zero swap. test_short_with_plain_cost_model_raises pins it.
    inference: >
      Failing loud is the CORRECT call here: silently accruing zero swap on a daily short is
      a research-class economic decision (understates carry cost) the engine must not make
      unilaterally — exactly the firewall Section-A drift class. Fail-loud is preferable to
      silently-wrong. Concur with the spec disposition. Note the raise fires only when a
      short is actually held on a non-rollover model; a long-only daily run is unaffected.
    evidence: engine.py:433-443; test 842-867; firewall-review Section A rationale.
    recommended-action-class: other
    owning-role: none

