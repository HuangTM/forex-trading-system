# ----------------------------------------------------------------------------
# 1. EQUIVALENCE-BY-DEFAULT — code-level reduction (not just gate trust)
# ----------------------------------------------------------------------------
equivalence_by_default:
  verdict: CONFIRMED at code level (independently of the green gate)
  trace:
    - Site-A (engine.py:351): clamped_signal = raw_signal if allow_shorts else
      max(raw_signal,0.0). allow_shorts=False → identical to the prior
      `max(raw_signal,0.0)`. PASS.
    - Site-S (engine.py:363-371): allow_shorts=False ⇒ clamped_signal>=0 ⇒
      signal_sign=+1.0 and abs(clamped_signal)==clamped_signal ⇒ the sizer call
      and usd_nominal are arithmetically identical to the prior single call. PASS.
    - Site-C (engine.py:425-443): the `elif cur_units < 0` branch is guarded by
      cur_units<0, which cannot occur when allow_shorts=False (clamp keeps signal>=0,
      sizer returns >=0 magnitude, sign=+1, _to_engine_units sign-preserving ⇒
      target_units>=0 ⇒ cur_units>=0). Branch UNREACHABLE on default path. PASS.
    - Site-D (engine.py:451): denominator = abs(cur_units) if cur_units!=0 else 1.0.
      For cur_units>0, abs()==identity → same as old `cur_units if cur_units>0 else 1.0`;
      for cur_units==0 both yield 1.0. Bit-identical on default. PASS.
    - Site-E tree (engine.py:459-654): with allow_shorts=False, tgt_sign and cur_sign
      are each in {0,+1}, so C4 (flip; requires cur_sign!=0 AND tgt_sign!=0 AND
      tgt_sign!=cur_sign) and the short side of C3 (cur_sign==-1) are UNREACHABLE.
      Reachable reduction:
        * old `cur_units==0 & delta>0` fresh-entry  → C2 (cur_sign==0, tgt_sign==+1).
        * old `delta>0` rebalance-up               → C3-increase (m_tgt>m_cur). The new
          magnitude weighted-avg `(entry*m_cur + price*delta_mag)/m_tgt` equals the old
          signed `(entry*cur + price*delta)/total_new` for positive units (m_cur==cur,
          delta_mag==delta, m_tgt==total_new). IDENTICAL arithmetic.
        * old `else` + `target_units<=0.0` full-exit → C1 (tgt_sign==0). Same
          _close_position(position=+1.0, size=cur_units) call (float(cur_sign)==+1.0,
          abs(cur_units)==cur_units). IDENTICAL.
        * old `else` + `target_units>0` partial-reduce → C3-reduce. price_diff_pips =
          (price-entry)/pip * cur_sign with cur_sign==+1 ⇒ identical to old unsigned
          form. IDENTICAL.
    - Site-G (engine.py:659): `!=0` vs old `>0` agree for all cur_units>0; at 0 both
      take else. Bit-identical.
    - Site-H (engine.py:669-688): `!=0` vs `>0` agree for cur_units>0; end_position
      resolves to +1.0, size=abs(cur_units)==cur_units. Bit-identical.
  conclusion: >
    The reachable default-path arithmetic reduces EXACTLY to the prior code at every
    site. The equivalence gate (3 PASS) is corroborated, not merely trusted.
    test_allow_shorts_false_is_default additionally pins no-kwarg == explicit-False
    bit-identical via assert_series_equal(check_exact=True). PASS.

