# =============================================================================
# PREMISE ASSESSMENT (does the plan correctly answer the CEO?)
# =============================================================================
premise-assessment:
  ceo-question: "Can CTO/CRO/ML learn their domain to create a money-earning system while data backfills?"
  plan-answer: >
    The plan REFRAMES correctly. Learning is not the lever (domain expertise is presumed and
    abundant per AC assumptions; the firm has run 48 rigorous trials). The lever is
    READINESS-FOR-CONFIRMABLE-RESEARCH: durable artifacts that ensure the instant clean 1h
    data lands, confirmable intraday research can begin with no re-registration and no
    infrastructure scramble. NHT sharpens this into a category-error diagnosis (profit is an
    OUTCOME with a low base rate, not an assignable task) and HoQR/ML add the honest unlock
    thesis (1h multiplies events/yr; multi-pair pooling is the specific lever) WITHOUT
    overclaiming (NHT-D3: the wall likely MOVES to ~1.5-3yr, not breaks; HoQR: no candidate
    pre-clears 2yr on honest priors).
  verdict: "CORRECT and NOT overclaiming. The reframe is the strongest part of the plan."

