# =============================================================================
# DECISION
# =============================================================================
decision-rationale: >
  APPROVE-WITH-CONDITIONS. The plan's SHAPE, premise reframe, O1/SPEC-vs-CODE honesty, and
  AC-03 no-profit discipline are strong and largely correct — this is a defensible, decision-
  gating use of the wait, not infrastructure theater. However there is ONE blocking finding
  (F-001: the bar-count gate threshold would reject all clean data) that must be fixed before
  the gate is run, plus three major cross-artifact reconciliation gaps (F-002/F-003 dual gates
  + unreconciled spread thresholds; F-004 freeze-now vs NHT blind-report; F-005 missing spread-
  correctness gate + never-lands branch). Because F-001 is blocking, this review's disposition
  is approve-with-conditions: the PLAN may stand as the agreed direction, but the CTO-D2 gate
  MUST NOT be run against landed data until F-001 is corrected, and the AC-06 workflow MUST
  encode F-004/F-005 before any pre-registration is frozen.

single-most-important-condition: >
  Fix F-001 before the data-quality gate is ever run: the per-pair min_bars threshold must be
  set BELOW the maximum achievable clean 24x5 bar count (CTO's own FM-4 computes ~13,770 for 2yr),
  not at/above the full-calendar 17,520. As specified, a perfectly clean parquet fails the
  bar-count gate and is EXCLUDED, silently emptying the research universe. (I state the defect
  and its evidence; the corrected constant is CTO's to set and re-validate against real density.)

conditions:
  - "BLOCKING (F-001): correct min_bars_2yr/5yr per pair to below achievable clean bar count; re-validate against measured Dukascopy 1h density before the gate runs."
  - "MAJOR (F-002): define a single authoritative completeness rule (precedence or AND-of-both) reconciling CTO max_gap_pct and CRO MEASURED-fraction>=0.90; add CRO coverage gate as a named AC-06 step."
  - "MAJOR (F-003): CRO supplies authoritative per-pair spread priors; CTO median/p90 ceilings derive from them; close CTO's self-declared discordance blocker before gate run."
  - "MAJOR (F-004): reconcile HoQR freeze-H1-now with NHT-D2 blind-structural-report-then-expandable; encode the one permitted pre-freeze data contact in AC-06."
  - "MAJOR (F-005): add a spread-column END-TO-END CORRECTNESS check (independent reconstruction, per NHT RR-1) as a workflow precondition, plus per-pair LAND/PARTIAL/MISSING/NEVER status and a never-lands terminal branch."
  - "MINOR (F-006, F-007): disambiguate DSR-N vs N_required; state explicitly that a >2yr-on-priors pre-reg's backtest slot stays BLOCKED until measured data clears G1."

