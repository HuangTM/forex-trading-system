# =============================================================================
# LOAD-BEARING RISKS NO ROLE FULLY CAUGHT
# =============================================================================
reviewer-surfaced-risks:
  - id: PR-RISK-1
    risk: >
      F-001 — the min_bars_2yr=17520 threshold exceeds the maximum achievable clean bar count
      (~13,770), so the bar-count gate as specified would EXCLUDE every clean pair. No role
      caught this; CTO's own FM-4 prose contains the disproving arithmetic but the schema value
      was not corrected. This is the single most important finding: it would silently empty the
      research universe at the exact moment the data lands clean, inverting the gate's purpose.
  - id: PR-RISK-2
    risk: >
      F-002/F-003 — there are TWO independent completeness gates (CTO max_gap_pct vs CRO
      MEASURED-fraction>=0.90) and TWO independent spread-threshold sets (CTO median ceilings
      vs CRO p90-default + sanity band) with no defined precedence and an unmet, self-declared
      reconciliation blocker. A pair's admit/exclude verdict is currently ambiguous.
  - id: PR-RISK-3
    risk: >
      F-005 — spread-column CORRECTNESS (independent reconstruction) is a RESEARCH_REQUEST, not
      a workflow precondition. The current code checks presence + a 50-pip plausibility ceiling
      only. A mis-scaled-but-plausible spread (e.g. JPY-pip scaling error producing values
      under 50) would pass every existing check and silently corrupt all TCA — the QRB-6 failure
      mode in a new field. NHT flagged the need; the plan did not make it a gate.

