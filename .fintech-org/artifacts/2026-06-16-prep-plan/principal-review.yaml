findings:

  - id: F-001
    severity: blocking
    location: "cto-infra-prep.yaml — CTO-D2 schema (every pair: min_bars_2yr: 17520) vs CTO-D2 FM-4 mitigation arithmetic"
    category: numerical
    observation: >
      CTO-D2 sets min_bars_2yr = 17520 identically for all 12 pairs. The SAME artifact's
      FM-4 computes the achievable count: "8760h/yr × 78.6% = ~6885 bars/yr. 2yr ≈ 13,770
      bars" and asserts "min_bars_2yr = 17,520 is SET DELIBERATELY LOWER THAN CALENDAR-FULL
      (17,520 = 24×365×2 full calendar)". But 24×365×2 = 17,520 IS the full-calendar count,
      and it is GREATER than the ~13,770 bars a clean 24x5 forex parquet can actually contain.
    inference: >
      The min-bar threshold (17,520) exceeds the maximum achievable bar count (~13,770) for a
      perfectly clean 2yr parquet. Under CTO-D1 TestPerPairBarCountGate ("gate fails when
      bar_count < threshold_for_pair"), EVERY clean pair would FAIL the bar-count gate and be
      EXCLUDED. The gate's EXCLUDE-not-impute posture then removes all 12 pairs from research.
      The artifact's own FM-4 prose contradicts its own schema number; the prose reasoning is
      correct and the schema value is wrong. This is the inverse of the QRB-6 failure (there,
      bad data slipped through; here, all GOOD data is rejected) — same class: an unvalidated
      threshold constant in a gate.
    evidence: "cto-infra-prep.yaml CTO-D2 schema block (min_bars_2yr: 17520, repeated 12x); FM-4 mitigation text (bars/yr ≈ 6885, 2yr ≈ 13,770)."
    recommended-action-class: clarify-spec   # (reviewer forbidden from supplying the corrected number)
    owning-role: cto

  - id: F-002
    severity: major
    location: "Cross-artifact: cro-risk-gates.yaml coverage_gate (per-pair MEASURED fraction >= 0.90 of in-session bars) vs cto-infra-prep.yaml CTO-D2 (max_gap_pct 0.005–0.010 against EXPECTED bar count) — two independent, unreconciled completeness gates."
    category: spec-drift
    observation: >
      CRO defines a HARD pre-freeze coverage gate keyed to MEASURED-cost-bar fraction >= 0.90
      over the trade window. CTO independently defines a max_gap_pct gate (0.5%–1.0% missing)
      against expected bar count. These are two different completeness gates with different
      denominators (CRO: in-session measured-spread bars; CTO: calendar-expected bars) and
      very different thresholds (CRO tolerates up to 10% missing; CTO tolerates 0.5–1%).
    inference: >
      A pair could PASS CTO's gap gate and FAIL CRO's coverage gate, or vice-versa, with no
      defined precedence. The AC-06 workflow (CTO step 1 runs the gate; nothing runs CRO's
      coverage gate as a distinct step) does not say which gate is authoritative or that BOTH
      must pass. The two gates are not contradictory in intent but are unreconciled in
      mechanism and threshold — a strategy's admitted universe is ambiguous.
    evidence: "cro-risk-gates.yaml coverage_gate.per_pair_PASS_rules ('MEASURED-bar fraction ... >= 0.90'); cto-infra-prep.yaml CTO-D2 (max_gap_pct 0.005..0.010) and data_to_backtest_workflow step 1 (only CTO-D1 gate named)."
    recommended-action-class: clarify-spec
    owning-role: cto   # CTO owns the workflow; reconcile with CRO coverage gate, define precedence and a single AND-of-both admit rule

  - id: F-003
    severity: major
    location: "cto-infra-prep.yaml CTO-D2 spread_median_pips_max (3.0–6.0 pips/pair) vs cro-risk-gates.yaml per_pair sanity band (0.1–8 pips) and DEFAULT cost charge = spread_p90_pips"
    category: spec-drift
    observation: >
      CTO gates on spread_MEDIAN ceilings of 3.0 (EURUSD) up to 6.0 (GBPJPY). CRO's per-pair
      sanity band is 0.1–8 pips on the median, and CRO's binding cost charge is spread_P90,
      with separate spread_p90_pips_max in CTO (8.0–20.0). CTO itself flags (CTO-D2
      knowledge_gap + routed_to.cro) that CRO and CTO spread thresholds "must be reconciled"
      and that discordance is a "research-quality blocker", but the reconciliation has NOT
      happened in these artifacts — both sets of numbers are pre-data estimates set
      independently.
    inference: >
      The two roles have flagged the dependency but shipped UNRECONCILED numbers. CTO's
      median ceiling (e.g. EURGBP 3.0) and CRO's band (up to 8.0) can disagree on whether a
      given pair admits. Because CTO explicitly calls discordance a blocker, shipping both
      un-reconciled is a self-identified open blocker, not a closed one. Honest disclosure
      (good) but the condition it raises is unmet.
    evidence: "cto-infra-prep.yaml CTO-D2 spread_median_pips_max per pair + knowledge_gap_flagged RESEARCH_REQUEST + routed_to.cro; cro-risk-gates.yaml per_pair_PASS_rules sanity band 0.1–8 + binding_constraints 'Default cost charge = spread_p90_pips'."
    recommended-action-class: escalate-to-owning-role
    owning-role: cro   # CRO supplies authoritative per-pair spread priors; CTO ceilings then derive from them

  - id: F-004
    severity: major
    location: "Cross-artifact: nht-dissent.yaml NHT-D2 (blind structural data-quality report is the ONLY permitted data contact before freeze; shortlist must be EXPANDABLE after it) vs hoqr-hypothesis-prep.yaml (freeze H1 pre-registration NOW) and pm-acceptance-criteria.yaml AC-06 (no blind-report step)"
    category: invariant-violation
    observation: >
      NHT-D2 issues a RULING (not a suggestion): pre-registrations may be authored now but the
      shortlist "must be EXPANDABLE after a BLIND data-quality report ... That blind report is
      the only data contact permitted before freeze." HoQR's single_highest_ev_prep_action
      freezes H1 NOW. The PM AC-06 workflow has no blind-structural-report step between
      data-quality-gate and pre-registration finalize, and no expandability window.
    inference: >
      There is an unresolved sequencing conflict. If H1 is frozen NOW (HoQR) but NHT requires
      the shortlist to remain expandable until a blind structural report is seen, then either
      (a) H1's freeze is premature under NHT's ruling, or (b) NHT's ruling is not honored in
      the workflow. Both the no-peeking invariant (don't see data before freeze) and the
      anti-anchoring mitigation (allow structural-only expansion) are load-bearing, and the
      plan does not encode the one permitted exception NHT carved. The dissent is marked
      "must appear verbatim in CONSENSUS" but the workflow does not operationalize D2.
    evidence: "nht-dissent.yaml NHT-D2 verbatim + dissent-summary item (3); hoqr-hypothesis-prep.yaml single_highest_ev_prep_action ('FREEZE its PreRegistration YAML NOW'); pm-acceptance-criteria.yaml AC-06 steps (no blind-report / expandability step)."
    recommended-action-class: clarify-spec
    owning-role: head-of-quant-research   # reconcile freeze-now vs NHT blind-structural-report-then-expandable

  - id: F-005
    severity: major
    location: "Cross-artifact: nht-dissent.yaml NHT-D5/RR-2 (per-pair LAND/PARTIAL/MISSING status + explicit 'data partially/never lands' workflow branch + spread-column CORRECTNESS check) vs pm-acceptance-criteria.yaml AC-06 + cto-infra-prep.yaml workflow"
    category: edge-case
    observation: >
      NHT-D5 requires (i) a per-pair LAND/PARTIAL/MISSING status, (ii) a spread-column
      CORRECTNESS check (not just presence/plausibility), and (iii) an explicit AC-06 branch
      for "data partially/never lands". CTO FM-6 addresses partial landing for the per-pair
      gate, and CTO step 2 has an on_fail. But neither the PM AC-06 nor the CTO workflow
      contains a spread-column END-TO-END CORRECTNESS check (independent reconstruction); the
      existing validate_1h_schema (verified) checks presence + plausibility ONLY. No artifact
      owns a never-lands terminal branch ("if Dukascopy throttling means data never arrives
      clean, the plan does X").
    inference: >
      The plan's single most catastrophic dependency — a wrong/mis-scaled spread column —
      is checked only for presence and a 50-pip plausibility ceiling, which is exactly the
      class of silent corruption that VOIDED the first QRB-6 run (different field, same
      failure mode). NHT and CRO (R-4 venue mismatch) both flag spread trust; the plan
      acknowledges it as a KNOWLEDGE_GAP / RESEARCH_REQUEST but does NOT make a spread
      correctness gate a precondition in the workflow. "Data never lands" has no defined
      terminal state, so the entire plan is conditioned on an assumption the firm's own
      history (4-day run got ~1.6%) says is uncertain.
    evidence: "nht-dissent.yaml NHT-D5 verbatim + research-requests RR-1/RR-2; verified validate_1h_schema (presence + <=50 plausibility only, no correctness reconstruction); pm-acceptance-criteria.yaml assumptions[0] ('clean ... lands') as load-bearing assumption; cto data_to_backtest_workflow (no spread-correctness step, no never-lands branch)."
    recommended-action-class: add-edge-case-handling
    owning-role: cto   # CTO owns the data-quality gate + workflow; spread-correctness check + LAND/PARTIAL/MISSING/NEVER branch belong there

  - id: F-006
    severity: minor
    location: "ml-methodology-prep.yaml dsr.org_wide_trial_count_N: 48 vs hoqr-hypothesis-prep.yaml honest_treatment + horizon math (N_required ≈ 6.18 / IR^2)"
    category: numerical
    observation: >
      ML pins DSR deflation to org-wide N=48 and states effective-N >= logged-N for searched
      families. HoQR computes years_to_validate from N_required ≈ 6.18/IR^2 (a per-hypothesis
      sample-size-for-power), a DIFFERENT N than the DSR deflation N. Both are correct in their
      own context but the artifacts never state they are different quantities, and a reader
      could conflate "N=48 deflation" with the "N_required" in the confirmability formula.
    inference: >
      Low risk of an actual error (both formulas are individually sound), but the unlabeled
      collision of two distinct "N" concepts is exactly the kind of ambiguity that produced
      the broken-DSR-gate reset. A one-line disambiguation prevents a future mis-application.
    evidence: "ml-methodology-prep.yaml dsr.org_wide_trial_count_N + effective_N_caveat; hoqr-hypothesis-prep.yaml D1 ('N_required ≈ 6.18 / IR_per_event^2') and per-hypothesis confirmability_horizon blocks."
    recommended-action-class: clarify-spec
    owning-role: ml-researcher

  - id: F-007
    severity: minor
    location: "hoqr-hypothesis-prep.yaml H1 disposition 'STRETCH-leaning-PASS' + ranked_disposition (grant_backtest_slot_to: []) vs pm-acceptance-criteria.yaml AC-02 HoQR ('confirmability horizon ... must be ≤ 2yr to proceed')"
