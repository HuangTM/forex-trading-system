    evidence: "hoqr-hypothesis-prep.yaml ranked_disposition.grant_backtest_slot_to: [] + H1 disposition; pm-acceptance-criteria.yaml AC-02 head-of-quant-research ('≤ 2yr to proceed') + AC-06 step 6."
    recommended-action-class: clarify-spec
    owning-role: head-of-quant-research

