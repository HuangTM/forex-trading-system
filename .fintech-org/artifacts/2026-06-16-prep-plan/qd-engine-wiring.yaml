# =========================================================================
# REMAINING CONCERNS
# =========================================================================
remaining_concerns:
  - concern: test_daily_equivalence_under_rollover_model was reinterpreted
    detail: >
      The spec says "bit-identical" between plain and rollover models on daily data.
      This is mathematically impossible because: (a) plain RealisticCostModel pro-rates
      swap every bar; (b) RolloverAwareRealisticCostModel on daily 00:00 UTC bars has
      zero accrual (hour != 21). The test was rewritten to verify the correct intent:
      isinstance gate correctness (a,b), regression anchor for plain model (c), and
      explicit documentation that rollover model accrues zero on 00:00 UTC daily bars (d).
      The actual equivalence guarantee — "existing daily trials are bit-identical" — holds
      because ALL existing daily-bar callers use plain RealisticCostModel (isinstance=False).
    severity: documentation-only; no functional issue
    resolution: implemented test validates the correct invariant

  - concern: short-side per-bar accrual is new code without a companion failing test
    detail: >
      The elif cur_units < 0 block (SHORT rollover accrual) is new code. The engine is
      currently long-only (clamped_signal = max(raw_signal, 0.0)), so no existing test
      exercises this path. The spec explicitly notes this and approves the implementation
      with the caveat that a short-strategy test should be added when short strategies
      are introduced.
    severity: low — dormant code path, consistent with spec approval
    resolution: noted in spec, acceptable for KG-QD-3 scope

  - concern: end-of-run cleanup is long-only; inconsistent with the short accrual branch
    detail: >
      quick-critic surfaced this (CONFIRMED). The per-bar accrual now has an
      `elif cur_units < 0` branch (spec-mandated), treating shorts as a supported state.
      But the end-of-loop position-close block (engine.py ~line 540) reads `if cur_units > 0`
      and only closes longs. IF a short were ever held (impossible today due to the long-only
      clamp), it would be silently abandoned at run end — no Trade emitted, no realized P&L
      booked. The two branches are structurally inconsistent.
    severity: low-while-long-only / HIGH if shorts are ever enabled
    resolution: >
      NOT fixed in KG-QD-3 — adding a short-close block is outside the frozen spec
      (CTO mandated the short ACCRUAL branch but did not authorize touching close logic;
      doing so unprompted would be scope creep and could alter close semantics). Instead,
      a KNOWN GAP comment was added at the accrual branch flagging that the cleanup block
      MUST gain a matching `elif cur_units < 0` close before any short intraday strategy is
      enabled. Surfaced here per engineer-mindset rule 4 (face problems early). Recommend
      CTO/orchestrator track this as a precondition for short-side intraday work.
