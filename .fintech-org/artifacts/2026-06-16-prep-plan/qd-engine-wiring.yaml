# =========================================================================
# ENGINE DIFF: ACCRUAL BLOCK (before/after)
# =========================================================================
engine_diff:
  before: |
    if cur_units > 0:
        # holding_cost returns -swap_long_pips * days (negative = credit).
        # Negate to get credit: positive value added to equity.
        per_bar_swap_pips = -cost_model.holding_cost(pair, Direction.LONG, bar_duration_days)
        equity += per_bar_swap_pips * pip_value * cur_units

  after: |
    # KG-QD-3: Two paths gated by use_rollover_accrual (set once before loop).
    if cur_units > 0:
        if use_rollover_accrual:
            per_bar_swap_pips = -cost_model.rollover_cost_for_bar(
                pair, Direction.LONG, ts
            )
        else:
            # Daily/pro-rata path (unchanged — preserves validated daily results).
            per_bar_swap_pips = -cost_model.holding_cost(
                pair, Direction.LONG, bar_duration_days
            )
        equity += per_bar_swap_pips * pip_value * cur_units
    elif cur_units < 0:
        if use_rollover_accrual:
            per_bar_swap_pips = -cost_model.rollover_cost_for_bar(
                pair, Direction.SHORT, ts
            )
            equity += per_bar_swap_pips * pip_value * abs(cur_units)

# =========================================================================
# SIGN CONVENTION VERIFICATION
# =========================================================================
sign_convention:
  chain: >
    EURUSD swap_long_pips_per_day = -1.2 (negative carry).
    rollover_cost_for_bar returns -daily_swap * mult = -(-1.2)*1 = +1.2 (cost to trader).
    Engine: per_bar_swap_pips = -rollover_cost_for_bar(...) = -1.2.
    equity += -1.2 * pip_value * cur_units → equity DECREASES. CORRECT.
  negation_applied: true
  mirrors_daily_path: true
  verified_by: test_sign_convention_long_negative_carry (passes)

# =========================================================================
# INSTANCEOF GATE — DAILY EQUIVALENCE
# =========================================================================
instanceof_gate:
  expression: "use_rollover_accrual = isinstance(cost_model, RolloverAwareRealisticCostModel)"
  plain_model_path: >
    isinstance(RealisticCostModel(...), RolloverAwareRealisticCostModel) = False.
    use_rollover_accrual = False. Engine executes IDENTICAL code as before (else branch).
    All validated daily-bar trials are bit-identical.
  rollover_model_daily_bars: >
    RolloverAwareRealisticCostModel on daily bars at 00:00 UTC: rollover_cost_for_bar
    returns 0.0 for hour != 21. Zero swap accrual. NOT equivalent to plain model.
    This is correct behavior: daily-bar callers MUST use plain RealisticCostModel
    (as all validated trials do). The isinstance gate enforces the contract structurally.
  verified_by: test_daily_equivalence_under_rollover_model (passes; tests isinstance gate,
    regression anchor for plain model, and confirms rollover model zero-accrual on daily bars)

