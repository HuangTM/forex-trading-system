no-capital-instruction: true

# =============================================================================
# BUG SUMMARY
# =============================================================================
bug_confirmed: true
bug_description: >
  count_rollover_crossings() and rollover_cost_for_bar() were counting Fri 22:00,
  Sat 22:00, and Sun 22:00 UTC as rollover boundaries, which is incorrect: the FX
  market is closed from Fri 21:00 UTC through Sun 22:00 UTC (aligned with
  quality_gate_1h._WEEKEND_CLOSED_DAY_HOUR).  The T+2 weekend financing is pre-paid
  by the Wednesday triple charge; no additional Fri/Sat/Sun charges accrue.

canonical_case:
  entry: "Fri 2023-01-06 10:00 UTC"
  exit: "Mon 2023-01-09 10:00 UTC"
  old_result: "(3, 0) — wrongly billed Fri 22:00 + Sat 22:00 + Sun 22:00"
  new_result: "(0, 0) — no rollovers; no Wed in span; Fri/Sat/Sun skipped"
  verified_by_execution: true

test_encoding_bug: true
test_encoding_bug_detail: >
  test_five_days_four_single_one_triple (TestCountRolloverCrossings) asserted
  n_single==4 (counting Fri 22:00).  test_five_day_hold_mon_to_sat asserted
  cost==7.0 (same Fri 22:00 miscount).  Both corrected; comments explain why.

# =============================================================================
# FILES CHANGED
# =============================================================================
files_changed:
  - path: "src/forex_system/costs/model.py"
    changes:
      - "Module docstring: added WEEKEND ROLLOVER RULE section and DST note"
      - >
        count_rollover_crossings(): added weekend-closed guard — when weekday
        is 4 (Fri), 5 (Sat), or 6 (Sun), the 22:00 UTC candidate is skipped.
        Aligns with quality_gate_1h._WEEKEND_CLOSED_DAY_HOUR (Fri 21-23, all Sat,
        Sun 00-21).  Sun 22:00 is the market OPEN, not a financing boundary.
      - >
        rollover_cost_for_bar(): added weekend guard — Fri/Sat/Sun 21:00 UTC bars
        now return 0.0.  Also refactored: weekday `wd` computed once and reused for
        both the guard and the Wed-multiplier check.
      - "Docstrings updated on both functions to explain the WEEKEND RULE"

  - path: "tests/costs/test_rollover_swap.py"
    changes:
      - >
        C-2 (existing test corrections): test_five_days_four_single_one_triple renamed
        to test_five_days_excluding_fri_22, assertion corrected to n_single==3 (was 4).
        test_five_day_hold_mon_to_sat assertion corrected to cost==6.0 (was 7.0).
        Both have comments noting what was previously wrong.
      - >
        C-2 (new tests added): TestWeekendSpanningRollovers class with 9 tests:
        test_fri_to_mon_no_rollovers, test_fri_to_mon_holding_cost_zero,
        test_wed_spanning_with_weekend_charges_only_wed,
        test_wed_spanning_with_weekend_holding_cost,
        test_sat_rollover_bar_zero, test_sun_rollover_bar_zero,
        test_fri_rollover_bar_zero, test_thu_rollover_bar_nonzero,
        test_sat_crossing_not_counted.

  - path: "src/forex_system/data/quality_gate_1h.py"
    changes:
      - >
        C-4 (fail-closed ImportError): the except ImportError branch now returns
        EXCLUDE immediately with an explanatory issue string, instead of silently
        setting schema_issues=[] and proceeding.  Logger emits ERROR.  A missing
        ingest_dukascopy_1h.py environment cannot produce a trustworthy gate verdict.
      - >
        C-3 (fail-closed unrecognized warnings): the schema_issues triage loop now
        explicitly categorises each issue as SPREAD_COL_MISSING (handled), known
        data-quality (deferred to SC), or UNRECOGNIZED → structural_issues (EXCLUDE).
        A code comment flags that CTO ratification of this boundary is pending (C-3).

