    log: "INFO coverage_gate[{pair}] loaded {n} bars from {path}"
  - boundary: "gate_1 failure"
    log: "WARNING coverage_gate[{pair}] gate_1 fail: coverage={pct}"
  - boundary: "gate_2 failure"
    log: "WARNING coverage_gate[{pair}] gate_2 fail: measured_fraction={frac}"
  - boundary: "gap failure"
    log: "WARNING coverage_gate[{pair}] gap fail: max_gap={h} h"
  - boundary: "SC-3 zero-spread run flag"
    log: "WARNING SC-3: run of {n} consecutive zero-spread bars detected"
  - boundary: "SC-1/SC-5 pair-level exclusion"
    log: "WARNING SC-1/SC-5: {pct}% of bars failed — forcing pair exclusion"
  - boundary: "gate result verdict"
    log: "INFO coverage_gate[{pair}] verdict={v} approved={b} issues={n} flags={m}"
  - boundary: "never_lands_terminal"
    log: "CRITICAL coverage_gate NEVER_LANDS_TERMINAL: all {n} pairs returned EXCLUDE"
  - boundary: "rollover crossing per trade"
    log: "DEBUG rollover_cost[{pair}] entry={ts1} exit={ts2} n_single={k} n_triple={m} total_days={d}"
  - boundary: "rollover_cost_for_bar"
    log: "DEBUG rollover_cost_for_bar[{pair}] ts={ts} multiplier={m}"
  - boundary: "backward-compat fallback"
    log: "DEBUG RolloverAwareRealisticCostModel.holding_cost: no timestamps — falling back to pro-rata"

