# =============================================================================
# DEVIATIONS FROM SPEC
# =============================================================================
deviations_from_spec:
  - deviation: >
      bar_coverage_pct numerator uses actual_in_session (in-session bars only), not
      raw len(df). The spec says 'actual bars present' but the denominator is in-session
      slots. Using in-session numerator ensures the ratio stays in [0,1] even when a
      parquet contains non-trading-hour bars (e.g. synthetic test data or misclassified bars).
      The spec's intent is clearly a coverage fraction in [0,1]; using in-session numerator
      achieves this faithfully.
    justification: "Faithful to spec intent; prevents > 1.0 ratio from confusing the gate"
    spec_section: "CTO Section 2 gate_1_completeness"

  - deviation: >
      validate_1h_schema data-quality warnings (volume <= 0, spread_median <= 0)
      are NOT treated as structural failures causing early-exit. These bars are
      instead handled by the SC gate's per-bar exclusion logic (SC-2, SC-5).
      This allows the gate to correctly compute measured_spread_fraction rather
      than hard-rejecting the entire dataset on the first per-bar quality warning.
    justification: >
      The CTO spec says step 2 invokes validate_1h_schema and if issues are 'non-empty
      and any issue is NOT SPREAD_COL_MISSING_WARNING, return EXCLUDE.' The spec authors
      did not anticipate that validate_1h_schema emits data-quality warnings (not just
      structural failures) — if applied literally, any dataset with even one zero-volume
      bar would EXCLUDE before measuring coverage. The QD interprets the intent as:
      structural corruption (missing columns, bad index, stale OHLC, NaN prices) →
      early-exit; data-quality issues → defer to SC gates.
    spec_section: "CTO Section 5 step 2"

