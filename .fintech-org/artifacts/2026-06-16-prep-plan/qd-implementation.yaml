knowledge_gaps:
  - id: KG-QD-1
    gap: >
      KG-1 (CRO): per-bar tick_count and clipped_fraction are NOT persisted in the
      parquet — only volume (tick proxy) and spread aggregates. R-1 (low-tick
      fabricated spread) and R-2 (crossed-tick under-charge) cannot be gated per-bar.
      SC-2 (volume > 0) is the available proxy; it is weaker than a true tick-count gate.
    status: "OPEN — pending QD adding tick_count/clipped_fraction to _resample_ticks_to_1h"
    owner: quant-developer
    deferred: true

  - id: KG-QD-2
    gap: >
      Spread band floors and ceilings in config/data_quality_gates_1h.yaml are
      first-principles estimates — no empirical 1h data exists yet. All 12-pair bands
      will need revision on first data-land (per CTO revision_policy).
    status: "OPEN pending backfill completion"
    owner: quant-researcher

  - id: KG-QD-3
    gap: >
      RolloverAwareRealisticCostModel is currently NOT integrated into the backtest
      engine's per-bar accrual loop. The engine (engine.py line 369) still calls
      cost_model.holding_cost(pair, Direction.LONG, bar_duration_days) without
      timestamps. Integration into the engine's 1h intraday path is a separate task
      for the QD (requires engine changes + engine test updates).
    status: "OPEN — separate task; this implementation is the prerequisite"
    owner: quant-developer

