      description: >
        JPY-pair short (USDJPY) — _to_engine_units sign preservation for negative usd_nominal,
        and short PnL sign correctness for the JPY pip_value=0.01 / quote-currency path.
        ZERO prior coverage of this path. Quote-currency sign handling is a known bug class.
      sub_tests:
