# ----------------------------------------------------------------------------
# SITES IMPLEMENTED
# ----------------------------------------------------------------------------
sites:
  Site-A-clamp:
    status: DONE
    change: >
      clamped_signal = raw_signal if allow_shorts else max(raw_signal, 0.0)
    bit_identical_when: allow_shorts=False ✓

  Site-S-sizer-sign:
    status: DONE
    approach: >
      signal_sign = 1.0 if clamped_signal >= 0.0 else -1.0
      usd_nominal = signal_sign * sizer.calculate_size(abs(clamped_signal), ...)
    VolTargetSizer_changed: false   # magnitude-only sizer untouched
    bit_identical_when: allow_shorts=False → signal_sign=+1, abs()=identity ✓

  Site-B-swap-accrual-long:
    status: NO CHANGE (spec says correct as-is) ✓

  Site-C-swap-accrual-short:
    status: DONE
    changes:
      - removed KNOWN-GAP comment (branch is now REACHABLE)
      - added `else: raise NotImplementedError(...)` for pro-rata short swap
        when allow_shorts=True (fail-loud per spec §2 Site-C)
    bit_identical_when: allow_shorts=False → cur_units never < 0 → branch unreachable ✓

  Site-D-rebalance-denominator:
    status: DONE
    change: denominator = abs(cur_units) if cur_units != 0.0 else 1.0
    bit_identical_when: cur_units>=0 → abs()=identity; cur_units==0 → 1.0 in both ✓

  Site-E-rebalance-block:
    status: DONE — FULL REPLACE of lines 422-533
    implementation: >
      Four-case magnitude+sign decision tree. Branch key = (cur_sign, tgt_sign),
      NEVER sign(delta) or target_units<=0.0.
      C1: tgt_sign==0  → _close_position(position=float(cur_sign), size=abs(cur_units))
      C2: cur_sign==0, tgt_sign!=0  → fresh entry, either side
      C3: tgt_sign==cur_sign  → same-side resize (increase or reduce)
          - increase: magnitude weighted-avg entry_price (Critic finding #2 fixed)
          - reduce: signed price_diff_pips = (price-entry)*cur_sign
      C4: tgt_sign!=0, cur_sign!=0, tgt_sign!=cur_sign  → CLOSE-THEN-OPEN
          close → entry_price=price; entry_time=ts reset → open
          emits structured flip log: continuous.flip ts/from_units/to_units
    critic_finding_1a_fixed: true  # flip no longer drops short leg
    critic_finding_1b_fixed: true  # increase-a-short no longer flattens
    critic_finding_2_fixed: true   # magnitude-form weighted-avg, no total_new>0 guard
    critic_finding_3_fixed: true   # WARNING rail for threshold>=1.0
    critic_finding_4_fixed: true   # entry_price explicitly reset before C4 open leg
    bit_identical_when: >
      allow_shorts=False → tgt_sign/cur_sign always >=0 → C4+short-C3 unreachable.
      C2=old fresh-entry, C3-increase=old delta>0 arm, C3-reduce+C1=old else arm.
      Equivalence gate confirmed green (3 tests, all PASSED). ✓

  Site-F-close-position:
    status: NO CHANGE to _close_position itself (already short-correct per spec)
    callers_updated:
      - C1 (to-flat): position=float(cur_sign), size=abs(cur_units)
      - C4 (flip close): position=float(cur_sign), size=abs(cur_units)
      - Site-H (end-of-run): end_position = 1.0 if cur_units>0 else -1.0, size=abs(cur_units)
    include_swap: false on all continuous closes (no double-count) ✓

  Site-G-mark-to-market:
    status: DONE
    change: "`if cur_units > 0:` → `if cur_units != 0.0:`"
    formula_sign_correct: >
      (price-entry_price)/pip * cur_units — with cur_units<0, gain when price
      falls (price<entry → negative numerator × negative units = positive). ✓
    bit_identical_when: cur_units>=0 → !=0 and >0 agree for all cur_units>0 ✓

  Site-H-end-of-run-close:
    status: DONE
    change: "`if cur_units > 0:` → `if cur_units != 0.0:`"
    args: "end_position = 1.0 if cur_units > 0.0 else -1.0; size = abs(cur_units)"
    closes: KG-QD-3 known gap (held short silently abandoned at run end)
    bit_identical_when: cur_units>=0 → position=1.0, size=abs=cur_units (unchanged) ✓

