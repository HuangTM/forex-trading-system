            If _to_engine_units dropped the sign, engine would enter a LONG → equity < initial.
          result: PASSED
          jpy_sign_bug_found: false   # engine correctly preserves sign through division by price
        test_jpy_short_pnl_sign_correct_quantitatively:
          scenario: >
            short at 150.00, C1-closed at 149.00 (100 JPY pips down), zero cost, constant sizing.
            engine_units = 200_000 / 150.00 ≈ 1333.33; expected PnL = 100 * 0.01 * 1333.33
