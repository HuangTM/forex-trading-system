          expected: pnl_dollars ≈ +1333.33 USD (within ±1 USD)
          result: PASSED
        test_jpy_short_pnl_loss_when_price_rose:
          scenario: short at 150.00, C1-closed at 151.00 (rose 100 JPY pips), zero cost
          expected: pnl_dollars < 0
          result: PASSED

  jpy_sign_path_verdict: CORRECT
  jpy_bug_found: false
  note: >
    The JPY short path (_to_engine_units divides signed usd_nominal by price) preserves
    the negative sign for shorts. All three JPY sub-tests passed first-run without any
    engine adjustment. No silent sign-flip bug exists on this path.

