    action: >
      Rewrote test_short_swap_accrual_through_engine to assert the EXACT swap
      credit (+6.00 USD = 0.3 pips * 0.0001 * 200_000 units) on a Monday 21:00 UTC
      crossing bar (multiplier=1), pinning the full sign chain numerically.
  - finding: "Swap test could pass vacuously if 21:00 bar is the last index"
    verdict: valid test-quality gap
    action: >
      Replaced the soft `if 1 < ri < len-1` guard with a hard
      `assert 1 < ri < len(ec) - 1` so the quantified swap assertions can never
      be silently skipped. The 21:00 bar is deterministically at offset 13 of 20.
  - finding: "C3-reduce inline PnL formula not verified numerically"
    verdict: valid test-coverage gap (C3-reduce bypasses _close_position)
    action: >
      Added test_reduce_a_short_realized_pnl_is_quantitatively_correct: short at
      1.1000, price falls to 1.0900, trim half → asserts realized PnL == +1000.00 USD
      exactly, pinning the inline (price-entry)/pip * cur_sign arithmetic.

