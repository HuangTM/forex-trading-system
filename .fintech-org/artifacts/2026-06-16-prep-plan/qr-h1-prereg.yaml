  - "The ~480-bar feature window sets both CPCV purge/embargo AND the IS/OOS seam embargo (not the 3-bar label)."
  - "Cost is a session-aware p90 per-bar charge (CRO-supplied) on entry+exit; rollover swap only across 22:00 UTC, 3x Wed."
  - "Effective-N stays singular (=49 at spawn) ONLY because the structure is singular and every DoF is pre-committed; no tuning."
  - "Pooling adds independent events ONLY to the extent measured rho_bar <= 0.41; KILL-4 makes this machine-checkable on data."
  - "All events/yr, IR, and rho_bar figures are HONEST PRE-DATA PRIORS; no 1h price data was inspected to author this."

