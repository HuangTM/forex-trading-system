knowledge_gaps:
  - id: KG-1
    direction: "FX 5m / 1m"
    gap: >
      Dukascopy 1m per-pair download volume and rate limits. The bi5 tick files
      are compressed per-hour; 15yr × 12 pairs × ~8760 files = ~1.6M requests.
      At what rate does the Dukascopy endpoint throttle? The 1h backfill was
      already IP-throttled (confirmed in firm memory: ~1.6% completion in the
      cloud environment). 1m would require 24x more requests. Needs empirical
      testing before committing to a 1m strategy track.
    resolution: "Run a 1-month 1m test pull for EURUSD and measure elapsed time + throttle behaviour."

  - id: KG-2
    direction: "Wider FX universe (EM pairs)"
    gap: >
      Dukascopy EM pair availability and start dates. Which of USDTRY, USDZAR,
      USDMXN, USDBRL, USDRUB, USDSGD, USDPLN are available, and from what year?
      Without this, the EM-universe expansion is speculative.
    resolution: "Enumerate Dukascopy instrument list programmatically on Day 1 of any EM sprint."

  - id: KG-3
    direction: "Crypto"
    gap: >
      Binance API terms of service for backtest/research use of historical klines.
      Functionally almost certainly permissible (Binance explicitly offers a public
      REST API for this purpose) but the firm's compliance posture requires formal ToS
      review before onboarding any new data vendor.
    resolution: "CEO/CTO review Binance ToS at https://www.binance.com/en/terms before any crypto sprint."

  - id: KG-4
    direction: "Rates/equity-index futures"
    gap: >
      Current Databento pricing and free-credit availability. The $125 free-credit
      figure is from the 2026-06-07 artifact and may be outdated. Also unclear
      whether CME equity-index futures (ES, NQ) are at 1h resolution with history
      back to at least 2010.
    resolution: "Check databento.com/pricing before budgeting. New vendor — requires CEO approval regardless."

  - id: KG-5
    direction: "New modality: FX options vol surface"
    gap: >
      No free source for FX implied vol surfaces has been identified. Bloomberg/Refinitiv
      are institutional-cost. Whether any broker API (Saxo, OANDA, Interactive Brokers)
      exposes historical FX options vol for research use is unknown.
    resolution: "RESEARCH_REQUEST: HoQR or CTO to investigate Saxo OpenAPI options vol surface endpoints and IB historical options data."

  - id: KG-6
    direction: "FX 1h / 5m / 1m (all intraday) — HIGHER STAKES than KG-4 per critic"
    gap: >
      Whether RolloverAwareRealisticCostModel is correctly invoked on EVERY intraday
      backtest path. The 1h ingest is engineered (not future work), so intraday strategy
      research is imminent. Code inspection confirms the engine DOES dispatch via
      `use_rollover_accrual = isinstance(cost_model, RolloverAwareRealisticCostModel)`
      (engine.py:325) — but this gate is on the CONTINUOUS rebalance path. The discrete
      path's swap handling and the per-bar rollover accrual must be verified end-to-end
      against a known multi-day intraday hold before any intraday trial enters NHT. Given
      the firm's QRB-6 cost-config void (a trial was VOIDED by a cost-model error), an
      un-verified cost-model invocation is a HIGHER-stakes unknown than a vendor pricing
      figure. This is a VERIFY-MEANS-EXECUTE item: run an intraday backtest with a known
      Wednesday-crossing hold and assert the 3x triple swap charge appears in the ledger.
    resolution: >
