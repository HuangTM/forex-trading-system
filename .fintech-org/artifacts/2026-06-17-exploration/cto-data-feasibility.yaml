highest_research_leverage_per_effort_pick:
  direction: "Wider FX universe (EM / exotic pairs) — LOW EFFORT, HIGHEST LEVERAGE"
  rationale: >
    80% pipeline reuse. Most of the DataSource / cost / engine stack transfers; the new
    work is: (a) verify EM pair data availability on Dukascopy, (b) source accurate
    spread/swap rates from Saxo per pair, (c) add PairInfo entries to constants.py,
    (d) a session-calendar gap-check extension to validation.py (the FX-weekend-hardcoded
    gap check at validation.py:70 does not cover EM local calendars). This is ~5–8 days
    of engineering for potentially 4–6x more pairs in the research universe.
    LEVERAGE IS CORRELATION-DISCOUNTED (critic finding, accepted): "more pairs = more
    events/year = shorter validation" holds ONLY to the degree EM pairs are independent.
    EM FX is heavily USD- and risk-sentiment-driven, so USDTRY/USDZAR/USDMXN are highly
    correlated — they do NOT add honest effective-N proportional to pair count. The true
    leverage is real but smaller than the raw pair count suggests; it must be measured
    from the realised correlation matrix, not assumed. This remains the lowest-effort
    direction and likely still the best leverage-per-day, but the leverage figure is
    bounded by cross-pair correlation, not linear in pairs added.
    CRITICAL CAVEATS (both hard CRO/NHT gates): (1) CRO must validate EM cost configs
    before any EM trial — wide-spread EM pairs can look like alpha under undercosted
    spreads. (2) NHT must compute effective-N from the EM correlation matrix, not from
    raw pair count, or the DSR gate is silently inflated.
  second_pick:
    direction: "Crypto (BTC/ETH OHLCV, Binance free klines)"
    rationale: >
      2–3 week engineering cost for a new asset class with real volume data, free deep
      history, and 24/7 trading. The DataSource ABC and engine reuse cleanly; the main
      new work is CryptoCostModel and quality_gate parameterisation. Real volume is the
      only place where volume-based signals (VWAP, volume profile) become research-valid
      rather than proxy-dependent. Research leverage: a new asset class with a different
      microstructure can confirm or deny whether the firm's signal ideas generalise,
      providing independent evidence rather than just more FX pairs.
    caveat: >
      New vendor onboarding (Binance API) requires CEO approval under current firm
      posture (forbidden-interim: new-vendor-without-red-team). This cannot proceed
      under --no-ceo. Crypto also requires honest NHT treatment for short history
      and structural regime non-stationarity.

