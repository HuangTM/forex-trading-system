    top_failure: consensus-data point-in-time integrity + release-spread cost
    verdict: MODALITY-ADD, borderline STRETCH
  - rank: 7
    name: Portfolio-of-weak-edges ensemble
    lever: ensemble / portfolio IR multiplier
    confirmability: "PORTFOLIO <=2yr IFF >=3-4 uncorrelated edges exist (they don't yet)"
    data: existing (no acquisition)
    top_failure: components are correlated (all rates-flavored) -> sqrt(M) is a lie
    verdict: LATERAL NOW, UNLOCK LATER
  - rank: 8
    name: Low-freq economic (carry/value/trend)
    lever: low-freq economic, strong priors
    confirmability: "12-50 ev/yr x IR~0.05 -> ~49-206yr -> NO BY DESIGN"
    data: existing
    top_failure: un-confirmable in horizon; majors-decayed
    verdict: SEPARATE TRACK (concedes the wall)

# ============================================================================
# THE THREE VERDICTS
# ============================================================================
top_2_ceiling_unlocks:
  - id: AD-CRYPTO-MICRO
    why: >-
      The only direction that improves EVERY term of the confirmability equation at once
      (events/yr UP ~10x, IR-per-event UP via a genuinely-constrained retail loser class,
      AND a real volume/L2 denominator for cost+order-flow) — all on FREE data. It clears
      <=2yr even on pessimistic IR (~0.9yr). It does not move the FX wall; it leaves it.
      Cost: a CEO mandate-expansion beyond FX, and honest acknowledgment that our
      backtest-only fill model is weaker on a fast venue (must be modeled conservatively).
  - id: AD-RATES-EQIDX-FUT
    why: >-
      A CONDITIONAL unlock (NOT unconditional — restating the candidate-section math: it
      PASSES at ~1.55yr only with broad cross-family pooling at ~400 ev/yr & IR>=0.10, and
      STRETCHES/FAILS at ~4.1yr if the contract set is narrow at ~150 ev/yr). The most
      economically DEFENSIBLE direction: real exchange volume + open interest +
      scheduled-event grounding on the instruments where macro information lands FIRST.
      The clean intraday data is the costliest to acquire, and the G5 pooling-correlation
      haircut (ES~NQ, ZN~ZB~ZF) is the live risk that could push it back above 2yr — but
      the mechanism quality is the highest of any candidate. Strong, narrower, CONDITIONAL
      complement to crypto; choose based on (a) data budget, (b) the G5-honest independent-
      contract count (KG-4), and (c) whether the CEO prefers a regulated-exchange asset
      class over crypto.

direction_to_kill:
  id: AD-COT-POSITIONING
  ruling: KILL (do not allocate research bandwidth)
  reason: >-
    COT positioning is the textbook "feels-like-edge" trap that fails the wall on the
    events/yr term specifically. It is free and orthogonal (the seductive part), but the
    data is WEEKLY and the tradeable signal fires only at extremes (~5-15/yr/currency),
    so honest events/yr is ~30-90 pooled -> years_to_validate ~7-20yr. No amount of
    pooling fixes a weekly-cadence, extremes-only series (G5 haircut on the shared USD leg
    makes it worse). It also carries a 3-day reporting lag and decades of decay. It is
    strictly dominated: as a standalone alpha it cannot confirm in time; as a feature it
    is a weak overlay. Spending bandwidth here is the exact "free + orthogonal but
    un-confirmable" mistake the dataset-wall lesson warned against. Archive it as a
    diagnostic feature only; do not grant it a research slot.

# ============================================================================
# KNOWLEDGE GAPS (route as RESEARCH_REQUEST — no web tools used here)
# ============================================================================
knowledge_gaps:
  - id: KG-1
    gap: >-
      Whether free, sufficient-quality crypto L2 + trades history (BTC/ETH/top-alts,
      2-4yr, sub-hour) is actually obtainable for backtest (CCXT/exchange archives), and
      what an HONEST slippage/fill model on a liquidation spike looks like for a
      backtest-only firm. This determines whether AD-CRYPTO-MICRO's IR survives realistic
      execution. RESEARCH_REQUEST -> CTO/Quant-Developer + CRO cost model.
  - id: KG-2
    gap: >-
      Whether the firm's existing Saxo Bank account exposes ANY FX options-implied data
      (risk-reversals / vol surfaces) at no extra cost. If yes, AD-OPT-IMPLIED-FX's
      acquisition blocker partially lifts. Memory says Saxo FX account exists; option-data
      entitlement is UNVERIFIED. RESEARCH_REQUEST -> Execution-Trader / Saxo API research.
  - id: KG-3
    gap: >-
      Whether free, point-in-time consensus-forecast data (NFP/CPI/PMI actual-vs-consensus
      with no revision look-ahead) is obtainable for AD-ECON-SURPRISE-EVENT. ForexFactory/
      investing.com may provide it but licensing + point-in-time integrity is unverified.
      RESEARCH_REQUEST.
  - id: KG-4
    gap: >-
      Cost and quality of clean intraday + roll-adjusted futures data (ES/NQ/ZN/VX) for
      AD-RATES-EQIDX-FUT, and the honest cross-contract correlation matrix needed to size
      the G5 pooling haircut. This determines whether its confirmability lands at 1.5yr or
      4yr. RESEARCH_REQUEST -> CTO data-sourcing + Quant-Researcher correlation estimate.

# ============================================================================
# WHAT THIS ARTIFACT IS / IS NOT
# ============================================================================
disposition:
  this_is: >-
    Divergent strategic exploration of alpha DIRECTIONS to escape the dataset wall,
    honestly confirmability-scored. A menu for the CEO's strategic fork, NOT a ratified
    plan and NOT a pre-registration.
  this_is_not: >-
    A pre-registration, a trial, a capacity commitment, or a profit claim. No trial counter
    increment (trials.jsonl stays at 49). Any direction the CEO selects must then run the
    full pipeline: QRB/intraday confirmability rubric -> NHT null battery -> PreRegistration
    -> PR verification, before any backtest slot is granted.
  recommended_next_step: >-
    CEO chooses between the two ceiling-unlocks (crypto vs futures) — primarily a
    data-budget + mandate-scope decision, informed by KG-1 and KG-4. The FX-only modality
    adds (options-implied, econ-surprise) are worth pursuing ONLY if their gating free-data
    questions (KG-2, KG-3) resolve favorably; otherwise they are QRB-6-class un-confirmable
    traps. The ensemble path is correct but premature. The low-freq economic path stays a
    separate low-bandwidth track. COT is killed.
  no_capital_note: >-
    Phase-0 backtest-only. No live capital implied by any direction here. Asset-class
    pivots (crypto/futures) are RESEARCH-data decisions, not trading-capital decisions.
