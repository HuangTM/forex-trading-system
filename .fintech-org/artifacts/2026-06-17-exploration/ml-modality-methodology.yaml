# CONSOLIDATED VERDICTS
# ===========================================================================
consolidated:
  per_item:
    item_1_modalities: "order-flow(crypto/futures)=UNLOCK[gated on asset class]; options-RR=MARGINAL/UNLOCK[gated on paid feed]; COT=MARGINAL"
    item_2_ensemble: "FALSE-HOPE-TRAP as search-and-combine; MARGINAL only as pre-committed construction-decorrelated fully-deflated basket"
    item_3_ml: "return-forecasting ML=TRAP(overfits); cross-sectional pooling=MODEST-UNLOCK(raises effective N); regime-classification=USEFUL(defensive); meta-labeling=PREMATURE"
    item_4_more_events: "FX-intraday=MARGINAL/FALSE-HOPE(claw-backs + trial-48 evidence); crypto=UNLOCK-CANDIDATE(carries order-flow → moves IR numerator)"

  single_most_likely_to_raise_CONFIRMABLE_IR:
    pick: "TRUE ORDER FLOW via an asset-class move to crypto (or CME FX futures) — VPIN / Kyle's-λ / OFI."
    why: >
      It is the ONLY direction that moves the IR NUMERATOR with a feature whose
      edge is MECHANICAL (price impact) and therefore slow-decaying and orthogonal
      to crowded price patterns. Every FX-bound path either lifts events (claw-backed
      to ~zero net by autocorrelation + cost, per trial 48) or lifts daily IR only
      marginally. Quadratic sensitivity of N_required to IR means a genuine
      orthogonal-IR feature is worth more than any plausible event-count gain.
    honest_caveat: "It is GATED on an asset-class decision (new data, new costs, new microstructure, partial loss of the firm's accumulated FX discipline). It is the biggest unlock AND the biggest commitment. This is a CEO strategic fork, not an ML tweak."
    runner_up: "Cross-sectional pooling across the 12 existing pairs — the best lever that requires NO new data or asset class; raises effective sample size and cuts multiplicity vs per-pair search. Cheap, reversible, do-it-now."

  most_dangerous_false_hope_direction:
    pick: "The PORTFOLIO-OF-WEAK-EDGES / ensemble path (Item 2), run as search-and-combine."
    why: >
      It is the only direction whose math LOOKS like a free lunch (SR×√k) while
      actually CONCENTRATING the multiple-comparisons problem the firm reset over
      once. Two compounding errors: FX shared-beta correlation eats the √k, and
      the honest-N explosion (every searched leg is a trial) raises the DSR bar
      faster than the portfolio Sharpe rises. Worse, naive single-strategy DSR
      UNDER-deflates an assembled ensemble. If anyone proposes "combine our near-
      miss strategies into a portfolio to get over the line," that is the broken-
      DSR failure mode wearing a diversification costume. VETO-WATCH.
    runner_up_danger: "Adding model capacity (deep nets / RL) to forecast returns on 12 pairs of short history — overfits, inflates effective-N, manufactures in-sample Sharpe DSR then correctly destroys."

  methodology_voice_summary: >
    Better methodology cannot manufacture alpha — it can only stop us from
    fooling ourselves. Of everything explored, exactly ONE path moves the real
    lever (orthogonal IR via order flow) and it is gated behind an asset-class
    decision. Everything FX-bound is marginal because the dataset wall is real:
    more events get clawed back by autocorrelation and costs (trial 48 proves it),
    and combining weak edges concentrates multiplicity rather than escaping it.
    The cheapest legitimate win on hand is cross-sectional pooling. The single
    most dangerous temptation is the ensemble free-lunch. Hold the gates.

