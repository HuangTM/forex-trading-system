# Null-Hypothesis Tester — Honest Read on the Strategic Exploration
# Append-only dissent. Not vetoable. CEO sees verbatim.

role: null-hypothesis-tester
artifact_type: dissent
decision: dissent
timestamp_utc: "2026-06-18T01:50:17Z"
no_capital_instruction: true

claimed_domains:
  - structural-skepticism-on-any-claim
  - null-hypothesis-construction
  - p-hacking-and-data-snooping-detection
  - matched-random-benchmark-construction
  - replication-protocol-design

contamination_check: >
  clean. The CEO prompt contains framing about why exploration is attractive
  ("more inefficient market", "free volume") but explicitly asks me to keep it
  honest and kill busywork — this is a request for adversarial review of the
  exploration itself, not a proposer narrative asking me to bless a specific
  claimed edge. No prior approval stance from another role was passed. Proceeding.

# ---------------------------------------------------------------------------
# GROUND TRUTH (tool-verified this session)
# ---------------------------------------------------------------------------
ground_truth:
  trials_logged: 49                      # wc -l .fintech-org/trials.jsonl
  validated_oos_alpha: 0
  closest_near_miss: >
    QRB-6 (CB-decision event study). RULE_4_AMBIGUOUS. Both p-values reject,
    DSR=0.907 < 0.95 after N_sel=3 deflation. Real-but-modest ~0.47 annual
    Sharpe LOW-FREQ edge — and explicitly UN-CONFIRMABLE OOS (power 9% at the
    2030 look; 80% power needs 28-256 years). Archived near-miss, not validated.
  falsified_hypothesis_log_entries: "NOT a formal >=20-entry log; skill-gaps.jsonl exists but is not the kill-criterion artifact"
  kill_criterion_verbatim: >
    "if after 8 weeks of use there is no paper-traded P&L curve AND no
    falsified-hypothesis log with >= 20 entries, the skill is producing
    infrastructure, not insight. Shut it down or narrow its mandate."
    (fintech-org/SKILL.md:200)
  kill_criterion_status: >
    BOTH legs are at or past the threshold direction. No paper-traded P&L curve
    (still backtest-only, no live capital). And the firm just spent HEAVY effort
    on 1h data + engine upgrades — a textbook "infrastructure not insight" spend.

# ---------------------------------------------------------------------------
# 1. THE META-TRAP VERDICT
# ---------------------------------------------------------------------------
meta_trap:
  verdict: CONFIRMED
  statement: >
    "Explore more directions" is, right now, an instance of the firm's own
    re-armed kill-criterion. The firm has run 49 rigorous trials and produced
    0 validated OOS alpha. The honest base rate that 1h yields >=1 validated
    strategy was ~15% BEFORE the spend; the spend was made anyway; it has not
    yet paid. Generating a fresh menu of plausible escape directions
    (finer-freq / wider universe / crypto / futures / volume / COT / options /
    ensemble / low-freq) is exactly the behavior a firm exhibits when it is
    avoiding the conclusion that its core thesis may be structurally unsound.
  the_core_thesis_at_risk: >
    "Find confirmable, retail-scale, net-of-TCA-positive alpha in liquid markets,
    backtest-only, no live capital, on a horizon that confirms in ~2 years."
    Each clause is load-bearing and each one is a tightening noose:
      - "liquid markets" => efficient => alpha is small and cost-dominated.
      - "retail-scale" => no infra/latency/data edge over the institutions you
        are trading against.
      - "backtest-only" => you CANNOT distinguish a real edge from an overfit
        one without forward OOS, which is the one thing you refuse to run.
      - "confirms in ~2 years" => mechanically excludes the only edges the firm
        has actually found (QRB-6 was real and needed 28-256yr to confirm).
    The exploration menu does not touch any of these clauses. It reshuffles the
    instrument. That is the tell.
  one_line: >
    The bottleneck is not which market — it is that "backtest-only + confirms-in-2yr"
    is a contradiction with "real edges in liquid markets are small and slow."
    No new dataset resolves a self-imposed contradiction.

# ---------------------------------------------------------------------------
# 2. UNLOCK vs LATERAL CLASSIFICATION (ruthless)
# ---------------------------------------------------------------------------
direction_classification:
  finer_freq_fx:
    class: LATERAL-BUSYWORK
    why: >
      Same efficient market, MORE cost domination. At 1h you already saw spread
      eat the signal; at 5m/tick the spread/slippage fraction of every move is
      strictly larger and retail data quality (no real tick/quote feed) is worse.
      Relocates the wall closer. NEGATIVE expected value vs daily.
  wider_fx_universe:
    class: LATERAL-BUSYWORK
    why: >
      EM/exotic pairs add events but also add cost (10-50x spread), gap risk,
      and central-bank intervention regimes. More instruments => more honest-N
      => higher deflation bar, not lower. Does not change the per-event Sharpe
      ceiling that the dataset wall is made of.
  crypto:
    class: PARTIAL-UNLOCK (genuine data) / HIGH-ILLUSION-RISK (alpha)
    why: >
      REAL unlock on the DATA axis: free volume, order-book, on-chain, 24/7,
      documented retail inefficiency. But see Section 3 — the firm would be
      chasing visible DATA, not demonstrated OOS alpha, and crypto backtests
      are the single most overfit corpus in the literature. Resets the
      instrument, NOT the 0/49 prior.
  futures:
    class: PARTIAL-UNLOCK (data) / SCALE-MISMATCH
    why: >
      Real exchange volume/COT, clean centralized data. But CME data costs money,
      and the genuine futures edges (basis, calendar, term-structure) are
      capacity-constrained and institution-dominated. Retail-scale survivable
      edge is plausible but unproven.
  volume_orderflow_modality:
    class: REAL-UNLOCK-ON-FX-IS-IMPOSSIBLE
    why: >
      FX is decentralized — there is NO consolidated tape. "Volume" for retail
      FX is broker-fabricated. This direction is only real if you ALSO pivot
      instrument to crypto/futures. As a standalone FX direction it is a mirage.
  cot_options_implied:
    class: LOW-FREQ-UNLOCK (honest) / CONFIRMABILITY-WALL
    why: >
      COT is weekly, options-implied is a genuine independent signal. But both
      are low-frequency => few events/year => same confirmability wall that
      killed QRB-6. Honest, but collides with the 2yr bar.
  portfolio_ensemble:
    class: NOT-AN-UNLOCK / ACTIVE-DANGER
    why: see Section 4. This is the most dangerous item on the menu.
  low_freq_economic_bets:
    class: HONEST-BUT-UNCONFIRMABLE-AT-THIS-BAR
    why: >
      This is where the firm's only REAL signal actually lives (QRB-6). It is
      economically grounded and probably has a true small edge. It CANNOT confirm
      in 2 years. So it is only viable if the firm CHANGES THE BAR (see Section 5c).
  summary: >
    ZERO directions on the menu are a clean ceiling-unlock under the EXISTING bar.
    Crypto/futures unlock DATA but not the OOS-confirmability problem. Everything
    else is lateral (relocates the wall) or collides with the 2yr confirmability
    bar that the firm itself imposed.

# ---------------------------------------------------------------------------
# 3. ASSET-CLASS PIVOT HONESTY
# ---------------------------------------------------------------------------
asset_class_pivot:
  the_honest_diagnosis: >
    The firm is chasing DATA IT CAN FINALLY SEE, not alpha it has demonstrated.
    The appeal of crypto/futures is overwhelmingly that you get volume/order-flow
    for free — i.e. the same impulse that drove the 1h spend ("if we could just
    SEE more, we'd find it"). That impulse has now failed once at the cost of
    heavy effort.
  does_it_reset_the_prior: NO
  why: >
    The 0/49 prior is a prior about the FIRM'S PROCESS — its tendency to find
    in-sample patterns that do not survive deflation/OOS — not about FX
    specifically. A new playground does not fix an overfitting-prone process;
    it gives it more degrees of freedom to overfit in (more features, more
    regimes, more lookbacks, 24/7 bars). The base rate of "validated OOS alpha
    per trial" carries over. If anything crypto's documented backtest-overfitting
    literature suggests the in-sample-to-OOS decay is WORSE there.
  is_more_inefficient_actually_true_oos: UNPROVEN / LIKELY-A-BACKTEST-ILLUSION
    detail: >
      "Crypto is more inefficient" is true for naive in-sample backtests and
      largely FALSE net-of-cost OOS for retail since ~2021 (HFT/MM saturation,
      funding-rate arbitrage closed, exchange fees + slippage + funding eat the
      gross edge). The inefficiency that remains is in microstructure the firm
      cannot access at retail scale. The pivot buys VISIBILITY, not EDGE.
  verdict: >
    A pivot is defensible ONLY if framed explicitly as "we are acquiring a
    market with observable order-flow so our NULL TESTS are stronger" — NOT as
    "we are moving to where the alpha is." There is no evidence the alpha is there.

# ---------------------------------------------------------------------------
# 4. PORTFOLIO / ENSEMBLE — LOUD FLAG
# ---------------------------------------------------------------------------
portfolio_ensemble_flag:
  severity: CRITICAL
  verdict: DANGER — manufactures a passing number from failing ones
  statement: >
    Combining N failing strategies into an "ensemble" and reporting the
    combined Sharpe is the canonical p-hacking move. With 49 trials already
    logged, the org-wide honest-N is ALREADY large; an ensemble does not reduce
    N, it COMPOUNDS it — every weighting, every selection of which sub-strategies
    to include, every rebalance rule is another silent look. The Deflated Sharpe
    bar should go UP, not down, when you ensemble.
  the_trap: >
    "Diversification reduced variance so the portfolio Sharpe is 1.2" is almost
    always an artifact of (a) selecting the subset of strategies that happened
    to be anti-correlated in-sample, and (b) NOT deflating for the search over
    weights and membership. In-sample correlations are unstable OOS; the
    diversification benefit is the first thing to vanish out of sample.
  conditions_under_which_it_is_legitimate:
    - each component INDEPENDENTLY survives its own pre-registered OOS test
      BEFORE any combination is considered
    - the ensemble WEIGHTS are pre-declared (e.g. equal-weight, or risk-parity
      with no free parameters), not fit
    - the combination is deflated under the FULL org-wide N including every
      component trial AND the ensemble-construction looks
  current_status: >
    The firm has ZERO components that independently survive OOS. Therefore an
    ensemble today is 0 + 0 + ... = a manufactured number. NOT an unlock.

# ---------------------------------------------------------------------------
# 5. THE HONEST OPTIONS THE OTHERS WILL AVOID
# ---------------------------------------------------------------------------
honest_options:
  a_narrow_mandate_falsification_factory:
    weight: HIGH
    position: >
      I put REAL weight here. Reframe the firm's product from "find alpha" to
      "produce a rigorous, public-quality falsification log of what does NOT
      work at retail scale in liquid FX." That is genuine, durable value —
      most retail quant content is survivorship-biased garbage; a 50+ entry
      pre-registered, deflation-honest falsification log is a real asset and
      is the EXACT artifact the kill-criterion names as the alternative to
      shutdown. The firm is ALREADY most of the way there (49 trials). Formalize
      it. This converts the "0 alpha" outcome from a failure into the deliverable.
  b_wind_down_active_research:
    weight: MEDIUM-HIGH
    position: >
      Defensible and honest. After 49 trials and 0 validated alpha, the marginal
      trial has a low and DECLINING expected value (the dataset wall is real and
      the firm documented it). Winding DOWN generation (not the firm) while
      keeping the falsification log is the disciplined move. I would pair (a)+(b):
      stop generating NEW directions, harvest the existing work into the log.
  c_change_the_bar:
    weight: MEDIUM
    position: >
      The ONLY path on which the firm has ever found a REAL signal (QRB-6) is
      economically-grounded low-freq bets that cannot confirm in 2 years. If the
      CEO genuinely believes such edges are real, the honest move is to CHANGE
      THE CONFIRMATION BAR — accept Bayesian / economic-prior-weighted evidence
      and a multi-year forward-confirmation horizon — NOT to keep searching for
      a fast-confirming edge that the firm's own results suggest does not exist
      at this scale. WARNING: this is also the most p-hackable option (loosening
      the bar to let a result through). It is only legitimate if the new bar is
      pre-declared and applied to FUTURE hypotheses, never retro-fitted to QRB-6.
  what_i_explicitly_DOWN_weight:
    - "explore crypto/futures hoping the prior resets" (LOW weight — Section 3)
    - "ensemble the existing strategies" (NEGATIVE weight — Section 4)
    - "finer-freq FX" (NEGATIVE weight — relocates wall toward more cost)

# ---------------------------------------------------------------------------
# 6. HONEST PROBABILITY
# ---------------------------------------------------------------------------
honest_probability:
  question: >
    P(ANY explored direction yields validated, paper-tradeable,
    net-of-TCA-positive alpha within a reasonable horizon)
  estimate: "8-12%"
  point: "~10%"
  derivation: >
    Base rate from the firm's own record: ~0/49 validated => empirical rate
    materially below 2%. The exploration directions DO add some genuine data
    (crypto/futures order-flow) which modestly raises the ceiling, pulling the
    estimate above the raw base rate — but the dominant constraint is the
    backtest-only + fast-confirmability + retail-scale triad, which NONE of the
    directions relax. The honest-N also keeps RISING with every direction
    explored, raising the deflation bar against any winner. Net: ~10%, and I
    weight the downside (a "winner" that is actually an overfit that would fail
    real forward OOS) heavily because the firm cannot currently run that forward
    test. Conditional on a winner appearing in a backtest, my P(it survives true
    forward OOS) is well under 50%.
  calibration_note: >
    I am graded on calibration, not defensive skepticism. ~10% is not "zero" —
    it leaves room for crypto/futures order-flow to surface something real. But
    it is decisively below any threshold that would justify another heavy
    multi-direction data spend BEFORE the firm decides whether it can ever run a
    real forward OOS test.

# ---------------------------------------------------------------------------
# STEELMAN (mandatory before dissent)
# ---------------------------------------------------------------------------
steelman_strongest_escape:
  direction: "Pivot to crypto perpetual futures with order-flow / funding data"
  strongest_case: >
    This is the strongest item on the menu and deserves the strongest argument.
    (1) It is the ONLY direction that delivers TRUE consolidated volume and
    order-book depth — the firm's null tests (matched-random, permutation,
    shuffle) become genuinely stronger because there is real microstructure to
    test against, not broker-fabricated FX "volume". (2) Funding rates are a
    mechanical, economically-grounded carry signal with a clear causal story and
    DAILY+ frequency — high enough event count to actually confirm in <2yr,
    unlike QRB-6. (3) 24/7 trading multiplies the effective sample size per
    calendar year ~3-5x vs FX daily, directly attacking the dataset wall's
    "events/year" term. (4) Documented, persistent retail-flow inefficiencies
    (liquidation cascades, funding mean-reversion) have survived several years
    of OOS in the public literature — i.e. there is at least SOME OOS-confirmed
    edge to aim at, which is more than FX daily ever offered. If any direction
    resets the dataset wall on BOTH the data axis AND the confirmability axis
    simultaneously, this is the one.
  why_i_still_dissent: >
    The steelman is real on the DATA and FREQUENCY axes — and I concede those are
    genuine. But it does NOT touch the two clauses that actually killed the firm:
    backtest-only (still no forward OOS capability) and retail-scale (the funding
    and liquidation edges are exactly where institutional flow and exchange fees
    concentrate, and the net-of-cost-OOS edge for a retail account is unproven and
    probably small). The strongest escape buys a better LABORATORY, not a
    demonstrated EDGE — and the firm's failure mode has never been a lack of
    laboratory, it has been a process that overfits whatever laboratory it is given.

# ---------------------------------------------------------------------------
# APPEND-ONLY DISSENT ITEMS (verbatim, preserved in CONSENSUS.md)
# ---------------------------------------------------------------------------
dissent_statement: |
  NULL-HYPOTHESIS TESTER — APPEND-ONLY DISSENT (not vetoable, CEO sees verbatim)

  D1. META-TRAP CONFIRMED. "Explore more directions" is, in the firm's current
      state (49 trials, 0 validated OOS alpha, heavy 1h spend just made and not
      paid off), an instance of the firm's OWN re-armed kill-criterion. Producing
      an infinite menu of plausible directions is the documented signature of a
      firm avoiding the conclusion that its core thesis is structurally unsound.
      I name it: the bottleneck is not the instrument, it is the contradiction
      between "backtest-only + confirm-in-2yr" and "real edges in liquid markets
      are small and slow." No dataset resolves a self-imposed contradiction.

  D2. NO MENU ITEM IS A CLEAN UNLOCK UNDER THE EXISTING BAR. Finer-freq FX and
      wider FX universe are LATERAL — they relocate the wall toward MORE cost
      domination and HIGHER honest-N. FX volume/order-flow is a MIRAGE (FX has no
      consolidated tape; retail FX volume is fabricated). Crypto/futures unlock
      DATA and FREQUENCY but not the OOS-confirmability problem. COT/options and
      low-freq economic bets are honest but collide with the 2yr bar.

  D3. THE ASSET-CLASS PIVOT DOES NOT RESET THE 0/49 PRIOR. That prior is about
      the firm's PROCESS (overfitting-prone, cannot run forward OOS), not about
      FX. A new playground gives the same process MORE degrees of freedom to
      overfit. "Crypto is more inefficient" is true in-sample and largely false
      net-of-cost OOS for retail since ~2021. A pivot buys VISIBILITY, not EDGE.

  D4. PORTFOLIO/ENSEMBLE IS NOT AN UNLOCK — IT IS A NUMBER-MANUFACTURING TRAP.
      With 49 trials of honest-N already accrued, ensembling COMPOUNDS the
      multiple-comparisons problem; it does not reduce it. The deflation bar must
      go UP when you ensemble, not down. The firm has ZERO components that
      independently survive OOS, so any ensemble today is 0+0+...+0 dressed as a
      passing Sharpe. I will REJECT any ensemble Sharpe whose components have not
      each independently survived a pre-registered OOS test under full org-wide N.

  D5. THE HONEST OPTIONS THE OTHER ROLES WILL FLINCH FROM, with my real weight:
      (a) HIGH — narrow the mandate to a rigorous FALSIFICATION-LOG FACTORY; the
          firm is already 49/20 of the way to the kill-criterion's own named
          alternative-to-shutdown, and a deflation-honest "what does NOT work"
          log is genuine durable value. Formalize it.
      (b) MEDIUM-HIGH — WIND DOWN active generation (marginal trial EV is low and
          declining against a documented dataset wall); pair with (a).
      (c) MEDIUM — CHANGE THE BAR to accept economically-grounded low-freq bets
          that cannot confirm in 2yr (the ONLY place the firm ever found a real
          signal, QRB-6) — but ONLY with a pre-declared bar applied to FUTURE
          hypotheses, never retro-fitted, or it becomes the worst p-hack of all.
      I down-weight crypto-as-alpha-reset and NEGATIVE-weight ensemble and
      finer-freq FX.

  D6. HONEST PROBABILITY that ANY explored direction yields a validated,
      paper-tradeable, net-of-TCA-positive edge in a reasonable horizon: ~10%
      (range 8-12%). Conditional on a backtest "winner" appearing, my P(it
      survives a TRUE forward OOS test) is under 50% — and the firm currently
      cannot run that test, which is the actual unsolved problem.

  D7. THE SINGLE DECISION I DEMAND BEFORE ANY FURTHER DATA SPEND: decide whether
      the firm will EVER run a real forward out-of-sample test (paper or live).
      If the answer is "no, backtest-only forever," then NO exploration direction
      can ever produce a VALIDATED edge by the firm's own definition, and the
      only honest moves are (a)+(b). Spending on a new market before answering
      this is spending to avoid the question.

decision_summary: >
  DISSENT. Do not authorize another multi-direction data spend. The exploration
  menu is dominated by lateral busywork (finer-freq/wider-FX/FX-volume) and
  data-visibility-not-edge pivots (crypto/futures); ensemble is an active trap.
  Put real weight on narrowing the mandate to a falsification-log factory (a) and
  winding down active generation (b). Before anything else, the CEO must answer
  D7: will this firm ever run a real forward OOS test? Everything downstream
  depends on that single unanswered question.

# what evidence would most change my read
evidence_that_would_move_me:
  most_load_bearing: >
    A PRE-REGISTERED, already-completed FORWARD out-of-sample result on crypto
    perpetual-funding mean-reversion (the steelman's daily-frequency, economically
    grounded signal) showing net-of-all-cost (fees + slippage + funding) positive
    Sharpe on a window the firm had NOT seen at hypothesis time, deflated under
    full org-wide N. That single artifact would simultaneously demonstrate (i) the
    firm CAN run a real forward OOS test, (ii) a higher-frequency signal that
    actually confirms inside 2yr exists, and (iii) the data-axis unlock translated
    into a net-of-cost edge rather than a backtest illusion — directly contradicting
    D3 and D6. Absent that artifact, my read stands.
