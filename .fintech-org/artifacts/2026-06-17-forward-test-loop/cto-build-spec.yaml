knowledge_gaps:
  - id: KG-CTO-1
    severity: high
    gap: >
      WHICH N is the DSR deflation denominator? The firm has THREE incompatible answers today:
      49 (line count, shipped+wrong), 11 (compute_honest_n de-dup families), 48 (authoritative prose
      counter). NHT IC-9 says it is org-wide-honest-N + IS-search-family + attempt-budget. The MULTIPLICITY
      reading (every attempt burns one = 48) is what the firm's prose and NHT both use, and is what the P0
      build targets. But the EXISTENCE of compute_honest_n (returning 11) means HoQR may intend a de-dup
      denominator. These differ by 4x and change every DSR gate outcome. This is a RESEARCH-DOMAIN semantic
      choice, NOT a CTO call (forbidden_skills: probability-statistics). ROUTE_TO HoQR + NHT to RATIFY the
      denominator definition before honest_n() ships. The P0 build is structured so the choice is a one-line
      policy (Option A vs B), not a rewrite.
    owner: head-of-quant-research + null-hypothesis-tester
  - id: KG-CTO-2
    severity: medium
    gap: >
      IC-2/IC-12 'forward data provably post-freeze' partly rests on ingest_time provenance in the data
      manifest (ML KG-5). If the ingest pipeline does NOT stamp ingest_time, the post-freeze proof rests on
      bar_timestamp alone (weaker — a backfilled bar could carry a pre-freeze label). A manifest audit is
      needed; on this very branch (ingest-spread-column) a spread-column RESTATEMENT is in flight (SD8/IC-12)
      — confirm it does not touch any frozen window.
    owner: cto + quant-developer (data manifest audit)
  - id: KG-CTO-3
    severity: medium
    gap: >
      IC-5 (holdout unreadable during dev) and IC-8/IC-13 (pushed-before ordering) CANNOT be satisfied by
      harness code on a single-machine env. They need OS filesystem gating OR a pre-commit/CI hook. Per IC-14
      these controls are UNMET until that hook exists. The CI/pre-commit hook is itself a build deliverable
      the CTO must scope separately (a charter/infra touch -> defers to CEO queue under --no-ceo).
    owner: cto (CI/pre-commit hook scoping)

