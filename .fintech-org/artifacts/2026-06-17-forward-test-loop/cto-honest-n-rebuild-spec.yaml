# =============================================================================
# DECISION 1 — THE MECHANICAL COUNTING RULE
# =============================================================================
counting_rule:
  semantic: "Bailey-Lopez-de-Prado selection family: count genuine config-selection draws + param-variants + unauditable-but-possible draws (over-deflate); EXCLUDE pure re-runs, spawned-only, withdrawn, double-counts."
  per_trial_classification_from_fields:   # the rule NEW trials use going forward, and the rule the ratified record encodes for legacy
    COUNT_if:
      - "A distinct config that RAN and produced a sharpe/verdict (status ∈ {complete, passed, rejected}), including rejects."
      - "A param/window variant: distinct config_hash within a strategy family."
      - "An unauditable-but-possible draw whose draw-status is genuinely UNKNOWN (e.g. frozen confirmatory reserved attempt f2fb41fd; exploratory backfills that could have surfaced a finding) — over-deflate, count ONCE."
      - "ONE slot per VOID-then-rerun (fa0f982a / QRB6 counts once)."
    DROP_if:
      - "spawned-only: the id has a spawned record and NO terminal record (no status ∈ {complete,passed,rejected,withdrawn-pre-freeze}) — i.e. sharpe=null, never executed."
      - "pure re-run-equivalent: same config_hash AND same sharpe (AND, where present, same git_hash) as an EARLIER distinct trial_id, producing no new max. (config_hash+sharpe is load-bearing — sharpe alone over-drops a9c0902d.)"
      - "withdrawn / counts_toward_deflation_denominator == false (sticky — KEEP the existing sticky-exclusion logic)."
      - "double-count: never count the same draw twice. NO prose offset that re-charges a counted id."
    ambiguity_default: "COUNT IT — ONCE (SD2/IC-9). 'Once' is binding: ambiguity licenses counting a draw, never re-counting it, never resurrecting a provable non-draw."
  fully_mechanical_from_fields: PARTIAL
  fully_mechanical_verdict: >
    Mechanical for NEW trials (they carry config_hash, git_hash, sharpe, terminal status,
    and counts_toward_deflation_denominator by construction). NOT mechanical for the LEGACY
    34 ids — see ledger_facts_verified.the_load_bearing_field_finding (A)(B)(C). Therefore a
    frozen RATIFIED-CLASSIFICATION RECORD is required for the legacy ledger; new trials
    appended after the record classify mechanically and increment the count by the rule above.

