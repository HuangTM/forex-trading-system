# =============================================================================
task1_double_count_trace:
  method: >
    The ledger's n_trials_at_spawn field IS the firm's monotonic counter, written at
    spawn time. I extracted (counter -> trial_id) for every record that carries it.
    This is the ground truth for "what advanced the counter", which is exactly what the
    prose offset claims to capture. If the counter advances are 1:1 with distinct ledger
    trial_ids, then any prose offset that ALSO charges those advances is a double count.
  counter_trail_verified:   # from `n_trials_at_spawn`, my own parse at 679e8c7
    early_vtc_sweep: "counters {1,3,4,5,7,9,11,13} over 8 distinct ids (43c9b481,3c9e952a,d18063d4,7dde9154,a9bc0d21,a9c0902d,f66dd64c,d572999d). Even slots {2,6,8,10,12} are the counter advancing BY 2 per spawn+complete write — they are NOT separate ids. 13 counter units, 8 real ids."
    backfill: "counters 15-22 over 8 distinct backfill ids — clean 1:1."
    falsification_batch: "87fa1d23's COMPLETE record carries counter=24 (its spawn row has no counter field); 576746aa's COMPLETE record carries counter=37 (its spawn row line 37 also lacks the field). PRECISION (critic): the counter is read from complete records — the only place it is written for this batch; the trace is internally consistent on complete-record counters. The batch between them (lines 23-35) is EXACTLY 13 distinct trial_ids: c530be91, 87fa1d23, ade58943, 5d18776d, 6a56df9c, b7d1a65a, ab6f4167, cef3c48d, 15aa7521, fdddc2b0, 65041055, 9c9f545f, 9017fadb. So the 24->37 advance = 13 counter units = the 13 distinct batch ids. 1:1. NO hidden attempts in that span."
  the_two_questions_answered:
    q1_are_batch_trials_distinct_ids_in_my_29: >
      YES. All 13 falsification-batch trial_ids (c530be91..9017fadb) are distinct
      trial_ids in the ledger and ALL 13 are inside my 29-countable (my
      twelve_trial_falsification_batch block: counted_draws=13). They are counted ONCE
      as real draws — correctly.
    q2_is_24to37_the_same_batch_or_a_different_set: >
      It is the SAME batch. The counter moved 24->37 = 13 advances, and there are exactly
      13 distinct batch trial_ids occupying that span (87fa1d23 at 24, 576746aa at 37).
      There is NO second, untracked set of attempts inside 24->37. The offset's bucket
      (ii) — "~7 attempts in the 12-trial batch ... advanced the counter roughly 24->37"
      — is describing the SAME 13 ids I already counted. The "~7" is a phantom: it
      re-charges counter advances that are already 1:1 with distinct ids I counted.
  verdict: CONCEDED — THE DOUBLE-COUNT IS REAL.
  verdict_detail: >
    NHT is correct. My 48 = 29 countable ledger draws + 19 prose residual. But the 13
    falsification-batch ids are IN the 29, AND offset bucket (ii) charges "~7" of those
    same batch attempts AGAIN as prose-only. The counter-trail proves 24->37 contains
    exactly the 13 ids I already counted and nothing else — so every unit of bucket (ii)
    is a re-charge of an already-counted draw. That is a double count, not conservatism.
    My own reconciliation artifact even admitted the 19-residual was "BACK-SOLVED against
    the 48 anchor, NOT independently derived line-by-line" — i.e. I never had ledger
    evidence for it; I reverse-engineered it to make the arithmetic hit 48. Circular.
  magnitude_of_inflation: >
    Bucket (ii) ~7 + the falsification-batch portion of the back-solved residual are pure
    re-charge. Combined with bucket (i) and (iii) artifacts (Task 2), the prose residual
    collapses from 19 to ~0. 48 is inflated by ~16-19 relative to the true selection family.

