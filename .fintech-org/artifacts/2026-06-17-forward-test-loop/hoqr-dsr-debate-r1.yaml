task3_directional_rule_applied:
  shared_rule: "Over-deflate when AMBIGUOUS = count a draw whose status is UNKNOWN."
  the_distinction_i_now_honor:
    ambiguous_count_once: >
      A draw whose category cannot be determined gets COUNTED — ONCE. Example: f2fb41fd
      (R5 confirmatory, frozen, never reached a look date). Reserved attempt or non-draw?
      Genuinely unknown -> COUNT it once. This is legitimate over-deflation.
    artifact_dont_count: >
      An item PROVABLY a non-draw is not "ambiguous" — it is determinable-as-excludable.
      Spawns that never ran (3c9e952a, d18063d4), write-pattern phantom slots {2,6,8,10,12},
      byte-identical re-runs (a9bc0d21, a9c0902d), withdrawn-pre-freeze (53981a4a), and a
      no-spend generation cycle (kickoff-2) are all DETERMINABLE non-draws. The rule does
      NOT license counting them, and it NEVER licenses counting the SAME draw twice.
    my_prior_error: >
      My 48 abused "over-deflate when ambiguous" as a blanket "count everything, and when
      in doubt about the split, charge it again toward the anchor." That converted a
      tie-breaker for genuinely-unclassifiable trials into a double-counting license. NHT
      named this exactly: "Double-counting is not conservatism; it is an arithmetic error
      wearing SD2's coat." I accept the correction.
  conclusion: "SD2 fires ONCE per genuinely-ambiguous draw (-> f2fb41fd counts). It does not resurrect artifacts or re-charge counted draws."

