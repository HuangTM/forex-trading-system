# =============================================================================
# 2. RATIFIED SEMANTIC — what N MUST be in the Bailey-Lopez de Prado Deflated Sharpe
# =============================================================================
ratified_semantic:
  question: "Is the DSR deflation denominator the number of distinct strategy IDEAS (de-dup families), every backtest run, or the cumulative count of independent attempts?"

  answer: >
    THE MULTIPLE-COMPARISONS FAMILY: the number of INDEPENDENT STRATEGY CONFIGURATIONS TRIED whose best result
    could have been selected as 'the' finding. = cumulative independent ATTEMPTS, one slot per attempt. NOT de-dup
    families (11), NOT raw lines (49), NOT raw backtest executions either.

  justification_from_what_DSR_corrects_for: >
    DSR (Bailey & Lopez de Prado 2014) deflates an observed Sharpe by E[max SR] — the expected MAXIMUM Sharpe under
    the null across N independent trials. The mechanism (dsr.py::expected_max_sr) is order-statistics of the maximum:
    the more times you draw a Sharpe and KEEP THE BEST, the higher the bar a genuine SR must clear. N is therefore the
    SIZE OF THE SELECTION SET — every configuration whose result was eligible to be picked as the winner. Three
    consequences fix the semantic precisely:
      1. CONFIGS, NOT IDEAS. carry, carry_2x_costs, carry_GBPUSD are three DRAWS from the search, three chances at a
         lucky max. De-duplicating them to one 'carry' family (the 11 view) hides 2 of the 3 selection opportunities
         and under-deflates. The de-dup view answers a research-portfolio question (how broad is our idea coverage),
         which is useful for prioritization but is the WRONG input to E[max SR].
      2. ATTEMPTS, NOT RAW RUNS. A single attempt re-executed byte-identically (same config, same data, deterministic)
         is ONE draw, not many — re-running it cannot produce a new max. Hence we count distinct ATTEMPTS (collapse by
         trial_id, last-wins), not raw lines (49) and not raw engine invocations. The spawn-line + complete-line of one
         trial is ONE selection opportunity.
      3. PROGRAMME-WIDE, NOT PER-SESSION. Selection bias accumulates across the firm's entire history; a Sharpe found
         on attempt 48 was selected against the backdrop of 47 prior attempts. N is cumulative and monotonic. It never
         resets and never shrinks (a withdrawn idea that never saw data is the only legitimate non-increment).

  how_IS_param_search_factors_in: >
    IN-SAMPLE parameter search is the textbook source of selection bias and MUST be inside N. The firm's discipline of
    pre-registering a SINGLE frozen structure (no in-trial param sweep) means a clean confirmatory trial contributes
    +1. But where a candidate WAS chosen by searching a grid before freezing (e.g. R5's 6x6 = 36 cells), the family's
    internal multiplicity is charged: R5 was registered as ONE trial_id but its honest-N absorbed the 36-cell
    selection via Method-B BLdP deflation with elected N_sel=3 (per the R5 freeze receipt). RULE: a trial's ledger slot
    is +1 for the org-wide cumulative count; ANY in-sample search used to PICK that candidate is charged SEPARATELY as
    an effective-N_sel inside the trial's own DSR (the researcher declares it pre-freeze; NHT verifies). The org-wide
    cumulative N and the within-candidate selection N_sel are BOTH real and compose — neither substitutes for the other.

  how_forward_attempt_budget_factors_in: >
    Per NHT IC-13, a forward test's pre-declared ATTEMPT BUDGET (how many forward looks the firm reserved the right to
    take) is part of the multiplicity the moment the budget is declared — you cannot take 5 forward shots and report
    only the best as if N=1. RULE: the attempt budget is pre-registered as a ledger record BEFORE the first forward
    open; honest_n worst-cases the full declared budget into the denominator if any look is taken. Each ACTUAL forward
    open then appends a counts_toward:true record (IC-7) so realized attempts are never under-counted.

  recommended_value_for_CURRENT_ledger:
    value: 48
    plus_one_convention: "compute_dsr receives n_trials INCLUDING the trial being scored. So a NEW trial scored today uses n_trials = 48 (prior) + 1 = 49. The standing PRIOR-attempt count is 48."
    derivation: "33 countable distinct trial_ids physically in the ledger + 15 reconstructed prose-only attempts (counter path ...37->38->42->48) = 48. NHT independently certified 48; trial-48's own archive records 'DSR=0.00 at N=48'."

# =============================================================================
# 3. MECHANICAL COUNTING RULE — what honest_n() MUST implement (IC-9 / IC-14d)
# =============================================================================
# The value is NEVER hand-entered again. It is recomputed from the ledger at score
# time. A ONE-TIME baseline-offset record makes the 15 prose-only attempts explicit.
mechanical_rule:
  function_name: honest_n_deflation_denominator   # distinct from compute_honest_n (the 11-view de-dup) — never confuse 11 with 48 again
  module: src/forex_system/harness/honest_n.py     # sibling to compute_honest_n; KEEP both, name distinctly
  signature: "honest_n_deflation_denominator(trials_path: Path) -> int   # returns PRIOR attempt count; callers add +1 for the trial being scored"

  algorithm:
    step_1_collapse: "Parse JSONL; collapse by trial_id (last-wins), mirroring compute_honest_n:106-113. One slot per DISTINCT trial_id, never per line. (kills the 49 bug.)"
    step_2_classify_each_distinct_trial_id:
      counts_TRUE_when:
        - "collapsed record carries counts_toward_deflation_denominator: true, OR"
        - "collapsed terminal status is a real attempt that saw data / could be selected: {complete, COMPLETE, rejected, exploratory, pre-registered-frozen, pre-registered-frozen-pending-receipt, VOIDED-contaminated-run, withdrawn? NO}"
      counts_FALSE_when:
        - "collapsed record carries counts_toward_deflation_denominator: false, OR"
        - "terminal status == withdrawn-pre-freeze (never frozen, never tested — NHT-ratified non-counting; e.g. 53981a4a)"
      DEFAULT_when_ambiguous: "COUNT IT (fail toward over-deflation, never drop). This explicitly REPLACES compute_honest_n's else-branch that silently DROPS unknown-status rows — that bug under-counts and must die (it currently drops trial-48 itself)."
    step_3_add_baseline_offset: "n = baseline_offset + count(distinct trial_ids classified TRUE after the offset record). baseline_offset is READ from the one-time reconciliation record (below), never typed."
    step_4_emit_trace: "Emit ONE structured event honest_n.computed{n, baseline_offset, countable_distinct, source, git_sha, ts} so any DSR is reconstructable from logs alone (log-as-decision-trace)."

  one_time_baseline_offset_record:
    required: true
    rationale: >
      The 15 prose-only attempts are real and already paid-for; they cannot be re-derived line-by-line from the
      current bytes for every future score. Bake them ONCE as an explicit, auditable offset, then compute mechanically
      forever. This is the IC-14(d) fix: 'honest-N recomputed from the ledger at score time, never typed.'
    record_to_append (QD, ONLY after NHT co-ratifies this artifact):
      event: honest-n-reconciliation
      counts_toward_deflation_denominator: false     # the offset record is metadata, not a trial
      reconciled_honest_n: 48
      records_countable_at_reconciliation: 33
      prose_only_attempts_offset: 15
      basis: "trial-48 archive 'DSR=0.00 at N=48' + NHT certification + n_trials_at_spawn field trail (1..37) + MEMORY counter path 37->38->42->48"
      ratified_by: [head-of-quant-research, null-hypothesis-tester]
      ts: "<date -u +%Y-%m-%dT%H:%M:%SZ at append time>"
      detail: "One-time baseline offset. After this record honest_n() = 15 + count(distinct countable trial_ids appended AFTER this record). Prose counter RETIRED; ledger is authoritative."
    post_reconciliation_invariant: >
      honest_n_deflation_denominator() = 15 (frozen offset) + count(distinct counts_toward==true trial_ids recorded
      after the reconciliation record). The 33 already-present countable records are SUBSUMED in the 48 via the offset
      arithmetic (15 + 33 = 48); going forward each NEW attempt appends a real counts_toward:true record and the count
      ticks up mechanically. No future value is ever typed.

  call_sites_to_fix (per CTO blast-radius — BOTH live + the hand-entered literal):
    - "src/forex_system/harness/run_trial.py:288  n_prior = _count_prior_trials()  -> honest_n_deflation_denominator(_TRIALS_REGISTRY)  (n_prior + 1 logic preserved)"
    - "scripts/run_falsification_trial.py:736  n_prior = _count_prior_trials()  -> same  (the SECOND live site)"
    - "scripts/trial_48_is_eval.py:411  n_trials=48 LITERAL  -> replace with the call (IC-14d: no hand-entered N)"
  deprecate: "_count_prior_trials() -> delete or raise NotImplementedError pointing to honest_n_deflation_denominator (fix-the-class; no caller reintroduces the line-count)."
  also_fix_regardless: "compute_honest_n() else-branch silent-DROP (honest_n.py:129-134): unknown/frozen/withdrawn statuses must be EXPLICITLY classified, not discarded. Required even though compute_honest_n stays the 11-view (it must not silently lose trials)."

# =============================================================================
# 4. DIRECTIONAL SAFETY RULE (SD2 / IC-9) — binding on every ambiguity
# =============================================================================
directional_safety:
  rule: "WHEN UNCERTAIN, DEFLATE MORE (LARGER N), NEVER LESS."
  rationale: >
    A too-small denominator shrinks E[max SR] and MANUFACTURES false validations — the single most dangerous failure
    mode for a research firm (it lets noise graduate to capital). A too-large denominator only costs a real edge an
    extra confirmatory cycle. The asymmetry is total: under-deflation is unrecoverable (you trade noise), over-deflation
    is merely conservative. Therefore: 48 over 33 (preserve paid-for attempts); count-on-ambiguity over drop; worst-case
    the full forward attempt-budget; use the UPPER CI end on any estimated effective-N. Every tie breaks toward MORE
    deflation.
  consequence_for_this_ratification: "Even if the 15-offset reconstruction carried residual uncertainty, the SAFE choice is the LARGER value — 48 stands not merely because it is reconstructable but because it is the conservative direction."

# =============================================================================
# 5. DECISION — concur with CTO Option A
# =============================================================================
decision_detail:
  ratified_denominator_semantic: "Cumulative independent ATTEMPTS (configs tried, one slot per attempt, programme-wide, monotonic) — the multiple-comparisons family E[max SR] corrects for."
  ratified_current_value: 48        # standing PRIOR-attempt count; a trial scored today passes n_trials=49 to compute_dsr
  concur_with_cto_option_A: true
  differ_from_cto: >
    CONCUR on Option A (48, multiplicity reading) and on the reconciliation-offset mechanism. ONE REFINEMENT, not a
    disagreement: the CTO framed 48 as living 'ONLY in prose / not derivable from any current parse rule.' That is
    too pessimistic but the precise correction is PARTIAL, not full — 48 is field-anchored for slots 1-24 (the
    n_trials_at_spawn field, present on 25 of 49 lines) and at slot 37 (R5), but the 24->37 segment (the 12-trial
    falsification batch, which carries NO n_trials_at_spawn) and the cross-session moves 38->42->48 ARE prose/MEMORY-
    dependent. So 48 is RECONSTRUCTABLE (the anchors pin it and the path is monotonic+consistent) but NOT fully
    field-mechanical — which is exactly WHY the offset record is REQUIRED, not optional: it converts a partially-prose
    history into a one-time auditable baseline so no future value is ever hand-entered. This satisfies the CTO's binding
    gate ('HoQR+NHT must independently reconstruct the 15') with an HONEST account of which segments are field-backed vs
    prose-backed, rather than over-claiming full field-recoverability. I reject Option B (de-dup 11) as the DSR
    denominator: it is the wrong statistical quantity (erases within-family selection) and carries a silent-drop bug.
    compute_honest_n stays alive ONLY as the research-portfolio idea-coverage view, never wired to compute_dsr.
  reject_option_B_reasons:
    - "11 de-duplicates configurations that were each a separate draw from the search -> systematically under-deflates -> SD2 violation."
    - "compute_honest_n silently DROPS 4 live trials incl. trial-48 itself (unknown-status else-branch) -> the most recent falsification is invisible to it."
    - "4x smaller than the multiplicity N -> would flip DSR gate outcomes from FAIL to PASS on noise."

