  "24->37 counter advance" the offset attributes to bucket (ii). There is no second untracked
  batch population — the counter advance IS the 13 distinct ids. The offset re-prices ~5-8 of them
  in bucket (ii) (the offset says "~7 in the 12-trial batch"; my census is 13 ids, so the exact
  figure is bounded ~5-8, not pinned to 7). Double count direction: PROVEN; magnitude: ~5-8,
  probable. SD2 does not license counting a determinate attempt twice.

  DR1-2 (I moved my own number UP, honestly). The mandate stress-tested my ~22 against my own
  over-deflate rule. Applying it consistently to the genuinely-UNAUDITABLE residual — the 8 EXPLORE
  diagnostic looks I had excluded as "0 multiplicity" but which the firm itself backfilled as
  looks-that-could-surface-a-finding, plus f2fb41fd, plus ~0-3 untracked early-sweep — forces my
  point estimate from 22 to ~30 and my band from [17,27] to [22,33]. I cannot invoke
  count-when-ambiguous selectively. This is a calibration concession; I was over-confident
  excluding the EXPLORE bucket.

  DR1-3 (the residual disagreement is duplication, not draws). After R1, HoQR and I ENUMERATE THE
  SAME real selectable draws (~22-33). The gap to 48 is entirely the direction-proven ~5-8 batch double-count +
  ~5 write-pattern phantom + the trial-48 self-overlap. HoQR's own artifact concedes the 19-residual
  is "back-solved against the 48 anchor, not derived line-by-line" and the phantom slots "cannot be
  individually reconstructed." A number that cannot be reconstructed as distinct attempts, and that
  provably overlaps the distinct-id count, is not conservatism — it is unaudited residual. My UPPER
