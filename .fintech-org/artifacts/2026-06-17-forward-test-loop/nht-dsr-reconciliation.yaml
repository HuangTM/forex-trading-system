# -----------------------------------------------------------------------------
# 3. PRINCIPLED N — Bailey & Lopez de Prado (Deflated Sharpe Ratio, 2014)
# N = number of INDEPENDENT trials in the SELECTION FAMILY from which the reported
#     result was chosen. Param-variants count; identical re-runs do not.
# -----------------------------------------------------------------------------
principled_N:
  derivation_within_ledger: "NEW (10) + PARAM (7) = 17 independent selection-family trials"
  excluded_and_why:
    - "RERUN (5): identical re-tests of already-killed families — not new comparisons (de-dup view is RIGHT here)"
    - "SPAWN (2): never executed — no selectable result"
    - "EXPLORE (8): diagnostics/benchmarks — never candidates-to-validate, cannot inflate a reported max"
    - "PREREG (1): frozen, not run — no result yet"
    - "WITHDRAWN (1): never frozen, never tested"
  plus_defensible_untracked_offset: >
    Add ONLY genuinely-untracked early-VTC sweep attempts that left no ledger trial_id.
    I cannot reconstruct an exact count from artifacts (the prose is non-auditable), so I
    bound it: at MOST the 5 phantom-slot VTC attempts, but those are write-pattern doubles
    of the 7 PARAM ids I already counted, so the honest add is ~0-3, not 15.
  my_principled_value: 22
  my_principled_value_construction: >
    Core selection-family = 17 (10 NEW + 7 PARAM) IF the 5 DISPUTED RERUN trials are true
    re-runs; 22 if they are walk-forward / different-window variants (ambiguity-default =
    count). + up to 3 truly-untracked early VTC sweep attempts. Point estimate 22 applies the
    count-when-ambiguous rule to the disputed 5 (identity could not be proven from the ledger).
  band: "principled N lies in [17, 27]. NOT 11. NOT 48. NOT 49."
  band_note: >
    Band WIDENED post-critic from [17,22] to [17,27]. Lower bound = exclude the 5 disputed
    RERUNs (if proven identical re-runs). Upper bound = count them as walk-forward variants
    plus a small untracked-offset. The contrast with both 11 and 48 holds across the whole band.
  why_not_11: "11 de-dups away the 7-way VTC parameter SELECTION and QRB-6/trial-48 — it under-counts a real multiple-comparison (see adversarial verdict)."
  why_not_48: "48 counts re-runs, spawns, diagnostics, a frozen-unrun prereg, AND double-counts the falsification batch via a non-auditable 15-offset — it over-counts beyond what BLdP's selection family contains."
  why_not_49: "raw line count; counts the 2-lines-per-trial write artifact; unprincipled by everyone's agreement."

# -----------------------------------------------------------------------------
# 4. ADVERSARIAL VERDICT ON BOTH ENDPOINTS (named failure modes)
# -----------------------------------------------------------------------------
adversarial_verdict:
  endpoint_11:
    failure_mode: UNDER-DEFLATION / multiple-comparison-laundering
    mechanism: >
      compute_honest_n collapses the 7-member VTC sweep to a SINGLE hypothesis key, so the
      act of selecting k*=USDJPY out of 7 cost/pair configs costs ZERO denominator. That is
      exactly the data-snooping DSR is built to penalize — laundered away by the de-dup key.
      It ALSO silently drops fa0f982a (QRB-6) and 15923fe1 (trial-48) into the unknown-status
      else-branch (they are neither retained nor excluded), so 11 omits the two most recent
      real tests. 11 manufactures EASIER validations.
    BUT_partially_right: >
      The de-dup view is CORRECT that the 5 RERUN re-tests of already-killed families are not
      new comparisons. The reconciliation mandate forced me to concede this: a smaller de-dup'd
      N is NOT automatically a p-hack — for genuine identical re-runs it is the right call. The
      error in 11 is NOT 'it de-dups' — it is that it ALSO de-dups genuine PARAM selections,
      which ARE multiple comparisons. The de-dup over-reaches one bucket too far.
    classification: under-deflating -> false-positive risk (manufactures validations) -> the UNACCEPTABLE error per IC-9.
  endpoint_48:
    failure_mode: GRATUITOUS OVER-DEFLATION via double-count + category-error
    mechanism: >
      48 = 33 countable + 15 offset. The 33 counts 8 EXPLORE diagnostics, 2 SPAWN-only,
      1 unrun PREREG, and 5 RERUN identical re-tests — none of which are selection-family
      comparisons that could inflate a reported max-Sharpe. The 15 offset then DOUBLE-COUNTS
      the falsification batch (already in the 33) and a 2-line-per-attempt write artifact.
      This is not 'safe conservatism' — it makes the validation bar needlessly impossible by
      pricing in noise that never competed to be the winner.
    why_this_is_NOT_rigor: >
      IC-9 / SD2 says over-deflate when AMBIGUOUS, never under-count. It does NOT say count
      re-runs and diagnostics as fresh comparisons, and it CERTAINLY does not license counting
      the same attempt twice. A denominator so large that no real edge can ever clear it is a
      different failure: it converts the firm's stated 'prefer false-negative' into 'guarantee
      false-negative', which is not calibration — it is abdication. The mandate named this
      explicitly: gratuitous over-deflation that makes validation structurally impossible is
      not rigor either.
    classification: over-deflating -> false-negative certainty -> safe on capital, but NOT principled and NOT what BLdP specifies.
  symmetry_statement: >
    11 errs toward false-positive (the dangerous direction). 48 errs toward guaranteed
    false-negative (safe but unprincipled). The principled answer (~17-20) is BETWEEN them and
    is derived from the selection family, not chosen for safety. Picking 48 'because bigger is
    safer' is the mirror-image error of picking 11 'because it passes' — both substitute a
    convenient number for the actual count of comparisons the firm selected among.

# -----------------------------------------------------------------------------
# 5. DIRECTIONAL RULE FOR AMBIGUOUS TRIALS (the tie-breaker, stated honestly)
# -----------------------------------------------------------------------------
directional_rule:
  rule: >
    When a trial's category is GENUINELY ambiguous (cannot tell if it was a real selection
    among variants or an identical re-run), classify it as PARAM and COUNT it. Over-deflate
    on ambiguity (IC-9 holds). BUT this rule fires ONLY on genuine ambiguity — it does NOT
    license counting items whose category IS determinable as non-comparisons (re-runs, spawns,
    diagnostics, unrun preregs) just to inflate the number, and it NEVER licenses counting the
    SAME attempt twice.
  boundary: >
    'Count it when ambiguous' is a tie-breaker for UNCLASSIFIABLE trials, not a blanket
    'count everything'. The difference between my ~17-20 and the 48 is precisely that 48
    applied 'count it' to clearly-classifiable non-comparisons and to double-counted offsets.
  precedence: "If HoQR and I disagree on a specific trial's bucket, the LARGER classification wins for THAT trial (count it) — but only after both confirm the trial is genuinely ambiguous, not determinable-as-excludable."

