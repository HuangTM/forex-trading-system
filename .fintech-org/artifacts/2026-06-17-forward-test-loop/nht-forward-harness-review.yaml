    nht_note: This is the single most important control against SD3 (quiet re-attempt). Solid.

  IC-8_no-quiet-attempts:
    claim: code-fail-closed (local existence) + procedural pushed-before
    verified: ENFORCED locally; pushed-before is procedural (GAP-3, honestly flagged)
    evidence: >
      forward_eval step 1 raises FileNotFoundError/KeyError with no prior freeze record.
      "Pushed BEFORE the eval" needs CI — correctly out-of-Python.

  IC-9_full-deflation-denominator:
    claim: code-fail-closed
    verified: ENFORCED — denominator is the ratified 30, mechanically derived, NEVER typed
    evidence: >
      I executed honest_n_deflation_denominator(.fintech-org/trials.jsonl) -> 30 (NOT 48,
      NOT 49 raw lines, NOT 11 de-dup families). ic9_dsr_denominator(fam=0,budget=1) -> 31;
      (fam=10,budget=3) -> 43 = org_n + IS-family + budget, exactly the IC-9 formula.
      Fail-closed: RuntimeError if the single honest-n-classification record is absent;
      guard-(a) rejects >1 classification record; guard-(b) asserts ratified_n ==
      len(counted_trial_ids). I verified the live ledger: 1 classification record,
