  finding: >
    NO control is silently skipped in the SOUNDNESS-CRITICAL direction. Every UNMET control
    (IC-5, IC-13 pushed-before, IC-1 pushed-before, GAP-1 is_data_hash) is EXPLICITLY flagged
    by the QD as procedural/UNMET, matching IC-14's "unenforced == UNMET" rule. The harness
    does not pretend an UNMET control is met.
  BUT two NON-silent-but-under-flagged items:
    - The IC-11 metric-map mismatch (F1/F2/F3) is a control that is "enforced" only in the
      fail-CLOSED direction: it cannot produce a false VALIDATED, but it ALSO cannot produce
      a true VALIDATED for the real H1 triggers — it FALSIFIES on metric-name mismatch. The
      QD handoff claims IC-11 "code-fail-closed" without disclosing that the harness's
      metrics_map does not cover the frozen candidate's metric vocabulary. That is an
      under-disclosure, not a soundness hole. It must be closed before H1 is run, else the
      first forward verdict will be a spurious FALSIFIED (a wrong KILL, which is a
      mis-classification I am graded on — over-rejection).
    - IC-4 is described as "reuse" of the no-lookahead engine; that conflates the intra-trial
      shift with the inter-trial holdout gate. Not skipped, but mis-labeled.

# -----------------------------------------------------------------------------
# APPEND-ONLY DISSENT (may not be paraphrased or softened)
# -----------------------------------------------------------------------------
dissent_statement: >
  I approve the P1 forward-harness CODE with structural dissent. The mechanized core is
  real and fail-closed in the only direction that matters for a firm hungry after 0/N: it
  CANNOT manufacture a false VALIDATED. IC-3 aborts on hash mismatch (sys.exit 1), IC-6
  refuses a re-score, IC-7 burns N on every attempt including data-loaded VOIDs, IC-9
  derives the deflation denominator mechanically from the ledger (I executed it: 30, not
  48/49/11) and over-deflates on ambiguity, and the SD1 verdict-priority fix is correct and
  unit-locked — a real kill or a DSR<0.95 on a short window FALSIFIES and cannot be laundered
  into "underpowered". These are the controls that block the two cheats I most feared
  (N-minimization, quiet re-attempts), and they hold.
  .
  My dissent is on FOUR boundaries that must not be papered over:
  (D-1) The harness as built CANNOT score the actual frozen H1 candidate to a VALIDATED
  verdict: its metrics_map covers net_sharpe/dsr/n_realized but NONE of H1's real gate
  metrics (n_oos_expected, directional_hit_rate, years_to_validate_post_haircut,
  oos_sign_concordant, max_single_pair/quarter_pnl_frac). Absent metrics fail-closed to
  FIRED, so H1 would be FALSIFIED on a metric-name mismatch, not on economics. This is
  fail-SAFE (why I do not veto) but it is a WRONG KILL waiting to happen, and the QD handoff
  did not disclose it. The metrics_map MUST be extended to the frozen candidate's vocabulary,
  and the power-floor extractor MUST recognize n_oos_expected, BEFORE H1 is run — else the
  firm's first forward verdict is a spurious FALSIFIED that an outside reader would mistake
  for a clean negative.
  (D-2) IC-5 is honestly UNMET and the harness does NOT abort in its absence. For M2 this is
  tolerable (post-freeze bars cannot be peeked). For ANY M1 run it is a live hole; M1 must
  stay hard-blocked (it currently is) until OS/CI gating ships.
  (D-3) GAP-1 (no IS-data-byte hash) means a forward PASS does not yet prove the IS data the
  candidate saw matches the IS data on the books. P1 code may merge; a "validated" stamp may
  NOT be claimed until is_data_hash lands (P1.1) AND the active spread-column restatement on
  THIS branch is settled. Freezing a candidate on this restating branch before is_data_hash
  exists would bake the exact SD8 smuggling hole open.
  (D-4) IC-13 budget-pre-frozen and IC-1/IC-8 pushed-before are procedural; the denominator
  arithmetic includes the budget but nothing asserts the budget (or the freeze) was committed
  BEFORE the first spawn. Until that CI check exists, a self-serving small budget is not
  mechanically blocked — treat the denominator as worst-case per IC-13.
  .
  Absent D-1 (metrics vocabulary) and D-3 (is_data_hash + settled branch), any "VALIDATED"
  this harness emits on H1 is not yet credible — D-1 would more likely produce a spurious
  FALSIFIED, which is its own calibration error against me. I will record any forward verdict
  produced before D-1/D-3 are closed as non-credible regardless of the headline. This dissent
  is append-only and may not be paraphrased or softened by any other role.

