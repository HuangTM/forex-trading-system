ic_verdicts:
  IC-1_cryptographic-freeze:
    claim: code-fail-closed
    verified: ENFORCED (with bounded residual)
    evidence: >
      freeze.py::freeze_structure() writes the full anchor tuple (full-width sha256
      prereg_content_hash, code_config_hash, full git_sha, freeze_utc) to
      forward_registry.jsonl with open_count=0/burned=false BEFORE any forward bar.
      forward_eval refuses without it (IC-8). PUSHED-ness is an admitted procedural
      residual (Python cannot read origin) — GAP-3, correctly flagged.
    nht_note: >
      The IS-data-byte hash (is_data_hash) named in the IC-1 control text is NOT
      computed. See GAP-1 finding below — this is a real, bounded deviation from
      the IC-1 spec-as-written, not merely an IC-12 detail.

  IC-2_forward-postdates-freeze:
    claim: code-fail-closed
    verified: ENFORCED
    evidence: >
      _assert_all_bars_post_freeze() builds a UTC-normalized index, masks index <= freeze_ts,
      and a single pre-freeze bar -> VOID (void_after_data=True). test_m2_pre_freeze_bar_voids
      passes. Strict (<=) boundary is correct.

  IC-3_result-cites-frozen-sha:
    claim: code-fail-closed (IC-14a)
    verified: ENFORCED (content-hash binding; git_sha intentionally informational)
    evidence: >
      _verify_integrity() recomputes prereg_content_hash + code_config_hash, and on
      mismatch forward_eval prints to stderr, records a VOID trial, burns the window,
      and sys.exit(1). test_hash_mismatch_voids asserts exit code == 1 and a VOID record.
      git_sha is deliberately NOT a VOID trigger (M2 expects later commits) — defensible:
      the config+prereg CONTENT is the binding lock. This is genuinely fail-closed.

  IC-4_physically-sequestered-holdout:
    claim: code-fail-closed (reuse)
    verified: PARTIAL — reuses entry_delay no-lookahead (intra-trial); inter-trial OS
      sequestration is IC-5 (UNMET). The "reuse" wording overstates: the engine shift is
      the intra-trial guard, not the inter-trial holdout gate IC-4/IC-5 actually demand.

  IC-5_holdout-access-enforced-not-just-logged:
    claim: procedural-with-CI-hook (UNMET until hook ships)
    verified: HONESTLY UNMET — and the harness does NOT fail-closed in its absence.
    evidence: >
      No OS gating, no CI grep hook in-repo. The forward file is readable by any dev
      process. Per IC-14 this is UNMET, which the QD states. CORRECT classification.
      BUT: nothing aborts if the hook is missing — the harness will happily score with
      IC-5 unmet. That is acceptable ONLY because M2 (paper-forward, post-freeze bars
      that do not yet exist) is the primary path, where holdout-peek is physically
      impossible. For any M1 run, IC-5-unmet is a live hole. See dissent D-2.

  IC-6_one-score-per-candidate:
    claim: code-fail-closed
    verified: ENFORCED
    evidence: >
      load_freeze_record_with_state() reconstructs open_count/burned from freeze +
      freeze-update records; burned or open_count>0 -> RuntimeError before any scoring.
      Burn is written atomically (append-only update record) after scoring.
      test_one_shot_burned_refuses passes.

  IC-7_every-attempt-burns-N:
    claim: code-fail-closed
    verified: ENFORCED
    evidence: >
      _record_trial_and_result() appends counts_toward_deflation_denominator on PASS,
      FAIL, and VOID-after-data. counts = verdict != "VOID" or void_after_data — so a
