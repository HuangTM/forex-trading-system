  IC-10_net-of-conservative-cost:
    claim: code-fail-closed
    verified: ENFORCED (EXCLUDE-not-impute) — with one residual
    evidence: >
      _build_forward_cost_model() raises ConfigError if the pair is absent from cost
      config — uncovered pairs are EXCLUDED, never zero-imputed. Cost config is inside
      code_config_hash, so loosening it post-freeze changes the hash -> VOID (IC-3).
      This blocks SD5 (cost-optimism rescue) mechanically.
    nht_note: >
      RESIDUAL: "conservative event-time spread (wider at session opens), p90 not average"
      is a DATA/CONFIG property, not enforced by the harness. The harness charges whatever
      the frozen config says. If the frozen config carries average (not event-time/p90)
      spread, IC-10's "conservative event-time" clause is met only by the config author's
      discipline, not by code. The H1 prereg data_preconditions DO require spread_p90 +
      session-aware cost, so the discipline is pre-registered — but the harness does not
      verify it. Bounded, acceptable for P1; note for P1.1.

  IC-11_pre-declared-gates-and-power:
    claim: code-fail-closed (gates); procedural (power-calc origin)
    verified: ENFORCED in the FAIL-CLOSED (false-negative) direction ONLY.
    evidence: >
      _evaluate_triggers() reads ONLY the frozen .triggers.yaml; absent metric -> treat
      as FIRED (fail-closed). No hardcoded gate THRESHOLDS for the frozen triggers.
    nht_FINDING_F1_metric_map_mismatch: >
      CRITICAL WIRING GAP (fail-safe, but blocks real use). The harness metrics_map
      supplies: net_sharpe, oos_sharpe, dsr, n_realized, avg_net_pips,
      per_pair_max_fraction, per_quarter_max_fraction. The ACTUAL frozen H1 triggers
      reference: n_oos_expected, avg_net_pips_per_trade, directional_hit_rate,
      years_to_validate_post_haircut, oos_sharpe, oos_sign_concordant,
      max_single_pair_pnl_frac, max_single_quarter_pnl_frac. Only oos_sharpe overlaps.
      Every other H1 gate metric is ABSENT from the map -> _evaluate_triggers treats it
      as FIRED -> the harness FALSIFIES H1 unconditionally. This is fail-SAFE (no false
      VALIDATED is possible), which is why I do not veto. But it means the harness AS
      BUILT cannot score the real frozen candidate to a VALIDATED verdict — it would kill
      H1 on metric-name mismatch, not on economics. The QD handoff did NOT flag this.
    nht_FINDING_F2_power_floor_extractor_mismatch: >
      _extract_power_floor() searches for metric=='n_realized' with operator '<'. The
      frozen H1 power gate is metric=='n_oos_expected' (threshold 48). The extractor
      returns (None, None) for H1 -> NO power-floor gate is recognized -> the INCONCLUSIVE_
      UNDERPOWERED path is UNREACHABLE for H1, and (worse, but moot under F1) the
      n_oos_expected gate would route through the hard-kill loop as a FALSIFIED rather
      than the intended INCONCLUSIVE. Generic-harness test fixtures use n_realized and
      pass; the real candidate does not. Wiring debt, not a soundness hole.
    nht_FINDING_F3_unsupported_operator_and_bool_threshold: >
      _evaluate_triggers handles only <,>,<=,>=. The frozen h1-KILL-6 uses operator '=='
      with threshold:false; threshold is float()-cast so False->0.0, and '==' falls to
      the belt-and-suspenders fired=True. So h1-KILL-6 ALWAYS fires (fail-closed-safe but
      semantically dead). Again fail-safe, again real wiring debt.

  IC-12_forward-data-immutable-post-freeze:
    claim: code-fail-closed
    verified: PARTIAL — config+prereg restatement caught; IS-bar restatement NOT caught.
    evidence: >
      A restatement that changes the config or prereg bytes changes the hash -> VOID
      (IC-3). But a config-identical restatement of IS BAR VALUES is invisible: no
      is_data_hash is computed at freeze. This is GAP-1. M1 records a holdout_content_hash,
      but the IS-window content hash that IC-1/IC-12 demand is absent. See GAP-1 call below.

  IC-13_attempt-budget-pre-frozen:
    claim: partial-procedural
    verified: PARTIAL (honestly stated). ic9_dsr_denominator() INCLUDES the budget in the
      denominator, but the harness does NOT assert a budget-declaration record exists with
      ts < earliest freeze (that comparison needs CI). Default budget=1; if a caller passes
      a self-serving small budget with no pre-frozen record, nothing stops it. GAP-3.
      This is the IS-search problem one level up (Q4/IC-13) and remains procedurally open.

  IC-14_mechanized-not-human-enforcement:
    claim: satisfied piecewise
    verified: PARTIALLY SATISFIED — (a) and (d) are real code; (b-pushed) and (c) are CI.
    evidence: >
      (a) hash-mismatch sys.exit(1): real. (d) honest-N from ledger, never typed: real
      (executed, returns 30). (b) reject hand-entered denominator: real (ic9 mechanical);
      pushed-freeze check: CI residual. (c) OS/CI grep block for IC-5: UNMET (GAP-2).
      Per IC-14's own rule, IC-5 and the pushed-before/budget-before checks are UNMET
      until CI ships — the QD classifies them exactly so. Honest.

# -----------------------------------------------------------------------------
# SD1 / VERDICT-PRIORITY CONFIRMATION (my specific concern)
# -----------------------------------------------------------------------------
sd1_verdict_priority:
  concern: >
    A genuine kill on a short window must FALSIFY, not be laundered into
    "INCONCLUSIVE_UNDERPOWERED" (gate-softening after the 0/N hunger).
  verified: FIXED — traced in _determine_verdict().
  trace: >
    Order is: (1) loop over frozen KILL gates, EXCLUDING the power_floor_label, any fired
    -> FALSIFIED; (2) dsr < 0.95 -> FALSIFIED; (3) ONLY THEN, M2 + n_realized < power_floor
    -> INCONCLUSIVE_UNDERPOWERED; (4) else VALIDATED. So a real KILL gate or a DSR failure
    on a short window returns FALSIFIED before the power floor can soften it. INCONCLUSIVE
    is reachable only when NO hard gate fired AND DSR cleared — the narrow "would have
    validated but for events" case. Locked by 3 unit tests:
    test_verdict_dsr_fail_and_underpowered_is_falsified (DSR 0.50 + N<floor -> FALSIFIED),
    test_verdict_real_kill_gate_beats_underpowered (KILL-SHARPE + short -> FALSIFIED),
    test_verdict_underpowered_only_is_inconclusive (DSR 0.99, only power floor -> INCONCLUSIVE).
    All pass. SD1 concern is RESOLVED. I accept this fix.
  caveat: >
    The fix is only as good as the power_floor_label identification — and per FINDING F2
    that identification MISSES the real H1 power gate (n_oos_expected). For H1 specifically,
    the n_oos_expected gate would be treated as a HARD kill (FALSIFIED), not INCONCLUSIVE.
    That errs toward FALSIFIED (the safe direction for SD1) but is not the spec's intent.

# -----------------------------------------------------------------------------
# GAP-1 SHIP / NO-SHIP CALL (the IS-data-byte hash)
# -----------------------------------------------------------------------------
gap1_assessment:
  what: >
    Only config-bytes (code_config_hash) and prereg+triggers-bytes (prereg_content_hash)
    are hash-locked. The IS BAR VALUES the candidate was selected on are NOT content-hashed.
    A config-identical restatement of the IS bars (SD8 restatement-smuggling, e.g. the
    spread-column recovery on THIS branch silently changing IS bars) would slip IC-3.
  ship_call: SAFE TO SHIP P1 with GAP-1 deferred to P1.1 — CONDITIONAL.
  reasoning: >
    1. M2 (paper-forward) is the primary and only currently-available path: forward bars
       POST-DATE the freeze and do not exist at freeze time, so there is no IS/forward
       overlap to restate within an in-flight M2 run. The IC-2 timestamp guard already
       VOIDs any pre-freeze bar. For M2, GAP-1's attack surface is the IS-selection
       provenance, not the scored forward window.
    2. M1 (sequestered holdout) is attestation-GATED and currently UNAVAILABLE for every
       existing family (freeze.py hard-REFUSES M1 without a dev-start attestation predating
       development; H1 and all prior work have none). So the path where an unhashed IS/holdout
       restatement could flip a result is closed by construction today.
    3. The bounded residual: GAP-1 means a forward PASS does NOT yet carry cryptographic
       proof that the IS data the candidate saw is the same IS data on the books. That is a
       PROVENANCE-integrity gap, not a forward-scoring soundness gap. It does not let a NOISE
       result score as VALIDATED; it lets a restated-IS candidate be scored without detection.
  ship_conditions (BLOCKING for any "validated" stamp, NON-blocking for merging P1 code):
    - C1: GAP-1 (is_data_hash at freeze + equality assert at eval) MUST land in P1.1 BEFORE
          any candidate's forward result is cited as "validated". IC-12's content-hash
          corollary is explicit that timestamp ordering alone is insufficient.
    - C2: The branch ingest-spread-column is ACTIVELY restating bar values (spread column).
          Per SD8, no candidate may be frozen on, or forward-scored against, data from a
          window this branch touched until the restatement is settled and the (future)
          is_data_hash is computed on the SETTLED bars. Freezing H1 now, on this branch,
          before is_data_hash exists, would bake the exact SD8 hole GAP-1 leaves open.
  verdict: >
    P1 harness CODE is safe to merge with GAP-1 open. A "VALIDATED" verdict from this
    harness is NOT yet credible until is_data_hash (P1.1) closes GAP-1 AND the branch
    restatement is settled (C2). I record this as a structural precondition, append-only.

