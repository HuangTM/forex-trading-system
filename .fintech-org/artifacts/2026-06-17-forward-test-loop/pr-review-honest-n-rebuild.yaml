# FINDINGS
# =============================================================================
findings:
  - id: F-001
    severity: minor
    location: ".fintech-org/honest_n_offset.json (file still present on disk)"
    category: maintainability
    observation: "The retired phantom-offset file .fintech-org/honest_n_offset.json STILL EXISTS on disk (2.5K, last modified Jun 17). The CTO spec retires-clause says 'DELETE (or move to an archive/ dir with a RETIRED header)'. The code no longer reads it (grep over src/ and scripts/ confirms zero readers; only the test references it by name to assert non-use), so this is NOT a correctness defect today."
    inference: "INFERENCE: a live, un-headered offset file invites a future regression where someone re-wires a reader against it (the exact failure mode the rebuild exists to kill). It is dead-but-loaded landmine, not active harm."
    evidence: "ls -la .fintech-org/honest_n_offset.json -> present. grep -rn honest_n_offset src/ scripts/ (excl. tests) -> no readers. CTO spec retires[0].action = DELETE-or-archive."
    recommended-action-class: other   # delete-or-archive-with-RETIRED-header per the spec's own retires clause
    owning-role: quant-developer

  - id: F-002
    severity: minor
    location: "tests/harness/test_honest_n.py:761-773 (TestForbiddance, dsr_recompute branch)"
    category: test-coverage-gap
    observation: "The forbiddance assertion for dsr_recompute.py is TEXTUAL: it asserts the literal substring 'n_trials=n_deflation_denominator' is present. It does NOT assert (via AST) that compute_honest_n's RESULT is absent from the compute_dsr call's n_trials argument."
    inference: "INFERENCE: a future edit could reintroduce a second compute_dsr call inside dsr_recompute that passes the de-dup value while the original 'n_trials=n_deflation_denominator' string still exists elsewhere in the file — the substring assertion would still pass. The other 3 sites get the stronger AST import/call check; dsr_recompute (the historically CRITICAL site) gets the weaker textual one. Low likelihood, but this is the site that already had the live bug."
    evidence: "test body lines 761-773 use 'in source' string membership, not ast over the compute_dsr Call node's n_trials keyword."
    recommended-action-class: add-test
    owning-role: quant-developer

  - id: F-003
    severity: minor
    location: "src/forex_system/harness/honest_n.py:332-340 (classification-record location loop)"
    category: edge-case
    observation: "The loop assigns classification_record on EVERY matching honest-n-classification line (last-wins). For the current ledger there is exactly one such record, so behavior is correct today. There is no guard that asserts exactly one record, and no validation that ratified_n equals len(counted_trial_ids)."
    inference: "INFERENCE: if a second honest-n-classification record were ever appended (e.g. a future re-ratification), the LAST one silently wins with no log warning, and a record whose self-declared ratified_n disagrees with its own counted list length would pass undetected. Both are latent integrity gaps in the auditability the rebuild depends on; neither is triggered by the current ledger."
    evidence: "Loop at 332-340 overwrites classification_record unconditionally; no count-of-records check; no ratified_n vs len(counted_trial_ids) cross-check. grep -c honest-n-classification = 1 today (so not live)."
    recommended-action-class: tighten-invariant
    owning-role: quant-developer

