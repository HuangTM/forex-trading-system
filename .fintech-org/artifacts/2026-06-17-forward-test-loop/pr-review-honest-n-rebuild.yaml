# LOAD-BEARING CHECK 1 — Is 30 GENUINELY DERIVED + AUDITABLE, or hard-coded?
# =============================================================================
check_1_thirty_is_derived_not_hardcoded:
  verdict: GENUINELY-DERIVED-AND-AUDITABLE (not a hard-coded integer, not a phantom-offset in new clothes)
  evidence:
    - "Executed honest_n_deflation_denominator(Path('.fintech-org/trials.jsonl')) on the LIVE ledger -> returned 30. Not a literal in the function; it is len(legacy_counted) + len(new_counted)."
    - "The classification record (trials.jsonl line 50, event=honest-n-classification, ratified_n=30, ratified_by=[head-of-quant-research, null-hypothesis-tester]) lists 30 counted_trial_ids EACH WITH A PER-TRIAL REASON and 4 excluded_trial_ids each with a reason. Parsed: 30 counted + 4 excluded = 34 distinct ledger ids. This is an explicit auditable list, NOT a dressed-up integer — every countable id is named with a justification traceable to the HoQR/NHT debate."
    - "Cross-checked the 34 distinct trial_ids in the ledger against the record's two lists: ZERO ids fall outside both lists (no id silently classified mechanically), and ZERO overlap between counted and excluded. So 30 = len(counted_legacy) + 0 new = 30, fully reproduced from the record."
    - "This is the OPPOSITE of the retired phantom-15-offset: the offset back-solved an integer against the 48 anchor (HoQR conceded it was 'not line-derived'); the new record is a census of named draws with reasons. The replacement strictly improves parameter sourcing (firewall Section C)."
  why_a_record_and_not_pure_mechanical_is_CORRECT_here:
    - "CTO spec ledger_facts_verified.the_load_bearing_field_finding (A)(B)(C) proves the legacy 34 CANNOT be classified to 30 from fields alone with one mechanical pass: (A) current field rule drops only 53981a4a; (B) a naive 'no terminal record => drop' wrongly sweeps the 8 backfills + f2fb41fd + QRB6 + trial-48 (all COUNTED); (C) a naive 'same sharpe => re-run' wrongly drops a9c0902d. A frozen ratified record for the legacy ids is the honest choice; NEW trials classify mechanically. The code implements exactly this split (legacy via record lists, new via the field rule)."

