# -----------------------------------------------------------------------------
# Q1 — DISJOINTNESS (highest stakes): did 15 + 33 = 48 hold with NO double-count?
# -----------------------------------------------------------------------------
disjointness_finding:
  verdict: CONFIRMED — 15 offset + 33 ledger-countable = 48, with no double-count of the 33.
  my_independent_evidence: >
    Parsed the ledger directly. 34 distinct trial_ids; exactly 1 (53981a4a) is excluded
    (withdrawn-pre-freeze, explicit flag=false), leaving 33 countable — identical to QD's
    claim. The offset record's 15 is NOT a set of trial_ids present in the ledger; it is a
    counter-advancement quantity. I traced the n_trials_at_spawn field trail: 18 distinct
    trial_ids carry the field at slots {1,3,4,5,7,9,11,13,15-22,24,37}; 16 distinct trial_ids
    carry NO spawn field (the 12-trial falsification batch + trial-48 15923fe1 + QRB-6 fa0f982a
    + f2fb41fd frozen-pending + 53981a4a withdrawn). The phantom counter slots {2,6,8,10,12}
    and the 24->37 batch advancement and the prose moves 37->38->42->48 are exactly the kind of
    counter motion that did NOT mint a distinct countable trial_id. So the 15 are structurally
    disjoint from the 33 countable trial_ids: the offset adds counter-history that has no
    physical trial_id in the ledger, and the 33 are the physical trial_ids. They do not overlap.
  residual_uncertainty: >
    The internal decomposition of the 15 (5 phantom + ~7 batch + 3 cross-session) is prose/
    MEMORY-dependent and NOT fully field-recoverable — HoQR and NHT both state this explicitly.
    I could not independently reconstruct the EXACT internal split of the 15 from ledger bytes
    alone (the 24->37 batch carries no spawn field, and 38/42/48 live only in CONSENSUS/MEMORY).
    BUT: (a) the binding arithmetic 33+15=48 is exact and disjoint as a SET operation; (b) the
    direction is the safe one — if the 15 were over-stated, N would be too LARGE, which is the
    conservative (false-negative) direction per SD2, never the pass-manufacturing direction.
    I therefore confirm disjointness of the SETS and accept 48 as the conservative floor, while
    recording that the 15's internal provenance rests on the HoQR/NHT ratification, not on a
    byte-level reconstruction I could reproduce.

# -----------------------------------------------------------------------------
# Q2 — "appended AFTER this record" ambiguity: does the CODE return 48 or 15 now?
# -----------------------------------------------------------------------------
after_this_record_ambiguity:
  resolution: >
    The CODE returns 48 on the (record-appended) real ledger — it counts ALL True-classified
    distinct trial_ids regardless of their position relative to the reconciliation record, then
    adds the offset. honest_n_deflation_denominator (honest_n.py:323-351) iterates the full
    records_by_id map with no position/after-record filter. I confirmed by EXECUTION: copied the
    real ledger, appended the reconciliation record, called the function -> 48 (NOT 15).
  the_prose_is_misleading_but_the_code_is_correct: >
    The offset record's detail string says "count(distinct ... trial_ids appended AFTER this
    record)" — taken literally that would give 15 (no trial appended after the record yet). The
    CODE does NOT implement "after this record"; it implements "offset + count(ALL existing True
    trial_ids)", which is what yields 48. The prose is wrong/misleading; the implementation is
    right. This is a documentation defect, not a logic defect (finding F-002), because the test
    that pins ==48 (test_returns_48_on_reconciled_ledger) exercises the REAL ledger via the real
    function — but it is SKIPPED today because the reconciliation record is not yet in the ledger.
  test_that_asserts_48_exercises_real_ledger: >
    test_returns_48_on_reconciled_ledger reads Path('.fintech-org/trials.jsonl') (the real ledger,
    not a fixture) and asserts ==48 — but it SKIPS when the reconciliation record is absent, which
    is the case RIGHT NOW. So the ==48-on-real-ledger assertion is currently UNEXERCISED. I closed
    that gap myself by executing the function against a record-appended copy of the real ledger and
    confirming 48. The synthetic fixtures (test_offset_only_no_new_records, test_offset_adds_to_count)
    DO exercise the arithmetic and pass.

# -----------------------------------------------------------------------------
# Q3 — Sticky exclusion (monotonic, over-count-safe)
# -----------------------------------------------------------------------------
sticky_exclusion:
  verdict: CONFIRMED.
  evidence: >
    honest_n.py:268-308 tracks ever_excluded as a separate set populated on ANY record (not just
    last-wins) where flag is False OR status==withdrawn-pre-freeze. Classification (line 331) ORs
    `trial_id in ever_excluded` with the last-wins flag/status, so a trial flagged false early stays
    excluded even if a later record drops the flag. Two synthetic tests pin this
    (test_sticky_exclusion_first_false_later_omits_flag, test_sticky_exclusion_first_withdrawn_later_complete)
    and both pass. On the real ledger, 53981a4a (QRB-6 withdrawn) is correctly excluded. This is the
    over-count-safe direction (a resurrected exclusion would UNDER-count = unsafe; sticky prevents it).

