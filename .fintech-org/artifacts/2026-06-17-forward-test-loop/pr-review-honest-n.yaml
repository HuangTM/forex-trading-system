  - id: F-002
    severity: major
    location: ".fintech-org/honest_n_offset.json (field names) + offset record detail string ('appended AFTER this record')"
    category: maintainability
    observation: >
      Two documentation/data traps that do not affect the current run path but are latent footguns:
      (1) honest_n_offset.json uses event='honest-n-offset-record' and key 'prose_only_attempts_offset',
      but the CODE recognises event=='honest-n-reconciliation' and reads key 'prose_only_attempts'. The
      file is referenced ONLY inside an error string and a test skip message — never parsed — so if anyone
      ever appended THIS file's contents to the ledger verbatim as the record, the code would NOT find a
      reconciliation record and would RAISE (fail-closed, but confusingly). The CANONICAL record to append
      is the one in qd-p0-honest-n.yaml OA-1, which uses the correct field names.
      (2) The reconciliation record's detail string says future count = offset + trial_ids "appended AFTER
      this record". The code does NOT implement 'after this record' — it counts ALL existing True
      trial_ids. The prose contradicts the (correct) implementation; a future maintainer trusting the prose
      could 'fix' the code to filter by position, which would silently return 15 and manufacture false passes.
    inference: >
      Fail-closed protects (1) from producing a wrong NUMBER, but both items are correctness traps for the
      next maintainer of the single most load-bearing statistical constant in the firm. The prose in (2) is
      the more dangerous one because 'correcting' the code to match it inverts the safety direction.
    evidence: "honest_n.py:283 reads event=='honest-n-reconciliation'; offset file event=='honest-n-offset-record'; offset file key prose_only_attempts_offset; code reads record['prose_only_attempts']. My exec confirmed code returns 48 by counting ALL existing True ids, not post-record ids."
    recommended-action-class: clarify-spec
    owning-role: quant-developer  # align the offset-file field names with the canonical record AND fix the 'after this record' prose to 'all countable trial_ids in the ledger'

  - id: F-003
    severity: minor
    location: "tests/harness/test_honest_n_deflation.py — no test executes ==48 against the real ledger WITH the record appended"
    category: test-coverage-gap
    observation: >
      The only test that asserts ==48 on the real ledger SKIPS when the record is absent (its current
      state), so the real-ledger ==48 path is unexercised in CI today. The synthetic offset-arithmetic
      tests cover the mechanism, and I manually confirmed 48 on a record-appended copy, but no automated
      test pins the real-ledger 48 in the BLOCKED state.
    inference: >
      Once F-001 is resolved (record appended), the existing sacred test will activate and close this gap
      automatically. Until then there is a window where the load-bearing value is asserted only on fixtures.
      A test that constructs a record-appended COPY of the real ledger in a tmpdir and asserts ==48 would
      pin it independent of the live append state (I verified such a check passes).
    evidence: "test_returns_48_on_reconciled_ledger:86-90 pytest.skip when no reconciliation record; pytest output shows 1 skipped."
    recommended-action-class: add-test
    owning-role: quant-developer

  - id: F-004
    severity: observation
    location: "src/forex_system/harness/honest_n.py:284 baseline_offset = int(record['prose_only_attempts'])"
    category: correctness
    observation: >
      The offset is read with record['prose_only_attempts'] (hard key access, no .get default). If a
      reconciliation record is appended with the WRONG key name (the exact mismatch in F-002 item 1), this
      line raises KeyError rather than the descriptive RuntimeError. Observed, not inferred: it is a hard
      subscript inside the parse loop.
    inference: >
      A KeyError here is still fail-closed (no silent under-count), so safety holds, but the error would be
      less diagnostic than the curated RuntimeError. Low severity because the canonical record has the right key.
    evidence: "honest_n.py:284 record['prose_only_attempts'] — subscript, not .get."
    recommended-action-class: add-edge-case-handling
    owning-role: quant-developer

