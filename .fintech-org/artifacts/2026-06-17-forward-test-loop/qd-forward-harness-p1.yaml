# =============================================================================
# WHAT WAS BUILT
# =============================================================================

modules_created:
  - path: src/forex_system/harness/freeze.py
    description: >
      Records a cryptographic freeze anchor. Public API: freeze_structure(prereg_path,
      config_path, mechanism, custody, ...) -> FreezeRecord. Appends one 'freeze' record
      to .fintech-org/forward_registry.jsonl (open_count=0, burned=false). Full sha256
      hashes (wider than run_trial's [:12] short hashes): prereg_content_hash covers
      prereg.md || triggers.yaml bytes; code_config_hash covers the config YAML; git_sha
      is the full HEAD SHA. M1 hard-block: refuses M1 without a development_start_attestation
      predating dev start (ValueError, not VOID — the freeze is illegitimate by construction).
      Emits freeze.sealed and freeze.m1_blocked structured events.
    key_functions:
      - freeze_structure()
      - load_freeze_record()
      - load_freeze_record_with_state()
      - update_freeze_record_burned()
      - _full_config_hash()  # full sha256; wider than run_trial._config_hash[:12]
      - _full_git_sha()      # full SHA; wider than run_trial._git_hash(--short)
      - _prereg_content_hash()
      - _check_m1_eligibility()

  - path: src/forex_system/harness/forward_eval.py
    description: >
      Scores a frozen candidate on its forward window. Public API: forward_evaluate(
      freeze_id, forward_bars, pair, config_path, prereq_path, ...) -> ForwardResult.
      Steps: (1) load freeze record + assert not burned; (2) recompute content hashes,
      assert match or sys.exit(1) + print 'hash-match: OK'; (3) M2: assert all bar
      timestamps > freeze_utc or VOID; (4) score via run_backtest + RealisticCostModel;
      (5) compute net Sharpe, DSR at ic9_dsr_denominator(), concentration metrics;
      (6) evaluate frozen .triggers.yaml gates via parse_pre_registration (no hardcoded
      thresholds); (7) emit verdict + atomically burn window. Appends counts_toward=True
      trial to trials_registry (IC-7) on PASS, FAIL, and VOID-after-data. Does NOT write
      to the production .fintech-org/trials.jsonl when tests supply a custom trials_registry
      path, preventing test pollution of the ledger.
    verdict_states: [VALIDATED, FALSIFIED, INCONCLUSIVE_UNDERPOWERED, VOID]
    key_functions:
      - forward_evaluate()
      - _verify_integrity()
      - _assert_all_bars_post_freeze()
      - _evaluate_triggers()
      - _determine_verdict()
      - _record_trial_and_result()
      - _build_forward_cost_model()
      - _compute_concentration()

  - path: .fintech-org/forward_registry.jsonl
    description: >
      Append-only ledger. Created by freeze.py on first freeze. Three record kinds:
      'freeze' (anchor tuple, open_count=0, burned=false, custody),
      'freeze-update' (open_count=1, burned=true, written atomically by forward_eval),
      'forward-result' (verdict, net_sharpe, DSR, gate-by-gate results, realized N).
    status: not yet created (will be created on first freeze_structure() call)

# =============================================================================
# IC-1..IC-14 ENFORCEMENT MAPPING
# =============================================================================
# Code-fail-closed = the harness ABORTS / REFUSES / produces VOID in Python code.
# Procedural-with-CI-hook = cannot be enforced in Python alone; requires OS/CI.
# =============================================================================

ic_enforcement:
  IC-1_cryptographic-freeze:
    enforcement: code-fail-closed
    where: freeze.py::freeze_structure() — writes full anchor tuple (prereg_content_hash,
      code_config_hash, git_sha, freeze_utc) to forward_registry.jsonl BEFORE forward_eval
      is called. forward_eval.py REFUSES if no prior freeze record exists (IC-8 check).
    residual: >
      'pushed to origin before any forward bar' cannot be verified by Python reading a
      local .jsonl. Pushed-ness requires a CI hook (flagged as procedural residual per CTO spec).

  IC-2_forward-postdates-freeze:
    enforcement: code-fail-closed
    where: forward_eval.py::_assert_all_bars_post_freeze() — step 3; asserts every M2 bar
      timestamp > freeze_utc using pd.Timestamp comparison; single violation -> VOID.

  IC-3_result-cites-frozen-sha:
    enforcement: code-fail-closed (IC-14a)
    where: forward_eval.py::_verify_integrity() + step 2; recomputes prereg_content_hash +
      code_config_hash, compares to frozen values; on mismatch: sys.exit(1) + prints the
      mismatch detail to stderr. Prints 'hash-match: OK (git_sha=...)' on success. A result
      without that machine-printed line is INADMISSIBLE. git_sha is informational (M2 paper-
      forward expects commits after freeze); content hashes are the binding lock.

  IC-4_physically-sequestered-holdout:
    enforcement: code-fail-closed (reuse)
    where: existing run_trial.py / load_parquet holdout enforcement; the no-lookahead engine
      shift (entry_delay_bars) is preserved in forward_eval step 4.

  IC-5_holdout-access-enforced-not-just-logged:
    enforcement: procedural-with-CI-hook (UNMET until hook ships)
    where: >
      CANNOT be fail-closed in Python. Needs OS filesystem permissions gating the holdout
      file to the scoring harness only, OR a pre-commit/CI hook that greps codebase +
      notebooks for direct reads of the forward/holdout path and BLOCKS the commit. Per
      IC-14: IC-5 is UNMET until that hook exists. CTO owns the hook.
    test_hook: >
      Recommend CI step: grep -r 'forward_registry\|holdout' --include='*.py' --include='*.ipynb'
      | grep -v 'harness/freeze\|harness/forward_eval\|tests/' and fail on any match.

  IC-6_one-score-per-candidate:
    enforcement: code-fail-closed
    where: forward_eval.py step 1 — load_freeze_record_with_state() checks open_count==0
      and burned==False; raises RuntimeError on violation (hard abort before scoring).
      Step 7: update_freeze_record_burned() sets open_count=1 + burned=True atomically.

  IC-7_every-attempt-burns-N:
    enforcement: code-fail-closed
    where: forward_eval.py::_record_trial_and_result() — appends counts_toward_deflation_
      denominator=True on PASS, FAIL, AND VOID-after-data. VOID-after-data=True is set when
      forward_bars are already in scope at the time of the failure (step 3 M2 timestamp
      violation, or any exception after data_was_loaded=True).

  IC-8_no-quiet-attempts:
    enforcement: code-fail-closed (local existence check)
    where: forward_eval.py step 1 — load_freeze_record_with_state() raises FileNotFoundError/
      KeyError if no freeze record exists for freeze_id. Enforces 'no forward run without a
      prior freeze record'. Pushed-ness check requires CI (same residual as IC-1).

  IC-9_full-deflation-denominator:
    enforcement: code-fail-closed
    where: forward_eval.py step 5 — ic9_dsr_denominator(trials_path, is_search_family_size,
      forward_attempt_budget) computes org_wide_honest_N + IS-family + attempt-budget.
      org_wide_honest_N is sourced from honest_n_deflation_denominator() (ratified N=30).
      NEVER typed. Verified: honest_n_deflation_denominator() returns 30 on the current ledger.

  IC-10_net-of-conservative-cost:
    enforcement: code-fail-closed
    where: forward_eval.py::_build_forward_cost_model() — raises ConfigError if pair not in
      config cost coverage (EXCLUDE-not-impute). Uses RealisticCostModel. Cost config is part
      of code_config_hash so loosening post-freeze changes the hash -> VOID (IC-3).

  IC-11_pre-declared-gates-and-power:
    enforcement: code-fail-closed (gates); procedural (power calc origin)
    where: forward_eval.py step 6 — parse_pre_registration() loads frozen .triggers.yaml;
      _evaluate_triggers() evaluates ONLY those (no hardcoded thresholds, firewall A1).
      _extract_power_floor() finds metric='n_realized' / operator='<' trigger; realized N <
      floor -> INCONCLUSIVE_UNDERPOWERED (not FALSIFIED). DSR < 0.95 always -> FALSIFIED.
      Missing metric in metrics_map -> fail-closed (treat as fired).
    residual: >
      That the power floor came from an 80%-power calc is a research input; only the gate
      value in .triggers.yaml is machine-enforced.

  IC-12_forward-data-immutable-post-freeze:
    enforcement: code-fail-closed
    where: IC-3 hash check covers code_config_hash. A restatement touching the IS window
      would change code_config_hash or prereg_content_hash -> VOID. M1 holdout_content_hash
      is recorded in the freeze record (recomputed at open for M1). The is_data_hash field
      mentioned in the CTO spec is a P2 addition (not yet implemented); the current
      implementation covers the config+prereg binding (IC-3) but NOT a full IS-bar content
      hash. This is an HONEST GAP flagged below.

  IC-13_attempt-budget-pre-frozen:
    enforcement: partial-procedural
    where: ic9_dsr_denominator() includes forward_attempt_budget in the denominator. The
      discipline of declaring the budget before the first candidate spawn is procedural;
      forward_eval.py does not currently assert a budget-declaration record exists in
      trials.jsonl with ts < earliest freeze_utc (that CI check is a future P1.1 hardening).

  IC-14_mechanized-not-human-enforcement:
    enforcement: satisfied piecewise
    notes:
      - "(a) hash-mismatch abort: sys.exit(1) in forward_eval.py step 2 [code — DONE]"
      - "(b) reject hand-entered DSR denominator: ic9_dsr_denominator() mechanical [code — DONE]; pushed-freeze check needs CI [procedural residual]"
      - "(c) forward file OS-gated or CI-grep-blocked: IC-5 [procedural residual — UNMET until CI hook ships]"
      - "(d) honest-N recomputed from ledger: honest_n_deflation_denominator() replaces every typed literal [code — DONE; verified returns 30]"

# =============================================================================
# IC-9 DENOMINATOR VERIFICATION
# =============================================================================
ic9_honest_n_verification:
  function: honest_n_deflation_denominator(Path('.fintech-org/trials.jsonl'))
  verified_return_value: 30
  verified_by: "python3 -c 'from forex_system.harness.honest_n import honest_n_deflation_denominator; from pathlib import Path; print(honest_n_deflation_denominator(Path(\".fintech-org/trials.jsonl\")))'"
  output: "30"
  note: "NOT 48 (prior prose counter), NOT 49 (raw line count), NOT 11 (de-dup families). 30 is the ratified value per HoQR+NHT convergence 2026-06-18 (ceo-digest.jsonl DSR-DENOMINATOR-RECONCILED-CONVERGED)."

# =============================================================================
# HONEST GAPS (flagged, not buried)
# =============================================================================
honest_gaps:
  - id: GAP-1
    control: IC-12 IS-data content hash
    description: >
      The ML spec mentions is_data_hash (sha256 of the IS bar bytes the candidate was
      developed on). The current implementation records code_config_hash (config YAML)
      and prereg_content_hash (prereg + triggers) but NOT a hash of the actual IS bar
      bytes. A config-identical restatement of the IS window (changing bar values but
      not the config) would NOT be caught by IC-3 alone. Full IC-12 compliance requires
      computing sha256(is_bar_bytes) at freeze time and asserting equality at eval time.
      Deferred to P1.1: requires the data manifest ingest_time provenance (KG-5 / KG-CTO-2).
    severity: medium
    owner: quant-developer + cto (data manifest)

  - id: GAP-2
    control: IC-5 OS/CI gating
    description: >
      IC-5 (holdout unreadable during dev) is UNMET as a pure Python guarantee. The forward
      registry file is readable by any process in the dev environment. Per IC-14: until a
      pre-commit/CI hook blocks direct reads of the forward/holdout path, IC-5 is UNMET.
      CTO owns this as a procedural residual.
    severity: medium
    owner: cto

  - id: GAP-3
    control: IC-8 / IC-13 pushed-before ordering
    description: >
      The freeze record existence check (forward_eval step 1) verifies local existence.
      Whether the freeze was PUSHED to origin BEFORE the eval runs requires a CI job.
      Similarly, IC-13's attempt-budget-pre-frozen check requires a CI job comparing
      budget-declaration record timestamps to first-freeze timestamps. Both are procedural
      until CI is wired.
    severity: low
    owner: cto

