critic_pass_fixes:
  - finding: "Verdict priority inversion — INCONCLUSIVE checked before FALSIFIED."
    severity: real-important
    fix: >
      _determine_verdict() reordered: KILL gates (excluding the power-floor gate) and
      DSR<0.95 are evaluated FIRST (hard FALSIFIED); the power floor LAST (INCONCLUSIVE,
      M2 only). The min-events gate (power_floor_label) is excluded from the hard-kill
      loop so a short window routes to INCONCLUSIVE, not FALSIFIED — while a REAL KILL
      gate on a short window still FALSIFIES (NHT SD1 / no_gate_softening). Locked by
      3 new unit tests (test_verdict_*).
  - finding: "data_was_loaded=True set before cost-model build -> cost-coverage ConfigError over-counts N as VOID-after-data."
    severity: real
    fix: >
      data_was_loaded=True moved to AFTER cost model + strategy build succeed. A
      cost-coverage ConfigError (pre-data setup failure) now raises as a non-N-burning
      refuse, not VOID-after-data. The M2 timestamp guard still explicitly sets
      void_after_data=True (it inspects bar timestamps = sees the data; IC-7 correct).
  - finding: "test_ic9_uses_honest_n_30 reads production ledger via cwd-relative path."
    severity: brittleness
    fix: >
      Path anchored to repo root via _repo_root() (walks up to pyproject.toml).
      Documented as a DELIBERATE live-ledger pin: the ratified N=30 must not drift
      silently; intentionally coupled to the honest-n-classification record.

