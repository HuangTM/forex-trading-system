# =============================================================================
# WHAT WAS BUILT
# =============================================================================

counting_rule_implemented:
  mechanism: >
    honest_n_deflation_denominator() now reads a single 'honest-n-classification'
    record from the ledger. The record's counted_trial_ids list is the LEGACY
    classification (the ratified 30, signed by HoQR+NHT). For any trial_id present
    in the ledger but NOT in either the counted or excluded legacy lists, the function
    classifies mechanically (new trials appended after the record).
  legacy_classification: "30 explicitly enumerated trial_ids with per-trial reasons"
  forward_rule:
    COUNT_if:
      - "Distinct config that RAN and produced a sharpe/verdict (status ∈ {complete, passed, rejected})"
      - "Param/window variant with distinct config_hash"
      - "Ambiguous/unknown-status id whose non-draw is UNPROVABLE (SD2/IC-9 over-deflate)"
    DROP_if:
      - "spawned-only: status=spawned AND sharpe=null (never executed)"
      - "re-run-equivalent: same config_hash AND same sharpe as a prior counted id (config_hash+sharpe is load-bearing)"
      - "withdrawn-pre-freeze OR counts_toward_deflation_denominator==false (sticky)"
  no_integer_offset: true
  retired_path_deleted: true  # _RECONCILIATION_EVENT, prose_only_attempts fully removed

classification_record:
  mechanism: "Appended as a JSONL record (event: honest-n-classification) to .fintech-org/trials.jsonl"
  location: ".fintech-org/trials.jsonl (line 50, the last line)"
  format: "event, version, ratified_n, ratified_by, counted_trial_ids (30 entries with reasons), excluded_trial_ids (4 entries with reasons), n_legacy_classified, forward_classification, ts"
  honest_n_returns_30_verified: true  # EXECUTED: python3 -c "... print(h(Path('.fintech-org/trials.jsonl')))" -> 30

