    approach: >
      Replaced the two substring assertions ('n_deflation_denominator' in source and
      'n_trials=n_deflation_denominator' in source) with a full AST walk of dsr_recompute.py:
        Step 1 — collect all variable names assigned from compute_honest_n() calls
          (handles simple Name targets and tuple unpacking).
        Step 2 — for every compute_dsr(...) Call node, verify the n_trials keyword:
          (a) exists (mandatory argument);
          (b) its value Name.id is NOT in the set from step 1 (compute_honest_n result forbidden);
          (c) its value Name.id contains 'deflation_denominator' (required path).
      Two module-level helpers (_is_compute_honest_n_call, _collect_assigned_names) support the walk.
      This cannot be fooled by comments, string literals, or variable aliases that happen to
      contain the forbidden text without actually wiring it through to compute_dsr.
    rigor_parity_with_other_3_sites: >
      The other 3 sites (run_trial, run_falsification_trial, trial_48_is_eval) use
      _imports_compute_honest_n (AST import-graph walk) and _calls_compute_honest_n
      (substring check on call syntax — weaker but sufficient since those sites must not
      import or call compute_honest_n at all). For dsr_recompute.py, the check is
      necessarily different: the file legitimately imports and calls compute_honest_n
      for portfolio-view fields — the forbidden pattern is specifically wiring its result
      to compute_dsr's n_trials. The AST call-graph walk is the correct rigor level;
      substring parity is not applicable here (a 'n_trials=n_honest_portfolio' substring
      check would require knowing the exact variable name, which is a weaker guarantee
      than checking the AST assignment chain).
    test: "tests/harness/test_honest_n.py::TestForbiddance::test_compute_honest_n_not_used_at_dsr_sites[site_path3]"
