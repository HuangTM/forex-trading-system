        attribute-access form (honest_n.compute_honest_n(...)). FIXED: helper now also
        matches ast.Attribute with attr=='compute_honest_n'. Same for compute_dsr matching.
      gap_2_non_name_n_trials: >
        Original check skipped validation entirely when n_trials was a non-Name expression
        (inline call, subscript, attribute). FIXED: now (2) walks the n_trials subtree to
        forbid ANY compute_honest_n() call inline, and (4) uses ast.get_source_segment to
        require 'deflation_denominator' in the expression source for ALL node types — a
