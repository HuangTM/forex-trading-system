concerns:
  - id: C1
    item: "trial_48_is_eval historical verdict"
    detail: >
      The historical 'DSR=0.00 at N=48' verdict used the RETIRED denominator. N=48
      over-deflated relative to N=30 (DSR is monotone decreasing in N, so N=48 was
      too strict). The kill may change at N=30. This is documented in a comment in
      trial_48_is_eval.py and flagged to HoQR/NHT as a tracked follow-on per the CTO
      spec. The script now computes DSR at N=30 (the ratified value) — any re-run of
      the script will produce the N=30 result. The historical record is not silently
      re-graded.
    status: DOCUMENTED-FOLLOW-ON

  - id: C2
    item: "dsr_recompute.py output files on disk"
    detail: >
      Any existing .fintech-org/dsr_recompute_2026-06-01.jsonl was produced at n=11.
      A re-run will now produce results at n=30. The field in output rows was renamed
      from 'n_honest' to 'n_deflation_denominator'. Old output files are stale.
      Re-running dsr_recompute is HoQR/NHT's next step per existing CRO guidance.
    status: DOCUMENTED

  - id: C3
    item: "honest_n_offset.json"
    detail: >
      The CTO spec says to DELETE or archive honest_n_offset.json. The function no
      longer reads it (test verifies). The file itself has NOT been deleted from disk
      as it is a historical artifact and the CTO spec says 'DELETE or move to archive/'.
      This can be done by the CEO or CTO as a cleanup action.
    status: NOT-DELETED-YET

quick_critic_findings:
  - id: F1
    severity: high
    finding: "dsr_recompute.py Step-2 load loop did record['trial_id'] unconditionally — KeyError on the honest-n-classification record (a real regression I introduced by adding that record to the ledger)."
    resolution: "FIXED. Added trial_id = record.get('trial_id'); skip if None. Reproduced the KeyError, fixed it, re-ran recompute_all -> 20 rows OK, n_deflation_denominator=30."
    status: FIXED-AND-VERIFIED
  - id: F2
    severity: medium
    finding: "Docstring DROP rule said 'spawned/null-terminal' but code only drops status=='spawned'. exploratory+null-sharpe new trials fall through to COUNT."
    resolution: >
      Code behavior is CORRECT per CTO-spec finding (B): a broad 'null-sharpe => drop'
      over-drops the ambiguous-but-possible draws (frozen-pending-receipt, exploratory
      backfills) the firm COUNTS. Tightened the DOCSTRING to match the code. Added test
      test_new_exploratory_null_sharpe_counts_not_dropped_as_spawned.
    status: RESOLVED-DOC+TEST
  - id: F3
    severity: low
    finding: "Re-run detection between two NEW trials is order-dependent (first counts, second drops) — undocumented, untested."
    resolution: >
      Behavior is INTENDED (byte-equivalent re-run = no new max = drop; deterministic
      in ledger order). Documented in a code comment; added test
      test_two_new_trials_same_signature_first_counts_second_drops.
    status: RESOLVED-DOC+TEST
