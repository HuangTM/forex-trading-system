c2_fix:
  authored_by: quant-developer
  timestamp_utc: "2026-06-17T00:00:00Z"
  condition: C2 from principal-reviewer APPROVED-WITH-CONDITIONS

  field_name_fix:
    issue: >
      honest_n_offset.json used field names that do NOT match what honest_n.py
      actually parses. The file had 'event': 'honest-n-offset-record' and
      'prose_only_attempts_offset': 15. The code (_RECONCILIATION_EVENT, line 79)
      checks for event == 'honest-n-reconciliation' and reads record['prose_only_attempts']
      (line 284). A maintainer who treated honest_n_offset.json as the source of truth
      would produce a record the code silently ignores (raises RuntimeError instead).
    before:
      event_field: "honest-n-offset-record"
      offset_field: "prose_only_attempts_offset"
    after:
      event_field: "honest-n-reconciliation"
      offset_field: "prose_only_attempts"
    files_changed:
      - .fintech-org/honest_n_offset.json  # event + field name corrected
      - .fintech-org/artifacts/2026-06-17-forward-test-loop/qd-p0-honest-n.yaml  # this file, OA-1 detail
    no_code_change: >
      honest_n.py is NOT changed — the counting logic was certified correct by the
      Principal Reviewer. Only documentation artifacts are fixed.

  prose_fix:
    issue: >
      The reconciliation record's 'detail' string (in OA-1 record_to_append and in the
      python command) said: "count(distinct counts_toward==true trial_ids appended AFTER
      this record)". This is factually wrong. The code counts ALL True-classified distinct
      trial_ids in the ledger regardless of position relative to the reconciliation record,
      then adds the offset. The 33 already-countable records present BEFORE the reconciliation
      record are included in the 48 total (33 + 15 = 48). Saying "AFTER this record" would
      imply those 33 are not counted — the opposite of the actual behavior.
    before: >
      "...count(distinct counts_toward==true trial_ids appended AFTER this record).
      Prose counter RETIRED; ledger is authoritative."
    after: >
      "honest_n_deflation_denominator() = prose_only_attempts(15) + count(distinct
      trial_ids with counts_toward_deflation_denominator==true anywhere in the ledger,
      sticky-excluding any ever flagged false or status==withdrawn-pre-freeze). The code
      counts ALL True-classified distinct trial_ids regardless of position relative to this
      record, then adds the offset; the 33 already-countable records are subsumed in the
      48 total. Prose counter RETIRED; ledger is authoritative."
    files_changed:
      - .fintech-org/honest_n_offset.json  # post_reconciliation_invariant rewritten
      - .fintech-org/artifacts/2026-06-17-forward-test-loop/qd-p0-honest-n.yaml  # OA-1 detail + python command

