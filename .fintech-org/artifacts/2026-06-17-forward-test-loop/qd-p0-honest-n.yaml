# =============================================================================
# 1. MECHANICAL RULE IMPLEMENTED
# =============================================================================
mechanical_rule_implemented:
  function: honest_n_deflation_denominator(trials_path: Path) -> int
  module: src/forex_system/harness/honest_n.py
  algorithm:
    step_1: >
      Parse JSONL. Skip records where trial_id is absent (e.g. the reconciliation
      metadata record with event=honest-n-reconciliation).
    step_2: >
      Collapse by trial_id (last-wins) — one slot per DISTINCT trial_id, never per line.
      Kills the 49-raw-line-count bug.
    step_3: >
      Classify each distinct trial_id:
        counts=False: counts_toward_deflation_denominator is explicitly False,
                      OR status == 'withdrawn-pre-freeze'
        counts=True:  everything else, INCLUDING unknown/ambiguous status.
        SD2 rule: when ambiguous, COUNT IT (over-deflate, never under-deflate).
    step_4: >
      Read baseline_offset from the 'honest-n-reconciliation' record in the ledger.
      Raises RuntimeError if absent (fail-closed).
    step_5: "n = baseline_offset + count(True-classified distinct trial_ids)"
    step_6: >
      Emit honest_n.computed structured event with n, baseline_offset,
      countable_distinct, excluded_distinct, source, git_sha, ts.
  helper_function: ic9_dsr_denominator(trials_path, is_search_family_size, forward_attempt_budget) -> int
    description: >
      Full IC-9 denominator = org_wide_honest_N + is_search_family_size + forward_attempt_budget.
      Use this for forward evaluations; honest_n_deflation_denominator alone covers org-wide N.

  also_fixed:
    - >
      compute_honest_n() else-branch (honest_n.py:179-188): previously silently dropped
      unknown-status rows. Now explicitly logs them without silently discarding (NHT D5 fix).
      This does NOT change compute_honest_n's return value for the de-dup 11-view —
      unknown-status rows were not in RETAIN_STATUSES before and still aren't.

