kill_switch: >
  Five-part machine-checkable design (per kill-switch-design skill). (a) Pre-trade max-spread gate:
  out-of-band check reads live spread before every order; reject if > 4.0 pips, auto-flatten + halt strategy
  if > 8.0 pips. (b) Max-order-rate cap: <= N orders/min hard-coded (intraday 1h-class should emit far below
  one order/min; set N=3 as a runaway tripwire). (c) Drawdown circuit-breaker: auto-halt on -3R/20-trade or
  -8% peak-to-trough. (d) Heartbeat / dead-man: if the market-data feed or the risk-check heartbeat is silent
  > 60s, order routing auto-halts (no stale-data trading across the 348 gaps). (e) Per-strategy manual kill,
  one command, out-of-band from the strategy process, operable by the most-junior on the desk, < 1s to stop
  new orders / < 5s to cancel outstanding. Every invocation emits a structured decision-trace log
  (who/why/what/time-to-effect). Paper-only now, but the switch must be the SAME mechanism that would run live;
  test it on a schedule against a live paper session and record to .fintech-org/kill-switch-tests.jsonl.
drawdown_contract: >
  Machine-checkable, evaluated every closed trade and every bar-mark. Per-strategy: HALT at rolling-20-trade
  realized loss <= -3R OR peak-to-trough paper-equity drawdown <= -8%. Soft de-risk (size_multiplier -> 0.5 of
  current) at -2R/20-trade or -5% peak-to-trough. R is defined at pre-registration as the per-trade stop in pips
  * declared size. Breach => auto-halt + alert + mandatory CRO review before re-enable; no discretionary override
  of an auto-halt. Drawdown is computed on a monotonic equity timestamp (exchange/bar close time, tz-explicit UTC),
  never wall-clock, to stay consistent across the weekend gaps.
tail_risk: >
  Use Expected Shortfall (ES 97.5%), not VaR-only (per quantitative-risk-management Decision 1; FRTB anchor).
  Per-bar range has a fat right tail: mean 13.9 pips but p99 55.4 pips (~4x the mean), and spread itself tails to
  40.7 pips. A Gaussian tail is INADMISSIBLE here (excess kurtosis evident from p99/median ratio); estimate ES by
  historical simulation over the 2021-2025 window (covers the 2022 vol regime) or POT/EVT on per-trade P&L
  exceedances. The binding tail event is a spread-spike + adverse-range bar coinciding with a stop: a 55-pip
  adverse move against a 6-pip gross target is a ~9R single-bar loss. Liquidity-horizon: the relevant exit horizon
  is sub-day for entries but JUMPS to multi-day for any position caught in a weekend gap (max 3 days) -- ES must be
  computed at BOTH horizons, not a single blended one. ES backtest: >=250 obs, Acerbi-Szekely Z1/Z2, out-of-sample
  on the holdout.
blowup-analog: >
  Knight Capital (Aug 1, 2012) for the kill-switch/runaway-order class: an automated strategy with an inadequate
  out-of-band stop is the failure mode the max-order-rate cap + dead-man heartbeat here defend against. Secondary
  analog for the cost/edge thesis: classic retail intraday-scalp failure -- a real signal whose gross edge is
  smaller than the realistic round-trip + thin-session spread tail, bleeding to zero via costs that the modeled
  1.5/side config hid.
