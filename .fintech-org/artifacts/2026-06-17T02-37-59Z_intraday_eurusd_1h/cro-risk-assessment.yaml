body: |
  RISK REASONING (structured inputs only).

  1) COST AT 1h FREQUENCY. The config models 1.5 pips/side -> 3.0 round-trip. The EMPIRICAL spread median
     alone is 2.0 pips (mean 2.44, std 1.98). The config's 0.5-pip spread component is therefore ~4x optimistic.
     A defensible realistic round-trip = empirical spread crossed entry+exit + slippage + commission ~= 6.0 pips.
     As a fraction of the median hourly range (11.1 pips): modeled 3.0 = 27%; realistic 6.0 = 54%. Against a
     "typical intraday target" (say one median range, ~11 pips), realistic cost eats >50% of the move. This is a
     THIN-edge instrument at 1h: cost is the dominant adversary, not direction. The cost_model_validation
     hard-constraint is therefore load-bearing -- a backtest run on 1.5/side is VOID.

  2) MIN GROSS EDGE. To net positive after ~6 pips realistic round-trip, a 1h strategy must capture >= 6 pips
     GROSS per trade just to break even, and materially more to clear a confirmability bar in <=3yr at realistic
     trade counts. I set min_gross_edge_pips = 6.0 as the floor and require the researcher to show edge survives
     this on the OOS holdout. size_multiplier recommendation: 0.25 ceiling on any proposed sizing at design stage
     (low vol + thin edge + fat cost tail => do not let a researcher size to full risk budget on unproven edge).

  3) SWAP / ROLLOVER. Long carry is -1.2 pips/day, short is +0.3 pips/day. A long held across the 21:00 UTC
     rollover loses 1.2 pips/day -- ~20% of the entire min gross edge per overnight. Across a weekend that is
     typically 3 rollover charges (~3.6 pips for a long) plus unhedgeable gap risk through up to a 3-day close
     (348 observed gaps). Any candidate that holds across rollover or weekend MUST price carry into the
     pre-registered edge or it is mis-stated. A long-biased intraday strategy that drifts into overnight holds is
     structurally penalized; a short-biased one is mildly subsidized but still gap-exposed.

  4) SESSION-SPECIFIC COST VARIANCE. Spread spikes to 40.7 pips (std 1.98 on a 2.0 median => fat right tail).
     These concentrate at low-liquidity boundaries: the 20:00-05:00 UTC window (range only 6-10 pips, so cost-to-
     range is worst), the 21:00 UTC daily rollover, and the Friday-close / Sunday-reopen gap. The 12-15 UTC window
     (range 21-25 pips) is where edge is most achievable relative to cost. REQUIRED gate: pre-trade max-spread
     check rejecting any entry with live spread > 4.0 pips (2x median), hard halt + flatten > 8.0 pips; and a
     session restriction to 06:00-19:00 UTC unless the strategy explicitly models the thin-session tail.

  5) DRAWDOWN CONTRACT + KILL SWITCH. See drawdown_contract and kill_switch fields. Both are machine-checkable and
     evaluated automatically; auto-halts are non-overridable without CRO review. The kill switch carries all five
     properties (out-of-band, junior-operable, <1s/<5s SLA, prod-tested-on-schedule, observable/attributable) plus
     the automated pre-trade caps and a 60s dead-man heartbeat so the system never trades stale data across the
     gaps. Timestamps are UTC-explicit and bar-close/exchange-time sourced (clock-and-ordering): drawdown and gap
     logic on wall-clock would mis-order events around the 21:00 rollover and weekend reopen.

  6) TAIL RISK (ES, not VaR). See tail_risk field. Fat right tail (p99 range 55.4 vs median 11.1; spread to 40.7)
     makes Gaussian VaR inadmissible. Use ES 97.5% by historical simulation / POT, at BOTH the intraday and the
     weekend-gap (multi-day) liquidity horizon, backtested out-of-sample with Acerbi-Szekely. The worst single-bar
     scenario -- a 55-pip adverse range with a spread spike hitting a stop -- is ~9R against a 6-pip target and is
     the event the drawdown circuit-breaker and max-spread halt exist to bound.

  DECISION: size-reduced (0.25 ceiling), NOT approve. The instrument is tradeable intraday in principle but the
  cost-to-vol ratio is hostile and the config cost is ~2x optimistic. Approval to full size requires: (i) backtest
  re-parameterized to ~6-pip realistic round-trip, (ii) pre-registered gross edge >= 6 pips surviving on the
  one-shot OOS holdout, (iii) carry priced for any overnight/weekend hold, (iv) the max-spread gate + drawdown
  circuit-breaker + dead-man heartbeat implemented and testable. Absent a declared per-trade stop (needed to
  define R), escalate to veto rather than size-reduced.
