body: |
  RECONCILIATION.

  Two things I got right and one I under-weighted.

  Right #1 — A2 is a cost trap on EXPECTANCY. Nothing in the typed positions
  rebuts this; CRO independently quantifies it harder than I did (54% of median
  hourly range eaten by round-trip cost, 40.7-pip spike in the exact window A2
  trades). I HOLD the TRAP rating as a prediction of the modal outcome.

  Right #2 — A1/A3 are the confirmable arms, and they need infra. QD confirms
  session-filter is ABSENT and A1-ORB needs intrabar. So A1/A3 cannot be trial 48
  without a build. That hasn't changed.

  Under-weighted — the falsification economics. QR's framing is correct and I was
  treating "I predict it dies" as a reason NOT to run it. That's backwards. A
  cost-aware A2 is the ONLY candidate that is dispatchable with zero new infra
  (QD: discrete close-to-close = GO now), it carries a hard pre-declared KILL
  gate (avg-net <= 0 @ P90), and I VERIFIED the one engine bug that could have
  poisoned the result — the 24x swap overcharge at engine.py:316 — lives in the
  CONTINUOUS path and does NOT touch A2's discrete single-bar path. So A2 can be
  run cleanly TODAY and will produce a trustworthy result. A clean, archived,
  cost-honest KILL of an overnight-MR thesis is a real research output, not a
  wasted trial — it closes an archetype with evidence instead of an opinion.

  So why approve-with-capacity-limit and not plain approve of QR's plan?

  Because the failure mode here is NOT "running A2." It is "running A2 and
  STOPPING." If trial 48 is A2, it dies, and the firm books that as "intraday
  explored," we will have spent the cycle proving the one thing I already
  predicted while leaving the two confirmable arms untouched behind an infra wall
  that never gets built. The capacity limit is therefore: A2 is approved as a
  bounded falsification probe ONLY IF the swap-fix + session-filter build is
  funded IN PARALLEL so that A1 (or A3) is pre-registerable as trial 49 the
  moment A2 resolves. A2's KILL must not be the terminal node.

  On CRO's VETO and session gate: I adopt both as A2 pre-registration constraints
  rather than treating them as blockers. Declare the single-bar close-to-close as
  an explicit time-stop (satisfies "per-trade stop"). Apply the >4-pip max-spread
  reject. Critically, that gate mechanically excludes A2's own 02:00–05:00 spike
  window — which means the honest version of A2 can only trade the cost-clean
  subset of overnight bars. If that subset is empty or trades <30 times, A2 KILLs
  on structure, not on edge, and that is itself the cleanest possible
  falsification: "this archetype cannot be traded net of realistic spread." Pre-
  register that as a named KILL branch so the result is unambiguous either way.

  RECOMMENDED FIRST MOVE = option 3, sequenced-parallel:
    NOW:   pre-register A2 cost-aware (QR's spec + CRO's stop/spread gates +
           the explicit empty-subset KILL branch), freeze, run once as trial 48.
    PARALLEL: QD ships swap one-liner (engine.py:316) + session-filter small
           build, unit-tested against the sacred no-lookahead test.
    NEXT:  on A2 resolution (modal: KILL, archived), pre-register A1 or A3 as
           trial 49 on the now-ready session-filtered engine.

  Net: CONVERGE with QR on dispatching A2 now and on accepting a clean KILL as a
  valid use of trial 48 — it is genuinely the cheapest path to a real
  falsification-archive entry, and I verified it can be run without the swap bug
  contaminating it. I HOLD the TRAP rating as the predicted outcome and REVISE my
  recommendation to bind A2's run to a parallel infra commitment so the cycle
  ends with the confirmable arm loaded, not with the trap merely confirmed dead.
