  - "RESOLVED: periods_per_year at 1h is the firm constant 6240 (constants.py:41, metrics.py:30-31), not the 5200 a prior draft used. The annualized DSR hurdle is invariant to this (re-derived identical at both factors), so it is NOT a hurdle-arithmetic risk. Residual gap: QD must confirm calculate_metrics applies 6240 end-to-end on the real EURUSD 1h series."
  - "Published intraday-FX anomaly decay rates (how fast London-open momentum has been arbed out) -- needed to quantify A1's non-stationarity kill-risk. Emitted as a RESEARCH_REQUEST below; I did NOT call WebSearch/WebFetch myself."
  - "Whether the prior 2026-05-30 ORB pre-registration is liftable verbatim onto real EURUSD 1h data or needs re-parameterization for actual (vs assumed) session-open spreads."
  - "Session-by-session realized spread (Asia vs London vs NY) on this specific Dukascopy feed -- CRO to quantify; load-bearing for A1's true per-event IR."
