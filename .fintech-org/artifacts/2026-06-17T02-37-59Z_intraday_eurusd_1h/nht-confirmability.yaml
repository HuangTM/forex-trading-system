claim-tested: "A single-pair EURUSD 1h intraday trading edge can be FORWARD-CONFIRMED (out-of-sample, DSR>0.95 under org-wide N) within <=3 years of observation, given only the available 5-year (2021-2025) EURUSD 1h dataset and the firm's current org-wide trial count of 47."
confirmability-verdict: STRETCH
tests-requested:
  - name: matched-random-benchmark
    spec: >-
      Generate K>=1000 random strategies with the SAME structural footprint as the candidate
      (same #parameters, same session-window granularity, same trade frequency band, same
      holding-period distribution) over the IS window. Report the empirical distribution of
      annualized Sharpe. Candidate must beat the 95th percentile of this matched-random null,
      NOT a zero-Sharpe null. This sets the honest DSR benchmark instead of the nominal N=48.
  - name: session-label-permutation
    spec: >-
      Hold the price path fixed; randomly permute the session/hour labels that gate entries
      (e.g., shuffle which UTC hour is 'London open'). Re-evaluate the candidate's edge under
      M>=1000 permutations. If the edge survives label permutation, the 'session structure'
      is not the source of alpha and the candidate is mis-specified / data-snooped. p-value =
      fraction of permutations >= observed.
  - name: oos-decay-walkforward
    spec: >-
      Anchored walk-forward: fit on expanding IS, evaluate on the next contiguous OOS block;
      slide. Plot OOS Sharpe vs fold. Require monotone-or-flat (no cliff) and that the
      pooled true-OOS Sharpe (last untouched 3yr-equivalent, embargoed >=24h around the
      IS/OOS boundary to kill 1h autocorrelation leakage) exceeds the matched-random + DSR
      floor. One-shot holdout: the final OOS slice may be scored ONCE.
  - name: block-bootstrap-overlapping-returns
    spec: >-
      Stationary/circular block bootstrap on the 1h PnL series with block length L tuned to
      the empirical return autocorrelation decay (L ~ 24-72 bars given intraday persistence;
      do NOT assume iid hourly returns). B>=5000 resamples. Report bootstrap CI on annualized
      Sharpe; the lower 5% bound must exceed the DSR benchmark, not just the point estimate.
  - name: cost-stress-grid
    spec: >-
      Re-run candidate across a round-trip cost grid {3,4,5,6,7} pips and a slippage shock.
      Report the cost level at which net Sharpe crosses zero. If breakeven is below ~5 pips
      (the empirical realistic round-trip), the edge is cost-fragile -> downgrade to TRAP.
