body: |
  PRIOR: every claimed edge is noise until evidence shifts it. I assess the CONFIRMABILITY
  CEILING analytically; I do not run code (forbidden). All numbers are order-of-magnitude
  ceilings, specified so quant-developer can falsify a concrete candidate later.

  1) DSR FLOOR (the binding wall). DSR>0.95 is NOT "beat zero Sharpe." With N~=48 trials the
     null's expected MAX Sharpe deflates the bar to ~1.4-1.6 annualized SR over a 3yr OOS
     (math in dsr-assessment: bracket 2.26 * SE_SR 0.61-0.71). Mapping to per-trade economics via
     SR_annual = per_trade_IR * sqrt(trades/yr): a single 1h pair can plausibly trade
     ~250-1000 cost-surviving times/yr at a net per-trade IR ~0.03-0.07. The product lands
     RIGHT AT or just below the floor -- you need the optimistic corner (per-trade IR ~0.07 at
     ~500 trades or ~0.05 at ~1000 trades). Achievable in principle, not comfortably. => STRETCH.

  2) EFFECTIVE-N IS THE REAL THREAT. A single 1h pair is a multiple-testing minefield: ~10^3-10^4
     implicit configs (session x threshold x lookback x filter). If searched and the winner is
     reported, honest N -> thousands, the null-max benchmark -> ~2.3+ SR, and the claim collapses
     to TRAP. The ONLY way N legitimately stays ~48 is hard PRE-REGISTRATION of a single structure
     before the OOS holdout is touched. This is the load-bearing precondition; the claim is
     confirmable ONLY under it.

  3) COST WALL. Round-trip ~4-5 pips against a median 11.1-pip hourly range means any signal whose
     expected favorable excursion is < ~5 pips is cost-dominated. Crudely, signals targeting the
     median single-bar move keep <~55% of gross as net; sub-median targets go net-negative.
     This (a) prunes the tradeable signal set sharply and (b) RAISES the per-trade edge needed,
     because cost eats a fixed ~4-5 pips regardless of edge. It does not make confirmation
     impossible -- vol-expansion / session-open setups target the p90+ range (>30 pips) where
     a 5-pip cost is ~15% drag -- but it caps the usable trade frequency, which is exactly the
     lever that feeds sqrt(trades/yr). Net: the cost wall is why this is STRETCH and not CONFIRMABLE.

  4) WHY STILL "SURVIVES" / STRETCH (calibration, not reflexive negativity). The standing
     dataset-wall finding floored DAILY-pair research at 3-5yr forward horizons because daily bars
     give ~250 obs/yr and a handful of events. A 1h pair gives ~5,200 bars/yr and 10-40x more
     trade opportunities. That extra frequency is precisely what shrinks SE_SR and shortens the
     confirmation horizon: a real per-trade IR of ~0.06 at ~600 trades/yr = ~1.47 annualized SR,
     confirmable in ~2-3yr OOS -- BELOW the daily wall's 3-5yr. So the honest verdict is:
     STRETCH, but STRICTLY BETTER than the daily dataset wall, AND gated on pre-registration.
     I therefore record decision=survives (the claim is not noise-indistinguishable at the design
     level) with confirmability-verdict=STRETCH.

  5) FALSIFICATION PLAN (route to quant-developer when a candidate exists). The five tests above
     form an AND-gate: matched-random benchmark (real null, not zero) -> session-label permutation
     (is the alpha actually session-structural?) -> embargoed walk-forward OOS-decay (one-shot
     holdout) -> overlapping-return block bootstrap (lower-5% CI must clear the DSR floor) ->
     cost-stress grid (breakeven must exceed ~5 pips). A candidate must pass ALL to upgrade
     STRETCH->CONFIRMABLE. Any single failure, or any evidence of post-hoc config search, => TRAP.

  BOTTOM LINE: The claim as stated is CONFIRMABLE-CONDITIONAL: confirmable within <=3yr ONLY IF
  (i) the structure is pre-registered so N stays ~48, and (ii) the candidate clears net annualized
  Sharpe ~1.6 over the embargoed OOS (per-trade IR ~0.07 @ ~500/yr or ~0.05 @ ~1000/yr). Absent
  pre-registration, effective N ~10^3 makes it a TRAP. Standalone verdict: STRETCH (better than the
  daily wall, not a free pass).
