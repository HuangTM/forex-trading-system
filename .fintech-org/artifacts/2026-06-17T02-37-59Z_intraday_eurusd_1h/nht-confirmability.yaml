matched-benchmark-sharpe: >-
  Expected: a structure-matched random ensemble on a single 1h pair will produce a 95th-percentile
  annualized Sharpe of roughly 0.9-1.4 over a 3yr OOS, driven entirely by the breadth of the
  honest config search (session windows x thresholds x lookbacks). Any candidate not clearing
  this band is noise-indistinguishable. This is the real null, far above zero.
permutation-results: >-
  Expected: for a genuine intraday session edge (e.g., London/NY-open volatility expansion),
  session-label permutation should DESTROY the edge (p<0.05), because the alpha is structurally
  tied to specific clock hours. A candidate whose edge SURVIVES label permutation is almost
  certainly fitting price autocorrelation / overlapping-window artifacts, not session structure.
dsr-assessment: >-
  DSR>0.95 at N~=48 requires the OOS Sharpe to clear a multiple-testing floor, not zero.
  Expected-max Sharpe under the null for N independent trials (Bailey/Lopez de Prado):
  E[max] ~= SE_SR * [(1-g)*Z^-1(1-1/N) + g*Z^-1(1-1/(N e))], g=0.5772.
  At N=48: Z^-1(1-1/48)=Z^-1(0.9792)~=2.04; Z^-1(1-1/(48e))=Z^-1(0.99234)~=2.425;
  bracket ~= 0.4228*2.04 + 0.5772*2.425 ~= 2.26.
  SE of an annualized Sharpe over a 3yr OOS (T_years=3): SE_SR ~= sqrt((1+0.5*SR^2)/T_years).
  For modest SR~1, SE_SR ~= sqrt(1.5/3) ~= 0.707; the null-max benchmark ~= 2.26*0.707 ~= 1.60
  annualized SR. For SR~0.5, SE_SR ~= sqrt(1.125/3)~=0.612 -> benchmark ~= 1.38.
  So DSR>0.95 effectively demands an OOS ANNUALIZED Sharpe in the ~1.4-1.6 band PLUS a further
  ~1.645*SE margin to push PSR past 0.95: PSR = Phi[(SR_oos - SR_bench)*sqrt(n_obs-1)/sqrt(1-skew*SR+(kurt-1)/4*SR^2)].
  Mapping to per-trade economics: required IS Sharpe is set by
  SR_annual = (edge_per_trade / sigma_per_trade) * sqrt(trades_per_year).
  With ~5,200 tradeable hours/yr but realistic intraday strategies trading ~1-4x/day after the
  cost wall (~250-1000 trades/yr), and net edge/vol per trade ~0.03-0.06, even a per-trade
  IR of 0.05 * sqrt(500) ~= 1.12 annualized -- BELOW the ~1.4-1.6 DSR floor. To clear it you
  need either per-trade IR ~0.07 at ~500 trades/yr (0.07*sqrt(500)=1.57) or ~1000 clean
  trades/yr at IR ~0.05 (1.58). Both are at the optimistic edge of what a single 1h pair
  plausibly delivers net of cost. Hence STRETCH, not CONFIRMABLE -- but materially MORE
  reachable than the daily-pair wall, because trades/year is ~10-40x higher than daily strategies.
effective-trial-count-note: >-
  The nominal denominator is 47 (-> 48 for the next trial), but an HONEST N for a single 1h pair
  is far larger once the search space is counted. Session windows (~6-12 candidate hour-blocks)
  x entry/exit thresholds (~5-10 levels) x lookbacks (~5-10) x direction/filter toggles (~2-4)
  yields a config space of ~10^3-10^4 implicitly-tested specs. If the proposer searches that grid
  and reports the winner, the EFFECTIVE N is in the thousands, not 48. At N_eff=2000:
  Z^-1(1-1/2000)=Z^-1(0.9995)~=3.29, pushing the null-max benchmark from ~1.6 to ~2.3+ annualized
  SR -- which a single-pair intraday edge essentially cannot reach. CONFIRMABILITY THEREFORE
  HINGES ON PRE-REGISTRATION: the candidate must be specified (session, threshold, lookback frozen)
  BEFORE touching the OOS holdout, so N legitimately stays ~48 rather than ~10^3. Unregistered
  config search collapses the claim to TRAP. This is the load-bearing condition.
flip-threshold: >-
  STRETCH -> CONFIRMABLE flips when, under PRE-REGISTERED single-structure (N stays ~48):
  events/yr * per-event-Sharpe clears the DSR floor over a 3yr OOS, i.e.
  sqrt(events_per_yr) * per_event_IR >= ~1.6 (the N=48, SR~1 benchmark).
  Concrete crossing points: (a) >=500 clean (cost-surviving) trades/yr at per-trade IR >=0.072;
  (b) >=1000 trades/yr at per-trade IR >=0.051; (c) >=250 trades/yr at per-trade IR >=0.101.
  Equivalently a sustained net annualized Sharpe >= ~1.6 held across the full embargoed 3yr OOS.
  Below per-trade IR ~0.05 at <500 trades/yr, the claim is noise-indistinguishable.
