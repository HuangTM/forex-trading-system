  - "WIN/LOSS MAGNITUDE DECOMPOSITION (primary discriminator): on the 232 IS trades, partition by GROSS sign (gross_pips = pnl_pips + cost_pips). Report: n_gross_win, n_gross_loss; mean GROSS-win pips, mean GROSS-loss pips, median of each; the 5 largest gross losses (pips + UTC timestamp); and the gross-loss tail share = (sum of worst 5 gross losses) / (sum of all gross losses). PREDICTION under (a) clean falsification: ~128 wins of small magnitude (mean gross-win a few pips, capped near the single-bar reversion range ~5-10 pips) vs ~104 losses dominated by a handful of large continuation tails (mean |gross-loss| materially larger; the skew -8.16 / excess-kurtosis 571 must be sourced from <=5 catastrophic trades). If instead magnitudes are SYMMETRIC with a 55% win rate yet net is deeply negative, that is the signature of a mis-scaled/mis-signed PnL and must be escalated."
  - "SIGN-FLIP CONTROL (continuation strategy): re-run the IDENTICAL harness (same session filter, same 2σ gate, same 232 entry bars, same 7.5-pip cost, same single-bar hold, entry_delay_bars=1) but EMIT THE OPPOSITE SIGN (signal = +1.0 on r_t>=+2σ, -1.0 on r_t<=-2σ — momentum/continuation instead of fade). Report: net Sharpe, avg net trade pips, gross avg pips, hit-rate. INTERPRETATION: if the continuation variant is GROSS-positive and the fade is GROSS-positive too they cannot both be — confirm the gross averages are sign-mirrored (fade gross +X => continuation gross -X) which PROVES the engine sign is wired correctly and the fade direction is the genuine economic choice. If the continuation variant were STRONGLY net-positive it would mean MR is simply the wrong direction for this window (still a valid H0 falsification, characterize as 'sign-of-edge wrong-for-window'); given fade gross is mildly +3.41 pips/trade we EXPECT continuation to be gross-negative and also a net KILL — i.e. cost dominates BOTH and the 7.5-pip drag is the binding constraint."
  - "MATCHED-RANDOM BENCHMARK (cost-floor control): generate K=1000 random-entry strategies that each pick 232 entry bars uniformly from the IS session-hours universe (UTC {02,03,04,05}, post-gap-removal), random long/short, single-bar hold, same 7.5-pip cost. Report the distribution of avg net trade pips and net Sharpe (mean, 5th/95th pct). INTERPRETATION: this isolates how much of the -4.09 net / -5.1 Sharpe is just the mechanical 7.5-pip cost drag any single-bar EURUSD overnight strategy pays on ~14-pip ranges. If random-entry avg net is ~ -7.5 pips (full cost, ~0 gross edge) and trial-48 fade is -4.09 (i.e. ~3.4 pips BETTER than random), that CONFIRMS the fade has a real but cost-insufficient gross edge — a clean, well-characterized falsification, not a bug. If trial-48 fade were WORSE than matched-random, the fade direction would be actively harmful and warrant a sign re-audit."
hit_rate_vs_sharpe_reconciliation: >
  No contradiction; the two numbers are arithmetically consistent and jointly DIAGNOSTIC of a
  clean falsification. Decompose the net-per-trade identity from the code:
  pnl_pips = price_diff_pips - 7.5 (cost), and gross = pnl_pips + cost = price_diff_pips
  (trial_48_is_eval.py:188). Given avg net = -4.09 pips, the avg GROSS fade capture is
  -4.09 + 7.5 = +3.41 pips/trade. So the fade IS gross-positive (+3.41 pips) and directionally
  correct 55.2% of the time — BOTH true — yet +3.41 gross is less than half the 7.5-pip
  round-trip cost, so every trade nets -4.09 on average. A 55% hit-rate with a small positive
  gross mean is exactly the "win-small" leg of the predicted asymmetry; the deeply negative
  -5.1 Sharpe is driven by the OTHER leg: skew -8.16 and excess-kurtosis 571 mean a tiny number
  of 2σ moves were INFORMATION-DRIVEN CONTINUATION that ran far against the fade (the
  "occasionally crushed" tail the pre-registration explicitly forecast). Sharpe is computed on
  21,209 per-bar equity returns annualized at ppy=6240 (engine equity_curve, NOT per-trade), so
  a per-trade mean of -4.09 pips on a tiny ~0.25-sized book, combined with fat left-tail
  variance, annualizes to a large-magnitude negative ratio. This is the canonical signature of
  case (a) — fade captures many small reversions, loses big on the rare real-information move —
  NOT case (b). A sign error would manifest as gross-NEGATIVE average with hit-rate BELOW 0.50;
  here gross is +3.41 and hit-rate is 0.5517, so the sign is right and the kill is on ECONOMICS.
dsr-assessment: >
  DSR = 0.0000 is the CORRECT deflation verdict and is, if anything, over-determined.
  compute_dsr() canonically returns 0.0 for any non-positive Sharpe (a negative observed Sharpe
  cannot certify against ANY benchmark, let alone an N=48 multiple-testing-inflated one), and the
  CPCV input Sharpe is -4.93 — strongly negative — so DSR pins at 0.0 BEFORE skew/kurtosis even
  matter. Note the skew -8.16 / excess-kurtosis 571 would only PENALIZE the Sharpe further under
  the Lopez de Prado adjustment (heavy left tail inflates the Sharpe estimator's standard error,
  lowering DSR), so they reinforce rather than rescue. There is no scenario at N=48 where a
  -4.93 CPCV Sharpe clears 0.95. The N=48 count is independently corroborated (trials.jsonl =
  47 lines + this trial; frozen-DoF singular structure keeps effective-N at the trial count, no
  grid inflation). KILL-1 firing is mathematically forced and correct.
