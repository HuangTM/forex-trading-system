body: |
  ## Verdict: SURVIVES the null test — the KILL is a CLEAN falsification, not a bug.

  My prior was that the negative result could be a sign/scaling artifact (a spurious
  negative is as wrong as a spurious positive). I read the strategy, the engine PnL math,
  the cost model, and the eval driver. The sign convention is VERIFIED CORRECT at every
  hop (fade direction in overnight_mr.py:161-165; np.sign + (exit-entry)*position in
  engine.py:142,563; entry_delay_bars=1 no-lookahead at engine.py:139). The kill rests on
  net economics that the code computes correctly.

  ## The central tension is resolved arithmetically, in favor of (a).
  55% hit-rate AND -5.1 Sharpe are consistent, not contradictory:
    avg GROSS fade capture = avg_net + cost = -4.09 + 7.5 = +3.41 pips/trade.
  The fade is gross-POSITIVE and directionally right 55% of the time (the "win-small"
  leg) — but +3.41 gross is under half the 7.5-pip cost, so net is -4.09/trade. The deeply
  negative Sharpe comes from skew -8.16 / excess-kurtosis 571: a handful of 2σ moves were
  information-driven CONTINUATION that ran far against the fade (the "lose-big" tail the
  pre-registration explicitly predicted). This is precisely case (a): a fade that captures
  many small reversions and is occasionally crushed by the real-information tail. A sign
  error would show gross-NEGATIVE average with hit-rate < 0.50 — the opposite of what we see.

  ## One structured-fact correction (does NOT change the verdict).
  The structured fact "GROSS Sharpe ≈ NET Sharpe ≈ -5.108 — loses money BEFORE cost" is a
  REPORTING ARTIFACT. trial_48_is_eval.py:215 logs metrics.sharpe_ratio into BOTH the
  gross_sharpe and net_sharpe slots; grep confirms there is no independent gross-Sharpe
  computation. The true trade-level gross is +3.41 pips/trade POSITIVE. So the claim that
  the strategy "loses money even before the 7.5-pip cost" is FALSE at the trade level — it
  has a small gross edge that the conservative cost eats. The kill is unaffected: KILL-2
  fires on avg NET <= 0 (true: -4.09), KILL-1 fires on DSR=0 from the negative net/CPCV
  Sharpe (true). Both gates are net-economic and correctly computed. I am flagging this only
  so the firm's narrative ("cost-dominated", not "no gross edge") is accurate.

  ## Three confirmatory tests routed to quant-developer (ROUTE_TO: quant-developer).
  These are not required to uphold the kill — they upgrade it from "clean by inspection"
  to "clean by behavioral control" and nail the (a)/(b) discrimination:
    1. WIN/LOSS MAGNITUDE DECOMPOSITION — must show small symmetric-ish gross wins vs a few
       catastrophic gross-loss tails sourcing the skew/kurtosis. (Discriminates a from b.)
    2. SIGN-FLIP (continuation) CONTROL — must mirror the gross sign, proving engine wiring;
       expected to ALSO net-KILL (cost dominates both directions).
    3. MATCHED-RANDOM BENCHMARK — fade (-4.09 net) should beat random-entry (~-7.5 net) by
       ~3.4 pips, confirming a real-but-insufficient gross edge above the pure cost floor.
  If test 1 returned SYMMETRIC magnitudes, or test 2 showed the continuation variant
  strongly net-POSITIVE while fade is net-negative-with-positive-gross (an inconsistency), or
  test 3 showed fade WORSE than random — any of those would force me to RE-OPEN and
  escalate a possible sign/scaling bug. I assess all three as low-probability given the
  verified-correct code path, but the firm should run them before archiving, because a
  negative result accepted without a sign-flip control is exactly how a falsification-machine
  fools itself.

  ## Bottom line.
  H0 STANDS: net-of-7.5-pip-cost expected overnight 2σ reversion <= 0. The MR hypothesis is
  FALSIFIED in-sample, the falsification is CLEAN (sign verified, economics correctly
  computed, OOS untouched, DSR deflation correct), and it is the modal outcome the
  pre-registration honestly forecast. Trial 48 is a legitimate, well-disciplined KILL entry.
  The OOS holdout is preserved (oos_touched:false) and must NOT be burned — KILL-1/KILL-2
  firing pre-OOS means the one-shot holdout is correctly never read.
