body: |
  ## Context
  EURUSD 1h data is confirmed on disk: 31,019 hourly bars, 2021-01-03 → 2025-12-31, UTC,
  with Dukascopy ask-side volume proxy (non-zero on all rows). This is the firm's first
  intraday-capable dataset. All other 11 pairs remain daily-only (the standing dataset-wall finding).

  ## The core tension this design must resolve
  Intraday strategies offer higher events/year (potentially confirmable in ≤3yr) vs daily.
  But the single-pair constraint (EURUSD only) limits diversification, and the existing
  backtester was designed for daily/4h — QD must validate it before any result is trusted.
  CRO must confirm that 1h intraday costs (spread + slippage at sub-daily holding periods)
  do not eliminate the edge before it is detectable. NHT must assess whether a EURUSD-only
  intraday edge survives the now-47-trial multiple-comparisons penalty.

  ## Key infrastructure risk (load-bearing for the timeline)
  If QD finds the vectorized engine does NOT handle 1h correctly (weekend gap forward-fill,
  session boundaries, per-bar cost scaling), the design deliverable must include a remediation
  scope estimate. The backtest task cannot proceed until QD confirms engine fitness.

  ## Prior art in the firm's record
  The firm attempted an intraday ORB (Opening Range Breakout) design on 2026-05-30
  (.fintech-org/artifacts/2026-05-30T-p3-intraday-orb/). That artifact pre-dates the
  intraday data being available. Roles should review it for context but are not bound by it.

  ## Trial counter note
  Current count = 47 (verified from .fintech-org/trials.jsonl). Any strategy pre-registered
  under this design task will become trial 48+. The DSR denominator already carries the
  full 47-trial penalty. Higher-Sharpe or higher-frequency candidates are more likely to
  survive DSR deflation.

  ## Volume column caution (load-bearing for signal design)
  Volume is Dukascopy ask-side lots only. It is a useful intra-session liquidity proxy
  (lower in Asia, higher in London/NY overlap) but cannot be treated as market-wide notional.
  Any volume-based signal must pre-register this caveat and must not over-weight it as an
  independent information source.

knowledge_gaps:
  - "Whether the existing RealisticCostModel spread parameters (calibrated for daily/4h) are accurate at 1h frequency — CRO must resolve"
