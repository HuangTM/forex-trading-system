  - "What the actual EURUSD 1h bid-ask spread looks like session-by-session (Asia vs London vs NY) — CRO should quantify from known broker benchmarks"
  - "Whether the 2026-05-30 ORB pre-design (.fintech-org/artifacts/2026-05-30T-p3-intraday-orb/) was invalidated or superseded — HoQR should review"
