body: |
  FOCUSED CLOSURE VERDICT: approve. All three cycle-1 BLOCKING items and the blocking
  feature-window triad are closed against the spec/source; the two engine fixes are real,
  correct, and guarded by inversion-proof tests.

  Blocking triad + blocking items (F-006, F-009, F-002/003/010): all CLOSED in qr-prereg-v2.
  F-006 dissolves the uncomputable spread gate by removing it and substituting a frozen,
  conservative-by-construction 7.5-pip static round-trip cost (built at the overnight-P90 leg,
  deliberately above median) — the right resolution given OHLCV-only 1h data; the spike regime
  is honestly flagged as un-modellable rather than papered over. F-009 closes the OOS peek with
  an IS-only frequency extrapolation. The feature-window leak is closed on all three fronts:
  current-bar exclusion (F-002), purge/embargo sized to the ~480-bar feature window not the
  1-bar label (F-003), and a >=20-trading-day IS/OOS seam embargo with 2024-06 discarded (F-010).
  Effective-N=48 is now honest only because every DoF is enumerated and frozen pre-look
  (frozen_degrees_of_freedom) — no grid, no post-hoc selection.

  Majors: F-004 (pre-gap NO-TRADE) and F-007 (KILL-1 gates on DSR, not raw Sharpe) are CLOSED.
  F-001 is NOT closed: the sacred test still hardcodes sqrt(252) and sharpe<3.0 — it was a
  MAJOR finding, was not routed into either v2 artifact's scope, and persists as a coarse
  tripwire weaker at 1h than its CLAUDE.md billing. It does not block (non-blocking severity)
  but the firm should track it before any 1h strategy code is trusted on the no-lookahead guard.

  Engine fixes verified at SOURCE: swap accrual (engine.py:369) now scales by
  bar_duration_days from _infer_bar_duration_days (median timedelta, gap-robust; daily->1.0
  identical to old code, 1h->1/24) — the continuous path; the A2' discrete single-bar path is
  untouched and swap stays inert per spec. session_filter.apply_session_filter is a pure
  zero/pass-through applied BEFORE the entry_delay shift, uses [start,end) UTC semantics
  (L98), and contains no hardcoded hours. New tests assert the invariants in a way a regression
  could not pass (swap-ratio ~576-if-broken; filter commutes-with-shift with distinct per-bar
  values). 15/15 named tests green; full suite reported 336 passed.

  No new blocking gaps introduced by the v2 artifacts.
