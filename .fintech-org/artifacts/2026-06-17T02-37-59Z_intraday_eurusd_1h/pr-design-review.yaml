body: |
  Claims A-D all CONFIRMED against source (A by execution, B/D by exhaustive grep, C by
  reading both code paths plus arithmetic verification). The engine is sound for a single-bar
  discrete close-to-close design at 1h: no-lookahead holds, weekend gaps are not phantom-filled,
  the 24x swap bug is genuinely inert in discrete mode, and there is no hidden session filter to
  collide with.

  The DESIGN, however, is not yet ratifiable. Three blocking/near-blocking issues:

  (1) F-006 — the P90<=4.0-pip realised-SPREAD gate is uncomputable from OHLCV-only 1h bars
  (no bid/ask/spread column; volume is an ask-side proxy). A strategy cannot honour a NO-TRADE
  condition it cannot measure, and the "dodge the 40.7-pip spike" rationale fails because an
  intrabar spread spike is invisible at 1h close-to-close. Resolve the data/measurement question
  before pre-registration.

  (2) F-009 — KILL-4's "count qualifying OOS trades, and if <48 do NOT burn the holdout" is a
  latent OOS peek: counting OOS qualifiers IS touching the holdout. The power check must be an
  IS-frequency extrapolation, and any computation over OOS must count as the one-shot burn.

  (3) F-002 + F-003 + F-010 — leakage through the FEATURE window, not the label. The same-hour-class
  20-bar trailing σ spans ~20 calendar days (~480 hourly bars). The spec must (a) pin σ to strictly
  prior bars (current-bar exclusion), and (b) size CPCV purge/embargo AND the IS/OOS-seam embargo to
  the full same-hour-class lookback, not the 1-bar label. The 24-bar purge / 1% embargo as written
  decontaminates the label horizon but not the feature horizon.

  Plus: effective-N for DSR is almost certainly > 48 given un-pre-registered DoF (session window,
  2σ threshold, 20-bar lookback, 4.0 spread cap, 6-pip floor, 0.3 reversion coefficient, stop) — all
  must be frozen pre-IS-look or the deflated bar is too lenient (F-003 INFERENCE-2). KILL-1's raw-Sharpe
  1.4 is inconsistent with the deflated-Sharpe metric and under-powered at N=48 (F-007). KILL-2 risks
  being vacuous when evaluated on the gate's own survivors (F-008). And the single-bar hold silently
  becomes a multi-day hold across the 260 weekend gaps unless the last-in-window bar is NO-TRADE (F-004).

  Net: APPROVE-WITH-CONDITIONS. Conditions = resolve F-006, F-009, and the F-002/F-003/F-010 feature-window
  leakage triad before the pre-registration is frozen and the org trial counter advances to 48. The
  engine claims are clean; the design package needs these tightenings. No backtest should run, and the
  OOS holdout must not be touched, until F-006 and F-009 are closed.
