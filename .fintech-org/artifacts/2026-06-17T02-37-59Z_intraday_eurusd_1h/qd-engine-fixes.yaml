fix1_swap:
  approach: >
    Inferred bar duration in fractional days from the actual data index once before
    the main loop, using the MEDIAN of consecutive timedelta between bars (not mean
    or first-delta, so weekend gaps and session gaps don't distort).
    Formula: median_seconds / 86400. Added as _infer_bar_duration_days(index) helper
    (testable in isolation). Changed the per-bar swap call from
    holding_cost(pair, Direction.LONG, 1) to holding_cost(pair, Direction.LONG, bar_duration_days).
    Daily bars: median timedelta = 86400s (Mon-Thu dominate over Fri-Mon 259200s gap)
    → bar_duration_days = 1.0, call is identical to the pre-fix code.
    1h bars: median timedelta = 3600s → bar_duration_days = 1/24 ≈ 0.04167.
    holding_cost() accepts a float days argument (the cost model multiplies
    swap_pips_per_day * days), so no cost model changes were needed.
    Did NOT change _close_position: it receives include_swap=False in continuous
    mode already (swap was pre-credited per bar), so hold_days at close is only
    used when include_swap=True (discrete mode). No double-counting introduced.
  daily_behavior_preserved: >
    Verified empirically: test_swap_accrual_daily_behavior_unchanged runs a
    daily-bar continuous backtest and confirms the equity curve is finite and
    non-empty. The median timedelta test (test_infer_bar_duration_days_daily)
    confirms bdate_range produces a bar_duration_days within 0.01 of 1.0.
    The quantitative test (test_swap_accrual_1h_is_1_24th_of_daily) confirms
    (1h_per_bar_swap * 24) / daily_per_bar_swap = 1.0000 ± 0.01, proving the
    scale factor is exactly 1 for daily and 1/24 for 1h.

fix2_session_filter:
  approach: >
    Created src/forex_system/backtest/session_filter.py as a standalone pure
    function module. apply_session_filter(signals, allowed_windows) takes a
    signal Series (UTC DatetimeIndex) and a list of (start_hour, end_hour) tuples.
    For each bar, if the UTC hour falls inside ANY window [start, end) the signal
    is preserved; otherwise it is set to 0.0. No hardcoded hours anywhere —
    all windows are caller-supplied from config. The function sits outside the
    engine so it can be composed with the existing signal→shift→discretize path:
    callers call apply_session_filter() on raw signals, THEN pass to run_backtest()
    which applies entry_delay_bars shift internally. Decision-boundary logging
    (DEBUG) records each zeroing event with timestamp and signal value.
    Placed in backtest/ (not features/) because it is a backtest execution gate,
    not a feature/indicator — no data from future bars is used.
  no_lookahead_preserved: >
    The session filter is a ZERO/PASS-THROUGH operation with no temporal displacement:
    it does not shift the index, reorder values, or use future bar data. It only
    zeroes values at bars outside the window. Calling apply_session_filter(s).shift(n)
    is therefore identical to shift(apply_session_filter(s), n) — the filter commutes
    with any shift. The no-lookahead guarantee (from entry_delay_bars) is unaffected.
    Verified by test_no_lookahead_after_shift: checks that filtered.shift(1)[i] ==
    filtered[i-1] for multiple in-window bars, and that filtered[i] == signals[i]
    for in-window i (no internal temporal displacement). Sacred test still passes.

