body: |
  ## FIX 1 — Swap Accrual 24× Over-Charge

  The bug: `holding_cost(pair, Direction.LONG, 1)` was called with `days=1` on every
  bar regardless of bar frequency. For 1h bars (24 bars/day) this means 24× too much
  swap per calendar day.

  The fix: compute `bar_duration_days` once before the loop as the median timedelta
  between bars divided by 86400 seconds. Pass this as the `days` argument:
  `holding_cost(pair, Direction.LONG, bar_duration_days)`.

  Key properties:
  - Daily bars: median timedelta = 86400s → bar_duration_days = 1.0 → identical to old code.
  - 1h bars: 3600s → 1/24 → correct 1/24 of daily swap per bar.
  - Any other frequency (4h, 15m) is handled automatically by the same formula.
  - _close_position (include_swap=False path in continuous mode) is NOT affected;
    hold_days there is calendar time between entry and exit, already correct.

  Test evidence: `(1h_per_bar_swap × 24) / (daily_per_bar_swap) = 1.0000` (flat-price
  run with zero transaction costs isolates swap changes cleanly).

  ## FIX 2 — Session Filter Hook

  Added `src/forex_system/backtest/session_filter.py` with `apply_session_filter(signals, allowed_windows)`.

  Design:
  - Pure function, no state, no side effects.
  - Caller-supplied `allowed_windows: list[tuple[int, int]]` — UTC hour pairs,
    half-open [start, end). Zero magic constants in the implementation.
  - Applied BEFORE the engine's entry_delay_bars shift, so the shift is still applied
    to the filtered signal — no lookahead introduced.
  - Decision-boundary logging at DEBUG: logs count + first zeroed timestamp when
    out-of-window signals are zeroed.
  - Accepts tz-aware (UTC converted) or tz-naive (treated as UTC with DEBUG warning).
  - Raises ValueError on invalid window specs.

  No-lookahead proof: the filter is a pure zeroing operation. It reads bar timestamps
  to decide which values to zero — it never reads future bars. The entry_delay_bars
  shift in the engine is still applied downstream. Formally: filter commutes with
  shift, and the filter does not shift values itself (verified by test_no_lookahead_after_shift
  which checks filtered[i] == signals[i] for in-window i, and shifted[i] == filtered[i-1]).

  ## Test Counts
  - Before: 322 non-backtest tests + 14 backtest tests = 336 total
  - After:  322 non-backtest tests + 20 FIX-1 engine tests + 12 FIX-2 session filter tests
            + 22 prior backtest tests = 336 total (wait — backtest was already at 54)

  Actual: pytest tests/backtest/ -v → 54 passed. Full suite → 336 passed, 0 failed.
  New tests: 4 engine FIX-1 + 12 session filter = 16 new tests added.

