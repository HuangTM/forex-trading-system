body: |
  ## Summary

  The existing vectorized backtester is READY-WITH-FIXES for 1h intraday research on EURUSD.
  Three of five assessment areas are PASS or have no remediation needed. Two require action:

  ### What passes today (no changes needed)

  **No-lookahead guarantee (A):** The sacred test passes. The entry_delay_bars=1 shift
  is ordinal-index-based, not calendar-based, so it correctly steps to the next market
  bar across weekend gaps without injecting lookahead. The full 38-test suite passes.

  **Weekend gap handling (B):** The parquet has genuine gaps (no Saturday bars, no early
  Sunday bars). No forward-fill or reindex occurs anywhere in the backtest path —
  forward_fill_gaps() and resample_ohlcv() have zero callers in the production path.
  The engine's bar-loop iterates directly over the sparse index. Minor ATR inflation
  at gap-open bars is conservative and non-material.

  **Metrics annualization (E2):** infer_periods_per_year() correctly identifies 1h
  bars (median spacing = 1h) and returns 6240 PPY, not 252. Sharpe is correctly
  annualized for intraday use without any caller changes.

  ### What requires fixes before an IS backtest is reported as credible

  **Continuous mode swap overcharge (D2) — BLOCKER for continuous-mode backtests:**
  In _run_continuous (engine.py:316), holding_cost(days=1) is charged every 1h bar,
  producing a 24× overcharge vs the correct daily rate. For a 100k EURUSD lot held
  one week, the error is $1,440 vs the correct $60. Fix: divide the per-bar swap by
  `bar_duration_hours` (24 for 1h). Scope: SMALL — one line in engine.py + one new
  unit test. DISCRETE MODE IS UNAFFECTED and can be used safely now.

  **Session filtering absent (C) — required for session-specific strategies:**
  No session-hour filtering exists anywhere in the engine, strategy ABC, or config.
  For 24/5 strategies (carry, momentum), this is irrelevant. For strategies that
  target specific sessions (e.g., London open ORB), signals must be masked at the
  strategy level using df.index.hour comparisons. Scope: SMALL — ~10 lines per
  strategy class, no engine changes.

  ### Advisory (no fix required for research, but recommended)

  **Fixed spread for 1h (D3):** The default RealisticCostModel uses a flat per-pair
  spread that ignores hour-of-day liquidity variation. HourlySpreadCostModel already
  exists and the engine already passes timestamps to cost calls. Wiring this up for
  1h backtests would give more realistic (and conservative) cost estimates. Not a
  correctness blocker, but recommended before concluding alpha survives costs.

  ## Readiness matrix

  | Criterion | Status | Blocker? |
  |-----------|--------|----------|
  | test_no_lookahead passes at 1h | PASS | — |
  | Weekend gaps not forward-filled | PASS | — |
  | Session filtering available | FAIL (absent) | Only for session strategies |
  | Per-bar cost correct at 1h (discrete) | PASS | — |
  | Per-bar swap correct at 1h (continuous) | FAIL (24× overcharge) | Yes for continuous mode |
  | Metrics annualized correctly at 1h | PASS | — |
  | Timestamps UTC-consistent | PASS | — |

  ## Go / No-Go recommendation

  **GO for discrete-mode 1h backtests**: All engine correctness requirements are met.
  Use RealisticCostModel (with awareness of flat spread limitation) or wire up
  HourlySpreadCostModel. Add session masking in strategy if strategy is session-specific.

  **NO-GO for continuous-mode 1h backtests** until D2 swap fix is deployed and tested.
  The 24× swap overcharge would make carry/overnight positions appear vastly more
  expensive than they are, corrupting any continuous-mode result.

