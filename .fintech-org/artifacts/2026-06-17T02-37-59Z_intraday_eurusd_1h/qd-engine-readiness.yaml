    status: pass
    evidence: |
      EXECUTED: `python3 -m pytest tests/backtest/test_engine.py::test_no_lookahead -v`
      Result: PASSED (1 passed in 0.02s)

      Full suite: `python3 -m pytest tests/backtest/ -v` → 38 passed, 0 failed.
      This includes test_continuous_no_lookahead (tests/backtest/test_engine_continuous.py)
      and test_hourly_curve_changes_realized_cost_in_engine
      (tests/backtest/test_engine_cost_timestamp.py).

      The no-lookahead guarantee at 1h is VALID by construction:
        - engine.py:135: `delayed_signals = signals.shift(entry_delay_bars).fillna(0.0)`
        - `.shift(1)` is ORDINAL — it shifts by bar index, not by calendar time.
        - At the weekend gap: Friday bar N signal executes at Sunday bar N+1.
          This is the correct market semantic (next market bar, not next calendar hour).
        - No reindex is applied to the data before the shift, so no phantom bars
          are inserted that could cause the shift to straddle real time.
    remediation_scope: none

  - id: b_weekend_gap
    status: pass
    evidence: |
      EXECUTED probes on data/processed/EURUSD_1h.parquet (31,019 bars):

      1. Gap structure:
         `python3 -c "... gaps = idx.to_series().diff().dropna(); large_gaps = gaps[gaps > 1h] ..."`
         - 348 total gaps > 1h; 260 gaps >= 48h (Friday 21:00 -> Sunday 22:00 UTC, modal 49h).
         - 0 Saturday bars. 0 Sunday bars before 21:00 UTC.
         → The parquet itself has genuine absence; no phantom weekend bars exist.

      2. Forward-fill risk — NOT present in backtest path:
         - `forward_fill_gaps()` (transforms.py:47) is DEFINED but NEVER imported or
           called in any script or src/ module on the load→compute→signal→backtest path.
           (grep forward_fill_gaps src/ scripts/ → only transform definition; 0 callers)
         - `resample_ohlcv()` similarly has 0 callers outside transforms.py.
         - `compute_indicators()` (features/registry.py) operates on the DataFrame as-is,
           does NOT reindex to a contiguous hourly grid. Verified: row count unchanged
           before (31,019) and after (31,019) compute_indicators call.
         - Engine loop: `for i, (ts, row) in enumerate(data.iterrows())` — purely
           index-driven; no grid reindex.

      3. ATR inflation at gap-open bars — MINOR, NOT a correctness risk:
         - indicators.atr() uses `close.shift(1)` for TR, treating the Friday close
           as the prior bar regardless of the 49h gap. The Sunday open TR is inflated
           by the weekend move.
         - Measured: first gap bar TR = 16.8 pips vs normal 10.5 pips Friday bar.
           (probe: python3 -c "... gap_move_pips = abs(sun_open - fri_close) / 0.0001 ...")
         - Effect: ATR is slightly inflated for 1 bar → slightly smaller position size
           at gap-open → CONSERVATIVE, NOT a lookahead or signal contamination risk.
         - After ATR EWM warmup, the 1-bar spike decays per Wilder smoothing.

      4. Prices after vs before 5 sample weekend gaps: all "different (ok)" —
         no evidence of ffill across the gap.

      VERDICT: The engine correctly handles weekend gaps. No forward-fill, no phantom
      bars, no signal contamination. The minor ATR inflation at gap open is conservative
      and well within acceptable bounds for a research backtest.
    remediation_scope: none

  - id: c_session_filtering
    status: fail
    evidence: |
      SEARCHED: `grep -rni "session|london|ny|07:00|08:00|16:00" src/ --include=*.py`
      Result: No session-filtering logic found anywhere in:
        - engine.py (neither _run_discrete nor _run_continuous)
        - strategies/ (no generate_signals hook for hour-of-day)
        - core/interfaces.py (Strategy ABC has no session parameter)
        - config/default.yaml (no session_hours field)

      The engine operates on every bar in the data unconditionally. There is NO hook
      to restrict signal generation or position-holding to UTC session windows
      (London 07:00-16:00, NY 12:00-21:00, overlap 12:00-16:00).

      To implement session filtering, two approaches are feasible:
        Option A — Pre-filter data: caller masks the OHLCV DataFrame to trading-hour
          rows before passing to run_backtest. Simplest; no engine change. Risk:
          creates non-contiguous index; entry_delay_bars shift skips to next in-session
          bar naturally. Files touched: strategy caller / run_backtest.py.
        Option B — Signal masking in Strategy.generate_signals(): strategy zeroes
          signals outside session window using df.index.hour logic. No engine change.
          Files touched: strategy implementations (strategies/*.py), Strategy ABC
          docstring (core/interfaces.py).
        Option C — Engine-level session_hours parameter: add optional session filter
          to run_backtest signature; engine zeroes signals outside window before delay.
          Files touched: engine.py, run_backtest.py, config schema.

      Option B (signal masking in strategy) is the cleanest without touching the
      engine's no-lookahead invariant. The data index is UTC-aware (verified),
      so `df.index.hour` comparisons are correct.

      VERDICT: Session filtering is ABSENT. For strategies that require it
      (e.g., ORB targeting the London open), this is a REQUIRED addition.
      For strategies that trade 24/5 (e.g., carry, momentum), it is irrelevant.
    remediation_scope: small
    remediation_detail: |
      Scope: SMALL. Option B requires ~10 lines per strategy class to zero signals
      outside a configurable session window. No engine changes needed.
      Files: src/forex_system/strategies/*.py (3 strategy files), optionally
      src/forex_system/core/interfaces.py to document the convention.
      No test infrastructure changes; the sacred test is unaffected.

  - id: d_per_bar_cost
    status: risk
    evidence: |
      TWO COST PATHS — different severity:

      FINDING D1 — DISCRETE MODE: CORRECTLY STRUCTURED
        Entry/exit cost: entry_cost() and exit_cost() are called PER-TRADE (on
        direction change), not per bar. (engine.py:190, 482). This is correct at
        any timeframe — cost is charged once per trade, not once per holding bar.

        Swap in discrete mode: _close_position() (engine.py:480):
          `hold_days = (exit_time - entry_time).days`
          Uses timedelta.days which FLOORS to whole days.
          For intraday trades (< 24h): hold_days = 0 → zero swap. CORRECT.
          For overnight/multi-day discrete holds: hold_days increments daily. CORRECT.
          No per-bar-rate scaling error in discrete mode.

      FINDING D2 — CONTINUOUS MODE: SWAP IS 24× OVERCHARGED AT 1H — BUG
        engine.py:316 (inside _run_continuous bar loop):
          `daily_swap_pips = -cost_model.holding_cost(pair, Direction.LONG, 1)`
          `equity += daily_swap_pips * pip_value * cur_units`

        This charges holding_cost(days=1) = 1.2 pips EVERY 1H BAR.
        At 1h resolution, a 1-day hold spans 24 bars → 24 × 1.2 = 28.8 pips charged
        vs the correct 1.2 pips/day = 24× overcharge.

        Quantified (EURUSD, 100k lot):
          Correct per 1h bar: 0.05 pips = $0.50/hr
          Currently charged:  1.20 pips = $12.00/hr
          For a 1-week (120-bar) hold:
            Correct: $60.00 total swap
            Current: $1,440.00 total swap (24× error)

        The fix is: divide by bars_per_day (24 for 1h, 6 for 4h):
          `daily_swap_pips = -cost_model.holding_cost(pair, Direction.LONG, 1) / 24`
        Or pass a `bar_duration_hours` parameter to run_backtest and infer it from
        the data index median spacing.

        NOTE: The current codebase has been used in DAILY mode only, where the
        swap overcharge is 1× correct (1 bar = 1 day). The bug is latent at 1h.

      FINDING D3 — RealisticCostModel.entry_cost/exit_cost: CORRECTLY IGNORES TIMESTAMP
        The base RealisticCostModel ignores `timestamp` (model.py:29-40).
        This means a FIXED spread is applied regardless of hour-of-day.
        For 1h research, the HourlySpreadCostModel (costs/hourly_spread.py) already
        exists and is the correct choice — it applies a time-varying spread curve
        derived from 4h data. The engine already passes `timestamp=ts` to all cost
        calls (engine.py:190, 331, 391, 482). Wire-up is ready; just needs to be
        configured in the backtest caller.
    remediation_scope: small
    remediation_detail: |
      D2 fix scope: SMALL. One line change in engine.py:_run_continuous.
      Safest fix: infer bars_per_day from data index and divide.
        e.g., `bar_hours = (data.index.to_series().diff().dropna().median().total_seconds() / 3600)`
             `per_bar_swap = -cost_model.holding_cost(pair, Direction.LONG, 1) / max(bar_hours, 1/60)`
      Files touched: src/forex_system/backtest/engine.py (1 location: line ~316).
      Must add a test: test_continuous_1h_swap_not_overcharged (assert swap ~= 1.2 pips/day).
      IMPORTANT: This fix MUST be in place before any continuous-mode 1h backtest
      is reported; discrete-mode 1h backtests can proceed safely without it.

      D3 wire-up scope: SMALL. Swap RealisticCostModel for HourlySpreadCostModel
      in the 1h backtest caller. Requires a spreads source file (4h spreads parquet).
      The infrastructure exists; this is a configuration/caller change.

  - id: e_other
    status: risk
    evidence: |
      E1 — TIMESTAMP TIMEZONE: NO RISK
        data/processed/EURUSD_1h.parquet index is dtype=datetime64[us, UTC] (verified).
        All timestamps are tz-aware UTC throughout load → indicators → engine.
        HourlySpreadCostModel normalizes tz-aware inputs with ts.tz_convert("UTC") —
        consistent. No timezone ambiguity.

      E2 — ANNUALIZATION: HANDLED CORRECTLY
        infer_periods_per_year() (metrics.py:17) uses median bar spacing and snaps
        to canonical values. On EURUSD 1h index: returns 6240.0 (= 24h × 260 days).
        Verified by execution:
          `infer_periods_per_year(df.index)` → 6240.0
        Sharpe at 1h is NOT mistakenly annualized with √252 (daily factor).
        Tests confirm: test_infer_robust_to_weekend_gaps PASSES (38/38 all pass).

      E3 — OVERLAPPING RETURNS IN METRICS: NOT AN ISSUE
        The backtest uses per-bar returns on the equity curve, not per-trade returns.
        At 1h, these are hourly non-overlapping returns → Sharpe is consistent with
        the 6240 PPY factor. No Newey-West or HAC adjustment is applied, but this
        is an IS research context, not a final inference stage.

      E4 — RESAMPLE BOUNDARY RISK: NOT IN BACKTEST PATH
        resample_ohlcv() is defined but never called during a backtest run.
        The 1h parquet is stored pre-computed (Dukascopy native 1h bars).
        No resample occurs in the run path.

      E5 — ROLLOVER (22:00 UTC) COST SPIKE: PARTIALLY ADDRESSED
        The 22:00 UTC bar (rollover/NY end) has a known spread spike.
        RealisticCostModel uses a fixed spread and misses this.
        HourlySpreadCostModel correctly models this via the 4h-derived hourly curve.
        This is a cost calibration issue, not an engine correctness issue.
        See D3 above.

      E6 — DISCRETE MODE "STRADDLING" INTRADAY TRADES: MINOR EDGE CASE
        A discrete strategy that generates a signal at bar N where N is the last bar
        before a weekend gap will enter on bar N+1 (Sunday open). This is correct
        market behavior. The swap for the weekend hold will be captured because
        hold_days = (Sunday exit - Friday entry).days >= 2 for any multi-day hold.
        No correctness issue.
    remediation_scope: none

