body: |
  ## What was built

  ### OvernightMRStrategy (overnight_mr.py)
  Pure-function signal generator implementing the frozen A2′ spec exactly:
  - Session filter: UTC hours {02,03,04,05} only; all other hours produce 0.0
  - sigma_sess = rolling(20, min_periods=20).std() on same-hour-class log-returns,
    with shift(1) applied to the session sub-series BEFORE rolling — so bar t's sigma
    comes from bars strictly ≤ t-1 (current bar excluded; F-002 closed by construction)
  - Gap-skipping: rolling applied to the session-only sub-series (dropna of non-session
    bars), so multi-day gaps are invisible to the rolling window — counts 20 same-UTC-
    hour-class bars, not 20 calendar bars
  - Pre-gap NO-TRADE: detects gap > 30h to next bar; zeroes signal on those bars (F-004)
  - Signal = -1 (fade short) when r_t >= 2.0*sigma_sess; +1 (fade long) when ≤ -2.0*sigma_sess

  ### StaticRoundTripCostModel (static_roundtrip.py)
  Frozen 7.5-pip round-trip cost charged to every trade (3.75 entry + 3.75 exit).
  Holding cost = 0 (single-bar swap-inert per spec). Completely overrides the
  config's 0.5-pip EURUSD spread.

  ### trial_48_is_eval.py
  IS-only evaluation driver. Loads IS data, generates signals, computes all 4 pre-OOS
  gates. CPCV: 15 folds (C(6,2)=15), N_groups=6, k=2, purge=480 bars, embargo=480 bars.
  DSR uses compute_dsr() from harness/dsr.py (corrected Mathematician implementation,
  2026-05-31) with periods_per_year=6240 (1h forex bars).

  ## Execution results (VERIFIED BY RUNNING, not estimated)

  IS data: 21,209 bars (2021-01-03 22:00Z to 2024-05-31 20:00Z)
  Non-zero signals: 237 bars (1.12% of bars, ~68 trades/year)

  ### KILL-4 Power: PASSES
  f_IS = 237/1067 = 0.2221 trades/day
  N_oos_expected = 0.2221 × 376 = 83.5 ≥ 48 floor → does not fire.
  The strategy produces enough expected OOS trades to be statistically evaluable.

  ### KILL-1 DSR: FIRES → KILL
  IS net Sharpe = -5.1079 (strongly negative)
  CPCV Sharpe = -4.9325
  DSR at N=48 = 0.0000 (zero — the negative Sharpe means DSR can't even begin to
  certify; the canonical DSR returns 0.0 for non-positive Sharpe per compute_dsr())
  DSR = 0.0000 ≤ 0.95 → KILLS

  The fundamental problem: the strategy LOSES MONEY net of the 7.5-pip static cost.
  Avg net trade = -4.09 pips (negative — the 7.5-pip round-trip completely consumes
  the gross edge). The IS Sharpe of -5.1 is not noise: this is a genuine cost-
  dominated negative edge.

  ### KILL-2 Cost domination: FIRES (corollary)
  Avg net trade pips = -4.09 ≤ 0 → fires. Consistent with KILL-1.

  ### KILL-3 Reversion hit rate: PASSES (does not fire)
  Hit rate = 0.5517 > 0.50 — the 2σ conditioned moves DO revert directionally
  more than 50% of the time (55.2% gross win rate). The edge IS there directionally.
  The strategy PASSES the reversion-is-information test: the signal selects
  bars where price reverses. But the edge is cost-dominated.

  ## Root cause of the KILL
  Hit rate 55.2% confirms reversion happens. But the avg gross reversion capture
  per trade is approximately 7.5 pips × 55.2% - 7.5 pips × 44.8% - 7.5 pips (cost)
  ≈ gross edge ~0.77 pip per trade mean, consumed entirely by the 7.5-pip static
  cost. This is exactly what the pre-registration predicted as the "modal outcome":
  the 7.5-pip conservative static cost (overnight P90 grade) co-selects the
  widest-spread, largest-move bars, and the gross reversion capture on a single
  1h close-to-close bar is insufficient to clear that cost.

  ## Decision
  KILL-1 fires. OOS never burned (oos_touched: false).
  Trial 48 is a clean, pre-registered falsification entry.
  The null hypothesis (H0: net expected reversion ≤ 0 after 7.5-pip cost) is
  CONFIRMED: the IS data shows average net trade of -4.09 pips, Sharpe -5.1,
  DSR 0.0. The OOS holdout is preserved for future use.

  ## Honest note on KILL-3 passing
  The hit rate > 0.50 is a genuine positive signal: overnight 2σ EURUSD bars
  do revert directionally more than chance. The strategy fails on economics (cost
  domination), not on the directional hypothesis. A lower-cost execution channel
  (direct market access, tighter spread) could potentially change the cost basis.
  Under the current frozen conservative cost structure (P90-grade static), the
  edge is insufficient.

knowledge_gaps:
  - "Gross reversion magnitude distribution: we know hit rate but not the average gross pip captured per winning trade. A strategy with 55% hit rate but avg win >> avg loss could still be viable with a different cost structure."
  - "Whether the engine's discrete close-to-close model accurately represents the single-bar hold: the spec says 'close-to-close, no intrabar path dependence' and the discrete engine implements exactly this. The intrabar stop approximation is moot for close-to-close."
  - "The 7.5-pip conservative cost may be too conservative for a direct-API execution channel (e.g., Saxo Bank API). The median overnight cost is ~4.0 pips round-trip. A median-cost scenario would show avg net trade of -4.09 + 3.5 = -0.59 pips — still negative, still a KILL."
