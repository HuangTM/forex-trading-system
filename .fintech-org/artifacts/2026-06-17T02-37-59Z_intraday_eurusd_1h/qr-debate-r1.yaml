  - "KILL-1 (edge): OOS Sharpe over the 3yr holdout < NHT's DSR bar (1.4 ann. Sharpe at N~=48) -> KILL, archive as trial-48 falsification entry."
  - "KILL-2 (cost-domination, HoQR's thesis confirmed): if realized mean per-trade gross edge < realized mean per-trade round-trip cost on the CONDITIONED subset -> KILL and record 'A2 cost-dominated even on the 2-sigma tail' (directly tests HoQR's arithmetic on the conditioned, not unconditional, distribution)."
  - "KILL-3 (reversion-is-information): if reversion hit-rate on the 2-sigma subset <= 0.50 (i.e. the conditioned move is not noise) -> KILL."
  - "KILL-4 (no-trades): if the triple entry gate produces < N=48 qualifying trades over the full sample -> INSUFFICIENT-POWER, archive, do NOT touch OOS holdout (NHT effective-N discipline: ONE structure, hard-pre-registered before holdout)."
