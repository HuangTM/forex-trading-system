body: |
  RECONCILED POSITION (CONVERGE-with-HoQR-on-alpha, HOLD-on-cheapest-honest-run):

  1. CONCEDE to HoQR on the unconditional distribution. A2 traded on the average
     02:00-05:00 quiet bar is a cost-dominated trap: ~3-5 pip capturable reversion in a
     6-10 pip range against a ~6 pip thin-window round-trip. I do not contest this.

  2. HOLD that the candidate was conditioned, not unconditional. A 2-sigma close-to-close
     trigger samples the TAIL. The capturable target scales with the realized
     displacement (~2*sigma), not the median range. The defensible (medium-confidence)
     claim is ONLY that the tail subset has a larger capturable range than HoQR's cited
     unconditional average. I do NOT claim the tail subset is net-profitable — the same
     conditioning co-selects wide-spread, information-driven bars where reversion fails.
     So the modal outcome remains KILL, exactly as NHT pre-registered.

  3. The decisive trade-off is COST-TO-FALSIFY, and QD is the swing vote: A2' is the
     ONLY candidate runnable TODAY (discrete close-to-close, no infra build, swap path
     inert, no-lookahead green). A1 and A3 both require the session-filter build first
     and are themselves STRETCH/unconfirmable on a single pair. Therefore the cheapest
     honest next action is: hard-pre-register ONE A2' structure, run it once against the
     3yr OOS holdout, and accept a clean KILL as a legitimate trial-48 falsification
     archive entry. "Expensive to trade" is precisely what the P90-cost gate, 2-sigma
     conditioning, and KILL-2 pre-register AGAINST — KILL-2 directly tests HoQR's
     arithmetic on the conditioned distribution and records the verdict either way.

  4. REVISION lifts CRO's veto: per-trade stop = 1*sigma_trigger adverse-excursion cap
     + 1-bar time-stop; max-spread gate hard-capped at 4.0 pips applied bar-by-bar EVEN
     inside 02:00-05:00 (I do not need CRO to fully exclude the window — the per-bar gate
     achieves CRO's cost-protection intent while preserving the only window where the
     illiquidity-reversion structure can exist); size_multiplier 0.25.

  5. NHT discipline honored: ONE structure, all gates frozen here BEFORE the OOS holdout
     is touched; no parameter search post-registration; INSUFFICIENT-POWER (<48 trades)
     archives without burning the holdout.

  CONVERGE on the conclusion (A2 is not a standalone confirmable alpha) — HOLD on the
  action (run A2' once as the cheapest honest falsification, do not redirect to infra
  for equally-unconfirmable A1/A3 this round).
