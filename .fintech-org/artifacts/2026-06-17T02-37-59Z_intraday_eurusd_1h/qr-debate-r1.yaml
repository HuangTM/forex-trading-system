concession_or_defense: |
  DEFENSE OF THE 2-SIGMA SUBSET (the only place A2 can survive), then the honest limit:

  HoQR's arithmetic is correct UNCONDITIONALLY: in a quiet 02:00-05:00 bar the range
  is ~6-10 pips, the mean-reversion capturable move is ~3-5 pips, and round-trip cost
  in thin liquidity is ~6 pips (CRO: ~6 pips = 54% of median hourly range; config
  baseline RT ~3 pips spread+slippage+commission, but the THIN-window empirical spread
  widens to a 40.7 pip max). On the unconditional distribution, cost > edge. A2
  unconditional IS a TRAP. Conceded.

  But the candidate was NEVER unconditional — it triggers on a 2-sigma close-to-close
  displacement. Conditioning on a 2-sigma move is, by construction, sampling from the
  TAIL, not the median. The capturable reversion is not the quiet-range ~3-5 pips; it
  is a fraction of the REALIZED 2-sigma displacement. If the unconditional std of the
  02:00-05:00 bar is sigma, a 2-sigma trigger means the entry dislocation is ~2*sigma,
  and even a partial reversion (say 30-50% of the dislocation, which is the empirically
  modest end for FX intraday MR) is ~0.6-1.0 * sigma. For the tail subset to clear a
  6-pip RT with a min gross edge of 6 pips (CRO), I need 2*sigma displacement large
  enough that 0.3-0.5 of it exceeds ~6 pips gross — i.e. sigma >= ~6-10 pips on the
  trigger bar. That is the EXACT machine-checkable pre-registration: the trial only
  fires when the conditioned displacement makes the reversion target exceed the
  COST-AT-THAT-BAR, gated bar-by-bar on realized spread.

  THE HONEST LIMIT (why this is still modal-KILL, not a defense of profitability):
  the same 2-sigma conditioning that ENLARGES the capturable range ALSO co-selects the
  widest-spread, news/flow-driven bars where (a) cost is worst and (b) the move is
  often INFORMATION, not noise -> reversion fails precisely when the displacement is
  real. So the tail subset has a larger capturable range AND a larger cost AND a lower
  reversion hit-rate. I cannot defend that the net is positive ex-ante; I can only
  defend that it is non-degenerate enough to be worth ONE pre-registered falsification
  run, and that the per-bar max-spread gate + per-trade stop bound the downside of
  being wrong to a known, small number. That is the whole point of the design: P90-cost
  gate + 2-sigma conditioning + KILL pre-register AGAINST "expensive to trade." If the
  tail edge is illusory, the trial KILLs cleanly and we archive trial-48. That is a
  legitimate result, not a wasted run.
revised_candidate: A2-with-stop+max-spread-gate
per_trade_stop_added: |
  Per-trade hard stop = 1.0 * (entry 2-sigma displacement magnitude), i.e. the position
  is closed if price moves a further 1*sigma_trigger ADVERSE to the reversion thesis
  (continuation through the dislocation). Rationale: in close-to-close single-bar form
  the natural stop is "the move did not revert by next close" -> exit at next bar close
  unconditionally (time-stop = 1 bar), PLUS an intrabar adverse-excursion cap of
  1*sigma_trigger to bound the tail where the 2-sigma move was information and keeps
  running. Max loss per trade therefore bounded ~= (1*sigma_trigger + round_trip_cost),
  pre-declared and machine-checkable. This lifts CRO's escalation-to-VETO condition
  ("no per-trade stop declared"). size_multiplier held at CRO's 0.25 ceiling.
