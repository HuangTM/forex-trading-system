body: |
  ## v2 closes the Principal Reviewer's three BLOCKING findings (CEO ratified 'proceed with fixes').

  ### F-006 -- spread gate uncomputable -> FROZEN STATIC PER-SESSION COST (resolution (a)).
  Verified: EURUSD_1h.parquet is OHLCV-only (31,019 rows, no bid/ask/spread column), so a
  per-bar realized-spread "<=4-pip NO-TRADE gate" cannot be evaluated, and intrabar spikes are
  invisible at the 1h close. The v1/debate per-bar realized-spread gate is REMOVED. In its place:
  a single FROZEN, CONSERVATIVE round-trip cost = 7.5 pips, charged to EVERY trade. It is built
  from the empirical 4h spread distribution at the OVERNIGHT P90 leg (overnight per-side median
  2.0, P90 ~2.1; I round the spread leg up to ~2.6/side toward the all-session P90 to stay
  conservative against thin-book widening the proxy understates), x2 legs + ~1.6 round-trip
  thin-book slippage + ~0.7 commission = 7.5. This is NOT the optimistic config (1.5/side) and
  NOT the median (4.0 round-trip). The backtest cost is therefore CONSERVATIVE-BY-CONSTRUCTION:
  it over-states cost, under-states net edge. The spike regime (overnight tail 14.2; all-session
  max 40.7) is explicitly ACKNOWLEDGED as un-modellable at 1h -> even 7.5 does not cover the
  worst case, an additional honest reason the modal outcome is KILL.

  ### F-009 -- KILL-4 latent OOS peek -> IS-FREQUENCY EXTRAPOLATION ONLY.
  v1's KILL-4 counted qualifying OOS trades, which reads the holdout. v2 replaces it: estimate
  the qualifying-trade frequency f_IS from IS DATA ONLY (post-gap-removal), extrapolate to the
  OOS horizon (N_oos_expected = f_IS * OOS trading days). If N_oos_expected < 48 (power floor),
  declare INSUFFICIENT-POWER and DO NOT RUN THE OOS AT ALL. No computation touches OOS data
  before the one-shot burn. The holdout is read exactly once, and only if every pre-OOS IS gate
  (KILL-1,2,3,4) clears.

  ### F-002 / F-003 / F-010 -- feature-window leakage triad -> all four sub-fixes.
  The same-hour-class 20-bar trailing sigma spans ~480 hourly bars / ~20 trading days. v2 closes:
  (a) the CURRENT bar t is EXCLUDED from its own sigma_sess (sigma uses bars strictly <= t-1) --
  no bar contributes to the statistic that classifies it (F-002);
  (b) the CPCV PURGE and EMBARGO are sized to the FEATURE window (~480 bars / ~20 trading days)
  on each side of every test fold, NOT the 1-bar label (F-003/F-010);
  (c) an IS/OOS SEAM EMBARGO of >=20 trading days is carved out (2024-06 discarded between IS end
  2024-05-31 and OOS start 2024-07-01) so neither side's feature window crosses the seam;
  (d) every researcher degree-of-freedom is FROZEN before any IS look -- enumerated in
  `frozen_degrees_of_freedom`: session window 02:00-05:00 UTC, sigma-lookback=20 same-hour-class,
  k=2.0, the 7.5-pip static cost, the (net) gross-edge floor, the 0.30 capture coefficient, the
  1*sigma stop, the 1-bar time-stop, size 0.25. Honest consequence: effective-N stays ~=48 ONLY
  because the structure is singular and pre-committed; any tuning would explode N and raise the
  DSR bar -- which is exactly why nothing is tuned.

  ### F-004 -- weekend/holiday gap.
  The last in-window bar before a Friday/holiday gap is NO-TRADE; a single-bar reversion bet is
  never held across the Fri 21:00Z -> Sun 21:00Z gap (or any holiday session gap), and the
  trailing sigma_sess window skips gap bars rather than forward-filling across them.

  ### F-007 -- KILL-1 now gates on the DEFLATED Sharpe.
  KILL-1 fires on DSR <= 0.95 at N=48 (the deflated, net-of-cost Sharpe), consistent with the
  DSR primary metric -- not a raw-Sharpe threshold.

  ### Debate refinements incorporated.
  Per-trade stop = 1*sigma_trigger adverse cap + 1-bar time-stop; size_multiplier 0.25;
  single-bar discrete close-to-close hold (swap inert, never across a bar boundary).

  ## Null hypothesis (explicit)
  H0: the sign-reversed return on the bar following an over-extended (|r_t| >= 2*sigma_sess)
  overnight EURUSD hour has expected value <= 0 net of the frozen 7.5-pip round-trip cost; any
  positive IS Sharpe is multiple-testing/selection (captured by the N=48 DSR deflation).
  H1: net-of-cost expected reversion > 0, persistent across IS and the one-shot OOS,
  sign-concordant, not quarter-concentrated, with reversion hit-rate > 0.50.

  ## Honest verdict: STRETCH, modal outcome KILL.
  This is the most forward-confirmable intraday candidate ON THIS INFRASTRUCTURE (close-to-close,
  single-bar, runs on the existing vectorized engine, no intrabar simulator needed). But under a
  conservative P90-grade static cost charged to every trade, the binding risk is the edge-to-cost
  ratio in the thinnest, most-expensive session, and the 2-sigma conditioning co-selects exactly
  the bars where reversion most often fails. The firm should expect a clean KILL as the modal,
  legitimate result of trial 48.

