body: |
  POSTURE. This is a design-stage risk assessment, no execution. Both directions inherit the
  same dominant constraint, so I lead with it.

  COST FLOOR IS THE BINDING RISK FOR BOTH A AND B. The firm's most recent measured result is
  decisive: a 1h structure captured gross +3.41 pips and netted -4.09 after the 7.5-pip cost,
  DSR 0.0, killed. The cost is not a friction term here — it is ~2.2x the gross edge the firm
  actually captured. Any 1h structure (basket member or RL action) must capture min 7.5 gross
  pips just to break even, and I impose 11.25 (cost x1.5) as the design-stage gate to cover
  slippage and the spread tail (max 40.7 vs median 2.0). 11.25 pips sits at the p90 of per-bar
  range (25.9) — i.e. a member must reliably extract more than a typical bar's worth of move,
  net, every trade. The 02-05 UTC session (range 7-10 pips) is a structural dead zone below the
  cost floor; no member should trade it. This is why size_multiplier is 0.25, not 1.0: at design
  stage, with a cost-dominated, regime-flipping, single-name book and 48 prior trials of
  multiple-comparison burden, full risk budget on an unproven basket is unjustifiable.

  DIRECTION A (rules basket, <=8). Acceptable to PRE-REGISTER and design, NOT to size up.
  Concentration is the headline: all members are EURUSD/1h, so the basket is one position, not
  K bets. Var(sum)=sum Var + 2 sum Cov — positive cross-member correlation inflates aggregate
  variance, and an anti-correlated pair (trend vs mean-reversion on the same bars) just churns
  cost. Risk-budget the basket as a single name, cap gross notional at the single-name cap, and
  set the drawdown contract on combined net P&L. DSR must use N=48+K (max 56 trials) — the
  basket does not buy down the multiple-comparison penalty, it adds to it. Decision: design-OK
  at size_multiplier 0.25, hard min-gross-edge gate 11.25, machine-checkable drawdown contract,
  one-shot OOS after pre-registration. This is "size-reduced," not "approve."

  DIRECTION B (RL policy). My biggest concern and the reason this is not a clean approve. An RL
  policy is, by construction: (1) un-pre-declarable — it cannot emit a declarative TradeIntent,
  so it violates the Model-Engineering Firewall and cannot honor one-shot OOS, which requires
  the behavior be fixed before the test; (2) regime-fragile — it fits the 2021-2025 transition
  dynamics that contain a vol flip, with no pre-declared degradation bound; (3) reward-hackable —
  the firm's own gross-vs-net 2x gap shows the proxy and the objective already diverge, and a
  policy will learn to farm the proxy; (4) unreconstructable — kill-switch property 5
  (attributable) and the incident scribe log both require "why did this fire," which an RL action
  cannot answer. The mitigation is not "better RL" — it is an OUTER deterministic risk envelope,
  a separate process the policy cannot observe or override, holding the hard caps and the kill.
  Per Knight Capital: the kill must not depend on the killed thing being healthy, and an RL
  policy is an untrusted-by-default component, so the envelope must be fully out-of-band, prod-
  tested, with a measured time-to-stop SLA. None of that exists yet. The task also constrains B
  to "no RL agent built/trained." Decision for B: do NOT build/train; design feasibility verdict
  is CONDITIONAL-NO for now — RL is not viable until (a) the outer envelope is specified and
  prod-tested, and (b) someone shows a pre-declarable, reconstructable action representation that
  survives the firewall. Absent those, B carries black-box blowup risk (Knight-class) with no
  offsetting pre-registration discipline.

  TAIL. ES at 97.5pct over VaR, empirical over the full window (captures the flip), stressed
  window reported alongside, and cost stressed at the spread tail (40.7) in the tail scenario.
  The p99/median ~5x ratio is the whole reason VaR is inadequate here.

  NET DECISION: size-reduced. Direction A may be pre-registered as a basket at size_multiplier
  0.25 behind the 11.25-pip gross-edge gate, single-name risk budgeting, ES tail metric, and a
  machine-checkable drawdown contract. Direction B is not approved to be built/trained; its
  feasibility is gated on an outer deterministic risk envelope and a reconstructable, pre-
  declarable action representation — neither of which exists. The cost floor, not the modeling
  cleverness, is what will decide whether anything here is viable.
