basket_correlation_risk: >
  All K members trade the SAME instrument (EURUSD) in the SAME 1h sessions, so member
  P&L streams are NOT independent — effective N is far below K. Concentration is maximal:
  one pair, one timeframe, overlapping signal windows (e.g. a 1h mean-reversion and a 1h
  trend member will be directly anti-correlated, not diversifying — they net to churn and
  pay 7.5 pips per round trip on both legs). Treat aggregate basket exposure as a SINGLE
  EURUSD position for risk budgeting, not K independent bets. Per the prob-stats covariance
  identity Var(sum) = sum Var + 2 sum Cov(i,j): positive cross-member correlation INFLATES
  aggregate variance above naive sqrt(K) diversification, and VaR subadditivity cannot be
  assumed to help. Aggregate DD contract must be set on the COMBINED net position, with a
  per-member kill that does not assume member independence. Gross-notional cap across the
  basket must equal the single-name cap, not K times it.
rl_model_risk:
  - black_box_unexplainable_trades: >
      An RL policy emits actions whose rationale cannot be reconstructed from the policy
      alone. This violates the Model-Engineering Firewall (researcher must emit a declarative
      pre-declarable spec; an RL policy is not pre-declarable) and violates log-as-decision-trace
      property: you cannot answer "why did this decision happen" from the log without
      re-running the network. A trade you cannot explain is a trade you cannot pre-register,
      so it fails one_shot_OOS discipline structurally.
  - non_stationarity: >
      The 2021-2025 window contains a regime flip (yearly annualized vol 5.6pct to 10.6pct).
      An RL policy fits the realized transition dynamics of its training window; when the
      regime shifts, the learned policy is mis-specified and there is no pre-declared bound
      on how badly it degrades. Rules basket parameters are at least frozen and inspectable;
      an RL policy silently extrapolates.
  - reward_hacking: >
      Any reward shaped to a proxy (Sharpe, hit-rate, drawdown-penalized return) is gameable.
      Given a 7.5-pip cost floor the policy will learn degenerate behaviors (over-trading to
      farm a mis-specified reward, or freezing to avoid cost) that look optimal on the proxy
      and lose on net P&L. The prior empirical result (gross +3.41, net -4.09) shows the proxy
      (gross) and the objective (net) already diverge by 2x at the firm's cost level.
  - reconstructability: >
      For incident response and kill-switch attribution (kill-switch property 5: observable
      and attributable), every decision must be reconstructable. An RL action is not. This
      makes both the kill-switch audit trail and the incident-command scribe log incomplete
      by construction — you cannot record "policy fired because rule Z" when there is no Z.
  - outer_envelope_requirement: >
      An RL policy MUST run inside an OUTER deterministic risk envelope the model cannot
      observe, influence, or override (hard notional cap, max-order-rate, position limit,
      drawdown halt). The envelope is the only enforceable control because the inner policy
      is uninspectable. If the envelope can be reached or learned-around by the policy, it is
      not an envelope — it is a suggestion.
kill_switch:
  rules_basket: >
    Per-strategy kill (one member) + basket-level master kill, both meeting the five
    kill-switch-design properties: out-of-band (does not route through the strategy's own
    health), operable by junior in one action, stated SLA (pre-trade stop new orders <1s;
    cancel outstanding <5s), tested in prod on schedule, and structured-log attributable
    (who/why/what/time-to-effect). Pre-trade notional + order-rate caps are automated
    hard rules, not human-triggered. Dead-man switch halts the basket if the risk heartbeat
    is silent >60s.
  rl_policy: >
    Same five properties PLUS a mandatory OUTER deterministic risk envelope that is a
    SEPARATE process from the policy, with its own heartbeat, that the policy has zero
    write access to. The envelope enforces: hard max notional, max order rate, position
    limit, per-period loss cap, and an unconditional drawdown halt. The kill switch lives in
    the envelope, never in the policy. Knight Capital lesson: the switch must not depend on
    the thing it is killing being healthy — for an RL policy the policy is BY DEFINITION an
    untrusted component, so the envelope/kill must be fully out-of-band. If the policy can
    saturate the path the kill rides on, the design is Knight-class inadequate. RL is not
    approved to trade (paper or otherwise) until the outer envelope is built, prod-tested,
    and its time-to-stop SLA is measured — not asserted.
drawdown_contract: >
  Machine-checkable, evaluated per-bar on COMBINED net P&L (not per member):
  (1) per-trade hard stop: abort/flatten if open-trade loss exceeds a pre-declared pip cap;
  (2) basket daily loss cap: halt all members for the session if cumulative net loss breaches
      a pre-declared threshold (set in pips and as fraction of risk budget);
  (3) rolling drawdown halt: if peak-to-trough net equity drawdown exceeds the pre-declared
      contract value, master-kill the basket and require human re-arm;
  (4) ES-based sizing gate: position size scales DOWN as realized 97.5pct ES rises, never up;
  (5) all thresholds frozen in the pre-registration before any backtest (no in-flight tuning).
  Each clause is a numeric comparison a monitor can evaluate without judgment — no
  "IC discretion" inside the contract.
tail_risk: >
  Use Expected Shortfall at 97.5pct (FRTB calibration), NOT VaR-only. Justification from the
  measured data: per-bar range p99 55.4 pips vs median 11.1 pips is a ~5x tail ratio and
  p90 25.9 is ~2.3x median — this is a fat-tailed, high-kurtosis process where Gaussian VaR
  understates and where two structures with equal VaR can have very different beyond-threshold
  losses. ES averages the tail and is subadditive (critical because the basket trades one
  name, so component risks do NOT diversify and naive VaR-sum would mislead). Tail estimation:
  use empirical/historical-simulation over the full 2021-2025 window (covers the regime flip)
  rather than a Gaussian fit; report a stressed-window ES alongside. The spread tail (max 40.7
  vs median 2.0) is a second, execution-side tail — a fill during a spread blowout can convert
  a positive-gross trade to a large net loss, so cost must be stressed at the spread tail, not
  the median, in the tail scenario.
blowup-analog: >
  Knight Capital Americas (Aug 1, 2012) — a model/automation-driven runaway where a kill
  switch existed in principle but did not stop the loss in time under real conditions. The
  directly relevant lesson for direction B: an uninspectable, fast-acting automated trader
  with an inadequate out-of-band kill is the canonical black-box blowup. (Secondary analog:
  any over-fit, regime-blind quant strategy that worked in-sample and reversed on a regime
  shift — the 2021-2025 vol flip is exactly that risk for both A and B.)
