body: |
  ## The decision in one line
  Rank: C (data-capability) > A (capped classic basket) > B (RL). Approve a
  4-member fixed classic basket WITH a capacity limit, approve an RL DESIGN
  doc only, and state plainly that the highest expected-alpha-per-trial move
  is the one that burns NO trials: acquiring breadth + true spread data.

  ## Why C first — and yes, I am putting it first honestly
  Trial 48 is load-bearing and I refuse to look past it. The overnight-MR
  edge was REAL: +3.41 gross pips/trade, 55.2% reversion hit-rate. It did not
  die because the signal was empty. It died because 7.5-pip round-trip cost
  is ~2.2x the gross edge, on a pair whose median bar range is 11.1 pips and
  whose config spread (0.5) understates empirical spread (2.0) by 4x. That is
  not a signal problem. It is a frequency × cost × breadth problem. Every
  classic indicator I could put in a basket fires on the SAME tape with the
  SAME 7.5-pip toll. RL fires on the same tape too. The only lever that
  changes the arithmetic is the data: more pairs → more independent events
  and diversification; true bid/ask → we stop guessing the toll; sub-1h /
  volume → richer structure and the ability to time entries inside the spread.
  Data-capability burns ZERO deflation slots and raises the bar's denominator
  for every future strategy in the firm. By expected-alpha-per-unit-trial-cost
  (cost = 0 slots), it is unbeatable. The honest answer puts C first.

  ## Why A second, and why it's mostly TRAPs
  Single-indicator threshold signals on a cost-bound single pair are mostly
  traps, and I will say so on the record. The expected outcome of this basket
  is mostly-kills. I still recommend running it — at capacity ≤4 — because the
  KILLS are the deliverable. Right now "did you try MACD/RSI/Bollinger?" is an
  open question the firm keeps re-litigating. A pre-registered,
  multiple-comparison-corrected basket converts that into a defensible
  negative result for ~4 slots. I biased the basket toward LOW-frequency /
  trend structures (A1 MACD-cross, A4 EMA50/200) where cost amortizes over a
  larger captured move — those are the only members with a non-zero a-priori
  path through the wall (marginal, STRETCH). I deliberately INCLUDED two
  high-frequency fades (A2 BB band-touch, A3 RSI extreme) as a-priori
  COST_SUSPECT controls: they are the trial-48 edge-class and their kills are
  the load-bearing evidence that the cost wall GENERALIZES beyond overnight
  MR. I excluded bollinger_rsi (already rejected), oscillator stacks
  (redundant momentum — fake confirmation), and every parameter variant
  (no sweep). Four members is the floor that still spans
  {fast-trend, band-MR, oscillator-MR, slow-trend} so each kill is
  attributable to a mechanism, not an anecdote.

  ## Why B last — premature behind the data wall
  RL is not a parallel bet to C; it is C's downstream beneficiary. At 31k
  bars on a single regime-poor pair, a meaningful-capacity policy will overfit,
  and an honest CPCV/DSR eval should reject it — meaning we would spend
  engineering and compute to manufacture a deflation-failing trial. And even a
  perfectly-trained policy faces the identical 7.5-pip toll on every action;
  RL does not repeal cost arithmetic. The right move now is the cheap one:
  ml-researcher authors the feasibility + eval-methodology design doc (front-
  loads the rigor, burns nothing), and we BLOCK the build behind a named data
  milestone. RL feasibility changes materially AFTER intraday breadth +
  volume — which is, again, direction C.

  ## Capacity limit (the "approve-with-capacity-limit" decision)
  Approve at MOST 4 classic slots (denominator → 52, fixed at freeze; A1+A4
  advance to freeze, A2+A3 ride as cost-suspect controls). Approve the RL
  design doc at 0 slots. Do NOT approve an RL build, multi-pair extension, or
  parameter sweep in this cycle. If the CEO wants the absolute-minimum burn,
  the fallback is a 2-member basket (A1, A4) at the cost of forfeiting the
  generalized cost-wall negative result.

