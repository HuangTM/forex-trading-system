body: |
  VERDICT: PREMATURE-BEHIND-DATA-WALL (decision: veto for "build RL now"; this is a
  not-yet-on-this-data, not a never).

  1. DATA SUFFICIENCY — INSUFFICIENT (AC-B1).
  The seductive number is 31,019 bars. The honest number is ONE: one realization of EURUSD
  history. RL's entire sample-complexity machinery (1e5–1e7 interactions) assumes you can
  RESAMPLE the environment. Here you cannot — you can only REPLAY the single 31k-step path,
  and replaying it does not add information, it invites memorization. The independent-sample
  count that actually bounds an RL policy's generalization is not the per-bar count
  (N_eff_returns≈31k — and note returns are near-unpredictable, ACF lag1≈−0.02, so the
  per-bar count is large precisely because there's little to learn) but the number of
  independent regime realizations the policy could generalize across: ~5 annual vol regimes
  / a single ZIRP→hike→cut macro arc ≈ ~6–10 weakly-independent episodes. You cannot learn a
  policy that survives an UNSEEN regime from ~10 seen ones. The vol process is the one rich,
  learnable structure (|return| ACF lag1=0.247, persistent to lag24), giving N_eff_vol≈9,820
  — useful for a vol model, but a vol model is not a tradeable edge once the 7.5-pip cost wall
  applies.

  2. THE COST WALL IS INSIDE THE REWARD (load-bearing).
  Trial 48 is the proof, not a hypothesis: a REAL directional MR edge (gross +3.41 pip/trade,
  hit-rate 0.5517) was cleanly killed because ~7.5-pip RT cost dominates the ~11-pip median
  range. An RL agent faces the identical economics — except it has FAR more ways to fool
  itself: a reward on gross PnL will teach it to over-trade and post a gorgeous backtest that
  evaporates on cost. The only honest design puts the full 7.5-pip RT cost inside the per-step
  reward so turnover is penalized at the source. And the dataset has NO spread column — so the
  single most decision-relevant quantity is a modeled assumption, which is itself a reason the
  data is not ready.

  3. MULTIPLICITY vs DSR (the killer at the org level).
  An RL policy's effective hypothesis space — architecture × reward shaping × state features ×
  hyperparameters × training seeds — is enormous, and crucially CHEAP to search on 31k bars
  (CPU-hours per run). Cheap search against one path is the perfect overfitting machine. Honest
  effective N runs to the hundreds–thousands, not the 48 logged trials. The deflated-Sharpe bar
  rises ~√(2 ln N); the RL policy must clear a HIGHER bar than the classic basket while carrying
  the SAME cost drag that already produced DSR=0.00. The expected outcome is failure of the
  deflation — and an under-deflated RL Sharpe is exactly the "1.4 pre-reg → 0.2 live" trap the
  fin-ml skill exists to prevent.

  4. EVAL IF PURSUED (designed, not waived — AC-B3).
  Combinatorial-purged WALK-FORWARD (standard CPCV breaks for sequential RL: trajectory state +
  cross-fold gradient coupling violate the per-label purge assumption); retrain each step; purge
  ≥ policy memory horizon; embargo on the vol-autocorr scale (≥ several days). Deflated Sharpe at
  org-wide-N + full RL multiplicity. ≥6 pre-declared regime buckets, DSR>0 in ≥3 to pass.
  Calibration per regime if the policy emits any confidence/sizing. ONE never-touched terminal
  holdout, burned once. Forward shadow/observe-only confirmation gate (no capital). NEVER train,
  early-stop, HP-select, or seed-select on the holdout.

  5. WHAT FLIPS IT TO FEASIBLE.
  Not compute (compute is cheap here — that's the trap). The flip is DATA-CAPABILITY:
  (a) multi-pair intraday (≥ several of the 12 pairs at 1h or finer) to multiply independent
  realizations the policy can generalize across; (b) finer granularity + REAL bid/ask spread so
  the cost term is measured not assumed; (c) a leak-proof, cost-inside simulator (quant-developer,
  downstream). With those, re-assess — single-pair 1h is the wrong arena for RL, but the firm's
  standing data-capability unlock is precisely the lever that changes the verdict.

  RECOMMENDATION TO HoQR (AC-B6 input): NOT RL NOW. Do not burn deflation budget or engineering
  on an RL build against one cost-bound price path. Sequence RL AFTER the data-capability
  acquisition the firm has already identified as the ceiling unlock (multi-pair intraday +
  spread/tick). The classic-basket workstream faces the same cost wall but is far cheaper to
  pre-register and falsify, and should be screened first under its own DSR discipline. RL stays a
  designed, pre-registration-ready methodology on the shelf — not a build order.

