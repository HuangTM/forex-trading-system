rl_feasibility_verdict: PREMATURE-BEHIND-DATA-WALL
most_binding_reason: >
  ONE price path = ONE realization of history, not a sampleable environment. RL's
  defining requirement — near-unlimited interaction with a stationary (or self-play-
  stationarized) MDP — is structurally absent here. 31k 1h bars span ~60 non-i.i.d.
  macro-months (one ZIRP→hiking→cutting flip), the agent's effective hypothesis space
  (arch × reward × features × HP × seeds) is ENORMOUS against an org-wide DSR denominator
  of N=48, and the SAME ~7.5-pip cost wall that clean-killed trial 48 sits inside any
  RL reward. Decision is not "no" — it is "not on this data": data-capability must be
  unlocked first.

data_sufficiency:
  bars: 31019
  effective_independent_samples_est: >
    Three distinct N's, and the RL-binding one is the smallest. (1) For raw 1-step
    returns: ACF(lag1)=-0.022, integrated autocorr time tau≈1.0 → N_eff_returns≈31,018
    (returns are near-unpredictable — this is the alpha problem, not the sample problem).
    (2) For the volatility process the agent would actually condition on: |return| ACF
    is strong and persistent (lag1=0.247, lag24=0.203), tau≈3.2 → N_eff_vol≈9,820
    independent vol observations. (3) The RL-BINDING count: an RL policy is graded on
    SEQUENCES under a regime, not on per-bar draws. Independent macro-regime episodes ≈
    the number of distinct vol/rate regimes traversed = ~5 annual regimes (ann vol
    5.6/10.6/7.5/6.2/7.9% for 2021–25) → call it ~6–10 weakly-independent regime
    realizations. THAT is the denominator that bounds generalization. ~10 regime
    realizations is INSUFFICIENT to learn a policy that generalizes to an unseen regime.
  rl_sample_complexity_gap: >
    Deep RL needs 1e5–1e7+ interaction steps for a stable policy on a STATIONARY env it
    can re-sample at will (Sutton&Barto; Irpan; OpenAI Five = ~10^4 sim-years). Here
    "interaction" cannot be generated — there is exactly one historical trajectory of
    31k steps, replayable but not re-rollable. Replaying the same path N times does NOT
    add information; it just lets the policy memorize it (the backtest-overfitting-via-
    replay failure, AC-B2 mode 3). So the gap is not "we have 31k, we need 1e6" (a
    quantitative shortfall); it is QUALITATIVE: we have ONE episode-family, and RL's
    sample-complexity guarantees assume an i.i.d.-resamplable MDP we do not possess.
    Verdict for AC-B1: INSUFFICIENT.

overfitting_leakage_modes:
  - mode: "Look-ahead in state construction"
    why_elevated_at_31k: >
      Tiny data tempts rich state features (long rolling windows, full-bar OHLC at the
      decision instant). Using bar t's HIGH/LOW/CLOSE to decide the action AT t leaks the
      bar's own future. At 31k bars a one-bar leak is ~the entire edge (cf. the sacred
      test_no_lookahead, CLAUDE.md).
    mitigation: >
      State at decision time uses only information closed strictly before the action bar:
      features from bars ≤ t-1, act at t with entry_delay_bars≥1 fill at t→t+1. Audit
      every feature's as-of timestamp. ROUTE_TO: quant-developer for a leak-proof env.
  - mode: "Reward leakage (reward computed from future the policy shouldn't see)"
    why_elevated_at_31k: >
      Shaping rewards that peek at the realized future (e.g. reward = sign(return_{t+k}))
      hand the agent the label. With one path this becomes pure curve-memorization.
    mitigation: >
      Reward must be the realized, cost-inclusive PnL of the action ACTUALLY taken at the
      fill price — differential Sharpe (RL skill §4.1), never raw PnL (it learns max
      leverage in vol). Potential-based shaping only (Ng 1999: F=γΦ(s')−Φ(s)) — the sole
      theoretically reward-invariant form.
  - mode: "Cost bolted-on instead of inside the reward"
    why_elevated_at_31k: >
      Trial 48 proved the cost wall is the dominant term (gross +3.41 pip/trade real, net
      KILLED at ~7.5-pip RT, CPCV net Sharpe −4.93). An RL agent rewarded on gross PnL
      will learn to over-trade and look brilliant in backtest, then die on cost live.
    mitigation: >
      Subtract the FULL 7.5-pip conservative RT cost (HC-4) on every position change
      INSIDE the per-step reward, so turnover is penalized at the source. No spread column
      exists in the data → cost must be a conservative modeled constant, surfaced as an
      assumption, not silently dropped.
  - mode: "Env lets the agent see future bars / replay overfitting"
    why_elevated_at_31k: >
      Sequential RL trains by re-rolling the SAME 31k path thousands of times. The policy
      can memorize the one realization (it has the capacity). Looks like learning; is
      curve-fitting to history. This is the RL analogue of the under-deflated Sharpe.
    mitigation: >
      Hard train/validate/holdout time partition (below). NEVER train or early-stop on the
      holdout. Stochastic env start-states/episode-slicing so the policy can't anchor to
      absolute calendar position. Deflate the result at org-wide N (below).
  - mode: "Survivorship-of-seeds (seed cherry-picking)"
    why_elevated_at_31k: >
      RL outcomes are seed-dominated (Henderson 2018; RL skill §5.3). Reporting the best of
      many seeds is the same as best-of-N strategy mining — it MUST inflate the effective N.
    mitigation: >
      Pre-register seed count; report IQM ± bootstrap CI across ALL seeds (rliable), never
      the max. Every seed, architecture, reward variant, and HP setting counts toward the
      DSR denominator — effective N ≫ 1, far above the 48 logged trials.
  - mode: "Non-stationarity / regime label leakage"
    why_elevated_at_31k: >
      Only ~5 annual regimes exist. A policy that 'wins' may simply have absorbed the 2022
      hiking regime; with so few regimes, in-sample regime performance does not transfer.
    mitigation: >
      Regime-stratified eval with PRE-DECLARED buckets (never strata chosen after seeing
      results — that is data-snooping in stratification clothing, fin-ml skill rubric 4).

eval_methodology_if_pursued:
  dsr_under_orgN: >
    Treat the RL policy's realized net-return series exactly as a strategy return stream
    and compute Deflated Sharpe (Bailey & López de Prado 2014) deflating against the
    expected max of N noise draws, with N = org-wide honest-N AT FREEZE (≥48) PLUS the
    honest RL multiplicity (every seed × arch × reward-shape × feature-set × HP config
    that COULD have produced the reported winner). Effective N is in the hundreds–thousands,
    not 48. The deflation grows like √(2 ln N): going from N=48 to N≈1000 raises the SR*
    pass-bar materially. DSR>0.95 conventional. Given trial 48 already returned DSR=0.00
    on net economics, an RL policy faces this SAME cost-loaded return stream against a
    LARGER denominator — qualitatively a brutal bar.
  cpcv_for_RL: >
    Standard CPCV (López de Prado Ch.12) PARTIALLY BREAKS for sequential RL and must be
    adapted: (a) CPCV assumes per-observation labels you can purge/embargo independently;
    an RL policy carries state ACROSS the whole trajectory, so removing a middle block
    doesn't sever information flow the way it does for a point-in-time classifier. (b) The
    train step (gradient updates) couples folds: a policy trained on combinatorial unions
    of blocks still sees the global statistics. ADAPTATION: use combinatorial-purged
    WALK-FORWARD over contiguous time blocks — train on past block(s), PURGE a buffer
    whose width ≥ the policy's effective memory/state horizon, EMBARGO on the vol-
    autocorr scale (|return| tau≈3.2 bars is a floor; use a multi-day embargo because vol
    clusters persist to lag24), evaluate on the held-forward block, retrain at each step
    (a static model walked forward is NOT walk-forward, fin-ml anti-pattern 7). Report the
    distribution of net Sharpe across the combinatorial forward paths, not a single number.
  regime_stratified: >
    ≥6 PRE-DECLARED buckets. Minimum spec: vol-regime by ATR/realized-vol percentile
    (low/mid/high → 3) crossed with rate-regime (hiking 2022 / cutting 2024–25 / flat) or
    trend-vs-range → ≥6 cells. Report per-bucket net Sharpe + per-bucket sample size +
    per-bucket DSR. PASS bar: DSR>0 in ≥3 of the ≥6 buckets (a policy positive only in the
    single regime that dominates the sample is a regime bet, not alpha). Strata frozen in
    the pre-reg BEFORE any eval.
  holdout: >
    One contiguous NEVER-touched terminal slice (e.g. the most recent ~6–9 months), burned
    EXACTLY ONCE, declared in the pre-reg, never used for training, validation, early
    stopping, HP choice, or seed selection (HC-2 one-shot discipline). If the holdout is
    consulted even once to 'check', it is contaminated and the result is void.
  shadow_eval: >
    Before any capital discussion (none authorized here — no-capital-instruction), run the
    frozen policy in a forward shadow/paper observe-only mode on out-of-sample live-arriving
    bars with the full 7.5-pip cost in the simulated PnL, comparing realized vs backtested
    net Sharpe and calibration drift. Shadow is a confirmation gate, NOT a tuning loop —
    no policy parameter may change based on shadow output.

what_is_needed_to_flip_to_feasible:
  - "MORE INDEPENDENT REALIZATIONS: the binding constraint. Multi-pair intraday (all 12
     pairs at 1h or finer) so the policy trains across many correlated-but-distinct price
     processes — raises the regime/episode count from ~10 toward something RL can generalize
     over. This is the single highest-leverage unlock (matches the firm's standing
     data-capability recommendation, MEMORY data-wall finding)."
  - "FINER GRANULARITY + TICK/SPREAD DATA: sub-1h bars and a real bid/ask spread column
     (the dataset has NO spread; volume is an ask-side Dukascopy PROXY, not exchange volume).
     Without real spread, the cost term is a modeled constant — the very thing that decides
     feasibility is an assumption."
  - "A LEAK-PROOF, COST-INSIDE SIMULATOR (env) with as-of-time feature guarantees, fills at
     t+1, and full transaction cost in the reward. Implementation is quant-developer's beat,
     NOT this task (HC-7/HC-8 firewall)."
  - "COMPUTE for honest multiplicity: a credible disciplined RL search = O(10) seeds ×
     O(10) configs × walk-forward refits ≈ low-hundreds of training runs. On 31k bars each
     run is cheap (CPU-feasible, hours not GPU-weeks), so compute is NOT the bottleneck —
     which is exactly why over-search is the danger: it is cheap to mine thousands of
     policies against one path. The constraint is statistical (effective N), not hardware."
  - "A PRE-REGISTERED RL pre-reg (split, seeds, reward, deflated-N, regime strata, holdout
     dates) frozen before any training — same discipline as the classic basket (HC-1)."

dsr: >
  Qualitatively brutal. The RL policy's net-return stream is deflated against N = org-wide
  honest-N (≥48) + the full RL search multiplicity (seeds × archs × rewards × features × HP
  → effective N in the hundreds–thousands). SR* pass-bar scales ~√(2 ln N), so the RL bar
  sits well ABOVE the classic-basket bar at N=48+N_basket. Compounded by the cost wall that
  drove trial 48 to DSR=0.00 on net economics, a single-pair-1h RL policy is expected to
  fail this deflation. DSR>0.95 conventional; threshold is the ml-researcher's computation
  at freeze, not a recalled constant.

cpcv-config: >
  Standard CPCV is INVALID as-is for sequential RL (cross-fold gradient coupling + trajectory
  state break the per-label purge assumption). Use combinatorial-purged WALK-FORWARD: contiguous
  time blocks, retrain each step, purge ≥ policy memory horizon, embargo on the vol-autocorr
  scale (≥ several days; |return| ACF persists to lag24), report the net-Sharpe distribution
  across combinatorial forward paths. Single train/test split is a finding.

regime-stratified-dsr: >
  ≥6 pre-declared buckets (vol-percentile × rate/trend regime); per-bucket net Sharpe + n +
  DSR; PASS only if DSR>0 in ≥3 buckets. Aggregate-only Sharpe is a finding. Strata frozen
  pre-eval.

calibration: >
  Required. If the policy (or its critic/meta-head) emits a confidence or position-size scaled
  by predicted edge, that signal must be calibrated: reliability diagram / Brier on the
  predicted-vs-realized profitable-action rate, computed PER REGIME bucket and on the holdout.
  An uncalibrated edge-estimate that drives sizing is a hidden leverage-in-vol failure
  (RL skill §4.1: raw-PnL agents learn max leverage). For a pure discrete buy/hold/sell policy
  with no confidence output, calibration reduces to hit-rate-vs-claimed-rate per regime.

leakage-check: >
  RL-specific paths audited: (1) state features all as-of ≤ t-1, fill at t+1 (no current-bar
  HLC in the decision); (2) reward = realized cost-inclusive PnL of the action taken, no
  future peek, potential-based shaping only; (3) full 7.5-pip RT cost INSIDE the reward, not
  bolted on; (4) no training/early-stopping/HP/seed choice ever touches the holdout; (5) seeds
  not cherry-picked — IQM over all seeds; (6) regime strata pre-declared; (7) embargo ≥ vol-
  autocorr horizon so vol-clustering doesn't leak across folds. ROUTE_TO: quant-developer to
  IMPLEMENT these guards (firewall: I specify, I do not build).

