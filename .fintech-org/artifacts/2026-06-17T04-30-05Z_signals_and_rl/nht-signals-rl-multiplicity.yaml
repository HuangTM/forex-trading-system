  - "Trial-48 (overnight MR): REAL +3.41 pip gross, 55% hit-rate, net -4.09 -> DSR=0 KILL on cost. Directional signal real, economics cost-dominated."
  - "DSR bar computation (this artifact): annual-SR required for DSR>0.95 at N=49..56 ~= 1.75; at N~5,000 ~= 2.20; at N=10^4 ~= 2.46; N=10^5 ~= 2.70."

assumptions:
  - "SR-hat periodic standard error ~ 1/sqrt(T) (Gaussian, ignores skew/kurtosis -- which would raise the bar further; this is an optimistic floor)."
  - "E[max of N std normals] via the (1-gamma)*Phi_inv(1-1/N) + gamma*Phi_inv(1-1/(Ne)) approximation."
  - "Annualization sqrt(bars/yr) with bars/yr=6204; if only ~5,200 tradeable hrs/yr are used, the factor drops ~9% and the annual bars scale proportionally -- conclusions unchanged."
  - "RL search-grid sizing (3x4x4x10x10 ~= 4,800) is a deliberately MODEST illustrative floor; real searches are larger."
  - "Members within a basket are cost-correlated (share the same 7.5-pip floor and overlapping turnover), so basket averaging does not decorrelate the cost drag."

confidence: high

body: |
  THE MULTIPLICITY MATH (both claims share one engine).

  Deflated Sharpe asks: is the observed SR distinguishable from the BEST of N noise draws?
  The bar has two parts: (i) the expected best-of-N noise SR, which grows like sqrt(2 ln N) and is
  scaled by the SR-hat standard error 1/sqrt(T); and (ii) a ~1.645*SE margin for the >0.95 one-sided
  confidence. With T=31,019 hourly bars and annualization sqrt(6204)~=78.8, the bars are:
    N=48      -> ~1.75 annual SR
    N=49..56  -> 1.750..1.773  (the K=1..8 basket increment moves the bar by ~0.02 SR -- negligible)
    N=5,000   -> ~2.20   N=10^4 -> ~2.46   N=10^5 -> ~2.70.

  WHY THE BASKET-SIZE INFLATION IS A RED HERRING, AND WHERE THE REAL PENALTY IS.
  The claim frames the cost of the basket as "N = 48 + basket-size". That is true but trivial: log-N
  growth means K=8 vs K=1 barely moves the bar. The real penalties are elsewhere:
    1. MEMBER-LEVEL clearance. "Member DSR>0.95" means EACH of K members must independently clear
       ~1.75 annual SR net of cost. You need K winners, not one. The basket is only as confirmable as
       its required-weakest member.
    2. HONEST N >> 48+K. Each classic "signal" is a parameter family (RSI lookback+thresholds,
       Bollinger window+k, MACD 3 periods, MA-cross 2 windows). If you searched variants to choose the
       K members, the denominator is 48 + grid-size, pushing the bar to ~1.9-2.2. "48+K" is the floor
       only if NO variant search occurred -- which is rarely the honest case for a "fixed basket"
       assembled from classic indicators.

  THE COST WALL IS THE DOMINANT CONTRIBUTOR (>50% of the problem -- so it IS the problem).
  Trial-48 is the decisive datum: a REAL +3.41 pip gross edge with a 55% hit-rate -- a genuine
  directional signal -- went DSR=0 on net -4.09 after a 7.5-pip round-trip. The data is cost-bound:
  the cost is ~60-68% of a MEDIAN bar's entire 11.1-pip range. For a 1h classic signal to clear, its
  gross per-trade edge must exceed 7.5 pips AND annualize net above ~1.75 SR. Classic indicators on 1h
  are low-edge-per-trade -- the exact profile the 7.5-pip floor kills. Honest prior: ~>=70% of a <=8
  member basket is expected cost-dominated (the trial-48 pattern), and P(>=1 member clears member-
  DSR>0.95 net) ~= 10-20%. The basket cannot rescue this -- averaging net-negative members yields a
  smaller negative, not a positive. CLAIM A is therefore STRETCH: not dead (a single pre-registered
  net-positive member could in principle clear ~1.75), but the cost wall makes survivors scarce.

  RL IS THE KILLER CASE -- TRAP.
  Three compounding problems:
    (1) EFFECTIVE-N EXPLOSION. A trained policy is the report-the-winner survivor of architecture x
        reward x features x HP x seeds. A modest search ~= 3x4x4x10x10 ~= 4,800 trained policies;
        realistic searches reach 10^4-10^5. Logging this as "1 trial" is the single largest honesty
        failure available. At N~5,000 the bar is ~2.20 annual; at 10^4, ~2.46; at 10^5, ~2.70. Seed
        selection in particular is pure variance-mining on one path.
    (2) ONE PRICE PATH. 31,019 bars is ONE historical realization, not many episodes. An RL agent
        "learning to trade EURUSD 2021-2025" can memorize one trajectory. Overlapping 1h returns and
        vol-clustering shrink the EFFECTIVE independent-sample count well below T, inflating the SR-hat
        SE and raising every bar above.
    (3) COST WALL unchanged. Nothing about RL lowers the 7.5-pip floor; a realistic-turnover policy
        eats it on every round-trip, same as trial-48.
  Net: RL must clear ~2.2-2.7 annual SR, on one path, net of 7.5 pips, with an honestly-logged
  denominator most RL workflows never produce. As stated ("trained on 5 years ... single trial"),
  CLAIM B is a TRAP -- the headline Sharpe is uninterpretable until the full search is pre-registered.

  CALIBRATION NOTE. I am not reflexively negative: the classic-basket bar (~1.75) is reachable in
  principle, so CLAIM A is STRETCH not TRAP. But the firm JUST PROVED this data is cost-bound, and
  multiplicity is my domain -- the RL framing as a single trial is the highest-impact error here and
  earns the TRAP verdict and the dissent.

