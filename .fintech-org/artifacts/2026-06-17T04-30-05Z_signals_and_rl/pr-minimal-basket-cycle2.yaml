findings-from-cycle1-status:
  - finding_id: F-001
    status: closed
    evidence: >
      CRUX scrutiny. N=50 = 48 honest-org-N (trials.jsonl at spawn) + 2 members. The
      cycle-1 defect was that "canonical" provenance does not remove a knob from the
      search space — N must equal the cardinality of distinct return series the screen
      can produce. I re-applied that exact test to BOTH v2 members' entry / exit / STOP
      rules looking for un-pre-searched DoF:
        • ENTRY — both are bare CROSSES (MACD line × signal line; EMA50 × EMA200). A cross
          has ZERO tunable: no threshold, no confirmation band, no min-separation. This is
          the material change from v1, whose M1/M3 carried RSI 30/70 thresholds and a MACD
          noise band 0.0001 — those WERE grid cells. v2 explicitly removed the noise band
          (verified vs cycle-1 F-001 evidence). Search-cardinality of each entry rule = 1.
        • EXIT — "always-in, reverse on opposite cross, no time-stop, no profit target."
          This is the cross construction's OWN dual, not an independent tunable. No min-hold,
          no time-stop knob (v1's 24/48-bar time-stops are GONE). Cardinality = 1.
        • STOP — "ATR(14) 3× catastrophic stop." This DOES introduce two author-chosen
          constants (period=14, multiple=3×). I considered whether this re-opens F-001. It
          does NOT, for a load-bearing reason: a CATASTROPHIC backstop that the design
          predicts will almost never bind on an always-in trend leg is not a return-series-
          selecting knob in the Bailey-LdP sense — it is a risk rail, not an alpha lever, and
          the modal pass/kill (cost gate, DSR, count, regime) is invariant to whether the 3×
          rail is 2.5× or 3.5×. The artifact pre-declares it a-priori and NOT swept, and ATR(14)
          is the same Wilder-canonical period already used firm-wide. UNLIKE v1's stops, it is
          not paired with a tuned exit it could trade off against (exit is fully determined by
          the cross). So the per-member search cardinality is genuinely 1, and the only
          multiplicity is the 2-member family, fully absorbed by 48+2=50.
      The N-rule is faithful to null_hypothesis.py:188-197 (E[max SR] grows in total_trials via
      Φ⁻¹(1−1/N); verified by Read). N=50 is honest and defensible.
  - finding_id: F-002
    status: closed
    evidence: >
      Both v2 members are TREND-FOLLOWERS (MACD cross, EMA50/200 cross) — structurally
      distinct from trial-48's killed mean-reversion. The v1 MR members (RSI, BB, session-RSI)
      and the breakout member are REMOVED; there is NO mean-reversion member, NO session
      filter, and NO conditioned "hoped survivor" variant (v1's M6=M1+session is gone). This
      is a different idea family, not a refinement-sweep of the killed MR idea. honest_expectation
      now predicts a FAMILY_KILL with no nominated survivor — the directional-selection vector
      that drove cycle-1 F-002 is absent.
  - finding_id: F-003
    status: closed
    evidence: >
      MACD now EXISTS and is causal. Verified by Read: src/forex_system/features/indicators.py:73-95
      defines macd(series, fast=12, slow=26, signal=9) returning (macd_line, signal_line,
      histogram). It composes ONLY backward-looking ema() (ewm(span=…, adjust=False,
      min_periods=…)) and pointwise subtraction; signal_line is ewm() of macd_line — also
      strictly backward-looking. There is NO .shift(-k), no centered window, no future
      reference: value at bar t depends solely on series[0..t]. registry.py:50-57 parses
      "macd_12_26_9" → parts=[macd,12,26,9] → fast=12/slow=26/signal=9 correctly and emits
      macd_line/signal/hist columns. Causal/no-lookahead is structurally sound by construction
      (orchestrator-reported 11 tests pass / truncation-invariant; I independently confirmed the
      code carries no forward-looking operator).
  - finding_id: F-004
    status: closed
    evidence: >
      Purge is now a FIXED pre-declared constant. frozen_purge_embargo declares purge=10 trading
      days + embargo=5 trading days, applied identically to both members at every CPCV test-block
      boundary, with an explicit rationale set BEFORE any data look (conservative bound on the
      always-in trend hold). The v1 adaptive rule purge=min(max_in_fold_hold, 5d) — the in-fold
      data-derived width that was the F-004 defect — is REMOVED, and a falsification criterion now
      makes any harness that re-derives purge from in-fold realized holds a rejectable F-004
      regression. No data-dependence remains in the purge/embargo.
  - finding_id: F-005
    status: closed
    evidence: >
      No cost contradiction remains. The v1 defect was that a flat 7.5-pip RT neutralized M6's
      session-conditional-spread thesis (un-evaluable without a spread column). M6 and the entire
      session-filter mechanism are REMOVED in v2. Both surviving trend members explicitly do NOT
      rely on in-session spread tightening, so the flat 7.5-pip RT (HC-4) applies cleanly and
      identically to both, in every fold. The cost gate is now consistent with the available data
      (no spread series needed).

