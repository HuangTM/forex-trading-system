body: |
  DECISION: REJECT (package-level). The RL feasibility artifact is sound and would
  stand on its own; the classic-basket pre-reg carries multiple blocking/major
  defects that make it unsafe to freeze. Since the deliverable is a single package
  and the pre-reg's central statistical claim (the deflation denominator) is wrong,
  the package is rejected.

  ON THE N ADJUDICATION (the question I was asked to rule on directly): the firm has
  TWO codified, mutually-inconsistent denominator rules — honest_n.py (de-dup by
  pre_reg_path OR stripped family) and null_hypothesis.py (Bailey-LdP, N = cardinality
  of the search the winner was selected from). The pre-reg invents a THIRD rule
  ("48 + 1 per declared member = 54") that matches neither and happens to be the
  most lenient applied to the broadest selection surface. The Bailey-LdP construction
  is the statistically correct one for a "did the best of these survive?" question,
  and under it N is the number of distinct return series the screen can produce — which
  is the per-member knob grid, not the member count. With ~4-6 fixed-but-arbitrary
  knobs per member, the true N is plausibly 30-200+, not 54. The pre-reg's repeated,
  emphatic claim that "the N=54 deflation IS the family correction" is precisely the
  error: it deflates for the 6 families but not for the within-family configuration
  search, and the basket's composition (3 sequential refinements of trial 48's failed
  MR idea, with M6 nominated as the hoped-for survivor) is a disguised directional
  sweep. NHT's instinct ("48 + grid-size") is the right family even if NHT also did
  not state the exact count.

  This is not a pedantic over-deflation complaint. The honest_expectation is a
  FAMILY_KILL, and as a clean-negative-evidence instrument the basket is genuinely
  disciplined and valuable. The defect bites only on the upside branch: IF a member
  (realistically M6) clears DSR>=0.95 at N=54, that "pass" is suspect because the bar
  was set too low and M6 was conditionally selected. A pre-reg must be correct on the
  branch where it produces a tradeable claim — and on that branch it under-deflates.

  Secondary blocking/major issues compound: M3 is frozen but uncomputable (no MACD in
  the codebase — verified), so its semantics cannot be locked at freeze (F-003); the
  always-in M3/M4 purge is capped at 5 days and DERIVED FROM IN-FOLD DATA, which both
  under-covers a multi-week trend position straddling a fold and makes the purge width
  adaptive rather than frozen (F-004); and the flat 7.5-pip cost is a modeled constant
  with no spread column in the data, which specifically neutralizes M6's only
  cost-beating mechanism while M6 is nominated as the likely survivor (F-005).

  PATH TO APPROVE-WITH-CONDITIONS (for the owning roles, not a fix I am prescribing):
  the pre-reg becomes freezable if it (a) reconciles N to ONE codified firm rule and
  either freezes every knob with an argument that the per-member grid is genuinely 1
  or deflates at the true grid cardinality; (b) implements + no-lookahead-tests MACD
  BEFORE freeze or drops M3 and restates N; (c) replaces the data-derived M3/M4 purge
  with a pre-frozen upper bound on holding horizon; (d) states the cost as the modeled
  assumption it is and either acquires a spread series or removes M6's session-spread
  thesis from the pass logic.

  The RL artifact: ACCEPT its verdict and methodology with one clarification (F-008,
  the circular 'purge >= policy memory horizon' must be replaced by an architecture-
  imposed, pre-declared memory bound). PREMATURE-BEHIND-DATA-WALL is justified; the
  offline/batch-RL steelman does not open a feasible path because the binding
  constraint is independent regime realizations (~10), not interaction count.
knowledge_gaps:
