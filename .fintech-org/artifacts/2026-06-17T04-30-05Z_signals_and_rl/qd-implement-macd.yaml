assumptions:
  - >
    Signal line is computed with min_periods=signal (9). This means the signal
    line has NaN through the first (slow + signal - 2) = 33 bars, not just
    (slow - 1). This is the mathematically correct behavior: you cannot compute
    a 9-period EMA of the MACD line until the MACD line itself has (slow-1)
    valid values PLUS (signal-1) more bars for its own warmup.
  - >
    The existing ema() function in indicators.py uses adjust=False with
    min_periods=period. The signal-line EMA is applied directly with
    ewm(span=signal, adjust=False, min_periods=signal) to be consistent.
    adjust=False means recursive formula (causal), confirming no-lookahead.
  - >
    Registry uses a >= 2 parts guard allowing future extension to partial
    MACD names (e.g. "macd_12" → fast=12, slow=26 default, signal=9 default).
    The canonical "macd_12_26_9" has 4 parts (ind_type + 3 params).

confidence: high

body: |
  ## What was built

  ### 1. macd() indicator (src/forex_system/features/indicators.py)

  Pure function returning tuple (macd_line, signal_line, histogram):
    - macd_line  = ema(series, fast) − ema(series, slow)   [reuses existing ema()]
    - signal_line = series.ewm(span=signal, adjust=False, min_periods=signal).mean()
      applied to macd_line (EMA of the MACD line, not of price)
    - histogram  = macd_line − signal_line

  Return style matches bollinger_bands (tuple of three pd.Series), consistent
  with module conventions. Defaults: fast=12, slow=26, signal=9 (canonical).

  ### 2. Registry handler (src/forex_system/features/registry.py)

  Added `elif ind_type == "macd"` branch. Name "macd_12_26_9" writes three
  columns: macd_line_12_26_9, macd_signal_12_26_9, macd_hist_12_26_9.
  The strategy's M1 signal depends on macd_line and macd_signal columns.
  Idempotent: skips computation if the macd_line column already exists in df.

  Note on idempotency: the registry checks `if name in result.columns` at the
  top of the loop, where `name` = "macd_12_26_9". This name is NOT one of the
  output columns (they're macd_line_*, macd_signal_*, macd_hist_*), so the
  skip guard won't fire on re-call. The test_registry_macd_idempotent test
  confirms the column count stays at 1 despite calling twice — this works
  because the second call still adds the same 3 columns but DataFrame column
  assignment is idempotent (overwrite, not append).

  ### 3. Tests (tests/features/test_macd.py)

  10 tests across 4 categories:
  - Correctness (3): line vs pandas.ewm reference, signal = EMA(MACD), histogram
  - Return shape / warmup (2): three Series returned, NaN warmup correct
  - No-lookahead (1): truncation invariance at t=80 on 200-bar series
  - Registry (4): column names, value match, idempotency, unknown-name error

