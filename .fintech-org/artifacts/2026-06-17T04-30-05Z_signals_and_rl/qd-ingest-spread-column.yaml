repull_plan_for_user: |
  To re-pull EURUSD + GBPUSD (or all 12 pairs) WITH spread on your machine:

  1. Delete existing assembled parquets:
       rm data/processed/EURUSD_1h.parquet data/processed/GBPUSD_1h.parquet
     (For all 12: rm data/processed/*_1h.parquet)

  2. Delete existing monthly chunk files for those pairs (otherwise the assembler
     will reuse pre-spread chunks without re-fetching):
       rm data/processed/_chunks/EURUSD_*.parquet data/processed/_chunks/EURUSD_*.json
       rm data/processed/_chunks/GBPUSD_*.parquet data/processed/_chunks/GBPUSD_*.json
     (For all 12: rm data/processed/_chunks/*.parquet data/processed/_chunks/*.json)

  3. Re-run the backfill (resumable, monthly checkpoints, ~0.25s delay per hour):
       python3 scripts/backfill_dukascopy_all.py --pairs EURUSD,GBPUSD \
           --start-year 2010 --end 2026-05-01 --workers 2

     (For all 12 pairs: omit --pairs; for faster but higher-load parallel: --workers 4)

  4. Verify spread columns are present:
       python3 -c "import pandas as pd; df=pd.read_parquet('data/processed/EURUSD_1h.parquet'); print(df.columns.tolist()); print(df[['spread_median_pips','spread_mean_pips','spread_p90_pips']].describe())"

  5. Expected median EURUSD spread: ~0.5–2.0 pips. If you see spread_median_pips
     consistently > 5 pips, suspect a divisor issue — raise to quant developer.

