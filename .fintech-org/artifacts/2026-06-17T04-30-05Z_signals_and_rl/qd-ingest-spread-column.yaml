pip_conversion_verified: |
  Verified against the file's constants (divisor and JPY_PAIRS, lines ~193/71-73):
    Non-JPY: divisor=1e5, pip_size=1e-4 → spread_pips = (ask_raw-bid_raw)/(divisor*pip_size) = (ask-bid)/10
    JPY:     divisor=1e3, pip_size=1e-2 → spread_pips = (ask_raw-bid_raw)/(divisor*pip_size) = (ask-bid)/10
  Both reduce to /10 because divisor*pip_size=10.0 algebraically for BOTH pair types.
  Implemented via `spread_divisor = divisor * pip_size` (explicit, not hardcoded /10) so
  it tracks any future divisor change and the formula stays self-documenting.

backward_compat: |
  validate_1h_schema() checks for spread columns using set intersection.
  Case 1 (no spread cols): emits SPREAD_COL_MISSING_WARNING — flagged, NOT rejected.
    Structural OHLCV checks still run and can independently fail.
  Case 2 (all 3 spread cols present): runs sanity gates (nonpositive, NaN, >50-pip median).
  Case 3 (partial spread cols): emits "Partial spread columns — missing: {set}" error.
  The backfill concat path uses pd.concat which fills missing columns with NaN when
  old (OHLCV-only) chunks are mixed with new (spread) chunks — correct behavior.

crossed_tick_guard: |
  In _decode_bi5, per-tick: if (ask_raw - bid_raw) / spread_divisor <= 0.0, clip to 0.0
  and increment n_crossed counter. After all ticks, if n_crossed > 0, emit a structured
  log entry at INFO level per the decision-trace rubric:
    event: tick.spread.crossed_clipped
    instrument: <pair>
    bar_start_utc: <ISO8601>
    n_ticks_total: <int>
    n_crossed_clipped: <int>
  Crossed ticks produce spread_pips=0.0 (not dropped, not NaN) to preserve tick count
  and avoid introducing NaN spread aggregates from otherwise valid bars.

