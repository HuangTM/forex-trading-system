assumptions:
  - pip_size = 1e-4 for non-JPY pairs and 1e-2 for JPY pairs (standard convention; consistent with divisor constants in file)
  - Crossed ticks (bid > ask) are market microstructure noise, not signal — clip to 0, do not drop, to preserve tick counts in aggregates
  - spread_median_pips is the most useful single cost estimate (robust to outliers vs mean, captures typical cost vs p90 which captures peak regime)
  - Pre-existing monthly chunk parquets without spread columns will produce SPREAD_COL_MISSING_WARNING on reassembly — this is expected and correct; the warning tells the user to re-pull

