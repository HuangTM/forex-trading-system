body: |
  Implementation complete. 4 files changed, 18 new tests added, 2 pre-existing tests
  updated to match new semantics (both changes are correct updates, not regressions):

  ## Changes

  ### _decode_bi5 (ingest_dukascopy_1h.py)
  Added `spread_pips` column per tick. Conversion: `spread_divisor = divisor * pip_size`
  where divisor = 1e5 (non-JPY) or 1e3 (JPY) and pip_size = 1e-4 (non-JPY) or 1e-2 (JPY).
  Both reduce to spread_divisor = 10.0 algebraically. Implementation is explicit (not /10
  hardcoded) so it tracks divisor changes. Crossed/locked ticks (spread <= 0) are clipped
  to 0.0; n_crossed is logged at INFO as a structured decision-trace entry.
  Empty column set updated to include spread_pips in all code paths.

  ### _resample_ticks_to_1h (ingest_dukascopy_1h.py)
  Added spread aggregate computation when spread_pips column is present:
  `spread_median_pips = sp.median()`, `spread_mean_pips = sp.mean()`, `spread_p90_pips = sp.quantile(0.90)`.
  Guard: only populated when column present — backward-compat with pre-change tick DataFrames.

  ### validate_1h_schema (ingest_dukascopy_1h.py)
  New constants: SPREAD_COL_MISSING_WARNING, _SPREAD_COLS, _SPREAD_MEDIAN_MAX_PIPS (50.0).
  Three-way spread column check:
  - No spread cols → append SPREAD_COL_MISSING_WARNING (backward-compat; not a rejection)
  - All 3 spread cols → sanity check: NaN, nonpositive, >50 pips (flag as likely corrupt)
  - Partial spread cols → structural error

  ### fetch_1h_bars (ingest_dukascopy_1h.py)
  Empty frame now includes spread column names. Canonical column order uses list comprehension
  to optionally include spread cols only when they exist in the assembled DataFrame.

  ### backfill_dukascopy_all.py
  COLS updated to include 3 spread columns. Comment in _empty_1h_frame explains backward-compat
  posture (old chunks handled by validate_1h_schema warning, not assembly error).

  ## Test output (verbatim)
  ```
  63 passed in 0.08s
  ```
  All 63 tests pass. 18 new tests in 3 new classes cover:
  - spread_pips extraction (non-JPY + JPY known values, crossed tick clip, wider spread, empty)
  - spread aggregates (median/mean/p90 with known values, conditional on column presence)
  - validator backward-compat (mid-only flagged not rejected, spread sanity gates)

  ## Live fetch
  Network blocked (socket.timeout). Exact command to run on user's machine provided
  in the live_fetch field above.

  ## Ruff
  All checks passed.

  ## Pre-existing tests updated
  Two tests updated to match new behavior (both correct):
  1. test_empty_body_returns_empty_df: column set now includes spread_pips
  2. test_good_df_passes: _good_df() is OHLCV-only → now correctly emits SPREAD_COL_MISSING_WARNING

