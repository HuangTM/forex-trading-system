body: |
  ## What was built

  Implemented two Strategy subclasses:
  - MACDCrossStrategy (macd_cross.py): MACD(12,26,9) signal-line cross, always-in.
    Reuses macd() from features/indicators.py (already implemented). Signal: +1 when
    MACD line > signal line, -1 when <. No other params — Appel canonical.
  - EMACrossStrategy (ema_cross.py): EMA(50)/EMA(200) golden/death cross, always-in.
    Reuses ema() from features/indicators.py (line 15). Signal: +1 when EMA50 > EMA200,
    -1 when EMA50 < EMA200. NOT SMA — the existing MACrossoverStrategy defaults to SMA
    and was NOT reused because the spec mandates EMA. ema() is reused directly.

  Both use the swap-corrected continuous engine (rebalance_mode="continuous") with
  StaticRoundTripCostModel (7.5-pip RT, reused) and VolTargetSizer(leverage_cap=0.25).

  The IS eval harness (trial_basket_is_eval.py) implements:
  - POWER gate (>=30 IS trades)
  - CPCV N_groups=8, k=2, purge=240 bars, embargo=120 bars (FIXED, not data-derived)
  - DSR gate at N=50 (fixed denominator HC-5)
  - KILL-2 gate (avg_net_trade <= 0)
  - Regime consistency (positive Sharpe in >= 2 of 3 IS year-blocks)

  ## Run results (executed 2026-06-17T05:18:47Z)

  M1 (MACD cross, 82497d05):
  - IS bars: 21,209 | warmup bars: 33 | non-zero signals: 21,176
  - trades_IS: 1,672 | power_ok: TRUE (1672 >> 30)
  - avg_net_trade_pips: -2.11 pips (negative — cost dominates)
  - CPCV net Sharpe: -2.75
  - DSR at N=50: 0.0000 (negative CPCV SR → DSR=0, fails hard)
  - Regime blocks: 2021=-4.38, 2022=-3.24, 2023+H1=-2.70 (0 positive → all negative)
  - VERDICT: KILL-1 (DSR <= 0.95). Also would fire KILL-2 and regime gate.

  M2 (EMA 50/200 cross, b309935c):
  - IS bars: 21,209 | warmup bars: 199 | non-zero signals: 21,010
  - trades_IS: 128 | power_ok: TRUE (128 >= 30 — the pre-reg flagged STRETCH but
    128 clears the 30-trade floor on 1h data over 3.5 years)
  - avg_net_trade_pips: -3.91 pips (negative — worse than M1 per-trade, fewer trades)
  - CPCV net Sharpe: -0.66
  - DSR at N=50: 0.0000 (negative CPCV SR → DSR=0)
  - Regime blocks: 2021=-0.76, 2022=-0.38, 2023+H1=-0.19 (0 positive)
  - VERDICT: KILL-1 (DSR <= 0.95). Also would fire KILL-2 and regime gate.

  ## Gate arithmetic (M1)
  M1 avg gross pips per trade: avg_net + 7.5 = -2.11 + 7.5 = ~5.4 pips gross.
  The ~5.4 pips gross is below the 7.5-pip cost floor. This confirms the pre-reg's
  prediction: MACD whipsaws on 1h EURUSD produce enough false crosses that per-trade
  gross edge barely reaches 5 pips — insufficient after cost. The DSR of 0.0000
  confirms this is not a borderline failure; the CPCV Sharpe of -2.75 is deeply
  negative.

  ## Gate arithmetic (M2)
  M2 avg gross pips per trade: -3.91 + 7.5 = ~3.6 pips gross. Even fewer pips per
  trade than M1, despite fewer trades. The 128 IS trades are heavily loss-dominated
  — the EMA50/200 cross on 1h EURUSD catches reversals not trends at this timeframe.
  Consistent with the "death by whipsaw" thesis in the pre-reg.

  ## Family verdict
  FAMILY_KILL — both members dead on KILL-1 (DSR=0, negative CPCV Sharpe). This
  constitutes clean negative evidence that canonical TREND signals (MACD 12/26/9,
  EMA 50/200) on EURUSD 1h are ALSO cost-bound at the 7.5-pip wall, just as
  trial 48 (overnight mean-reversion, MR family) was cost-bound. The hypothesis
  "is the trend family structurally different enough from MR to survive cost?" is
  answered: NO. Both families fail on cost at 1h. OOS holdout NOT burned.

  ## Swap scaling confirmation
  Continuous mode uses engine's bar_duration_days=1/24 for 1h data (verified by
  existing test_infer_bar_duration_days_1h). StaticRoundTripCostModel.holding_cost()
  returns 0.0 (no overnight swap modeled in this cost model), so the swap accrual
  is zero-valued but correctly scaled. The 24x overcharge bug fix is in place.

  ## No-lookahead
  5 tests added and passing. Both strategies use causal EMA (adjust=False). Engine
  shifts by entry_delay_bars=1. MACD warmup=33 bars, EMA warmup=199 bars.

