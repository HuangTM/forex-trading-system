confidence: medium   # high confidence in the DESIGN's discipline and in the modal KILL prediction; medium that any member survives (I expect none)

body: |
  ## Design intent and honesty posture

  This is a DISCIPLINED screen, not an alpha hunt. Its primary deliverable, on the
  evidence, is CLEAN NEGATIVE EVIDENCE about price-only classic signals on 1h EURUSD
  after realistic friction. Trial 48 is load-bearing: a real +3.41-pip GROSS mean-reversion
  edge net -4.09 pips after 7.5-pip RT. That is the cost wall, quantified. I am NOT going to
  dress six structures up as likely winners; I am going to burn exactly 6 trial slots to get
  a clean, multiplicity-honest answer to "does ANY canonical price-only signal clear 7.5 pips
  on 1h EURUSD?"

  ## Why basket_size = 6 (not 8)

  HC-6 caps the basket at 8. I deliberately use 6, because every extra member raises the DSR
  denominator (N=48+K) and dilutes any genuine survivor. I include only structures with a
  distinct a-priori mechanism: 3 mean-reverters keyed on different deviation measures
  (oscillator M1, vol-band M2, session-filtered M6), 2 trend-followers at different horizons
  (MACD M3, slow-MA M4), and 1 momentum/breakout (M5). I excluded near-duplicates and the
  already-rejected bollinger_rsi combo. Fewer, more-distinct members = a cleaner test and a
  smaller deflation penalty for any true survivor.

  ## Cost-realism table (AC-A4) — required GROSS edge vs plausible GROSS edge

  | id | est round-trips/yr (1h) | required gross pips to net>0 | plausible gross pips (a-priori) | verdict      |
  |----|-------------------------|------------------------------|---------------------------------|--------------|
  | M1 | ~150-400                | 7.5                          | ~3-4 (trial-48 analog)          | marginal-to-COST_SUSPECT |
  | M2 | ~120-300                | 7.5                          | ~3-4                            | marginal-to-COST_SUSPECT |
  | M3 | ~40-120                 | 7.5                          | ~4-8 (trend, larger moves)      | marginal     |
  | M4 | ~10-40                  | 7.5                          | ~6-12 if a real trend, else <0  | marginal / thin-sample |
  | M5 | ~200-500                | 7.5                          | ~2-4 (pays spread on breakout)  | COST_SUSPECT (flagged) |
  | M6 | ~80-200                 | 7.5                          | ~4-7 (in-session, tighter)      | marginal (best shot) |

  At least one member (M5) is flagged COST_SUSPECT a-priori, satisfying AC-A4. Honestly, M1
  and M2 are nearly as suspect: they harvest the same ~3-4-pip reversion trial 48 already
  killed. The cost bar (7.5) sits ABOVE the plausible gross edge for the mean-reverters,
  which is exactly why I expect a FAMILY_KILL.

  ## Multiplicity / DSR (HC-5, AC-A2)

  DSR is computed on the CPCV out-of-fold COMBINED net-of-cost return series with
  N_trials = 54 fixed at freeze. The deflation absorbs the 6-way family search: I do NOT
  apply a second Bonferroni-style family penalty on top — the N=54 denominator IS the family
  correction (Bailey-LdP construction). Per-member pass requires DSR >= 0.95 AND a positive
  net-cost trade AND regime consistency. The denominator integrity rule is explicit: killing
  a member pre-IS does NOT shrink N. You cannot reclaim a slot by killing the member — this
  is what makes the screen honest and the pass-bar deterministic before any look.

  ## CPCV config and purge/embargo reconciliation

  N=8 groups, k=2 test groups -> 28 combinations -> 28 recombined OOF paths. Purge=2 trading
  days, embargo=1 trading day at each test-block boundary. The slowest feature warmup is the
  200-bar SMA (M4) and the 26+9 MACD EMAs (M3). On 1h bars, 200 bars ~ 8.3 calendar days of
  24h quoting but ~ a few trading days of the active sessions; the autocorrelation that could
  leak across a fold boundary decays far faster than the warmup window (warmup is a
  computation requirement, NOT a leakage horizon — the leakage horizon is set by how long a
  trade can stay open and by serial correlation of the OOF returns, both << 2 days for these
  members whose max hold is the 48-bar/2-day time-stop). The 2-day purge therefore covers the
  longest open-trade horizon (M1/M5/M6 time-stop = 48 bars = 2 days) and the 1-day embargo
  buffers residual serial correlation. M3/M4 are always-in trend-followers with no time-stop;
  for these I purge by the maximum realized holding period observed in-fold, capped at 5 days,
  re-stated here so the gate is machine-checkable: purge_M3M4 = min(max_in_fold_hold, 5d).

  ## Confirmability (HC-9)

  M1, M2, M3, M5, M6 are CONFIRMABLE: >= 30 IS trades and >> 100/yr means forward validation
  is feasible in << 2 years if a member survives. M4 (50/200 on 1h) is flagged STRETCH: it may
  produce < 30 IS round-trips, tripping the thin-sample KILL pre-emptively. I keep M4 in the
  declared basket (it costs 1 slot and provides the honest low-frequency anchor) but expect it
  to die on the sample-count gate, which is the correct disciplined outcome.

  ## What a positive result would mean

  If (against expectation) M6 or any member clears all IS gates, it earns ONE shot at the
  2024-07..2025-12 OOS holdout. A clean OOS pass (net Sharpe>0, avg net trade>0) would be the
  first price-only signal to beat the 7.5-pip wall — a genuine, multiplicity-honest finding.
  I am not predicting it. The disciplined value here is that we will KNOW, at a bounded cost
  of 6 slots, rather than guess.

  ## Firewall

  This artifact contains NO executable code. M3 (MACD) requires implementation; that is a
  downstream quant-developer task gated on test_no_lookahead (HC-3). ROUTE_TO: quant-developer
  for (a) MACD indicator implementation + no-lookahead test, (b) the CPCV/DSR backtest harness
  execution against this frozen spec. No IS or OOS data is examined in this design task.

  ROUTE_TO: quant-developer

knowledge_gaps:
  - "Empirical per-trade GROSS edge for M1/M2/M3/M6 is unknown until IS run; estimates here are a-priori analogs from trial 48 and band geometry, not measured."
  - "Exact IS trade counts (esp. M4 sample sufficiency) unknown pre-run; M4 may fail the >=30-trade gate."
  - "Whether in-session spread tightening (M6 thesis) is large enough to flip the cost verdict is the key open empirical question."

