falsification-criteria:
  # ---- PER-MEMBER KILL (machine-checkable; each evaluated independently; denominator FIXED at 50) ----
  - "KILL_member[i] if avg_net_trade_pips[i] <= 0 after 7.5-pip RT cost (cost gate; F-005: the flat 7.5-pip RT applies cleanly to BOTH members — trend signals do NOT rely on any in-session spread tightening)."
  - "KILL_member[i] if DSR[i] < 0.95 at N_trials=50 on the CPCV OOF net return series (multiplicity gate; F-001)."
  - "KILL_member[i] if IS net round-trip trade count < 30 (power floor — pre-empts thin-sample false positives; flags M2 a-priori as likely to trip this)."
  - "KILL_member[i] if positive net Sharpe in fewer than 2 of 3 non-overlapping IS year-blocks (2021 / 2022 / 2023+2024H1) (regime-consistency gate)."
  # ---- FAMILY-WISE KILL ----
  - "FAMILY_KILL (basket produces NEGATIVE evidence, valid deliverable) if 0 of 2 members clear ALL per-member gates on IS. In that case the OOS holdout is NEVER touched (HC-2 preserved) and the 2 trial slots are recorded spent with terminal_verdict=clean-falsification."
  - "OOS_GATE: a member may touch the one-shot OOS holdout ONLY if it cleared ALL per-member IS gates. OOS verdict = net Sharpe > 0 AND avg net trade > 0 on the holdout, burned ONCE; re-running OOS after seeing results is forbidden (HC-2)."
  # ---- DENOMINATOR INTEGRITY ----
  - "N_trials MUST remain 50 for every member's DSR even if a member is killed pre-IS or mid-IS. The denominator NEVER shrinks (HC-5). Any artifact recomputing DSR with N<50 after a kill is a HC-5 violation."
  # ---- PURGE INTEGRITY (F-004) ----
  - "The purge=10d / embargo=5d are FIXED constants frozen in this artifact. Any harness that derives purge from in-fold realized holding period is a F-004 regression and must be rejected."

honest_expectation: >
  MODAL OUTCOME: FAMILY_KILL. I expect BOTH members to die on the net-cost gate, and the
  deliverable's value is CLEAN NEGATIVE EVIDENCE that canonical TREND signals — a family
  structurally DISTINCT from the already-killed mean-reversion (trial 48) — ALSO fail on
  cost at 1h. This is the honest point of the rider: trial 48 proved MR is cost-bound; this
  proves (or refutes) the same for trend, at a bounded cost of 2 trial slots. I am NOT
  predicting a survivor. M1 (MACD) is a medium-frequency trend signal whose per-trade gross
  edge on choppy 1h EURUSD is unlikely to consistently exceed 7.5 pips after whipsaws.
  M2 (EMA 50/200) is VERY slow → very few trades/yr → high risk of < 30 IS round-trips
  → likely trips the power floor and is flagged STRETCH for exactly that reason; even if it
  clears the count, 1h EURUSD trends are short and whipsaw-prone. If anything survives I have
  no strong prior on which — but I rate P(any member clears all gates) LOW.

alpha-source: >
  Why trend MIGHT clear cost where mean-reversion did not: trend-followers take FEWER, LARGER
  trades. Trial 48's MR fade had a real +3.41-pip gross edge but churned and net −4.09 after
  7.5-pip RT — the kill was driven by small per-trade gross edge relative to the cost floor.
  A trend signal that catches a multi-day session-overlap move can in principle bank
  10-30+ pips gross on a single leg, comfortably clearing 7.5 pips per round trip IF the trend
  persists. That is the structural reason trend is worth one disciplined test.
  Why it likely does NOT: 1h EURUSD trends are short and mean-reverting at this horizon;
  MACD and MA crosses whipsaw badly in range regimes (the dominant EURUSD 1h regime), and
  each whipsaw pays the full 7.5-pip RT. The honest claim: trend has a PLAUSIBLE but WEAK
  a-priori reason to beat 7.5 pips; I expect the whipsaw cost to dominate and produce a
  FAMILY_KILL, mirroring trial 48 for a different signal family.

