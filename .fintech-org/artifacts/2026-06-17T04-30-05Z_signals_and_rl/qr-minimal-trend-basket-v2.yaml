honest_N_justification: >
  N=50 = honest org-wide trial count 48 (trials.jsonl at spawn) + 2 basket members.
  The DSR denominator MUST equal the cardinality of the search the winner came from
  (firm rule, src/forex_system/analysis/null_hypothesis.py: `total_trials` feeds the
  expected-max-SR deflation via Φ⁻¹(1 - 1/N), lines 168-197). Each member is therefore
  required to be search-cardinality EXACTLY 1 — a single canonical configuration with
  ZERO within-member tuning — otherwise its hidden grid would inflate the true search
  and N=50 would be a lie. I certify each member's parameters are LITERATURE-FIXED, not
  selected from a tested grid:
    - M1 MACD(12,26,9): the 12/26/9 triple is Appel's published canonical setting
      (Gerald Appel, "Technical Analysis: Power Tools for Active Investors", 2005).
      I did not test 8/17/9, 5/35/5, or any alternative fast/slow/signal triple.
      Search cardinality = 1. (One declared judgment: NO hard stop / always-in reverse
      — this is the canonical signal-line-cross construction, not a tuned exit; the
      ATR catastrophic stop multiple is declared a-priori, NOT swept — see assumptions.)
    - M2 EMA(50)/EMA(200): the 50/200 pair is THE canonical golden/death-cross long-trend
      filter (industry-standard MA-cross periods). I did not test 20/100, 50/100, or any
      other pair. Search cardinality = 1.
  Because there is no within-member grid, the only multiplicity is the 2-member family,
  which is fully absorbed by N=50 (48+2). If I could NOT honestly call a parameter
  un-searched, I would have to add it to N; here both members are genuinely single
  canonical configs, so N=50 is honest. (Note: the EMA lengths 50/200 are themselves the
  ONLY judgment — they are canonical, but I flag for the record that "canonical" rests on
  industry convention, not a derivation; the firm has not separately tested EMA-cross, so
  no prior search to fold in.)

hypothesis: >
  On EURUSD 1h, do two canonical price-only TREND-FOLLOWING signals (MACD 12/26/9
  signal-line cross; EMA 50/200 golden/death cross) — declared from literature, NOT
  tuned — produce a per-trade GROSS edge large enough to net positive after the frozen
  7.5-pip round-trip cost, and survive multiplicity-deflated Sharpe (DSR, N=50) on CPCV
  in-sample? Trial 48 showed mean-reversion is cost-bound at 1h; this asks whether the
  structurally DIFFERENT trend family also fails on cost.

universe: [EURUSD]

windows:
  IS: "2021-01-03 .. 2024-05-31"
  OOS_holdout: "2024-07-01 .. 2025-12-31"   # one-shot, burned ONCE, only if a member clears ALL pre-OOS gates
  seam_embargo: ">= 20 trading days between IS end and OOS start (the full 2024-06 calendar month is the embargo gap; already satisfied by the IS/OOS boundary)"

frozen_purge_embargo: >
  FIXED purge = 10 trading days; FIXED embargo = 5 trading days; both applied at every
  CPCV test-block boundary and PRE-DECLARED here (NOT derived from any in-fold data).
  Rationale for the number (set BEFORE seeing data, F-004): both members are ALWAYS-IN
  trend-followers with no time-stop, so their max holding horizon = the time between
  consecutive opposite crosses. For a 50/200 EMA cross on 1h, the slow leg has a ~200-bar
  (~8.3 calendar-day, ~6 trading-day) effective memory; a single trend leg can persist
  multiple weeks. I conservatively bound the MAX trend-member hold at 10 trading days for
  purge sizing and add a 5-trading-day embargo for residual serial correlation. This 10d
  purge is a FIXED constant — it does NOT read max-in-fold-hold (that adaptive rule was the
  F-004 defect in v1 and is REMOVED). If realized holds exceed 10 trading days for a
  meaningful fraction of trades, that is recorded as a known conservatism limit, not a
  reason to re-derive the purge.

metric: >
  PRIMARY = Deflated Sharpe Ratio (Bailey & López de Prado, 2014) on the CPCV out-of-fold
  COMBINED net-of-cost return series, deflated with N_trials = 50 (= honest-N 48 +
  basket_size 2). NO raw Sharpe is ever reported as a pass signal. CPCV CONFIG: N=8 groups,
  k=2 test groups per combination (C(8,2)=28 train/test splits → 28 recombined OOF paths),
  FIXED purge=10 trading days + FIXED embargo=5 trading days at each test block (the
  frozen_purge_embargo above; identical for both members; NOT data-derived).
  PER-MEMBER PASS BAR: DSR(member) >= 0.95 (P[true SR > 0] >= 95% after N=50 deflation)
  AND avg net trade > 0 pips after 7.5-pip RT AND IS net round-trip trade count >= 30
  (power floor) AND positive net Sharpe in >= 2 of 3 non-overlapping IS year-blocks
  (2021 / 2022 / 2023+2024H1).
  FAMILY-WISE PASS BAR: the basket produces a POSITIVE finding only if >= 1 member clears
  ALL per-member gates. N=50 already absorbs the 2-fold family multiplicity inside the DSR
  deflation, so NO additional family penalty is applied beyond N=50. FAMILY KILL fires if
  0 of 2 members clear the per-member bar.

