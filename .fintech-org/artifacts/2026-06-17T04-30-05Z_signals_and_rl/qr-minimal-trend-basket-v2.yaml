body: |
  ## Design intent and honesty posture

  This v2 is a MINIMAL, honest-N rider whose primary deliverable, on the evidence, is CLEAN
  NEGATIVE EVIDENCE about canonical price-only TREND signals on 1h EURUSD after realistic
  friction. Trial 48 already established the cost wall for MEAN-REVERSION (+3.41 gross,
  −4.09 net at 7.5-pip RT). The open question this rider closes is whether the structurally
  DIFFERENT trend family also fails on cost — at a bounded cost of exactly 2 trial slots.
  I am not dressing trend up as a likely winner; I am buying a clean answer.

  ## How v2 closes the four findings

  - **F-001 (dishonest DSR N).** v1 carried 6 members spanning MR, session-filtered MR, and
    breakout, several of which embedded implicit grids (thresholds, session windows, breakout
    confirmation) — a disguised search that made N=54 a lie. v2 is EXACTLY 2 members, each a
    SINGLE canonical literature-fixed configuration with ZERO within-member search (see
    honest_N_justification). MACD 12/26/9 is Appel-canonical; EMA 50/200 is the canonical
    golden/death cross. Search cardinality per member = 1, so honest N = 48 + 2 = 50, and the
    only multiplicity (the 2-member family) is fully absorbed by N=50. This is faithful to
    null_hypothesis.py's N-rule.

  - **F-002 (disguised refinement sweep).** Both members are TREND-FOLLOWERS, structurally
    distinct from trial-48's already-killed mean-reversion. The v1 mean-reverters (M1 RSI,
    M2 BB, M6 session-RSI) and the breakout (M5) are REMOVED. There is NO mean-reversion
    member and NO session-filter "hoped survivor." This is not a refinement of a killed idea;
    it tests a different idea.

  - **F-004 (adaptive purge).** v1 used `purge_M3M4 = min(max_in_fold_hold, 5d)`, deriving the
    purge from in-fold realized holds — a leakage/over-fit vector. v2 REMOVES that rule and
    freezes a FIXED purge = 10 trading days + embargo = 5 trading days, chosen BEFORE any data
    look, sized to conservatively bound the max holding horizon of always-in trend members.
    The number is a constant in this artifact; any harness that re-derives it is rejected.

  - **F-005 (cost contradiction).** NONE here. The two trend members do NOT rely on in-session
    spread tightening (that was the v1 M6 session-filter thesis, now removed). The flat
    7.5-pip round-trip (HC-4) applies cleanly and identically to both members in every fold.

  ## Cost-realism (required GROSS edge vs plausible GROSS edge)

  | id | est round-trips/yr (1h) | required gross pips to net>0 | plausible gross pips (a-priori) | verdict                 |
  |----|-------------------------|------------------------------|---------------------------------|-------------------------|
  | M1 | ~40-120                 | 7.5                          | ~4-12 if trend persists, <0 in chop | marginal             |
  | M2 | ~6-30                   | 7.5                          | ~8-25 if a real trend, else whipsaw | marginal / thin-sample |

  M1 (MACD) is medium-frequency: it can bank larger moves than the MR fade but whipsaws in the
  dominant range regime, paying 7.5 pips per false cross. M2 (EMA 50/200) is the lowest-
  frequency, lowest-cost-drag member but is the one most likely to (a) produce < 30 IS round-
  trips (tripping the power floor — hence its STRETCH flag) and (b) suffer catastrophic whipsaw
  when 1h EURUSD ranges. Neither has a STRONG a-priori reason to clear 7.5 pips; both are
  "marginal" in the sense of unlikely-but-not-impossible.

  ## Multiplicity / DSR (HC-5, F-001)

  DSR on the CPCV OOF combined net-of-cost series, N_trials=50 fixed at freeze. The N=50
  deflation IS the 2-member family correction (no second Bonferroni penalty). Killing a member
  pre-IS does NOT shrink N — you cannot reclaim a slot. Per-member pass requires DSR>=0.95 AND
  positive net-cost trade AND >=30 IS round-trips AND regime consistency.

  ## CPCV config and the FIXED purge/embargo (F-004)

  N=8 groups, k=2 test groups → 28 combinations → 28 recombined OOF paths. Purge=10 trading
  days, embargo=5 trading days at each test-block boundary, IDENTICAL for both members and
  FIXED in this artifact. These are NOT computed from in-fold data. The 10-day purge
  conservatively dominates the longest plausible always-in trend hold; the 5-day embargo
  buffers residual serial correlation in the OOF return series. (Note the conservatism cost:
  a 10d purge + 5d embargo per block thins the usable IS sample, which compounds M2's
  thin-sample risk — an honest, accepted tradeoff for leakage safety.)

  ## Confirmability (HC-9)

  M1 (MACD) is CONFIRMABLE: medium frequency should yield >> 30 IS trades, so a survivor could
  be forward-validated in well under 2 years. M2 (EMA 50/200) is flagged STRETCH: on 1h it may
  produce < 30 IS round-trips, tripping the power floor pre-emptively, and even a survivor would
  need a long forward window to confirm. I keep M2 because it is the canonical slow trend anchor
  and costs exactly 1 slot; I expect it to die on the count gate, which is the correct
  disciplined outcome.

  ## What a positive result would mean

  If (against expectation) either member clears all IS gates, it earns ONE shot at the
  2024-07..2025-12 OOS holdout. A clean OOS pass (net Sharpe>0, avg net trade>0) would be the
  first price-only signal to beat the 7.5-pip wall and would show TREND succeeds where MR fails.
  I am not predicting it. The disciplined value is that we will KNOW, at a bounded cost of 2
  slots, whether trend is also cost-bound at 1h.

  ## Firewall

  This artifact contains NO executable code. M1 (MACD) requires implementation; that is a
  downstream quant-developer task gated on test_no_lookahead (HC-3). No IS or OOS data is
  examined in this design task.

  ROUTE_TO: quant-developer
    - (a) implement MACD(12,26,9) indicator in features/ + add no-lookahead coverage (must pass test_no_lookahead).
    - (b) execute the CPCV/DSR backtest harness against this FROZEN spec (N=50, fixed purge=10d/embargo=5d, 7.5-pip RT).

knowledge_gaps:
  - "Empirical per-trade GROSS edge for M1/M2 is unknown until the IS run; the pip estimates here are a-priori trend-geometry analogs, not measured."
  - "M2 (EMA 50/200) IS round-trip count is unknown pre-run; it may fail the >=30-trade power floor."
  - "Whether trend per-leg moves on 1h EURUSD are large enough, net of whipsaw frequency, to clear 7.5 pips is the key open empirical question this rider answers."

