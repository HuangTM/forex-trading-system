    hard_boundary: >
      It MUST NOT touch any dead/falsified strategy. NO re-grade of trial-48 or any
      falsified hypothesis — that is the IC-10 / SD5 cost-optimism trap (true negative ->
      false positive). Cost assumptions are frozen at a candidate's freeze and never
      loosened to rescue it. CRO's unconditional size_multiplier=0.0 and cold-start
      <=0.25 ladder survive the cheaper spread unchanged.

  Q2_is_1h_useful:
    how_to_read_EURUSD_admitted: >
      NECESSARY, NOT SUFFICIENT. EURUSD-admitted proves the pipeline + spread recovery
      for one pair. It is forbidden from pre-judging "is 1h useful?" in EITHER direction.
    the_actual_decision_gate: >
      POOLED H1 (8 majors, frozen prereg 5fff4c63) run with allow_shorts=True against the
      full org-wide deflation denominator (N=48/49) on autocorrelation-corrected
      EFFECTIVE-N, net of conservative frozen cost, clearing DSR>=0.95 AND beating the
      NHT null battery. See goal G5. NHT base rate ~15% (10-20%); 1h likely MOVES the
      wall to ~1.5-3yr, may not break it (NHT-D3).

  Q3_sequencing_while_11_majors_backfill:
    do_now_O1_gating: >
      G1 (honest-N record append — un-break the fail-closed DSR bar) and G3 (1h coverage-
      gate callable + rollover-aware swap — the CRO BUILD-PRECONDITIONS that gate any 1h
      freeze). These are the items WITHOUT which an H1 run would be uninterpretable or
      un-scoreable.
    do_now_high_leverage: >
      G4 (forward-test harness P1, IC-1..IC-14 mechanized) — the highest-leverage build,
      the mechanism that makes 'validated' mean something; exactly the right use of the
      wait.
    do_now_low_priority: >
      G6 (pipeline smoke-test on EURUSD with NO return-peeking; effective_n.py rho-bar
      haircut as a NON-BLOCKING O2 refinement that must never re-enter compute_dsr).
    waits_for_data: >
      H1 spawn (G5) waits for a usable MAJORITY of the 8 H1 majors to land + pass the
      coverage gate. The trial-48 N=48 recompute is NOT scheduled — re-touching a
      falsified strategy is the SD5 trap and is refused.

  Q4_safety_rigor_item_that_must_be_protected:
    primary: >
      G1 — the validation bar itself is fail-closed-broken RIGHT NOW (honest_n_
      deflation_denominator raises RuntimeError; reconciliation record not in the
      ledger). The firm cannot honestly DSR-score anything until this lands. This is the
      O1 item that must be protected before the firm moves toward evaluating H1.
    standing: >
      The full NHT IC-1..IC-14 integrity-control set (G4) and the EXCLUDE-not-impute
      coverage gate (G3) are the standing O1 protections against the firm's documented
      self-deception modes (SD1 gate-softening, SD2 N-minimization, SD3 quiet re-attempt,
      SD5 cost-optimism). IC-14 is binding: an unenforced control is UNMET.

