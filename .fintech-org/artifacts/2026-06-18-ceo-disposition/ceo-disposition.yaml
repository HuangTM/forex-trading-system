disposition_summary: >
  The firm is at the single most consequential juncture since the 2026-05-31 reset:
  EURUSD 1h landed and was ADMITTED by the data-quality gate with TRUE spread (~0.4
  pip median, 99.2% bar coverage, 100% measured-spread fraction); the DSR deflation
  denominator was reconciled to a principled, auditable N=48 (one semantic, draw-level
  classified); the engine is short-capable + rollover-aware; and H1 (pooled-8 session-
  open momentum) is FROZEN-AWAITING-DATA. For the FIRST TIME the firm has (a) a correct
  validation bar and (b) a frozen, pre-registered, un-peeked hypothesis whose forward
  evaluation could actually mean something. The binding risk is NOT that we lack ideas
  or domain knowledge (NHT-D1/premise category-error) — it is that a firm at 0/49
  validated, hungry for its first win, will minimize the deflation denominator or run
  un-ledgered attempts (NHT IC-7/IC-9, SD2/SD3). My disposition holds O1 as the gate on
  every step toward H1 and refuses to let one admitted pair pre-judge "is 1h useful?"
  in either direction.

# -----------------------------------------------------------------------------
# PRIORITIZED GOALS — each with a north_star_trace to a real objective id
# Ordered by O1-first, then expected-value-per-cost on O2.
# -----------------------------------------------------------------------------
goals:

  - id: G1
    title: "Land the honest-N reconciliation record — un-break the validation bar (fail-closed today)."
    north_star_trace: [O1]
    priority: 1
    rationale: >
      KG-1 (HoQR reconciliation, severity HIGH; VERIFIED by me: grep 'honest-n-
      reconciliation' .fintech-org/trials.jsonl returns 0). honest_n.py reads the
      offset record from the LEDGER and RAISES RuntimeError when absent (fail-closed),
      so honest_n_deflation_denominator() CANNOT RETURN — every live DSR call site
      crashes today. The ratified N=48 semantic exists on paper but is NOT yet
      mechanically computable. A reproducible, auditable validation bar is the O1 floor;
      until the canonical record (event='honest-n-reconciliation', prose_only_attempts=15)
      is appended and pushed, NO 1h trial can be honestly DSR-scored. This is the gating
      O1 item — it must land BEFORE H1 (G5) can be evaluated. Fail-closed is the SAFE
      failure mode (it crashes rather than mis-scores), which is exactly why it is
      urgent-but-not-an-emergency: do it now, correctly, not under win-pressure later.
    decision_gate: "QD appends + pushes the record; a regression test asserts the function returns 48 and that compute_honest_n (11, portfolio view) is NEVER wired into compute_dsr (HoQR binding_output)."
    does_block: true
    owner_role: quant-developer
    verified_by: [null-hypothesis-tester, principal-reviewer]

  - id: G2
    title: "Run the cost-reality calibration as a FORWARD-LOOKING cost-model update only — hard firewall against re-grading any falsified strategy."
    north_star_trace: [O1, O2]
    priority: 2
    rationale: >
      The arrival of true ~0.4-pip spread vs the old conservative ~7.5-pip assumption
      is genuine new information and updating the cost model forward is correct O2 work:
      a more accurate cost model raises the expected value of every FUTURE evaluation.
      But it sits one inch from the firm's most dangerous self-deception (NHT SD5: "the
      cost model was too conservative, re-run cheaper" converts a true negative into a
      false positive). My disposition: the calibration is APPROVED as a forward-looking
      input to the IntradaySpreadCostModel (CRO Deliverable A, default charge =
      spread_p90_pips, EXCLUDE-not-impute) and NOTHING else. It is O1-bounded by IC-10
      (cost assumptions frozen at freeze, never loosened to rescue a candidate). The
      O1 component of this trace is the boundary itself, not the calibration.
    hard_boundary: >
      The cost-reality calibration MUST NOT touch, re-open, re-score, or re-grade ANY
      falsified strategy — trial-48 (A2' overnight-MR, cost-dominated) above all. That
      would be the cost-optimism trap (IC-10 / SD5). Trial-48 is DEAD and stays dead.
      The only sanctioned output is a forward cost model the NEXT pre-registered trial
      inherits. CRO's size_multiplier=0.0 posture and the cold-start <=0.25 ladder are
      UNCONDITIONAL and survive the cheaper spread (a lower spread does NOT buy a higher
      opening size). NHT IC-10 holds the line; this CEO goal STACKS a gate, it does not
      remove one.
    does_block: false
    owner_role: cro
    verified_by: [null-hypothesis-tester]

  - id: G3
    title: "Build the 1h cost/coverage BUILD-PRECONDITIONS the CRO spec mandates (coverage_gate callable + rollover-aware swap)."
    north_star_trace: [O1, O2]
    priority: 3
    rationale: >
      CRO KG-4 (verified against code by CRO): the cost-coverage gate and the rollover-
      aware swap that the risk pre-spec REQUIRES do not exist in code yet —
      validate_1h_schema only WARNS on spread_median and never checks spread_p90>0 or
      median<=p90; holding_cost pro-rates daily swap by hours (the banned anti-pattern,
      the exact class of the dd9c235 overcharge bug). Until (1) coverage_gate(parquet,
      window)->{ADMIT|EXCLUDE} and (2) rollover-aware holding_cost ship, "1h cost
      realism" is SPECIFIED but NOT ENFORCED — and the VOIDED-trial (zero-imputation)
      failure class is NOT closed in code. CRO states NO 1h trial may freeze until these
      land. This is O1 (the gate that prevents an uninterpretable run) and O2 (it is the
      mechanism by which any 1h profit claim is trustworthy). Sequence: build now, while
      data backfills — it gates H1's eval, not just files paper.
    decision_gate: "coverage_gate EXCLUDES (not warns) per the per-bar/per-pair PASS rules incl. spread_p90>0 and median<=p90; rollover-aware holding_cost charges daily swap only across 22:00 UTC (3x Wed), zero intra-session; both pushed and PR-reviewed."
    does_block: true
    owner_role: quant-developer
    verified_by: [cro, principal-reviewer]

  - id: G4
    title: "Build the forward-test harness (P1) to satisfy NHT's 14 integrity controls — the mechanism that makes 'validated' mean something."
    north_star_trace: [O1, O2]
    priority: 4
    rationale: >
      The forward-test loop is DESIGNED (M1 sequestered holdout + M2 paper-forward, NHT
      IC-1..IC-14) but the harness is NOT built. Across 49 trials the firm has NEVER run
      a credible forward OOS test, so "validated" has never meant anything here (NHT
      dissent_statement). This is the highest-leverage O1 build available: it converts a
      future PASS from theater into evidence. It is ALSO the critical-path enabler for O2
      — without it, even a real H1 edge cannot be honestly validated. NHT IC-14 is
      binding: any control whose violation an outsider cannot see MUST fail-closed in a
      machine (hash-abort on mismatch, OS-gated/CI-grep-blocked holdout, ledger-derived
      DSR-N never hand-typed). An unenforced control is UNMET, not aspirational. Build
      this DURING the backfill wait — it is exactly the "convert a future scramble into
      cold-start-ready posture" use of the wait NHT approved (steelman-of-the-prep-plan).
    decision_gate: "IC-1/IC-2/IC-3 (cryptographic freeze + forward-postdates-freeze + harness aborts on hash mismatch), IC-4/IC-5 (OS-gated or CI-grep-blocked holdout, not honor-system), IC-7/IC-8/IC-9 (every attempt burns N, no quiet attempts, full deflation denominator from the ledger), IC-13 (attempt budget frozen before first spawn), IC-14 mechanized — all gated by NHT + PR."
    does_block: false
    owner_role: quant-developer
    verified_by: [null-hypothesis-tester, principal-reviewer]

  - id: G5
    title: "Hold the 'is 1h useful?' verdict to the POOLED-H1 decision gate — EURUSD-admitted is NECESSARY-NOT-SUFFICIENT; one pair pre-judges nothing."
    north_star_trace: [O2]
    priority: 5
    rationale: >
      EURUSD admitted by the data-quality gate proves the PIPELINE and the spread
      recovery work for one pair — it does NOT prove (nor disprove) that 1h granularity
      yields validated, net-of-TCA, confirmable-in-<=2yr alpha. NHT-D3 is explicit and I
      adopt it: intraday likely MOVES the confirmability wall (~3-5yr -> ~1.5-3yr for a
      few hypotheses), it does not necessarily BREAK it — events/yr UP but per-event-
      Sharpe DOWN, effective-N-per-nominal DOWN, deflation penalty UP, partially
      cancelling. The VALID test of "is 1h useful?" is the POOLED H1 (8 majors, frozen
      prereg 5fff4c63, counter NOT burned) run with allow_shorts=True against N=48/49 on
      the autocorrelation-corrected EFFECTIVE-N (NHT D6) — NOT a single-pair result. A
      single pair is forbidden from pre-judging the question in EITHER direction: a good
      EURUSD number is not a green light, a bad one is not a kill. NHT's honest base
      rate stands on the record: ~15% (10-20%) chance THIS cycle yields one validated
      strategy — a coin-flip's fraction, NOT a promise. I will not round it up and no
      goal here implies a higher number.
    decision_gate: >
      H1 spawns (burning the counter to 49) ONLY when: (a) a usable MAJORITY of the 8
      H1-universe majors have landed AND passed the coverage gate (G3) per-pair; (b) the
      honest-N record is live (G1); (c) the forward harness enforces IC-1..IC-14 (G4);
      (d) effective-N is autocorrelation/session/overlap-corrected (D6), never nominal.
      The verdict on "is 1h useful?" is the DSR>=0.95 pooled result deflated at full
      org-wide N, beating the matched-random + session-time-only + daily-momentum-
      carryover null battery (NHT) on net-of-conservative-cost Sharpe. Pre-registration
      may EXPAND only via a BLIND structural data-quality report (bar counts/gaps/spread
      sanity, NO return/signal statistics) — fishing remains the worse, forbidden error
      (NHT-D2).
    does_block: false
    owner_role: head-of-quant-research
    verified_by: [null-hypothesis-tester]

  - id: G6
    title: "Pipeline smoke-test + small follow-ons (effective_n.py rho-bar haircut) — sequenced AFTER the gating O1 items, NOT before."
    north_star_trace: [O1, O2]
    priority: 6
    rationale: >
      Two small follow-ons are real but lower-priority. (i) effective_n.py (the MEASURED
      N_eff = N_raw/(1+(k-1)*rho_bar) correlation haircut, KG-2): VERIFIED not built
      (find returns no module). It is NON-BLOCKING and must NEVER be a name-regex collapse
      nor re-introduce de-dup into compute_dsr (HoQR retirement of the 11-view). Until it
      exists the firm relies on the raw N=48, which is CONSERVATIVE (over-deflates
      correlated draws) and therefore SAFE per SD2 — so this is an O2 refinement (tighter,
      fairer deflation for correlated variant families), not an O1 gap. (ii) a pipeline
      smoke-test on EURUSD (load -> coverage gate -> cost model -> engine, NO H1 signal
      eval, NO peeking at returns) de-risks the cold-start when majors land. Both are
      worth doing in the wait but rank BELOW G1/G3/G4 because they do not gate the
      validity of the H1 verdict. The trial-48 N=48 recompute is explicitly NOT a goal
      here — trial-48 is falsified and re-touching it for any reason is the SD5 trap.
    does_block: false
    owner_role: quant-developer
    verified_by: [head-of-quant-research]

