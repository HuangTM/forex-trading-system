  - "fat-tail-spread: 2% of bars >2 pips, isolated spikes ~18-24 pips — spike-clamp, no cap"
  - "asia-NOT-wider: Asia 00-06 UTC spread ≈ London/NY in EURUSD (counter to common assumption) — do NOT add an Asia surcharge for EURUSD on this evidence"
  - "news-window: KNOWLEDGE_GAP — no event calendar joined to 1h data"

knowledge_gaps:
  - "No intra-bar / sub-1h spread: the 1h median understates cost for entries timed inside a scheduled news release."
  - "No event/news calendar joined to this dataset — news-window surcharge cannot be quantified yet."
  - "Slippage 0.2/side is a defensible assumption, NOT measured (no order-book / fill data in this env). Revisit when real fills accrue (ties to BC-COST-RECON cumulative ledger calibration)."
  - "Calibration is EURUSD-only. Other pairs (USDJPY, GBPUSD, crosses) need their own per-bar spread before this profile is generalized."
