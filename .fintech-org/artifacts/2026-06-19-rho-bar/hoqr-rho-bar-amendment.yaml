amendment:
  primary_home: "rubric G5 — the firm-wide control surface where the under-specification lives; durable for ALL future pooled hypotheses"

  ratified_content_encoded:
    1_statistic:
      verdict: "eigenvalue-based and SIGN-BLIND (Mathematician Q1)"
      rho_bar_eff: "ρ̄_eff = (λ_max(C) − 1) / (k − 1)  from eigenvalues of the Pearson correlation matrix C"
      n_eff_gate: "N_eff* = MIN( N_raw/λ_max , N_raw·k/Σλ_i² [participation ratio] , N_raw·k/ENB )"
      floor_ceiling: "N_raw/k ≤ N_eff ≤ N_raw"
      fallback: "MAGNITUDE mean mean|C_pq| is the no-eigendecomposition fallback (dominates signed mean by triangle inequality)"
      forbidden: "naive SIGNED mean — SD2-class under-deflation fraud; fails Redundant-Pair Monotonicity (sign-flipped redundant pair drives signed-N_eff → ∞)"
    2_series:
      fix: "correlation matrix computed on per-pair PnL-CONTRIBUTION (signal×return) series x_{p,t}=signal_{p,t}·ret_{p,t}, demeaned + event-aligned; NOT raw price returns and NOT the quote-signed 'signal' series"
      wording_change: "'mean cross-pair signal correlation' → 'PnL-contribution (signal×return) correlation'"
    3_threshold:
      kept: "ρ̄_eff ≤ 0.41 break-even does NOT move; N_eff = N_raw/(1+(k−1)·ρ̄_eff) gate kept (ρ̄_eff is the sign-blind equicorrelation-equivalent on the same Kish scale)"
      explicit: "re-deriving 0.41 under the new statistic is a SEPARATE pre-result freeze, NOT part of this amendment (NHT guardrail #3)"
    4_conservative_rule: "when in doubt, take the MIN N_eff route (lower N_eff / larger deflation)"

  h1_governance:
