dissent_statement: |
  DISSENT — PRESERVE VERBATIM. I approve the rho_bar fix and the rubric-first/inherit
  disposition, but I dissent on the PRECEDENT and attach four non-negotiable guardrails.

  1. THIS IS NOT A LICENSE TO EDIT FROZEN PREREGS. Approval here rests on a single,
     load-bearing fact: the amendment moves H1 toward FAIL (magnitude 0.54 > 0.41), never
     toward pass. The ONLY frozen-prereg edits ever permissible are those that (a) precede
     any result/verdict, (b) add no degree of freedom, and (c) can only make passing HARDER.
     The instant a proposed "clarification" would help a hypothesis live, or arrives after a
     Sharpe/verdict is seen, it is a p-hack and I will VETO it. Direction-of-harm is the
     whole firewall. Do not generalize this ruling into "preregs are editable."

  2. THE PEEK IS A STAIN, NOT A WOUND — BUT IT IS A STAIN. The 3-pair raw-correlation look
     happened before the definition was fixed. It is exonerated ONLY because the firm chose
     the self-harming definition; had signed-mean been chosen, I would treat the peek as
     outcome-driven p-hacking and veto. The peek MUST be disclosed in H1's provenance and
     rho_bar MUST be re-measured on the full 8-pair landed universe with the Ruling-A
     statistic. The 3-pair -0.04/0.54 numbers are NOT the gate input. Anyone citing the
     3-pair number as the decision is overruled.

  3. THE THRESHOLD DOES NOT MOVE. 0.41 was frozen pre-data and stays frozen. If full-8
     magnitude/eigenvalue rho_bar exceeds 0.41, H1 is STRETCH, no slot, counter unburned —
     exactly as written. No "the definition changed so let's re-tune the threshold" follow-on.
     Re-deriving the break-even threshold under the new statistic is itself a NEW frozen
     decision requiring its own pre-result freeze, not a quiet ride-along on this ruling.

  4. SIGNED MEAN IS FRAUD, NAMED. For the record, independent of H1: a signed simple mean of
     cross-pair correlations is a fabricated-independence machine. It rewards sign-flipped
     redundant legs with INFINITE fake effective-N (k=2, corr=-1 -> N_eff = N_raw/0). Any
     future artifact, any role, that computes pooled effective-N from a signed mean is
     producing an under-deflated, non-confirmable result, and I will reject it on sight under
     veto-authority 'sharpe-not-distinguishable-from-noise-under-deflation'. The anti-fraud
     floor is: redundant-pair monotonicity (a zero-information pair must never raise N_eff).

  I do not have a fix-the-Mathematician's-statistic mandate; I have a floor: whatever closed
  form is adopted must satisfy redundant-pair monotonicity and be measured on the PnL stream,
  not the quote-convention-signed series. Approve-with-dissent.

