direction_of_harm:
  verdict: "CONFIRMED stricter-only. The amendment can only make H1 HARDER to pass."
  reasoning:
    - "The signed mean (forbidden) yields ρ̄_signed = −0.04 on the 3-pair peek → N_eff > N_raw → H1 PASSES G5. The adopted spectral/magnitude statistic yields ρ̄ ≈ 0.48–0.54 > 0.41 → H1 FAILS/STRETCH. The change moves H1 from PASS toward FAIL."
    - "Mathematician ordering_fact: λ_max ≥ 1+(k−1)·ρ̄_signed always (Rayleigh quotient, all-ones vector) ⇒ ρ̄_eff ≥ ρ̄_signed ALWAYS ⇒ N_eff(spectral) ≤ N_eff(signed) ALWAYS. The new statistic is provably never more generous than the (now-forbidden) signed mean."
    - "Floor/ceiling N_raw/k ≤ N_eff* ≤ N_raw and MIN-over-routes both bias toward LOWER N_eff (larger deflation, harder to clear ≤2yr / DSR). No route in the encoding can yield N_eff > N_raw."
  conclusion: "The sole basis on which NHT approved (direction-of-harm toward FAIL) is preserved by the encoding. No path in the amended G5/H1 makes the gate EASIER."

