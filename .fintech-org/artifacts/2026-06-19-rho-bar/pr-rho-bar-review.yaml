# =====================================================================
governance_central_ruling:
  verdict: "PARTIAL OVERREACH on the H1 frozen prereg body — but BOUNDED, DISCLOSED, STRICTER, and threshold-preserving. Conditionally curable. Decision: approve-with-conditions, NOT reject."
  what_nht_authorized:
    quote_1: "ruling_B.enforceable_disposition.step_2: 'Add a one-line dated clarification NOTE to H1's prereg + triggers'"
    quote_2: "ruling_B.when_each_option_is_correct.amend_in_place_clarification: 'Permitted, but execute it as inherit-from-rubric + a dated disclosure NOTE, NOT a silent edit of the symbol's meaning.'"
    quote_3: "ruling_B.when_each_option_is_correct.chosen: 'rubric_only (primary) + amend_in_place as a thin dated disclosure note ... The in-place NOTE is only a disclosure pointer, not an independent edit.'"
    reading: "NHT's home for the H1-side fix is (a) inherit the amended G5 by reference and (b) ONE thin dated disclosure NOTE. The NOTE is explicitly characterised as a POINTER, 'not an independent edit', and the operative prohibition is 'NOT a silent edit of the symbol's meaning.'"
  what_hoqr_actually_did:
    rubric_G5: "Primary durable fix authored in rubric §G5 — squarely within NHT step_1; correct home; no governance issue. APPROVED."
    h1_disclosure_note: "A thin dated DISCLOSURE NOTE added to h1.md (5 points) and a rho_bar_amendment_disclosure block + h1-PASS-rho comment in triggers.yaml — squarely within NHT step_2. APPROVED."
    h1_body_raw_text_edits:  # <-- the overreach question
      - "h1.md KILL-4: body prose edited inline — 'signal correlation' → 'PnL-contribution (signal×return) correlation', and 'ρ̄' → 'ρ̄ ≡ ρ̄_eff', with bracketed dated annotation."
      - "h1.md PASS-cond-3: 'ρ̄ ≤ 0.41' → 'ρ̄_eff ≤ 0.41', 'signal correlation' → 'PnL-contribution (signal×return) correlation', inline dated annotation."
      - "h1.md FAIL-reason-4 + blind-structural-pass line: 'ρ̄'/'signal-correlation' → 'ρ̄_eff'/'PnL-contribution', inline dated annotation."
      - "triggers.yaml h1-KILL-4 raw_text: CHANGED from 'after measured rho_bar haircut N_eff=N_raw/(1+(k-1)*rho_bar), years_to_validate > 2.0yr -> KILL' to 'after the measured rho_bar_eff haircut, years_to_validate > 2.0yr -> KILL'. (git HEAD diff confirms.) This is an edit to the FROZEN trigger raw_text, not merely an appended comment."
  the_tension:
    mathematician_wanted: "q2 rubric_text_fix + handoff_to_hoqr: explicitly asked to CHANGE THE WORDS at h1 L176/L200/L208/L246 ('signal correlation' → 'PnL-contribution …')."
    nht_wanted: "inherit-by-reference + a thin disclosure NOTE, 'NOT a silent edit of the symbol's meaning'; the NOTE is 'a disclosure pointer, not an independent edit.'"
    conflict: "The two rulings are in direct tension on the H1 BODY. Math says edit the body words; NHT says do NOT edit the symbol's meaning in place, inherit + NOTE only. HoQR resolved by doing BOTH: editing the body words AND dating/tagging each edit as a visible disclosure annotation."
  ruling:
    on_silent_vs_disclosed: "HoQR's edits are NOT SILENT — every body change carries a dated '[amended 2026-06-19 — see DISCLOSURE NOTE]' tag, and the triggers raw_text change carries an 'AMENDED 2026-06-19' comment. NHT's literal prohibition was on a SILENT edit. On the silent-ness axis, HoQR complies."
    on_independent_edit_vs_pointer: "However, NHT was more specific than 'not silent': it said the in-place change must be 'a disclosure pointer, NOT an independent edit', and 'NOT a silent edit OF THE SYMBOL'S MEANING.' Editing the FROZEN h1-KILL-4 raw_text in place (rho_bar → rho_bar_eff) IS an independent edit of a frozen gate's literal text — it goes beyond a pointer. THIS specific edit (the triggers.yaml raw_text mutation, and the equivalent inline rewrites of the .md KILL-4/PASS-3/FAIL-4 prose) EXCEEDS the 'inherit-by-reference + thin NOTE' form NHT chose. It is the one place where HoQR substituted Mathematician's 'change the words' instruction for NHT's narrower 'pointer only' instruction, on the FROZEN object, where NHT — the governance authority for freeze integrity — was the controlling ruling."
    severity_calibration: "This is OVERREACH but at the MILD end, because every NHT SAFETY interest is independently preserved: (i) direction-of-harm is stricter (Finding 4); (ii) the 0.41 threshold and every metric/operator are byte-for-byte unchanged (Finding 3); (iii) the edits are dated and disclosed, not covert; (iv) counter not burned, status FROZEN-AWAITING-DATA. The overreach is FORMAL (which authority's edit-form governs the frozen body), not substantive (no gate was loosened). Hence approve-WITH-CONDITIONS, not reject."
  the_governance_inconsistency_that_proves_the_point:
    observation: "Within triggers.yaml the two ρ̄ gates were treated DIFFERENTLY: h1-KILL-4 raw_text was EDITED in place (rho_bar→rho_bar_eff); h1-PASS-rho raw_text (line 106) was LEFT verbatim ('measured mean cross-pair signal correlation rho_bar <= 0.41') with only an appended DISCLOSURE comment."
    inference: "The h1-PASS-rho treatment (original raw_text preserved + appended dated disclosure comment) is EXACTLY the NHT-conformant 'inherit + pointer, not an independent edit' form. The h1-KILL-4 treatment (raw_text mutated) is the overreaching form. The two gates should be governed identically. The PASS-rho form is the safe template; KILL-4 should match it."

