# =====================================================================
# FINDING 1 — MATH FAITHFULNESS  (verdict: FAITHFUL, no transcription error)
# =====================================================================
math_faithfulness:
  verdict: FAITHFUL
  checks:
    rho_bar_eff_formula:
      claim: "ρ̄_eff = (λ_max(C) − 1)/(k − 1)"
      math_source: "mathematician q3 equicorrelation_form_REPORTING.rho_bar_eff (verbatim)"
      rubric_encoding: "rubric §G5 'The statistic' block — `ρ̄_eff = (λ_max(C) − 1) / (k − 1)` — EXACT MATCH"
      prereg_encoding: "h1.md PASS-cond-3 'ρ̄_eff = (λ_max(C)−1)/(k−1)' and DISCLOSURE NOTE pt.2 — EXACT MATCH"
      result: PASS
    n_eff_min_over_routes:
      claim: "N_eff* = MIN( N_raw/λ_max , N_raw·k/Σλ_i² [PR] , N_raw·k/ENB )"
      math_source: "mathematician q3 conservative_direction_rule + alternative-methods (MIN over admissible routes; neither dominates)"
      rubric_encoding: "rubric §G5 'The statistic' MIN block reproduces all three routes with the PR and ENB definitions; floor/ceiling N_raw/k ≤ N_eff* ≤ N_raw present — EXACT MATCH incl. the non-domination rationale in 'Conservative rule'"
      result: PASS
    kish_identity_consistency:
      claim: "N_raw/(1+(k−1)·ρ̄_eff) = N_raw/λ_max"
      check: "Substituting ρ̄_eff=(λ_max−1)/(k−1): 1+(k−1)·(λ_max−1)/(k−1) = 1+(λ_max−1) = λ_max. Identity holds. Rubric and prereg both state this equivalence correctly."
      result: PASS
    series_definition:
      claim: "C = Pearson corr of per-pair PnL-CONTRIBUTION x_{p,t}=signal·ret, demeaned + event-aligned, non-fires=0; NOT raw returns, NOT quote-signed signal"
      math_source: "mathematician q2 verdict (iii) + caveat_demeaning"
      encoding: "rubric §G5 'The series' block + h1.md DISCLOSURE pt.2 + triggers comments — all state PnL-contribution (signal×return), demeaned, event-aligned, non-fires=0, and explicitly exclude raw returns and quote-signed signal — EXACT MATCH"
      result: PASS
    signed_mean_forbidden_with_correct_reasoning:
      claim: "signed simple mean forbidden; reason = SD2-class under-deflation + fails redundant-pair monotonicity (k=2 corr=−1 → N_eff→∞)"
      sources: "mathematician why_signed_mean_is_wrong + NHT A1/A2 (redundant-pair monotonicity, N_eff=N_raw/0→∞)"
      encoding: "rubric §G5 'FORBIDDEN' block reproduces BOTH the SD2 framing AND the redundant-pair-monotonicity counterexample (corr=−1 → DEFF→0 → N_eff→+∞) — EXACT MATCH to NHT A2"
      result: PASS
    sign_blind_invariance:
      claim: "λ_max sign-blind: C'=SCS similar to C ⇒ spectrum invariant"
      encoding: "rubric §G5 states `C' = SCS` similar to C, spectrum invariant — matches mathematician invariance_proof_sketch"
      result: PASS
    fallback_magnitude_mean:
      claim: "magnitude mean = no-eigendecomp fallback only; dominates signed mean by triangle inequality; NO proven ordering vs ρ̄_eff"
      encoding: "rubric §G5 'Fallback' block states exactly this incl. the 'heuristic floor, not a substitute when eigendecomp available' caveat — matches mathematician q3 fallback + conservative_direction_rule"
      result: PASS
  transcription_errors_found: "NONE. All formulas, the MIN-over-routes gate, the Kish identity, the series definition, and the forbidden-statistic reasoning transcribe the Mathematician + NHT rulings without error."

