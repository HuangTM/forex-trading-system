body: |
  Three independent risk arguments converge on NO-SPEND, and any one of them
  is sufficient on its own.

  (1) NO POSITIVE EDGE TO SIZE. The net-of-cost screen is unanimously
  negative across all 54 canonical-family x pair combinations. The BEST combo
  is -1.56 net annualized Sharpe — 3.00 Sharpe units below the 1.44 STRETCH
  floor and further below the 1.76 PASS bar. Critically this is an IN-SAMPLE
  DESCRIPTIVE UPPER BOUND: it precedes any out-of-sample deflation, trial-
  selection penalty, or Deflated-Sharpe shrinkage against honest_N=30. The
  best case is already a loss-making book; the realized case can only be
  worse. There is no expectancy to allocate a position-sizing multiplier to.
  size_multiplier = 0.0 is the only defensible output — sizing off a negative-
  edge screen is sizing a guaranteed-loss position.

  (2) G5 CONFIRMABILITY IS NOT ROBUSTLY CLEARED. The only universe that
  passes the 0.41 gate as a full set, ALL-9 at 0.4090, clears by 0.0010 — a
  0.24% margin on a statistic the brief itself flags as a conservative, raw-
  return PROXY that over-states. The 3-year window gives 0.392, so the point
  estimate flickers across the gate depending on the window. A gate cleared
  by a noise-band margin on a proxy is, for risk purposes, not cleared. Both
  USD-majors sub-universes (7 and 6) FAIL outright (0.5023, 0.5971). The only
  sub-universe with real G5 margin is crosses-only (0.3563) — but that is a
  3-instrument book at N_eff 1.75, i.e. it satisfies the concentration gate by
  becoming MORE concentrated, not less. There is no configuration here that
  is both confirmable with margin AND adequately diversified.

  (3) EFFECTIVE-BET COUNT ~2.1 FORBIDS CONCENTRATION-INSENSITIVE SIZING.
  N_eff = 2.11 for ALL-9 means nine pairs behave as ~2 independent bets. Even
  if (1) and (2) were resolved, a risk budget allocated as if this were a
  diversified 9-leg book would understate tail concentration by ~4.3x. A
  single shock to the USD or EUR complex correlates nearly every leg — the
  2007 quant-quake / LTCM correlated-book failure mode. No concentration-
  sensitive sizing rule justifies a non-zero multiplier on a 2-bet book that
  also lacks positive expectancy.

  PROCEDURAL: This is a descriptive screen, not a pre-registered trial. Under
  no_trial_increment_without_pre_registration, no counted trial may be spent
  and honest_N stays at 30. The prior 7-pair cycle was correctly NO-SPEND;
  adding two clean-DQ instruments did not change the binding constraint, which
  was never data coverage — it is the absence of net-of-cost edge. The DQ
  ADMIT on EURGBP/AUDJPY is real and worth banking, but data quality is not
  the gate that fails here.

  DECISION: veto on any SPEND / counted-trial / H1 commitment on this
  universe. size_multiplier = 0.0. This is not a wind-down of research — it is
  a refusal to commit capital or a counted trial to a universe whose best
  in-sample, pre-deflation net-of-cost result is a loss. The constructive next
  step (outside my risk authority to mandate, noted as a gap) is that the
  edge problem is upstream of the pair-count problem: more instruments did not
  and cannot manufacture positive net-of-cost expectancy. Absent a screen that
  produces at least one combo at/above STRETCH on an out-of-sample basis,
  there is nothing for risk to size.
