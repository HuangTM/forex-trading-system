  - "C1 (DQ ADMIT/EXCLUDE): EURGBP and AUDJPY each receive a DQ manifest covering: n_rows, UTC range, bar_coverage_pct, measured_spread_min_pct, max_contiguous_gap_h (with gap explanation), zero_spread_run check, spread_median_pips and spread_p90_pips vs. per-pair ceiling/floor from config/data_quality_gates_1h.yaml; verdict ADMIT or EXCLUDE with failing-gate identified"
  - "C2 (rho_bar_eff recompute): rho_bar_eff and N_eff reported for ALL-9 and for the five required subsets (see hard-constraints); delta vs. prior ALL-7 (rho_bar_eff=0.502, N_eff=1.74) stated explicitly; direction of change (toward/away from 0.41 gate) stated for each subset; H1 freeze/unfreeze call issued with numeric justification referencing the gate"
  - "C3 (CD0 net-Sharpe re-screen): CD0 screen using real per-bar spread_median_pips (half-spread per-side) + 0.25 slip + 0.15 Saxo haircut; run on EURGBP and AUDJPY at minimum; optionally re-run prior pairs using real spreads if materially different from config-median; all family results (gross SR, net SR, n_trades, verdict) reported; FAIL/STRETCH/PASS threshold applied (STRETCH=1.44, PASS=1.76)"
  - "C4 (SPEND/NO-SPEND decision): explicit SPEND or NO-SPEND verdict with the deciding number(s); if NO-SPEND, state whether any STRETCH candidate exists even if not PASS; trial-counter increment decision stated (Y/N) with rationale"
  - "C5 (H1 freeze/unfreeze call): explicit REMAIN-FROZEN or UN-FREEZE verdict; if REMAIN-FROZEN, state the binding gate and the numeric shortfall; if UN-FREEZE, state which gate cleared and the pre-registration next step required before any backtest runs"
  - "C6 (NHT null tests): NHT must test at minimum: (i) Claim — adding crosses moves rho_bar_eff toward 0.41; (ii) Claim — EURGBP or AUDJPY hosts a standalone net-of-cost exploitable edge; (iii) Claim — this data drop warrants a trial-counter increment; all three nulls must be explicitly accepted or rejected with deciding numbers"
  - "C7 (PR independent verification): principal-reviewer independently recomputes at least the rho_bar_eff for ALL-9 and the DQ gate calls for EURGBP/AUDJPY from raw parquet; any discrepancy vs. QD numbers triggers a rework request before consensus is signed"
  - "C8 (descriptive log): if this reassessment produces no trial, a .fintech-org/trials.jsonl entry is appended with counts_toward_deflation_denominator: false and event: descriptive-screen"

