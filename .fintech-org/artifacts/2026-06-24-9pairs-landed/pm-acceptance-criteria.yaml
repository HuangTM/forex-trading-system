body: |
  ## Coordination notes

  ### What changed and why this reassessment is warranted
  Two FX crosses — EURGBP (landed 2026-06-23) and AUDJPY (landed 2026-06-24) — have joined the
  1h dataset. These are the first non-USD-quote pairs in the firm's intraday universe. The prior
  consensus (2026-06-22) explicitly identified EURGBP > GBPJPY > AUDJPY as the highest-priority
  acquisitions precisely because crosses are the only mechanism capable of breaking the USD-factor
  concentration wall that keeps H1 frozen. Two of the three priority crosses have now landed.

  ### Why this is NOT a progress claim
  The 2026-05-31 documented failure mode is "infra-excitement / more-data-narrative substituting
  for confirmable alpha." The fact that two recommended crosses have landed is a necessary but not
  sufficient condition for any gate to clear. The reassessment exists to COMPUTE whether the gates
  actually clear — not to assume they do. NHT is specifically tasked with testing this claim (C6-i).

  ### Key open question for H1
  The H1 freeze's binding constraint is rho_bar_eff > 0.41 (currently 0.502 on ALL-7, 0.597 on
  USD-majors-6). The question this wave answers: does adding EURGBP and/or AUDJPY to the
  universe pull rho_bar_eff toward or below 0.41? The prior HoQR recommendation was that crosses
  with lower USD-beta should dilute the factor — but this is a hypothesis, not a fact. The QD
  computation will settle it. If rho_bar_eff on ALL-9 (or on a cross-inclusive H1 candidate
  subset) clears 0.41, H1 can be considered for un-freeze subject to CD0 also clearing.

  ### CRO firewall note
  The CRO receives ONLY the structured fields of this artifact (instrument-universe and
  hard-constraints). Task-statement free-text and body narrative are NOT forwarded to CRO.
  All information the CRO needs is encoded in the hard-constraints machine-checkable clauses:
  rho_bar_eff <= 0.41, honest_N=30, paper_only, no_live_capital, no_trial_increment_without_pre_reg,
  EXCLUDE-NOT-IMPUTE, and the veto-trigger conditions from prior CRO artifact. This is the
  disjoint-evidence contract.

  ### Real spreads on the new crosses — key change vs. prior CD0 screens
  Prior CD0 screens (2026-06-19, 2026-06-23) used config-median spreads because the parquets
  at that time may have lacked real measured spread columns. The 9 on-disk parquets now all
  carry spread_median_pips, spread_mean_pips, and spread_p90_pips with zero nulls (verified
  2026-06-24). This means C3 uses REAL per-bar spreads for the first time. The EURGBP and
  AUDJPY spread maxima are materially higher than USD-major crosses (EURGBP spread_median up to
  29.9 pips; AUDJPY up to 33.2 pips in illiquid sessions). If these spreads are real and not
  artifacts, they will likely make the CD0 screen MORE cost-dominated for the crosses than for
  the USD majors — which makes a net-positive CD0 result LESS likely, not more. QD should
  characterize the spread distribution (median, p90, fraction of bars above e.g. 5 pips) and
  confirm the cost model uses spread_median_pips (half-spread per side) as the baseline charge,
  with spread_p90_pips available for stress scenarios.

  ### Dissent preservation
  NHT dissent is append-only, verbatim, and survives consensus. If NHT produces a
  block-threshold dissent, the consensus artifact must carry it and surface it to the CEO.

  ### Rework cap
  Maximum 2 QD review cycles (consistent with prior protocol). If PR flags a discrepancy
  after cycle 2 that cannot be resolved, escalate to CEO via named-gap artifact.

  ### Trial counter
  This reassessment is a descriptive screen (no param search, no OOS, no frozen spec with
  pre-registration). It does NOT increment the trial counter. If the screen produces a
  SPEND verdict (CD0 clears STRETCH/PASS), the pre-registration step is the next action
  before any trial is counted. The .fintech-org/trials.jsonl entry for this screen carries
  counts_toward_deflation_denominator: false.

