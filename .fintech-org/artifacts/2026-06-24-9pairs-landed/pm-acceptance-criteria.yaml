  - "CD0 screen: 6 canonical intraday families (F1-F6 as defined in prior consensus artifacts); single fixed spec per family; no param search; no OOS; in-sample descriptive upper bound only; real per-bar spreads from spread_median_pips / spread_p90_pips columns (NOT config-median fallback); EXCLUDE-NOT-IMPUTE for zero/missing spread bars"
  - "H1 un-freeze is FORBIDDEN unless rho_bar_eff <= 0.41 is met on the universe-as-proposed-for-H1; un-freeze also requires CD0 net SR >= 1.76 on at least one family for at least one pair in the candidate universe"
