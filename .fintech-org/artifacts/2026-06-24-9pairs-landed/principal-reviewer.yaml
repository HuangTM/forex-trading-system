findings:
  - id: F-001
    severity: major
    location: scripts/compute_9pairs_readiness.py:228-231,260-261,374-377 (_position_changes / cost application)
    category: spec-drift
    observation: >
      Cost is charged as `changes * rt_cost` where `changes = (pos.diff().abs() > 0)` is a
      BINARY flag (1 per bar where position changed). A position REVERSAL (+1 -> -1, diff.abs()=2)
      is therefore charged ONE full round-trip cost (spread + 2*(slip+haircut)), even though a flip
      physically crosses the spread TWICE (close the existing leg, open the opposite leg = two
      half-spread + slip + haircut crossings). High-turnover families (F1/F6, ~16k trades) flip
      direction on most bars, so this under-counts a large fraction of crossings.
    inference: >
      INFERENCE: This UNDER-counts transaction cost, which makes net SR LESS negative than
      reality — i.e. the error is in the ANTI-conservative direction for a FAIL screen (it makes
      strategies look better than they are). It does NOT threaten the all-54-FAIL verdict: the
      best result is -1.56 vs the +1.44 STRETCH bar (a 3.0-SR gap), and correcting the cost can
      only widen that gap. But because a readiness screen is supposed to be conservative, a
      cost-undercount in the wrong direction is a latent trap if any future family lands near the
      bar. Should be corrected before any pre-registration reuses this cost code.
    evidence: "Verified: pos=[0,1,1,-1,-1,0,1] -> change flags=[0,1,0,1,0,1,1], n_trades=4; the +1->-1 reversal at index 3 (diff.abs=2) is counted as a single change, charged one RT_cost."
    recommended-action-class: clarify-spec
    owning-role: quant-developer
  - id: F-002
    severity: minor
    location: scripts/compute_9pairs_readiness.py:160-167 (N_eff routes)
    category: spec-drift
    observation: >
      The 2026-06-19 amendment (hoqr-rho-bar-amendment.yaml §1) specifies
      N_eff* = MIN( N_raw/lambda_max , N_raw·k/Σλ² , N_raw·k/ENB ) with floor/ceiling
      N_raw/k ≤ N_eff ≤ N_raw — i.e. routes scaled by N_raw (the observation count, ~30k).
      The script instead computes routes as k/lambda_max, PR=k²/Σλ², and ENB (a count-of-BETS
      in [1,k], not deflated observations). The reported N_eff=2.11 for ALL-9 is a bets-count,
      not the amendment's N_eff (which would be ~6,976 observations).
    inference: >
      INFERENCE: N_eff is NOT the load-bearing gate here (rho_bar_eff ≤ 0.41 is), and the
      bets-count is internally consistent and arguably the more intuitive diversification
      summary, so no verdict is affected. But the field is LABELED "N_eff (min)" against an
      amendment that defines N_eff differently; a downstream consumer (e.g. H1's years_to_validate
      via N_eff) that plugs 2.11 in where ~6,976 belongs would mis-deflate by 3 orders of
      magnitude. Spec/label mismatch should be reconciled before N_eff feeds any power/validate
      calc.
    evidence: "amendment §1 n_eff_gate: 'N_eff* = MIN( N_raw/λ_max , N_raw·k/Σλ_i² , N_raw·k/ENB )'; script line 162-166 uses k/lambda_max, PR, ENB (no N_raw factor). My recompute of the N_raw-scaled MIN for ALL-9 = 6976.3 obs vs QD's reported 2.11."
    recommended-action-class: clarify-spec
    owning-role: quant-developer
  - id: F-003
