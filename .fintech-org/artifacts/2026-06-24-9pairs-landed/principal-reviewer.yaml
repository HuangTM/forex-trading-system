  - "I did not reconcile QD's EURJPY F2 (-4.0) against cycle-1's PR-verified -0.872; both FAIL and it is verdict-irrelevant, but the F1-F6 specs are demonstrably non-reproducible across cycles (not frozen as code)."
  - "I verified the all-54 conclusion via family-mechanics + the binding least-negative combo, not by independently recomputing all 54 cells."
