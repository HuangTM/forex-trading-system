body: |
  ## Verdict: approve-with-conditions

  All THREE load-bearing facts independently reproduce to full precision:

  1. **rho_bar_eff(ALL-9) = 0.40904 ≤ 0.41** — confirmed. My own eigen-decomposition (not
     importing QD's code) gives lambda_max=4.272341, rho=0.40904259, margin +0.000957. Every
     subset (USD-7 0.5023 FAIL, USD-6 0.5971 FAIL, CROSSES 0.3563 PASS) and the 3yr robustness
     cut (0.3918) match. Eigenvalues sum to 9.0 (validates the decomposition). The gate genuinely
     clears on the raw-return proxy.

  2. **DQ: EURGBP ADMIT, AUDJPY ADMIT** — confirmed by an independent coverage_gate() run.
     Coverage 99.19%/99.25%, measured-spread 100%, max-gap 24h (at the limit, legitimate New-Year
     closure), pair-spread-medians 0.90/0.80 vs ceilings 3.0/5.0, zero zero-spread and zero
     missing-spread bars. No SC flags. Numbers match exactly.

  3. **All 54 CD0 combos net-negative** — verified via family-mechanics (F1 both new pairs + F5
     best-case reproduce exactly) and the binding result: least-negative is AUDJPY F5 at -1.5555,
     which is 3.0 SR below the +1.44 STRETCH bar.

  ## Why approve-WITH-CONDITIONS rather than clean approve

  The numbers are correct, but three things must travel WITH this artifact so the firm doesn't
  over-read it:

  - **F-001 (major, cost under-count):** reversals are charged 1 RT not 2. Error is
    anti-conservative for a FAIL screen. Verdict-safe here (3.0-SR gap) but the cost code must be
    fixed before any pre-reg reuses it — a conservative screen must not under-count cost.

  - **F-003 (proxy margin):** the gate clears by 0.000957 on the RAW-RETURN proxy. The true
    PnL-contribution stat is uncomputable pre-pre-reg, and I did NOT re-derive the "proxy ≥ true"
    conservatism direction (inherited from the 2026-06-19 ruling). Any SPEND/un-freeze decision
    that leans on "ALL-9 clears G5" is leaning on a 0.001 proxy margin, NOT a measured true-gate
    clearance. This is exactly QD's own top knowledge_gap; I confirm it is load-bearing. Route to
    HoQR for the conservatism-direction sign-off before treating the gate as cleared.

  - **F-002 / F-004 / F-005 (non-flipping):** N_eff is a bets-count not the amendment's
    N_raw-scaled deflation (label mismatch, non-gate); F1-F6 are not frozen-as-code so EURJPY F2
    differs from cycle-1 (-4.0 vs -0.87, both FAIL); JPY uniform-pip makes JPY net-SR magnitudes
    non-physical (true basis only deepens the FAIL). None threaten a verdict.

  ## What I did NOT find
  No silent fillna/clip/winsorize that distorts a verdict (the clip(-1,1) in F5 is intentional
  direction-not-accumulation; the fillna(0) on shift/log-ret boundaries is benign). No lookahead
  (shift(1) verified operative). No EXCLUDE-vs-IMPUTE violation (zero/missing spread bars excluded
  from both gross and cost; and there are ZERO such bars in EURGBP/AUDJPY anyway). Annualization
  sqrt(6150) is reasonable and applied uniformly (cannot flip a sign).

  ## Bottom line
  The three load-bearing facts are CORRECT and independently reproduced. Approve the COMPUTATION.
  Conditions: (1) HoQR signs off that the raw-return proxy clearing at margin 0.001 is acceptable
  as the G5 input given the true stat is unmeasurable pre-pre-reg [F-003]; (2) QD fixes the
  reversal cost under-count [F-001] and reconciles the N_eff label [F-002] before this cost/Neff
  code feeds any pre-registration. No live capital implicated; descriptive in-sample screen only.
