  New code: scripts/compute_9pairs_readiness.py (new pair data, 9-universe subsets, cross DQ manifest).

  ---

  ## Method disclosure: rho_bar_eff statistic + proxy direction

  Statistic: rho_bar_eff = (lambda_max(C) - 1) / (k - 1) where C = Pearson correlation matrix
  on aligned 1h log-returns. This is sign-blind (uses eigenvalue, not signed mean) per amendment.
  The signed-mean correlation is reported for reference only (NOT the gate stat):
  - ALL-9 signed mean = +0.100 (for reference)
  - USD-majors-7 signed mean = +0.079 (for reference)
  These differ materially from rho_bar_eff values (0.409 vs 0.100 for ALL-9) — confirming signed
  mean is NOT a faithful proxy for the eigenvalue concentration statistic.

  Proxy direction (raw log-returns vs PnL-contribution): Per the 2026-06-19 mathematical ruling,
  the raw-return proxy over-states concentration for universes where the signal is uncorrelated
  with the dominant factor. Reason: signal × return has LOWER factor loading than return alone
  when signal is orthogonal to the factor. The USD factor explains ~47-66% of return variance
  across universes; if a signal is not purely USD-correlated, PnL-contribution correlation < raw.
  HOWEVER: the ALL-9 margin is only 0.001. The direction is conservative (proxy ≥ true), but
  the margin does not allow confident assertion that the true gate clears until measured directly.
  AUDJPY's high USDJPY/EURJPY correlation means it adds some common-factor back, which partially
  offsets EURGBP's diversification benefit. Net effect: 0.409 proxy, direction conservative,
  margin thin.

