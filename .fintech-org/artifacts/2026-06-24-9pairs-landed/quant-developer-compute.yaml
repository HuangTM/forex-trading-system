  | zero_spread_bars | 0 | — | PASS |
  | n_missing_spread_bars | 0 | — | PASS |

  Max-gap explanation: 24h gap = 2023-12-31 22:00 UTC to 2024-01-01 21:00 UTC.
  Same New Year 2024 market closure as EURGBP. Legitimate market holiday.

  Spread distribution note: spread_median_pips ranges 0.40–33.2; 90th percentile = 1.3 pips;
  only 3.06% of bars have spread_median > 5 pips. Pair-level median = 0.80 pips — well below
  the 5.0-pip ceiling. The JPY pip basis (0.01) means these pips are larger in price space
  than non-JPY pip; this is factored into the per-pair config thresholds.

  **VERDICT: ADMIT (all gates pass)**

  ---

  ## C2 rho_bar_eff / N_eff — table over required subsets

  Statistic: rho_bar_eff = (lambda_max(C) - 1) / (k - 1), eigenvalue/sign-blind per 2026-06-19 amendment.
  Proxy: raw 1h log-return correlation (no signal series pre-pre-reg). Conservative direction disclosed below.
  N_eff = MIN(k/lambda_max, PR, ENB). MIN route for ALL-9 is k/lambda_max (route 1).

  | Subset | k | n_obs | lambda_max | PC1 | rho_bar_eff | N_eff (min) | G5 gate (≤0.41) | vs prior |
  |--------|---|-------|-----------|-----|-------------|-------------|-----------------|---------|
  | ALL-9 | 9 | 29,805 | 4.2723 | 47.5% | **0.4090** | 2.11 | **PASS (margin 0.001)** | Δ −0.093 vs ALL-7 (0.502) |
  | USD-majors-7 (excl EURGBP/AUDJPY) | 7 | 30,093 | 4.0138 | 57.3% | 0.5023 | 1.74 | FAIL | Δ +0.0003 vs prior ALL-7 (0.502) |
  | USD-majors-6 (prior ref) | 6 | 30,233 | 3.9853 | 66.4% | 0.5971 | 1.51 | FAIL | Δ +0.0001 vs prior USD-6 (0.597) |
  | CROSSES-only (EURJPY/EURGBP/AUDJPY) | 3 | 30,735 | 1.7127 | 57.1% | **0.3563** | 1.75 | **PASS** | — |
  | USD-majors-7 (repeat) | — | — | — | — | 0.5023 | 1.74 | FAIL | (per-req) |

  N_eff routes (ALL-9): route1(k/λ_max)=2.11 / route2(PR=k²/Σλ²)=3.18 / route3(ENB)=3.99.
  MIN = route1 = 2.11 (conservative per amendment).

  Eigenvalues for ALL-9 (descending): [4.2723, 2.2317, 1.2869, 0.6802, 0.3700, 0.1427, 0.0061, 0.0054, 0.0046]
  Sum = 9.0 (correct; validates eigendecomposition).

  ### Pairwise correlation contributions of new crosses

  EURGBP pairwise (with ALL-7): EURUSD=+0.207, GBPUSD=−0.489, USDJPY=+0.004, EURJPY=+0.181, AUDUSD=−0.153, USDCAD=+0.123, NZDUSD=−0.142
  AUDJPY pairwise (with ALL-7): EURUSD=+0.207, GBPUSD=+0.277, USDJPY=+0.512, EURJPY=+0.712, AUDUSD=+0.617, USDCAD=−0.449, NZDUSD=+0.454

  EURGBP is genuinely low-USD-beta (+0.004 vs USDJPY, −0.489 vs GBPUSD). Acts as a diversifier.
  AUDJPY is moderate-USD-beta (high EURJPY/AUDUSD correlation); adds some JPY + commodity factor.
  The net of both crosses brings ALL-9 rho_bar_eff from 0.502 to 0.409.

  ### Delta summary vs prior

  - ALL-7 prior: 0.502 → ALL-9 now: 0.409. Delta = −0.093. Direction: toward gate (improving).
  - USD-majors-6 prior: 0.597 → unchanged (no new USD majors).
  - Adding EURGBP+AUDJPY to ALL-7: the two crosses together reduce concentration by 0.093 rho units.
  - EURGBP is the primary diversifier (near-zero USD beta); AUDJPY partially offsets with JPY factor.

  ### CRITICAL DISCLOSURE: thin margin and proxy direction

  rho_bar_eff (ALL-9) = 0.4090; gate = 0.4100; margin = 0.0010 (0.23% of gate value).
  This is a MARGINAL pass. The proxy (raw log-returns) over-states concentration vs the true
  PnL-contribution gate stat per the 2026-06-19 ruling (conservative direction: true stat ≤ proxy
  because a signal uncorrelated with the USD factor reduces PnL-contribution correlation below
  raw-return correlation). Conservatism direction means the true stat is expected to be ≤ 0.409,
  but the MARGIN (0.001) is too thin for high confidence without measuring the true stat.
  Robustness check: last 3yr (2023-2025) rho_bar_eff = 0.392 (also below gate). Provides
  additional support but does not replace the true PnL-contribution measurement.
  The honest statement: ALL-9 raw-return proxy CLEARS the gate at 0.4090 ≤ 0.41 but by a thin
  margin. The true PnL-contribution gate stat (not computed — no signal series exists pre-pre-reg)
  is expected to be further below the gate (conservative direction), but the margin is insufficient
  to rule out a scenario where signal alignment shifts the result above 0.41.

  ---

  ## C3 CD0 net-SR with real spreads — 9 pairs, F1-F6

  First time real per-bar spread_median_pips used for cost (prior cycles used measured parquet
  spread which was already present; this wave adds EURGBP and AUDJPY real spreads).
  Cost model: per-trade RT cost = spread_median_pips + 2×(0.25 slip + 0.15 paper-broker haircut)
  = spread_median_pips + 0.80 pips. Bars with spread=0 or missing excluded (EXCLUDE-NOT-IMPUTE).
  Annualization: sqrt(6150) = 78.4. Bar: PASS ≥ 1.76 / STRETCH ≥ 1.44 / FAIL < 1.44.
  Pip convention: 0.0001 uniform for ALL pairs (matching prior canonical F1-F6 spec; see assumptions).

  ### NEW CROSSES (EURGBP, AUDJPY)

