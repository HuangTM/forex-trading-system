body: |
  ## C1 DQ results (EURGBP, AUDJPY)

  Both pairs run through existing DQ gate library (src/forex_system/data/quality_gate_1h.py).

  ### EURGBP

  | Field | Value | Gate | Status |
  |-------|-------|------|--------|
  | n_rows | 31,022 | — | — |
  | UTC range | 2021-01-03 22:00 → 2025-12-31 21:00 | — | — |
  | bar_coverage_pct | 99.19% | ≥85% | PASS |
  | measured_spread_coverage | 100.0% | ≥90% | PASS |
  | max_contiguous_gap_h | 24h | ≤24h | PASS (at limit) |
  | spread_median_pips (pair-level median) | 0.90 pips | ≤3.0 | PASS |
  | spread_p90_pips (median of p90 col) | 1.0 pips | ≤8.0 | PASS |
  | zero_spread_bars | 0 | — | PASS |
  | n_missing_spread_bars | 0 | — | PASS |

  Max-gap explanation: 24h gap = 2023-12-31 22:00 UTC to 2024-01-01 21:00 UTC.
  This is the New Year 2024 market closure (same pattern as NZDUSD's 73h gap in prior cycle).
  Not a data defect — legitimate market holiday closure.

  Spread distribution note: spread_median_pips ranges 0.30–29.9; 90th percentile of the
  spread_median column = 1.6 pips; only 2.06% of bars have spread_median > 5 pips.
  The high-spread bars are illiquid-session spikes (typically Sydney early hours or holidays).
  Pair-level median = 0.90 pips — well below the 3.0-pip ceiling.

  **VERDICT: ADMIT (all gates pass)**

  ---

