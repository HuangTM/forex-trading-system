body: |
  RISK VERDICT: size-reduced (0.20). The evidence does NOT justify advancing the
  cost-aware FAMILY as proposed (3 pairs, 2 candidates). It justifies AT MOST one
  narrowly pre-registered, USDJPY-only confirmatory trial — and only because this is
  paper-only with no live capital at stake. Here is the risk reasoning, weighing the
  four factors I was asked to weigh.

  (a) SIGN-FLIP ACROSS HORIZON, SAME PAIR. EURUSD and GBPUSD margins flip sign between
  6h (+0.364, +1.045) and 12h (-0.173, -1.485). A real post-decision drift does not
  reverse its own sign one bar later for the same instrument. This is the signature of
  noise sampled at multiple horizons until one looks positive — i.e., the multiple-
  testing artifact, visible in the raw data. It is disqualifying for EURUSD/GBPUSD.

  (b) ONE INSTRUMENT, ONE REGIME, MOST OF THE MARGIN. I quantified both, because my
  mandate is to drill the dominant contributor. USDJPY is 97.4% of C1's net margin
  (3219.8 of 3306.2 net pips). Within USDJPY, the 2022-03..2023-07 FED hiking window —
  30% of the events — supplies 53-54% of the 12h/18h gross, at a per-event mean 2.7x
  the rest-of-sample. So the apparent family edge is a single-instrument x single-macro-
  regime phenomenon. That is the carry/momentum-collapse blowup profile: it pays through
  the trend and surrenders it at the regime turn. C2's AUDJPY leg (net -12.19) is that
  same loss already realized in-sample.

  (c) SMALL EVENT COUNTS. n=40 (FED-only proxy for EURUSD/GBPUSD) and n=80 (USDJPY,
  FED+BOJ). With gross_sd of 25-79 pips, the best cell (USDJPY 18h) reaches only raw
  in-sample net t ~= 2.12. That is PRE-deflation. The screen itself tested 11 cells; a
  Bonferroni floor (p=.05/11) requires |t| ~= 2.84. The best cell does not clear its own
  selection surface, let alone the firm's standing honest_N=30 deflation. Every other
  cell is materially weaker (USDJPY 6h t~1.00; EURUSD/GBPUSD t<1).

  (d) IN-SAMPLE, PRE-DEFLATION GROSS. No risk-adjusted metric (Sharpe, Expected
  Shortfall, drawdown) was supplied. Per quantitative-risk-management, I cannot approve a
  sizing decision whose tail metric is undefined; ES at 97.5% with a stressed window is
  the standard, and the most relevant stress (the hiking regime) is the very thing
  carrying the result. The gross_sd of 56-171 pips against single-digit margins means the
  per-trade signal-to-noise is far below what a counted, deflated trial would survive.

  WHY NOT VETO. Three reasons keep this at size-reduced rather than veto: (1) it is
  paper-only, no live capital — the actual risk being committed is research budget, not
  P&L; (2) USDJPY 12h/18h does show a raw, real, post-event drift (net t ~2.1) that is
  not yet falsified, only un-deflated; (3) the cost accounting is now honest (f001 fix:
  sign-flip charges 2x RT, undercount remedied). A single pre-registered USDJPY-only
  confirmatory cell is a defensible use of a fraction of a trial.

  WHY NOT APPROVE AT FULL SIZE. The family as proposed bundles two dead candidates with
  one regime-loaded one. C2 is dead (AUDJPY -12.19; USDJPY +1.81 at t=0.14; carry ~0.02
  pips — the carry thesis collapsed when the vol-crash filter cut the hold to ~5 days).
  EURUSD and GBPUSD are noise (sign-flips, t<1, and their OWN central banks contributed
  0 verified events — the edge is measured on FED proxy events). Advancing the bundle
  would spend a counted trial on 8 cells that the screen already shows are noise or dead,
  to chase 1 cell that is regime-concentrated.

  CONDITIONS ON THE 0.20 (the only commitment this screen justifies):
  - Pre-register ONE cell: USDJPY, 12h OR 18h (pick one, not both — picking the max ex
    post is itself a selection bias). Declare it BEFORE the run.
  - Pre-declare deflation N that includes this screen's 11-cell surface, not just N=30.
  - The pre-reg MUST require a regime-split readout (in-hike vs out-of-hike net) as a
    PASS gate, not a footnote: if out-of-hike net does not independently clear cost+
    hurdle, KILL — because that is the part that survives the next regime.
  - EXCLUDE-NOT-IMPUTE on any missing cost bars; no FED-proxy events for EUR/GBP in any
    counted run.
  - Keep f001 cost-flip accounting ON; reverting it (undercounting sign-flip cost) is a
    veto condition.
  - DROP C2 entirely and DROP EURUSD/GBPUSD from the counted scope.

  If the firm is unwilling to narrow to a single pre-registered USDJPY cell with a
  regime-split kill gate, this should be NO-SPEND, consistent with the prior cycles.
