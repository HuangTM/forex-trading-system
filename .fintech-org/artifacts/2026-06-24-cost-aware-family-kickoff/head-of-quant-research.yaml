  - "C1-DSR-DEFLATION: net Sharpe must clear the Deflated-Sharpe bar under the org-wide honest-N (currently 30, +1 for this counted trial = 31 in the denominator) AND under the internal selection count (pairs screened x horizons considered). If the trial pre-registers USDJPY-only at one horizon, N_sel for THIS trial = 1; the org-wide N=31 still applies."
  - "C1-OOS-EMBARGO: CPCV with a purge+embargo of at least one full hold-horizon around each fold boundary (event windows must not straddle train/test). Minimum 15 qualifying events per test fold or the fold is non-evaluable."
  - "C1-SURPRISE-FILTER-BINDING-CHECK: the surprise filter passed 100% of events in the screen (non-binding under the max-TR bar-attribution rule). The pre-reg MUST either (a) obtain exact release timestamps so the filter discriminates, or (b) drop the filter claim and label C1 as an UNCONDITIONAL post-decision-drift bet (honest framing). A filter that never excludes anything may not be claimed as a selectivity mechanism."
  - "C2-AS-RUN: RETIRED. AUDJPY gross -8.14 (hard FAIL, kill 1.28); USDJPY 'PASS' (4.81) is price drift (carry accrual 0.021 pips at ~5-day holds), the SAME 2022-23 FOMC drift as C1 USDJPY, double-counted. The carry hypothesis was not tested → as-run design retired."
  - "C2-RESPEC (if ever revived): mean realised hold MUST exceed 20 trading days AND carry accrual component MUST exceed 50% of gross, else the screen has again not tested carry → auto-FAIL."

