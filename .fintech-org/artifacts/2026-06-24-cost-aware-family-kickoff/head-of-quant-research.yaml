  - "C1-HORIZON-LOCK: the hold horizon MUST be pre-committed in the pre-registration BEFORE the CPCV run (USDJPY default = 12h, the feasibility-best). Reporting any other horizon's result post-hoc is a horizon-selection violation and voids the trial. The 3-18h sweep is FORBIDDEN inside the counted trial; if a sweep is run it is charged as N_sel>1 in DSR deflation."
