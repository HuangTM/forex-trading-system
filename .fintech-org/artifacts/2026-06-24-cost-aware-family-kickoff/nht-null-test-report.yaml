body: |
  ## Claim (i) — does C1 clear the cost hurdle
  As a mechanical exercise: yes, several cells have mean gross > RT cost (USDJPY 12h
  +17.6, USDJPY 18h +18.7, GBPUSD 18h +3.4, etc.). But "clears a per-trade cost hurdle
  on a sample mean" is not "an edge." Two structural problems make the PASS labels
  unreliable on their own terms:
    1. The kill threshold is 80% of the RT hurdle, so EURUSD 12h (margin -0.17) and
       GBPUSD 12h (margin -1.49) are labelled PASS by the machine rule despite NOT
       netting positive. The QD discloses this. Strip it and the C1 PASS set shrinks.
    2. Eight of nine cells have a t-stat of the mean-vs-zero below 1.0. A mean that is
       within one standard error of zero "clears a hurdle" only by accident of the sign.
  So Claim (i) is true only as a descriptive arithmetic statement on selected cells; it
  carries no inferential weight.

  ## Claim (ii) — horizon-selection / regime-concentration / small-N attack
  REJECTED on all three sub-claims.
  (a) Horizon-selection: the screen ran 3 holds x 3 pairs = 9 cells and the QD picks a
      best horizon per pair (EURUSD 6h, USDJPY 12h, GBPUSD 18h). The horizon that "wins"
      is inconsistent across pairs (EURUSD only 6h; GBPUSD fails 12h but passes 6h AND
      18h) — the signature of selecting on noise, not a structural drift with a stable
      decay profile. Multiple-comparison count for any "best cell" >= 9 (and ~14 with C2
      and the per-pair pick).
  (b) Regime-concentration — the killer. USDJPY (the only pair with raw t>2) earns its
      entire signal in 2022-2023:
        USDJPY 12h per-year mean: 2021=0.2, 2022=28.1, 2023=54.0, 2024=0.7, 2025=16.7.
        DROP-2022/2023: mean 19.94 -> 5.87, t 2.33 -> 0.62.
        USDJPY 18h DROP-2022/2023: mean 21.12 -> 7.00, t 2.37 -> 0.66.
        USDJPY 6h DROP-2022/2023: mean 6.35 -> 0.73 (2024 is NEGATIVE).
      Every EURUSD/GBPUSD PASS cell flips sign or collapses to |t|<0.8 on the same drop.
      The "post-CB-decision drift" is the 2022-23 USD/JPY trend captured by post-FOMC
      entries in a one-directional pair — a macro episode, not a decision-reaction edge.
  (c) Small-N: n=40 (FED-only, EURUSD/GBPUSD) and n=80 (USDJPY). Combined with std of
      24-80 pips, the standard error on the mean is 4-9 pips — wider than most of the
      reported means. And the n=80 is not 80 independent bets: it is dominated by ~32
      events inside one macro regime. Effective independent looks ~ 1.
  Mean-vs-median everywhere confirms fat-tail domination (USDJPY 12h mean 19.94, median
  6.90). The headline ~20 pips is a tail artifact.

  ## Claim (iii) — did C2 test carry at all
  NO. The crash filter cycled to ~5-day holds, so carry accrual = 0.018 (AUDJPY) /
  0.021 (USDJPY) pips — <0.5% of gross. The carry mechanism was effectively switched off.
  AUDJPY gross -8.14 is crash-period price loss; USDJPY +4.81 is the same 2022-23 USD/JPY
  drift seen in C1, not carry. C2 as-run is a price-drift screen mislabelled as carry.
  The carry HYPOTHESIS is untested by this artifact. Verdict on Claim (iii): unsupported —
  C2 neither passes as carry (channel inert) nor was the hypothesis exercised.

  ## What a NON-snooped confirmatory test would require
  1. PRE-COMMIT one horizon and one entry rule per family BEFORE seeing pair-level means
     (no per-pair best-hold pick). Register it.
  2. REGIME-STRATIFY: report the edge OUT of the 2022-23 hiking cycle and require it to
     survive there (it does not: drop-regime t~0.6). Or block-bootstrap by macro regime
     so a single episode cannot drive significance.
  3. EXPAND the event set with VERIFIED-OFFICIAL ECB/BOE dates so EURUSD/GBPUSD are not
     FED-only proxies (currently the "ECB/BOE reaction" is measured on FED events — a
     spec-implementation mismatch).
  4. ACTUALLY EXERCISE carry for C2: a minimum-hold constraint (weeks) and a crash filter
     that does not flatten every 5 days, OR use real broker swap, so carry_pips is a
     material fraction of gross. Otherwise C2 is just a second drift test.
  5. HEAVY-TAIL-aware inference: t-stat on std-76 data is optimistic; use median/sign
     test or a Newey-West/bootstrap CI, and DEFLATE for the >=9 looks here plus org N=30.
  6. FORWARD-test the pre-committed rule on held-out 2024-2025 (which the data already
     shows is ~flat for USDJPY) before any capital or pre-registration claim.
  Only if the pre-committed, regime-robust, deflated cell still clears with |t| above the
  multiple-comparison-corrected threshold should this be called a non-negative signal.
