body: |
  ## Coordination notes

  ### Sequencing (hard order)
  1. QD fixes F-001 and F-002 in scripts/compute_9pairs_readiness.py and verifies with
     unit assertion. Quant-researcher designs candidate family in parallel (no dependency).
  2. HoQR reviews the declarative design. If design passes sanity, QD runs the CD0 screen
     with F-001-fixed code.
  3. NHT evaluates feasibility hypothesis vs the cost null simultaneously with or
     immediately after QD screen.
  4. HoQR issues advance-or-kill based on QD numbers + NHT evaluation.
  5. PR single-wave review of F-001 fix, design spec, and screen numbers.
  6. CRO issues structured risk position.
  7. PM synthesizes CONSENSUS.md.

  No committed backtest may be initiated in any step. Firm rule 4 holds throughout.

  ### CRO firewall
  The CRO task statement contains ONLY structured fields: instrument-universe,
  hard-constraints, cost-hurdle definition, no-live-capital flag, honest-N=30,
  no-counted-trial-this-cycle. No rationale, no framing, no strategy description.
  This is enforced by PM at dispatch time. The CRO synthesizes risk from the
  structured fields; any rationale crossing the firewall is a violation.

  ### Feasibility-gate definition (machine-checkable)
  - PASS: gross_edge_per_trade_pips > RT_cost_per_trade_pips for the candidate's
    holding-period regime, using real per-bar spread_median_pips from parquet,
    pair-native pip conventions, and F-001-fixed reversal-cost accounting.
  - STRETCH: gross_edge_per_trade_pips is within 20% of RT_cost_per_trade_pips
    with explicit margin and uncertainty disclosure.
  - FAIL: gross_edge_per_trade_pips <= 80% of RT_cost_per_trade_pips, or the
    gross-edge rationale is based on an untestable or unfalsifiable claim.

  ### Why this is non-counting by design (R1's point)
  The 2026-06-24 CONSENSUS found that all 54 canonical-family combos fail by 3.00
  SR units. The binding constraint is cost-dominance on HIGH-TURNOVER price-only
  families. R1's insight: running a CPCV backtest on a family that can't pass the
  cost-feasibility screen wastes the trial counter and inflates the DSR denominator
  (honest-N penalty) for a result that is knowable cheaply. The feasibility screen
  IS the cheap decisive test; it produces a verdict without consuming honest-N.
  Pre-registration and honest-N increment happen only if and when feasibility clears.

  ### Open items NOT in scope this cycle
  - C-i (rho_bar proxy conservatism sign-off): moot until a signal series exists.
  - GBPJPY acquisition: explicitly held per HoQR R3.
  - F1-F6 re-examination: retired-as-saturated per machine-checkable condition.
  - H1 un-freeze: prohibited while CD0 net SR = 0 positive candidates exist.

