      it must be flagged so a downstream CPCV pre-registration fixes the horizon BEFORE measuring,
      not after.
    evidence: cost_feasibility_raw.json (9 C1 cells), YAML body lines 231-236.
    recommended-action-class: clarify-spec
    owning-role: head-of-quant-research
  - id: F-005
    severity: minor
    location: scripts/cost_feasibility_c1_c2.py:315-338 (C1 stop fill) and 553 (C2 exit price)
    category: edge-case
    observation: >
      C1 stop-out exits use the stop bar's CLOSE as exit price (line 338), not the stop level; 32/80
      USDJPY-12h and 38/80 18h trades are stop exits. Gross is computed at close, which can be more
      adverse than the stop level (gap-through) or less adverse (intrabar recovery).
    inference: >
      [INFERENCE] This is a fill-realism approximation, not a lookahead and not a cost bug. It can
      bias gross either way; on a stop-out it tends to OVERSTATE the loss capture vs a fill-at-stop
      assumption (slightly conservative for losers). Acceptable for a cheap screen but should be
      named as a modeling choice. No action beyond disclosure.
    evidence: "exit_reason counts reproduced (USDJPY 12h: 48 hold / 32 stop)."
    recommended-action-class: add-log
    owning-role: quant-developer
  - id: F-006
