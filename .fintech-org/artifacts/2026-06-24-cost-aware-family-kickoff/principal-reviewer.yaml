independent-recompute:
  f001_flip_charges_2rt: >
    true. I imported the PRODUCTION _position_changes() from compute_9pairs_readiness.py (not the
    QD's mirror) and ran it on three synthetic paths. flat->+1 = diff 1 (1 RT); +1->-1 = diff 2
    (2 RT); -1->+1 = diff 2 (2 RT); +1->flat = diff 1. Assertion reproduced independently:
    [0,1,1,-1,0] -> changes [0,1,0,2,1], flip-bar cost = 5.60 = 2x single (2.80), total 11.20 vs
    old-bug 8.40. The F-001 fix is CORRECT and verified on the real production function.
  c1_lookahead_check: >
    clean. Entry bar = announcement-bar-position + 1 (verified against raw trades: ann 13:00 ->
    entry 14:00, ann 18:00 -> entry 19:00, etc.). Direction = sign of announcement bar's own
    (close-open), but the captured gross is direction*(exit_close - entry_OPEN)/pip, i.e. it starts
    accruing from the OPEN of the bar AFTER the announcement bar — the announcement bar's own move
    is NOT in gross. The surprise-filter trailing-median TR uses tr.rolling(250).median().shift(1)
    (shift removes the current bar from its own median) and the comparison bar is the announcement
    bar, which is strictly <= entry-1; no future bar enters any gate. NO LOOKAHEAD found. (Caveat:
    not a lookahead, but the ann-bar direction sign is the SIGNAL and is known only at ann-bar
    close; entry at next-bar open is correct.)
  usdjpy_12h_gross_mine: >
    19.9369 pips (mean gross over n=80). Reproduced from raw parquet + cb_decision_dates.parquet
    with my own independent re-implementation. EXACT MATCH to QD's reported 19.937.
  usdjpy_12h_gross_drop_2022_2023: >
    5.8729 pips (n=48). Dropping 2022 and 2023 collapses the load-bearing cell by ~70.5%. Per-year
    means: 2021=0.20, 2022=28.08, 2023=53.99, 2024=0.68, 2025=16.73. The entire 12h "edge" is
    carried by 2022-2023 (the FOMC hiking cycle); 2021 and 2024 are economically zero. The cell is
    NOT robust to regime — it is a 2-of-5-year artifact. The QD disclosed this directionally
    ("exceptional sample period") but did not quantify the collapse; it is severe.
  cost_application_correct: >
    PARTIAL. C1: CORRECT — rt_cost = entry_spread + exit_spread + 0.80 on the ACTUAL entry/exit
    bars (verified 80/80 trades), pair-native pips (USDJPY 0.01 confirmed: gross 19.94 only makes
    sense at 0.01 pip), EXCLUDE-NOT-IMPUTE on zero/missing spread enforced. C2: INCORRECT — the RT
    cost charges ONLY the entry leg; the exit/flatten leg is never charged (see F-002 below). All
    181 AUDJPY + 185 USDJPY C2 trades have rt_cost == entry_spread + 0.80 exactly.
  cells_screened_count: >
    11 cells (C1: 3 pairs x 3 holds = 9; C2: 2 pairs x 1 hold = 2). Post-hoc per-pair "best hold
    horizon" was selected (EURUSD->6h, USDJPY->12h, GBPUSD->18h) AFTER seeing results — an
    uncontrolled multiple-comparison/horizon-selection surface (see F-004).

findings:
  - id: F-001
    severity: major
    location: scripts/cost_feasibility_c1_c2.py:573-575 (run_c2_pair, hold_cost = cost_series.iloc[entry_i:exit_i+1].sum())
    category: correctness
    observation: >
      C2 RT cost charges only the ENTRY transition, not the exit/flatten leg. The position series
      is constant across a hold, so within the slice [entry_i, exit_i] the only non-zero change
      magnitude is at entry_i (the transition INTO the position). The flatten transition occurs at
      exit_i+1 (when pos returns to 0), which is OUTSIDE the summed slice. I verified synthetically
      (pos [0,0,1,1,1,0], spread 0.5: cost vector [0,0,1.3,0,0,1.3]; slice [2:5] sums to 1.3 = entry
      leg only; the 1.3 flatten cost at i=5 is dropped). I verified empirically: all 366 C2 trades
      have rt_cost == entry_spread + 0.80 exactly (0 trades carry the exit leg).
    inference: >
      [HIGH-CONFIDENCE INFERENCE] C2 systematically under-charges cost by ~one full RT leg per
      trade. This is the SAME class of bug F-001 (the bug this very artifact fixes) — an
      under-counted round-trip leg — reintroduced in the C2 path. Material impact on the
      load-bearing cell: USDJPY C2 reported margin +1.807 (gross 4.811 - rt 3.004). Charging the
      exit leg (full RT mean 5.554) gives margin -0.743 — NET NEGATIVE. The QD body's claim that
      USDJPY C2 is "margin +1.807 ... net positive" is therefore WRONG. NOTE: the machine-checkable
      VERDICT keys off gross vs kill-threshold (4.811 > 1.12 = PASS), so the PASS label survives;
      but the "net positive" narrative does not. AUDJPY C2 is unaffected (gross already -8.14).
    evidence: >
      cost_feasibility_c1_c2.py:521,575 + raw JSON trade-level rt_cost == entry_spread+0.80 for
      366/366 C2 trades; synthetic trace reproduced.
    recommended-action-class: escalate-to-owning-role
    owning-role: quant-developer
  - id: F-002
    severity: major
    location: scripts/cost_feasibility_c1_c2.py:258-279 (run_c1_pair surprise filter) and quant-developer-feasibility.yaml:162-170 (disclosed)
    category: spec-drift
    observation: >
      The surprise filter (announcement_bar_range > 1.5x trailing-250-median TR) passes 100% of
      events: USDJPY n_fires=80 == all 80 verified-official FED+BOJ dates; EURUSD/GBPUSD n_fires=40
      == all 40 FED dates. Reproduced by direct count. The QD itself disclosed this (knowledge_gaps).
    inference: >
      [INFERENCE] The filter is non-binding because the "announcement bar" is DEFINED as the MAX-TR
      bar on the CB date — selecting the highest-volatility bar of the day all but guarantees it
      exceeds 1.5x the trailing median. The spec (quant-researcher-design.yaml:52-54) specified the
      surprise filter as "the cost-aware gate that restricts trading to genuine-surprise events and
      suppresses no-surprise no-edge days." As implemented it suppresses NOTHING: C1 is effectively
      "trade EVERY scheduled CB date in the sign of that date's max-TR-bar move," not a
      surprise-conditioned strategy. The spec's declared signal-logic is not faithfully realized —
      this is implementation drift from a research-class gate (firewall Section A4/A5). The
      max-TR-bar selection is itself a research-class choice (which bar is the "announcement") made
      in implementation, absent exact release times. Disclosed by QD, but it MATERIALLY changes what
      C1 is.
    evidence: >
      n_fires == verified-date-count for all 3 pairs (reproduced); design spec lines 52-54, 62.
    recommended-action-class: clarify-spec
    owning-role: quant-researcher
  - id: F-003
    severity: major
    location: cost_feasibility_raw.json (USDJPY C1 12h/18h) + quant-developer-feasibility.yaml:179-193
    category: numerical
    observation: >
      USDJPY-12h mean gross = 19.94 collapses to 5.87 when 2022+2023 are dropped (n 80->48). Per
      year: 2021=0.20, 2022=28.08, 2023=53.99, 2024=0.68, 2025=16.73. The headline result is
