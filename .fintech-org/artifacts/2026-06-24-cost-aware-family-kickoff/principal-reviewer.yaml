    inference: >
      [INFERENCE] The strongest cell in the entire screen (USDJPY 12h, "margin +17.6", called "the
      strongest result") is a 2-of-5-year regime artifact, not a stable post-announcement-drift edge.
      This does not invalidate the feasibility screen's stated purpose (it is necessary-not-
      sufficient, gross-vs-cost only), but any downstream reader treating USDJPY-12h as a robust
      edge would be misled. The QD disclosed the direction ("exceptional sample") but did not
      quantify; the magnitude (~70% collapse) belongs in the artifact.
    evidence: >
      Independent per-year recompute from raw parquet + rates (reproduced exactly: full=19.9369).
    recommended-action-class: add-log
    owning-role: head-of-quant-research
  - id: F-004
    severity: minor
    location: scripts/cost_feasibility_c1_c2.py:230-236, 397-425 + quant-developer-feasibility.yaml:231-236
    category: numerical
    observation: >
      11 (pair x hold x candidate) cells screened. C1 swept 3 hold horizons per pair; the YAML then
      selects a per-pair "best hold horizon" (EURUSD 6h, USDJPY 12h, GBPUSD 18h) post-hoc as the
