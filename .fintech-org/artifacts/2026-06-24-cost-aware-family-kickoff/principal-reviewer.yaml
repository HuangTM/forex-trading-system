body: |
  ## Verdict rationale: approve-with-conditions

  The deliverable does the two hard things it had to do correctly: the F-001 fix is RIGHT (verified
  on the production function, not just the QD's copy — flip charges 2 RT, open/close charges 1), and
  C1 has NO lookahead (the sacred invariant holds: entry is the bar AFTER the announcement bar, gross
  accrues from that bar's OPEN, the announcement bar's own move is excluded, and every gate uses
  shifted/past data). I reproduced the load-bearing USDJPY-12h cell (19.9369) to the digit from raw
  parquet with my own independent implementation. C1 cost is applied correctly (entry+exit real
  per-bar spread, pair-native pips, EXCLUDE-NOT-IMPUTE). On the criteria that would be BLOCKING —
  F-001 correctness and the no-lookahead invariant — the screen passes cleanly.

  But three things keep this from a clean approve, and one of them is darkly ironic.

  ## The C2 cost bug (F-001 in this report) — the same class of bug the PR exists to fix

  This artifact's entire reason for being is fixing F-001: a flip that was charged 1 RT instead of 2,
  i.e. an UNDER-CHARGED round-trip leg. In the C2 screen the QD reintroduced exactly that class of
  error from a different direction: the C2 RT cost charges only the ENTRY leg. Because the position
  is constant through a hold, the cost slice cost_series[entry_i:exit_i+1] captures only the
  transition INTO the position; the flatten transition lands at exit_i+1, one index past the slice,
  and is silently dropped. I verified this synthetically and then empirically — all 366 C2 trades
  have rt_cost == entry_spread + 0.80 to the digit, never the exit leg. The effect on the only C2
  cell that PASSES (USDJPY): reported margin +1.807 becomes -0.743 once the exit leg is charged. The
  VERDICT label is gross-keyed so PASS survives mechanically, but the QD's prose "margin +1.807 ...
  net positive" is false. This is a major finding because the firewall's whole job is catching the
  cost-undercount class, and it slipped through in the sibling code path of the very fix.

  ## The surprise filter is non-binding — C1 is not the strategy the spec declared

  The spec sells C1 as surprise-CONDITIONED: "fire only when surprise_magnitude exceeds a hard
  threshold ... suppresses no-surprise no-edge days." As built, the filter passes 100% of events
  (n_fires == every verified CB date, all three pairs). The mechanism is circular: the
  "announcement bar" is DEFINED as the max-TR bar of the day, then tested against 1.5x the trailing
  median TR — the most volatile bar of the day nearly always clears that bar. So C1 is operationally
  "trade every scheduled CB date in the sign of its biggest bar," not a surprise filter. That is
  research-class drift (firewall A4/A5): an implementation choice (which bar is the announcement,
  absent release times) silently dissolved a declared gate. The QD disclosed it; I am routing it to
  the researcher because the FIX is a spec decision (supply release times, or redefine the gate), not
  a QD patch.

  ## The headline cell is a 2-of-5-year regime artifact

  USDJPY-12h, called "the strongest result," drops from 19.94 to 5.87 gross when 2022-2023 are
  removed; 2021 and 2024 are economically zero (0.20, 0.68). The edge IS the FOMC hiking cycle. For a
  necessary-not-sufficient cost screen this does not change the gross-vs-cost arithmetic, but the
  magnitude of the collapse (~70%) is material context that belongs in the artifact and must shape
  any CPCV pre-registration (purged-CV across regimes, not a pooled mean).

  ## Conditions to clear before this screen informs a counted pre-registration

  1. (F-001 here / major, QD) Fix the C2 exit-leg cost: charge entry AND exit RT legs. Re-run; the
     USDJPY C2 "net positive" claim must be restated (true net is ~-0.74). AUDJPY unaffected.
  2. (F-002 / major, QR) Resolve the non-binding surprise filter: either acquire exact release
     times so the filter can bind, or redefine C1 as an unconditional CB-date strategy and re-state
     the spec. Do not let "surprise-conditioned" stand when nothing is conditioned.
  3. (F-003 / major, HoQR) Record the USDJPY-12h regime decomposition in the artifact; treat the
     pooled mean as regime-contaminated for any downstream design.
  4. (F-004 / minor, HoQR) Fix the hold horizon BEFORE measuring in any counted cycle; the per-pair
     "best horizon" pick is post-hoc.
  5. (F-005, F-006 / minor-observation, QD) Disclose the stop-at-close fill convention; add
     structured skip-path logging before any promotion to a counted harness.

  None of these is a no-lookahead or F-001-correctness BLOCKER, so this is approve-with-conditions
  rather than reject. But conditions 1 and 2 are not cosmetic — condition 1 falsifies a stated
  result and condition 2 means C1 is not the strategy on the label.

