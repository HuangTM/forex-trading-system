    inference: >
      [INFERENCE] Post-hoc horizon selection inflates the effective look count and the chance a cell
      clears the hurdle by selection. The kill thresholds are pre-registered per pair but NOT per
      (pair x horizon); selecting the best of 3 horizons is an uncontrolled mini multiple-comparison.
