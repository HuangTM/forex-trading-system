body: |
  ## JOB 1 — F-001 / F-002 fix + assertion

  ### F-001: reversal cost under-count — FIXED

  The original `_position_changes()` in `scripts/compute_9pairs_readiness.py` (line 230)
  returned `(pos.diff().abs() > 0).astype(float)` — a binary flag. A position flip
  from +1 to −1 has `pos.diff().abs() = 2`, but the binary flag produced 1, charging
  only ONE round-trip instead of the correct TWO (close existing leg + open new leg).

  Fix: `return pos.diff().abs().fillna(0.0)` — uses the raw magnitude.
  - flat→±1 (open):       diff=1 → 1 RT charged ✓
  - ±1→flat (close):      diff=1 → 1 RT charged ✓
  - +1→−1 (flip):         diff=2 → 2 RT charged ✓ (was 1, now correct)

  Assertion (executed on synthetic path [0, +1, +1, −1, 0] with spread=2.0 pips):
    Change magnitudes: [0.0, 1.0, 0.0, 2.0, 1.0]
    Total cost (fixed): 11.20 pips = (1+0+2+1) × 2.80
    Total cost (old bug): 8.40 pips = (1+0+1+1) × 2.80
    Flip bar charges 5.60 pips = 2× single transition (2.80) ✓
    ASSERTION PASSED: True

  The F-001-corrected function `position_changes_scaled()` in `scripts/cost_feasibility_c1_c2.py`
  uses the identical fix and is the implementation used for C1 and C2 screens.

  ### F-002: N_eff label mismatch — RECONCILED (label clarification only)

  The mismatch was between:
    (a) the printed N_eff value being route1 (k/λ_max = e.g. 2.11 for a 9-pair set), and
    (b) the "amendment-scaled N_eff*" referenced in DSR deflation.

  Resolution: these are DIFFERENT statistics. N_eff_min (the gate stat in
  compute_9pairs_readiness.py) is min(route1, route2, route3) — the conservative
  participation-ratio-based effective bets count. The amendment-scaled N_eff* used
  in DSR deflation is computed separately in the DSR harness and is NOT the same number.
  No computation was wrong; labels are now clarified in the script comments (lines 161-171).

  ---

  ## JOB 2 — C1 feasibility table

  ### Data constraint (critical finding)
  cb_decision_dates.parquet has 0 verified-official dates for ECB and BOE. Only FED
  (40 events in 2021-2025) and BOJ (40 events in 2021-2025) have verified-official
  status. This means:
    EURUSD: FED-only → 40 events (not FED+ECB)
    GBPUSD: FED-only → 40 events (not FED+BOE)
    USDJPY: FED+BOJ  → 80 events
  All pairs clear the 15-event minimum. However EURUSD and GBPUSD miss approximately
  half their intended event set. Disclosed.

  ### Surprise filter behaviour
  Max-TR-bar identification worked correctly: bar timestamps cluster at the expected
  FOMC release times (18:00-19:00 UTC for FED, 03:00-04:00 UTC for BOJ). Surprise
  filter (announcement_bar_range > 1.5× trailing 250-bar median TR) passes ALL 40/80
  events — every verified CB date in 2021-2025 had a max-TR bar exceeding the threshold.
  This suggests the filter is either (a) appropriate for this period (2021-2025 included
  FOMC hiking cycle with genuine volatility), or (b) the max-TR-bar selection already
  pre-selects high-volatility bars, making the 1.5× filter non-binding. If exact release
  times were available, a stricter filter could be applied. Disclosed.

  ### C1 results (n_fires, mean gross pips, RT cost, margin, verdict)

  | Pair   | Hold | N_fires | Mean Gross (pips) | Mean RT Cost (pips) | Margin (pips) | Verdict                         |
  |--------|------|---------|-------------------|---------------------|---------------|---------------------------------|
  | EURUSD | 6h   | 40      | 1.919             | 1.555               | +0.364        | PASS (gross 1.919 > kill 0.88)  |
  | EURUSD | 12h  | 40      | 1.345             | 1.518               | -0.173        | PASS (gross 1.345 > kill 0.88)  |
  | EURUSD | 18h  | 40      | 0.539             | 1.513               | -0.974        | FAIL (gross 0.539 ≤ kill 0.88)  |
  | USDJPY | 6h   | 80      | 6.354             | 2.461               | +3.893        | PASS (gross 6.354 > kill 1.12)  |
  | USDJPY | 12h  | 80      | 19.937            | 2.296               | +17.641       | PASS (gross 19.937 > kill 1.12) |
  | USDJPY | 18h  | 80      | 21.116            | 2.403               | +18.714       | PASS (gross 21.116 > kill 1.12) |
  | GBPUSD | 6h   | 40      | 3.737             | 2.693               | +1.045        | PASS (gross 3.737 > kill 1.36)  |
  | GBPUSD | 12h  | 40      | 1.103             | 2.588               | -1.485        | FAIL (gross 1.103 ≤ kill 1.36)  |
  | GBPUSD | 18h  | 40      | 5.966             | 2.583               | +3.384        | PASS (gross 5.966 > kill 1.36)  |

  IMPORTANT NOTE on EURUSD 12h and GBPUSD 12h: gross > kill threshold (so: PASS per
  machine-checkable rule) BUT margin < 0 (gross < RT cost). These cases PASS the
  kill threshold but do NOT net positive. The kill numbers were pre-set at 80% of
  the RT hurdle, not at 100%. This is disclosed and faithful to the spec.

  USDJPY primary verdict: PASS across all three hold horizons with strong margins,
  especially 12h and 18h. Mean gross 19.9 pips (12h) against RT cost 2.3 pips → margin
  +17.6 pips. This is the strongest result.

  ---

  ## JOB 2 — C2 feasibility table

  ### Critical observation: crash filter frequency
  The 10-bar realised vol crash filter (rv > 2× 60-bar median on daily 22:00 bars)
  triggered very frequently in 2021-2025 — particularly in 2022 (FX volatility spike
  during the FOMC hiking cycle). This produced mean hold durations of ~5 days instead
  of the spec's intended "weeks to months". The carry accrual proxy is therefore
  negligible (~0.01-0.02 pips/trade) and gross pips are almost entirely price drift.
  This is an honest representation of how the crash filter operates on this sample period.

  | Pair   | N_holds | Mean Gross (pips) | Carry (pips) | Drift (pips) | RT Cost (pips) | Margin (pips) | Avg Hold | Verdict                         |
  |--------|---------|-------------------|--------------|--------------|----------------|---------------|----------|---------------------------------|
  | AUDJPY | 181     | -8.141            | 0.018        | -8.159       | 4.052          | -12.193       | 5.0 days | FAIL (gross -8.141 ≤ kill 1.28) |
  | USDJPY | 185     | 4.811             | 0.021        | 4.791        | 3.004          | +1.807        | 4.8 days | PASS (gross 4.811 > kill 1.12)  |

  AUDJPY FAIL is decisive: gross = -8.14 pips (negative, dominated by crash-period price
  losses). The crash filter did not protect against AUDJPY's sharp depreciations in 2022.
  The structural prior of "tens of pips carry/trade" did not materialise because holds were
  too short and price drift was strongly negative in the sample.

  USDJPY C2 PASS: gross 4.811 > kill 1.12, margin +1.807. However, this is driven by
  price drift (+4.791 pips mean, highly variable: USDJPY strong USD appreciation 2022-2023)
  not by carry accrual (+0.021 pips). The USDJPY PASS is fragile: it reflects a
  trend-following result during an exceptional FOMC hiking cycle, not carry economics.
  Per spec: "clearing the cost hurdle is necessary-not-sufficient; net risk-adjusted
  profitability is a future-cycle CPCV question."

  ---

  ## Verdict summary: PASS / STRETCH / FAIL per cost hurdle

  ### C1 — CB-decision post-announcement drift
  - EURUSD: PASS at 6h (gross 1.919, margin +0.364). PASS at 12h (gross 1.345, negative
    net margin — clears kill threshold but not RT cost). FAIL at 18h.
    PRIMARY VERDICT: PASS (6h). Best hold horizon = 6h.
  - USDJPY: PASS at all three horizons. Strongest result (gross 19.9 pips at 12h).
    PRIMARY VERDICT: PASS. Best hold horizon = 12h.
  - GBPUSD: PASS at 6h (gross 3.737, margin +1.045) and 18h (gross 5.966, margin +3.384).
    FAIL at 12h (gross 1.103, below kill 1.36).
    PRIMARY VERDICT: PASS (6h and 18h). Best hold horizon = 18h.

  C1 OVERALL: PASS on primary hold horizon for all three pairs.
  Deciding numbers: EURUSD 6h gross=1.919 > kill=0.88; USDJPY 12h gross=19.937 > kill=1.12;
  GBPUSD 18h gross=5.966 > kill=1.36.
  Caveat: EURUSD and GBPUSD use FED-only events (ECB/BOE have 0 verified-official dates).
  Caveat: surprise filter passes 100% of events — may be non-binding with this bar-attribution rule.

  ### C2 — Carry-sign multi-session hold
  - AUDJPY: FAIL (gross -8.141, hard FAIL — negative gross, far below kill 1.28).
    The crash filter + sample period (2022 AUDJPY crash) produced large negative price drift.
  - USDJPY: PASS (gross 4.811 > kill 1.12, margin +1.807). Driven by price drift in
    exceptional 2022-2023 USD appreciation; carry accrual negligible (0.021 pips).

  C2 OVERALL: MIXED. AUDJPY FAIL (decisive). USDJPY PASS (fragile, drift-driven, not carry).

firewall-self-review: approve-with-conditions
# Conditions documented:
#   1. The USDJPY C2 PASS is driven by price drift during an exceptional sample period
#      (FED hiking cycle 2022-2023), NOT by carry economics. The "carry" in C2's name
#      does not materialise in this screen at 5-day average holds. This is an observation,
#      not a research judgment — the QD reports what the data shows; HoQR/NHT evaluate
#      whether the edge is real. No research judgment baked in.
#   2. The EURUSD/GBPUSD C1 fire counts are limited by ECB/BOE data quality (0 verified-
#      official dates). QD reports this constraint; HoQR decides whether the FED-only
#      events are sufficient for a CPCV pre-registration.
#   3. No live capital. No trial counter increment. Firewall intact.

