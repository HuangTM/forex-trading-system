assumptions:
  - |
    BAR-ATTRIBUTION RULE (C1): CB decision dates are calendar-date entries with no
    intraday UTC time. We define the announcement bar as the 1h bar with MAXIMUM true
    range on that calendar date (UTC). Rationale: FOMC typically releases at 18:00-19:00
    UTC; BOJ at 02:00-04:00 UTC; these are not uniformly at 00:00. Using the max-TR bar
    identifies the actual high-volatility release bar without requiring hardcoded release
    times. Entry is on the bar IMMEDIATELY AFTER this identified bar (shift(1), no
    lookahead). This is conservative: it may occasionally pick a non-announcement bar
    as the max-TR bar, but never uses the announcement bar's own close in the edge
    calculation. Limitation: acknowledged.
  - |
    ECB AND BOE VERIFIED-OFFICIAL ABSENCE: cb_decision_dates.parquet has 0 verified-
    official dates for ECB (all aggregator-only or training-memory-unverified) and 0 for
    BOE (all aggregator-only). Per spec, restricted to scheduled==True AND
    verification=='verified-official'. This means EURUSD and GBPUSD C1 events use FED
    dates ONLY (40 events each in 2021-2025). USDJPY uses FED+BOJ (80 events).
    The EURUSD/GBPUSD fire counts are LOWER than expected (40 vs the spec's ~8-14/yr/pair
    from FED+ECB or FED+BOE). Disclosed: if ECB/BOE official dates were available, fire
    counts would double and mean gross estimates could differ.
  - |
    C1 RT COST CONVENTION: RT_cost per trade = entry_bar_spread + exit_bar_spread +
    RT_OVERHEAD (0.80 pips). This uses the REAL per-bar spread_median_pips on both the
    entry bar and the exit bar (not the pair-level median), per spec. Stop-exit bars
    similarly use the actual bar spread. This is conservative vs the spec's "real per-bar
    spread on entry/exit bars"; execution is exactly that.
  - |
    C2 CARRY ACCRUAL PROXY: Headline rate_diff (decimal, e.g. AUDJPY_diff) × hold_years
    × 50% haircut / pip_size. The 50% haircut accounts for broker markup, tom-next basis,
    and the difference between headline differential and actual overnight swap. Per the
    spec: "haircut conservatively e.g. 50%". This is a structural approximation; the
    actual broker swap can differ materially. The screen shows carry_pips ≈ 0.01-0.02
    per trade because holds are very short (~5 days) due to the crash filter cycling
    frequently. The gross_pips in C2 is therefore almost entirely price drift, not carry.
  - |
    C2 DECISION BAR: 22:00 UTC 1h bar (rollover boundary). Rate differential from
    rate_differentials.parquet aligned by calendar date to the 22:00 bar date. shift(1)
    applied: differential as of day D sets position entered at D+1's 22:00 bar.
  - |
    C2 CRASH FILTER: pair realised vol computed as rolling 10-bar std of log-returns on
    the 22:00 UTC bar series. Crash flag = rv_10 > 2× its rolling 60-bar median. This
    is a strict filter that cycles frequently in 2022-2023 (high-volatility period),
    producing holds of ~5 days average instead of the spec's intended "weeks to months".
    The resulting C2 AUDJPY result is dominated by price drift (crash-flatten timing eats
    the carry accrual) and is therefore MORE representative of realised execution under
    the crash filter than the "structural prior of tens of pips/trade" from the spec.
  - |
    PIP CONVENTION: pair-native pips used for C1 and C2. USDJPY and AUDJPY: 1 pip =
    0.01 (JPY quote). EURUSD, GBPUSD: 1 pip = 0.0001. This corrects F-005 (which is
    the uniform 0.0001 error). Verified: all gross_pips values for USDJPY/AUDJPY are in
    JPY pip units (i.e. price_move / 0.01).
  - |
    HONEST-N: this is a DESCRIPTIVE feasibility screen. No trial counter increment.
    No entry with counts_toward_deflation_denominator: true appended to trials.jsonl.

