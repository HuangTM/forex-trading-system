assumptions:
  - "C1 uses a PRICE-DERIVED realised-surprise proxy (announcement-bar return sign + range vs trailing median) because tick-level rate-expectation/consensus-surprise data is NOT in the store. This is a weaker filter than a true expectations-surprise; disclosed as a limitation. If QD finds the price proxy too noisy to isolate genuine surprises, C1 weakens accordingly."
  - "C1 attributes the relevant CB to the pair leg (FED→USD pairs, ECB→EUR pairs, BOJ→JPY pairs, BOE→GBP pairs). USDJPY has TWO governing banks (FED+BOJ); both decision sets are eligible event dates."
  - "C2 assumes the daily rate_differentials series sign/magnitude is a faithful proxy for realised overnight swap accrual. Actual broker swap can differ from the headline policy differential (broker markup, tom-next basis); the screen's carry-accrual estimate should be conservative (haircut the headline differential) and is a feasibility approximation, not the realised swap ledger."
  - "Both candidates enter shift(1) (bar/day AFTER the signal), preserving the no-lookahead invariant (sacred test). C1 explicitly does NOT capture the announcement bar's own move."
  - "All gross-pips/trade figures herein are STRUCTURAL PRIORS / order-of-magnitude estimates for the QD cheap screen to CONFIRM OR KILL — they are NOT asserted results and carry no counted-trial status. honest-N stays 30; trial counter does not increment."
  - "Clearing the cost-feasibility hurdle is necessary-not-sufficient: net risk-adjusted profitability (esp. C2's carry crash-skew, C1's whipsaw) is a SEPARATE future-cycle CPCV question, not claimed here."
  - "Universe choices excluded GBPJPY (out of scope, HoQR R3) and added no 10th pair (R2 constraint)."

