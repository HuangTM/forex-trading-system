body: |
  ## Why these two candidates beat the cost hurdle where F1-F6 did not

  The retired F1-F6 families share ONE fatal property: they are price-only and HIGH-TURNOVER
  (2,300-16,100 fires/pair over 5yr; net SR -1.56 to -10.0). Their gross signal per trade is
  sub-pip-to-low-pip and is entirely consumed by the ~1.1-1.7 pip round-trip cost. The arithmetic
  of their failure is simply: gross-pips/trade < RT-cost/trade, repeated thousands of times. No
  cost-model tweak closes a 3.00-SR-unit gap.

  The pivot rules (R1 cost-feasibility-first, R2 change-the-edge-input) demand the OPPOSITE
  construct on at least one axis: LOWER turnover and/or HIGHER per-trade edge. Both candidates
  attack BOTH axes:

  - **C1 (CB-decision drift)** raises per-trade edge by conditioning entry on a RARE, LARGE,
    SCHEDULED catalyst — a policy surprise moves the cheapest majors tens of pips, and the drift
    captures a multi-pip fraction over the following hours, against a fixed ~1.1-1.7 pip hurdle.
    Turnover drops ~200-600x (8-14 fires/yr/pair vs F1-F6's hundreds-to-thousands). The cost ratio
    is structurally favourable because edge scales with EVENT VOLATILITY, not with trade count.

  - **C2 (carry-sign hold)** attacks turnover even harder (the lowest-turnover candidate by design)
    AND grounds itself in the ONE FX factor with real OOS support (carry). The decisive insight:
    carry accrues PER NIGHT HELD while cost is paid PER FIRE. A multi-week AUDJPY hold accrues tens
    of pips of differential while paying ONE 1.60-pip round-trip. This is the cleanest possible
    inversion of the cost-dominated high-turnover trap.

  ## Honest evidence calibration (forex evidence layer, applied)

  I am NOT claiming either candidate is a proven edge. The forex evidence layer is explicit:
  only carry and cross-sectional momentum survive OOS; carry is compensation for crash risk
  (negative skew) and cost-adjusted carry "did not survive verification"; scheduled-event drift
  and FX TA generally are "mixed, not settled" and decay post-1990s. So:
  - C2 is FACTOR-GROUNDED (the strongest available structural basis) but carries the crash-skew
    caveat; the feasibility screen answers only the narrow COST question, not net profitability.
  - C1 is STRUCTURE-MOTIVATED but weaker-evidenced; it is included as the second candidate
    precisely because it exploits a DIFFERENT structural axis (scheduled-event volatility vs
    rate-differential carry), giving the firm two non-redundant cheap screens. If forced to rank,
    C2 has the stronger prior; C1 has the larger per-event move but noisier edge.

  ## What the cheap screen must measure (decisive, pre-pre-registration)

  For each candidate × pair: (a) count of qualifying fires over 2021-2025; (b) mean gross-pips/trade
  measured on the REAL post-signal entry/exit bars (C1: bar after announcement; C2: realised
  multi-session hold incl. carry accrual proxy), using real per-bar spread_median_pips, pair-native
  pips (JPY=0.01), EXCLUDE-NOT-IMPUTE, F-001-corrected reversal cost on C2 sign-flips; (c) RT-cost/
  trade; (d) gross-minus-cost margin; (e) PASS/STRETCH/FAIL per pre-registered falsification numbers
  above. No CPCV, no counted trial, no honest-N increment this cycle.

  The pre-registered kill numbers are explicit and machine-checkable: C1 dies if gross ≤ 0.88/1.12/
  1.36 pips on EURUSD/USDJPY/GBPUSD respectively (or < 15 filtered events/pair); C2 dies if gross ≤
  1.28/1.12 pips on AUDJPY/USDJPY (or < 15 qualifying holds/pair). These are the cheap, decisive
  tests R1 asks for — knowable before burning the trial counter.

knowledge_gaps:
  - "No tick-level / consensus-surprise data for C1 — surprise is proxied from price (announcement-bar return/range), a weaker filter than true expectations-surprise. If the proxy cannot isolate genuine surprises in QD's screen, C1's per-event edge estimate is unreliable."
  - "No realised broker-swap ledger for C2 — carry accrual is proxied from the headline policy rate-differential series, which can diverge from actual overnight swap (broker markup, tom-next basis). The screen's carry estimate should haircut the headline differential; the true swap could be materially smaller."
  - "Post-event drift magnitude/persistence on these specific pairs over 2021-2025 is unmeasured (structural prior only); QD's screen is the first measurement. The 12h hold horizon is a design choice to be swept (3-18h)."
