  - "volatility-control gate threshold t>=2.00 applies to the relvol-term coefficient t-stat as supplied"
  - "t-stats are two-sided; |t|=1.15 corresponds to ~p>0.25, far from any reasonable bar even before 8-cell multiplicity correction"
