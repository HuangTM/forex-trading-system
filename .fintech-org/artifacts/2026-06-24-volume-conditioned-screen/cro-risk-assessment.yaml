body: |
  DECISION: VETO. No capital, no counted trial this cycle.

  The risk contract states a cost-pass must ALSO survive a volatility-control test
  (t>=2.00) to count as an edge. This is a conjunctive gate, and it is dispositive.

  1. COST GATE: 2 of 8 cells clear margin>0 (V1 EURUSD +0.14, V1 USDJPY +1.18).
     The EURUSD +0.14 margin is a rounding-width result -- inside any realistic
     cost-estimation error band on a spread+0.80 hurdle; treat as not robustly
     positive.

  2. VOLATILITY-CONTROL GATE: every V1 relvol-term t-stat is below 2.00
     (0.45, -0.16, -0.33, -0.90, +1.15). The two cost-passing cells fail hardest
     where it matters: EURUSD t=0.45 and USDJPY t=-0.33. The single positive
     vol-control reading (+1.15, AUDUSD) sits in a cost-FAILING cell (-1.84). So
     the cost survivors lack the statistic, and the cell with the best statistic
     lacks the economics. INTERSECTION OF (cost-pass AND t>=2.00) = EMPTY.

  3. WHAT THE EDGE ACTUALLY IS: the USDJPY stratification is the tell. Profit is
     +6.03 in high-relvol x HIGH-RANGE and -0.45 in high-relvol x LOW-RANGE. Holding
     volume high, the entire payoff swings with RANGE (realized volatility), not with
     the volume condition. With raw volume~range correlation 0.69-0.74, the volume
     conditioning is a noisy re-expression of volatility. The "volume signal" is, on
     this evidence, a volatility-harvesting signal wearing a volume costume -- exactly
     the structure the vol-control gate was written to catch.

  4. SELECTION + DEFLATION: 8 cells, best-of, in-sample, pre-deflation gross. Under
     honest_N=30 and 8-cell multiplicity, a max |t| of 1.15 is fully consistent with
     pure noise. No deflation has been applied and none is needed to reach the
     verdict -- the data fails the contract before deflation.

  5. POSITION SIZING: size_multiplier = 0.0. There is no edge that survives the
     firm's own pre-declared gate, so there is no risk budget to allocate. Committing
     a counted trial would spend selection budget (an honest-N decrement is itself a
     scarce, irreversible risk resource) on a candidate the contract disqualifies
     a priori -- a governance blowup-analog, not just a P&L one.

  RECOMMENDATION TO THE FIRM: do NOT advance either family to a pre-registered
  backtest. If the firm wants to pursue the genuine signal hinted at, it is a
  VOLATILITY/RANGE conditioning hypothesis, NOT a volume one -- and it must be
  proposed fresh, pre-registered against the range variable directly, and screened
  with the same conjunctive gate. That is a new hypothesis, not a rescue of this one.
  This screen consumes no trial and preserves honest_N=30.
