blowup-analog: >
  Volatility-harvesting masquerading as a volume signal. The payoff concentrates in
  high-range cells (USDJPY high-range +6.03 vs low-range -0.45) while the volume-term
  itself carries no statistical weight (max |t|=1.15). A strategy whose in-sample
  profit is co-located with the volatility-clustering cell is structurally short
  gamma / long realized-vol: it harvests calm-to-storm transitions in-sample and
  pays the tail when the storm gaps against the position. This is the carry-trade
  failure shape (steady small wins, episodic large loss) and the LTCM/short-vol
  family of analogs -- precisely the pattern the t>=2.00 vol-control gate exists to
  reject. Advancing it would commit a counted trial to a signal the contract has
  already disqualified.
