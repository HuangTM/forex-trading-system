body: |
  ## Volume family verdict — RETIRE (FAMILY-CLOSED)

  Both candidates are killed on pre-registered, machine-checkable triggers. This is a
  clean falsification, not a marginal call.

  **V1 (relvol-continuation) — RETIRED.** Two independent kill paths both fire:
  - Cost-axis: 3 of 5 pairs FAIL (GBPUSD, EURJPY, AUDUSD all deeply negative margin),
    meeting QR's pre-registered ">=3/5 FAIL" trigger. The two cost-PASS pairs
    (EURUSD +0.14, USDJPY +1.18) do NOT rescue the family — the kill criterion is
    a family-level vote, and 3/5 fired.
  - Volatility-control: relvol t-stat < 2.00 on ALL 5 pairs (4/5 negative or ~zero;
    R² 0.001–0.006 — the regression explains essentially nothing). The discipline I am
    bound to apply is explicit: a cost-PASS that fails the volatility-control test is
    NOT a volume edge. EURUSD and USDJPY are exactly that — cost-PASS, vol-control-FAIL.
  - The decisive single fact is USDJPY's 2×2: its entire positive gross sits in the
    high-relvol × HIGH-range cell (+6.03 pips); the "volume-surprise-WITHOUT-a-vol-spike"
    cell (high-relvol × low-range) is −0.45 pips. The edge IS the range. That is the
    F1–F6 vol-breakout family the firm already retired, wearing a volume label.

  **V2 (relvol∧low-spread mean-reversion) — RETIRED.** This was QR's structurally-
  strongest orthogonality attempt (gate on LOW spread to exclude the vol-spike regime),
  and it failed on all three independent grounds simultaneously:
  - Cost-axis FAIL on all 3 pairs, with NEGATIVE gross (−0.17 / −3.44 / −1.17 pips) —
    the mean-reversion signal is wrong-directional on average, before costs.
  - Construction void: the spread-low gate was SUPPOSED to isolate low-volatility bars,
    but conditioned entries are 25–54% HIGHER range than sample (1.25×–1.54×). The
    anti-volatility construction provably did not work on this data.
  - Volatility-control FAIL on all 3.

  The measured root cause is structural and consistent across both candidates: raw
  volume~range Spearman 0.69–0.74. Retail tick-volume on this store is largely a
  volatility proxy; seasonal-norming reduces but does not orthogonalize it, and the
  residual carries no directional sign. No re-parameterization rescues this — it is a
  data-class limitation. **Verdict: RETIRE the volume-conditioned family. FAMILY-CLOSED.**

  ## Strategic meta-call: is the existing-data space exhausted? what is the binding constraint?

  My honest research-leadership read: **YES — the existing-data intraday/daily strategy
  space is, for practical purposes, exhausted, and the binding constraint is now DATA
  CAPABILITY, not idea generation.** I am stating this as a finding, not as fatigue, and
  I have inverted it: what would make me WRONG? It would take a structurally-new hypothesis
  class — not a relabel of trend/breakout/event-drift/carry/volume — that this dataset can
  confirm at power. I do not see one, and the pattern of failure is too regular to attribute
  to bad luck.

  The corpus now reads as a coherent set of STRUCTURAL falsifications, each with a named
  mechanism, not a string of stochastic near-misses:
  - F1–F6 canonical families: retired-saturated (trend/breakout/MR all data-snooped out;
    OOS collapse is the documented base rate, per the technical-analysis evidence layer).
  - C1 event-drift: regime artifact (edge was a 2022–23 hiking-cycle shadow, not stationary).
  - C2 carry: idea untested-but-cost-failed; the C2COST exit-leg fix this cycle reconfirmed
    USDJPY net-negative (+1.807 → −0.743). Carry is real but low-frequency — the 5-year
    daily window cannot confirm it at power.
  - Volume-conditioned: volume = volatility on tick-data; no orthogonal directional edge.

  Four distinct levers, four structural walls. The recurring causes are the same four every
  cycle: (1) cost-dominance on any turnover the data can support, (2) USD-factor concentration
  across a dozen mostly-USD pairs (little cross-sectional breadth), (3) regime-dependence that
  a single 5-year window cannot separate from alpha, and (4) the absence of true volume /
  order-flow / depth. ~50+ trials, ~2 months, honest-N=30, ZERO confirmable net-of-cost edge.
  When the same wall recurs across independent idea families, the wall is the dataset, not the
  ideas. This is the DATASET WALL the firm has flagged before — now confirmed a third time by
  an independent family. That is sufficient evidence to change posture.

  I will be explicit about diminishing returns: another existing-data family is expected-value-
  NEGATIVE on research capacity. The honest move is to STOP manufacturing existing-data screens
  to look productive. The falsification corpus itself is now the firm's most valuable asset —
  it tells us precisely where NOT to spend.

  ### Forward options, ranked (honest)

  1. **DATA-CAPABILITY ACQUISITION** — the only lever that lifts the binding constraint.
     Candidate classes, in rough order of expected unlock: true traded volume / order-flow
     (CME FX-futures volume as a CLS/interbank proxy, or an L2 depth feed) > intraday tick
     data > more instruments (EM / crosses for cross-sectional breadth) > longer history
     (for carry/low-frequency power). HARD PRECONDITION: a written, falsifiable hypothesis
     that genuinely REQUIRES the new data class must exist BEFORE any spend. We do not buy
     data on spec. The volume cycle is the proof-of-concept of WHY: tick-volume failed
     specifically because it is not real volume — that names the acquisition target.

  2. **WIND DOWN active existing-data screening to observe-only / maintenance.** If no
     data-acquisition hypothesis clears the precondition above, this is the correct default.
     Preserve the corpus, freeze new existing-data generation, and gate reactivation on
     (a) new data arriving OR (b) a genuinely structurally-new hypothesis class. This is NOT
     a failure verdict — running a full cycle and correctly spending nothing is the system
     working.

  3. **CARRY C2 re-attempt on longer history** — LOW priority, folds into option 1 (needs
     longer history to confirm at power). Real factor, wrong window.

  4. **MORE EXISTING-DATA GENERATION** — REJECTED. Diminishing-to-negative returns; the four
     structural walls will recur.

  My recommendation to the CEO: pursue option 1 ONLY if a data-requiring hypothesis can be
  written that clears the precondition; otherwise default to option 2 (wind down to observe-only)
  rather than option 4. Do not generate another existing-data family.

  ## Trial counter

  Honest-N stays 30. CONFIRMED. This was a descriptive feasibility screen; no trial with
  counts_toward_deflation_denominator:true was appended. QD and QR both held the line. The
  deflation denominator is unchanged.
