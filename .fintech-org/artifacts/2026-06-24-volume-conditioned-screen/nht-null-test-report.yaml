body: |
  ## Claim (i) cost hurdle
  ACCEPTED AS STATED, REJECTED AS SIGNAL. The reported cost arithmetic reproduces
  exactly from raw json: V1 EURUSD margin +0.136, USDJPY +1.183 (PASS); GBPUSD -1.915,
  EURJPY -3.194, AUDUSD -1.842 (FAIL) -> 3/5 FAIL fires the pre-registered family-kill.
  V2 all 3 negative gross (-1.65 to -5.75 margin) -> FAIL. So claim (i) is literally
  true (2 V1 pairs clear cost). But the 2 passes are not an edge: (a) across 8 pair-
  candidate cells, 2 marginal nominal passes is what chance + tight-spread majors
  produce; (b) their UNCONDITIONED gross t is only +2.01 / +2.34 -- barely significant
  before any deflation; (c) they are stripped by the volatility-control test below.
  Selection/multiple-comparison across V1x5 + V2x3 can and does manufacture the 2
  nominal passes -- no correction was applied to the pass labels.

  ## Claim (ii) volume-beyond-volatility -- the decisive test
  REJECTED. This is the key claim and the data kills it cleanly. The pre-registered
  volatility-control regression (gross ~ rank(relvol) + rank(relrng)) gives relvol
  t < 2.00 on EVERY one of the 8 cells, NEGATIVE on 4/5 V1 pairs (+0.45, -0.16, -0.33,
  -0.90, +1.15) and on V2 (+0.25, +0.04, -0.49). I reproduced all five V1 t-stats
  independently from the stored trades to 3 decimals -- not fabricated, just null.
  R^2 = 0.001-0.006: the regression explains essentially nothing. The stratification
  logic is SOUND and damning: USDJPY's only positive cell is high-relvol x HIGH-relrng
  (+6.03), with the volume-without-volatility cell at -0.45 -- edge lives in the
  volatility cell. raw_vol~range 0.69-0.74 / relvol~relrng 0.36-0.57 confirm the
  mechanical collinearity. There is NO directional volume edge orthogonal to volatility
  on this data. Claim (ii) FAILS.

  ## Claim (iii) trial increment
  NO. honest-N stays 30. No pre-registered candidate cleared; both families are killed
  on pre-specified triggers. This is a descriptive feasibility/orthogonality screen, not
  a backtested candidate, and counts_toward_deflation_denominator is correctly false. A
  killed screen does not consume a trial.

  ## more-data-narrative guard
  RAISED. The 2026-05-31 failure mode would reappear if "we screened the volume lever"
  were laundered into "therefore buy intraday/L2 data." This screen established only that
  THIS broker-tick-volume proxy on THIS 1h data is collinear with range and directionless.
  It is NOT independent confirmation of the dataset-wall thesis and provides NO evidence
  that true traded-volume or L2 depth would carry alpha. Any data-capability spend must
  rest on its own pre-registered hypothesis. The correct framing of today's result is a
  null, not progress: the firm cheaply ruled out a lever and spent nothing.
