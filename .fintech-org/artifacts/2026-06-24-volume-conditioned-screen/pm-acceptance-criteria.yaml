hard-constraints:
  - "R1-COST-FEASIBILITY-GATE-FIRST: the cost-feasibility screen is the FIRST gate. No
    committed backtest, pre-registration, or trial-counter increment precedes a feasibility
    verdict. Gate definition: gross-edge-per-trade (pips) must exceed round-trip cost
    = spread_median_pips (real per-bar, from parquet) + 0.80 pips overhead, for the
    candidate's holding regime. PASS = gross > RT-cost. STRETCH = gross within 20% of
    RT-cost with explicit margin disclosure. FAIL = gross <= 80% of RT-cost OR
    gross-edge rationale unfalsifiable."

  - "OPEN-ITEM-C2COST-PRECONDITION: before the volume screen runs, QD MUST fix the
    exit-leg cost under-count in scripts/cost_feasibility_c1_c2.py. The bug is in the
    TRADE-LOOP SLICE at line ~575 (hold_cost = cost_series.iloc[entry_i:exit_i+1].sum()):
    the exit RT cost fires at bar exit_i+1 (the first bar where position changes from
    non-zero back to zero, where pos.diff() is non-zero) — that bar falls OUTSIDE the
    slice, silently dropping the exit leg for every trade. FIX TARGET IS THE TRADE-LOOP
    SLICE, NOT the shared compute_rt_cost_series function. The shared function (lines
    160-166) already correctly charges cost at every position-change bar, INCLUDING the
    exit-change bar; modifying it would DOUBLE-CHARGE. The fix is: extend the hold_cost
    slice to include bar exit_i+1, OR add the exit-leg spread explicitly to hold_cost.
    Verification requires a NEW, DISTINCT assertion — separate from the existing
    run_f001_assertion(), which tests the unrelated flip-count fix and does NOT exercise
    the hold_cost slice. The new assertion charges a synthetic hold (enter at bar 1, hold
    through bar 3, exit/flatten at bar 4) and confirms RT cost is deducted at BOTH the
    entry-change bar (bar 1) AND the exit-change bar (bar 4). The volume screen MUST use
    the corrected trade-loop accounting."

  - "COST-HURDLE-DEFINITION: RT cost per trade = spread_median_pips (real, per-bar, from
    parquet) + 0.80 pips overhead (= 2 × (0.25 slippage + 0.15 paper haircut)). Pip
    convention is pair-native: JPY pairs (USDJPY, EURJPY, AUDJPY) use 0.01 pip size;
    all others use 0.0001. Do NOT apply uniform 0.0001 to JPY pairs."

  - "EXCLUDE-NOT-IMPUTE: cost screen must use real per-bar spread_median_pips from parquet.
    Zero-spread or missing-spread bars are EXCLUDED, never imputed or filled. Trades
    where entry OR exit bar has zero/missing spread are dropped from the screen."

  - "TICK-VOLUME-VS-VOLATILITY-GUARD: retail FX 'volume' in the 1h parquets is broker
    tick-volume (count of price ticks per bar), NOT exchange-traded volume (FX is OTC;
    no consolidated tape exists). Tick-volume correlates strongly with realized volatility.
    Therefore ANY volume-conditioned candidate MUST (a) articulate WHY the conditioning is
    not merely a volatility proxy, and (b) demonstrate or argue that the edge survives
    controlling for realized range or ATR on the same bars — either by construction (the
    strategy explicitly controls for range) or by analytical argument (the volume signal
    contains information orthogonal to range). A candidate that cannot pass this test is
    disqualified as a volatility-restatement of the retired F1-F6 families."

  - "AMENDED-REGIME-AND-SIGNIFICANCE-GATE: any cost-feasibility PASS or STRETCH must
    additionally survive all three sub-gates before it can be called a candidate worth a
    counted trial: (a) REGIME-STRATIFICATION — drop the 2022-23 FOMC hiking cycle and
    confirm the edge persists out-of-hike; (b) STATISTICAL-SIGNIFICANCE — per-event or
    per-trade t-statistic >= 2.00 (H0: mean gross edge = 0); (c) NO-SINGLE-YEAR-DOMINATION
    — no single residual year accounts for the entire positive mean. A nominally positive
    mean that is noise (t < 2.00) or one-year-dependent does NOT advance to pre-registration.
    LABELING DISCIPLINE (two orthogonal axes, never conflated): the cost axis takes one of
    {PASS, STRETCH, FAIL} keyed ONLY to the gross-vs-RT-cost margin (defined in R1 above);
    the gate axis takes one of {GATE-CLEAR, GATE-HELD} keyed ONLY to whether all three
    sub-gates passed. A candidate ADVANCES iff cost-axis is PASS or STRETCH AND gate-axis
    is GATE-CLEAR. A cost-PASS or cost-STRETCH candidate that fails any sub-gate is labeled
    GATE-HELD (it retains its true cost label and is NOT downgraded to STRETCH); GATE-HELD
    does NOT advance. The word STRETCH is reserved exclusively for the cost-margin meaning."

  - "HONEST-N-PRESERVED: honest_N = 30 (ratified 2026-06-18, stable through 2026-06-24
    9-pairs-landed). Trial counter MUST NOT increment this cycle. This is a DESCRIPTIVE
    feasibility screen. No trials.jsonl entry with counts_toward_deflation_denominator: true
    may be appended. Any entry appended must carry counts_toward_deflation_denominator: false
    and event: descriptive-feasibility-screen."

  - "NO-COUNTED-TRIAL-THIS-CYCLE: rule 4 (pre-registration before any committed CPCV
    backtest) holds. Pre-registration is NOT in scope. It happens only in a FUTURE cycle
    IF a candidate clears feasibility-PASS AND the amended regime+significance gate AND
    CEO authorizes."

  - "NO-LIVE-CAPITAL: no live capital deployment of any kind. Research and paper-trading
    modes only."

  - "GBPJPY-EXCLUDED: GBPJPY is not in scope (HoQR R3, ratified). Do not screen, design
    for, or acquire GBPJPY."

  - "NO-RETIRED-FAMILY-RERUN: retired F1-F6 (hourly-reversal, session-open-mom, intraday-
    mom-3, vol-breakout, london-am-drift, spread-filt-reversal) and retired C1 and C2
    must NOT be re-run under any framing construable as a new candidate. Volume conditioning
    atop any retired family topology without genuine structural novelty fails this gate."

  - "PRE-REGISTRATION-BEFORE-BACKTEST: no committed CPCV backtest runs without a frozen,
    pre-registered hypothesis (rule 4). The feasibility screen is cheap and non-counting;
    a CPCV backtest is counted and irreversible."

