body: |
  ## Coordination notes

  ### Sequencing (hard order)
  1. QD fixes OPEN-ITEM-C2COST (the trade-loop hold_cost slice at line ~575, NOT the shared
     compute_rt_cost_series) and verifies with a NEW assertion distinct from the existing
     run_f001_assertion. QR designs volume-conditioned candidate(s) in parallel (no dependency).
  2. HoQR PRE-SCREEN review (HoQR-PRE-SCREEN-REVIEW-GATE, enforced): reviews each declarative
     design for structural novelty and tick-vs-volatility argument adequacy and records a
     pre-clear verdict. QD MUST NOT run the screen on a candidate HoQR has not pre-cleared.
  3. QD runs the R1 cost-feasibility screen with C2COST-fixed code on pre-cleared candidates.
     QD also runs the volatility-control check (volume rank net of ATR rank, or stratification,
     or documented exemption with HoQR sign-off).
  4. NHT evaluates: is the volume-conditioning effect distinguishable from volatility?
     Files verbatim append-only dissent if answer is NO or AMBIGUOUS.
  5. HoQR applies the amended gate (regime-stratification, t >= 2.00, no-single-year) to any
     cost-PASS or cost-STRETCH candidate, assigns GATE-CLEAR or GATE-HELD, and issues the
     advance-or-kill call (ADVANCE iff a candidate is cost-PASS/STRETCH AND GATE-CLEAR).
  6. PR single-wave review of C2COST fix, candidate design, screen numbers, and
     volatility-control check.
  7. CRO issues structured risk position (structured fields only; no rationale crossing
     the firewall).
  8. PM synthesizes CONSENSUS.md.

  No committed backtest may be initiated in any step. Rule 4 holds throughout.

  ### CRO firewall
  The CRO task statement contains ONLY structured fields: instrument-universe,
  hard-constraints, cost-hurdle definition, no-live-capital flag, honest-N=30,
  no-counted-trial-this-cycle, amended-gate-conditions (regime/significance/no-single-year
  sub-gate definitions). No rationale, no framing, no strategy description crosses the
  firewall. PM enforces this at dispatch time.

  ### Tick-volume vs volatility guard — why this matters for this screen
  The retired F1-F6 families were killed partly because their apparent signals were
  cost-saturated volatility bets. Retail FX tick-volume is a proxy for price-tick activity,
  not traded notional — it rises and falls with realized volatility. A "volume-conditioned"
  strategy that merely selects high-volatility bars is a volatility-restatement of the
  retired families; it does not constitute a new alpha source. The guard is therefore not
  advisory: a candidate that cannot articulate orthogonality from volatility is disqualified
  before the screen runs. The acceptable orthogonality arguments are:
    (a) STRUCTURAL: the strategy requires volume HIGH while spread is LOW — these are
        anti-correlated with volatility spikes, so the joint conditioning is genuinely
        different from a pure volatility filter.
    (b) ANALYTICAL: volume rank after controlling for ATR rank shows an independent lift
        (QD tests this via regression or stratification).
    (c) MECHANISTIC: volume-informed liquidity clustering (e.g., institutional accumulation
        at specific sessions) has a theoretical mechanism orthogonal to realized volatility.
  NHT will probe these arguments independently.

  ### Amended regime+significance gate
  The 2026-06-24 HoQR amendment adds three sub-gates that MUST all clear before
  advance-to-pre-registration:
    (a) Regime-stratification: the edge must persist when the 2022-23 FOMC hiking cycle
        is excluded. A strategy that only works in an extreme rate-volatility regime is
        not a durable signal.
    (b) t-statistic >= 2.00: the per-trade or per-event mean gross edge must be
        statistically distinguishable from zero at this threshold.
    (c) No-single-year-domination: no one residual year may account for the entire
        positive mean. If removing any single year negates the edge, the signal is
        episodic, not structural.
  LABELING DISCIPLINE (two orthogonal axes): the cost axis is {PASS, STRETCH, FAIL}
  (gross-vs-RT-cost margin only); the gate axis is {GATE-CLEAR, GATE-HELD} (all three
  sub-gates passed or not). A candidate ADVANCES iff cost-axis is PASS or STRETCH AND
  gate-axis is GATE-CLEAR. A cost-PASS or cost-STRETCH candidate that fails any sub-gate
  is labeled GATE-HELD — it RETAINS its true cost label (never downgraded to STRETCH)
  and does NOT advance. STRETCH means cost-margin near-miss only; it is never a
  gate-failure label.

  ### Why this cycle closes the last lever on existing data
  The Board's decision logic: F1-F6 are cost-saturated 1h price-only families (retired).
  C1 (CB-event drift) is killed pending ECB/BOE date acquisition and C1FILTER resolution.
  C2 (carry multi-session) is killed (AUDJPY decisive fail; USDJPY negative after C2COST fix).
  Volume-conditioned strategies are the one remaining structural novelty possible on the
  9-pair 1h parquets given the existing data schema. If this screen also kills (FAIL or
  FAIL-amended-gate), the firm's honest conclusion on existing data is: the data ceiling
  has been reached and data-capability acquisition (intraday tick or L2) is the next
  productive investment.

  ### Open items NOT in scope this cycle
  - OPEN-ITEM-C1FILTER: requires ECB/BOE verified decision timestamps. Held for a future
    data-acquisition cycle.
  - GBPJPY acquisition: explicitly held per HoQR R3.
  - rho_bar_eff / G5 concentration gate: moot until a cost-feasible signal series exists.
  - H1 un-freeze: prohibited while CD0 net SR = 0 positive candidates exist.

