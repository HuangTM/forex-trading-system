independent-recompute:
  c2cost_full_rt_charged: >
    true. I reproduced the fix from scratch on TWO topologies. (1) The QD toy path [0,+1,+1,+1,0]:
    cost_series=[0,1.1,0,0,1.1]; buggy slice iloc[1:4]=1.10 (entry leg only), fixed slice iloc[1:5]=2.20
    (entry+exit=full RT). (2) The REAL carry-loop topology (multi-bar hold [0,0,+1,+1,+1,+1,0,0],
    entry_i=2, exit_i=5, j=6): buggy iloc[2:6]=1.30, fixed iloc[2:7]=2.60. In BOTH cases the fixed
    slice equals the sum of the ENTIRE cost_series (every change bar), so it is NOT double-charged —
    it captures exactly the entry change-bar and the exit change-bar and nothing else. My assertion:
    a single flat→dir→flat trade is now charged 2 legs, the buggy code charged 1, undercount = exactly
    1 exit leg. CONFIRMED independent of the QD's own assertion code.
  lookahead_check: >
    lookahead-found (disclosed, mild) — CANNOT flip any FAIL/DISQUALIFY verdict; can only INFLATE the
    PASS pairs, so it is conservative w.r.t. the family-close conclusion. The seasonal-volume norm
    (compute_seasonal_norm, volume_conditioned_screen.py:205-214) uses a FULL-SAMPLE median per
    (dow×24+hour) bucket — it peeks at future bars to define each bar's relvol. This is the disclosed
    seasonal-norm lookahead (QR assumption line 252-254, QD assumption line 74). I measured its
    direction: USDJPY session-open fires under the full-sample norm = 820 vs an expanding/past-only norm
    = 1181 — the full-sample norm is actually MORE restrictive at the 1.5× threshold (it selects the
    strongest tail), and any selection-on-future bias would tend to make the conditioned subset look
    BETTER, not worse. Since the verdict is FAIL/DISQUALIFY for the family, the lookahead is on the
    conservative side: removing it cannot rescue a killed candidate. Entry timing IS clean no-lookahead:
    signal on closed bar t (direction=sign(close_t−open_t), known at t-close), entry at open of t+1
    (volume_conditioned_screen.py:374,388), exit at close of t+2. No off-by-one signal leak.
  volatility_control_sound: >
    yes, with one numerical nit. The control regresses per-trade gross on rank(relvol) AND rank(relrng)
    jointly (OLS via lstsq, line 288-289), reports the relvol coefficient t-stat NET of relrng — this
    correctly isolates the volume term from range, matching QR design form (a). SE via
    s²(XᵀX)⁻¹ with dof n−3 (line 297-301) is the textbook OLS SE; I recomputed it and matched.
    The USDJPY 2×2 (high/low relvol × high/low range) uses median splits on the per-trade relvol/relrng
    arrays (line 458-472) — computed correctly. NIT: ranks are computed on the SELECTED (post-fire)
    sample, not the full sample, so the rank regression measures within-fired-set gradient — appropriate
    for "does relvol add info among fires", and the near-zero R² (0.001-0.006) makes the choice immaterial.
  headline_number_reproduced: >
    Reproduced FOUR headline numbers from raw parquet, all EXACT. USDJPY V1: n=819 (rep 819),
    mean_gross=3.3023 (rep 3.3023), high_rv×high_rr=+6.0342 (rep 6.0342), high_rv×low_rr=−0.4503
    (rep −0.4503), relvol t=−0.3257 (rep −0.3257), relrng t=1.8347 (rep 1.8347). EURGBP V2: n=969
    (rep 969), mean_gross=−1.1696 (rep −1.1696), construction ratio=1.5368 (rep 1.5368). Zero
    discrepancy on every value checked.
  cells_screened_count: >
    39 reported descriptive cells = 8 cost-feasibility decision cells (5 V1 pairs + 3 V2 pairs) +
    8 vol-control regressions + 20 V1 2×2 strat cells + 3 V2 construction checks. The DECISION surface
