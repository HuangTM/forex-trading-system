body: |
  I reviewed COLD, without sight of any other role's verdict. Bottom line: the deliverable's
  numbers are reproducible to the digit, the C2COST fix is genuinely correct (and correctly
  scoped to the C2 carry screen, NOT the volume screen), the no-lookahead entry chain is clean,
  and the disclosed seasonal-norm lookahead is conservative w.r.t. the family-close. I approve
  WITH CONDITIONS — the conditions are documentation/fidelity notes, none of which can flip the
  FAIL/DISQUALIFY verdict.

  ## 1. C2COST fix — verified twice, independently
  I did not trust the QD's assertion harness; I rebuilt the cost slice from scratch. On the QD's
  toy path the fixed slice charges 2.20 pips (entry+exit) vs the buggy 1.10 (entry only). Crucially,
  I also rebuilt the REAL carry-loop topology (a multi-bar hold with entry_i=2, exit_i=5, j=6): the
  buggy slice iloc[entry_i:exit_i+1] charges 1.30 (one leg), the fixed slice iloc[entry_i:exit_i+2]
  charges 2.60 (both legs), and the fixed sum equals the sum of the ENTIRE cost series — so it is
  not double-charging, it is exactly capturing the two change-bars. The fix is correct. The one
  thing the reader must not conflate (F-001): this bug lived in cost_feasibility_c1_c2.py's carry
  loop; the V1/V2 volume screen charges cost directly (entry+exit spread), so the volume verdict
  was never affected by the bug. The deliverable is honest about this.

  ## 2. No-lookahead — clean entry, mild disclosed norm-lookahead, conservative
  Entry chain: direction = sign(close_t − open_t) is fixed at the CLOSE of signal bar t; the trade
  enters at the OPEN of bar t+1 and exits at the CLOSE of t+2. No signal value leaks into the entry
  price. Clean. The seasonal-volume norm is the one lookahead: it is a full-sample per-bucket median,
  so relvol at bar t "knows" the whole sample's volume. I measured the direction of this bias —
  full-sample norm fires 820 USDJPY session-open bars vs 1181 under an expanding past-only norm, i.e.
  the full-sample norm is the MORE restrictive, strongest-tail selector. Any selection-on-future bias
  would make the conditioned subset look better, not worse — so it cannot rescue a FAILed candidate.
  The verdict is conservative under the lookahead, exactly as the task anticipated. (It WOULD have to
  be fixed for a committed CPCV backtest; the deliverable says so.)

  ## 3. Volatility-control — sound, and the verdict is if anything understated
  The joint rank-OLS of gross on relvol_rank and relrng_rank correctly isolates the volume term from
  range; I re-derived the SE (s²(XᵀX)⁻¹, dof n−3) and matched the reported t-stats to the digit
  (USDJPY relvol t=−0.3257, relrng t=+1.8347). The 2×2 reproduces exactly. The narrative emphasizes
  two cells; the full 2×2 (F-003) actually makes the "range, not volume" case STRONGER, because the
  positive gross persists across relrng-high cells regardless of relvol. relvol t<2.00 on all 8
  pair-candidate combinations is a clean, decisive control failure.

  ## 4. Cost + multiplicity — correct, EXCLUDE path inert-but-correct
  Gross excludes cost (pure price capture, direction-signed, pair-native pips with JPY=0.01 honored).
  RT cost uses the REAL per-bar entry and exit spread_median_pips on the conditioned bars plus the
  0.80 overhead — this is the spec hurdle, and computing it on the CONDITIONED bars (not full-sample)
  is the stricter, correct choice QR demanded. EXCLUDE-NOT-IMPUTE is implemented (skip trade on
  zero/NaN spread at entry or exit); I verified there are 0 such bars across all 6 pairs, so the path
  is correct but never exercised on this data — worth knowing, not a defect. The selection surface is
  39 descriptive cells / 19 decision cells with no multiplicity correction, which is acceptable because
  every decision runs AGAINST the candidate; selection could only fabricate a false PASS, and none was
  claimed. honest_N=30 unchanged, no counted trial — correct for a descriptive screen.

  ## Verdict
  approve-with-conditions. Conditions (all documentation/fidelity, none verdict-altering):
  (a) F-001: keep the C2COST-fix scope explicit so the reader does not attribute it to V1/V2.
  (b) F-002: any future committed backtest MUST replace the full-sample seasonal norm with a
      past-only (rolling/expanding) norm — owned by QR.
  (c) F-004: the V2 "session open = UTC-midnight bar" anchor makes the extension gate near-vacuous
      (587 fires/yr vs 40-80 expected); if the volume lever is ever revisited on intraday data, fix
      the anchor — owned by QR. The current verdict stands regardless (construction ratio 1.25-1.54
      >> 1.2 = DISQUALIFIED).
  I did NOT assess whether the volume lever SHOULD close as a research call — that is HoQR/NHT's
  judgment, and I have not seen it. On implementation correctness and numerical fidelity, the
  deliverable is sound and the family-close is well-supported by the measured numbers.
