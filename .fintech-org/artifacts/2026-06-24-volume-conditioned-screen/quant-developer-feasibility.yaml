c2cost-fix:
  file: scripts/cost_feasibility_c1_c2.py
  location: line 575 in run_c2_pair(), the hold_cost slice
  lines-changed: |
    OLD (buggy):
      hold_cost = float(cost_series.iloc[entry_i:exit_i + 1].sum())
    NEW (fixed):
      hold_cost = float(cost_series.iloc[entry_i:exit_i + 2].sum())
  explanation: |
    The position series transitions: [..., 0, +1, +1, ..., +1, 0, ...]
                                           entry_i               j = exit_i+1
    pos.diff().abs() registers:
      - entry-leg cost at bar entry_i (0 → +1, diff=1)
      - exit-leg cost at bar j = exit_i+1 (+1 → 0, diff=1)
    The OLD slice [entry_i : exit_i+1] = [entry_i : j] covers bars
    entry_i .. exit_i inclusive, stopping before bar j — the exit-change bar
    where cost registers. Every trade was under-charged by exactly one exit leg
    (= spread_on_exit_change_bar + RT_OVERHEAD). The FIX extends to
    [entry_i : exit_i+2] = [entry_i : j+1], capturing both entry and exit cost
    without double-charging (compute_rt_cost_series is NOT modified — it already
    correctly charges the exit-change bar at j; only the slice is widened).
  assertion-output: |
    == C2COST_FULL_RT_ENTRY_PLUS_EXIT ASSERTION ==
    Description: Synthetic single trade flat→+1 at bar 1, hold bars 2-3, +1→flat at bar 4
    Spread (EURUSD-like): 0.30 pips
    RT overhead:          0.80 pips
    RT per leg:           1.10 pips
    Position path:        [0.0, 1.0, 1.0, 1.0, 0.0]
    Cost series:          [0.0, 1.1, 0.0, 0.0, 1.1]
    entry_i=1, exit_i=3, j(exit_change_bar)=4
    Buggy slice: iloc[1:4]  ← covers bars [1, 2, 3]
      → buggy cost: 1.1000 pips  (entry only — exit leg DROPPED)
    Fixed slice:  iloc[1:5]  ← covers bars [1, 2, 3, 4]
      → fixed cost: 2.2000 pips  (entry + exit = full RT)
    Expected full RT: 2.2000 pips
    Undercount per trade: 1.1000 pips (= exactly 1 exit leg)
    ASSERTION PASSED: True ✓
    Interpretation: Buggy slice charges 1.1000 pips (entry leg only).
      Fixed slice charges 2.2000 pips (entry + exit = full RT).
      Every trade was under-charged by exactly 1.1000 pips
      (= 1 exit leg × (spread 0.30 + overhead 0.80) pips).
    NOTE: This is a NEW, DISTINCT assertion from run_f001_assertion().
      run_f001_assertion() tests the flip-count (binary→magnitude) bug on
      a path with a flip (position change of magnitude 2). This assertion
      tests the trade-loop hold_cost SLICE bug on a simple single-entry/exit
      trade (position magnitude changes of 1), confirming the exit-change bar
      (at j=exit_i+1) is captured in the fixed slice but NOT in the buggy slice.

