candidates:
  - name: V1-RELVOL-CONTINUATION (relative-volume participation-surprise continuation)
    alpha-source: >
      The proposed mechanism: a session-open bar that prints volume FAR ABOVE its
      time-of-day/day-of-week seasonal norm reflects a PARTICIPATION SURPRISE — more
      distinct participants acting than the calendar predicts for that hour — which (the
      folklore claim) signals informed/institutional flow that continues over the next
      1–2 bars rather than mean-reverting. The "beyond volatility" claim rests on the
      fact that RELATIVE volume (vol / its seasonal median) is NOT the same as RAW range:
      empirically only ~26% (EURUSD) to ~40% (AUDUSD) of log-relative-volume variance is
      explained by log-relative-range, so ~60–74% of relative-volume variation is residual
      to range — a genuine non-range component. The orthogonality CLAIM is that this
      residual participation-surprise carries DIRECTIONAL information that a pure range/ATR
      filter (the retired F1–F6 vol-breakout family) does not.
      HONEST CAVEAT (evidence layer): OBV / PVT / "volume confirms trend" are largely
      UNVALIDATED FOLKLORE in the forex-trading + technical-analysis evidence layers
      (Park & Irwin TA survey is mixed-not-settled; no peer-reviewed OOS support for
      tick-volume directional edges in OTC FX). Retail FX volume is broker TICK-volume
      (a count of price updates, no consolidated tape), so the prior on a real directional
      edge here is LOW. The point of this candidate is to TEST that low prior cheaply, not
      to assert it.
    universe: >
      EURUSD, GBPUSD, USDJPY, EURJPY, AUDUSD (the five lowest-spread / highest-liquidity
      pairs in scope, where any gross edge has the best chance of clearing the RT hurdle).
      Rationale: if a participation-surprise edge cannot clear costs on the TIGHTEST-spread
      pairs, it cannot clear on the wider-spread remainder (USDCAD 2.10, NZDUSD 1.90,
      EURGBP 1.70, AUDJPY 1.60 RT hurdles) — so screening these five is sufficient to
      decide the family. GBPJPY explicitly excluded (HoQR R3).
    volume-signal-definition: >
      RELATIVE-TO-SEASONAL-NORM, not raw. Define seasonal bucket = (day_of_week × 24 + hour_UTC),
      168 buckets. seasonal_median_volume[bucket] = median of `volume` over all bars in that
      bucket across the full sample. relvol_t = volume_t / max(seasonal_median_volume[bucket(t)], 1).
      Signal fires only when relvol_t exceeds a threshold (pre-specified at 1.5×, i.e. volume
      ≥ 1.5× its seasonal norm). PREFERRED over raw volume BECAUSE raw volume is dominated by
      intraday seasonality (London/NY opens always print high volume) — a raw-volume filter
      would just select session-open bars, which is a TIME filter, not a participation signal.
      Dividing by the seasonal norm removes the deterministic time-of-day component and isolates
      the SURPRISE. Justification of (partial) orthogonality to range: relvol's correlation with
      relative-range drops from raw-vol~range ≈ 0.62–0.72 to relvol~relrange ≈ 0.53–0.64 — lower,
      but NOT orthogonal; see volatility-control-test. The residual after seasonal-norming is the
      only defensible "volume, not time, not (fully) volatility" quantity available on this data.
    signal-logic: >
      At each bar t that is a session-open hour (07:00 or 13:00 UTC — London / NY opens, the two
      highest-participation transitions), compute relvol_t. If relvol_t ≥ 1.5 AND the bar's own
      return sign is well-defined (|close−open| > 0), emit a CONTINUATION signal in the DIRECTION
      of the current bar's close−open. Position is discretized to +1 (long) or −1 (short) for the
      hold horizon. Declarative only; ROUTE_TO quant-developer for vectorized implementation using
      the existing pip-size table (scripts/cost_feasibility_c1_c2.py lines 36–46) and the
      C2COST-corrected trade-loop accounting. NO CODE EMITTED BY QR.
    entry: >
      Enter at bar t+1 open (no-lookahead: signal computed on closed bar t, executed next bar),
      in the direction of bar t's close−open sign, conditional on relvol_t ≥ 1.5 at a session-open hour.
    exit: >
      Time-stop exit at the close of bar t+2 (a 2-bar / 2-hour hold). Fixed-horizon exit chosen
      to keep turnover and per-trade cost minimal and to make the gross-edge estimate falsifiable
      against a single, pre-specified horizon (no horizon-shopping).
    stop: >
      Protective stop at 1.5 × the entry bar's range (≈ 1.5 × ATR-equivalent on a single bar) on
      the adverse side. Stop is for risk containment only; the feasibility screen evaluates the
      gross signed return over the fixed 2-bar hold (stop rarely binds at this horizon) so the
      cost verdict is not stop-path-dependent.
    hold-horizon: 2 hours (2 × 1h bars), fixed.
    expected-fires-per-year: >
      ~250–320 fires/yr/pair (NOT low-turnover by the family's standard, and that is itself a
      cost problem). Derivation: 2 session-open hours/day × ~250 trading days/yr = ~500
      candidate bars/yr; relvol ≥ 1.5 fires on the upper tail of the seasonal-norm distribution
      at session opens — my probe measured 793 EURUSD fires and 504 GBPUSD fires over the ~5-yr
      sample at hours {07,13}, i.e. ~100–160 fires/yr/pair on the strict (07/13-only) definition.
      If session-open hours are broadened to {07,08,13,14} the count roughly doubles to ~250–320/yr.
      QD measures the exact count under the strict definition; I pre-register the strict {07,13}
      definition as primary.
    expected-gross-pips-per-trade: >
      ~0.9–1.0 pips/trade (LOW — below the hurdle on most pairs). Derivation from a real probe,
      NOT curve-fit: I measured mean signed-continuation return over the next bar on high-relvol
      session-open bars = +0.892 pips (EURUSD), +1.025 pips (GBPUSD). Continuation rate was 0.508
      (EURUSD) and 0.498 (GBPUSD) — statistically a coin flip. The small positive mean is driven
      by the magnitude of continuing moves being marginally larger than reversing moves, NOT by a
      directional edge. Extending to a 2-bar hold does not reliably scale this (mean-reversion at
      h=2 may erode it). I report ~1 pip/trade as the GENEROUS upper-bound gross estimate.
    rt-cost-hurdle-pips: >
      Per-pair (spread_median_pips real per-bar + 0.80 overhead): EURUSD 1.10, GBPUSD 1.70,
      USDJPY 1.40, EURJPY 1.80, AUDUSD 1.80. NOTE these are FULL-SAMPLE medians; high-relvol
      bars carry WIDER spreads (EURUSD high-relvol mean spread 0.47 vs 0.44 all; AUDUSD 1.25 vs
      1.19 all), so the effective hurdle on the conditioned subset is HIGHER than the table,
      worsening feasibility. QD must compute the hurdle on the CONDITIONED bars, not full-sample.
    volatility-control-test: >
      MANDATORY. Form (a) preferred: residualize the per-trade gross signed return on relative-RANGE.
      Specifically: (1) regress per-trade gross pips on relrng_rank (rank of relative-range on the
      entry bar) AND relvol_rank, jointly; report the relvol coefficient and its t-stat NET of
      relrng. PASS-the-control iff the relvol term is positive with t ≥ 2.00 after controlling for
      relrng. Form (b) supplementary: stratify entries into a 2×2 (relvol high/low × relrng high/low)
      and show the high-relvol/LOW-relrng cell (the "volume-surprise without a volatility-spike" cell)
      carries independent positive gross edge. If the gross edge lives ONLY in the high-relvol/high-relrng
      cell, the signal is volatility, not volume → DISQUALIFIED as an F1–F6 vol-breakout restatement.
      PRIOR: relvol~relrange ≈ 0.53–0.64 (substantial shared variance) and high-relvol bars show
      IDENTICAL directional efficiency to low (0.464 vs 0.451) → I expect this control to FAIL,
      i.e. the (already coin-flip) edge to be a volatility shadow.
    feasibility-falsification: >
      KILL (cost-axis FAIL) iff gross_edge_per_trade ≤ 0.80 × RT_cost on the conditioned bars for
      ≥3 of the 5 pairs. Concretely, with measured gross ≈ 0.9–1.0 pips and hurdles 1.10–1.80,
      gross/hurdle ≈ 0.5–0.9 → FAIL on EURUSD (0.9/1.10=0.82, borderline) and clear FAIL on
      GBPUSD/EURJPY/AUDUSD (≤0.6). SECONDARY independent kill: volatility-control test fails
      (relvol t-stat < 2.00 net of relrng) → DISQUALIFIED regardless of cost margin.
      Either condition closes the candidate.

  - name: V2-RELVOL-LOWSPREAD-MEANREVERT (structural anti-volatility construction)
    alpha-source: >
      Designed specifically to ATTACK the orthogonality problem BY CONSTRUCTION (the PM's
      acceptable form (a): "volume HIGH while spread is LOW — anti-correlated with volatility
      spikes"). Mechanism claim: a bar with HIGH relative-volume but NARROW spread reflects
      DEEP two-sided liquidity (many participants, tight book) rather than a one-sided volatility
      surge (which widens spreads). In a deep-liquidity high-participation bar, a price extension
      away from the session VWAP/open is more likely to be ABSORBED (mean-revert) than to continue,
      because the liquidity to fade it is present. This is the one volume framing that is plausibly
      orthogonal to volatility, because the LOW-SPREAD condition explicitly EXCLUDES the
      volatility-spike regime where tick-volume and range co-move.
      HONEST CAVEAT: this is still a folklore mechanism (no peer-reviewed OOS FX support); and it
      partially re-treads the retired F-family mean-reversion topology (spread-filt-reversal),
      which the NO-RETIRED-FAMILY-RERUN constraint scrutinizes. Its claim to novelty is the
      JOINT relvol-high ∧ spread-low ∧ seasonal-norm conditioning, not the mean-reversion leg alone.
      I flag this novelty as CONTESTABLE and defer to HoQR's structural-novelty pre-screen.
    universe: >
      EURUSD, USDJPY, EURGBP (the three pairs where "low spread" is a meaningful, frequently-met
      condition — median spreads 0.30 / 0.60 / 0.90). On wide-spread pairs the "low spread" gate
      almost never fires, making the construction vacuous. Rationale: test where the structural
      anti-volatility gate can actually bind.
    volume-signal-definition: >
      relvol_t = volume_t / seasonal_median_volume[bucket(t)] (same 168-bucket seasonal norm as V1).
      JOINT condition: relvol_t ≥ 1.5 AND spread_median_pips_t ≤ the pair's 40th-percentile spread
      (a TIGHT-book bar). The spread-low gate is what manufactures orthogonality: it removes the
      high-range/wide-spread bars where tick-volume is merely a volatility proxy, leaving
      high-participation/tight-book bars. Pre-specified spread percentile = 40th (not optimized).
    signal-logic: >
      On any bar t satisfying relvol_t ≥ 1.5 AND spread_t ≤ p40_spread, if the bar's close is
      extended ≥ 0.75 × seasonal-median-range away from the same session's opening price, emit a
      MEAN-REVERSION signal toward the session open (sign = − sign(close − session_open)). Discretize
      to ±1 for the hold. Declarative only; ROUTE_TO quant-developer. NO CODE.
    entry: Enter at bar t+1 open, fading the extension (no-lookahead).
    exit: Time-stop at close of bar t+3 (3-hour hold) OR touch of the session-open price, whichever first.
    stop: 1.5 × seasonal-median-range on the adverse side (risk containment).
    hold-horizon: up to 3 hours (3 × 1h bars), early-exit on session-open touch.
    expected-fires-per-year: >
      ~40–80 fires/yr/pair (LOW turnover — the joint relvol≥1.5 ∧ spread≤p40 ∧ extension≥0.75×
      gate is restrictive). Derivation: relvol≥1.5 ≈ upper ~15% of bars; spread≤p40 ≈ 40% of bars;
      extension≥0.75×medrange ≈ ~25% of bars; if roughly independent, joint ≈ 0.15×0.40×0.25 ≈
      1.5% of ~6200 bars/yr ≈ ~90/yr, but relvol and spread are NEGATIVELY associated on the
      conditioned set (high relvol tends to WIDEN spread — see probe: EURUSD high-relvol spread
      0.47 > 0.44), so the joint is RARER than independence implies → ~40–80/yr. QD measures exact.
    expected-gross-pips-per-trade: >
      ~1.5–2.5 pips/trade IF the mean-reversion mechanism is real (an extension of 0.75× a ~11-pip
      EURUSD seasonal range ≈ 8 pips; reverting ~20–30% of it ≈ 1.5–2.5 pips). This is a REASONED
      mechanism estimate, NOT a measured probe — I did not probe V2's mean-reversion return
      (it requires session-open anchoring QD must build), and I flag that the estimate is therefore
      SOFTER than V1's. The honest risk: the extension itself is the volatility the spread-gate was
      supposed to exclude, so the gross edge may collapse once the spread-low gate is binding.
    rt-cost-hurdle-pips: >
      On the CONDITIONED (spread≤p40) bars the hurdle is LOWER than full-sample by construction:
      EURUSD ≈ p40_spread + 0.80 ≈ ~1.0; USDJPY ≈ ~1.2; EURGBP ≈ ~1.5. QD computes the exact
      conditioned-bar hurdle (this is the design's intended cost ADVANTAGE — it trades only on
      tight-book bars).
    volatility-control-test: >
      MANDATORY, but the construction is built to pass form (c)/(a): the spread-low gate makes the
      entry anti-correlated with volatility spikes BY CONSTRUCTION. The screen must still CONFIRM this:
      (1) verify the conditioned-entry bars' relative-range distribution is NOT shifted high vs sample
      (if conditioned relrng median ≈ sample median, the construction worked); (2) residualize gross
      return on relrng_rank and confirm the relvol/mean-reversion term survives with t ≥ 2.00. If the
      conditioned bars are STILL high-range (the spread-low gate failed to exclude volatility), the
      construction is void → DISQUALIFIED.
    feasibility-falsification: >
      KILL (cost FAIL) iff gross_edge ≤ 0.80 × conditioned-RT-cost on ≥2 of 3 pairs. SECONDARY kill:
      conditioned-entry-bar relrng median ≥ 1.2× sample median (construction failed to exclude
      volatility) → DISQUALIFIED as volatility-restatement. TERTIARY: HoQR structural-novelty
      pre-screen rules the mean-reversion leg too close to retired spread-filt-reversal → DISQUALIFIED
      before screen.

slippage-distribution: >
  Declarative (modeled, not measured live — no live capital). The 0.80-pip RT overhead already
