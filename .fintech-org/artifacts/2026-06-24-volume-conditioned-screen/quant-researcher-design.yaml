body: |
  ## The volume-vs-volatility orthogonality argument — laid bare

  This cycle's make-or-break is whether a volume-conditioned signal carries information
  BEYOND realized range. I treated that as an empirical question and probed it directly
  on the real 9-pair data before writing a single candidate. The answer, honestly:

  **Tick-volume is substantially — though not entirely — a volatility proxy on this data,
  and the residual (non-range) component does not carry directional information.**

  Three facts, all measured:

  1. **Seasonal-norming helps but does not orthogonalize.** Raw volume correlates with bar
     range at 0.62–0.72. The right move — the one the prompt asks for — is to use volume
     RELATIVE to its time-of-day/day-of-week seasonal norm ("participation surprise"),
     because FX volume has strong intraday seasonality (London/NY opens always spike), and a
     raw-volume filter is really a TIME filter. Seasonal-norming drops the correlation to
     0.53–0.64. Lower, materially — but still over half the variance is shared with range.
     A "relative-volume edge" is therefore PRESUMPTIVELY a relative-range edge unless proven
     otherwise. That is exactly the F1–F6 vol-breakout family the firm already retired.

  2. **There IS a residual.** Only 26% (EURUSD) to 40% (AUDUSD) of log-relative-volume
     variance is explained by log-relative-range. So 60–74% of relative-volume is genuinely
     NOT range. If volume carried alpha beyond volatility, it would live in this residual.
     This is the steelman for the family, and I built V1 to exploit it.

  3. **The residual carries no directional sign.** High-relvol bars are no more "trend bars"
     than low-relvol bars (directional efficiency 0.464 vs 0.451 — indistinguishable). And
     at the strongest a-priori spot — high participation-surprise at session opens — the
     next-bar continuation rate is 0.508 / 0.498, a coin flip, with a signed edge of ~0.9–1.0
     pips that sits BELOW every pair's RT-cost hurdle (1.10–1.80). Worse, high-relvol bars
     carry WIDER spreads, so the cost moves against the signal exactly where it fires.

  ## What this means for the two candidates

  **V1 (relvol continuation)** is the strongest-faith directional attempt, and my own probe
  already shows it is ~coin-flip with sub-hurdle gross edge. My honest prior is cost-axis
  **FAIL** on ≥3 of 5 pairs and a FAILED volatility-control test (the small edge is a
  volatility shadow). I include it not because I believe it, but because the firm's discipline
  is to KILL on measured numbers from QD, not on a researcher's prior — and V1 gives QD a
  precise, falsifiable target.

  **V2 (relvol-high ∧ spread-low mean-reversion)** is the ONE framing with a structural
  orthogonality argument: by gating on LOW spread, it excludes the volatility-spike regime
  where tick-volume and range co-move, isolating high-participation/tight-book bars. This is
  the PM's acceptable form (a). It is also the candidate I could NOT probe directly (it needs
  session-open anchoring QD must build), so its gross estimate (~1.5–2.5 pips) is a softer
  mechanism estimate, and it brushes against the retired spread-filt-reversal topology — its
  novelty rests entirely on the joint relvol ∧ spread ∧ seasonal conditioning, which I flag as
  CONTESTABLE and defer to HoQR's structural-novelty pre-screen. Its honest risk: the price
  extension it fades may BE the volatility the spread gate was meant to exclude.

  ## The honest bottom line (per the prompt's explicit instruction)

  The prompt instructed: "If you cannot articulate a volume signal that is plausibly orthogonal
  to volatility, SAY SO honestly — that itself closes the lever." My finding is intermediate
  and I will not overstate it in either direction:

  - I CAN articulate a partially-orthogonal signal (V2's relvol-high ∧ spread-low construction,
    and V1's seasonal-norm residual). So the lever is not closed by pure inarticulability.
  - But my DESCRIPTIVE EVIDENCE points strongly to FAIL: the directional content is coin-flip,
    the gross edge is sub-hurdle, the residual carries no sign, and the evidence layer rates FX
    volume indicators as unvalidated folklore. My expectation is that QD's screen returns
    cost-axis FAIL for V1 and a failed-or-borderline result for V2, closing the family.

  This is the right way for the lever to close: cheaply, on a feasibility screen, with a
  pre-specified volatility-control test, and with the honest-N held at 30 (descriptive,
  non-counting). If QD's numbers surprise me and a candidate is cost-PASS AND passes the
  volatility control, it then faces HoQR's amended three-sub-gate (regime + t≥2.00 +
  no-single-year) before any pre-registration — a bar I designed toward but do not expect
  this family to clear. No committed CPCV backtest, no trial-counter increment this cycle.

