body: |
  DECISION: VETO. size_multiplier 0.0. No capital, no counted trial.

  The risk question is not "is CADJPY a clean instrument" (it is — DQ ADMIT is unambiguous:
  99.23% coverage, 100% measured-spread, 1.2-pip median well inside the 5.0 ceiling). The
  question is whether the EVIDENCE justifies committing risk budget. It does not, for three
  independent reasons, any one of which is sufficient:

  1. NO EDGE TO SIZE. All six canonical families screen net-NEGATIVE in-sample with real
     spreads under EXCLUDE-NOT-IMPUTE. Best is -2.19 net-SR — 3.63 units below the STRETCH
     bar (1.44) and 3.95 below PASS (1.76). In-sample is the OPTIMISTIC bound: it carries no
     OOS penalty and no DSR deflation. A candidate that cannot clear zero in-sample has no
     path to clearing a deflated 1.76 out-of-sample. Sizing a negative-expectancy sleeve is
     a guaranteed bleed, not a risk-reward trade.

  2. DIVERSIFICATION IS ILLUSORY. The G5 gate clears (ALL-10 rho_bar_eff 0.3716 <= 0.41),
     but the gate is necessary, not sufficient. N_eff = 2.302 means the 10-instrument book
     behaves like ~2.3 independent bets. CADJPY does not add a new bet: its correlations to
     EURJPY (+0.757) and AUDJPY (+0.776) place it inside an already-concentrated JPY-cross-3
     block (rho 0.7479). The aggregate rho improving from 0.409 to 0.372 is the mechanical
     effect of averaging in one more column — dilution arithmetic, not genuine de-correlation.
     The single negative cross-correlation (USDCAD -0.403) is real but cannot offset a block
     of +0.76 co-movement at the portfolio level.

  3. THE COMBINATION IS STRICTLY DOMINATED. Negative edge AND concentrated tail is worse than
     flat on every axis a CRO measures: expected return (negative), tail (correlated JPY-cross
     drawdown realizes together), and capital efficiency (risk consumed for sub-zero reward).
     There is no size_multiplier > 0 that is defensible.

  WHAT WOULD CHANGE THIS: a future candidate that (a) screens net-POSITIVE through STRETCH/PASS
  after OOS + DSR deflation, AND (b) is risk-budgeted against the JPY-cross-3 block rather than
  counted as an independent 10th bet. Adding CADJPY to the admitted universe for DATA purposes
  is fine — it is clean. Allocating risk to it on this evidence is not.

  POSTURE: CONFIRM prior NO-SPEND. honest_N stays 30; no trial counted. The 10th instrument is
  admitted to the data universe (DQ-clean) but contributes zero sizable edge and negative
  marginal diversification. Consistent with all prior cycles.
