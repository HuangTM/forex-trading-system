body: |
  ## Posture call: does CADJPY change anything? (material vs immaterial rho_bar improvement)

  **NO. The ratified posture stands: existing-data strategy space is EXHAUSTED;
  binding constraint = DATA CAPABILITY, not pair count. Decision: HOLD / NO-SPEND.**

  The rho_bar improvement 0.4090 -> 0.3716 is a REAL number and I will not wave it away —
  but it is IMMATERIAL to a spend decision, for three independent reasons, each sufficient
  on its own:

  (a) The gate is VACUOUS over an empty edge set. This was the central ruling of the
      9-pairs wave and it is not weakened by a better rho_bar — it is reinforced. rho_bar_eff
      measures whether an edge, IF ONE EXISTED, could be confirmed across enough effective-
      independent bets. It is a property of the universe's covariance, NOT of any alpha. With
      CD0 uniformly negative across now 84 pair x family combos, there is no alpha whose
      confirmability the gate could certify. Improving 0.409 -> 0.372 optimizes the denominator
      of a fraction whose numerator is still exactly zero. The fraction is still zero.

  (b) CADJPY's OWN CD0 fails like everything else — and WORSE. Best CADJPY net SR = -2.19
      (F5 London AM drift), vs the all-9 best of -1.56. So the 10th pair did not even produce
      a less-bad near-miss; it produced a deeper FAIL. The pair that "fixed" concentration
      contributes the worst single-pair CD0 in the screen. That is the no-edge wall in stark
      relief: the data class has no survivable net-of-cost intraday edge, and adding breadth
      to it adds more no-edge, not edge.

  (c) A new pair is BREADTH, not a new data CLASS. The standing fork is explicitly defined at
      the data-CLASS level — sub-1h resolution, volume-bearing, or event-microstructure feeds —
      because that is the one lever that changes the gross-edge-per-trade arithmetic (more
      events/yr x higher per-event Sharpe). CADJPY is retail 1h OHLCV, zero volume, identical
      cost structure. It moves a non-binding gate and leaves the binding one (cost feasibility)
      exactly where it was. The DATASET WALL is a wall of CLASS, not of count.

  Honest read: CADJPY is a clean DQ ADMIT and a genuine portfolio diversifier, and that is
  worth recording as inventory hygiene. It is NOT progress toward an edge, and the rho_bar win
  is the kill-criterion trap (2026-05-31) in its purest form — "the concentration gate finally
  cleared comfortably" feels like progress but the governing math (CD0 uniformly negative)
  means the firm correctly SPENDS NOTHING. The data drop improved a non-binding gate and added
  a worse data point to the binding one.

  ## Re-open any retired family?

  **NO — for all of F1-F6, event, carry, volume. Retirement is UNCONDITIONAL on pair count.**

  - F1-F6 (intraday family, 1h): REMAINS RETIRED-AS-SATURATED. CADJPY's 6 families are 6 more
    FAILs (best -2.19), bringing the running tally to 84 pair x family combos with ZERO positive
    net SR. A same-class pair is, by the retirement criterion, explicitly NOT a re-open trigger.
    If anything CADJPY tightens the falsification: the search space is flat-negative with a
    widening margin (best-ever -1.56; CADJPY worst-best -2.19).
  - event-drift: stays retired (regime-artifact finding); unaffected — CADJPY adds no event feed.
  - carry: stays retired (cost-failed); unaffected — a JPY cross does not revive cost-adjusted
    carry on daily data.
  - volume: stays retired (volume == volatility finding); unaffected — CADJPY carries ZERO volume
    (n_zero/missing spread checks aside, no true volume field), so it cannot re-open a volume line.

  The only re-open keys remain: a NEW family spec outside F1-F6, a CRO-ratified lower-cost
  execution assumption, or a NEW DATA CLASS. A 10th same-class pair is none of these.

  ## Forward fork + the 'keep adding pairs' treadmill risk

  Restated fork (ranking UNCHANGED by CADJPY):
    [1] data-capability-acquisition-with-precondition  (recommended)
        precondition = ratified CD0-feasibility pre-screen: a candidate family's GROSS edge
        must plausibly clear the round-trip cost hurdle BEFORE acquisition spend.
    [2] wind-down-to-observe-only  (fallback; elevate only on CRO/CEO cost judgment)

  CADJPY's breadth does NOT re-rank these. A better rho_bar is an argument about confirmability,
  and confirmability is downstream of an edge that does not yet exist. It provides zero evidence
  for "keep mining the existing data class," which is the only thing that would favour staying
  put over the fork.

  **The treadmill risk is real and I am naming it as a first-class finding.** The firm has now
  run FOUR readiness waves (6->7->9->10 pairs) and each one: ingested a same-class pair, re-ran
  the falsified F1-F6 screen, recomputed rho_bar, and concluded NO-SPEND. GBPJPY mid-ingest sets
  up an identical 5th wave whose CD0 result the accumulated evidence (84/84 negative) lets us
  predict with near-certainty: FAIL. That IS the treadmill the data-capability fork was designed
  to break — substituting cheap, infinitely-repeatable same-class pair adds for the one expensive,
  decisive move (a new data class). Each pair-add feels like motion and produces a publishable DQ
  number, but it cannot move the binding constraint, by construction.

  Mitigation, ratified here as a retirement-criterion (TREADMILL-STOP): a same-class pair landing
  no longer auto-triggers a readiness wave. Accept its DQ verdict as inventory hygiene; do NOT
  spend a CD0/rho_bar research cycle on it. A readiness wave is warranted again ONLY when the DATA
  CLASS changes (sub-1h, volume-bearing, or event-microstructure). This converts "we keep getting
  pairs, so we keep screening" into "we screen when the thing that could actually change the answer
  changes." GBPJPY, when it lands, should be processed under this rule: DQ-admit-and-shelve, not
  re-screen-as-candidate-universe.

  ## Trial counter

  **NO honest-N increment. honest-N stays at 30 — CONFIRMED.** This is a descriptive structural
  screen: no parameter search, no OOS, no frozen pre-registered spec, no candidate clearing even
  STRETCH (CADJPY best -2.19 vs 1.44). By the no_trial_increment_without_pre_registration rule
  there is nothing to count. QD logged counts_toward_deflation_denominator: false. Confirmed
  correct. trial_id cadjpy-10pairs-2026-06-25-hoqr is descriptive and NON-counting.

