body: |
  ## Coordination notes

  This is a READINESS UPDATE, not a fresh alpha hunt. The task is specifically bounded:
  DQ-admit CADJPY, recompute rho_bar_eff, run one expected-FAIL CD0 sanity screen, and
  confirm posture unchanged. The primary deliverable (C4) is the explicit posture statement.

  The firm has ratified across 3 cycles that the existing-data strategy space is EXHAUSTED
  and the binding constraint is DATA CAPABILITY (intraday tick/L2 or event-conditioned feeds),
  not more pairs. A 10th retail OHLCV+spread pair is breadth. The purpose of this wave is to
  honestly update the numbers and close the accounting — not to re-litigate the settled finding.

  ## CRO firewall

  CRO receives ONLY structured fields (instrument-universe + hard-constraints). No rationale,
  no background narrative, no strategic context has been passed to CRO in the task statement.
  CRO's hard-constraints encode: rho_bar_eff gate 0.41 (eigenvalue/sign-blind), honest_N=30
  no-increment, paper_only/no_live_capital, EXCLUDE-NOT-IMPUTE, DQ EXCLUDE gate applies to
  CADJPY, a 10th same-class pair does NOT re-open retired families, posture-change requires a
  new data CLASS not a new pair.

  ## Key pre-checks completed (PM layer, not QD gate)

  The following are observational pre-checks only. They do not substitute for QD's formal
  gate execution. QD must run and report independently.
  - CADJPY_1h.parquet: 31,032 rows, 2021-2025, no null spreads, no zero spreads, bar_coverage
    ~99.2%, max_contiguous_gap_hours=24 (holiday closure per trading-hour-aware counter).
  - CADJPY has NO per-pair entry in config/data_quality_gates_1h.yaml — this is a hard
    precondition: QD adds the entry before the gate runs, PR verifies the threshold choice.
  - F1-F6 CD0 on CADJPY is expected FAIL (78 prior negatives; CADJPY has no structural
    exception). If any result is != FAIL, it is an anomaly requiring immediate flag + PR verify
    before consensus is signed.
  - The NHT guard is especially important here: CADJPY landing is the simplest narrative hook
    for framing breadth as progress. NHT must test this explicitly.

  ## What changes vs. 9-pair wave

  Scope is deliberately narrower than the 9-pair wave:
  - Only 1 new pair (CADJPY) vs 2 (EURGBP + AUDJPY) in the prior cycle.
  - CD0 screen is a sanity check, not a full 9×6 re-run — only CADJPY × 6 families required.
  - Posture assessment (C4) is the primary deliverable; DQ/rho/CD0 are its inputs.
  - No H1 unfreeze path is open: Gate B (CD0 net SR >= 1.76) fails categorically on the
    existing universe and CADJPY's expected FAIL cannot change this.
  - NHT dissent protocol and CRO veto authority carry forward unchanged from prior cycle.

