  - id: F-004
    severity: observation
    location: "quant-developer-compute.yaml assumptions[1]; run_cd0_family docstring lines 299-310"
    category: numerical
    observation: >
      pip=0.0001 is applied UNIFORMLY to CADJPY (a JPY-quote pair whose physical pip is
      0.01). QD discloses this matches the prior canonical F1-F6 convention and argues
      gross (log_ret/0.0001) and spread cost (in instrument pips) "scale together" so net
      SR is comparable.
    inference: >
      [labeled-inference] The scaling claim is only partly right: gross PnL scales by the
      pip denominator MULTIPLICATIVELY while cost is ADDITIVE, so the gross/cost RATIO is
      NOT pip-invariant. However, because the reported CADJPY spreads ARE already expressed
      in the parquet's instrument-pip units (median 1.2, consistent with a JPY-cross), and
