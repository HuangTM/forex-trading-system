      "scale together -> comparable" justification in the docstring is an over-claim that
      should not be relied on if any JPY-pair result ever lands near the bar.
    evidence: "run_cd0_family docstring 299-310; net SRs -2.19..-14.81 all << 1.44 bar"
    recommended-action-class: clarify-spec
    owning-role: quant-developer
