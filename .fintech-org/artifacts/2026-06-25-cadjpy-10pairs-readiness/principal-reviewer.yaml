body: |
  ## Verdict: APPROVE-WITH-CONDITIONS

  Every headline number reproduces exactly under independent Python. The two
  load-bearing conclusions — (a) ALL-10 rho_bar_eff = 0.3716 PASSES the 0.41 gate
  with CADJPY ADDING breadth (delta -0.0374), and (b) CADJPY DQ = ADMIT, and (c)
  all 6 CD0 families FAIL — are all correct and robust. None of my findings flips
  the NO-SPEND/ADMIT posture.

  ### What I verified independently (not just re-read)
  - rho_bar_eff for all four subsets: EXACT match. ALL-9=0.4090 confirms the prior
    reference. ALL-10=0.3716.
  - Breadth claim stress-test: I recomputed ALL-9 on the SAME common index as ALL-10
    to strip out the n_obs/k confound. Same-window delta = -0.0376, essentially
    identical to QD's -0.0374. So CADJPY genuinely lowers normalized concentration;
    it is NOT an artifact of the shrinking common window. Mechanism checks out:
    lambda_max barely moves (4.2736->4.3446) while k rises 9->10.
  - CADJPY's 9 pairwise corrs: all exact. The narrative (high JPY-factor corr ~0.77
    but offset by negative USDCAD -0.40 and small negatives to EUR pairs) is accurate.
  - DQ: ran the actual coverage_gate library, not just the QD's numbers — ADMIT,
    every sub-metric matches.
  - CD0: reproduced all six net SRs to 4dp; confirmed shift(1) no-lookahead, the
    F-001 flip-cost fix, and the spread+0.80 cost model.

  ### The one condition (F-001, minor spec-drift)
  The amendment mandates rho on PnL-CONTRIBUTION (signal x return) series and calls
  that "the actual gate input"; QD used raw log-returns. I confirmed this is
  CONSERVATIVE: PnL-contribution proxies give rho ~0.21, far below the raw-return
  0.3716, because signal timing de-correlates pairs. So raw-returns is the harder
  test and ALL-10 still passes — the spec-drift cannot flip the PASS. The condition
  is forward-looking only: when an actual frozen pooled-hypothesis gate decision is
  made, rho_eff must be recomputed on the pre-registered signal's PnL-contribution
  series; the 0.3716 descriptive number is not a substitute for that gate input.

  ### Minor hygiene flags (F-002..F-004), none verdict-relevant
  - F5's positional .shift hold-window leaks past 12:00 across data gaps (forward-only,
    so not lookahead; harmless given the deep FAIL).
  - CADJPY sits exactly at the 24h max-gap ceiling (passes inclusively; zero margin
    on that one criterion).
  - The "pip=0.0001 uniform scales together -> comparable" justification for the JPY
    pair is an over-claim (gross scales multiplicatively, cost additively), but is
    immaterial here since all net SRs are deeply negative.

  Bottom line: the compute is correct, reproducible, honest about its proxy, and the
  ADMIT + breadth-PASS + all-FAIL conclusions stand. Approve, conditioned on F-001
  being honored at any future binding gate decision.
knowledge_gaps:
  - "The amendment-mandated full PnL-contribution rho for a SPECIFIC pre-registered signal is unmeasured (by design at this descriptive stage); my proxies only bound its direction, not its exact value for any frozen hypothesis."
