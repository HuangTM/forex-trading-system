findings:
  - id: F-001
    severity: minor
    location: "compute_9pairs_readiness.py:126-159 (compute_rho_bar_eff); QD assumptions[0]; amendment lines 43-45, 84-85"
    category: spec-drift
    observation: >
      The rho-bar amendment (hoqr-rho-bar-amendment.yaml, sections 2_series and the
      knowledge_gaps block) mandates that the correlation matrix be computed on the
      per-pair PnL-CONTRIBUTION series x_{p,t}=signal_{p,t}*ret_{p,t} (demeaned,
      event-aligned), and explicitly names the full PnL-contribution rho as "the actual
      gate input". The compute instead uses RAW hourly log-return correlations.
    inference: >
      [confirmed-conservative] This is a real deviation from the amendment's mandated
      statistic, but it is in the SAFE direction and does not threaten the PASS. I
      reproduced two crude PnL-contribution proxies (F1-reversal, F3-momentum) over
      ALL-10: rho_eff = 0.2076 and 0.2188 respectively — far BELOW the raw-return 0.3716.
      Signal timing/direction de-correlates the pairs, so raw-return rho over-states
      concentration. The raw-return proxy is therefore the HARDER test, and ALL-10 still
      passes at 0.3716 < 0.41 with a 0.038 margin. QD disclosed this proxy choice
      (assumptions[0], body lines 87-90). For a DESCRIPTIVE readiness screen (not a frozen
      hypothesis gate decision, trial_counter not incremented) the proxy is acceptable.
      CONDITION: any actual H1/pooled-hypothesis GATE decision that binds the 0.41
      threshold must recompute rho_eff on the amendment-mandated PnL-contribution series
      for the specific pre-registered signal — the 0.3716 raw-return number is NOT a
      substitute for that gate input.
    evidence: "hoqr-rho-bar-amendment.yaml:43-45,84-85; my PnL-contrib reproduction rho=0.2076/0.2188; QD assumptions[0]; raw-return rho=0.3716 reproduced exactly"
    recommended-action-class: clarify-spec
    owning-role: head-of-quant-research
  - id: F-002
    severity: minor
    location: "compute_9pairs_readiness.py:379-401 (F5 london_am_drift position construction)"
    category: edge-case
    observation: >
      F5 builds its position by summing positional .shift(s+1) for s in 0..3 of an
      08:00-only signal series, on an index that contains gaps. On contiguous days the
      position correctly spans 09:00-12:00 (4 bars), verified by tracing 2021-01-04.
      But across missing-bar boundaries the positional shifts land on later in-session
      hours, so the union of position-active hours is 09:00-17:00 rather than the
      intended 09:00-12:00.
    inference: >
      [labeled-inference] This is a positional-shift-on-non-contiguous-index artifact,
      not a lookahead violation (every shift is strictly forward, decision info precedes
      the PnL bar). Impact on the verdict is nil: F5 net SR -2.1914 is far below the 1.44
      bar and all 6 families FAIL regardless. Flag for hygiene: a time-indexed reindex to
      a regular hourly grid (or a groupby-day hold) would make the hold window exact and
      gap-robust. Same pattern would matter materially if any F5-class strategy were ever
      promoted past CD0.
    evidence: "my trace: position-active hours = {9..17}; signal hours = {8}; single clean day 2021-01-04 shows correct 09-12 span"
    recommended-action-class: add-edge-case-handling
    owning-role: quant-developer
  - id: F-003
    severity: observation
    location: "compute_10pairs_raw.json C1 max_contiguous_gap_h=24; config max_contiguous_gap_h:24"
    category: edge-case
    observation: >
      CADJPY's max contiguous gap is exactly 24h, the inclusive gate ceiling. It passes
      because the gate is <=24. This is a one-clean-trading-day blackout (QD body lines
      43-48), with 0 zero-spread bars and 100% spread coverage, so it is a coverage gap
