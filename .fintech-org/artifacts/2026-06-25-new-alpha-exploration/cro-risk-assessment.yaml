body: |
  RISK POSTURE: size-reduced, not approve, not veto. The directions are worth
  SCARCE research bandwidth, but three of the five risk axes the contract asks me
  to weigh argue for restraint, and one (min-viable-notional) reclassifies the
  highest-allocated direction as research-only until proven otherwise.

  (a) Min-viable-notional vs capital base. 6E carries a fixed 125,000 EUR notional
  and the smallest tradeable unit is one contract — there is no fractional sizing.
  For a small backtest-only firm with no live capital, the binding question is not
  "does the signal work" but "can the firm ever hold one contract at a
  risk-acceptable fraction of base?" If a single-contract adverse move's ES at
  97.5% is a large fraction of the deployable base, the strategy is structurally
  non-deployable regardless of edge. Micro contracts may rescue this, but their
  availability/liquidity is unverified. Net: D-TREND-FUTURES is RESEARCH-ONLY
  until reconciled. A strategy you cannot size is a study, not a strategy.

  (b) Confirmability-horizon / dataset-wall relocation. The firm's recurring
  failure mode is generating ideas that floor at ~3-5yr to validate because the
  data caps events/yr x per-event-Sharpe. D-CIP-SWAP-BASIS (~4-6yr, ~3 episodes)
  and D-CBTEXT (~8 events/yr) read as RELOCATIONS of that wall, not escapes —
  cheaper or different data, same small-effective-N ceiling. D-TREND-FUTURES is
  the only one that plausibly ESCAPES, via genuine cross-asset breadth (~2-4yr)
  — but only if the breadth is real independent confirmation, which (point d)
  it is not fully.

  (c) Selection-surface snoop burden. The winner(s) emerge from a 21-direction
  slate against honest_N=30. That is a heavy multiple-comparison tax. The defense
  is procedural and non-negotiable: pre-register full universe and signal family
  BEFORE any backtest, deflate against the full 21-wide surface (not the survivor),
  and spend NO honest-N until a free/cheap probe clears an honest effective-N bar.

  (d) Concentration. Trend-on-40-futures is ONE correlated program. Counting it as
  40 independent bets would be a category error in both confirmability accounting
  and live risk limits; cross-asset trend correlation converges toward 1 exactly
  when it hurts (de-risking liquidations). One program-level position/ES limit;
  one honest-N unit.

  (e) Reversible-cheap-data vs irreversible honest-N. This is the decisive
  asymmetry and the reason the decision is size-reduced rather than veto. Data
  acquisition is $0-500/yr and REVERSIBLE; a counted trial is an IRREVERSIBLE
  honest-N decrement against a budget of 30 with 4 families already spent to
  NO-SPEND. The correct sequencing falls straight out: exercise the FREE probes
  first (CIP-basis $0, CB-text $0-50), reserve any data spend as a separate
  reversible Board step, and gate every honest-N decrement behind a pre-registered
  effective-N test. Allocation ranking — TREND 0.55 (best wall-escape but
  notional-gated to research-only) > CIP 0.50 (free, but concentrated/long-horizon)
  > CBTEXT 0.25 (free, but classification-not-edge and highest relocation risk).
  Overall 0.45: commit real bandwidth, spend essentially no honest-N this cycle.
