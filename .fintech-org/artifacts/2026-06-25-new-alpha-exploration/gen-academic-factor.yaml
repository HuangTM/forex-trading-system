honest-note: |
  DIRECTIONS I WOULD ACTUALLY BET ON (ranked by conviction):

  1. time-series-momentum-diversified-universe — Moskowitz-Ooi-Pedersen (2012) is
     the most robustly replicated systematic trading result in academic finance.
     The FX futures version has real volume data (attacking W4), CME execution costs
     5-10x below retail spread (attacking W1), and 40+ contract breadth (attacking W2).
     The data is cheap ($250-500/yr). This is the strongest direction in the slate
     on evidence grade + cost + wall-attack. Primary risk: minimum viable position
     size at the firm's current capital base may not be economic.

  2. fx-value-reer-deviation-mean-reversion — The BIS REER dataset is FREE, the
     mechanism is theoretically grounded, and quarterly rebalancing trivially survives
     retail spread costs. GRADE CORRECTION: this is THEORY-GROUNDED-UNTESTED, not an
     OOS-survivor — Rogoff (1996) establishes deviation reversion, not a tradable REER
     portfolio's OOS Sharpe; the FX-value factor has strong practitioner adoption (AQR
     style factors) but I do not have a single peer-reviewed OOS trading test in my
     citations. The catch: half-life of 3-5 years means the confirmability horizon is
     long (this direction will face the same confirmability wall QRB-6 hit). Strong on
     W2 attack; W3 attack is plausible-but-unproven. Free data, one-afternoon feasibility
     check (signal-persistence autocorrelation, not a backtest).

  3. broad-cross-sectional-carry-with-crash-overlay — OOS evidence is solid (Lustig-
     Verdelhan G10 carry is the reference paper). The EM extension adds genuine
     diversification but costs money for forward data. The crash overlay improves skew
     but requires VIX conditioning — evidence that the overlay adds value net-of-cost
     is thinner than the base carry literature. Honest: this is the SAME carry the
     firm already tested, just with more breadth and a crash trigger. If the fundamental
     mechanism review (W2/W3) is the issue, breadth helps more than the overlay.

  DIRECTIONS I WOULD FLAG AS RISKIER:

  4. dollar-factor-global-imbalance-long-short — Theoretically clean, free data.
     GRADE CORRECTION: graded THEORY-GROUNDED-UNTESTED — the DOL principal component
     is OOS-documented (LRV 2011) but the specific current-account-sorted TRADABLE basket
     is not a replicated OOS trading result. The DOL factor's standalone return in pure
     G10 is documented to be modest (SR ~0.3-0.4) and it often loads on the same
     risk-on/risk-off regimes as carry — so the W3 attack is partial-and-contested, NOT
     a clean regime-independent factor. The signal-overlap kill test (rank-correlation
     vs. carry, analytical only) is essential before advancing this direction.

  5. carry-timing-via-option-implied-skew — I included this as the CEO-steer challenge
     and it has legitimate peer-reviewed support (Jurek 2014). But it IS carry,
     just crash-conditioned. If the firm's carry near-misses (R5) failed due to
     regime-dependence in a way that a skew signal would NOT have rescued (the
     2022-23 JPY hike regime was not a crash-risk event — it was a directional
     carry episode), then the skew overlay solves the wrong problem. The kill test
     will be informative here.

  6. betting-against-beta-in-fx-low-vol-factor — The evidence for G10-only FX-BAB
     is thinner than the broad currency evidence in Menkhoff et al. (2012). In a
     10-12 pair universe this is likely to produce SR near zero. Needs EM breadth
     to work, which costs data. Feasibility test should kill or confirm quickly.

  7. fx-volatility-risk-premium-selling-realized-vs-implied — Carr-Wu (2009) is
     peer-reviewed and OOS. The mechanism is real. However: selling options requires
     institutional execution infrastructure the firm does not have (option bid-ask
     at retail level destroys the premium); this is the hardest direction to
     operationalize given current firm infrastructure. It is a RESEARCH direction,
     not near-term executable. Keep for a future cycle when infrastructure is resolved.

  HONEST GRADE DISTRIBUTION (after self-correction): 5 of 7 directions carry genuine
  OOS-academic support for their CORE factor — TSMOM, broad carry, VRP, FX-BAB, and
  carry-timing-via-skew. Two directions are downgraded to THEORY-GROUNDED-UNTESTED on
  honest reflection: (3) fx-value-REER — Rogoff (1996) tests deviation reversion, not a
  tradable portfolio's OOS Sharpe; and (5) dollar-factor — the DOL principal component
  is OOS but the specific current-account-sorted tradable basket is not a replicated OOS
  trading result. None of the seven is pure FOLKLORE-UNVERIFIED. The honest calibration
  is that the FX-BAB (G10 only) and dollar-factor results are THINNER than the carry and
  TSMOM results, and the practical VRP direction is infrastructure-blocked. The strongest
  evidence-grade + cheapest-data + most-walls-attacked direction remains TSMOM on CME FX
  futures.

