  HIGHEST-CONVICTION REFRAME: Direction 2 (asset-class transplant).

  The firm has spent significant research capital discovering that retail FX
  OHLCV is an inhospitable raw material for systematic alpha. The harness —
  the CPCV methodology, the deflated Sharpe, the honest trial counter, the
  confirmability rubric — is the real intellectual property.

  The boldest test is this: take the harness, point it at commodity futures
  (free data, genuine volume, documented OOS trend-following evidence), and
  run the exact same pre-registration + CPCV protocol the firm already built.
  If the harness produces a positive finding in commodity trend-following, the
  firm has a validated edge in a non-FX market. If it doesn't, the finding is
  valuable too: the firm has tested the hypothesis that its methodology works
  in principle vs. that its methodology is good and FX is just exhausted.
  This is the experiment that would MOST efficiently distinguish between those
  two hypotheses — and it requires near-zero data spend.

  BOLDEST CHEAP TEST: Direction 5 (CB-text classifier).
  Cost: $0, time: 2 hours, failure mode: clearly defined (< 70% accuracy).
  If it passes, it directly addresses the firm's most documented structural
  failure (W3 regime-dependence). It is the highest-information-per-dollar
  test in the slate.

  NOTE ON THE CEO STEER: The steer (factor-harvesting, not faster/HFT) is
  well-grounded. The contrarian amendment is: the steer should be read as
  "factor-harvest in a market WHERE FACTORS ACTUALLY WORK" — which may not
