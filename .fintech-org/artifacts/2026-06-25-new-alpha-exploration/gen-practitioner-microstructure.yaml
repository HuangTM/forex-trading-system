  # -----------------------------------------------------------------------
  - name: "4pm-London-Fix Flow (WMR/ECB benchmark)"
  # -----------------------------------------------------------------------
    hypothesis: >
      In the 60-second window centered on 16:00 London time, WMR fixes
      benchmark FX rates for fund managers; institutional custodians
      must net and execute residual client flows AT the fix, creating a
      predictable, directional, large-print imbalance whose direction can
      be estimated from the prior 5-minute drift. A strategy that enters
      30-60s before the fix in the direction of the 5-min drift, and exits
      at or just after the fix, should earn the drift compensation earned
      by liquidity providers — IF the 5-min pre-fix drift (r) predicts the
      fix direction with sufficient frequency (hypothesis: |mean 5min drift|
      > RT cost of ~1.5 pip for EURUSD during this window).
    mechanism: >
      Structural: custodian banks are OBLIGATED to execute client orders at
      the WMR fix; they cannot choose timing or price. Large end-of-day
      equity re-hedges (from global asset managers rebalancing multi-currency
      portfolios) concentrate into this window. The fix IS the price — so
      there is no adverse selection for a liquidity provider entering before
      it. The drift in the 5-min pre-fix period partially telegraphs the
      direction of the net order imbalance being assembled. This is not an
      accident — the market has partial information about the direction
      before the fix prints, because dealers who see fixing orders start
      positioning early. The "going around" mechanism: edge is NOT from
      better signals on price dynamics but from structural order-flow
      predictability at a known timestamp. Post-2013 FCA investigation
      (chatroom coordination scandals), banks moved to randomized execution
      within the window — but the STRUCTURAL demand for the fix remains;
      the coordination reduction actually helps a systematic non-bank player
      by removing dealer front-running. Academic OOS evidence: Ito & Yamada
      (2013), Evans & Lyons (2002) documented the fix drift and showed it is
      real; Melvin & Prins (2015 JFE) extend this. Effect is weaker
      post-investigation; net magnitude is debated. Realistic per-event
      gross SR ~0.15-0.25 per event (low; the edge is structural + reliable,
      not large). High event rate (~252/yr/pair) keeps the confirmability
      window short.
    data-class-required: >
      5-minute or 1-minute bars aligned to EXACT London timestamps (UTC-
      aware) PLUS knowledge of the WMR 4pm fix window (public: 15:45-16:00
      London). The 1h data the firm has is INADEQUATE — you cannot isolate
      a 15-minute pre-fix window inside a 1-hour bar. Minimum: 1-minute or
      5-minute bars, freely available from Dukascopy (the firm's existing
      backfill tool handles this — just request M1 or M5 resolution).
      Dukascopy M1 cost: FREE (within Dukascopy tick/bi5 API). No paid feed
      required as a first test.
    cheap-feasibility-test: >
      (1) Pull EURUSD M5 (Dukascopy, free) for 2015-2025. Identify the bar
      containing 15:55-16:00 London each trading day. Compute the 5-bar
      (25-min) pre-fix drift direction. Estimate a naive edge of: "IF drift
      > 0 go long at 15:58, exit at 16:02" and subtract 1.5 pip RT cost.
      If mean daily P&L is not positive over any 2-year rolling window,
      KILL. Expected outcome: marginal — the coordination crackdown
      materially weakened this post-2014.
      (2) Check Ito-Yamada (2013) Table 3 for OOS magnitude estimates. If
      net effect < RT cost, KILL before any backtest.
      (3) Cost hurdle back-of-envelope: if mean absolute pre-fix drift over
      the window is <1.5 pip (the RT cost), structural edge cannot survive.
      Compute this from raw M5 data in ~30 minutes of Python.
    walls-attacked: [W1, W4]
    # W1: turnover is ONE trade per day per pair — not many intraday flips.
    # W4: directly exploits a structural ORDER FLOW mechanism, not price-only.
    # Note: W2 is NOT attacked — EURUSD is still USD-pair dominant. To
    # attack W2 here you would need to trade EUR/GBP, EUR/JPY, CHF/JPY fix
    # flows, which exist but are smaller.
    evidence-grade: THEORY-GROUNDED-UNTESTED
    # DOWNGRADED (was OOS-survivor): the historical fix-drift had OOS support
