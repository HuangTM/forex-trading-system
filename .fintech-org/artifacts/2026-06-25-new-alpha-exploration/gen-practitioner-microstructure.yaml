challenges-steer:
  - "Scheduled Economic Surprise (NFP / CPI Reaction)"
  - "Inter-Dealer FX Swap Basis as Funding Stress Indicator"
  # Both of these challenge the CEO steer that higher-frequency / non-OHLCV
  # signal directions fight Wall W1 head-on. The challenge:
  #
  # [Economic Surprise]: The approach is HIGHER frequency (5-15min hold)
  # but it does NOT require latency competition. The edge is from INFORMATION
  # (surprise direction) not from speed of execution. A systematic strategy
  # can enter 30-60 seconds AFTER the release at a (still wide, but
  # manageable) spread and capture the post-release drift. The W1 constraint
  # for this strategy is "spread widening at release" (3-5 pip one-way),
  # not the ongoing 0.4 pip normal spread. With ~70 events/yr at 15-20 pip
  # average absolute move, the economics are on the right side of the hurdle
  # for the NFP and FOMC subset. This DOES go around W1 if constrained to
  # high-impact events with large absolute moves.
  #
  # [FX Swap Basis]: This is a DAILY signal from the FX swap market. It uses
  # a data class (cross-currency basis) that is definitionally inaccessible
  # to retail OHLCV systems but is NOT a HFT signal. It genuinely goes around
  # W4 via a different market segment (interbank derivatives) and W3 via a
  # regime-agnostic mechanism (funding stress is an all-weather phenomenon).
  # This directly challenges the steer's implicit assumption that "non-OHLCV
  # order-flow data" is synonymous with "HFT / latency competition."

# ============================================================
# HONEST NOTE
# ============================================================
honest-note: |
  WHAT I WOULD ACTUALLY BET ON (practitioner take):

  1. CME COT positioning (Direction 2): This is the most IMMEDIATELY
     executable direction at zero data cost with the best evidence base
     per cost. COT data is FREE, the signal has OOS academic support at
     1-4 week frequency, and turnover is low enough that W1 is not binding.
     The SR is modest (~0.4-0.6 gross) but the CONFIRMABILITY window is
     short (at weekly rebalancing, 52 events/yr/pair, 6 pairs after G5
     pooling → at SR 0.4 and rho 0.30, effective N ~200 events/yr →
     years_to_validate ~ 6yr... still long. Honest: even the "best" direction
     here has a multi-year validation horizon. This is the dataset-wall
     problem in a new guise — any LOW-FREQUENCY signal requires years to
     confirm.)

  2. FX Swap Basis (Direction 6): The most academically grounded TRULY
     different data class. Du-Tepper-Verdelhan (2018 JF) is the strongest
     citation in this slate. The feasibility test is free (BIS data). The
     mechanism is orthogonal to all four walls. My concern: the signal fires
     only during funding stress episodes (2008, 2020, 2023) — the same
     regime-concentration problem may resurface at a DIFFERENT regime axis
     (stress vs. calm) rather than the hiking-cycle axis. Needs honest
     checking.

  3. London Fix (Direction 1): Real mechanism, real academic evidence, but
     SUBSTANTIALLY weakened post-2013 FCA investigations. I would use this
     as a KILL TEST only — a good cheap-feasibility filter to confirm
     whether the fix effect still has economic magnitude in post-2014 data.
     Expectation: it probably KILLS on the feasibility screen.

  WHAT IS FOLKLORE:
  - Retail Sentiment Contrarian (Direction 7): The mechanism is real but
    the academic OOS SR is thin for spot FX specifically. It is practitioner
    lore more than proven edge. IGCS/SSI data quality is variable. Grade
    honestly as "plausible-structural" — do not advance without a proper
    OOS test.
  - Session-Open Volatility Regime Filter (Direction 5): This is an OVERLAY
    on H1, not an independent direction. Included for completeness and
    because it uses $0 new data, but it should not be independently
    pre-registered.

  CAN RETAIL ACCESS MICROSTRUCTURE EDGES?
  The honest answer: most REAL microstructure edges (bid-ask spread dynamics,
  order-book imbalance, dealer positioning, dark pool flows) are INACCESSIBLE
  to retail. L2 order book data for spot FX is available from Reuters or
  Bloomberg but costs $50k+/yr. CME FX futures L2 is cheaper (~$2k-10k/yr
  for CBOT market depth) but is a PROXY for spot. The directions in this
  slate that are ACCESSIBLE to a sub-institutional player are:
  (a) CME COT (free, weekly lag, institutional positioning proxy)
  (b) FX swap basis (free at quarterly lag from BIS; $1.2k/yr for daily)
  (c) Option risk-reversals (free for EUR/JPY via FRBNY; $500/yr for 6 pairs)
  (d) London Fix (free data, just M5 bars from Dukascopy)
  (e) Economic surprises (free actual data, cheap consensus history)
  What is NOT accessible: real-time L2 depth, dealer proprietary flow data,
  interbank fixing agent book data. These would require a prime brokerage
  relationship or a bank access agreement that is out of scope for this firm.

  THE WALL THAT REMAINS BINDING:
  W4 is the most addressable wall in this slate (COT, RR, FX basis all
  provide TRUE non-OHLCV data). W1 is addressed by LOW TURNOVER strategies,
  not by HFT. W2 is NOT well-addressed here — most directions are still
  USD-pair dominated. W3 is partially addressed (COT, FX basis are more
  regime-agnostic than the firm's historical approaches). The honest limit
  is that with a 10-pair retail universe and monthly-to-weekly signal
  frequency, effective breadth remains ~2-4 independent bets regardless
  of the data class. Going from retail OHLCV to COT/RR data improves W4
  materially; W2 requires cross-asset diversification (equities, rates,
  commodities) that is beyond the current firm scope.

