# ============================================================
# STEP 1 — MERGE + DEDUPE: 21 directions -> 8 coherent THEMES
# ============================================================
themes:
  - id: T1
    name: "CME-futures trend + true volume/OI (price-trend on a real-volume venue)"
    merged-from:
      - "academic: time-series-momentum-diversified-universe (CME FX futures)"
      - "contrarian: asset-class-transplant — commodity futures trend (Hurst-Ooi-Pedersen)"
      - "contrarian: multi-asset factor basket (FX+rates+commodity carry/momentum) — partial overlap on the futures-venue + volume axis"
    convergence: >
      THREE of three lenses independently arrived at 'move to an exchange-traded
      futures venue with genuine volume/OI and ~5-10x lower RT cost, and harvest
      the single most-replicated systematic edge (time-series momentum / trend).'
      Academic framed it as TSMOM on CME FX futures; contrarian framed it as
      transplanting the firm's HARNESS onto commodity/rates futures. Same data-class
      move (CME/Globex futures OHLCV+volume+OI, ~$0-500/yr), same edge family
      (trend), differing only on universe (FX-futures vs commodity/rates). This is
      the single strongest convergence in the slate.

  - id: T2
    name: "Positioning / COT (CFTC speculative & commercial flow as order-flow proxy)"
    merged-from:
      - "practitioner: CME FX Futures Volume/OI Momentum (COT Disaggregated)"
      - "contrarian: exploit ~2/3-lose prior via COT non-reportable positioning"
    convergence: >
      Two lenses converged on free CFTC COT weekly positioning as the cheapest
      genuine non-OHLCV order-flow data class. They split on SIGN: practitioner
      reads Leveraged-Fund net change as a TREND/smart-money signal; contrarian
      reads non-reportable as a FADE/dumb-money signal. The contrarian's own
      honest-note flags the load-bearing bridge problem ('non-reportable' is NOT
      a clean retail proxy). Same data, same ~6yr confirmability horizon.

  - id: T3
    name: "Vol-risk-premium / option-skew (implied-vs-realized; risk-reversals)"
    merged-from:
      - "academic: fx-volatility-risk-premium-selling-realized-vs-implied"
      - "academic: carry-timing-via-option-implied-skew (steer challenge)"
      - "practitioner: option risk-reversal as directional positioning tell"
      - "contrarian: FX-VRP harvest (sell realized/implied gap)"
    convergence: >
      FOUR proposals across all three lenses converged on the FX option vol
      surface as the new data class. Two sub-mechanisms: (a) HARVEST the
      variance-risk-premium (sell implied, delta-hedge — non-directional,
      Carr-Wu 2009); (b) USE 25-delta risk-reversal SKEW as a directional /
      carry-crash-timing signal (Jurek 2014, Brunnermeier-Nagel-Pedersen 2009).
      Strong academic OOS support; the binding obstacle is shared — option
      EXECUTION infrastructure the firm lacks (the harvest variant) or paid
      vol-surface data (the skew-signal variant).

  - id: T4
    name: "Broad/EM carry + crash overlay (widen the yield differential, dilute USD)"
    merged-from:
      - "academic: broad-cross-sectional-carry-with-crash-overlay"
      - "contrarian: multi-currency EM carry (steer steelman)"
    convergence: >
      Academic and contrarian converged on 'the carry mechanism is sound; the
      firm's failure was BREADTH and crash-skew, not mechanism — widen to 20+
      currencies incl. EM where differentials are 5-40%.' Both are explicit that
      this is the SAME carry the firm already tested (R5/QRB archive), and both
      honestly concede W3 crash-risk is NOT solved — it is amplified in EM.

  - id: T5
    name: "Cross-asset / commodity & rates transplant (FX demoted to one sleeve)"
    merged-from:
      - "contrarian: multi-asset factor basket (carry+momentum+vol-target across FX/rates/commodities)"
      - "academic: time-series-momentum-diversified-universe (the multi-asset reading)"
    convergence: >
      Overlaps T1 on the futures venue but is distinct in OBJECTIVE: T5's edge is
      cross-asset factor DIVERSIFICATION (the academically-documented fix for W2
      USD-concentration and W3 single-regime blowup), not trend per se. Folded
      under T1's data-class move but ranked as its own strategic option because it
      is the cleanest structural attack on W2.

  - id: T6
    name: "CB-text ML regime classifier (LLM embeddings of FOMC/ECB/BOE/BOJ text)"
    merged-from:
      - "contrarian: CB-text regime classifier (steer challenge — ML on NEW modality)"
    convergence: >
      Single-lens (contrarian) but a clean, well-posed steer challenge: LLM text
      classification is NOT 'ML on the same OHLCV'; it is a categorically different
      input modality aimed squarely at the documented W3 failure. $0 data, near-$0
      inference, and the cheapest highest-information feasibility test in the slate
      (objective auto-labeling, N~120, Wilson CI).

  - id: T7
    name: "CIP / cross-currency swap basis (funding-stress predictor)"
    merged-from:
      - "practitioner: inter-dealer FX swap basis as funding-stress indicator (steer challenge)"
    convergence: >
      Single-lens (practitioner) but the most recent and arguably best-evidenced
      NEW-data-class citation in the entire slate (Du-Tepper-Verdelhan 2018 JF;
      Avdjiev et al. 2019 JF; Rime et al. 2022 JFE). Free feasibility via BIS
      quarterly + FRED reconstruction; daily data ~$1.2k/yr.

  - id: T8
    name: "Calendar / event-microstructure on sub-1h bars (London Fix; macro-surprise reaction)"
    merged-from:
      - "practitioner: 4pm London Fix flow"
      - "practitioner: scheduled economic surprise (NFP/CPI/FOMC reaction)"
      - "practitioner: session-open vol-regime filter on H1 (overlay, not standalone)"
    convergence: >
      Practitioner-only cluster requiring only a RESOLUTION change (Dukascopy M1/M5,
      free) rather than a new data class. London Fix is honestly expected to KILL
      post-2014 reform; macro-surprise reaction is W1-adjacent (spread widens 3-10x
      at release); the H1 vol-overlay is explicitly an overlay, not an independent
      candidate. Cheapest data, weakest/most-fragile edge.

# ============================================================
# STEP 2 — RANKED SHORTLIST (by expected-edge-per-data-acquisition-cost)
# Metric: gross-edge-basis (published OOS SR / structural prior) ÷ data cost,
# weighted by walls-attacked breadth and CONFIRMABILITY horizon (the firm's
# binding lesson from QRB-6: low-frequency signals are un-confirmable in <=3yr).
# ============================================================
ranked-shortlist:

  - rank: 1
    theme: "T1 — CME / exchange-traded futures trend with true volume & OI"
    edge-per-cost: HIGH
    hypothesis: >
      IF 12-month time-series momentum is run on exchange-traded futures (CME FX
      contracts and/or commodity futures CL/GC/ZC) with genuine volume+OI, THEN
      gross SR ~0.4-0.7 OOS (Moskowitz-Ooi-Pedersen 2012; Hurst-Ooi-Pedersen 2017,
      post-2000 sub-period) is achievable at RT cost 5-10x below retail FX spread,
      testable by reading the papers' own post-2000 OOS Sharpe and a public
      exchange-fee cost-hurdle arithmetic — KILL if reported post-2000 OOS SR < 0.3
      or modeled RT cost > 25% of the implied per-rebalance gross edge.
    walls-attacked: "W1 (RT cost 5-10x lower, low-turnover trend), W4 (real exchange volume/OI), W2 (40+ contracts / multi-sector dilutes USD loading), W3 (12-month signal is multi-regime by construction)."
    walls-NOT-solved: "None fully escaped — but W3 is only PARTIALLY addressed: trend still suffers in choppy/whipsaw regimes; long-lookback mitigates, does not eliminate. Capital-scale risk is the real residual: min viable position size at the firm's paper-capital base may be uneconomic (the MOP feasibility check)."
    data-class + cost: "CME/Globex (or commodity) futures OHLCV + volume + OI. ~$0 (Yahoo daily for G10/commodity majors) to ~$250-500/yr (Norgate / Nasdaq-DataLink continuous). LOW absolute cost; FREE for the kill test."
    cheap-feasibility-test: "Read MOP-2012 (FX-futures TSMOM) and Hurst-Ooi-Pedersen-2017 Exhibit 2 post-2000 commodity-trend OOS Sharpe; compute CME/commodity RT cost as % of implied per-rebalance gross edge from public fee schedules. KILL if post-2000 OOS SR < 0.3 OR RT cost > 25% of edge. Desk arithmetic, $0, ~1hr."
    evidence-grade: OOS-ACADEMIC-SURVIVOR
    confirmability-horizon: >
      SHORTEST of the genuine new-data directions. Trend is a DAILY-to-monthly
      signal across 40+ contracts; effective breadth (post-correlation) of ~5-10
      independent bets at SR~0.4-0.5 puts years_to_validate plausibly in the ~2-4yr
      band — the only new-data direction with a real chance of clearing the firm's
      <=3yr confirmability bar. The breadth (not just the frequency) is what shortens
      the horizon vs. single-pair carry.

  - rank: 2
    theme: "T6 — CB-text LLM regime classifier (highest information-per-dollar test)"
    edge-per-cost: HIGH
    hypothesis: >
      IF LLM zero-shot classification of FOMC/ECB/BOE/BOJ statements predicts the
      90-day policy direction (hike/cut/hold) with accuracy whose 95% Wilson lower
      bound clears the 33% 3-class chance rate, THEN that regime label can gate an
      existing carry/trend signal to remove the documented W3 regime-dependence —
      testable by auto-labeling ~120 FOMC statements (2010-2024) on realized
      forward fed-funds direction and measuring zero-shot accuracy. KILL if accuracy
      < 70% or the Wilson lower bound does not clear 33%.
    walls-attacked: "W3 (regime-dependence — the explicit target; an exogenous, leading regime label converts a regime-dependent strategy into a regime-conditioned one), W4 (CB text is a categorically different data class carrying CB intention before price prices it)."
    walls-NOT-solved: "W1, W2 — NOT touched. CRITICAL CAVEAT: this is a CLASSIFIER feasibility test, not an edge test. Even if the classifier clears, whether the regime label IMPROVES a gated carry Sharpe net-of-cost is a SEPARATE downstream step that re-inherits W1/W2/W3-residual AND the same carry confirmability horizon. The cheap test proves the tool works, not that the alpha exists."
    data-class + cost: "Full-text CB statements (all FREE, public). ~$5-50 LLM API for the test, or $0 on a local model. Effectively ZERO."
    cheap-feasibility-test: "Auto-label ~120 FOMC statements (2010-2024) by sign of the 90-day-forward fed-funds change; zero-shot LLM classify hawkish/dovish/neutral; measure accuracy with Wilson 95% CI. KILL if acc < 70% or CI-lower < 33%. Half-day, ~$0, fully non-committed."
    evidence-grade: THEORY-GROUNDED-UNTESTED
    confirmability-horizon: >
      TWO-STAGE and honest about it. STAGE-1 (does the classifier work?) is
      confirmable in HALF A DAY — this is what earns rank 2. STAGE-2 (does the
      regime gate add net-of-cost carry edge?) inherits the SAME multi-year carry
      confirmability horizon the firm already hit. Ranked #2 not because the alpha
      is proven but because the cost-to-decisively-test is the lowest in the slate
      and it attacks the firm's single most-documented failure (W3).

  - rank: 3
    theme: "T7 — CIP / cross-currency swap basis (funding-stress predictor)"
    edge-per-cost: MEDIUM-HIGH
    hypothesis: >
      IF the 3-month EURUSD cross-currency basis (CIP deviation) predicts
      subsequent 1-4 week EURUSD excess return (negative basis -> subsequent USD
      weakening as funding stress unwinds), THEN gross SR ~0.4-0.6 OOS
      (Du-Tepper-Verdelhan 2018 JF; Avdjiev 2019 JF) is achievable at low turnover,
      testable by aligning FREE BIS quarterly basis (or FRED OIS-spread
      reconstruction) to quarterly spot returns. KILL if Spearman rho < 0.15 or the
      directional sign contradicts theory, or DTV-2018 reported net SR < 0.3.
    walls-attacked: "W4 (interbank-derivatives pricing — entirely distinct data class from OHLCV), W3 (funding stress fires across MANY regimes — GFC, COVID, 2023 bank stress — NOT concentrated in the 2022-23 hiking cycle that the firm's prior edges leaned on), W1 (1-4 week hold, low turnover)."
    walls-NOT-solved: "W2 — primarily an EURUSD / USD-funding signal, so USD-factor concentration is NOT escaped (it is partly a USD-funding signal by construction). And the practitioner's own honest-note flags a NEW regime-concentration risk on a DIFFERENT axis: the signal fires only in stress episodes, so it may trade the firm's single-regime problem for a stress-vs-calm one."
    data-class + cost: "Daily 3M cross-currency basis. FREE for the kill test (BIS quarterly + FRED reconstruction); ~$1,200-3,600/yr (Refinitiv) for daily if it survives. MEDIUM cost, $0 to test."
    cheap-feasibility-test: "Download BIS quarterly EURUSD CCS basis (free) and/or reconstruct from FRED (EUR-OIS minus USD-OIS minus 3M FX-forward basis); align to quarterly spot; Spearman rho vs. lagged basis. KILL if rho < 0.15 or sign contradicts theory. ~1hr, $0."
    evidence-grade: OOS-ACADEMIC-SURVIVOR
    confirmability-horizon: >
      MEDIUM-LONG. 1-4 week signal on essentially one funding axis (EURUSD-centric)
      with stress-clustered events = low effective independent-event count -> a
      multi-year (plausibly 4-6yr) confirmability horizon, similar in spirit to the
      COT ~6yr finding. Strong evidence and cheap test earn rank 3; the long
      horizon and W2-non-solution keep it below T1.

  - rank: 4
    theme: "T2 — COT positioning (free order-flow proxy) — RANKED BUT FLAGGED"
    edge-per-cost: MEDIUM
    hypothesis: >
      IF a 4-week change in CFTC Leveraged-Fund net positioning predicts the
      subsequent 4-week spot return at |t|>2 (Klitgaard-Weir 2004; Menkhoff 2021),
      THEN gross SR ~0.4-0.6 survives the 1.4-pip RT cost at weekly-to-monthly
      rebalancing, testable by Spearman-correlating the free COT series to forward
      spot. KILL if cross-validated gross SR < 0.3 or rho < 0.05.
    walls-attacked: "W4 (CME volume/OI is true audited positioning), W3 (positioning is current-state, re-prices automatically across regimes), W2 (6 CME-covered currencies de-concentrate vs. USDJPY-centric carry)."
    walls-NOT-solved: "W1 — not the binding issue but modest edge leaves thin margin over cost. The DECISIVE caveat (raised by BOTH converging generators): the practitioner's OWN honest-note computes years_to_validate ~6yr even at best parameters; the contrarian's honest-note flags that 'non-reportable' is NOT a clean retail proxy, so the fade-mechanism bridge is asserted not established. This is the DATASET-WALL RECURRENCE in a new guise — a low-frequency signal with a ~6yr confirmability horizon, exactly the QRB-6 trap."
    data-class + cost: "CFTC COT Disaggregated CSV — FREE. Cheapest genuine new-data direction. ZERO cost."
    cheap-feasibility-test: "Download COT (free, 2006-2025); 4-week-change Leveraged-Fund signal; Spearman vs. forward 4-week spot for EURUSD; KILL if rho < 0.05 or CV gross SR < 0.3. ~2hr, $0."
    evidence-grade: OOS-ACADEMIC-SURVIVOR
    confirmability-horizon: >
      ~6yr by the generator's own honest estimate (weekly/monthly signal, ~6 pairs,
      modest SR). This is the binding reason it is rank 4 not rank 1 despite ZERO
      data cost: edge-per-DOLLAR is infinite, but edge-per-CONFIRMABILITY-YEAR is
      poor — and the firm's QRB-6 lesson is that an un-confirmable edge is not a
      spendable one. Free data does not buy a short horizon.

# ============================================================
# STEP 3 — THE DIRECTION CALL
# ============================================================
direction-call: >
  PURSUE T1 (CME / exchange-traded FUTURES TREND with true volume) FIRST — and
  run the T6 (CB-text classifier) half-day feasibility test IN PARALLEL because it
  is nearly free and decisively kills-or-clears.

  Reasoning across the five axes (edge × evidence × cheap-data × walls-attacked ×
  confirmability):
   - EDGE: time-series momentum / trend is the single most-replicated systematic
     edge in academic finance (MOP-2012 live-OOS 1985-2012; Hurst-Ooi-Pedersen
     century-of-evidence). Not a thin or contested premium.
   - EVIDENCE: OOS-ACADEMIC-SURVIVOR, strongest in the slate on the trend axis.
   - CHEAP-DATA: ~$0-500/yr; $0 to run the kill test. Among the cheapest.
   - WALLS: the ONLY direction that attacks ALL FOUR walls structurally at once —
     W1 (5-10x cheaper venue), W4 (real volume/OI), W2 (40+ contract breadth),
     W3 (multi-regime long-lookback). Every other direction leaves >=1 wall fully
     standing.
   - CONFIRMABILITY: critically, the BREADTH (40+ contracts, ~5-10 independent
     bets) is what can put years_to_validate in the ~2-4yr band — the only genuine
     new-data direction with a real shot at the firm's <=3yr bar. This is the
     decisive separator from T2/T3/T7, which are all low-frequency, low-breadth,
     ~4-6yr-horizon signals that re-hit the dataset wall.

  THE HONEST REFRAME — FX vs. TRANSPLANT: I make the call EXPLICIT. The contrarian
  lens is RIGHT that the firm's durable asset is the HARNESS (CPCV, deflated
  Sharpe, confirmability rubric, honest-N), not any FX signal — and the firm has
  now PROVEN (CADJPY consensus: net SR < 0 across all 84 pair×family combos) that
  retail FX OHLCV is exhausted as a raw material. T1 is the bridge that honors both
  truths: it keeps the harness, but it points it at a venue (futures) where
  documented edges actually exist AND real volume closes W4. The FX-futures subset
  keeps domain continuity; the commodity/rates subset (T5) is the fuller transplant
  if the FX-futures capital-scale check fails. I am NOT recommending staying in
  retail-FX-on-a-new-data-class as the primary bet — the strongest move is to take
  the harness to a real-volume futures market. That is the firm's highest-expected-
  value, lowest-regret next experiment, and it requires NO data spend to begin (the
  feasibility kill test reads published papers + public fee schedules).

  DELIVERABLE TO BOARD: advance T1 (primary) + T6 (free parallel screen) past the
  feasibility gate for Board authorization of the cheap tests. NO data spend, NO
  pre-registration, NO counted trial this cycle. If both T1 and T6 kill on the free
  screens, the honest outcome is to remain observe-only and report that — the
  shortlist is the input to a future Board decision, not a commitment.

ranked-alternatives:
  - "T3 (vol-risk-premium / option-skew): OOS-ACADEMIC-SURVIVOR, 4-lens convergence, but BLOCKED on execution infrastructure (selling options at retail bid-ask destroys the premium) OR paid vol-surface data. A future-cycle direction once infra is resolved; the risk-reversal-as-signal sub-variant (free FRBNY EUR/JPY data) is a cheaper near-term feasibility screen worth keeping warm."
  - "T4 (broad/EM carry + crash overlay): explicitly the SAME carry the firm already tested (R5/QRB archive), widened. Both generators concede W3 crash-risk is NOT solved (amplified in EM). Adds breadth + a crash trigger to a mechanism the firm has a documented near-miss on; lower novelty, real EM data cost ($2k-30k/yr forwards), and the long carry confirmability horizon. Below the shortlist."
  - "T5 (cross-asset commodity/rates transplant): the cleanest structural W2 attack and the fuller version of the harness-transplant reframe; folded under T1's data-class move. Promote to primary IF the T1 FX-futures capital-scale check fails. Strong but ranked under T1 only because T1 keeps domain continuity and has the more directly-cited FX-futures OOS evidence."
  - "T8 (calendar / event-microstructure on M1/M5): cheapest data (free resolution change) but weakest/most-fragile edge — London Fix expected to KILL post-2014 reform (use as a cheap kill-test only); macro-surprise reaction is W1-adjacent (spread widens 3-10x at release); H1 vol-overlay is an overlay, not a standalone candidate. Lowest priority."

