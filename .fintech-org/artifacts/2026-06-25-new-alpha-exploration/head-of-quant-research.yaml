body: |
  ## Ranking reasoning

  The slate is unusually coherent: 21 raw directions collapse to 8 themes, and the
  three independent lenses CONVERGED on three of them — T1 (move to a real-volume
  futures venue and harvest trend), T2 (free CFTC COT as the cheapest order-flow
  proxy), and T3 (the FX option vol surface). Convergence across deliberately-
  divergent lenses is signal: those three are where the genuinely-different,
  evidence-backed data classes live.

  The ranking metric is edge-per-data-acquisition-cost, but I apply it through the
  firm's HARD-WON CONFIRMABILITY LENS. The QRB-6 wind-down established the binding
  constraint that an edge un-confirmable in <=3yr is not spendable. That single
  weight reorders the naive cost ranking decisively:

   - On raw edge-per-DOLLAR, T2 (COT, $0) and T6 (CB-text, ~$0) would top the list.
   - But T2's OWN generator computes years_to_validate ~6yr — a low-frequency,
     low-breadth signal. That is the DATASET WALL RECURRING in a new guise: the
     data class changed (real positioning data), but the events/yr × per-event-
     Sharpe arithmetic still floors the confirmability horizon at ~6yr, exactly the
     QRB-6 trap. Free data does NOT buy a short horizon. T2 drops to rank 4.
   - T1 is the one genuine new-data direction whose BREADTH (40+ contracts, ~5-10
     independent bets) plausibly compresses years_to_validate into the ~2-4yr band.
     Breadth, not frequency, is what shortens the horizon — and T1 is the only
     direction with both real breadth AND a top-tier OOS edge AND all-four-walls
     attacked. It wins.
   - T6 earns rank 2 on a different basis: the DECISIVE feasibility test costs a
     half-day and ~$0, and it attacks the firm's single most-documented failure
     (W3). I am explicit that this ranks the cost-to-decisively-test, not the
     downstream alpha — stage-2 re-inherits the carry horizon.

  ## The honest dataset-wall-recurrence caveats (per role mandate)

  The firm's prior two-cycle finding was a DATASET WALL, not an idea wall: low-
  frequency signals floor at 3-6yr confirmability because the data caps
  events/yr × per-event-Sharpe. This slate does NOT escape that for most of its
  directions:

   - T2 (COT): ~6yr by its own honest estimate. WALL RECURS.
   - T3 (VRP-harvest): monthly options, low breadth -> multi-year; PLUS an
     execution-infrastructure block (retail option bid-ask eats the premium).
     WALL RECURS + infra block.
   - T7 (CIP basis): stress-clustered, EURUSD-centric, ~4-6yr; AND trades the
     hiking-cycle regime-concentration for a stress-vs-calm one. WALL RECURS on a
     new axis.
   - T4 (broad/EM carry): the SAME carry, long horizon, W3 unsolved (amplified).
     WALL RECURS.
   - ONLY T1 has a credible path UNDER the wall — via cross-sectional BREADTH on a
     real-volume venue. This is precisely why it is the direction call. T6's stage-1
     test sidesteps the wall entirely (it tests a classifier, not an edge) but its
     stage-2 re-enters it.

  Note also: T1, T6, T7 all SOLVE W4 (real volume / new data class) but only T1
  meaningfully attacks W2; T7 explicitly does NOT (USD-funding-centric). Solving W4
  is not sufficient — the firm proved adding breadth to a negative edge (CADJPY)
  helps nothing, and similarly a new data class that leaves W2/confirmability
  standing is a partial win, not a spendable edge.

  ## FX-vs-transplant call (made explicit, per role mandate)

