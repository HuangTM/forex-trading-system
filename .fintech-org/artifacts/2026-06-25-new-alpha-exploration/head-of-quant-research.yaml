assumptions:
  - "The 4 walls (W1 cost-dominance, W2 USD-concentration, W3 regime-dependence, W4 no-true-volume) are an accurate characterization of the firm's falsification corpus per the CADJPY + cost-aware consensus artifacts."
  - "The edge-per-cost ranking is weighted by confirmability-horizon, because the firm's QRB-6 lesson establishes that an un-confirmable-in-<=3yr edge is not a spendable one regardless of data cost. A free-data direction with a 6yr horizon (T2) therefore ranks BELOW a cheap-data direction with a ~2-4yr horizon (T1)."
