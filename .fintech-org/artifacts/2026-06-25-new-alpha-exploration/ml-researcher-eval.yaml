body: |
  ## ML-where-it-helps vs ML-where-it-overfits — the firm's prior, confirmed and sharpened

  The firm's prior is correct and I CONFIRM it rather than challenge it: ML is a method,
  not an edge; ML on the same price/volume features just overfits faster (the deflation
  math is explicit — expected max in-sample Sharpe grows with N even at zero true skill,
  and on memory-bearing series more in-sample optimization makes OOS WORSE). ML earns its
  keep ONLY with a genuinely new signal modality AND proper CPCV+DSR validation. The
  exploration slate contains exactly ONE direction that satisfies the modality test where
  ML (specifically, LLMs) is the right tool: CB-TEXT.

  ## The one legitimate ML angle: CB-text regime classifier — but de-hyped

  Two things are true at once. (a) It is the right tool on the right modality: LLMs map
  prose→labels well; the input is categorically non-OHLCV; data is $0 public. This clears
  the data-class wall that all OHLCV-ML fails. (b) The slate over-claims it. The hypothesis
  says the classifier fires "before market pricing fully adjusts." That is NOT what the
  feasibility test measures. The test labels each statement by the realized fed-funds path
  over the next 90 days and asks "can the LLM read the stance" — a LOOK-AHEAD-LABELED
  readability test, decisively answerable at N=120 with a 3-class Wilson CI (the generator
  already fixed the N=10 error — good). But reading a statement the market read in
  milliseconds gives zero edge ON THE STATEMENT. The real, legitimate value is downstream
  and unproven: the regime LABEL as a slow gating variable on an existing carry/trend
  sleeve, to convert a regime-DEPENDENT strategy (R5 carry, 53-54% of edge from the
  2022-23 hiking regime) into a regime-CONDITIONED one. That downstream test is where the
  overfitting risk lives and where the gates bite.

  ## Gates that prevent the firm's documented failure modes (downstream, future)

  1. CV-no-leak (rubric 1): regime labels span months and autocorrelate. k-fold is
     disqualified; CPCV/walk-forward with PURGE (inter-meeting label span) and an EMBARGO
     sized to the regime autocorrelation (months) is required. A leakage mode UNIQUE to
     text-ML: the LLM's pretraining cutoff post-dates the statements, so the model may
     "know" the realized regime — a strict knowledge-cutoff-vs-statement-date contamination
     check is mandatory and has no analogue in price models.
  2. DSR (rubric 2): under org-wide N=30 plus the effective-N inflation from
     stance-threshold, gating-percentile, and carry-sleeve param choices; computed for the
     conditioned stream's actual T/skew/kurtosis. With only ~8 transitions/yr, the
     confirmability arithmetic (events/yr × per-event-edge → years-to-validate) is the
     same wall QRB-6 died on (power 9%). A <=3yr years-to-validate pre-check is required or
     it is the same un-confirmable trap.
  3. Regime-stratified eval (rubric 4): strata PRE-DECLARED and on an INDEPENDENT axis
     (vol-percentile), never the classifier's own output — else the eval begs the question.
  4. Beat the baseline: run a keyword/dictionary classifier (and a one-month-lagged
     realized-rate-sign state) ALONGSIDE the LLM in the feasibility screen. If the LLM does
     not beat the dictionary by more than its CI, the LLM is complexity without signal —
     use the dictionary. This is the single most important honesty gate, because it
     directly tests whether the "ML" is earning its overfitting surface.

  ## What I cut, and why

  - ML-on-OHLCV (the implicit steer target): hard cut. No new modality → no admissible ML
    direction → "more powerful overfitting on no signal." Confirms the prior.
  - ML-layer on option-skew / COT / retail-sentiment: cut FROM THE ML TRACK. These are
    legitimate NEW-DATA-CLASS FACTOR directions (option vol surface, exchange positioning),
    but they are low-dimensional signals best captured by a linear/threshold rule. An ML
    layer there is negative-EV — it adds overfitting surface to a 1-D signal. They belong
    on the QR/HoQR factor track, not mine. (Ranking them is HoQR's call.)
  - HFT / latency / microstructure-execution: cut. Not viable on retail infra (see
    hft-verdict). The "economic surprise" event-driven bet is low-turnover, not HFT, and is
    THEORY-GROUNDED-UNTESTED post-2015 — a factor/event direction, not an ML or HFT one.

  ## Bottom line for the Board

  APPROVE one ML/text direction onto the shortlist: the CB-text regime classifier, scoped
  as a $0 regime-CONDITIONING research probe with the feasibility framing corrected
  (readability screen, dictionary baseline, look-ahead-label honesty) and the downstream
  CPCV/DSR/confirmability gates pre-specified. It is the highest-information-per-dollar ML
  test available and attacks the firm's most-documented structural failure (W3). Every
  other ML framing, and all HFT, is cut. honest-N stays 30; no counted trial this cycle.

knowledge_gaps:
  - "Whether an LLM beats a simple keyword/dictionary CB-stance classifier by more than CI — the decisive incremental-value question — is unmeasured and is exactly what the corrected feasibility test should resolve at $0."
  - "Downstream tradable edge of regime-conditioning on carry (does the W3 attack survive net-of-cost and clear DSR at ~8 events/yr?) is unknown and is the real risk; deferred to a future pre-registered cycle."
