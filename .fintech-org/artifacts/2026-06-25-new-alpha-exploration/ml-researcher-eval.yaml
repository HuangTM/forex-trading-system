ml-directions-evaluated:

  - name: "CB-Text Regime Classifier (contrarian Direction 5) — LLM embeddings of FOMC/ECB/BOE/BOJ statements"
    ml-helps-or-overfits: >
      ML-WHERE-IT-HELPS — but ONLY in its honestly-scoped form, and the slate's own
      framing of it is partially wrong. LLM text classification of CB communications
      is genuinely the one task class where the tool matches the problem: LLMs are
      strong at mapping unstructured prose to a small label set (hawkish/dovish/hold),
      and weak at price-sequence prediction. The input modality is categorically
      different from OHLCV (the firm's falsified families), so this is NOT "more
      powerful overfitting on the same price data." HOWEVER, two cautions are
      load-bearing: (1) The hypothesis claims the classifier fires "before market
      pricing fully adjusts." That is FALSE as stated for the FEASIBILITY TEST, and
      must not be conflated with it. The feasibility test labels each statement by the
      sign of the fed-funds change over the FOLLOWING 90 days — that is a
      LOOK-AHEAD-LABELED accuracy test of "can an LLM read the document's stance,"
      NOT a tradable leading-indicator test. A classifier scoring 75% on
      already-realized-outcome labels proves text-readability, not predictive edge over
      the market. The market reads the same statement in milliseconds; an LLM reading
      it has zero latency or information advantage on the STATEMENT itself. (2) The real
      (and legitimate) value is downstream and unproven: using the regime LABEL as a
      slow-moving GATING/CONDITIONING variable on an existing carry/trend sleeve to
      attack W3 regime-dependence. That is a separate, future, properly-pre-registered
      test — and it is where the overfitting risk actually lives.
    new-data-required: >
      NEW data class = unstructured central-bank TEXT (FOMC statements/minutes/press
      transcripts, ECB/BOE/BOJ equivalents). All public, $0 acquisition. LLM inference
      ~$5-50 for the feasibility classifier, or $0 on a local model. This is genuinely
      a different modality from the falsified retail-OHLCV families — it clears the
      FOUR-WALLS-STAY-CLOSED data-class gate. Note: ~8 FOMC meetings/yr is a SMALL
      effective sample for the eventual downstream conditioning test (see gates).
    methodology-gates-needed: >
      FEASIBILITY STAGE (this cycle, non-committed): the contrarian generator already
      corrected the worst error — N=120 not N=10, 3-class Wilson CI lower bound above
      the 0.33 chance rate. ACCEPT that as a sound classifier-readability screen. ADD:
      report the confusion matrix (hawkish/dovish are easy; the "hold/uncertain" class
      is where accuracy collapses and where regime-transition value actually lives);
      and reframe the success criterion honestly as "the LLM can read CB stance," NOT
      "the LLM predicts the regime before the market."
      DOWNSTREAM STAGE (future committed pre-registration, where the gates BITE):
      (1) CV-NO-LEAK: the regime label is a multi-month-spanning, serially-correlated
      state variable. Standard k-fold is disqualified. REQUIRE walk-forward or CPCV
      with PURGE (label spans the inter-meeting window) and an EMBARGO sized to the
      regime autocorrelation (months, not 1-5 days — the embargo heuristic must be
      computed from the label horizon, not recalled). Text leakage is a special hazard:
      the LLM's pretraining corpus post-dates the statements, so the model may "know"
      the realized regime — a strict point-in-time / contamination check on the model's
      knowledge cutoff vs. statement date is MANDATORY (this is a leakage mode that
      does not exist for price models).
      (2) DEFLATED-SHARPE under org-wide N=30 (+effective-N inflation from the
      hawkish/dovish/hold threshold choices, gating-percentile choices, and the
      carry-sleeve params it conditions): DSR must clear, computed for the ACTUAL
      T/skew/kurtosis of the conditioned-carry return stream — not a recalled threshold.
      Given only ~8 regime-transition events/yr, the events-per-year × per-event-edge
      arithmetic is the CONFIRMABILITY killer this firm already hit twice (QRB-6
      power=9%; the dataset wall). The downstream test must pass a years-to-validate
      <=3yr pre-check or it is the same un-confirmable trap.
      (3) REGIME-STRATIFIED eval with PRE-DECLARED strata — but note the circularity
      hazard unique to this direction: the thing being evaluated IS a regime classifier,
      so "stratify by regime" must use an INDEPENDENT regime axis (e.g., vol-percentile),
      not the classifier's own output, or the evaluation begs the question.
    expected-value-vs-simpler: >
      HONESTLY MODEST and not yet established. A simpler baseline — a rules-based
      hawkish/dovish dictionary (e.g., a tightening-language word-count, or even just
      the realized policy-rate-change sign as a one-month-lagged state) — captures most
      of the regime signal at near-zero overfitting surface. The LLM's marginal value
      over a keyword/dictionary classifier is an OPEN question the feasibility test
      should measure directly (run the dictionary baseline alongside the LLM; if the LLM
      does not BEAT the dictionary by more than its CI, the ML adds complexity, not
      signal). The defensible claim is: text-as-regime-input may help W3; the LLM
      specifically (vs. a linear/keyword classifier) is unproven incremental value.
    shortlist-verdict: include   # narrowly: as a $0, regime-CONDITIONING research direction with the feasibility framing corrected — NOT as a standalone price predictor

  - name: "Option Risk-Reversal / 25-delta skew as directional/regime signal (academic D6 carry-timing-via-skew; practitioner D3 RR-as-tell; contrarian/academic FX-VRP)"
    ml-helps-or-overfits: >
      NOT AN ML DIRECTION — and that is the correct verdict. These are LINEAR/FACTOR
      signals on a genuinely new data class (option-implied vol surface / risk-reversal).
      No ML is required or advisable: the edge, if real, is a low-dimensional
      conditioning variable (skew percentile → carry sizing) best fit with a simple
      monotone/linear rule. Adding ML here would be the firm's documented failure mode
      (more parameters, faster overfitting) on a signal that a 1-parameter threshold
      captures. I flag it only to make the boundary explicit: the option-data
      directions belong on the shortlist on the QR/HoQR factor track, NOT the ML track.
    new-data-required: >
      FX option implied-vol surface / 25-delta risk reversals. Partial free coverage
      (FRBNY option-implied moments for EUR/JPY; CBOE EUVIX/JYVIX), $500-15k/yr for full
      G10. New modality, clears the data-class wall.
    methodology-gates-needed: >
      If ever modeled, the SAME CPCV+purge+embargo+DSR discipline applies, but the
      dimensionality is low enough that a linear factor test (not ML) is the right tool.
      DSR under org-wide N still required. No ML-specific leakage surface.
    expected-value-vs-simpler: >
      The SIMPLER approach IS the recommended approach. Expected value of an ML layer
      over a linear skew→sizing rule is NEGATIVE (overfitting cost > flexibility benefit)
      at the firm's sample sizes.
    shortlist-verdict: cut   # cut FROM THE ML TRACK specifically; these are legitimate FACTOR directions for HoQR — not my call to rank, but they are not ML-where-it-helps

  - name: "Retail Sentiment / COT positioning contrarian (practitioner D7; contrarian D3) as ML feature"
    ml-helps-or-overfits: >
      WOULD-OVERFIT if dressed as ML. The signal is a single low-dimensional
      positioning z-score; the OOS edge is thin (SR ~0.3-0.5 gross, practitioner-grade,
      not academic). Throwing a classifier/ensemble at a 1-D z-score is exactly
      "more powerful overfitting on weak signal." The data class (COT, broker SSI) is
      legitimately new and W4-attacking, but the modeling layer must stay linear.
      Additional ML-specific hazard for broker SSI: if the firm is itself a retail Saxo
      client, the SSI feed is self-referentially contaminated — an ML model will
      happily fit that contamination.
    new-data-required: >
      CFTC COT (free) or broker SSI (free-ish). New data class vs OHLCV. No ML data
      need beyond it.
    methodology-gates-needed: >
      CPCV+purge+embargo at the 1-4 week label horizon; DSR under N=30; reject any ML
      model class richer than a linear/logistic fit on the positioning z-score.
    expected-value-vs-simpler: >
      Simpler linear z-score rule strictly dominates an ML layer here. ML EV is negative.
    shortlist-verdict: cut   # cut from ML track; COT is a fine factor direction for the QR/HoQR track, not ML

  - name: "Generic 'any ML signal on price/volume features' (the implicit steer target)"
    ml-helps-or-overfits: >
      OVERFITS — confirmed, and this is the firm's hard-won prior, which I CONFIRM
      rather than challenge. The CADJPY consensus established net-of-cost SR < 0 across
      all 84 pair×family combos on retail OHLCV. ML on the SAME OHLCV (+tick-count, which
      is not true volume) does not create signal that is not there; it raises the
      effective trial count and the expected max-in-sample Sharpe (N=128 → >2.6 at
      true-zero skill), making the deflation problem WORSE while OOS gets worse with more
      in-sample optimization on memory-bearing series (Bailey et al.). No data-class
      change → no admissible ML direction.
    new-data-required: >
      NONE proposed — that is precisely the disqualifier. Same data, more model.
    methodology-gates-needed: >
      N/A — fails the FOUR-WALLS data-class gate before CPCV/DSR are even reached.
    expected-value-vs-simpler: >
      Negative. Strictly worse than the linear families already falsified.
    shortlist-verdict: cut   # hard cut — this is the canonical "more powerful overfitting on no new signal"

hft-verdict: >
  NOT-VIABLE-FOR-RETAIL — CONFIRMED with specifics. (1) Latency: competitive FX
  HFT/market-making operates at single-digit microseconds; retail order paths (broker
  aggregator → LP → ECN) are tens-to-hundreds of MILLISECONDS — 3-5 orders of magnitude
  slower. The retail player is, by construction, the last to see and last to act. (2)
  Co-location: the edge requires cross-connects in LD4 (London/Slough), NY4, TY3 —
  $tens-of-thousands/mo plus membership; not a retail capability. (3) True L2 / order
  flow: real spot-FX depth-of-book is interbank (EBS/Reuters Matching) or bank-internal;
  retail "depth" is a broker-curated approximation. Genuine L2 costs $50k+/yr (the
  practitioner slate's own number) and is still a PROXY for spot. (4) Cost: HFT profits
  per trade are sub-pip; at retail spreads (0.4 normal, 3-5 pip at news release) the
  spread alone exceeds the entire edge — this is W1 head-on. The practitioner
  "Scheduled Economic Surprise" direction is the honest near-boundary case and the slate
  is RIGHT that its tradability is gated NOT by latency but by spread-widening-at-release;
  its claimed escape (enter 30-60s after the print, capture residual drift, ~70 low-freq
  events/yr) is an EVENT-DRIVEN low-turnover bet, NOT HFT — and even so it is
  THEORY-GROUNDED-UNTESTED post-2015 because algos compressed the post-release drift. The
  firm's prior ("HFT on retail infra is a latency game retail loses") stands unchallenged
  on the evidence.

