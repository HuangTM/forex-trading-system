  practitioner generator's own COT note concedes ~6yr-to-validate; that honesty must
  survive into the consensus. P6 (CIP basis) is the best of this class and worth a
  cheap test, but it must be advanced with the explicit caveat that a passing cheap
  test does NOT retire the downstream confirmability wall. (3) THE SLATE IS A
  21-WIDE SELECTION SURFACE AND THE WINNER INHERITS A SNOOP BURDEN ON TOP OF
  honest-N=30. The eventual pre-registration of any promoted direction MUST declare
  the size of the generation surface it emerged from and deflate accordingly; and
  every firm-data-touching cheap test must be a single-shot pre-committed kill with
  a stated threshold, run once, never iterated — otherwise the "cheap feasibility
  test" silently becomes the firm's next p-hacking instrument. Finally, I note for
  the record that the firm's already-falsified carry family reappears in this slate
  THREE TIMES wearing new clothes (A1 crash-overlay, A6 skew-timing, C6 EM-carry);
  none of these is a clean NEW mechanism, and the PM's FOUR-WALLS-STAY-CLOSED
  constraint should keep them as cheap kill-tests, not as candidates for advance.

