body: |
  ## folklore vs OOS-survivor cull

  Across 21 directions / ~6-7 distinct mechanisms, the honest grade distribution
  is: 4 genuine-OOS-survivors worth a cheap test (A2/C2 trend-on-futures as one
  theme; C4 cross-asset basket; P6 CIP-basis), a band of OVERSTATED directions
  where the OOS grade attaches to a factor the firm cannot execute or to a
  universe the firm does not have (A1, A4/C1, A5, A6, A7, P3, P4, C5, C6), three
  WALL-RELOCATIONS where genuinely-new data does not change the confirmability
  arithmetic (A3 REER, P2/C3 COT positioning), two FOLKLORE culls (P5 session
  overlay = saturated existing-data family; P7 retail SSI = practitioner lore,
  thin spot-FX OOS), and one OUT-OF-SCOPE business-model pivot (C7).

  Credit where due: the generators were unusually honest. The academic lens
  SELF-DOWNGRADED A3 and A5 to THEORY-GROUNDED-UNTESTED; the practitioner lens
  SELF-DOWNGRADED P1 and filed P7/P5 under folklore/overlay in its own honest-note;
  the contrarian lens wrote the load-bearing CFTC-RFED-vs-COT caveat on C3 and the
  spot-quote-is-not-a-time-series caveat on C6. This is the discipline the
  folklore-cull is supposed to enforce, and much of it was already internalized.
  My job was to (a) hold the line where an OOS grade was attached to a NON-executable
  or NON-firm-universe version of a real factor, and (b) apply the test the
  generators could not apply to themselves: the confirmability-recurrence test.

  ## multiple-testing on the slate

  See multiple-testing-note. The headline: deflating by a naive 21 OVER-corrects
  (heavy cross-lens overlap → ~6-7 real mechanisms); deflating by 1 UNDER-corrects
  (the winner IS the best-of-a-search). The honest posture: declare the generation
  surface size at pre-registration, deflate the promoted direction against the
  distinct-mechanism count it was chosen among, and run every firm-data cheap test
  as a single-shot pre-committed kill. honest-N=30 is intact today because the
  slate is non-counting; the snoop attaches at promotion.

  ## dataset-wall-recurrence

  See dataset-wall-recurrence field. The one structural finding that should drive
  the ranking: the ONLY directions that change the firm's BINDING arithmetic
  (NO-EDGE / confirmability, which needs a data-CLASS change AND enough effective-
  independent breadth) are the FUTURES-BREADTH directions — trend-following on
  40+ FX/commodity futures (A2/C2) and the multi-asset factor basket (C4) — because
  they raise effective N via genuinely uncorrelated instruments, which is the lever
  the firm's own CADJPY consensus named. Every low-frequency single-/few-instrument
  "new data" play (COT, skew, CIP, REER, carry) escapes W4 but RELOCATES W3 to a new
  axis; the QRB-6 confirmability wall recurs. P6 (CIP basis) is the best of that
  class and earns a cheap test, but it must carry the eyes-open caveat.

  ## survivors worth a cheap test

  GREEN-LIGHT FOR CHEAP FEASIBILITY (all $0-$500 to kill, all published-evidence +
  cost-hurdle, no committed backtest):
   1. A2/C2 trend-following on FUTURES (ONE theme, two instruments) — strongest
      evidence, cheapest data, escapes the binding wall via breadth.
   2. C4 multi-asset factor basket — the breadth/regime wrapper; free feasibility data.
   3. P6 CIP / FX-swap-basis — best-evidenced genuinely-new data class; $0 BIS/FRED
      kill-test; advance WITH the confirmability caveat.
   4. (OPTIONAL kill-test) A5 dollar-factor Spearman-overlap check — $0 disqualifier.

  CULL / DO-NOT-ADVANCE (keep at most as cheap kill-filters): A1, A6, C6 (shelved
  carry family in new clothes); A3 (REER, confirmability wall); A4/C1 (VRP, infra-
  blocked); A7 (G10 BAB, unsupported subset); P1 (post-reform fix, expect KILL);
  P2/C3 (COT, wall-relocation); P3 (RR, overlaps A6, wall-relocation); P4 (macro-
  surprise, W1 head-on); P5 (saturated overlay); P7 (folklore). C7 routed to
  strategy (not an alpha direction).

