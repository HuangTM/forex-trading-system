multiple-testing-note: >
  THE SLATE ITSELF IS A SELECTION SURFACE — this is the dominant statistical
  hazard of this cycle, larger than any single direction's grade. (1) 21
  directions were generated; whichever 2-4 the firm advances is "the best-looking
  of 21," which carries a multiple-comparison burden ON TOP OF the ratified
  honest-N=30 deflation denominator (trials.jsonl: 57 lines, 27 carry
  counts_toward_deflation_denominator:false → honest-N=30 confirmed intact). The
  21 exploration directions are correctly NON-COUNTING this cycle
  (descriptive-exploration-screen), so they do NOT increment honest-N TODAY — but
  the MOMENT any one is pre-registered as a committed trial, its deflation must
  account for the fact that it was SELECTED as the survivor of a 21-wide search,
  not drawn fresh. Concretely: the eventual Deflated-Sharpe N for a promoted
  direction must be max(honest-N + new trials, an N that reflects the 21-direction
  shortlist snoop), and the pre-registration must DECLARE the size of the
  generation surface it emerged from. (2) The effective number of INDEPENDENT
  directions is far below 21 — there is heavy cross-lens mechanism overlap:
  trend-following appears as A2 + C2 (FX futures vs commodity futures); VRP/options
  as A4 + C1 (duplicate) and is adjacent to A6 + P3 (option skew/RR); carry as
  A1 + A6 + C6 (+ the carry sleeve of C4); COT/retail positioning as P2 + P7 + C3.
  Deflating by 21 OVER-corrects; the honest count is ~6-7 distinct MECHANISMS
  (trend, carry, VRP/skew, positioning, CIP-basis, macro-surprise, cross-asset-
  wrapper, CB-text), and the firm should deflate the SHORTLIST against the count of
  distinct mechanisms it actually chose among, not the raw 21 nor a naive 1.
  (3) Picking the best of 21 by edge-per-cost is itself a snoop unless the gross-edge
  basis is taken from PUBLISHED OOS literature (as the PM metric specifies) and NOT
  from any firm-data peek — every cheap-feasibility-test that touches firm data
  (e.g. A7 G10 vol-spread, P2/C3 COT correlation, P1 fix drift) is a free parameter
  that, if iterated, becomes p-hacking. Cheap tests must be PRE-COMMITTED single-shot
  kills with a stated threshold, run ONCE, not tuned.

dataset-wall-recurrence: >
  The firm's binding constraint (verified, 2026-06-25 CADJPY CONSENSUS) is the
  NO-EDGE wall, which requires a DATA-CLASS change, and behind it the
  CONFIRMABILITY wall (W3): events/yr x per-event-Sharpe must validate in <=3yr
  (QRB-6 wound down because power was 9% at the 2030 look; 80% needed 28-256yr).
  The decisive test for THIS slate is not "does the direction use new data" but
  "does the new data CLASS change the confirmability arithmetic, or just relocate
  the wall to a new axis." My findings:

  TRULY ESCAPES (changes the arithmetic):
   - A2 TSMOM on CME FX futures AND C2 commodity-futures trend: trend-following is
     daily/weekly but applied across 40+ futures contracts / multiple commodity
     sectors → effective independent breadth rises by an order of magnitude vs the
     10-pair ~2-bet FX universe. More independent bets = shorter confirmability
     window. This is the ONE lever (breadth via genuinely uncorrelated instruments)
     that the CADJPY consensus itself identified as the binding-constraint lift.
     ESCAPES.
   - C4 multi-asset factor basket: same logic — adding NON-FX, low-cross-correlation
     sleeves (rates, commodities) raises effective N. Escapes W2 AND shortens
     confirmability. ESCAPES (it is the portfolio wrapper around the trend/carry
     themes that survive).

  RELOCATES THE WALL (new data class, SAME confirmability problem):
   - P2 COT positioning / C3 retail-COT contrarian: changes data class (escapes W4)
     but is a LOW-FREQUENCY (1-4 week) signal across ~6 pairs — the generator's own
     arithmetic lands at ~6yr to validate. W3 recurs on a new data class. RELOCATES.
   - A3 REER value (3-5yr half-life), A6/P3 option-skew (2-4 week, few pairs),
     P6 CIP-basis (1-4 week, EURUSD-centric): all are LOW-FREQUENCY factors on a
     narrow instrument set → all carry a real multi-year confirmability tail. P6 has
     the BEST evidence and a genuinely new regime axis, so it is worth a cheap test,
     but the firm must go in EYES-OPEN that low-frequency + narrow-breadth = the
     confirmability wall WILL recur downstream even if the cheap test passes.
   - A1/C6 carry (incl. EM): the firm's already-shelved factor; EM widens yield but
     also widens crash tail and stays regime-dependent (W3). RELOCATES to a
     bigger-yield-bigger-tail version of the same wall.

  STILL HITS A WALL HEAD-ON (no escape):
   - P4 macro-surprise: spread-widening AT release IS W1 in the face; the OOS
     evidence is for the economic repricing, not a net-positive retail strategy.
   - P5 session-open overlay: existing data, existing falsified family — inside the
     NO-EDGE wall by construction.
   - A4/C1 VRP, A4-execution: blocked on option-execution infrastructure, not data.

