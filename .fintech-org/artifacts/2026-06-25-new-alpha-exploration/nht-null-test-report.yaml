dissent-statement: >
  DISSENT (append-only, verbatim for CONSENSUS.md). I record three structural
  objections that must not be paraphrased away in ranking. (1) TREND-FOLLOWING ON
  FUTURES IS THE ONLY THEME THAT ESCAPES THE BINDING WALL ON ITS MERITS, AND IT IS
  TRIPLE-COUNTED. A2 (FX futures TSMOM), C2 (commodity-futures trend) and the
  trend/momentum sleeves of C4 are the SAME factor; the slate's apparent breadth
  here is an artifact of three lenses hitting one mechanism. The firm should
  advance ONE trend-on-futures program, not three, and must NOT let cross-lens
  agreement masquerade as independent confirmation. (2) EVERY LOW-FREQUENCY
  "NEW-DATA" DIRECTION RELOCATES THE CONFIRMABILITY WALL RATHER THAN ESCAPING IT.
