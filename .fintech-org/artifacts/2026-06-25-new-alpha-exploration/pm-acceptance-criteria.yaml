  - >
    NHT-CULL-DOCUMENTED: NHT has issued a structured folklore-cull report over
    the full slate. Each culled direction has a verbatim rationale. The cull
    output identifies the evidence grade for every direction, not just the
    culled ones. Surviving directions carry one of [OOS-ACADEMIC-SURVIVOR,
    OOS-PRACTITIONER-SURVIVOR, THEORY-GROUNDED-UNTESTED].

  - >
    STRUCTURED-DIRECTIONS-AUTHORED: for every direction that survived the NHT
    cull, QR has produced a structured record containing all four required fields
    (data-class, cheap-feasibility-test, wall-attacked, evidence-grade) plus a
    one-line falsifiable hypothesis in the form "IF [data / frequency / mechanism]
    THEN gross-edge > RT-cost by [estimated margin], testable by [cheap test]."
    Incomplete records are a blocking finding.

  - >
    ML-HFT-EVALUATED: ML-Researcher has produced a structured evaluation of
    the ML/HFT-signal directions in the slate, including: the CPCV/Deflated-
