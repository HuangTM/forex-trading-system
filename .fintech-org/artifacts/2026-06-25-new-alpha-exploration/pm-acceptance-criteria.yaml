body: |
  ## Coordination notes

  ### The generate-then-screen structure (hard sequencing)

  Phase 1 — GENERATION (parallel, no inter-lens coordination):
    Academic-factor lens, practitioner-microstructure lens, and
    contrarian-outsider lens each produce their >=4 proposed directions
    independently. PM collects and confirms divergence across lenses
    before passing to Phase 2. Anti-convergence check: if >=2 lenses
    propose the same primary mechanism, PM flags and requests a replacement
    direction from the converging lens before proceeding.

  Phase 2 — NHT FOLKLORE-CULL (sequential, blocks Phase 3):
    NHT evaluates the full slate. FOLKLORE-UNVERIFIED directions with no
    structural prior are culled. NHT issues structured cull report with
    verbatim rationale per culled direction and evidence grade for all
    surviving directions. This step BLOCKS Phase 3; no structuring begins
    until the cull report is complete and the PM has confirmed it is
    append-only and verbatim.

  Phase 3 — STRUCTURING + ML EVALUATION (parallel):
    QR structures each surviving direction into the four-field record plus
    one-line falsifiable hypothesis.
    ML-Researcher evaluates ML/HFT directions specifically.
    These two tasks may run in parallel.

  Phase 4 — HOQR RANKING:
    HoQR deduplicates, merges overlapping directions, and issues the ranked
    shortlist (2-3 directions) by edge-per-data-acquisition-cost.

  Phase 5 — CRO + PR (parallel):
    CRO receives structured fields and issues data-cost risk position.
    PR issues single-wave review verdict.
    These two tasks may run in parallel (CRO gets structured fields only;
    no PR output crosses the CRO firewall).

  Phase 6 — CONSENSUS (PM):
    PM synthesizes CONSENSUS.md capturing all outputs. NHT dissent
    verbatim-preserved. Append-only artifact.

  ### The edge-per-data-cost ranking metric

  The ranking metric for the final shortlist is:

    EDGE_PER_COST_RATIO = (estimated_gross_edge_basis) / (data_acquisition_cost_USD_yr)

  Where:
    - estimated_gross_edge_basis is derived from published OOS Sharpe ratios
      (for OOS-ACADEMIC-SURVIVOR directions) or a structural prior with stated
      confidence interval (for THEORY-GROUNDED-UNTESTED directions). It is NOT
      a figure derived from a backtest on existing firm data this cycle.
    - data_acquisition_cost_USD_yr is the rough annual cost of the required
      data class, or "0" for directions that use existing firm data. CRO
      provides this estimate for shortlisted directions.
    - Directions requiring zero new data but attacking only already-saturated
      mechanisms are disqualified (wall-attacked field must be non-trivially
      addressed).

  HoQR applies this metric qualitatively (HIGH / MEDIUM / LOW with rationale)
  rather than a single numeric rank, because the gross-edge estimates carry
  wide uncertainty bands. The ranking is explicit reasoning, not a formula
  output.

  ### CRO firewall (enforced by PM)

  The CRO task statement contains ONLY:
    - instrument-universe: [] (exploration — universe is an output)
    - hard-constraints: [verbatim from this document]
    - no-live-capital: true
    - honest-N: 30
    - no-counted-trial-this-cycle: true
    - per-direction-data-cost-field: [structured list of shortlisted
      directions with data-class-required label ONLY — no alpha rationale,
      no edge-mechanism description]

  Any rationale, framing, alpha-source description, or mechanism explanation
  crossing the firewall is a PM policy violation. The CRO synthesizes
  data-acquisition-cost risk from the structured fields alone; the CRO does
  NOT evaluate strategy merit.

  ### The divergence requirement in practice

  Each lens is explicitly asked to operate under a different epistemic frame:
    - Academic-factor lens: what does peer-reviewed OOS literature say exists?
    - Practitioner-microstructure lens: what do practitioners with actual P&L
      history say works, and what data does it require?
    - Contrarian-outsider lens: what would you build if you had never read a
      quant finance paper and were reasoning from first principles about FX
      market structure?

  The value of this structure is that divergence is built into the lenses'
  epistemologies, not curated post-hoc. The PM's role is to confirm divergence
  was preserved, not to generate it.

  ### What "goes around the walls" means operationally

  The 4 walls are:
    W1 - COST-DOMINANCE-ON-TURNOVER: high-turnover price-only strategies on
         retail FX are eaten by spread + slippage. "Going around" means either
         (a) dramatically lower turnover (carry, factor-harvest style) or (b)
         a structural edge source that scales with event volatility, not trade
         count.
    W2 - USD-FACTOR-CONCENTRATION: 10-pair retail FX universe is highly loaded
         on the USD factor; vol-target carry concentrated on USDJPY. "Going
         around" means either cross-asset breadth or a systematic de-correlation
         mechanism (e.g., multi-asset factor basket including non-FX).
    W3 - REGIME-DEPENDENCE: best performing strategies (carry, QRB-6 CB-drift)
         derive 50%+ of gross edge from a single macro regime (FOMC 2022-23
         hiking cycle). "Going around" means either a mechanism that is
         regime-agnostic by construction or explicit regime conditioning that
         shortens the confirmability window.
    W4 - NO-TRUE-VOLUME-OR-ORDER-FLOW: retail OHLCV has zero volume signal;
         microstructure-based strategies are unresearched. "Going around" means
         acquiring a data class that actually carries volume or order-flow
         information (CME FX futures, L2 depth, bank positioning surveys).

  A direction "goes around" a wall if its data-class or mechanism makes that
  wall structurally non-binding, not merely less severe.

  ### Why this is a non-counting exploration (not a pre-registration cycle)

  The 2026-06-25 CADJPY consensus found the binding constraint is the NO-EDGE
  wall — net-of-cost SR < 0 across all 84 pair×family combos on existing data.
  The purpose of this cycle is to map the directions that COULD produce a
  positive-SR candidate on new data or new mechanisms, so the Board can make
  an informed data-acquisition decision. No CPCV backtest runs. No pre-
  registration is authored. The shortlist is the deliverable; it is the input
  to a future Board authorization, not a commitment of firm resources.

  ### Observe-only posture preservation

  The firm is in observe-only / maintenance posture (2026-06-25 CADJPY
  consensus, Option 2). This cycle constitutes the structured exploration
  authorized to assess whether Option 1 (data-capability acquisition) is
  justified. If the shortlist produces no direction with a plausible positive
  edge-per-data-cost ratio, the honest outcome is to remain on observe-only
  and report that to the Board. The PM will capture this outcome in the
  CONSENSUS artifact exactly as presented by HoQR; it is not softened.

