  - >
    HOQR-RANKED-SHORTLIST: HoQR has issued a ranked shortlist of 2-3 surviving
    directions, ordered by expected-edge-per-data-acquisition-cost, with
    explicit per-direction reasoning. The ranking must state: (a) estimated
    gross-edge basis (academic OOS SR or structural prior), (b) estimated data
    acquisition cost in USD/yr or "zero" for existing data, (c) the resulting
    edge-per-cost ratio (qualitative: HIGH/MEDIUM/LOW with rationale). Directions
    not making the shortlist have an explicit kill rationale.

  - >
    CRO-STRUCTURED-FIELDS-COMPLETE: CRO artifact contains all required
    structured fields — per-shortlisted-direction data-acquisition-cost-risk
    (max plausible annual cost, vendor concentration, disjoint-coverage note),
    no-live-capital, honest-N=30, no-counted-trial-this-cycle. No rationale
    embedded in CRO task statement; firewall confirmed by PM at dispatch.

  - >
    PR-REVIEWED: Principal Reviewer issues a single-wave review verdict.
    PR checks: (a) each shortlisted direction's feasibility-test is genuinely
    executable and specific (not "run a backtest" — that's a committed trial),
    (b) evidence-grades are consistent with cited sources, (c) the ranking
    methodology is applied consistently, (d) the NHT cull was not overridden
    without documented reasoning. Blocking finding count documented.

  - >
    TRIAL-COUNTER-UNCHANGED: trials.jsonl confirmed honest-N=30 after this
    cycle. PM verifies. No direction in the shortlist is a committed
    pre-registration; pre-registration is explicitly deferred to a future cycle.

  - >
    CONSENSUS-AUTHORED: PM synthesizes a CONSENSUS artifact in
    .fintech-org/artifacts/2026-06-25-new-alpha-exploration/CONSENSUS.md
    capturing: the full slate with evidence grades, NHT cull rationale (verbatim),
    the ranked shortlist with deciding edge-per-cost reasoning, PR verdict,
    CRO data-cost position, and honest-N confirmation. NHT dissent is
    append-only and verbatim-preserved. Consensus is append-only.

