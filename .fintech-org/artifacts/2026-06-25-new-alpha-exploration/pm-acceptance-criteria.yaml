hard-constraints:
  - >
    NO-DATA-SPEND-NO-COMMITTED-BACKTEST: zero data acquisition spend this
    cycle. No committed pre-registered backtest. Trial counter (honest_N=30)
    MUST NOT increment. Any trials.jsonl entry appended must carry
    counts_toward_deflation_denominator: false and event:
    descriptive-exploration-screen. Pre-registration happens only in a FUTURE
    cycle IF a direction clears the feasibility gate and the Board authorizes
    the advance.

  - >
    NO-LIVE-CAPITAL: no live capital or paper-trading deployment of any kind.
    Research output only.

  - >
    EACH-DIRECTION-MUST-SPECIFY-FOUR-FIELDS — machine-checkable completeness
    gate. Every surviving direction in the shortlist must explicitly state:
    (a) DATA-CLASS-REQUIRED: the specific new data class it genuinely requires
        (or "uses existing 1h/daily OHLCV+spread" if no new data needed);
    (b) CHEAP-FEASIBILITY-TEST: a concrete, executable, single-step test that
        can kill the direction before any data spend (e.g., "estimate gross
        edge from published academic OOS SR on the same factor; if <0.3 reject"
        or "compute cost hurdle for required frequency; if RT cost > estimated
        gross edge reject");
    (c) WALL-ATTACKED: which of the 4 confirmed structural walls this direction
        explicitly targets (cost-dominance-on-turnover / USD-factor-
        concentration / regime-dependence / no-true-volume-or-order-flow);
    (d) EVIDENCE-GRADE: one of [OOS-ACADEMIC-SURVIVOR, OOS-PRACTITIONER-
        SURVIVOR, THEORY-GROUNDED-UNTESTED, FOLKLORE-UNVERIFIED].
    Directions missing any of the four fields are incomplete deliverables.

  - >
    DIVERGENCE-REQUIREMENT: the generation wave must be genuinely divergent.
    Each generator operates under a distinct epistemic lens (academic-factor /
    practitioner-microstructure / contrarian-outsider) and must propose >=4
    distinct directions. A direction is distinct if its primary edge-mechanism
    differs from all other proposals in that lens; variants of the same
    mechanism under one lens count as one. The PM will reject a generation
    wave where >=2 lenses produce the same primary direction.

  - >
    ANTI-CONVERGENCE-ON-STEER: the CEO steer (avoid faster/HFT/ML-on-same-data
    as primary candidates) is a PRIOR to TEST, not a conclusion to pre-converge
    on. Each generator must include at least 1 direction that directly
    challenges the steer (e.g., argues that a specific HFT/ML approach DOES go
    around a wall) with explicit reasoning. NHT will evaluate whether the
    challenge survives.

  - >
    NHT-FOLKLORE-CULL-MANDATORY: NHT evaluates the full slate (all lenses,
    all generated directions) against the folklore-vs-OOS-evidence test BEFORE
    the ranking step. Directions graded FOLKLORE-UNVERIFIED with no compensating
    structural prior are culled at this step. NHT's cull rationale is
    append-only, verbatim, and may NOT be paraphrased in the consensus artifact.

  - >
    CRO-FIREWALL: the CRO task statement contains ONLY structured fields:
    instrument-universe (empty this cycle — exploration output determines it),
    hard-constraints (verbatim from this document), no-live-capital flag,
    honest-N=30, no-counted-trial-this-cycle, and the per-shortlisted-direction
    data-acquisition-cost estimate field. No strategy rationale, no framing,
    no alpha-source description crosses the firewall. The CRO synthesizes risk
    from structured fields alone.

  - >
    RANK-BY-EDGE-PER-DATA-COST: the final shortlist must be ranked by
    expected-edge-per-unit-of-data-acquisition-cost. Directions requiring zero
    new data get an explicit cost=0 label (not "low cost"). Directions requiring
    paid data feeds must include a rough annual acquisition cost estimate in USD
    before ranking. HoQR issues the ranking call with explicit reasoning; the
    ranking is not delegated to generators.

  - >
    FOUR-WALLS-STAY-CLOSED: the 4 confirmed falsified families
    (cost-dominant-turnover / USD-factor-concentrated / regime-dependent /
    no-volume-on-retail-OHLCV) are NOT re-opened as-is. A direction may attack
    one of these walls structurally (e.g., acquiring volume data to address wall
    4) but may NOT re-propose the same edge-mechanism on the same data as a new
    candidate. Machine-checkable: each direction's data-class field must differ
    from "retail 1h/daily OHLCV+spread on 10 pairs, no volume" unless its
    mechanism is categorically different from F1-F6 + R5 + QRB-6.

criteria:
  - >
    GENERATION-WAVE-COMPLETE: all 3 lenses have produced >=4 distinct proposed
    directions each (minimum 12 total proposals across the full slate). Each
    proposal includes a one-sentence primary edge-mechanism. The PM confirms
    the slate is divergent (no >=2 lenses producing the same primary mechanism)
