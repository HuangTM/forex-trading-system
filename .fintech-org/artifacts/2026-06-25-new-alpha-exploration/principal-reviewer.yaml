body: |
  INDEPENDENT SOUNDNESS REVIEW — exploration shortlist (C1/C2/C3 + CB-text)

  VERDICT: approve-with-conditions. This is a methodologically DISCIPLINED
  non-spend exploration. The single most important thing a reviewer can say
  about it is what it did NOT do: it did not over-claim wall-escape (the
  confirmability-honesty is genuinely adequate, the failure mode I expected),
  it did not smuggle a mini-backtest into any "cheap test" (all four are
  arithmetic-on-published-numbers or a single-statistic-on-free-data), and it
  did not increment honest-N. None of my findings blocks the SHORTLIST. Two are
  blocking-for-FUTURE-pre-registration (F-001 C3 Spearman power; F-008
  selection-surface into effective-N). The rest tighten kill-numbers.

  1. ARE THE CHEAP TESTS DECISIVE AND CHEAP? (and not disguised backtests)
  None of the four is a disguised backtest — this is the cleanest property of
  the slate, and it directly satisfies the PM's PR-(a) gate and the assumption
  that "cheap test != mini-backtest." C1 and C2 are desk arithmetic on published
  Sharpes + public fee schedules. C3 and CB-text compute ONE statistic each (a
  Spearman rho; a 3-class accuracy with Wilson CI) on free data — a property of
  series/documents, not a portfolio return. Good.

  But "cheap" is not the same as "DECISIVE," and three of the four have a
  false-pass channel that the crisp kill-numbers mask:
    - C3 (F-001, MAJOR): a |rho| < 0.15 gate on ~16yr of overlapping quarterly
      data with no CI and no effective-N adjustment is the sharpest gap. The
      direction's OWN confirmability section says the edge lives in ~3
      independent stress episodes — which is exactly why a point-estimate rho is
      unreliable (it can be false-killed by sampling noise or false-passed by a
      few stress quarters driving the ranks). The fix is to gate on rho WITH a CI
      / permutation p-value at the honest effective-N, not on the point estimate.
    - C1 (F-002, MAJOR): substituting the raw published ~0.4 Sharpe with no
      decay/OOS haircut, and a residual gate sensitive to a desk-chosen turnover,
      can pass a direction whose live net edge is below the gate.
    - C2 (F-003/F-004, MINOR): the cost hurdle omits roll/curve cost the artifact
      itself says must not be omitted, and the central diversification premise has
      its only kill at the costed stage when a $0 correlation proxy exists now.
  The CB-text feasibility test is the soundest of the four BECAUSE the
  ml-researcher already corrected the generator's tradable-edge over-claim down
  to a readability screen and put the dictionary baseline alongside it — the one
  control that disentangles "LLM recalls the answer" from "LLM reads the prose"
  (reinforced by F-007: the screen is double-contaminated, look-ahead label +
  pretraining recall, so the baseline is load-bearing).

  2. MULTIPLE-TESTING / SELECTION-SURFACE DISCIPLINE
  Handled for this cycle (selection-surface-handled: yes). Single-shot,
  pre-committed, non-counting; generation surface and append-only cull declared.
  No candidate's cheap test is structured to become a p-hacking tool THIS cycle
  (each runs once, kill-or-pass). The forward hazard (F-008) is the one to carry
  into governance: the committed pre-registration that advances any survivor must
  book the 21-direction generation surface + cheap-tests-run into effective-N,
  not +1 — owned by NHT. This is the firm's previously-corrected under-deflation
  failure, and it will recur silently if effective-N is reset to +1 at advance.

  3. CONFIRMABILITY-HORIZON HONESTY
  Adequate, no over-claim flagged. Each candidate states whether its data CLASS
  escapes or merely RELOCATES the wall, in the right direction: C3 honestly
  self-identifies as the worst (recurs QRB-6 hard) yet is carried for orthogonality
  + free test — a defensible, transparent trade; C2 is the only credible
  path-THROUGH and correctly conditions it on an untested correlation; C1 is
  "mixed, not a clean escape." The asymmetry I do flag (F-005, MINOR) is that
  only CB-text carries an explicit machine-checkable <=3yr years-to-validate
  pre-check; C1/C3 leave it as a soft/prose flag. Given QRB-6 died at power=9%,
  the same explicit pre-check belongs on C1/C3.

  4. ML METHODOLOGY GATES (text direction)
  Strong. The ml-researcher applies financial-ml-methodology correctly: k-fold
  disqualified on serially-correlated regime labels; CPCV/walk-forward + PURGE
  (inter-meeting label span) + EMBARGO sized to regime autocorrelation in MONTHS
  (correctly refusing the 1-5d daily heuristic); DSR under org-wide N=30 + the
  effective-N inflation from stance-threshold / gating-percentile / carry-param
  choices, computed for the conditioned stream's actual T/skew/kurtosis (not a
  recalled threshold); regime-stratified eval on an INDEPENDENT axis to avoid the
  classifier-evaluating-itself circularity; and the dictionary/keyword baseline
  elevated as the single most important honesty gate. The text-specific leakage
  gate (pretraining-cutoff vs statement-date) is present and is the correct
  rubric-1-for-text application. The only refinement (F-007, observation) is that
  the feasibility screen itself is double-contaminated, which strengthens — not
  weakens — the ml-researcher's own conclusion. No rubric gap rises to blocking.

  5. SEVERITY / BLOCKING POSTURE
  No finding blocks the SHORTLIST (correct per the brief — this is guidance, not
  a spend). Blocking-for-future-pre-registration: F-001 (C3 Spearman must gate on
  significance at effective-N, not a point estimate) and F-008 (effective-N must
  absorb the selection surface at advance). Everything else tightens kill-numbers
  or normalizes the four-field completeness tagging (F-006). Approve-with-
  conditions: adopt F-001 and F-008 as binding pre-conditions on any future
  pre-registration; treat F-002/F-003/F-004/F-005 as kill-number hardening before
  advance.

