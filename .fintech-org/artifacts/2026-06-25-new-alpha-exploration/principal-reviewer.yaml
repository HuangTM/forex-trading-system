feasibility-test-soundness:
  - direction: C1 cme-fx-futures-time-series-momentum
    kill-number-well-defined: yes
    false-pos-or-neg-risk: >
      FALSE-PASS risk on Step A. The kill arithmetic substitutes the PUBLISHED
      gross MOP-2012 FX-futures-sleeve Sharpe (~0.4) as the edge numerator, then
      subtracts a modeled CME cost drag. Two un-stated hazards make a PASS weak
      evidence of a live edge: (1) the published ~0.4 is itself the survivor of
      an enormous cross-study selection surface and is subject to McLean-Pontiff
      post-publication decay (~35-58%) — the test does not discount for decay or
      for the gap between the 1985-2012 sample and a 2012-2026 OOS window;
      (2) the "implied annual turnover at the 12-month signal" is an input the
      desk supplies, and the residual-Sharpe gate (>=0.20) is sensitive to it —
      a generous turnover assumption passes a direction that a realistic one
      kills. FALSE-KILL risk is low and acceptable (kill condition 2, capital-
      infeasibility, is a genuine hard constraint, correctly first-classed).
    disguised-backtest: no
  - direction: C2 multi-asset-factor-basket-and-commodity-trend-transplant
    kill-number-well-defined: partial
    false-pos-or-neg-risk: >
      FALSE-PASS risk concentrated in the gap between the two cheap checks and
      the load-bearing claim. Checks 1-2 (published combined OOS Sharpe >= 0.4;
      futures cost hurdle <= 25%) are decidable on published numbers. But the
      whole W2/W3 attack rests on LOW realized cross-sleeve correlation OOS,
      and that is the ONE quantity the cheap test cannot touch — it is deferred
      to kill-criterion (3) at committed-backtest time (corr > 0.6 => kill).
      So the cheap test can PASS a direction whose entire thesis (diversification)
      is unverified, and an in-sample corr threshold checked at backtest is itself
      a snoop surface. The honest caveat is stated in walls-NOT-solved, but the
      kill-NUMBER for the central risk lives only at the (future, costed) backtest
      stage, not at the cheap gate — so "cheap test passes" must not be read as
      "thesis survives." Also: roll cost is correctly flagged as not-to-be-omitted,
      but the cheap check (Treasuries ~1bp, commodities "a few bp") does not bound
      roll/curve cost, which on commodity continuous contracts can dominate the
      bid-ask term.
    disguised-backtest: no
  - direction: C3 fx-swap-basis-cip-deviation-directional-predictor
    kill-number-well-defined: yes
    false-pos-or-neg-risk: >
      FALSE-PASS AND FALSE-KILL both material, and under-acknowledged on the
      statistical-power side. The cheap test is a single Spearman rank-correlation
      on BIS QUARTERLY basis vs subsequent QUARTERLY spot return with kill at
      |rho| < 0.15. Post-2008 quarterly BIS data is ~16yr => ~64 quarterly
      observations, and these overlap/autocorrelate heavily (funding-stress is
      persistent), so the EFFECTIVE N is far below 64. At that effective N, the
      sampling SE of Spearman rho is large: a true rho of 0.15 is statistically
      indistinguishable from 0 (FALSE-KILL of a real signal), AND a spurious
      |rho| >= 0.15 can arise from a handful of stress quarters driving the rank
      order (FALSE-PASS). The test reports no CI and no significance gate on rho
      — it treats a point estimate of a noisy statistic as decisive. This is the
      sharpest methodological gap in the slate. The direction's own
      confirmability-horizon section honestly says the edge lives in ~3 stress
      episodes; that same fact undermines the cheap rho test's reliability, but
      the artifact does not connect the two.
    disguised-backtest: no
  - direction: ML CB-text regime classifier (ml-researcher-eval.yaml)
    kill-number-well-defined: yes
    false-pos-or-neg-risk: >
      LOW for what the test actually measures, because the ml-researcher already
      performed the key correction: it REFRAMED the success criterion from the
      generator's over-claim ("classifies the regime before the market prices
      it", a tradable-edge claim) down to "can an LLM READ CB stance" (a
      look-ahead-labeled readability screen), and flagged the conflation
      explicitly. The N=120 / 3-class Wilson-CI-above-0.33 gate is statistically
      sound for THAT (readability) question. The residual false-PASS risk is that
      a passing readability screen could still be (mis)read by the Board as
      evidence of tradable edge — the ml-researcher pre-empts this in prose, but
      the kill-number itself does not encode the "readability != edge" firewall,
      so it depends on the reframe surviving into the consensus.
    disguised-backtest: no

findings:
  - id: F-001
    severity: major
    location: "quant-researcher-structured.yaml — C3 cheap-feasibility-test + kill-number (|rho| < 0.15 on BIS quarterly Spearman)"
    category: numerical
    observation: >
      The C3 cheap kill-test is a single Spearman rho point estimate on ~16yr of
      overlapping quarterly BIS basis data with NO confidence interval, NO
      significance gate, and NO effective-N adjustment for the heavy
      autocorrelation of funding-stress episodes. A |rho| threshold of 0.15 is
      asserted as machine-checkable, but at the true effective N (a handful of
      independent stress episodes, per the artifact's own confirmability section)
      the SE on rho is large enough that 0.15 is not distinguishable from 0.
    inference: >
      The kill-number is machine-checkable in form but not DECISIVE in substance:
      it can false-kill a real signal (rho point estimate < 0.15 by sampling
      noise) and false-pass a spurious one (a few stress quarters drive the rank
      order). The test's reliability is internally contradicted by the artifact's
      own "edge lives in ~3 independent episodes" finding. Treating a noisy point
      statistic as a hard gate is the probability-statistics anti-pattern of
      "10 samples is not enough; asymptotic."
    evidence: >
      probability-statistics SKILL §1.5 (LLN/CLT, O(1/sqrt(n)); "10 samples is
      not enough"); §4.8 common mistake. Du-Tepper-Verdelhan post-2008 sample
      is ~16yr quarterly with serial dependence. C3 confirmability-horizon field
      states effective event-count is "tiny regardless of calendar length."
    recommended-action-class: tighten-invariant
    owning-role: quant-researcher
  - id: F-002
    severity: major
    location: "quant-researcher-structured.yaml — C1 cheap-feasibility-test Step A; falsification-criteria (1)"
    category: correctness
    observation: >
      The C1 cheap test uses the published MOP-2012 gross Sharpe (~0.4) directly
      as the edge numerator with no discount for (a) post-publication alpha decay
      and (b) the 1985-2012 in-sample-to-2026 OOS gap, and the >=0.20-residual
      gate is sensitive to a desk-supplied "implied annual turnover" input that
      is not pinned by a public number.
    inference: >
      A PASS on this arithmetic is weaker evidence of a live net edge than the
      kill-number's crispness implies. This does not make it a disguised backtest
      (it is genuine published-number arithmetic), but it can pass a direction
      whose real OOS net edge is below the gate once decay and a realistic
      turnover are applied. financial-ml-methodology §evidence-base: anomaly
      edges decay ~35-58% post-publication (McLean-Pontiff); a Sharpe without a
      decay/OOS haircut over-states plausibility.
    evidence: >
      financial-ml-methodology SKILL §rubric-2 evidence-base (McLean-Pontiff
      35-58% decay; "good backtest performance is an indicator of negative
      future results" on memory series). C1 kill-number residual gate >= 0.20.
    recommended-action-class: tighten-invariant
    owning-role: quant-researcher
  - id: F-003
    severity: minor
    location: "quant-researcher-structured.yaml — C2 cheap-feasibility-test (cost hurdle) + slippage-distribution C2"
    category: correctness
    observation: >
      The C2 cheap cost check bounds commission + bid-ask ("Treasuries ~1bp,
      commodities a few bp") but does not bound CONTINUOUS-CONTRACT ROLL / curve
      cost, which on commodity sleeves (energy, ags in contango) can exceed the
      bid-ask term and is a recurring source of overstated trend-following net
      Sharpe. The slippage-distribution section says roll "must be modeled
      explicitly... the cheap test must not omit" it — but the cheap-test field
      itself does not include a roll term in the hurdle arithmetic.
    inference: >
      Internal inconsistency between the stated requirement (model roll) and the
      cheap test as written (bid-ask + commission only). A direction could pass
      the cheap hurdle and then have its net edge eaten by roll at backtest.
    recommended-action-class: tighten-invariant
    owning-role: quant-researcher
  - id: F-004
    severity: minor
    location: "quant-researcher-structured.yaml — C2 kill-criteria; cross-sleeve correlation gate"
    category: test-coverage-gap
    observation: >
      C2's load-bearing thesis (low cross-sleeve correlation => W2/W3 relief) has
