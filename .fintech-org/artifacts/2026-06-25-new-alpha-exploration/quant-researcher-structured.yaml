# ============================================================================
# SELECTION RATIONALE (which 3 of the slate, and why)
# ============================================================================
# Selection criterion: evidence-grade (peer-reviewed OOS preferred) ×
# cheap-feasibility-test specificity × number-of-walls-genuinely-attacked ×
# data-acquisition cost (cheaper preferred) — subject to the firm's
# binding NO-EDGE / cost-dominance / confirmability findings.
#
# The forex-trading skill EVIDENCE LAYER is load-bearing: the ONLY
# peer-reviewed OOS-documented systematic FX edges are CARRY and
# CROSS-SECTIONAL/TIME-SERIES MOMENTUM, both gross-of-cost with hard
# caveats (carry = crash-risk-compensation, negatively skewed; momentum
# materially eaten by transaction costs; cost-adjusted carry profitability
# did NOT survive verification). Everything else in the slate is either a
# transplant of those two factors to a cheaper-execution venue, a different
# DATA CLASS that closes Wall W4, or theory-grounded-untested.
#
# I structure the three directions that score highest on that criterion and
# that are GENUINELY structurable as falsifiable pre-registerable hypotheses
# with a machine-checkable cheap gate BEFORE any data spend:
#
#   C1  CME FX FUTURES TIME-SERIES MOMENTUM  (academic OOS survivor; the
#       single strongest cell of evidence-grade × cheap-data × walls in the
#       whole slate; converges across academic-lens + contrarian-lens)
#   C2  MULTI-ASSET FACTOR BASKET / COMMODITY-TREND TRANSPLANT  (academic
#       OOS survivor; the only direction that structurally LEAVES the FX
#       universe and so makes W2 + W3 non-binding by construction)
#   C3  FX SWAP BASIS / CIP-DEVIATION as a directional predictor  (the most
#       recent + cleanest peer-reviewed OOS evidence for a TRULY different
#       data class — Du-Tepper-Verdelhan 2018 JF — orthogonal to all four
#       walls; free feasibility test on BIS data)
#
# Directions NOT carried forward by THIS role (with one-line reason; HoQR
# owns the final ranking/merge):
#   - FX-VRP option-selling: OOS survivor BUT infrastructure-blocked (retail
#     option bid-ask destroys the premium); a RESEARCH, not near-term
#     pre-registerable, candidate. Defer.
#   - COT positioning contrarian: free + cost-survivable, but the cleanest
#     version (Leveraged-Funds smart-money) and the "fade-retail" version
#     conflate; the "non-reportable = retail" bridge is asserted, not
#     established (contrarian-lens flagged this honestly). Structurable, but
#     weaker evidence-grade than C1/C3; HoQR may merge it as the
#     positioning sleeve of C1's futures universe.
#   - Carry-timing-via-option-skew / risk-reversal: OOS survivor, but it IS
#     carry — re-opens the R5/QRB archived near-miss family; structurally a
#     refinement, not a structurally-new direction. Defer to a carry-
#     refinement cycle if the Board re-opens carry.
#   - REER value / dollar-imbalance: theory-grounded-untested, free data,
#     BUT 3-5yr half-life → recurs the confirmability wall hard. Lower
#     priority than C1/C3.
#   - London-fix / NFP-CPI-surprise: W1-adjacent (spread-widening at the
#     event IS the kill mechanism); both generators expect them to KILL on
#     the feasibility screen. Keep the cheap kill-test, do not structure as
#     a committed candidate.
#   - CB-text LLM classifier: forbidden family for THIS role (no ML); it is
#     the ML-researcher's to evaluate.
#   - Sell-the-harness / RaaS: a business-model reframe, not a TradeIntent;
#     out of QR scope.
# ============================================================================

structured-candidates:

  # --------------------------------------------------------------------------
  - name: cme-fx-futures-time-series-momentum
    hypothesis: >
      IF 12-month time-series momentum (TSMOM, the sign of the trailing
      12-month excess return, vol-scaled) is harvested across the liquid
      CME-listed FX futures universe (EUR, GBP, JPY, AUD, CAD, CHF, NZD, MXN,
      plus other actively-traded contracts), THEN the net-of-cost Sharpe is
      positive — because CME futures round-trip cost (~0.2-0.8 pip-equivalent,
      5-10x below retail spot spread) makes the documented gross FX-TSMOM
      Sharpe (~0.4 OOS, Moskowitz-Ooi-Pedersen 2012) survivable, where the
      same factor on retail spot was cost-dominated — testable by the cheap
      cost-hurdle arithmetic below, with no committed backtest this cycle.
      Falsifiable: it FAILS if published gross FX-TSMOM Sharpe net of modeled
      CME round-trip cost at the implied turnover is <= 0, or if the minimum
      viable position size to keep RT cost <20% of gross edge exceeds the
      firm's capital base.
    universe: >
      CME/Globex-listed FX futures, back-adjusted continuous contracts. Core
      liquid set: 6E (EUR), 6B (GBP), 6J (JPY), 6A (AUD), 6C (CAD), 6S (CHF),
      6N (NZD), 6M (MXN); optional breadth: 6L (BRL), SEK/NOK, CNH where
      liquidity permits. This LEAVES retail-spot FX for the exchange-traded
      futures venue but stays WITHIN the FX asset class. Excludes GBPJPY
      (prior HoQR exclusion is a spot-cross ruling; the futures universe does
      not include a GBPJPY contract, so the exclusion is not triggered).
    data-class-required: >
      CME FX futures daily (or intraday) OHLCV + true exchange VOLUME + OPEN
      INTEREST, back-adjusted continuous series, >=20yr history for multi-
      regime coverage. This is a DIFFERENT data class from the firm's retail
      1h/daily OHLCV+spread (it carries genuine exchange volume/OI — the W4-
      closing property). Source + approx cost: Norgate Data FX-futures
      historical ~$250-500/yr (PAID, single low-cost vendor); Nasdaq Data
      Link / Quandl CME continuous ~$420-500/yr (PAID); CME DataMine (FREE for
      academic/institutional tiers); the G10 majors subset is available at
      near-zero cost via public continuous series (quality/continuity varies)
      sufficient for the cheap-feasibility test.
    evaluation-metric: >
      Deflated Sharpe Ratio (Bailey-Lopez de Prado) with the firm's ratified
      N=30 deflation denominator, computed under Combinatorial Purged Cross-
      Validation (CPCV) with embargo, on NET-of-cost returns using a frozen
      CME round-trip cost manifest. Regime-stratified report (hiking vs.
      easing vs. on-hold; risk-on vs. risk-off) is MANDATORY given the firm's
      W3 finding. Honest-N-aware: a future committed trial increments the
      counter; this cycle does not. Cross-sectional breadth must be reported
      as EFFECTIVE independent bets (post-G5 concentration), not raw contract
      count — the 8-contract universe is highly USD-cross-loaded and the
      effective N is materially below 8.
    falsification-criteria: >
      Machine-checkable kill conditions (ANY true => KILL before/at a future
      pre-registration): (1) published gross FX-TSMOM Sharpe (MOP 2012 Table,
      FX-futures sleeve) net of modeled CME RT cost at the implied annual
      turnover <= 0.0; (2) minimum viable per-contract notional to hold RT
      cost < 20% of gross per-rebalance edge > the firm's available capital
      base; (3) at committed-backtest time, net-of-cost DSR < 0.95 under
      N=30 deflation; (4) regime-stratified check shows > 50% of net gross
      edge concentrated in a single macro regime (recurs W3) AND the
      remaining-regime net Sharpe <= 0.
    cheap-feasibility-test: >
      PURE ARITHMETIC ON PUBLISHED NUMBERS + PUBLIC FEE SCHEDULES, NO
      BACKTEST. Step A (gross vs cost): take the MOP (2012) reported gross
      FX-futures TSMOM Sharpe (~0.4) and the contract's implied annual
      turnover at the 12-month signal; from the public CME/Globex fee schedule
      + 1-2 tick bid-ask, compute modeled annual RT cost as a Sharpe drag
      (annualized_RT_cost / annualized_vol). Step B (capital sizing): compute
      the minimum viable position size such that RT cost is < 20% of the
      gross per-rebalance edge, and compare to the firm's paper-trading
      capital base. Both steps are ~1 hour of desk arithmetic on the free
      G10-subset series + published Sharpe; a committed CPCV backtest is
      explicitly DEFERRED.
    kill-number: >
      KILL if (gross_FX-TSMOM_Sharpe ~0.4) minus (modeled CME RT-cost Sharpe
      drag) <= 0.0; OR if min-viable-notional-per-contract > firm capital base
      (i.e., the strategy is sound but capital-infeasible at current scale).
      Explicit numeric gate: net-of-cost Sharpe drag must leave >= 0.20
      residual gross Sharpe for the direction to advance to a future
      pre-registration.
    walls-attacked: >
      W1 (cost-dominance) — DIRECTLY: CME futures RT cost ~5-10x below retail
      spot spread; this is the precise mechanism by which a cost-dominated FX
      factor becomes potentially viable. W4 (no-true-volume/order-flow) —
      DIRECTLY: CME publishes audited exchange volume + OI daily (genuine,
      not tick-count proxy). W2 (USD-concentration) — PARTIALLY: 8+ contracts
      vs 10 retail pairs, but the futures set is still USD-cross-dominated;
      effective independent bets remain low (see evaluation-metric). W3
      (regime-dependence) — PARTIALLY: 12-month signal is multi-regime by
      construction, but TSMOM is itself known to underperform in sharp
      regime-reversals; not neutralized.
    walls-NOT-solved: >
      W2 is only partially relieved — the futures universe is USD-cross-loaded
      and effective breadth stays ~2-4 independent bets, the same structural
      ceiling the firm hit on retail spot. W3 is NOT neutralized — TSMOM has
      documented regime-reversal drawdowns. Capital-scale (min viable
      contract notional) is a NEW constraint introduced by moving to futures
      and may be the binding killer at the firm's current size.
    confirmability-horizon: >
      MIXED, leans favorable vs. the firm's prior. TSMOM is a daily-to-monthly
      rebalanced signal; at a per-contract Sharpe ~0.4 with rho-adjusted
      effective breadth ~2-4 contracts, honest years-to-validate at 80% power
      is on the order of ~5-8yr for the pooled estimate — LONGER than the
      firm's <=3yr confirmability bar, so it RECURS the confirmability/dataset
      wall at the effective-breadth level even though the data history is
      long. Caveat: the >=20yr futures history means OOS is available even if
      forward-confirmation is slow; this is better-positioned than the daily-
      pair families but is NOT a clean escape from the wall.

  # --------------------------------------------------------------------------
  - name: multi-asset-factor-basket-and-commodity-trend-transplant
    hypothesis: >
      IF the carry and trend/momentum factors — documented OOS survivors
      ACROSS asset classes (Asness-Moskowitz-Pedersen 2013 "Value and
      Momentum Everywhere"; Hurst-Ooi-Pedersen 2017 "A Century of Evidence
      on Trend-Following") — are harvested as a risk-parity basket spanning
      FX carry + rates carry (Treasury futures) + commodity trend (energy /
      metals / ags futures), THEN the combined net-of-cost Sharpe exceeds any
      single-FX-sleeve strategy AND has materially lower single-regime
      dependence, because the same factor is empirically low-correlated across
      asset classes even when correlated within them — testable by reading the
      published combined-basket OOS Sharpe + a futures cost-hurdle check, with
      no committed backtest this cycle. Falsifiable: it FAILS if the published
      combined OOS Sharpe is < 0.4 gross, OR if the commodity/rates futures
      cost hurdle exceeds the implied per-rebalance gross edge at monthly
      rebalancing.
    universe: >
      EXPLICITLY LEAVES FX as the hero. Three sleeves: (a) FX carry — existing
      firm capability as ONE sleeve, not the whole strategy; (b) rates carry —
      Treasury futures (ZN/TY 10y, ZF/FV 5y); (c) commodity trend — CL (WTI),
      GC (gold), HG (copper), ZC (corn), ZS (soybeans), NG (nat gas) and
      similar liquid CME/NYMEX/CBOT contracts. This is a CROSS-ASSET universe;
      the FX sleeve is a minority weight. Genuinely categorically different
      from F1-F6/R5/QRB-6 (those were single-asset retail-FX OHLCV).
    data-class-required: >
      Continuous futures OHLCV + VOLUME + OI for Treasury and commodity
      contracts (a genuinely new data class — volume-inclusive, exchange-
      traded, non-FX). Source + approx cost: daily OHLCV+volume FREE via
      public daily futures series for 3-10 liquid markets (feasibility-test
      tier); Nasdaq Data Link / Quandl clean continuous futures ~$420/yr
      (PAID) for backtest-grade rolls; institutional-clean intraday rolls
      ~$2,000-10,000/yr (PAID, deferred). FX carry sleeve uses existing firm
      data; rates/commodity sleeves are the new class.
    evaluation-metric: >
      Deflated Sharpe Ratio under N=30 deflation, computed via CPCV with
      embargo on NET-of-cost basket returns with a frozen per-contract cost
      manifest per asset class. MANDATORY reporting: (i) per-sleeve and
      combined Sharpe; (ii) the realized cross-sleeve correlation matrix
      (the load-bearing claim is LOW cross-asset factor correlation — if the
      sleeves are in fact highly correlated in-sample, the W2/W3 attack
      collapses); (iii) regime-stratified combined Sharpe; (iv) effective
      independent bets across the basket (not nominal sleeve count).
    falsification-criteria: >
      Machine-checkable (ANY true => KILL): (1) published combined cross-asset
      carry+momentum OOS Sharpe (AMP 2013 Table 1 / Hurst 2017 post-2000
      sub-period) < 0.4 gross; (2) modeled rates/commodity futures RT cost >
      25% of implied per-rebalance gross edge at monthly rebalancing; (3) at
      committed-backtest time, realized cross-sleeve correlation > 0.6 (the
      diversification premise fails — basket collapses to ~one bet); (4)
      net-of-cost combined DSR < 0.95 under N=30; (5) regime-stratified check
      shows the combined basket still derives > 50% of net edge from one
      macro regime (the W3 attack failed).
    cheap-feasibility-test: >
      TWO ANALYTICAL CHECKS ON PUBLISHED NUMBERS, NO BACKTEST. Check 1
      (published OOS read): from AMP (2013) Table 1, read the combined
      equal-weight carry+momentum-across-4-asset-classes OOS Sharpe; from
      Hurst-Ooi-Pedersen (2017) Exhibit 2 read the commodity-trend sleeve OOS
      Sharpe for the POST-2000 sub-period specifically (the literature's own
      verdict on persistence). KILL if post-2000 combined OOS Sharpe < 0.4.
      Check 2 (cost hurdle): from public exchange fee schedules + 0.5-2 tick
      bid-ask, compute round-trip cost of ZN / CL / GC / ZC as a fraction of
      notional (Treasuries ~1bp on ~$130k notional; commodities a few bp) and
      compare to the implied per-rebalance gross edge at monthly rebalancing.
      Both are ~1 hour desk computations on free daily series + published
      numbers. Committed CPCV backtest DEFERRED.
    kill-number: >
      KILL if published post-2000 combined cross-asset carry+momentum OOS
      Sharpe < 0.4 gross; OR if modeled futures RT cost > 25% of implied
      per-rebalance gross edge at monthly rebalancing; OR (at backtest)
      realized cross-sleeve correlation > 0.6.
    walls-attacked: >
      W2 (USD-concentration) — DIRECTLY and most strongly in the slate: rates
      and commodity futures are non-USD-factor asset classes; the basket de-
      loads USD by construction. W3 (regime-dependence) — DIRECTLY: multi-
      asset factor diversification is the ACADEMICALLY DOCUMENTED remedy for
      single-asset factor blowup; sectors span uncorrelated macro themes.
      W1 (cost-dominance) — DIRECTLY: futures costs are 10-20x below FX spot
      spread per unit notional and the basket rebalances monthly/quarterly.
      W4 (no-volume) — DIRECTLY: all futures sleeves carry genuine exchange
      volume + OI.
    walls-NOT-solved: >
      The W2/W3 attack is CONDITIONAL on the cross-sleeve correlation actually
      being low out-of-sample — if carry and trend co-move in the next risk-
      off (as they sometimes do, e.g. a simultaneous carry-and-trend
      drawdown), the diversification premise that the whole direction rests on
      fails, and the basket collapses toward a single regime-dependent bet.
      This is the central risk and is exactly what kill-criterion (3) and the
      mandatory correlation report guard. Also: this direction takes the firm
      OUT of its FX domain expertise into rates/commodity microstructure it
      has not modeled.
    confirmability-horizon: >
      FAVORABLE relative to single-FX directions, and the best escape from the
      dataset wall in the slate. Cross-asset breadth genuinely raises the
      effective independent-bet count (the wall's root cause was low effective
      N from a USD-loaded 10-pair universe); a true multi-asset basket can
      plausibly reach effective N high enough to bring years-to-validate
      toward the <=3yr bar at a combined Sharpe >0.5. The honest caveat: this
      depends on the cross-sleeve correlation being low (same as the kill
      criterion), and on the firm acquiring competence in two new asset
      classes. Best-positioned direction on the confirmability axis, NOT
      guaranteed.

