  - name: fx-swap-basis-cip-deviation-directional-predictor
    hypothesis: >
      IF the 3-month cross-currency basis swap spread (the CIP deviation; e.g.
      EUR/USD basis) captures interbank USD-funding stress, THEN the basis
      level predicts the subsequent 1-4 week spot return of the corresponding
      pair (severely negative basis = acute USD-funding demand => subsequent
      mean-reverting USD weakness as the stress unwinds), with a gross Sharpe
      ~0.4-0.6 at 1-4 week holding, DISTINCT from interest-rate carry — because
      the basis is a pricing signal from a segmented institutional money
      market (CIP deviations are real and persistent post-2008: Du-Tepper-
      Verdelhan 2018 JF; Avdjiev et al. 2019 JF) that retail OHLCV cannot see.
      Testable by a free Spearman rank-correlation check on BIS data, with no
      committed backtest this cycle. Falsifiable: it FAILS if, on free BIS
      basis data, the basis-to-subsequent-return rank correlation is not
      directionally consistent with theory or |rho| < 0.15.
    universe: >
      Spot (or FX-forward) on the major pairs for which a published cross-
      currency basis exists: EUR/USD primary; USD/JPY, GBP/USD, USD/CHF,
      AUD/USD secondary. STAYS WITHIN FX for execution, but the SIGNAL comes
      from the interbank cross-currency-swap market — a different market
      segment than spot OHLCV. Execution is vanilla spot/forward (retail-
      accessible); the CCS market itself (>=$25-50m notional) is only the
      signal source, not the traded instrument.
    data-class-required: >
      Daily 3-month cross-currency basis swap spread per pair (a genuinely
      different data class from OHLCV — an interbank derivatives pricing
      signal carrying funding-stress / order-flow information). Source +
      approx cost: BIS published CCS basis dataset — FREE, quarterly, ~3-month
      lag (sufficient to KILL or provisionally pass the feasibility test); a
      FRED free-data reconstruction (EUR 3M OIS minus USD 3M OIS minus EURUSD
      3M FX-forward basis) — FREE, ~1hr to build; daily real-time basis via
      Refinitiv/LSEG ~$1,200-3,600/yr (PAID, only if the free test survives);
      Bloomberg XCCY screen ~$20k+/yr (PROHIBITIVE, out of scope).
    evaluation-metric: >
      Deflated Sharpe Ratio under N=30 deflation via CPCV with embargo on
      NET-of-cost spot/forward returns (1-4 week hold; ~13-50 round-trips/yr,
      so RT cost is a small fraction of annual range — W1 light). MANDATORY:
      regime-stratified by funding-stress episode (GFC 2008 / COVID 2020 /
      banking-stress 2023 vs. calm) — the central honest risk is that the
      signal FIRES ONLY during stress episodes, recurring regime-concentration
      on a DIFFERENT axis (stress-vs-calm) than the firm's hiking-cycle axis.
      Report the count of independent stress episodes in-sample (likely very
      few) as the effective-N driver.
    falsification-criteria: >
      Machine-checkable (ANY true => KILL): (1) on free BIS quarterly basis
      data aligned to subsequent quarterly spot returns, Spearman
      rank-correlation |rho| < 0.15 OR sign opposite to theory (negative basis
      not followed by subsequent USD weakness); (2) Du-Tepper-Verdelhan (2018)
      reported net-of-cost predictive Sharpe at 1-month horizon < 0.3; (3) at
      committed-backtest time, net-of-cost DSR < 0.95 under N=30; (4) the
      number of independent funding-stress episodes in the usable sample is
      so small (e.g. < 4) that years-to-validate at power is infeasible
      (recurs the QRB-6 confirmability failure mode).
    cheap-feasibility-test: >
      ANALYTICAL SIGNAL CHECK ON FREE DATA, NO STRATEGY BACKTEST. Download the
      BIS published EUR/USD 3-month CCS basis (quarterly, free) and align to
      the firm's existing quarterly EUR/USD spot returns. Compute ONE
      statistic: the Spearman rank-correlation between the lagged basis level
      and the subsequent quarterly spot return, and check the SIGN against
      theory. Optionally cross-check with a FRED free reconstruction of the
      basis (~1hr). This is a property of two SERIES, not a portfolio return —
      no Sharpe, no sizing, no committed trial. ~1 hour total. If it survives,
      the next gate (worth the $1,200/yr daily-data subscription?) is a
      SEPARATE future Board decision.
    kill-number: >
      KILL if Spearman |rho| between lagged BIS basis and subsequent spot
      return < 0.15, OR if the sign is opposite to the funding-stress-unwind
      theory, OR if Du-Tepper-Verdelhan (2018) net-of-cost 1-month predictive
      Sharpe < 0.3.
    walls-attacked: >
      W4 (no-true-volume/order-flow) — DIRECTLY: the CCS basis is an entirely
      different data class from OHLCV, carrying interbank funding-stress /
      order-flow information unavailable to a retail price feed. W3 (regime-
      dependence) — PARTIALLY and on a DIFFERENT axis: funding stress is NOT
      specific to the 2022-23 hiking cycle (it fires in GFC, COVID, 2023
      banking stress), so it sidesteps the firm's identified hiking-cycle
      artifact — but see walls-NOT-solved. W1 (cost-dominance) — INDIRECTLY:
      1-4 week hold => low turnover => cost is not the dominant drag.
    walls-NOT-solved: >
      W3 is only re-axised, not neutralized: the signal plausibly fires ONLY
      during funding-stress episodes, which re-introduces regime-concentration
      on a stress-vs-calm axis and — critically — means the number of
      INDEPENDENT events in any usable sample is very small (a handful of
      stress episodes in 20yr). W2 is NOT attacked (still USD-pair dominated,
      EUR/USD-centric). The strategy also assumes the basis-to-spot mean-
      reversion timing (1-4 week unwind) is stable across very different
      stress episodes — an assumption, not an established constant.
    confirmability-horizon: >
      UNFAVORABLE — this is the direction most likely to RECUR THE QRB-6
      CONFIRMABILITY WALL. Because the edge is concentrated in a handful of
      independent funding-stress episodes (2008, 2020, 2023), the effective
      event-count is tiny regardless of the data history's calendar length;
      years-to-validate at 80% power is plausibly well beyond the firm's
      <=3yr bar and could approach the QRB-6 "infeasible power" regime. It is
      carried forward DESPITE this because its DATA CLASS is the cleanest,
      most-orthogonal-to-all-four-walls signal in the slate and the
      feasibility test is FREE — but the confirmability caveat is load-bearing
      and the Board must weigh it. Honest: strong mechanism, weak
      confirmability.

