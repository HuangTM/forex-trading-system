slippage-distribution: >
  Declarative cost assumptions per candidate (NO numeric edge claimed; these
  are the COST side of the feasibility hurdle only):
  - C1 cme-fx-futures-tsmom: model CME/Globex commission + 1-2 tick bid-ask
    per round-trip (~0.2-0.8 pip-equivalent on liquid majors); assume slippage
    ~0.5 tick on liquid contracts in normal conditions, wider on 6M/6L (EM
    contracts) and around macro events. Cost is a FROZEN manifest per contract
    at committed-backtest time; the cheap test uses published fee schedules.
  - C2 multi-asset-basket: per-asset-class round-trip manifest — Treasuries
    ~0.5 tick (~1bp on notional), liquid commodities a few bp (1-2 tick
    bid-ask + commission); FX-carry sleeve inherits the firm's existing spot
    cost model. Slippage assumed modest at monthly rebalancing on liquid
    contracts; roll cost must be modeled explicitly (continuous-contract roll
    is a real cost the cheap test must not omit).
  - C3 fx-swap-basis: execution is vanilla spot/forward at the firm's existing
    retail spot cost model (~1-2 pip RT on majors); at 1-4 week hold this is a
    small fraction of annual range. The CCS basis is signal-only (not traded),
    so it carries NO execution cost. Note the funding-stress regime is exactly
    when spot spreads WIDEN — the cost manifest must use stress-conditional
    (not calm) spreads for the episodes that drive the edge.
  General: all three defer the FROZEN cost manifest to the future committed
  pre-registration; this cycle uses published fee schedules / existing spot
  cost model for the cheap arithmetic only. No live capital. No slippage
  realized this cycle (no trading).

retirement-triggers: >
  Machine-checkable (per candidate; ANY true retires the candidate):
  - ANY of the candidate's listed falsification-criteria fires on the cheap
    free-data feasibility test (no spend incurred).
  - kill-number breached on the cheap test.
  - At a FUTURE committed pre-registration: net-of-cost DSR < 0.95 under the
    ratified N=30 deflation denominator under CPCV.
  - Regime-stratified check shows > 50% of net edge from a single regime AND
    remaining-regime net Sharpe <= 0 (recurs W3).
  - Effective-independent-bet count / independent-event count is so low that
    years-to-validate at 80% power exceeds the firm's confirmability bar
    (recurs the dataset/QRB-6 wall) — this is a SOFT retirement flag for C1,
    HARD for C3.
  - honest-N changes for any reason other than a Board-authorized committed
    advance of this exact candidate (NHT sign-off required).

