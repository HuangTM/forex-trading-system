body: |
  WHY THESE THREE ARE THE STRONGEST STRUCTURABLE NON-ML CANDIDATES

  The firm's binding finding is not an idea shortage — it is a DATA-CLASS /
  EFFECTIVE-BREADTH wall: every cost-dominated, USD-loaded, regime-concentrated
  retail-OHLCV family has been falsified (net SR < 0 across 84 pair×family
  combos). The forex-trading EVIDENCE LAYER says the only peer-reviewed OOS
  FX edges are CARRY and MOMENTUM, both gross-of-cost. The honest implication:
  a structurally-new direction has to do exactly one of two things — (a) move
  the SAME documented factor to a venue/data class where cost stops dominating
  and genuine volume exists, or (b) LEAVE the FX universe so the USD-
  concentration and single-regime walls become non-binding by construction.
  My three picks are the cleanest structurable instances of (a) and (b):

  C1 (CME FX-futures TSMOM) is the single strongest cell of evidence-grade ×
  cheap-data × walls-attacked in the whole slate, and it CONVERGED independently
  across the academic and contrarian lenses. Moskowitz-Ooi-Pedersen (2012) is
  the most-replicated systematic trading result in academic finance; the
  futures venue closes W4 (real exchange volume/OI), cuts cost ~5-10x vs retail
  spot (W1), and the data costs ~$250-500/yr. Its honest weakness is that the
  futures universe is STILL USD-cross-loaded — effective breadth stays ~2-4
  bets — so it only partially relieves W2 and recurs the confirmability wall at
  the effective-N level; and it introduces a new capital-scale constraint
  (minimum viable contract notional) that may be the actual killer at the firm's
  current size. The cheap test is pure arithmetic and will surface that fast.

  C2 (multi-asset factor basket / commodity-trend transplant) is the only
  direction that structurally LEAVES FX, which is the most decisive way to
  attack W2 and W3 — multi-asset factor diversification is the academically
  documented remedy for single-factor regime blowup (AMP 2013; Hurst 2017). It
  is also the only direction that plausibly raises effective independent-bet
  count enough to bring years-to-validate toward the firm's <=3yr confirmability
  bar — i.e., the best escape from the dataset wall. Its load-bearing risk is
  precisely the diversification premise: if the carry and trend sleeves co-move
  in the next risk-off, the basket collapses to one regime-dependent bet — which
  is why the mandatory deliverable is the realized cross-sleeve correlation
  matrix and the explicit corr>0.6 kill. It also takes the firm into two asset
  classes it has not modeled; that is a real cost, honestly noted.

  C3 (FX swap basis / CIP deviation) is carried as the THIRD because it is the
  cleanest, most-orthogonal-to-all-four-walls DATA CLASS in the slate (an
  interbank funding-stress signal retail OHLCV cannot see), it has the most
  recent and cleanest peer-reviewed OOS evidence among the W4-closing
  directions (Du-Tepper-Verdelhan 2018 JF), and its feasibility test is FREE
  (a Spearman check on BIS data). But I flag its confirmability caveat as
  LOAD-BEARING and unfavorable: the edge is concentrated in a handful of
  independent funding-stress episodes (2008, 2020, 2023), so the effective
  event-count is tiny regardless of calendar history — it is the direction most
  likely to RECUR THE QRB-6 confirmability failure (power infeasible in <=3yr).
  Strong mechanism, weak confirmability. The Board must weigh that explicitly.

  HONEST CROSS-CUTTING CAVEAT (the wall that does not fully open): even moving
  to futures + cross-asset + a new data class, the effective independent-bet
  ceiling and the events/yr × per-event-Sharpe confirmability constraint do not
  vanish. C1 recurs it at the effective-N level; C3 recurs it hard at the
  event-count level; C2 is the only one with a credible path THROUGH it, and
  only if cross-sleeve correlation is genuinely low OOS. None of the three is a
  guaranteed escape; all three are structurable, falsifiable, and gated by a
  FREE-or-cheap kill test that runs BEFORE any data spend — which is exactly
  what this non-spend exploration cycle was asked to produce. HoQR owns the
  final edge-per-data-cost ranking and any merge (e.g., folding COT positioning
  in as a sleeve of C1's futures universe). These remain STRUCTURED CANDIDATES;
  no pre-registration is authored and honest-N stays 30.

