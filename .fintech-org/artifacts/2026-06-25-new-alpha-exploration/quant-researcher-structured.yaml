assumptions:
  - "The 4 walls (W1 cost-dominance, W2 USD-concentration, W3 regime-dependence, W4 no-true-volume/order-flow) are an accurate characterization of the firm's falsification corpus; if contested, NHT flags as dissent."
  - "honest-N=30 is the ratified deflation denominator and MUST NOT increment this cycle; these are STRUCTURED CANDIDATES, not committed pre-registrations."
  - "'Cheap feasibility test' = an analytical/arithmetic check or free-data signal-property computation executable WITHOUT a committed CPCV backtest — NOT a mini-backtest. All three cheap tests above honor this (cost arithmetic on published Sharpe + fee schedules; a Spearman correlation of two free series)."
  - "Published academic OOS Sharpes are GROSS-of-the-firm's-cost and carry wide uncertainty bands; they bound plausibility, they do not establish the firm's net edge — which is exactly why no edge number is asserted and the gross-vs-cost hurdle is the gate."
  - "C1 and C2 introduce a NEW capital-scale constraint (minimum viable futures contract notional) absent from spot FX; this is treated as a first-class kill condition, not an afterthought."
