frozen-kill-number: >
  Direction: trend-following on FX futures (time-series momentum, MOP-2012 /
  Hurst-Ooi-Pedersen-2017).
  STEP A (cost hurdle): KILL if (published gross FX-futures TSMOM Sharpe ~0.4) minus
  (modeled CME round-trip cost Sharpe drag) <= 0.0. Advance gate: net-of-cost must
  leave >= 0.20 RESIDUAL Sharpe.
  STEP B (deployability): compute min-viable position notional per contract such that
  round-trip cost < 20% of gross per-rebalance edge; compare to firm's capital base.

step-A-cost-hurdle:

  gross-sharpe-used: >
    BASE CASE: 0.40 (FX-futures subset, MOP 2012 — Moskowitz, Ooi, Pedersen,
    "Time Series Momentum," Journal of Financial Economics, 2012, Table 3 / Figure 3).
    HONEST NOTE: The ~0.4 figure is for the FX-futures sub-portfolio of a diversified
    TSMOM strategy. The diversified multi-asset trend Sharpe (Hurst, Ooi, Pedersen 2017
    "A Century of Evidence on Trend-Following Investing") is ~0.7-1.0 net over
    100 years, substantially higher due to diversification across equities, bonds,
    commodities, and FX. Single-market FX-futures TSMOM operates at the LOWER end;
    the ~0.4 base case is an honest representation for a narrow FX futures application.
    Upper reference: 0.7-1.0 (multi-asset, highly diversified) — NOT applicable to
    single-market FX futures alone.

  modeled-rt-cost-sharpe-drag:
    contract: "CME 6E EUR/USD Futures"
    notional_EUR: 125000
    notional_USD: 135625
    assumed_EURUSD_rate: 1.085
    tick_size_USD: 0.00005
    tick_value_USD: 6.25
    formula: >
      Sharpe_drag = (N_rt × RT_cost_total) / (annual_vol_pct × notional_USD)
      where RT_cost_total = fee_RT + bid_ask_cost_per_RT
    inputs:
      fee_per_side_USD: 1.50        # conservative: exchange + clearing + broker
      fee_RT_USD: 3.00
      bid_ask_base: "1 tick = $6.25"
      bid_ask_RT_cost_base_USD: 6.25
      RT_cost_total_base_USD: 9.25   # $3.00 fee + $6.25 spread
      N_rt_per_year_base: 4          # 12-month TSMOM signal → ~4 signal flips/yr
      annual_vol_pct: 0.15           # 15% vol target per position (standard TSMOM)
      annual_return_vol_USD: 20344   # 15% × $135,625
    base_case_calculation: >
      annual_cost = 4 RT × $9.25/RT = $37.00
      Sharpe_drag = $37.00 / $20,344 = 0.00182
    modeled-sharpe-drag-base: 0.0018

  residual-net-sharpe: >
    BASE CASE: 0.40 - 0.0018 = 0.3982 (rounds to 0.40).
    The futures cost drag on a 12-month TSMOM signal is negligible at ~0.002 Sharpe.
    This is structurally different from a high-frequency strategy: the low turnover
    is the key mitigant.

  futures-vs-retail-spot-cost-ratio: >
    CONFIRMED (with important nuance): For the CME 6E EUR/USD at 125k EUR notional:
      Futures RT cost (1-tick + $3 fee): $9.25 = 0.68 bps of notional.
      Retail spot (1-pip spread all-in, no commission): $11.52 one-way = 0.85 bps.
      Ratio retail/futures: ~1.2x for EUR/USD (the most liquid pair).

    The "5-10x lower than retail spot" claim in the pre-registration requires
    qualification:
    - For EUR/USD specifically: futures are roughly comparable to retail (1-2x cheaper),
      NOT 5-10x. EUR/USD retail spreads are unusually tight (0.5-1.5 pip).
    - For LESS liquid pairs (AUD/CAD, GBP/JPY, AUD/JPY): retail spreads widen to
      2-5+ pips. At those levels, futures ARE 5-10x cheaper.
    - Conclusion: The structural advantage of futures over retail spot is REAL but is
      pair-dependent. For EUR/USD, it is modest. For the broader FX futures universe
      (which TSMOM applies across), the cost advantage is meaningful and the claim
      is plausible as a portfolio average.
    - KEY STRUCTURAL POINT CONFIRMED: At low TSMOM turnover (4 RT/yr), even 0.85 bps
      retail spot cost = annual_drag of only 0.003 Sharpe — immaterial in both cases.
      The cost regime difference matters FAR more for higher-turnover strategies.
    - ECN/pro spot (0.1 pip + $5 RT commission): $12.30 RT = 0.91 bps — HIGHER than
      futures due to the fixed commission component dominating at tight spreads.

