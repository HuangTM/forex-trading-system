body: |
  ## Step A: Cost Arithmetic and the Structural Futures-vs-Spot Point

  The CME 6E EUR/USD future is one of the most liquid derivative contracts in existence.
  For a 125,000 EUR notional position using a 12-month TSMOM signal:

    - Tick value: $6.25 (0.00005 USD × 125,000 EUR)
    - Per-RT cost (fee $3.00 + 1-tick spread $6.25): $9.25
    - Annual turnover (12M TSMOM): ~4 signal flips → $37.00/yr
    - Annual return vol: 15% × $135,625 = $20,344
    - Sharpe drag: $37.00 / $20,344 = 0.0018

  Base-case net Sharpe: 0.40 - 0.0018 = 0.398. The cost drag is negligible.
  The key insight is structural: TSMOM's edge comes from holding positions for weeks
  to months. Very low turnover means very little cost accrual. This is precisely why
  institutional trend-following flourishes in futures markets.

  ### Futures vs Retail Spot — Honest Assessment

  For EUR/USD (most liquid pair), futures RT cost (0.68 bps) is roughly comparable
  to tight retail spot (0.85 bps for 1-pip spread). The 5-10x advantage claim in the
  pre-registration is an overstatement for EUR/USD specifically but becomes accurate
  for less liquid FX pairs (2-5 pip retail spreads vs. 1-tick futures). The portfolio-
  level truth (MOP 2012 applies TSMOM across many FX pairs including less liquid ones)
  supports the claim as a portfolio average. For EUR/USD in isolation: ~1-2x advantage.
  In both regimes, at TSMOM turnover, the ABSOLUTE cost drag is trivially small.

  ## Sensitivity Analysis

  Across the full plausible grid (Gross SR 0.30-0.80, N_RT 2-12/yr, BA 1-3 ticks):

    - Minimum residual net Sharpe in any cell: 0.287 (worst: gross 0.30, 12 RT/yr, 3-tick)
    - Maximum drag encountered: 0.013 Sharpe (at 12 RT/yr, 3-tick scenario)
    - Gate of 0.20 residual is cleared in EVERY cell by a factor of ≥1.4x

  The sensitivity table confirms this is not a knife-edge result. The gate is robust
  across the full parameter range. The structural reason is simple: TSMOM's max-drag
  scenario (12 RT/yr, 3-tick) amounts to only ~$261/yr cost on a ~$135k position —
  negligible against a 15% vol regime.

  ## Step B: Deployability

  Min-viable notional computation (20% cost-of-edge gate):
    min_notional = ($9.25 × 4 RT) / (0.20 × 0.40 gross_SR × 0.15 vol) = $3,083

  Both 6E (full, $135,625) and M6E (micro, $13,562) pass this gate with large margin.
  Full 6E: cost = 0.45% of gross per-RT edge (gate is 20%).
  Micro M6E: cost = 4.55% of gross per-RT edge (gate is 20%).

  DEPLOYABILITY STATUS: Research-only pending:
  (a) Board capital-base ratification
  (b) CME futures access confirmation (Saxo may offer futures or only CFDs)
  (c) Portfolio-level sizing (MOP 2012 applies TSMOM across a basket of FX contracts,
      not just EUR/USD; total capital requirement scales with basket size)
  (d) Margin availability: 6E initial margin ~$2,000-2,500 per contract

  ## Verdict vs Frozen Kill-Number

  STEP A GATE (net >= 0.20): Net = 0.398 >> 0.20. PASS — not knife-edge.
  STEP B: Min-viable = $3,083; both contract sizes clear. Deployability: research-only.

  OVERALL: PASS-advance. This is a $0-cost descriptive feasibility probe. NO trial
  is counted; honest-N remains at 30. Advancing means a separately-gated pre-registration
  step covering: signal specification, lookback selection, universe selection, OOS
  confirmability horizon assessment, portfolio-level cost and margin modeling, and
  governance ratification. None of those steps are committed or implied here.

  The critical open question for any future pre-registration: CONFIRMABILITY.
  TSMOM with a 12-month lookback on FX futures needs N_events/yr × per-event-Sharpe
  to determine if OOS validation is feasible in ≤2-3 years. With ~2-4 signal flips/yr
  per instrument, per-instrument confirmability is SLOW. A multi-pair portfolio
  accelerates it. This is the principal risk that must be addressed before any
  trial is registered — not the cost.

