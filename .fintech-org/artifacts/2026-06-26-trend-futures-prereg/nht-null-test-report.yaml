  - "Whether the pre-reg author intends F7's per-bet Sharpe input to be published-decayed (pre-computable, gate fires NOW) or backtest-realized (circular). This MUST be resolved in revision; it is the single ambiguity that decides whether F7 is a true pre-gate."
