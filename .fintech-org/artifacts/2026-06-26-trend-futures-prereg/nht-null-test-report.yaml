dissent-statement: >
  DISSENT (append-only, verbatim for CONSENSUS.md). The rigor MACHINERY of this
  pre-registration is excellent and I affirm it: all seven falsification criteria carry fixed
  numeric thresholds and named inputs, are single-shot, and the HOLDOUT is touched exactly
  once; the single-program accounting (one honest-N unit, one risk limit, cross-lens
  convergence discounted to one mechanism) is correct and does not smuggle breadth as
  independent confirmation; the compound deflation to 37 effective trials honors the ratified
  F-008 ruling. I dissent on ONE load-bearing point that blocks freezing the prose as the
  firm's standing spec. The artifact's CENTRAL THESIS — that cross-asset breadth compresses
  years-to-validate below the firm's <=2-3yr confirmability bar — is ARITHMETICALLY FALSE
  under the pre-registration's OWN F7 formula. Evaluating that formula on the artifact's own
  honest inputs (published FX-sleeve gross 0.40 x a pinned 0.50 McLean-Pontiff decay = 0.20
  per-bet; effective bets B=4..10; deflated one-sided alpha at 37 trials -> z~3.0), years-to-
  validate at 80% power is 37 to 92 YEARS, not 2-3. The single most generous construction I
  could honestly build (Hurst diversified gross ~1.0 x 0.5 decay = 0.50 taken as the DIRECT
  net program Sharpe) still gives ~59 years. To validate in <=3yr at the deflated alpha the
  program would need a net ANNUAL Sharpe of ~2.2 — about 4-5x the highest gross-undecayed
  diversified trend Sharpe ever published. Breadth multiplies S_prog by sqrt(B) (~2-3x); the
  bar demands ~7-11x. This is the QRB-6 power-infeasible trap wearing new clothes: the data
  class changed but the events/yr x per-event-Sharpe arithmetic that killed QRB-6 is intact.
  Because F7's inputs (decayed per-bet Sharpe from published literature; effective B from
  published correlation tables) are BOTH computable for $0 TODAY, F7 is not a hypothetical
  gate — on every plausible input it is a DO-NOT-RUN verdict that can and should be evaluated
  BEFORE any data spend. Two consequences I require before this freezes as the standing spec:
  (1) the prose (hypothesis, universe 'WHY THIS GIVES BREADTH', confirmability-precheck PASS
  BAND, body) must be corrected to state HONESTLY that the most likely F7 outcome is a
  do-not-run, and must STOP asserting <=2-3yr as achievable — the honest posture is 'this is
  probably the firm's next honest do-not-run, and F7 is the mechanism that proves it cheaply,'
  not 'breadth gets us inside the bar'; (2) F7's 'decayed per-bet Sharpe s' input must be
  pinned to the PUBLISHED-AND-DECAYED number (0.20), NOT a backtest-realized quantity —
  otherwise F7 is circular (it needs the backtest it is meant to gate) and silently ceases to
  be a pre-backtest gate. Secondary, non-blocking: pin the regime-bucket dating source (F3),
  the exact 2011-2015 / March-2020 episode calendar boundaries (F4), and the eff-independent-
  bet estimator formula (F5/G5), each of which is a small post-hoc lever if left unfrozen. I
  also record that the deflation denominator is second-order here (the BLdP expected-max-Sharpe
  hurdle rises only ~0.13 sigma_SR going from 7 mechanisms/N=37 to the full 21/N=51), so the
  '37 is honest, 21 over-corrects' framing overstates the cost of conservatism; I exercise my
  upward-revision authority only to record that N=51 is equally defensible and nearly free, not
  to mandate it. NET DISPOSITION: do NOT freeze the prose as the firm's standing spec as-is.
  The criteria and accounting are sound; the confirmability NARRATIVE is not. Revise the prose
  to the honest do-not-run posture and resolve the F7 input scope, THEN freeze. The corrected
  artifact would be a model pre-registration: it would correctly spend ZERO honest-N by firing
  F7 at $0 before any data purchase — which is exactly the QRB-6 discipline the firm earned.

