body: |
  RIGOR AUDIT — what survives, what does not, and why the verdict is needs-revision.

  WHAT SURVIVES (and I affirm without softening): The falsification machinery is genuinely
  rigorous. All seven criteria carry fixed numeric thresholds (DSR<0.95, residual<0.20, >50%
  AND <=0, crash-floor -0.50, eff-bets<4 OR corr>0.6, >=20yr AND 2009, years-to-validate>3.0)
  with named inputs; F1-F5 are evaluated once on the committed backtest with the HOLDOUT
  touched exactly once; F6/F7 are $0 pre-gates that BLOCK rather than flag. The single-program
  accounting is correct and is the artifact's best section: 24 correlated cross-asset contracts
  = one honest-N unit = one risk limit (30->31), breadth real in normal regimes but NOT in the
  tail (corr->1 in liquidation), cross-lens convergence discounted to one mechanism. My own
  exploration-cycle dissents #1 and #3 are honored verbatim, not paraphrased away. The
  deflation to 37 honors the ratified F-008 ruling and I do not force it upward — I verified it
  is second-order (full-21 raises the BLdP hurdle by only ~0.13 sigma_SR).

  WHAT DOES NOT SURVIVE (the veto): the confirmability NARRATIVE. The artifact stakes its
  entire reason-for-existence on the claim that cross-asset breadth brings years-to-validate
  into the <=2-3yr band. I evaluated the pre-reg's OWN F7 formula on its OWN honest inputs and
  it is false by 1-2 orders of magnitude: 37-92 years across the full claimed breadth range,
  ~59 years even in the most generous construction. To clear 3yr at the deflated alpha needs a
  net annual Sharpe ~2.2; the best honest decayed number is ~0.5. Breadth helps by sqrt(B)
  (~2-3x); the gap is ~7-11x. This is QRB-6 in new clothes — the data class escaped W4 (real
  volume) but the events/yr x per-event-Sharpe arithmetic that killed QRB-6 is intact.

  WHY THIS IS NEEDS-REVISION, NOT A CLEAN SURVIVES, AND NOT A FLAT KILL. It is not a clean
  survives because freezing prose that asserts an arithmetically-false plausibility claim as
  the firm's STANDING SPEC would re-import exactly the over-claim the 2026-05-31 honest-review
  reset existed to purge — an unwary Board could read 'breadth gets us inside the bar' as a
  green light. It is not a flat kill because the MACHINERY is correct and, crucially, F7 will
  do its job: on published inputs it fires a DO-NOT-RUN for $0 BEFORE any data spend or honest-N
  decrement. The honest fix is small and surgical: (1) rewrite the confirmability prose to the
  true posture — 'F7 is expected to fire; this is most likely the firm's next honest do-not-run,
  proven cheaply' — and delete every assertion of <=2-3yr as achievable; (2) pin F7's per-bet
  Sharpe input to the published-decayed 0.20 (not a backtest-realized quantity) so F7 is a real
  $0 PRE-gate and not circular; (3) freeze the three minor DOFs (F3 regime-dating source, F4
  episode calendar boundaries, F5/G5 eff-bet estimator). With those corrections this becomes a
  model pre-registration: it would correctly spend ZERO honest-N by firing F7 before any
  purchase. The criteria are sound; the story they are wrapped in is not — fix the story, then
  freeze.

