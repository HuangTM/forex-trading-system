deflation-audit: >
  37 effective trials (honest-N=30 + 21-surface booked as ~7 mechanisms) is DEFENSIBLE and
  honors the standing ratified ruling (consensus Discipline #3 / PR F-008: '~6-7 distinct
  mechanisms, not naive 21'). I do NOT force an upward revision, for a reason the pre-reg
  itself should have stated: the deflation is SECOND-ORDER here, not load-bearing. I computed
  the Bailey-Lopez de Prado expected-max-Sharpe hurdle E[max SR]/sigma_SR at N=31, 37, 51
  (full-21), 67: it grows only logarithmically — 2.087, 2.159, 2.284, 2.386. Booking the full
  21 (N=51) instead of 7 mechanisms (N=37) raises the hurdle by only ~0.13 sigma_SR. So the
  pre-reg's framing that 'naive 21 over-corrects' slightly overstates the cost of conservatism
  — the conservative choice is nearly free. I exercise my upward-revision authority to RECORD
  that N=51 (full 21) is also fully defensible and changes the bar negligibly; I do not mandate
  it, but I REMOVE the artifact's implied claim that 21 would be a meaningful over-correction.
  The DSR pass-bar of 0.95 is a posterior-probability threshold (P[true SR>0] post-deflation),
  the firm's ratified bar; N enters through the deflation denominator, not the threshold, so
  0.95 is used correctly and is appropriate at 37 (or 51) effective trials. NET: deflation is
  honest and not under-counted; it is simply NOT the gate that decides this direction.

confirmability-power-audit: >
  THIS IS THE LOAD-BEARING FINDING AND IT IS A FAIL. I evaluated the pre-reg's OWN frozen F7
  formula — years-to-validate(80% power) = (z_0.8 + z_{1-alpha})^2 / S_prog^2, with
  S_prog = s*sqrt(B), z_0.8 = 0.8416, and z_{1-alpha} set by the compound deflation
  (eff trials 37 -> one-sided alpha ~0.05/37 -> z~3.00; or 0.025/37 -> z~3.21). Using the
  pre-reg's OWN honest inputs (published FX-sleeve gross 0.40 x 0.50 McLean-Pontiff decay =
  0.20 per-bet; B = 4..10 effective bets, the pre-reg's claimed range): years-to-validate is
  37-92 years at B=10..4 (z=3.00) and 41-103 years (z=3.21). The MOST GENEROUS corner I could
  construct — taking Hurst's fully-diversified gross ~1.0, decayed x0.5 = 0.50 as the DIRECT
  net program Sharpe (not building it up from per-bet) — still yields ~59 years. Inverting the
  formula: to validate in <=3yr at the deflated alpha you need a net ANNUAL program Sharpe of
  ~2.2 — roughly 4-5x the highest GROSS UNDECAYED diversified trend Sharpe ever published
  (~1.0). Even with NO deflation at all (raw alpha=0.05, z=1.645) you need annual Sharpe ~1.44,
  still above any honest decayed trend number. This is fully consistent with the firm's own R5
  precedent (a true ~0.30 annual Sharpe gives only 20-35% power over the WHOLE carry universe
  history; a ~0.77 series 'will take years'). CONCLUSION: the pre-reg's central thesis —
  'cross-asset BREADTH compresses years-to-validate below the <=2-3yr bar' — is
  ARITHMETICALLY FALSE under its own formula, by 1-2 orders of magnitude. Breadth raises
  S_prog by sqrt(B) (a factor ~2-3x), but the bar needs a factor of ~7-11x. This is the QRB-6
  power-infeasible trap in new clothes: the data class changed (futures, real volume), but the
  events/yr x per-event-Sharpe arithmetic that killed QRB-6 is essentially intact. F7 is
  therefore not a hypothetical gate that 'might' fire — on every plausible input it is a
  DO-NOT-RUN verdict computable $0 TODAY. The pre-reg's machinery is RIGHT to include F7;
  its PROSE is wrong to present <=2-3yr as achievable.

single-program-accounting-ok: >
  YES, and it is the strongest section of the artifact. Treating 24 correlated cross-asset
  trend contracts as ONE honest-N unit / ONE risk envelope / ONE program (30->31, never
  one-per-sleeve) is correct: cross-asset trend correlations converge to 1 in liquidation
  regimes, so the breadth is real in NORMAL regimes but does NOT diversify the tail — the
  artifact states this explicitly and does NOT smuggle breadth as independent confirmation.
  Cross-lens convergence (trend surfaced via 3 generation lenses) is correctly discounted to
  ONE mechanism (my dissent #1 from the exploration cycle, honored verbatim, not paraphrased).
  ONE subtle tension to flag, not a veto: effective-breadth B is used in TWO roles — as the
  confirmability LEVER in F7 (more bets -> shorter horizon) and as the single-program
  CONSTRAINT (one bet for honest-N). These are consistent (statistical power vs governance
  accounting are different axes), but the artifact must never let a high reported B in F7 leak
  back into honest-N as '>1 confirmation.' As written it does not. OK.

