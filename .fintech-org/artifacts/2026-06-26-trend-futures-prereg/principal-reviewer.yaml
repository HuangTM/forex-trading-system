body: |
  SOUNDNESS REVIEW — multi-pair/cross-asset trend-futures pre-registration (FROZEN).

  VERDICT: approve-with-conditions. As a FROZEN DESIGN artifact this is methodologically
  strong and unusually honest: it commits every window boundary, universe member, threshold,
  deflation count, and kill condition single-shot; it honors the two carried conditions
  (F-008 selection-surface booked as ~7 mechanisms and COMPOUNDED into the DSR denominator,
  not +1; F-001's spirit met for the PRIMARY gate F1 which is itself a deflation-bearing
  significance test); and it correctly refuses to double-count cross-asset breadth (one
  honest-N unit, one risk limit). None of my seven findings block the design. Three are
  blocking-for-the-committed-backtest and should be closed before an honest-N unit is spent.

  1. CPCV / PURGE / EMBARGO (sound, one seam open). Purge = 13mo (12mo lookback + 1mo hold)
  correctly EXCEEDS the label/holding horizon — this is the right dominant-leakage control for
  a 12mo-lookback label, and the artifact correctly identifies label leakage as the dominant
  risk. C(10,2)=45 paths is adequate (a standard CPCV resolution; the distribution-of-45 +
  median-path-to-DSR is the right reporting). The one open leakage surface (F-002): the embargo
  is written one-sided ("after each test fold") while purge is two-sided, and — more important —
  the TRAIN+TEST↔HOLDOUT seam at 2021-12-31 is not stated to be purged, so a late-2021 label's
  12mo window can read 2022 holdout prices. Minor, mechanical, fixable.

  2. DEFLATION / F-008 (substantively honored). Booking the 21-direction surface as ~6-7
  distinct MECHANISMS rather than naive-21 (over-corrects) or +1 (under-corrects, the exact
  2026-05-31 reset failure) is the correct non-naive reading, and compounding it into the DSR
  denominator (eff-trials = 30 + 7 = 37, revisable upward only by NHT) is sound. Residual gap
  (F-003): the within-direction parameter surface (lookback/vol-target/universe) is pre-committed
  single-shot here — good — but lookback/vol were picked at a published optimum, a mild snoop not
  in the 37. Second-order; the upward-only lever covers it. The DSR<0.95 threshold is the firm's
  ratified bar and is the right one at this eff-N; the artifact asserts rather than demonstrates
  the DSR value (acceptable pre-data; becomes a must-show at the committed step).

  3. REGIME-CRASH INCLUSION (mostly machine-checkable). F6 ('>=20yr AND 2009 in-sample') and F4
  (crash-floor net Sharpe < -0.50 on the union of 3 episodes) are frozen and checkable. Gap
  (F-004): only 2009 is an independent hard block; 2011-15 and Mar-2020 are mandated in prose but
  rely on transitive coverage. Add per-episode date-range coverage assertions so 'no recent-low-
  vol-only window' is enforced per-episode, not by inference.

  4. POWER PRE-CHECK (the headline finding, F-001). I verified the formula is algebraically
  correct (I initially suspected a dimensional error — annual Sharpe substituted where a per-event
  IR belongs — and RETRACTED it: events/yr cancels, years ≈ 6.18/S_prog^2 is the correct reduction
  of the canonical rubric). The gate is therefore SOUND and machine-checkable. The finding is about
  the HONEST EXPECTATION: under the firm's own numerator and the artifact's own decayed inputs
  (B≈6-10 bets, per-bet decayed Sharpe ≈0.20 → S_prog ≈0.5-0.6), years-to-validate ≈ 10-40yr. To
  clear ≤3.0yr you need S_prog ≥ 1.44; to clear the canonical ≤2.0yr G1 bar you need S_prog ≥ 1.76.
  No plausible decayed diversified-trend Sharpe reaches that. CONSEQUENCE: F7 is, on its own
  numbers, a near-certain DO-NOT-RUN — which is exactly the QRB-6 posture the artifact invokes, so
  this is the gate WORKING, not failing. The blocking-for-backtest sub-issue is the THRESHOLD
  MISMATCH: F7 fires at >3.0yr, but the firm's canonical confirmability rubric grants a backtest
  slot only at ≤2.0yr (2-3yr is merely 'STRETCH'). F7 as written would admit a STRETCH direction
  the canonical gate denies. Reconcile the two before the committed step.

  5. FALSIFICATION CRITERIA (6 of 7 frozen-number; one soft; F-001 residual on F3/F4/F5). F1, F2,
  F4, F5, F6, F7 all carry frozen numbers. F3 is the soft one (F-005): '>50% of net edge in a
  single macro-regime bucket' does not bind to the pre-declared 6-cell grid and does not name the
  edge-attribution metric (Sharpe/return/risk-adjusted) — a post-hoc stratification choice surface.
  Separately, the prior F-001 condition (kill-tests gate on SIGNIFICANCE at honest eff-N, not point
  estimates) is met for the PRIMARY gate F1 (DSR is a deflation-bearing significance test) but NOT
  for F3/F4/F5, which are raw point-estimate thresholds with no CI / significance band at eff-N.
  For a kill that ends a direction, a point estimate on one CPCV median path is the exact fragility
  F-001 named; at minimum F4/F5 should report the path-distribution band, not just the point.

  6. DATA-SPEC (executable, bias-aware, one knob left open). Concrete and executable: 24 named
  contracts, daily OHLCV+volume+OI, >=20yr, named sources at ~$250-500/yr with a free coverage-check
  tier, reversible Board spend. Bias-awareness is GOOD instinct — roll method is named as a frozen
  cost-manifest item ('a different roll = a different strategy'), roll cost is added explicitly so
  the cheap probe's omission cannot silently re-enter, per-contract (not single-average) ticks, EM/thin
  caveats (6M, NG). The one open knob (F-006): the actual back-adjust method (Panama/ratio/none) and
  roll trigger (OI-cross vs N-days-pre-expiry) are deferred to acquisition rather than FROZEN now —
  and for a TREND backtest the back-adjust choice is first-order (additive Panama distorts long
  energy histories, can produce negative synthetic prices). For an artifact whose whole discipline is
  'freeze every knob', freeze this one too.

  NET. This is the firm's most credible attempt yet to escape the dataset wall, and it is honest
  about the one thing that decides its fate — confirmability — being the binding risk, with cost
  already settled by the probe. The arithmetic I independently ran says the confirmability gate
  will very likely fire (do-not-run), which is the design behaving correctly, not a flaw. Approve
  the FROZEN design; carry F-001 (threshold reconciliation + honest do-not-run expectation), F-002
  (holdout-seam purge), and F-006 (freeze roll/back-adjust) as conditions to close before the
  Board-gated honest-N spend.

knowledge_gaps:
  - "The realized effective-bet count B for the 24-contract program — computable $0 from AMP-2013/Hurst-2017 published correlation tables before any spend; it determines whether F7 fires. The artifact routes this to quant-developer; until computed, my ~6-10 figure is the artifact's own estimate, not a verified value."
  - "Whether the firm intends F7 to use the canonical 1-sided alpha=0.05 numerator (6.18) or the compound-deflation alpha (eff-trials=37, numerator ~14.8). My finding holds under both; the choice changes the magnitude of the do-not-run margin, not its direction."
  - "The exact T (sample length in the CPCV pool, ~earliest-1990s through 2021) needed to compute the actual DSR at eff-N=37 — not derivable from the design artifact (data not acquired)."
