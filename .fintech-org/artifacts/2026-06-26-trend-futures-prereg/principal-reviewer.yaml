soundness-checks:
  cpcv-purge-embargo-sized-correctly: >
    yes — purge = 13mo (12mo lookback + 1mo hold) exceeds the label/holding horizon and
    is the correct dominant-leakage control for a 12mo-lookback label; +1mo embargo (14mo
    total band) is defensible. ONE residual leakage surface (F-002 below): the embargo is
    one-sided in the prose ("after each test fold") while the purge is explicitly two-sided
    ("each side of every test fold"); the holdout boundary (2021-12-31 / 2022-01-01) is NOT
    itself purged+embargoed, so a label constructed in late-2021 reads 2022 holdout prices.
  deflation-f008-adequate: >
    partially — booking the 21-direction surface as ~7 mechanisms (eff-trials = 30 + 7 = 37)
    is a defensible, non-naive reading of F-008 and is correctly compounded into the DSR
    denominator rather than +1. Two gaps (F-003): (a) the 37 omits the within-this-direction
    selection surface (12mo lookback, 1mo rebalance, 15% vol target, 24-vs-22 universe,
    risk-parity scheme are all pre-committed single-shot here — good — but the lookback/vol
    knobs were themselves picked from a published-best, a mild snoop not booked); (b) DSR<0.95
    is the firm's bar at honest-N but the artifact does not show the DSR computed at T (sample
    length) under eff-N=37 — the threshold is asserted, not demonstrated (acceptable for a
    design artifact; becomes blocking at the committed step).
  regime-crash-machine-checkable: >
    yes for COVERAGE (F6: ">=20yr AND 2009 episode in-sample" is checkable on the acquired
    manifest). PARTIAL for the crash-SURVIVAL and no-low-vol-only conditions: F4 uses a frozen
    number (-0.50 crash-floor Sharpe on the union of 3 episodes) — checkable. But "no recent-
    low-vol-only window" is enforced only indirectly via F6's 2009-coverage requirement; the
    2011-15 "long winter" and Mar-2020 episodes are MANDATED in prose but have no independent
    machine-checkable coverage gate (only 2009 blocks). See F-004.
  power-precheck-sound: >
    yes as a GATE, with a material caveat (F-001, the headline finding): the years-to-validate
    formula is algebraically correct (years ≈ (z_pow+z_alpha)^2 / S_prog^2; the events/yr cancels
    against the per-event IR — I verified this against the firm's canonical confirmability rubric
    and retract an initial dimensional-error suspicion). BUT under the firm's OWN canonical
    numerator (6.18, alpha=0.05 1-sided) an honestly-decayed diversified-trend program
    (S_prog ≈ 0.4–0.8) yields years-to-validate ≈ 10–40yr; even S_prog=1.2 gives ~4.3yr.
    To reach ≤3.0yr requires S_prog ≥ 1.44; to reach the rubric's actual ≤2.0yr G1 bar
    requires S_prog ≥ 1.76. The pre-reg's own breadth estimate is ~6–10 effective bets, which
    at a 50%-decayed per-bet Sharpe (~0.20) gives S_prog ≈ 0.20·sqrt(8) ≈ 0.57 → ~19yr.
    The gate is SOUND; the honest expectation is that F7 FIRES (do-not-run) on realistic inputs.
  falsification-criteria-frozen-numbers: >
    yes for F1/F2/F4/F5/F6/F7 (all carry frozen numbers). F3 is the one soft criterion:
    ">50% of net edge concentrated in a single bucket AND net-Sharpe-ex-bucket <= 0" — the
    "single macro-regime bucket" is not pinned to a frozen bucketing partition, and ">50% of
    net edge" has no defined attribution method (Sharpe? return? risk-adjusted?). See F-005.
    Separately (F-001): F3/F4/F5 are raw point-estimate thresholds with NO significance band /
    CI at honest effective-N — the exact gap the prior F-001 condition named for kill-tests.
  data-spec-executable-and-bias-aware: >
    yes — concrete (24 named contracts, daily OHLCV+volume+OI, >=20yr, named paid sources at
    ~$250-500/yr, free-tier for the coverage check). Roll/back-adjust is NAMED as a frozen-
    manifest item ("a different roll = a different strategy") — the right instinct. But the
    roll convention is declared TBD-at-acquisition rather than frozen NOW (Panama/ratio/none,
    roll trigger = OI-cross vs N-days-before-expiry), which is a survivorship/continuity bias
    surface left open. See F-006.

findings:
  - id: F-001
    severity: major
    location: "confirmability-precheck (lines 229-246); falsification-criteria F7 (line 161); cross-check vs references/intraday_confirmability_screening_rubric.md lines 19-22, 42, 155"
    category: power-arithmetic / honest-expectation
    observation: >
      The years-to-validate formula is correct, but under honest decayed inputs the program
      Sharpe needed to clear the ≤3.0yr F7 gate (S_prog ≥ 1.44) is far above any plausible
      decayed diversified-trend Sharpe (~0.4–0.8; the probe's single-sleeve residual was ~0.40,
      Hurst diversified gross 0.7–1.0 × 50% McLean-Pontiff = ~0.35–0.50). I computed years-to-
      validate ≈ 19yr at the pre-reg's own central case (B≈8 effective bets, s≈0.20 decayed).
      Two sub-issues: (1) the gate is, on its own numbers, a near-certain DO-NOT-RUN; (2) the
      F7 threshold (>3.0yr) is LOOSER than the firm's canonical G1 confirmability bar (≤2.0yr,
      with 2–3yr only "STRETCH"), so F7 would admit a STRETCH direction the canonical rubric
      would deny a backtest slot.
    inference: >
      This is not a defect in the DESIGN — it is the design working: the pre-reg explicitly
      frames F7 as the QRB-6-style do-not-run gate, and the honest arithmetic says it will
      very likely fire. The risk is narrative, not methodological: if any reader expects this
      direction to PASS F7, that expectation is unsupported by the firm's own formula. The
      blocking-for-committed-backtest item is the bar mismatch (3.0yr vs the canonical 2.0yr).
    evidence: >
      Independent computation (scipy): with canonical numerator 6.18, S_prog=0.8 → 9.66yr,
      S_prog=1.2 → 4.29yr, S_prog=1.44 → 2.98yr. Cross-checked against the rubric's own worked
      anchor (IR 0.10 @ 350 events/yr → 1.77yr). Probe residual ~0.40 single-sleeve; the probe
      itself states "portfolio-level Sharpe ... not modeled" (knowledge_gaps).
    recommended-action-class: align-thresholds / state-honest-expectation
    owning-role: quant-researcher (author) + NHT (owns the eff-N/alpha denominator) + Head of Quant Research (owns the canonical G1 bar; reconcile F7's 3.0yr vs rubric's 2.0yr)

  - id: F-002
    severity: minor
    location: "metric — PURGE/EMBARGO (lines 124-131); windows — HOLDOUT boundary (lines 99-103)"
    category: leakage-surface
    observation: >
      Embargo is specified one-sided ("after each test fold"); purge is two-sided. More
      importantly, the TRAIN+TEST↔HOLDOUT seam at 2021-12-31/2022-01-01 is not stated to carry
      a 13mo purge — a label whose 12mo lookback window straddles end-2021 can read into the
      2022 holdout, leaking the locked holdout into in-sample label construction.
    inference: >
      For a 12mo-lookback label the train/holdout seam is exactly where the dominant leakage
      lives; a one-sided embargo and an unpurged holdout boundary are the two places it re-enters.
    evidence: "financial-ml-methodology rubric 1 (purge must drop train obs whose label window overlaps test); the artifact purges WITHIN the CPCV pool but is silent on the pool↔holdout seam."
    recommended-action-class: specify-symmetric-purge-embargo-including-holdout-seam
    owning-role: quant-researcher

  - id: F-003
    severity: minor
    location: "metric DEFLATION (lines 132-141); generation-surface-declaration (lines 213-227)"
    category: multiple-testing-completeness
    observation: >
      eff-trials = 37 books the org-wide N (30) and the cross-direction surface (~7) but not the
      within-direction parameter surface (lookback=12mo, rebalance=1mo, vol-target=15%, risk-parity
      weighting, 24-vs-22 universe). These are pre-committed single-shot here (good, and the
      published-OOS basis genuinely mitigates), but lookback/vol were chosen at a published
      optimum — a mild residual snoop not reflected in the 37.
    inference: >
      F-008 is substantively honored (surface booked as mechanisms, compounded, revisable only
      upward). The residual is second-order and the "revise upward only" lever covers it — note
      it so NHT does not silently treat 37 as a floor that already includes everything.
    evidence: "PR F-008 condition (prior review, lines 240-259) requires the selection surface in eff-N; the artifact addresses the cross-direction surface explicitly and the within-direction surface implicitly via single-shot freezing."
    recommended-action-class: note-residual-surface-for-NHT-ratification
    owning-role: null-hypothesis-tester

  - id: F-004
    severity: minor
    location: "windows REGIME-CRASH INCLUSION (lines 106-114); falsification F4 (line 158), F6 (line 160)"
    category: machine-checkability
    observation: >
      F6 blocks only on the 2009 episode + >=20yr. The 2011-2015 "long winter" and March-2020
      are MANDATED in prose but have no independent coverage gate; a manifest that covers 2009
      and >=20yr but (implausibly, yet not blocked) excludes Mar-2020 would pass F6.
    inference: >
      The no-low-vol-only intent is mostly enforced (2009 + 20yr brackets the others in practice),
      but "machine-checkable" should mean each mandated episode has its own date-range coverage
      assertion, not rely on transitive coverage.
    evidence: "log-as-decision-trace item 1/2 (outcome + all driving inputs as enumerable checks); F6 names only one of three mandated episodes as a hard block."
    recommended-action-class: add-per-episode-coverage-assertions-to-F6
    owning-role: quant-researcher

  - id: F-005
    severity: minor
    location: "falsification F3 (line 157)"
    category: disguised-flexibility
    observation: >
      F3 ("> 50% of net edge concentrated in a single macro-regime bucket AND net-Sharpe-ex-bucket
      <= 0") leaves two things unpinned: the bucket partition (the {hiking,easing,on-hold}×{risk-on,
      risk-off} grid is named in metric but F3 does not bind to it) and the edge-attribution method
      (% of Sharpe vs % of return vs % of risk-adjusted PnL).
    inference: >
      Post-hoc choice of "which bucketing" or "which attribution" is exactly the data-snooping-in-
      stratification clothing the methodology rubric warns against. The number (50%) is frozen; the
      operationalization is not.
    evidence: "financial-ml-methodology rubric 4 (strata must be pre-declared); metric defines a 6-cell grid but F3 says only 'a single macro-regime bucket'."
    recommended-action-class: bind-F3-to-the-pre-declared-grid-and-name-the-attribution-metric
    owning-role: quant-researcher

  - id: F-006
    severity: minor
    location: "data-spec (lines 163-195); cost-model ROLL (lines 248-260)"
    category: futures-continuation-bias
    observation: >
      The artifact correctly names roll method as part of the frozen cost manifest and flags
      "a different roll = a different strategy", but defers the actual roll convention to
      acquisition time rather than freezing it NOW (back-adjust = Panama/ratio/none; roll trigger
      = first-of-month vs OI/volume cross vs N-days-pre-expiry). Back-adjustment choice materially
      biases trend backtests (negative-price artifacts under additive Panama on energies; level
      distortion on long histories).
    inference: >
      For a FROZEN pre-reg whose discipline is "commit every knob now", the roll/back-adjust
      convention is a knob with first-order impact on a TREND backtest and should be frozen, not
      TBD. Leaving it open is a (small) post-hoc flexibility surface.
    evidence: "data-spec records roll 'as part of the FROZEN cost manifest' but does not state the convention; cost-model adds roll cost explicitly (good) yet does not pin the method."
    recommended-action-class: freeze-back-adjust-method-and-roll-trigger-now
    owning-role: quant-researcher (with quant-developer at acquisition)

  - id: F-007
    severity: observation
    location: "single-program-accounting (lines 197-211); assumptions (line 299)"
    category: tail-vs-confirmability tension (correctly identified, worth surfacing)
    observation: >
      The artifact is internally honest that the SAME cross-asset correlation that delivers the
      confirmability breadth (low corr in normal regimes) collapses to ~1 in liquidation — i.e.
      breadth helps the denominator (years-to-validate) precisely in the regimes where it does NOT
      help the tail. The honest-N=1 single-program accounting is the right response.
    inference: >
      No action — this is a STRENGTH (the design refuses to double-count breadth). Flagged so the
      Board reads F5 (breadth) and F4 (crash) as a coupled pair: passing F5 in normal regimes does
      not buy tail protection, and F7's breadth-driven confirmability is borrowed from the same
      correlation structure F4 says will fail in a crash.
    evidence: "single-program-accounting (c)/(d); CRO blowup-analog (managed-futures long winter = one correlated bet)."
    recommended-action-class: none (praise / surface-coupling)
    owning-role: n/a

