hypothesis: >
  IF 12-month time-series momentum (TSMOM — the sign of the trailing 12-month
  vol-scaled excess return, rebalanced monthly) is harvested as ONE diversified,
  risk-parity, program-level book spanning liquid CME/CBOT/NYMEX futures across
  THREE asset classes (FX + commodities + rates), THEN the program's net-of-real-
  futures-cost edge (gross trend Sharpe, post-decay ~0.20 per bet) is REAL —
  because the trend / time-series-momentum risk premium is a documented OOS
  survivor across a century of cross-asset evidence (Moskowitz-Ooi-Pedersen 2012;
  Hurst-Ooi-Pedersen 2017) and futures round-trip cost at 12-month-signal
  turnover is negligible (probe: residual net Sharpe ~0.40 vs a 0.20 gate) — BUT
  it is NOT CONFIRMABLE within the firm's <=3yr bar: cross-asset breadth lifts
  effective bets from ~2-4 to ~4-10 and shortens years-to-validate from centuries
  toward decades, NOT toward years (F7 computes ~37-92yr on honest decayed
  inputs). The pre-registered, frozen disposition is therefore that F7 FIRES
  DO-NOT-RUN at $0; the committed backtest is NOT authorized. (Falsifiable: F7's
  years-to-validate <= 3.0yr would clear it; on published-decayed inputs it does
  not.)

alpha-source: >
  WHY THE TREND PREMIUM PERSISTS AND IS NOT ARBED (honest evidence-layer
  calibration). The time-series-momentum / trend premium is the single most
  replicated systematic trading result in academic finance: MOP-2012 documents
  it OOS 1985-2012 across 58 futures incl FX; Hurst-Ooi-Pedersen-2017 extends it
  to ~100 years across equities, bonds, commodities and FX. The economic
  grounding is behavioral + structural and is NOT a free lunch: (a) under-reaction
  to information diffusing slowly through a market (anchoring, disposition
  effect), then (b) over-reaction / herding that extends trends, with (c) a
  documented CRASH-RISK premium component — trend pays a positive premium in
  exchange for sharp, correlated drawdowns at trend REVERSALS (2009 whipsaw, the
  2011-2018 "long winter", March-2020). This is precisely why it is not arbed
  away: the premium is COMPENSATION for bearing the reversal-crash risk that
  rational arbitrageurs decline to hold; an arbitrageur who shorts the crowded
  trend is the one who blows up in the reversal. The persistence is therefore a
  risk premium, not a pricing error — consistent with the forex-trading EVIDENCE
  LAYER, which lists momentum as one of only two peer-reviewed OOS-documented
  systematic edges (alongside carry), with the explicit caveat that it is
  gross-of-cost and crash-prone. HONEST CALIBRATION: published gross Sharpes
  (~0.4 single-asset FX-futures sleeve; ~0.7-1.0 fully diversified) are GROSS,
  carry wide bands, and PRE-DATE post-publication decay; a McLean-Pontiff decay
  haircut (~35-58%) is applied before any plausibility claim, and NO edge number
  is asserted here — the committed backtest establishes the firm's net edge.

universe: >
  ONE diversified, frozen, program-level universe of liquid, continuously-traded,
  back-adjusted continuous futures, deliberately spanning THREE low-cross-
  correlated asset classes to maximize EFFECTIVE breadth (the confirmability
  lever). Total = 24 contracts, frozen at this freeze; no addition/removal after
  data is seen.

  SLEEVE 1 — FX futures (8): 6E (EUR), 6B (GBP), 6J (JPY), 6A (AUD), 6C (CAD),
    6S (CHF), 6N (NZD), 6M (MXN). [CME/Globex]
  SLEEVE 2 — Commodity futures (10): CL (WTI crude), NG (nat gas), HO (heating
    oil) [NYMEX energy]; GC (gold), SI (silver), HG (copper) [COMEX metals];
    ZC (corn), ZS (soybeans), ZW (wheat) [CBOT ags]; LE (live cattle) [CME].
  SLEEVE 3 — Rates futures (6): ZT (2y), ZF (5y), ZN (10y), ZB (30y) [CBOT US
    Treasuries]; plus 2 international rate sleeves where data permits: a
    Euro-Bund-equivalent and a Short-STIR-equivalent (declared as the
    "rates-international" slots; if backtest-grade continuous data is
    unavailable at acquisition, these two slots are DROPPED — universe becomes
    22, recorded as a frozen contingency, NOT re-optimized).

  WHY THIS GIVES BREADTH: a single-pair futures TSMOM flips ~4x/yr → effective-N
  far too low to confirm in <=3yr (the binding wall). Within FX, the 8 contracts
  are USD-cross-loaded and collapse to ~2-4 EFFECTIVE independent bets (W2). The
  decisive breadth unlock is the CROSS-ASSET span: commodity-trend and
  rates-trend are empirically LOW-correlated to FX-trend OUTSIDE liquidation
  regimes (AMP-2013; Hurst-2017 publish the cross-asset correlation matrices).
  A 24-contract cross-asset program plausibly reaches ~6-10 effective independent
  bets — the ONLY structural path that brings years-to-validate toward the
  <=2-3yr bar. This breadth is MANDATORY, not optional, per the ratified
  consensus and the NHT/CRO single-program ruling.

windows: >
  DATA NOT YET ACQUIRED — this section specifies the INTENDED, frozen window
  STRUCTURE that the committed backtest MUST honor; it is not yet populated.
  MINIMUM HISTORY: >=20 years of clean back-adjusted continuous daily series per
  contract (target 1990-present where available; absolute floor 2000-present).
  The >=20yr floor is a HARD precondition because it is the only way to bracket
  multiple distinct macro regimes AND multiple trend-crash episodes.

  STRUCTURE (single-pass, frozen boundaries — no sliding/re-fitting after seeing
  results; CPCV does the resampling within TRAIN+TEST):
    - TRAIN+TEST pool: earliest-available through 2021-12-31. CPCV folds + purge
      + embargo are applied WITHIN this pool (see metric).
    - HOLDOUT (locked, untouched until the single final evaluation):
      2022-01-01 → most-recent-complete-year. Evaluated EXACTLY ONCE.
    - FORWARD-CONFIRMATION look-date: pre-declared at the committed-backtest step
      as part of the confirmability pre-check (a fixed calendar date, QRB-6-style
      lock), NOT chosen after seeing in-sample results.

  REGIME-CRASH INCLUSION (MANDATORY, CRO condition): the TRAIN+TEST pool MUST
  include at least these trend-momentum CRASH / reversal episodes IN-SAMPLE — it
  may NOT be a recent-low-vol-only window:
    (1) the 2009 post-GFC trend reversal / sharp risk-on whipsaw;
    (2) the 2011-2015 managed-futures "long winter" choppy drawdown;
    (3) the March-2020 COVID volatility spike + cross-asset correlation-to-1 event.
  If the acquired history cannot cover episode (1), the >=20yr floor is breached
  and the design is BLOCKED pending deeper data (machine-checkable; see
  falsification-criteria #6).

metric: >
  PRIMARY: Deflated Sharpe Ratio (Bailey-Lopez de Prado) on NET-of-real-futures-
  cost, PROGRAM-LEVEL returns, computed under Combinatorial Purged Cross-
  Validation (CPCV).
    - CPCV configuration (FROZEN): N = 10 groups, k = 2 test groups per
      combination → C(10,2) = 45 train/test splits; report the DISTRIBUTION of
      net Sharpe across the 45 paths and the median path Sharpe as the point
      estimate fed to DSR.
    - PURGE: remove from TRAIN any observation whose label-construction window
      overlaps the TEST window. Sized to the SIGNAL HORIZON: purge = 12 months
      (the lookback) + 1 month (the holding/rebalance) = 13 months on each side
      of every test fold. Non-negotiable: the 12-month lookback makes label
      leakage the dominant lookahead risk here.
    - EMBARGO: an additional 1-month embargo after each test fold to kill
      serial-correlation bleed from the monthly rebalance. Total exclusion band
      around a test fold = 13mo purge + 1mo embargo = 14 months.
    - DEFLATION (the load-bearing honesty gate — applied as a COMPOUND
      denominator): the DSR multiple-testing correction deflates against the
      EFFECTIVE number of trials = honest-N=30 (org-wide trial budget already
      spent) COMPOUNDED WITH the 21-direction generation SELECTION SURFACE
      (PR F-008): the 21-wide search is booked into effective-N as its honest
      MECHANISM count (~6-7 distinct mechanisms, NOT a naive 21 which
      over-corrects, NOT +1 which under-corrects), per the consensus § Disciplines
      #3. Frozen effective trial count for deflation = 30 + 7 = 37 (NHT owns
      final ratification of this denominator at the committed step; 37 is the
      pre-committed value).
    - REGIME-STRATIFIED (MANDATORY, W3): report net Sharpe SEPARATELY for
      {hiking, easing, on-hold} × {risk-on, risk-off} buckets AND for each of the
      three in-sample crash episodes, NOT just pooled. The pooled DSR is not
      sufficient on its own — a pass requires the crash-subsample condition
      (falsification #4) to also hold.
    - EFFECTIVE-BREADTH report (MANDATORY): report effective independent bets
      (post-correlation, G5 concentration-adjusted) for the program, NOT the raw
      24-contract count — this number drives the confirmability arithmetic.

falsification-criteria:
  # FROZEN, machine-checkable, single-shot. ANY ONE true => KILL the direction
  # at (or before) the committed backtest. No threshold may be moved after data
  # is seen. These are evaluated in order; #6 and #7 are PRE-backtest gates.
  - "F1 (net-DSR floor): program-level net-of-cost Deflated Sharpe Ratio < 0.95 under the frozen compound deflation denominator (effective trials = 37) on the CPCV median path. (0.95 is the firm's ratified DSR pass bar.)"
  - "F2 (cost-hurdle residual): published gross trend Sharpe, after a McLean-Pontiff post-publication decay haircut (use 0.50 retained = 50% haircut, the midpoint of the 35-58% range, pinned NOW), minus the modeled real-futures RT cost Sharpe drag, leaves < 0.20 residual gross Sharpe. (Probe established this PASSES at ~0.40 residual; F2 re-checks it on the frozen, decayed, program-turnover basis.)"
  - "F3 (regime concentration / W3): > 50% of net program edge is concentrated in a single macro-regime bucket AND the net Sharpe of the program with that bucket EXCLUDED is <= 0. (The trend premium must not be one regime in disguise.) FROZEN BUCKET-DATING SOURCE: each calendar month is labelled on TWO axes. Axis-1 (CB-cycle) = {hiking, easing, on-hold} from the sign of the trailing-3-month change in the US effective federal funds rate (FRED series DFF, monthly average): >+5bp = hiking, <-5bp = easing, else on-hold. Axis-2 (risk-on/off) from the sign of the trailing-3-month return of the S&P 500 total-return index (FRED SP500 / Shiller proxy pre-1990): >=0 = risk-on, <0 = risk-off. Both series are public, monthly, look-back-only (no revision-lookahead); the labelling rule is frozen here and not tuned on results."
  - "F4 (crash-subsample survival, CRO): the program's net Sharpe computed ON the union of the three mandated in-sample crash episodes is below its pre-declared crash-floor of -0.50 Sharpe, i.e. the strategy does not merely under-perform but is CATASTROPHIC in the exact regime the premium is supposed to compensate for. (Trend is EXPECTED to lose in reversals; F4 kills only an un-survivable crash, not a normal drawdown.) FROZEN TO-THE-DAY EPISODE BOUNDARIES (inclusive, calendar dates): (1) 2009 post-GFC trend reversal = 2009-03-09 → 2009-12-31; (2) managed-futures 'long winter' choppy drawdown = 2011-01-01 → 2015-12-31; (3) March-2020 COVID volatility spike + correlation-to-1 = 2020-02-19 → 2020-04-30. The union of these three date ranges is the F4 evaluation set, frozen here."
  - "F5 (diversification premise / breadth): realized program-level effective independent bets Neff < 4.0, OR realized average pairwise cross-ASSET-SLEEVE correlation > 0.6 on the TRAIN+TEST pool. FROZEN Neff ESTIMATOR: Neff = (sum_i w_i)^2 / (w^T R w), where w is the program's risk-parity weight vector (inverse-vol, normalised to sum 1) over the per-contract trend-return series and R is the realized correlation matrix of those per-contract net-of-cost return streams on the TRAIN+TEST pool. (This is the Strategic-Breadth / participation-ratio form; it equals the contract count when streams are uncorrelated and collapses toward 1 as correlations → 1.) Cross-ASSET-SLEEVE correlation = the mean off-diagonal of the 3x3 correlation matrix of the three sleeve-aggregate return streams (FX, commodity, rates). Both pinned here, not referenced. (If the cross-asset breadth that justifies the whole direction is not real OOS, the program collapses to a single USD-loaded bet and the confirmability case is void.)"
  - "F6 (data-floor / regime coverage — PRE-backtest gate): acquired clean history fails to cover >=20yr OR fails to include the 2009 trend-reversal episode in-sample. (Machine-checkable on the acquired manifest; BLOCKS the backtest, does not merely flag.)"
  - "F7 (confirmability power — PRE-backtest gate, QRB-6 lesson): the pre-declared power pre-check returns years-to-validate at 80% power > 3.0 years. FROZEN, NON-CIRCULAR INPUTS (computable TODAY at $0, BEFORE any data spend — F7 must NOT depend on the backtest it gates): per-bet annual Sharpe s = 0.20 (the PUBLISHED ~0.40 diversified-trend Sharpe after the F2 50% McLean-Pontiff decay haircut — a published-literature value, NOT a backtest-realized one); effective bets B in the most-generous plausible band 4-10; deflated one-sided alpha = 0.05/37 (z = 3.00) from the frozen 37-trial denominator; power 0.80 (z = 0.842). Program Sharpe S_prog = s*sqrt(B); years = (z_power + z_alpha)^2 / S_prog^2. COMPUTED RESULT: years-to-validate = 92yr at B=4, ~61yr at B=6, ~37yr at B=10 (most-generous construction ~37-59yr). Since all > 3.0, F7 FIRES => DO-NOT-RUN. This is the expected disposition; the committed backtest is NOT authorized. (Re-evaluated only if real acquired-data estimates of s and B clear the gate, which on these honest published-decayed inputs they do not.)"

