single-program-accounting: >
  THE ONE-CORRELATED-PROGRAM DECLARATION (NHT + CRO ruling, baked in). The entire
  24-contract universe is ONE strategy = ONE honest-N unit = ONE program-level
  risk/position limit. It is NOT 24 independent bets and MUST NOT be counted as
  24 (or 3, or any number > 1) confirmations. Rationale: cross-asset trend
  correlations converge toward 1 in liquidation / risk-off regimes (the 2009
  whipsaw and March-2020 are the realized analogs; CRO blowup analog: the
  managed-futures 2011-2018 "long winter" was ONE correlated bet that all
  reversed together). Concretely: (a) one program-level vol target and one
  position-limit envelope govern the whole book; (b) the committed backtest
  consumes EXACTLY ONE honest-N unit (30 → 31) when run, never one-per-sleeve;
  (c) effective independent bets are REPORTED (for the confirmability arithmetic)
  but the BET COUNT is 1 for honest-N accounting; (d) cross-lens convergence
  (the same trend factor surfaced via 3 generation lenses) is NOT independent
  confirmation and is discounted to one mechanism (NHT dissent #1, honored).

generation-surface-declaration: >
  THE SNOOP BURDEN TO DEFLATE AGAINST (PR F-008, binding). This direction is the
  rank-#1 survivor of a 21-DIRECTION generation search conducted across 3
  deliberately-divergent lenses (academic-factor, practitioner-microstructure,
  contrarian-outsider) in the 2026-06-25 new-alpha-exploration cycle. Picking the
  best-of-21 by edge-per-cost is itself a selection / data-snoop. It is mitigated
  (NOT eliminated) by the fact that the gross-edge basis is taken from PUBLISHED
  OOS literature, not a firm-data peek. The honest deflation denominator at the
  committed backtest therefore COMPOUNDS: org-wide honest-N=30 + the generation
  surface booked as its ~7 distinct MECHANISMS (naive 21 over-corrects because
  the 21 collapse to ~6-7 mechanisms; +1 under-corrects and repeats the exact
  under-deflation the 2026-05-31 honest-review reset corrected). FROZEN effective
  trial count for DSR deflation = 30 + 7 = 37. NHT owns final ratification of
  this number at the committed step; 37 is pre-committed here and may only be
  revised UPWARD (never down) by NHT.

confirmability-precheck: >
  THE <=3yr POWER GATE — AND ITS HONEST, ALREADY-COMPUTED VERDICT: DO-NOT-RUN.
  This gate is computable TODAY at $0 on PUBLISHED-LITERATURE inputs, with NO
  dependence on the backtest it gates (F7 is pinned to s = 0.20, the published
  ~0.40 diversified-trend Sharpe AFTER the F2 50% decay haircut — NOT a
  backtest-realized number — so it is non-circular). The arithmetic: program
  Sharpe S_prog = s × sqrt(B); years-to-validate at 80% power
  = (z_{0.8} + z_{1-alpha})^2 / S_prog^2, with the one-sided alpha = 0.05/37
  (z = 3.00) from the frozen 37-trial compound deflation and z_{0.8} = 0.842.

  COMPUTED RESULT on the honest inputs (s = 0.20; effective bets B in the
  MOST-GENEROUS plausible band 4-10): years-to-validate = 92yr at B=4, ~61yr at
  B=6, ~37yr at B=10 — most-generous construction ~37-59yr. To clear the 3.0yr
  bar would require a net annual Sharpe of ~2.2, i.e. ~4-5× the highest gross
  diversified-trend Sharpe ever published — arithmetically out of reach. F7
  therefore FIRES.

  THE HONEST POSTURE (correcting any prior implication to the contrary):
  breadth does NOT bring years-to-validate inside 2-3yr — that claim is false by
  one-to-two orders of magnitude on this artifact's own formula and own honest
  inputs, and every such claim is removed. Trend-on-futures escaped W4 (it has
  real exchange volume/OI) but it did NOT escape the CONFIRMABILITY wall, which
  is ARITHMETIC (a modest decayed per-bet Sharpe × finite breadth/horizon under
  honest deflation), not a data-class limitation that more or better data could
  lift. Cross-asset breadth helps — it lifts B from ~2-4 to ~4-10 and shortens
  the horizon from centuries toward decades — but decades is not 3 years.

  EXPECTED DISPOSITION: this pre-registration most likely fires F7 (do-not-run)
  for $0, BEFORE any data spend or honest-N decrement. The committed backtest is
  NOT authorized and remains NOT authorized until/unless the power pre-check
  clears on REAL acquired-data estimates of s and B — which, on current honest
  published-decayed inputs, it does not. This is exactly the QRB-6 posture
  (power 9% at the 2030 look; the firm correctly did not chase it): the value
  this pre-registration delivers is a rigorous, frozen, $0 do-not-run — proving
  the firm can recognise an un-confirmable edge and decline to spend on it,
  rather than a path to a committed trial.

cost-model: >
  REAL FUTURES ROUND-TRIP COST (the probe's validated assumption), frozen as a
  per-contract manifest at the committed step: CME/CBOT/NYMEX exchange + clearing
  + broker commission (~$1.50/side, ~$3.00 RT) PLUS 1-2 tick bid-ask per round
  trip, PLUS explicit continuous-contract ROLL cost (a real cost the cheap probe
  could omit but the committed backtest MUST model — the roll convention is part
  of the frozen manifest). At 12-month-signal turnover (~2-8 RT/yr per contract),
  the probe showed the Sharpe drag is ~0.002-0.013 and the 0.20 residual gate
  clears by >=1.4x across the full plausible grid (gross 0.30-0.80, 2-12 RT/yr,
  1-3 tick) — cost is NOT the binding constraint. Stress note: bid-ask widens on
  EM/thin contracts (6M, NG) and around macro events; the manifest uses
  per-contract (not single-average) ticks, and roll cost is added explicitly so
  the cheap-probe omission cannot silently re-enter.

