body: |
  HOW THIS PRE-REGISTRATION BAKES IN EVERY RATIFIED CONDITION (and where the
  honest uncertainty lives).

  The firm reached this direction the hard way: retail-OHLCV families are
  exhausted (net SR < 0 across 84 pair×family combos), and a 21-direction search
  across three lenses ranked TREND-FOLLOWING ON FUTURES #1 — not because trend is
  fancy, but because pointing the firm's validated harness (CPCV + DSR +
  confirmability rubric + honest-N) at a real-volume futures venue makes three of
  the four binding walls structurally non-binding: W1 (cost) and W4 (no true
  volume) fall to the venue change, and W2 (USD-concentration) falls to the
  cross-asset span. The $0 probe then settled the FIRST question — cost — decisively:
  at 12-month-signal turnover the futures cost drag is ~0.002-0.013 Sharpe and the
  0.20 residual gate clears by >=1.4x across the whole plausible grid. So this
  pre-registration deliberately does NOT re-litigate cost. It targets the ONE
  risk the probe flagged as binding and that QRB-6 died on: CONFIRMABILITY.

  THE CONFIRMABILITY ARGUMENT IS THE WHOLE DESIGN — AND IT FAILS HONESTLY. A
  single-pair futures TSMOM flips ~4x/yr; within FX the 8 contracts are
  USD-cross-loaded and collapse to ~2-4 effective bets. Cross-asset breadth (FX +
  commodity + rates, low-correlated outside liquidations) is the ONLY lever on
  confirmability, and it does lift effective bets from ~2-4 to ~4-10 — but the
  arithmetic settles it: at a post-decay per-bet Sharpe of 0.20 and B in 4-10,
  the program Sharpe S_prog = 0.20*sqrt(B) is ~0.40-0.63, and years-to-validate
  at 80% power under the 37-trial deflated alpha is ~37-92yr (most-generous
  ~37-59yr), NOT <=3yr. Clearing 3yr would need a net annual Sharpe ~2.2, ~4-5×
  the highest gross diversified-trend Sharpe ever published. So breadth shortens
  the horizon from CENTURIES toward DECADES, but decades is not years. The
  confirmability wall here is ARITHMETIC (modest decayed Sharpe × finite
  breadth/horizon under honest deflation), not a data-class limitation — moving
  to a real-volume venue escaped W4 but NOT this wall. That is why F7 is pinned
  to PUBLISHED-DECAYED inputs (s=0.20), computable at $0 today, and FIRES
  DO-NOT-RUN now: the committed backtest is NOT authorized and the honest-N unit
  is NOT spent. The value this pre-registration delivers is a rigorous, frozen,
  $0 do-not-run (the QRB-6 discipline mechanized) — the firm recognising an
  un-confirmable edge and declining to spend on it. F5 (effective bets < 4 OR
  cross-sleeve corr > 0.6) and F6 (data-floor) remain hard kills for the
  contingency that real acquired-data estimates ever revise the inputs; on
  current honest inputs they are moot because F7 fires first.

  SINGLE-PROGRAM ACCOUNTING (the NHT/CRO ruling, honored without softening). The
  24 contracts are ONE strategy = ONE honest-N unit = ONE risk limit. The
  breadth that helps confirmability in NORMAL regimes does NOT diversify the
  tail: cross-asset trend correlations go to 1 in liquidation (the CRO's
  managed-futures "long winter" and March-2020 analogs). So effective bets are
  REPORTED for the confirmability arithmetic, but the BET COUNT for honest-N is
  1, and the committed backtest spends EXACTLY ONE unit (30→31), never
  one-per-sleeve. Cross-lens convergence (trend surfaced via three generation
  lenses) is discounted to one mechanism — NHT dissent #1 is correct and is
  baked in, not paraphrased away.

  DEFLATION IS COMPOUND, NOT +1 (PR F-008). The DSR denominator deflates against
  honest-N=30 AND the 21-direction selection surface, booked as its ~7 distinct
  mechanisms (naive 21 over-corrects; +1 under-corrects and repeats the exact
  failure the 2026-05-31 reset fixed). Frozen effective trial count = 37, NHT to
  ratify, revisable only upward. The gross-edge basis is published OOS literature
  (not a firm-data peek), which mitigates — not eliminates — the best-of-21 snoop;
  a 50% McLean-Pontiff decay haircut is applied before any plausibility claim and
  NO net edge number is asserted.

  CPCV IS SIZED TO THE SIGNAL HORIZON. With a 12-month lookback, label leakage is
  the dominant lookahead risk, so purge = 13 months (12mo lookback + 1mo hold) on
  each side of every test fold, plus a 1-month embargo (14-month total exclusion
  band), across C(10,2)=45 train/test paths. The eval is regime-stratified
  {hiking/easing/on-hold}×{risk-on/risk-off} AND reports the three in-sample
  crash episodes separately — pooled DSR alone cannot pass; F3 (regime
  concentration) and F4 (crash survival) must also hold. The TRAIN+TEST pool is
  MANDATED to include the 2009 reversal, the 2011-2015 "long winter", and
  March-2020 — no recent-low-vol-only window is permitted (F6 blocks it).

  WHAT THIS ARTIFACT IS AND IS NOT. It is a FROZEN design: every window boundary,
  universe member, threshold, deflation count, and kill condition is committed now
  and single-shot. It is NOT a backtest — no data is acquired, no code is written
  (firewall), no honest-N is spent, and the trial counter stays 30. The committed
  CPCV backtest that would spend one honest-N unit is a separate, Board-gated step,
  preceded by two $0 pre-gates (F6 data-floor, F7 confirmability power) that
  STOP the spend before it happens. HONEST POSTURE: cost is solved (probe), and
  confirmability is RESOLVED — NEGATIVELY — at $0: F7, on published-decayed
  inputs, computes years-to-validate ~37-92yr and FIRES DO-NOT-RUN. This
  direction is therefore the firm's next honest do-not-run, NOT an escape from
  the dataset wall: trend-on-futures cleared W4 (real volume) but the
  confirmability wall is arithmetic and unbroken. The committed backtest is NOT
  authorized; the honest-N unit is NOT spent; and the artifact's deliverable is
  precisely the rigorous, frozen, single-shot $0 rejection.

