  - "Daily OHLCV+volume+OI is sufficient for a 12-month-lookback monthly-rebalanced TSMOM; intraday is out-of-scope for this direction."
  - ">=20yr clean continuous history is acquirable for the FX + Treasury + liquid-commodity sleeves; the two international-rate slots are a frozen contingency that may be dropped to 22 contracts if data is unavailable (recorded, not re-optimized)."
  - "honest-N=30 is the ratified deflation base; the 21-generation-surface books as ~7 distinct mechanisms → compound effective trials = 37 (NHT may revise UPWARD only)."
  - "The probe's cost finding (residual ~0.40 >> 0.20 gate, non-knife-edge) holds at program turnover once roll cost is added; cost is treated as NON-binding and confirmability as the binding risk."
  - "No code is emitted (execution firewall); no live or paper capital is deployed; the trial counter does NOT increment at this design freeze."

