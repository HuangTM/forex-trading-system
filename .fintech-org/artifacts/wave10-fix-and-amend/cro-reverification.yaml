# ── Blow-up analog ───────────────────────────────────────────────────────────
blowup-analog: |
  Knight Capital August 1, 2012 — $440M in 45 minutes. Root cause was a
  partial deploy (7 of 8 servers updated, 1 left running stale code) with
  an unkilled flag SMARS that re-routed orders into a defunct test path.
  Two relevant lessons for this Wave-10 closure:
    1. Concurrency without a hard exclusivity primitive (Knight's stale
       server kept dispatching alongside the new servers) is exactly the
       failure mode BC-8 was designed to prevent. Wave-9 had account-key
       parity but no per-cycle exclusivity; Wave-10 fcntl flock closes that.
    2. Knight's kill-switch was operationally inadequate (Property 2 fail);
       no junior on the desk could have stopped it in time. Wave-10 does
       NOT improve our kill-switch on Properties 2/3/4 — this is acceptable
       for paper scope but I am explicitly recording it carries forward as
       a live-promotion blocker. Do not let the Wave-10 commit be cited
       as kill-switch-approved-for-live.

