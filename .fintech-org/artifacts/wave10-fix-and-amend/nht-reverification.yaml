  Wave-9 caught the Wave-8 nominal-closure failure (code unchanged) by direct
  grep for the missing transformation. NHT's responsibility this round is to
  apply the same technique and not be lulled by the QD report's claims.
  Verification ledger:
    - W10-1 was tested by grepping for "/_engine_units" / "/ mid" pattern in
      the paper-loop scripts. Found 6 distinct occurrences across both files
      (cost compute + swap accrual). Wave-9 found ZERO. GENUINE delta.
    - W10-2 was tested by reading the test body in full (line 669-840), not
      relying on QD's report summary. Real run_backtest call confirmed at line
      779; real vt_mod.run_cycle call confirmed at line 818. No mock bypass.
    - W10-3 was tested by reading the assertion expressions character-by-character.
      Confirmed they DERIVE expected from arithmetic on engine-units (line
      575-577, 650-651), not from a hardcoded literal.
    - W10-4 was tested by line-by-line comparison of the verbatim NEW-2 text in
      the amendment vs the original dissent yaml. Word-for-word match.
    - W10-5 was tested by reading the line-numbered sequence of lock-acquire,
      get_positions, check_dispatch_allowed, execute_signal, lock-release.
      Order is correct in BOTH scripts.
    - W10-6 was tested by reading the test code; flagged the inline-worker
