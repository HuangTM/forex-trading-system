# ---------------------------------------------------------------------------

claims_tested:
  - id: W10-1
    quoted_claim: |
      "Both scripts/run_paper_trading_vt.py and scripts/run_paper_trading_carry_fred.py
      now apply JPY unit-conversion at the cost-compute boundary. Numerically:
      USDJPY 100k USD-nominal at price ~150 produces cost_usd ≈ 5.0 (NOT ≈750)."
    smoking_gun_evidence:
      - file: scripts/run_paper_trading_vt.py
        line: 738
        snippet: |
          _engine_units = (_trade_units_nom / mid) if ("JPY" in pair.upper() and mid > 0) else _trade_units_nom
          _cost_usd = _cost_pips * _pip_v * _engine_units
      - file: scripts/run_paper_trading_carry_fred.py
        line: 700
        snippet: |
          _engine_units = (_trade_units_nom / mid) if ("JPY" in pair.upper() and mid > 0) else _trade_units_nom
          _cost_usd = _cost_pips * _pip_v * _engine_units
    edge_case_probe: |
      "Did the fix get applied to ALL cost-compute branches?"
      ANSWERED: _trade_units_nom is set per-branch (close, rebalance, fresh entry,
      no-op at lines 723-736 in vt; 685-698 in carry_fred), then converted ONCE to
      _engine_units before cost computation. _held_units_nom (cur_units) similarly
      converted to _held_engine_units for swap accrual at lines 745/704. Both
      _cost_usd and _swap_usd consume engine-units; paper_equity_bt_equiv (line
      777/735) consumes the same. No bypass branch exists.
    arithmetic_check: |
      USDJPY 100k @ price=150: engine_units = 100_000/150 ≈ 666.67
      cost_pips ≈ 0.75, pip_v=0.01 → cost_usd = 0.75 * 0.01 * 666.67 ≈ 5.00 USD
      MATCHES claim "≈5.0" and refutes pre-fix "≈750".
    decision: survives
    severity: low
    does_block: false

  - id: W10-2
    quoted_claim: |
      "A new test class TestUSDJPYE2EParity exists in tests/scripts/test_wave8_high_remediation.py
      that drives run_backtest with USDJPY input and asserts engine.equity_curve ==
      paper_loop.paper_equity_bt_equiv at the entry bar with tolerance ≤0.1%. NO SHARED_SIZE bypass."
    smoking_gun_evidence:
      - file: tests/scripts/test_wave8_high_remediation.py
        line: 669
        snippet: |
          class TestUSDJPYE2EParity:
              PAIR = "USDJPY"
              PRICE = 150.0
      - file: tests/scripts/test_wave8_high_remediation.py
        line: 779
        snippet: |
          result = run_backtest(
              data=ohlcv_5, signals=signals, pair=self.PAIR, ...
          )
          engine_at_entry = float(result.equity_curve.iloc[1])
      - file: tests/scripts/test_wave8_high_remediation.py
        line: 832
        snippet: |
          tolerance = self.INITIAL_CAPITAL * 0.001  # 0.1% = 100 USD
          assert abs(paper_eq - engine_at_entry) < tolerance
    edge_case_probe: |
      "Does it call run_backtest with REAL pd.DataFrame USDJPY OHLC, or contrived
      single-row DataFrame that doesn't exercise unit-conversion?"
      ANSWERED: Engine side uses _make_ohlcv(5) — 5-bar real DataFrame.
      Paper-loop side uses _make_ohlcv(300) — 300-bar real DataFrame, signal=1.0
      (Series of 300), constant_capital_sizing=True, rebalance_mode="continuous".
      Calls vt_mod.run_cycle (real production path) with patched fetch helpers.
      sizer_mock.calculate_size returns 100_000 USD-nominal — engine-equivalent.
      No SHARED_SIZE bypass; the paper loop's F-001 fix is exercised end-to-end.
    test_run_result: passed (3/3 in TestUSDJPYE2EParity)
    decision: survives
    severity: low
    does_block: false

  - id: W10-3
    quoted_claim: |
      "The two tests previously at lines 540-562 and 564-611 (which asserted
      F-001-buggy values like cost_usd == 11.25) have been rewritten to assert
      engine-parity values (~0.075 USD for delta=1500, ~0.25 USD for entry=5000
      at USDJPY price 150)."
    smoking_gun_evidence:
      - file: tests/scripts/test_wave8_high_remediation.py
        line: 575
        snippet: |
          delta_usd_nominal = abs(6_500.0 - 5_000.0)  # = 1_500
          delta_engine_units = delta_usd_nominal / _price  # = 10.0
          expected_cost = 0.75 * 0.01 * delta_engine_units  # = 0.075 USD
      - file: tests/scripts/test_wave8_high_remediation.py
        line: 583
        snippet: |
          # Confirm it is NOT the pre-F-001 USD-nominal cost (150x wrong)
          wrong_cost_pre_f001 = 0.75 * 0.01 * delta_usd_nominal  # 11.25 — old wrong value
          assert entry["cost_usd"] != pytest.approx(wrong_cost_pre_f001, abs=1e-4)
      - file: tests/scripts/test_wave8_high_remediation.py
        line: 650
        snippet: |
          _target_engine_units = 5_000.0 / _price  # ≈ 33.333
          expected_cost = 0.75 * 0.01 * _target_engine_units  # ≈ 0.25 USD
    edge_case_probe: |
      "Does the test derive expected from FORMULA, or is it still hardcoded?"
      ANSWERED: Both tests build expected_cost from arithmetic on engine-units
      (delta/price * pip_cost * pip_v). Formula is shown explicitly in the test.
      Plus negative assertion (!= wrong_cost_pre_f001) locks out regression to
      USD-nominal. This is a derived-from-engine-arithmetic oracle, not a
      hardcoded literal that happens to match today's correct output.
    test_run_result: passed (3/3 in TestSwapAndDeltaFixes)
    decision: survives
    severity: low
    does_block: false

  - id: W10-4
    quoted_claim: |
      "docs/specs/drawdown_ladder_amendment_2026-05-06.md exists and:
      preserves CRO log-only architecture, recalibrates pre-registered drawdown
      ladder thresholds to broker-equity semantics, reproduces NHT's Wave-9 NEW-2
      dissent verbatim with 'preserved-not-resolved' header, cites CEO ruling artifact."
    smoking_gun_evidence:
      - file: docs/specs/drawdown_ladder_amendment_2026-05-06.md
        line: 36
        snippet: |
          kill_switch.check_and_trigger() and dd_contract.assess() consume raw
          broker TotalValue as their equity input. Cost-adjusted equity
          (paper_equity_bt_equiv) is log-only and is NOT fed into either risk primitive.
      - file: docs/specs/drawdown_ladder_amendment_2026-05-06.md
        line: 50
        snippet: |
          ## Section 3: NHT DISSENT — PRESERVED NOT RESOLVED
      - file: docs/specs/drawdown_ladder_amendment_2026-05-06.md
        line: 56
        snippet: |
          NHT DISSENT ON NEW-2 (verbatim from wave9-precommit-review:nht.yaml):
          [(3) NEW-2 ... operational equity must include cost-feedback ... The
          material_concern PERSISTS.]
      - file: docs/specs/drawdown_ladder_amendment_2026-05-06.md
        line: 81
        snippet: |
          Source artifact: .agent-accountability/ratifications/wave9-substeps:phase2:task2.0.yaml
    verbatim_dissent_check: |
      Compared the NEW-2 paragraph in docs/specs/drawdown_ladder_amendment_2026-05-06.md
      Section 3 against .agent-accountability/dissents/wave9-precommit-review:nht.yaml.
      Word-for-word identical match — no paraphrase, no omission, line breaks
      preserved (the original was 80-col wrapped; the amendment retains that wrap).
    edge_case_probe: |
      "Is the dissent paraphrased or partially omitted?"
      ANSWERED: Verbatim. Header literally reads "PRESERVED NOT RESOLVED".
      CEO ruling cited at .agent-accountability/ratifications/wave9-substeps:phase2:task2.0.yaml.
      Architecture preserved: Section 2 explicitly states "kill_switch.check_and_trigger()
      and dd_contract.assess() consume raw broker TotalValue."
    decision: survives
    severity: low
    does_block: false

  - id: W10-5
    quoted_claim: |
      "Both scripts wrap the per-cycle critical section [get_positions →
      compute_exposure → check_dispatch_allowed → execute_signal → reconciliation]
      with fcntl.flock(LOCK_EX|LOCK_NB). Lock acquired BEFORE get_positions.
      On contention, cycle SKIPs with SKIP_DISPATCH_LOCK_BUSY sentinel logged to WS01."
    smoking_gun_evidence:
      - file: scripts/run_paper_trading_vt.py
        ordering:
          line_553: "fcntl.flock(_dl_fd, fcntl.LOCK_EX | fcntl.LOCK_NB)  # ACQUIRE"
          line_588: "current_positions = backend.get_positions()"
          line_590: "_exposure = compute_exposure(_open_pos_list)"
          line_592: "check_dispatch_allowed(_exposure, ...)"
          line_802_to_825: "result = backend.execute_signal(pair, ...)"
          line_858: "fcntl.flock(_dl_fd, fcntl.LOCK_UN)  # RELEASE in finally"
      - file: scripts/run_paper_trading_carry_fred.py
        ordering:
          line_534: "fcntl.flock(_dl_fd, fcntl.LOCK_EX | fcntl.LOCK_NB)  # ACQUIRE"
          line_565: "current_positions = backend.get_positions()"
          line_569: "check_dispatch_allowed(...)"
          line_757_to_779: "execute_signal calls"
          line_807: "fcntl.flock(_dl_fd, fcntl.LOCK_UN)  # RELEASE in finally"
      - sentinel_check:
          vt_line: 577
          vt_emit: "_emit_ws01(cycle_id, pair, SKIP_DISPATCH_LOCK_BUSY)"
          carry_fred_line: 558
          carry_fred_emit: "_emit_ws02(cycle_id, pair, SKIP_DISPATCH_LOCK_BUSY, ...)"
    edge_case_probe: |
      "Is the lock acquired before get_positions AND held through execute_signal,
      OR is it released between phases?"
      ANSWERED: Lock acquired at line 553 (vt) / 534 (carry_fred). Released ONLY
      in the outer finally block at line 858 (vt) / 807 (carry_fred). The entire
      try-block holds the lock continuously through compute_exposure,
      check_dispatch_allowed, execute_signal, AND reconciliation. No interim
      release. Locked region matches BC-8 specification exactly.
    decision: survives
    severity: low
    does_block: false

  - id: W10-6
    quoted_claim: |
      "tests/scripts/test_wave10_dispatch_lock.py exists and contains tests using
      subprocess.Popen to spawn TWO simultaneous run_cycle calls. Asserts: exactly
      1 acquires lock, other emits SKIP sentinel, JPY-correlated peak ≤15%."
    smoking_gun_evidence:
      - file: tests/scripts/test_wave10_dispatch_lock.py
        line: 70
        snippet: |
          def _spawn_worker(...) -> subprocess.Popen:
              return subprocess.Popen([sys.executable, "-c", _WORKER_SCRIPT, ...])
      - file: tests/scripts/test_wave10_dispatch_lock.py
        line: 108
        snippet: |
          p1 = _spawn_worker(lock_file, result_p1, hold_seconds=1.0)
          time.sleep(0.05)
          p2 = _spawn_worker(lock_file, result_p2, hold_seconds=0.1)
      - file: tests/scripts/test_wave10_dispatch_lock.py
        line: 220
        snippet: |
          dispatched = sum(1 for r in [r1, r2] if r["outcome"] == "ACQUIRED")
          assert dispatched == 1
          simulated_jpy_pct = dispatched * 0.10
          assert simulated_jpy_pct <= 0.15
    edge_case_probe: |
      "Does the test exercise the FULL paper-loop dispatch sequence, or only
      the fcntl primitive in isolation? Does it assert JPY exposure cap holds
      across BOTH subprocesses' actual positions, or only on lock acquisition?"
      PARTIAL ANSWER: subprocess.Popen does spawn two real OS processes (genuine
      cross-process test). However, the inline _WORKER_SCRIPT exercises only the
      fcntl.flock primitive, NOT the full run_cycle code path. Doc string lines
      14-16 acknowledge this: "These tests exercise the *fcntl advisory lock
      mechanism* in isolation (not the full paper loop) to avoid requiring a
      live Saxo token." JPY exposure assertion (line 226) uses simulated value
      (dispatched * 0.10) rather than measured exposure across two real
      run_cycle calls.
    coverage_gap_note: |
      The lock primitive itself is correctly tested cross-process. But the BC-8
      claim "TWO simultaneous run_cycle calls" is NOT directly tested — only the
      lock mechanism that those calls would acquire. The paper-loop integration
      depends on (i) the lock being correctly placed (validated by W10-5 code
      reading) and (ii) the lock primitive working under contention (validated
      here). The chain is sound; the test is narrower than the claim phrasing
      suggests. NOT a closure-blocking gap given the documented Saxo-token
      constraint, but worth surfacing as a future-Wave coverage item.
    test_run_result: passed (11/11 in test_wave10_dispatch_lock.py)
    decision: survives-with-coverage-note
    severity: medium
    does_block: false

  - id: W10-7
    quoted_claim: |
      "Sacred test passes. Pytest count ≥686 + new Wave-10 tests. Ruff ≤19.
      Forbidden-phrases scan clean."
    gate_evidence:
      sacred_test:
        command: pytest tests/backtest/test_engine.py::test_no_lookahead -v
        result: "1 passed"
        verdict: SURVIVES
      ruff:
        command: ruff check src/
        result: "Found 19 errors"
        verdict: SURVIVES (≤19 confirmed)
      pytest_full:
        command: pytest --tb=no -q
        result: "700 passed in 32.61s"
        verdict: SURVIVES (700 ≥ 686 + 11 Wave-10 = 697)
      forbidden_phrases:
        scripts_vt: clean (0 matches)
        scripts_carry_fred: clean (0 matches)
        test_wave8_high_remediation: clean (0 matches)
        test_wave10_dispatch_lock: clean (0 matches)
        amendment_doc: 1 match — "fidelity" at line 92 (in verbatim CEO ruling text)
        verdict: NOT-CLEAN (claim is partially false)
    discrepancy_note: |
      The forbidden-phrases scanner detected "fidelity" in
      docs/specs/drawdown_ladder_amendment_2026-05-06.md line 92 within the
      verbatim CEO ruling text "hypothesis-test fidelity restored by
      ladder-recalibration." This phrase uses "fidelity" in its dictionary
      sense (faithfulness/accuracy), not as the broker name. However, the
      scanner is regex-only and cannot distinguish — broker_names list
      categorically blocks "fidelity" with reason "non-negotiable."
      The QD report's claim of "Forbidden-phrases scan clean" is FALSE.
      Severity: minor (false-positive on dictionary-sense word inside a
      verbatim CEO quote, not a broker-contamination risk). Recommended
      fix: substitute "honesty" or "accuracy" for "fidelity" in the
      verbatim-quoted text and append a footnote noting the substitution
      was for the forbidden-phrases scanner. Alternatively: extend the
      scanner config to permit "fidelity" inside doc/quote contexts, with
      CEO ratification.
    decision: survives-with-minor-discrepancy
    severity: low
    does_block: false

# ---------------------------------------------------------------------------
# Aggregate verdict
# ---------------------------------------------------------------------------

aggregate_verdict: COMMIT-AFTER-MINOR-FIX
aggregate_rationale: |
  All 7 Wave-10 closure claims SURVIVE adversarial smoking-gun verification:
    - W10-1: F-001 fix applied to ALL branches in BOTH scripts (genuine code change,
      not nominal); arithmetic verified (5 USD vs 750 USD pre-fix).
    - W10-2: USDJPY E2E parity test drives REAL run_backtest + REAL run_cycle;
      no SHARED_SIZE bypass; tolerance 0.1% asserted.
    - W10-3: F-008 tests rewritten to derive expected from engine-unit arithmetic
      formula; negative assertions lock out regression to USD-nominal formula.
    - W10-4: Amendment doc exists; NHT NEW-2 dissent reproduced VERBATIM under
      "PRESERVED NOT RESOLVED" header; CEO ruling cited; log-only arch preserved.
    - W10-5: Lock acquired BEFORE get_positions, held through execute_signal +
      reconciliation, released only in outer finally block. Both scripts.
    - W10-6: Cross-process subprocess.Popen test exists for the fcntl primitive;
      coverage gap noted that full run_cycle integration is not tested (Saxo
      token constraint), but the chain is sound given W10-5 code-reading.
    - W10-7: Sacred test passes; pytest 700 passed; ruff 19 (≤19); 4/5 files
      clean on forbidden-phrases. Amendment doc has 1 false-positive match on
      "fidelity" inside verbatim CEO ruling text — minor discrepancy with
      "scan clean" claim but does not block commit (semantic context shows
      dictionary-sense, not broker reference).

  Wave-9 verdict was DO-NOT-COMMIT because F-001 had ZERO _to_engine_units
  application in the paper-loop scripts — code was unchanged from Wave-7
  while Wave-8 nominally claimed closure. Wave-10 ACTUALLY APPLIED THE
  FIX: divisions by mid for JPY pairs are present at the cost-compute
  boundary (lines 738/700) and at swap accrual (lines 745/704). The
  smoking-gun test of Wave-9 (grep for the missing transformation) now
  finds the transformation. F-001 is GENUINELY closed, not nominally
  closed. Same pattern holds for the other 6 claims.

  RECOMMENDATION: COMMIT after a minor fix to the amendment doc to handle
  the "fidelity" forbidden-phrase hit (either substitution + footnote, or
  scanner-config exemption for verbatim-quote contexts). The hit is a
  false positive in semantic terms but the QD report's "scan clean" claim
  is technically inaccurate and should be either fixed or the claim
  qualified.

