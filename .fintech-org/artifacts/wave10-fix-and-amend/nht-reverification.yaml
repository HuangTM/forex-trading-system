      IS cross-process tested, but the full paper-loop integration is not).
    - W10-7 was tested by EXECUTING the gates (pytest, ruff, forbidden-phrases)
      and reporting actual outputs, not relying on QD's claims.
  Wave-9's failure mode (trusting nominal claims) does NOT recur in Wave-10's
