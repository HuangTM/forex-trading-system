  - id: F-100-PR-W10
    severity: minor
    category: edge-case
    location: |
      scripts/run_paper_trading_vt.py:738
      scripts/run_paper_trading_carry_fred.py:700
    observation: |
      The F-001 fix uses a guarded division: (_trade_units_nom / mid) if
      ("JPY" in pair.upper() and mid > 0) else _trade_units_nom. For JPY pairs,
      if mid is exactly 0 (or numerically <= 0 from arithmetic), the fallback
      silently returns USD-nominal — re-introducing the F-001-buggy behavior
      WITHOUT raising or logging an error.
    inference: |
      Reachability: mid is computed at vt.py:641 / carry_fred.py:622 as
      (bid+ask)/2 with fallback to ohlcv["close"].iloc[-1]. For mid to be
      <=0, either both bid/ask are 0/negative AND the close is <=0 (data
      corruption), OR an exception in client.get_info_price plus close<=0.
      Practically rare on USDJPY (price ~150) but the silent fallback is
      a latent footgun: a future regression in data-fetch could silently
      revert F-001 for that cycle.
    evidence:
