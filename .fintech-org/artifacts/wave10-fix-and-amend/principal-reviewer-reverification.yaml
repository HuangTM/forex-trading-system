      where the conversion can be centralized with explicit error handling.

  - id: F-101-PR-W10
    severity: minor
    category: failure-mode-handling
    location: |
      scripts/run_paper_trading_vt.py:550-578
      scripts/run_paper_trading_carry_fred.py:531-560
    observation: |
      The lock-acquire try/except at vt.py:552-578 catches ONLY BlockingIOError.
      If fcntl.flock raises any other OSError (e.g., ENOLCK on overloaded kernel,
      EBADF on invalid fd, EINVAL on FS that doesn't support flock), the
      exception propagates out of the outer try (no finally) — leaking _dl_fd.
      The inner critical-section try/finally (vt.py:581/856) is never entered.
    inference: |
      Per Rubric 7 (failure mode reasoning): the failure is named in code
      via the BlockingIOError catch but the alternative OSError class is
      unhandled. On macOS/Linux local FS this is rare; on NFS or SMB mounts
      flock semantics are non-portable. fd leak per cycle on a long-running
      loop could exhaust file descriptors over weeks. The behavior on
      filesystem flock-not-supported is ambiguous and untested. The PM HC-4
      spec does not require handling all OSError subclasses, but Rubric-7
      surfacing is required.
    evidence:
      - vt.py:552-578 only catches BlockingIOError
      - No outer finally to close _dl_fd if flock raises non-BlockingIOError
      - Rubric 7 specifically flags "failure named and handled? Is there a retry policy?"
    recommended-action-class: defensive-hardening
    owning-role: quant-developer
    severity-justification: |
      Non-blocking because (a) macOS local FS is the deployment target and
      flock works natively, (b) no Wave-9 finding flagged this, (c) the
      run_cycle exception would propagate to the loop driver which would
      catch it via top-level error handling. But the fd leak is real if it
      happens. Defer to Wave-11 shared-module refactor which can add
      blanket OSError handling.

