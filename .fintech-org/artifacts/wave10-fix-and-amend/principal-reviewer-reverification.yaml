      - vt.py:738 silent fallback to USD-nominal when mid<=0
      - No structured log emitted in the mid<=0 branch
    recommended-action-class: defensive-hardening
    owning-role: quant-developer
    severity-justification: |
      NOT a Wave-9 finding; introduced by F-001 fix structure. Non-blocking
      because no realistic path exercises mid<=0 for USDJPY (price ~150 in
