# ── Edge-case enumeration (Rubric 4) ──────────────────────────────────────────
edge_cases_audited:

  - case: USDJPY price=0 (division by zero)
    handling: |
      vt.py:738 / carry_fred.py:700 use `mid > 0` guard. If mid<=0, fallback
      is _trade_units_nom (USD-nominal, F-001-buggy). Silent. F-100-PR-W10.

  - case: USDJPY with empty positions
    handling: |
      cur_pos = current_positions.get(pair) — None when empty (vt.py:668).
      cur_units = 0.0 fallback. Cost path: needs_action AND not is_close AND
      not is_rebalance → _cost_pips = entry_cost(target_units),
      _trade_units_nom = target_units. Conversion applied. CORRECT.

  - case: non-JPY pair (EURUSD) — conversion should be identity
    handling: |
      vt.py:738 condition `"JPY" in pair.upper()` is False for EURUSD.
      _engine_units = _trade_units_nom (identity). pip_v = 0.0001 (line 722).
      cost_usd = cost_pips * 0.0001 * USD_nominal — matches engine.py:332
      since engine_units == USD_nominal for non-JPY pairs (engine.py:572-573
      returns usd_nominal directly). CORRECT. Verified by TestE2EParity
      (EURUSD) PASS at line 375-450.

  - case: rebalance to zero target_units
    handling: |
      vt.py:681 — target_units == 0 AND cur_pos → is_close=True, action=CLOSE.
      Cost path uses cur_units, conversion applied. CORRECT.

  - case: BC-8 lock file path doesn't exist (first cycle)
    handling: |
      vt.py:548-549 — _dl_path.parent.mkdir(parents=True, exist_ok=True),
      then os.open with O_CREAT. File created on first acquire. CORRECT.

  - case: BC-8 lock file held by stale dead process
    handling: |
      flock locks are advisory and process-bound; on process death the kernel
      releases. Stale fd not an issue. CORRECT.

  - case: BC-8 FS doesn't support flock
    handling: |
      OSError other than BlockingIOError propagates uncaught. F-101-PR-W10.

  - case: BC-8 exception during locked critical section
    handling: |
      Inner try/finally at vt.py:581/856 releases lock + closes fd on any
      exception. CORRECT.

