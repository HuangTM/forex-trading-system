body: |
  This review applies six lenses (BC-8 residual control, cost-feedback
  architecture, kill-switch rubric, forbidden-phrases scan, drawdown
  contract enforcement, blast-radius) to the Wave-9 pre-commit code.

  The headline: the code is good for what it is — single-loop paper
  operation. The work that has been done in Waves 5-8 is correctly
  reflected in the current state of the paper-loop scripts. F-001 is
  resolved (cost formula applies engine-units fix). NHT NEW-2 cost-
  feedback disagreement is correctly resolved by leaving risk primitives
  on raw broker equity (log-only architecture) and writing the cost-
  adjusted view to the equity log as a research artifact. CF-T9 gating
  is wired correctly with cold-start enforcement. Forbidden-phrases
  scan: 11/11 clean.

  The headline GAP: BC-8 residual control. The cross-process race window
  on the per-cycle dispatch path is NOT eliminated by the startup
  account-key parity gate. The parity gate prevents two loops from
  pointing at DIFFERENT accounts; it does NOT prevent two loops pointing
  at the SAME account from each independently passing
  check_dispatch_allowed with stale exposure snapshots and racing to
  dispatch. The dispatch-cap permeability described in the firm risk
  contract (24-30% transient aggregate JPY-correlated exposure) is still
  the residual failure mode.

  This is why the second-loop veto remains. To lift it, implement either
  per-strategy 7.5% budget tickets (option-A) or a cross-process advisory
  file-lock around the per-cycle [read_positions → check_exposure →
  execute_signal] critical section (option-B). Both options have
  precedent in the literature; option-B is the lower-friction path
  because it requires no new shared ticket store — fcntl.flock()
  on a single file in data/ is sufficient.

  Kill-switch design: passes for paper, fails for live. Specifically:
  property 2 (operable by junior) FAILS — there is no big-red-button or
  one-command halt; halt is "find the PID and SIGINT". Property 3 (known
  SLA) FAILS — no measured time-to-stop. Property 4 (tested in prod)
  FAILS — no live test record exists. These are acceptable for paper
  (no real money at stake) but BLOCKERS for any future live promotion.
  The firm should not let the current kill-switch design carry forward
  to live without these gaps closed.

  Decision: size-reduced (0.5). Commit Group A (3 paper-loop / monitor
  scripts) and Group C (8 research scripts) as-is. Group B (risk
  primitives) is committed in prior waves and reviewed for architectural
  consistency only. Single-loop authorization stands. Second-loop
  authorization REMAINS BLOCKED until the BC-8 residual control is
  in place.
