# ===========================================================================
# Subtask 6: Cross-system blast radius (incident-command-trading lens)
# ===========================================================================
blast_radius_if_bc8_race_fires:
  scenario: |
    Carry-fred loop and vt loop both running on the same Saxo paper account.
    Both pass account-key parity gate at startup. carry_fred enters cycle
    at T0, calls backend.get_positions(), sees JPY exposure 14%, gate
    passes, computes target_units. Concurrently, vt loop at T0+50ms calls
    backend.get_positions(), sees the same 14% JPY exposure (carry_fred
    has not yet dispatched), gate passes, computes its own target_units.
    Both call backend.execute_signal() in rapid succession. Both fills land.
    Aggregate JPY-correlated exposure transient peak: ~24-30% (carry_fred's
    intended ~7.5% post-haircut + vt's intended target, unconstrained
    together). Exposure exceeds BC-8 cap by ~9-15 percentage points until
    the next cycle re-evaluates and one of the loops trims.
  blast_radius:
    immediate: |
      Paper account only — NO REAL CAPITAL AT RISK. The blast radius is:
      (a) regulatory/audit cleanliness: paper run shows aggregate exposure
          breach in audit logs, which contaminates the validation evidence
          for subsequent live consideration;
      (b) trial-counter pollution: the breach window will appear in equity
          curve / monthly-return analyses, and any DSR-based promotion gate
          will need to filter or annotate it;
      (c) loss of confidence in the BC-8 control by stakeholders observing
          the breach in production data.
    delayed: |
      If the same code architecture is later promoted toward live capital
      (which would require a separate CONSENSUS), this race becomes a
      Knight-class control failure mode in a live context. The blast
      radius scales with leverage_cap and account size. This is why the
      gap MUST be closed before any live consideration.
  recovery_path: |
    1. Detect: post-cycle reconciliation (already wired via
       backend.reconcile() at lines 672-677 / 718-724) shows aggregate
       JPY exposure > 15%. The dispatch gate on the NEXT cycle will block
       all new dispatch on both loops (jpy_correlated_pct > 0.15
       triggers AggregationGateBlocked). Existing positions are held
       (per CRO 2026-04-30 hold-not-flatten policy).
    2. Diagnose: operator inspects ws01_trace.log + ws02_trace.log audit
       lines to determine which loop dispatched second. Compute the
       window length where exposure was over the cap.
    3. Trim: operator manually closes one loop's excess position (NOT
       auto-flattened) to bring aggregate within 15%. The dispatch gate
       re-opens automatically.
    4. Postmortem: file the breach as a BC-8 confirmed-race incident.
       Promote either option-A or option-B residual control to mainline
       before re-authorizing concurrent loops.
  containment_quality: |
    Containment is SOFT: it relies on the next cycle's gate evaluation
    (worst case 1800s = 30 min) and on operator action. There is NO
    automated trim or fast-cancel. The watchdog 300s timeout will not
    fire because both loops are responsive. The 2% daily-loss kill switch
    will not fire because the breach is in EXPOSURE, not in P&L. This is
    the rationale for blocking second-loop authorization until the residual
    control is in place: the existing controls do not cover the failure
    mode that BC-8 was meant to cover.

