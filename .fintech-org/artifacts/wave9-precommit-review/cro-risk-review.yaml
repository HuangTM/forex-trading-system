# ===========================================================================
# Subtask 1: BC-8 residual control
# ===========================================================================
bc8_residual_control:
  finding: PARTIAL — STARTUP-TIME GATE PRESENT; PER-CYCLE RACE NOT ELIMINATED
  per_strategy_7_5pct_budget_tickets:
    present: false
    evidence: "no per-strategy ticket logic in either run_paper_trading_*.py"
  cross_process_advisory_file_lock_wrapping_read_check_dispatch:
    present: false
    evidence: |
      The atomic O_CREAT|O_EXCL lock at run_paper_trading_carry_fred.py:121-172
      and run_paper_trading_vt.py:106-157 is a STARTUP-TIME ACCOUNT-KEY PARITY
      GATE, NOT a per-cycle dispatch lock. It runs ONCE at process start (called
      from main() at line 778 / 842 respectively). The critical section
      [get_positions → compute_exposure → check_dispatch_allowed → execute_signal]
      at run_paper_trading_carry_fred.py:515-540, 687-716 and
      run_paper_trading_vt.py:535-566, 734-765 is NOT wrapped in any cross-
      process lock. Two loops sharing the same account_key (which the parity
      gate enforces) can each independently call check_dispatch_allowed() with
      stale exposure snapshots and race to execute_signal().
  permits_24_30pct_transient_exposure: true
  rationale: |
    Both loops apply check_dispatch_allowed against `_exposure` computed from
    backend.get_positions() at the head of run_cycle. If carry_fred's cycle
    reads positions at T0 (sees 14% JPY exposure, gate passes), vt's cycle
    reads positions at T0+epsilon (also sees 14% JPY exposure, gate passes),
    and both then dispatch, both new positions can land — landing aggregate
    notional well above 15%. The exposure_aggregator does not know the OTHER
    loop is in flight because there is no shared state mutex between them.
  verdict: BC-8 cap is not Knight-class permeable (it has fence at startup),
           but it remains permeable on the per-cycle path. Second-loop
           authorization REMAINS BLOCKED until either option-A (per-strategy
           7.5% budget tickets) or option-B (cross-process advisory file-lock
           around the per-cycle [read_positions → check_exposure →
           execute_signal] critical section) is implemented.

# ===========================================================================
# Subtask 2: Cost-feedback architecture position
# ===========================================================================
cost_feedback_architecture:
  position: LOG-ONLY ARCHITECTURE IS CORRECTLY IMPLEMENTED
  evidence:
    - "run_paper_trading_vt.py:484 — kill_switch.check_and_trigger(equity) with raw broker equity"
    - "run_paper_trading_vt.py:498 — dd_contract.assess(equity) with raw broker equity"
    - "run_paper_trading_vt.py:710 — paper_equity_bt_equiv = equity - cost_usd + swap_usd is WRITTEN to equity log file only, NEVER fed back into kill_switch or dd_contract"
    - "run_paper_trading_carry_fred.py:473 — kill_switch.check_and_trigger(equity) with raw broker equity"
    - "run_paper_trading_carry_fred.py:481 — dd_contract.assess(equity) with raw broker equity"
    - "run_paper_trading_carry_fred.py:665 — paper_equity_bt_equiv written to log only"
  cro_recommendation_restatement: |
    The log-only architecture is the correct architecture. Risk primitives
    (KillSwitch daily-loss trigger; DrawdownContract peak-tracking and ladder)
    MUST trigger off the broker's reported equity, NOT off cost-adjusted equity.

    Rationale (recursive trigger surface):
      1. The broker's reported equity is the GROUND TRUTH for what we own,
         what we owe, and what is at risk on the firm's account. It is the
         number that matters in a real margin call or recovery scenario.
      2. paper_equity_bt_equiv = equity - cost_usd + swap_usd is a synthetic
         construct used for backtest-equivalence reporting. It depends on the
         RealisticCostModel's per-pair spread/swap parameters being correct.
      3. If risk primitives triggered off paper_equity_bt_equiv:
         (a) An incorrect cost-model parameter directly shifts the trigger
             surface — a bug in the cost model becomes a bug in the risk
             halt logic. The cost model becomes load-bearing for safety.
         (b) The trigger fires on a number that does not exist on the broker
             account. In an incident, when an operator queries the broker
             and sees equity X but the system halted on equity X-Y, the
             post-mortem is "the system halted but the broker says we still
             have full equity." This is exactly the scenario where operators
             override the kill switch ("clearly a bug; reset and continue")
             and re-enable a system that should remain halted.
         (c) The drawdown ladder (10/15/20%) was sized against PEAK-TO-TROUGH
             of the actual book. If peak is computed on cost-adjusted equity,
             peak diverges from broker peak by accumulated cost drift; the
             10% threshold no longer corresponds to what was pre-registered.
      4. NHT NEW-2 disagreement surface (cost-adjusted equity into risk
         primitives) recreates exactly this surface area. Logging is the
         right place for the cost-adjusted view: it makes the comparison
         visible to research without making it load-bearing for safety.
  disagreement_with_NHT_NEW_2: |
    PRESERVED. The CRO log-only architecture stands. The cost-adjusted equity
    view is correctly written to data/paper_trading_session.log as an audit
    record (not as a control input). NHT NEW-2 disagreement is preserved as
    a NHT dissent artifact per agent-accountability rules; it is informational
    here, not blocking.

# ===========================================================================
# Subtask 3: Kill-switch design rubric (kill-switch-design SKILL applied)
# ===========================================================================
kill_switch_rubric:
  property_1_out_of_band:
    status: PASS WITH GAP
    evidence: |
      The kill switch is in-process (KillSwitch dataclass at
      src/forex_system/risk/kill_switch.py:94-403). It does NOT depend on
      Saxo's network for activation: trigger conditions are evaluated
      locally and the audit-log is on local disk. HOWEVER, the in-process
      design means a hung process cannot self-halt — that responsibility
      delegates to HeartbeatWatchdog (300s timeout) which calls
      halt_paper_loop() in the SAME process. If the process is wedged at
      the OS level (kernel I/O block), neither fires. There is no external
      watchdog or external master-kill.
    finding: PARTIAL — out-of-band relative to Saxo, NOT relative to the
             python process itself.
  property_2_operable_by_junior:
    status: FAIL
    finding: |
      Operator path to halt: SIGINT (Ctrl+C) on the running process, or
      KILL_SWITCH_FORCE_RESET=1 to start it. There is no big-red-button,
      no halt-by-touching-a-file, no halt-via-API, no documented one-
      command halt flow. A junior operator at 14:03 facing a runaway
      paper loop would need to find the PID, send SIGINT, verify the
      process exited, and confirm positions are flat. "Find the PID"
      is a runbook step, not a one-button operation. Documented operator
      flow is also missing for the case where the loop is detached (nohup,
      systemd, supervisor).
    severity: HIGH for live; MEDIUM for paper (no real money at stake)
  property_3_known_sla:
    status: FAIL
    finding: |
      No declared SLA for time-to-stop. KillSwitch.trigger() is synchronous
      and idempotent; backend.flatten_all() is called immediately, but no
      measured p99 time-to-flatten exists in the test corpus or audit log.
      "Stops when it stops" pattern.
    severity: HIGH for live; LOW for paper
  property_4_tested_in_prod:
    status: FAIL
    finding: |
      No record in .fintech-org/kill-switch-tests.jsonl (file does not
      exist). Kill switch has unit-test coverage but has not been exercised
      against a live Saxo session. No --self-test flag exists. No scheduled
      test on the org calendar.
    severity: BLOCKER for live; HIGH for paper
  property_5_observable_attributable:
    status: PASS
    evidence: |
      KillSwitch.trigger writes a structured JSON-line audit entry
      (src/forex_system/risk/kill_switch.py:307-319) including timestamp,
      reason enum, detail, equity_at_trigger, previous_state, new_state.
      The audit log is the resumption gate (KillSwitch refuses to start
      if last entry is HALTED unless KILL_SWITCH_FORCE_RESET=1 is set,
      lines 157-206). This satisfies log-as-decision-trace requirements
      for kill-switch invocations.
  minimum_set_completeness:
    a_master_kill: ABSENT (no firm-wide single-trigger halt)
    b_per_strategy_kill: PRESENT (KillSwitch has strategy_id parameter; per-
                          strategy audit-log namespacing at lines 153-154)
    c_per_venue_kill: ABSENT (no Saxo-specific halt distinct from process exit)
    d_pretrade_rate_notional_caps: PARTIAL
      detail: |
        check_dispatch_allowed enforces JPY-correlated 15%, active-strategies 4,
        concurrent-positions 6 (CRO_MAX_CORRELATED_PCT etc.). NO max-order-rate
        cap, NO max-notional-per-minute cap. A signal-flapping loop could
        dispatch many rebalances in quick succession and the dispatch gate
        would not cap rate of change.
    e_dead_man_switch: PRESENT (HeartbeatWatchdog 300s timeout →
                       halt_paper_loop). Watchdog is in-process, so this
                       is a soft dead-man not a hard one (see Property 1).
  knight_test_result: FAIL
    gap: |
      A junior at 14:03 cannot halt the running paper loop without finding
      the PID. There is no big-red-button, no shared-file flag, no API
      endpoint. In the Knight scenario where a deploy reactivates dormant
      code at 09:25 ET, the runaway is paper-only here so blast-radius
      is bounded, but the OPERATIONAL pattern of "find PID → kill" is the
      same pattern that fails in a live emergency. This is the core
      operational gap.
  rubric_decision_for_paper: APPROVE-WITH-CONDITIONS
  rubric_decision_for_live: REJECT (do NOT promote this kill-switch design
                                    to a live-capital path; the gaps in
                                    properties 2, 3, 4 are blockers)

