# ===========================================================================
# Second-loop authorization
# ===========================================================================
second_loop_authorization:
  status: REMAINS BLOCKED
  rationale: |
    BC-8 cap remains permeable on the per-cycle dispatch path (see
    bc8_residual_control above). The startup parity gate prevents the
    "different accounts" failure mode but does NOT prevent the "same
    account, concurrent dispatch" failure mode. The CRO veto on second-
    loop authorization is NOT lifted by Wave-9 as currently structured.
  to_lift_the_veto: |
    Implement either:
      (option-A) per-strategy 7.5% budget tickets — each loop gets a hard
                 budget that sums to ≤15% before dispatch eligibility;
                 budgets are enforced atomically against a shared ticket
                 store (file-system or sqlite with row-level lock).
      (option-B) cross-process advisory file-lock around the per-cycle
                 critical section [backend.get_positions →
                 compute_exposure → check_dispatch_allowed →
                 execute_signal]. Lock file at e.g.
                 data/dispatch_lock.flock with fcntl.flock() acquired
                 with LOCK_EX|LOCK_NB; if NB acquire fails, the cycle
                 SKIPs with sentinel SKIP_DISPATCH_LOCK_BUSY.

    Either option needs:
      - a unit test demonstrating that two concurrent processes cannot
        both pass check_dispatch_allowed when aggregate would exceed BC-8
      - a re-run of the BC-8 race scenario with the residual control
        applied, showing transient exposure stays ≤ 15%
      - a documented audit-log entry on each acquire/release so
        log-as-decision-trace requirements are met

  current_authorization: |
    Single-loop paper authorization (vt loop alone) STANDS per Wave-5
    CONSENSUS. carry_fred regime-conditional sizing (0.0 / 0.25) is
    correctly wired and authorized for single-loop dispatch. The
    second-loop start (running both vt + carry_fred concurrently against
    the same paper account) is what remains blocked.

