      - CEO ratification of F-003 LoC-cap deviation (350 LoC vs 50-LoC cap) BEFORE commit
      - F-001 USDJPY cost formula fix by QD OR CEO explicit acceptance of USDJPY parity gap
      - PM AC gate A-F001 disposition (do-not-commit if fail-condition; that gate governs)
    no_blocking_architecture_issues: true
    notes: |
      Architecture is sound. The duplicate lock-gate functions are a smell but not blocking.
      The shared equity log path is a theoretical concern at current scale. The cost formula
      in Group A files is correctly structured for EURUSD; USDJPY has the documented 150× gap.

  group_b_test_wave8_high_remediation:
    verdict: commit-after-fixes
    conditions:
      - F-002: USDJPY E2E parity test must be added (TestE2EParity covers EURUSD only;
        PM AC gate B-F002 requires a USDJPY trade tuple test with price≈150)
