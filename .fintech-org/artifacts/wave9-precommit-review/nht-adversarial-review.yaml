body: |
  # Wave-9 NHT adversarial re-verification — code-review verdict

  Static analysis at the code level finds Wave-8's claimed remediation is
  largely unimplemented. Key smoking guns:

  1. **F-001 (USDJPY cost 150x bug):** `_to_engine_units` does not appear in
     either paper-loop script (grep returns 0 matches). The cost formula at
     `vt.py:689` and `carry_fred.py:648` multiplies `pip_v=0.01` by USD-nominal
     `_trade_units` directly, while the engine multiplies `pip_v=0.01` by
     engine-converted units (`usd_nominal / price` for JPY pairs, ~150x smaller).
     The 150x overstatement persists.

  2. **F-002 (parity test):** `TestCostModelParity` asserts equality between two
     hand-rolled formulas with identical inputs (`self.SIZE=10_000`) and
     identical multiplications — pure tautology. `TestE2EParity` is the only
     test that calls `run_backtest`, and it explicitly avoids USDJPY (lines
     339-342: "Uses EURUSD (not USDJPY) to avoid the engine's JPY unit-convention
     conversion"). The one test that would have caught F-001 was deliberately
     not written.

  3. **NEW-2 (cost-feedback architecture):** Code implements log-only.
     `dd_contract.assess(equity)` and `kill_switch.check_and_trigger(equity)`
     both consume raw broker `TotalValue` from `fetch_account_equity`. The
     cost-adjusted `paper_equity_bt_equiv` is only written to the JSON log and
     never fed back. CRO's stance (log-only correct) and NHT's prior
     material_concern (log-only insufficient) both still apply; no PM spec
     amendment was added to settle which architecture binds. NHT's
     material_concern is preserved unchanged.

  4. **BC-8 (cross-process race):** Neither of the two acceptable closures
     named in CONSENSUS_2026-05-05 Section 4 (fcntl advisory file-lock OR
     per-strategy 7.5% budget tickets) is implemented. The
     `TestAtomicLockAndReset` suite is for the unrelated account-key parity
     lock. BC-8 closure claim is unsupported by code.

  5. **Group-B test adequacy:** The test
     `test_rebalance_cost_charged_on_delta_not_full_target` enshrines the F-001
     bug by asserting `cost_usd == 0.75 * 0.01 * 1500 = 11.25` for USDJPY at
     price 150 — i.e., the broken paper-loop output. The engine for the same
     rebalance would compute `cost_dollars = 0.75 * 0.01 * (1500/150) = 0.075`.
     A correct engine-parity assertion would FAIL this test.

  6. **No-regressions / sacred test:** Cannot adjudicate via code review
     alone. ROUTE_TO quant-developer required.

  Verdict: **do-not-commit** for both Group A (paper loops + monitor +
  cf_t9 test) and Group B (wave8 remediation test). The F-001 bug must be
  truly fixed (apply `_to_engine_units` at the paper-loop sizing boundary),
  the parity test must exercise USDJPY through the engine codepath, BC-8 must
  receive one of the two named residual controls, and the rebalance test
  must be inverted to assert engine-correct values before any of this
  changeset commits.
