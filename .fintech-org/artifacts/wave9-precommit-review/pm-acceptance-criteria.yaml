# ── Wave structure and stage gates ────────────────────────────────────────────
# Wave-1 (this artifact): PM emits acceptance criteria.
# Wave-2 (fan-out, parallel): CTO + QD + CRO + NHT each review their domain.
#   - CTO: architecture scope review — LoC-cap deviation (F-003), kill-switch
#     property 4 absence (F-007), log-sink design (F-004 / F-008).
#   - QD: implementation correctness — F-001 unit-conversion, F-002 USDJPY test,
#     F-005 pip_v heuristic, F-006 double-counting question.
#   - CRO: risk gate review — BC-8 residual control presence/absence,
#     cost-feedback-into-equity architecture position (NHT NEW-2 vs CRO log-only).
#   - NHT: adversarial re-verification — does F-001 closure hold? does F-002
#     USDJPY test actually exercise the unit-conversion path? is NEW-2 resolved
#     or deferred? is any forbidden-phrase present?
# Wave-3 (Principal Reviewer alone): synthesizes Wave-2 findings; checks for
#   role-vs-role contradictions; confirms verdict consistency (no role approving
#   what another is blocking); produces per-file-group verdict table.
# Wave-4 (PM): CONSENSUS doc synthesizing Wave-2 + Wave-3 outputs; records
#   final commit verdicts; routes unresolved CEO-decision items back to deferred
#   queue or flags them for CEO ratification.
#
# Wave-2 outputs expected (each a typed artifact per handoff.md schema):
#   - cto-architecture-review.yaml
#   - qd-implementation-review.yaml
#   - cro-risk-review.yaml
#   - nht-adversarial-review.yaml
# Wave-3 expected output:
#   - principal-reviewer-review.yaml (includes per-file-group verdict table)
# Wave-4 expected output:
#   - pm-consensus.yaml + CONSENSUS_2026-05-06_wave9_precommit.md

