# ── Findings ──────────────────────────────────────────────────────────────────
findings:

  - id: F-001-PR
    severity: blocking
    category: correctness
    location: |
      scripts/run_paper_trading_vt.py:689 (_cost_usd = _cost_pips * _pip_v * _trade_units)
      scripts/run_paper_trading_carry_fred.py:648 (_cost_usd = _cost_pips * _pip_v * _trade_units)
    observation: |
      Both paper loops compute per-trade cost as
        _cost_usd = _cost_pips * _pip_v * _trade_units
      where _trade_units is the USD-nominal target (e.g. 20,000 for a $10k-equity,
      2x-leverage, signal=1 USDJPY position, returned by VolTargetSizer.calculate_size
      at sizing/vol_target.py:78 — "units = scale * leverage_cap * account_equity").
      The engine equivalent (engine.py:331-332, 358) uses delta in engine units, where
      engine units = _to_engine_units(usd_nominal, pair, price) = usd_nominal/price
      for JPY-quoted pairs (engine.py:571-572).
    inference: |
      For USDJPY at price ≈150, the paper-loop cost is therefore
      150x larger than the engine-equivalent cost. Concrete numerics:
      target=20,000 USD-nominal at 0.75 pips entry cost:
        engine: 0.75 * 0.01 * (20000/150) ≈ 1.00 USD (correct)
        paper:  0.75 * 0.01 * 20000       = 150.0 USD (overstated 150x)
      A fictitious -150 USD entry cost on $10k equity is -1.5% per cycle
      and will dominate paper_equity_bt_equiv, falsifying the equity-curve
      parity that the cost model is supposed to provide. This is exactly
      the bug F-001 was supposed to close per PM hard-constraint
      pm-acceptance-criteria.yaml:56-58 and criterion A-F001 lines 69-79.
    evidence:
      - vt.py:605 _raw_target_units = sizer.calculate_size(sig, equity, mid, 0.0, pair)
      - vt.py:609 target_units = _raw_target_units * _dd_sizing_multiplier
      - vt.py:684-685 _cost_pips=...; _trade_units = target_units (USD-nominal)
      - vt.py:689 _cost_usd = _cost_pips * _pip_v * _trade_units (NO division by price)
      - carry_fred.py:577 raw_target_units = sizer.calculate_size(sig, equity, mid, 0.0, pair)
      - carry_fred.py:581 target_units = int(raw_target_units * size_multiplier * effective_dd_multiplier)
      - carry_fred.py:643-644 _cost_pips=...; _trade_units = target_units
      - carry_fred.py:648 _cost_usd = _cost_pips * _pip_v * _trade_units (NO division by price)
      - engine.py:299 target_units = _to_engine_units(usd_nominal, pair, price)
      - engine.py:331-332 cost_pips = cost_model.entry_cost(pair, abs(delta)); equity -= cost_pips * pip_value * abs(delta)
      - engine.py:544-573 _to_engine_units: returns usd_nominal/price for JPY-quoted pairs
      - vol_target.py:78 units = scale * leverage_cap * account_equity (USD nominal output)
    recommended-action-class: tighten-invariant
    owning-role: quant-developer
    notes: |
      Recommended invariant (no implementation here): for any (pair, target_units, price)
      tuple the paper-loop equity-write must agree numerically with engine.run_backtest's
      equity reduction at the same trade event, INCLUDING for JPY pairs where unit
      convention diverges between USD-nominal and engine units. Fix is structural
      (route through _to_engine_units or PairInfo.pip_value) and outside reviewer scope.

  - id: F-002-PR
    severity: blocking
    category: test-coverage-gap
    location: |
      tests/scripts/test_wave8_high_remediation.py:334-446 (TestE2EParity uses EURUSD)
      tests/scripts/test_wave8_high_remediation.py:38-149 (TestCostModelParity uses
        shared SIZE=10_000 short-circuiting the unit conversion)
    observation: |
      The PM hard-constraint F-002 (pm-acceptance-criteria.yaml:57, criterion B-F002
      lines 133-143) requires "at least one TestE2EParity or equivalent test that
      drives both the engine and the paper-loop cost path using a USDJPY trade
      tuple (price≈150, JPY-pair convention), not EURUSD."

      The submitted TestE2EParity at lines 334-446 explicitly states (lines 337-340):
        "Uses EURUSD (not USDJPY) to avoid the engine's JPY unit-convention conversion
         (_to_engine_units divides USD nominal by price for JPY pairs)."

      TestCostModelParity at lines 38-149 uses USDJPY but with SIZE=10_000 fed
      DIRECTLY to both _engine_*_cost_dollars(self, model) (line 60, 65) and to
      _paper_loop_*_cost_dollars(self, model, pair, size) (line 73, 81); both
      helpers reproduce the SAME local formula cost_pips * pip_value * size with
      no _to_engine_units conversion. They are therefore identical by construction
      and cannot detect the bug.
    inference: |
      The single test that COULD have driven the unit-conversion path
      (TestE2EParity at line 374, test_entry_cost_parity_engine_vs_paper_loop)
      explicitly excludes the case where F-001 manifests. F-002 is not closed
      regardless of test pass/fail status. A correctly-shaped test would: (a)
      use USDJPY at price≈150, (b) run the engine via run_backtest (which
      applies _to_engine_units), (c) run vt_mod.run_cycle with the same
      USDJPY target, (d) assert equity-curve numerical parity between the two
      paths. The current TestE2EParity is structurally insufficient to satisfy F-002.
    evidence:
      - test_wave8_high_remediation.py:53 PAIR = "USDJPY" (TestCostModelParity)
      - test_wave8_high_remediation.py:60-65 _engine_entry/exit_cost_dollars: cost_pips * 0.01 * 10000 directly
      - test_wave8_high_remediation.py:73,81 _paper_loop_entry/exit_cost_dollars: identical formula
      - test_wave8_high_remediation.py:117-118 paper == engine asserted (tautological)
      - test_wave8_high_remediation.py:337-340 TestE2EParity docstring explicitly avoids USDJPY
      - test_wave8_high_remediation.py:346 PAIR = "EURUSD" (TestE2EParity)
      - test_wave8_high_remediation.py:402-403 only EURUSD bar 1 compared to engine equity_curve
    recommended-action-class: add-test
    owning-role: quant-developer
    notes: |
      Required test shape: drive both run_cycle (USDJPY, price=150, target=20000)
      and run_backtest (USDJPY, signal=1, entry_delay=1, constant_capital_sizing=True
      with VolTargetSizer at the same parameters). Assert
      paper_equity_bt_equiv after entry == engine.equity_curve.iloc[1] within ε.
      Per role contract no implementation provided; this is the failure pattern
      the test must catch.

