  - id: F-004-PR
    severity: blocking
    category: invariant-violation
    location: |
      scripts/run_paper_trading_carry_fred.py:514-540 (aggregation gate)
      scripts/run_paper_trading_carry_fred.py:701-716 (execute_signal calls)
      scripts/run_paper_trading_vt.py:535-566 (aggregation gate)
      scripts/run_paper_trading_vt.py:734-765 (execute_signal calls)
      (no per-cycle file lock anywhere)
    observation: |
      The invariant "aggregate JPY-correlated notional ≤ CRO_MAX_CORRELATED_PCT
      across BOTH paper loops" is checked once per cycle in each loop independently.
      Concretely:
        carry_fred sequence: backend.get_positions() → compute_exposure →
                             check_dispatch_allowed → execute_signal
        vt sequence:         backend.get_positions() → compute_exposure →
                             check_dispatch_allowed → execute_signal
      No cross-process serialization between [check_dispatch_allowed → execute_signal].
      The startup-time assert_account_key_parity (vt.py:106-157, carry_fred.py:121-172)
      is an account-key consistency gate, NOT a per-cycle dispatch gate.
    inference: |
      Two simultaneously-running paper loops both reading positions before
      either has dispatched can each see exposure within the 15% envelope,
      both pass check_dispatch_allowed, and both then dispatch — yielding
      brief aggregate exposure up to 30% (2x CRO_MAX_CORRELATED_PCT). Race
      window is the time between get_positions() and execute_signal()
      completion (≥1.5-2 s of explicit sleeps in the rebalance branch
      vt.py:749, plus broker latency). PM hard-constraint BC-8
      (pm-acceptance-criteria.yaml:59) requires either per-strategy 7.5%
      budget tickets OR cross-process advisory file-lock. Neither is
      present in code. CRO Wave-8 BC-8 veto remains in effect; carry_fred
      second-loop cannot be authorized until this closes.
    evidence:
      - carry_fred.py:514-540 single-loop view of exposure at dispatch time
      - vt.py:535-566 single-loop view of exposure at dispatch time
      - "grep results: only ACCOUNT_KEY_LOCK_PATH lock exists; no cross-process per-cycle lock; no fcntl import; no advisory-lock primitive"
      - exposure_aggregator.py:46 "_JPY_CORRELATED: frozenset[str] = frozenset({\"USDJPY\", \"GBPUSD\"})" — note also that GBPUSD inclusion as JPY-correlated is structurally questionable but PM-out-of-scope
    recommended-action-class: tighten-invariant
    owning-role: cro
    notes: |
      Per PM AC criterion A-BC8 (lines 92-102) verdict-if-fail is
      "commit-as-is for Group A code; second-loop authorization remains BLOCKED."
      So this finding does not block COMMIT of Group A — but does block any
      CRO sign-off on running carry_fred concurrently with vt.

  - id: F-005-PR
    severity: blocking
    category: spec-drift
    location: |
      pm-acceptance-criteria.yaml:60 (NHT cost-feedback disagreement requirement)
      scripts/run_paper_trading_vt.py:484, 498
      scripts/run_paper_trading_carry_fred.py:473, 481
    observation: |
      Both paper loops feed RAW broker equity (return value of fetch_account_equity
      → balance.TotalValue) into:
        kill_switch.check_and_trigger(equity)   — vt:484; carry_fred:473
        dd_contract.assess(equity)               — vt:498; carry_fred:481
      The cost-adjusted equity (paper_equity_bt_equiv = equity - _cost_usd + _swap_usd)
      is computed AFTER these checks (vt:710; carry_fred:665) and only written to
      the equity log. It is not fed back into any risk primitive.
    inference: |
      The submitted code therefore takes a definite position: cost-feedback
      into operational risk is LOG-ONLY. PM AC (lines 60, 207-220) requires
      this position to be EXPLICITLY documented and confirmed by either
      a PM spec amendment or a CEO ruling. I find no such amendment in
      scope. Per criterion CROSS-cost-feedback-routing (line 220),
      verdict-if-fail is "review is incomplete; re-dispatch required" —
      but the policy choice itself is also a substantive risk decision
      (NHT NEW-2 vs CRO-recommended architecture). The reviewer flags
      this for governance routing but does NOT take a stance on which
      architecture is correct; that is owned by CRO + NHT + CEO.
    evidence:
      - vt.py:484 if kill_switch.check_and_trigger(equity)  # raw broker equity
      - vt.py:498 _dd = dd_contract.assess(equity)          # raw broker equity
      - vt.py:710 paper_equity_bt_equiv computed but only written to log
      - carry_fred.py:473 if kill_switch.check_and_trigger(equity)
      - carry_fred.py:481 _dd = dd_contract.assess(equity)
      - carry_fred.py:665 paper_equity_bt_equiv only written to log
      - drawdown_contract.py:129 def assess(self, current_equity: float)  # consumes raw float
      - kill_switch.py:208 def check_and_trigger(self, current_equity: float)  # consumes raw float
    recommended-action-class: clarify-spec
    owning-role: ceo
    notes: |
      Either route: PM amendment naming raw-broker-equity as the binding
      contract for risk primitives (closing NEW-2 as deferred), OR a
      CEO ruling that cost-adjusted equity must feed the risk primitives
