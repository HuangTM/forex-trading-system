  - id: F-006-PR
    severity: major
    category: invariant-violation
    location: |
      scripts/run_paper_trading_vt.py:67 (EQUITY_LOG_PATH = "data/paper_trading_session.log")
      scripts/run_paper_trading_carry_fred.py:86 (EQUITY_LOG_PATH = "data/paper_trading_session.log")
      scripts/run_paper_trading_vt.py:704 (with open(EQUITY_LOG_PATH, "a") as _ef)
      scripts/run_paper_trading_carry_fred.py:658 (with open(EQUITY_LOG_PATH, "a") as _ef)
    observation: |
      Both paper loops define EQUITY_LOG_PATH with the same value
      "data/paper_trading_session.log" and both write append-only
      json-serialized records. The append uses plain Python with open(..., "a")
      — no fcntl.flock, no atomic-rename pattern, no per-record framing beyond
      a trailing newline.
    inference: |
      POSIX guarantees atomic O_APPEND writes only for buffers ≤ PIPE_BUF
      (typically 4096 bytes Linux, 512 bytes macOS for FIFOs, larger for
      regular files but not formally guaranteed). The serialized record
      can exceed this threshold when strategy_params is non-trivial; the
      JSON dictionary written includes "ts", "strategy", "equity", "regime_active"
      (carry_fred only), "cost_pips", "cost_usd", "swap_usd",
      "paper_equity_bt_equiv". For a small dict this is well under 4KB,
      so race-induced line interleaving is unlikely with current schema —
      but the invariant "equity log lines are individually parseable JSON"
      is not enforced by code; it depends on dict-size discipline.
      Future schema additions (e.g. nested context, larger strategy_params)
      could silently break audit-log JSON parsing under concurrent writes.
    evidence:
      - vt.py:67, carry_fred.py:86 same path constant
      - vt.py:704-711, carry_fred.py:658-666 same write pattern
      - "no fcntl import in either file (verified by grep)"
    recommended-action-class: tighten-invariant
    owning-role: quant-developer

  - id: F-007-PR
    severity: major
    category: observability-gap
    location: |
      scripts/run_paper_trading_carry_fred.py:447-452 (SKIP_REGIME_INACTIVE early return)
      scripts/run_paper_trading_carry_fred.py:670-678 (HOLD path equity-write block bypassed)
    observation: |
      In carry_fred, when regime_active_status() returns False, run_cycle
      returns at line 452 BEFORE any of the cycle's equity / cost / swap
      tracking runs. _emit_ws02 is called (line 450-451), but the
      EQUITY_LOG_PATH append at line 658-666 is unreachable on this path.
      Compare to vt where the equity-write block runs on the no-action
      "HOLD FLAT" branch as well.
    inference: |
      For multi-day periods of regime-inactive (the expected steady state
      per BC-1, "size_multiplier = 0.0 when regime flag is FALSE; zero
      positions permitted"), there is no per-cycle equity record from
      carry_fred. The audit reconstructibility principle (rubric 3) is
      that any decision boundary should be reproducible from the log
      alone. The ws02 trace captures regime_active=False, but the
      paper-equity time series for carry_fred has gaps during inactive
      regimes. This is not a correctness bug; it is a decision-trace
      completeness gap that will complicate post-mortem analysis if
      a kill-switch / drawdown event happens during a regime transition.
    evidence:
      - carry_fred.py:447-452 SKIP_REGIME_INACTIVE return
      - carry_fred.py:658-666 equity-log append unreachable on this path
      - vt.py:704-711 equity-log append always reached (no early-return before it)
    recommended-action-class: add-log
    owning-role: quant-developer

  - id: F-008-PR
    severity: blocking
    category: test-coverage-gap
    location: |
      tests/scripts/test_wave8_high_remediation.py:540-562
        (test_rebalance_cost_charged_on_delta_not_full_target)
      tests/scripts/test_wave8_high_remediation.py:564-611
        (test_full_entry_cost_not_delta_when_opening)
    observation: |
      test_rebalance_cost_charged_on_delta_not_full_target asserts at line 553-557:
        delta = abs(6_500.0 - 5_000.0)  # = 1500
        expected_cost = 0.75 * 0.01 * delta  # = 11.25
        assert entry["cost_usd"] == pytest.approx(expected_cost, abs=1e-4)
      For pair=USDJPY at price=150, the engine-equivalent cost is
      0.75 * 0.01 * (1500/150) = 0.075. The test asserts 11.25 — the value
      produced by the F-001-bugged formula. test_full_entry_cost_not_delta_when_opening
      similarly asserts 0.75 * 0.01 * 5000 = 37.5 (line 607) where engine
      would compute 0.75 * 0.01 * (5000/150) ≈ 0.25.
    inference: |
      These tests would FAIL if F-001 were correctly fixed. They lock in
      the buggy paper-loop formula as the asserted contract, making the
      regression a red-test for any future fix attempt. This is a
      "test-asserts-the-bug" class of test-coverage-gap that PM would
      not classify as F-001 closure but as F-001 entrenchment. A test
      that should detect the bug instead enshrines it.
    evidence:
      - test_wave8_high_remediation.py:541-557 expected_cost = 0.75 * 0.01 * delta where delta=1500
      - test_wave8_high_remediation.py:607-611 expected_cost = 0.75 * 0.01 * 5_000 for USDJPY entry
      - test_wave8_high_remediation.py:483 entry_price=150.0 (so engine-equivalent units = nominal/150)
      - "engine.py:331-332 + _to_engine_units would produce delta-engine-units = 1500/150 = 10 units, cost = 0.75 * 0.01 * 10 = 0.075"
    recommended-action-class: clarify-spec
    owning-role: quant-developer
    notes: |
