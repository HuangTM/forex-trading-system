  - id: F-009-PR
    severity: minor
    category: numerical
    location: |
      scripts/run_paper_trading_vt.py:674 (_pip_v = 0.01 if "JPY" in pair.upper() else 0.0001)
      scripts/run_paper_trading_carry_fred.py:634 (same)
      tests/scripts/test_wave8_high_remediation.py:71, 79 (same)
    observation: |
      Both paper loops use a string-substring heuristic to assign pip value.
      "JPY" in "USDJPY".upper() is True (correct). But "JPY" in "JPYAUD".upper()
      is also True — this is correct only by coincidence for FX pairs that
      include JPY at all; the heuristic does not consult PairInfo.pip_value
      (which is the canonical source per CLAUDE.md "pair costs ... no
      hardcoded magic numbers"). A pair-symbol typo or extension to a synthetic
      cross would silently fall through.
    inference: |
      Low-blast-radius today (only USDJPY in instrument-universe per
      pm-acceptance-criteria.yaml:50-52). But this same pattern is repeated
      in five places (vt cost, carry_fred cost, test_wave8 helper x2,
      ws02_emit literal in carry_fred line 634). The class-fix would route
      pip value through PairInfo. For now, observation only.
    evidence:
      - vt.py:674 _pip_v = 0.01 if "JPY" in pair.upper() else 0.0001
      - carry_fred.py:634 same
      - test_wave8_high_remediation.py:71, 79 same in helper functions
      - engine.py:537-541 _get_pip_value(pair) implements identical heuristic — engine has same minor issue but is in src/, not in scope for this review
    recommended-action-class: tighten-invariant
    owning-role: quant-developer

  - id: F-010-PR
    severity: minor
    category: edge-case
    location: |
      scripts/run_paper_trading_vt.py:467-481 (equity-fetch branch)
      scripts/run_paper_trading_carry_fred.py:455-470 (equity-fetch branch)
    observation: |
      fetch_account_equity returns Optional[float]; the only check on the
      successful-fetch path is `if equity > 0` (vt:367; carry_fred:355).
      Negative or NaN balance.TotalValue would coerce through the truthy
      check. balance.get("TotalValue", 0.0) without isinstance/type check
      means a malformed broker payload (string, dict, None) would raise
      TypeError on the comparison and fall to the `except Exception` at
      line 373 (vt) / 363 (carry_fred), which logs "Could not fetch ..."
      and returns None — i.e. the kill-switch fetch-fail counter increments
      and after N consecutive cycles the loop kills itself. This is the
      DESIRED fail-safe but the audit-log message would be misleading.
    inference: |
      Failure mode is named ("equity unavailable") but the actual cause
      (broker schema mismatch) would not be in the log. Low-severity
      observability gap; the kill-switch ultimately fires correctly.
    evidence:
      - vt.py:362-375 fetch_account_equity error handling
      - carry_fred.py:351-365 same
    recommended-action-class: add-log
    owning-role: quant-developer

