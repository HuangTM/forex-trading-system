  - id: F-002
    gate: B-F002
    verdict: FAIL
    severity: high
    title: "F-002 NOT CLOSED: TestE2EParity drives EURUSD only; no USDJPY E2E parity test present"
    description: |
      TestE2EParity (test_wave8_high_remediation.py line 334) explicitly avoids USDJPY.
