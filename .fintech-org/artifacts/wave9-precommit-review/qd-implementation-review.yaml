findings:

  # F-001: USDJPY cost-formula closure
  - id: F-001
    gate: A-F001
    verdict: FAIL
    severity: critical
    title: "F-001 NOT CLOSED: paper loops do NOT apply _to_engine_units JPY division before cost_usd"
    description: |
      Both run_paper_trading_carry_fred.py (line 648) and run_paper_trading_vt.py (line 689)
      compute cost_usd as:
        _cost_usd = _cost_pips * _pip_v * _trade_units
      where _trade_units is the USD-nominal output from sizer.calculate_size() (e.g., 100_000 USD
      for a 1x leverage USDJPY entry at 100k equity).

      The engine's _to_engine_units (engine.py line 544-573) divides USD-nominal by price for JPY
      pairs BEFORE multiplying by pip_value in all cost computations:
        target_units = usd_nominal / price   # e.g., 100_000 / 150 ≈ 666.67 JPY-convention units
        cost_dollars = cost_pips * pip_value * target_units   # 0.75 * 0.01 * 666.67 ≈ 5.0 USD

      The paper loops skip this division. With _trade_units = 100_000 (raw USD nominal):
        _cost_usd = 0.75 * 0.01 * 100_000 = 750 USD   (paper loop, WRONG)
        expected  = 0.75 * 0.01 * (100_000/150) ≈ 5.0 USD  (engine, CORRECT)

      This is a 150× overstatement when mid ≈ 150 (USDJPY). The paper_equity_bt_equiv written to
      EQUITY_LOG_PATH (carry_fred.py:659-666, vt.py:704-711) is therefore NOT backtest-equivalent
      for USDJPY; equity is understated by ~745 USD per 100k-unit entry cycle.

      The fix noted in the PM AC was to apply _to_engine_units (divide by price) before multiplying
      pip_v * trade_units. This division is ABSENT from both scripts.

    evidence:
      - "carry_fred.py:634: `_pip_v = 0.01 if 'JPY' in pair.upper() else 0.0001`"
      - "carry_fred.py:634-648: _trade_units set to raw sizer output (USD nominal); no / price"
      - "carry_fred.py:648: `_cost_usd = _cost_pips * _pip_v * _trade_units`  — missing JPY division"
      - "vt.py:674: same heuristic; same absent division"
      - "vt.py:689: `_cost_usd = _cost_pips * _pip_v * _trade_units` — missing JPY division"
      - "engine.py:544-573: _to_engine_units divides usd_nominal by price for endswith('JPY')"
      - "engine.py:299: `target_units = _to_engine_units(usd_nominal, pair, price)`"
      - "engine.py:332: `equity -= cost_pips * pip_value * abs(delta)` — delta is engine units (post-division)"
    verdict-per-pm-ac: do-not-commit (Group A) per criterion A-F001 fail-condition

  - id: F-001-TEST-BYPASS
    gate: A-F001
    verdict: FAIL-BY-PROXY
    severity: high
    title: "TestCostModelParity uses fabricated SHARED_SIZE that bypasses the unit-conversion path"
    description: |
      TestCostModelParity (test_wave8_high_remediation.py lines 38-231) defines:
        PAIR = "USDJPY"; SIZE = 10_000.0
      and calls cost_model.entry_cost("USDJPY", 10_000) directly (lines 59, 72).
      The size value 10_000 is a hand-chosen constant that is NOT derived from
      sizer.calculate_size(). It happens to be small enough that _cost_usd = 0.75 * 0.01 * 10_000 = 75.0
      matches the expected value in the test assertion (line 112-117).

      But the actual paper loop calls sizer.calculate_size() which returns USD-nominal
      (e.g., 100_000 for 100k equity, 1x leverage, signal=1.0). The test never exercises
      the path where _trade_units = sizer_output (USD nominal) and the missing division causes
      a 150× overstatement. The test passes even with F-001 unfixed.

    evidence:
      - "test_wave8_high_remediation.py:53: `SIZE = 10_000.0` — hardcoded, not derived from sizer"
      - "test_wave8_high_remediation.py:57-73: _paper_loop_entry_cost_dollars hardcodes pip_v and SIZE"
      - "test_wave8_high_remediation.py:102-118: asserts engine_cost == paper_cost at SIZE=10_000"
      - "This test would also PASS with the unit-conversion bug present (sizes match by coincidence)"

