      - "No test class in file asserts engine equity_curve == paper_equity_bt_equiv for USDJPY"
    verdict-per-pm-ac: commit-after-fixes (Group B) per criterion B-F002 fail-condition

  # F-005: pip_v heuristic vs PairInfo.pip_value
  - id: F-005
    gate: none-explicit
    verdict: FAIL
    severity: medium
    title: "F-005: pip_v computed via heuristic string check, not from canonical PairInfo.pip_value"
    description: |
      Both scripts compute pip value via:
        _pip_v = 0.01 if "JPY" in pair.upper() else 0.0001
      This is a heuristic, not a lookup against the canonical PairInfo dataclass
      (src/forex_system/core/types.py line 26: `pip_value: float`).

      The engine uses _get_pip_value(pair) (engine.py:537-541) which applies the same
      heuristic, so for USDJPY the numeric result is correct today. However, the paper
      loops are fragile: any pair not ending in "JPY" but having a different pip convention
      (hypothetical future pair, or a mislabeled config) would silently compute the wrong
      pip value. The canonical approach is to look up PairInfo from the cost model or config.

      This is a non-blocking finding (correct for current pairs) but introduces fragility.

    evidence:
      - "carry_fred.py:634: `_pip_v = 0.01 if 'JPY' in pair.upper() else 0.0001`"
      - "vt.py:674: same heuristic"
      - "src/forex_system/core/types.py:22-26: PairInfo has pip_value field"
      - "engine.py:537-541: _get_pip_value also uses heuristic — consistent fragility"
    verdict-if-fail: non-blocking (fragile but correct for current deployment pairs)

  # F-006: Saxo TotalValue double-counting
  - id: F-006
    gate: none-explicit
    verdict: PASS-WITH-NOTE
    severity: low
    title: "F-006: TotalValue is single source for operational equity; no double-counting detected"
    description: |
      fetch_account_equity (carry_fred.py:351-365, vt.py:361-375) reads only
      `balance.get("TotalValue", 0.0)` and falls back to `CashBalance` if TotalValue is zero.
      It does NOT sum TotalValue + realized_pnl + unrealized_pnl from separate API fields.
      Saxo's TotalValue is defined as the consolidated net account value (cash + open P&L),
      so using it as the sole equity source is correct and does not double-count.

      The double-counting risk would arise if code added separate P&L fields ON TOP of TotalValue.
      No such addition is present in either script.

    evidence:
      - "carry_fred.py:353-360: single-source TotalValue, fallback to CashBalance only"
      - "vt.py:363-374: identical pattern"
      - "No addition of unrealized_pnl or realized_pnl fields to the equity value"
    verdict-if-fail: n/a (pass)

