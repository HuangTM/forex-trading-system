# NHT Falsification Rubric — Phase 2
# Source: nht-frozen-thresholds.yaml dated 2026-05-01.
# Frozen per CONSENSUS_2026-05-01_phase2_falsification.md.
# Changes require new pre-registration + new CONSENSUS.
# Field names below are consumed verbatim by NhtRubric.load_from_yaml().

# R1 — Naive OOS Sharpe
# Strategy fails if oos_sharpe < r1_oos_sharpe_lt.
# Override rule: max(0.30, strategy_pre_reg.kill_switch_threshold) applies
# when kill_switch_threshold is a numeric value more conservative than 0.30.
r1_oos_sharpe_lt: 0.30

# R2 — Deflated Sharpe Ratio (Bailey & Lopez de Prado 2014)
# Strategy fails if dsr < r2_dsr_lt.
# n_trials MUST be n_trials_at_spawn from the trial record.
r2_dsr_lt: 0.50

# R3 — Max Drawdown
# Strategy fails if max_drawdown > r3_max_dd_gt (positive fraction, e.g. 0.25 = 25%).
r3_max_dd_gt: 0.25

# R5 — Reality-Check falsification tests (ACTIVE — harness emits r5 block)
# Three sub-tests per NHT R5 spec (2026-05-30). A strategy is R5-active only
# if its pre-registration declares r5_active: true in the sidecar YAML.
# Missing r5 fields for an R5-active strategy raises MissingMetricError.

# R5a — Stationary/Circular Block Bootstrap (autocorrelation falsifier)
# Strategy fails if permutation_pvalue > r5_permutation_pvalue_gt.
# permutation_pvalue = r5a_circular_block_pvalue (flat mirror from r5 block).
r5_permutation_pvalue_gt: 0.05

# R5b — Randomized OOS-Window Placement (regime/window-selection falsifier)
# Strategy fails if r5b_window_percentile >= r5_window_percentile_gt.
r5_window_percentile_gt: 0.90

# R5c — Hansen's SPA (pair-selection / best-of-N falsifier)
# Strategy fails if r5c_spa_pvalue_consistent > r5_spa_pvalue_gt.
r5_spa_pvalue_gt: 0.05

# R6 — Sample size gates
# Strategy fails if n_trades < r6_n_trades_lt OR n_oos_bars < r6_n_oos_bars_lt.
r6_n_trades_lt: 30
r6_n_oos_bars_lt: 252
