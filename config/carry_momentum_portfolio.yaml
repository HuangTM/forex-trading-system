# Machine-readable deploy block — enforced by core.config.assert_deployable().
# Deployment entrypoints (run_paper_trading, run_multi_strategy) HARD-FAIL on this;
# backtests/research load it freely. This is the control behind the DO-NOT-DEPLOY label.
deploy_status:
  status: FALSIFIED
  do_not_deploy: true
  reason: "Real-data revalidation Sharpe 0.04 (claim 0.59 was synthetic-data); fails null gate. Ratified 2026-06-26. See PHASE0_CLOSURE_2026-06-26.md."

system:
  name: "jpy-carry-momentum"
  log_level: "INFO"

data:
  base_dir: "data"

pairs:
  - symbol: "USDJPY"
    pip_value: 0.01
    spread_pips: 1.0
    slippage_pips: 0.5
    commission_pips: 0.5
    swap_long_pips_per_day: 0.8
    swap_short_pips_per_day: -1.5

  - symbol: "GBPJPY"
    pip_value: 0.01
    spread_pips: 2.0
    slippage_pips: 0.8
    commission_pips: 0.5
    swap_long_pips_per_day: 0.2
    swap_short_pips_per_day: -1.5

  - symbol: "CADJPY"
    pip_value: 0.01
    spread_pips: 2.5
    slippage_pips: 0.5
    commission_pips: 0.5
    swap_long_pips_per_day: 0.2
    swap_short_pips_per_day: -1.0

strategies:
  active:
    - "carry_momentum"

  carry_momentum:
    fast_period: 20
    slow_period: 50
    agreement_only: true
    min_differential: 0.002
    max_differential: 0.05
    carry_weight: 0.4
    momentum_weight: 0.6

backtest:
  initial_capital: 100000.0

  position_sizing:
    method: "continuous"
    risk_per_trade: 0.007  # Scaled down from 0.02 for 4H (daily ATR ~3x larger than 4H)
    stop_loss_atr_multiple: 2.0
    max_position_pct: 0.10

  execution:
    entry_delay_bars: 1

  walkforward:
    enabled: true
    train_window_days: 504
    test_window_days: 126
    step_days: 63

analysis:
  benchmark: "buy_and_hold"
