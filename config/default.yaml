# Forex Trading System — Phase 0 Baseline Configuration
# =====================================================

system:
  name: "forex-phase0-baseline"
  log_level: "INFO"

data:
  base_dir: "data"

# Target pairs — the 3 most liquid forex pairs
pairs:
  - symbol: "EURUSD"
    pip_value: 0.0001
    spread_pips: 0.5
    slippage_pips: 0.5
    commission_pips: 0.5
    swap_long_pips_per_day: -1.2
    swap_short_pips_per_day: 0.3

  - symbol: "USDJPY"
    pip_value: 0.01
    spread_pips: 0.5
    slippage_pips: 0.5
    commission_pips: 0.5
    swap_long_pips_per_day: 0.8
    swap_short_pips_per_day: -1.5

  - symbol: "GBPUSD"
    pip_value: 0.0001
    spread_pips: 0.8
    slippage_pips: 0.6
    commission_pips: 0.5
    swap_long_pips_per_day: -0.9
    swap_short_pips_per_day: 0.1

# Strategies — using literature-standard parameters (no optimization)
strategies:
  active:
    - "ma_crossover"
    - "bollinger_rsi"
    - "momentum"

  ma_crossover:
    fast_period: 50
    slow_period: 200

  bollinger_rsi:
    bb_period: 20
    bb_std: 2.0
    rsi_period: 14
    rsi_oversold: 30
    rsi_overbought: 70

  momentum:
    lookback_period: 20
    threshold: 0.0

# Backtest configuration
backtest:
  initial_capital: 100000.0

  position_sizing:
    method: "fixed_fractional"
    risk_per_trade: 0.02        # 2% equity per trade
    stop_loss_atr_multiple: 2.0
    max_position_pct: 0.10      # Max 10% equity in one position

  execution:
    entry_delay_bars: 1         # Execute on next bar (no lookahead)

  walkforward:
    enabled: true
    train_window_days: 504      # ~2 years
    test_window_days: 126       # ~6 months
    step_days: 63               # ~3 months

# Analysis settings
analysis:
  benchmark: "buy_and_hold"

# Paper trading configuration (REM-4 / CTO D-4.1)
paper:
  # Per-strategy dispatch stagger offsets in seconds.
  # Strategies are indexed by position in the active strategy list:
  #   index 0: vol_target_carry → offset 0s (immediate after bar-close)
  #   index 1: carry_fred       → offset 30s
  #   index 2: strategy_3       → offset 60s  (reserved for intraday-classical)
  #   index 3: strategy_4       → offset 90s  (reserved for ML strategy, deferred)
  # Base interval: 1800s (30 min, matching --interval default in paper scripts).
  # Effective dispatch time: bar_close_time + base_interval + stagger_offset_seconds[i]
  # Startup validation: len(dispatch_stagger_offsets_seconds) >= len(active_strategies)
  # is enforced at BaseRunner startup — CRITICAL log + halt if violated (D-4.1 FM-4).
  dispatch_stagger_offsets_seconds: [0, 30, 60, 90]
