# Vol-Target Carry — Validated Strategy as of 2026-04-20
# =======================================================
# Long-only USDJPY, sized inversely to 252-day realized vol.
# Validation (real Saxo daily, 16 yrs):
#   - Sharpe 0.76 vs B&H 0.58  (+0.18)
#   - MaxDD 13.5% vs B&H 17.0% (-3.5pp)
#   - Walk-forward: 9/14 OOS 2-yr windows beat B&H
#   - Null hypothesis rank: 99.5% (p=0.005)
#   - Arson robust to double-cost, 5d signal lag

system:
  name: "vol-target-carry-usdjpy"
  log_level: "INFO"

data:
  base_dir: "data"

# Single-pair deployment — JPY portfolio's correlation 0.7+ doesn't help
pairs:
  - symbol: "USDJPY"
    pip_value: 0.01
    spread_pips: 1.0
    slippage_pips: 0.5
    commission_pips: 0.5
    swap_long_pips_per_day: 0.8
    swap_short_pips_per_day: -1.5

strategies:
  active:
    - "vol_target_carry"

  vol_target_carry:
    target_vol: 0.10            # annualized, 10%
    vol_window: 252             # daily bars used for realized-vol estimate
    leverage_cap: 2.0           # max units = 2x notional
    min_carry: -0.10            # essentially "no carry filter" — VT does the work
    rebalance_threshold: 0.20   # only adjust position if target differs by >20%

backtest:
  initial_capital: 1000000.0    # match live SIM equity scale

  position_sizing:
    method: "vol_target"
    leverage_cap: 2.0
    min_order_size: 100         # match Saxo SIM minimum
    max_order_units: 5000000

  execution:
    entry_delay_bars: 1
    rebalance_mode: continuous
    rebalance_threshold: 0.20

  walkforward:
    enabled: true
    train_window_days: 504
    test_window_days: 504
    step_days: 252

analysis:
  benchmark: "buy_and_hold"
