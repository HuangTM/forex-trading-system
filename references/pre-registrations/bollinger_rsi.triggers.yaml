# Sidecar triggers for bollinger_rsi pre-registration.
# Paired with: references/pre-registrations/bollinger_rsi.md
# Strategy: bollinger_rsi | Pair: all Phase-2 pairs
# Created: 2026-05-01 (sub-wave 3b; QD implementation)
# Source: HoQR Wave-2 prioritization sketch + NHT frozen rubric (R1-R6)

strategy: bollinger_rsi
pair: all
hypothesis_summary: "Bollinger-RSI mean-reversion strategy generates positive OOS risk-adjusted returns above the universal Sharpe floor."
kill_switch_threshold: 0.30
oos_overlap: false
oos_window_start: "2022-01-01"
oos_window_end: "2023-12-31"

triggers:
  - label: "bollinger_rsi-T1"
    metric: "oos_sharpe"
    operator: "<"
    threshold: 0.30
    raw_text: "OOS Sharpe < 0.30 (R1 universal floor)"
  - label: "bollinger_rsi-T2"
    metric: "max_dd"
    operator: ">"
    threshold: 0.25
    raw_text: "Max drawdown > 25% (R3 firm anchor)"
  - label: "bollinger_rsi-T3"
    metric: "dsr"
    operator: "<"
    threshold: 0.50
    raw_text: "DSR < 0.50 with N=n_trials_at_spawn (R2 NHT frozen)"
  - label: "bollinger_rsi-T4-trades"
    metric: "n_trades"
    operator: "<"
    threshold: 30
    raw_text: "n_trades < 30 (R6 sample-size floor)"
  - label: "bollinger_rsi-T4-bars"
    metric: "n_oos_bars"
    operator: "<"
    threshold: 252
    raw_text: "n_oos_bars < 252 (R6 sample-size floor)"
