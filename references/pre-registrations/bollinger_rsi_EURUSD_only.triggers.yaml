# Sidecar triggers for bollinger_rsi_EURUSD_only pre-registration.
# Paired with: references/pre-registrations/bollinger_rsi_EURUSD_only.md
# Strategy: bollinger_rsi (EURUSD only via pair-restrict hook)
# Created: 2026-05-01 (Wave-5 Round-2; QD implementation)
# Source: HoQR Wave-5 R1 candidate queue §B candidate 2

strategy: bollinger_rsi
pair: all
hypothesis_summary: "Bollinger RSI on EURUSD only generates positive OOS Sharpe above 0.30 threshold."
kill_switch_threshold: 0.30
oos_overlap: false
oos_window_start: "2022-01-01"
oos_window_end: "2023-12-31"
hook_config:
  pair_restrict: EURUSD

triggers:
  - label: "W5R2-2-T1"
    metric: "oos_sharpe"
    operator: "<"
    threshold: 0.30
    raw_text: "OOS Sharpe < 0.30 (R1 universal floor)"
  - label: "W5R2-2-T2"
    metric: "max_dd"
    operator: ">"
    threshold: 0.25
    raw_text: "Max drawdown > 25% (R3 firm anchor)"
  - label: "W5R2-2-T3"
    metric: "dsr"
    operator: "<"
    threshold: 0.50
    raw_text: "DSR < 0.50 with N=n_trials_at_spawn (R2 NHT frozen)"
  - label: "W5R2-2-T4-trades"
    metric: "n_trades"
    operator: "<"
    threshold: 30
    raw_text: "n_trades < 30 (R6 sample-size floor)"
  - label: "W5R2-2-T4-bars"
    metric: "n_oos_bars"
    operator: "<"
    threshold: 252
    raw_text: "n_oos_bars < 252 (R6 sample-size floor)"
