data_preconditions:
  - "CTO per-pair data-quality gate ADMIT for every pooled pair (EXCLUDE-not-impute)"
  - "CRO cost-coverage EXCLUDE gate PASS; default charge = spread_p90_pips"
  - "Rollover-aware swap implemented (22:00 UTC, 3x Wed; never pro-rated) -- KG-4 build precondition"
  - "Spread-column correctness verified end-to-end vs independent reconstruction (NHT D5/RR-1)"
  - "NHT null battery frozen: beat random-entry, session-time-only, daily-momentum-carryover; DSR>=0.95"
  - "Principal-Reviewer counter-signature + CEO backtest-slot grant (AC-06 workflow)"
