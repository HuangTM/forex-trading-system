# -----------------------------------------------------------------------------
# Observability requirements (Section D)
# -----------------------------------------------------------------------------
observability:
  ws01_decision_trace:
    requirement: |
      Every cycle MUST emit one structured `ws01 {json}` log line at the
      decision boundary, before any execution branch. Fields:
      cycle_id, pair, signal, vol, equity, price, target_units,
      current_units, action.
    implementation: scripts/run_paper_trading_vt.py:_emit_ws01
    trace_destination: data/ws01_trace.log (durable file handler)
    test_coverage: tests/scripts/test_ws01_decision_log.py
  kill_switch_audit:
    requirement: |
      kill_switch.trigger() MUST append a structured JSON-line to
      data/kill_switch_audit.log on every fired trigger event. The line's
      new_state must contain "HALTED" so subsequent restarts refuse-to-start.
    implementation: src/forex_system/risk/kill_switch.py:trigger (post-Q3)
    test_coverage: tests/risk/test_kill_switch.py:TestWS03TriggerAuditAppend

# -----------------------------------------------------------------------------
# Integration tests required (Section E)
# -----------------------------------------------------------------------------
integration_tests:
  must_have:
    - description: |
        Synthetic input matching a spec-documented entry condition produces
        the spec-documented action.
      status: CONFIRMED in tests/backtest/test_engine.py + harness equivalence
              (commit a5128e4 closed engine-script Sharpe gap to 0.0055)
    - description: |
        NON-entry condition (signal=0, low equity, kill-switch active) does
        NOT produce a trade.
      status: CONFIRMED in tests/scripts/test_ws01_decision_log.py
              (5 early-exit paths tested)
    - description: |
        Retirement trigger path -- VTC-T1 firing causes the harness to mark
        the trial retired in trials.jsonl.
      status: PARTIAL -- harness records gate pass/fail but auto-retirement
              workflow is manual (operator marks retired in trials.jsonl).
              ROUTE_TO ops + harness developer for closure.

# -----------------------------------------------------------------------------
# Known divergence findings (the bugs this TradeIntent would have caught
# if it had existed at implementation time)
# -----------------------------------------------------------------------------
historical_findings:
  finding_1:
    date: 2026-04-21 (Round 1 of vol_target_carry validation)
    description: |
      First implementation used units = equity * signal (no leverage_cap
      multiplication, missing quote-currency correction for JPY pair).
      Result: engine Sharpe 0.16 vs script Sharpe 0.76, a 0.60 gap.
    spec_field_that_would_have_caught: sizing.formula AND sizing.units_semantic
    rubric_section: A1 (mechanical change to sizing not in spec)
    closed_by: commit a5128e4 (Track 5; canonical formula now in code)
    evidence: |
      cto-wa03-weak-spot-inventory.yaml line 26 names this exact failure:
      "Round 1 Sharpe gap caused by sizing formula equity*signal (wrong
      denominator for JPY pairs) -- implementation choice never in spec.
      TradeIntent declaring units=(equity/price)*signal*leverage with
      explicit pair-quoting would have surfaced engine divergence as A1
      finding at PR review"

