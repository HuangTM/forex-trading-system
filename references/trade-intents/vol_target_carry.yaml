#   - CTO weak-spot inventory WS-02 (cto-wa03-weak-spot-inventory.yaml line 23):
#     "No TradeIntent spec separates researcher's claim from implementation"
#
# This is a RETROACTIVE TradeIntent for an already-implemented strategy. Per
# the firewall rubric's failure-mode FM-2 ("spec authored by same person who
# implemented strategy → post-hoc transcription"), this artifact must be
# reviewed by HoQR + CTO before being used as the spec-of-record. Until then,
# it is BEST-EFFORT TRANSCRIPTION FROM CODE, not an independent specification.
#
# Pre-registration: references/pre-registrations/vol_target_carry.md
# Implementation: src/forex_system/strategies/vol_target_carry.py
# Sizer: src/forex_system/sizing/vol_target.py
# Paper entry point: scripts/run_paper_trading_vt.py
# =============================================================================

trade_intent_id: vol_target_carry
version: 1.0.0
authored_at: 2026-04-27
authored_by: quant-researcher
status: retroactive_transcription_pending_independent_review
pre_reg_path: references/pre-registrations/vol_target_carry.md
implementation_paths:
  strategy: src/forex_system/strategies/vol_target_carry.py
  sizer: src/forex_system/sizing/vol_target.py
  paper_runner: scripts/run_paper_trading_vt.py
  config: config/vol_target_carry.yaml
git_commit_at_authoring: 7d37c44   # Q3 commit; binding for "what code was running when this was written"

# -----------------------------------------------------------------------------
# Hypothesis
# -----------------------------------------------------------------------------
hypothesis:
  primary: |
    USDJPY long-only carry with volatility-targeted sizing produces annualized
    Sharpe > 0.60 on real Saxo daily data 2010-2026, net of realistic costs.
  mechanism: |
    Volatility-targeted position sizing (inversely proportional to realized
    252-day vol) smooths drawdowns and captures more carry yield in calm
    periods while reducing exposure in choppy periods. Direction is structural
    (long-only): USD-JPY carry has been positive across the backtest window.

# -----------------------------------------------------------------------------
# Universe
# -----------------------------------------------------------------------------
universe:
  pairs: [USDJPY]   # Single-pair deployment per pre-reg; expansion to other
                    # JPY-cross pairs is a SEPARATE TradeIntent and SEPARATE
                    # trial registration.
  timeframe: daily
  data_source:
    historical: data/processed/USDJPY_daily.parquet
    live: Saxo Bank SIM (saxo.client.SaxoClient.get_chart_data, horizon='daily')

# -----------------------------------------------------------------------------
# Signal generation (Section A1, A2, A3 of firewall rubric)
# -----------------------------------------------------------------------------
signal:
  output_range: [0.0, 1.0]
  output_semantic: |
    "Fraction of full leverage". signal=1.0 means the sizer should deploy
    leverage_cap × equity USD-nominal exposure. signal=0.0 means flat.
    NEGATIVE signals are explicitly NOT generated by this strategy
    (long-only); a sizer encountering negative signal must clamp to 0.
  formula:
    realized_vol_annualized: |
      rets = data['close'].pct_change()
      bars_per_year = 252 * 24 * 3600 / median_bar_dt_seconds
      realized_vol = rets.rolling(vol_window).std() * sqrt(bars_per_year)
    raw_signal: |
      raw = (target_vol / realized_vol).clip(0, leverage_cap)
    output_signal: |
      signal = (raw / leverage_cap).fillna(0.0)
    optional_carry_filter: |
      if min_carry > -inf and rate_data is not None:
          aligned_rate_diff = rate_data[pair].reindex(data.index, ffill=True)
          signal = signal.where(aligned_rate_diff >= min_carry, 0.0)
  no_lookahead_invariant: |
    Signal at bar N executes at bar N+1 (entry_delay_bars=1) per
    config/default.yaml:70. The sacred test test_no_lookahead at
    tests/backtest/test_engine.py enforces this.

# -----------------------------------------------------------------------------
# Sizing rule (Section B2: formula referencing portfolio state, not magic)
# -----------------------------------------------------------------------------
sizing:
  formula: |
    units = signal * leverage_cap * account_equity
  units_semantic: |
    For Saxo FX: 1 unit = 1 base-currency unit (USD for USDJPY).
    With equity in USD, units output is USD nominal: signal=1.0 + lev=2.0 +
    equity=$1M -> 2,000,000 USD nominal exposure (= 2x leverage).
  quote_currency_correction: |
    For USD-quoted pairs (EURUSD, GBPUSD): price_change is in USD/unit, so
    pnl = price_change * units is correct directly.
    For JPY-quoted pairs (USDJPY, EURJPY, etc.): the engine internally
    divides units by current_price so pnl_usd = delta_price_jpy *
    (notional_usd / price) = fractional_return * notional_usd. This is
    handled by the engine's _run_continuous, NOT by the sizer.
  hard_caps:
    max_order_units: 10_000_000.0   # Circuit breaker; not a soft preference
    min_order_size: 1000.0          # Below this -> stay flat
  inputs_referenced:
    - signal_strength               # from this strategy's signal
    - account_equity                # from broker balance (paper) or capital (backtest)
    - leverage_cap                  # parameter (default 2.0)
    - current_price                 # only for >0 sanity check; not in formula
  inputs_NOT_referenced:
    - atr                           # ATR not used (sizing is fully vol-targeted)
    - confidence                    # paper runner does not pass non-default
    - ratchet_level                 # paper runner does not pass non-default

# -----------------------------------------------------------------------------
# Entry / hold / exit conditions (Section A4 + B4: invalidation)
# -----------------------------------------------------------------------------
state_transitions:
  entry_condition: |
    signal > 0 (i.e., realized_vol > 0 AND optional carry-filter passes).
    On the first bar where signal computes a non-NaN value > 0 after the
    252-bar warmup, the engine sets target position = signal*leverage*equity.
  hold_condition: |
    Signal continues to update bar-by-bar; position is rebalanced when
    |target_units - current_units| / |current_units| > rebalance_threshold
    (default 0.20). Rebalance is implemented as flatten + re-enter at target.
  exit_condition: |
    signal returns to 0.0. Causes:
    - realized_vol divides by zero (data anomaly) -> signal NaN -> 0.0
    - optional carry filter: rate_diff < min_carry -> signal masked to 0
    - manual operator exit via --auto=False prompt
  invalidation_conditions:
    no_data: |
      bars_received < vol_window + 10 -> SKIP cycle (no signal computed,
      no position change). Logged as ws01 SKIP_INSUFFICIENT_BARS.
    nan_signal: |
      .fillna(0.0) maps any NaN to flat. Behavior is documented but a
      future TradeIntent revision may distinguish "warmup NaN" (expected)
      from "data corruption NaN" (alert).
    kill_switch_active: |
      kill_switch.is_triggered -> no trade (per scripts/run_paper_trading_vt.py:189);
      audit appended via WS-03.

# -----------------------------------------------------------------------------
# Slippage budget (Section B1: calibrated distribution by regime)
# -----------------------------------------------------------------------------
slippage_budget:
  status: PARTIAL_CALIBRATION
  calibration_gap: |
    No empirical slippage distribution exists yet. Backtest uses a fixed
    constant from config/default.yaml; live execution telemetry is not
    captured at the granularity needed for P50/P90/P99. Until paper-trading
    fills are gathered (CTO Q4 / WS-02 follow-up), the pre-trade budget is
    config-derived only.
  config_derived_pip_costs:
    pair: USDJPY
    spread_pips: 0.5         # config/default.yaml:23
    slippage_pips: 0.5       # config/default.yaml:24 (mid-execution friction)
    commission_pips: 0.5     # config/default.yaml:25
    swap_long_pips_per_day: 0.8     # positive = paid to us (USD>JPY rate diff)
    swap_short_pips_per_day: -1.5   # paid by us (long-only strategy never short)
  empirical_calibration_required:
    by_regime:
      - regime: low_volatility   # realized vol < 8% annualized
        p50: TODO
        p90: TODO
        p99: TODO
      - regime: high_volatility  # realized vol >= 15% annualized
        p50: TODO
        p90: TODO
        p99: TODO
      - regime: news_window      # 30 min around scheduled CB events
        p50: TODO
        p90: TODO
        p99: TODO
    data_required: |
      Saxo SIM/live fills with intended-vs-fill price delta, regime tag,
      timestamp. Aggregate across at least 50 fills per regime. Refresh
      quarterly. Source from data/trades/*.parquet once trade_log captures
      the intended_price field (currently captured in TradeLog.record).

# -----------------------------------------------------------------------------
# Parameters (Section C: every numeric literal traceable)
# -----------------------------------------------------------------------------
parameters:
  - name: target_vol
    value: 0.10
    rationale: 10% annualized -- conservative for retail FX; pre-registered
    sourced_from: config/vol_target_carry.yaml
  - name: vol_window
    value: 252
    rationale: One trading year; standard convention
    sourced_from: config/vol_target_carry.yaml
  - name: leverage_cap
    value: 2.0
    rationale: 2x ceiling; prevents tail-event blowup at signal saturation
    sourced_from: config/vol_target_carry.yaml
  - name: min_carry
    value: -inf
    rationale: |
      Pre-reg specifies "no carry filter -- VT does the work". -inf means
      the filter is structurally disabled. Only set otherwise as a deliberate
      experiment requiring a NEW pre-registration.
    sourced_from: code default (vol_target_carry.py:59)
  - name: rebalance_threshold
    value: 0.20
    rationale: |
      Avoid intra-day churn from small vol fluctuations. 20% threshold means
      target must drift by 20% relative to current before flatten+re-enter.
    sourced_from: scripts/run_paper_trading_vt.py main() / config
  - name: entry_delay_bars
    value: 1
    rationale: Firm-wide no-lookahead invariant
    sourced_from: config/default.yaml:70

# -----------------------------------------------------------------------------
# Retirement triggers (Section B3: machine-checkable)
# -----------------------------------------------------------------------------
retirement_triggers:
  source: references/pre-registrations/vol_target_carry.md (VTC-T1..T8)
  binding: true
  triggers:
    - id: VTC-T1
      condition: production_engine_sharpe < 0.60 on full history (2010-2026)
      action: retire family
      machine_checkable: yes
    - id: VTC-T2
      condition: max_drawdown > 0.25 on production-engine run
      action: retire family
      machine_checkable: yes
    - id: VTC-T3
      condition: |
        walk-forward OOS windows -- fewer than 6 of 14 beat B&H Sharpe
      action: retire family
      machine_checkable: yes
    - id: VTC-T4
      condition: DSR < 0.90 deflated for org-wide trial count
      action: escalate to HoQR before any capital increase
      machine_checkable: yes
    - id: VTC-T5
      condition: forward 6-month paper Sharpe < 0.0 on live SIM
      action: retire (live evidence trumps backtest)
      machine_checkable: yes
    - id: VTC-T6
      condition: costs doubled in stress-run -> Sharpe falls below 0.40
      action: retire (edge too thin for cost-error survival)
      machine_checkable: yes
    - id: VTC-T7
      condition: vol signal lagged 5 days -> Sharpe falls below 0.50
      action: retire (vol persistence is load-bearing assumption)
      machine_checkable: yes
    - id: VTC-T8
      condition: |
        rank percentile vs 200 shuffled-vol signals falls below 95th pct
      action: retire (signal indistinguishable from noise)
      machine_checkable: yes

# -----------------------------------------------------------------------------
